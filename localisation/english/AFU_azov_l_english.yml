l_english:
 ## FOCUSES
 AFU_march_on_kharkiv:0 "March on Kharkiv"
 AFU_march_on_kharkiv_desc:0 "Kharkiv is the city of corruption, money. City of oligarchs and their puppets. They are not our brothers and we must purificate town from the rot. We are gathering troops to Kharkiv, begin the making of the plan!"
 
 AFU_infrastructural_raids:0 "Infrastructural Raids"
 AFU_infrastructural_raids_desc:0 "Kharkiv oblast is one of the most industrialized region in country. Our enemies can use their deadly potential in future against us, we must paralize them very quickly. Or war with Kharkiv will end us not wery well."
 
 AFU_blow_up_their_railways:0 "Blow Up Their Railways"
 AFU_blow_up_their_railways_desc:0 "Not forget about railway junctions. Logistic of enemy must be destroyed. We must prepare our invasion to the smallest detail."
 
 AFU_invite_local_loyalists_to_azov:0 "Invite Local Loyalists to Azov"
 AFU_invite_local_loyalists_to_azov_desc:0 "Freikorps was created in July 2017 by Hryhoriy Tarasenko. They took place in Anti-Terrorist Operation in Donetsk region. But now ukrainian patriors are in the shadow of police state. We need to contact them. Friekorp can help us in the future liberation of Kharkiv."
 
 AFU_form_the_future_military_administration:0 "Form the Future Military Administration"
 AFU_form_the_future_military_administration_desc:0 "Kharkiv need a power that can deal with all hypocrites in oblast. Our old and reliable friends from Friekorp will help us to esrablish new order in region. "
 
 AFU_crushing_blow:0 "Crushing Blow"
 AFU_crushing_blow_desc:0 "We are ready for our first battle. And golden banner of Azov soon will be evolve in Kharkiv. Eastern Ukraine will be our bastion of new order, order, that will crush all our enemies in our country and whole world. Liberation of Ukraine awaits us!"
 
 AFU_the_cradle_of_nationalism_in_the_east:0 "The Cradle of Nationalism in the East"
 AFU_the_cradle_of_nationalism_in_the_east_desc:0 "Modern ukrainian nationalism has started from the Eastern Ukraine. Various nationalist organizations, such as Natskorpus and Azov, has roots from those lands. Our ideological brothers from Freikorps have gained power in Kharkiv, and that's the perfect time for us to unite for the common cause."
 
 AFU_negotiations_with_ideological_brothers:0 "Negotiations with Ideological Brothers"
 AFU_negotiations_with_ideological_brothers_desc:0 "Our regiment has always had good relations with other nationalists, and Freikorps aren't exception. We should negotiate on the matter to talk with them on our common matters, and for them to join us."
 
 AFU_successful_unification:0 "Successful Unification"
 AFU_successful_unification_desc:0 "Negotiations were successful, just as intented. South-Eastern Ukraine is united, and we are not stopping. It's time to set our rule in Kharkiv, second biggest city of Ukraine."
 
 AFU_rule_of_the_far_right:0 "Rule of the Far Right"
 AFU_rule_of_the_far_right_desc:0 "The so-called "democratic elections" have become a new breeding ground for the corruption and betrayal that we have been fighting against all these years, but as we can see, there are no signs of results. Candidates bought by local oligarchs would have destroyed everything that we, the Ukrainian army, had worked so hard to restore after the separatist rule in the region. That was the last straw. We are tired of watching a stupid vicious cycle in which faithful sons of Ukraine die for the future of their country and people, while politicians return the old order upon their bodies. It's time to do it ourselves!"
 
 AFU_uphold_the_victorious_spirit:0 "Uphold the Victorious Spirit"
 AFU_uphold_the_victorious_spirit_desc:0 "We won! We can't even believe we did it! Seeing the catastrophe that would have come if the "elections" had continued, we decided not to wait on the sidelines, watching what we fought so hard for come back and take the lives of the best of us, but to take things into our own hands. And it was the only right decision. Our victory here showed that we cannot be beaten. Any attempts by our enemies will be in vain because we have unquestionable faith in the success of our actions and ideas from now on and forever!"
 
 AFU_erase_the_soviet_heritage:0 "Erase the Soviet Heritage"
 AFU_erase_the_soviet_heritage_desc:0 "Post-Sovietness is the main basis on which hostile narratives about the "one people" and "Russian Donbass" have been and still are based. It is the ignoring of this factor that has led to all the disasters that our country has experienced since regaining its independence, and it is time to put an end to it. Too much Ukrainian blood has already been shed because of this nonsense, and we have no right to repeat the mistakes of our predecessors."
 
 AFU_reshaping_the_mentality:0 "Reshaping the Mentality"
 AFU_reshaping_the_mentality_desc:0 "The only way to fully complete decommunisation and desovietisation is to form a new Ukrainian generation. Having been under Russian and Soviet influence for almost a century, most locals have forgotten who they really are, becoming typical "homo sovieticus". By failing to replace the local curriculum with the Ukrainian one in all aspects, we will simultaneously launch a new wave of struggle against the totalitarian occupation past and bury it."
 
 AFU_secure_our_position:0 "Secure Our Position"
 AFU_secure_our_position_desc:0 "By establishing our own control over Donbas, we inadvertently triggered an administrative crisis. People who have neither faith nor loyalty to us are still sitting not only in city and village councils, but also in the highest government institutions, and we cannot leave this situation in this state. We need to strengthen our positions wherever we can to ensure the stability of the government, which will bring peace and glory to Ukraine."
 
 AFU_behead_the_hydra:0 "Behead the Hydra"
 AFU_behead_the_hydra_desc:0 "Although we are military men, not all of the army is on our side. The Armed Forces were recruited not on the basis of their views, but on their skills or perseverance, which also led to the entry of left-wing and liberal-minded individuals into the Ukrainian military. And it is these elements that are now becoming the fifth column in our rear. In their view, we are usurpers, radicals who want to rule with an iron fist and do not know mercy or liberty. They are now our main internal enemy, and we need to get rid of them, otherwise the Armed Forces will come to an end."
 
 AFU_free_donbas:0 "'Free Donbas'"
 AFU_free_donbas_desc:0 "Television is a powerful thing. With their television channels, oligarchs and Russian puppets have been feeding the population their ridiculous fairytales for years, but as it is said, "A lie repeated a thousand times becomes the truth." To inform citizens about the truth, and not about the lies that benefit local bandits, we need to create government television. This will guarantee to increase our support and reduce the influence of all sorts of paid shitheads."
 
 AFU_bolster_our_ranks:0 "Bolster Our Ranks"
 AFU_bolster_our_ranks_desc:0 "In our situation, we can only rely on ourselves. There is only one problem - there are not enough of us. "Azov" is undoubtedly a glorious and numerous regiment, but despite this, we are still not enough. To maintain order and stability, as well as to provide the state with more elite forces, we will launch a new recruitment campaign to enlist truly dedicated, strong in spirit and body conscripts who will help us reunite our people and country."
 
 AFU_call_to_the_most_reliable_ones:0 "Call to the Most Reliable Ones"
 AFU_call_to_the_most_reliable_ones_desc:0 "After coming to power, our government must secure the absolute support and dedication of all those who have defended Ukraine from the muscovite neo-bolshevik horde all these years. Veterans of Azov and other units, even those who have been discharged, must respond to our call and once again make every effort to lift our country from its knees, otherwise everything that has been done before will be in vain. For we have no one else to rely on in this cruel world."
 
 AFU_hold_the_banner_high:0 "Hold the Banner High"
 AFU_hold_the_banner_high_desc:0 "As leaders of right-wing nationalist ideas, we are de facto outcasts among all others, to whom our views are distant, outdated, or even hostile. But despite this, we have no right to give up and abandon the people who need us. Even if we were completely alone in our struggle, we would not dare to lower our banners, we would not dare to stop singing the marches of our glorious ancestors, but most importantly, we would not dare to lay down our arms in the face of the enemy!"
 
 
 AFU_the_new_order:0 "The New Order"
 AFU_the_new_order_desc:0 "The current system and lifestyle is rotten to the bone. For centuries, our society has been drugged with enemy propaganda, indoctrinated with their views and ideas, and everything has been done to reduce our nation to ashes, turning it into a copy of its disgusting assimilators. This order has come to an end, and we will bring change wherever it is needed!"
 
 AFU_question_of_religion:0 "Question of Religion"
 AFU_question_of_religion_desc:0 "Though the populace of our territories, obviously enough, is loyal to the Orthodox Christian faith, a lot among our ranks, for some reasons or another, have adopted pagan worldviews throughout their lives. We must address the question of which religion to officially adopt as soon as possible, if we ever wish to see our Nation triumph and reunite!"
 
 AFU_new_pagan_dawn:0 "New Pagan Dawn"
 AFU_new_pagan_dawn_desc:0 "The time has come, slavs! It's our historic moment, in which we can finally return our people back to their roots, back to their traditions! With the blessing of Perun, we will endure and prosper!"
 
 AFU_old_slavic_traditions:0 "Old Slavic Traditions"
 AFU_old_slavic_traditions_desc:0 "Though the true traditions of our proud ancestors have largely been forgotten or replaced with the Orthodox blasphemy, there is still hope. From now on, we will embark on a path of completely reviving the pagan traditions and rituals of our ancient land, no matter how long it may take us to actually make them stick with the populace."
 
 AFU_begin_paganization:0 "Begin Paganization"
 AFU_begin_paganization_desc:0 "Though it will not be an easy task to "reeducate" the entire nation according to our religious beliefs, a massive propaganda campaign would be a nice start to a long process of de-christianization and de-blasphemization of Ukraine. From TV campaigns to highway billboards - everything must showcase the power and truth of Perun and Svarog!"
 
 AFU_not_churches_but_temples:0 "Not Churches but Temples"
 AFU_not_churches_but_temples_desc:0 "Hunders of churches stand all over our land, and naturally enough, it is only up to us to finally make them abandoned and send the Judeo-Christians running in fear! Aside from that, since some free space shouldn't go to waste, we will dedicate a nice piece of our budget to constructing some new traditional Pagan temples in their place"
 
 AFU_faith_of_the_warriors:0 "The Faith of the Warriors"
 AFU_faith_of_the_warriors_desc:0 "Since the beginning of history, Pagan soldiers always turned out to be the most powerful and courageous. From the Vikings up North, to the Slavic fighters down here - war was always in Pagan blood, and was always a thing a man is the best at. Now, with the traditions and culture of our ancestors revived, it's time to adopt their unmatched fighting spirit and unstoppable thirst for war!"
 
 AFU_the_only_true_path:0 "The Only True Path"
 AFU_the_only_true_path_desc:0 "It would be one hell of a travesty  to reject not only the religion of almost everyone within our borders, but also the religion on which the Ukraine as a nation was built! Glory to Jesus Christ, may He guide us to victory!"
 
 AFU_destroy_the_satanic_muscovite_church:0 "Destroy the Satanic Muscovite Church"
 AFU_destroy_the_satanic_muscovite_church_desc:0 ""Moscow Patriarchat" Orthodox Church, which has infested our land and the hearts of our people, has long lost any actual connection to Jesus Christ and His teachings. Their priests are criminals and oligarchs, while their sermons are nothing more than Kremlin propaganda speeches. Only we can, once and for all, cast this satanic abomination into the lake of fire"
 
 AFU_union_of_state_and_religion:0 "Union of State and Religion"
 AFU_union_of_state_and_religion_desc:0 "If uncontrolled, the high influence of the Orthodox Church may be what would bring our rule down, which is exactly why we should limit their power and integrate them into the governmental apparatus directly, giving the mission of managing their funds, churches maintainance, and political presence to us."
 
 AFU_empower_the_church:0 "Empower the Church"
 AFU_empower_the_church_desc:0 "Though it certainly would hurt our positions politically to have the Church interfere in our internal affairs however they wish, it was agreed upon that doing so would greatly help secure our popularity within the religious population of our land, as well as appease the powerful clergy. "
 
 AFU_in_the_name_of_the_father_the_son_and_the_holy_spirit:0 "In the Name of the Father, the Son, and the Holy Spirit"
 AFU_in_the_name_of_the_father_the_son_and_the_holy_spirit_desc:0 "Like the Crusaders, who liberated the Holy Land, we will liberate the whole of Europe from Anti-Christ, his pawns-slaves and mutts, who dared to defame the Christian faith, tradition, and teaching of our Heavenly Father. This dragon will be cast down, once and forever.\nThis is only the beginning of Bellum sacrum!\n\n"And you will hear of wars and rumors of wars. See that you are not alarmed, for this must take place, but the end is not yet."\nMatt  24:6"
 
 AFU_fighting_in_the_name_of_god:0 "Fighting in the Name of God"
 AFU_fighting_in_the_name_of_god_desc:0 "Christianity is a religion of European warriors, don't look at the degeneracy, they won't destroy the main tradition of the White people. The church and our state are indivisible. In this darkest hour, we must unite. Anti-tradition in the face of atheism, satanism, and other anti-Christ movements must be destroyed."
 
 AFU_in_the_idea_lies_the_nations_strength:0 "In the Idea Lies the Nation’s Strength"
 AFU_in_the_idea_lies_the_nations_strength_desc:0 "The idea of modern Ukrainian nationalism is exactly what will help us save our nation from its eternal enemies. A radical transformation of social norms to those that have always been native to Ukrainians and a return to what the colonisers deprived us of is now the top priority for the Ukrainian nationalist movement!"
 
 AFU_no_place_for_liberals:0 "No Place for Liberals"
 AFU_no_place_for_liberals_desc:0 "All the past years of Ukraine's independence, as well as the recent political history of most European and other countries, have proved that liberalism is perhaps the greatest pest for any political entity. Their so-called "values" only threaten the centuries-old traditions and national consciousness of every family and nation on the planet, and we cannot allow such a pustule to grow on our land again."
 
 AFU_ban_lgbt:0 "Ban LGBT"
 AFU_ban_lgbt_desc:0 "Representatives of the so-called "LGBT community", or as we call them in the people - faggots, started appearing in Ukraine when our fatherland began to move closer to the "leading centres of Western civilisation", and soon they took over part of the media space, started creating their own organisations, and even demanded additional rights. Furthermore, they wanted to destroy us with the help of Russia. While we were shedding our blood against invaders, they were backstabbing us, denouncing our cause with the help of Russian-affiliated organizations and media. They are nothing, but a threat to Ukraine, and they have no place in our society."
 
 AFU_adopt_a_pro_life_stance:0 "Adopt a Pro-Life Stance"
 AFU_adopt_a_pro_life_stance_desc:0 "Abortion is a satanic and anti-national act. This, let's call it a "tradition", was brought to us from "extremely developed countries", where it is apparently moral to kill children because their mother either changed her mind about having a child or was too stupid to conceive one. Abortion represents a real crime against humanity, and only supporters of true evil and enemies of the nation are willing to commit it."
 
 AFU_preserve_the_family:0 "Preserve the Family as It Is"
 AFU_preserve_the_family_desc:0 "Long-lived family traditions shall live on, as it's the nature's will for men to be the leading ones, and for women to back them up. Preservation of traditional values is significant for saving the flow of our population."
 
 AFU_promote_the_legacy_of_joan_of_arc:0 "Promote the Legacy of Joan of Arc"
 AFU_promote_the_legacy_of_joan_of_arc_desc:0 "Women's role in conservative worldview is undermined. While history has perfect examples of a woman, who stoutly fights alongside men, like legendary Joan of Arc, who led French people to securing their independence, why should we not let women stand up with men for the sake of Ukraine?"
 
 AFU_stimulate_the_birthrate:0 "Stimulate the Birthrate"
 AFU_stimulate_the_birthrate_desc:0 "Since the occupation of Ukrainian land by Bolshevik invaders, the number of Ukrainians has been constantly regulated by various acts of genocide, and finally, after gaining independence, Ukraine remained with the same 40 million as almost more than 70 years ago. Immigration crises, the war with the separatists, and much more have further reduced Ukraine's population, and it is up to us to do everything we can to start restoring all that we have lost over the decades."
 
 AFU_europa_is_in_danger:0 "Europa is in Danger"
 AFU_europa_is_in_danger_desc:0 "When we see the breakdown of morals, the fall of the family, and the collapse of social order. When we see this degeneracy , which leads to the decay of society and similar events, like the fall of Rome, when we see what there is before us, what Europa has become with the coming decades...\nWell, we are choosing the right path to come. Path of warriors."
 
 AFU_levkos_lessons:0 "Levko’s Lessons"
 AFU_levkos_lessons_desc:0 "The greatest Ukrainian jurist, politician, martyr of soviet prisons, and writer, is Levko Lukianenko.\nBack in the past, he understood the threat to the future of Ukraine. From the beginning, he warned us not to take advantage of their racial scourge in our stupid desire to "integrate into Europe" - not to betray our blood, not to create new problems when they can and should be avoided. This was a man of his word, principle, and honor. He died, but not his ideas. "Ukraine will avoid the racial problem, if it doesn't let people of color into our home" - his words should ring across idea of Ukrainian nationalism."
 
 AFU_create_centuria:0 "Create 'Centuria'"
 AFU_create_centuria_desc:0 "Youth is our future, and to ensure that our future will be bright, we need to create an entity, which will teach and train the young reinforcement and our replacement in the future. Centuria will be our national youth organization, getting the new blood for the beating Ukrainian heart ready."
 
 AFU_establish_the_national_security_service:0 "Establish the National Security Service"
 AFU_establish_the_national_security_service_desc:0 "Before the civil war, SBU fought far-rights. They arrested and threatened us because of our nationalist position. We must ensure our nation is secure from foreign and inner threats so we will form independent from SBU, loyal to nation and the leader National Security Service"
 
 AFU_rely_on_old_wolves:0 "Rely on Old Wolves"
 AFU_rely_on_old_wolves_desc:0 "Although SBU and other structures like the National Police and GUR have many anti-national elements, we can recruit some nationalists or at least patriots from their ranks to ensure that our new structure will be successful not only ideologically. Of course, we will not let liberals or anti-fascists into our new structure, but we can't rely only on passionate nationalists."
 
 AFU_trust_the_new_blood:0 "Trust the New Blood"
 AFU_trust_the_new_blood_desc:0 "The new structure needs new blood. Old corrupted and anti-national elements are dangerous for the newly created NSS and we cannot trust cops in this matter. We can rely only on ourselves doing our best to form the loyal and effective structure. We will let in power only passionate and smart nationalists we fully trust."
 
 AFU_compile_a_blacklist:0 "Compile a Blacklist"
 AFU_compile_a_blacklist_desc:0 "On our territory, there are many representatives of ideas and views that not only harm the social restructuring of society but also threaten all-Ukrainian national values. All of them are potentially dangerous elements that can harm us and our people during the struggle for the reunification of Ukraine, and their interference in this process in any form must be excluded."
 
 AFU_tighten_control:0 "Tighten Control"
 AFU_tighten_control_desc:0 "Fifth column, collaborationists and foreign agents aren't imaginary threats. They can ruin the state from within in no time, and the most concerning part is that they can hide themselves as regular people, living ordinary lives. It is necessary to protect our state, setting up ICTV surveillance all over our territory, and to use our NSS agents to watch out for potential internal threats."
 
 AFU_learning_from_our_colleagues:0 "Learning from Our Colleagues"
 AFU_learning_from_our_colleagues_desc:0 "Our new structure needs good example from experienced security services both modern like the FBI or MI6 and old and perished like the German SD or Soviet KGB. We must learn how they work or worked, what they are famous for and what mistakes have they made during their history. A wise man learns from the mistakes of others and we, having on one hand an ocean of problems and the field of opportunities on the other must adjust our new structure to the challenges of the modern day."
 
 AFU_create_azovnet:0 "Create Azovnet"
 AFU_create_azovnet_desc:0 "Neglecting internet in it's age would be foolish. It provides many useful possibilities, but with that also comes the usage for our enemies. Tons of manipulative content and threatening thoughts can be produced through that. To prevent such mess, we shall form our secure network, the only one possible to use. NSS will have the ability to monitor it and keep an eye on any potential threat, while also keeping up with the modern times."
 
 AFU_freedom_tastes_better_under_supervision:0 "Freedom Tastes Better Under Supervision"
 AFU_freedom_tastes_better_under_supervision_desc:0 "One of the pillars, on which ukrainian nation stands, is freedom. Ukrainians always loved it, and fought with those, who wanted to take it away from them. Our thoughts on freedom differs from most ukrainians, and it won't be liked by them. We won't take so much loved freedom away from ukrainians, but they will have to accept our vision of it for their own sake."
 
 AFU_all_those_who_oppose_us_will_choke_on_blood:0 "All Those Who Oppose Us Will Choke on Blood"
 AFU_all_those_who_oppose_us_will_choke_on_blood_desc:0 "In the new society we are building, there is no room for opposition or anything else that could divide the nation and its government. All enemies of the people's regime must be destroyed, and the very idea of being opposed to the government must be eradicated. Azov is the only representative of the Ukrainian people, and no one has the right to claim otherwise."
 
 AFU_militarize_society:0 "Militarize Society"
 AFU_militarize_society_desc:0 "Since the old kozak times, ukrainians were known for keeping their own weaponry with them. Tradition wandered to Kholodny Yar republic in Cherkasy, where ukrainians in the times of ukrainian revolution of 20th century were keeping their rifles in their homes. We must renew this tradition, and to arm ukrainians with their own guns."
 
 AFU_every_man_a_gun:0 "Every Man a Gun"
 AFU_every_man_a_gun_desc:0 "Only a man with a gun would defend his entire home from the invaders. Weapon - shield of your life even in the peaceful time for the nation. Possession of weapons is not a privilege. It is a necessity."
 
 AFU_arms_only_for_the_worthy:0 "Arms Only for the Worthy"
 AFU_arms_only_for_the_worthy_desc:0 "We cannot let common people own guns. Why would those, who prefer life in peace, would also need the gun? The cult of military should prevail, and only the warriors, who fight with their lifes, should own the right to use the arms."
 
 AFU_every_effort_to_the_frontline:0 "Every Effort to the Frontline"
 AFU_every_effort_to_the_frontline_desc:0 "In today's realities, we strongly need any gun, that we can own. We shall gather guns from the civilians in order to supply our warriors with arms."
 
 
 AFU_we_were_born_in_a_great_hour:0 "We Were Born in a Great Hour"
 AFU_we_were_born_in_a_great_hour_desc:0 "It seems, our generals has played politics too much in our little country when we have so much work. Conditions on our land are critical as well. So we take the situation under our control. Our boys will not allow to turn the state into a field of political intrigues. We live and fight for the Ukrainian people, we fight for the existence of our nation."
 
 AFU_the_russian_question:0 "The Russian Question"
 AFU_the_russian_question_desc:0 "The Russian Federation began war in 2014 and occupied Crimea and Donbas. Before that, our nation's struggle with them have lasted for 300 years, starting from Hetmanate's times, when Moscovite tsars tried to rip the will and land of kozaks from them.\nToday Russia is a multicultural neo-soviet empire. Kremlin dreams of restoring order in post-soviet space and destroying us as a state and nation. But, some people from Russia can help us. Some far-rights from Russia fought for Ukraine. Kremlin empire is an ideological enemy of them. We should decide the Russian question right now."
 
 AFU_luhansk_conference:0 "Luhansk Conference"
 AFU_luhansk_conference_desc:0 "We both come from slavic descent, and we must help each other. We will help Russian right-wing organizations to liberate their homeland from the neo-soviet occupation, which lasts for decades. We will invite Russian far-rights to Luhansk to discuss future plans for cooperation in all spheres. They will get a home... Very soon."
 
 AFU_invite_russian_far_rights:0 "Invite Russian Far-Rights"
 AFU_invite_russian_far_rights_desc:0 "We invite our Russian brother in our country to fight against the enemies of Europa. They all will be trained by our best officers in camps. In the future, we need to form new regiments of Russians and Belarusians in our army."
 
 AFU_for_your_freedom_and_ours:0 "For Your Freedom and Ours"
 AFU_for_your_freedom_and_ours_desc:0 "When Ukraine will rise from the ashes, we and our friends from the Russian Volunteer Corps will plan something large-scale. A new, normal Russian state will appear on the world map. We are sure of it."
 
 AFU_we_have_no_business_with_mongoloids:0 "We Have No Business with Mongoloids"
 AFU_we_have_no_business_with_mongoloids_desc:0 "Russian scum will be our enemy forever. Our fight with horde will continue until full destruction of their "culture" and "people" in European continent. We will avenge om them for their humiliation of our nation.\nIt is our duty to drive them beyond the Ural mountain. And remember, good muscovite is only dead muscovite.\nEither we are theirs, or they are us."
 
 AFU_its_not_about_views:0 "It’s Not About Views"
 AFU_its_not_about_views_desc:0 "We don't care about their political views. They are useless in our situation and not worth our attention. \nThey are too naive and think like children, there is no longer any "Slav brotherhood" or "Brother nations". \nWe will achieve our goals on our own, Ukrainians don't need the help of mongoloids."
 
 AFU_remember_the_words_of_ideologues:0 "Remember the Words of Ideologues"
 AFU_remember_the_words_of_ideologues_desc:0 "We will follow the teachings of our heroes of the Ukrainian nation. \nThey were right, and we will continue to follow their ideas.\nA Russian or, more simply, moskal or Muscovite, no matter who he is ideologically cant live without a lie. The lie is a universal instrument of moskals to enslave other peoples in Europe.\nOnly Ukrainian nation can deal with this plague!"
 
 AFU_for_a_national_ukraine:0 "For a National Ukraine..."
 AFU_for_a_national_ukraine_desc:0 "Our great fight continues. Azov took power in the state, and now we need to outline our future struggles. Right, we must establish order in Motherland. The resurrection of Ukraine is our main goal. Dreams of Melnyk, Bandera, and Dontsov will come true. We will fight for our place under the sun until death."
 
 AFU_and_white_europa:0 "...and White Europa"
 AFU_and_white_europa_desc:0 "We can go towards greater goal. Among the rotten ideas, which captured Europe, and rotten european society, there are also people, that understand and follow our ideals. Our battle aganist the communist scum should spread to all the Europe. Degenerative era of pacifism is at it's end. White Europa from Lisbon to Urals is our best option."
 
 AFU_connections_with_ultras:0 "Connections with Ultras"
 AFU_connections_with_ultras_desc:0 "Football fans - so-called "ultras" - are very belligerent and dedicated people. They can fight for their country as devotedly as for their football clubs after another match. There are a lot of ultras, who harbor far-right views, and a lot of them stood up against Russia in 2014. We might get in contact and persuade them to join the ranks of Azov."
 
 AFU_far_right_european_fighters:0 "Far-Right European Fighters"
 AFU_far_right_european_fighters_desc:0 "We need help from all of Europe. From Polish "National Rebirth of Poland", German "Third Way", Italian "Casapound", Bulgarian National Union and other our European friends, who wills to fight with us for a brave new world. It's time to forget and forgive our resentments in the past, only in unity is our strength. The battle for Europa continues. We will win now, or never."
 
 AFU_brothers_from_the_new_world:0 "Brothers from the New World"
 AFU_brothers_from_the_new_world_desc:0 "Our comrades from the numerous organizations, destroyed by CIA, can find their home in the new Ukraine. They will fight for the future of our and their fatherland, with our shared ideals.\nThe battle of white people against Asian neo-bolsheviks in the East will continue until the full destruction of the Mongol horde. After it we will help them to set their in the American continent from solidarity with them.\nWe need just once and forever to learn one rule for ourselves - It's either us or them."
 
 AFU_the_white_revolution_starts_here:0 "The White Revolution Starts Here"
 AFU_the_white_revolution_starts_here_desc:0 "It will happen HERE.\nNo matter how cynical it may sound, the collapse of Ukraine helps us to achieve our plans right now. When all far-right organizations in Europe and America can't do anything with their neo-marxist bastards in Berlin, Paris, and London, we liberate our homeland with guns on our hands. All leftists will answer to European nations for their decomposition from within.\nOur sword of justice is now raised over Ukraine. And it will be raised over Europa. Very soon."
 
 AFU_light_the_smouldering_torch:0 "Light the Smouldering Torch"
 AFU_light_the_smouldering_torch_desc:0 "While the Ukrainian national revolution against anti-national fractions of our country is going, the European countries seem to be stable. But in fact, Donetsk is now safer than Paris. Why? We don't let migrants in the amount of hundreds of thousands into our country. But France, Britain, and other so-called "progressive" countries do. But there are a lot of people in these countries who don't like this. We must help them fight the governments that occupy their homelands and who let them be torn to pieces by savages. At first, we will finance and teach them how to fight the partisan war. Then, after the liberation of our fatherland, we may try to make something more for them. We will light the torch of the revolution in Europe. Europa erwache!"
 
 AFU_the_demand_of_the_nation_is_no_capitulation:0 "The Demand of the Nation is No Capitulation"
 AFU_the_demand_of_the_nation_is_no_capitulation_desc:0 "Our fight continues for ages, and why we are still here is because of we have not surrendered yet. Ukrainian nation is full of valor and honor, which leads it's people in fighting for our place under the sun. The demand of the nation - no to capitulation!" 
 
 AFU_propaganda_in_schools:0 "Propaganda in Schools"
 AFU_propaganda_in_schools_desc:0 "Our kids should be more interested in history, physical education and military affairs. Let's invite officers and our warriors from Azov to school. We hope, it will be interesting for kids to speak with soldiers and inspire them to follow the ideas of a new Ukrainian man, that defends his native land with a gun in his hands."
 
 AFU_special_summer_military_camps:0 "Special Summer Military Camps"
 AFU_special_summer_military_camps_desc:0 "Invite youth to special camps in the summer. It will be great, we promise it to them!\nAllocate resources to build some camps outdoors near forests. But kids must realize, that it is not a party or game. They spend one week or more in difficult situations, where they need to cooperate to survive.\nThis is the beginning of their new brutal life in a new country. Discipline and sport are the most important things in these camps."
 
 AFU_ramp_up_the_military_industrial_complex:0 "Ramp Up the Military Industrial complex"
 AFU_ramp_up_the_military_industrial_complex_desc:0 "Any workshop can become a small factory of military equipment. Any abandoned factory in Donbas can resume work very soon if we will put in a little effort. We need more guns for our army and convert civilian factions into military right now.\nWe should repeat the experience of the Japanese dispersal of industry in the Second World War."
 
 AFU_second_national_mobilization:0 "Second National Mobilization"
 AFU_second_national_mobilization_desc:0 "Our main goal remains unchanged - the restoration of the unity of the Ukrainian state. The Armed Forces of Ukraine are undoubtedly the strongest force in the region, but even the glorious Ukrainian army cannot move forward without reserves or reinforcements. By announcing the second wave of mobilisation measures, we will be able to provide the army with new soldiers, both regular and reserve, which will further strengthen our combat capability."
 
 AFU_the_willing_carry_the_future:0 "The Willing Carry the Future"
 AFU_the_willing_carry_the_future_desc:0 "Heavy times born strong men. In battle, people transform into a nation of steel.  And now we see, how many men of different ages want to defend their homes.\nWhoever wants to live must fight, and whoever in this world of eternal struggle does not want to participate in a fight does not deserve the right to life.\nFor crying hasn't given freedom to anyone yet, but whoever is a fighter, conquers the world."
 
 AFU_from_the_san_to_the_caucasus:0 "From the San to the Caucasus"
 AFU_from_the_san_to_the_caucasus_desc:0 "We prepared people for new difficult situations during this darkest hour for our nation. No matter who you are - a student, a shop assistant in the market, a worker in a factory, or a 60-year-old man.\nWe are all ready to die for Ukraine, and very soon our new generations of Ukrainians for 10-15 years will see, that our labor was not in vain...\nGlory to all heroes, who fighting now for the liberation of Ukraine, and eternal remembrance to all, who are dead for the Ukrainian state, We will avenge you, warriors!"
 
 
 AFU_under_the_glorious_banner_the_nation_unites:0 "Under the Glorious Banner, the Nation Unites"
 AFU_under_the_glorious_banner_the_nation_unites_desc:0 "Ukrainian people once again have been reunified. Through blood and harshness, through difficulties and inner schism, Ukrainian nation is reborn like a phoenix. Our missions, passed through generations, is yet to be fulfilled, but now we have the key for it - united and strong Ukrainian nation."
 
 AFU_arrest_the_opposition:0 "Arrest the Opposition"
 AFU_arrest_the_opposition_desc:0 "After our unificational campaign, many people, who oppose us, are still living on Ukrainian land. This might be a huge problem for us in future, so we shall act. Firstly, we will target leaders of movements, who dare to oppose our control."
 
 AFU_forgive_but_not_forget:0 "Forgive but Not Forget"
 AFU_forgive_but_not_forget_desc:0 "Our country and nation has already shed too much blood for us to pump it even more. Those partisans, who want to live, may be granted an amnesty, if they stop fighting and give up their weapons for us. They may surrender, but that doesn't mean that they wouldn't try to do the same in the future, so they should be observed by our security service as 'potentially rebelous' persons."
 
 AFU_eliminate_remaining_partisans:0 "Eliminate Remaining Partisans"
 AFU_eliminate_remaining_partisans_desc:0 "We do not have much time for playing the saints with people, who oppose us with weapons. If they took their arms up, they should be prepared for the consequences, there won't be second chance for them."
 
 AFU_draft_a_nationalist_constitution:0 "Draft a Nationalist Constitution"
 AFU_draft_a_nationalist_constitution_desc:0 "Renewed Ukrainian state should revise it's principles and people's rights in it. New, nationalist constitution should consist of rules, that will declare the course of our next generations to complete, for them to build a strong Ukraine, based on Ukrainian nation and will."
 
 AFU_one_party_one_vision_z:0 "One Party, One Vision"
 AFU_one_party_one_vision_z_desc:0 "Azov movement has united Ukraine. Azov movement has laid the base for Great Ukraine. It is logical for us to be the prominent power in the Ukrainian state, and other right-wing movements should understand it. They will accept the reality, whether they want it or not."
 
 AFU_one_party_one_vision_b:0 "One Party, One Vision"
 AFU_one_party_one_vision_b_desc:0 "Azov movement has united Ukraine. Azov movement has laid the base for Great Ukraine. It is logical for us to be the prominent power in the Ukrainian state, and other right-wing movements should understand it. They will accept the reality, whether they want it or not."
 
 AFU_unite_the_right:0 "Unite the Right"
 AFU_unite_the_right_desc:0 "Ukrainian right-wing movements always has been united in one goal - to make Ukraine great. Various right wing groups have taken act in the events of Revolution of Dignity, and they have taken part in fighting Russians from the moment of their invasion in Ukraine. Ukrainian right movement should be united together, and we will welcome them as brothers."
 
 AFU_prepare_for_the_final_fight:0 "Prepare for the Final Fight"
 AFU_prepare_for_the_final_fight_desc:0 "The time has come for us to fight our biggest fight in history. Russian scum has done a lot against Ukrainian state and it's people, and we should finally revenge for everything Russia has done to us. Time to prepare for the end of our national struggle!"
 
 AFU_form_the_belarusian_volunteer_corps:0 "Form the Belarusian Volunteer Corps"
 AFU_form_the_belarusian_volunteer_corps_desc:0 "Besides us, we have another neighbor, who is pinned under Russian thumb. That's Belarus, with which we somehow share history by being together in the Rus', Great Lithuanian Duchy, Polish-Lithuanian Commonwealth and Russia. While Belarusian nationalists are a marginal group of populace in their own country, we will use them to fight against Russia, and in exchange they will get the chance to establish their rule over their homeland."
 
 AFU_coordination_with_rvc:0 "Coordination with RVC"
 AFU_coordination_with_rvc_desc:0 "Russian Volunteer Corpus knows Russia from the inside, and what's important - they are working under our rule. It would be wise to find a usage for them in our upcoming war by coordinating our movements and plans for effective strike against our common enemy - Kremlin government, which we both hate with all our souls."
 
 AFU_by_us_alone:0 "By Us Alone"
 AFU_by_us_alone_desc:0 "Russians are our enemies — every single one of them. We don't need "good Russians" to help us win this war. We don't need another Russian government after this war to rule occupied Russia. We will establish our own occupational government and we don't need any Russian for this. We will act on our own and bring our Ukrainian order."
 
 AFU_light_the_fire_of_revolution_in_the_caucasus:0 "Light the Fire of Revolution in the Caucasus"
 AFU_light_the_fire_of_revolution_in_the_caucasus_desc:0 "Caucasus always has been a region of instabilities, thanks to nations it inhabits. For some period of time, Russia managed to somehow tame the will of Caucasians to fight for their motherlands with military and concessions to their local pawns. Since the loss of Russian forces in Donbas Russia lost some stability, we can use that window of opportunities to ignite new fire in the Caucasus to loosen up Russia and get us some allies."
 
 AFU_ultimate_mobilization_of_the_entire_nation:0 "Ultimate Mobilization of the Entire Nation"
 AFU_ultimate_mobilization_of_the_entire_nation_desc:0 "Taking on such enemy, as Russia, is a tough quest with limited amount of people. However, Ukraine is a big country with tens of millions living here. Ukrainians will fulfill their national duty, either they will be marching on the enemy, or cover those, who march forward. Final nationwide mobilization begins!"
 
 AFU_special_decommunization_and_demilitarization_operation:0 "Special Military Operation for Decommunization and Demilitarization of Russia"
 AFU_special_decommunization_and_demilitarization_operation_desc:0 "Russian Federation has invaded Ukraine in 2014, and tried to occupy it further by using hybrid warfare in Donbas. We declare a Special Decommunization and Demilitarization Operation, in order to protect Ukraine and to end the rule of Kremlin gang, which poses a threat to the whole world by their plans and deeds, and to our existence as a nation."
 
 AFU_operation_fallen_pawn:0 "Operation 'Fallen Pawn'"
 AFU_operation_fallen_pawn_desc:0 "Lukashenko is an old-time pawn of Kremlin, sitting under their watchful eye and restructuring Belarusian nation into formless substance, which doesn't know their culture nor their history, being slightly different from a mass, called Russians. The time of Belarusian nation oppression comes to an end, as we will walk through Belarusian land, establishing truly national government under those, who really cares about Belarus, and stretching our frontline for raising the chances against Russia.\n\n§WZhyve §!§RBelarus, zhyve§!§W vol'na§!!"
 
 AFU_enemy_of_my_enemy:0 "Enemy of My Enemy..."
 AFU_enemy_of_my_enemy_desc:0 "Russia is fighting not only on Ukrainian front, but also in the other part of the world. A saying goes 'Enemy of my enemy is my friend', so we should lend more help for those, who Russia fights against."
 
 AFU_every_man_is_a_fighter:0 "Every Man is a Fighter"
 AFU_every_man_is_a_fighter_desc:0 "Ukraine is the land, worth to show the bravery for. Our enemy is vast, so it won't be easy to achieve victory without investing manpower into it. We proved to be the great military power, and for the sake of our spirit and Ukraine prosperity, people will fight for that, no matter if they want it or not."
 
 AFU_steadfast_home_front:0 "Steadfast Home Front"
 AFU_steadfast_home_front_desc:0 "Death is what the most of us, if not everyone, is afraid of. We understand, that big amount of Ukrainians are scared to die, so if they're not willing to put their life at risk, they can do something useful while sitting behind frontlines. Arms factories, hospitals, vehicles maintenance... Ukrainians will help our warriors in any way possible!"
 
 AFU_apply_the_fire_of_poltava_experience:0 "Apply the 'Fire of Poltava' Experience"
 AFU_apply_the_fire_of_poltava_experience_desc:0 "That period, that lasted almost for a decade, called Fire of Poltava, became not only a national tragedy, but a moment of reimagining the warfare. Many new things came out of that experience, and for us it will be necessary to utilise them in our final fight."
 
 AFU_crush_the_partisans:0 "Crush the Partisans"
 AFU_crush_the_partisans_desc:0 "Not a secret, that most Russians are against us, and that won't be a surprise, when some Russians will resist our forces, while being behing their backs. "
 
 AFU_fight_to_the_death:0 "Fight to the Death"
 AFU_fight_to_the_death_desc:0 "Our last fight has started. There's no turning back. Our history and fate of our nation under sun decides right in that moment, so we must fight till the last drop of blood, for Ukraine to strive for ages, and for Russia to finally meet it's dawn."
 
 AFU_the_ukrainian_national_triumph:0 "The Ukrainian National Triumph"
 AFU_the_ukrainian_national_triumph_desc:0 "The greatest moment of our history has come to life. We have defeated Russia, and we secured our place in this world. Nobody shall threaten our independence and nation once again, as we will get anyone, who wants to set it's borders on our soil and to shake our nation's will. \n§2Ukraine has risen!§! \n§YSLAVA UKRAINI!§!"
 
 
 AFU_lessons_of_natiocracy:0 "Lessons of Natiocracy"
 AFU_lessons_of_natiocracy_desc:0 "The ideology of natiocracy is based on the works of Mykola Orestovych Sciborsky. He, as an ideologist and an important person, developed this concept in the twentieth century. And now we will build the state on his works."
 
 AFU_opportunity_for_the_best:0 "Opportunity for the Best"
 AFU_opportunity_for_the_best_desc:0 "Meritocracy is an idea that offers power and opportunity to the best in every sphere. Whether you're a good farmer, metallurgist, or miner, you will have an impact on the state, and you will run it together with others, for the benefit of its people. And that concept will be used in our state"
 
 AFU_formation_of_syndicates:0 "Formation of Syndicates"
 AFU_formation_of_syndicates_desc:0 "We will form syndicates, associations of entrepreneurs and workers in various industries. This form of organization will allow us to hear criticism and the impact of our actions on various sectors of life, which will allow us to improve the country!"
 
 AFU_first_national_syndicalist_congress:0 "First National-Syndicalist Congress"
 AFU_first_national_syndicalist_congress_desc:0 "Now, after the formation of the syndicates and some of our reforms, we can finally hold the first national-syndicalist congress! It will address important issues of our homeland, which may decide its fate in the future."
 
 AFU_give_oligarchs_a_fight:0 "Give Oligarchs a Fight"
 AFU_give_oligarchs_a_fight_desc:0 "Worse than Muscovite lice, only Ukrainian nits can be, as the fighter for Ukraine Simon Petliura once said. And these words are as relevant to us as ever. Now, when Ukraine is going through the times of the second ruin, the oligarchs continue to profit from the war and drink the blood of our long-suffering people. It is time to put an end to this."
 
 AFU_nationalize_critical_infrastructure:0 "Nationalize Critical Infrastructure"
 AFU_nationalize_critical_infrastructure_desc:0 "The oligarchs control most of the energy facilities, which is of particular importance to the residents of the region. During the war in Donbas, it has happened many times that companies have unjustifiably cut off electricity or water supplies to our towns, leaving people without basic necessities. Nationalization of these enterprises will help to avoid this in the future."
 
 AFU_nationalize_azovstal:0 "Nationalize Azovstal"
 AFU_nationalize_azovstal_desc:0 "Azovstal Iron and Steel Works is a metallurgical plant in Mariupol. A Ukrainian monopolist in the production of certain types of rolled metal products, a full-cycle enterprise. In terms of gross revenue, it ranked third among Ukrainian metallurgical enterprises. The company annually produced 6 million tonnes of iron, 7 million tonnes of steel, 4.5 million tonnes of rolled products and 1.5 million tonnes of sinter. All this good should belong to the state and the people, not to some oligarchs with a long nose."
 
 AFU_donetsk_trial:0 "Donetsk Trial"
 AFU_donetsk_trial_desc:0 "A trial of oligarchs will be held in the city of Donetsk. The purpose of the trial is to legally establish that all their property was acquired illegally, so it should rightfully go to the true owner of all the wealth of Donbas - its inhabitants."
 
 AFU_improve_working_conditions:0 "Improve Working Conditions"
 AFU_improve_working_conditions_desc:0 "Our people suffer greatly from fatigue and overwork. We will try to improve working conditions a little, give certain benefits, introduce new holidays and days off. People should work hard, but the main thing is not to pull their backs."
 
 AFU_support_small_businesses:0 "Support Small Businesses"
 AFU_support_small_businesses_desc:0 "Small business will be the backbone of the new Ukrainian economy. And no, not because we have practically paralysed and squeezed out large and medium-sized ones, but because small companies are often more flexible and can quickly adapt to changes in the market and they are an important source of jobs and economic growth in many countries."
 
 AFU_fields_belong_to_the_workers:0 "Fields Belong to the Workers"
 AFU_fields_belong_to_the_workers_desc:0 "The fields of Ukraine are its main treasure, for which not a few heads of its best sons have laid down, and the enemies will not rest until they seize this tasty piece of black soil. The second ruin made us realize that in the new reality farms play a big role in the politics of the pretenders to the right to rule in Ukraine. But we will not let some hollow men take and control our sacred land - our daily bread will be produced by the hands of our workers and only they have the right to control the means of production."
 
 AFU_cooperation_with_agrarian_elites:0 "Cooperation with Agrarian Elites"
 AFU_cooperation_with_agrarian_elites_desc:0 "Agrarians have always been the backbone of Ukraine's economy and the lives of its citizens. Huge fields with excellent black soil were not infrequently targeted by invaders. Now agrarians are, so to speak, those who hold the lives of many citizens on their shoulders. Running their business, unlike oligarchs, they do not harm the people, but only help them. We must establish relations with this "class" so that we can continue to feed our people and the army."
 
 AFU_expulsion_of_foreign_monopolists:0 "Expulsion of Foreign Monopolists"
 AFU_expulsion_of_foreign_monopolists_desc:0 "Monopolies, especially those controlled by foreign companies, are a threat to our economy. They have stifled domestic competition many times before - history is full of examples. Kicking these bastards out of our country will create space for our domestic enterprises to flourish, promoting our domestic competition, innovation and efficiency. Only our proper competition can lead to higher quality products, lower prices for consumers and overall economic growth!"
 
 AFU_collectivist_mind:0 "Collectivist Mind"
 AFU_collectivist_mind_desc:0 "The moment has come when our people united in a common impulse for the well-being and salvation of the Holy Motherland. In the united beating of hearts, when we are not threatened from within by a greedy insidious enemy, we will prepare our best products to feed them to the destitute citizens of Ukraine who are deprived by the bloody fratricidal war. All together. As one. Bound by one chain - bound by one goal!"
 
 AFU_smart_nation_is_a_strong_nation:0 "Smart Nation is a Strong Nation"
 AFU_smart_nation_is_a_strong_nation_desc:0 "Taking the example of our degenerate neighbour, the Russian Federation, we can see how terrible education and replacement by stupid migrants who do not know the language lead to the deterioration of everything in the country. We, on the other hand, are determined to bring our people to the pinnacle of education and science, where they belong. In addition to history and ideological indoctrination in education, we will prepare a powerful technical academic base and sponsor young minds so that they can make scientific achievements for the benefit of our nation."
 
 AFU_gradual_militarization:0 "Gradual Militarization"
 AFU_gradual_militarization_desc:0 "We cannot risk undermining our economy by putting everything on a military footing. That is why we have prepared a plan for a smooth militarization that will allow us to minimize damage to the civilian sector."
 
 AFU_encourage_hard_work:0 "Encourage Hard Work"
 AFU_encourage_hard_work_desc:0 "To develop our economy, we will start cultural and social propaganda of Diligence. In addition, we will introduce a system of rewarding employees for their efforts, which in theory should lead to increased efficiency at enterprises."
 
 AFU_total_war_economy:0 "Total War Economy"
 AFU_total_war_economy_desc:0 "The time of half measures is over. We are on the verge of a new war, and we do not know what will happen after it. That's why we will start putting the economy in the mode of total war. Ukraine will be united, and it will be united with blood and steel!"
 
 AFU_forced_labour_for_the_nation:0 "Forced Labour for the Nation"
 AFU_forced_labour_for_the_nation_desc:0 "We are on the verge of a crisis. And the name of this crisis is Ruin. Ukraine fell apart because of Poroshenko's fault, but that is in the past. Now, we must prepare to unite Ukraine. That is why we will introduce a system of forced labor for criminals and other social elements in the military and not only in enterprises."
 
 AFU_renew_the_donbas_mines:0 "Renew the Donbas Mines"
 AFU_renew_the_donbas_mines_desc:0 "Donbas used to be the mining center of Ukraine for anything that could be mined, from metal to coal. After the creation of the LDPR puppet governments, unfortunately, most of the mines were stolen within 6 years. But this is in the past. After the victory of the Armed Forces of Ukraine and our coming to power, we will start a program to restore Donbas mines."
 
 AFU_shut_down_unprofitable_enterprises:0 "Shut Down Unprofitable Enterprises"
 AFU_shut_down_unprofitable_enterprises_desc:0 "Currently, there are a large number of non-profit enterprises in our country. There are various reasons for this - from bankruptcy to the flight of most employees due to the war and the collapse of Ukraine. But what is sadder is that they are maintained at public expense. We will reconcile this by closing them."
 
 AFU_stop_the_destruction_of_ukraine_by_waste:0 "Stop the Destruction of Ukraine By Waste"
 AFU_stop_the_destruction_of_ukraine_by_waste_desc:0 "We believe that even if industry and efficiency are important, we should not destroy our homeland by poisoning its fields with landfills, rivers with waste, and air with gases. We will introduce regulations for enterprises. A healthy Ukraine is a healthy nation!"
 
 AFU_revive_donbas_factories:0 "Revive Donbas Factories"
 AFU_revive_donbas_factories_desc:0 "During the time Donbas was occupied by Russian proxies, Ukraine's most productive industrial region turned into a swamp. Factories were sawn up and sold to Russia instead of being used in any way. We will fix this by restoring the Donbas plants for the sake of Ukraine's prosperity!"
 
 AFU_everything_for_the_sake_of_efficiency:0 "Everything for the Sake of Efficiency"
 AFU_everything_for_the_sake_of_efficiency_desc:0 "We cannot stop progress. We cannot deny the simple fact that we are in a situation where we will get either everything or nothing. We will either unite Ukraine or someone else will do it for us. We cannot allow this to happen. Natiocracy will prevail, and if this means sacrificing some aspects of the external environment, then so be it!"
 
 AFU_development_of_national_products:0 "Development of National Products"
 AFU_development_of_national_products_desc:0 "Today's globalized world depends on partnerships between countries. It depends on simple trust, and this is wrong, because geopolitics is a game where everyone wants to deceive the other. We will start developing our own products, because this is the only way to ensure that no one can use us for their own purposes, threatening us with economic problems if we do not obey."
 
 
 ## NatSpirits
 AFU_azov_kharkiv_raids:0 "Raids from Azov"
 AFU_azov_kharkiv_raids_desc:0 "It's obvious that a new far-right power that was created after destroying moderate military government near our borders will prepare diversions and provocations into our state. Now War is inevitable. For now, the question will be solved only by force, Let's see who will take it."
 
 AFU_azov_kharkiv_administration:0 "Kharkiv Military Administration"
 AFU_azov_kharkiv_administration_desc:0 "In order to successfully integrate Kharkiv, the military administration will grant us better possibilities at clamping down possible resistance from locals."
 
 AFU_azov_huge_resistance_1:0 "Huge Resistance"
 AFU_azov_huge_resistance_1_desc:0 "After the ultra-right came to power, many residents of Donbas did not recognise the new authorities. Their protest was expressed in a variety of ways, from fleeing to Russia to sabbotaging the little surviving infrastructure and industry. The Azov government will have to do its best to harness the people."
 AFU_azov_huge_resistance_2:0 "Huge Resistance"
 AFU_azov_huge_resistance_2_desc:0 "After the ultra-right came to power, many residents of Donbas did not recognise the new authorities. Their protest was expressed in a variety of ways, from fleeing to Russia to sabbotaging the little surviving infrastructure and industry. The Azov government will have to do its best to harness the people."
 AFU_azov_huge_resistance_3:0 "Huge Resistance"
 AFU_azov_huge_resistance_3_desc:0 "After the ultra-right came to power, many residents of Donbas did not recognise the new authorities. Their protest was expressed in a variety of ways, from fleeing to Russia to sabbotaging the little surviving infrastructure and industry. The Azov government will have to do its best to harness the people."
 
 AFU_azov_keeping_up_morale:0 "Keeping Up Morale"
 AFU_azov_keeping_up_morale_desc:0 "In times of trial and adversity, maintaining high morale is essential for individuals and communities to live successfully and overcome obstacles. Morale is a mental and emotional state of well-being and enthusiasm that affects a person's attitude, determination and resilience. The Ukrainian people have endured much grief and suffering. Many empires wiped their boots on Ukrainians, took away Ukrainian bread, killed intellectuals and bright personalities. But this is all in the past... Ukrainians will no longer tolerate the yoke on their neck. The Azov Army is preparing for its decisive rush to finally free Ukraine from enemies, oligarchs, liberals and other rubbish. "
 
 AFU_azov_army_purges:0 "Ideological Purges in the Army"
 AFU_azov_army_purges_desc:0 "Ukrainian armed forces contains many people in it, and, of course, their beliefs and ideas aren't similar to each other. Soldiers, who have leftist or liberal worldview, can hurt our cause, so we will review our army personnel to exclude possible future fifth column from it."
 
 AFU_azov_free_donbas:0 "Radio 'Free Donbas'"
 AFU_azov_free_donbas_desc:0 "In order to protect its positions, the Azov government organised the radio and TV channel 'Free Donbas' for the purpose of ideological processing and brainwashing of the population."
 
 AFU_azov_banner_of_the_victory_1:0 "Banner of the Victory"
 AFU_azov_banner_of_the_victory_1_desc:0 "Our banner holds a very special spirit behind it. Spirit, which will lead us to the future victory of Ukraine. It should rise high above our heads, and lead us to the fight of honour and glory!"
 AFU_azov_banner_of_the_victory_2:0 "Banner of the Victory"
 AFU_azov_banner_of_the_victory_desc:0 "Our banner holds a very special spirit behind it. Spirit, which will lead us to the future victory of Ukraine. It should rise high above our heads, and lead us to the fight of honour and glory!"
 AFU_azov_banner_of_the_victory_3:0 "Banner of the Victory"
 
 AFU_azov_banner_of_the_victory_desc:0 "Our banner holds a very special spirit behind it. Spirit, which will lead us to the future victory of Ukraine. It should rise high above our heads, and lead us to the fight of honour and glory!"
 AFU_azov_paganization_1:0 "Paganization of Society"
 AFU_azov_paganization_1_desc:0 "Paganism is not the unstable concept of philosophical positions and beliefs of different people. It is a religion. The true religion of warriors. For centuries we were forced to believe in "god" and "Jesus" who was a Jewish liar. Their "religion"  has been rotten. They invite globalist scum to their "churches" and say that deviations and other multiculturalist madness are normal in our life. They want to destroy the white man. "Christianity" - only a tool of a multiculturalist international Jewry.\n\nOnly with the spirit of our greatest patron, the God of sky, thunder and storm Perun, and other real Slavic Gods, our patrons, we will win this fight against anti-tradition and degradation."
 AFU_azov_paganization_2:0 "Paganization of Society"
 AFU_azov_paganization_2_desc:0 "Paganism is not the unstable concept of philosophical positions and beliefs of different people. It is a religion. The true religion of warriors. For centuries we were forced to believe in "god" and "Jesus" who was a Jewish liar. Their "religion"  has been rotten. They invite globalist scum to their "churches" and say that deviations and other multiculturalist madness are normal in our life. They want to destroy the white man. "Christianity" - only a tool of a multiculturalist international Jewry.\n\nOnly with the spirit of our greatest patron, the God of sky, thunder and storm Perun, and other real Slavic Gods, our patrons, we will win this fight against anti-tradition and degradation."
