 azov.54.t:0 "Darkest Hour"
 azov.54.d:0 ""The plan for the creation of the European Union is being implemented rapidly. The air and TV channels are filled with cheap TV series, Americanized pop, and frantic rhythms that can cause mass psychosis. All this primitivizes young people, turns them away from national culture and traditions, and makes the cultural heritage of previous generations unnecessary, even though they are sublime.\n\nWho needs the destruction of the national cultures of European nations? Who needs to tear people away from their national roots? Who wants to make the European continent average, non-national, where only material and physical needs reign? Who is interested in a frank demonstration of sexual perversions, that kill a person's spiritual nature?\n\nThe process of civilization has led people away from the animal and given them a sense of shame. Now this achievement of civilization is being destroyed and returned to the animal-natural state. What, this in itself happens for the simple commercial gain of making money by selling degeneracy?\n\nThis could be believed if this were the only way to destroy the thousand-year-old achievement of European civilization, and when we see a complex of different methods aimed at the same thing, the spontaneous commercial explanation is clearly not satisfactory. Some forces do this consciously and in a planned way. They largely fill the natural process of globalization with their anti-human content and use it to subjugate the European civilization to their global mafia."\n\n-From the work of Levko Lukianenko, "Civilizational Choice""
 azov.54.a:0 "God, save us all from this madness."

 azov.55.t:0 "United in blood"
 azov.55.d:0 "In the fire, iron is melted into steel, in the struggle the people are transformed into a nation.\n\nAnd our nation is on the path to win the battle for existence and extinction, which should should end with our final and total victory. The power of resistance of our nation has grown so tremendously since the times of reunification of Ukraine, that it can no longer be compared with the earlier epoch of weakness.\n\nWe lost our best sons and daughters not only in the bloody battlefields but also in the cold prisons of Russian scum, that occupied Ukraine for a couple of centuries, be it tsarists or bolsheviks. But our people's will to live independently will not be destroyed either by any enemy prisons or exiles, because Ukraine is an unconquered bastion of heroes and fighters. We've proven this to the World, they are scared of our revenge.\n\nOur enemies have thought, that they could destroy alternative views, if they threw its carriers on minefields, under shells, and enemy bullets, if they threw them to rot in prisons, cripple them physically and morally.\n\nThey didn't understand one thing - our ideas are §Rimmortal§!. \n\nThe death of the best of us will not stop our victory. And these thousands, who gave their lives in battle not even for Ukraine, but for our common dreams and personal convictions - they are close to us, just we don't see them.\n\nThe death of the best didn't stop our victory. It will only make our revenge more brutal.\n\nWarriors can't be enslaved.\n\nAnd our people, who deserved their place in the sun from the San to the Caucasus will move towards the future in which there will be no place either for the exploitation of man by man, or for national oppression, or for the suppression of free thought, in which Ukrainian people will be a free master on their land and according to their own will. \n\n§RAs long the great battle for Europa continues, in the great world drama of our day, we have a choice: either to be the creators or the victims of history.§!"
 azov.55.a:0 "Immortal Will."

 azov.56.t:0 "Reconquista"
 azov.56.d:0 "Europe is dying.\nSlowly, but steadily. European civilization can't endure the crazy flood of migrants, she can't endure antinational governments and total populism. The cradle of civilizations is crumbling under the pressure of liberal dictate.\nWe have risen on the margin of two worlds to create new life. Helping conscious Europeans to protect their own homes is our duty.\n\nIn 2016 Azov movement was replenished by yet another member of its own family - a network of civil and international projects, called 'Reconquista'. The movement put itself a goal to revive the Europe of free nations and traditional values, and after three years of existence gained some results. The project was stopped in 2019 when Providnyk shook the country.\n\nObserving the situation in the world, looking into the future, and learning from the past - we have to revive the Movement. Only by joint efforts we can achieve victory over the Eurasian horde at the east of the civilized world.\nIn fire of national renaissance, the cradle of civilization will be reborn and will reclaim its own greatness.\n\nLight of the European revolution has ignited in Ukraine, and Ukraine will ignite it in the whole Europe."
 azov.56.a:0 "Last hope of Europe!"

 azov.57.t:0 "Victory"
 azov.57.d:0 ""Ukrainian victory". \n\n"We have won this battle." \n\n"We managed to acomplish, what our ancestors couldn't do several times". \n\n"We finally defeated Russia". \n\n"We are finally at peace." \n\nThat's one of many phrases, which could be heard across Ukraine and Ukrainian soldiers, who still are positioned in Russia. Celebrations started across the country, and all the happiness couldn't be contained so easily. \n\nTwo soldiers, who were stationed in Belgorod region, had a small talk. \n\n"Nazar, - one said, - we won." \n\n"So long...", - another replied. \n\n"We won't be threatened once again, can you imagine?", first continued. \n\n"How so? We still have the West and the Global South surrounding us."\n\n"We are near nuclear warhead storage. You understand?"\n\n"Oh... You are God damn right!""
 azov.57.a:0 "§BThrice - §!§YSlava! Slava! Slava!§!"

 azov.58.t:0 "Russia breaks down"
 azov.58.d:0 "We get multiple reports from our intelligence, that the communication of Russian military command has strangely gone silent, and Russian forces on the frontline just don't get any orders, nor they can ask for new ones. Since we took Moscow, there's practically no information on Russian leadership. Which can mean only one thing..."
 azov.58.a:0 "We won!"

 azov.59.t:0 "A common way"
 azov.59.d:0 "The area around Zaporizhzhya city hall was closed to common citizens, meaning that something important was happening there. By the closed doors of the conference hall, the Azov contact group was talking with representatives from Chechnia and Dagestan. Not with Russian lapdogs, but with real patriots of their lands. Those were the leaders of the Chechen Republic Ichkeria government in exile and the All-Ukrainian Congress of Dagestani Peoples.\n\nAt first, it may seem, that the newly founded Ukrainian National State would send all the foreigners away from its borders, but the Ukrainian government had other plans. In fact, they don't have many allies against the Kremlin, and some help wouldn't be so bad after all. That's where the oppressed nations, who live under Russian rule, might be useful, and in the same way, they can get help in tearing Russian chains from people, who share that idea. Islamic states, who may later become a stronghold for muslim jihads, targeting us and being so close to our borders, is a problem, but we need them in our war, whether our people support it or not.\n\nThe conference would go on for about an hour, and after all points were talked through, representatives from both sides shook hands with each other, and thus their cooperation was a successful idea."
 azov.59.a:0 "'Ukraine, thank you...'"

 azov.60.t:0 "Message past the Caucasus"
 azov.60.d:0 "A couple of weeks after the conferention with the Chechens and Dagestani people, the Ukrainian government got a message from another nation, living by the Caucasus mountains - Georgians.\n\nIt was from the National Unity of Georgia - a far-right Georgian organization, which has ideas, similar to ours. They have declared their will to join the fight against Russia but on their soil. Georgia is now ruled by politics, who try to maintain close relations with Russia, while also looking to join the European Union.\n\nNationalists claim that they want to overthrow their government and establish their own rule, and they need a good amount of equipment for that. In case of their success, they are willing to help us, first by taking on Russian puppets, occupying their territory, and then by stretching Russian forces to the whole Caucasus.\n\nShould we accept their demands?"
 azov.60.a:0 "Accept their offer, and provide them our equipment."
 azov.60.b:0 "We cannot send anything right now, but would seek further cooperation."

 azov.61.t:0 "Successfull coup in Georgia"
 azov.61.d:0 "Georgian nationalists from National Unity of Georgia, for whom we provided support, has couped the Georgian government today. While they are establishing their own rule, we already got the message about their gratefulness and readiness to join our upcoming war."
 azov.61.a:0 "Power is in unifying!"

 azov.62.t:0 "Failed coup in Georgia"
 azov.62.d:0 "Georgian nationalists from National Unity of Georgia, who wished to get our support, has failed to overthrow Georgian government, and now they're facing a terrible fate. Georgia might be involved in our war, but on the other side... If they have the guts, of course."
 azov.62.a:0 "Bad news..."

 azov.63.t:0 "Operation Tsiy Bekham"
 azov.63.d:0 "07:12 AM\n\nAdam Kadyrov square, Grozny, Chechen Republic, Russian Federation\n\nRamzan Kadyrov, with a couple of his guards watching from afar, was jogging early in the morning. His health has worsened due to uneasy recent messages about plans of murdering him, and doing any physical activities was somewhat hard to him.\n\nBut still, he ran, due to his pride, which wouldn't allow him to value his health in a bit. Even his men were set far from him, given orders to just look around, for he is "protected by the Allah".\n\nOne of his guards ran closely to him. He wondered, what could have happened. "Don, what's the matter, don?", he asked.\n\n"Die, you fucking traitorous dog", he heard in reply.\n\nTwo shots from pistol were aimed right at Ramzan's head. He immediately fell down, lifeless.\n\nAfter those shots, other ones came. But those were aimed right at Kadyrov's guards, somewhere from afar."
 azov.63.a:0 "Ichkerian dream will be achieved"

 azov.64.t:0 "Rising sun in Grozny"
 azov.64.d:0 "11:20 AM\n\nUrus-Martan district, Chechen Republic, Russian Federation.\n\nA couple of men were waiting near the road, checking their rifles. They all had olive clothes and Caucasian appearance.\n\nOne of them started talking with others. "Hey, brothers, what are we waiting for exactly? " he asked. One of his brothers-in-arms replied, "A column of Russian dogs and their equipment, Vano."\n\nAfter a couple of minutes, they noticed Russian military trucks coming to them. They were riding to Grozny when the messages of active insurgency in Urus-Martan city started coming to HQ. Ten trucks, with men and guns on board, were driving at full speed, not thinking about a possible skirmish on their way.\n\nWhen the first truck passed by hiding insurgents, it hit a landmine, killing everyone inside. Then the insurgents started shooting at passengers and drivers from their covers. Russians, shocked by the events, couldn't do anything but try to save themselves, lying down in the trucks or escaping from them.\n\nAfter some time, insurgents stopped firing, and no answer from the Russians came. Attackers started searching vehicles, and inside one of the trucks, there was one man alive. He got taken out of the truck, and one of the fighters started speaking with him.\n\n"Where you were heading?!", he asked. "T-t-to G-groz-zny...", told a captive in fear. \n\nCombatant, getting his gun ready, replied:"
 azov.64.a:0 "Rest in hell, Russian scum! §GI Marso ya jozalla!§!"

 azov.65.t:0 "Inglorious Bastard"
 azov.65.d:0 "A small village in Kropyvnytskyy oblast received a special visit today. NSS agent, callsign "Scout" came to see one specific house. When he knocked on the door, an old woman opened it.\n\nIntroducing himself, he came inside and went right to the kitchen. Granny decided to pour him a bit of compot from various berries. He then started talking to her:\n\n"You know, how they call me, old granny? The hunter. Hunter on Pidorussians. And you know, what makes me so effective in hunting those Pidorashkas? That I can think, like a Pidorashka. But what Pidorashkas cannot do, is to think like Ukrainians. We are very different, and while we may perfectly see through them, they cannot understand us. Who are you, grandma?"\n\nThe old woman was nervous deep inside her soul.\n\n"I-i... Ukrainian."\n\n"Great! Of course, who would you be in another case... You know, what is a world, where rats live in? A hostile world, indeed. You know, that they have caused the plague, right? But that's the old times. But would you greet that rat with a cup of compot, if it walked in right now? Probably not."\n\n"N-no..."\n\n"Right. You know, my job dictates to me, that, your house should be visited by a couple of armed men, and they would search every inch of it, without some kind words, and nobody knows, what would they do if they found something suspicious. But if you are willing to share some information, you will be met not with hostility, but with the reward. You are just going to live the rest of your life peacefully, in that old house of yours. It's good, isn't it?"\n\nThe old woman started slightly tearing up.\n\n"Y-yes..."\n\n"Do you hide some special individuals right here, in that home of yours?"\n\n"...Right..."\n\n"So... Where is he right now?"\n\nSuddenly, a creek of some wood outside was heard. Scout stood up and went to the source of that sound. It was an old wooden shed servinserving as a toilet. Scout hit the door of the shed a couple of times. An old voice was heard from the shed:\n\n"Better knock your head with this!"\n\nScout then took a pistol and made a few shots right through the door. Opening that door, he saw Dmitriy Puchkov, Russian communist and FSB agent, leader of ceased to exist "Little-Russian Liberation Front" organization, with several bullet holes in his body, and one in his head.
 azov.65.a:0 "Now that's a real 'Goblin's Dead-end'."

 azov.66.t:0 "Ukraine for Ukrainians"
 azov.66.d:0 "'Ukraine is for Ukrainians, so drive the outlander oppressors away from everywhere'. One out of the ten commandments of Mykola Mikhnovskyy - father of organized Ukrainian nationalism - became a commandment of Ukrainian nationalists for decades ahead. The thirst for the acquisition of the own state was the driving force, which started the mechanism of eternal fight.\n\nAt the foundation of Israel's history stand Jewish people. At the foundation of US history and the Constitution lie the American people. Only in the Ukrainian constitution, there is not a single word about Ukrainian people. The nation is an integral part of the national state, and with the exclusion of it from state conception - the nation will await death. The Ukrainian constitution was a whole big joke. Too many distortions, politizations, too many redundant, openly needless things. A pile of papers constantly changed and rewritten for the sake of self-advertising and work for the electorate, and not for the nation's life improvement. Today the foundation for the building of Great Ukraine will be laid down.\n\nWith will and iron, the Azov movement united fragments of broken Ukraine into a united whole, and now it needs to staple them with the absolutely new constitution. Words, laid inside it, will become the reflection of the immortal Ukrainian nation's will: a state, that puts national interests above everything. State from Ukrainians and for Ukrainians, where citizens have not only rights but also responsibilities. State, that united nation for the common goal. No autonomies. No political parties. No meaningless passions or degenerative ideas. Ukraine is a dream made real, desired by countless generations of our ancestors. And with the new constitution, we became one step closer to her."
 azov.66.a:0 "With saber we have right!"

 azov.67.t:0 "Centuria"
 azov.67.d:0 "Nation, which does not educate its' own youth is doomed.\nRussians understood that perfectly, and created 'Yunarmiya'. Hundreds of thousands of kids from an early age are taught about war and hatred. There is no doubt where a new generation of soldiers and officers will go the moment an order from the Kremlin comes.\nIn return, Ukraine decided to be in captivity of unrealizable dreams, decided not to see countless enemies, who surround her from everywhere. The nation decided to be blind. Till today.\n\n'Centuria' is a new organization of Ukrainian nationalists. Created in the hardest times for the state, it has to be that exact active rear, such as needed for an active army. It has to be an example, an ideal, aligned and followed. An honorable alternative to the modern decay of European civilization.\n\nWith full support from Azov, centers and initiative groups are being formed. Tactical and medical training is already being held, and performances with lectures are getting ready. If a nation wants to survive - it has to militarize. And Centuria will help the nation in that mission. In our hands is the future of the next generations. We do not have the right to retreat.\n\nInstead of weakness - Strength.\nInstead of loneliness - Unity.\nInstead of emigration - National future.\n\nNew generation of heroes starts here."
 azov.67.a:0 "Aut Caesar! Aut Nihil!"

 azov.68.t:0 "No Russian"
 azov.68.d:0 "For the whole story of Ukraine-Ruthenia, she hasn't got an enemy bigger, than Russians. There wasn't anyone, who would inflict more grief on the Ukrainian nation than the Russians. Reds, whites, tsarists, horde, and Russians have been destroying our own identity for centuries, to force us to become a part of the 'Russian world'.\nEvery time we, Ukrainians, have seen Russians as friends and allies, forgetting our own history. We were forgetting who we are and who our enemies are, we leaned to them, not understanding why. And all we got for exchange of our friendship is a knife in the back.\n\nEnough.\n\nDecisive fight, which will decide the future destiny of Ukraine, is closer and closer. Every mistake can become last. Acquisition of Great Ukraine is a matter of Ukrainians themselves, and we do not have the right to trust those, who would betray us just when the time will be right. We have to put an end to senseless flirting with the Eurasian horde, and clearly realize, that all Russians, no matter their age or sex, are enemies. And they should be treated as such."
 azov.68.a:0 "A good Russian is a dead Russian"

 azov.69.t:0 "Securing Internal Independence"
 azov.69.d:0 "The evil empire, known as the Soviet Union, might have finally fallen on 26 December 1991, but something from it is still alive. The State Security Committee, more known as the KGB, was still under the subordination of the newly proclaimed Russian Federation, and its agents still got their orders. However, in addition to the West, they also began working in former Soviet republics.\n\nFor decades, Russian agents were infiltrating Ukraine and occupied a significant chunk of internal Ukrainian affairs, from TV and culture to politics and state apparatus. Some have settled right into the SBU, Ukrainian Security Service, and worked for their masters a lot since Ukrainian independence, two Maidans, the annexation of Crimea, and the hybrid Russo-Ukrainian war.\n\nThe defeat of Russian forces in Donbas region may be seen as the final blow to them, but it's wrong. They still operate in other parts of Ukraine and will try to get us here. The West is also worth mentioning since it has invested some of its resources in Ukraine, but has not given us the real benefit, treating us as some kind of cheap land appendage with a cheap workforce instead. With that, we need to reorganize our secureness and create a new entity, which will observe the Ukrainian state with a keen eye and won't allow others to come here and take what they want.\n\nAnd so, the National Security Service was born.\n\nNo foreign scum will affect our citizens, may it be Russians, who wish to enslave us as they did for centuries, or Westerners, looking at our homeland as a great piece of resources and nothing more, nor the local madmen will spread their anti-Ukrainian bullshit, which threaten our sovereignty."
 azov.69.a:0 "Your security is our concern"

 azov.70.t:0 "Start of Azovnet"
 azov.70.d:0 "'Azovnet - your new secure network.\n\nHave you known, that the internet is a dangerous place? The amount of information, accumulated in it, is crazy, but the misinformation, hidden in it, is dangerous for you and your beloved ones.\n\nIntelligence services of many countries have used the internet to spread dangerous messages to millions of people across the globe, and Ukraine is not an exception. Remember, how good was life, when you watched "common" and "safe" content, which was, in fact, cancerogenic to the Ukrainian population? How movies about brave Russian or Soviet soldiers or state servicemen were spreading the good and always defeated the bad, how a ton of Russian series were depicting us as a stupid pigs, who don't know anything about civilization, how their comedians, musicians, actors, and others, who you liked, were happy, when their men came pillaging our cities and murdering our brothers.\n\nAnd that's not all. Remember how Ukrainians were happy when we got here the Western content? Great movies, series, music, and in such big scales! But what now? Now they're throwing in degenerate ideas, reconsidering the values of good and bad things, throwing in the trash good ones, treating them as sins of humanity, and replacing them with the worst things the human brain can come up with. They're doing the same with us, now treating us as uncivilized monsters, who can only ruin, murder, and nothing else.\n\nTerrible, don't you think? You can actually believe in that nonsense and lose the real self, replacing it with the artificial mindset and succumbing to the so-called "correctness". And we have made the solution for you!\n\nAzovnet purpose is to filter the potential dangerous content for Ukrainians, hiding it from your eyes and brain. Now you won't be affected by degeneracy, created to ruin us, isn't that great?\n\nSoon all the internet providers will adapt to of Azovnet. Sign up for a secure internet."\n\n- Azovnet online ad'"
 azov.70.a:0 "For your security"

 azov.71.t:0 "A Knock"
 azov.71.d:0 "Oleksandr was a simple journalist from Kharkiv, working for the 'Amnesty International' organization. Till the events of the Fire of Poltava, he was working on various articles, which featured Ukraine's right-wing movements, including Azov.\n\nWhen Ukraine broke apart, he found himself in a hanged position. He was stuck in Kharkiv, and couldn't leave for good, but he had his workplace - his apartment - where he tried to depict the new realities of Ukraine.\n\nBut that was till Azov came knocking at Kharkiv's gates. With the establishment of the Kharkiv military administration, he couldn't leave the city. Furthermore, one day he heard a knock at his doors.\n\n'Oleksandr Petrovych!'\n\nHe heard rude shouts out of the door. Fear captured Oleskandr's body. He had some thoughts, that one day he'll be standing right before the men he fiercely wrote down about. Was it lies, or was it truth what he wrote about Azov and the far-right Ukrainian community, it didn't matter. One day, he feared that he would have to answer for his words.\n\n'Open up, or we'll have to do it roughly!'\n\nKnocks became louder. Oleksandr didn't know what he should do. The escape was unlikely since he lived on the 5th floor, and to open that door meant a death sentence to him. Not the fast one, but with suffering and a mix of the worst emotions possible. Thinking about his possibilities, he then looked out the window.\n\nA police car was near the house. Two police officers just sat in the car, having a small talk, but then they saw an embarrassing picture: the man had jumped from the 5th floor and collided with the ground.\n\nAfter a couple of minutes, a worker of the National Security Service came to look at the dead body.\n\n'Sashka, Sashka... Your fears came true, yeah?'"
 azov.71.a:0 "Black list established"

 azov.72.t:0 "Get Your Rifle Ready"
 azov.72.d:0 "We are at the horizon of big changes. No need to tell, that a bit more, than a decade, was spent to get ready for that moment. The Kremlin looks at us with fear, and yet somehow he gets ready for that moment.\n\nThe final fight with Russia should result in a victory for us, so we must fight this one time to take our rightful place under the sun. That is the duty of every Ukrainian, to join their arms in final war. \n\nThousands of Ukrainians are storming the enlistment offices to get their weapon and march on Moscow, and thousands are willing to support their backs in hospitals, maintenance and factories. In one, pure patriotic spirit, we will manifest our destiny for the ages ahead.\n\n'Limitless battle columns come in closed rows... In village coats, in worker and student attires, in common shirts and army overcoats...\n\nThe columns come by hard steps of the undefeated. They are not scared by jails - not bullets, nor hunger, nor coldness of northern camps. The fallen fighters - ressurect in new.\n\nThe columns come by thorn-blood (path) - to bright, great Purpose. The way is shown to them by graves of those, who had on flags: Freedom - or death.'\n\n(c) Yurii Horlis-Horskyy, 'Kholodnyy Yar'"
 azov.72.a:0 "The last push"
 
 
