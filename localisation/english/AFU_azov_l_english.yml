 AFU_azov_azovnet_desc:0 "Internet is the main source of external propaganda and psychological operations, so it should be supervised with the creation of our own network."
 
 AFU_azov_freedom_under_supervision:0 "Freedom Under Supervision"
 AFU_azov_freedom_under_supervision_desc:0 "Freedom is one of the fundamental pillars of Ukrainian nation, and we shall not take that from our own people, but still, we should be careful with the amount of freedom, which Ukrainians may posess."
 AFU_azov_freedom_is_slavery:0 "Freedom is Slavery"
 AFU_azov_freedom_is_slavery_desc:0 "Ukrainians shall not forget, that it's the freedom, which have ruined Ukrainian state many times, and we should put an end to this hellish cycle. Anyone, who is against our vision, shall perish for the sake of past generations, which failed because of the same ideals."
 
 AFU_azov_armed_society:0 "Armed Society"
 AFU_azov_armed_society_desc:0 "Ukrainians should defend themselves, and how it can be better ensured, if not by letting them own the most effective means of self-defence - firearms?"
 
 AFU_azov_for_freedom:0 "For Your Freedom and Ours"
 AFU_azov_for_freedom_desc:0 "Russia threatens to destroy us, yet it destroys even it's own people. There are those willing to combat ones who sit at the Kremlin and imposes current Russian mentality on it's citizens, and we must unite, for our sake and for theirs."
 
 AFU_azov_russophobia:0 "Promotion of Russophobia"
 AFU_azov_russophobia_desc:0 "For centuries Russians wanted to destroy our nation, and nothing changed today. Ukraine is no place for their monstrous 'culture' and values they wish to impose on us. "
 
 AFU_azov_harbour_for_the_far_right:0 "Harbour for the Far-Right"
 AFU_azov_harbour_for_the_far_right_desc:0 "Azov invited dozens of ultra-right-wingers to join him, from philosophers and intellectuals to mere terrorists, maniacs and criminals."
 
 AFU_azov_anti_globalization_policies:0 "Anti-Globalization Policies"
 AFU_azov_anti_globalization_policies_desc:0 "Globalism and liberal ideology are eroding nation states and promoting abstract 'universal values', under the guise of 'human rights', 'openness', and 'progress', external forces have been destroying national will, traditional order, and the very idea of sovereignty for decades. So now, the Ukrainian Nation functions as a single ideological organism, state eliminated external ideological control, restricted the activities of so-called globalist structures, and established the complete priority of national sovereignty over any 'universal' norms."
 
 AFU_azov_no_capitulation:0 "No to Capitulation!"
 AFU_azov_no_capitulation:0 "We were against the capitulation in 2014, we reminded of that at protests in 2019, and we carry that thought today and will carry it further. We will never yield, and we will achieve our victory! No to capitulation!"
 
 AFU_azov_updated_military_industrial_complex_1:0 "Updated Military-Industrial Complex"
 AFU_azov_updated_military_industrial_complex_1_desc:0 "For years Ukrainian industry got demolished from the status of the powerhouse to a sorry state. With efforts that we put into it, our military complex can be called not only capable, but also a powerful one. The factories produce great amounts of modernized and improved equipment of all sorts, waiting to get used by our brave soldiers. Ukrainian military-industrial complex finally became something we can be proud of."
 AFU_azov_updated_military_industrial_complex_2:0 "Updated Military-Industrial Complex"
 AFU_azov_updated_military_industrial_complex_2_desc:0 "For years Ukrainian industry got demolished from the status of the powerhouse to a sorry state. With efforts that we put into it, our military complex can be called not only capable, but also a powerful one. The factories produce great amounts of modernized and improved equipment of all sorts, waiting to get used by our brave soldiers. Ukrainian military-industrial complex finally became something we can be proud of."
 
 AFU_azov_nationalist_constitution:0 "Nationalist Constitution"
 AFU_azov_nationalist_constitution_desc:0 "Ukrainians should live by the ideals of nationalism, formed through long period of centuries by our various ancestors. 'You will gain Ukrainian State, or will die fighting for Her' - first, but not least out of many testaments, which Ukrainians should follow."
 
 AFU_azov_final_fight:0 "Preparations for the Last Fight"
 AFU_azov_final_fight_desc:0 "Time for us to take down our opressors has come, and we must prepare to meet them with powerful answer for centuries of their deeds."
 
 AFU_azov_cooperation_with_rvc:0 "Cooperation with RVC"
 AFU_azov_cooperation_with_rvc_desc:0 "Russian Volunteer Corpus has proven their desires to rebuild Russia into normal state, with abolishing imperial cult and improving mentality of Russians. They may come in handy, when we will step into Russia, as they are under our control."
 
 AFU_azov_eternal_fight:0 "Our Eternal Fight"
 AFU_azov_eternal_fight_desc:0 "Nobody will understand us and help us more, than we do. The absolute will of Ukrainian nation is our strongest ally, and we don't need anything more than that."
 
 AFU_azov_all_ukrainian_mobilization_1:0 "All-Ukrainian Mobilization"
 AFU_azov_all_ukrainian_mobilization_1_desc:0 "To fight such big enemy, as Russia, we need the hands of the whole Ukrainian nation to eventually smighten their forces and let Ukrainian sun finally rise."
 AFU_azov_all_ukrainian_mobilization_2:0 "All-Ukrainian Mobilization"
 AFU_azov_all_ukrainian_mobilization_2_desc:0 "To fight such big enemy, as Russia, we need the hands of the whole Ukrainian nation to eventually smighten their forces and let Ukrainian sun finally rise."
 AFU_azov_all_ukrainian_mobilization_3:0 "All-Ukrainian Mobilization"
 AFU_azov_all_ukrainian_mobilization_3_desc:0 "To fight such big enemy, as Russia, we need the hands of the whole Ukrainian nation to eventually smighten their forces and let Ukrainian sun finally rise."
 
 AFU_smo_caucasus:0 "Special Decommunization and Demilitarization Operation"
 AFU_smo_caucasus_desc:0 "While Russia is struggling with Ukrainian forces, Caucasus shall rise once more to remove the yoke of Russian bastards and to gain the long-yearned independence!"
 AFU_smo_csto:0 "Special Decommunization and Demilitarization Operation"
 AFU_smo_csto_desc:0 "CSTO leading figure - Russia - has indulged into military conflict, but it's better for CSTO members not to intervene in this conflict for their own safety."
 AFU_smo_rus:0 "Special Decommunization and Demilitarization Operation"
 AFU_smo_rus_desc:0 "Ukrainian nazis have started crossing our border, but we shall not ask anyone for help. We single-handedly defeated China over 6000 years ago, Napoleon in 19th century and Hitler in 20th century, so we will manage it."
 
 AFU_fallen_pawn:0 "Operation 'Fallen Pawn'"
 AFU_fallen_pawn_desc:0 "To hell with Lukashenko oligarchic russophilic regime! It's time for the pawn of Kremlin to fall, and for Belarusian people to strive!"
 AFU_help_from_azov:0 "Help from Azov"
 AFU_help_from_azov_desc:0 "Russia is a great enemy of ours, and we are not alone in this. Azov gives us helping hand and provides us with necessary means in our joint fight for freedom."
 
 AFU_azov_fire_of_poltava_experience:0 "'Fire of Poltava' Experience"
 AFU_azov_fire_of_poltava_experience_desc:0 "Those long years of ruin and disunity has given birth to things and tactics, which no big player on the world stage has seen yet. With the utilization of that, we will get the upper hand in our fight."
 AFU_azov_anti_partisan_operations:0 "Anti-Partisan Operations"
 AFU_azov_anti_partisan_operations_desc:0 "Some putinist scum surely is resisting us, while on liberated territory, and it's our duty to ensure, that none of them will succeed."
 
 AFU_azov_me_ne_frego:0 "Fight till the Death"
 AFU_azov_me_ne_frego_desc:0 "§RThere's no turning back, we will fight for our existence till our very own death!§!"
 
 
 AFU_azov_new_aristocracy:0 "New Aristocracy"
 AFU_azov_new_aristocracy_desc:0 "The nation cannot exist without the elite. People with great minds and will, who worked through hardships in the name of nation, should lead the way to prosperity. Great Azov fighters surely deserve their place as the new aristocracy of Ukraine."
 
 AFU_azov_nationalized_infrastructure:0 "Nationalized Infrastructure"
 AFU_azov_nationalized_infrastructure_desc:0 "For a long time, Ukraine's infrastructure was in the hands of oligarchs such as Akhmetov, Kolomoyskyi and others. After the introduction of the economic doctrine of natiocracy, there is no longer any place for these bastards here. National syndicates have been created, which now control all infrastructure, from utilities to energy and fuel. The state, or more precisely, the Ukrainian people themselves, now control all these enterprises, support their work and work for the benefit of the Azov government! Everything in the state, nothing outside the state, nothing against the state!"
 
 AFU_azov_small_business_support:0 "Small Business Support"
 AFU_azov_small_business_support_desc:0 "Our government has a duty to help all those passionate souls who, despite everything, continue to work hard for their existence. Our cities will once again be filled with shops, cafes, massage parlors, and everything else that will not only bring income to our population and replenish the treasury, but also develop our service sector, which is actively used by our great soldiers in their free time!"
 
 AFU_azov_field_privatization:0 "Field Privatization"
 AFU_azov_field_privatization_desc:0 "The beautiful and vast Ukrainian fields will no longer be in the hands of anyone except Ukrainians. Our sacred land belongs to Ukrainian farmers, those who were born on this land, those who dedicated their lives to working it, and those who shed their blood to defend it."
 
 AFU_azov_cooperation_with_elites:0 "Cooperation with Agrarian Elites"
 AFU_azov_cooperation_with_elites_desc:0 "Our current situation forces us to be realists rather than dreamy romantics. Sometimes, in order to achieve the ultimate goal, it is necessary to deviate from one's ideological course, and when the very survival and future are at stake, we must be practical. The old agrarian elites wield enormous power and dispose of a well-developed sector, whereas we lack the necessary resources to completely transform this industry into an ideologically ‘correct’ one, which is why we have no choice but to cooperate with them. For the sake of the greater national goal!"
 
