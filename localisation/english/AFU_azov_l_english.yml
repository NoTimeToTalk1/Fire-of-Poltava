 ## Junk
 AFU_azov_youth:0 "Azov Youth"
 AFU_azov_youth_desc:0 "By going forward with unwavering determination, our youth embody the spirit of resilience and courage our nation needs. Their dedication is determined and their passion is contagious, lighting a spark of national pride in all who follow them. With their boundless energy and enthusiasm, they breathe new life into our movement, animating the spirits of those around them. Their unity is a testament to the strength of our ideals and their commitment is a source of inspiration to all who seek a better future."
 AFU_azov_hvatit_bratskih_voin:0 "Enough Fraternal Wars!"
 AFU_azov_hvatit_bratskih_voin_desc:0 "Only a united-white front would destroy the rotten world order of Jewish globalism. The best decision for us - start a rebuilding of Russian-Ukrainian relationships right now. Ukrainian state like Russia had been occupied by Bolshevism for one century. International Jewish capitalism wanted to see us like enemies, who would kill each other for money, enough bloodshed! Only unity and oblivion of the past grievances will save Europa from devastation!"
 AFU_azov_reformed_police:0 "Reformed Police"
 AFU_azov_reformed_police_desc:0 "1"
 
 AFU_azov_shkola_konovaltsa:0 "Colonel Yevhen Konovalets Military School"
 AFU_azov_shkola_konovaltsa_desc:0 "The Colonel Yevhen Konovalets Military School is a specialised school for training non-commissioned officers and sergeants.\nThe School of Sergeants is named after Yevhen Konovalets (1891-1938), a Ukrainian military and political figure who dedicated his life to fighting for the Ukrainian state in a difficult time when the vast majority of Ukrainian politicians and military personnel of the time lost faith in the prospects of the struggle. Taking his example, the Azov Regiment took responsibility and initiated the reform of the army during the crisis without waiting for instructions and directives from above.\nThe first course was recruited from more than fifty Azov volunteers who had spent at least a year in the ATO zone and had taken direct part in the fighting. Company commanders submitted profiles of the most worthy fighters who expressed a desire to develop in this direction. The applicants were seriously selected based on their intellectual and physical qualities. The future sergeants were trained by experienced military instructors and specialists from Georgia, who had gone through both Soviet and NATO military schools and had years of practical experience, including in hot spots. Certain disciplines were taught by civilian professors from Kyiv universities and journalists from leading Ukrainian media."
 AFU_azov_shkola_sciborskogo:0 "Lieutenant-Colonel Mykola Sciborsky School of the Highlanders"
 AFU_azov_shkola_sciborskogo_desc:0 "The Lieutenant Colonel Mykola Sciborsky School is a specialised school for training non-commissioned officers. It was opened on 20 November 2017 on the basis of the Mariupol regiment of the Azov Army. It was planned to launch a training programme in personnel management and ideology.\nThe cadets included people who hold the position of deputy commander of certain company-level units. All the teachers have academic degrees. The lecturers involved from Dnipro universities had once prepared a programme to reform personnel management in the Armed Forces of Ukraine.\nThe course is to last 33 days. During the school day, students can attend 5 lecture or seminar pairs, in addition to physical education, hand-to-hand, knife fighting and firearms training. Applied disciplines such as military psychology, military pedagogy, rhetoric, ideological and purely military subjects are also taught.\nUpon completion of the course, graduates receive a diploma, and their units receive banners, insignia and special badges. So each unit will have its own battle flag and a person in charge of it."
