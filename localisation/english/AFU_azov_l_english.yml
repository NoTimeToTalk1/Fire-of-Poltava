 AFU_azov_church_integrated:0 "Integrated Church"
 AFU_azov_church_integrated_desc:0 "Christianity is one of the columns of tradition and order. Real Christianity. Globalist Neo-Marxists with the dawn of Jewish "socialism"  wanted to destroy our traditions with the past, kill culture, and our sacred faith had been hit the first. Satan returned from hell, and nowadays degeneracy and madness of multiculturalism - are creations of Lucifer.\n\nChristianity is a religion of warriors, don't look at the western degeneracy, they won't destroy the main tradition of the White people. The church must be integrated into the state. In this darkest hour, we must unite. Anti-tradition in the face of atheism, satanism, and other degeneracy must be purged."
 AFU_azov_church_independent:0 "Independent Church"
 AFU_azov_church_independent_desc:0 "Christianity is one of the columns of tradition and order. Real Christianity. Globalist Neo-Marxists with the dawn of Jewish "socialism"  wanted to destroy our traditions with the past, kill culture, and our sacred faith had been hit the first. International western anti-traditionalism wants to make us a great mass without history, past, and remembrance. This is the true face of capitalism.\n\nBut the holy church should be independent of our state. Christianity is a concept of philosophical positions, beliefs, and feelings of our people. That's how it was, that's how it should be. We are not revisionists of the oldest traditions. The main column must be untouchable.\n\n"The God is my rock, and my fortress, and my liberator; O my God, my strength, in whom will I trust; my comb, and the horn of my salvation, and my high tower."\n\nPsalm 18:2"
 
 AFU_azov_warriors_of_christ:0 "Warriors of Christ"
 AFU_azov_warriors_of_christ_desc:0 "With the sacred spirit of Archangel Michael, the supreme commander of God's army that won a battle against forces of darkness. He was the first to rebel against Lucifer. Saint Archangel has not ceased to fight for the glory of the Creator, for the salvation of the whole human race, and for the church and its children. He rebelled against darkness as we rebelled against world degeneracy, which was created by International Neo-Marxist Jewry, puppets of Lucifer.\n\nAnd this life-and-death battle would be won like a patron of warriors Michael won a devil's dragon with his sword. God with us, and our victory It's only a matter of time. Antichrist will be banished back to hell from Earth.\n\n"And the great dragon was cast down, the old serpent, which is called the devil, and Satan, who deceives the whole world; He was cast down to the earth, and his angels were cast down with him."\n\nRev 12:7"
 
 AFU_azov_traditional_family:0 "Traditional Family Values"
 AFU_azov_traditional_family_desc:0 "Family is one of the nation's key values, and it should be preserved at any cost. Men should protect women, and women should keep up men."
 
 AFU_azov_legacy_of_joan_of_arc:0 "Legacy of Joan of Arc"
 AFU_azov_legacy_of_joan_of_arc_desc:0 "Women can do no worse than men, and why should we restrict their will to fight for the nation, while such heroes, as Joan of Arc, exist?"
 
 AFU_azov_baby_boom:0 "Baby Boom"
 AFU_azov_baby_boom_desc:0 "The strength of a nation comes from many factors, but with low population they will be for naught. There should be as many Ukrainians as possible, so we must work towards the birth of those, who will carry the nation's will onwards, after we retire."
 
 AFU_azov_centuria:0 "Centuria"
 AFU_azov_centuria_desc:0 "'Centuria' is a youth organization, led by Azov soldiers, who teach young generation the aspects of nationalism and get ready the replacement for us in the future. It will ensure the rise of great young nationalists."
 
 AFU_azov_national_security_service:0 "National Security Service"
 AFU_azov_national_security_service_desc:0 "Ukraine is surrounded by external threats to it's independence and spirit. National Security Service will ensure the safety of our country from enemy intrusion into it."
 AFU_azov_national_security_service_old_1:0 "National Security Service"
 AFU_azov_national_security_service_old_1_desc:0 "Ukraine is surrounded by external threats to it's independence and spirit. National Security Service will ensure the safety of our country from enemy intrusion into it."
