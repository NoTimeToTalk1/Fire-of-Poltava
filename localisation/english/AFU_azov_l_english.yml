 ## EVENTS
 azov.1.t:0 "National revolution in Donbas"
 azov.1.d:0 "Hard times create strong people, or at least make it clear who is truly loyal to their nation.\nAfter the glorious victory of the Ukrainian knights over the forces of evil and terror that had dug in on the eastern borders of Donbas, General Kryvonos decided that all the problems that the people were suffering from, which the authorities had previously ignored and continued to turn a blind eye to, could be solved through "democratic" elections of the head of government. However, everyone knew that the so-called "candidates" were just puppets or henchmen of the oligarchs who stood behind them and who were in charge of the whole process. The victory of any of these "democrats" would have ended up returning us to what brought us here - a new oligarchic domination accompanied by covert tyranny.\nHowever, this time, we - Azov, decided not to stand aside and prevent bandits and traitors of the nation from ruling over our people. The elections, whose results ultimately led to the same outcome, had to be stopped, and we took this measure. It doesn't matter what people say about us, because our conscience is clear. The Ukrainian people deserve justice, and we will bring it to them. Hear us, proud Ukrainian people! Today is the day when your most faithful sons put an end to the old rotten order and gave birth to a new one!"
 azov.1.a:0 "Azov can be our only saviour!"
 azov.2.t:0 "Fight for Azov"
 azov.2.d:0 "A morning breeze blew over the Donetsk steppe, bringing dust from the surrounding war-torn homes and buildings onto the roads. The sun began to peek out on the horizon, casting light on the potholed roads and yellowed steppe grass. An old iron sign, painted with worn blue paint and bearing four bullet holes of the calibre used by a Kalashnikov rifle, stood in the middle of the wasteland where a village once stood. Only the letters "P" and "A" remained of the inscription, while the rest of it faded away with the blue background or was covered with all sorts of papers. It was close to the demarcation line, which was violated by Donetsk pseudo-patriots, members of the Russian terrorist group called "DPR", resulting in new intense fighting for the region, ending in the complete defeat of the separatist forces. Nothing remained of the village itself but the foundations of the houses that once stood proudly in the middle of this steppe and three shattered huts, the only ones with their walls still standing and their ceilings in place. \n\nHowever, the dead silence of the village was disturbed by a distant rattling sound, which made the stones on the road, covered with holes and pits like cheese, start tap dancing. It was a great machine, a steel monster that was moving like the lord of all these steppes towards the village that had been levelled to the ground. \n\nIt was a tank! Big, strong, with a blue and yellow flag that shone in the sun. The main hatch was open, and a young man in a helmet with "The Idea of the Nation" spray-painted on it, one of the main symbols of the new government in Donbas, the Azovs, climbed out. The chevron on the soldier's shoulder also looked like an Azov one, the one worn by almost all the leadership of the Donetsk and Luhansk oblasts these days. \n\nA pair of binoculars hung around his neck, covered in dust brought by the breeze, while the soldier squinted his eyes. Suddenly, he caught sight of something as if he saw a ghost. The tank was already in front of the sign of the mysterious village that had no name, and an unknown figure emerged from behind one of the houses. The soldier peering out of the steel colossus furrowed his brows and wiped his binoculars with his hand. He looked at it and saw that the figure was very short, either a child or a dwarf, and he was carrying a stick with a cloth, perhaps drying something. No, it wasn't just a stick and a rag, but a banner, but it was hard to see through all the dust. \n\n"Sanya, step on the gas. Someone is coming. I can't see it," the soldier said. The tank accelerated. It quickly passed through several ruined buildings and got closer and closer to the dwarf with the banner. Dust again clogged the lenses. The soldier wiped them again and looked towards the figure. The flag was finally starting to take shape. What was on that stick was a great discovery for the soldier - it was the flag of the Novorossians! The figure had no beard, and why would there be dwarfs here anyway? It was a child! A child with a banner held by the very troglodytes who had turned his village into chips. "Sanya! Hey, do you hear me? Look what we have here, a separate! And it's a fuckin' child. Motherfucking Katsaps. Hey, get closer." At these words, the tank picked up twice the speed. "Move away, kid! Understand? Throw away this toilet rag and go home, or you'll regret it!". The child continued to hold that separatist rag, and it was indeed a rag (there was no way to call it a flag), standing there as if with some sense of pride. "Show that fucking milk sucker, Sanya."  The tank was coming closer to him. The soldier upstairs looked around to see if there were any others like him in the village - no one as if they were still lying under the ruins. The tank headed at full speed and at one moment bounced a little. \n\n. The soldier turned back after the bumb, and saw that rag buried in the broken asphalt. "Wow, Sanya, magnificent. Let's hope these bastards won't crawl out again. Never." After saying these words, the soldier climbed inside, closed the hatch and tapped his comrade on the shoulder."
 azov.2.a:0 "This is the end of the last "Novorossian"."
 azov.3.t:0 "Strongest signal"
 azov.3.d:0 "Ukraine's political scene today resembles a seething quagmire, with autonomous, hostile right-wing groups scattered trying to assert themselves. Our Ukraine is not a place to fight each other. This is a place where everyone should try to succeed, but for now, we are dragging ourselves down. \n\nAt first, fights between the nationalists can lead to the fact, that the strongest side will survive, but in fact, this is not the case. All disagreements and conflicts make us weaker, leaving the political field free for anti-ukrainian scum. \n\nIn the modern world, where ill morale is actively promoted and embedded in society, right-wing forces must realize, that their division is beneficial for the globalist empires. Left-wing degenerates are united and working together, and this is what allows them to successfully promote their "ideas". In fact, the right has no time for internal divisions, because our chances of success are decreasing daily. \n\nThe individualism, which grows into egoism, will not allow us to win the fight against the demonic threat. \n\nWhile we fight each other for the slightest differences, the enemies actively promote their poisonous ideas to the masses. And if we repeat the past mistakes, then even after a bloody war within the country, the globalists' puppets will again promote their "teachings" and ideals, or even try to take power into their dirty hands, and after that, you will complain that the country is becoming a mess. It will not be the fault of the scum, supervised by the FSB and neo-marxists, not of the left-wing pseudo-activists, but of us, our pride and unwillingness to unite. \n\nYou may continue to keep up your delusions, but then don't say, that we have lost our homeland again for many years ahead. \n\nOur main goal for now is to leave our differences behind us and work together to achieve a common goal, because only then we can succeed."
 azov.3.a:0 "Editorial staff of "Free Donbas" today."
 azov.4.t:0 "The Rise"
 azov.4.d:0 "On his grave, she wrote a words: "Glory to Ukraine! Glory to all heroes!"\n\nOn the battlefields, Ukraine lost the best sons of the nation, who agreed to fight in the darkest hour of our Motherland.\n\nThere are thousands of them. Thousand of men and even children, that just finished school, died for Ukraine... But memory about them has not forgotten. Dont care, if the soldier died heroically, sacrificed himself, or died from the shell or wounds. Regardless of their age, they will still be warriors, who were not afraid to take guns in their hands and start to defend their homes, where lives beloved people, parents, and friends.\n\nSome shadowy enemy forces think, that they can destroy alternative thought, if they throw its carriers on minefields, under shells and muscovite bullets. if throw them rot in prisons, cripple them physically and morally.\n\nThey don't understand one thing - our ideas are immortal.\n\nThe white sun of the living and the black sun of the dead shine on them at the same time.\n\nAnd these thousands, who gave their lives in battle not even for Ukraine, but for our common dreams and personal convictions - they are close to us, just we don't see them.\n\nThe death of the best of us will not stop our victory..."
 azov.4.a:0 "It will only make our revenge more brutal."
 azov.5.t:0 "Failure of Poltava"
 azov.5.d:0 "Natskorpus forces have suffered a defeat in the center of Ukraine. The remains of Natskorpus have managed to cross the border with us and came fleeing right to us.\n\nMany our comrades are willing to join our fight, as we are the new stronghold of Ukrainian nationalism. The most important thing is that former Azov founder and Natskorpus leader, Andriy Biletskyy, is finally with us. He shall get in charge here, and our current leader, Maksym Zhorin, should stand as his right hand."
 azov.5.a:0 "Glory to the Vozhd'!"
 azov.6.t:0 "The Grave Price"
 azov.6.d:0 "Reports are coming, that Natskorpus forces got destroyed in Poltava. Some men have managed to get away alive, but the overall situation is a disaster.\n\nAzov founder and Natskorpus leader, Andriy Biletskyy, have paid the highest price. He has died while covering his own men to get across the border with us. This is a moment of sorrow for us all.\n\nBut we must not forget, that we need to fight further, and he wouldn't allow us to let ourselves down because of such. We must continue."
 azov.6.a:0 "Memento mori."
 azov.7.t:0 "Integration of Church"
 azov.7.d:0 "After recent reforms, our country has changed. Increased funding for churches has allowed the church's influence to spread, and believers have been appointed to public office. All of this has allowed the church to exert influence on the state. One of their first decisions was to create the Crusaders, a church military unit.\n\nPriest Danylo was preparing for the inauguration of the first such unit. Danylo's task was to say a prayer, bless the soldiers, and take the church's oath from them. At the end of the whole procedure, the soldiers gave their cry:"Glory to Jesus Christ! Glory to Ukraine! Glory to the Nation! Death to the enemies!""
 azov.7.a:0 "Amen!"
 azov.8.t:0 "Children's camp "Azovets""
 azov.8.d:0 "Initially, Maksym's parents had great doubts about whether to allow him to go to the new children's camps under the state program or not. Some opposition even compared these camps to the Hitler Youth. But, having overcome their doubts, his parents decided to try. It was only for one summer, they thought. Maksym liked the camp, the outdoor walks, the stories around the campfire about the heroes of the Ukrainian nation and the heroic deeds of the Cossacks, and the feeling of unity with the state.\n\nAt the end of the summer, all the members of the Azovets camp marched down the main street of Kramatorsk in a parade. Maksym liked the feeling of importance and the fact that people clapped for him and all the other children. When Maksym returned home, he told us about all the interesting things he had learned at the camp.\n\nAfter that, his parents were no longer worried and agreed that he would go to this wonderful place again next summer."
 azov.8.a:0 "Ok."
 azov.9.t:0 "Luhansk Conference"
 azov.9.d:0 "At the Luhansk city hall, government was holding a conference, where representatives from Azov and russian far-right elements were invited. City hall has had a strong security around it, so nobody would interrupt participants during the talks.\n\nFrom Azov side there were present Maksym Zhorin, Denys "Redis" Prokopenko, Serhiy "Volyna" Volynskyy, Svyatoslav "Kalyna" Palamar and David "Khimik" Kasatkin.\n\nFrom russian side, Denis "White Rex" Nikitin, Illya Bogdanov and Denis "Vikhoryev" Tiukhin.\n\nThey've started with giving a handshakes with each other. They've had rather friendly character, with a hope that conference will have a positive outlook for both sides.\n\nThe main points were the role of ukrainian and russian fighters in succeeding their goals and how they can assist each other. Azov wanted to unite Ukraine, while russians wanted to free Russia from evil neobolshevik-olegarchian regime.\n\nAfter about two hours of discussions, each side had pleasant looks on their faces. The two will cooperate. Azov mission was put first, and after completing it, Azov will help russians in their plans. To organise russian far-rights, they've decided to create a regiment for them - Russian Volunteer Corpus."
 azov.9.a:0 "Start of a new union..."
 azov.10.t:0 "The Song"
 azov.10.d:0 "They can sob when a animals are beaten by a angry and barbaric neighbor,\nBut we won't see real tears  will be shed by them by the inhuman extermination of foreigh people.\nTanks drives along the streets of Ukraine, and we,\nStill believe in the agony of the empire.\n\nBut in the east, dreams of freedom don't last long,\n\nAnd there is a cruel  end of freedom.\n"How to condemn  or support this uprising, this rebellion?!"\nDiplomates gray of worries under.\n\n"The nation will perish? It doen't matter, peace with Russia is a must!"\n"Everything will pay off for peace!"\n\nIn the fields of Ukraine,\nCain has a sharp weapon,\nAbel realized what his fate is and is waiting.\n\nAre only when a weapon is put to one's head,\nHuman right violated?\n\nWhy does God over Ukraine pretend to be asleep,\nEven thoungh Job's lament surrounds Him?\n\nPherhaps, one dan in Heaven\nthe army will call at the door,\nDressed in a Russian uniform.\n\nWhite angels will choke on black blood.\nIt's so easy to kill the innocent.\n\nAnd to cry out for fear, there will be no one anymore.\nThe witch is reborn,\nThe witch is reborn,"
 azov.10.a:0 "The witch Russia is reborn!"
 azov.13.t:0 "The National Liberation Movement of Ukraine"
 azov.13.d:0 "I walk around, and I see at every step the disregard for my land...\n\nHard times make strong people. Thousands stood up to defend their homeland after the war broke out.\nWhile some packed their bags and their property and planned to flee abroad, while others said that we would have no future, they are among the few who took up arms and went to the front.\n\nThey are not afraid to face the truth. No matter what it is.\n\nThey are called heroes to the face, but fanatics behind their backs. The mercantile-minded, rootless masses, who put material values above all else, will NEVER understand the pain that Ukrainian patriots feel, not those who sit on the Internet, but those who sit in the trenches and are ready to die for the state.\n\nThey are continuing the work of the fallen soldiers, and although they are in the shadows, they will not tolerate abuse of their people.\nThe struggle continues.\n\nTheir glory will live on forever, and the wind of history will sweep away the dirt that will be poured on their graves."
 azov.13.a:0 "Glory to Ukraine..."
 azov.14.t:0 "Andriy Melnyk or Stepan Bandera?"
 azov.14.d:0 "In February 1940 happened one of the most terrible thing with Organisation of Ukrainian Nationalists after death of Evheniy Konovalec in Rotterdam 1938, father of ukrainian nationalist liberation movement.\nYounger generation, more radical wing of OUN lead by Stepan Bandera after many arguments in organisation announced, that legitimate leader of OUN Andriy Melnyk is traitor of Ukrainian nation, which works against ukrainians by his "indecision" and "weakness".\nHouse was divided in two sides.\nIn result, banderites started a fratricidal war, where ukrainians of one views killed each other. Olena Teliha, Mykola Stsibosky, Omelyan Senyk, Oleh Olzhych, they were killed by stupidity, audacity and misunderstanding. This was personal conflict, not political.  And we are sure, dissolution of OUN was a Moscow plan. They are afraid of strong, united ukrainian liberation movement. They wanted to pit ukrainians against each other. And they accomplished they mission. "
 azov.14.a:0 "And what now..."
 azov.15.t:0 "Doesn't remind you of anything?"
 azov.15.d:0 "And now, muscovites again pitting us against our brothers. Collapse of Ukraine was the greatest tragedy in history of our Homeland. We need to make a wise decisions. We are crushed, but not destroyed.\nIt's doesn't matter who you consider a hero: Melnyk, or Bandera. History will judge them. But now we won't allow to collapse nationalist movement for the second time. Only united and strong we can achieve our plans.\nRemember the past, and learn from our mistakes."
 azov.15.a:0 "Glory to Ukraine!"
 azov.16.t:0 "Back to the past"
 azov.16.d:0 "We were born in a great hour,\nFrom the fires of war, and the flames of gunshots.\n\nWe were nurtured by the pain of losing Ukraine,\nWe were fed by anger and malice to our enemies.\n\nAnd here we walk in the battle of life -\nSolid, durable, unbreakable, like granite,\n\nFor crying hasn't given freedom to anyone yet,\nBut whoever is a fighter - he conquers the world.\n\nThe glory of fallen fighters leads us into battle,\nThe law is the highest order we shall fulfill:\n\nTowards a free and united Ukrainian nation,\nFree and strong, from the San to the Caucasus!\n\n-Anthem of OUN. 1932."
 azov.16.a:0 "Glory to Ukraine!"
 azov.17.t:0 "Unite with Poltava"
 azov.17.d:0 "The people will be united again."
 azov.17.a:0 "Glory to the Vozhd!"
 azov.18.t:0 "Unite with Pagans"
 azov.18.d:0 "The people will be united again."
 azov.18.a:0 "Glory to the Perun!"
 azov.19.t:0 "Choosing the most promising school."
 azov.19.d:0 "Azov was formed as a volunteer battalion in Ukraine during its heroic defence against the neo-Bolshevik horde from the east, and many of its members already had military service experience or military-patriotic convictions. Many of them were interested in getting a military education and improving their military skills. Azov has several military institutions, but the most powerful are two schools.\nThe Yevhen Konovalets Military School was considered a classic choice for many members of the Azov Regiment. The school was known for its higher education and traditions of service in the Ukrainian army. By choosing this option, the soldiers had the opportunity to receive both a professional military education and experience in the regular Armed Forces of Ukraine. The school offered an in-depth military course and the opportunity to obtain the rank of officer.\nThe Mykola Sciborsky School of Horunzha was a less traditional choice, but it was marked by a great spirit of patriotism and independence. Some members of Azov may have found it more compatible with their views and ideology, as it was associated with patriotic and nationalist values.\nEach fighter who chose between these schools did so based on their personal beliefs, professional goals and ideological views. Our government will encourage competition between the schools to ensure good results for the soldiers, so which school will we prefer now?"
 azov.19.a:0 "The Yevhen Konovalets Military School"
 azov.19.b:0 "The Mykola Sciborsky School of Horunzha"
 azov.20.t:0 "The Life for Azov"
 azov.20.d:0 "Mykyta, a young man from a small town in the Podillia region, lived a quiet and relaxed life. He was an ordinary guy, but with an inner sense of patriotism and a desire to serve his country. After finishing school, Mykyta made a difficult decision - he decided to serve in the army and study military science.\nMykyta became a student at the Yevhen Konovalets Military School, where he began to acquire military skills and a deep understanding of patriotic values. During his studies, he met many like-minded people and received unanimous support from his fellow students.\nOne day, during a training session at the training ground, Mykyta received the nickname "Persyk". This nickname was given to him for his distinctive natural stripes on his cheeks, which resembled the colour of a peach. The name "Persyk" is not just his nickname, but his real middle name. which he used in his military service.\nMykyta, or "Persyk," continued his studies and service in the army, joining the Azov Regiment, where his military skills and patriotism were greatly appreciated. He was ready to make sacrifices to defend his country and uphold its sovereignty. "Persyk" became one of the many heroes who have gone through the trials of war and demonstrated their dedication and fortitude in the service of Ukraine."
 azov.20.a:0 "Glory to all heroes!"

 azov.21.t:0 "View on the situation"
 azov.21.d:0 "It must be argued that to the problem of the superclass state and to the very possibility of harmonizing the interests of individual social groups - part of the social opinion is also now treated with a skeptical reservation. The reasons for this phenomenon cannot be explained only by provocations of Moscow and its international sub-voices.\n\nBecause along with the nationalist movements of different peoples and their struggle for creative, expansive, corresponding to the modern understanding of social ethics, the internal solidarity of nations, various groups using the slogans of nationalism for their anti-social purposes are living on the wreckage of capitalist-bourgeois democracy.\n\nThese unconvinced and suspicious "nationalists" come mainly from the environment of speculators of financial capital, international stock rogues, owners of land latifundia using the most predatory rent of tenant capitalism, ruthless "Partisans" dividend coupons, values produced on intellectual and physical labor of other people, etc. Consciously ignoring the fact that Nationalism - is a revolution aimed not only at updating national life, but also to radically change the outdated and parasitic socio-economic relations. These legalized gangsters of capitalism are often hemmed in by nationalism proclaiming themselves to be its "allies" and manipulating its constitutive principles in the destructive tasks of social reaction."
 azov.21.a:0 "And what now?"
 azov.22.t:0 "Ukrainian "Natiocratia""
 azov.22.d:0 "The Ukrainian natiocracy builds its socio-economic prayer on the critical experience and combination of old expedient elements with new forms and tasks of social life. Natiocracy does not deny private property economic freedom and the desire for economic gain. These are the main drivers of economic development. Where these forces are paralyzed, it is social life that is killed there, and with it the creative responsibility of the thief; in their place comes the bureaucratic dead and hypocritical "hypocrisy" hiding under the false mask of a well-worn human nature (an example of communism.\n\nAt the same time, the Natiocracy attracts to these driving forces their content lost under capitalism. The institution of private property, economic freedom and incentives for profit - which in the conditions of capitalism turned into a means of predatory exploitation, into a monopoly of the domination of cliques and into the immoral right of parasitic consumption of the fruits of labor of other people."
 azov.22.a:0 "The choice is clear."
 azov.23.t:0 "The New Syndicates"
 azov.23.d:0 "The formation of syndicates comprising representatives from various professions in the [AFU.GetName], who then elect a leader to advocate for their ideas and needs in the Congress, is an intriguing development.\n\nThe concept involves professionals from various sectors, such as intellectuals, some construction workers etc., coming together to form syndicates. These syndicates act as platforms for lobbying and advancing common agendas. Through the reglar processes, members elect a leader who becomes the spokesperson for the syndicate's concerns.\n\nThe Congsess serves as a forum where these elected leaders discuss and deliberate on pertinent issues affecting their respective professions and the broader society. It acts as a mechanism for dialogue, negotiation, and collaboration among syndicates, aiming to influence policies and decisions at various levels of governance.\n\nThis model of organizing allows for greater representation of professionals across different fields. By consolidating their voices and resources, syndicates can effectively address challenges, advocate for reforms, and promote the interests of their constituents in the political arena.\n\nOverall, the formation of syndicates and their participation in the Congress signify a shift towards more participatory governance, where the voices of diverse professional groups are heard and considered in shaping the trajectory of the nation. Yet, the syndicates didn't get to choose their leader."
 azov.23.a:0 "Ok."
 azov.24.t:0 "Ukrainian nationalization"
 azov.24.d:0 "Since our renewal of independence in 1991, foreigners have seeped into our country. Ukrainians started to like foreign products, and many of them considered something foreign better than ukrainian just by fact, that it was made not in Ukraine.\n\nFrom one side, we have a lot of russian stuff. Russians came into our market without any problems, as if we are not another country, but rather satelite in big "russian world" sphere. Their technologies, commercial products and culture freely pass by here. Besides that, russian businesses feel very comfortable, starting from small franchises and ending with industrial giants like Gazprom. With them, ukrainians are getting closer to anti-humane state of Russia.\n\nFrom other side, we have even more things coming from other world. Electronics, food, drinks, cars, clothes, utensils, furniture, technologies and more, more and more. Ukrainians are absorbing their products culture like a sponge, may it be american, european, chinese or others, getting through their foreign ideas, which may be harmful for our mind and spirit.\n\nForeign businesses invested in Ukraine by expanding their markets into our country, building up their industries and franchises here. We shall use it and nationalize them for our sake. They won't be having their culture, and they will be changed for us."
 azov.24.a:0 "Learn to eat varenyky and drink horilka, not burgers and vodka."
 azov.25.t:0 "Issue of Economic Militarisation"
 azov.25.d:0 "In order to defeat the enemies of Ukraine and the Ukrainian people, who have been so greedily profiting from these vast lands and poor people for decades and continue to do so even in these difficult times, we need to use everything we can. A war, a great war, and not just one, for the survival of the nation in the struggle for its future, will be bloody and ruthless, and we will need all the resources we have to win it. The army, equipment, and soldiers are, of course, very, very important, probably the most crucial factors, however, we should not forget about everything that will support this army, feed it, and maintain it, that is, our economy, which will not be able to simply coexist with the ruthless realities of today's Ukraine. As such, we have two options: to reject everything that does not relate to the military needs of the Ukrainian state and people, putting our entire industry on military rails, or to engage in the gradual militarisation of the economic environment, while maintaining at least some stability in civilian life. Both paths have their positive and negative sides, both are beneficial for the population and the future. If we give the military all the resources it can handle, people's lives will be severely disrupted, while we will essentially lose our civilian economy and have to rebuild it from scratch after the war. However, if we take the long road of compromise, we may not manage to invest enough in the army to successfully win the battle for Ukraine and its future. This choice will not be easy but must be made..."
 azov.25.a:0 "We won't need a civilian economy if the bandits and traitors take over the country again. Army gets everything!"
 azov.25.b:0 "The military will receive all necessary, though not at the cost of the nation's suffering."
 azov.26.t:0 "The Question of Land"
 azov.26.d:0 "The next question addressed at this national syndicalist congress will be the question of the Earth. After we came to power, we successfully nationalized all the fields and land, that previosly belonged to foreign companies and origarchs. And now we have a question: should we give these agricultural holdings only to farmers' families, or to medium and large businesses as well? On the one hand, farmers know what to do, and this is a true manifestation of natiocracy. But on the other hand, the loyalty of medium and large businesses will help us in the long run. Also, thanks to centralization in second option, we will be able to use these holdings more effectively, and increase their productivity, albeit at such a compromise to ideas of Natiocracy.\n\nWhile first part of congressmen thinks that first option is ideal and second option is treason of natiocracy ideals, second part says that we need to compromise, and make each decision wisely. Because still, interests of business is important for our economy, and simple farmers will not give our state profit, that can give middle and big businesses, that will own part of holdings. And that we will give only part to them, so that's not treason of natiocracy ideals!"
 azov.26.a:0 "Farms - to the farmers! Loyalty to the ideas of natiocracy - till the end!"
 azov.26.b:0 "The economic interests of the state are more important."
 azov.27.t:0 "Question of the destiny of the Ukrainian soil"
 azov.27.d:0 "Nature and all its components - forests, hills, mountains, rivers, seas, steppes, deserts - were here long before the Ukrainian nation emerged. Wide fields covered with an endless blanket of greenery, untamed rivers that gave life to all the land along their banks - all this was inherited by us, Ukrainians, as a gift from fate itself to proud warriors and conquerors. With the settlement and emergence of the first forms of the Ukrainian people on the lands of our homeland, all the gifts of nature began to be fully used by their new owners. Nomads and proud and untamed souls seeking escape from serfdom settled on the wide steppes, people of all stripes inhabited the fields, becoming farmers who began to build the foundation of our society, while the mountains were conquered by the bravest of us, where they found themselves isolated from the rest of their vast nation, developing their own regional customs, just like the inhabitants of all other parts of vast Ukraine. Communities were built, small villages turned into towns of many thousands, and eventually into cities of millions, centres of administrative and industrial development of the state. With the advent of the industrial revolution in Ukraine, most of this centuries-old and largely untouched nature fell under the knife of the newly created industry. Forests were cut down, marshes were dried for the purpose of construction, and fields were treated with chemicals to maximise crop growth, which of course gave a great impetus to development, but was it ethical? Do we have the right to spit in the face of the same nature that has sustained all generations of Ukrainians without exception, or is such exploitation justified for our needs? Only cowards can balance between these two worlds, whereas Ukrainians are anything but, so it's time to choose which one it will be."
 azov.27.a:0 "We are inflicting on Mother Nature everything we have now. How can we be such ungrateful sons and continue to destroy her gifts?"
 azov.27.b:0 "Everything has a purpose, and nature has one as well: to be used by its masters for their sake."
 azov.28.t:0 ""
