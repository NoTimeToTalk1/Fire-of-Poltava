l_english:
 sum.1.t:0 "Elections!"
 sum.1.d:0 "TBD"
 sum.1.a:0 "Yushchenko"
 sum.1.b:0 "Smeshko"
 sum.2.t:0 "Smeshko is Victorious"
 sum.2.d:0 "Today the Sumy city and raion council, not without interference and backing from Chernihiv, elected a former state security serviceman and the leader of the political party "Strength and Honor" - Ihor Smeshko. Previously working as an advisor for the fifth president, he is seen here as "Poroshenko's man", with the population not giving him a lot of trust because of this. Regardless, Smeshko is here to stay, for better or for worse."
 sum.2.a:0 "Poroshenko's hold over Sumy is reaffirmed at last."
 sum.3.t:0 "2004 is back in Fashion"
 sum.3.d:0 "After a plethora of requests and pleas were sent from many residents of Sumy and nearby towns, as well as general acceptance of the candidate in the council, Viktor Yushchenko had reluctantly agreed to take the lead of the local administration. For the time being it seems that he feels a bit apathetic about the whole situation. In his speech on Sumy's Independence Square, however , he had reassured people with the promies that he, with his political experience and readiness to defend the citizens, that fell within his area of responsibility, would provide a guiding hand for the Sumians in these uneasy times."
 sum.3.a:0 "Tak!"
 sum.4.t:0 "TBD"
 sum.4.d:0 "Just when the elections of the governor of Sumy and vicinity were seeming to be concluded, something unexpected had happened - the unknown men with green and black flags with guns broke into the parliament and declared the current session to be closed. All of the politicians and bueraucrats, that were present in the council, were taken hostage. From the government tribune, the rebels had declared the lands, controlled by Sumy regional council to be freed from the rule of the local oligarchs, which never cared about the ordinary people and whose intentions and misdeeds led to an emrgence of lawlessness and bloodshed across the entire country. These "Freedom fighters" called themselves "Avanhard Culturna Spilka". With the culmination of the speech and a quick radio and television broadcast, a new revolutionary order had befell on the land of Sumy. Time will truly tell, how will this new vision of the group will reshape the situation inside and outside Sumy region."
 sum.4.a:0 "For the Avant-Garde!"
