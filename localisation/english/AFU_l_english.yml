 AFU_integration_category:0 "Integration"
 afu_integration_1:0 "Trials for Separatists"
 afu_integration_1_desc:0 "As we said, the day will come when these bastards will wish they had never been born. As we said, the day will come when these bastards will wish they had never been born. Every separatist warlord will be held personally accountable for their crimes against humanity and Ukraine before a tribunal, and you can be sure that they will not be spared."
 afu_integration_2:0 "Cleaning Up Collaborators"
 afu_integration_2_desc:0 "Not only the "leaders" will have to answer to God and the law, but also their henchmen, such as police chiefs or, God forbid, "deputies". Fortunately, they are only useless pawns, so we are going to send them all to Motorola and others as soon as possible."
 afu_integration_3:0 "Crackdown on FSB"
 afu_integration_3_desc:0 "Ever since 2014, the Russian FSB started working their absolute overtime in Donbas as a way to increase the separatist grip over the region. Now, a ton of "leftovers" in the form of agents and their influence chains lay around, waiting to be dealt with immediately."
 afu_integration_4:0 "Establish Provisional Administration"
 afu_integration_4_desc:0 "Such a radical governmental change in the region has undoubtedly caused a ton of bureaucratic troubles. Post-separatist Donbas needs new passports, documentation, banks and tax service - all that will be provided with the establishment of the new provisional administration."
 afu_integration_5:0 "Further Steps for Integration"
 afu_integration_5_desc:0 "A lot was done for law order in Donbas already. Now it's time we move on to the next step of integrating the region."
 afu_integration_6:0 "Filtration Measures"
 afu_integration_6_desc:0 "With a fair amount of the population supporting Russia and what used to be the separatist government, limited repressive actions are inevitable. Of course, catching every Putin-sympathizer here is impossible, but anyone who will be vocal about his hostile opinion will be surely dealt with."
 afu_integration_7:0 "Finish the Integration"
 afu_integration_7_desc:0 "Everything needed for integration is done, it's time to officially declare the process as complete!"
 AFUintfinalise:0 "We will finish the integration of previously occupied states"
