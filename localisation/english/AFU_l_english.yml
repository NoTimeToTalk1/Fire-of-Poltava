l_english:
 ## AFU FOCUSES
 AFU_on_our_own:0 "On Our Own"
 AFU_on_our_own_desc:0 "We have found ourselves in a... difficult situation. Rarely in history has it happened that a country collapses into a ton of pieces, having an army left to rot alone, isolated, somewhere in the east. Such hopeless situations would often result in hopeless actions, but not from us! We will not bind, will not flinch, will not fall into anarchy, but instead endure, and most importantly, fight!"
 AFU_assessing_the_situation:0 "Assessing the Situation"
 AFU_assessing_the_situation_desc:0 "We face quite many urgent issues, that needed to be solved, the main of which is to destroy separatists once and for all. But it is no easy task - and it wasn't such even in the times of unified Ukraine. We must work in our preparations twice, or thrice as much as before, to finally put an end to the madness, while not forgetting to keep things together behind the frontlines."
 AFU_continue_the_state_of_emergency:0 "Continue the State of Emergency"
 AFU_continue_the_state_of_emergency_desc:0 "The state of emergency, enforced right after the collapse, has, admittedly, not been very popular amongst the masses. People can barely understand that new reality that fell upon their heads and are trying to desperately grab some leftovers from the pre-collapse, relatively peaceful times. If we want to avoid being conquered by Russian puppets, we must make our masses understand the necessary sacrifices that need to be done. Yes, for now, they will have to work much harder, spend much less and hope for the best, but our nation of steel will overcome anything. For the sake of the common good!"
 AFU_reaching_out:0 "Reaching Out"
 AFU_reaching_out_desc:0 "After all, an army is nothing without central command. But we will not be looking for orders, we will be looking for something else that central command usually sends to the frontline - supplies and humanitarian help. Everyone understands that they are needed, but not everyone can provide them. We will test our luck and hope for the best."
 AFU_speak_to_biletsky:0 "Speak to Biletsky"
 AFU_speak_to_biletsky_desc:0 "While nationalists might have broken our country apart, and they are not that positive people to have ties with, but they surely know how to fight. Their whole mission is to create a strong Ukrainian state, and army is in core of that idea. While they are having some struggles, we can ask them for equipment. They surely won't deny the opportunity to help us destroy separatist scum!"
 AFU_contact_the_kyiv_government:0 "Contact the Kyiv Government"
 AFU_contact_the_kyiv_government_desc:0 "The Kyiv government is, in a sense, the closest thing to a "legitimate high command" that we will ever get. While they are obviously resource constrained themselves, perhaps they could allocate a few weapons to a good cause."
 AFU_contact_poroshenko:0 "Contact Poroshenko"
 AFU_contact_poroshenko_desc:0 "Although we do not swear allegiance to a "rogue president", he can certainly be useful. His army reforms once left a noticeable positive response from both of us. Who knows, if he has any military surplus, perhaps he could help us - from patriot to patriot will weapons flow!"
 AFU_appeal_to_avakov:0 "Appeal to Avakov"
 AFU_appeal_to_avakov_desc:0 "A police state that is our neighbour could also be useful - they probably have some extra police equipment, consisting of small arms or light armour. In addition, Avakov could provide us with his police force, which would be useful for suppressing pro-Russian resistance after we are done with the separatists. The Kharkiv government will probably appreciate the help we are providing for the whole region and will help us."
 AFU_mobilize_our_forces:0 "Mobilize our Forces"
 AFU_mobilize_our_forces_desc:0 "The core of any army, starting with the oldest wars in history, is, of course, manpower. No weapon is useful if there is no one to use it! An inevitable war is on the horizon, and we must be ready! We will enforce partial mobilization to properly expand and replenish our army with fresh recruits."
 AFU_special_operations_forces:0 "Utilize the SSO"
 AFU_special_operations_forces_desc:0 "The SSO, or Special Operations Forces, is arguably the most highly skilled unit of the Ukrainian Armed Forces. They are made up of the best soldiers Ukraine has to offer, and they are engaged in counterintelligence, martial law enforcement and counter-terrorism. The Special Forces will definitely be useful in our fight, and we will use their skills and professionalism to strengthen the army."
 AFU_enhanced_training:0 "Enhanced Training Programmes"
 AFU_enhanced_training_desc:0 "The key to defeating separatists is to overcome their army, and that can be achieved through quality. While their army consists of barely trained militias, ours will now be an army of professionals, the peak of soldiering excellence!"
 AFU_rely_on_militias:0 "Rely on Militias"
 AFU_rely_on_militias_desc:0 "Militias, while being not the best long-term solution, are an incredible choice for our situation. They are much easier to arm, easier to maintain and organize, and much faster to train and deploy. Moreover, back in 2014, the militias proved their effectiveness in fighting separatist scum, so their reputation is already high in our eyes. We would rather prioritize them than waste time and resources on the barely viable concept of a "quality army""
 AFU_territorial_defence_forces:0 "Teritorial Defence Forces"
 AFU_territorial_defence_forces_desc:0 "The territorial defence forces consist of numerous militia-like units filled with volunteers who have volunteered to fight for their homeland. Their strategic advantage lies mainly in their rapid deployment, but although they appear to be cheap, they will still cost us some money. Their deployment is rather an additional measure that is being taken only to overcome the enemy, as the current size of our army is simply not enough. We may eventually integrate them into the Armed Forces, but for now, they will remain a separate branch under our control."
 AFU_reform_the_general_staff:0 "Reform the General Staff"
 AFU_reform_the_general_staff_desc:0 "Leadership and commanders are indeed a very important part of a successful army. We will reform the General Staff according to our needs and our resources to turn our military system into a well-oiled machine of commanders and soldiers."The army, as an institution, most of the time is designed to subconsciously invoke far-right thoughts into soldiers. Mass dehumanisation of enemies, conservative and militaristic political opinion, promotion of hardline nationalism and so on. Our military system does not much differ from the rest of the world. Far-right thought has been spreading among ranks for a long time now, and we need to take care of the issue. While we surely can't fire all of them, we can significantly reduce the influence and structural role of nationalist groups like "Azov". This must stop the spread, but keep our troops moderately patriotic and politically neutral."
 AFU_sideline_the_far_right_elements:0 "Sideline the Far-Right Elements"
 AFU_sideline_the_far_right_elements_desc:0 "The army, as an institution, is largely designed to subconsciously instil far-right thoughts in soldiers. Massive dehumanisation of enemies, conservative and militaristic political views, propaganda of hard nationalism, etc. Our military system is not much different from the rest of the world. Far-right thoughts have been spreading in the army for a long time, and we have to take care of it. Of course, we cannot dismiss everyone, but we can significantly reduce the influence and structural role of nationalist groups like Azov. This should stop their spread, but keep our troops moderately patriotic and politically neutral."
 AFU_turn_a_blind_eye_to_far_right_elements:0 "Turn a Blind Eye to Far-Right Elements"
 AFU_turn_a_blind_eye_to_far_right_elements_desc:0 "We are not in a situation, where our soldiers should be politicised and taught about 'political correctness'. Far-right soldiers is our most motivated resource, and we shouldn't get in conflicts with them."
 AFU_professional_army:0 "Professional Army"
 AFU_professional_army_desc:0 "At the moment, we have done a lot to upgrade and modernise our army. Every day we receive recruits, train and arm them, and then send them to the frontline! But it's not a time to relax, not yet. Our army is good only by the standards of the situation we are in, and in fact, is barely superior to the separatist military. We need to continue training our boys, deploy new divisions, and only then we will be able to become truly powerful, so help us, God!"
 AFU_prepare_for_the_inevitable:0 "Prepare for the Inevitable"
 AFU_prepare_for_the_inevitable_desc:0 "Bold of us to assume that separatist scum has suddenly left their ambitions for Donbas behind. Every single day they revisit their dream of capturing our cities and enslaving our people in the name of the "Russian world". Why should we let this happen? Why should we not fight?! Our glorious army will prepare for the inevitable war with separatists, and let it be the last war glorious Donbas ever sees! Slava nam, kozaky!"
 AFU_prepare_the_reserve_line:0 "Prepare our Reserve Lines"
 AFU_prepare_the_reserve_line_desc:0 "We cannot expect to win a war if we won't build a sufficient defence. Not only that, but we will also train our soldiers how to use terrain properly, defend the trenches, quickly fortify and much more."
 AFU_and_now_we_wait:0 "And Now We Wait"
 AFU_and_now_we_wait_desc:0 "There is no need to rush. We have everything prepared. We are ready. The separatists think that their attack will be quick and unexpected, but this is a mistake. We have been here all this time, waiting, and we don't mind waiting a little longer. Come to Ukraine, Russian, don't be afraid..."
 AFU_its_time_to_put_an_end_to_the_separatists:0 "It's Time to Put an End to the Separatists"
 AFU_its_time_to_put_an_end_to_the_separatists_desc:0 "Is there really a need to wait? We have done everything we had to do, and our soldiers are more than ready to crush the traitors once and for all. Moreover, our generals also hold the opinion that a preventive strike would be optimal. We will wipe this separatist madness from the face of the Earth! It's now or never!"
 AFU_local_arms_procurement:0 "Local Arms Procurement"
 AFU_local_arms_procurement_desc:0 "If we look around us, we will see a bunch of factories ready to be restarted and used for military purposes. We will use the legacy of Donbas's industry and start manufacturing guns, ammunition, and virtually anything our army could ever need. Kickstart those factories, boys!"
 AFU_harshen_the_quotas:0 "Harshen the Quotas"
 AFU_harshen_the_quotas_desc:0 "Unfortunately, there are even more drastic measures left to be done. Since we live in desperate times, we will have to tremendously increase the working hours, decrease rations and impose even harsher punishments for breaking the law. After all, these are wartime casualties, dammit. They must be done!"
 AFU_establish_military_administration:0 "Establish Military Administration"
 AFU_establish_military_administration_desc:0 "Some time has passed, decisions were made, and now we are much more self-sufficient than we were before! For now, it's our own military state's only goal is to bring peace to Donbas. Perhaps we will soon change the way we govern people, but today we have more pressing matters to deal with..."
 AFU_promise_reforms:0 "Promise Reforms"
 AFU_promise_reforms_desc:0 "Those people who are protesting against us... we should try to understand them. We are all human, it is hard for all of us now. After all, we hope that military measures will not last forever, and they may soon be cancelled. We will promise the masses future reforms of our military government, hopefully, this will calm everyone down."
 AFU_crackdown_on_dissent:0 "Crackdown on Dissent"
 AFU_crackdown_on_dissent_desc:0 "Our harsh measures were not met with happy faces among the people. Unfortunately, they don't understand the entire situation we all are in and are trying to demand more freedom and rights for workers. We need to remind them what wartime law is and show what happens if you break the law in already troubled times..."
 AFU_victory:0 "Victory"
 AFU_victory_desc:0 "Finally, Victory is ours! Separatists flee in panic as the glorious Ukrainian flag is raised over the last city of Donbas. The monstrosities that once were the "LPR" and "DPR" no longer exist, marking the end of a job we have been unable to finish since 2014! However, when it's party time, it's too early to relax. There are too many questions lying around waiting to be answered. Our work is not over yet!"
 AFU_begin_integration:0 "Begin Integration"
 AFU_begin_integration_desc:0 "While we cannot reintegrate the entire region in one click, we can certainly put it on the right track. We will make a list of actions that need to be taken to finally undo 5 years of continuous Russian propaganda and clear the minds of these poor people of separatism!"
 AFU_mass_demining_programme:0 "Mass Demining Programme"
 AFU_mass_demining_programme_desc:0 "War has left countless amount of mines lying in open fields and near civilian infrastructures and living buildings. Now, with the end of war, we should clear Donetsk and Luhansk oblasts from explosives, to ensure safety among civilian population."
 AFU_rename_the_cities:0 "Rename the Cities"
 AFU_rename_the_cities_desc:0 "Russians have claimed our cities for themselves, and their names as well. Ukrainian towns with long history have been renamed for ideological purposes, or simply because Russians couldn't pronounce city names in their language. We will ensure, that Ukrainian history will be returned to Ukrainian cities."
 AFU_derussify_ukrainian_donbas:0 "Derussify Ukrainian Donbas"
 AFU_derussify_ukrainian_donbas_desc:0 "Donbas region was a place of heavy russification, with the Soviet Union settling many Russians in its industrial centres. Russification has led to Russians claiming Donbas as their land, and they have done irredimable crime to Ukrainians, who grew up under the influence of a foreign culture. Donbas is Ukrainian, and it will never be Russian!"
 AFU_trials_for_separatists:0 "Trials for Separatists"
 AFU_trials_for_separatists_desc:0 "Separatists have ruled over occupied Donbas for several years. They tried to sell entire Donbas to Russians, helping them in occupation and their proxy war with Ukraine. Now, they've been captured by our armed forces, and they are waiting for trial. Verdict: treason!"
 AFU_cultural_integration:0 "Cultural Integration"
 AFU_cultural_integration_desc:0 "For several years, residents of occupied Donbas were influenced by Russian culture and propaganda. They were taught, that they are actually Russians, that Ukraine wanted to destroy all civilians in Donbas, just because they were 'evil easterners'. Those lies will be put in grave, and we will return what Donbas really needs - Ukrainian culture, to bring occupied Donbas back to Ukrainian family."
 AFU_finalize_integration:0 "Succesful Integration"
 AFU_finalize_integration_desc:0 "It has finally happened! The separatist leaders are either rotting in prison or in the cold ground, and the former "citizens of Donbas" are finally beginning to recognise their Ukrainian identity! Unfortunately, we cannot completely erase pro-Russian tendencies, but they are now rapidly declining. But the time for rest has not yet come - there is so much to do in our burning Ukraine..."
 AFU_we_stand_alone:0 "We Stand Alone"
 AFU_we_stand_alone_desc:0 "We have managed to survive separatist menace, but... We have to accept the fact, that we are alone. Nobody from that roster of politicans, who claim about their love for Ukraine in their political advertisments and parliament speeches, has provided us with significant help, such as their own forces. While our blood flows, they are busy getting their piece of land, money and glory. We must decide our future for ourselves, as nobody will do that for us better."
 AFU_the_time_has_not_yet_come:0 "The Time Has Not Yet Come"
 AFU_the_time_has_not_yet_come_desc:0 "We need to look around. What do we see? Ruined Ukraine. Teared to shreds. Do we even have the time for those fancy elections, while our country is in ruin? We must get a grip, and military knows better how to do it."
 AFU_election_time:0 "Election Time!"
 AFU_election_time_desc:0 "Finally, the time for elections has come. It is a huge relief for civilians, who are unsure of their future, and they will have the chance to say their word by casting their vote. May the elections begin!"
 
 ## AFU EVENTS
 afu.1.t:0 "On Our Own"
 afu.1.d:0 "After the country-wide destabilization and escalation of civil unrest in Ukraine, we were unable to properly reach the central government and are unsure of what is even happening. However, we do know that Ukraine is currently threatened by separatist menace. We must fight on our own until we can re-establish our connection with Kyiv."
 afu.1.a:0 "We have to start preparing."
 afu.2.t:0 "Contacting the Government"
 afu.2.d:0 "After a couple of intense weeks, we have finally managed to establish stable contact with Kyiv. From what we've been told, the political situation is still uncertain, so we shouldn't rely on the Kyiv administration too much. We don't want to get our hands dirty in their political games."
 afu.2.a:0 "Let's see what we can do."
 afu.3.t:0 "Assessing the Situation"
 afu.3.d:0 "Our high command and intelligence services predict that the colder phase of the Donbas conflict might soon be over. The war with the Russian proxies is on the horizon. It is time for us to assess the situation and prepare ourselves not only to defend against the upcoming onslaught but also to try to end this long-lasting conflict on our terms."
 afu.3.a:0 "Sooner or later we'll have to face the coming storm."
 afu.4.t:0 "Life in the Donbas"
 afu.4.d:0 "The life of an ordinary civilian living in territory controlled by the Ukrainian Armed Forces is complex and difficult, especially in the context of the ongoing conflict with Russian-backed separatists in eastern Ukraine. The conflict has significantly impacted the daily lives of people in these areas, creating numerous challenges and obstacles that must be overcome.\n One of the key challenges civilians face in these areas is access to basic goods and services. The conflict has disrupted supply chains, making it difficult for people to obtain food, water, medicine, and other necessities. This, in turn, creates serious health and safety risks.\n Another major challenge is the restriction on movement. The conflict has led to the establishment of checkpoints and other security measures, making it difficult for people to travel freely and carry out daily activities. This is particularly problematic for those who need to commute for work, education, or other essential purposes.\n In addition to these concerns, civilians in these areas may also be subject to harassment, intimidation and violence by various actors, including members of the Ukrainian Security Forces and Russian-backed separatists. This environment fosters a sense of fear and insecurity, making it difficult for people to go about their daily activities without fear of reprisals.\n Despite these difficulties, many civilians living under Ukrainian Armed Forces control are striving to build better lives for themselves and their families. They are finding ways to access essential goods and services, overcoming movement restrictions, and creating networks of support and solidarity within their communities.\n Overall, while life in these areas can be challenging, it is also marked by resilience, ingenuity, and a steadfast determination to build a better future."
 afu.4.a:0 "Waiting for a better times..."
 afu.5.t:0 "Helping AFU?"
 afu.5.d:0 "A message was sent through the communication line from the troops in Donbas. In it, Kryvonos, relying on the fact that the Armed Forces are still de jure under our command, listed everything we 'owe' him and the Armed Forces since the beginning of the Collapse. He mentioned thousands of rifles and dozens of pieces of equipment, but our own situation is far from ideal. We definitely can't send all of it, but by sending at least some, we can reinforce Kryvonos' faith in us and ensure his loyalty. However, looking at it from another angle, he will still be forced to officially obey us, or he could become another rebel. It's not an easy choice..."
 afu.5.a:0 "Send him our help immediately!"
 afu.5.b:0 "We have enough to worry about without them."
 afu.51.t:0 "Zelenskyy Agreed"
 afu.51.d:0 "Kyiv has agreed to provide us with whatever equipment they can."
 afu.51.a:0 "We are grateful for their help."
 afu.52.t:0 "Zelenskyy Refused"
 afu.52.d:0 "Despite their direct responsibilities, Zelenskyy's government has refused to provide us with weapons, probably considering their own issues more important."
 afu.52.a:0 "It doesn't matter, we'll manage it all without them!"
 afu.6.t:0 "Helping AFU?"
 afu.6.d:0 "Our government is shaky. In the eyes of most Ukrainians, we are illegitimate and responsible for the collapse of the state. Yet, despite all this, one person sent us a message — Kryvonos. Recalling our old friendship, he asks for weapons and equipment from our reserves for his Armed Forces, and we are able to provide them. In theory, we could even gain their further support. But despite this, they remain loyal to Zelenskyy's government, and in the future, these weapons may even be used against us! So, what should we do?"
 afu.6.a:0 "The present is more important than the future, and no matter what, we must help our brothers destroy the Russian scum!"
 afu.6.b:0 "Who knows where this will lead..."
 afu.61.t:0 "Poroshenko Agreed"
 afu.61.d:0 "Given our old friendship and a common goal, Poroshenko has graciously agreed to send us help."
 afu.61.a:0 "Maybe he's not so bad after all...?"
 afu.62.t:0 "Poroshenko Refused"
 afu.62.d:0 "Despite our sincere request, Poroshenko has refused to send us help."
 afu.62.a:0 "Average Syvocholyi Hetman behavior."
 afu.7.t:0 "Helping AFU?"
 afu.7.d:0 "Biletsky, currently located in Poltava with his nationalist government, received a message from the Armed Forces of Ukraine. They are asking for material help, specifically for weapons and vehicles to assist them in holding back separatist forces from the east. We should help them, but will we have enough equipment for ourselves if we send it to them?"
 afu.7.a:0 "What is that question? Of course we should help our guys against Russians!"
 afu.7.b:0 "Despite our best efforts, we are unable to provide any equipment."
 afu.71.t:0 "Biletsky Agreed"
 afu.71.d:0 "Biletsky has agreed to provide us with weapons, even on a larger scale than we could have hoped for!"
 afu.71.a:0 "I will have to thank him personally one day..."
 afu.72.t:0 "Biletsky Refused"
 afu.72.d:0 "Poltava, unexpectedly, has denied our equipment request.
 afu.72.a:0 "What a shame..."
 afu.8.t:0 "Helping AFU?"
 afu.8.d:0 "Security reigns supreme in the Kharkiv region. The police are monitoring regional security, and after the destruction of the LPR by Krivonos, there is even less to worry about. But suddenly, the Kharkiv administration received a message from the Ukrainian Armed Forces. In it, Kryvonis informed us that due to a lack of personnel, the Ukrainian Armed Forces were unable to control the entire occupied territory and needed the help of our police units and some equipment. What are we going to do?"
 afu.8.a:0 "Prepare weaponry and personnel for sending!"
 afu.8.b:0 "Tell them that OUR police protects only OUR territory."
 afu.81.t:0 "Avakov Agreed"
 afu.81.d:0 "Avakov, understanding the benefit of the cause, nevertheless agreed to send us equipment and units to ensure control over the east."
 afu.81.a:0 "We knew Avakov was smart enough to agree."
 afu.82.t:0 "Avakov Refused"
 afu.82.d:0 "Despite the obvious benefit to both of us, Avakov has refused."
 afu.82.a:0 "We can handle it without this fat prick."
 afu.9.t:0 "Victory!"
 afu.9.d:0 "After brutal battles for the Russian-occupied cities in the so-called DPR and LPR territories, we have finally put an end to this bloody conflict in the east once and for all! The separatist forces of Luhansk and Donetsk have been decisively defeated. Even with Ukraine in complete disarray, the Armed Forces of Ukraine stood firm and triumphed against all odds. This is truly a great victory for our nation!"
 afu.9.a:0 "Slava Ukraini! Heroiam slava!"
 afu.10.t:0 "Victory!"
 afu.10.d:0 "Finally, after five years of ongoing conflict, we have achieved our goal. The last separatist units have been defeated, and the glorious Ukrainian flags now fly over Donetsk, Luhansk, and other cities in eastern Donbas. It is hard to believe that we have succeeded. So much blood has been shed, so many lives have been broken, and so many cities have been destroyed... But we won. Once and for all.\n Never again will we allow these Muscovite scum to trespass on our land. We will ensure the region’s security and rebuild what was lost.\n My God, there is still so much to restore and so much to do..."
 afu.10.a:0 "Well, let's get to work, gentlemen."
 afu.11.t:0 "Starting Integration"
 afu.11.d:0 "Over the years, Russian propaganda has manipulated the minds of the locals. Some of them genuinely believe that we crucify children and eat babies... In short, we must address this immediately. It will take a hell of a lot of time and effort, but in the end, we will eradicate this nonsense from the minds of our citizens.\n We can resolve the bureaucratic issues quickly, but the psychological ones... Donbas will need a real course of rehabilitation."
 afu.11.a:0 "Let's get started immediately!"
 afu.12.t:0 "Finishing Integration"
 afu.12.d:0 "Ugh, those were some truly difficult months. We captured all the separatist leaders who hadn’t managed to escape, and the locals have finally begun to realize that they are, indeed, Ukrainians.\n Despite our successes, the full psychological recovery of Donbas is still a long way off — very, very far away. Completing this process, even partially, will take years. But our work isn’t limited to the psychological sphere. Ukraine is still divided and in chaos, and our new goal is to save the entire country, not just Donbas."
 afu.12.a:0 "Forward to new victories!"
 afu.13.t:0 "Territorial Defence Forces"
 afu.13.d:0 "Following the outbreak of conflict in eastern Ukraine in 2014, the Ukrainian Armed Forces recognized the need to establish a local defence force capable of providing security and support in the areas most affected by the fighting. To this end, the Territorial Defence Forces (TDF) were created — a volunteer force composed of local residents who receive basic military training and serve under the command of the Ukrainian Armed Forces.\n The TDF plays a crucial role in protecting Ukraine’s territorial integrity and supporting regular military units. Their responsibilities include guarding key infrastructure, conducting intelligence and surveillance operations, and providing logistical support for military efforts.\n One example of an TDF combat training camp is located near Sloviansk, a city in the Donetsk oblast that has witnessed intense fighting during the conflict. Soldiers at this camp undergo basic military training before advancing to more specialized instruction in areas such as marksmanship, first aid, and tactical maneuvers. They live in barracks-style accommodations and receive a basic allowance for food and other necessities.\n Life in the camp is demanding as soldiers must maintain a high level of fitness and readiness for deployment. They work long hours, with training often beginning early in the morning and lasting late into the night. Despite the hardships, many soldiers view their service in the TDF as a vital duty — an opportunity to defend their homeland and protect their communities from external threats.\n Despite the challenges, TDF soldiers remain dedicated and motivated to serve their country. They understand the important role they play in safeguarding Ukraine’s sovereignty and are willing to make sacrifices to ensure their country remains safe."
 afu.13.a:0 "Glory to Ukraine!"
 afu.14.t:0 "Special Operations Forces"
 afu.14.d:0 "The Special Operations Forces (SSO) are an elite unit within the Armed Forces of Ukraine, trained and equipped to conduct a wide range of high-risk missions, including intelligence gathering, direct action, and counterterrorism operations.\n The SSO were first established in 2014 in response to the conflict in eastern Ukraine. Their primary role is to support regular military units by carrying out reconnaissance, gathering intelligence, disrupting enemy operations, and executing targeted strikes against key enemy positions.\n These highly qualified soldiers undergo rigorous selection and training programmes. They are also equipped them with the latest technology and weaponry, including night vision devices, drones, and specialized vehicles. Their training covers a diverse range of skills, from marksmanship and hand-to-hand combat to advanced medical techniques.\n One of the most prominent deployments of the SSO was during the Battle of Debaltseve in 2015, where they played a crucial role in disrupting enemy operations and supporting regular units defending the city.\n Despite their small numbers, SSO units have proven to be a valueable asset to the Ukrainian Armed Forces. Their specialized skills and adaptability allow them to carry out missions that would be challenging — or even impossible — for regular military units. They also excel in complex environments, such as urban areas or rough terrain, where conventional forces might be at a disadvantage.\n However, the use of SSO units is also associated with risks. Their advanced training and equipment make them a prime target for the enemy, increasing their vulnerability to capture or injury. Additionally, there is a risk of 'mission creep' when Special Forces are used to perform tasks beyond their original mission.\n Overall, the presence of Special Operations Forces in the Ukrainian military has significantly enhanced the country’s defence capabilities. However, their use must be carefully considered, balancing their strategic value against the risks involved."
 afu.14.a:0 "Glory to Ukraine!"
 afu.15.t:0 "Reform of the General Staff"
 afu.15.d:0 "The General Staff of the Armed Forces of Ukraine is responsible for planning and coordinating military operations, as well as overseeing the development and implementation of military policy. In recent years, it has undergone significant reforms aimed at modernizing its structure, enhancing its capabilities, and strengthening its role in national defence.\n One of the key reforms has been the introduction of a new organizational framework, including the creation of several directorates and departments. These additions are designed to improve efficiency by streamlining decision-making, improving communication, and fostering better coordination between different units and branches of the armed forces.\n Another major reform involves the introduction of new training programmes and professional development opportunities for General Staff personnel. These include specialized training in cybersecurity, intelligence analysis, and strategic planning, as well as access to advanced education and leadership courses.\n Overall, the reform of the General Staff represents a crucial step in modernizing Ukraine’s military and enhancing its ability to respond to evolving security challenges. However, further efforts are required to ensure the General Staff is fully prepared to meet the country’s defence needs, especially as Ukraine’s security landscape remains volatile and unpredictable."
 afu.15.a:0 "To the heroes — glory!"
 afu.16.t:0 "The Azov Battalion"
 afu.16.d:0 "The Azov Battalion is a nationalist paramilitary group formed in 2014 to combat Russian-backed separatists in eastern Ukraine. The group is known for its extreme far-right views and has faced accusations of human rights abuses and other crimes. In 2015, it was officially integrated into the Ukrainian Armed Forces as a volunteer unit under government control.\n However, concerns have grown in recent years that the Azov Battalion may be operating with increasing autonomy from the Ukrainian military. This is partly attributed to the rising influence of nationalist and far-right groups in Ukrainian politics, as well as the ongoing security challenges in the country.\n A major issue is the possibility that the battalion is pursuing its own agenda, potentially acting beyond the interests of the Ukrainian state. This has raised fears that its actions could undermine efforts to maintain national stability and security. Additionally, reports of human rights violations, including the mistreatment of prisoners, have led to calls for greater oversight and accountability. Ensuring compliance with international humanitarian and human rights laws remains a key concern.\n Overall, the evolving role of the Azov Battalion presents a complex challenge. While it has played a role in Ukraine’s defense, questions about its conduct and alignment with state authority persist. Addressing these concerns is essential for maintaining the integrity of Ukraine’s security forces and adherence to international norms."
 afu.16.a:0 "Glory to Ukraine?"
 afu.17.t:0 "Planning the Defence"
 afu.17.d:0 "Our intelligence service suggests that the separatist forces are maneuvering and actively preparing to strike us in the near future. The clock is slowly ticking. Our high command has developed a plan for a concentrated and organized defence in key fortified areas, with continuous preparations for a counterattack."
 afu.17.a:0 "Set in motion."
 afu.21.t:0 "Ukrainian reunification"
 afu.21.d:0 "Danilov unite Ukraine"
 afu.21.a:0 "Ok."
 afu.22.t:0 "New leader"
 afu.22.d:0 "Danilov came to power"
 afu.22.a:0 "So..."
 afu.23.t:0 "New leader"
 afu.23.d:0 "Khomutynnik came to power"
 afu.23.a:0 "So..."
 afu.24.t:0 "New leader"
 afu.24.d:0 "Nadiya Savchenko, the former pilot and hero of Ukraine, has once again come to the forefront of the political scene, this time as a frontrunner in the regional elections in Donbas. Savchenko's name has long been associated with her commitment to Ukraine. Her resilience and courage during her imprisonment in Russia have only strengthened her status as a national hero. And now, when her homeland is in danger, Nadiya will be able to prove herself once again and return power to the people, which was taken away by oligarchs and bandits."
 afu.24.a:0 "So..."
 afu.25.t:0 "List of candidates for the elections"
 afu.25.d:0 "So a lot of candidates signed up for the election, but three especially stood out - Oleksiy Danilov, Nadiya Savchenko and Vitaliy Khomutynnyk."
 afu.25.a:0 "Oleksiy Danilov"
 afu.25.b:0 "Vitaliy Khomutynnyk"
 afu.25.c:0 "Nadiya Savchenko"
 afu.26.t:0 "Savchenko's rally"
 afu.26.d:0 "A rally was held in the well-known city of Horlivka, which experienced difficult times during the war in Donbas. Nadiya Savchenko, already known as a heroine and a politician, came to this city to talk to the military and the local population.\nDuring her meeting with the military, Savchenko resorted to populism and cruel promises in an attempt to raise her popularity among the local population and the military. She spoke about strengthening defence capabilities and supporting veterans.\n"Stop relying on the promises of politicians who have proven to be ineffective!" Savchenko called. "It is time for the citizens to determine their own destiny and future!"\nSavchenko's words struck a chord with many soldiers, who saw her as a symbol of the fight for independence and justice. Many soldiers expressed their support for Savchenko because they believed that she could bring improvements to their lives and the situation in the city. Her promises to change the state of affairs and restore peace touched their hearts and encouraged them to act."
 afu.26.a:0 "Ok."
 afu.27.t:0 "Savchenko's rally"
 afu.27.d:0 "In one of her public speeches, Nadiya Savchenko expressed an unconventional idea for restoring and mobilising resources to unite Ukraine. She did so during a community meeting in a small town.\nSpeaking in front of hundreds of people, Savchenko stood on a podium.\n"We must find every possible way to unite our native Ukraine. The idea is that we should give a second chance to those who made mistakes in the past. I propose releasing prisoners who have reformed and are ready to dedicate their lives to uniting our country."\nThis unexpected proposal caused surprise and discussion among the audience. Savchenko explained that prisoners can be useful resources for working on infrastructure projects, restoring and uniting different regions of Ukraine."
 afu.27.a:0 "Ok."
 afu.28.t:0 "Savchenko's rally"
 afu.28.d:0 "For several years now, two old ladies, Hanna and Olia, have been known for their persistence in gossiping at the market in a small village in Donbas. Every day, sitting on their favourite benches, they discuss everything from their neighbours to politicians.\n"Olya, this government will not bring anything good. All those oligarchs and politicians are only thinking about their pockets!"\n"You're right. What have they already done for us? And then there are these wars."\nBut one day, while they were actively discussing the news, they suddenly heard a loud voice from the other end of the market. Loudspeakers in military uniforms stood in front of the village and started talking about Nadiya Savchenko and her political programme.\n"Dear residents, we present Nadiya Savchenko, our heroine, who gave her life for Ukraine on the frontline. She promises to restore peace and order in Donbas and the whole country."\n"Savchenko is fighting for an honest and transparent government, she stands for raising the standard of living for all citizens and for the restoration of justice."\nThese words attracted the attention of not only Hanna and Olya, but all the villagers. The grandmothers, who had previously seemed to never stop chattering about politics, now listened attentively. But after the campaigners finished their speech, Hanna and Olya reflected on the situation.\n"Fuck her and the other chatterboxes. We're not going to be fooled again."\n"That's right, Anna, we should stay away from this politics and focus on our business.""
 afu.28.a:0 "Ok."
 afu.29.t:0 "Savchenko's rally"
 afu.29.d:0 "Nadiya Savchenko has always been known for her independence and scandalous speeches. One day, she decided to go to the military, which was located in one of the frontline locations in Donbas. She was stubborn and stubborn and knew that her speech would cause controversy.\nStanding in front of the soldiers, she opened her speech with passion: "Soldiers of Ukraine, I am speaking to you again, but I am doing so to wake you up! We are here on the front line, but our leaders in Kyiv are doing nothing to improve your conditions and ensure our victory!"\nSavchenko angrily voiced her accusations: "These politicians and authorities have been playing a shameful game with our country. They pretend to be on our side, but they are only playing their own political games. We, the soldiers, are here on the front line, while they are in Kyiv, living their comfortable lives."\nThe soldiers stood in silence, listening to her along with other soldiers. Savchenko continued her speech, calling for change and a way out of this situation.\n"We cannot allow our country to continue to collapse due to the inaction of politicians. We must demand action, we must be the voice of change, and we cannot trust those who promise but do not deliver.""
 afu.29.a:0 "Ok."
 afu.30.t:0 "Savchenko's rally"
 afu.30.d:0 "On that day, Nadiya Savchenko stood in the square. She held a photo of the Verkhovna Rada building in her hands and began her speech with great passion.\n"There were 450 MPs in this building. None of them cared about you, about our country, about our future! They held meetings, voted for laws, but for whom? For themselves, for their own interests!"\nSavchenko continued angrily.\n"We elected them, we believed them, we hoped they would bring prosperity and justice. But what did we get?Embezzlement, corruption, inaction, and war on our own territories!"\nShe paused, giving people time to absorb her words. Then she expressed her main point.\n"We cannot allow this building to continue to destroy our lives. We cannot trust those who promise but do not deliver. We have to change this order of things. We have to take power into our own hands and create the country we want to live in!""
 afu.30.a:0 "Ok."
 afu.31.t:0 "Savchenko's rally"
 afu.31.d:0 "Savchenko once again stood in front of the soldiers on the front line in Donbas. Her voice was filled with determination and demand as she began her speech.\n"Soldiers of the Ukrainian Armed Forces, it is time for decisive action! We cannot allow our country to be divided and conquered by other forces. We need to unite our territory, and we must not shy away from any methods to achieve this goal."\nShe continued with emotion.\n"The Ukrainian Armed Forces must spend all their energy on restoring order and regaining control of our land. We cannot allow our enemies and occupiers to remain on our territories. We must be resolute and uncompromising in defending our rights and freedoms!"\nGathering her courage, Savchenko called out.\n"Let our enemies know that we do not give up! We are worthy of freedom and independence, and we will do everything possible to unite our Ukraine, regardless of the challenges and obstacles on our way. Remember that we are together, and together we will win!""
 afu.31.a:0 "Ok."
 afu.32.t:0 "Savchenko's rally"
 afu.32.d:0 "During her speech to journalists, one of them asked Nadiya Savchenko why she had joined the Yulia Tymoshenko Bloc. Savchenko replied with an expression of determination.\n"I joined the Tymoshenko Bloc because it is the least evil of all the others. But do not think that this means that I support her and other oligarchs!"\nShe then issued another scandalous statement, mocking all oligarchs and politicians.\n"Look at them all, these fat men in expensive suits sitting in the Verkhovna Rada and running their own businesses. They are willing to sell our country for money! This is Kolomoisky, this is Tymoshenko, this is everyone else! They do not represent our interests, they represent their own pockets!"\nSavchenko continued with a more emotional, even harsh tone.\n"We cannot trust these people, we cannot allow them to destroy our country! We must get rid of this corruption, this inaction, this outrage!""
 afu.32.a:0 "Ok."
 afu.33.t:0 "Savchenko's rally"
 afu.33.d:0 "Three children were walking on a hill among the ruins of a former playground in Donetsk. Maksim, Olya and Denis. They were overjoyed, found the remains of an old boar and threw them to each other. At that moment, they heard a strange noise in the sky and looked up.\nAbove them, on a helicopter, they saw a large banner with the words "Sho, vsralisya?". The children looked at this unexpected sight from the sky with their mouths open. Maksym was the first to start. He cheerfully shouted, "Bam, sho, vsralisya!?" Olya and Denis also laughed and joined him, saying the same text.\nTheir laughter and shouts echoed from the ruins of the playground, and soon all the children playing in the area joined in the fun flash mob. Amidst the downpour of laughter and shouts of "Bam, sho, vsralisya!?", the children forgot about the problems around them and the danger that surrounded their world.\nThis moment of joy and laughter became a bright summary of their day and a symbol of the strength that children's cheerful nature can provide even in the most difficult times."
 afu.33.a:0 "Wow."
 afu.34.t:0 "Continuing Military Dictatorship"
 afu.34.d:0 "Democracy has destroyed our country. Miserable elections that simply played into the hands of oligarchs put an end to Ukrainian statehood. Our people have always had a choice between a bunch of clowns who only played populism to make a name for themselves. But that time has come to an end. General Kryvonys, who triumphantly entered Donetsk and Luhansk, thus putting an end to the ATO and separatist thugs, will now take up the task of restoring order in Ukraine. No negotiations with traitors. With blood and sweat, we will regain our country, the freedom of our citizens and the honour of our soldiers. General, took advantage of the situation and announced that now the Provisional Government will fulfil the role of the only rightful heir of Ukraine, and all citizens of Ukraine are obliged to submit to the power of the Armed Forces of Ukraine."
 afu.34.a:0 "Glory to Ukraine!"
 afu.36.t:0 "The Presidential Ultimatum"
 afu.36.d:0 "When peace came to the tumultuous Donbas, a region that had experienced so much suffering, so much pain, and so much bloodshed, the local authorities, who, from the very beginning of the political cataclysm that destroyed Ukrainian statehood, comprising the frontline command of the Ukrainian Armed Forces, after defeating the forces of the separatist quasi-republics, were well aware that as long as the country was in pieces and individuals were fighting for their own sake, no liberation march through all the oblasts would help the situation. For this reason, General Serhiy Kryvonos, the head of the Ukrainian army, together with his cabinet, decided to make what seemed to be the only right decision - to officially support the Ukrainian government of Volodymyr Zelenskyi in Kyiv, still the internationally recognised legitimate leadership of Ukraine. After fully regaining control of the eastern parts of Donetsk and Luhansk oblasts, establishing functioning communications, pacifying militant groups and bringing justice to traitors and enemies of Ukraine, General Kryvonos and his staff agreed to send a letter to the Presidential Office confirming the legitimacy of the Kyiv government and the desire of the Ukrainian Armed Forces field staff to submit to the governing structures in the capital.\n\nThe Zelenskyi's government met this desire with ethereal joy. In a seemingly hopeless situation, surrounded by enemies on all sides, the most capable troops in the entire country decided to swear allegiance to the regime that had basically abandoned them at the very beginning. Efforts immediately began in the capital to unite the military structures directly under the control of the Kyiv authorities and those in the east, in order to eventually jointly manage their operations and fight the country's enemies in an organised manner. Such actions, however, were accompanied by personnel changes. President Zelenskyi, aware of Kryvonos's controversial figure and his ambiguous political sympathies and ambitions, along with his office, did not consider him a trustworthy person to whom he could entrust most of the government's combat-ready units. Even before the great collapse of Ukrainian statehood, he had supported his main opponent, Petro Poroshenko, the virtual originator of the whole ensuing chaos, and despite his swearing-in of the authorities in Kyiv, he still enjoyed neither trust nor popularity among the capital's main politicians. For this reason, it was finally decided to replace him. General Oleksandr Syrskyi, a man whose loyalty was beyond doubt to the Kyiv authorities, was elected as the new head of the interim military administration and, simultaneously, of most units of the Armed Forces.\n\nThe process was dragging on. While the headquarters in the east resisted personnel changes and often not only refused but also called for the rest of the government forces to adapt to the new military standards introduced by the battle-experienced leadership, the capital tried to gain as much support as possible for Syrskyi among the soldiers and limit the powers of Kryvonos and his interim cabinet. Progress was slow, yet fruitful. As a result, one rainy afternoon, General Kryvonos arrived at his office, accompanied by his advisers, to receive a letter from Kyiv. No one knew for sure what it was that the president himself had sent since most of the orders had previously come from the commander-in-chief or the minister of defence. The general sat down in his chair, which had been moved from the office of the traitor Denis Pushylin in Donetsk, and which Kryvonos had found during the triumphant recapture of the city, and decided to keep it as a trophy of sorts. And it's no wonder, upholstered in leather, and most likely from more than one species, this chair looked like something worth a lot of money, and its comfort was just extraordinary, a pity to throw it away or leave it gathering dust in a warehouse. He took an envelope knife from his desk drawer, picked up a letter and cut the cover. Opening the letter, he pulled out a folded document with the presidential seal and the inscription "Decree of the President of Ukraine on the appointment of Oleksandr Syrskyi...". He did not proceed to continue reading. He laid the document on the table and froze. His subordinate, Warrant Officer Klymenko, frightened by his commander's reaction, which he had never seen before, took the document from the table and decided to read it out loud: "In connection with personnel changes during the reintegration of the eastern military units of the country with the rest of the Armed Forces of Ukraine, I hereby order the replacement of General Serhiy Kryvonos as the head of the Temporary Military Administration of Eastern Ukraine with General Oleksandr Syrskyi." Klymenko and the others in the room froze as well. After a moment of silence, General Kryvonos broke it with the words: "Uh, bitch". Everyone present continued to stand in silence. After Kryvonos picked up the letter again and read its contents himself, he ordered to leave his office and prepare a letter to Kyiv confirming the adoption of the decree and its implementation. The general responded harshly to the worried words of his subordinates: "If the government wants it, so be it". After his colleagues left, Kryvonos returned to his chair. Using another drawer, the bottom one on the left, he took out a glass and a bottle of bourbon. Pouring himself an almost full shot, he gulped it down in one go and looked out the window, keeping his eyes on the flags of the Armed Forces and Ukraine, which were waving a few metres away..."
 afu.36.a:0 "If Kyiv wants Syrskyi, it will get Syrskyi."
 
 ## AFU ELECTIONS
 AFU_elections_category:0 "Elections"
 AFU_elections_category_desc:0  "As we open the door, we find ourselves in the centre of a new history, where the decision of every citizen has a decisive impact on the future of this country. After the proclamation of the Provisional Government of Donetsk and Luhansk regions and overcoming the difficulties in Donbas, the country began to face new challenges.\nIn this context, the elections were a key moment in shaping Ukraine's future. Three prominent candidates - Oleksiy Danilov, an independent, Nadiya Savchenko of the NGP and Vitaliy Khomutynnyk of the Vidrodzhennya party - have entered the political arena offering their own visions of the future.\nThese elections will be a defining moment where Ukrainian citizens will choose not only a leader, but also the future trajectory of their country - peaceful restructuring, a harsh military response or a focus on economic recovery. Let's take a closer look at the candidates and their programmes to understand how these elections could shape the face of a new Ukraine."
 
