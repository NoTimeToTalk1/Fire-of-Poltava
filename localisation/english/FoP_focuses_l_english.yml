l_english:
 #DONETSK FOCUSES
 DPR_situation_in_ukraine:0 "Situation in Ukraine"
 DPR_situation_in_ukraine_desc:0 "We will need to send a group of specialised scouts that should be able to pass the blockade of the Ukrainian Military Junta to check on the situation in Ukraine. We need to have latest information, so that we can find allies."
 DPR_situation_in_our_nation:0 "Situation in Our Nation"
 DPR_situation_in_our_nation_desc:0 "Stability is important, and in order to make sure the Ukrainian Nazies don't ruin the State, we will need to keep eye on every citizen and suppress any protests. A state is weak when people are disunited."
 DPR_look_around_us:0 "Look Around Us"
 DPR_look_around_us_desc:0 "Look Around Us"
 DPR_look_west:0 "Look West"
 DPR_look_west_desc:0 "The Ukrainian regime has fallen. But the brave sons of Donbass must realize that it's not the end because victory is not yet achieved. The Armed Forces of Ukraine remain. They continue to fight for the regime that no longer exists, but in that fight, we may suffer the most! We will do everything to bury the concept of Ukraine. Or we will perish trying to do so."
 DPR_open_old_warehouses:0 "Open the Old Warehouses"
 DPR_open_old_warehouses_desc:0 "Some time ago, gods built concrete and steel warehouses filled with all sorts of weaponry and locked the door so that no one could get it. It is time to open these doors, because we need arms to protect the state, especially from Ukrainians."
 DPR_strengthen_the_propaganda:0 "Strengthen the Propaganda"
 DPR_strengthen_the_propaganda_desc:0 "Not everyone in our country is a citizen who wants to help the state. There is a growing minority of people who want to destroy Donetsk People's Republic, and we shall use all possible tactics to ensure that they don't get the power to do so."
 DPR_mobilize_youth_and_reserves:0 "Mobilize the Youth and Reserves"
 DPR_mobilize_youth_and_reserves_desc:0 "If our children are taught anti-state propaganda, they are no longer our children. We need to introduce state-mandated lessons in every school so that our children grow up to be patriots of their state, who will serve and protect it."
 
 DPR_look_north:0 "Look North"
 DPR_look_north_desc:0 "The LPR is probably our greatest friend in the current situation. We may have differences or disagreements, but we are all together in this Novorossiyan boat! If we don't help each other, how much better are we than Ukrainians? We must ensure military and national cooperation between brotherly republics because the defence of Donbass is our God-given mission! Forward!"
 DPR_remember_novorossiya:0 "Remember Novorossiya"
 DPR_remember_novorossiya_desc:0 "We must unite in a single union, that would bind the Southeastern states. We should remember this confederation because this is our goal. If we can, of course. To do this, we have to prepare to defend Donetsk, as there are people who want to destroy it all, destroy the dream of Novorossiya."
 DPR_set_aside_our_differences:0 "Set Aside Our Differences"
 DPR_set_aside_our_differences_desc:0 "Like any good colleagues, we have our differences. But how important are they on a global scale? How significant are they in the face of danger for both of us? We are the sons of Donbass! We must stand united to withstand the inevitable enemy, it's now or never!"
 DPR_unite_with_lpr:0 "Unite With LPR"
 DPR_unite_with_lpr_desc:0 "We are too divided and the defence pact is not enough to unite us against the Ukrainian Military Junta. We must unite as a single free nation that will move forward together and defeat Goliath, who only wants to see Donetsk and Luhansk destroyed."
 
 DPR_look_east:0 "Look East"
 DPR_look_east_desc:0 "Putin has been called many things. A Politician. A Leader. A Fighter. But for us, it's simple - he is a Father. He, like everyone else, demands loyalty and respect from us, and in return, he gives us material and humanitarian aid, leads us into the future, and guides us on the right path to become a powerful nation side-by-side with Two-headed Eagle! We shall ask for his help, because right now we need it most, and who else would help us if not Mother Russia?"
 DPR_request_russian_equipment:0 "Request the Russian Equipment..."
 DPR_request_russian_equipment_desc:0 "They have gotten our message and gladly responded to our call for help. We asked them for good equipment that could be used by the military, as we aren't int the best position to produce our own."
 DPR_and_volunteers:0 "...and Volunteers"
 DPR_and_volunteers_desc:0 "They also have offered to send in some... volunteers. We have accepted the offer just in case, as we are quite weak, but don't worry, we will definitely become strong and independent."
 DPR_supplement_our_corps:0 "Supplement Our Corps"
 DPR_supplement_our_corps_desc:0 "We need to send the newly received equipment to the military. Every soldier must have the right weapons, supplies and any possible extras. We cannot afford to make a mistake with this, so we must be careful, otherwise, we will pay the consequences..."
 DPR_test_their_strengh:0 "Test Their Strengh"
 DPR_test_their_strengh_desc:0 "We cannot be sure that the Ukrainian Military Junta isn't planning an invasion, so instead we must prepare the united armies to go against the Ukrainians. We will need to reorganise the logistics, mobilise soldiers and hand out weaponry. It will be a gruelling preparation, but at last, we will strike down the terrorists."
 DPR_put_an_end_to_ukrainian_army:0 "Put an End to the Ukrainian Army!"
 DPR_put_an_end_to_ukrainian_army_desc:0 "Our soldiers are waiting impatiently, tanks are pumping CO2 into the air and planes are standing by, waiting for the take-off order. "Go!", the officers shout. The time has come for a showdown between our glorious army, with Russian volunteers by our side, against the Ukrainians who have terrorised us for years. The time has come for a second war for independence."
 DPR_victory:0 "Victory at Last"
 DPR_victory_desc:0 "Victory is here! Ura! We have officially avenged every fallen brother and partially repeated our grandfathers' greatest victory in 1945! What remains of AFU runs away in fear elsewhere, seeing the sheer power of the Russian spirit. And while this is a huge milestone for us, without a doubt, there is still a lot to be done to reintegrate the region back."
 DPR_start_integration:0 "Start the Integration"
 DPR_start_integration_desc:0 "Donbass, though now under our control, is fairly bleeding. There is a ton of things that are needed to be done - from simply rebuilding the houses to reinforcing our new political system in the region and strengthening our grip over the opposition. The hardest was already done, now it's time for us to heal Novorossiya!"
 DPR_passportization_programme:0 "Passportization Programme"
 DPR_passportization_programme_desc:0 "People that lived in the Ukrainian-occupied zones had their passports and documentation from the according country, which are treated like nothing but paper now. We must help those poor people to integrate into our new management - we will start massive passportisation in exchange for Ukrainian ones."
 DPR_party_integration:0 "Integration of the Local Parties"
 DPR_party_integration_desc:0 "Ukrainian-occupied part of Donbass, ever since the war stalemate in 2015, has been home to many local pro-Russian political parties. This was perhaps the only region in Ukraine where they got any significant momentum, as shown by the 2019 election results - only Donetsk and Luhansk regions have voted for Boyko. Now, it is time to integrate our local allies into our political system."
 DPR_increase_patriotism:0 "Propaganda Effort"
 DPR_increase_patriotism_desc:0 "The integral part of reintegrating the people of Donbass - is to win their hearts. And though, fairly speaking, a lot of those who lived in the Ukrainian part was already pro-Russian politically, it will not hurt to kickstart the propaganda machine, and let everyone know - Novorossiya is here forever! Ura!"
 DPR_unite_communications:0 "Unite the Communications"
 DPR_unite_communications_desc:0 "During the five years of the "frozen conflict", our infrastructure has become more like a pile of leaky scrap metal. Roads are covered with deep pits, railway tracks have been stripped to the metal, and water and gas pipelines have been rusting since the beginning of the conflict, and that's not all. This picture can be seen throughout Donbass. To make matters worse, the junta has deliberately cut off communication routes between the eastern and western regions of our country. But we won. We are united. Nothing stands in our way anymore. It's time to put an end to the logistical problems and move forward at a steady pace into a brighter future. We will allocate as much money from the state budget as necessary and repair everything that has been destroyed or damaged."
 DPR_promise_the_future:0 "Promise the Future"
 DPR_promise_the_future_desc:0 "For five years we have been thinking about what Donbass will look like after our victory. The situation at the time only allowed us to dream about it, but now, after our victory, we finally have the opportunity to implement everything we wanted. We made tons of promises to the people about the future, and we must fulfil them. From higher wages to free healthcare. We will prove that our words were and are valid."
 DPR_tribunal:0 "The Great Trial"
 DPR_tribunal_desc:0 "Our glorious army crushed the damn Nazi bastards. Now they will pay for all their crimes against the people and land of Donbass. Most of the Junta's military leadership was captured, but unfortunately, some managed to escape. But most importantly, we have Kryvonos, who was too arrogant to abandon his post and escape. He will serve as an example to all those awaiting sentencing. They will all pay. All of them! For our children and parents, they will all die or rot in basements!"
 DPR_finish_integration:0 "End the Integration"
 DPR_finish_integration_desc:0 "Everything is ready. Finally. After our glorious victory in the bureaucracy, hell broke loose, but we overcame it. All the papers are ready. Novorossiya will now administratively own all the lands of Donbas. The Russians, who rightfully own this land, will once again regain their power there. The President only has to sign the relevant document. Oh, look, it's already happening!"
 DPR_elections:0 "Election Day!"
 DPR_elections_desc:0 "The day has come. With the integration of the western regions complete, we have one last big thing to do. The election of the Head of State. Today, from all over Donbass, the capital will receive tonnes of bills with the names of candidates. We will see who will win..."
