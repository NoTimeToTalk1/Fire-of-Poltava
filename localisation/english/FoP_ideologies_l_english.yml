 stratocracy:0 "Stratocracy"
 stratocracy_desc:0 "Stratocracy is a political ideology that is characterized by the rule of a group of military officers. This group of military officers typically maintains control over the government, often through the use of force, and may limit civil liberties and political freedoms in order to maintain their power."
 navy_stratocracy:0 "Stratocracy"
 navy_stratocracy_desc:0 "Stratocracy is a political ideology that is characterized by the rule of a group of military officers. This group of military officers typically maintains control over the government, often through the use of force, and may limit civil liberties and political freedoms in order to maintain their power."
 russian_stratocracy:0 "Stratocracy"
 russian_stratocracy_desc:0 "Stratocracy is a political ideology that is characterized by the rule of a group of military officers. This group of military officers typically maintains control over the government, often through the use of force, and may limit civil liberties and political freedoms in order to maintain their power."
 absolutism:0 "Absolutism"
 absolutism_desc:0 "Absolutism is a political doctrine and practice of unlimited centralized authority and absolute sovereignty, as vested especially in a monarch or dictator."
 post_soviet_bureaucracy:0 "Post-Soviet Bureaucracy"
 post_soviet_bureaucracy_desc:0 "Post-Soviet bureaucracy is a political ideology, that has emerged in many former Soviet countries. It is characterized by a centralized and authoritarian form of governance, with a strong emphasis on bureaucratic control and management."
 
 national_democracy:0 "National Democracy"
 national_democracy_desc:0 "National Democracy"
 national_liberalism:0 "National Liberalism"
 national_liberalism_desc:0 "TBD"
 national_conservatism:0 "National Conservatism"
 national_conservatism_desc:0 "National Сonservatism is a nationalist variant of conservatism that concentrates on upholding national and cultural identity. National conservatives usually combine nationalism with conservative stances promoting traditional cultural values, family values, and opposition to immigration. In Europe, most National Conservatist parties embrace some form of Euroscepticism."
 national_populism:0 "National Populism"
 national_populism_desc:0 "TBD"
 
 ultranationalism:0 "Ultranationalism"
 ultranationalism_desc:0 "Ultranationalism"
 social_nationalism:0 "Social Nationalism"
 social_nationalism_desc:0 "Social Nationalism is a political ideology based on the idea of the nation as the optimal form of existence of human society, a radical form of nationalism. At the same time, "nation" means a self-sufficient blood-related hierarchical human community — an ethnic community with a single language and self-awareness of national identity, which embodies freedom and justice for its members."
 russian_nationalism:0 "TBD"
 russian_nationalism_desc:0 "TBD"
 neofascism:0 "Neo-Fascism"
 neofascism_desc:0 "TBD"
 neonazism:0 "Neo-Nazism"
 neonazism_desc:0 "Neo-Nazism comprises the post–World War II militant, social, and political movements that seek to revive and reinstate Nazi ideology. Neo-Nazis employ their ideology to promote hatred and racial supremacy, attack racial and ethnic minorities, and in some cases to create a fascist state."
 national_bolshevism:0 "National Bolshevism"
 national_bolshevism_desc:0 "TBD"
 neoeurasianism:0 "Neoeurasianism"
 neoeurasianism_desc:0 "TBD"
 esoteric_traditionalism:0 "Esoteric Traditionalism"
 esoteric_traditionalism_desc:0 "Esoteric Traditionalism is a combination of mystical theories and traditionalist ideas and dogmas. Focusing on the preservation of the heritage of their ancestors, its adherents also returned to the concept of polytheism. Its Slavic variant aims to restore the status of Slavic paganism as the dominant faith and to preserve and continue both regional and folk customs."
 satanism:0 "Satanism"
 satanism_desc:0 "TBD"
 
 oligarchism:0 "Oligarchism"
 oligarchism_desc:0 "Oligarchism"
 plutocracy:0 "Plutocracy"
 plutocracy_desc:0 "A plutocracy is a society that is ruled or controlled by people of great wealth or income."
 kleptocracy:0 "Kleptocracy"
 kleptocracy_desc:0 "Kleptocracy is a government, whose corrupt leaders use political power to appropriate the wealth of the people and land they govern, typically by embezzling or misappropriating government funds at the expense of the wider population."
 corporatocracy:0 "Corporatocracy"
 corporatocracy_desc:0 "Corporatocracy is a term used to refer to an economic, political, and judicial system controlled by corporations or corporate interests."
 
 
 
 
 
 
 technocracy:0 "Technocracy"
 technocracy_desc:0 "Technocracy is a form of government in which the decision-makers are selected based on their expertise in a given area of responsibility, particularly with regard to scientific or technical knowledge."
 