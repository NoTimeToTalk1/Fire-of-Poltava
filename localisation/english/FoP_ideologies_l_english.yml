l_english:
 communism:0 "Communism"
 communism_desc:0 "Communist"
 communism_noun:0 "Communism"
 marxism_leninism:0 "Marxism-Leninism"
 marxism_leninism_desc:0 "Marxism-Leninism is an extreme left-wing ideology that emerged in the 20th century as a Russian version of Marxism modified by Lenin and later by Stalin. With signs of totalitarianism, it became the state doctrine of the USSR and its ruling Communist Party. After World War II, most of the world's communist movements adopted doctorates of Marxism-Leninism. The main goal for its proponents is to change the world capitalist order through a revolution of the "working class", but to fulfil its historical mission, it needs a "vanguard" - a "new type" Communist Party characterized by rigid centralism."
 national_communism:0 "National Communism"
 national_communism_desc:0 "National Communism refers to the various forms in which Marxism-Leninism and Socialism have been adopted or implemented by leaders in different countries using aspects of nationalism or national identity to form a policy independent from communist internationalism."
 market_socialism:0 "Market Socialism"
 market_socialism_desc:0 "The term Market Socialism has been used to refer to reformed economic systems in Marxist–Leninist states, that adopt elements of market economics as a means to foster growth using foreign direct investment and to increase productivity."
 
 socialism:0 "Socialism"
 socialism_desc:0 "Socialist"
 socialism_noun:0 "Socialism"
 democratic_socialism:0 "Democratic Socialism"
 democratic_socialism_desc:0 "Democratic Socialism is political ideology that supports the establishment of a democratically run and decentralized form of socialist economy. Modern democratic socialists vary widely in their views of how a proper socialist economy should function, but all share the goal of abolishing capitalism rather than improving it through state regulation (as preferred by social democrats)."
 anarchist_communism:0 "Anarcho-Communism"
 anarchist_communism_desc:0 "Anarcho-Communism is a political philosophy and anarchist school of thought which advocates the abolition of the state, capitalism, wage labor, social hierarchies, and private property (while retaining respect for personal property, along with collectively-owned items, goods, and services) in favor of common ownership of the means of production and direct democracy as well as a horizontal network of workers' councils."
 anarchist_syndicalism:0 "Anarcho-Syndicalism"
 anarchist_syndicalism_desc:0 "Syndicalism is a movement that advocates direct action by the working class to abolish the capitalist order, including the state, and to establish in its place a social order based on workers organized in production units." 
 christian_socialism:0 "Christian Socialism"
 christian_socialism_desc:0 "Christian Socialism is a religious and political philosophy that blends Christianity and Socialism, endorsing socialist economics on the basis of the Bible and the teachings of Jesus."
 agrarian_socialism:0 "Agrarian Socialism"
 agrarian_socialism_desc:0 "Agrarian Socialism or agricultural socialism is a political ideology that promotes social ownership of agrarian and agricultural production as opposed to private ownership, with equal distribution of agricultural land among collectivized peasant villages."
 
 social_democracy:0 "Social Democracy"
 social_democracy_desc:0 "Social Democratic"
 social_democracy_noun:0 "Social Democracy"
 reformism:0 "Reformism"
 reformism_desc:0 "Reformism is a political tendency advocating the reform of an existing system or institution – often a political or religious establishment – as opposed to its abolition and replacement via revolution. Within the socialist movement, reformism is the view that gradual changes through existing institutions can eventually lead to fundamental changes in a society's political and economic systems."
 social_conservatism:0 "Social Conservatism"
 social_conservatism_desc:0 "Social Conservatism is the belief that society is built upon a fragile network of relationships which need to be upheld through duty, traditional values and established institutions. In Ukrainian politics, Social Conservatism is most often combined with Russophilia."
 left_agrarianism:0 "Left Agrarianism"
 left_agrarianism_desc:0 "Left Agrarianism takes the idea of a social and political philosophy that advocates for rural development, a rural agricultural lifestyle, family farming, widespread property ownership, and political decentralization, while mixing it with general left ideas, such as equality and left economy."
 left_populism:0 "Left Populism"
 left_populism_desc:0 "Left Populism is a political ideology that combines left-wing politics with populist rhetoric and themes. Its rhetoric often consists of anti-elitism, opposition to the Establishment, and speaking for the 'common people'."
 
 progressivism:0 "Progressivism"
 progressivism_desc:0 "Progressivist"
 progressivism_noun:0 "Progressivism"
 social_liberalism:0 "Social Liberalism"
 social_liberalism_desc:0 "Social liberalism is a political philosophy and variety of liberalism that endorses social justice, social services, a mixed economy, and the expansion of civil and political rights, as opposed to classical liberalism which favors limited government and an overall more laissez-faire style of governance."
 progressive_liberalism:0 "Progressive Liberalism"
 progressive_liberalism_desc:0 "Progressive Liberalism is a variety of liberalism, which emphasize mainly on issues of the sexual and ethnic minorities, while also maintaining classic liberal values such as freedom of speech and civil liberties."
 ecopolitics:0 "Ecopolitics"
 ecopolitics_desc:0 "Ecopolitics is a political ideology that aims to foster an ecologically sustainable society rooted in environmentalism, nonviolence, social justice and grassroots democracy."
 
 centrism:0 "Centrism"
 centrism_desc:0 "Centrist"
 centrism_noun:0 "Centrism"
 pragmatism:0 "Pragmatism"
 pragmatism_desc:0 "Pragmatism is a philosophical tradition that views language and thought as tools for prediction, problem solving, and action, rather than describing, representing, or mirroring reality. Taking it into political plane, pragmatism describe policies, which only view the usefulness of them for the state."
 big_tent:0 "Big Tent"
 big_tent_desc:0 "'Big Tent' represents a political party, which harbours many various views and beliefs inside, making it impossible to distinguish one certain ideology for it."
 solidarism:0 "Solidarism"
 solidarism_desc:0 "Solidarism represents an awareness of shared interests, objectives, standards, and sympathies creating a psychological sense of unity of groups or classes. Solidarism does not reject individuals and sees individuals as the basis of society. It refers to the ties in a society that bind people together as one."
 anomalycentrism:0 "Anomalycentrism"
 anomalycentrism_desc:0 "Anomalycentrism is an idea, which was born on the lands of Chornobyl Exclusion Zone. Since some turn of events, the Zone became a shelter for various groups of people, who have different views and beliefs. Anomalycentrism protects that form of society, offering the world a new type of society, involved at limited piece of land and harbouring variety of politics."
 europeanism:0 "Europeanism"
 europeanism_desc:0 "Europeanism is a political position that favours European integration and membership of the European Union."
 
 liberalism:0 "Liberalism"
 liberalism_desc:0 "Liberal"
 liberalism_noun:0 "Liberalism"
 neoliberalism:0 "Neoliberalism"
 neoliberalism_desc:0 "Neoliberalism is contemporarily used to refer to market-oriented reform policies such as "eliminating price controls, deregulating capital markets, lowering trade barriers" and reducing, especially through privatization and austerity, state influence in the economy. Neoliberalism is distinct from classical liberalism insofar as it does not advocate laissez-faire economic policy but instead is highly constructivist and advocates a strong state to bring about market-like reforms in every aspect of society."
 conservative_liberalism:0 "Conservative Liberalism"
 conservative_liberalism_desc:0 "Conservative Liberalism is a variant of liberalism combining liberal values and policies with conservative stances, or simply representing the right wing of the liberal movement."
 classical_liberalism:0 "Classical Liberalism"
 classical_liberalism_desc:0 "Classical Liberalism is a political tradition and a branch of liberalism that advocates free market and laissez-faire economics and civil liberties under the rule of law, with special emphasis on individual autonomy, limited government, economic freedom, political freedom and freedom of speech."
 libertarianism:0 "Libertarianism"
 libertarianism_desc:0 "Libertarianism is a political philosophy, that upholds liberty as a core principle. Libertarians seek to maximize autonomy and political freedom, emphasizing free association, freedom of choice, individualism, and voluntary association."
 
 conservatism:0 "Conservatism"
 conservatism_desc:0 "Conservative"
 conservatism_noun:0 "Conservatism"
 liberal_conservatism:0 "Liberal Conservatism"
 liberal_conservatism_desc:0 "Liberal Conservatism is a political ideology combining conservative policies with liberal stances, especially on economic issues but also on social and ethical matters, representing a brand of political conservatism strongly influenced by liberalism."
 progressive_conservatism:0 "Progressive Conservatism"
 progressive_conservatism_desc:0 "Progressive Conservatism is a political ideology that aims to modernize traditional conservative principles by incorporating a strong commitment to social reform and equality. It seeks to address contemporary societal issues while maintaining core conservative values."
 christian_democracy:0 "Christian Democracy"
 christian_democracy_desc:0 "Christian Democracy is a political movement that has a close association with Roman Catholicism and its philosophy of social and economic justice. It incorporates both traditional church and family values and progressive values such as social welfare."
 islamic_democracy:0 "Islamic Democracy"
 islamic_democracy_desc:0 "Islamic Democracy is a movement, that represents the implementation of islamic practices and philosophy under the rule of democratic institution, such as elected government, freedom of speech and secularism."
 agrarianism:0 "Agrarianism"
 agrarianism_desc:0 "Agrarianism is a political and social philosophy that has promoted subsistence agriculture, smallholdings, egalitarianism, with agrarian political parties normally supporting the rights and sustainability of small farmers and agricultural workers against the wealthy in society."
 right_populism:0 "Right-Wing Populism"
 right_popilism:0 "Right-Wing Populism is a political ideology that combines right-wing politics with populist rhetoric and themes. Its rhetoric employs anti-elitist sentiments, opposition to the Establishment, and speaking to or for the common people."
 
 national_democracy:0 "National Democracy"
 national_democracy_desc:0 "National Democratic"
 national_democracy_noun:0 "National Democracy"
 national_liberalism:0 "National Liberalism"
 national_liberalism_desc:0 "National Liberalism is a variant of liberalism, combining liberal policies and issues with elements of nationalism."
 national_conservatism:0 "National Conservatism"
 national_conservatism_desc:0 "National Conservatism is a nationalist variant of conservatism that concentrates on upholding national and cultural identity. National conservatives usually combine nationalism with conservative stances promoting traditional cultural values, family values, and opposition to immigration. In Europe, most National Conservatist parties embrace some form of Euroscepticism."
 national_populism:0 "National Populism"
 national_populism_desc:0 "National Populism is a political ideology that combines right-wing politics with populist rhetoric and themes. Its rhetoric employs anti-elitist sentiments, opposition to the Establishment, and speaking to or for the common people."
 
 traditionalism:0 "Traditionalism"
 traditionalism_desc:0 "Traditionalist"
 traditionalism_noun:0 "Traditionalism"
 traditional_conservatism:0 "Traditional Conservatism"
 traditional_conservatism_desc:0 "Traditionalist Conservatism is a political and social philosophy that emphasizes the importance of transcendent moral principles, manifested through certain posited natural laws to which it is claimed society should adhere."
 paternal_conservatism:0 "Paternal Conservatism"
 paternal_conservatism_desc:0 "Paternalistic Conservatism is a strand of conservatism which reflects the belief that societies exist and develop organically and that members within them have obligations towards each other."
 christian_fundamentalism:0 "Christian Fundamentalism"
 christian_fundamentalism_desc:0 "Christian Fundamentalism is a religious movement emphasizing biblical literalism. Fundamentalists are almost always described as upholding beliefs in biblical infallibility and biblical inerrancy, in keeping with traditional Christian doctrines concerning biblical interpretation, the role of Jesus in the Bible, and the role of the church in society."
 islamism:0 "Islamism"
 islamism_desc:0 "Islamism is a range of religious and political ideological movements that believe that Islam should influence political systems. Its proponents believe Islam is innately political, and that Islam as a political system is superior to communism, liberal democracy, capitalism, and other alternatives in achieving a just, successful society.  Islamists support family values, sharia, the reformation of interest-based finance, and the broad Quranic command of 'enjoining goodness and forbidding evil.'"
 monarchism:0 "Monarchism"
 monarchism_desc:0 "Monarchism is a socio-political movement whose goal is the establishment, preservation or restoration of the monarchical rule in a state."
 
 authoritarianism:0 "Authoritarianism"
 authoritarianism_desc:0 "Authoritarian"
 authoritarianism_noun:0 "Authoritarianism"
 paternalism:0 "Paternalism"
 paternalism_desc:0 "Paternalism is an ideology that limits a person's or group's liberty or autonomy and is intended to promote their own good. Paternalism can also imply that the behavior is against or regardless of the will of a person, or also that the behavior expresses an attitude of superiority."
 absolutism:0 "Absolutism"
 absolutism_desc:0 "Absolutism is a political doctrine and practice of unlimited centralized authority and absolute sovereignty, as vested especially in a monarch or dictator."
 post_soviet_bureaucracy:0 "Post-Soviet Bureaucracy"
 post_soviet_bureaucracy_desc:0 "Post-Soviet bureaucracy is a political ideology, that has emerged in many former Soviet countries. It is characterized by a centralized and authoritarian form of governance, with a strong emphasis on bureaucratic control and management."
 
 ultranationalism:0 "Ultranationalism"
 ultranationalism_desc:0 "Ultranationalist"
 ultranationalism_noun:0 "Ultranationalism"
 social_nationalism:0 "Social Nationalism"
 social_nationalism_desc:0 "Social Nationalism is a political ideology based on the idea of the nation as the optimal form of existence of human society, a radical form of nationalism. At the same time, "nation" means a self-sufficient blood-related hierarchical human community — an ethnic community with a single language and self-awareness of national identity, which embodies freedom and justice for its members."
 russian_nationalism:0 "Russian Nationalism"
 russian_nationalism_desc:0 "Russian Nationalism is a Russian political ideology, which was derived from nostalgia predominantly over Russian Empire and White Army movement, and resentment towards countries, which opposed Russia during history."
 neofascism:0 "Neo-Fascism"
 neofascism_desc:0 "Neo-Fascism is a political ideology, born after World War II, which includes many elements of fascism and opposes modern world establishment. Though, allegiance of groups, who are claimed to be neo-fascists, to this ideology might be strongly contested."
 neonazism:0 "Neo-Nazism"
 neonazism_desc:0 "Neo-Nazism comprises the post–World War II militant, social, and political movements that seek to revive and reinstate Nazi ideology. Neo-Nazis employ their ideology to promote hatred and racial supremacy, attack racial and ethnic minorities, and in some cases to create a fascist state."
 national_bolshevism:0 "National Bolshevism"
 national_bolshevism_desc:0 "National-bolshevism is a political ideology which combines ultranationalism with bolhevik communism. National-bolsheviks embrace nazi theories and combine it with bolshevism elements, such as class war and red terror."
 neoeurasianism:0 "Neoeurasianism"
 neoeurasianism_desc:0 "Neoeurasianism is a political theory, created by a Russian far-right philosopher Aleksandr Dugin. Neoeurasianism states, that Eurasian continent should be united into one superstate with Russia in it's core, eradicating European culture and identity, while embracing alliances with 'non-white civilizations'."
 
 esotericism:0 "Esotericism"
 esotericism_desc:0 "Esoteric"
 esotericism_noun:0 "Esotericism"
 neopaganism:0 "Esoteric Traditionalism"
 neopaganism_desc:0 "Esoteric Traditionalism is a combination of mystical theories and traditionalist ideas and dogmas. Focusing on the preservation of the heritage of their ancestors, its adherents also returned to the concept of polytheism. Its Slavic variant aims to restore the status of Slavic paganism as the dominant faith and to preserve and continue both regional and folk customs."
 satanism:0 "Satanism"
 satanism_desc:0 "Satanism is a group of various beliefs, embracing and worshiping Satan, also mentioned as Devil in christianity, a fallen angel, who tempt humans into sin, with other demons, mentionied in The Bible."
 
 oligarchism:0 "Oligarchism"
 oligarchism_desc:0 "Oligarchic"
 oligarchism_noun:0 "Oligarchism"
 plutocracy:0 "Plutocracy"
 plutocracy_desc:0 "A plutocracy is a society that is ruled or controlled by people of great wealth or income."
 kleptocracy:0 "Kleptocracy"
 kleptocracy_desc:0 "Kleptocracy is a government, whose corrupt leaders use political power to appropriate the wealth of the people and land they govern, typically by embezzling or misappropriating government funds at the expense of the wider population."
 corporatocracy:0 "Corporatocracy"
 corporatocracy_desc:0 "Corporatocracy is a term used to refer to an economic, political, and judicial system controlled by corporations or corporate interests."
 
