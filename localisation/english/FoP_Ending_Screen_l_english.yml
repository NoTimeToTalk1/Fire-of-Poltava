### Warlord information ###
Ending_Screen_Tab_Name_1: "Finale"
# Donbas
 
 FOP_Ending_Screen_Content: "Finale"
 FOP_Ending_Screen_Content_Desc: "The dust finally settles down. You've achieved the end of the journey. Congrats! You can check the credits, if you want to know about the dev team."
 FOP_Ending_Screen_Azov_Desc: "The Ukrainian Nation and State stand victorious. Standing under the banner of nationalism and defeating Russia... Ukraine has never achieved such a triumph. With the worst Ukrainian enemy falling down, Ukrainian nation will live on for generations, being ruled by the best of it..."
 FOP_Ending_Screen_Kryvonos_Desc: "Ukraine was successfuly reunited. Standing victorious, Kryvonos government has succeeded in bringing order to Ukraine. Without the politicians ripping apart the Ukrainian state, it will live on as a state with powerful military and no hint of unstable rule."
 FOP_Ending_Screen_Danilov_Desc: "Ukraine was successfuly reunited. Oleksiy Danilov has brought peace to once ruined country, ensuring that Ukraine will continue it's existence as a democratic country with civil liberties and European values, standing independent and prosperous."
 FOP_Ending_Screen_Khomut_Desc: "Ukraine was successfuly reunited. Vitaliy Khomutynnik has finally brought peace to Ukraine, placing Ukrainian people at the first place, without discrimination and quarrels taking place. Using the connections and some shady deals, Khomutynnik managed to secure his country."
 FOP_Ending_Screen_Savchenko_Desc: "Ukraine was successfuly reunited. Nadiya Savchenko has brought peace and order to Ukranian people, standing on the platform of building a welfare state with ruthless elimination of the old oligarchy system. The dream many in Ukraine wanted to come..."
 FOP_Ending_Screen_Pidor_Desc: "Novorossiya stands proud. Under the guidance of Denis Pushilin, it managed not only to secure it's existence, but to eliminate any attempts for old Ukraine to be reanimated as well. Those, who associate themselves with Russians, would never get such a pyrhic victory anytime else, costing the life of the Ukrainian state and nationhood."
 FOP_Ending_Screen_Huy_Desc: "Novorossiya stands proud. Under the guidance of Leonid Pasechnik, Novorossiya has managed to secure it's existence as an independent state, getting into the world of politics as a completely new player. The newly formed nation will have to face the many challenges ahead."
 FOP_Ending_Screen_Vitrenko_Desc: "Ukraine was successfuly reunited. Under the rule of the socialist Nataliya Vitrenko, it has transformed into a multicultural federation, standing on the principles of old communist times, when everything was cheap and free. The return of Brezhnevite and Khrushevite times has been realised, even if it's for a small chunk of the former USSR."

