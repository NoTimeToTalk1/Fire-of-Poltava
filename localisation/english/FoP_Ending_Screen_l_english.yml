### Warlord information ###
Ending_Screen_Tab_Name_1: "Finale"
# Donbas
 AFU_Ending_Screen_Content: "Triupmh of the nation"
 AFU_Ending_Screen_Content_Desc: "The end"
 DPR_Ending_Screen_Content: "Enduring Russian Spring"
 DPR_Ending_Screen_Content_Desc: "Maidan and the overthrowing of Yanukovich made parts of population in South-East of Ukraine question what will be of them. Maidan managed to gather many nationalists, not fond of Russians, submitting pro-Russian populace in fears of persecution and murders. Series of protests in various cities in the East, called 'Antimaidan', took place, mainly for returning the overthrown government. Locals, who looked warmly in [RUS.GetFlag]Russia's way, and some Russians came to oppose the new 'nationalist' government.\n\nProtests in Odesa, Kharkiv and couple other cities got put down, but Donetsk and Luhansk have another situation. With Russian FSB colonel Igor Girkin crossing the border of Donetsk, he has started the 'Novorossiya' project with proclaiming [DPR.GetFlag]§LDonetsk§! and [LPR.GetFlag]§CLuhansk§! §BPeople's§! §RRepublics§! in cooperation with local separatists. Freshly-formed forces, containing local militias and various Russian groups, started capturing local administrations, with Ukrainian government sending army and declaring 'Anti-Terrorist Operation'. Separatists have nearly lost, but Russian army came to help, resulting in the ceasefire.\n\nDonetsk got a huge hit in result of the conflict. Modern Donetsk airport got destroyed, 'Donbas' stadium, who welcomed Beyonce singer and Euro-2012 football tournament, went down, and big coal industry is effectively dying. Locals try to cope with the reality, either by wishing for the better times to come or by searching possibilities, which came to life after seceeding from Ukraine to Russia."
 LPR_Ending_Screen_Content: "Luhansk`s Own Republic"
 LPR_Ending_Screen_Content_Desc: "After Maidan and the fall of Yanukovich, unrest reached Luhansk as well. In this industrial border region, distrust toward Kyiv quickly turned into protests, occupations of government buildings, and the gradual collapse of Ukrainian authority. Then Valery Bolotov, a former paratrooper, became the first head of the proclaimed [LPR.GetFlag]§CLuhansk§! §BPeople's§! §RRepublics§!, backed by local militias and volunteers crossing from [RUS.GetFlag]Russia. His leadership didn’t last long, as internal struggles and the pressure of war forced him out. Igor Plotnitsky replaced him, trying to build a functioning administration while dealing with rival commanders and crime. \n\nBy 2017, tensions within the leadership reached a breaking point. Plotnitsky was pushed aside after a standoff in the city, and Leonid Pasechnik, a former security official, took control. With his rise, the republic became more stable on the surface, but also more tightly aligned with [RUS.GetFlag]Russian structures. Years of fighting and isolation left [LPR.GetFlag]§CLu§!§Bhan§!§Rsk§! worn down. Factories slowed or stopped, people adapted to a new reality, and politics turned into a quiet struggle behind closed doors rather than open conflict."
 
