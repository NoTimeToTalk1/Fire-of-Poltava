 Ending_Screen_Credits_Content.1: "Dev Team"
 Ending_Screen_Credits_Content_Desc.1: "hhhhhh"
 
 Ending_Screen_Credits_Content.2: "Our Socials"
 Ending_Screen_Credits_Content_Desc.2: "Unification mechanic present you various ways of progressing the unification of Ukraine. There are four main stages - microregion, region, river bank and Ukraine. Each stage opens new possibilities, such as legitimacy, easier coring and other nice things.\n\nWhile you are at the microregion stage, you should get rid of other warlords in your proximity. You can capture them, or in some cases try to negotiate for them to come under your rule.\n\n To expand further, you should get rid of your opponent in the region, bank of the river, and, finally, a warlord over the Dnipro river. Why not the good-old war? You get to prepare for a war before it errupts, and then the strongest will grab the spoils. \n\nFurther unification can involve not only wars, but the diplomacy as well. In case you and another state in the region are democratic enough, you can setup the referendum for people to decide who are they willing to live under. Playing dirty is allowed. You and your rival can also strike a deal, uniting under single banner and dividing spheres of government. Who gets the most spheres secured gets to absorb the other one, also honouring the deal."
