l_english:
 war.1.t:0 "Collapse of Confederacy"
 war.1.d:0 "The establishment of the Black Sea Confederation under the leadership of the admiral in Odesa was initially seen as a promising development. However, in the end, the confederation proved to be too unstable to withstand the challenges it faced.\n Over time, the Black Sea Confederation faced numerous internal conflicts and external threats. The different regions of the confederation were deeply divided and often in conflict with one another, leading to a lack of cohesion and unity.\n One of the main factors that led to the collapse of the Black Sea Confederation was the emergence of powerful armed groups in the country. \n Ultimately, a series of conflicts between warlord groups led to the collapse of the Black Sea Confederation. The conflicts were marked by intense fighting and atrocities, including massacres of civilians. The central government was unable to intervene effectively, and as the violence escalated, the confederation completely disintegrated."
 war.1.a:0 "Storm Hit the Black Sea."
 war.2.t:0 "Volynia Starts the Counter-Terrorist Operation"
 war.2.d:0 "Yuriy Lutsenko, leader of Volhynia, has declared a 'Special Decriminalization Operation' against the Burshtyn Republic as of today. The claimed goal is to remove the current mafia from power and restore order to the region of Rivne. This follows a surprise attack by the Burshtyn bandits on the city of Lutsk, which left many civilians dead or wounded, providing the casus belli for the operation.\n It is likely that Volhynian troops will attempt to capture the amber mines, which the Burshtyn mafia currently uses as one of their primary sources of income for bribing officials and funding their army. Although the Burshtynians have amassed an army to secure their borders, it remains to be seen how they will defend against the well-trained forces of Volhynia, many of whom were formerly part of the Armed Forces of Ukraine before the collapse of the state."
 war.2.a:0 "Battle of Order Against Disorder."
 war.3.t:0 "Restoration of Order in Ternopil"
 war.3.d:0 "After the collapse of Ukraine, the Republic of Halychyna was formed under the leadership of Ruslan Koshulynskyi and the right-wing Svoboda party, which advocates for a strong, nationalist state. Ternopil, on the other hand, became known as the capital of "White Croatia," formed by a group of neo-pagans who gained control of the region. As tensions between the two states grew, border clashes and skirmishes became more frequent. Halychyna accused Ternopil of harbouring terrorists and supporting extremist groups, and Ternopil accused Halychyna of trying to impose its will on their people. The situation came to a head recently when a group of Ternopil militants attacked a Halychanyan military outpost, killing several soldiers. In response, Halychyna has launched a full-scale invasion of Ternopil today to finally restore order and regain control of the region."
 war.3.a:0 "Galician Lion has raised his sword."
 win.1.t:0 "End of the Civil War in Odesa"
 win.1.d.a:0 ""The bloody war started by political upstarts in the Odesa region is over." \n These were the first words of Admiral Ihor Voronchenko, in his first address to the public since the beginning of the Odesa Civil War. Initially in the most difficult situation, when the entire once-strong Confederation was torn into five parts by the Admiral's political rivals, even his cabinet believed that it was time to abandon neutrality and turn to the neighbours for help. But Voronchenko believed that he could win if he organised everything properly. By taking advantage of the internecine feud between the leaders who rebelled against him and by wisely allocating the available troops and resources, the Confederation managed to emerge victorious from a seemingly hopeless situation. Having defeated the Budzhak forces, as well as local nationalists and Russophiles, the Confederation forces managed to regain control of all the territories that had belonged to them before that bloodbath. Having analysed the victory speech of the head of the Black Sea Confederation, can be concluded that the Odesa region was heavily affected by the conflict, and from now on all efforts will be directed towards restoring economic, industrial, and social life in the region."
 win.1.d.b:0 "News has come from the stormy Odesa region. \n A few hours ago, the leader of the National Front, a coalition of Odesa nationalists, Serhiy Sternenko, posted on the social network Telegram that the National Militia has managed to establish control over the entire region. The National Front, which was previously only a small and weak organisation in opposition to Admiral Voronchenko's government, managed to gain the necessary support among the population, despite the most diverse predictions of political experts, and eventually defeated both the Admiral's government and other sides of the civil conflict. The views of the members of the new government in Odesa are, to be sure, quite controversial and perhaps even too radical, but only time will tell what Sternenko and his supporters are capable of."
 win.1.d.c:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. It is not known for sure what Shariy and his supporters plan to do, but there is hope that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "Freedom, Clarity, Perseverance"."
 win.1.d.d:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. Nevertheless, the Russian Expeditionary Corps, which had occupied the northern territories at the outbreak of the war, managed to hold its ground, and troops loyal to Shariy decided not to engage them. It is not known for sure what Shariy and his supporters plan to do, not only in the context of Russian troops, but also in the context of reconstruction and further policy in the region, but there is hope that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "Freedom, Clarity, Perseverance"."
 win.1.d.e:0 "The surprising news comes today from the wartorn Odesa region, as both the last remnants of the old Confederation regime and anyone who arose against it are now brutally crushed under the jackboot of the Russian peacekeepers. Being a small army group which was located in Transnistria, as soon as the Russian Expeditionary Corps stepped over the border with the "mission of local peacekeeping", they were not expected to survive for long. However, having had the best logistical starting situations in the entire conflict, Russian soldiers came out on top, now gloriously waving their flag over the city of Odesa. What they now have on their hands, however, is the bleeding and burning land, which would gladly be annexed into the Russian Federation by its own "Crimean scenario", should Putin ever even wish to waste money on reconstruction."
 win.1.a:0 "Finally, it ended."
 
 #kyiv.1.t:0 "Meeting in the zone"
 #kyiv.1.d:0 "On a dark night, as the moon slides across the sky, the tension rises over the Chernobyl Zone. Serhiy Hryhorovych, known to the great stalkers as an influential figure in the Chornobyl Zone, came up with a clue that shook the stalker world.\nOn the front line of Pripyat, near the famous ammunition factory, Hryhorovych gathered legendary stalkers from all over the Zone. Lighting devices scattered light around them, but beyond this rite, darkness reigned.\nThe solemn moment came when Hryhorovych raised his hand, making everyone bend their heads.\n"Today we stand together as one. From now on, we are the Chornobyl Confederation," his words penetrate the soul of every stalker, reminding them of the invincible power of the Zone.\nFollowing this solemn moment, representatives of different factions and stalker groups are elected to form the basis of the Chornobyl Confederation. Their task is to define a new strategy for the Zone and make it more independent and influential."
 #kyiv.1.a:0 "Go on your way, stalker!"
 #plt.1.t:0 "Tesak in the National Corpus"
 #plt.1.d:0 "Recently, unidentified persons staged a riot in the SIZO No. 3 of the Tkaktorozavodsky district of Chelyabinsk. The prisoners started fighting with the guards on their way out and were shot at, but some of them managed to break through. One of them was Maksym Martsynkiewicz, also known as Tesak. He had been a Nazi ideologue and leader of some neo-Nazi organisations before his imprisonment, but the situation has changed. Having lost his contacts with like-minded people, Tesak travelled to the west without any documents or money. On the way, he heard on the radio the news about the civil war in Ukraine and the proclamation of a state in Poltava region by the far-right and Nazis. Hearing this, he realised that this was his chance. Taking 45,000 rubles from his emergency stash, he drove to the border, where, after paying a generous bribe, he was able to enter Ukraine without any questions. He followed the road signs to Poltava, where he went to the local military registration and enlistment office. There, he introduced himself and told them about his views and merits, and emphasised that he had military experience. After that, he was sent to the command, where he received new documents and was accepted into the combat units of the National Corps, and because of his "experience" he was promoted to the rank of brigadier general. It will be seen later whether it was the right decision... "
 #plt.1.a:0 "In our situation, we will be happy to have any help."
 #win.1.t:0 "Yellow press wins in civil conflict in Odesa region"
 #win.1.d:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. It is not known for certain what Shariy himself and his supporters intend to do, but it is hoped that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "freedom, clarity and perseverance"."
 #win.1.a:0 "This guy sharyt!"
 #win.2.t:0 "Nationalists wins in the Civil War"
