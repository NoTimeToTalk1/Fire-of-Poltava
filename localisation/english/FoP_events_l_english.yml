 sum.4.t:0 "Sumy chooses a leader"
 sum.4.d:0 "In the midst of the turmoil and uncertainty during the Ukrainian collapse, a significant event unfolded in the city of Sumy. The citizens of Sumy, determined to forge their own path and ensure stable leadership for their community, came together to choose a new city leader."
 sum.4.a:0 "Ihor Smeshko!"
 sum.4.b:0 "Invite Yushchenko!"
 sum.4.c:0 "Far-right coup"
 newsfop.7.t:0 ""
 newsfop.7.d:0 ""
 newsfop.7.a:0 ""
 newsfop.6.t:0 "Everything is stable in Russia"
 newsfop.6.d:0 "Since the end of the protracted war in Donbas with the victory of the Ukrainian Armed Forces, the world's attention has been focused on Russia, which has already attracted a lot of attention by sending its regular troops to the war zone in Luhansk and Donetsk regions, and after its defeat, has become almost a laughingstock. Dark times have fallen in high places in the Kremlin. Putin, who received the majority of the blame for the disgraceful defeat, made fewer and fewer public appearances, while official statements by Nikolai Patrushev - the Secretary of the Russian Security Council, began to appear more frequently in the Russian media. Finally, at noon today, Vladimir Putin announced an emergency convocation of the Security Council. A few hours later, he said that due to his poor health, he was forced to retire from politics and go into rehabilitation, but also that he could not simply leave Russia without a head. In his view, it was Nikolai Patrushev who had all the talents a statesman needs to manage the complex mechanism we call a country. From this day forward, it will be Patrushev who will bear the title of President of the Russian Federation, and the country itself will have a future, but it is hard to say whether it will be bright or dark."
 newsfop.6.a:0 "Seriously?"
 newsfop.5.t:0 "Are there liberals in Russia now?"
 newsfop.5.d:0 "In light of recent events, any tension in the Eastern European region should be expected, but the events of today will definitely turn the old world upside down. At four in the morning, the President of the Russian Federation - Vladimir Putin, suddenly announced that he was urgently convening a security council to deliver an important statement. At noon, the council was in session and Putin stood nervously in front of its members. As soon as the cameras were switched on, he began. Referring to his health condition, which he said was only deteriorating, he did not see himself in a state worthy of leading his own country and announced the transfer of his powers to the Prime Minister of the Russian Federation - Mikhail Mishustin, who he believed was the most suitable candidate for the post. Afterwards, Mishustin himself issued a statement in which he stressed that the country needed to change course if it wanted to survive in today's world. He called on Western partners to try to rethink their old relations and start from scratch and predicted a future for Russia in the civilised world."
 newsfop.5.a:0 "No way..."
 newsfop.4.t:0 "Ukraine stands victorious in Donbas"
 newsfop.4.d:0 "After an official address from Serhiy Kryvonos himself, it became clear, that the Ukrainian army has finished the seemingly impossible deed, even united Ukraine couldn't - crush the weakened separatists in Donbas, marking the end to years of bloodshed. As the Ukrainian flag is raised above the last city in the region, massive reintegration processes start, with the fate of DPR and LPR ex-leaders unknown. Though Russian officials are yet to make a commentary on the issue, this is deemed a huge reputational blow for the Federation itself, and the opposite for the Ukrainian military provisional government, which now has clearly ascended on the list of "favourites" to reunify Ukraine, that's if they wouldn't wish to join one of the sides, of course..."
 newsfop.4.a:0 "Well, everything happened as we predicted"
 newsfop.3.t:0 "Separatists' victory in the war in Donbas"
 newsfop.3.d:0 "The conflict in Eastern Europe, which the international community has been watching since 2014, is finally over. Despite all the expectations and predictions of many international experts, it was not the Ukrainian army that won the war for Donbas, but the forces of the self-proclaimed "LDPR" with the support of Russia, which provided the revolted side with military and humanitarian support. Having inflicted catastrophic defeats on the Ukrainian army on the battlefield, the "Novorossiya" forces, formed from the two Donbas republics, occupied key cities and communication hubs, making it impossible for the Ukrainian army to resist further as a unified, organised structure, leaving it with only a guerrilla front. Having won a significant victory, the Donbas government announced that it had managed to capture part of the military leadership, including the commander-in-chief of the AFU - Serhiy Kryvonos. Thus, peace did indeed prevail in Donbas, but not quite the peace that everyone expected."
 newsfop.3.a:0 "Peace is surely great, but can we be sure that it is good news?"
 newsfop.2.t:0 "Radicals seize power in Sumy region"
 newsfop.2.d:0 "Today, in one of the quietest regions of Ukraine, which has been almost untouched by the chaos that has engulfed the rest of the country, something happened. At exactly noon, a group of armed men stormed the city and regional councils of Sumy. The actions were clearly coordinated as they started at the same time. In the first few minutes, single shots could be heard near important administrative buildings, and in some cases even full-fledged gunfire. An hour after the storming of the Sumy authorities began, mobile and radio communications disappeared in the region, causing a complete information blockade of the area. The silence lasted until the evening. The whole world was watching the situation, information about which could only be obtained from sources in Kharkiv or Chernihiv regions, the reliability of which was impossible to confirm or deny.  \n A few hours later, however, everything became clear. The militarized nationalist group AKS, which has been active in the region for some time, has claimed responsibility for all the events that are currently taking place in the Sumy region. According to their statements, they launched a "people's coup" against the self-proclaimed authorities loyal to the traitors of the nation and managed to completely occupy the territory of the region, including storming the Regional and City Councils. As a result, they reportedly killed four police officers and the head of the Sumy City Council - Oleksandr Lysenko. The veracity of this information has not yet been proven, so the world can only watch the events from afar."
 newsfop.2.a:0 "Even Sumy did not escape without scars..."
 newsfop.1.t:0 "Opening of the Crimean Bridge"
 newsfop.1.d:0 "Today is 30 June 2020, and people are celebrating in Crimea and Russia. The so-called Crimean Bridge, which began construction in 2016, has been officially completed at Russian expense, connecting the coasts of Crimea and Kuban. On this occasion, the Head of the Republic of Crimea - Sergey Aksyonov, and the President of the Russian Federation - Vladimir Putin, personally arrived on the shore of the Taman Peninsula, where they made a speech that Russian and Crimean media called " historically momentous", symbolically cut a red ribbon on two opposite sides, and then fired fireworks into the air. This huge event was the last part of the US$4 billion Kerch Strait Bridge project, which took more than four years to complete. During the fireworks, a KAMAZ truck arrived at the bridge, driven by Putin himself, with Aksyonov next to him. Accompanied by cameras, they decided to drive across the bridge and meet the cheering crowd in Kerch itself, where they congratulated the people of Crimea on the beginning of a new era - an era when Crimea will always have Russia as a neighbour."
 newsfop.1.a:0 "A beautiful illegally built bridge was made..."
 plt.1.t:0 "Tesak in the National Corpus"
 plt.1.d:0 "Recently, unidentified persons staged a riot in the SIZO No. 3 of the Tkaktorozavodsky district of Chelyabinsk. The prisoners started fighting with the guards on their way out and were shot at, but some of them managed to break through. One of them was Maksym Martsynkiewicz, also known as Tesak. He had been a Nazi ideologue and leader of some neo-Nazi organisations before his imprisonment, but the situation has changed. Having lost his contacts with like-minded people, Tesak travelled to the west without any documents or money. On the way, he heard on the radio the news about the civil war in Ukraine and the proclamation of a state in Poltava region by the far-right and Nazis. Hearing this, he realised that this was his chance. Taking 45,000 rubles from his emergency stash, he drove to the border, where, after paying a generous bribe, he was able to enter Ukraine without any questions. He followed the road signs to Poltava, where he went to the local military registration and enlistment office. There, he introduced himself and told them about his views and merits, and emphasised that he had military experience. After that, he was sent to the command, where he received new documents and was accepted into the combat units of the National Corps, and because of his "experience" he was promoted to the rank of brigadier general. It will be seen later whether it was the right decision... "
 plt.1.a:0 "In our situation, we will be happy to have any help. "
 ode.8.t:0 "New face`s"
 ode.8.d:0 "The day of choice has come - who will replace Trukhanov as head of Odesa?"
 ode.8.a:0 "Oleksiy Goncharenko!"
 ode.8.b:0 "Adnan Kivan!"
 ode.8.c:0 "Oleg Filimonov!"
 ode.8.e:0 "Nataliya Dalieva!"
 ode.7.t:0 "Trukhanov's resignation"
 ode.7.d:0 "The Admiral had been investigating Trukhanov's alleged involvement in a corruption scheme for several months. The evidence against Trukhanov was mounting, and the Admiral could no longer turn a blind eye to the allegations.\n In a closed-door meeting with his top advisors, the Admiral announced his decision to suspend Trukhanov from his position as head of the City of Special Importance Odesa, pending an investigation into the corruption allegations. The decision was met with some resistance from Trukhanov's allies, but the Admiral stood firm in his conviction that corruption could not be tolerated in the new Confederation."
 ode.7.a:0 "Who will be able to become the new head of Odessa?"
 ode.6.t:0 "Fate Of Odesa"
 ode.6.d:0 "Trukhanov's victory over the National Front in the civil war had left him in a position of great power and influence. However, his reputation was also tainted by allegations of corruption and fraud. As the question of extending special powers for Trukhanov arose, he was faced with a difficult decision. \n The first option available to Trukhanov was to use his powers to create a special subject of the confederation - the City of Special Importance Odessa. This would allow him to consolidate his power and maintain his position of authority within the city. The creation of this special subject would give Trukhanov control over a wide range of economic, political, and social issues within Odessa. This would include the ability to set taxes, create laws, and even establish a separate legal system. \n However, this option would also come with a significant downside. It would only serve to reinforce the allegations of corruption and fraud that have been leveled against Trukhanov. By consolidating his power and control over the city, Trukhanov would give his critics more ammunition to use against him. Moreover, this option could potentially lead to tensions between Odessa and the rest of the confederation, as Trukhanov's increased power and influence could be perceived as a threat to the unity of the country. \n The second option available to Trukhanov was to abandon the idea of a special status for Odessa and return to the pre-war way of doing things. This would allow Trukhanov to distance himself from the allegations of corruption and fraud that have been leveled against him. By returning to the pre-war way of doing things, Trukhanov would be able to demonstrate his commitment to transparency and good governance. \n However, this option also comes with a significant downside. It would mean that Trukhanov would lose much of his power and influence within the city. He would be forced to operate within the confines of the existing political and economic structures, which may not be as conducive to his goals as the creation of a special subject. Additionally, this option could also be seen as a sign of weakness, which could embolden Trukhanov's critics and opponents."
 ode.6.a:0 "We want to join Admiral."
 ode.6.b:0 "We should have a autonomy status!"
 win.5.t:0 "Ukrainian Reunification"
 win.5.d:0 "In a historic turn of events, the Ukrainian nation witnessed a momentous day of unity as forces led by Oleksiy Danilov, alongside the National Security and Defense Council (RNBO), orchestrated the reunification of regions previously divided.\nUnder the visionary leadership of Oleksiy Danilov, native of the Luhansk region, and the coordinated efforts of the RNBO, the dream of reuniting estranged regions was realized.\nAddressing the gathering press, Danilov emphasized the significance of the moment, stating, "Today, we stand united, not as separate territories, but as a single nation. Our history, our culture, and our aspirations have always bound us together. Let us rebuild what was once torn apart, and let our shared vision propel us to prosperity."\nAs part of the reunification plan, comprehensive initiatives are set to roll out, including economic revitalization projects, cultural exchange programs, and social integration efforts. The government's dedication to the well-being of the reunited regions is underscored by these ambitious endeavors, designed to ensure that the shared journey towards progress leaves no one behind. Messages of support from across the globe resonated with the nation's aspiration for peace and harmony.\nAs the sun set on the day of reunification, the resonance of hope and unity lingered in the hearts of every Ukrainian. The journey ahead is promising. The Ukrainian nation, once divided, now stands stronger than ever as a united force, ready to embrace the opportunities that lie ahead."
 win.5.a:0 "§2The Fire§! §Hof Poltava§! was finally put out."
 win.4.t:0 "Admiral forces wins the Civil War"
 win.4.d:0 ""The bloody war started by political upstarts in the Odesa region is over." These were the first words of Admiral Ihor Voronchenko, in his first address to the public since the beginning of the Odesa Civil War. Initially in the most difficult situation, when the entire once strong Confederation was torn into five parts by the admiral's political rivals, even his cabinet believed that it was time to abandon neutrality and turn to the neighbours for help. But Voronchenko believed that he could win if he organised everything properly. By taking advantage of the internecine feud between the leaders who rebelled against him and by wisely allocating the available troops and resources, the Black Sea Confederation managed to emerge victorious from a seemingly hopeless situation. Having defeated the Budzhak forces, as well as local nationalists and Russophiles, the Confederation forces managed to regain control of all the territories that had belonged to them before that bloodbath. Having analysed the victory speech of the head of the Black Sea Confederation, we can conclude that Odesa region was heavily affected by the conflict, and from now on all efforts will be directed towards restoring economic, industrial, and social life in the region."
 win.4.a:0 "Odesa - pearl of the sea."
 win.3.t:0 "Russian Army Victorious in Odesa"
 win.3.d:0 "The surprising news comes today from the wartorn Odesa region, as both the last remnants of the old Confederation regime and anyone who arose against it are now brutally crushed under the jackboot of the Russian peacekeeper. Being a small army group which was located in Transnistria, as soon as the Russian Expeditionary Corps stepped over the border with the "mission of local peacekeeping", they were not expected to survive for long. However, having had the best logistical starting situations in the entire conflict, Russian soldiers came out on top, now gloriously waving their flag over the city of Odesa. \n What they now have on their hands, however, is the bleeding and burning land, which would gladly be annexed into the Russian Federation by its own "Crimean scenario", should Putin ever even wish to waste money on reconstruction"
 win.3.a:0 "Is Russia here forever?"
 win.2.t:0 "Nationalists wins in the Civil War"
 win.2.d:0 "News has come from the stormy Odesa region. A few hours ago, the leader of the National Front, a coalition of Odesa nationalists, Serhiy Sternenko, posted on the social network Telegram that the national militia had managed to establish full control over the entire region. \n The National Front, which was previously only a small and weak organisation in opposition to Admiral Voronchenko's government, managed to gain the necessary support among the population, despite the most diverse predictions of political experts, and eventually defeated both the admiral's government and other parties to the civil conflict. The views of the members of the new government in Odesa are, to be sure, quite controversial and perhaps even too radical, but only time will tell what Sternenko and his supporters are capable of."
 win.2.a:0 "Their russophobia is hard as enough."
 win.1.t:0 "Yellow press wins in civil conflict in Odesa region"
 win.1.d:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. It is not known for certain what Shariy himself and his supporters intend to do, but it is hoped that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "freedom, clarity and perseverance"."
 win.1.a:0 "This guy sharyt!"
 war.3.t:0 "Restoration of Order in Ternopil"
 war.3.d:0 "After the collapse of Ukraine, Galicia was immediately formed under the leadership of Ruslan Koshulinsky and the right-wing Svoboda party, which advocated for a strong, nationalist state. Ternopil, on the other hand, became known as the capital of "White Croatia", with a group of neo-pagans who gained control of the region as the lead.\n As tensions between the two 'countries' grew, border clashes and skirmishes became more frequent. Galicia accused Ternopil of harboring terrorists and supporting extremist groups, and Ternopil accused Galicia back, this time - of trying to impose its will on free people.\n The situation came to a boiling point recently, when a group of Ternopil militants attacked a Galician military outpost, killing several soldiers. In response, Galicia has launched a full-scale invasion of Ternopil today, to finally restore order and regain control of the region."
 war.3.a:0 "Galician lion raised his sword."
 war.2.t:0 "Volynia Starts Counter-terrorist Operation"
 war.2.d:0 "As expected, tensions between the two new 'countries' quickly escalated, with each seeking to gain stable regional control. The Burshtyn Republic was particularly aggressive in its strive, using control of amber mines to fund its army and bribe officials. In response, Yuriy Lutsenko, the leader of Volyn, has launched a campaign to isolate the Rivne region and cut off their sources of income. \n The situation reached a climax when the Burshtyn Republic launched a surprise attack on the city of Lutsk, which was under Volyn's control. The attack was brutal, with dozens of civilians killed and many wounded. In response, Yuriy Lutsenko has ordered a special operation today, with a goal to 'decriminalize' the Rivne region and remove the mafia from power."
 war.2.a:0 "Battle of Order Against Disorder."
 war.1.t:0 "Collapse of Confederacy"
 war.1.d:0 "The establishment of the Black Sea Confederation under the leadership of the admiral in Odesa was initially seen as a promising development. However, in the end, the confederation proved to be too unstable to withstand the challenges it faced.\n Over time, the Black Sea Confederation faced numerous internal conflicts and external threats. The different regions of the confederation were deeply divided and often in conflict with one another, leading to a lack of cohesion and unity.\n One of the main factors that led to the collapse of the Black Sea Confederation was the emergence of powerful armed groups in the country. \n Ultimately, a series of conflicts between warlord groups led to the collapse of the Black Sea Confederation today. The conflicts were marked by intense fighting and atrocities, including massacres of civilians. The central government was unable to intervene effectively, and as the violence escalated, the confederation completely disintegrated."
 war.1.a:0 "Storm Hit the Black Sea."
 afu.1.t:0 "On Our Own"
 afu.1.d:0 "After the country-wide destabilization and escalation of civil unrest in Ukraine, we weren't able to properly reach the central government, and aren't even sure what is even happening. However, we do know that right now Ukraine is threatened by separatist menace. We must fight on our own until we can re-establish our connection with Kyiv."
 afu.1.a:0 "We have to start preparing."
 afu.2.t:0 "Contacting the Government"
 afu.2.d:0 "After a couple intense weeks we finally managed to establish a stable contact with Kyiv. From what we've been told, political situation is still uncertain, so we shouldn't rely on the Kyiv administration too much. We don't want to get our hands dirty in their political games."
 afu.2.a:0 "Let's see what we can do."
 afu.3.t:0 "Assessing the Situation"
 afu.3.d:0 "Our high command and intelligence service predict that the colder phase of the Donbas conflict might soon be over. The war with the Russian proxies is on the horizon. It is time that we assess the situation and prepare ourselves to not only defend against the upcoming onslaught but also try to end the long-lasting conflict on our terms."
 afu.3.a:0 "Sooner or later we'll have to face the coming storm."
 afu.4.t:0 "Life in the Donbass"
 afu.4.d:0 "The life of an ordinary civilian living in the territory controlled by the Ukrainian Armed Forces is complex and difficult, especially in the context of the ongoing conflict with the Russian-backed separatists in eastern Ukraine. The conflict has had a significant impact on the daily lives of people living in these areas and has created some challenges and obstacles that need to be overcome. \n One of the key challenges faced by civilians in these areas is access to basic goods and services. The conflict has disrupted supply chains and made it difficult for people to access food, water, medicine, and other necessities. This can make it difficult to meet people's basic needs and create many health and safety risks. \n Another challenge faced by the civilian population in the territory controlled by the Ukrainian Armed Forces are restrictions on movement. The conflict has resulted in the establishment of checkpoints and other security measures, which can make it difficult for people to move freely and carry out their daily activities. This can be particularly challenging for people who need to travel for work, education, or other purposes. \n In addition to these concerns, civilians in these areas may also be subject to harassment, intimidation, and violence by various actors, including members of the Ukrainian Security Forces and Russian-backed separatists. This can create a sense of fear and insecurity, and make it difficult for people to go about their daily activities without fear of reprisals. \n Despite these challenges, many people living in territory controlled by the Ukrainian Armed Forces are working to build a better life for themselves and their families. They are finding ways to access basic goods and services, overcoming restrictions on movement, and creating networks of support and solidarity with other members of their communities. \n All in all, life for ordinary civilians living in the territory controlled by the Ukrainian Armed Forces can be challenging, but it is also characterized by resilience, ingenuity, and determination to build a better future."
 afu.4.a:0 "Waiting for a better times..."
 afu.5.t:0 "Helping ZSU?"
 afu.5.d:0 "A message was sent through the communication line from the troops in Donbas. In it, Kryvonos, relying on the fact that the Armed Forces are still de jure under our command, wrote down everything that we had "owed" him since the beginning of the Collapse. He wrote about thousands of rifles and dozens of pieces of equipment, but our own situation is not the best. We definitely can't send all of it, but by sending at least some of it, we can reinforce Kryvonos' faith in us and make him remain loyal. But looking at it from another angle, he will still be forced to officially obey us, or he could become another rebel. It's not an easy choice..."
 afu.5.a:0 "Send them our help immediately!"
 afu.5.b:0 "We have enough to worry about without them."
 afu.51.t:0 "Zelenskyy Agreed"
 afu.51.d:0 "Kyiv has agreed to provide us with whatever equipment they can."
 afu.51.a:0 "We are grateful for their help."
 afu.52.t:0 "Zelenskyy Refused"
 afu.52.d:0 "Despite their direct responsibilities, the Zelensky government has refused to provide us with weapons, probably considering their own issues more important."
 afu.52.a:0 "It doesn't matter, we'll manage it all without them!"
 afu.6.t:0 "Helping ZSU?"
 afu.6.d:0 "Our government is shaky. In the eyes of most Ukrainians, our government is illegitimate and responsible for the collapse of the state. But despite all this, one person sent us a message - Kryvonos. Recalling our old friendship, he asks for weapons and equipment from our reserves, and we are even able to provide them. So, in theory, we can even get their further support. But despite this, they are still loyal to Zelenskyy's government, and in the future, these weapons may even serve against us! So what should we do?"
 afu.6.a:0 "The present is more important than the future, and no matter what, we must help our brothers destroy the Russian scum!"
 afu.6.b:0 "Who knows where this will lead..."
 afu.61.t:0 "Poroshenko Agreed"
 afu.61.d:0 "Given our old friendship and a common goal, Poroshenko has thankfully agreed to send us help."
 afu.61.a:0 "Maybe he's not so bad after all...?"
 afu.62.t:0 "Poroshenko Refused"
 afu.62.d:0 "Despite our sincere request, Poroshenko refused to send us help."
 afu.62.a:0 "Average syvocholyy hetman behavior."
 afu.7.t:0 "Helping ZSU?"
 afu.7.d:0 "Suddenly, Tyler's office received a message. Kryvonos, the commander-in-chief of the Ukrainian Armed Forces, had officially asked him for weapons and equipment. In the message, he assured Shkrobinets that personal conflicts like his with Azov should now take a back seat and that the most important thing now was to destroy the Russian puppets in the east. So what are we going to do?"
 afu.7.a:0 ""I helped the Ukrainian Armed Forces in '14, '15 and all subsequent years, and I'm not going to stop. Guys! Pack our backup equipment! It's time for him to fight against the moskals!""
 afu.7.b:0 "Despite our best efforts, we are unable to provide any equipment."
 afu.71.t:0 "Tyler Agreed"
 afu.71.d:0 "Tyler, despite our fears, agreed to provide us with weapons, even on a larger scale than we could have hoped for!"
 afu.71.a:0 "I will have to thank him personally one day..."
 afu.72.t:0 "Tyler Refused"
 afu.72.d:0 "Our fears turned out to be true. Most likely, because of our cooperation with Azov, Tyler refused to provide us with weapons."
 afu.72.a:0 "What a shame..."
 afu.8.t:0 "Helping ZSU?"
 afu.8.d:0 "Security reigns supreme in the Kharkiv region. The police are monitoring regional security, and after the destruction of the LPR by Krivonos, there is even less to worry about. But suddenly, the Kharkiv administration received a message from the Ukrainian Armed Forces. In it, Kryvonis informed us that due to a lack of personnel, the Ukrainian Armed Forces were unable to control the entire occupied territory and needed the help of our police units and some equipment. What are we going to do?"
 afu.8.a:0 "Prepare weaponry and personnel for sending!"
 afu.8.b:0 "Tell them that OUR police protects only OUR territory."
 afu.81.t:0 "Avakov Agreed"
 afu.81.d:0 "Avakov, understanding the benefit of the cause, nevertheless agreed to send us equipment and units to ensure control over the east."
 afu.81.a:0 "We knew Avakov was smart enough to agree."
 afu.82.t:0 "Avakov Refused"
 afu.82.d:0 "Despite the obvious benefit to both of us, Avakov has refused."
 afu.82.a:0 "We can handle it without this fat prick."
 afu.9.t:0 "Victory!"
 afu.9.d:0 "After the brutal battles for Russian-occupied cities in so-called DPR and LPR territories, we have finally managed to bring a resolution to this bloody conflict in the east once and for all! The separatist forces of Luhansk and Donetsk are finally defeated. Even with Ukraine in a complete disarray, the armed forces of Ukraine stood firm and won against all odds. This is truly a great victory for our nation!"
 afu.9.a:0 "Slava Ukrajini, Herojam Slava!"
 afu.10.t:0 "Victory!"
 afu.10.d:0 "Finally, after five years of ongoing conflict, we have achieved our goal. The last separatist units have been defeated and the glorious Ukrainian flags are flying over Donetsk, Luhansk, and other cities in eastern Donbas. It is hard to believe that we have succeeded. So much blood has been shed, so many lives have been broken, and so many cities have been destroyed... But we won. Once and for all. We will never again allow these Muscovite scum to trespass on our land and we will take proper care of the security of the region. My God, there is still so much to restore and do..."
 afu.10.a:0 "Well, let's get to work, gentlemen."
 afu.11.t:0 "Starting Integration"
 afu.11.d:0 "Over the years, Russian propaganda has played with the minds of the locals. Some of them really believe that we crucify children and eat babies... In short, we need to deal with all this immediately. It will take us a hell lot of time and effort, but in the end, we will be able to eradicate this nonsense from the minds of our citizens. We will solve the bureaucratic problems quickly, but the mental ones... Donbas will need a real course of rehabilitation."
 afu.11.a:0 "Let's get started immediately!"
 afu.12.t:0 "Finishing Integration"
 afu.12.d:0 "Ugh, those really were some difficult months. We caught all the separatist leaders who hadn't managed to escape, and the locals finally started to realise that they were really Ukrainians. Despite our successes, the full mental recovery of Donbas is still very, very far away. It will take years to really complete the process, at least partially. But we still have work to do not in the psychological sphere. Ukraine is still divided and in chaos, and our new goal is to save the whole country, not just Donbas."
 afu.12.a:0 "Forward to new victories!"
 afu.13.t:0 "Territorial Defence Forces"
 afu.13.d:0 "Following the outbreak of the conflict in eastern Ukraine in 2014, the Ukrainian Armed Forces recognized the need to create a local defense force that could provide security and support in the areas most affected by the fighting. To this end, the Territorial Defence Forces (TDF) were created, a volunteer force composed of residents who receive basic military training and serve under the command of the Ukrainian Armed Forces. \n They play an important role in protecting the territorial integrity of Ukraine and providing support to regular military units. They are responsible for protecting key infrastructure, conducting intelligence and surveillance, and providing logistical support for military operations. \n One example of an ITT combat training camp is located near Sloviansk, a city in the Donetsk region that has seen intense fighting during the conflict. Soldiers in this camp receive basic military training and then move on to more specialized training in areas such as marksmanship, first aid, and tactical maneuvers. They live in barracks-style accommodation and receive a basic allowance for food and other needs. \n Life in the camp is challenging as soldiers must maintain a high level of fitness and readiness for deployment. They work long hours, and training often starts early in the morning and lasts until late at night. However, many soldiers see their service in the TDF as a way to defend their homeland and protect their communities from the threat of aggression. \n Despite the challenges, soldiers in TDFs are dedicated and motivated to serve their country. They understand the important role they play in protecting Ukraine's sovereignty and are willing to make sacrifices to ensure that their country remains safe."
 afu.13.a:0 "Glory to Ukraine!"
 afu.14.t:0 "Special Operations Forces"
 afu.14.d:0 "The Special Operations Forces (SSO) is a specialized unit within the Armed Forces of Ukraine that is trained and equipped to conduct a wide range of special operations. These can include intelligence, direct action missions, anti-terrorist operations, and other high-risk operations. \n The Special Forces were first created in 2014 in response to the conflict in eastern Ukraine. Their main task is to support regular military units by conducting reconnaissance and gathering intelligence, disrupting enemy operations, and conducting targeted strikes on key enemy targets. \n SOF units consist of highly qualified soldiers who undergo rigorous selection and training programs. They are equipped with the latest technology and weaponry, including night vision devices, drones, and specialized vehicles. They are also trained in a wide range of skills, including shooting, hand-to-hand combat, and advanced medical techniques. \n One of the most prominent uses of the Special Forces in the conflict in eastern Ukraine was the Battle of Debaltseve in 2015. The Special Forces played a crucial role in disrupting enemy operations and supporting regular military units defending the city. \n Despite their small numbers, the Special Forces units have proven to be a valuable asset to the Ukrainian Armed Forces. Their specialized skills and training allow them to carry out missions that would be difficult or impossible for regular military units. They are also able to operate in environments where regular military units may be at a disadvantage, such as urban areas or difficult terrain. \n However, there are also risks associated with the use of SF units. Their specialized training and equipment make them a very valuable target for the enemy, and they may be at greater risk of capture or injury. In addition, there is a risk of mission creep when Special Forces are used to perform tasks beyond their original mission. \n Overall, the use of Special Operations Forces in the Ukrainian Armed Forces has become a valuable addition to the country's military capabilities. However, their use must be carefully considered and balanced against the risks involved."
 afu.14.a:0 "Glory to Ukraine!"
 afu.15.t:0 "Reform of the General Staff"
 afu.15.d:0 "The General Staff of the Armed Forces of Ukraine (AFU) is responsible for planning and coordinating military operations, as well as overseeing the development and implementation of military policy. In recent years, the General Staff has undergone significant reforms aimed at modernizing its structures, improving its capabilities, and strengthening its role in the country's defense. \n One of the key reforms of the General Staff has been the introduction of a new organizational structure, which includes the creation of several new directorates and departments. These new structures are designed to increase the efficiency and effectiveness of the General Staff by streamlining decision-making processes, improving communication, and strengthening coordination between different units and branches of the armed forces. \n Another important reform was the introduction of new training programs and professional development opportunities for General Staff personnel. This includes training programs in areas such as cyber security, intelligence analysis, and strategic planning, as well as opportunities for advanced training and education. The General Staff reform also focuses on improving the use of technology and information systems. This includes the introduction of new software systems and communications, as well as the use of advanced data analysis and modeling techniques for military decision-making. \n Overall, the reform of the General Staff of the Armed Forces of Ukraine has been an important step in modernizing the country's military capabilities and enhancing its ability to respond to the complex security challenges it faces. However, much work remains to be done to ensure that the General Staff is fully equipped to meet the country's defense needs, especially as the security situation in Ukraine remains volatile and unpredictable."
 afu.15.a:0 "Glory to Ukraine!"
 afu.16.t:0 "The Azov Battalion"
 afu.16.d:0 "The Azov Battalion is a nationalist paramilitary group formed in 2014 to fight Russian-backed separatists in eastern Ukraine. The group is known for its extreme right-wing views and has been accused of human rights abuses and other crimes. In 2015, the Azov Battalion was officially integrated into the Ukrainian Armed Forces as a volunteer unit under the control of the Ukrainian government. \n However, in recent years, there has been growing concern that the Azov battalion has fallen out of the control of the Ukrainian Armed Forces. This is partly due to the growing influence of nationalist and far-right groups in Ukrainian politics, as well as the ongoing conflict in eastern Ukraine and the ongoing security challenges facing the country. \n One of the key concerns is that the Azov battalion is increasingly operating outside the control of the Ukrainian government and may be pursuing its own agenda. This has led to fears that the group may engage in activities that are not in Ukraine's interest and may undermine the country's efforts to maintain stability and security. \n There have also been concerns about the Azov battalion's human rights record, with reports of abuse and ill-treatment of prisoners. This has led to calls for increased oversight and accountability of the group, and for measures to be taken to ensure that they act in accordance with international humanitarian and human rights law. \n Overall, the alienation of the nationalist Azov Corps from the control of the Ukrainian Armed Forces is a complex and troubling issue. While the group has played a role in the defense of the country, there are legitimate concerns about their behavior and motivations. It is important that the Ukrainian government addresses these concerns and ensures that the country's security forces act in accordance with international norms and values."
 afu.16.a:0 "Glory to Ukraine?"
 afu.17.t:0 "Planning the Defence"
 afu.17.d:0 "Our intelligence service suggests that the forces of the separatists are doing maneuvers and actively preparing to strike us in the near future. The clock is slowly ticking. Our high command has prepared a plan of a concentrated organized defense in the key fortified areas, with continuous preparations for a counterattack."
 afu.17.a:0 "Set in motion."
 afu.22.t:0 "New leader"
 afu.22.d:0 "Danilov came to power"
 afu.22.a:0 "So..."
 afu.21.t:0 "Ukrainian reunification"
 afu.21.d:0 "Danilov unite Ukraine"
 afu.21.a:0 "Ok."
 sum.1.d:0 "Today the Sumy city and raion council, not without interference and backing from Chernihiv, elected a former state security serviceman and the leader of the political party "Strength and Honor" - Ihor Smeshko. Previously working as an advisor for the fifth president, he is seen here as "Poroshenko's man", with the population not giving him a lot of trust because of this. Regardless, Smeshko is here to stay, for better or for worse."
 sum.2.d:0 "After a plethora of requests and pleas were sent from many residents of Sumy and nearby towns, as well as general acceptance of the candidate in the council, Viktor Yushchenko had reluctantly agreed to take the lead of the local administration. For the time being it seems that he feels a bit apathetic about the whole situation. In his speech on Sumy's Independence Square, however , he had reassured people with the promies that he, with his political experience and readiness to defend the citizens, that fell within his area of responsibility, would provide a guiding hand for the Sumians in these uneasy times."
 sum.3.d:0 "Just when the elections of the governor of Sumy and vicinity were seeming to be concluded, something unexpected had happened - the unknown men with green and black flags with guns broke into the parliament and declared the current session to be closed. All of the politicians and bueraucrats, that were present in the council, were taken hostage. From the government tribune, the rebels had declared the lands, controlled by Sumy regional council to be freed from the rule of the local oligarchs, which never cared about the ordinary people and whose intentions and misdeeds led to an emrgence of lawlessness and bloodshed across the entire country. These "Freedom fighters" called themselves "Avanhard Culturna Spilka". With the culmination of the speech and a quick radio and television broadcast, a new revolutionary order had befell on the land of Sumy. Time will truly tell, how will this new vision of the group will reshape the situation inside and outside Sumy region."
 afu.23.t:0 "New leader"
 afu.23.d:0 "Khomutynnik came to power"
 afu.23.a:0 "So..."
 afu.24.t:0 "New leader"
 afu.24.d:0 "Nadiya Savchenko, the former pilot and hero of Ukraine, has once again come to the forefront of the political scene, this time as a frontrunner in the regional elections in Donbas. Savchenko's name has long been associated with her commitment to Ukraine. Her resilience and courage during her imprisonment in Russia have only strengthened her status as a national hero. And now, when her homeland is in danger, Nadiya will be able to prove herself once again and return power to the people, which was taken away by oligarchs and bandits."
 afu.24.a:0 "So..."
 afu.25.t:0 "List of candidates for the elections"
 afu.25.d:0 "So a lot of candidates signed up for the election, but three especially stood out - Oleksiy Danilov, Nadiya Savchenko and Vitaliy Khomutynnyk."
 afu.25.a:0 "Oleksiy Danilov"
 afu.25.b:0 "Vitaliy Khomutynnyk"
 afu.25.c:0 "Nadiya Savchenko"
 afu.34.t:0 "Continuing Military Dictatorship"
 afu.34.d:0 "Democracy has destroyed our country. Miserable elections that simply played into the hands of oligarchs put an end to Ukrainian statehood. Our people have always had a choice between a bunch of clowns who only played populism to make a name for themselves. But that time has come to an end. General Kryvonys, who triumphantly entered Donetsk and Luhansk, thus putting an end to the ATO and separatist thugs, will now take up the task of restoring order in Ukraine. No negotiations with traitors. With blood and sweat, we will regain our country, the freedom of our citizens and the honour of our soldiers. General, took advantage of the situation and announced that now the Provisional Government will fulfil the role of the only rightful heir of Ukraine, and all citizens of Ukraine are obliged to submit to the power of the Armed Forces of Ukraine."
 afu.34.a:0 "Glory to Ukraine!"
 afu.36.t:0 "The president's ultimatum"
 afu.36.d:0 "ya zh ne loh"
 afu.36.a:0 "bbb"
 
 afu.26.t:0 "Savchenko's rally"
 afu.26.d:0 "A rally was held in the well-known city of Horlivka, which experienced difficult times during the war in Donbas. Nadiya Savchenko, already known as a heroine and a politician, came to this city to talk to the military and the local population.\nDuring her meeting with the military, Savchenko resorted to populism and cruel promises in an attempt to raise her popularity among the local population and the military. She spoke about strengthening defence capabilities and supporting veterans.\n"Stop relying on the promises of politicians who have proven to be ineffective!" Savchenko called. "It is time for the citizens to determine their own destiny and future!"\nSavchenko's words struck a chord with many soldiers, who saw her as a symbol of the fight for independence and justice. Many soldiers expressed their support for Savchenko because they believed that she could bring improvements to their lives and the situation in the city. Her promises to change the state of affairs and restore peace touched their hearts and encouraged them to act."
 afu.26.a:0 "Ok."
 afu.27.t:0 "Savchenko's rally"
 afu.27.d:0 "In one of her public speeches, Nadiya Savchenko expressed an unconventional idea for restoring and mobilising resources to unite Ukraine. She did so during a community meeting in a small town.\nSpeaking in front of hundreds of people, Savchenko stood on a podium.\n"We must find every possible way to unite our native Ukraine. The idea is that we should give a second chance to those who made mistakes in the past. I propose releasing prisoners who have reformed and are ready to dedicate their lives to uniting our country."\nThis unexpected proposal caused surprise and discussion among the audience. Savchenko explained that prisoners can be useful resources for working on infrastructure projects, restoring and uniting different regions of Ukraine."
 afu.27.a:0 "Ok."
 afu.28.t:0 "Savchenko's rally"
 afu.28.d:0 "For several years now, two old ladies, Hanna and Olia, have been known for their persistence in gossiping at the market in a small village in Donbas. Every day, sitting on their favourite benches, they discuss everything from their neighbours to politicians.\n"Olya, this government will not bring anything good. All those oligarchs and politicians are only thinking about their pockets!"\n"You're right. What have they already done for us? And then there are these wars."\nBut one day, while they were actively discussing the news, they suddenly heard a loud voice from the other end of the market. Loudspeakers in military uniforms stood in front of the village and started talking about Nadiya Savchenko and her political programme.\n"Dear residents, we present Nadiya Savchenko, our heroine, who gave her life for Ukraine on the frontline. She promises to restore peace and order in Donbas and the whole country."\n"Savchenko is fighting for an honest and transparent government, she stands for raising the standard of living for all citizens and for the restoration of justice."\nThese words attracted the attention of not only Hanna and Olya, but all the villagers. The grandmothers, who had previously seemed to never stop chattering about politics, now listened attentively. But after the campaigners finished their speech, Hanna and Olya reflected on the situation.\n"Fuck her and the other chatterboxes. We're not going to be fooled again."\n"That's right, Anna, we should stay away from this politics and focus on our business.""
 afu.28.a:0 "Ok."
 afu.29.t:0 "Savchenko's rally"
 afu.29.d:0 "Nadiya Savchenko has always been known for her independence and scandalous speeches. One day, she decided to go to the military, which was located in one of the frontline locations in Donbas. She was stubborn and stubborn and knew that her speech would cause controversy.\nStanding in front of the soldiers, she opened her speech with passion: "Soldiers of Ukraine, I am speaking to you again, but I am doing so to wake you up! We are here on the front line, but our leaders in Kyiv are doing nothing to improve your conditions and ensure our victory!"\nSavchenko angrily voiced her accusations: "These politicians and authorities have been playing a shameful game with our country. They pretend to be on our side, but they are only playing their own political games. We, the soldiers, are here on the front line, while they are in Kyiv, living their comfortable lives."\nThe soldiers stood in silence, listening to her along with other soldiers. Savchenko continued her speech, calling for change and a way out of this situation.\n"We cannot allow our country to continue to collapse due to the inaction of politicians. We must demand action, we must be the voice of change, and we cannot trust those who promise but do not deliver.""
 afu.29.a:0 "Ok."
 afu.30.t:0 "Savchenko's rally"
 afu.30.d:0 "On that day, Nadiya Savchenko stood in the square. She held a photo of the Verkhovna Rada building in her hands and began her speech with great passion.\n"There were 450 MPs in this building. None of them cared about you, about our country, about our future! They held meetings, voted for laws, but for whom? For themselves, for their own interests!"\nSavchenko continued angrily.\n"We elected them, we believed them, we hoped they would bring prosperity and justice. But what did we get?Embezzlement, corruption, inaction, and war on our own territories!"\nShe paused, giving people time to absorb her words. Then she expressed her main point.\n"We cannot allow this building to continue to destroy our lives. We cannot trust those who promise but do not deliver. We have to change this order of things. We have to take power into our own hands and create the country we want to live in!""
 afu.30.a:0 "Ok."
 afu.31.t:0 "Savchenko's rally"
 afu.31.d:0 "Savchenko once again stood in front of the soldiers on the front line in Donbas. Her voice was filled with determination and demand as she began her speech.\n"Soldiers of the Ukrainian Armed Forces, it is time for decisive action! We cannot allow our country to be divided and conquered by other forces. We need to unite our territory, and we must not shy away from any methods to achieve this goal."\nShe continued with emotion.\n"The Ukrainian Armed Forces must spend all their energy on restoring order and regaining control of our land. We cannot allow our enemies and occupiers to remain on our territories. We must be resolute and uncompromising in defending our rights and freedoms!"\nGathering her courage, Savchenko called out.\n"Let our enemies know that we do not give up! We are worthy of freedom and independence, and we will do everything possible to unite our Ukraine, regardless of the challenges and obstacles on our way. Remember that we are together, and together we will win!""
 afu.31.a:0 "Ok."
 afu.32.t:0 "Savchenko's rally"
 afu.32.d:0 "During her speech to journalists, one of them asked Nadiya Savchenko why she had joined the Yulia Tymoshenko Bloc. Savchenko replied with an expression of determination.\n"I joined the Tymoshenko Bloc because it is the least evil of all the others. But do not think that this means that I support her and other oligarchs!"\nShe then issued another scandalous statement, mocking all oligarchs and politicians.\n"Look at them all, these fat men in expensive suits sitting in the Verkhovna Rada and running their own businesses. They are willing to sell our country for money! This is Kolomoisky, this is Tymoshenko, this is everyone else! They do not represent our interests, they represent their own pockets!"\nSavchenko continued with a more emotional, even harsh tone.\n"We cannot trust these people, we cannot allow them to destroy our country! We must get rid of this corruption, this inaction, this outrage!""
 afu.32.a:0 "Ok."
 afu.33.t:0 "Savchenko's rally"
 afu.33.d:0 "Three children were walking on a hill among the ruins of a former playground in Donetsk. Maksim, Olya and Denis. They were overjoyed, found the remains of an old boar and threw them to each other. At that moment, they heard a strange noise in the sky and looked up.\nAbove them, on a helicopter, they saw a large banner with the words "Sho, vsralisya?". The children looked at this unexpected sight from the sky with their mouths open. Maksym was the first to start. He cheerfully shouted, "Bam, sho, vsralisya!?" Olya and Denis also laughed and joined him, saying the same text.\nTheir laughter and shouts echoed from the ruins of the playground, and soon all the children playing in the area joined in the fun flash mob. Amidst the downpour of laughter and shouts of "Bam, sho, vsralisya!?", the children forgot about the problems around them and the danger that surrounded their world.\nThis moment of joy and laughter became a bright summary of their day and a symbol of the strength that children's cheerful nature can provide even in the most difficult times."
 afu.33.a:0 "Ok."
 
 newsfop.5.t:0 "Change in the Russian Federation?"
 newsfop.5.d:0 "In light of recent events, any tension in the Eastern European region should be expected, but the events of today will definitely turn the old world upside down. At four in the morning, the President of the Russian Federation - Vladimir Putin, suddenly announced that he was urgently convening a security council to deliver an important statement. At noon, the council was in session and Putin stood nervously in front of its members. As soon as the cameras were switched on, he began. Referring to his health condition, which he said was only deteriorating, he did not see himself in a state worthy of leading his own country and announced the transfer of his powers to the Prime Minister of the Russian Federation - Mikhail Mishustin, who he believed was the most suitable candidate for the post. Afterwards, Mishustin himself issued a statement in which he stressed that the country needed to change course if it wanted to survive in today's world. He called on Western partners to try to rethink their old relations and start from scratch and predicted a future for Russia in the civilised world."
 newsfop.5.a:0 "The masks have changed."
 newsfop.6.t:0 "Change in the Russian Federation?"
 newsfop.6.d:0 "Since the end of the protracted war in Donbas with the victory of the Ukrainian Armed Forces, the world's attention has been focused on Russia, which has already attracted a lot of attention by sending its regular troops to the war zone in Luhansk and Donetsk regions, and after its defeat, has become almost a laughingstock. Dark times have fallen in high places in the Kremlin. Putin, who received the majority of the blame for the disgraceful defeat, made fewer and fewer public appearances, while official statements by Nikolai Patrushev - the Secretary of the Russian Security Council, began to appear more frequently in the Russian media. Finally, at noon today, Vladimir Putin announced an emergency convocation of the Security Council. A few hours later, he said that due to his poor health, he was forced to retire from politics and go into rehabilitation, but also that he could not simply leave Russia without a head. In his view, it was Nikolai Patrushev who had all the talents a statesman needs to manage the complex mechanism we call a country. From this day forward, it will be Patrushev who will bear the title of President of the Russian Federation, and the country itself will have a future, but it is hard to say whether it will be bright or dark."
 newsfop.6.a:0 "Russia's gerontocracy is just beginning."
