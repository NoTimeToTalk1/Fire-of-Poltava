 rus_trade.1.t:0 "Trade with Russia?"
 rus_trade.1.d:0 "Despite the war, a significant part of our economy still depends on Russian imports. Some ministers insist that any trade with Moscow finances the enemy and must end immediately. Others warn that factories and power plants may suffer shortages if commercial ties are cut.\n\nThe government must choose whether principles outweigh economic convenience."
 rus_trade.1.a:0 "No trade with the aggressor."
 rus_trade.1.b:0 "Business comes first."

 war.1.t:0 "Collapse of Confederacy"
 war.1.d:0 "The establishment of the Black Sea Confederation under the leadership of the admiral in Odesa was initially seen as a promising development. However, in the end, the confederation proved to be too unstable to withstand the challenges it faced.\n Over time, the Black Sea Confederation faced numerous internal conflicts and external threats. The different regions of the confederation were deeply divided and often in conflict with one another, leading to a lack of cohesion and unity.\n One of the main factors that led to the collapse of the Black Sea Confederation was the emergence of powerful armed groups in the country. \n Ultimately, a series of conflicts between warlord groups led to the collapse of the Black Sea Confederation. The conflicts were marked by intense fighting and atrocities, including massacres of civilians. The central government was unable to intervene effectively, and as the violence escalated, the confederation completely disintegrated."
 war.1.a:0 "Storm Hit the Black Sea."
 war.2.t:0 "Volynia Starts the Counter-Terrorist Operation"
 war.2.d:0 "Yuriy Lutsenko, leader of Volhynia, has declared a 'Special Decriminalization Operation' against the Burshtyn Republic as of today. The claimed goal is to remove the current mafia from power and restore order to the region of Rivne. This follows a surprise attack by the Burshtyn bandits on the city of Lutsk, which left many civilians dead or wounded, providing the casus belli for the operation.\n It is likely that Volhynian troops will attempt to capture the amber mines, which the Burshtyn mafia currently uses as one of their primary sources of income for bribing officials and funding their army. Although the Burshtynians have amassed an army to secure their borders, it remains to be seen how they will defend against the well-trained forces of Volhynia, many of whom were formerly part of the Armed Forces of Ukraine before the collapse of the state."
 war.2.a:0 "Battle of Order Against Disorder."
 war.3.t:0 "Restoration of Order in Ternopil"
 war.3.d:0 "After the collapse of Ukraine, the Republic of Halychyna was formed under the leadership of Ruslan Koshulynskyi and the right-wing Svoboda party, which advocates for a strong, nationalist state. Ternopil, on the other hand, became known as the capital of "White Croatia," formed by a group of neo-pagans who gained control of the region. As tensions between the two states grew, border clashes and skirmishes became more frequent. Halychyna accused Ternopil of harbouring terrorists and supporting extremist groups, and Ternopil accused Halychyna of trying to impose its will on their people. The situation came to a head recently when a group of Ternopil militants attacked a Halychanyan military outpost, killing several soldiers. In response, Halychyna has launched a full-scale invasion of Ternopil today to finally restore order and regain control of the region."
 war.3.a:0 "Galician Lion has raised his sword."
 win.1.t:0 "End of the Civil War in Odesa"
 win.1.d.a:0 ""The bloody war started by political upstarts in the Odesa region is over." \n These were the first words of Admiral Ihor Voronchenko, in his first address to the public since the beginning of the Odesa Civil War. Initially in the most difficult situation, when the entire once-strong Confederation was torn into five parts by the Admiral's political rivals, even his cabinet believed that it was time to abandon neutrality and turn to the neighbours for help. But Voronchenko believed that he could win if he organised everything properly. By taking advantage of the internecine feud between the leaders who rebelled against him and by wisely allocating the available troops and resources, the Confederation managed to emerge victorious from a seemingly hopeless situation. Having defeated the Budzhak forces, as well as local nationalists and Russophiles, the Confederation forces managed to regain control of all the territories that had belonged to them before that bloodbath. Having analysed the victory speech of the head of the Black Sea Confederation, can be concluded that the Odesa region was heavily affected by the conflict, and from now on all efforts will be directed towards restoring economic, industrial, and social life in the region."
 win.1.d.b:0 "News has come from the stormy Odesa region. \n A few hours ago, the leader of the National Front, a coalition of Odesa nationalists, Serhiy Sternenko, posted on the social network Telegram that the National Militia has managed to establish control over the entire region. The National Front, which was previously only a small and weak organisation in opposition to Admiral Voronchenko's government, managed to gain the necessary support among the population, despite the most diverse predictions of political experts, and eventually defeated both the Admiral's government and other sides of the civil conflict. The views of the members of the new government in Odesa are, to be sure, quite controversial and perhaps even too radical, but only time will tell what Sternenko and his supporters are capable of."
 win.1.d.c:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. It is not known for sure what Shariy and his supporters plan to do, but there is hope that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "Freedom, Clarity, Perseverance"."
 win.1.d.d:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. Nevertheless, the Russian Expeditionary Corps, which had occupied the northern territories at the outbreak of the war, managed to hold its ground, and troops loyal to Shariy decided not to engage them. It is not known for sure what Shariy and his supporters plan to do, not only in the context of Russian troops, but also in the context of reconstruction and further policy in the region, but there is hope that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "Freedom, Clarity, Perseverance"."
 win.1.d.e:0 "The surprising news comes today from the wartorn Odesa region, as both the last remnants of the old Confederation regime and anyone who arose against it are now brutally crushed under the jackboot of the Russian peacekeepers. Being a small army group which was located in Transnistria, as soon as the Russian Expeditionary Corps stepped over the border with the "mission of local peacekeeping", they were not expected to survive for long. However, having had the best logistical starting situations in the entire conflict, Russian soldiers came out on top, now gloriously waving their flag over the city of Odesa. What they now have on their hands, however, is the bleeding and burning land, which would gladly be annexed into the Russian Federation by its own "Crimean scenario", should Putin ever even wish to waste money on reconstruction."
 win.1.a:0 "Finally, it ended."
 
 #kyiv.1.t:0 "Meeting in the zone"
 #kyiv.1.d:0 "On a dark night, as the moon slides across the sky, the tension rises over the Chernobyl Zone. Serhiy Hryhorovych, known to the great stalkers as an influential figure in the Chornobyl Zone, came up with a clue that shook the stalker world.\nOn the front line of Pripyat, near the famous ammunition factory, Hryhorovych gathered legendary stalkers from all over the Zone. Lighting devices scattered light around them, but beyond this rite, darkness reigned.\nThe solemn moment came when Hryhorovych raised his hand, making everyone bend their heads.\n"Today we stand together as one. From now on, we are the Chornobyl Confederation," his words penetrate the soul of every stalker, reminding them of the invincible power of the Zone.\nFollowing this solemn moment, representatives of different factions and stalker groups are elected to form the basis of the Chornobyl Confederation. Their task is to define a new strategy for the Zone and make it more independent and influential."
 #kyiv.1.a:0 "Go on your way, stalker!"
 #plt.1.t:0 "Tesak in the National Corpus"
 #plt.1.d:0 "Recently, unidentified persons staged a riot in the SIZO No. 3 of the Tkaktorozavodsky district of Chelyabinsk. The prisoners started fighting with the guards on their way out and were shot at, but some of them managed to break through. One of them was Maksym Martsynkiewicz, also known as Tesak. He had been a Nazi ideologue and leader of some neo-Nazi organisations before his imprisonment, but the situation has changed. Having lost his contacts with like-minded people, Tesak travelled to the west without any documents or money. On the way, he heard on the radio the news about the civil war in Ukraine and the proclamation of a state in Poltava region by the far-right and Nazis. Hearing this, he realised that this was his chance. Taking 45,000 rubles from his emergency stash, he drove to the border, where, after paying a generous bribe, he was able to enter Ukraine without any questions. He followed the road signs to Poltava, where he went to the local military registration and enlistment office. There, he introduced himself and told them about his views and merits, and emphasised that he had military experience. After that, he was sent to the command, where he received new documents and was accepted into the combat units of the National Corps, and because of his "experience" he was promoted to the rank of brigadier general. It will be seen later whether it was the right decision... "
 #plt.1.a:0 "In our situation, we will be happy to have any help."
 #win.1.t:0 "Yellow press wins in civil conflict in Odesa region"
 #win.1.d:0 "Today, the Border Guard Service of Romania, part of the European Union, reported a cessation of gunfire and explosions from the border with the former Black Sea Confederation and the raising of a flag at a checkpoint used by supporters of the leader of one of the rebellions in the Odesa region, who call themselves the "Sharyashchie". Further news from the region reported the complete capture of the remnants of the Confederation and Mykolaiv autonomy by the troops of the formation called the "Sharyashchaya Respublika". The head of the newly formed "state" was Anatoliy Shariy, a Ukrainian journalist of ill repute who is often credited with loyalty to the Kremlin. Having raised an uprising against the authorities in the city of Pervomaisk, he began fighting with representatives of the Confederation as well as local nationalist revolutionaries, and unexpectedly for the whole world, he was able to emerge victorious from a clearly unequal struggle. It is not known for certain what Shariy himself and his supporters intend to do, but it is hoped that they will stick to the slogans with which they recruited volunteers and went into battle, more precisely, "freedom, clarity and perseverance"."
 #win.1.a:0 "This guy sharyt!"
 #win.2.t:0 "Nationalists wins in the Civil War"
 #win.2.d:0 "News has come from the stormy Odesa region. A few hours ago, the leader of the National Front, a coalition of Odesa nationalists, Serhiy Sternenko, posted on the social network Telegram that the national militia had managed to establish full control over the entire region. \n The National Front, which was previously only a small and weak organisation in opposition to Admiral Voronchenko's government, managed to gain the necessary support among the population, despite the most diverse predictions of political experts, and eventually defeated both the admiral's government and other parties to the civil conflict. The views of the members of the new government in Odesa are, to be sure, quite controversial and perhaps even too radical, but only time will tell what Sternenko and his supporters are capable of."
 #win.2.a:0 "Their russophobia is hard as enough."
 #win.3.t:0 "Russian Army Victorious in Odesa"
 #win.3.d:0 "The surprising news comes today from the wartorn Odesa region, as both the last remnants of the old Confederation regime and anyone who arose against it are now brutally crushed under the jackboot of the Russian peacekeeper. Being a small army group which was located in Transnistria, as soon as the Russian Expeditionary Corps stepped over the border with the "mission of local peacekeeping", they were not expected to survive for long. However, having had the best logistical starting situations in the entire conflict, Russian soldiers came out on top, now gloriously waving their flag over the city of Odesa. \n What they now have on their hands, however, is the bleeding and burning land, which would gladly be annexed into the Russian Federation by its own "Crimean scenario", should Putin ever even wish to waste money on reconstruction"
 #win.3.a:0 "Is Russia here forever?"
 #win.4.t:0 "Admiral forces wins the Civil War"
 #win.4.d:0 ""The bloody war started by political upstarts in the Odesa region is over." These were the first words of Admiral Ihor Voronchenko, in his first address to the public since the beginning of the Odesa Civil War. Initially in the most difficult situation, when the entire once strong Confederation was torn into five parts by the admiral's political rivals, even his cabinet believed that it was time to abandon neutrality and turn to the neighbours for help. But Voronchenko believed that he could win if he organised everything properly. By taking advantage of the internecine feud between the leaders who rebelled against him and by wisely allocating the available troops and resources, the Black Sea Confederation managed to emerge victorious from a seemingly hopeless situation. Having defeated the Budzhak forces, as well as local nationalists and Russophiles, the Confederation forces managed to regain control of all the territories that had belonged to them before that bloodbath. Having analysed the victory speech of the head of the Black Sea Confederation, we can conclude that Odesa region was heavily affected by the conflict, and from now on all efforts will be directed towards restoring economic, industrial, and social life in the region."
 #win.4.a:0 "Odesa - pearl of the sea."
 win.5.t:0 "Ukrainian Reunification"
 win.5.d:0 "In a historic turn of events, the Ukrainian nation witnessed a momentous day of unity as forces led by Oleksiy Danilov, alongside the National Security and Defense Council (RNBO), orchestrated the reunification of regions previously divided.\nUnder the visionary leadership of Oleksiy Danilov, native of the Luhansk region, and the coordinated efforts of the RNBO, the dream of reuniting estranged regions was realized.\nAddressing the gathering press, Danilov emphasized the significance of the moment, stating, "Today, we stand united, not as separate territories, but as a single nation. Our history, our culture, and our aspirations have always bound us together. Let us rebuild what was once torn apart, and let our shared vision propel us to prosperity."\nAs part of the reunification plan, comprehensive initiatives are set to roll out, including economic revitalization projects, cultural exchange programs, and social integration efforts. The government's dedication to the well-being of the reunited regions is underscored by these ambitious endeavors, designed to ensure that the shared journey towards progress leaves no one behind. Messages of support from across the globe resonated with the nation's aspiration for peace and harmony.\nAs the sun set on the day of reunification, the resonance of hope and unity lingered in the hearts of every Ukrainian. The journey ahead is promising. The Ukrainian nation, once divided, now stands stronger than ever as a united force, ready to embrace the opportunities that lie ahead."
 win.5.a:0 "§2The Fire§! §Hof Poltava§! was finally put out."
 ode.8.t:0 "New faces"
 ode.8.d:0 "The day of choice has come - who will replace Trukhanov as head of Odesa?"
 ode.8.a:0 "Oleksiy Goncharenko!"
 ode.8.b:0 "Adnan Kivan!"
 ode.8.c:0 "Oleg Filimonov!"
 ode.8.e:0 "Nataliya Dalieva!"
 ode.7.t:0 "Trukhanov's resignation"
 ode.7.d:0 "The Admiral had been investigating Trukhanov's alleged involvement in a corruption scheme for several months. The evidence against Trukhanov was mounting, and the Admiral could no longer turn a blind eye to the allegations.\n In a closed-door meeting with his top advisors, the Admiral announced his decision to suspend Trukhanov from his position as head of the City of Special Importance Odesa, pending an investigation into the corruption allegations. The decision was met with some resistance from Trukhanov's allies, but the Admiral stood firm in his conviction that corruption could not be tolerated in the new Confederation."
 ode.7.a:0 "Who will be able to become the new head of Odessa?"
 ode.6.t:0 "Fate Of Odesa"
 ode.6.d:0 "Trukhanov's victory over the National Front in the civil war had left him in a position of great power and influence. However, his reputation was also tainted by allegations of corruption and fraud. As the question of extending special powers for Trukhanov arose, he was faced with a difficult decision. \n The first option available to Trukhanov was to use his powers to create a special subject of the confederation - the City of Special Importance Odessa. This would allow him to consolidate his power and maintain his position of authority within the city. The creation of this special subject would give Trukhanov control over a wide range of economic, political, and social issues within Odessa. This would include the ability to set taxes, create laws, and even establish a separate legal system. \n However, this option would also come with a significant downside. It would only serve to reinforce the allegations of corruption and fraud that have been leveled against Trukhanov. By consolidating his power and control over the city, Trukhanov would give his critics more ammunition to use against him. Moreover, this option could potentially lead to tensions between Odessa and the rest of the confederation, as Trukhanov's increased power and influence could be perceived as a threat to the unity of the country. \n The second option available to Trukhanov was to abandon the idea of a special status for Odessa and return to the pre-war way of doing things. This would allow Trukhanov to distance himself from the allegations of corruption and fraud that have been leveled against him. By returning to the pre-war way of doing things, Trukhanov would be able to demonstrate his commitment to transparency and good governance. \n However, this option also comes with a significant downside. It would mean that Trukhanov would lose much of his power and influence within the city. He would be forced to operate within the confines of the existing political and economic structures, which may not be as conducive to his goals as the creation of a special subject. Additionally, this option could also be seen as a sign of weakness, which could embolden Trukhanov's critics and opponents."
 ode.6.a:0 "We want to join Admiral."
 ode.6.b:0 "We should have a autonomy status!"
 
 newsfop.1.t:0 "Opening of the Crimean Bridge"
 newsfop.1.d:0 "Today is 30 June 2020, and people are celebrating in Crimea and Russia. The so-called Crimean Bridge, which began construction in 2016, has been officially completed at Russian expense, connecting the coasts of Crimea and Kuban. On this occasion, the Head of the Republic of Crimea - Sergey Aksyonov, and the President of the Russian Federation - Vladimir Putin, personally arrived on the shore of the Taman Peninsula, where they made a speech that Russian and Crimean media called " historically momentous", symbolically cut a red ribbon on two opposite sides, and then fired fireworks into the air. This huge event was the last part of the US$4 billion Kerch Strait Bridge project, which took more than four years to complete. During the fireworks, a KAMAZ truck arrived at the bridge, driven by Putin himself, with Aksyonov next to him. Accompanied by cameras, they decided to drive across the bridge and meet the cheering crowd in Kerch itself, where they congratulated the people of Crimea on the beginning of a new era - an era when Crimea will always have Russia as a neighbour."
 newsfop.1.a:0 "A beautiful illegally built bridge was made..."
 newsfop.2.t:0 "Sumy Seized by Avant-Garde Terrorists"
 newsfop.2.d:0 "An event very out of attitude for the generally peaceful north of Ukraine has occurred today, more precisely, in Sumy. Reports have come in suggesting that at precisely noon a coordinated group of armed men stormed the city and regional councils of Sumy, with videos posted on YouTube, TikTok and Telegram by the local residents appearing to show gunfire near administrative buildings in either singular intervals or full-fledged gunfights. Internet monitors from around the world have noted that internet and telecommunications in the Sumy region was down from about an hour after the attack to the evening of today, resulting in a 5-hour information blackout immediately following the videos posted to the social media platforms. \n\nIt has become clear now that the attack was orchestrated by the militant nationalist AKS group, following a claim of responsibility video posted on their Telegram page. This video has stated that they launched a coup on behalf of the people against the Sumy authorities loyal to the Poroshenko dissident government. The video also states that four police officers fighting against the AKS and the Sumy City Council head, Oleksandr Lysenko were killed, though at the time of writing, CNN could not verify these casualty claims."
 newsfop.2.a:0 "No one Escapes the Fire."
 newsfop.3.t:0 "Separatists' victory in the war in Donbas"
 newsfop.3.d:0 "The conflict in Eastern Europe, which the international community has been watching since 2014, is finally over. Despite all the expectations and predictions of many international experts, it was not the Ukrainian army that won the war for Donbas, but the forces of the self-proclaimed "LDPR" with the support of Russia, which provided the revolted side with military and humanitarian support. Having inflicted catastrophic defeats on the Ukrainian army on the battlefield, the "Novorossiya" forces, formed from the two Donbas republics, occupied key cities and communication hubs, making it impossible for the Ukrainian army to resist further as a unified, organised structure, leaving it with only a guerrilla front. Having won a significant victory, the Donbas government announced that it had managed to capture part of the military leadership, including the commander-in-chief of the AFU - Serhiy Kryvonos. Thus, peace did indeed prevail in Donbas, but not quite the peace that everyone expected."
 newsfop.3.a:0 "Peace is surely great, but can we be sure that it is good news?"
 newsfop.4.t:0 "Ukraine stands victorious in Donbas"
 newsfop.4.d:0 "After an official address from Serhiy Kryvonos himself, it became clear, that the Ukrainian army has finished the seemingly impossible deed, even united Ukraine couldn't - crush the weakened separatists in Donbas, marking the end to years of bloodshed. As the Ukrainian flag is raised above the last city in the region, massive reintegration processes start, with the fate of DPR and LPR ex-leaders unknown. Though Russian officials are yet to make a commentary on the issue, this is deemed a huge reputational blow for the Federation itself, and the opposite for the Ukrainian military provisional government, which now has clearly ascended on the list of "favourites" to reunify Ukraine, that's if they wouldn't wish to join one of the sides, of course..."
 newsfop.4.a:0 "Well, everything happened as we predicted"
 newsfop.5.t:0 "Mishustin Named Successor to Putin"
 newsfop.5.d:0 "A televised broadcast from the Kremlin today has named Mikhail Mishustin, Prime Minister of Russia, as Vladimir Putin's successor to the role of President of Russia. This broadcast follows the announcement of an emergency convocation of the Security Council of Russia, following, and based most likely on the Russian Armed Forces failure to suppress the Armed Forces of Ukraine in renewed conflict in the Donbas that has completely collapsed the Novorossiyan Republic. It has been noted that Putin, in recent days, was appearing in decreasing amounts of interviews, and that he has also disappeared in the wake of Mishustin's ascension to the presidency. \n\nThis event will have far-reaching consequences for Eastern Europe and the international world, as Mishustin has been known for displaying rhetoric that can be considered more liberal than his predecessor, illustrated most strongly by the fact that Mishustin issued a statement after the broadcast stressing that Russia needed to change course if it wanted to survive in todays world, calling on Western partners to rethink relations soured by the 2014 invasion of Ukraine, and predicted a future for Russia in the civilised world of today."
 newsfop.5.a:0 "Maybe The Only Way Is Up?"
 newsfop.6.t:0 "Putin Replaced by Own Secretary"
 newsfop.6.d:0 "The Kremlin has announced in a press conference today that Vladimir Putin, President of the Russian Federation will step down and retire from Russian politics in favour of the Secretary of the Russian Security Council, Nikolai Patrushev. This sudden development has come in light of the mishandling of the War in Donbas by the Russian Federation, caused by the fall of both the Donetsk and Luhansk People's Republics/Novorossiya, and by the defeat of Russian Armed Forces personnel sent as a last-ditch effort to pacify the Armed Forces of Ukraine. \n\nIt has been noted that before this press conference, an emergency convocation of the Russian Security Council was called precisely due to the Armed Forces' failed pacification, spawning speculation that this was done to deflect blame placed on Putin by international media and Russian society alike. Nikolai Patrushev will now be bestowed with the title of President of the Russian Federation, a role that will ultimately decide what course Russia will take on the international stage. \n\nThe Armed Forces of Ukraine have not responded to a CNN request for comment."
 newsfop.6.a:0 "Nothingburger."
 newsfop.7.t:0 "TBD"
 newsfop.7.d:0 "TBD"
 newsfop.7.a:0 "TBD"
 newsfop.8.t:0 "Joe Biden wins the election!"
 newsfop.8.d:0 "Democrat candidate for President, Joe Biden, has been elected as President of the United States of America. He has beaten incumbent Republican president Donald Trump and his bid for re-election. Joe Biden has previously served as Vice President for Barack Obamas administration, in which he oversaw the implementation of the Recovery Act, an act that added two million jobs for Americans nation wide. He has also ran consecutively as a Senator for the state of Delware from January 3rd, 1973 to January 15th, 2009. During his time as Senator, he helped sign and pass the Comprehensive Crime Control Act of 1984, which implemented new Federal crimes such as Arson, Credit Card Fraud, and many more. In his Presidental campaign, he promises to create the Build Back Better Plan, which would improve national infrastructure, invest in green energy, invest in childcare and families, and regain a foothold in the international auto industry. He also promises to bring back Obamacare and improve it from its original state. His Inaguration will be January 20th of next year, and sworn in as the 46th President of the United States of America."
 newsfop.8.a:0 "Hooray for Democracy!"
 newsfop.9.t:0 "Donald Trump elected for a second term!"
 newsfop.9.d:0 "Incumbent Republican President Donald Trump has been re-elected as President of the United States for a second term, beating his Democrat opponent Joe Biden in a narrow victory for president of the United States.  Trump promises he would instruct the Department of Justice to open civil rights investigations into "Radical Left" prosecutors offices that engage in racial enforcement of the law, encourage Congress to use their legal authority over Washington DC, to restore law and order, and overhaul federal standards of disciplining minors to address rising crimes like carjackings. He also promises to further the process of stopping "never-ending wars" by vowing to remove warmongers, frauds, and 'failures' in the senior ranks of the United States government. and replace them with national security officials, who would defend America’s interests, as he states. He promised that he would stop lobbyists and government contractors from pushing senior military officials towards war. Another promise he has made is to diplomatically support Pro-Russian governments inside of a fractured Ukraine, Stating that "If we were to not recognize the legitimate government of Ukraine, there is a chance we could have problems down the line with Russia, and possibly, a third world war."\nHe will be inaugurated a second time on January 20th of next year."
 newsfop.9.a:0 "This will destabilize the nation.."
 newsfop.10.t:0 "Bernie Sanders wins the election!"
 newsfop.10.d:0 "Bernie Sanders, a democrat leaning independent senator from Vermont, has won the US Presidential election. He has previously ran for Democratic candidate for the 2016 presidential election, having lost to Hilary Clinton. He has ran as Senator from 2007 in the state of Vermont, he has also been appointed as chairman of the Health Education Labor and Pension Committee. He has affiliated himself as an independent since 1978, but changed his affiliation this national election. His Campaign promises are to create 20 million jobs and replace all energy with renewable energy sources, invest in public transportation and infrastructure, end the fossil fuel industry’s “greed” and remove all dirty fuels, end homelessness and the housing crisis, increasing taxes for large corporations/businesses, removing corporate money from politics, and empowering various marginalized groups such as Native Americans, Women, and disabled people.\nHe will be inaugurated as president on January 20th of next year."
 newsfop.10.a:0 "The help he asked for was justified."
 newsfop.12.t:0 "Russia questions legitimacy of authorities in Ukraine"
 newsfop.12.d:0 "After Ukraine, fragmented into dozens of regimes and illegitimate governments, was united by the Azov regiment and other Ukrainian units that fought a brutal war in Donbass with fire and sword, unleashed by Vladimir Putin's Russian regime back in 2014, the world questioned the legitimacy of such a government under the thumb of major players in the political arena.\nThe government of the Russian Federation has been particularly aggressive towards New Ukraine. Having suffered a total defeat in eastern Ukraine and effectively handing over the region to radical right-wing Ukrainian nationalists, the Kremlin decided to "turn the screws" and after a reshuffle in the government, Russia has entered the political arena and is threatening to attack Ukraine again. "
 newsfop.12.a:0 "Are Russians learning from their mistakes?"
 newsfop.13.t:0 "Russia has attacked Ukraine!"
 newsfop.13.d:0 "It happened. After a short preparation, Russia declared that it does not recognise the new government of Ukraine and, disregarding all international treaties, especially those signed after the collapse of Ukraine in 2019, attacked the territory of the neighbouring country.\nUkraine met the invaders with arms in their hands. The government convened by the ultra-rightists of Azov was able to ideologically prepare the population for war with its great neighbour, they had been preparing the population for this war long before the unification of Ukraine. Despite everything, the Russian authorities assured that they will not use nuclear weapons for the time being. But this is not accurate information. The strength of courage and weapons will show who is stronger."
 newsfop.13.a:0 "Who would have thought that would happen."
 newsfop.15.t:0 "The Conservative Party victory"
 newsfop.15.d:0 "The Conservative Party of the United Kingdom won a landslide victory in the general election held on 12 December 2019. Prime Minister Boris Johnson and his team won a significant majority in the House of Commons, which gave them a mandate to implement their political programme, including the completion of the UK's withdrawal from the European Union. In total, the Conservative Party won 365 seats in parliament, 47 more than in the previous 2017 elections. The Labour Party, which was the main opponent of the Conservatives, won only 203 seats, which is 59 fewer than in the previous election. This was the worst result for Labour since 1935.\nDuring his victory speech, Boris Johnson said that the government would now be able to focus on implementing the will of the people and quickly complete the Brexit process. He emphasised that the election results show a clear mandate to leave the EU, which will be completed by 31 January 2020."
 newsfop.15.a:0 "Another Tory victory."
 newsfop.16.t:0 "The Labour Party victory"
 newsfop.16.d:0 "In the UK general election held on 12 December 2019, the Labour Party won an unexpected victory, gaining a significant number of seats in parliament. Under the leadership of Jeremy Corbyn, Labour won 326 seats in the House of Commons, allowing it to form a majority government. This result was a major blow to the Conservative Party, which won only 298 seats, losing a significant number of seats compared to the previous 2017 election. The Conservatives' defeat indicates that voters have decided to support Labour's centre-left policies focused on social justice and economic reform. In his victory speech, Jeremy Corbyn said that his government would seek to unite the country and implement an ambitious programme of change. The new government's main priorities will be to nationalise key industries such as railways and water, increase funding for the National Health Service and increase investment in education and social services. Corbyn has promised to hold a new referendum on leaving the European Union, giving citizens the opportunity to choose between a new deal that his government will try to negotiate with the EU and remaining in the Union."
 newsfop.16.a:0 "Britain's future."
 
 
