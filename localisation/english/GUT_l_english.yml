 gut.1.t:0 "Proud sons of Galychyna"
 gut.1.d:0 "The Gutsul people have a long-standing history and unique cultural identity rooted in the Carpathian Mountains. They proudly preserve their traditions, folklore, music, and vibrant handicrafts, which have been passed down through generations. Gutsul embroidery, intricate woodcarvings, and handwoven rugs reflect the creativity and skill of the local artisans. The region also celebrates lively festivals and folk dances, where residents come together to honor their heritage and reinforce a strong sense of community."
 gut.1.a:0 "Long Live Gutsulian People!"
