    #Events
DPRelection.1.t:0 "Elections in Republic"
DPRelection.1.d:0 ""
DPRelection.1.a:0 "Vote for Pushilin!"
DPRelection.1.b:0 "Time for changes."
DPRelection.2.t:0 "Meeting"
DPRelection.2.d:0 "The three opposition leaders sat around the table, each with their own vision of how the country should be governed. Strelkov, Pasechnik and Vitrenko.\n\nAs they discussed who should be the head of the opposition, tensions began to rise. Strelkov insisted that his paternalistic approach was the only way to ensure the welfare of the people, while Pasechnik argued that his conservative policies would win over the majority of the population. Vitrenko scoffed at their ideas, calling them outdated and irrelevant.\n\nThe debate became heated, and Vitrenko began to accuse all those present of being puppets of the ruling party. Strelkov, growing angry, stood up and announced that he would not participate in such a farce any longer. His guards followed him out of the room, leaving Pasechnik and Vitrenko to continue their argument.\n\nAs the door slammed shut behind Strelkov and his entourage, Pasechnik and Vitrenko exchanged glances. It was clear that their differences were too great to be bridged, and that the opposition was hopelessly divided.\n\nFor a moment, they sat in silence, pondering the future of their country. Then Pasechnik spoke up.\n\n"Perhaps it's time for us to go our separate ways," he said. "We can each pursue our own vision of the future, and see which one prevails in the end."\n\nVitrenko nodded, and the two of them left the room, each lost in their own thoughts. They knew that the road ahead would be difficult, but they were determined to fight for what they believed in, no matter the cost."
DPRelection.2.a:0 "It's time for us to go our own way."
DPRelection.3.t:0 "Choosing a Future"
DPRelection.3.d:0 "Ivan stood in front of the propaganda posters that had been plastered all over the walls of Mariupol. He looked at the faces of the three opposition candidates - Strelkov, Pasechnik, and Vitrenko - and tried to decide which of them would be best suited to lead the Donetsk People's Republic.\n\nIvan had lived in the DPR didn't live long time, but he had seen the effects of the war on his community. He wanted a leader who would put an end to the fighting and bring about a lasting peace. He also wanted someone who would work to improve the economy, create jobs, and provide better living conditions for the people.\n\nAs he looked at the posters, he thought about each of the candidates' platforms. Strelkov, the paternalist, promised to take care of the people from cradle to grave, but Ivan wondered if that would come at the cost of personal freedom. Pasechnik, the Conservative Democrat, promised to preserve traditional values, but Ivan worried that his policies might be too narrow-minded. Vitrenko, the radical socialist, promised to overthrow the capitalist system, but Ivan wondered if that would lead to chaos and violence.\n\nIn the end, Ivan decided that he wanted a leader who would listen to the people and work to bring about real change. He knew that it wouldn't be easy, but he was determined to make his voice heard.\n\nAs he walked away from the posters, Ivan made a decision. He would attend the upcoming opposition rally and listen to what each of the candidates had to say. He would ask them tough questions and demand honest answers. And when the time came to vote, he would make his decision based on what he believed was best for his community, his country, and his future."
DPRelection.3.a:0 "He would find the right choice."
DPRelection.4.t:0 "Massacre in Donetsk"
DPRelection.4.d:0 "Ivan had arrived in Donetsk just in time for the most massive opposition protest the city had ever seen. Tens of thousands of people had taken to the streets to support their candidates, and the atmosphere was electric with excitement and tension.\n\nAs Ivan made his way through the crowd, he saw supporters of all the opposition parties. Strelkov's FDP, Pasechnik's conservative DPN, and Vitrenko's SWPD. The police were out in full force, trying to stop the advance of the protesters, and tensions were running high.\n\nSuddenly, Ivan heard a commotion up ahead. He pushed his way through the crowd to get a better view and saw that supporters of Pushilin, the current leader of the Donetsk People's Republic, had also taken to the streets. The police were trying to keep the two groups apart, but it was clear that the situation was about to escalate.\n\nIvan looked up and saw Vitrenko on a nearby hill, chanting her slogans and urging the crowd to keep fighting. He knew that he had to get to her and find out what she thought about the current situation.\n\nBut as he pushed his way through the throngs of people, an armed clash broke out between the protesters and Pushilin's supporters, with the police caught in the middle. The chaos was overwhelming, and Ivan was forced to run as fast as he could from the collision site.\n\nAs he sprinted through the streets, Ivan could hear the sounds of screams and gunfire behind him. He knew that the situation was only going to get worse, and he wondered if he had made a mistake by coming to the protest in the first place.\n\nFinally, Ivan managed to escape the chaos and find a quiet corner where he could catch his breath. He looked around and saw that the city was still in chaos, with fires burning and people running in all directions.\n\nBut even in the midst of all the turmoil, Ivan knew that he had to keep fighting for what he believed in. He had seen firsthand the passion and dedication of the opposition supporters, and he knew that they would never give up their fight for a better future."
DPRelection.4.a:0 "But is it worth it?"
DPRelection.5.t:0 "Fateful Decision"
DPRelection.5.d:0 "Tsaryov sat in his office, looking out the window and pondering his next move. He knew that he had no chance of winning the upcoming election, but he also knew that he could use his position to his advantage.\n\nHe had been a spoiler candidate before, a tool for Pushilin to siphon off votes from the other opposition candidates. But Tsaryov knew that he could do more than that. He could stay Pushilin's puppet, or he could make an alliance with one of the other opposition parties - Pasechnik's conservative democrats or Strelkov's paternalists.\n\nTsaryov weighed the pros and cons of each option. He knew that if he stayed with Pushilin, he would have some measure of power and influence, but he would always be beholden to the current leader. On the other hand, if he allied with Pasechnik or Strelkov, he could potentially gain more power, but he would also have to give up some of his own ideals and values.\n\nAs he sat there, pondering his decision, Tsaryov suddenly realized that he had leaned towards an alliance with one of the opposition candidates. He wasn't quite sure which one yet, but he knew that he needed to start making some strategic moves.\n\nTsaryov picked up his phone and began to make some calls. He knew that he needed to be careful, but he also knew that he couldn't afford to waste any more time. The election was fast approaching, and he needed to make his move before it was too late.\n\nIn the end, Tsaryov made his decision. He knew that he would face some backlash, but he also knew that it was the right thing to do. He called a press conference and announced that he would be aligning himself with one of the opposition candidates.\n\nOnly time would tell if his decision was the right one, but for now, Tsaryov was content with the knowledge that he was doing what he believed was best for his country and his people."
DPRelection.5.a:0 "One more choice left."
DPRelection.6.t:0 "General and Politician"
DPRelection.6.d:0 "Tsaryov picked up the phone and dialed Strelkov's number. He knew that this conversation would be critical, and he needed to be sure that he could negotiate the best possible deal.\n"Hello, Tsaryov," Strelkov said, answering the phone. "What can I do for you?"\n"General Strelkov," Tsaryov replied. "I've been thinking about our conversation the other day, and I've come to a decision. I would like to form an alliance with you and your party."\nStrelkov was silent for a moment, considering Tsaryov's proposal. "I see," he said finally. "And what, exactly, do you have to offer us?"\n"Well," Tsaryov began, "I believe that I can bring some valuable resources and support to your party. In exchange, I would like a place in the new government. I believe that I can be a valuable asset to your team."\nStrelkov was silent for another moment, and Tsaryov could hear him breathing on the other end of the line. Finally, he spoke. "I think we could come to an agreement," he said. "But we'll need to discuss the specifics."\nTsaryov breathed a sigh of relief. He knew that negotiating with Strelkov would be tough, but he was confident that he could get what he wanted. "That's great news," he said. "When can we meet to discuss this further?"\n"Tomorrow morning," Strelkov said. "My office. Nine o'clock."\nTsaryov nodded, even though he knew that Strelkov couldn't see him. "I'll be there," he said. "Thank you, General."\n\nThe next morning, Tsaryov arrived at Strelkov's office promptly at nine o'clock. He was nervous, but he was also determined. He knew that this meeting would be crucial to the success of his alliance with Strelkov.\nAs he sat down across from Strelkov at the conference table, Tsaryov could feel his heart pounding in his chest. "So," he said, "let's talk about the specifics."\nOver the next few minutes, Tsaryov and Strelkov hammered out the details of their alliance. Tsaryov would be given a place in the new government, as he had requested, and Strelkov's party would provide him with the resources and support that he needed to succeed.\nAs they shook hands at the end of the meeting, Tsaryov couldn't help but feel a sense of satisfaction. He knew that he had taken a risk, but he also knew that it had paid off. He was now a part of a powerful political alliance that had the potential to change the face of the Donetsk People's Republic forever."
DPRelection.6.a:0 "One more step to success."
DPRelection.7.t:0 "Coalition of Two"
DPRelection.7.d:0 "Tsaryov sat in his office, feeling a mixture of anticipation and nervousness as he prepared for his negotiation with Pasechnik. He knew that this meeting would determine the course of his political career and potentially shape the future of the Donetsk People's Republic.\nAs the door opened, Pasechnik walked in with a determined expression on his face. They exchanged greetings, and Tsaryov wasted no time in getting down to business.\n"I appreciate you taking the time to meet with me, Mr. Pasechnik," Tsaryov began. "I believe we can find common ground and create an alliance that will benefit both of our parties. However, I have a few conditions."\nPasechnik listened intently, ready to hear Tsaryov's demands. He knew that in order to secure Tsaryov's support, he would have to offer something substantial.\nTsaryov leaned forward, his voice firm yet measured. "First and foremost, I demand a significant position in the new government. I want to have a say in shaping policies and making decisions that will directly impact the people of our republic. I need to ensure that our voices are heard and that our alliance is more than just symbolic."\nPasechnik nodded, understanding the weight of Tsaryov's request. He recognized that Tsaryov's endorsement could help sway voters and strengthen their opposition coalition.\nAfter a few moments of silence, Pasechnik responded, "I hear your request, Mr. Tsaryov, and I understand its importance. I am willing to offer you a prominent role in the new government, one that reflects your capabilities and the trust you have earned among the people. Together, we can create a united front and work towards a better future for our republic."\n\nTsaryov considered Pasechnik's offer, weighing the possibilities in his mind. He had hoped for a favorable outcome, but he also knew the importance of compromise. This alliance had the potential to bring about real change, and he couldn't let this opportunity slip away.\nFinally, Tsaryov extended his hand towards Pasechnik, a gesture of agreement and collaboration. "Thank you, Mr. Pasechnik. I believe that together, we can form a formidable force that will challenge the current leadership and lead our republic towards progress. Let's work towards a better future for our people."\nPasechnik shook Tsaryov's hand firmly, sealing their agreement. "I'm glad we could come to an understanding, Mr. Tsaryov. Our united efforts will bring hope and stability to our republic. Together, we will make a difference."\n\nWith the negotiation concluded and the alliance formed, Tsaryov felt a surge of excitement. This was just the beginning of a new chapter in his political journey, one filled with both challenges and opportunities. As he sat back in his chair, he couldn't help but feel a sense of optimism for what lay ahead, knowing that he had taken a significant step towards achieving his goals and shaping the future of the Donetsk People's Republic."
DPRelection.7.a:0 "Forward to democracy."
DPRelection.8.t:0 "Last Call"
DPRelection.8.d:0 "Tsaryov sat in his office, a mix of determination and contemplation on his face. He looked out of the window, watching the people on the streets below, their faces filled with anticipation and longing for change. They yearned for peace and stability in their country, and Tsaryov knew that he had the power to make a difference.\nAs he gazed at the crowd, his mind raced with thoughts of the immense responsibility resting on his shoulders. This was his second chance, his last opportunity to play a major role in shaping the future of the Donetsk People's Republic. He couldn't afford to let it slip away.\nThe weight of his decision settled upon him, as he realized that the road ahead wouldn't be easy. The challenges would be many, and the sacrifices great. But as he looked at those hopeful faces, Tsaryov knew that he couldn't turn back now. He had to step up and lead.\nJust as his determination solidified, a sudden ring interrupted his thoughts. The sound echoed through the office, and Tsaryov reached for the phone, his heart pounding with anticipation."
DPRelection.8.a:0 "Mr. Tsaryov?"
DPRelection.9.t:0 "Deal with the Devil"
DPRelection.9.d:0 "General Strelkov sat in his office, contemplating the recent worker's strike that had gripped the Donetsk People's Republic. He knew that the strike threatened the stability of the region and the support for President Pushilin's regime. With a deep sigh, he decided it was time to make a bold move.\nPicking up the phone, Strelkov dialed President Pushilin's number. After a few moments, the familiar voice of Pushilin answered on the other end.\n"President Pushilin, it's General Strelkov," he said in a calm but assertive tone. "I believe I have a solution for the worker's strike that has been causing unrest in our republic."\nPushilin, intrigued by the call, listened intently. He knew Strelkov's reputation as a tactical leader and understood the weight of his words.\n"What do you propose, General?" Pushilin asked, a hint of curiosity in his voice.\nStrelkov seized the opportunity to present his offer. "I offer my assistance in suppressing the worker's strike. My forces are disciplined and experienced, and we can swiftly restore order. In return, I request permission to have a dedicated time slot on state television to present my propaganda, so I can reach a broader audience and convey my vision for the future."\n\nPushilin contemplated the proposal for a moment. He knew that Strelkov's military prowess could indeed help quell the unrest, and having him on his side would strengthen his position. However, granting Strelkov a platform on state television would also give him significant influence and potentially challenge Pushilin's authority.\nAfter a moment of silence, Pushilin responded cautiously, "General Strelkov, I appreciate your willingness to assist, but granting you dedicated airtime comes with its risks. It is a delicate matter that requires careful consideration."\nStrelkov understood Pushilin's concerns but persisted. "President Pushilin, the strike threatens our stability. With my forces aiding you, we can swiftly put an end to the unrest. The dedicated airtime would help me convey my ideas, ensuring a unified message to the people. Together, we can restore order and maintain the support of our citizens."\nPushilin weighed the potential benefits and risks of Strelkov's proposition. In the end, he realized that the stability of the republic was paramount.\n\n"General Strelkov, I accept your offer," Pushilin finally declared. "Your assistance in suppressing the strike is much needed, and I understand the importance of a united front. You shall have your dedicated airtime, but let it be known that it comes with certain boundaries and restrictions."\nStrelkov nodded, acknowledging the conditions. He knew that compromises had to be made for the sake of the republic's stability and the progress of his own agenda.\nAs the call ended, Strelkov felt a sense of both satisfaction and anticipation. The path forward was set, and he was now prepared to lead his forces into action, ready to suppress the worker's strike and convey his message to the masses."
DPRelection.9.a:0 "It was worth it."

March.1.t:0 "Massacre in Donetsk"
March.1.d:0 "The city of Donetsk, in the heart of the Donetsk People's Republic, was shaken by a brutal massacre that left 360 people dead and hundreds more injured. The violence erupted during a massive opposition protest, which had attracted tens of thousands of people from across the region.\n\nThe clash between the police and Strelkov's military formations began when the police tried to stop the advance of the protesters, who were demanding a change in leadership and an end to the ongoing conflict. The protesters, led by Strelkov's supporters, refused to back down and began to push forward towards the government buildings.\n\nThe police responded with force, using tear gas, water cannons, and rubber bullets to disperse the crowd. But the protesters, armed with sticks, stones, and even some firearms, fought back fiercely, determined to push through and make their voices heard.\n\nAs the violence escalated, the military formations led by Strelkov joined the fray, adding another layer of chaos and bloodshed. The situation quickly spiraled out of control, with both sides engaging in brutal street fighting that lasted for hours.\n\nBy the time the dust settled, the city was in shambles, with buildings burned and destroyed, and bodies lying in the streets. The death toll was staggering, with 360 people killed and hundreds more injured.\n\nThe aftermath of the massacre has left the city reeling, with residents struggling to come to terms with the scale of the violence. The government of the Donetsk People's Republic has declared a state of emergency and imposed a curfew, but many fear that the situation is far from resolved.\n\nThe massacre in Donetsk has shocked the world, drawing condemnation from leaders around the globe. But for the people of Donetsk, the tragedy is a painful reminder of the ongoing conflict that has torn their community apart, leaving them trapped in a cycle of violence and despair."
March.1.a:0 "God, save this souls!"

DPRelection.10.t:0 "Election Strategy Plan"
DPRelection.10.d:0 "Denis Pushilin, sat at the head of a long conference table surrounded by his cabinet. They were discussing the upcoming elections and the opposition that had been gaining traction in recent polls.\n\nPushilin leaned back in his chair and stroked his chin. "We need to come up with a plan to defeat the opposition," he said.\n\nOne of his advisors, a woman in her forties, spoke up. "We could start by launching a smear campaign against their leaders," she suggested. "We could dig up dirt on him and make sure the public knows about it."\n\nPushilin nodded thoughtfully. "That's a good idea," he said. "But we need to make sure we're careful. We don't want to make it look like we're attacking them unfairly."\n\nAnother advisor chimed in. "We could also focus on our strengths," he said. "We could emphasize our record of economic growth and stability, and make the case that the opposition would destabilize the region."\n\nPushilin nodded again. "That's a good point," he said. "But we also need to make sure we're addressing people's concerns. We can't just rely on our past successes."\n\nThe discussion went on for several hours, with the cabinet members offering their ideas and Pushilin weighing in with his thoughts. They talked about ways to mobilize their base, how to reach undecided voters, and how to counter the opposition's messaging.\n\nIn the end, they came up with a comprehensive strategy that included a mix of attack ads, positive messaging, and outreach efforts. Pushilin felt confident that they had a winning plan.\n\nAs the meeting wrapped up, Pushilin stood up and addressed his cabinet. "Thank you all for your input," he said. "I believe we've come up with a solid plan to win this election. Now let's get to work.""
DPRelection.10.a:0 "Everyone to work!"
DPRelection.11.t:0 "Tripping over a stone"
DPRelection.11.d:0 "Denis Pushilin, sat behind his large mahogany desk, engrossed in his work. His secretary, Olena, entered the room with a serious expression on her face, clutching a stack of documents in her hands.\n"Mr. President, I need to speak with you urgently," Olena said, her voice tinged with concern.\nPushilin looked up, sensing the urgency in her tone. "What is it, Olena?" he asked, gesturing for her to come closer.\nOlena approached the desk and placed the documents in front of Pushilin. "We've received some disturbing information," she said, her voice lowered to a whisper. "It appears that details about money transfers to various individuals have been leaked to the public. They're being presented as suspicious 'donations'."\nPushilin's heart sank as he quickly glanced over the documents. His mind raced, understanding the implications of this revelation. With elections just around the corner, the timing couldn't have been worse.\n"This could severely impact our chances of being re-elected," Pushilin muttered, his voice filled with worry. "We need to act quickly and decisively."\nOlena nodded in agreement. "I've already instructed our PR team to begin damage control," she said. "They're working on crafting a statement that addresses the allegations and highlights our commitment to transparency."\nPushilin sighed, running his fingers through his hair. "Transparency is crucial, Olena, but we also need to be proactive," he said. "We must find the source of this leak and determine their motives."\nOlena nodded again, her face determined. "I'll personally oversee the investigation," she assured him. "We'll leave no stone unturned. Meanwhile, I suggest we allocate additional resources to our election campaign. We'll need a strong offensive to counteract the negative impact of this revelation."\nPushilin agreed. "Increase our advertising budget, Olena," he said. "We must regain the trust of our supporters and win over any undecided voters. We'll need to showcase our achievements and address any concerns head-on."\nAs the gravity of the situation settled upon Pushilin, he realized that the road ahead would be arduous. However, he was not one to back down from a challenge. Determination filled his eyes as he looked at Olena.\n"Let's turn this crisis into an opportunity," Pushilin declared. "We will rise above these allegations and prove our commitment to the people of the DPR. Our vision and dedication will prevail."\nOlena nodded, a glimmer of hope in her eyes. "Together, we will weather this storm, Mr. President," she said.\nPushilin smiled, a flicker of confidence returning to his expression. With Olena by his side and their united resolve, they would face the obstacles head-on. They would fight for their cause, their reputation, and their chance at re-election."
DPRelection.11.a:0 "We're probably fucked"
DPRelection.12.t:0 "The end of our good name?"
DPRelection.12.d:0 ""Bandits! Thieves! Traitors!" - all this can be seen by every Donbass resident on the front pages of popular newspapers and heard on well-known podcasts. These office rats, following the instructions of power-hungry rich bastards, are ready to destroy our reputation in any possible way and drown us in scandalous mud until we start to justify ourselves, which will bury us even deeper into the grave they have so carefully dug for us. They spared no expense in launching such a propaganda campaign against our government, which is loyal to the people of Donbass. So many newspapers, online resources, TV channels... it's hard to believe that someone wants to undermine our reputation so desperately. But this points to one thing - they are afraid of us. We are such a big threat to them that they are willing to spend billions to spread a thin layer of dust over the eyes and ears of our citizens just to gain their support for a short time. But we will not allow this. To hell with excuses! Maybe some of the bullshit they've written is true, but we don't need to defend our image against such pathetic and clichéd lies. We will go the other way. We will use their own weapons against them."
DPRelection.12.a:0 "We're fucked"
DPRelection.13.t:0 "Our Turn!"
DPRelection.13.d:0 "After the shock that gripped our young country, Denis Pushilin, the current president of Novorossiya, called a meeting of ministers to address the problems caused by dozens of stories in some political magazines and news outlets. A specific question was asked: "What should we do about it?"\nAfter consulting, the Council of Ministers decided that the best and easiest option would be to deal with the media structures themselves rather than to look for sponsors and customers of the circus. After a meeting with the president himself, it was decided to start with small news agencies, and the first victim of the Pushilin government's new media policy was the "Novyi Danbas" news agency, which had its office in Makiivka. After obtaining a warrant for a full search of the building, police units entered the location and arrested the newspaper's editor-in-chief, his secretary, and one of the authors of the newsletter, which was titled "MMM's Pig Continues to Steal". The results of the "examinations" and "investigations" initiated by the Donetsk court eventually led to the revocation of "Novyi Danbas'" licence, which was supposed to be the first step in cleansing Novorossiya of bribed and politically biased media resources."
DPRelection.13.a:0 "And this is just the beginning!"
DPRelection.14.t:0 "Winning back the hearts of the youth?"
DPRelection.14.d:0 "Trying to cope with the situation, Denis Pushilin was thinking about how to regain people's trust after scandalous investigations by many media agencies. After a few days of intense reflection, with smoke breaks, of course, Denis decided that there was no need to reinvent the wheel and to use the good old time-honoured method - bribery. There were a lot of people in Novorossiya who were involved in popular political talk shows, video game streams, and other influencers, and their support was easy to get. Having taken several million Novorossiyan rubles, he instructed his pawns to contact various bloggers to enlist their support in whitewashing the good name of the government, as well as to get their full support in the upcoming elections. On the very first day after the conclusion of the informal agreements, such popular internet bloggers as "Partiotishche" "Sanchous" or "DD - Danetskiy Dimka" started talking about political life in the country on their streams, and also noted that they "cannot imagine their life in Novorossiya without Pushilin". Such statements, which were observed in all blogging circles, gave Pushilin's government a guarantee of support from young people within days."
DPRelection.14.a:0 "The younger generation is already ours..."
DPRelection.15.t:0 "After all, nothing really happened."
DPRelection.15.d:0 "Having taken all possible measures to counter the further spread of disinformation, we waited. People need time to change their minds once again, and we had to give them that time. Several weeks had passed since the searches and revocation of licences of many media holdings and local news outlets, as well as the bribery of various hosts and bloggers, and Denis Pushilin was impatiently waiting for the results. Wanting to know whether the public opinion about the ruling party and him, in particular, had changed, he instructed his secretary to find popular bloggers who were involved in various social surveys and to ask them to conduct one on people's attitudes towards the NDPD-led government. This could also be used as a propaganda tool, and a few days later, the video "Social Survey - People About Pushilin" was released on YouTube. In a matter of days, it gained more than half a million views and 410,000 likes, and people, answering the questions posed by the blogger, called Pushilin "the real father of Novorossiya" and "the Hero of our country". After receiving such a positive result, Denis sat down on the sofa in his office and said with a satisfied face: "Well, it's like nothing ever happened.""
DPRelection.15.a:0 "Phew, now it's time to get down to the election campaign..."
DPRelection.16.t:0 "Gracious peace in our society"
DPRelection.16.d:0 "After a series of high-profile protests swept across our native land, we were forced to act. Police, security forces, curfews in some cities, ... all this had to happen. People, as expected, took such measures extremely negatively and began to call us punishers and even accuse us of trying to create a police state. We have one goal now - to show people that we are not their enemies, but that we are on their side. That an increase in the number of police officers is needed to control the transparency of the elections, and that curfews will help restore the damaged infrastructure. Without order, there will be no difference between us and monkeys, and we are ready to use more painful methods to maintain it. People, in turn, will hopefully appreciate our concern for them and for fair election results. If they had been written right away, why would we have gone to so much trouble? The case of Makeyevka, which has been badly affected by the unrest, was indicative for the media and society, where after six days of restricted movement, our best builders in the world, calmly and without any stress, were able to completely repair the damage walls of buildings, two restaurants, tiles on the square in front of the city council, and even to repair the old and non-functioning fountain. All of this was done with the support of the local police, who partitioned the surrounding area and ensured a calm aura around the reconstruction works."
DPRelection.16.a:0 "People must finally understand our good intentions!"
DPRelection.17.t:0 "Release of Chain Dogs"
DPRelection.17.d:0 "In the aftermath of the violent clash between protesters, police, and supporters of Pushilin, the leader found himself facing a difficult decision. He believed that Strelkov and his armed group were responsible for instigating the conflict, and he saw an opportunity to neutralize their influence in the region once and for all.\nPushilin wasted no time. He swiftly ordered his special forces to detain Strelkov's supporters and seize the ammunition depots that belonged to the renegade leader. The operation was executed with precision, leaving Strelkov's group disarmed and vulnerable.\nIn a bold move, Pushilin personally oversaw the arrest of Strelkov himself. He was determined to make an example out of the man he considered a traitor. Strelkov was taken to a secret location, where he would face interrogation and be subjected to torture in an attempt to extract information about his plans and motives.\nBut Strelkov, ever resolute, remained steadfast in his convictions. Despite the pain inflicted upon him, he refused to provide any information that could further endanger his cause. Instead, he warned Pushilin of the consequences that would follow if he imprisoned or killed him.\n\n"Imprison me, and you will ignite a civil war," Strelkov proclaimed defiantly. "The people will rise against you, and the bloodshed will be on your hands."\nPushilin's face contorted with conflict and uncertainty. He understood the weight of Strelkov's words. A civil war was the last thing he wanted for the Donetsk People's Republic, as it would only lead to more suffering and division among the people he claimed to lead.\nReluctantly, Pushilin made a difficult decision. He ordered Strelkov's release but placed him under close surveillance. It was a compromise born out of the realization that a fragile peace, though strained, was better than the chaos that could ensue.\nAs Strelkov walked out of captivity, he knew that his freedom was not absolute. He was acutely aware of the eyes watching his every move. But he also knew that his warnings had resonated with Pushilin, and he hoped that the leader would think twice before taking any further drastic actions against him or his followers."
DPRelection.17.a:0 "Another failure."
DPRelection.18.t:0 "Pawn"
DPRelection.18.d:0 "Denis Pushilin, paced back and forth in his office, contemplating his next move in the upcoming elections. He knew that uniting the opposition parties against him would pose a significant threat to his chances of re-election. He needed someone he could trust to ensure that one of the opposition candidates, Tsaryov, remained a spoiler, dividing the votes rather than uniting against him.\nPushilin picked up the phone and dialed Tsaryov's number. After a few rings, Tsaryov's voice came through the line. "Hello?"\n"Tsaryov, it's Pushilin," the president said in a serious tone. "I need to meet with you urgently. It's about the upcoming elections."\nTsaryov hesitated for a moment. He had been considering the possibility of uniting with other opposition parties to form a stronger front against Pushilin. But he also knew the risks and the power that Pushilin held.\nReluctantly, Tsaryov agreed to the meeting. They arranged to meet in a discreet location, away from prying eyes and ears.\nAs Tsaryov arrived at the designated spot, Pushilin greeted him with a firm handshake. They sat down at a table, and Pushilin wasted no time getting to the point.\n"Tsaryov, I need your loyalty," Pushilin said, his voice carrying a mix of authority and urgency. "I cannot afford to have you uniting with the other opposition parties. Your role in this election must be that of a spoiler, dividing their votes."\nTsaryov sighed, his eyes betraying his inner conflict. "I have my own ambitions, Pushilin," he admitted. "I believe I can make a difference for our people."\nPushilin leaned forward, his voice softer now. "I understand your ambitions, Tsaryov. But consider this: aligning with me will ensure stability and continued progress for our region. I can offer you more than just money. I can offer you security and influence. You'll be able to make a difference in a different way."\nTsaryov pondered Pushilin's words. He knew the risks of opposing Pushilin openly. The current president held significant power and resources that could easily crush any opposition.\nFinally, after a long silence, Tsaryov spoke. "What do you propose, Pushilin?"\n\nPushilin smiled, knowing he had won this battle of wills. He pulled out a document from his briefcase, offering it to Tsaryov. "I'm offering you a substantial amount of money, Tsaryov," he said. "In return, you must abandon your ambitions and commit to being a spoiler candidate. This agreement will ensure your financial security and a peaceful future."\nTsaryov's face showed a mix of reluctance and resignation. After a brief moment of contemplation, he reached out and accepted the document. "Fine, Pushilin," he said, his voice filled with a hint of bitterness. "Consider me your loyal spoiler candidate."\nPushilin nodded, satisfied with the outcome. He knew that he had secured Tsaryov's loyalty, even if it came at the cost of his ambitions.\nAs they left the meeting, Tsaryov couldn't shake off the feeling of disappointment. He had once dreamed of making a real change for his people, but now he had accepted a different role, one that would keep him in the shadows as a pawn in Pushilin's game."
DPRelection.18.a:0 "Was it right choise?"
DPRelection.19.t:0 "Screening of the film "No Right for a Mistake""
DPRelection.19.d:0 "Today, the long-awaited premiere of the film "No Right for a Mistake", created with the funds of the Novorossiyan State Film Agency, was held. The idea for the film was conceived by the President of Novorossiya, Denis Pushilin, and he also invested several million rubles in its budget. According to the plot, the events unfolded during the Battle of Kramatorsk, between the Novorossiyan troops led by Denis Pushilin and Mikhail Kozitsyn, and a terrorist group called the "Armed Forces of Ukraine", which was the remnants of the army of the same Nazi illegitimate entity as "Ukraine", led by their leader, Serhiy Kryvonos. Coming to the film's premiere at the largest cinema in Donetsk, Denis expected to see a film that would change the way society views him, given his enormous contribution to the Independence War.\nThe screening was over. Pushilin left the cinema building with a happy face and was immediately attacked by journalists on the street. "What do you think of the new film?" asked the most impudent of them. "The film is really incredible, but most importantly, it's truthful," replied the president. "How did you like your character in the film?" - another journalist asked him. "The role of Commander-in-Chief Pushilin was simply incredible. I could see the real me in him," he answered. "Now, if you'll excuse me, I'm in a hurry to get home to my kids," he said and got into the passenger seat of his BMW and drove off."
DPRelection.19.a:0 "A great film about a great man"
DPRelection.20.t:0 "First Round of Elections"
DPRelection.20.d:0 "After a long day of election, the votes were counted. Incumbent President Denis Pushilin from the NDPD enters the second round with the opposition candidate who is..."
DPRelection.20.a:0 "[GetFirstRoundWinner]"
DPRelection.21.t:0 "Minute of Silence"
DPRelection.21.d:0 "bla bla ebat vybory. pabedil karoc vot etot chel snizu."
DPRelection.21.a:0 "[GetSecondRoundWinner]"

    #Focuses
dnr_opposition_union:0 "Opposition Union"
dnr_opposition_union_desc:0 "The situation is stable. Novorossiya is united, and this is the most important thing. But despite the unity of the two fraternal nations, there is something that can always divide society into several camps - elections. Denis Pushilin is still the full-fledged leader of the country, but this may change soon enough. Having gained a reputation as a unifier of the Donbass lands, he has quite a lot of support in society, and that is why his three main rivals, to be more specific, Natalia Vitrenko as the leader of the socialists, Leonid Pasechnik as the leader of the democrats, and Igor Strelkov as the leader of the nationalists, decided to meet and discuss a possible partnership. Understanding the weakness of each of their fragmented electorates, all three politicians decided to work together to take Pushilin out of the game, which resulted in the formation of the Opposition Union. Despite sharing the same goal, all three have different views of the world, and it is clear that despite the formal alliance, they will continue to be rivals... "
dnr_people_fight:0 "People Fight for..."
dnr_people_fight_desc:0 "The Opposition Union, despite the differences in its members' views, is working. By uniting their forces, the socialist, nationalist and democratic wings were able to increase their own popularity in society, shaking Pushilin's ratings. But despite their successes, the inter-ideological conflict gained momentum and the split between the members grew deeper. Ultimately, only one will be able to win the presidential election, but time will tell who will win people's hearts and take the leadership seat."
dnr_equality:0 "Equality"
dnr_equality_desc:0 ""Liberty, equality, fraternity". This expression is familiar to everyone. As followers of the ideas of the great revolutionaries of the past, such as Robespierre, Marx, Lenin and others, the "Socialist Workers' Party of Donbass", headed by Natalia Vitrenko, is ready to bring real and effective changes to the society of Novorossiya, rejecting the outdated ideas of nationalism. For the working class! For equality and brotherhood!"
dnr_freedom:0 "Freedom"
dnr_freedom_desc:0 "The freedom of the individual and the nation is what matters most in our time. After the unification of the Donbass republics into a single state, the "Donbass democracy" that Pasichnyk and his predecessor Plotnytskyi had been building for so long is under threat. Pushilin's authoritarian regime, as well as the communist and nationalist blocs of Vitrenko and Strelkov, threaten the democratic ideas in Donbas that we have all fought so hard for over the past few years. The people of Donbas need only democracy! We will not tolerate dictatorship!"
dnr_nation:0 "Strong Nation"
dnr_nation_desc:0 "The people of Donbas are a separate ethnic group, and they proved it during the years of bloody war with Ukrainian Nazi warlords. Our strength is in our unity, and the people are united not only in ideas but also in their common nationality. Igor Streklov, the leader of the nationalist Free Donbass party, held senior positions long before Pushilin, so he is well acquainted with the situation in Novorossiya and even personally fought for its independence. Given these factors, who else but the "Father of Novorossiya" can lead the nation to a prosperous future?"
dnr_cariov_office:0 "In the Tsaryov Office"
dnr_cariov_office_desc:0 "Oleg Tsaryov is a man who is fully committed to the idea of our statehood and who has confidently taken our side in the war against the junta from the very beginning. His position, having considerable strength among the people, who remember his aspirations and merits, can work to our advantage if we convince him of the correctness of our ideas. We should immediately plan a personal visit to him..."
dnr_pragmatic_allience:0 "Pragmatic Alliance"
dnr_pragmatic_allience_desc:0 "Arriving at Tsarev's office, Strelkov, after a short, good-natured chat about his career, got down to business. After explaining his goals and plans for the future if he won the election, Tsarev stood up, shook Strelkov's hand and said he had heard enough. Enough to publicly declare his support for Igor and nationalists in general."
dnr_democratic_block:0 "Democratic Bloc"
dnr_democratic_block_desc:0 "A call to Tsaryov's office. After a minute's conversation, the secretary enters the cabinet and tells Oleg that Pasechnik wants to meet him as soon as possible. The meeting is scheduled. Soon the day of the rendezvous arrives, and Leonid meets Oleg in his office. Getting straight to the point, Pasechnik assured Tsaryov of the transparency of his ideas and aspirations, and stressed his readiness to personally fight for democracy in the country side by side with the supporters of a free society. Tsaryov was impressed by his speech, and after it was over, he took a bottle of bourbon from under the table, poured it into two glasses, and when he raised his own, he said: "Well, cheers to future and fruitful cooperation, my friend.""
dnr_workers_strike:0 "Workers Strike"
dnr_workers_strike_desc:0 "Despite stability, or the beautiful illusion of it, the people of Donbass are still suffering and will not take it anymore. Unhappy with low wages, regular power cuts and high taxes, people have decided that they will not wait for the elections, which could not change anything anyway, and will try to take the situation into their own hands. "The government must give in or we will lose our faith in them," is what the strike leaders are shouting."
dnr_help_them:0 "Help Them"
dnr_help_them_desc:0 "The people who came out to the large-scale protest had a good reason for that. Fighting for their rights, they risked their freedom and even their lives. We, as representatives of the ideas of a free and equal society, cannot stand aside. It is our duty to help these people. And, of course, we will receive their support as a bonus."
dnr_better_call_push:0 "Better Call Pushilin"
dnr_better_call_push_desc:0 "These protesters, who, as they say: "are fighting for their rights, blah, blah, blah...", in fact, only harm the state. Even a blind man can see that their strike is mostly a bunch of morons paid for by communists and pseudo-democrats who only want to raise their own ratings, and the poor people behave like a herd and follow their instructions. However, the nationalist wing will not be able to deal with this. However, Pushilin, who also does not like this situation, will be willing to help us to disperse these clumsy thugs."
dnr_march:0 "March on Donetsk"
dnr_march_desc:0 "By launching a strong election campaign, we were able to expand our popularity among the population, which worried the freeloader Pushilin. But we will not stop at this point. To gain the support of the majority, we will organise a huge march from the most remote parts of the country to Donetsk to gather all our supporters and show that we are numerous and that we will win!"
dnr_second_attempt:0 "Second Attempt"
dnr_second_attempt_desc:0 "After our meeting with Tsaryov and the conclusion of the formal alliance, it was time to make it not only nominal but also practical. Oleg, whose words and views can change public opinion quite a bit, will definitely help us win people's minds and prevail over others."
dnr_promise_them:0 "Promise Them"
dnr_promise_them_desc:0 "The population is dissatisfied, and it is hard to disagree with some of their demands. But even if we want to, without executive power, we cannot help them in any way. The only thing we can do is promise them that we will change the situation if we win the elections, and dare anyone to say that this is a PR campaign."
dnr_road_to_future:0 "Road to the Future"
dnr_road_to_future_desc:0 "The elections have come to their long-awaited conclusion. It's time for what is necessary, but not what we want. Fulfilling promises, organising a new government,... We have months of hard work ahead of us, but all for the benefit of the people of Donbass. Forward, to the bright future of Novorossiya!"


