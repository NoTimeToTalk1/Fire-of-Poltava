 DPR_verkhovna_duma_desc:0 "To ensure support for our decisions, we have convened the Supreme Duma and now we must ensure that our new deputies are loyal to His Majesty.\n§gSupport for current policy:§! [SupportForDumaLoc] \n§YSupport for His Majesty:§! [SupportForRostislavLoc] \nIntrigue: [RostislaveIntriguesLoc]\n\nWe should also look at the parliamentary groups in the Duma:\n§1Influence of the far right:§! [InfFarRightRostislaveLoc]\n§2Influence of the moderate right:§! [InfModerRightRostislaveLoc]\n§5Influence of the centrists:§! [InfCentreRostislaveLoc]\n§8Influence of the liberals:§! [InfLibsRostislaveLoc]\n§tInfluence of the social democrats:§! [InfSocDemRostislaveLoc]"
