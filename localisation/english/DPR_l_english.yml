l_english:
 dnr.32.t:0 "Finale of the Integration"
 dnr.32.d:0 "Anna was a simple factory worker from Slaviansk. She had lived in the city all her life and had seen it change over time. But now, with the formation of Novorossiya, everything was different. Anna woke up early in the morning and got ready for work. Outside her window, she could hear the sounds of construction, which reminded her of the changes taking place in her city. The construction of new factories, houses and infrastructure had picked up after the formation of Novorossiya. Anna arrived at the factory and was surprised to see the changes that had taken place there. The machines were updated, the production process was optimised and the overall atmosphere was much better than before. Anna felt proud to be part of the progress and development of her city. During her lunch break, Anna met with her colleagues and talked about the changes in their lives since the formation of Novorossiya. They discussed how their salaries had increased, how the government had invested in healthcare and education, and how their overall quality of life had improved. After work, Anna decided to take a walk around the city. She noticed the new parks and public spaces that had been built and the cleanliness of the streets. She also saw the flags of Novorossiya flying high, and this gave her a sense of pride and belonging. When Anna returned home, she reflected on how her life had changed since the formation of Novorossiya. She was grateful for the opportunities that had come her way and for the sense of community that had developed in her city. She knew that there was still a lot of work to be done, but she was confident that the future looked bright for her and her fellow citizens of Novorossiya."
 dnr.32.a:0 "She Must Be Happy."
 dnr.31.t:0 "Connections of Our Roads"
 dnr.31.d:0 "In bustling Donetsk, residents were eagerly awaiting the arrival of a new high-speed train that would connect them to other major cities in Novorossiya. The train was due to arrive in a few hours, and people were already lining up at the railway station to see it. When the train arrived, a loud cheer erupted from the crowd. The train was elegant and modern, with a bright blue exterior and a powerful engine. When it stopped, the doors opened and a team of engineers got out to inspect it. The people of Donetsk watched in amazement as the engineers carefully inspected every inch of the train. It was clear that they had put a lot of effort into designing and building this state-of-the-art machine. After the inspection was completed, the train conductor came out and addressed the crowd. He spoke passionately about the importance of modern transport infrastructure for the growth and development of Novorossiya. He spoke about how this train would connect people and businesses, creating new opportunities and stimulating economic growth. The conductor then invited everyone to take a tour of the train and get acquainted with its advanced features. People eagerly climbed aboard, admiring the comfortable seats, on-board entertainment system and smooth ride. As the train pulled away from the station and sped off into the distance, Donetsk residents felt a surge of pride and patriotism. They knew that their country was at the forefront of technology and that its future was bright."
 dnr.31.a:0 "Nashi Dorogi Ediny!"
 dnr.30.t:0 "Patriotism"
 dnr.30.d:0 "The news of the war's victory spread throughout Novorossiya, and the streets of cities and towns were filled with jubilant crowds waving flags and chanting patriotic slogans. The government declared a national holiday, and people poured out of their homes to join in the festivities. A large stage was set up in Donetsk's central square, from which patriotic songs were played. The crowd gathered around the stage, and when the music started, people began to sing along. The air was filled with excitement and pride. Suddenly, the music stopped and a man came on stage. He was dressed in a suit and had a serious expression on his face. It was the head of the Novorossiysk government, Leonid Pasechnik. The crowd fell silent as Pasechnik began to speak. He spoke about the sacrifices that had been made during the war, about the brave men and women who had fought and died for their country. He talked about the importance of patriotism, and the need to unite as a nation and build a better future for everyone. The people listened attentively, and as Pasechnik spoke, a sense of unity began to grow within them. They realised that they were all part of something bigger than themselves, that they were part of a great nation that had triumphed in the face of adversity. When Pasechnik finished his speech, the orchestra started playing again, and the crowd erupted in applause. The sense of pride and patriotism was palpable, and it seemed that nothing could break the bond that had been established between the people of Novorossiya and their country."
 dnr.30.a:0 "Wake up, Dombass!"
 dnr.29.t:0 "Passportisation Programme"
 dnr.29.d:0 "It was an ordinary day in Kramatorsk, and the streets were full of people going about their business. Among them was a grandmother named Olga who had lived in the city all her life. She had seen many changes over the years, including the recent conflict that had torn the city apart. But today was a special day for Olga. She received a letter in the mail from the government of Novorossiya informing her that she was eligible for a new passport. This passport would allow her to become a citizen of Novorossiya, the new name of the Donetsk People's Republic. Excited and a little nervous, Olga headed to the government building where she was told to go to collect her new passport. When she arrived, she was met by a friendly civil servant who explained the procedure. Olga brought all the necessary documents with her, and the official quickly processed her application. A few minutes later, Olga was holding her new passport with a photo of her smiling face on the cover. Overwhelmed with emotion, Olga thanked the official and went outside. As she walked down the street, she held her new passport tightly in her hands, feeling a sense of pride and belonging. For Olga, this new passport was more than just a piece of paper. It was a symbol of hope and a brighter future for her and her family in a new country, Novorossiya. And with tears in her eyes, Olga knew that she was ready to welcome this new chapter in her life with open arms."
 dnr.29.a:0 "Hope that she is fine."
 dnr.28.t:0 "The Meeting"
 dnr.28.d:0 "In a large conference room in Donetsk, the head of the Novorossiyan government, Leonid Pasechnik, sat at a long table surrounded by his top advisers. On the other side of the table sat Yevhen Murayev, the head of the former Ukrainian pro-Russian party Nash. The two men were sitting facing each other, their expressions serious and focused. The topic of their meeting was the integration of local pro-Russian parties into Novorossiya. Murayev began by outlining his party's vision for greater unification of the Russian-speaking regions of former Ukraine. He spoke passionately about the need for unity and cooperation between the people of Ukraine and Russia. Pasechnik listened intently, nodding his head in agreement. He understood the importance of building strong ties between the various pro-Russian parties in former Ukraine and the government of Novorossiya. He spoke of the benefits of closer economic and cultural ties between the two nations. As the meeting continued, the discussion became increasingly heated, with both men raising their voices as they debated the finer points of their proposals. But in the end, they both agreed on the importance of working together to achieve common goals. The meeting ended on a positive note, with both men shaking hands and promising to continue discussions in the coming weeks. Pasechnik was optimistic about the future of the region and was confident that with the help of Murayev and other pro-Russian leaders in former Ukraine, they could build a stronger and more prosperous future for the entire Russian-speaking population of former Ukraine."
 dnr.28.a:0 "Eto Budet Khorosheye Sotrudnichevstvo."
 dnr.27.t:0 "Tribunal Under General"
 dnr.27.d:0 "The courtroom was filled with tension as the trial of Ukrainian General Serhiy Kryvonos began. Kryvonos was accused of numerous war crimes committed during the conflict in Donbas, including indiscriminate shelling of civilian areas and the use of prohibited weapons. As the prosecution presented its evidence, the mood in the courtroom grew increasingly sombre. Photographs of destroyed houses and buildings were displayed on screens, and witnesses testified to the horrors they had experienced during the conflict. Kryvonos, dressed in a military uniform, sat stoically as the prosecution presented its case against him. His defence team argued that he was acting on orders from his superiors and that he had no choice but to do what he did. But the defence arguments did not influence the prosecution. During the trial, it became clear that the evidence against Kryvonos was overwhelming. The judge listened to both sides and, after careful consideration, delivered a verdict of guilty on all charges. The courtroom erupted in applause as the verdict was read out. The families of the victims hugged each other and cried tears of relief. Kryvonis was taken away in handcuffs to await sentencing. This trial was a key moment for the people of Donbass, a symbol of their determination to bring those responsible for war crimes to justice. It was a reminder that justice can prevail even in the darkest of times."
 dnr.27.a:0 "Ispolnit` Vishshuyu Meru Nakazaniya!"
 dnr.27.b:0 "Otpravit` na kichy, let tak minimum na 5!"
 dnr.26.t:0 "Promise of Future"
 dnr.26.d:0 "A large crowd of people had gathered in the great hall of the Novorossiyan government building. The mood was a mixture of hope and uncertainty. They had all come to listen to the leader of the country, the head of the Novorossiya government, Leonid Pasechnik, who was speaking about the future of the nation. When Leonid took the podium, the room fell silent. He cleared his throat and began to speak. "Dear fellow citizens of Novorossiya," he began. "I know that the past has been difficult for all of us. We have lived through years of war and turmoil, but today I am here to tell you that the future is bright. The government is committed to creating a better life for all of us." The audience erupted in applause and cheers. "We will rebuild our country from scratch," the Prime Minister continued. "We will invest in infrastructure, education and healthcare. We will create jobs and economic opportunities. We will create jobs and economic opportunities for everyone. And we will make sure that every citizen of Novorossiya has a say in the future of our country." The crowd again erupted in applause, with many people standing and waving the Novorossiya flag. "I promise you that we will work tirelessly to make Novorossiya a great country," the president concluded. "Together we will build a future that we can all be proud of." As he stepped down from the podium, the crowd rushed forward to shake his hand and congratulate him. There was a sense of optimism and hope in the air, and people began to talk excitedly about the future of their country. For the citizens of Novorossiya, it was the beginning of a new chapter in their history. They had been promised a brighter future, and they were ready to work together to make it a reality."
 dnr.26.a:0 "Za Nasche Svetloye Buduschee!"
 dnr.25.t:0 "Start of Integration"
 dnr.25.d:0 "After years of conflict and uncertainty, the Ukrainian territories of Donetsk and Luhansk oblasts have finally been integrated into the newly created Novorossiya. The integration process, which began several months ago, has been met with mixed reactions from the international community, but the citizens of Donetsk and Luhansk are celebrating the opportunity to join their brothers and sisters in a new country."
 dnr.25.a:0 "After Years..."
 dnr.24.t:0 "Victory Day"
 dnr.24.d:0 "After years of intense fighting and bloodshed, the combined forces of the Donetsk and Luhansk People's Republics have finally won the war in Donbas against the Ukrainian army. The news spread like wildfire, and celebrations began across the region. Residents of the DPR flooded the streets, waving flags and rejoicing in their newfound peace. Families were reunited, and tears of joy rolled down the faces of those who had lost loved ones during the conflict. The sound of fireworks and music filled the air as people danced and hugged each other, grateful for the end of the war."
 dnr.24.a:0 "Finally peace."
 dnr.8.t:0 "Warehouse Found"
 dnr.8.d:0 "We Found Some Warehouses."
 dnr.8.a:0 "Glory to Donetsk!"
 dnr.9.t:0 "No Warehouses Were Found in the Area"
 dnr.9.d:0 "We Didn't Find Any Warehouses in the Area."
 dnr.9.a:0 "Well, just use Russian!"
 dnr.10.t:0 "Situation in Ukraine"
 dnr.10.d:0 "The situation in Ukraine is very difficult. The legitimate government was overthrown by the brutal Euromaidan. But now the situation is much worse. Ukraine has fallen into anarchy, and only we, Donbass, which broke away in time, are an island of adequacy in the region."
 dnr.10.a:0 "Glory to Donbass!"
 dnr.11.t:0 "Looking West"
 dnr.11.d:0 "The Ukrainian regime has fallen. But the brave sons of Donbass must realize that it's not the end because victory is not yet achieved. The Armed Forces of Ukraine remain. They continue to fight for the regime that no longer exists, but in that fight, we may suffer the most! We will do everything to bury the concept of Ukraine. Or we will perish trying to do so."
 dnr.11.a:0 "Yes, Death!"
 dnr.12.t:0 "Situation in Our Country"
 dnr.12.d:0 "It has long been known that you cannot be alone in this world. What we must now pay attention to is our surroundings: while friends are close, enemies, unfortunately, are even closer. It is up to us to decide which way to look and with what intentions."
 dnr.12.a:0 "Wake up, Donbass!"
 dnr.13.t:0 "Looking East"
 dnr.13.d:0 "Putin has been called many things. A politician. A leader. A fighter. But for us, it's simple - he is the Father. No, Mother! He breastfeeds us every day, but instead of pure milk, he pours weapons and resources down our throats. He is our personal Saviour, and we should appreciate everything Russia has ever done for us."
 dnr.13.a:0 "Mr. Putin, we wait you!"
 dnr.14.t:0 "Looking North"
 dnr.14.d:0 "Ah, the LPR... Pasechnik... We have experienced both good and bad moments together, going from blood brothers to almost enemies who cannot share supplies. But in the end, we are not so different. Perhaps we can offer greater cooperation, friendship and unity against a shared enemy!"
 dnr.14.a:0 "So true!"
 dnr.15.t:0 "Tamoznya"
 dnr.15.d:0 "Like any good colleagues, we have our differences. Sometimes we can't split the money we receive properly, or even our brave soldiers can kill each other for food. But does it matter on a global scale? We are the sons of Donbass! We must stand united to withstand the inevitable enemy, it's now or never!"
 dnr.15.a:0 "Yes."
 dnr.15.b:0 "No."
 dnr.16.t:0 "Controlling the Business"
 dnr.16.d:0 "Oligarchs are a huge problem in Donetsk. How we will deal with it?"
 dnr.16.a:0 "Status quo - it's only one way."
 dnr.16.b:0 "Oligarchs must work for people! Not for their pockets!"
 dnr.16.c:0 "Russia will deal with it."
 dnr.17.t:0 "Crisis in Administration"
 dnr.17.d:0 "Well, we have some problems with the administration system. We must fix it now."
 dnr.17.a:0 "We will start federalisation!"
 dnr.17.b:0 "We will start confederalisation!"
 dnr.18.t:0 "Leader of Novorossiya"
 dnr.18.d:0 "Now, we must choose the leader of our country!"
 dnr.18.a:0 "Hero of Donetsk - Denis Pushilin"
 dnr.18.b:0 "Father of Luhansk - Leonid Pasechnik"
 dnr.18.c:0 "Parliament Republic is the best way"
 dnr.19.t:0 "War Support"
 dnr.19.d:0 "We start supporting a war in our society"
 dnr.19.a:0 "Society..."
 dnr.20.t:0 "Novorossiya"
 dnr.20.d:0 "All documents are ready and now we are ready to start unification with Lugansk. Our armies are united, our economy is united, and most importantly, our people are united in the fight against nationalist Ukraine!"
 dnr.20.a:0 "Glory to Novorossiya!"
 dnr.21.t:0 "Unification?"
 dnr.21.d:0 "We can unite!"
 dnr.21.a:0 "Yes!"
 dnr.21.b:0 "No, thanks."
 dnr.22.t:0 "Unification?"
 dnr.22.d:0 "We can unite!"
 dnr.22.a:0 "Yes!"
 dnr.22.b:0 "No, thanks."
 dnr.23.t:0 "Pasechnik poslal nahui pushilina po telefonu"
 dnr.23.d:0 "Pasechnik poslal nahui pushilina po telefonu"
 dnr.23.a:0 "Bottom text"
 dnr.1.t:0 "Looking around us"
 dnr.1.d:0 "Our president said at his conference: "We are under pressure by the Armed Forces of Ukraine from the west and by the friendly Russian Federation from the east. In the north, we border the brotherly Luhansk Republic. The entire territory is under the control of the Donetsk militia or the Russian army. For the first time in the history of our country, we are forced to fight for our freedom. Our soldiers are fighting for freedom, for their homeland. We will not allow this to be destroyed."
 dnr.1.a:0 "Wake up, Donbass!"
 
 search_for_a_warehouse_in_katyk:0 "Search for a warehouse in Katyk"
 DPR_mobiks1:0 "Mobilization"
 DPR_mobiks1_desc:0 "The mobilization machine is turned on full power."
 DPR_mobiks2:0 "Mobilization"
 DPR_mobiks2_desc:0 "The mobilization machine is turned on full power."
 DPR_mobiks3:0 "Mass Mobilisation"
 DPR_mobiks3_desc:0 "The mobilization machine is turned on full power."
 
 DPR_propaganda:0 "Propaganda"
 DPR_propaganda_desc:0 "Propaganda is an integral part of any government's policy, and we are no exception. By using the right tools of psychological influence on the population, we can increase our support through television programmes and news, telling Donbass citizens what they want to hear and what will also be good for our position and policies, even if it is not exactly the truth."
 DPR_oligarhs:0 "Oligarchs"
 DPR_oligarhs_desc:0 "Oligarchy is a child of capitalism. They own huge estates, businesses, and even mines on our territory, and they have no plans to hand over their well-developed enterprises to the government. Yet, by keeping such powerful people close to us, we can gain strong allies, and when they realise their benefits from working with us, they may be even loyal to us."
 DPR_clown:0 "Unpopular President"
 DPR_clown_desc:0 "After the assassination of the leader of the DPR group, Alexander Zakharchenko, Denis Pushilin became the new president of the republic as a result of the elections. Although the people chose him, they still remember the old leader, so the current president is not very popular."
 DPR_FSB:0 "FSB Influence"
 DPR_FSB_desc:0 "For some time now, the FSB, Russia's Federal Security Service, has been influencing the country politically. They either bribe DPR officials or threaten them, and this cannot go on. To have full self-government, there should be no foreign influence."
 DPR_rivalry:0 "Rivarly between the Republics"
 DPR_rivalry_desc:0 "After Plotnitsky's "resignation", the struggle for financial flows in the 'LPR' between the current militant leader Pasechnik and the "Minister of Internal Affairs" Kornet did not stop. Moreover, Pasechnik is trying to push the so-called "Donetsk" out of Luhansk. The so-called Interior Minister Kornet is Zakharchenko's man. Pasechnik is trying to squeeze Kornet's coal industry - legal mines and quarries - away from him. Recently, on the "Rossiya 24" TV channel, Pasechnik, the leader of the self-proclaimed LPR, announced his intention to bring all "state" and non-state coal enterprises of the "republic" out of the shadows. "The policy of approaching state and non-state coal enterprises will be revised to bring out of the shadows those enterprises that are trying to operate illegally. We will do everything possible to legalise them. This is the main task," said Pasechnik. It is noteworthy that this is not the first time that the DPR's special services have tried to take control of certain financial flows in the territory of the "fraternal republic". In fact, it is a struggle between the leaders of the LPR and DPR for control over financial flows from the extraction and sale of coal, alcoholic beverages and tobacco products."
 DPR_corruption:0 "Corruption"
 DPR_corruption_desc:0 "The Government has been corrupted for ages, as the oligarchs, from this country and Russia, have been bribing the officials. It has weakened the country, people lost trust in the system, which means the corruption cannot continue. There will be anti-corruption measures implemented, while corrupt officials will be removed from their position."
 DPR_shluha:0 "Surprise Effect"
 DPR_shluha_desc:0 "After waiting for more than five years, we ran out of patience. Prepared and equipped, we have launched an unexpected and devastating offensive against the Ukrainian Junta and we are ready to take revenge for all our previous failures. Our soldiers are more than ever ready to fight and die for Donbass, and their sacrifice will not be in vain!"
 DPR_problem_with_oligarchs:0 "Problem with Russian Oligarchs"
 DPR_problem_with_oligarchs_desc:0 "The corruption in the country has a cause, and it is the oligarchs from Russia. They have bribed the governmental officials, from the lowest of ranks to the upper echelon, and they have taken control of several important institutions, and even the economy itself, meaning if Donetsk's People's Republic is to be independent, they will have to leave the country, one way or another."
 DPR_russian_influence:0 "Russian Influence"
 DPR_russian_influence_desc:0 "The FSB, and the oligarchs, all have one thing in common: They are Russian. There is a huge Russian influence in the country, whether it comes from people who have power and money or just from the population living in the country. Wherever it comes from, it is here. And the country should not suffer anymore, because it should be independent."
 DPR_crisis_in_administration:0 "Crisis in Administration"
 DPR_crisis_in_administration_desc:0 "Donetsk's People's Republic is a new country, of course, but that does not mean they cannot self-govern themselves in a much better way. The bureaucracy of this country has been rotten to the core with bribery and corruption which has prevented governance of this region. Combined with anti-corruption and proper officials that know what they are doing, this issue will be cleared out."
 DPR_federation:0 "Federation"
 DPR_federation_desc:0 "A federation is a form of state structure in which parts of a state are state entities with legally defined political independence within the federation. A federation implies the existence of state-territorial entities - subjects of the federation - that do not have state sovereignty but have fairly broad powers in domestic politics."
 DPR_confederation:0 "Confederation"
 DPR_confederation_desc:0 "A confederation is a union of sovereign states that have concluded a confederation treaty and thus united to solve common problems and take joint actions. A confederation means different monetary units and different armed forces with their command in the states that make up the confederation. A confederation is only a form of union of the remaining independent states and countries. The members of the confederation retain their state sovereignty, independent system of government, and their legislation and transfer only a limited range of issues to the competence of the Union: defence and foreign policy. Decisions on issues common to the united states do not necessarily apply to the territory of each member state of the confederation."
 DPR_novorosjablyat:0 "Novorossiya"
 DPR_novorosjablyat_desc:0 "Novorossiya is a project to create a pro-Russian state entity in Ukraine that existed from 2014 to 2015. It appeared during Euromaidan when Russian President Vladimir Putin introduced the term "Novorossiya" into the language to refer to Russian claims to the south and east of Ukraine, named after the historical region of the Russian Empire of the same name. During the pro-Russian protests in eastern Ukraine in the Donetsk and Luhansk regions in April-May 2014, the self-proclaimed Donetsk People's Republic (DPR) and Lugansk People's Republic (LPR) were formed with the participation of Russia. On June 24, 2014, the DPR and LPR announced plans to create the Novorossiya Confederation, or the Union of People's Republics (SNR), and adopted an act of unification. The United Parliament of Novorossiya was created, the speaker of which was Oleg Tsarev, and the draft constitution of a confederal state entity. In the spring of 2015, as part of the implementation of the Second Minsk Agreement, the Novorossiya project was closed, and the act on the unification of the DPR and LPR was suspended."
 
 spirit_of_novorosja:0 "Rivalry between the Republics"
 spirit_of_novorosja_desc:0 "Rivalry between the Republics"

 #OLD KLYACHA VITRENKO

dnr_vitrenko_victorious:0 "Vitrenko Victorious!"
dnr_vitrenko_victorious_desc:0 "Thrice - Hooray! The United Socialist Front, under the leadership of our charismatic leader, Natalia Vitrenko, has once again managed to win back the seemingly lost support of the people and return the country to the path of democracy, equality and fraternity. This day is a real celebration for all the remaining supporters of the theories of Marx and Lenin, as one more state and one more people have managed to choose the right path!"
dnr_a_hand_for_the_poor:0 "A Hand for the Poor..."
dnr_a_hand_for_the_poor_desc:0 "The working class of Donbass suffered a lot during the rule of the Ukrainian fascists, but even the new authorities of the DPR and LPR did not try to improve their situation, which made them lose all hope. With our emergence, they became the driving force behind the strength of the socialist movement, and it is to them that we owe our victory and the people of Donbass their future. They deserve a better life, and we will give it to them. Long live the proletariat!"
dnr_and_punishment_for_untruthworthy:0 "...and Punishment for Untruthworthy!"
dnr_and_punishment_for_untruthworthy_desc:0 "The parasites who sat in their luxurious offices, and drove expensive Western cars, while continuing to lie to the proletariat about their loyalty to them, deserve nothing but the most severe punishment and torment. While people were surviving on meagre wages and trying to peacefully convey their regret and despair to the party leadership, the party sent their armed dogs against them. This is inexcusable. Justice is the same for everyone, and I would not envy you!"
dnr_socialism_on_the_rise:0 "Socialism on the Rise"
dnr_socialism_on_the_rise_desc:0 "Having dealt with all the mess that the former government left us as a goodbye gift, we can finally start fulfilling our promises to the people. Creating a new Red Army, completely changing the economic course, restructuring the state apparatus... from now on, all of this is our duty to the people. As the truly wise men are saying, this land has never seen anything better than the Soviet Union, so let's bring back those old times and continue its legacy!"
dnr_looking_for_the_allies:0 "Looking for the Allies"
dnr_looking_for_the_allies_desc:0 "Everyone needs friends and allies, even the mighty people of Donbass. We will not be able to achieve all the results we would like on our own, no matter how much we want to, but with the help of other forces, it is quite possible. There are many people in the world, and even here in Ukraine, who are ideologically close to us, and we just have to try to be allies and have each other's backs if we want to achieve our goals."
dnr_a_message_to_distitutes:0 "A Message to Distitutes"
dnr_a_message_to_distitutes_desc:0 "There are many people across Ukraine and Novorossiya who have lost everything. Home, work, family, and everything without which their lives will never be the same again. Unfortunately, there is nothing we can do about it, wars and disturbances always end in this way, but we still have something to offer these people - a future. Everyone who needs something will find support and help from us, but we need them too. We can help each other, and we have to try!"
dnr_outreach_to_the_media:0 "Outreach to the Media"
dnr_outreach_to_the_media_desc:0 "The world needs to know that the cause of socialism is not dead. People need to know that the hope for a free and equal society is still alive, somewhere in Eastern Europe, and that the hope for the victory of this system will live on. Our job now is to tell Ukraine and the world that workers are still fighting for their cause, and will continue to do so as long as it takes."
dnr_workers_of_the_world_come_to_us:0 "Workers of the World, Come to Us!"
dnr_workers_of_the_world_come_to_us_desc:0 "Over all these years, the legacy of the socialist system of the USSR has been almost destroyed by Ukrainian and Russian capitalists, but it is still liable to change. For this, however, our Donbass compatriots are not enough, and we need absolutely everyone. Workers all over the world who suffer from the capitalist system and have been oppressed by the neo-aristocracy for decades will find refuge here in Donbass. Come! There is room for everyone in paradise!"
dnr_alliance_of_revolutionaries:0 "Alliance of Revolutionaries"
dnr_alliance_of_revolutionaries_desc:0 "In our case, fighting alone would be tantamount to suicide. The revolution in the political, social and economic spheres that we are waging is guaranteed to strike fear into our capitalist opponents, and so we must find those with whom we can stand united against the likes of them. In Kirovohrad, there are just such people. They have been rebuilding the socialist system from scratch, just like us, and they know what it's like to be alone on the battlefield. Together we will become stronger, and we will definitely defeat the rotten system!"
dnr_we_can_do_it_alone:0 "We can do It Alone"
dnr_we_can_do_it_alone_desc:0 "Although having allies would make things easier for us, we cannot afford to trust others. No one has the same thoughts and views as we do, and we have to accept that. We are alone in this world now, this may change, but we need to think about the present. We have done well alone before, and we will continue to do so."
dnr_good_old_friend:0 "Good Old Friend"
dnr_good_old_friend_desc:0 "Looking at all the journeys we have travelled alone, we want to make the one ahead easier. There is a person who could help us with this. A person who shares the same nostalgia for the Soviet system as we do. Viktor Medvedchuk may not be the most ideological advocate of socialism, but we have the same goal. To build a free and equal community on the lands of Ukraine. And who would we be if we did not cooperate with like-minded people?"
dnr_world_here_we_go:0 "World, Here We Go!"
dnr_world_here_we_go_desc:0 "By calling on all the workers of the world for help and offering shelter to all those in need in exchange for work for the common good, we have made ourselves known to the world. The time has come to show ourselves on the global political stage as a new beacon of equality and freedom - a new pillar of socialism. Many did not notice us, many ignored us, but from now on, everyone will know about us. Everyone will know that the workers' struggle is still alive and well and that socialism is not dead!"
dnr_socialisation_of_the_domestic_affairs:0 "Socialisation of the Domestic Affairs"
dnr_socialisation_of_the_domestic_affairs_desc:0 "The collectivization processes that were implemented in the lands of the Soviet Union and countries ideologically close to it were long and difficult, especially for some segments of the population, but they immediately bore fruits. Socialization of agriculture and other industrial aspects of the state is one of the most important steps to building a socialist paradise, and we are ready for it."
dnr_a_helping_hand_for_workers:0 "A Helping Hand for Workers"
dnr_a_helping_hand_for_workers_desc:0 "Everyone wants to live in prosperity, and paradise cannot be built without a happy population. We must meet our working comrades halfway in their desires, which will not only increase their support for the Party and its ideas, but also give us loyal and hardworking people who will be happy to fulfil, and even exceed, the tasks set. Stakhanov is a witness of this! "
dnr_driving_out_unprofitable_enterprises:0 "Driving Out Unprofitable Enterprises"
dnr_driving_out_unprofitable_enterprises_desc:0 "Anything operating in our country should work for and benefit its people. During the reign of bandits and oligarchs, Donbas was left with a lot of enterprises whose role was merely to be noted on paper and to be the target of subsidies, which then magically went nowhere, instead of bringing anything to the people. This needs to be ended, once and for all."
dnr_careship_for_old_ones:0 "Careship for Old Ones"
dnr_careship_for_old_ones_desc:0 "All people who have lived their lives for the good of their people and the Party want and deserve a good and peaceful retirement. Having worked for the state for decades, they have experienced severe upheavals and wonderful revivals with it, and have become almost like family. If the state does not take care of those who have worked for its benefit for so long, what makes us better than anyone else? How are we better than rotten capitalists if we do not provide the old population with a good rest of their lives?"
dnr_workers_domestic_front:0 "Workers' Domestic Front"
dnr_workers_domestic_front_desc:0 "It takes everyone to build a socialist economy, which in turn will lead us to the ideal state and society. Everyone who can work on a machine, grow and harvest sesame corn, drive trucks or ships... all these people work not only for the Party but for their future and the future of their families. So let's get to work, comrades! The future is near!"
dnr_a_deal_with_wealthy:0 "A Deal with Wealthy"
dnr_a_deal_with_wealthy_desc:0 "As much as we would like to build a workers' paradise on our own, we cannot achieve this without the help of the wealthy class. Throughout history, many socialist revolutionaries have killed off the upper classes and taken their property, which they could not properly manage, but we will be smarter. By making a deal with the elite, we will make them and their property part of our system, and even the remnants of the capitalist legacy of the Ukrainian junta will serve the people."
dnr_welfare_for_lower_class:0 "Welfare for Lower Class"
dnr_welfare_for_lower_class_desc:0 "Over the past centuries, the people who have suffered the most are those who belong to the so-called " lower class". These were poor and disadvantaged people who did everything they could for the sake of their families and themselves, but the state prevented them from doing so in every possible way. The fight against this is the main goal of socialism, which is also ours, and we will not allow the suffering of the poor to continue. We will put an end to this, and everyone will live happily!"
dnr_mass_nationalisation:0 "Mass Nationalisation"
dnr_mass_nationalisation_desc:0 "The policy of state appropriation of enterprises of all kinds is one of the foundations of the socialist economic structure. How can a stable, self-sufficient system be built when economic plans are hampered by large corporations and their changing owners, and when people who could work for the good of their native land are forced to work like negroes in private factories?"
dnr_socialist_paradise:0 "Socialist Paradise"
dnr_socialist_paradise_desc:0 "Carrying out all kinds of economic and social reforms, experimenting, and using old methods in the modern world, we have always had a single goal - to build a small socialist paradise. All our steps have led us to this moment, and here we are, standing in front of our home, our native land, which has finally healed from all that its enemies and exploiters have done to it, and is ready for life."
dnr_we_are_the_army_of_the_people:0 "We are the Army of the People"
dnr_we_are_the_army_of_the_people_desc:0 "A state without an army is nothing. Unfortunately, we have to accept these realities. Without a powerful and combat-ready army, we risk not only losing respect for us but also the state itself, which is categorically unacceptable. The people's army will stand guard over our people, and in order for it to protect us from all threats, we must invest in it with our blood and sweat."
dnr_peoples_army:0 "People's army"
dnr_peoples_army_desc:0 "The glory of the mighty Red Army, born in the fires of the civil war, will accompany us forever. Practice has shown that every farmer and worker can not only join the heroic army but also bring real benefit to their own country and honour to their family. We honour the glory of our ancestors, and nothing else will show this more than following their traditions!"
dnr_the_strongest_warriors_of_socialism:0 "Strongest Warriors of Socialism"
dnr_the_strongest_warriors_of_socialism_desc:0 "The backbone of every army, apart from numbers, has always been quality and advancement. History has repeatedly proven that with elite trained soldiers equipped with the latest technology, you can defeat armies of any size, and it is our duty as the last true bastion of socialism in Europe to protect our heritage and our ideas, and without a technologically advanced army this is simply not possible."
dnr_mass_recruitment:0 "Mass Recruitment"
dnr_mass_recruitment_desc:0 "The People's Army needs... oddly enough, people. A lot of people. If we want to defend our borders and push them further, the current army will not be enough. By launching a massive wave of conscription, we will not only provide the army with active soldiers but will also be able to create a reserve, which, in the case of a truly bloody struggle for freedom and equality, will definitely come in handy."
dnr_new_military_complex:0 "New Military Complex"
dnr_new_military_complex_desc:0 "Unfortunately, numbers and morale are not enough to maintain the army's combat capability. They need weapons and equipment. Our current capacities allow us to supply the army, but if the army expands, we will need more factories and warehouses. By increasing the number of plants and the production of weapons and ammunition, we will significantly raise our chances of success on the field."
dnr_a_work_for_our_defenders:0 "A Work for Our Defenders"
dnr_a_work_for_our_defenders_desc:0 "To succeed in our revolutionary and liberation struggle, we need to involve everyone. Every person, even if it seems impossible at first sight, can help us in the battles, and not necessarily on the front lines. The factories producing ammunition and military equipment need more and more workers, and if we involve every available hand in production, our facilities will become invincible."
dnr_legacy_of_28_panfilovets:0 "Legacy of 28 Panfilovets"
dnr_legacy_of_28_panfilovets_desc:0 "We all remember the legendary story of the 28 most heroic soldiers of the Great Patriotic War who, almost unarmed, managed to stop the entire Nazi army from advancing on Moscow and thus saved the Soviet Union. Their deed has gone down in history forever, and it is this deed that should become the backbone of our army. If every soldier becomes a Panfilovets, nothing will stop us."
dnr_put_everyone_we_can_in_charge:0 "Put Everyone We Can in Charge"
dnr_put_everyone_we_can_in_charge_desc:0 "The revolutionary and liberation struggle requires sacrifice, and all those who die for the glorious ideas of socialism will forever remain in our memory and history. But we need everyone to win this battle. Everyone has responsibilities, and those who are not fighting on the agricultural, technological, and information fronts, who are not raising new generations, must take up arms and fight for us and our ideas on the battlefield. Victory will be ours! No matter the cost!"
dnr_get_back_politheads:0 "Get Back Politheads"
dnr_get_back_politheads_desc:0 "Everything needs supervision, especially the army. Ordinary military inspections, and testing of weapons, are a matter of course, but ideological supervision is another thing. Ideological control over commanders, as Soviet practice has shown not for the first time, is very important and has a strong impact on the morale of soldiers, which in turn is priceless. Loyalty and devotion to the state and the party are the most important things for the army, and we are ready to take any measures to keep it that way."
dnr_invite_foreign_specialists:0 "Invite Foreign Specialists"
dnr_invite_foreign_specialists_desc:0 "Quality comes first. No one has ever been able to achieve everything on their own, and even the great Soviet Union shared and adopted technologies from foreign developers, as well as established joint construction and exploitation. There are many brilliant engineers and theorists in the world who would be happy to help their fellow socialists in a good cause, and we will give them the opportunity."
dnr_legacy_of_our_grandfathers:0 "Legacy of Our Grandfathers"
dnr_legacy_of_our_grandfathers_desc:0 "The glory of our grandfathers, who beat the Nazis both near Moscow and Berlin, will live forever. We honour their memory, and we will continue to do so, hoping that our soldiers will be able to get at least a sliver of the glory of those who were able to put all the fascist scum on their backs while the rest of the world was shaking with fear. The Red Army lives on in us, and with the blessing of our ancestors, it will remain so. Glory to the Reds! The world is ours!"
dnr_establishment_of_the_apparatus:0 "Establishment of the Apparatus"
dnr_establishment_of_the_apparatus_desc:0 "Having started the process of complete reform of the governmental system, we have encountered an outdated state apparatus, the existence of which is a banal humiliation for our state and party. Having set out to restore the proven and impeccable Soviet practices, we must fundamentally change the existing agencies for the good of the people and the state."
dnr_one_right_party:0 "One Right Party"
dnr_one_right_party_desc:0 "The multi-party political system has too often been the cause of many unrests and even coups, and can therefore be considered dangerous, especially when we aim to build a true socialist paradise. The Soviet one-party system has proved to be better than any other in the world, so we will borrow some methods from our glorious ancestors."
dnr_trustworthy_media:0 "Trustworthy Media"
dnr_trustworthy_media_desc:0 "Over the years, television and the Internet have proved to be really powerful drivers of events and shapers of public opinion, and this factor cannot be ignored. Our opponents will continue to throw mud at us and our decisions, and the only possible counteraction to this can be pro-government media that would, on the contrary, stand up for the party and the people who elected it."
dnr_patriotic_studying:0 "Patriotic Studying"
dnr_patriotic_studying_desc:0 "We and our parents knew history and geography well, were in good physical shape and understood discipline, unlike today's youth. But everything can change. The Soviet school curriculum was impeccable, and even in the West, this is recognised, which is hardly a small matter. Young people need a good education, or our country cannot expect anything good for itself in the nearest future."
dnr_agitation_countrywide:0 "Agitation Countrywide"
dnr_agitation_countrywide_desc:0 "The Soviet practice of propaganda posters and brochures, a plethora of party magazines and newspapers, and reminding people of what a wonderful country they lived in and how lucky they were to have it, unlike others, was fantastic. The moral of the people, as I recall, was simply on a cosmic level, and it would be a shame not to repeat the success of the campaign of the great Union of Peoples."
dnr_reconcile_orthodoxy_and_socialism:0 "Reconcile Orthodoxy and Socialism"
dnr_reconcile_orthodoxy_and_socialism_desc:0 "Mistakes are what make human beings human, and even the great ones sometimes make them. The leaders of socialism, one after the other, have brought the thesis of their forefather, Karl Marx, that "religion is opium for the people", but in our opinion, nothing prevents our historically Orthodox people from abandoning spirituality to fully understand the theory of socialism. This is not only unnecessary in our time, but even harmful. We have had enough of witch hunts!"
dnr_a_big_tent_concept:0 "A 'Big Tent' Concept"
dnr_a_big_tent_concept_desc:0 "After the introduction of the one-party system, our state stumbled with a shortage of personnel in some areas where the socialists simply did not have enough experience. But there is a solution to this - the expansion of our party in an ideological form. By making the socialist party a home for everyone - left and right, loyal to the people of Donbas - we will solve most of the state's problems and finally be able to deal with more important matters."
dnr_issue_of_state_language:0 "Issue of State Language"
dnr_issue_of_state_language_decsc:0 "If we want to unite all the territories of the former Ukrainian Soviet Socialist Republic, we must remember the two dominant peoples on its lands - the Russian majority and the Ukrainian minority. In paradise, everyone is equal, even Ukrainians, so granting Ukrainian the status of a second official language is our commonplace duty, which will bring us a little closer to our goal."
dnr_new_bright_generation:0 "New Bright Generation"
dnr_new_bright_generation_desc:0 "For the sake of the future of our free country and our brave people, we must be confident in the ability of future generations to carry the burden of governing a powerful state. The return of the Soviet school system will play a role, but without things like Komsomol and the Pioneers, our children and their children will simply not have all that the Party gave us. We just have no right to deprive them of this. And with this approach, our state and our ideals will live forever!"
dnr_return_to_iron_fist:0 "Return to Iron Fist"
dnr_return_to_iron_fist_desc:0 "Stalin's iron fist policy may not have been marked by any excessive transparency, but it showed excellent results in both domestic and foreign policy. Of course, no one is reviving the cult of personality, but a strong hand is exactly what the state and the people need now."
dnr_new_ottepel:0 "New 'Ottepel'"
dnr_new_ottepel_desc:0 "The results of the “Khrushchev Thaw” were extremely impressive at the time and opened the gates to the outside world for our great homeland. By adopting a softer policy, we may not have any extraordinary productivity, but fellow citizens are guaranteed to be happy with our acceptance of the legacy of an influence-free Central Committee."
dnr_nostalgia_for_the_past:0 "Nostalgia for the Past"
dnr_nostalgia_for_the_past_desc:0 "Having completed the complex process of reforming the state apparatus, we are one step closer to the formation of a full-fledged socialist state. The Soviet legacy was the only thing that kept our dream on its feet, but now it’s the main driver and source of all our actions and plans. Don’t be afraid, comrades, we’ll treat the legacy of our ancestors with care and will not allow their glory to decline!"
dnr_the_future_awaits_us:0 "The Future Awaits Us!"
dnr_the_future_awaits_us_desc:0 "Having carried out all possible reform processes and brought Soviet innovations back into practice, our state can achieve the last goal - the unification of all the lands of former Ukraine. The army is as ready as ever, the economy is able to withstand any shocks, the political apparatus is showing strength and determination, and a lot of our like-minded people are ready to support us, both in Ukraine and around the world. Forward, Donbass! A bright future is just around the corner!"
dnr_liberate_kharkov:0 "Liberate Kharkov"
dnr_liberate_kharkov_desc:0 "The lands of the Kharkov region have been and remain fraternal not only to Donbass but to the whole of Ukraine. For centuries, the history of Kharkov and Donbass has been marked by common events. Shared grief and joy. Kharkiv is one of the most industrialised regions of the country, and its workers and people need the help of their brothers. No one dares to enslave the brave people of the Kharkov! And we will prove it!"
dnr_march_on_dnepropetrovsk:0 "March on Dnepropetrovsk"
dnr_march_on_dnepropetrovsk_desc:0 "There are two capitals in Ukraine built on the Dnepr River, and each is a bastion of lying politicians, gangs, and suffering workers and residents. Dnepropetrovsk is an important economic centre, but over the years bandits and oligarchs who have lost their boundaries have turned it into a den of crime and illegality, while people have become poorer and the desires of the proletariat have been ignored. This has come to an end! Dnepropetrovsk deserves justice, and it will get it!"
dnr_at_the_heart_of_ruin:0 "At the Heart of Ruin"
dnr_at_the_heart_of_ruin_desc:0 "Kiev, Chernigov, and Poltava are three cities that have become symbols of devastation and instability that, if we want to live in peace, must be quelled. The people in these cities have suffered especially since the beginning of the chaos, and they have had no one to help them in this struggle. But now we are strong enough not only to fight for our own rights and freedoms but also to help all our brothers and sisters. "
dnr_approaching_podolye:0 "Approaching Podolye"
dnr_approaching_podolye_desc:0 "The lands of  Podolye may not be the industrial heart of the country, but even so, many of its residents suffer from a government that they did not elect and that does not hear them. We have seen this before, and unfortunately, we are seeing it now, and it needs to stop. Proud Podolye land, just bear with us, we are close!"
dnr_legacy_of_kirov:0 "Legacy of Kirov"
dnr_legacy_of_kirov_desc:0 "Kirovohrad, after the fall of Ukraine, became a new bastion of socialism. Concerned Russians managed to establish control over these lands and then convinced the locals that communism was not dead and that its ideals could be resurrected and implemented. They gave people hope, and so did we. But we still have many differences. All of these need to be resolved now in order to finally unite the state and its socialist figures and leaders."
dnr_a_blow_to_zapadentsy:0 "A Blow to Zapadentsy"
dnr_a_blow_to_zapadentsy_desc:0 "The so-called "Western Ukrainian Lands" have always shown themselves to be the most intolerant part of our country, who mostly do not recognise Russians and Russian as equal to Ukrainian, and even after many decades still glorify fascist figures and collaborators like Bandera and Petliura. But even so, there are people here who believe in equality between the many peoples of Ukraine, who are suffering from capitalist influence, and who are asking for help from their brothers in Donbass and the rest of the country. The West is calling for aid, and we will answer!"
dnr_go_south_the_dnepr:0 "Go South the Dnepr"
dnr_go_south_the_dnepr_desc:0 "Zaporozhye has always been the cradle of the revolutionary spirit and the will of simple people for freedom and equality. Since the days of the famous Zaporozhyan Cossacks, the locals have fought back against the aristocracy that considered them slaves, and centuries later, Makhno and many others continued their work. But the fight for freedom by the people of Zaporozhye is not over. We will continue it, and we will win it!"
dnr_to_kherson:0 "To Kherson"
dnr_to_kherson_desc:0 "The Tavrian steppe of the Kherson region has always been known for its freedom and friendliness to socialist ideas. We have allies and friends here, but that doesn't mean we all share the same goals and ideology. Kherson belongs alongside other parts of our country, and no one dares to deny it."
dnr_crimean_issue:0 "Crimean Issue"
dnr_crimean_issue_desc:0 "Is Crimea Ukrainian or Russian... does it matter? Crimea has always belonged to its people, the Crimeans, and this question should be left to them. Before that, they wanted to join Russia and become independent, but now there are no fascists in Ukraine who would encroach on the freedoms of Crimea and its people. This issue must be raised again and for the last time, so that in the future no one will have any questions about whose peninsula it really is. "
dnr_akh_odessa_zhemchuzhyna_u_moria:0 "Akh, Odessa, Zhemchuzhyna u Moria"
dnr_akh_odessa_zhemchuzhyna_u_moria_desc:0 "Odessa is a place... that cannot be expressed in words. It has always been a centre of true Russian culture and a symbol of the greatness of the Russian people in the region, and this title was repeatedly sullied by the Ukrainian fascists who tried to take away the city from Odessans. But we cannot allow this to happen. Odessa - Mama, we will free you and bring you back, and no one will harm you anymore."
dnr_a_shining_whole_ukraine:0 "A Shining Whole Ukraine"
dnr_a_shining_whole_ukraine_desc:0 "The new state that will emerge from the wreckage of the old Ukraine is undoubtedly the successor to the glorious Ukrainian SSR, and thus indivisible. From the mighty Carpathian mountains in the west and the deep swamps of Polissya in the north to the wide Don steppes in the east and the beautiful Tavrian coast in the south, it is a single organism that is a crime to divide. Every citizen of this land deserves the paradise we will bring, regardless of ethnic or linguistic differences."
dnr_renewal_of_union_system:0 "Renewal of Union System"
dnr_renewal_of_union_system_desc:0 "The concept of Ukraine as a single state has proven to be unsuccessful. Even though it tried to build a multicultural state in the form of the Ukrainian SSR, what followed, namely an attempt to build a monocultural state by oppressing other languages and nations, destroyed any hope of continuing the "Ukrainian experiment". But there is a way out. The regions that will never accept the population of Novorossiya as they are do not have to live in the same country as them, but they can have their own. We will restore the system of the Soviet Union, but on the territory of Ukraine, and create a society where everyone will be with their own people and language, and live in a peaceful, equal and free community."

 DPR_vitrenko_tv:0 "Spreading Our Word"
 DPR_vitrenko_tv_desc:0 "There is power in truth! And we are the ones who carry it! Our dear comrades all over Ukraine and beyond need to hear this, they need to know that even the most deprived and disadvantaged are still thought of and remembered. We will come to the rescue and liberate every household from oppression, and if not, then damn us!"
 DPR_world_here_we_go:0 "World, Here We Go!"
 DPR_world_here_we_go_desc:0 "And now the whole planet knows about us. Every country has heard about the uprising labour struggle on the outskirts of Europe, and the bourgeois are scared. And they should be. The working class has suffered enough, and if they thought that the destruction of the Soviet Union would put an end to it, we will make them change their minds. We'll show you the Kuzka's mother, capitalists!"
 DPR_babushkas:0 "Careship for Old Ones"
 DPR_babushkas_desc:0 "The oldest generation is the only thing we have left of the good old days. When sausages cost 2.20, housing was free, and everyone gladly worked for their motherland and nation. They lived a wonderful life, but most importantly, they dedicated it to our common homeland. And for this, they deserve not only respect, but also our care for them."
 DPR_workers_domestic_front:0 "Workers' Domestic Front"
 DPR_workers_domestic_front_desc:0 "You can dedicate your life to your country not only on battlefields but also at factories, farms and beyond! No matter what anyone says, even in times of peace, there is always one front in the country - the industrial one. All those who are truly loyal to their homeland and want to help it are already fighting there, so don't be ragul and join them!"
 DPR_deal_with_wealthy:0 "A Deal With Oligarchs"
 DPR_deal_with_wealthy_desc:0 "No matter how much we want to build a socialist paradise on our land, it is foolish to ignore the existence of the oligarchs and the opportunities that an alliance with them can give us. We will continue our policy of socialisation of the economic and industrial sectors, but it is our former enemies and their resources that will help us in this."
 DPR_welfare:0 "Welfare for Working Class"
 DPR_welfare_desc:0 "Workers, who in recent decades have once again lived as the lowest and poorest part of society, deserve a decent life. These people give their lives day and night for the good of the country, and we must properly reward them for their hard work."
 DPR_mass_nationalisation:0 "Mass Nationalisation"
 DPR_mass_nationalisation_desc:0 "The policy of nationalisation is the only way to build a socialist economy and a necessary step towards the paradise described by Marx. The state will be able to perform everything, and people will feed it and be fed by it. It will be as it should be - perfect."
 DPR_peoples_army:0 "People's Army"
 DPR_peoples_army_desc:0 "Our people's army has its roots in the peasant forces of the great Red Army, and like it, it will continue the tradition of bringing freedom and liberty to the lands that need it. Everyone should have the right to join the fight, and everyone will."
 DPR_strongest_warriors_of_socialism:0 "Strongest Warriors of Socialism"
 DPR_strongest_warriors_of_socialism_desc:0 "With revolutionaries and fighters from all over the world united by one common goal - to achieve the goals set by Marx and Lenin long ago, the army of our homeland is truly unstoppable. All those who stand in the way of working people's freedom will be forced to meet their warrior defenders, and this will be the last thing they will do."
 DPR_mass_recruitment:0 "Mass Recruitment to Army"
 DPR_mass_recruitment_desc:0 "To win the workers' war of liberation, we need soldiers, lots of soldiers. The duty of every man, in addition to serving his family, is to serve his country, and the time has come for them to fulfil their duty to their own people. The more we call up, the better!"
 DPR_28_pidorasov:0 "Legacy of 28 Panfilovets"
 DPR_28_pidorasov_desc:0 "28 of the most legendary fighters of the Great Patriotic War - the Ponfilovtsy, who alone, without weapons, reinforcements, and being in a complete minority, held back the entire Nazi offensive on the great Soviet capital - Moscow. These heroes will serve as an example for each of our soldiers and will inspire them to do what they once did - the impossible."
 DPR_new_military_complex:0 "Socialist Military Complex"
 DPR_new_military_complex_desc:0 "To wage victorious warfare, and in general, to create a strong army that will be respected by every possible invader, enemy or ally, we need factories. Lots of factories. And they will make us tanks!"
 DPR_a_work_for_our_defenders:0 "A Work for Our Defenders"
 DPR_a_work_for_our_defenders_desc:0 "To succeed in our revolutionary and liberation struggle, we need to involve everyone. Every person, even if it seems impossible at first sight, can help us in the battles, and not necessarily on the front lines. The factories producing ammunition and military equipment need more and more workers, and if we involve every available hand in production, our facilities will become invincible."
 DPR_bomzhi_v_armii:0 "Poor Recruitment Standarts"
 DPR_bomzhi_v_armii_desc:0 "Our army needs people. 'People' is the main thing, and what people? That's the wrong question. We welcome all people, even if those people have some issues, which won't let them be effective in army."
 DPR_politheads:0 "Political Control of Army"
 DPR_politheads_desc:0 "Our soldiers must fight for us relentlessly and they shouldn't ask unnecesarry questions. To help with that, politheads are reintroduced. Like in old times, they'll watch for ideological correctness of soldiers and punish non-loyal ones."
 DPR_ruzgi:0 "Bilingual System"
 DPR_ruzgi_desc:0 "Russian? Ukrainian? What's the matter? Those languages both are present in Ukraine, so why would we need to choose one state language to follow? There will be two!"
 DPR_soyuz_popa_i_komuniaki:0 "Union of Socialism and Religion"
 DPR_soyuz_popa_i_komuniaki_desc:0 "It may sound ridiculous, but many people in Soviet Union were religious, so we can't ignore religion in our times. While people aim for socialist ideals, they can attend churches and believe in God."
 DPR_detskiy_trud:0 "Bright New Generation"
 DPR_detskiy_trud_desc:0 "Besides the basic things, which children learn in school, they also should learn how to work at real jobs. Why spend vacation with doing nothing useful, when you can learn how to make furniture or how to setup railways?"
 DPR_nostalgia:0 "Just Like the Old Times"
 DPR_nostalgia_desc:0 "A good part of ukrainian populace is people, who were born in Soviet Union, and they still harbour sweet memories of past. How education and sports were free, how you shouldn't think about tomorrow, because the state decided it already... Sweet nostalgia of Soviet Union, which we'll represent in our state!"

 DPR_vitrenko_sila:0 "We've chosen quality over quantity"
 DPR_vitrenko_bomzhi:0 "We've chosen quantity over quality"

