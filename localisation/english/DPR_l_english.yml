 ## DPR EVENTS
 dpr.1.t:0 "Situation in Ukraine"
 dpr.1.d:0 "The situation in Ukraine is very difficult. The legitimate government was overthrown by the brutal Euromaidan. But now the situation is much worse. Ukraine has fallen into anarchy, and only we, Donbass, which broke away in time, are an island of adequacy in the region."
 dpr.1.a:0 "Glory to Donbass!"
 dpr.2.t:0 "Situation in Our Country"
 dpr.2.d:0 "It has long been known that you cannot be alone in this world. What we must now pay attention to is our surroundings: while friends are close, enemies, unfortunately, are even closer. It is up to us to decide which way to look and with what intentions."
 dpr.2.a:0 "Wake up, Donbass!"
 dpr.3.t:0 "Looking Around Us"
 dpr.3.d:0 "Our President said at his conference: "We are under pressure by the Armed Forces of Ukraine from the west and by the friendly Russian Federation from the east. In the north, we border the brotherly Luhansk Republic. The entire territory is under the control of the Donetsk militia or the Russian army. For the first time in the history of our country, we are forced to fight for our freedom. Our soldiers are fighting for freedom, for their homeland. We will not allow this to be destroyed."
 dpr.3.a:0 "Wake up, Donbass!"
 dpr.4.t:0 "Looking West"
 dpr.4.d:0 "The Ukrainian regime has fallen. But the brave sons of Donbass must realize that it's not the end because victory is not yet achieved. The Armed Forces of Ukraine remain. They continue to fight for the regime that no longer exists, but in that fight, we may suffer the most! We will do everything to bury the concept of Ukraine. Or we will perish trying to do so."
 dpr.4.a:0 "Yes, Death!"
 dpr.5.t:0 "Warehouse Found"
 dpr.5.d:0 "We Found Some Warehouses."
 dpr.5.a:0 "Glory to Donetsk!"
 dpr.6.t:0 "No Warehouses Were Found in the Area"
 dpr.6.d:0 "We Didn't Find Any Warehouses in the Area."
 dpr.6.a:0 "Well, just use Russian!"
 dpr.7.t:0 "Looking East"
 dpr.7.d:0 "Putin has been called many things. A politician. A leader. A fighter. But for us, it's simple - he is the Father. No, Mother! He breastfeeds us every day, but instead of pure milk, he pours weapons and resources down our throats. He is our personal Saviour, and we should appreciate everything Russia has ever done for us."
 dpr.7.a:0 "Mr. Putin, we await!"
 dpr.8.t:0 "Looking North"
 dpr.8.d:0 "Ah, the LPR... Pasechnik... We have experienced both good and bad moments together, going from blood brothers to almost enemies who cannot share supplies. But in the end, we are not so different. Perhaps we can offer greater cooperation, friendship and unity against a shared enemy!"
 dpr.8.a:0 "So true!"
 
 
 
 dpr.15.t:0 "Tamoznya"
 dpr.15.d:0 "Like any good colleagues, we have our differences. Sometimes we can't split the money we receive properly, or even our brave soldiers can kill each other for food. But does it matter on a global scale? We are the sons of Donbass! We must stand united to withstand the inevitable enemy, it's now or never!"
 dpr.15.a:0 "Yes."
 dpr.15.b:0 "No."
 dpr.16.t:0 "Controlling the Business"
 dpr.16.d:0 "Oligarchs are a huge problem in Donetsk. How we will deal with it?"
 dpr.16.a:0 "Status quo - it's only one way."
 dpr.16.b:0 "Oligarchs must work for people! Not for their pockets!"
 dpr.16.c:0 "Russia will deal with it."
 dpr.17.t:0 "Crisis in Administration"
 dpr.17.d:0 "Many officials are interested in our association's projects, especially in terms of what rights this association will have, etc. So far, there are two options either a federation or a confederation, with broader rights for the republics that will be part of it."
 dpr.17.a:0 "We will start federalisation!"
 dpr.17.b:0 "We will start confederalisation!"
 dpr.18.t:0 "Leader of Novorossiya"
 dpr.18.d:0 "After lengthy negotiations, our delegation and the Luhansk delegation came to the conclusion that the current president of the DPR, Denis Pushilin, should become the leader of our united state! He has long proven himself to be an effective manager and patriot of our country, so it is logical that he will become a key figure in our union."
 dpr.18.a:0 "Never ask him what he did in MMM."
 dpr.19.t:0 "War Support"
 dpr.19.d:0 "We start supporting a war in our society"
 dpr.19.a:0 "Society..."
 dpr.20.t:0 "Novorossiya"
 dpr.20.d:0 "All documents are ready and now we are ready to start unification with Lugansk. Our armies are united, our economy is united, and most importantly, our people are united in the fight against nationalist Ukraine!"
 dpr.20.a:0 "Glory to Novorossiya!"
 dpr.21.t:0 "Unification?"
 dpr.21.d:0 "We can unite!"
 dpr.21.a:0 "Yes!"
 dpr.21.b:0 "No, thanks."
 dpr.22.t:0 "Unification?"
 dpr.22.d:0 "We can unite!"
 dpr.22.a:0 "Yes!"
 dpr.22.b:0 "No, thanks."
 dpr.23.t:0 "Pasechnik poslal nahui pushilina po telefonu"
 dpr.23.d:0 "Pasechnik poslal nahui pushilina po telefonu"
 dpr.23.a:0 "Bottom text"
 
 dpr.24.t:0 "Victory Day"
 dpr.24.d:0 "After years of intense fighting and bloodshed, the combined forces of the Donetsk and Luhansk People's Republics have finally won the war in Donbas against the Ukrainian army. The news spread like wildfire, and celebrations began across the region. Residents of the DPR flooded the streets, waving flags and rejoicing in their newfound peace. Families were reunited, and tears of joy rolled down the faces of those who had lost loved ones during the conflict. The sound of fireworks and music filled the air as people danced and hugged each other, grateful for the end of the war."
 dpr.24.a:0 "Finally peace."
 dpr.25.t:0 "Start of Integration"
 dpr.25.d:0 "After years of conflict and uncertainty, the Ukrainian territories of Donetsk and Luhansk oblasts have finally been integrated into the newly created Novorossiya. The integration process, which began several months ago, has been met with mixed reactions from the international community, but the citizens of Donetsk and Luhansk are celebrating the opportunity to join their brothers and sisters in a new country."
 dpr.25.a:0 "After Years..."
 dpr.26.t:0 "Promise of Future"
 dpr.26.d:0 "A large crowd of people had gathered in the great hall of the Novorossiyan government building. The mood was a mixture of hope and uncertainty. They had all come to listen to the leader of the country, the head of the Novorossiya government, Leonid Pasechnik, who was speaking about the future of the nation. When Leonid took the podium, the room fell silent. He cleared his throat and began to speak. "Dear fellow citizens of Novorossiya," he began. "I know that the past has been difficult for all of us. We have lived through years of war and turmoil, but today I am here to tell you that the future is bright. The government is committed to creating a better life for all of us." The audience erupted in applause and cheers. "We will rebuild our country from scratch," the Prime Minister continued. "We will invest in infrastructure, education and healthcare. We will create jobs and economic opportunities. We will create jobs and economic opportunities for everyone. And we will make sure that every citizen of Novorossiya has a say in the future of our country." The crowd again erupted in applause, with many people standing and waving the Novorossiya flag. "I promise you that we will work tirelessly to make Novorossiya a great country," the president concluded. "Together we will build a future that we can all be proud of." As he stepped down from the podium, the crowd rushed forward to shake his hand and congratulate him. There was a sense of optimism and hope in the air, and people began to talk excitedly about the future of their country. For the citizens of Novorossiya, it was the beginning of a new chapter in their history. They had been promised a brighter future, and they were ready to work together to make it a reality."
 dpr.26.a:0 "Za Nasche Svetloye Buduschee!"
 dpr.27.t:0 "Tribunal Under General"
 dpr.27.d:0 "The courtroom was filled with tension as the trial of Ukrainian General Serhiy Kryvonos began. Kryvonos was accused of numerous war crimes committed during the conflict in Donbas, including indiscriminate shelling of civilian areas and the use of prohibited weapons. As the prosecution presented its evidence, the mood in the courtroom grew increasingly sombre. Photographs of destroyed houses and buildings were displayed on screens, and witnesses testified to the horrors they had experienced during the conflict. Kryvonos, dressed in a military uniform, sat stoically as the prosecution presented its case against him. His defence team argued that he was acting on orders from his superiors and that he had no choice but to do what he did. But the defence arguments did not influence the prosecution. During the trial, it became clear that the evidence against Kryvonos was overwhelming. The judge listened to both sides and, after careful consideration, delivered a verdict of guilty on all charges. The courtroom erupted in applause as the verdict was read out. The families of the victims hugged each other and cried tears of relief. Kryvonis was taken away in handcuffs to await sentencing. This trial was a key moment for the people of Donbass, a symbol of their determination to bring those responsible for war crimes to justice. It was a reminder that justice can prevail even in the darkest of times."
 dpr.27.a:0 "Ispolnit` Vishshuyu Meru Nakazaniya!"
 dpr.27.b:0 "Otpravit` na kichy, let tak minimum na 5!"
 dpr.28.t:0 "The Meeting"
 dpr.28.d:0 "In a large conference room in Donetsk, the head of the Novorossiyan government, Leonid Pasechnik, sat at a long table surrounded by his top advisers. On the other side of the table sat Yevhen Murayev, the head of the former Ukrainian pro-Russian party Nash. The two men were sitting facing each other, their expressions serious and focused. The topic of their meeting was the integration of local pro-Russian parties into Novorossiya. Murayev began by outlining his party's vision for greater unification of the Russian-speaking regions of former Ukraine. He spoke passionately about the need for unity and cooperation between the people of Ukraine and Russia. Pasechnik listened intently, nodding his head in agreement. He understood the importance of building strong ties between the various pro-Russian parties in former Ukraine and the government of Novorossiya. He spoke of the benefits of closer economic and cultural ties between the two nations. As the meeting continued, the discussion became increasingly heated, with both men raising their voices as they debated the finer points of their proposals. But in the end, they both agreed on the importance of working together to achieve common goals. The meeting ended on a positive note, with both men shaking hands and promising to continue discussions in the coming weeks. Pasechnik was optimistic about the future of the region and was confident that with the help of Murayev and other pro-Russian leaders in former Ukraine, they could build a stronger and more prosperous future for the entire Russian-speaking population of former Ukraine."
 dpr.28.a:0 "Eto Budet Khorosheye Sotrudnichevstvo."
 dpr.29.t:0 "Passportisation Programme"
 dpr.29.d:0 "It was an ordinary day in Kramatorsk, and the streets were full of people going about their business. Among them was a grandmother named Olga who had lived in the city all her life. She had seen many changes over the years, including the recent conflict that had torn the city apart. But today was a special day for Olga. She received a letter in the mail from the government of Novorossiya informing her that she was eligible for a new passport. This passport would allow her to become a citizen of Novorossiya, the new name of the Donetsk People's Republic. Excited and a little nervous, Olga headed to the government building where she was told to go to collect her new passport. When she arrived, she was met by a friendly civil servant who explained the procedure. Olga brought all the necessary documents with her, and the official quickly processed her application. A few minutes later, Olga was holding her new passport with a photo of her smiling face on the cover. Overwhelmed with emotion, Olga thanked the official and went outside. As she walked down the street, she held her new passport tightly in her hands, feeling a sense of pride and belonging. For Olga, this new passport was more than just a piece of paper. It was a symbol of hope and a brighter future for her and her family in a new country, Novorossiya. And with tears in her eyes, Olga knew that she was ready to welcome this new chapter in her life with open arms."
 dpr.29.a:0 "Hope that she is fine."
 dpr.30.t:0 "Patriotism"
 dpr.30.d:0 "The news of the war's victory spread throughout Novorossiya, and the streets of cities and towns were filled with jubilant crowds waving flags and chanting patriotic slogans. The government declared a national holiday, and people poured out of their homes to join in the festivities. A large stage was set up in Donetsk's central square, from which patriotic songs were played. The crowd gathered around the stage, and when the music started, people began to sing along. The air was filled with excitement and pride. Suddenly, the music stopped and a man came on stage. He was dressed in a suit and had a serious expression on his face. It was the head of the Novorossiysk government, Leonid Pasechnik. The crowd fell silent as Pasechnik began to speak. He spoke about the sacrifices that had been made during the war, about the brave men and women who had fought and died for their country. He talked about the importance of patriotism, and the need to unite as a nation and build a better future for everyone. The people listened attentively, and as Pasechnik spoke, a sense of unity began to grow within them. They realised that they were all part of something bigger than themselves, that they were part of a great nation that had triumphed in the face of adversity. When Pasechnik finished his speech, the orchestra started playing again, and the crowd erupted in applause. The sense of pride and patriotism was palpable, and it seemed that nothing could break the bond that had been established between the people of Novorossiya and their country."
 dpr.30.a:0 "Wake up, Dombass!"
 dpr.31.t:0 "Connections of Our Roads"
 dpr.31.d:0 "In bustling Donetsk, residents were eagerly awaiting the arrival of a new high-speed train that would connect them to other major cities in Novorossiya. The train was due to arrive in a few hours, and people were already lining up at the railway station to see it. When the train arrived, a loud cheer erupted from the crowd. The train was elegant and modern, with a bright blue exterior and a powerful engine. When it stopped, the doors opened and a team of engineers got out to inspect it. The people of Donetsk watched in amazement as the engineers carefully inspected every inch of the train. It was clear that they had put a lot of effort into designing and building this state-of-the-art machine. After the inspection was completed, the train conductor came out and addressed the crowd. He spoke passionately about the importance of modern transport infrastructure for the growth and development of Novorossiya. He spoke about how this train would connect people and businesses, creating new opportunities and stimulating economic growth. The conductor then invited everyone to take a tour of the train and get acquainted with its advanced features. People eagerly climbed aboard, admiring the comfortable seats, on-board entertainment system and smooth ride. As the train pulled away from the station and sped off into the distance, Donetsk residents felt a surge of pride and patriotism. They knew that their country was at the forefront of technology and that its future was bright."
 dpr.31.a:0 "Nashi Dorogi Ediny!"
 dpr.32.t:0 "Finale of the Integration"
 dpr.32.d:0 "Anna was a simple factory worker from Slavyansk. She had lived in the city all her life and had seen it change over time. But now, with the formation of Novorossiya, everything was different. Anna woke up early in the morning and got ready for work. Outside her window, she could hear the sounds of construction, which reminded her of the changes taking place in her city. The construction of new factories, houses and infrastructure had picked up after the formation of Novorossiya. Anna arrived at the factory and was surprised to see the changes that had taken place there. The machines were updated, the production process was optimised and the overall atmosphere was much better than before. Anna felt proud to be part of the progress and development of her city. During her lunch break, Anna met with her colleagues and talked about the changes in their lives since the formation of Novorossiya. They discussed how their salaries had increased, how the government had invested in healthcare and education, and how their overall quality of life had improved. After work, Anna decided to take a walk around the city. She noticed the new parks and public spaces that had been built and the cleanliness of the streets. She also saw the flags of Novorossiya flying high, and this gave her a sense of pride and belonging. When Anna returned home, she reflected on how her life had changed since the formation of Novorossiya. She was grateful for the opportunities that had come her way and for the sense of community that had developed in her city. She knew that there was still a lot of work to be done, but she was confident that the future looked bright for her and her fellow citizens of Novorossiya."
 dpr.32.a:0 "She Must Be Happy."
 
 
 ## DPR NATSPIRITS
 DPR_unpopular_president:0 "Unpopular President"
 DPR_unpopular_president_desc:0 "After the assassination of the leader of the Donetsk People's Republic, Alexander Zakharchenko, by unknown assailants, which caused a huge shock in society and started a new period of instability in the state, Denis Pushilin, former chairman of the People's Council of the Republic, was appointed as his successor. Despite the presence of a familiar face in a key position, people still remember the departed Zakharchenko with kind words and consider him an example of leadership, while Pushilin himself has not yet had time to prove himself and has not received neither public recognition nor love."
 DPR_surprise_effect:0 "Surprise Effect"
 DPR_surprise_effect_desc:0 "After waiting for more than five years, we ran out of patience. Prepared and equipped, we have launched an unexpected and devastating offensive against the Ukrainian Junta and we are ready to take revenge for all our previous failures. Our soldiers are more than ever ready to fight and die for Donbass, and their sacrifice will not be in vain!"
 
 DPR_propaganda:0 "Propaganda"
 DPR_propaganda_desc:0 "Propaganda is an integral part of any government's policy, and we are no exception. By using the right tools of psychological influence on the population, we can increase our support through television programmes and news, telling Donbass citizens what they want to hear and what will also be good for our position and policies, even if it is not exactly the truth."
 DPR_oligarchs:0 "Oligarchs"
 DPR_oligarchs_desc:0 "Oligarchy is a child of capitalism. They own huge estates, businesses, and even mines on our territory, and they have no plans to hand over their well-developed enterprises to the government. Yet, by keeping such powerful people close to us, we can gain strong allies, and when they realise their benefits from working with us, they may be even loyal to us."
 DPR_corruption:0 "Very High Corruption"
 DPR_corruption_desc:0 "The Government has been corrupted for ages, as the oligarchs, from this country and Russia, have been bribing the officials. It has weakened the country, people lost trust in the system, which means the corruption cannot continue. There will be anti-corruption measures implemented, while corrupt officials will be removed from their position."
 DPR_problem_with_oligarchs:0 "Problem with Russian Oligarchs"
 DPR_problem_with_oligarchs_desc:0 "The corruption in the country has a cause, and it is the oligarchs from Russia. They have bribed the governmental officials, from the lowest of ranks to the upper echelon, and they have taken control of several important institutions, and even the economy itself, meaning if Donetsk's People's Republic is to be independent, they will have to leave the country, one way or another."
 DPR_russian_influence:0 "Russian Influence"
 DPR_russian_influence_desc:0 "The FSB, and the oligarchs, all have one thing in common: They are Russian. There is a huge Russian influence in the country, whether it comes from people who have power and money or just from the population living in the country. Wherever it comes from, it is here. And the country should not suffer anymore, because it should be independent."
 DPR_crisis_in_administration:0 "Crisis in Administration"
 DPR_crisis_in_administration_desc:0 "Donetsk's People's Republic is a new country, of course, but that does not mean they cannot self-govern themselves in a much better way. The bureaucracy of this country has been rotten to the core with bribery and corruption which has prevented governance of this region. Combined with anti-corruption and proper officials that know what they are doing, this issue will be cleared out."
 DPR_novorosjablyat:0 "Novorossiya"
 DPR_novorosjablyat_desc:0 "In 2014, pro-Russian separatists seized part of Ukraine's Donetsk and Luhansk regions, after which they organized their own republics. There was much talk about the fate of these regions, ranging from autonomy within Ukraine in order to dictate their demands to the rest of Ukraine, to their own state, called Novorossiya, in honor of the historical and geographical region of the Russian Empire. But over time, this project was shut down, and its ideologues were either killed or disappeared from the political scene and went back underground. Recently, however, this has changed, and the prospects for unification are extremely high, especially against the backdrop of Ukraine's collapse. Therefore, the DPR and LPR are now acting as a single entity again to defend their interests and those of the people of Donbas and the Russian-speaking population."
 
 spirit_of_novorosja:0 "Rivalry between the Republics"
 spirit_of_novorosja_desc:0 "Rivalry between the Republics"
 
 
 ## DPR FOCUSES
 DPR_situation_in_ukraine:0 "Situation in Ukraine"
 DPR_situation_in_ukraine_desc:0 "We will need to send a group of specialised scouts that should be able to pass the blockade of the Ukrainian Military Junta to check on the situation in Ukraine. We need to have latest information, so that we can find allies."
 DPR_situation_in_our_nation:0 "Situation in Our Nation"
 DPR_situation_in_our_nation_desc:0 "Stability is important, and in order to make sure the Ukrainian Nazies don't ruin the State, we will need to keep eye on every citizen and suppress any protests. A state is weak when people are disunited."
 DPR_look_around_us:0 "Look Around Us"
 DPR_look_around_us_desc:0 "As it is long known, you can't stand alone in this world. What we must focus on right now is our surroundings; while friends are close, banderite foes are, sadly, closer. It's up for us to decide which side do we look on, and with what intentions."
 
 DPR_look_west:0 "Look West"
 DPR_look_west_desc:0 "The Ukrainian regime has fallen. But the brave sons of Donbass must realize that it's not the end because victory is not yet achieved. The Armed Forces of Ukraine remain. They continue to fight for the regime that no longer exists, but in that fight, we may suffer the most! We will do everything to bury the concept of Ukraine. Or we will perish trying to do so."
 DPR_open_old_warehouses:0 "Open the Old Warehouses"
 DPR_open_old_warehouses_desc:0 "Some time ago, gods built concrete and steel warehouses filled with all sorts of weaponry and locked the door so that no one could get it. It is time to open these doors, because we need arms to protect the state, especially from Ukrainians."
 DPR_strengthen_the_propaganda:0 "Strengthen the Propaganda"
 DPR_strengthen_the_propaganda_desc:0 "Not everyone in our country is a citizen who wants to help the state. There is a growing minority of people who want to destroy Donetsk People's Republic, and we shall use all possible tactics to ensure that they don't get the power to do so."
 DPR_mobilize_youth_and_reserves:0 "Mobilize the Youth and Reserves"
 DPR_mobilize_youth_and_reserves_desc:0 "If our children are taught anti-state propaganda, they are no longer our children. We need to introduce state-mandated lessons in every school so that our children grow up to be patriots of their state, who will serve and protect it."
 
 DPR_look_north:0 "Look North"
 DPR_look_north_desc:0 "The LPR is probably our greatest friend in the current situation. We may have differences or disagreements, but we are all together in this Novorossiyan boat! If we don't help each other, how much better are we than Ukrainians? We must ensure military and national cooperation between brotherly republics because the defence of Donbass is our God-given mission! Forward!"
 DPR_remember_novorossiya:0 "Remember Novorossiya"
 DPR_remember_novorossiya_desc:0 "We must unite in a single union, that would bind the Southeastern states. We should remember this confederation because this is our goal. If we can, of course. To do this, we have to prepare to defend Donetsk, as there are people who want to destroy it all, destroy the dream of Novorossiya."
 DPR_set_aside_our_differences:0 "Set Aside Our Differences"
 DPR_set_aside_our_differences_desc:0 "Like any good colleagues, we have our differences. But how important are they on a global scale? How significant are they in the face of danger for both of us? We are the sons of Donbass! We must stand united to withstand the inevitable enemy, it's now or never!"
 DPR_unite_with_lpr:0 "Unite With LPR"
 DPR_unite_with_lpr_desc:0 "We are too divided and the defence pact is not enough to unite us against the Ukrainian Military Junta. We must unite as a single free nation that will move forward together and defeat Goliath, who only wants to see Donetsk and Luhansk destroyed."
 
 DPR_look_east:0 "Look East"
 DPR_look_east_desc:0 "Putin has been called many things. A Politician. A Leader. A Fighter. But for us, it's simple - he is a Father. He, like everyone else, demands loyalty and respect from us, and in return, he gives us material and humanitarian aid, leads us into the future, and guides us on the right path to become a powerful nation side-by-side with Two-headed Eagle! We shall ask for his help, because right now we need it most, and who else would help us if not Mother Russia?"
 DPR_request_russian_equipment:0 "Request the Russian Equipment..."
 DPR_request_russian_equipment_desc:0 "They have gotten our message and gladly responded to our call for help. We asked them for good equipment that could be used by the military, as we aren't int the best position to produce our own."
 DPR_and_volunteers:0 "...and Volunteers"
 DPR_and_volunteers_desc:0 "They also have offered to send in some... volunteers. We have accepted the offer just in case, as we are quite weak, but don't worry, we will definitely become strong and independent."
 DPR_supplement_our_corps:0 "Supplement Our Corps"
 DPR_supplement_our_corps_desc:0 "We need to send the newly received equipment to the military. Every soldier must have the right weapons, supplies and any possible extras. We cannot afford to make a mistake with this, so we must be careful, otherwise, we will pay the consequences..."
 
 DPR_test_their_strengh:0 "Test Their Strengh"
 DPR_test_their_strengh_desc:0 "We cannot be sure that the Ukrainian Military Junta isn't planning an invasion, so instead we must prepare the united armies to go against the Ukrainians. We will need to reorganise the logistics, mobilise soldiers and hand out weaponry. It will be a gruelling preparation, but at last, we will strike down the terrorists."
 DPR_put_an_end_to_ukrainian_army:0 "Put an End to the Ukrainian Army!"
 DPR_put_an_end_to_ukrainian_army_desc:0 "Our soldiers are waiting impatiently, tanks are pumping CO2 into the air and planes are standing by, waiting for the take-off order. "Go!", the officers shout. The time has come for a showdown between our glorious army, with Russian volunteers by our side, against the Ukrainians who have terrorised us for years. The time has come for a second war for independence."
 DPR_victory:0 "Victory at Last"
 DPR_victory_desc:0 "Victory is here! Ura! We have officially avenged every fallen brother and partially repeated our grandfathers' greatest victory in 1945! What remains of AFU runs away in fear elsewhere, seeing the sheer power of the Russian spirit. And while this is a huge milestone for us, without a doubt, there is still a lot to be done to reintegrate the region back."
 DPR_start_integration:0 "Start the Integration"
 DPR_start_integration_desc:0 "Donbass, though now under our control, is fairly bleeding. There is a ton of things that are needed to be done - from simply rebuilding the houses to reinforcing our new political system in the region and strengthening our grip over the opposition. The hardest was already done, now it's time for us to heal Novorossiya!"
 DPR_passportization_programme:0 "Passportization Programme"
 DPR_passportization_programme_desc:0 "People that lived in the Ukrainian-occupied zones had their passports and documentation from the according country, which are treated like nothing but paper now. We must help those poor people to integrate into our new management - we will start massive passportisation in exchange for Ukrainian ones."
 DPR_party_integration:0 "Integration of the Local Parties"
 DPR_party_integration_desc:0 "Ukrainian-occupied part of Donbass, ever since the war stalemate in 2015, has been home to many local pro-Russian political parties. This was perhaps the only region in Ukraine where they got any significant momentum, as shown by the 2019 election results - only Donetsk and Luhansk regions have voted for Boyko. Now, it is time to integrate our local allies into our political system."
 DPR_increase_patriotism:0 "Propaganda Effort"
 DPR_increase_patriotism_desc:0 "The integral part of reintegrating the people of Donbass - is to win their hearts. And though, fairly speaking, a lot of those who lived in the Ukrainian part was already pro-Russian politically, it will not hurt to kickstart the propaganda machine, and let everyone know - Novorossiya is here forever! Ura!"
 DPR_unite_communications:0 "Unite the Communications"
 DPR_unite_communications_desc:0 "During the five years of the "frozen conflict", our infrastructure has become more like a pile of leaky scrap metal. Roads are covered with deep pits, railway tracks have been stripped to the metal, and water and gas pipelines have been rusting since the beginning of the conflict, and that's not all. This picture can be seen throughout Donbass. To make matters worse, the junta has deliberately cut off communication routes between the eastern and western regions of our country. But we won. We are united. Nothing stands in our way anymore. It's time to put an end to the logistical problems and move forward at a steady pace into a brighter future. We will allocate as much money from the state budget as necessary and repair everything that has been destroyed or damaged."
 DPR_promise_the_future:0 "Promise the Future"
 DPR_promise_the_future_desc:0 "For five years we have been thinking about what Donbass will look like after our victory. The situation at the time only allowed us to dream about it, but now, after our victory, we finally have the opportunity to implement everything we wanted. We made tons of promises to the people about the future, and we must fulfil them. From higher wages to free healthcare. We will prove that our words were and are valid."
 DPR_tribunal:0 "The Great Trial"
 DPR_tribunal_desc:0 "Our glorious army crushed the damn Nazi bastards. Now they will pay for all their crimes against the people and land of Donbass. Most of the Junta's military leadership was captured, but unfortunately, some managed to escape. But most importantly, we have Kryvonos, who was too arrogant to abandon his post and escape. He will serve as an example to all those awaiting sentencing. They will all pay. All of them! For our children and parents, they will all die or rot in basements!"
 DPR_finish_integration:0 "End the Integration"
 DPR_finish_integration_desc:0 "Everything is ready. Finally. After our glorious victory in the bureaucracy, hell broke loose, but we overcame it. All the papers are ready. Novorossiya will now administratively own all the lands of Donbas. The Russians, who rightfully own this land, will once again regain their power there. The President only has to sign the relevant document. Oh, look, it's already happening!"
 DPR_elections:0 "Election Day!"
 DPR_elections_desc:0 "The day has come. With the integration of the western regions complete, we have one last big thing to do. The election of the Head of State. Today, from all over Donbass, the capital will receive tonnes of bills with the names of candidates. We will see who will win..."
 