 DPR_we_are_the_army_of_the_people:0 "§tArmy is, by fact, the only possible way to liberate people, so we should rely on it!!§!"
 DPR_army_choice:0 "§7Results of our choice of army doctrine will be shown.§!"
 DPR_establishment_of_the_apparatus:0 "§tWe should consolidate our position and build up our government!§!"
 DPR_big_tent:0 "§tOur party will welcome different thoughts, making it more people-oriented.§!"
 vitrenko_total_s_victory:0 "§tUkraine has been liberated by us§!"
 dpr_the_future_awaits_us_tt:0 "§tWe can't wait no longer, we should start the liberation of Ukraine!§!"
 dpr_liberate_kharkov_tt:0 "§tWe'll look into liberation of Kharkov.§!"
 dpr_march_on_dnepropetrovsk_tt:0 "§tWe'll look into liberation of Dnepropetrovsk.§!"
