Info_Screen_Tab_Name_2: "Main Lore"

 Info_Screen_Main_Lore: "The Fire of Poltava"
 Info_Screen_Main_Lore_Desc: "At the beginning of 2014, the Revolution of Dignity erupted in Kyiv. The so-called 'Euromaidan' overthrew the previous government of President Viktor Yanukovych, which was replaced by an interim government. The day before the ex-president fled the country, Ru§Bss§!§Rian§! armed forces began to seize the Crimean Peninsula via sending unmarked 'green people', which ended in success. A pseudo-referendum was held on the occupied peninsula without the participation of international observers, except for Moscow-aligned parties. The referendum has concluded into 'independence' of the Republic of Crimea, with 68 percent in favour.\nOn 21 April 2019, the second round of the presidential election in Ukraine took place. The main rivals are §BPetro Poroshenko§!, the fifth President of Ukraine, and §7Volodymyr Zelenskyy§!, a comedian and actor whose candidacy came as a big surprise, although many people wanted to see him in office. Falsifications in favour of both candidates have been reported at polling stations. People are not satisfied with this and come out to rallies, blaming everyone and everything. In the end, §7Volodymyr Zelenskyy§! emerged victorious with a narrow margin. In the month leading up to inauguration, protests by supporters of §BPoroshenko§! and other political forces took place across Ukraine. On 20th of May, a presidential inauguration took place. In two next days, §7Zelenskyy§! declares a ceasefire in Donbas and signs 'Steinmeier Formula' to comply with Minsk agreement, which makes it seem more like a surrender to Russia.\nOn 23rd May, in Poltava, §BPoroshenko§! supporters took to the streets and were confronted by armed police units. Later, supporters of §7Zelenskyy§! and far-right party '§2National Corps§!' joined the clashes. The next day, people in Kyiv came to campaign against the new government. Clashes with the police broke out. After fighting three days in a row, §2nationalists§! emerge victorious in the clashes in Poltava. §BPoroshenko§! calls for the 'restoration of stability and harmony in Ukraine'. In Chernihiv, he holds a press conference with his voters, and an alternative political centre is being formed in the very same city. §CL§!§LD§!§BP§!§RR§! launched an offensive on 26th May, which ended in fierce fighting between the §GUkrainian army§! and separatis militias. The §GUkrainian army§! was able to hold its ground but suffered losses.\nAnti-government protests began to spread nationwide. §7Zelenskyy§! orders the §GNational Guard§! to regain full control of Poltava and suppress the protests. Leaving the Kyiv oblast, the §GNational Guard§! gives §BPoroshenko§! the opportunity to stab §7Zelenskyy§! in the back, and the march on Kyiv begins. After days of fierce fighting, §BPoroshenko's§! forces were defeated under the command of the newly appointed Commander-in-Chief Valeriy Zaluzhnyi and forced to retreat to Chernihiv. §BPoroshenko§! seizes control of Chernihiv and Sumy oblasts, forming Sumy city council as a separate political entity.\nIn Poltava, §2nationalist§! forces take the situation and arsenals into their own hands. The §GNational Guard§! approaches the city, but encounters strong resistance from the rebels and is defeated, retreating to Kremenchuk. Andriy Biletskyi assumes the leadership of §2nationalists§! and announces his intention to carry out the 'national revolution'. §RDmitriy Puchkov§! has sized power in Kropyvnytskyi city a couple of days earlier on the orders of Ru§Bss§!§Rian§! security services, rallying a large force of communists and other leftists. In the centre of Uman, the §gHasid Jews§! seize the control over the oblast and reach out to the Jewish population of Ukraine for the creation of a new Jewish state.\nIn Vinnytsia, under the supervision of former Prime Minister §BVolodymyr Hroysman§!, prominent politicians in past §tYulia Tymoshenko§! and §tOleh Lyashko§! hold a joint congress, at which they declare the illegitimacy of the government of §7Zelenskyy§!. Vinnytsia and Zhytomyr oblasts are secured by §tSocial Front of Ukraine§!. Cherkasy oblast declare support for them later. Khmelnytskyi oblast declares its neutrality.\nThe pro-Russian §3OPZZh§! party congress was held in Kherson, which also declared the illegitimacy of the current government. The 'Respublika Ukraina' was proclaimed, also grabbing part of Zaporizhzhia oblast. Pro-Ukrainian §8liberal§! powers take power in Zaporizhzhia and proclaim a provisional government. Clashes between pro-Russian and pro-Ukrainian activists occur in south of Ukraine, which were stopped by §4Navy§! Commander Ihor Voronchenko. He establishes a temporary military administration in Odesa and Mykolaiv oblasts.\nThe administrations of Lviv, Ivano-Frankivsk, and Ternopil oblasts announced the creation of an alternative government, called the '§8Republic of Halychyna§!'. Some weeks later, various neopagans seize arms and proclaim '§gWhite Croatia§!' state in Ternopil oblast. §4UN§! has sent a peacekeeping contingent, consisting of Romanian military, to the Chernivtsi oblast. Protests by the §RHun§!ga§Grian§! minority broke out in Transcarpathia, and the head of the Transcarpathian administration, §1Hennadiy Moskal§!, declared a state of emergency. The remnants of the administration in Volyn, led by §gYuriy Lutsenko§!, proclaimed the 'Volyn Administration' in the Volyn and Rivne oblasts. Various criminal elements take control of the Rivne oblast and proclaim the §9Amber Republic§!.\nInterior Minister §BArsen Avakov§! arrives to Kharkiv to bring the situation in the city under control declaring a state of emergency in city and oblast. The §GArmed Forces of Ukraine§! units in Donbas unite under the leadership of Serhiy Kryvonos and assume control over non-occupied parts of Donetsk and Luhansk oblasts. Dnipropetrovsk has formed its own government, with some §goligarchs§! taking leading roles.\nOn 30th June, the activity in the oblasts slightly subsided. §BEuropean§! countries and Ru§Bss§!§Ria§! signed an act of non-interference in the affairs of Ukraine. A chance for change, or complete downfall? Everything will be determined by the '§OFire of Poltava§!'." 
 
 ### TUTORIALS ###
Info_Screen_Tab_Name_3: "Region Information"

 Info_Screen_Region_Information_Donbas: "§YDonbas§!"
 Info_Screen_Region_Information_Donbas_Desc: "Donbas is derived from 'Donets Coal Basin', laying on the lands of primarly Donetsk and also parts of Luhansk and Dnipropetrovsk oblasts. In the second part of 19th century, the region began to develop industrially after the Industrial Revolution has occured. The region attracted many people, from landless peasants from peripheral lands within the Russian Empire, to the foreign settlers. John Hughes, Welsh businessman, has built several coal mines and established the city, now known as Donetsk."

### Development ###
Info_Screen_Tab_Name_4: "Mechanics Tutorials"
 
 Info_Screen_Mechanics_Content.1: "Coring"
 Info_Screen_Mechanics_Content_Desc.1: "Fire of Poltava has it's own mechanics of coring states.\n\nIn order to core a state, you should first work with compliance withing the state. With enough compliance, you then should establish your administration, crush the dissent among the locals, and finally core the state. This is available via the decision category, which requires political power from you in order to take action. Pay attention, that with further expansion the cost of coring states will get smaller."
 
 Info_Screen_Mechanics_Content.2: "Unification"
 Info_Screen_Mechanics_Content_Desc.2: "Unification mechanic present you various ways of progressing the unification of Ukraine.\n\nWhile at first stage, you should get rid of other warlords in the micro-region. You can capture them, or in some cases try to negotiate for them to surrender. \n\n To expand further, you should get rid of your opponent in the region. Why not the good-old war? You get to prepare for a war before it errupts, and then the strongest will unite the region. \n\nFurther unification can involve not only wars, but the diplomacy as well. In case you and another state in the region are democratic enough, you can setup the referendum, for people to decide who are they willing to live under. Playing dirty allowed.\n\nYou and your rival can also make a deal, uniting under single banner and dividing spheres of interests. Who gets the most spheres secured gets to absorb the other one, also honouring the deal."

 Info_Screen_Mechanics_Content.3: "Legitimacy"
 Info_Screen_Mechanics_Content_Desc.3: "At some point in the process of unification, you will be met with a dillema on coming at the world stage. You have a couple of variants to secure the recognition of your government by foreign countries. You can be recognized by Europe, by Russia and it's partners, by individual countries, or meet the fate of being an illegitimate state, not recognized by anyone.\n\nRecognition leads to benefits. "
 
