Info_Screen_Tab_Name_1: "Country Information"
# Ukraine
 AFU_Info_Screen_Content: "Defenders of Ukraine"
 AFU_Info_Screen_Content_Desc: "[AFU.GetFlag]§BUkrainian Ar§!§Ymed Forces§! till 2014 were not in the best shape, being treated as something unnecessary both by government and people. But when first [RUS.GetFlag]Russian-§Bbacked§! §Rseparatists§!, and after Russian army came to Ukrainian land, army suddenly became a number one priority. Fighting in the Donbas region has occured, resulting in occupation of some parts of it by [LPR.GetFlag]§CLuhansk§! and [DPR.GetFlag]§gDonetsk§! People's Republics with the help of Russia. \n\nTill 2019, [AFU.GetFlag]§BUkrainian Ar§!§Ymed Forces§! units were stationed alongside factual borders of so-called [NVR.GetFlag]'§CL§!§gD§!§BP§!§RR§!', time to time exchanging with fire, but in overall staying without major moves. Since the Anti-Terrorist Operation, and then Operation of United Forces, Ukrainian army undergone several improvements, from command to equipment.\n\nAfter the events of §OFire of Poltava§!, Ukrainian army stands alone before the threat of continuing the active phase of war with separatists. It was left alone within the non-occupied parts of Donetsk and Luhansk oblasts with the chaos in the whole country, so it can only rely on itself.\n\nLocal population is somewhat discontented. Martial law, declared by the army, limits people in their rights and liberty, also giving a strain to the economics. People want to change things, but looking at the §Cproblem§! §Lin§! §Bthe§! §REast§!, they might have to overlook their priorities..."
 DPR_Info_Screen_Content: "Enduring Russian Spring"
 DPR_Info_Screen_Content_Desc: "Maidan and the overthrowing of Yanukovich made parts of population in South-East of Ukraine question what will be of them. Maidan managed to gather many nationalists, not fond of Russians, submitting pro-Russian populace in fears of persecution and murders. Series of protests in various cities in the East, called 'Antimaidan', took place, mainly for returning the overthrown government. Locals, who looked warmly in [RUS.GetFlag]Russia's way, and some Russians came to oppose the new 'nationalist' government.\n\nProtests in Odesa, Kharkiv and couple other cities got put down, but Donetsk and Luhansk have another situation. With Russian FSB colonel Igor Girkin crossing the border of Donetsk, he has started the 'Novorossiya' project with proclaiming [DPR.GetFlag]§LDonetsk§! and [LPR.GetFlag]§CLuhansk§! §BPeople's§! §RRepublics§! in cooperation with local separatists. Freshly-formed forces, containing local militias and various Russian groups, started capturing local administrations, with Ukrainian government sending army and declaring 'Anti-Terrorist Operation'. Separatists have nearly lost, but Russian army came to help, resulting in the ceasefire.\n\nDonetsk got a huge hit in result of the conflict. Modern Donetsk airport got destroyed, 'Donbas' stadium, who welcomed Beyonce singer and Euro-2012 football tournament, went down, and big coal industry is effectively dying. Locals try to cope with the reality, either by wishing for the better times to come or by searching possibilities, which came to life after seceeding from Ukraine to Russia."

