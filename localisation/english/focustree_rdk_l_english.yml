RDK_heroes_and_gods_will_rise_from_the_grave:0 "Heroes and Gods Will Rise From the Grave"
RDK_heroes_and_gods_will_rise_from_the_grave_desc:0 "The gods of war, seeing our struggle will stand up for us and we will go together to beat our enemies!"
RDK_our_lot_is_not_to_moan:0 "Our Lot is Not to Moan"
RDK_our_lot_is_not_to_moan_desc:0 "There's no time for suffering! Everyone must take up arms and go to war against the regime! The Russian people will rise from the ashes and go into battle!"
RDK_death_fear_replace_the_whip:0 "Death Fear Replace the whip"
RDK_death_fear_replace_the_whip_desc:0 "Though we carefully call the people of russia to fight, few follow us. Those few who do not want to go to war will still have to go to war for our people. It is for the good of our cause, our race."
RDK_the_right_of_force_is_a_blood_right:0 "The Right of Force is a Blood Right"
RDK_the_right_of_force_is_a_blood_right_desc:0 "That's how it is historically, but our right to survive is strength, and it's already embedded in our genetic code. We must fight for our freedom against the invaders."
RDK_courage_leads_to_heaven:0 "Courage Leads to Heaven"
RDK_courage_leads_to_heaven_desc:0 "Courage leads to heaven. Fear leads to death. Fear death is the hero's life. And the hero will bring us victory!"
RDK_became_higher_than_man:0 "Became Higher Than Man"
RDK_became_higher_than_man_desc:0 "Our struggle is not just a fight for our ideals. It's a struggle for our existence. And those of us who survive this challenge will become heroes of legend."
RDK_oath_to_white_skin_and_fair_hair:0 "Oath to White Skin And Fair Hair"
RDK_oath_to_white_skin_and_fair_hair_desc:0 "Our race is in danger. It is surrounded by enemies. And only we and our brother Ukrainians can protect it from colonisers from Africa, the Caucasus and other places."
RDK_we_remember_those_who_continued_fight:0 "We Remember Those Who Continued Fight"
RDK_we_remember_those_who_continued_fight_desc:0 "We must remember our heroes. Who did not give up and who continued to fight to save us. We honour that and we will make them proud of us from Valhalla."
RDK_never_forget_how_a_thief_stole_it_from_us:0 "Never Forget How a Thief Stole It From Us"
RDK_never_forget_how_a_thief_stole_it_from_us_desc:0 "I fucked Putin in the mouth. Is that enough to understand the description of the focus?"
RDK_never_forget_why_we_were_born:0 "Never Forget Why We Were Born"
RDK_never_forget_why_we_were_born_desc:0 "We are descendants of great warriors - Vikings, Varangians, Indo-European race. And now we stand guard over our race to save it from destruction."
RDK_russianpuresoulthatiswhiterthanlight:0 "Russian Pure Soul That is Whiter Than Light..."
RDK_russianpuresoulthatiswhiterthanlight_desc:0 "Mysterious beautiful Russian soul, mired in fratricidal war.... We must carry out a large-scale ideological work to save it."
RDK_to_preserve_in_its_pristine_purity:0 "To Preserve in its Pristine Purity"
RDK_to_preserve_in_its_pristine_purity_desc:0 "Our nation is in danger. Putin and his gang are enemies of the Russian people. They have sold everything they can. Our land, our resources. It's time to end it."
RDK_wind_of_the_wild_lakes:0 "Wind of the Wild Lakes"
RDK_wind_of_the_wild_lakes_desc:0 "Our waters! Our beautiful wild seas, rivers and lakes, taken away by Putin's regime. We will rebuild our navy."
RDK_thedawnisnear:0 "The Dawn is Near!"
RDK_thedawnisnear_desc:0 "Brothers and sisters! Our cherished hour has come! After extensive preparations, we openly took the stage to fight against the Putin regime! RVC - forward!"
RDK_withananvilinthechest:0 "With an Anvil in the Chest..."
RDK_withananvilinthechest_desc:0 "Our forges must produce weapons for the corps to further our work."
RDK_andwiththehammerinheart:0 "and with the Hammer in Heart..."
RDK_andwiththehammerinheart_desc:0 "Our Rus will sing to us. A song of war. Our forges will work, but to keep this song going, we need more factories."
RDK_birdsongs_at_dusk:0 "Birdsongs at Dusk"
RDK_birdsongs_at_dusk_desc:0 "We must protect ourselves from the sky. Our fighters will spread their wings!"
RDK_theyfeeduswithanger:0 "They Feed Us With Anger..."
RDK_theyfeeduswithanger_desc:0 "Our struggle is just beginning. There is still much to be achieved, but we know for sure that we have chosen the path of struggle, which means we have chosen the right path."
RDK_our_power__the_gods_with_us:0 "Our Power - The Gods With Us"
RDK_our_power__the_gods_with_us_desc:0 "The gods are with us! Then we will win!"
RDK_bannersabovebrothers:0 "Banners Above, Brothers!"
RDK_bannersabovebrothers_desc:0 "Our path is open. We are marching towards our goal - the liberation of Russia. To do this, we must raise the morale of our fighters. Our only hope now is in them."
RDK_smashthekremlinsrottensystem:0 "Smash the Kremlin's Rotten System"
RDK_smashthekremlinsrottensystem_desc:0 "Our main enemies are in the Kremlin. They divide brotherly nations among themselves. We will put an end to this and, together with our fellow Ukrainians, we will disembowel every bastard right on Red Square. When we are there."
RDK_my_motherland_will_meet_her_sons:0 "My Motherland Will Meet Her Sons"
RDK_my_motherland_will_meet_her_sons_desc:0 "Our sad homeland sits in chains waiting for our brave warriors to free it."
