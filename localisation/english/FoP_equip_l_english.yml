l_english:
 infantry_equipment_2:0 "Assault Rifle"
 infantry_equipment_2_short:0 "AK-74"
 infantry_equipment_2_desc:0 "AK-74, while not being the most modern or expensive gun, is surely a reliable tool in the hands of a soldier. Iconic modifications of this rifle have received the most popularity in post-Soviet countries, yet have spread all around the world like a wildfire throughout the 20th century."
 
 train_equipment_1:0 "Civilian Train"
 train_equipment_1_short:0 "Civilian Train"
 train_equipment_1_desc:0 "Typical ukrainian train, being mostly an old Soviet model or a modification for it, is usually not deemed too comfortable for civilian use. However, in a dire war-time situation, even such trains are able to provide essential logistical assistance for the frontline, which can be crucial in winning the battle or even the conflict entirely."

 support_equipment_1:0 "Support Equpment"
 support_equipment_1_short:0 "Support Equpment"
 support_equipment_1_desc:0 ""Support equipment" is a comprehensive, standardised set of goods that contains items for all possible cases in combat and beyond. Among other things, you can find sapper shovels, walkie-talkies, dry rations, and first aid kits. In short, a set that will help in any situation."

 motorized_equipment_1:0 "Ural-4320"
 motorized_equipment_1_short:0 "Ural-4320"
 motorized_equipment_1_desc:0 "Ural-4320 is a Soviet-designed off-road truck. It was designed to transport cargo, people and trailers on all types of roads. It has a diesel engine. Since 1977, when it was first produced, it has been actively used for military and civilian purposes."

 mechanized_equipment_1_short:0 "BMP-2"
 mechanized_equipment_1:0 "Mechanized Equipment"
 mechanized:equipment_1_desc:0 "BMP-2 is a Soviet tracked infantry fighting vehicle designed to transport personnel and increase their mobility. It was produced in 1980 and has been in service in dozens of countries since then."

 artillery_equipment_1:0 "Howitzer"
 AFU_artillery_equipment_1_short:0 "D-20"
 DPR_artillery_equipment_1_short:0 "Msta-B"
 DPR_artillery_equipment_1_desc:0 "152mm "Msta-B" howitzer is a Soviet-made trailed howitzer. It is designed to destroy many types of equipment, such as tanks, artillery and mortar batteries, as well as to suppress manpower and firepower, control points, air and missile defence systems, etc. It has been produced since 1987 and is in service in such countries as Ukraine, Russia, Belarus and others."
 LPR_artillery_equipment_1_short:0 "Msta-B"
 LPR_artillery_equipment_1_desc:0 "152mm "Msta-B" howitzer is a Soviet-made trailed howitzer. It is designed to destroy many types of equipment, such as tanks, artillery and mortar batteries, as well as to suppress manpower and firepower, control points, air and missile defence systems, etc. It has been produced since 1987 and is in service in such countries as Ukraine, Russia, Belarus and others."

 jet_fighter_equipment_1:0 "Jet Fighter"
 AFU_jet_fighter_equipment_1_short:0 "Su-25"
 AFU_jet_fighter_equipment_1_desc:0 "Su-25 is a Soviet-made fighter jet first produced in 1975. After entering service in the 1980s, it has been modified numerous times and is an integral part of the air forces of Ukraine, Russia and other post-Soviet countries"
 DPR_jet_fighter_equipment_1_short:0 "MiG-29"
 DPR_jet_fighter_equipment_1_desc:0 "MiG-29 is a fourth-generation Soviet multi-role jet fighter. During the final phase of the Cold War, it was in service with the Warsaw Pact and the USSR, and after the end of the conflict it continued to be part of the air forces of many countries around the world."
 LPR_jet_fighter_equipment_1_short:0 "Su-25"
 LPR_jet_fighter_equipment_1_desc:0 "Su-25 is a Soviet-made fighter jet first produced in 1975. After entering service in the 1980s, it has been modified numerous times and is an integral part of the air forces of Ukraine, Russia and other post-Soviet countries"

 transport_plane_equipment_1:0 "Transport Plane"
 transport_plane_equipment_1_short:0 "Il-76"
 transport_plane_equipment_1_desc:0 "Il-76 is a heavy Soviet military transport aircraft designed to transport and land personnel, cargo and equipment for various purposes. It has been the mainstay of the airborne forces of many countries since 1974."
