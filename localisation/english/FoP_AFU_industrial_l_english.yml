l_english:
 AFU_six_years_of_occupation:0 "Six Years of Occupation"
 AFU_six_years_of_occupation_desc:0 "After a difficult six years of occupation, Donbas has become Ukrainian again. The devastating war and the siphoning of resources from the region by Russian oligarchs have left the region in a deplorable state. Many mines are closed, enterprises have been dismantled and sold off for metal. We will start preparing a program to restore Donbas's economic potential, although this will require a great deal of effort and investment."
 AFU_create_commission:0 "Create a Commission "on Donbas Affairs""
 AFU_create_commission_desc:0 "We still have only a superficial idea of the scale of the devastation in Donbas. It is necessary to set up a commission to assess the scale of destruction in the region and possible ways of resolving the problem."
 AFU_unite_east_west_communications:0 "Unite East and West Communications"
 AFU_unite_east_west_communications_desc:0 "After six years, the infrastructure of the Ukrainian-controlled parts of Luhansk and Donetsk oblasts and the Russian puppet-controlled parts of Luhansk and Donetsk oblasts has changed dramatically. Our trucks cannot drive on barely usable roads, and we now have two power supply systems, one of which is also barely usable. We need to start uniting and rebuilding the infrastructure."
 AFU_allocate_funding:0 "Allocate Funding"
 AFU_allocate_funding_desc:0 "Until 2014, Donbass was the industrial heart of Ukraine. The time has come to return the region to its status. We will allocate as much money as necessary to make Donbas shine again."
 AFU_strategic_approach:0 "Choosing Strategic Approach"
 AFU_strategic_approach_desc:0 "We have a considerable number of options for approaching the Donbas problem. Fortunately, it seems like our leader has already chosen the best of them. We are ready to begin."
 AFU_bet_on_big_players:0 "Bet on Big Players"
 AFU_bet_on_big_players_desc:0 "Large corporations and industrial groups will drive our economic recovery."

 AFU_restore_research_industry:0 "Restore Research Industry"
 AFU_restore_research_industry_desc:0 "Revive scientific research to strengthen innovation and technological progress."

 AFU_find_foreign_investors:0 "Find Foreign Investors"
 AFU_find_foreign_investors_desc:0 "Attract foreign capital to rebuild industry and stimulate growth."

 AFU_promote_the_development:0 "Promote Development"
 AFU_promote_the_development_desc:0 "Implement policies that encourage sustainable economic development."

 AFU_establish_state_cooperation:0 "Establish State Cooperation"
 AFU_establish_state_cooperation_desc:0 "Strengthen cooperation between the government, businesses, and local communities."

 AFU_everything_for_the_people:0 "Everything for the People"
 AFU_everything_for_the_people_desc:0 "Improve living standards by putting the people's needs first."

 AFU_revitalization_of_infrastructure:0 "Infrastructure Revitalization"
 AFU_revitalization_of_infrastructure_desc:0 "Rebuild vital roads, railways, and public infrastructure."

 AFU_help_the_countryside:0 "Support the Countryside"
 AFU_help_the_countryside_desc:0 "Invest in rural communities and modernize agriculture."

 AFU_centres_of_psychological_assistance:0 "Psychological Support Centers"
 AFU_centres_of_psychological_assistance_desc:0 "Provide psychological care for veterans and civilians alike."

 AFU_joy_in_prosperity_and_modesty:0 "Prosperity Through Modesty"
 AFU_joy_in_prosperity_and_modesty_desc:0 "Encourage responsible spending and sustainable economic policies."

 AFU_general_staff_plan:0 "General Staff Plan"
 AFU_general_staff_plan_desc:0 "Coordinate the economy according to the strategic needs of the armed forces."

 AFU_expand_resource_wells:0 "Expand Resource Extraction"
 AFU_expand_resource_wells_desc:0 "Increase domestic production of strategic natural resources."

 AFU_conscript_the_unemployed:0 "Conscript the Unemployed"
