 AFU_economy_on_warpath:0 "Economy on a War Footing"
 AFU_economy_on_warpath_desc:0 "Mobilize every sector of the economy for the war effort."

 AFU_whatever_it_takes:0 "Whatever It Takes"
 AFU_whatever_it_takes_desc:0 "No sacrifice is too great to ensure victory."

 AFU_quotas_for_veterans:0 "Veteran Employment Quotas"
 AFU_quotas_for_veterans_desc:0 "Guarantee employment opportunities for returning veterans."

 AFU_war_on_banditry:0 "War on Banditry"
 AFU_war_on_banditry_desc:0 "Crack down on organized crime and restore public order."

 AFU_partial_collectivization:0 "Partial Collectivization"
