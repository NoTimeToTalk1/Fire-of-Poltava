 AFU_remove_kurchenko:0 "Remove Kurchenko"
 AFU_remove_kurchenko_desc:0 "End the influence of corrupt oligarchic interests."

 AFU_return_industry_to_akhmetov:0 "Return Industry to Akhmetov"
