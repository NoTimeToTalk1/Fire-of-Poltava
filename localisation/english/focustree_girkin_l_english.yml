girkin_collaborants_decisions:0 "The Second Russian Spring"
girkin_collaborants_decisions_desc:0 "The struggle for the freedom of the Russian people continues. The Second Russian Spring, once again shook up the eastern regions of the so-called Ukraine, causing a powerful response among the population, which is tired of the constant political and economic crisis.\nSince the beginning of the year, numerous rallies and protests began to take place in the Southeast. Thousands of people, carrying Russian tricolors and banners, took to the streets, calling on our forces to free them from Ukrainian oppression. Their slogans were the protection of the Russian-speaking population and the restoration of historical justice.The support of the local population and a significant number of volunteers who came from Russia allowed the People's Republics to strengthen their positions and organize effective self-defense. People's militia units have been established in many cities and towns, which have taken control of strategic facilities and infrastructure and are ready to cooperate with our government. We cannot leave our people in trouble! "

girkin_collaborators_tt:0 "§gThe Second§! §YRussian§! §TSpring§! §Rwill start!§!"
