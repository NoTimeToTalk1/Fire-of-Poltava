girkin_kill_opposition_decisions:0 "Purging the Opposition"
girkin_kill_opposition_decisions_desc:0 "The main bloodsuckers of the people of Donbass are probably physically unable to accept their loss and are continuing their efforts to overthrow our legitimately elected government through clumsy propaganda among the masses. These cadres have become too annoying and dangerous for the future of our country, and we have no choice but to put an end to their miserable lives. Donbass will not be able to live while these creatures are breathing, and having prepared everything for successful "cleansing" operations, we can proceed to action..."

great_escape_from_the_country:0 "Opposition activists will escape the country"
great_escape_from_the_country_desc:0 "Sooner or later, the opposition will realise that it is useless to continue to fight against our regime in Donbas. If we do not clear out the opposition in time, they will flee and it will be harder for us to get rid of them. We must not let that happen."

