girkin_wagner_decisions:0 "Conducting an Orchestra"
girkin_wagner_decisions_desc:0 "The integration of Mr. Prigozhin's private military campaign has definitely expanded our capabilities on the battlefield, providing us with experienced commanders, opening up some new strategies, and most importantly, unlocking the door to a whole new world of military recruitment. The schemes that Wagner has been developing for years can now be reinforced with our resources and become many times more effective and large-scale. With a gigantic network of recruitment centres and agents around the world, our army can be filled with soldiers from our homeland - from Bryansk, Volgograd or Kharabovsk, as well as soldiers from the African continent, fearless Serbian Chetniks, indomitable Caucasian war machines and many others. By combining our resources with the Wagner network, we no longer have to worry about a shortage of human resources."
