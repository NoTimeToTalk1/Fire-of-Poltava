 DPR_verkhovna_rada_decision_category_desc:0 "Tsar Rostislav I, the bearer of a wise and just rule, appointed a new body of government, the Supreme Duma. This Duma became a symbol of justice and the power of the people, and it decided the most important issues of the empire. Its members were elected by the people, and they have a huge responsibility to the Tsar and their country."
 DPR_speaker_name:0 "[DPR_GetSpeakerName]"
 DPR_speaker_bio:0 "[DPR_GetSpeakerBio]"
 Zinaida_Nadion:0 "§HZinaida Nadyon§!"
 Zinaida_Nadion_desc:0 "Zinaida Nadion, a worthy representative of the Luhansk People's Republic, serves as the speaker of the Centre Forces in the Verkhovna Duma. Her political activity flourished under the banner of the Luhansk Economic Union, where she retained great influence and community support.\n\nUnder Tsar Rostislav I, who wisely and justly ruled the Malorussian Empire, Zinaida became the voice of the Centre Forces in the Supreme Duma. Her words sound like a voice of understanding and a desire for harmony in the empire.\n\nIn the plurality of the Supreme Duma, Zinaida Gavriilovna unites the centrist forces to ensure stability and prosperity under the rule of the Tsar. The Duma becomes the place where important decisions are debated, and the Centrist Forces represent a balanced approach to the governance of the empire.\n\nBetween Hope and the challenges of the sanctions imposed by the invasion of so-called Ukraine by pro-Russian forces, Zinaida is responsible to the Duma and the Tsar. Her determination is manifested in the struggle for the independence of the empire, where she stands up for the justified interests of Luhansk.\n\nThe future of the Luhansk and Donetsk regions and the entire empire Zinaida Nadion, as the speaker of the Central Forces, will continue to contribute to shaping the future. Her words in the Duma are an important step towards stability, destiny and prosperity in the empire under the dedicated leadership of Tsar Rostislav I."
 Stanislav_Vorobyov:0 "§HStanislav Vorobyov§!"
 Stanislav_Vorobyov_desc:0 "Stanislav Anatolyevich Vorobyov, a figure enveloped in the frame of Russian ultranationalism, emerges as a poetic force within the walls of power. Born on the brink of the embrace of summer, on 2 June 1960, in the tight weave of the once-existing USSR, Vorobyov's journey unfolds like a sonnet that mirrors the prose of a nation in trouble.\n\nEducated amid the echoes of Leningrad, he graduated in 1982 from the majestic Leningrad State University, a boulevard of intellect at the heart of changing ideologies. From the fertile soil of the academy, Vorobyov sowed the seeds of the Russian Imperial Movement in 2002, with the city of St Petersburg serving as the cradle of his ardent vision. A representative of the far right, a supporter of monarchy and expansionist nationalism, he sought to resurrect the echoes of the Zemsky Sobor, reviving dreams of a revived Russian Empire.\n\nIn the grand theatre of his convictions, Vorobyov proclaimed his credo as a firebird and noted that "Our nationalism is of a religious nature." He wrote out a narrative where the Russian people, in his view, were divinely chosen to carry the torch of truth to the world. A symphony of words painted a vision where unity and a strong nation-state became the armour for this chosen people.\n\nHe spoke of the indivisibility of the Empire, the Empire not only of the land, but also of souls connected by the threads of fate. "A divided Empire will not stand," he voiced, a warning that echoed through the halls of power. In the mosaic of his rhetoric, he portrayed the struggle for Russia's rights and interests as a divine mission, a cosmic ballet where the salvation of souls is intertwined with the fate of the nation.\n\nAs the leader of the Russian Imperial Movement, he found himself entangled in a web of responsibility, accused of undermining Ukraine's stability and security, but who cares? His devotion to the imperial throne clashed with the realities of the global order, creating a narrative where his beliefs became a threat to the delicate balance of power.\n\nIn the Duma, Stanislav Vorobyov, the poet of politics and genius of reactionary thought, now stands as the elegant speaker of the far right. His words, like ink on the parchment of history, leave indelible marks on the picture of a nation in disintegration, where the echoes of the past collide with the ambitions of an unsettling future."
 Mykola_Rudkovskyi:0 "§HMykola Rudkovskyi§!"
 Mykola_Rudkovskyi_desc:0 "Mykola biypuiui Rudkovskyi"
 Victor_Yanukovich:0 "§HVictor Yanukovych§!"
 Victor_Yanukovich_desc:0 "Viktor Yanukovych was born into a humble peasant family, but already in his youth he showed extraordinary talents and leadership qualities. His path to the top of the government was long and difficult, but always marked by determination and tireless work.\n\nWith pain for his native land, Viktor Fedorovich sent a letter to His Majesty Rostislav I. In this letter, he expressed his deep respect and honour for the Tsar, asking him to allow the former president to return to Ukraine and come to the aid of the empire at this important moment.\n\nAs Speaker of the Verkhovna Rada, Viktor Yanukovych made extraordinary efforts to build an empire based on autocracy, ensuring its independence and economic sustainability. He believed that an empire should have its own resources and the ability to meet its domestic needs. But he was not only an economic strategist. He also paid great attention to diplomacy, developing a policy of neutrality. The empire sought a balanced foreign policy that would allow it to maintain good relations with all neighbouring countries.\n\nAn important part of Viktor Yanukovych's vision was to create a balance between Ukrainians and Russians. He believed in the common path of the empire, where all citizens, regardless of nationality, were directed towards common goals and the prosperity of the empire."
 Evgeniy_Ponosenkov:0 "§HEugene Ponasenkov§!"
 Evgeniy_Ponosenkov_desc:0 "In the diversity of beauty and strength, like a bird rising into the sky, Eugene Ponasenkov appeared - a new voice of wisdom and unity in the Malorussian Empire. He was born into a family with centuries-old traditions and a craving for culture and history. His education was received at renowned universities and he was always a brilliant wordsmith, a Russian Ben Shapiro. After a successful career in law, Eugene moved to Ukraine and gave his heart to the politics of the new empire, in which he saw the possibility of building a beautiful little Russia.\n\nRising to the chair of the Speaker of the Verkhovna Duma, Eugene Ponasenkov brought with him a number of deep political convictions. He believes in conservatism as the foundation of the nation, in affirming traditional values and preserving national identity, in opposing destructive ideas imposed by the left and neo-Bolsheviks. His values are filled with respect for the nation's past and greatness, and he endeavours to pass this respect on to future generations.\n\nPonasenkov advocates an aristocratic approach to government, reflecting power in the hands of the best and wisest. He believes that Tsar Rostislav I is superior to them all, and chooses a servant of the people not only by intelligence, but also by honesty and justice.\n\nBut Maestro is not only the conservative spirit of the empire, he is a voice of protest against the inhuman regime in Moscow. His anti-Putinist stance shows his rejection of outside interference and his desire for the independence of the empire. He defends the empire from the influence of the Kremlin forces that are constantly trying to annex it.\n\nEugene Ponasenkov is not just the speaker of the Verkhovna Duma, he is the voice of wisdom and unity in the Little Russian Empire. He brings a love of culture and history to politics, and his ideas recognise him as a leader capable of inspiring and uniting his people. His election as Speaker of the Verkhovna Duma marks the beginning of a new time for the empire, where wisdom and unity will be the foundation of its development and prosperity."
 Viktor_Tylkin:0 "§HViktor Tylkin§!"
 Viktor_Tylkin_desc:0 "Viktor Tyulkin is a name that has become a symbol of the convergence of different political trends and historical upheavals. He was born in the RSFSR and immediately distinguished himself through his political activism. He became the first secretary of the Central Committee of the Russian Communist Party - Communist Party of the Soviet Union (RCP-CPSU) and the secretary-coordinator of the Central Committee of the ROT Front. His political career grew, and he became a deputy of the State Duma of the Russian Federation of the IV convocation, representing the Communist Party faction.\n\nBut Viktor Arkadievich's story was even more impressive after the events of 2019. With the collapse of Ukraine and the emergence of the Malorussian Empire, he decided to take an active part in shaping the new political landscape. After moving to Ukraine, Tyulkin began to unite communist cells with supporters of the assassinated leader Natalia Vitrenko.\n\nThis combined initiative was Viktor Tyulkin's first step towards combining communism and right-wing nationalism. He saw the monarchy as a way to ensure the stability and fruitful development of the empire, designed to unite citizens in a strengthened state. This radical change in the way he viewed life and politics surprised many people, but Tyulkin believed that only his new doctrine could be the answer to the challenges of our time.\n\nTime will tell whether his monarcho-communism will turn out to be an idea that can change the face of the Malorussian empire. But one thing is certain - Viktor Tyulkin is always ready to fight for his beliefs, regardless of the circumstances and enemies that may stand in his way."
 Oleg_Tsaryov:0 "§HOleg Tsaryov§!"
 Oleg_Tsaryov_desc:0 ""The Great Malorussian Empire is living through a new era under the wise and excellent leadership of Tsar Rostislav I... and me."\n\nThe figure of Oleg Tsarev, our respected Speaker of the Supreme Duma of the Malorussian Empire, truly knows no bounds. At the moment when this empire found its new life path, Tsarev proved to be a devoted servant of the great Tsar Rostislav I, or he could have been and always was a necessary person. His ideas and policies made an invaluable contribution to the development of the empire.\n\nOleg Tsarev is a deep supporter of Russophilism, he believes in the strength and unity of the Russian people. His speeches are always filled with insightful thoughts about the unity of the peoples inhabiting the Little Russian Empire. He emphasises the historical ties and common values that unite the peoples of the empire and that not one Banderite demon will be able to divide these peoples. Tsarev is also known for his reactionarism, which manifests itself in his defence of conservative values and traditions. He believes that it is important to preserve the hereditary community and religious values of the empire.\n\nHolding a major speaker's position in the Supreme Duma of the Little Russian Empire, Oleg Tsarev forever becomes an integral part of the history of this unique empire. His ideas and loyalty to the great Tsar Rostislav pave the way for the greatness of the empire and indicate the direction of its prosperity"
 Aleksandr_Nevzorov:0 "§HAleksandr Nevzorov§!"
 Aleksandr_Nevzorov_desc:0 "Worthy son of cold and gloomy St Petersburg, now serves as the voice of the people in the Supreme Duma of the Malorussian Empire, if we take a moment to look at the process from within, where that empire exists under the dignified leadership of Tsar Rostislav I. His speeches in the Duma are impressive, and he stands on the front lines of the struggle for the ideals of liberal democracy and free economy.\n\nAlexander Nevzorov has a mysterious gift of words that always amazes listeners. He speaks like a melody, with incendiary images that come to life in front of you when he speaks. The speeches of the master of words are true poetic works that reflect the soul of the people and the deepest aspirations of this simple man who at one point received everything.\n\nAleksandr Nevzorov is a vocal anti-Putinist who advocates a complete severance of relations with Russia, any ties and the expulsion of all Russian agents. His voice is outraged by Moscow's claims and reminds everyone that the nation of Malorossia will not bow its proud head to anyone. His political beliefs are steeped in pro-Ukrainian and pro-Western positions, which he chooses with pride and passion. He believes in Malorossia's cooperation with European countries and hopes for a future in which Malorossia will become a democratic and developed country on the world map."
 
 
 




