DPR_military_reorganisation:0 "Military Reorganisation"
DPR_military_reorganisation_desc:0 "The army was in ruins, but this is just the beginning of its revival. Yes, it's not at its best now. But the staff knows what needs to be done. Army reform has begun, and every soldier, every officer must be ready for new challenges. A powerful, mobile and disciplined army will be created, which will be able to defend our Empire from any threats. This is just the beginning - there's more work to be done. But when it comes to an end, the Russian army will be invincible."
DPR_new_state_policy:0 "New State Policy"
DPR_new_state_policy_desc:0 "It is time for a strong hand. Those who thought Girkin was a weakling are no longer laughing. His time has passed, and now new men are taking over - true imperialists, hard as steel, whose policies know no pity: only iron discipline, only order. No more mistakes of the past. Authoritarianism? Perhaps. But this is what is needed to save Russia. The new policy is not just a slogan, it is a programme that will make the Empire great again and as never before."



 gir_flavor.1.t:0 "School Lesson"
 gir_flavor.1.d:0 "A typical school in Dobropillya was operating as usual, with no significant changes, until the victory of the LDPR republics. Flags and banners were changed according to the new local government, and the teacher roster also got some changes. A history lesson for the 10-B class was led by a new teacher - elderly woman from the city of Penza.\n\nStudents were startled by the change of their teacher, but they calmed down as she started her lesson.\n'Class, stand up!'\nThe class followed.\n'My name is Lidiya Albertovna, and I will be your new history teacher. For now, let’s call the register.'\nAfter noting the absent students, she gave out the class's new books, called ‘History of Russia’. One student got upset by the sight of the very book, and he stood up with a question:\n'Why do we have to use these books?'\n'What a dumb question. You are having a ‘History of Russia’ lesson, so why would you have another book?'\n'But we had 'History of Ukraine' to this moment.'\nThe teacher got outraged by the statement of her student.\n'And? You don't need that anymore.'\n'But it is Ukrainian school.'\n'No, this is Russian school. Haven't you seen the information board at the entrance? Or Russian flags around?'\n'I've seen, but that does not change that we are in Ukraine.'\n'This is no longer Ukraine. Never again it will be here. Or maybe you want to get sent to the nazi camps somewhere in Lvov for your liking?'\n'We lived just fine before, but now I see more violence around with Russian flags beneath it.'\n'You will not be saying bullshit in this class. You are dismissed! I hope your parents will have a talk with the services, for raising such nazi scum like you!'\n\nClassmates of the student were scared, and the student left the class without a shadow of doubt in his own words."
 gir_flavor.1.a:0 "Some things feel odd"

 gir_flavor.2.t:0 "Coming home"
 gir_flavor.2.d:0 "The 10-B class had their lessons over, and they slowly started walking back towards their homes. One particular student, who was dismissed after objecting to the new teacher a week ago, hasn’t given much thought about what may be waiting at his home today.\n\nWhen he saw the open door to his home, he was concerned. Nobody was to be seen around, and quickly observing the place he came in, closing the door behind himself. He wanted to close it with the lock, but he noticed that the lock was broken. \n\nFar in the house, he heard a faint cry from his mother. He walked through the rummaged hallway to the bedroom, where he saw his own mother sitting on the floor, with eyes red from the tears and a cheekbone blue from the hit. \n\n'What happened, Mom?!'' - he asked with the scare in his words.\n'They… They…'\n'Who are they?'\n'Men in uniform… They came in… And then…'\n\nThe boy remembered the words of the new teacher, who threatened his family with security services. His face quickly turned into fear.\n\n'They took Dad… Beat him up hard… And tried to… To…'\n'W-what they tried?! Mom?! Mom!'\n\nThe mother came closer to her child and hugged him. \n\n'They took dad?!'\n'Yes… I don’t know… Don’t know… Where…'\n\nA storm of emotions came upon the boy. His father was taken by the security services, and that might be because of what he said in school. The fear of his father being kidnapped and his mother in pain, fear of guilt, fear of his house and life ruined… It all came upon him as he began to faint and breathe quickly."
 gir.flavor.2.a:0 "Grim reality"

 gir_flavor.3.t:0 "Connection lost"
 gir_flavor.3.d:0 "Olena held contact with her distant relatives for decades. While living in Buhaivka, she felt a strong connection to her family in Vinnytsia, calling them at least once a week. But with the LDPR victory, it became quite hard. Not only did the connection get worse, but it became dangerous to use cellular networks.\n\nThe new government has established their own coverage, forcing the locals to change their SIM cards to the new operator, prohibiting the usage of old Ukrainian ones. The network is also monitored heavily, so talking via phone requires being careful with the words.\n\nStill, some points, where phones caught Ukrainian operators, were functioning. It bugs the local government, and people who use them are trying to keep the points secret. One of those points is used by Olena, who carefully comes to this zone and uses it to contact her family. She began talking about looking for opportunities to at least escape the territories, where Russians are in charge.\n\nYet another time, Olena walked to the spot, wanting to speak with her relatives. Connection has been established, and she warmly greeted her grandma, who picked up the phone. While talking, behind her back came three men - one dressed in casual clothes, and two had jackets with patches of the new Strelkov formation.\n'Here, that’s here!'\n\nA man in casual clothes revealed the point to the servicemen, and they quickly came to grab the woman, talking via phone in Ukrainian. They hit her from behind, cuffed her and carried her away. One man took the phone, still in the call, and pressed the red button to end it."
 gir_flavor.3.a:0 "The user cannot answer your call. Please, call later"

 gir_flavor.4.t:0 "A ‘terrorist plot’"
 gir_flavor.4.d:0 "The town of Svatove has been quite silent for the past few months. Since the fall of the Ukrainian administration, the atmosphere here felt somewhat dense. The new administration flew the Russian and Luhansk People’s Republic flags here and there, and the newspapers started writing about ‘more triumphs of Russia to come’. \n\nThe locals, seeing the new times which came to them, were quite sceptical about those headlines. The local market had less for them to offer, the streets were patrolled by men who didn’t look familiar at all, and the general mood of the townsmen gradually dropped.\n\nValeriy, an old, retired automechanic, worked around his car in his garage. He was swearing from time to time about not being able to buy car parts anymore, since the local auto shop closed for an indefinite amount of time. Valeriy decided to relax for some time, and when he came out of his garage, he heard footsteps.\n\nA man, dressed like a Russian officer of the imperial army, walked into the territory of Valeriy’s household. He had a pistol tucked in his belt, showcasing his possibilities.\n\n'Officer Maksimov. I have to check your house.'\n'W-why?'\n'I’ve got an order to conduct a search inside your home, due to having suspicions about taking part in a terrorist plot.'\n'What are you talking about? I am 80 years old, I only go to the local shop twice a week, and most of the time I’m screwing around the house! Let an old man relax in his few years left!'\n'I come from the Rostov Cossack Host, damn it! Stop with that bullshit and open the door, or you will be signed as a Ukrainian militant and dealt without trial!'\n\nThe cossack took the gun from his belt and aimed it at Valeriy. The old man complied and let the cossack in. He rummaged through many of Valeriy’s personal stuff, including a shelf with alcohol, where the officer took one small bottle of brandy with him. \n'Hey, that’s my bottle!'\n'Shut up!'\n\nMaksimov was not quite happy with Valeriy noticing him taking a bottle. He came closer and hit Valeriy in the head with the handle of his gun, causing him to drop to the ground. \n\n'You surely have something with the partisans!'\n\nMaksimov noticed a crack in the floorboard beneath Valeriy’s bed, and after removing the board, he found a Ukrainian passport lying beneath some valuable jewellery.\n\n'I was fucking right! You are coming with me for taking part in terrorist activities!'\n\nTaking jewellery in his pockets, the officer cuffed Valeriy and moved out of the house. Valeriy couldn’t finish his work on the car."
 gir_flavor.4.a:0 "A terrorist?"
