l_english:
 CHE_cherkasy_stands:0 "Cherkasy Stands!"
 CHE_cherkasy_stands_desc:0 "Amidst the chaos, Cherkasy emerged as a symbol of resilience and determination, defying the odds and standing strong against internal strife and external pressures. The city's unwavering spirit and united front became an inspiration for the rest of the country, as Cherkasy stood as a beacon of hope in a turbulent era."
 CHE_clearly_set_the_goal:0 "Clearly Set the Goal"
 CHE_clearly_set_the_goal_desc:0 "Cherkasy finds itself at a critical juncture. Recognizing the need for a clear direction and purpose, the city's leadership embarks on a focused and ambitious mission. Through strategic planning, effective governance, and rallying the people, Cherkasy sets its sights on achieving a specific and inspiring goal, bringing unity and renewed determination to the city and its inhabitants."
 CHE_strenghten_ties_with_brothers:0 "Strenghten Ties with Brothers"
 CHE_strenghten_ties_with_brothers_desc:0 "With the goal of unity in mind, the city's leadership focuses on improving ties with the Ukrainian Social Republic, a political entity that emerged amidst the nation's turmoil. Additionally, they seek to establish closer cooperation with the influential political party "Bat'kivschyna" (Fatherland), aiming to forge alliances and build a united front against common challenges, thereby strengthening the bonds of brotherhood within Ukraine."
 CHE_make_promise_to_the_people:0 "Make Promise to the People"
 CHE_make_promise_to_the_people_desc:0 "Recognizing the importance of connecting with its citizens, Cherkasy embarks on a transformative focus to make promises and commitments to its people."
 CHE_new_economic_policy:0 "New Economic Policy"
 CHE_new_economic_policy_desc:0 "In a bold move to drive economic growth and stability, Cherkasy adopts a comprehensive focus on implementing a new economic policy. Recognizing the importance of modernization and development, the city's leadership introduces reforms aimed at attracting investment, promoting entrepreneurship, and fostering innovation."
 CHE_infrastructural_innovations:0 "Infrastructural Innovations"
 CHE_infrastructural_innovations_desc:0 "Cherkasy sets its sights on transforming its infrastructure through a focused approach on innovative solutions. Understanding the crucial role of modern infrastructure in driving progress, the city's leadership spearheads ambitious initiatives to upgrade transportation networks, enhance utilities, and develop cutting-edge urban systems."
 CHE_take_care_of_the_army:0 "Take Care of the Army"
 CHE_take_care_of_the_army_desc:0 "Recognizing the paramount importance of a strong and well-prepared military, Cherkasy prioritizes a focus on taking care of its armed forces. The city's leadership understands that a capable and supported army is vital for defense, security, and safeguarding the city's interests."
 CHE_arms_contracts:0 "Arms Contracts?"
 CHE_arms_contracts_desc:0 "In pursuit of strengthening its defense capabilities, Cherkasy explores the option of entering into arms contracts. Recognizing the importance of acquiring modern and reliable weaponry, the city's leadership seeks opportunities to engage in agreements with domestic and international arms manufacturers."
 CHE_form_combatant_units:0 "Form Combatant Units"
 CHE_form_combatant_units_desc:0 "In response to the evolving security landscape, Cherkasy takes decisive action to form specialized combatant units. Recognizing the need for adaptable and skilled forces, the city's leadership establishes dedicated units trained in various combat disciplines and tactics."
 CHE_march_to_the_west:0 "March to the West!"
 CHE_march_to_the_west_desc:0 "With mounting tensions and the need to establish control over the region, Cherkasy prepares for a decisive move towards the west, specifically targeting Uman."
 
 uma.1.t:0 "Triumph of Uman"
 uma.1.d:0 "As tensions escalated between Cherkasy and Uman, Cherkasy initiated a special military operation with the aim of asserting its control over Uman. However, to the surprise of many, Uman, driven by fierce determination and strategic brilliance, emerged victorious in the face of adversity. With exemplary coordination and unwavering resolve, Uman's forces outmaneuvered and outmatched the Cherkasy offensive, securing a remarkable triumph that would be remembered as a testament to their resilience and indomitable spirit."
 uma.1.a:0 "We did it!"
 uma.2.t:0 "The Victory of Cherkasy"
 uma.2.d:0 "We were convinced that our forces would be strong enough to defend our land. But Cherkasy demonstrated impressive strategic genius and perfect coordination of their troops. We tried to defend ourselves, but our command lacked coordination and strategic thinking, which proved to be critical in such a difficult situation. Cherkasy was able to resolve the situation in the moment and use every chance to attack."
 uma.2.a:0 "We'll show them yet..."
 
 che.1.t:0 "The Victory of Cherkasy"
 che.1.d:0 "Deep in the heart of Ukraine, between the cities of Cherkasy and Uman, a difficult conflict broke out that required effective intervention and resolution. Cherkasy, in order to ensure the safety of its population and protect its national interests, carried out an impressive special military operation that brought them a decisive victory. "
 che.1.a:0 "Next Target - Uman!"
 che.2.t:0 "Defeat of Cherkasy"
 che.2.d:0 "In a high-stakes special military operation, Cherkasy suffered a significant setback in its attempt to regain control over Uman. Despite careful planning and strong determination, the operation faced unforeseen challenges, including well-fortified defenses and strategic countermeasures employed by Uman's forces. The defeat in this operation dealt a blow to Cherkasy's aspirations, highlighting the need for a reassessment of their approach and a regrouping of their forces."
 che.2.a:0 "Wasted..."
 che.3.t:0 "Military Discontent"
 che.3.d:0 "Reigniting the tense situation in Cherkasy, the military, led by General Serhiy Chervonopissky, expressed no confidence in the city's new leader, Anatolii Semynoha, and demanded his immediate resignation. Openly accusing Semynoha of ineffective leadership and inability to ensure the city's security, they call for the transfer of power to the head of the Afghanistan Veterans party and experienced general Serhiy Chervonopyskyi. This decision of the military creates a new round of political instability and threatens further armed conflict in the city."
 che.3.a:0 "Millitarists come into power."
 che.4.t:0 "Moroz has arrived"
 che.4.d:0 "Oleksandr Moroz, a well-known politician, has arrived in Cherkasy with the intention of taking power into his own hands. His arrival creates a new twist in the city's political landscape, intensifying the struggle for power and provoking interesting reactions in the local community."
 che.4.a:0 "Maybe we'll give him a little power."