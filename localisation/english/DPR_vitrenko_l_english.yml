l_english:
 ## NatSpirits
 DPR_spreading_our_word:0 "Spreading Our Word"
 DPR_spreading_our_word_desc:0 "There is power in truth! And we are the ones who carry it! Our dear comrades all over Ukraine and beyond need to hear this, they need to know that even the most deprived and disadvantaged are still thought of and remembered. We will come to the rescue and liberate every household from oppression, and if not, then damn us!"
 
 DPR_here_we_go:0 "World, Here We Go!"
 DPR_here_we_go_desc:0 "And now the whole planet knows about us. Every country has heard about the uprising labour struggle on the outskirts of Europe, and the bourgeois are scared. And they should be. The working class has suffered enough, and if they thought that the destruction of the Soviet Union would put an end to it, we will make them change their minds. We'll show you the Kuzka's mother, capitalists!"
 
 DPR_elderly_care:0 "Elderly Care"
 DPR_elderly_care_desc:0 "The oldest generation is the only thing we have left of the good old days. When sausages cost 2.20, housing was free, and everyone gladly worked for their motherland and nation. They lived a wonderful life, but most importantly, they dedicated it to our common homeland. And for this, they deserve not only respect, but also our care for them."
 
 DPR_domestic_front:0 "Workers’ Domestic Front"
 DPR_domestic_front_desc:0 "You can dedicate your life to your country not only on battlefields but also at factories, farms and beyond! No matter what anyone says, even in times of peace, there is always one front in the country - the industrial one. All those who are truly loyal to their homeland and want to help it are already fighting there, so don't be ragul and join them!"
 
 DPR_deal_with_oligarchs:0 "Deal with Oligarchs"
 DPR_deal_with_oligarchs_desc:0 "No matter how much we want to build a socialist paradise on our land, it is foolish to ignore the existence of the oligarchs and the opportunities that an alliance with them can give us. We will continue our policy of socialisation of the economic and industrial sectors, but it is our former enemies and their resources that will help us in this."
 
 DPR_welfare:0 "Welfare for Working Class"
 DPR_welfare_desc:0 "Workers, who in recent decades have once again lived as the lowest and poorest part of society, deserve a decent life. These people give their lives day and night for the good of the country, and we must properly reward them for their hard work."
 
 DPR_mass_nationalization:0 "Mass Nationalization"
 DPR_mass_nationalization_desc:0 "The policy of nationalisation is the only way to build a socialist economy and a necessary step towards the paradise described by Marx. The state will be able to perform everything, and people will feed it and be fed by it. It will be as it should be - perfect."
 
 DPR_peoples_militia:0 "People’s Militia"
 DPR_peoples_militia_desc:0 "Our people's militia has its roots in the peasant forces of the great Red Army, and like it, it will continue the tradition of bringing freedom and liberty to the lands that need it. Everyone should have the right to join the fight, and everyone will."
 
 DPR_mass_recruitment:0 "Mass Recruitment to the Army"
 DPR_mass_recruitment_desc:0 "To win the workers' war of liberation, we need soldiers, lots of soldiers. The duty of every man, in addition to serving his family, is to serve his country, and the time has come for them to fulfil their duty to their own people. The more we call up, the better!"
 
 DPR_poor_recruitment_standarts:0 "Poor Recruitment Standarts"
 DPR_poor_recruitment_standarts_desc:0 "Our army needs people. 'People' is the main thing, and what people? That's the wrong question. We welcome all people, even if those people have some issues, which won't let them be effective in army."
 
 DPR_warriors_of_socialism:0 "Strongest Warriors of Socialism"
 DPR_warriors_of_socialism_desc:0 "With revolutionaries and fighters from all over the world united by one common goal - to achieve the goals set by Marx and Lenin long ago, the army of our homeland is truly unstoppable. All those who stand in the way of working people's freedom will be forced to meet their warrior defenders, and this will be the last thing they will do."
 
 DPR_panfilovs_men:0 "Legacy of Panfilov’s Men"
 DPR_panfilovs_men_desc:0 "28 of the most legendary fighters of the Great Patriotic War - the Ponfilovtsy, who alone, without weapons, reinforcements, and being in a complete minority, held back the entire Nazi offensive on the great Soviet capital - Moscow. These heroes will serve as an example for each of our soldiers and will inspire them to do what they once did - the impossible."
 
 DPR_socialist_military_industrial_complex:0 "Socialist Military-Industrial Complex"
 DPR_socialist_military_industrial_complex_desc:0 "To wage victorious warfare, and in general, to create a strong army that will be respected by every possible invader, enemy or ally, we need factories. Lots of factories. And they will make us tanks!"
 
 DPR_defenders_of_labour:0 "Our Defenders of Labour"
 DPR_defenders_of_labour_desc:0 "To succeed in our revolutionary and liberation struggle, we need to involve everyone. Every person, even if it seems impossible at first sight, can help us in the battles, and not necessarily on the front lines. The factories producing ammunition and military equipment need more and more workers, and if we involve every available hand in production, our facilities will become invincible."
 
 DPR_politruks:0 "Political Control of the Army"
 DPR_politruks_desc:0 "Our soldiers must fight for us relentlessly and they shouldn't ask unnecesarry questions. To help with that, politruks are reintroduced. Like in old times, they'll watch for ideological correctness of soldiers and punish non-loyal ones."
 
 DPR_bright_new_generation:0 "Bright New Generation"
 DPR_bright_new_generation_desc:0 "Besides the basic things, which children learn in school, they also should learn how to work at real jobs. Why spend vacation with doing nothing useful, when you can learn how to make furniture or how to setup railways?"
 
 DPR_union_of_socialism_and_religion:0 "Union of Socialism and Religion"
 DPR_union_of_socialism_and_religion_desc:0 "It may sound ridiculous, but many people in Soviet Union were religious, so we can't ignore religion in our times. While people aim for socialist ideals, they can attend churches and believe in God."
 
 DPR_bilingual_system:0 "Bilingual System"
 DPR_bilingual_system_desc:0 "Russian? Ukrainian? What's the matter? Those languages both are present in Ukraine, so why would we need to choose one state language to follow? There will be two!"
 
 DPR_nostalgia:0 "Just Like the Old Times"
 DPR_nostalgia_desc:0 "A good part of ukrainian populace is people, who were born in Soviet Union, and they still harbour sweet memories of past. How education and sports were free, how you shouldn't think about tomorrow, because the state decided it already... Sweet nostalgia of Soviet Union, which we'll represent in our state!"
 
 
 ## FOCUSES
 DPR_vitrenko_is_victorious:0 "Vitrenko is Victorious!"
 DPR_vitrenko_is_victorious_desc:0 "Thrice - Hooray! The United Socialist Front, under the leadership of our charismatic leader, Natalia Vitrenko, has once again managed to win back the seemingly lost support of the people and return the country to the path of democracy, equality and fraternity. This day is a real celebration for all the remaining supporters of the theories of Marx and Lenin, as one more state and one more people have managed to choose the right path!"
 
 DPR_a_hand_for_the_poor:0 "A Hand for the Poor..."
 DPR_a_hand_for_the_poor_desc:0 "The working class of Donbass suffered a lot during the rule of the Ukrainian fascists, but even the new authorities of the DPR and LPR did not try to improve their situation, which made them lose all hope. With our emergence, they became the driving force behind the strength of the socialist movement, and it is to them that we owe our victory and the people of Donbass their future. They deserve a better life, and we will give it to them. Long live the proletariat!"

 DPR_and_punishment_for_the_untrustworthy:0 "...and Punishment for the Untrustworthy!"
 DPR_and_punishment_for_the_untrustworthy_desc:0 "The parasites who sat in their luxurious offices, and drove expensive Western cars, while continuing to lie to the proletariat about their loyalty to them, deserve nothing but the most severe punishment and torment. While people were surviving on meagre wages and trying to peacefully convey their regret and despair to the party leadership, the party sent their armed dogs against them. This is inexcusable. Justice is the same for everyone, and I would not envy you!"

 DPR_socialism_on_the_rise:0 "Socialism on the Rise"
 DPR_socialism_on_the_rise_desc:0 "Having dealt with all the mess that the former government left us as a goodbye gift, we can finally start fulfilling our promises to the people. Creating a new Red Army, completely changing the economic course, restructuring the state apparatus... from now on, all of this is our duty to the people. As the truly wise men are saying, this land has never seen anything better than the Soviet Union, so let's bring back those old times and continue its legacy!"

 DPR_in_search_of_allies:0 "In Search of Allies"
 DPR_in_search_of_allies_desc:0 "Everyone needs friends and allies, even the mighty people of Donbass. We will not be able to achieve all the results we would like on our own, no matter how much we want to, but with the help of other forces, it is quite possible. There are many people in the world, and even here in Ukraine, who are ideologically close to us, and we just have to try to be allies and have each other's backs if we want to achieve our goals."
 
 DPR_a_message_to_those_in_need:0 "A Message to Those in Need"
 DPR_a_message_to_those_in_need_desc:0 "There are many people across Ukraine and Novorossiya who have lost everything. Home, work, family, and everything without which their lives will never be the same again. Unfortunately, there is nothing we can do about it, wars and disturbances always end in this way, but we still have something to offer these people - a future. Everyone who needs something will find support and help from us, but we need them too. We can help each other, and we have to try!"
 
 DPR_outreach_to_the_media:0 "Outreach to the Media"
 DPR_outreach_to_the_media_desc:0 "The world needs to know that the cause of socialism is not dead. People need to know that the hope for a free and equal society is still alive, somewhere in Eastern Europe, and that the hope for the victory of this system will live on. Our job now is to tell Ukraine and the world that workers are still fighting for their cause, and will continue to do so as long as it takes."
 
 DPR_workers_of_the_world_join_us:0 "Workers of the World, Join Us!"
 DPR_workers_of_the_world_join_us_desc:0 "Over all these years, the legacy of the socialist system of the USSR has been almost destroyed by Ukrainian and Russian capitalists, but it is still liable to change. For this, however, our Donbass compatriots are not enough, and we need absolutely everyone. Workers all over the world who suffer from the capitalist system and have been oppressed by the neo-aristocracy for decades will find refuge here in Donbass. Come! There is room for everyone in paradise!"
 
 DPR_alliance_of_revolutionaries:0 "Alliance of Revolutionaries"
 DPR_alliance_of_revolutionaries_desc:0 "In our case, fighting alone would be tantamount to suicide. The revolution in the political, social and economic spheres that we are waging is guaranteed to strike fear into our capitalist opponents, and so we must find those with whom we can stand united against the likes of them. In Kirovohrad, there are just such people. They have been rebuilding the socialist system from scratch, just like us, and they know what it's like to be alone on the battlefield. Together we will become stronger, and we will definitely defeat the rotten system!"
 
 DPR_we_can_do_it_alone:0 "We Can Do It Alone"
 DPR_we_can_do_it_alone_desc:0 "Although having allies would make things easier for us, we cannot afford to trust others. No one has the same thoughts and views as we do, and we have to accept that. We are alone in this world now, this may change, but we need to think about the present. We have done well alone before, and we will continue to do so."

 DPR_a_good_old_friend:0 "A Good Old Friend"
 DPR_a_good_old_friend_desc:0 "Looking at all the journeys we have travelled alone, we want to make the one ahead easier. There is a person who could help us with this. A person who shares the same nostalgia for the Soviet system as we do. Viktor Medvedchuk may not be the most ideological advocate of socialism, but we have the same goal. To build a free and equal community on the lands of Ukraine. And who would we be if we did not cooperate with like-minded people?"
 
 DPR_world_here_we_go:0 "World, Here We Go!"
 DPR_world_here_we_go_desc:0 "By calling on all the workers of the world for help and offering shelter to all those in need in exchange for work for the common good, we have made ourselves known to the world. The time has come to show ourselves on the global political stage as a new beacon of equality and freedom - a new pillar of socialism. Many did not notice us, many ignored us, but from now on, everyone will know about us. Everyone will know that the workers' struggle is still alive and well and that socialism is not dead!"
 
 DPR_socialization_of_domestic_affairs:0 "Socialization of Domestic Affairs"
 DPR_socialization_of_domestic_affairs_desc:0 "The collectivization processes that were implemented in the lands of the Soviet Union and countries ideologically close to it were long and difficult, especially for some segments of the population, but they immediately bore fruits. Socialization of agriculture and other industrial aspects of the state is one of the most important steps to building a socialist paradise, and we are ready for it."
 
 DPR_helping_hand_for_the_workers:0 "Helping Hand for the Workers"
 DPR_helping_hand_for_the_workers_desc:0 "Everyone wants to live in prosperity, and paradise cannot be built without a happy population. We must meet our working comrades halfway in their desires, which will not only increase their support for the Party and its ideas, but also give us loyal and hardworking people who will be happy to fulfil, and even exceed, the tasks set. Stakhanov is a witness of this! "
 
 DPR_care_for_the_elderly:0 "Care for the Elderly"
 DPR_care_for_the_elderly_desc:0 "All people who have lived their lives for the good of their people and the Party want and deserve a good and peaceful retirement. Having worked for the state for decades, they have experienced severe upheavals and wonderful revivals with it, and have become almost like family. If the state does not take care of those who have worked for its benefit for so long, what makes us better than anyone else? How are we better than rotten capitalists if we do not provide the old population with a good rest of their lives?"
 
 DPR_driving_out_unprofitable_enterprises:0 "Driving Out Unprofitable Enterprises"
 DPR_driving_out_unprofitable_enterprises_desc:0 "Anything operating in our country should work for and benefit its people. During the reign of bandits and oligarchs, Donbas was left with a lot of enterprises whose role was merely to be noted on paper and to be the target of subsidies, which then magically went nowhere, instead of bringing anything to the people. This needs to be ended, once and for all."
 
 DPR_workers_domestic_front:0 "Workers’ Domestic Front"
 DPR_workers_domestic_front_desc:0 "It takes everyone to build a socialist economy, which in turn will lead us to the ideal state and society. Everyone who can work on a machine, grow and harvest sesame corn, drive trucks or ships... all these people work not only for the Party but for their future and the future of their families. So let's get to work, comrades! The future is near!"
 
 DPR_deal_with_the_wealthy:0 "Deal with the Wealthy"
 DPR_deal_with_the_wealthy_desc:0 "As much as we would like to build a workers' paradise on our own, we cannot achieve this without the help of the wealthy class. Throughout history, many socialist revolutionaries have killed off the upper classes and taken their property, which they could not properly manage, but we will be smarter. By making a deal with the elite, we will make them and their property part of our system, and even the remnants of the capitalist legacy of the Ukrainian junta will serve the people."
 
 DPR_welfare_for_the_lower_class:0 "Welfare for the Lower Class"
 DPR_welfare_for_the_lower_class_desc:0 "Over the past centuries, the people who have suffered the most are those who belong to the so-called " lower class". These were poor and disadvantaged people who did everything they could for the sake of their families and themselves, but the state prevented them from doing so in every possible way. The fight against this is the main goal of socialism, which is also ours, and we will not allow the suffering of the poor to continue. We will put an end to this, and everyone will live happily!"
 
 DPR_nationalization_nationwide:0 "Nationalization Nationwide"
 DPR_nationalization_nationwide_desc:0 "The policy of state appropriation of enterprises of all kinds is one of the foundations of the socialist economic structure. How can a stable, self-sufficient system be built when economic plans are hampered by large corporations and their changing owners, and when people who could work for the good of their native land are forced to work like negroes in private factories?"
 
 DPR_socialist_paradise:0 "Socialist Paradise"
 DPR_socialist_paradise_desc:0 "Carrying out all kinds of economic and social reforms, experimenting, and using old methods in the modern world, we have always had a single goal - to build a small socialist paradise. All our steps have led us to this moment, and here we are, standing in front of our home, our native land, which has finally healed from all that its enemies and exploiters have done to it, and is ready for life."
 
 DPR_the_army_to_protect_us:0 "The Army to Protect Us"
 DPR_the_army_to_protect_us_desc:0 "A state without an army is nothing. Unfortunately, we have to accept these realities. Without a powerful and combat-ready army, we risk not only losing respect for us but also the state itself, which is categorically unacceptable. The people's army will stand guard over our people, and in order for it to protect us from all threats, we must invest in it with our blood and sweat."
 
 DPR_the_peoples_militia:0 "The People’s Militia"
 DPR_the_peoples_militia_desc:0 "The glory of the mighty Red Army, born in the fires of the civil war, will accompany us forever. Practice has shown that every farmer and worker can not only join the heroic army but also bring real benefit to their own country and honour to their family. We honour the glory of our ancestors, and nothing else will show this more than following their traditions!"
 
 DPR_mass_recruitment_drive:0 "Mass Recruitment Drive"
 DPR_mass_recruitment_drive_desc:0 "The People's Army needs... oddly enough, people. A lot of people. If we want to defend our borders and push them further, the current army will not be enough. By launching a massive wave of conscription, we will not only provide the army with active soldiers but will also be able to create a reserve, which, in the case of a truly bloody struggle for freedom and equality, will definitely come in handy."
 
 DPR_put_everyone_we_can_on_the_frontline:0 "Put Everyone We Can on the Frontline"
 DPR_put_everyone_we_can_on_the_frontline_desc:0 "The revolutionary and liberation struggle requires sacrifice, and all those who die for the glorious ideas of socialism will forever remain in our memory and history. But we need everyone to win this battle. Everyone has responsibilities, and those who are not fighting on the agricultural, technological, and information fronts, who are not raising new generations, must take up arms and fight for us and our ideas on the battlefield. Victory will be ours! No matter the cost!"
 
 DPR_strongest_warriors_of_socialism:0 "Strongest Warriors of Socialism"
 DPR_strongest_warriors_of_socialism_desc:0 "The backbone of every army, apart from numbers, has always been quality and advancement. History has repeatedly proven that with elite trained soldiers equipped with the latest technology, you can defeat armies of any size, and it is our duty as the last true bastion of socialism in Europe to protect our heritage and our ideas, and without a technologically advanced army this is simply not possible."
 
 DPR_legacy_of_panfilovs_men:0 "Legacy of Panfilov’s Men"
 DPR_legacy_of_panfilovs_men_desc:0 "We all remember the legendary story of the 28 most heroic soldiers of the Great Patriotic War who, almost unarmed, managed to stop the entire Nazi army from advancing on Moscow and thus saved the Soviet Union. Their deed has gone down in history forever, and it is this deed that should become the backbone of our army. If every soldier becomes a Panfilovets, nothing will stop us."
 
 DPR_invite_foreign_specialists:0 "Invite Foreign Specialists"
 DPR_invite_foreign_specialists_desc:0 "Quality comes first. No one has ever been able to achieve everything on their own, and even the great Soviet Union shared and adopted technologies from foreign developers, as well as established joint construction and exploitation. There are many brilliant engineers and theorists in the world who would be happy to help their fellow socialists in a good cause, and we will give them the opportunity."
 
 DPR_strengthen_the_military_industrial_complex:0 "Strengthen the Military-Industrial Complex"
 DPR_strengthen_the_military_industrial_complex_desc:0 "Unfortunately, numbers and morale are not enough to maintain the army's combat capability. They need weapons and equipment. Our current capacities allow us to supply the army, but if the army expands, we will need more factories and warehouses. By increasing the number of plants and the production of weapons and ammunition, we will significantly raise our chances of success on the field."
 
 DPR_our_defenders_of_labour:0 "Our Defenders of Labour"
 DPR_our_defenders_of_labour_desc:0 "To succeed in our revolutionary and liberation struggle, we need to involve everyone. Every person, even if it seems impossible at first sight, can help us in the battles, and not necessarily on the front lines. The factories producing ammunition and military equipment need more and more workers, and if we involve every available hand in production, our facilities will become invincible."
 
 DPR_bring_back_politruks:0 "Bring Back Politruks"
 DPR_bring_back_politruks_desc:0 "Everything needs supervision, especially the army. Ordinary military inspections, and testing of weapons, are a matter of course, but ideological supervision is another thing. Ideological control over commanders, as Soviet practice has shown not for the first time, is very important and has a strong impact on the morale of soldiers, which in turn is priceless. Loyalty and devotion to the state and the party are the most important things for the army, and we are ready to take any measures to keep it that way."
 
 DPR_in_the_footsteps_of_our_grandfathers:0 "In the Footsteps of Our Grandfathers"
 DPR_in_the_footsteps_of_our_grandfathers_desc:0 "The glory of our grandfathers, who beat the Nazis both near Moscow and Berlin, will live forever. We honour their memory, and we will continue to do so, hoping that our soldiers will be able to get at least a sliver of the glory of those who were able to put all the fascist scum on their backs while the rest of the world was shaking with fear. The Red Army lives on in us, and with the blessing of our ancestors, it will remain so. Glory to the Reds! The world is ours!"
 
 DPR_rebuilding_the_state_apparatus:0 "Rebuilding the State Apparatus"
 DPR_rebuilding_the_state_apparatus_desc:0 "Having started the process of complete reform of the governmental system, we have encountered an outdated state apparatus, the existence of which is a banal humiliation for our state and party. Having set out to restore the proven and impeccable Soviet practices, we must fundamentally change the existing agencies for the good of the people and the state."
 
 DPR_control_the_media:0 "Control the Media"
 DPR_control_the_media_desc:0 "Over the years, television and the Internet have proved to be really powerful drivers of events and shapers of public opinion, and this factor cannot be ignored. Our opponents will continue to throw mud at us and our decisions, and the only possible counteraction to this can be pro-government media that would, on the contrary, stand up for the party and the people who elected it."
 
 DPR_countrywide_agitation:0 "Countrywide Agitation"
 DPR_countrywide_agitation_desc:0 "The Soviet practice of propaganda posters and brochures, a plethora of party magazines and newspapers, and reminding people of what a wonderful country they lived in and how lucky they were to have it, unlike others, was fantastic. The moral of the people, as I recall, was simply on a cosmic level, and it would be a shame not to repeat the success of the campaign of the great Union of Peoples."
 
 DPR_the_only_right_party:0 "The Only Right Party"
 DPR_the_only_right_party_desc:0 "The multi-party political system has too often been the cause of many unrests and even coups, and can therefore be considered dangerous, especially when we aim to build a true socialist paradise. The Soviet one-party system has proved to be better than any other in the world, so we will borrow some methods from our glorious ancestors."
 
 DPR_big_tent_concept:0 "'Big Tent' Concept"
 DPR_big_tent_concept_desc:0 "After the introduction of the one-party system, our state stumbled with a shortage of personnel in some areas where the socialists simply did not have enough experience. But there is a solution to this - the expansion of our party in an ideological form. By making the socialist party a home for everyone - left and right, loyal to the people of Donbas - we will solve most of the state's problems and finally be able to deal with more important matters."
 
 DPR_return_of_the_iron_fist:0 "Return of the Iron Fist"
 DPR_return_of_the_iron_fist_desc:0 "Stalin's iron fist policy may not have been marked by any excessive transparency, but it showed excellent results in both domestic and foreign policy. Of course, no one is reviving the cult of personality, but a strong hand is exactly what the state and the people need now."
 
 DPR_patriotism_through_education:0 "Patriotism Through Education"
 DPR_patriotism_through_education_desc:0 "We and our parents knew history and geography well, were in good physical shape and understood discipline, unlike today's youth. But everything can change. The Soviet school curriculum was impeccable, and even in the West, this is recognised, which is hardly a small matter. Young people need a good education, or our country cannot expect anything good for itself in the nearest future."
 
 DPR_the_bright_new_generation:0 "The Bright New Generation"
 DPR_the_bright_new_generation_desc:0 "For the sake of the future of our free country and our brave people, we must be confident in the ability of future generations to carry the burden of governing a powerful state. The return of the Soviet school system will play a role, but without things like Komsomol and the Pioneers, our children and their children will simply not have all that the Party gave us. We just have no right to deprive them of this. And with this approach, our state and our ideals will live forever!"
 
 DPR_reconcile_orthodoxy_and_socialism:0 "Reconcile Orthodoxy and Socialism"
 DPR_reconcile_orthodoxy_and_socialism_desc:0 "Mistakes are what make human beings human, and even the great ones sometimes make them. The leaders of socialism, one after the other, have brought the thesis of their forefather, Karl Marx, that "religion is opium for the people", but in our opinion, nothing prevents our historically Orthodox people from abandoning spirituality to fully understand the theory of socialism. This is not only unnecessary in our time, but even harmful. We have had enough of witch hunts!"
 
 DPR_the_issue_of_state_language:0 "The Issue of State Language"
 DPR_the_issue_of_state_language_desc:0 "If we want to unite all the territories of the former Ukrainian Soviet Socialist Republic, we must remember the two dominant peoples on its lands - the Russian majority and the Ukrainian minority. In paradise, everyone is equal, even Ukrainians, so granting Ukrainian the status of a second official language is our commonplace duty, which will bring us a little closer to our goal."
 
 DPR_the_new_ottepel:0 "The New 'Ottepel'"
 DPR_the_new_ottepel_desc:0 "The results of the “Khrushchev Thaw” were extremely impressive at the time and opened the gates to the outside world for our great homeland. By adopting a softer policy, we may not have any extraordinary productivity, but fellow citizens are guaranteed to be happy with our acceptance of the legacy of an influence-free Central Committee."
 
 DPR_nostalgia_for_the_past:0 "Nostalgia for the Past"
 DPR_nostalgia_for_the_past_desc:0 "Having completed the complex process of reforming the state apparatus, we are one step closer to the formation of a full-fledged socialist state. The Soviet legacy was the only thing that kept our dream on its feet, but now it’s the main driver and source of all our actions and plans. Don’t be afraid, comrades, we’ll treat the legacy of our ancestors with care and will not allow their glory to decline!"
 
 DPR_the_future_awaits:0 "Future Awaits Us!"
 DPR_the_future_awaits_desc:0 "Having carried out all possible reform processes and brought Soviet innovations back into practice, our state can achieve the last goal - the unification of all the lands of former Ukraine. The army is as ready as ever, the economy is able to withstand any shocks, the political apparatus is showing strength and determination, and a lot of our like-minded people are ready to support us, both in Ukraine and around the world. Forward, Donbass! A bright future is just around the corner!"
 
 DPR_head_south_on_the_dnepr:0 "Head South on the Dnepr"
 DPR_head_south_on_the_dnepr_desc:0 "Zaporozhye has always been the cradle of the revolutionary spirit and the will of simple people for freedom and equality. Since the days of the famous Zaporozhyan Cossacks, the locals have fought back against the aristocracy that considered them slaves, and centuries later, Makhno and many others continued their work. But the fight for freedom by the people of Zaporozhye is not over. We will continue it, and we will win it!"
 
 DPR_subjugate_the_tavrian_steppe:0 "Subjugate the Tavrian Steppe"
 DPR_subjugate_the_tavrian_steppe_desc:0 "The Tavrian steppe of the Kherson region has always been known for its freedom and friendliness to socialist ideas. We have allies and friends here, but that doesn't mean we all share the same goals and ideology. Kherson belongs alongside other parts of our country, and no one dares to deny it."
 
 DPR_the_crimean_question:0 "The Crimean Question"
 DPR_the_crimean_question_desc:0 "Is Crimea Ukrainian or Russian... does it matter? Crimea has always belonged to its people, the Crimeans, and this question should be left to them. Before that, they wanted to join Russia and become independent, but now there are no fascists in Ukraine who would encroach on the freedoms of Crimea and its people. This issue must be raised again and for the last time, so that in the future no one will have any questions about whose peninsula it really is. "
 
 DPR_ah_odessa_a_pearl_by_the_sea:0 "Ah, Odessa, a Pearl by the Sea"
 DPR_ah_odessa_a_pearl_by_the_sea_desc:0 "Odessa is a place... that cannot be expressed in words. It has always been a centre of true Russian culture and a symbol of the greatness of the Russian people in the region, and this title was repeatedly sullied by the Ukrainian fascists who tried to take away the city from Odessans. But we cannot allow this to happen. Odessa - Mama, we will free you and bring you back, and no one will harm you anymore."
 
 DPR_legacy_of_kirov:0 "Legacy of Kirov"
 DPR_legacy_of_kirov_desc:0 "Kirovohrad, after the fall of Ukraine, became a new bastion of socialism. Concerned Russians managed to establish control over these lands and then convinced the locals that communism was not dead and that its ideals could be resurrected and implemented. They gave people hope, and so did we. But we still have many differences. All of these need to be resolved now in order to finally unite the state and its socialist figures and leaders."
 
 DPR_liberate_kharkov:0 "Liberate Kharkov"
 DPR_liberate_kharkov_desc:0 "The lands of the Kharkov region have been and remain fraternal not only to Donbass but to the whole of Ukraine. For centuries, the history of Kharkov and Donbass has been marked by common events. Shared grief and joy. Kharkiv is one of the most industrialised regions of the country, and its workers and people need the help of their brothers. No one dares to enslave the brave people of the Kharkov! And we will prove it!"
 
 DPR_march_on_dnepropetrovsk:0 "March on Dnepropetrovsk"
 DPR_march_on_dnepropetrovsk_desc:0 "There are two capitals in Ukraine built on the Dnepr River, and each is a bastion of lying politicians, gangs, and suffering workers and residents. Dnepropetrovsk is an important economic centre, but over the years bandits and oligarchs who have lost their boundaries have turned it into a den of crime and illegality, while people have become poorer and the desires of the proletariat have been ignored. This has come to an end! Dnepropetrovsk deserves justice, and it will get it!"
 
 DPR_at_the_heart_of_ruin:0 "At the Heart of Ruin"
 DPR_at_the_heart_of_ruin_desc:0 "Kiev, Chernigov, and Poltava are three cities that have become symbols of devastation and instability that, if we want to live in peace, must be quelled. The people in these cities have suffered especially since the beginning of the chaos, and they have had no one to help them in this struggle. But now we are strong enough not only to fight for our own rights and freedoms but also to help all our brothers and sisters. "
 
 DPR_approaching_podolye:0 "Approaching Podolye"
 DPR_approaching_podolye_desc:0 "The lands of  Podolye may not be the industrial heart of the country, but even so, many of its residents suffer from a government that they did not elect and that does not hear them. We have seen this before, and unfortunately, we are seeing it now, and it needs to stop. Proud Podolye land, just bear with us, we are close!"
 
 DPR_a_blow_to_zapadentsy:0 "A Blow to Zapadentsy"
 DPR_a_blow_to_zapadentsy_desc:0 "The so-called "Western Ukrainian Lands" have always shown themselves to be the most intolerant part of our country, who mostly do not recognise Russians and Russian as equal to Ukrainian, and even after many decades still glorify fascist figures and collaborators like Bandera and Petliura. But even so, there are people here who believe in equality between the many peoples of Ukraine, who are suffering from capitalist influence, and who are asking for help from their brothers in Donbass and the rest of the country. The West is calling for aid, and we will answer!"
 
 DPR_a_shining_whole_ukraine:0 "A Shining, Whole Ukraine"
 DPR_a_shining_whole_ukraine_desc:0 "The new state that will emerge from the wreckage of the old Ukraine is undoubtedly the successor to the glorious Ukrainian SSR, and thus indivisible. From the mighty Carpathian mountains in the west and the deep swamps of Polissya in the north to the wide Don steppes in the east and the beautiful Tavrian coast in the south, it is a single organism that is a crime to divide. Every citizen of this land deserves the paradise we will bring, regardless of ethnic or linguistic differences."
 
 DPR_renewal_of_the_union_system:0 "Renewal of the Union System"
 DPR_renewal_of_the_union_system_desc:0 "The concept of Ukraine as a single state has proven to be unsuccessful. Even though it tried to build a multicultural state in the form of the Ukrainian SSR, what followed, namely an attempt to build a monocultural state by oppressing other languages and nations, destroyed any hope of continuing the "Ukrainian experiment". But there is a way out. The regions that will never accept the population of Novorossiya as they are do not have to live in the same country as them, but they can have their own. We will restore the system of the Soviet Union, but on the territory of Ukraine, and create a society where everyone will be with their own people and language, and live in a peaceful, equal and free community."
 
 
