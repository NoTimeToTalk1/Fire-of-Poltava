 ## Events
 dpr_vitrenko.1.t:0 "Vitrenko is victorious!"
 dpr_vitrenko.1.d:0 "The election results are in, and the winner is Nataliya Vitrenko, leader of Socialist Workers Donbas Party. Her victory gives us a hope for a truly socialist utopia!"
 dpr_vitrenko.1.a:0 "Glory to Vitrenko!"
 dpr_vitrenko.2.t:0 "Pushilin trial"
 dpr_vitrenko.2.d:0 "Pushilin was sitting in the courtroom as a prisoner. He was filmed by the local TV channels and sound from cameras making photos of him won’t go off. At one point, the courtroom was closed with reporters walking out from it. The trial has begun.\n\nMultiple pieces of evidence, testimonies of witnesses, who happened to be Pushilin's government members in the past, and accusations were shown to Denis. He wasn’t even able to hire a decent lawyer. Instead, he got a state's lawyer, who didn't even try to defend him.\n\nThe end of trial has came up, and the judge told Pushilin's sentence:"
 dpr_vitrenko.2.a:0 "'Denis Pushilin is sentenced to life imprisonment.'"
 dpr_vitrenko.3.t:0 "Girkin flees!"
 dpr_vitrenko.3.d:0 "Girkin was sitting in his 'headquarters', which happened to be an appartment in the centre of Donetsk. He was in panic, packing the most important things which he had in a backpack. His head was roughly cut by an electric clipper. Due to his ties with the DNR intelligence service, he got information that Vitrenko had ordered police to capture him.\n\nSuddenly, he got a call on his mobile phone. It was his wife. He picked up the call. She asked him 'Igor, so what now? Are you fleeing or are you staying?'. He answered her 'Miroslava, I am fucking running away from this city. This cunt wants to capture me, but she can kiss my ass. I will call as soon as possible'.\n\nHe quickly got out of his house. A car with one of his friends was waiting outside, so he rushed to it. Old ordinary Lada, which was one of the most popular cars in Donetsk, set away.\n\nWhen the police arrived, he was nowhere to be seen."
 dpr_vitrenko.3.a:0 "The bastard fled from Donbas twice..."
 dpr_vitrenko.4.t:0 "Foreign volunteers"
 dpr_vitrenko.4.d:0 "After Vitrenko's call to fighters for socialism in the outer world, the border with Russia got many many new people crossing it in the way of Donetsk. At some time queues for crossing were too large to handle for border guards Sanya and Lyonia.\n\nAnother day has come to an end, and Sanya with a deep sigh told his colleague how tired he was. Lyonia told him about a funny black guy, who he happened to see during the working day, and how mad he was when Lyonia declined his entrance, and they had a laugh.\n\nBut behind them was one man in an officer uniform. He gave them a slap to their heads, telling them that they’ve declined one of the commanders of the intersocialist brigade “Marks”."
 dpr_vitrenko.4.a:0 "But I thought Vitrenko was a traditionalist…"
 dpr_vitrenko.5.t:0 "Puchkov alliance"
 dpr_vitrenko.5.d:0 "Dmitriy “Goblin” Puchkov is an ideal example of a “soviet man”. Born in Kirovograd, he was destined to be a true socialist. Now he is leading the “Little-Russian Liberation Front” in hopes of giving ukrainians a better life. An ideal person to make an alliance with."
 dpr_vitrenko.5.a:0 "Send him an offer!"
 dpr_vitrenko.6.t:0 "Vitrenko's offer"
 dpr_vitrenko.6.d:0 "Nataliya Vitrenko, pro-russian ukrainian socialist, have sent us an offer for an alliance."
 dpr_vitrenko.6.a:0 "Of course we accept! For the internacional!"
 dpr_vitrenko.6.b:0 "Tell that woman that we don't need her help."
 dpr_vitrenko.7.t:0 "Puchkov declined"
 dpr_vitrenko.7.d:0 "Puchkov rejected our offer for an alliance."
 dpr_vitrenko.7.a:0 "A sad message…"
 dpr_vitrenko.77.t:0 "Puchkov accepted"
 dpr_vitrenko.77.d:0 "Puchkov has accepted our offer, and we'll form an alliance with him."
 dpr_vitrenko.77.a:0 "Vstavay, proklyatiem zakleimyonniy!"
 dpr_vitrenko.8.t:0 "Medvedchuk alliance"
 dpr_vitrenko.8.d:0 "Viktor Medvedchuk, Putin's godfather and leader of pro-russian forces in Ukraine. He established his stronghold in Kherson, right next to Crimea, which is under Russia. Remembering that we were in one boat in 2000s, we have some common views, and alliance with him wouldn't be a bad idea."
 dpr_vitrenko.8.a:0 "Send him an offer!"
 dpr_vitrenko.9.t:0 "Vitrenko's offer"
 dpr_vitrenko.9.d:0 "Nataliya Vitrenko, our ally in past, have sent us an offer for an alliance."
 dpr_vitrenko.9.a:0 "Alliance with an old friend won't hurt."
 dpr_vitrenko.9.b:0 "Tell her that we were allies in the past, but not now."
 dpr_vitrenko.10.t:0 "Medvedchuk declined"
 dpr_vitrenko.10.d:0 "Medvedchuk rejected our offer for an alliance."
 dpr_vitrenko.10.a:0 "Not a big loss to be honest…"
 dpr_vitrenko.101.t:0 "Medvedchuk accepted"
 dpr_vitrenko.101.d:0 "Medvedchuk has accepted our offer, and we'll form an alliance with him."
 dpr_vitrenko.101.a:0 "For a united Ukraine!"
 dpr_vitrenko.11.t:0 "A closed meeting"
 dpr_vitrenko.11.d:0 "Vitrenko was sitting at Donetsk city hall, in a meeting room with a large table and bottled water at every seat. People in rich costumes have entered the room, and one of them was well-known to the public. Rinat Akhmetov, one of the richest people in Ukraine, holder of many industrial enterprises, charity foundations and “Shakhter Donetsk” football club.\n\n“It's a pleasure to meet you, Rinat Leonidovich”, Vitrenko said. Rinat has answered her with “Nataliya Mikhailovna, it's nice to see you in these conditions, thank you for the invitation. I have some demands, that you should look into”. Apart from Akhmetov, some oligarchs from the territory of Novorossiya were pleased to negotiate with a socialist about their businesses.\n\nDuring the meeting, all sides were smiling and talking smoothly. In the end, Vitrenko shaked hands with every person in the room. Negotiations went successful. Vitrenko's government would get a cut from oligarchs in exchange for keeping their grip on things they own. The most successful out of them was Akhmetov, getting the most “juicy” conditions."
 dpr_vitrenko.11.a:0 "Socialist government, huh?"
 dpr_vitrenko.12.t:0 "Our army"
 dpr_vitrenko.12.d:0 "Army is our primary way to spread socialist utopia to other people, and we need to choose our main doctrine for building our forces. We have two choices.\n\nFirst, rely on the masses. If we make up our army based on the number of people, we can throw them into fight, not being scared of how technologically advanced the enemy is. There could be a problem with people in our state, but it won’t be a problem finding ways to mobilize as much as possible.\n\nSecond, build up a strong army. Not countless, but professional, with knowledge of war and a mind to think of a plan in any situation. Powerful force, which will be able to destroy the enemy in any way. But sustaining professionalism may cost in additional costs and months of training and looking for skilled people.\n\nSo, what shall we choose?"
 dpr_vitrenko.12.a:0 "Army of masses."
 dpr_vitrenko.12.b:0 "Army of skilled."
 dpr_vitrenko.13.t:0 "Black Lenin"
 dpr_vitrenko.13.d:0 "Ayo Benes, citizen of Latvia, has become an ally of Novorossiya movement since 2014, but then life made him get to Moscow. He is one of the people who answered our call for foreign advisors for our army, and he surely will make it more stronger."
 dpr_vitrenko.13.a:0 "We welcome Ayo!"
 dpr_vitrenko.15.t:0 "Establishment of new media"
 dpr_vitrenko.15.d:0 "Kateryna was a journalist of “Donbas Realities”, a media-project of Radio Liberty. Tomorrow a couple of men beat her up and took her with them. She was taken to the “Isolyacia” jail in Donetsk. \n\nMen took her into one of the jail cells, gave her a chair and tied her to it. After a couple minutes, one man came in. He had a military costume with a couple of medals and a hat.\n\n“Hello, Katyusha… I’m Major Gavrilov, nice to meet you.”\n\nKatya was silent.\n\n“Let’s get closer to the point. You probably know what you are doing here, don’t you? Nataliya Mikhaylovna made a new law, but you still were working for your ukrofascist media. Can you explain why?”\n\nKatya hasn’t said a word.\n\n“You want to remain silent? When I ask you questions? Maybe I can make you talk.”\n\nGavrilov hit her right into her stomach with all the might he had.\n\n“Spit it to me! Why were you still working with those khokhols?”\n\nKatya was struggling from pain, but she still was silent all the way. Gavrilov hit her face twice next.\n\n“Is there someone else working for Donbas Realities? Say the names!”\n\nKatya was crying, but she didn't say a single word. \n\n“Say it!”\n\nGavrilov continued to beat Katya up, trying to get information from her."
 dpr_vitrenko.15.a:0 "That’s what people get here..."
 dpr_vitrenko.16.t:0 "Russian language issue"
 dpr_vitrenko.16.d:0 "People of Donbass… Not only Donbass, but almost half of Ukraine was speaking russian language as their native, and some politicians, influenced by galician nazis, tried to ban their right to live as they’ve lived. \n\nWe’ll go further than our predecessors from the Party of Regions, and we’ll declare a bilingual system. Documents may be written in language by choice, parents can choose what language their kids will learn, and nobody will have to struggle with it."
 dpr_vitrenko.16.a:0 "Kakaya raznica?"
 dpr_vitrenko.17.t:0 "Chernovtsy issue"
 dpr_vitrenko.17.d:0 "Chernovtsy was occupied by the United Nations during the Ukraine crisis. It’s time for the United Nations to quit."
 dpr_vitrenko.17.a:0 "Send a demand."
 dpr_vitrenko.18.t:0 "Chernovtsy ceded"
 dpr_vitrenko.18.d:0 "The United Nations recognized us and gave Chernovtsy back to the homeland."
 dpr_vitrenko.18.a:0 "Hooray!"
 dpr_vitrenko.19.t:0 "Crimea issue"
 dpr_vitrenko.19.d:0 "The Crimean peninsula is a long-disputed theme. Everyone was here, everyone controlled it, and you won’t say who it belongs to so easily.\n\nBut for now it’s under Russia. We have good relations with Russia, so we should ask them to give Crimea back under ukrainian control."
 dpr_vitrenko.19.a:0 "Send an offer."
 dpr_vitrenko.20.t:0 "A demand from Vitrenko"
 dpr_vitrenko.20.d:0 "Government of socialist pro-russian Vitrenko sent us a message for giving them Crimea. What do we say about it?"
 dpr_vitrenko.20.a:0 "Crimea is with Russia forever. They won’t get it."
 dpr_vitrenko.20.b:0 "It can be their, but only if they`ll establish control over whole Ukraine, and will be our allies in the future."
 dpr_vitrenko.20.c:0 "Give them Crimea. What could go wrong?"
 dpr_vitrenko.21.t:0 "Russia said no"
 dpr_vitrenko.21.d:0 "The Russian government rejected our offer for Crimea."
 dpr_vitrenko.21.a:0 "Sad…"
 dpr_vitrenko.22.t:0 "Russia sent counter-proposal"
 dpr_vitrenko.22.d:0 "Russia will give us Crimea, but only if we’ll establish our control over whole Ukraine and will be their allies."
 dpr_vitrenko.22.a:0 "Of course we’ll be their allies! That’s a victory!"
 dpr_vitrenko.23.t:0 "Russia gave us Crimea"
 dpr_vitrenko.23.d:0 "Russia accepted our offer. Crimea peninsula is going to us."
 dpr_vitrenko.23.a:0 "Crimea is back to motherland!"
 dpr_vitrenko.24.t:0 "Unification of Ukraine"
 dpr_vitrenko.24.d:0 "No other state stands in our way. We’ve managed to unite all Ukraine, from Lvov to Lugansk, from Kiev to Odesa. Socialism will finally shine with its red glow over our motherland. That’s a victory for us!"
 dpr_vitrenko.24.a:0 "Ura-a-a-a!"
 dpr_vitrenko.25.t:0 "Dealing with Puchkov"
 dpr_vitrenko.25.d:0 "No other powers on ukrainian lands has left. Only Vitrenko and Puchkov are staying on top. We must decide what to do with our alliance."
 dpr_vitrenko.25.a:0 "Offer Puchkov to submit."
 dpr_vitrenko.26.t:0 "Vitrenko’s offer"
 dpr_vitrenko.26.d:0 "Vitrenko offers us to submit under her rule. What should we say?"
 dpr_vitrenko.26.a:0 "We agree."
 dpr_vitrenko.26.b:0 "Hell no!"
 dpr_vitrenko.27.t:0 "Puchkov agreed "
 dpr_vitrenko.27.d:0 "Puchkov agreed to our offer."
 dpr_vitrenko.27.a:0 "Great!"
 dpr_vitrenko.28.t:0 "Puchkov declined"
 dpr_vitrenko.28.d:0 "Puchkov declined our offer."
 dpr_vitrenko.28.a:0 "It’s war then."
 dpr_vitrenko.29.t:0 "Dealing with Puchkov"
 dpr_vitrenko.29.d:0 "No other powers on ukrainian lands has left. Only Vitrenko and Puchkov are staying on top. We must decide what to do with our alliance."
 dpr_vitrenko.29.a:0 "Offer him Novorossiya."
 dpr_vitrenko.30.t:0 "Vitrenko’s offer"
 dpr_vitrenko.30.d:0 "Vitrenko offers us to take charge of Novorossiya."
 dpr_vitrenko.30.a:0 "We are totally made for it!"
 dpr_vitrenko.30.b:0 "May we ask for Ukraine?"
 dpr_vitrenko.31.t:0 "Puchkov asked for Ukraine"
 dpr_vitrenko.31.d:0 "Puchkov asked if we can let him rule over Ukraine."
 dpr_vitrenko.31.a:0 "Agree to that offer"
 dpr_vitrenko.31.b:0 "Madman!"
 dpr_vitrenko.56.t:0 "Puchkov is pleased"
 dpr_vitrenko.56.d:0 "Puchkov agrees to rule over Novorossiya."
 dpr_vitrenko.56.a:0 "Great!"
 dpr_vitrenko.32.t:0 "Dealing with Medvedchuk"
 dpr_vitrenko.32.d:0 "No other powers on ukrainian lands has left. Only Vitrenko and Medvedchuk are staying on top. We must decide what to do with our alliance."
 dpr_vitrenko.32.a:0 "Offer Medvedchuk to submit."
 dpr_vitrenko.33.t:0 "Vitrenko’s offer"
 dpr_vitrenko.33.d:0 "Vitrenko offers us to submit under her rule. What should we say?"
 dpr_vitrenko.33.a:0 "We agree."
 dpr_vitrenko.33.b:0 "Ask her for letting us into her government."
 dpr_vitrenko.33.c:0 "Hell no!"
 dpr_vitrenko.34.t:0 "Medvedchuk agreed "
 dpr_vitrenko.34.d:0 "Medvedchuk agreed to our offer."
 dpr_vitrenko.34.a:0 "Great!"
 dpr_vitrenko.35.t:0 "Medvedchuk asks for his own government"
 dpr_vitrenko.35.d:0 "Medvedchuk agrees to submit, but only if we let him into our government."
 dpr_vitrenko.35.a:0 "It's fine for us."
 dpr_vitrenko.35.b:0 "What does he think of himself?"
 dpr_vitrenko.36.t:0 "Medvedchuk declined"
 dpr_vitrenko.36.d:0 "Medvedchuk declined our offer."
 dpr_vitrenko.36.a:0 "It’s war then."
 dpr_vitrenko.37.t:0 "Dealing with Medvedchuk"
 dpr_vitrenko.37.d:0 "No other powers on ukrainian lands has left. Only Vitrenko and Medvedchuk are staying on top. We must decide what to do with our alliance."
 dpr_vitrenko.37.a:0 "Offer him Novorossiya."
 dpr_vitrenko.38.t:0 "Vitrenko’s offer"
 dpr_vitrenko.38.d:0 "Vitrenko offers us to take charge of Novorossiya."
 dpr_vitrenko.38.a:0 "I guess we can manage it."
 dpr_vitrenko.38.b:0 "What is this woman planning? We are staying in Ukraine!"
 dpr_vitrenko.39.t:0 "Medvedchuk agreed"
 dpr_vitrenko.39.d:0 "Medvedchuk has agreed to rule Novorossiya."
 dpr_vitrenko.39.a:0 "Great!"
 dpr_vitrenko.40.t:0 "Medvedchuk asked for Ukraine"
 dpr_vitrenko.40.d:0 "Medvedchuk asked if we could let him rule over Ukraine."
 dpr_vitrenko.40.a:0 "Agree with him."
 dpr_vitrenko.40.b:0 "Nonsence!"
 dpr_vitrenko.41.t:0 "Proclaim Socialist Ukraine"
 dpr_vitrenko.41.d:0 "We finally made it to that moment. We are proclaiming socialist Ukraine! Ura!"
 dpr_vitrenko.41.a:0 "Ura!"
 dpr_vitrenko.42.t:0 "Novorossiya establishment"
 dpr_vitrenko.42.d:0 "Lands of Novorossiya always were closer to Russia and russian culture. Of course it will prevail there! Now people of Novorossiya will get their own state, and they’ll have to decide what’s good for them."
 dpr_vitrenko.42.a:0 "Establish Novorossiya."
 dpr_vitrenko.43.t:0 "Western Ukraine autonomy"
