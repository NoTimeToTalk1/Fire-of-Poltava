l_english:
 lpr.1.t:0 "New reality of Lugansk"
 lpr.1.d:0 "For more than five years, Lugansk has been fighting for its future, its freedom, and its recognition. This struggle was against the Kiev junta, against the government seized by fascist militarists who wanted to keep their entire population in fear. And they won, almost everywhere, but not in Donbass. We fought them, and we were winning. However, at some point - BOOM. And our old enemy seemed to disappear. Only a small fragment of it - the "armed forces of Ukraine" - remained. Of course, this event cannot but rejoice, as other regions will finally have a chance to escape the shackles of fascist dictatorship, but even though Ukraine as such has essentially disappeared, its troops, the very ones that kept us from uniting with our western Donbass brothers, remained where they were. They have not disappeared, and seem only more committed to our destruction. In the north, the same fascist and pseudo-dictator Avakov seized power in brotherly Kharkov, forcing all its people to submit to the authority of the police under his control, while in the south, our brothers, the Donetsk titans, remained exactly like they were. Russia in the east has not yet lost faith in our combat spirit, faith in our desire to fight and win, and we will not betray their hopes. The enemy is beaten, but still standing, and we have no right to underestimate him, not now."
 lpr.1.a:0 "The Republic will survive, as it has done before!"
 lpr.2.t:0 "Internal Policy of the Republic"
 lpr.2.d:0 "As the external situation has changed, we cannot ignore the changes in the internal situation that must follow. The republic has been in a kind of "hibernation" for quite some time, and it needs to be brought out of it immediately. While our enemies and brothers are arming themselves and preparing for battles, both diplomatic and military, we continue to sit idly by. We must now concentrate on three main areas - maintaining the viability of the economy, reviving our military capabilities, and establishing good diplomatic cooperation with our allies in Donetsk and partners in Russia and elsewhere. All three of these areas require our greatest attention, so let's get to work!"
 lpr.2.a:0 "The time for change has come!"
 lpr.3.t:0 "Unity of Political Elite"
 lpr.3.d:0 "For a long time now, the political space in Lugansk has been divided between two main political forces: the "Peace to Luhanshchina" and the "Lugansk Economic Union" parties, with the Communist Party of the LPR sometimes making an appearance. These forces have existed since the very beginning of the republic's existence and have been competing for the votes of Lugansk residents in the elections to the People's Council and the presidential elections since time immemorial. Rarely cooperating, they are in a natural rivalry that is one of the foundations of the democratic society we are trying to be. However, difficult times are on the horizon. Our political and economic situation leaves much to be desired, while the feud between the country's three main parties continues both in state structures and in the war for votes. In such a situation, it is certainly difficult for anyone to call us an authoritarian society where people and people's choices mean nothing, but we have bigger problems now - a war that is getting closer and closer. The remnants of the Ukrainian army are gathering all their strength and power on our western border, waiting to attack, and if we are not united, we will give them the upper hand. The main political forces in Lugansk must, despite their different views and doctrines, unite in the face of a common enemy, because who needs an election campaign and competition for voters when the state itself is gone?"
 lpr.3.a:0 "For Lugansk, only together!"
 lpr.4.t:0 "Lugansk Army"
 lpr.4.d:0 "The Lugansk People's Militia has become a true symbol of the resilience of the Lugansk people. Having gone through many battles, many defeats and victories, many advances and retreats, much applause from the liberated people and a lot of destroyed villages that republican forces finally managed to reach, they have become real heroes, every single one of them. Our army put up a good fight against the Ukrainian junta in 2014 and the following years, but with the cessation of active hostilities, its sponsorship began to leave much to be desired. Officers who were just beginning to discover their potential at the beginning were able to achieve a lot, as were ordinary soldiers who, because of their bravery and heroism, received national recognition and the highest honours. However, it seems that the People's Militia has not fought its last battle yet. A war, a new war, much more severe and bloody, is on the horizon, and we must prepare for it more than anyone else. The army is the only thing that can protect us, and the stronger it is, the more chances we will have to withstand, repel, and even strike back, but it will also make the rest of our competitors and enemies think twice about whether it is worth risking their lives to have Lugansk soldiers as enemies. We will be ready, and we will put all our hearts and souls into it."
 lpr.4.a:0 "For the motherland!"
 lpr.5.t:0 "Our Ace in Diplomacy"
 lpr.5.d:0 "Vladislav Daynego has been the face of Lugansk diplomacy for more than two years now. This man, despite the fact that you wouldn't think it at first, is a real ace in diplomatic intrigues and issues, and that's why we have to put all our cards on him during diplomatic manoeuvring. We have a lot of things to do with foreign policy that need to be completed immediately, and no one is better suited to do it than Daynego. The traitor Plotnitsky, who still lives on the money stolen from the people of Lugansk somewhere in Russia, continues to breathe and as a result spit in the face of our government every day, while his extradition, trial and execution can greatly help us maintain public confidence in the state. We also need to maintain relationships with our partners in Russia itself, Abkhazia, South Ossetia, Transnistria, and of course Donetsk, and who will do this - right, Daynego. We place all our hopes in him, so let's hope that this badger will not let us down..."
 lpr.5.a:0 "Daynego, come on!"
 lpr.6.t:0 "Donetsk Brothers"
 lpr.6.d:0 "From the very beginning, we had tense relations with our brothers in the south, in Donetsk. Political enmity, rivalry for Russian equipment, controversial economic matters... all this has created and continues to create dozens of small and large conflicts between the leaderships of our republics. However, despite all this, Donetsk and its people are our only ally in the struggle for our survival. Since 2014, we have been fighting shoulder to shoulder against the punishers from the West who have occupied the western parts of our regions and are terrorising the local population, depriving them of their basic human rights. It was with the Donetsk soldiers that Lugansk men fought together in winning and losing battles, advancing and retreating together, developing defence and attack strategies together, and cooperating like no one else has ever done before because the survival of both of us depended on it. We are still in this boat to this day. Just like five years ago, Donetsk and Lugansk are threatened by the Ukrainian army, which has not disappeared even though the authority of the Kiev government has been destroyed. No matter how much we want to, we are in this alone, and we have no right to turn our backs on each other, no matter what may become a wedge in our relations."
 lpr.6.a:0 "We may not be best friends, but we are family!"
 lpr.7.t:0 "Hope from the East"
 lpr.7.d:0 "Back in 2014, Russia was the only country that responded to the call of the people of Donbass for help. They were the only ones who supported us in our struggle against all odds, and it is to them that we owe our existence. Without Russian weapons or equipment, but also without the wise Russian leadership, we would never have achieved the successes that our People's Militia has achieved, and therefore we owe everything we have to our Big Brother. However, a new battle of good and evil, a new battle of the people of Donbass against their oppressors is ahead, and we cannot survive it without the support of Mother Russia, who so kindly took us under her wing these past few years. Without Russian weapons, without Russian equipment, our defeat, no matter how strong our morale and how indomitable our soldiers are, is almost guaranteed, so we can only hope that the leadership of the Russian Federation, which is more than just a brother to us, will agree to provide us with everything we need."
 lpr.7.a:0 "Mother Russia, your nephews need help"
 lpr.8.t:0 "Fate of the Lugansk Oblast"
 lpr.8.d:0 "The Lugansk People's Republic is not about political betrayal and intrigue, it is not about the enmity between bandits, people and government, and it is not about the struggle between Russians and Ukrainians on the territory of the harmless Donbass. The Lugansk People's Republic is about will, about freedom, about the indomitable people's spirit, and about loyalty to the homeland no matter what - that's what our republic is about. Our boys laid down their lives for it 5 years ago, as they have done all the years since, and as they are ready to do now. Our people are exhausted by this unending war, but they have been holding on and will continue to do so as long as it takes because they know who is protecting them and what they will do to achieve this. After much preparation, we can truly say with pride that Lugansk is ready to take on the battle. Our government is united as never before, the economy has received the boost it needs in this difficult time, the army is stronger than ever and has everything it needs to not only hold the line but to go on the offensive and finally end the sufferings of the Donbass. Our allies and partners stand behind us and believe in us, just as we believe in their support. So once again, Lugansk is ready, and hear us, its enemies, you will come against us, you will die on our land, and you will regret ever making that stupid decision!"
 lpr.8.a:0 "Lugansk will stand, no matter what!"
 lpr.9.t:0 "What is Novorossiya?"
 lpr.9.d:0 "Novorossiya is something we have all been fighting for for more than five years. But is it true? By proclaiming the Donetsk and Lugansk People's Republics, the people of the two regions have already gained what they wanted - freedom, independence and the right to choose. But what is Novorossiya then? A federation of similar people's republics? A political concept designed to unite the entire population of the south-eastern regions of the former Ukraine? An alliance of regions of the south and east? What is it? Perhaps the time for Novorossiya has not yet come, and in order to truly know what it is, we must unite Donbass and defeat our eternal enemies, or perhaps we will only waste our chance to rebuild society into something better by devoting ourselves to someone else's concept, the meaning of which we have already forgotten. So again, what is Novorossiya, and do we need it now?"
 lpr.9.a:0 "Vynuzhdayet zadumatsa"
 lpr.10.t:0 "Donbass' Cloudy Future"
 lpr.10.d:0 "No matter how much some politicians in Donbass or in Moscow would like it, Novorossiya as a concept is no longer relevant and appears to be dead. Even though it gave us all the impetus we needed in 2014, uniting us all in the fight for a common goal, over time, Novorossiya has shown itself to be not something that does not work, but rather something that is unnecessary with the creation of separate and independent Donetsk and Lugansk Republics. It is hard to think whether something can replace the dead Novorossiya and whether it is necessary at all, but we are sure of one thing: we are done with Novorossiya, and we cannot let ourselves be dragged into this swamp of unrealistic dreams again, as it won't allow us to leave this time. We will have to think for a long time about our future together with Donetsk, but thinking is not as effective as acting, and while the war is still on the horizon, we must concentrate on this, leaving the future vague and uncertain..."
 lpr.10.a:0 "We will still win"
 
 
 
 LPR_democracy_shirm:0 "Democracy?"
 LPR_democracy_shirm_desc:0 "Unlike our Donetsk counterparts, the Luhansk People's Republic has remained committed to democratic values to a certain extent. Although the democratic system in Luhansk is still young, ineffective and at times quite unstable, the government is doing its best and slowly implementing various reforms to make the country's democratic institutions stronger."
 LPR_democracy_shirm_1:0 "Democracy?"
 LPR_democracy_shirm_1_desc:0 "Unlike our Donetsk counterparts, the Luhansk People's Republic has remained committed to democratic values to a certain extent. Although the democratic system in Luhansk is still young, ineffective and at times quite unstable, the government is doing its best and slowly implementing various reforms to make the country's democratic institutions stronger."
 LPR_democracy_shirm_2:0 "Democracy?"
 LPR_democracy_shirm_2_desc:0 "Unlike our Donetsk counterparts, the Luhansk People's Republic has remained committed to democratic values to a certain extent. Although the democratic system in Luhansk is still young, ineffective and at times quite unstable, the government is doing its best and slowly implementing various reforms to make the country's democratic institutions stronger."
 LPR_FSB:0 "FSB Influence"
 LPR_FSB_desc:0 "Essentially, since the declaration of independence of our republic, the Russian Federal Security Service, or simply FSB, has been able to gain strong influence on our politics and state structures. Using a vast network of agents and contacts all over Lugansk, they recruit, bribe or threaten our politicians to push through decisions that favour them or their superiors, and this cannot continue. To achieve the absolute liberty for which we rose up against the junta back in 2014, we must completely rid ourselves of all foreign influence."
 LPR_rivalry_between_republics:0 "Rivarly Between the Republics"
 LPR_rivalry_between_republics_desc:0 "Despite the common goal of the Lugansk and Donetsk People's Republics to liberate themselves from Kiev's oppression, relations between the two states have long been plagued by internal conflicts and other power verticals within their governments. While the LPR is under the virtual control of Russia's Federal Security Service, which has been exerting influence on its leader - Leonid Pasechnik and other senior officials to strengthen its position, Denis Pushilin, an ally of Vladislav Surkov, has recently taken over in Donetsk. The conflict between these two Russian forces for influence in Donbass has also led to hostility between the republics themselves, despite the seemingly only formal, namely administrative, separation of their peoples. The situation is further complicated by the ambitions of the DPR government itself, which continues to promote the idea of the unity of Novorossiya while its Lugansk counterparts have begun to distance themselves from this concept, not least because of instructions from "above". Such disputes are a significant drain on the overall defence capability of both states and need to be resolved, no matter whose truth and whose worldview prevails, as there will be no one left to argue about anything if the situation continues."
 LPR_second_fiddle:0 "Playing the Second Fiddle"
 LPR_second_fiddle_desc:0 "To keep the economies of the new republics afloat and prevent their bankruptcy, Russia spends about 4 billion rubles annually on both republics. Most of this money goes to the Donetsk People's Republic, which is considered to be more economically developed than Luhansk. This "Donetsk favouritism" has created a sense of hostility among Luhansk elites. There is no doubt that this will continue to deepen the rift between the two unrecognised states."
 LPR_joint_development_plan:0 "Joint Development Plan"
 LPR_joint_development_plan_desc:0 "TBD"
 
 
 
 LPR_evaluate_new_realities:0 "Evaluate New Realities"
 LPR_evaluate_new_realities_desc:0 "The tyrannical fascist regime of Ukraine has fallen. The dream of millions of people has come true. But the results of this triumph of freedom, at least for us, have not been the best. Despite the fact that Ukraine as a failed state has ceased to exist, its army has not disappeared, and it continues not only to terrorise the citizens of western Donbass but also to prepare for war with us. In the north, the remnants of the despotic regime have organised a police state that also wants our destruction, and our Donetsk allies are in dire straits after all they have been through. What are we supposed to do now?"
 LPR_its_time_for_change_in_state_policies:0 "It's Time for Changes in State Policies"
 LPR_its_time_for_change_in_state_policies_desc:0 "With all the changes and events around us, we must adapt to the new realities in which our Republic finds itself. For too long we have ignored some problems and done unnecessary things, and now we must fix everything as soon as possible."
 LPR_we_have_a_democracy_right:0 "We have a Democracy, Right?"
 LPR_we_have_a_democracy_right_desc:0 "No matter what anyone says or claims, the democratic system is fully operational in Lugansk, unlike Donetsk or Ukraine. We have a large number of political parties and organisations, all independent and with their own programmes, that want to serve the people, and a relatively good electoral system, where no evidence of fraud has been found so far. You see, even the European Union has never dreamed of such a thing!"
 LPR_agreement_with_the_opposition:0 "Agreement With the Opposition"
 LPR_agreement_with_the_opposition_desc:0 "Even though the opposition movements are hostile to each other, we all want the same thing - to serve the good of the republic and its people. Of course, the ruling party must always be in charge, but the opposition forces have many capable people, and our country cannot afford internecine strife at this time. We need to unite, not divide!"
 LPR_short_term_economic_development_plan:0 "Short-Term Economic Development Plan"
 LPR_short_term_economic_development_plan_desc:0 "There are many excellent economists among opposition politicians, and this is a fact. Our republic is... not in the best position in terms of the economy, but since we have to be prepared for anything, this problem must be solved immediately. We have to gather the best economists in the country and develop a short-term economic strategy that will raise the capacity of our country to support itself."
 LPR_we_are_nothing_without_the_army:0 "We are Nothing Without the Army"
 LPR_we_are_nothing_without_the_army_desc:0 "The army is one of the main components of the state. Without the army, the state is not taken seriously, without the army, the country has no opportunity to promote its interests in the international arena, so in short, if you don't have an army, you are nobody. The People's Militia of the Republic has existed for many years, and it has bravely defended its citizens and fought for our values, but its current state is by no means ideal. We need to improve conditions in the ranks of our military and be ready for anything."
 LPR_check_all_warehouses_and_niches:0 "Check All Warehouses and Niches"
 LPR_check_all_warehouses_and_niches_desc:0 "In preparing for the tough battles for survival, we must use all possible resources. There are still many warehouses with weapons, ammunition and even machinery in the country, and only a fool would not try to find these invaluable in our case things. Let's get to work, slobs! Search every inch!"
 LPR_self_sufficiency_programme:0 "Self-Sufficiency Programme"
 LPR_self_sufficiency_programme_desc:0 "With all this preparation, we cannot forget about the one thing without which any Kalash or tank is simply useless - ammunition. Of course, we still have some stocks, and Russia will definitely provide us with some, but we have to start producing them on a large scale ourselves to avoid running into shortages in the future."
 LPR_prepare_people_for_the_inevitable:0 "Prepare People for the Inevitable"
 LPR_prepare_people_for_the_inevitable_desc:0 "The population of the frontline regions knows what war is all too well, but the inhabitants of the rear probably do not. The last war for independence is approaching, and we must continue to prepare the militia for battle and the population for hard times. We will hold parades, start training students to assemble and disassemble rifles, expand mobilisation, and do everything necessary for the survival of the republic, but first, we need to prepare people's minds for it."
 LPR_let_deynego_come_up_with_something:0 "Let Deynego Come Up With Something"
 LPR_let_deynego_come_up_with_something_desc:0 "Vladislav Daynego, our Minister of Foreign Affairs, is a very skilful diplomat who defends the interests of our republic in the international arena in every possible way. In order to improve our status in the world, we must give him carte blanche to conduct negotiations and take any other diplomatic actions he deems necessary."
 LPR_about_relations_with_donetsk:0 "About Relations With Donetsk"
 LPR_about_relations_with_donetsk_desc:0 "Our relations with our southern brothers have always been... ambiguous. We have had waves of brotherly love when we fought the fascist invasion side by side, as well as conflicts over trade and other trivial matters. We may not be the best of friends, but we are family, and that cannot be changed."
 LPR_beg_matushka_for_help:0 "Beg Matushka for Help"
 LPR_beg_matushka_for_help_desc:0 "Since the very beginning of our independence, the Russian Federation has been helping us with everything it could, but the time has come when we have to beg them for more. An older brother has never abandoned his younger siblings in difficult times, but the darkest moments are coming when our struggle will surely be in vain without Russian help..."
 LPR_what_is_novorossiya:0 "What is Novorossiya?"
 LPR_what_is_novorossiya_desc:0 "Novorossiya is an idea that has raised us all to fight for our own identity, independent of the Ukrainian fascists. However, we have not often asked ourselves what exactly Novorossiya is: A state? A nation? Is it a liberating idea behind independent republics or a unitary country? And do we need it now that we have our own people's republic?"
 LPR_with_lugansk_in_grief_and_joy:0 "With Lugansk in Grief and Joy"
 LPR_with_lugansk_in_grief_and_joy_desc:0 "Since the uprising of the people of Lugansk for their freedom and the establishment of the independent and free Lugansk People's Republic, we have been constantly at war or in terrible internal political conditions. The people's desire to be free has only resulted in ruined lives and broken destinies. But if this is what we had to sacrifice for the freedom and prosperity of future generations, then we must make these sacrifices again and again. Lugansk will be free, whether you bloodthirsty bitches like it or not!"
 LPR_our_only_hope:0 "Our Only Hope"
 LPR_our_only_hope_desc:0 "Despite the loss of its relevance and the deterioration of our relations with our Donetsk brothers, Novorossiya is the only hope for our survival and future. We were born from this idea, and we will continue to live, not survive, from it. Long live Novorossiya!"
 LPR_something_that_needs_rethinking:0 "Something That Needs Rethinking"
 LPR_something_that_needs_rethinking_desc:0 "Despite the initial impetus given to us by the concept of Novorossiya, in the current environment, it has become just a fairy tale for fools. Novorossiya was not a stillborn, but the Donetsk government made it so. Their corrupt and chauvinistic system wants to swallow us up and drag us into the same swamp, but we will not go down that easily. Donbas will be free, but for real, not like Ukraine was " freed" in 2014."
 