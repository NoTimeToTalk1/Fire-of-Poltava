dan.26.a:0 "Ok."
dan.27.t:0 "Labour mobilisation"
dan.27.d:0 "We are mobilising all concerned residents of Donbas to fix the infrastructure."
dan.27.a:0 "Ok."
dan.28.t:0 "Another morning in the mud"
dan.28.d:0 ""This is a simple mining mission."\n\nMessage blared from a loudspeaker at the small Petrovsky mine in the city of Donetsk, waking most of its miners. Sluggish workers gradually emerged from their cardboard houses, hastily built in this short interwar period. Although they looked tired, their image gradually changed to a more lively one.\nThese workers had already been through a lot. Warm memories of the USSR, ambiguous memories of Ukraine, hungry and cold memories of the DNR, then of the Provisional Government, and now Danilov had come to power. It didn't say anything to the workers, they just want to feed themselves and their families. If, of course, they still alive.\n\n"Your workforce is about to get bigger. New workers inbound"\n\nThe loudspeaker repeats again.\n\n"We're sending you in deep, so be on your guard. Scanners indicate particularly rich veins of coal further down. Bring it back, boys.""
dan.28.a:0 "Rock and Stone!"
dan.29.t:0 "Subsidies for education"
dan.29.d:0 "Give money to the schools"
dan.29.a:0 "Ok."
dan.30.t:0 "Security Council meeting"
dan.30.d:0 "After defeating the separatists in the region, Oleksiy Danilov, who became the head of the Donbas administration, made an important decision at a meeting of the National Security and Defence Council. This event was marked by serious discussions and difficult choices.\nDuring the meeting, Danilov made a completely innovative proposal that was the subject of heated debate. He suggested that the focus should be on bringing stability to the region and economic recovery by temporarily increasing Donbas' autonomy from the central government of Ukraine, which is currently in chaos. This sparked heated discussions and debate among the NSDC members, as opinions were divided.\nHowever, after an in-depth analysis of the situation, discussions with experts and taking into account the opinions of different parties, Danilov took responsibility and made a decision. The NSDC's position was to temporarily grant Donbas a certain degree of autonomy to allow the region to rebuild its economy, infrastructure and social order. However, this autonomy was to be maintained within the borders of an independent Ukraine until the country was reunited.\nThis bet led to controversial reactions. Some viewed it as an important step in coexistence, while others saw it as a demonstration of weakness. Time has shown, however, that this decision was an important step towards rebuilding the region and strengthening the unity of Ukraine."
dan.30.a:0 "Ok."
dan.31.t:0 "Pushilin is dead"
dan.31.d:0 "Pushilin is dead.\n\nToday collapsed outside Murmansk Street 85 in Rostov and died shortly thereafter. A medical examination established that the cause of his death was poisoning by cyanide gas.\n\nHow did it happen?\n\nSome months before Security Service of Ukraine recruited an agent, whose name we will not mention. Pushilin was leaving the market and he was unguarded. Our agent prepared his unique weapon. The weapon was loaded with ampoules with a solution of potassium cyanide. Pushilin went to his house when suddenly he was shot in the back of the head two times. When people noticed him in a difficult condition he was suffocating and could no longer say anything. He died on the way to the hospital.\n\nMission accomplished. So it will be with everyone traitor of Ukraine."
dan.31.a:0 "§GThere's one less separatist to worry about.§!"
dan.32.t:0 "Pushilin survive"
dan.32.d:0 "Pushilin survived.\nToday on the Murmansk 85 Street people heard scream.\nSome months before Security Service of Ukraine recruited an agent, whose name we will not mention. Pushilin was leaving the market and he was unguarded. Our agent prepared his unique weapon. The weapon was loaded with ampoules with a solution of potassium cyanide. But gun misfired. Pushilin saw the agent and began to call for help his bodyguards. The whole operation was thwarted, and our agents went out of town, and now hiding from the police neat Petrovka village. It is necessary to organize a rescue operation.\n\nWe lost many time and money in vain. We need to develop a new plan and study our mistakes. "
dan.32.a:0 "§RDamn.§!"
dan.33.t:0 "Pasechnik is dead"
dan.33.d:0 "Shortly before the AFU took full control of Donbas, Leonid Pasechnik realized that if he did not flee, he would be tried and executed, which is why he quickly fled to Russia along with other traitors to the state.\n\nAfter his escape, he thought that he would be given privileges and work for the state, after all, he was the head of the People's Republic. But this did not happen, he was taken to Mukhosransk and thrown out. He had to look for housing and work on his own. After a few days, he managed to get a job as a mechanic at a service station a few kilometers from his home. Between his home and the service station was a nice park, but dark at night.\n\nOne day, he was a little late for work, so he returned late at night. It was dark in the park and there were no people on the street. He walked deeper and deeper into the park, feeling with each step that something was wrong. Suddenly, a dark silhouette emerged from the darkness, and a few seconds later, a gunshot rang out. That was the last thing he saw."
dan.33.a:0 "§GMr. Pasechnik? Mr. Danilov sends his regards§!"
dan.34.t:0 "Pasechnik survive"
dan.34.d:0 "Shortly before the AFU took full control of Donbas, Leonid Pasechnik realized that if he did not flee, he would be tried and executed, which is why he quickly fled to Russia along with other traitors to the state.\n\nAfter his escape, he thought that he would be given privileges and work for the state, after all, he was the head of the People's Republic. But this did not happen, he was taken to Mukhosransk and thrown out. He had to look for housing and work on his own. After a few days, he managed to get a job as a mechanic at a service station a few kilometers from his home. Between his home and the service station was a nice park, but dark at night.\n\nOne day, he was returning from work. It was quite dark in the park and there were very few people on the streets. He thought about it as he walked deeper and deeper into the park. Suddenly, a dark silhouette emerged from the darkness, and a few seconds later, a gunshot rang out. This is the last thing he remembers... but he woke up in the hospital, and was told that he was lucky, and the bullet passed tangentially, not hitting any important organs."
dan.34.a:0 "§ROur agents need fucking better aim.§!"
dan.35.t:0 "Gubarev is dead"
dan.35.d:0 "Pavel Gubarev, one of the ideologists and creators of the "Donetsk People's Republic" and a traitor to Ukraine, behaved like a true "fearless fighter for freedom" during the Ukrainian army's offensive against the separatists' positions - fled to Russia, although he was not alone.\n\nHaving escaped from Ukrainian justice, Gubarev decided to not waste time and return to what he considered himself a master at - ultra-nationalist preaching and organising criminal gangs. This time, Rostov-on-Don became the capital of his ambitions. Local gullible and not the smartest people began to come to Gubarev's sermons, which he held every Saturday evening in the building of the cafe "Russkaya Slava". He even managed to form a band out of some of the parishioners, who sometimes even engaged in inter-street robberies. But the fact that Gubarev was still breathing was a stain on the reputation of the Ukrainian people, and this had to be changed.\n\nOn the orders of the elected head of the Luhansk and Donetsk regions, Oleksiy Danilov, a small sabotage group was sent to Rostov to eliminate Gubarev. The agents came to the conclusion that the best and most demonstrative way would be to kill the terrorist in front of his own audience during one of his traditional speeches. Anyone could have come to the speech, as he always welcomed new listeners, given the meagre number of hearers, but it was decided to prepare everything without witnesses. The operatives chose to embed a homemade bomb in the wall on which the flag of the so-called "Donetsk People's Republic" was being hung during the performance. Day after day for a week, the sabotage team hid in the building until it closed, after which they quietly carried out mining operations.\n\nAnd now, it's ten o'clock on a Saturday evening, and Gubarev, with the flag of his "republic" behind him, is reading fairy tales about his exploits during the fight for Donetsk in 2014. The agents, whose names will not be mentioned for reasons of state security, were also present in the audience and were waiting for the best moment. Gubarev suddenly coughed and asked one of his bodyguards for water. After drinking, he coughed again and said: "Yes, what was I talking about?". Immediately after the last word, the bomb detonated, tearing his back to shreds and throwing the remains of his body into the audience, which began to panic.\n\nAnd so, another terrorist and traitor to Ukraine said goodbye to his life, and he will be neither the first nor the last, but will only add to the long list of his kind."
dan.35.a:0 "§GWell, let's celebrate, shall we?§!"
dan.36.t:0 "Gubarev survive"
dan.36.d:0 "Pavel Gubarev, one of the ideologists and creators of the "Donetsk People's Republic" and a traitor to Ukraine, behaved like a true "fearless fighter for freedom" during the Ukrainian army's offensive against the separatists' positions - fled to Russia, although he was not alone.\nHaving escaped from Ukrainian justice, Gubarev decided to not waste time and return to what he considered himself a master at - ultra-nationalist preaching and organising criminal gangs. This time, Rostov-on-Don became the capital of his ambitions. Local gullible and not the smartest people began to come to Gubarev's sermons, which he held every Saturday evening in the building of the cafe "Russkaya Slava". He even managed to form a band out of some of the parishioners, who sometimes even engaged in inter-street robberies. But the fact that Gubarev was still breathing was a stain on the reputation of the Ukrainian people, and this had to be changed.\nOn the orders of the elected head of the Luhansk and Donetsk regions, Oleksiy Danilov, a small sabotage group was sent to Rostov to eliminate Gubarev. The agents came to the conclusion that the best and most demonstrative way would be to kill the terrorist in front of his own audience during one of his traditional speeches. Anyone could have come to the speech, as he always welcomed new listeners, given the meagre number of hearers, but it was decided to prepare everything without witnesses. The operatives chose to embed a homemade bomb in the wall on which the flag of the so-called "Donetsk People's Republic" was being hung during the performance. Day after day for a week, the sabotage team hid in the building until it closed, after which they quietly carried out mining operations.\nAnd now, on Saturday evening, the agents were standing in front of the door of the establishment. They went inside without any problems and waited for Gubarev himself to appear. Today he arrived late, but it seemed that this would not affect the operation anyway. Gubarev was already telling the gullible public stories about how he hid children in basements in 2014 when the AFU "brutally and inhumanely shelled civilian districts". During his speech, he suddenly started walking around the room, which he had never done before, and this made the operatives nervous. They had to find a moment when he was standing as close to the explosive device as possible, but unfortunately, he kept as far away from it as he could. The bomb option failed, and now it was either to leave the area or improvise. One of the agents could not accept defeat and quietly pulled out his gun. Taking a deep breath, he pointed it at Gubarev and fired, shouting " Goddamn you bastard!".\nUnfortunately, the bullet only grazed Gubarev's left ear, and he immediately ran to hide behind the tables. The agents panicked and started to run for the exit, but were shot at by members of Gubarev's street gang. Two of the three were killed, the last one managed to escape, and the group was ordered to return to the territory of Ukraine immediately. The operation failed."
dan.36.a:0 "§R Couldn't he have just taken better aim and shouted less?!§!"
dan.37.t:0 "Girkin is dead"
dan.37.d:0 "Girkin was at a prestigious club near the city center in Moscow. Lucky for him, Putin hasn’t put a “black mark” on him, while he failed to make a magic move in Donbas. Not a bad life, eh?\nHe had a meeting with some of his people and a couple of war correspondents he trusted. Meeting of a closed kind, where nobody other than invited persons, except the personnel of the club, could get access to.\nAlcohol was looming all over the place. Attendants were consuming vodka bottle by bottle. One of Girkin’s friend asked him: “Igoryusha, that’s what you dreamt about, being in that shithole?”, to which he answered “There’s so much sorrow in my heart, but really, I wished for that ease so-o-o fucking long!”.\nA waitress came inside the room. She held plates with delicious rich food, but most of the people in the room saw her more delicious with their drunk eyes. Also she had a small box with a name tag “To Igor Ivanovich”.\nShe placed food onto a table, and approached Girkin. With a shy voice, she started talking to him.\n“Igor Ivanovich?”, she asked.\n“Yes, I’m listening, sweetie”, he answered.\n“I wanted to bring you… A present. You see, my family and I appreciate you a lot, so it’s from our family…”\nWaitress put a small box from a plate closer to Girkin.\n“Oh, I’m sorry, I need to get more orders…”\n“That’s alright, girl. What would my wife tell me, if I’d say “Let’s stay longer”, huh?”\nThat joke of his made the crowd laugh, and waitress left their room.\n“Let’s see what’s the present…”, Girkin said. He opened the box, as he saw a charge of explosives inside. He started to shout, but explosives were faster than him."
dan.37.a:0 "§GDog ended up like his buddies-separatists.§!"
dan.38.t:0 "Girkin survive"
dan.38.d:0 "Girkin was at a prestigious club near the city center in Moscow. Lucky for him, Putin hasn’t put a “black mark” on him, while he failed to make a magic move in Donbas. Not a bad life, eh?\nHe had a meeting with some of his people and a couple of war correspondents he trusted. Meeting of a closed kind, where nobody other than invited persons, except the personnel of the club, could get access to.\nAlcohol was looming all over the place. Attendants were consuming vodka bottle by bottle. One of Girkin’s friend asked him: “Igoryusha, that’s what you dreamt about, being in that shithole?”, to which he answered “There’s so much sorrow in my heart, but really, I wished for that ease so-o-o fucking long!”.\nA waitress came inside the room. She held plates with delicious rich food, but most of the people in the room saw her more delicious with their drunk eyes. Also she had a small box with a name tag “To Igor Ivanovich”.\nShe placed food onto a table, and approached Girkin. With a shy voice, she started talking to him.\n“Igor Ivanovich?”, she asked.\n“Yes, I’m listening, sweetie”, he answered.\n“I wanted to bring you… A present. You see, my family and I appreciate you a lot, so it’s from our family…”\nWaitress put a small box from a plate closer to Girkin.\n“Oh, I’m sorry, I need to get more orders…”\n“That’s alright, girl. What would my wife tell me, if I’d say “Let’s stay longer”, huh?”\nThat joke of his made the crowd laugh, and waitress left their room.\n“Let’s see what’s the present…”, Girkin said. He opened the box, as he saw a charge of explosives inside. They haven’t detonated, and Girkin could easily have a stroke.\n“Security! Catch that fucking bitch! Don’t let her get away!”, he shouted in rage.\nWaitress had been caught by the guards, and Girkin came right in front of her. “Drop her in my car”, he said. “You’ll have to answer some questions.”."
dan.38.a:0 "§RWe should look for another explosives specialist.§!"
dan.39.t:0 "Tsaryov is dead"
dan.39.d:0 "After the victory of the Armed Forces of Ukraine over the terrorist forces of the so-called "LDPR", which were Russian proxies aimed at promoting its imperialism, many traitors to Ukraine were able to escape without having to face the punishment of national justice.\nOne of the most striking examples of these events was Oleg Tsaryov, perhaps the most famous traitor to the Ukrainian state and one of the leaders of the terrorist group called the "Donetsk People's Republic". After leaving Ukrainian territory, Tsaryov, having considerable experience in journalism and having received protection and guarantees from the Russian government, got a job as a moderator of the Russian state propaganda channel " Rossiya-24".\nWith the title of "veteran of the Russian Spring", as the Russians called the beginning of the Russian armed invasion of Ukrainian territory, he immediately became one of the most popular personalities on Russian television, but while Tsaryov was building a new career, Ukrainian special services were preparing a plan to eliminate him. A sabotage group sent to Russian territory was ordered to eliminate the traitor, preferably in public. And the opportunity arose.\n\nTsaryov was invited to the "60 Minutes" TV programme on Rossiya-1, where he was to discuss the current situation in the Ukrainian Donbas with the hosts Popov and Skabeeva. The talk show was filmed with the audience in the studio, which allowed the sabotage group to infiltrate the show. The plan was as follows: after purchasing tickets and entering the hall, the operative, along with a hidden firearm, needed to wait for the most provocative question in his subjective opinion, and after Tsaryov's answer, while in the crowd, make a deadly shot.\n\nThe operation was clearly planned, and the day of its execution came. Everything went as planned: Tsaryov began to talk to the other hosts about the "occupation of native Russian lands" and the "Nazi government destroying Donbas activists". Finally, when he heard the question "Do you think the punitive Nazi authorities will get what they deserve?", the operative prepared to fire a shot. Tsaryov replied: "Well, I am a supporter of the statement that in the end, every scum will get what they deserve, so yes, I think fate will take revenge on them." After the last word, the agent pulled the trigger, shooting Tsaryov in his throat. Panic broke out in the room, other presenters started shouting "Someone call an ambulance!" while Tsaryov was convulsing on the floor, lying in a pool of his own blood. Due to the chaos in the hall, the agent was able to approach the back entrance unnoticed, whose security guards ran to the stage to provide Tsaryov with first aid, which would not have saved him anyway, and quietly left the execution site.\n\nAnother traitor to Ukraine said goodbye to his life, but this time on the screens of every Russian."
dan.39.a:0 "§If only every TV programme had such an interesting and unexpected ending.§!"
dan.40.t:0 "Tsaryov survive"
dan.40.d:0 "zroz"
dan.40.a:0 "§Rshto§!"

