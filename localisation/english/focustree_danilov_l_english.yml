AFU_borders_2_decision:0 "Strengthen the nothern border"
AFU_borders_2_decision_desc:0 "We have been attacked by Russia before, we must not do it again. To that end, we will start strengthening our borders."
AFU_borders_1_decision:0 "Strengthen the southern border"
AFU_borders_1_decision_desc:0 "We have been attacked by Russia before, we must not do it again. To that end, we will start strengthening our borders."
AFU_mariupol_port_1_decision:0 "Renovate the Mariupol port"
AFU_mariupol_port_1_decision_desc:0 "Mariupol Commercial Sea Port is a port on the coast of the Sea of Azov, one of the five largest ports in Ukraine. Its restoration will be a sure victory for our government."
