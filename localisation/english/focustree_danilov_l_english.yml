kill_pushilin_desc:0 "Denys Volodymyrovych Pushylin (born 9 May 1981, Makiivka) is a Ukrainian collaborator with Russia, the second leader of the terrorist quasi-state formation "Donetsk People's Republic" since 20 November 2018, after the assassination of the first leader, Oleksandr Zakharchenko, on 31 August 2018. Chairman of the DPR "people's council" (2015-2018). Acting leader of the 'Donetsk people's republic' since 4 October 2022. After the defeat of the DPR, he allegedly fled to Rostov Oblast, where he formed the DPR government in exile.\n§RThe traitor must be eliminated.§!"
