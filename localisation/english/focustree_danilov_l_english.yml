kill_girkin_desc:0 "Igor Vsevolodovich Girkin, alias. Igor (Ivanovich) Strelkov, also Sergey Viktorovich Runov; born 17 December 1970, Moscow) is a Russian terrorist, military officer, war criminal, blogger, White Movement ideologue, writer, retired Russian Armed Forces officer, former FSB colonel. Participant of the Russian war against Ukraine in Crimea, Donbas and during the 2022 invasion on the side of Russia, as well as a number of other wars: in Transnistria (Moldova), Bosnia, Ichkeria. The leader of the Novorossiya terrorist group since 2014, head of the 25 January Committee. Former leader of the terrorist pro-Russian military group 'People's Militia of Donbas'.After the Russian intervention in Crimea, Girkin led a sabotage unit, organised a gathering of Crimean deputies to call an illegal referendum, and commanded the storming of a photogrammetric centre in Simferopol. In April 2014, he and his unit crossed the border of Ukraine in Donetsk region and led the capture of Sloviansk, thus starting hostilities in Donbas. He became the first "Minister of Defence" of the puppet DPR (16.05.2014-14.08.2014), the commander-in-chief of the "Army of Novorossiya". He moved back to Russia.\n§RThe terrorist must be eliminated.§!"
