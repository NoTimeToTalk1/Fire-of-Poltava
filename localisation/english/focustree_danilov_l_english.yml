kill_pasechnik_3_desc:0 "Leonid Ivanovich Pasichnyk (born 15 March 1970, Voroshilovgrad) is a former Ukrainian military officer, SBU officer (1993-2013), SBU colonel, Ukrainian collaborator with Russia. Leader, political and military figure of the Luhansk People's Republic terrorist group since November 2017, second after Igor Plotnitsky, whom he overthrew. From 9 October 2014, he headed the "Ministry of State Security of the LPR". After defecting to the side of pro-Russian forces, he was promoted to the rank of major general. After the defeat of the separatists, he fled to Russia.\n§RThe traitor must be eliminated.§!"
