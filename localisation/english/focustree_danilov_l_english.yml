kill_gubarev_desc:0 "Pavel Yuriyovych Gubarev (born 10 March 1983, Sievierodonetsk) is a Ukrainian collaborator with Russia, separatist, entrepreneur, political and public figure of the DPR terrorist group. Participant in pro-Russian protests in Ukraine in 2014. One of the leaders of the Novorossiya terrorist group, a terrorist. In his youth, he was a member of the neo-fascist organisation 'Russian National Unity'. In March 2014, with the beginning of Russian aggression against Ukraine, he was proclaimed "people's governor" of Donetsk region at a rally and campaigned for the accession of Donetsk region to Russia. After the defeat of the separatists, he fled to Russia.\n§RThe traitor must be eliminated.§!"
