AFU_ukrainianisation_1_decision:0 "Ukrainianisation of the regions"
AFU_ukrainianisation_1_decision_desc:0 "We have prepared our population and will now move to decisive measures of Ukrainianisation. "
AFU_school_reopening_1_decision:0 "Reopenning of schools"
AFU_school_reopening_1_decision_desc:0 "Many schools in the region have been closed and we need to make sure that they start working again."
AFU_patriotism_support_4_decision:0 "Final victory over pro-Russian elements"
AFU_patriotism_support_4_decision_desc:0 "After we have brought the truth to the people of Donetsk and Luhansk region, they will no longer have positive feelings towards Russia. Never again."
AFU_patriotism_support_1_decision:0 "Glorify our heroes"
AFU_patriotism_support_1_decision_desc:0 "Our victory is the combined effort of many departments, squads and organisations. All of them should go down in history as heroes of Ukraine."
AFU_patriotism_support_3_decision:0 "Publicising our successes"
AFU_patriotism_support_3_decision_desc:0 "We have done a lot of work in the region and now it will be a big plus in our political career."
AFU_patriotism_support_2_decision:0 "Discrediting traitors"
AFU_patriotism_support_2_decision_desc:0 "The dirty separatists have collapsed and their vacuum of propaganda for the residents of Donetsk and Luhansk oblasts has finally been destroyed. Now we can bring them real information."
AFU_steal_gumanitarka_decision:0 "Steal humanitarian aid"
AFU_steal_gumanitarka_decision_desc:0 "Steal humanitarian aid"
AFU_support_veterans_1_decision:0 "Support veterans"
AFU_support_veterans_1_decision_desc:0 "The Veterans Support Programme provides several benefits for combatants and their families."
AFU_support_veterans_2_decision:0 "Integration of veterans into society"
AFU_support_veterans_2_decision_desc:0 "Our efforts should focus as much as possible on helping veterans integrate back into society."
AFU_support_veterans_3_decision:0 "Issue housing for military personnel"
AFU_support_veterans_3_decision_desc:0 "As many residents of Donetsk and Luhansk oblasts fled the region, many parts of the cities became deserted. We can fix this problem by repopulating them with military personnel and their families"
danilov_hunting:0 "Hunting for Rats"
danilov_hunting_desc:0 "After the defeat of the separatists in Donbass, many of them went to rot in prisons. Not all of them, however. Some managed to escape to Russia and there began to live a simple good life, forgetting about their sins before Ukraine and its people. We must not allow this to happen, everyone must pay with their lives.\n\n§3The death of the separatists will enhance our reputation.§!\n\nRemember that if the operation §Rfails§!, there will be §Rno second chance§! to kill this person."
