kill_tsaryov_1_desc:0 "Oleg Anatoliyovych Tsaryov (2 June 1970, Dnipro) is a former Ukrainian businessman, collaborator with Russia, pro-Russian politician, separatist. He is hiding in Russia from the investigation.\nMember of the Verkhovna Rada of Ukraine of the IV-VII convocations, member of the Party of Regions faction (since December 2012), member of the Committee on Agrarian Policy and Land Relations (since December 2012); member of the political council of the Party of Regions. Candidate for the post of President of Ukraine at the early elections on 25 May 2014 (withdrew his candidacy). He has been repeatedly criticised for Ukrainophobia and separatism, and is on the national criminal wanted list.\nOn 26 June 2014, he was elected "speaker of the parliament" of the so-called Novorossiya, a union of the Russian-controlled DPR and LPR groups, which the Prosecutor General's Office of Ukraine classifies as terrorist. It is related to the "Committee for the Salvation of Ukraine", established in Moscow on 3 August 2015 by former high-ranking Ukrainian officials of the Yanukovych presidency.\n§RThe traitor must be eliminated.§!"
