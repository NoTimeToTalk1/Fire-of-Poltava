AFU_subsidies_for_educational_institutions:0 "Subsidies for Educational Institutions"
AFU_subsidies_for_educational_institutions_desc:0 "This strategic focus entails the allocation of financial resources towards bolstering educational establishments, ranging from primary schools to advanced research universities. The intended outcome of this endeavor is two-fold: first, to provide access to quality education for a broader segment of the population, thereby empowering citizens with knowledge and skills essential for personal and societal growth; second, to fuel innovation and progress by fostering an environment conducive to research, creativity, and intellectual exploration."
AFU_state_security_strategy:0 "State Security Strategy"
AFU_state_security_strategy_desc:0 "In order to ensure the continued integrity and inviolability of our region, as well as the security of our citizens, we need to develop our own strategy for maintaining this security. Borders, streets, wastelands - we have to protect them all. It is our duty to think through and work out everything to the smallest detail, and we will fulfil it."
AFU_danilov:0 "Danilov"
AFU_danilov_desc:0 "Following the elections in the fully free Donbas, Oleksiy Danilov, a native of the Luhansk region and a loyal Ukrainian politician, won a majority of votes and solemnly assumed the title of head of the Donbas administration. His campaign promised a complete economic, environmental, military and social reconstruction of the region, and with the resources this God-blessed land has to offer, it is indeed possible. Congratulations to Mr Danilov on his fair victory!"
AFU_we_are_not_alone:0 "We are Not Alone"
AFU_we_are_not_alone_desc:0 "To navigate the intricate web of challenges that lay ahead, the imperative of forging alliances becomes paramount. In response, a strategic alignment has been established with none other than Rinat Akhmetov, a figure of influence and significance."
AFU_the_only_ones_fighting_for_a_common_goal:0 "The Only Ones Fighting For a Common Goal"
AFU_the_only_ones_fighting_for_a_common_goal_desc:0 "As external forces and internal ambitions weave their intricate dance, our alliance shines as a testament to a joint pursuit that transcends individual aims."
AFU_align_with_the_legetimists:0 "Align with the Legetimists"
AFU_align_with_the_legetimists_desc:0 "In connection with our oath to Ukraine, we are subordinate to the Kyiv authorities headed by Volodymyr Zelensky."
AFU_trust_the_old_faces:0 "Trust the Old Faces"
AFU_trust_the_old_faces_desc:0 "We should not trust these "new faces". It is better to choose the side of a proven candidate - Petro Poroshenko."
AFU_new_minister_of_economy:0 "New Minister of Economy"
AFU_new_minister_of_economy_desc:0 "We will offer Rinat Akhmetov a position in our state - Minister of Economy."
AFU_industrial_redistribution:0 "Industrial Redistribution"
AFU_industrial_redistribution_desc:0 "As a compromise, our government will start redistributing the industry in the region to allow new entrepreneurs to develop."
AFU_our_statecorporate_monopoly:0 "Our State-Corporate Monopoly"
AFU_our_statecorporate_monopoly_desc:0 "The establishment of a state-corporate alliance represents a calculated gambit to amalgamate government oversight with corporate efficiency. Through such an alliance, we will seeks to control vital sectors, ensuring both steady economic growth and adherence to national interests."
AFU_rehabilitation_of_the_population:0 "Rehabilitation of the Population"
AFU_rehabilitation_of_the_population_desc:0 "Recognizing the profound societal scars left by past events, a comprehensive rehabilitation initiative is launched. This is a holistic approach, encompassing medical, psychological, and socio-economic support, aiming to rejuvenate the spirit and well-being of the citizenry."
AFU_legacy_of_ato:0 "Legacy of ATO"
AFU_legacy_of_ato_desc:0 "The enduring impact of the Anti-Terrorist Operation has left an indelible mark on the nation's psyche. Commemorating its legacy not only honors the sacrifices made but also serves as a unifying national narrative, underpinning the resilience and spirit of the country."
AFU_support_veterans:0 "Support Veterans"
AFU_support_veterans_desc:0 "A robust initiative to support veterans is unveiled, aiming to recognize their service and facilitate their reintegration into civilian life. This encompasses vocational training, mental health support, and ensuring their well-being in a post-conflict society."
AFU_request_humanitarian_aid:0 "Request Humanitarian Aid"
AFU_request_humanitarian_aid_desc:0 "Given the scale of challenges faced, reaching out for international humanitarian assistance becomes imperative. This move underscores the urgency of the situation and also emphasizes the interconnectedness of the global community in times of crisis."
AFU_borders_under_control:0 "Borders Under Control"
AFU_borders_under_control_desc:0 "In response to the imperatives of national security, the government has initiated a comprehensive strategy to ensure the vigilant protection of the country's borders."
AFU_keep_the_army_in_shape:0 "Keep the Army in Shape"
AFU_keep_the_army_in_shape_desc:0 "This initiative, which demonstrates an unwavering commitment to Ukraine's security, is aimed at maintaining the readiness and effectiveness of our armed forces. Investing in regular exercises, modernising equipment and fostering a culture of discipline keeps the armed forces ready to defend national interests at a moment's notice."
AFU_system_of_counterpropaganda:0 "System of Counter-Propaganda"
AFU_system_of_counterpropaganda_desc:0 "Confronting the challenges posed by disinformation and misleading narratives, the government is taking proactive steps to establish a robust counter-propaganda mechanism. By engaging in transparent communication, promoting media literacy, and disseminating verified information, the nation seeks to empower its citizens to discern truth from fiction, ultimately strengthening social cohesion and fostering a well-informed society."
AFU_hunting_for_rats:0 "Hunting for rats"
AFU_hunting_for_rats_desc:0 "Although we have carried out extensive filtering methods to deal with separatists and traitors, many have fled the region. We must catch them and punish them."
AFU_neveragain:0 "Never Again!"
AFU_neveragain_desc:0 "Guided by the lessons of history, this national sentiment signifies a collective determination to prevent the repetition of past mistakes."
AFU_enterprise_support_program:0 "Enterprise Support Program"
AFU_enterprise_support_program_desc:0 "Recognizing the pivotal role of businesses in economic growth, the government is introducing a comprehensive enterprise support program. Through targeted financial incentives, streamlined regulations, and access to resources, the program aims to stimulate entrepreneurship, boost innovation, and empower local industries. By nurturing a conducive environment for enterprises to thrive, the government seeks to generate economic opportunities and strengthen the nation's economic backbone."
AFU_policy_of_gentle_ukrainization:0 "Policy of Gentle Ukrainization"
AFU_policy_of_gentle_ukrainization_desc:0 "Embracing the cultural diversity within the nation, the government is adopting a policy of Gentle Ukrainization. This approach respects linguistic and cultural differences while promoting the Ukrainian language and heritage. By encouraging inclusive dialogue and cultural exchange, the policy seeks to foster unity and identity, ensuring that all citizens have the opportunity to engage with the nation's shared values."
AFU_restoration_of_the_scientific_field:0 "Restoration of the Scientific Field"
AFU_restoration_of_the_scientific_field_desc:0 "Acknowledging the importance of scientific advancement, the government is embarking on an initiative to revitalize the scientific field."
AFU_way_to_energy_independence:0 "Way to Energy Independence"
AFU_way_to_energy_independence_desc:0 "In an effort to ensure energy security, the state is charting a strategic course towards energy independence. This multifaceted initiative involves diversifying energy sources, investing in renewable energy projects, and implementing environmentally friendly practices to reduce our dependence on Russia."
AFU_reform_of_the_tax_system:0 "Reform of the Tax System"
AFU_reform_of_the_tax_system_desc:0 "To ensure fiscal responsibility and fairness, the government is initiating a comprehensive reform of the tax system. This effort entails streamlining tax regulations, closing loopholes, and ensuring a balanced distribution of tax burdens."
AFU_big_repair:0 "Great Renovation"
AFU_big_repair_desc:0 "Donbas is a region with a great industrial past and present. Most of its inheritance came from the fortunes of the dead Soviet Union, but it ceased to exist three decades ago, and the region's industry stopped receiving the innovation it had become accustomed to over the years. If we want to help the region's industry, we need to start a process of complete renovation of everything. From poultry farms to steel mills."
AFU_we_will_find_a_job_for_everyone:0 "We Will Find a Job for Everyone"
AFU_we_will_find_a_job_for_everyone_desc:0 "With a commitment to inclusive economic growth, the government is implementing an ambitious initiative to ensure meaningful employment opportunities for all citizens. "
AFU_explorations_of_donbas_mines:0 "Explorations of Donbas Mines"
AFU_explorations_of_donbas_mines_desc:0 "With an eye on responsible resource management, the government is launching explorations of the Donbas mines."
AFU_preparing_for_the_unification:0 "Preparing for the Unification"
AFU_preparing_for_the_unification_desc:0 "At this point, it is incumbent upon us to begin preparations for the unification of our country."
AFU_attack_on_kharkiv:0 "Attack on Kharkiv"
AFU_attack_on_kharkiv_desc:0 "1"
AFU_subdue_dnipro:0 "Subdue Dnipro"
AFU_subdue_dnipro_desc:0 "1"
AFU_integration_of_new_territories:0 "Integration of New Territories"
AFU_integration_of_new_territories_desc:0 "1"
