dan.20.t:0 "Never again"
dan.20.d:0 "We will not allow a repetition of this war, we will not allow the spread of Rashism on our territory again"
dan.20.a:0 "Death to russians."
dan.21.t:0 "Enterprise Support Program"
dan.21.d:0 "Head of the Provisional Government of Eastern Ukraine, Danilov was determined to restore the region's economy. The closed-door session was a secret meeting of power, a symposium of political minds intent on determining the fate of the region.\nDanilov's voice, seated at a table flooded with the muted light of secret intentions, cut through the silence like a blade:\n"Gentlemen, we are in dire straits. Our land bears scars, and our people are hungry. We have two goals at this time, to rebuild the ruins of this region, and to strengthen the grip in the hearts of the people.""
dan.21.a:0 "Ok."
dan.22.t:0 "Policy of Gentle Ukrainization"
dan.22.d:0 "Since new reforms came to power in Donbas, change has affected every corner of the region, including educational institutions. In Donetsk school, the corridors echoed with both whispers of hope and trepidation.\nOne sunny morning, as students bustled between classes, there was a commotion outside the teacher's room. An elderly woman with a hunched back and weathered features stood at the entrance, clutching a worn leather bag in her hands. This was no ordinary woman, but a real Russian language teacher who had not fled after the DNR's defeat, Ekaterina Ivanovna.\nThere were rumours that changes were coming, that some subjects would be rethought in the new times. When babushka Ekaterina entered the teaching room, her keen eye stopped on the agenda spread out on the principal's desk. In it was printed in brightly coloured lettering an announcement that the subject "Russian language" would no longer be taught.\nBabushka Catherine was overcome with indignation. Her voice, full of experience and passion, echoed down the corridor: "What kind of madness is this? You have no right! You can't forbid us to learn our own language!"\nBoth faculty and students froze, mesmerised by the spectacle unfolding before them. Ekaterina Ivanovna, whose voice had become thunderous, continued: "Isn't language a part of culture? Culture is beyond politics! Russian language is the language of Pushkin, Lermontov. It is the thread that binds us to our past!"\nThe director emerged from the hall, remaining calm, with a facial expression that combined respect and firmness. "Mrs. Catherine, times have changed. We have switched to a broader educational perspective."\nBut babushka was not going to be silent. Her hands clenched into fists and her voice rang with defiance, "A broader perspective, you say? You are depriving us of our language, our heritage, and for what? To satisfy the whims of some new-fangled programme, some Banderaites? Everything was better when Yanukovych!""
dan.22.a:0 "Perhaps in time she will realise the benefits....."
dan.23.t:0 "New national research"
