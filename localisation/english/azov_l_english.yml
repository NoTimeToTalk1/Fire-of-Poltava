AFU_azov_paganisation_1:0 "Paganisation"
AFU_azov_paganisation_1_desc:0 "Paganism is not the unstable concept of philosophical positions and beliefs of different people. It is a religion. The true religion of warriors. For centuries we were forced to believe in "god" and "Jesus" who was a Jewish liar. Their "religion"  has been rotten. They invite globalist scum to their "churches" and say that deviations and other multiculturalist madness are normal in our life. They want to destroy the white man. "Christianity" - only a tool of a multiculturalist international Jewry.\n\nOnly with the spirit of our greatest patron, the God of sky, thunder and storm Perun, and other real Slavic Gods, our patrons, we will win this fight against anti-tradition and degradation."
AFU_azov_paganisation_2:0 "Paganisation"
