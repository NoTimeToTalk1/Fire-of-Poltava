AFU_azov_huge_resistance:0 "Huge Resistance"
AFU_azov_huge_resistance_desc:0 "After the ultra-right came to power, many residents of Donbas did not recognise the new authorities. Their protest was expressed in a variety of ways, from fleeing to Russia to sabbotaging the little surviving infrastructure and industry. The Azov government will have to do its best to harness the people."
AFU_azov_keeping_up_morale:0 "Keeping Up Morale"
AFU_azov_keeping_up_morale_desc:0 "In times of trial and adversity, maintaining high morale is essential for individuals and communities to live successfully and overcome obstacles. Morale is a mental and emotional state of well-being and enthusiasm that affects a person's attitude, determination and resilience. The Ukrainian people have endured much grief and suffering. Many empires wiped their boots on Ukrainians, took away Ukrainian bread, killed intellectuals and bright personalities. But this is all in the past... Ukrainians will no longer tolerate the yoke on their neck. The Azov Army is preparing for its decisive rush to finally free Ukraine from enemies, oligarchs, liberals and other rubbish. "
AFU_azov_freedonbass:0 ""Free Donbass""
AFU_azov_freedonbass_desc:0 "In order to protect its positions, the Azov government organised the radio and TV channel "Free Donbas" for the purpose of ideological processing and brainwashing of the population."
AFU_azov_harbourforthefarright:0 "Harbour for the Far-Right"
AFU_azov_harbourforthefarright_desc:0 "Azov invited dozens of ultra-right-wingers to join him, from philosophers and intellectuals to mere terrorists, maniacs and criminals."
