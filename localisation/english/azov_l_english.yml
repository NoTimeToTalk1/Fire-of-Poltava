azov.3.t:0 "Just another day in Azov"
azov.3.d:0 "My friend Totenkopf and I were returning from the front, from a morning operation. At the landing two of the lost dnrov's did not want to surrender, or rather, they raised their hands too suspiciously, for which we cut them down and shot them, these rusaks squealing like pigs, choking on blood.\nIt turned out that there were still bereaved in the landing, who like a herd of frightened chechens huddled together in a heap in a rubbish pit, and were even afraid to stick their heads out in our direction. However, one old chechenoid, covered in prison partaks and wearing medals for urine and faeces retention, probably a veteran of the anti-system struggle, tried to shout something like "moscow is the capital", but my friend Totenkopf threw a 7.62 zinc straight into his ass, and then we beat him with butts for a long time, until he changed his racial identity, going from swarthy to blue as the fucking Caspian Sea.\nWhen our charitable mission had come to an end, the rest of the pidors started running around in chaos on the landing, each time viciously drawing fire from my PKM, and me and my friend Totenkopf went quietly to the loading point, picking up the chevrons from the shoulders of the second world army along the way. Glory to Ukraine!"
