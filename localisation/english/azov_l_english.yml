azov.54.t:0 "Darkest Hour"
azov.54.d:0 ""The plan for the creation of the European Union is being implemented rapidly. The air and TV channels are filled with cheap TV series, Americanized pop, and frantic rhythms that can cause mass psychosis. All this primitivizes young people, turns them away from national culture and traditions, and makes the cultural heritage of previous generations unnecessary, even though they are sublime.\n\nWho needs the destruction of the national cultures of European nations? Who needs to tear people away from their national roots? Who wants to make the European continent average, non-national, where only material and physical needs reign? Who is interested in a frank demonstration of sexual perversions that kill a person's spiritual nature?\n\nThe process of civilization has led people away from the animal and given them a sense of shame. Now this achievement of civilization is being destroyed and returned to the animal-natural state. What, this in itself happens for the simple commercial gain of making money by selling degeneracy?\n\nThis could be believed if this were the only way to destroy the thousand-year-old achievement of European civilization, and when we see a complex of different methods aimed at the same thing, the spontaneous commercial explanation is clearly not satisfactory. Some forces do this consciously and in a planned way. They largely fill the natural process of globalization with their anti-human content and use it to subjugate the countries of European civilization to their global mafia."\n\n-From the work of Levko Lukianenko, "Civilizational Choice""
azov.54.a:0 "God, save us all from this madness."
azov.55.t:0 "United in blood"
azov.55.d:0 "In the fire, iron is melted into steel, in the struggle the people are transformed into a nation.\n\nAnd our nation won, the battle for existence and extinction ended with our final and total victory. The power of resistance of our nation has grown so tremendously since the times of reunification of Ukraine that it can no longer be compared with the earlier epoch of weakness.\n\nWe lost our best sons and daughters not only in the bloody battlefields but also in the cold prisons of globalists scum, that occupied Ukraine for one century since the beginning of Bolshevik rule. But our people's will to live independently will not be destroyed either by any enemy prisons or exiles, because Ukraine is an unconquered bastion of heroes and fighters. We've proven this to the World, they are scared of our revenge.\n\nSome shadowy enemy forces thought, that they could destroy alternative thought, if they threw its carriers on minefields, under shells, and enemy bullets. if throw them rot in prisons, cripple them physically and morally.\n\nThey didn't understand one thing - our ideas are §Rimmortal§!. \n\nThe death of the best of us will not stop our victory. And these thousands, who gave their lives in battle not even for Ukraine, but for our common dreams and personal convictions - they are close to us, just we don't see them.\n\nThe death of the best didn't stop our victory. It will only make our revenge more brutal.\n\nWarriors can't be enslaved.\n\nAnd our people, who deserved their place in the sun from the San to the Caucasus will move towards the future in which there will be no place either for the exploitation of man by man, or for national oppression, or for the suppression of free thought, in which Ukrainian people will be a free master on their land and according to their own will. \n\n§RAs long the great battle for Europa continues, in the great world drama of our day, we have a choice: either to be the creators or the victims of history.§!"
azov.55.a:0 "Immortal Will."
azov.56.t:0 "Second battle for Europa. 2019-?"
azov.56.d:0 "When we look back, we have only one feeling... This a huge regret...\nRegret that our ancestors have not succeeded, that they were not able to create this European world that would have been the master of the universe forever, which would have provided to the white race, in the first place. The great domination of mind...\n\nAnd when we see what there is before us, what an eighty years of victory of the others have done... This anarchy in the world, this collapsing of the white race, this desertion throughout the universe.\n\nWhen we see in our countries the breakdown of morals, the fall of the homeland, the fall of the family, the collapse of social orders. When we see the appetite for material goods, which has replaced the great flame of the ideal that animated us...\n\nWell, really, between the two... We chose the right side.\n\nThe little wretch of Europe today, with this common tinpot market, can not give happiness to mankind. The consumer society is rotting humanity instead of elevating it...\n\nSo the rest of us at least, are dreaming of something marvellous. And we have only the desire, that this spirit could be reborn.\nAnd with all our strength, until the last moments of our lives, we will fight for this...\nFor what was a fight of ancestors and their martyrdom, shall be one day..."
azov.56.a:0 "The ressurrection!"
azov.57.t:0 "Eternal enemy of White Europa"
azov.57.d:0 "We haven't tackled just harmless problems, but also dangerous problems. We haven't acted against the Jewish wasp's nest, not for fear of world Jewry.\nWe've swept the Jews out of public life!\nThey can't talk anymore in the name of the Ukrainian people on the stages, in the movies or in the newspapers. They no longer have the right to represent the Ukrainian Nation.\n\nWhen looking among our enemies. Wherever one looks one sees Jew after Jew.\nJews are behind presidents of the United States in their brain trust.\nJews are behind English prime ministers as their prompters.\nThey are the rabble-rousers behind the entire English-American-Russian press!\nJews hidden in the dark corners of the Kremlin are the real bearers of Neo-Bolshevism.\n\nThe International Jew is the mortar that holds the enemy coalition together against us. With his world-spanning connections, he builds the bridges between Moscow, London, and Washington...\n\nWe are facing the most dangerous enemy in the world. The war is his doing he directs it from the shadows.\nBut he is not unbeatable!\nWe have fought against this Jewish terrorist idea of world conquest inside our Ukraine for years under the most unfavorable circumstances. Just as we defeated him within Ukraine, we will break his power which now threatens us from abroad!\n\nOn behalf of the people to which you belong, and on behalf of the Nation, whom you also serve,\nGlory to Ukraine!"
azov.57.a:0 "Glory to Europa!"

azov_paganization_decisions:0 "Paganisation"
azov_paganization_decisions_desc:0 "The roots of the Slavic neo-pagan movement in the post-Soviet countries lie in the circles of dissidents like Alexei Dobrovolsky (Dobroslav) - among whom it once became a form of ideological protest against the communist regime. It was then that nativism took on a nationalist tone. In the last decades of the 20th century, pagan religion was restored in Ukraine. The most famous scholars who contributed to the study and spread of paganism in Ukraine are Volodymyr Shayan and Lev Silenko, and the doctrine was called "ridnovir`ya" or "native belief".\nWhen the Azov battalion was formed, and later a regiment, many followers of neo-paganism joined it. They performed their own rituals, glorified the ancient gods, and this filled their souls and helped them keep their morale for the sake of Ukraine.\nAnd now that we have chosen the path of returning to our native faith, we will restore the status of neo-paganism and return the glory to the gods who blessed us with this battle!\n\n§OProgress of Paganisation:§! [AFUAzovPagaisationLoc]"
azov_paganization_decisions_1:0 "Restore the kapishche at the Urzuf base"
azov_paganization_decisions_1_desc:0 "At the base of Urzuf once was one of the most important sanctuaries of the Azov regiment - the kapishche of Perun. Due to the active phase of the war with separatists, the kapishche was abandoned. We should restore it."
