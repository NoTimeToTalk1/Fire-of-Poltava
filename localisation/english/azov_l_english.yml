azov_church_politics_decisions:0 "Church politics"
azov_church_politics_decisions_desc:0 "§OThe Orthodox Church of Ukraine§! and the §RUkrainian Orthodox Church of the Moscow Patriarchate§! are two religious groups in Ukraine that have different status and recognition both nationally and on a worldwide scale.\nThe §OOCU§! emerged as a result of the §4Tomos of Autocephaly§! issued by the Patriarchate of Constantinople in January 2019. The §OOCU§! then became an independent church, separating from the Moscow Patriarchate, and this step was important for the Ukrainian nation as it freed the church from dependence on centuries of §RRussian influence.§! The §RUOC-MP§! remained loyal to the Moscow Patriarchate and did not recognise the §4Tomos of autocephaly.§! This church has a significant following in Ukrainian society, especially among pro-Russian supporters and those who wish to maintain traditional ties with Russia - in short, §Rtraitors.§! This dispute between the §OOCU§! and the §RUOC-MP§! is not only religious, but also political and national, as both churches have their own views on relations with Ukraine, Russia and other countries.\n\nElimination process of §RUOC-MP:§! §R[?AFU.AFU_demuscovitisation_church_v|0%]§!\nInfluence of §OOCU:§! §4[AFUPCUInfluenceLoc]§!"
