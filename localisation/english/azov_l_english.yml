azov.30.t:0 "Trial upon thieves"
azov.30.d:0 "Donetsk court today was occupied with great interest and big amount of people. Today the greatest criminal process in Ukraine by far should start.\n\nThe trial should proceed the cases of various people, who had great influence over left bank of Ukraine and gained an abhorrently amount of money from Ukraine. There were such famous names as Rynat Akhmetov, Ihor Kolomoyskyy, Borys Kolesnikov and many, many others, who robbed ukrainians and ukrainian industry.\n\nAn expert group of judges was reviewing the case of every person who got judged, but judging from how short was the review of every case, the results of trials should be obvious to many.\n\nIn between trials, Rynat and Ihor were talking with one another. "Yeah, fuck this shit, pulled me in some bullshit", said Ihor. "We should have left this fucking ruin right after those new maidaneers overthrown Poltava administration", Rynat continued. "What do you think they'll do to us? I'm a jew, you're a tatar, maybe some of this shitty world organisations will be concerned", Ihor asked, to what Rynat answered "Why would it matter? There are also pure ukrops. And... Isn't it obvious, what a group of militarized fanatic nazis will do to us, who won this fucking life getting money of lochs? It's over for us!"\n\nFor three decades straight, the people who got on trialed bench were involved into corruption. They took away people's businesses with such methods as paying right people to leave businesses' owners without nothing, leaving owners as their own puppets or even involving harsh forces, like a bunch of people with fists or with guns. They created many schemes of getting illegal wealth with money laundering or judges on their sides in court. They bought and closed our industries, vital for Ukraine economy. They ruled over our country with robbing ukrainians for themselves.\n\nThe whole day passed, and for every oligarch judges made the same verdict:"
azov.30.a:0 "§R"Death sentence."§!"

