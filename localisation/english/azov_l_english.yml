azov.1.t:0 "National revolution in Donbas"
azov.1.d:0 "Hard times create strong people, or at least make it clear who is truly loyal to their nation.\nAfter the glorious victory of the Ukrainian knights over the forces of evil and terror that had dug in on the eastern borders of Donbas, General Kryvonos decided that all the problems that the people were suffering from, which the authorities had previously ignored and continued to turn a blind eye to, could be solved through "democratic" elections of the head of government. However, everyone knew that the so-called "candidates" were just puppets or henchmen of the oligarchs who stood behind them and who were in charge of the whole process. The victory of any of these "democrats" would have ended up returning us to what brought us here - a new oligarchic domination accompanied by covert tyranny.\nHowever, this time, we - Azov, decided not to stand aside and prevent bandits and traitors of the nation from ruling over our people. The elections, whose results ultimately led to the same outcome, had to be stopped, and we took this measure. It doesn't matter what people say about us, because our conscience is clear. The Ukrainian people deserve justice, and we will bring it to them. Hear us, proud Ukrainian people! Today is the day when your most faithful sons put an end to the old rotten order and gave birth to a new one!"
azov.1.a:0 "Azov can be our only saviour!"
azov.2.t:0 "Fight for Azov"
azov.2.d:0 "GUYS, TODAY I WAS WALKING AROUND DONETS'K AND SAW A LIBERAL WEARING A "MAKE LOVE NOT WAR" HOODIE WITH AN LGBTQ BADGE, SO I JUMPED UP AND SHARPLY FUCKED HIM IN THE CHEEKS WITH A CHOPPER AND SHOUTED "WAR UNTILL VICTORY" WITH ALL MY MIGHT, BECAUSE I WAS SATURATED WITH THE IDEA OF NATION IN THE SERVICE, GUYS, THE SPIRIT OF THE OLD SCHOOL LIVES IN THE AZOV UNITS, WHERE THEY FUCK IN HARDCORE, WHERE GUYS LIVE AS FIGHTERS, PIDDIES AND EAT STATUTES IN THEIR MOUTHS! ONLY AZOV, 3 BRIGADE, KRAKEN, LOVART, ONLY HARDCORE !!! UNITY ULTRAHARDCORN AZOV !!! guys fuck Russians, liberals, pacifists, have fun in platoons, love your unit, valkyrie, vozhd and non-stop energy !!! SPEAK OPENLY AND BOLDLY TO THE FACE !!! I LOVE THE AZOV MOVEMENT!!!"
