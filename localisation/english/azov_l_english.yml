azov_cum_into_power:0 "§OUnbreakable, unconquerable, unstoppable!§!"

AFU_old_slavic_traditions:0 "Old Slavic Traditions"
AFU_old_slavic_traditions_desc:0 "Though the true traditions of our proud ancestors have largely been forgotten or replaced with the Orthodox blasphemy, there is still hope. From now on, we will embark on a path of completely reviving the pagan traditions and rituals of our ancient land, no matter how long it may take us to actually make them stick with the populace."
afu_secureourposition:0 "Secure Our Position"
afu_secureourposition_desc:0 "By establishing our own control over Donbas, we inadvertently triggered an administrative crisis. People who have neither faith nor loyalty to us are still sitting not only in city and village councils, but also in the highest government institutions, and we cannot leave this situation in this state. We need to strengthen our positions wherever we can to ensure the stability of the government, which will bring peace and glory to Ukraine."
afu_ruleofthefarright:0 "Rule of the Far Right"
afu_ruleofthefarright_desc:0 "The so-called "democratic elections" have become a new breeding ground for the corruption and betrayal that we have been fighting against all these years, but as we can see, there are no signs of results. Candidates bought by local oligarchs would have destroyed everything that we, the Ukrainian army, had worked so hard to restore after the separatist rule in the region. That was the last straw. We are tired of watching a stupid vicious cycle in which faithful sons of Ukraine die for the future of their country and people, while politicians return the old order upon their bodies. It's time to do it ourselves!"
afu_bolsterourranks:0 "Bolster Our Ranks"
afu_bolsterourranks_desc:0 "In our situation, we can only rely on ourselves. There is only one problem - there are not enough of us. "Azov" is undoubtedly a glorious and numerous regiment, but despite this, we are still not enough. To maintain order and stability, as well as to provide the state with more elite forces, we will launch a new recruitment campaign to enlist truly dedicated, strong in spirit and body conscripts who will help us reunite our people and country."
afu_upholdthevictoriousspirit:0 "Uphold the Victorious Spirit"
afu_upholdthevictoriousspirit_desc:0 "We won! We can't even believe we did it! Seeing the catastrophe that would have come if the "elections" had continued, we decided not to wait on the sidelines, watching what we fought so hard for come back and take the lives of the best of us, but to take things into our own hands. And it was the only right decision. Our victory here showed that we cannot be beaten. Any attempts by our enemies will be in vain because we have unquestionable faith in the success of our actions and ideas from now on and forever!"
afu_destroythesovietheritage:0 "Destroy the Soviet Heritage"
afu_destroythesovietheritage_desc:0 "Post-Sovietness is the main basis on which hostile narratives about the "one people" and "Russian Donbass" have been and still are based. It is the ignoring of this factor that has led to all the disasters that our country has experienced since regaining its independence, and it is time to put an end to it. Too much Ukrainian blood has already been shed because of this nonsense, and we have no right to repeat the mistakes of our predecessors."
afu_reshapingthementality:0 "Reshaping the Mentality"
afu_reshapingthementality_desc:0 "The only way to fully complete decommunisation and desovietisation is to form a new Ukrainian generation. Having been under Russian and Soviet influence for almost a century, most locals have forgotten who they really are, becoming typical "homo sovieticus". By failing to replace the local curriculum with the Ukrainian one in all aspects, we will simultaneously launch a new wave of struggle against the totalitarian occupation past and bury it."
afu_beheadthehydra:0 "Behead the Hydra"
afu_beheadthehydra_desc:0 "Although we are military men, not all of the army is on our side. The Armed Forces were recruited not on the basis of their views, but on their skills or perseverance, which also led to the entry of left-wing and liberal-minded individuals into the Ukrainian military. And it is these elements that are now becoming the fifth column in our rear. In their view, we are usurpers, radicals who want to rule with an iron fist and do not know mercy or liberty. They are now our main internal enemy, and we need to get rid of them, otherwise the Armed Forces will come to an end."
afu_freedonbas:0 ""Free Donbas""
afu_freedonbas_desc:0 "Television is a powerful thing. With their television channels, oligarchs and Russian puppets have been feeding the population their ridiculous fairytales for years, but as it is said, "A lie repeated a thousand times becomes the truth." To inform citizens about the truth, and not about the lies that benefit local bandits, we need to create government television. This will guarantee to increase our support and reduce the influence of all sorts of paid shitheads."
afu_calltobattlethemostreliableones:0 "Call to Battle the Most Reliable Ones"
afu_calltobattlethemostreliableones_desc:0 "1"
afu_holdthebannerhigh:0 "Hold the Banner High"
afu_holdthebannerhigh_desc:0 "As leaders of right-wing nationalist ideas, we are de facto outcasts among all others, to whom our views are distant, outdated, or even hostile. But despite this, we have no right to give up and abandon the people who need us. Even if we were completely alone in our struggle, we would not dare to lower our banners, we would not dare to stop singing the marches of our glorious ancestors, but most importantly, we would not dare to lay down our arms in the face of the enemy!"
AFU_nationalist_kharkiv:0 "Nationalist Kharkiv"
AFU_nationalist_kharkiv_desc:0 "1"
AFU_march_on_the_kharkiv:0 "March on the Kharkiv"
AFU_march_on_the_kharkiv_desc:0 "Kharkiv is the city of corruption, money. City of oligarchs and their puppets. They are not our brothers and we must purificate town from the rot. We are gathering troops to Kharkiv, begin the making of the plan!"
AFU_azov_above_all:0 "Azov Above All"
AFU_azov_above_all_desc:0 "1"
AFU_negotatiations_with_ideological_brothers:0 "Negotatiations with Ideological Brothers"
AFU_negotatiations_with_ideological_brothers_desc:0 "1"
AFU_fractricidal_war:0 "Fractricidal War"
AFU_fractricidal_war_desc:0 "1"
AFU_successful_unification:0 "Successful Unification"
AFU_successful_unification_desc:0 "1"
AFU_invite_local_loyalists_to_azov:0 "Invite Local Loyalists to Azov"
AFU_invite_local_loyalists_to_azov_desc:0 "Freikorp created in July 2017 by  Hryhoriy Tarasenko. They took place in Anti-Terrorist Operation in Donetsk region. But now ukrainian patriors are in the shadow of police state. We need to contact them. Friekorp can help us in the future liberation of Kharkiv."
AFU_infrastructural_raids:0 "Infrastructural Raids"
AFU_infrastructural_raids_desc:0 "Kharkiv oblast is one of the most industrialized region in country. Our enemies can use their deadly potential in future against us, we must paralize them very quickly. Or war with Kharkiv will end us not wery well."
AFU_form_the_future_military_administration:0 "Form the Future Military Administration"
AFU_form_the_future_military_administration_desc:0 "Kharkiv need a power that can deal with all hypocrites in oblast. Our old and reliable friends from Friekorp will help us to esrablish new order in region. "
AFU_blow_up_their_railways:0 "Blow Up Their Railways"
AFU_blow_up_their_railways_desc:0 "Not forget about railway junctions. Logistic of enemy must be destroyed. We must prepare our invasion to the smallest detail."
AFU_crushing_blow:0 "Crushing Blow"
AFU_crushing_blow_desc:0 "We are ready for our first battle. And golden banner of Azov soon will be evolve in Kharkiv. Eastern Ukraine will be our bastion of new order, order, that will crush all our enemies in our country and whole world. Liberation of Ukraine awaits us!"
afu_consolidateourposition:0 "Consolidate Our Position"
afu_consolidateourposition_desc:0 "Having consolidated our positions in the army, administrative structures, television, and most importantly, in people's hearts, nothing else can stop us. The people believe in us, in the correctness of our ideas, and we, in turn, believe in them, in their endless courage and loyalty. Together, we are an invincible engine of change that is guaranteed to lead our people and country to great feats in the future."
AFU_zrodylysmyvelykoihodyny:0 "Zrodylys' My Velykoi Hodyny"
AFU_zrodylysmyvelykoihodyny_desc:0 "It seems, our generals has played politics too much in our little country when we have so much work. Conditions on our land are critical as well. So we take the situation under our control. Our boys will not allow to turn the state into a field of political intrigues. We live and fight for the Ukrainian people, we fight for the existence of our nation."
AFU_forthenationalukraine:0 "For the National Ukraine..."
AFU_forthenationalukraine_desc:0 "Our great fight continues. \nAzov took power in the state, and now we need to outline our future struggles. \nRight, we must establish order in Motherland. The resurrection of Ukraine is our main goal. Dreams of Melnyk, Bandera, and Dontsov will come true. We will fight for our place under the sun until the dead."
AFU_andwhiteeuropa:0 "...And White Europa"
AFU_andwhiteeuropa_desc:0 "But... We need to go towards a bigger goal. Sure, among the rot in european society live people that undertand us and our ideals. Our battle aganist left-liberal scum will continue in other european countries.Degenerative era of pacifism is end at last. White Europa from Lisabon to Ural is our best option."
AFU_connection_with_ultras:0 "Connection With Ultras"
AFU_connection_with_ultras_desc:0 "Football fans also called "ultras" are very belligerent and dedicated people. They can fight for their country as devotedly as for their football clubs in ultras fights. There are a lot of people of far-right political views among them and a lot of them fought against Russia in 2014. We might get in contact with them and persuade them to join the ranks of Azov."
AFU_the_russian_question:0 "The Russian Question"
AFU_the_russian_question_desc:0 "The Russian Federation began war in 2014 and occupied Crimea and Donbas. But our war lasted for 300 years starting from Hetmanate's times, when cossacks turned guns against Moscow tsars.\nToday Russia is a multicultural Neo-Soviet empire, Putin dreams of restoring order in post-soviet space and destroying us as a state and nation. But, some people from Russia can help us. Many right-wing men fought for Ukraine. Putin's empire is an ideological enemy of them. We should decide Russian question right now."
AFU_luhansk_conference:0 "Luhansk Conference"
AFU_luhansk_conference_desc:0 "Slavs are white warriors of Europa. We will help Russian right-wing organizations to liberate their Homeland from the Neo-Soviet occupation, that lasts for 100 years. We invite Russian far-rights to Luhansk to discuss future plans for cooperation in all spheres. They will get a home... Very soon."
AFU_farright_european_fighters:0 "Far-right European Fighters"
AFU_farright_european_fighters_desc:0 "Fighters We need help from all of Europe. From Polish "Freedom and Order", German National-Democratic party, french "National Front" greek "Golden Dawn" and our other European friends, that will fight with us for a brave new world. It's time to forget and forgive our resentments in the past, only in unity is our strength. The battle for Europa continues. We will win now, or never."
AFU_our_brothers_from_the_new_world:0 "Our Brothers From the New World"
AFU_our_brothers_from_the_new_world_desc:0 "Our comrades from the numerous destroyed by CIA organizations can find their home in the new right-wing Ukraine. They will fight for the future of our and their fatherland and for the white race.\nThe battle of white people against Asian neo-bolsheviks in the East will continue until the full destruction of the Mongol horde. After it we will help them to set the white rule in the American continent because white pride is worldwide.\nWe need just once and forever to learn one rule for ourselves: It's either us or them."
AFU_last_fight_against_globalists:0 "Last Fight Against Globalists"
AFU_last_fight_against_globalists_desc:0 "Ukraine is a new bastion of the new world order. The white revolution will start in the heart of the Europa. \nBut we must go forward.There is much to be done.\nWe will strike first. Now or never."
AFU_the_white_revolution_will_start_here:0 "The White Revolution Will Start Here"
AFU_the_white_revolution_will_start_here_desc:0 "It will happen HERE. \nNo matter how cynical it may sound, the collapse of Ukraine helps us to achieve our plans right now. When all far-right organizations in Europe and America can't do anything with their euro-Marxist bastards in Berlin, Paris, and London, we liberate our homeland with guns on our hands. All left-liberals will answer to European nations for their decomposition from within \nOur sword of justice is now raised over Ukraine. And it will be raised over Europa. Very soon."
AFU_we_have_no_busineness_with_mongoloids:0 "We Have No Busineness With Mongoloids"
AFU_we_have_no_busineness_with_mongoloids_desc:0 "Russian scum will be our enemy forever. Our fight with horde will continue until full destruction of their "culture" and "people" in European continent. We will avenge om them for their humiliation of our nation.\nIt is our duty to drive them beyond the Ural mountain. And remember, good muscovite is only dead muscovite.\nEither we are theirs, or they are us."
AFU_invite_russian_farrights:0 "Invite Russian Far-Rights"
AFU_invite_russian_farrights_desc:0 "Welcome to the Ukrainian State!\nWe invite our Russian brother in our country to fight against the enemies of white Europa. They all will be trained by our best officers in camps. In the future, we need to form new regiments of russians and belarusians in our army. "
AFU_for_freedom_of_ours_and_yours:0 "For Freedom of Ours and Yours"
AFU_for_freedom_of_ours_and_yours_desc:0 "When Ukraine rises from the ashes...We with our friends from the Russian Volunteer Corps will plan something large-scale. A new Russian state will appear on the world map. We are sure of it."
AFU_itsnotaboutviews:0 "It's Not About Views"
AFU_itsnotaboutviews_desc:0 "We don't care about their political views. They are useless in our situation and not worth our attention. \nThey are too naive and think like children, there is no longer any "Slav brotherhood". \nUkrainians will achieve our goals on our own, white people don't need the help of mongoloids."
AFU_remember_the_words_of_ideologues:0 "Remember the Words of Ideologues"
AFU_remember_the_words_of_ideologues_desc:0 "We will follow the teachings of our heroes of the Ukrainian nation. \nThey were right, and we will continue to follow their ideas.\nA Russian or, more simply, moskal or Muscovite, no matter who he is ideologically cant live without a lie. The lie is a universal instrument of moskals to enslave other peoples in Europe.\nOnly Ukrainian nation can deal with this plague!"
AFU_azov_youth:0 "Azov Youth"
AFU_azov_youth_desc:0 "By going forward with unwavering determination, our youth embody the spirit of resilience and courage our nation needs. Their dedication is determined and their passion is contagious, lighting a spark of national pride in all who follow them. With their boundless energy and enthusiasm, they breathe new life into our movement, animating the spirits of those around them. Their unity is a testament to the strength of our ideals and their commitment is a source of inspiration to all who seek a better future."
AFU_propaganda_in_shools:0 "Propaganda in Shools"
AFU_propaganda_in_shools_desc:0 "Our kids should be more interested in history, physical education and military affairs. Let's invite officers and our warriors from Azov to school. We hope, it will be interesting for kids to speak with soldiers and inspire them to follow the ideas of a new Ukrainian man, that defends his native land with a gun in his hands."
AFU_special_summer_military_camps:0 "Special Summer Military Camps"
AFU_special_summer_military_camps_desc:0 "Invite youth to special camps in the summer. It will be great, we promise it to them!\nAllocate resources to build some camps outdoors near forests. But kids must realize, that it is not a party or game. They spend one week or more in difficult situations, where they need to cooperate to survive.\nThis is the beginning of their new brutal life in a new country. Discipline and sport are the most important things in these camps."
AFU_second_national_mobilization:0 "Second National Mobilization"
AFU_second_national_mobilization_desc:0 "Our main goal remains unchanged - the restoration of the unity of the Ukrainian state. The Armed Forces of Ukraine are undoubtedly the strongest force in the region, but even the glorious Ukrainian army cannot move forward without reserves or reinforcements. By announcing the second wave of mobilisation measures, we will be able to provide the army with new soldiers, both regular and reserve, which will further strengthen our combat capability."
AFU_rump_up_the_military_industrial_complex:0 "Rump Up the Military Industrial complex"
AFU_rump_up_the_military_industrial_complex_desc:0 "Any workshop can become a small factory of military equipment. Any abandoned factory in Donbas can resume work very soon if we will put in a little effort. We need more guns for our army and convert civilian factions into military right now.\nWe should repeat the experience of the Japanese dispersal of industry in the Second World War."
AFU_all_men_are_warriors:0 "All Men Are Warriors"
AFU_all_men_are_warriors_desc:0 "Heavy times born strong men. In battle, people transform into a nation of steel.  And now we see, how many men of different ages want to defend their homes.\nWhoever wants to live must fight, and whoever in this world of eternal struggle does not want to participate in a fight does not deserve the right to life.\nFor crying hasn't given freedom to anyone yet, but whoever is a fighter, conquers the world."
AFU_od_syanu_po_kavkas:0 "Od Syanu Po Kavkas"
AFU_od_syanu_po_kavkas_desc:0 "We prepared people for new difficult situations during this darkest hour for our nation. No matter who you are - a student, a shop assistant in the market, a worker in a factory, or a 60-year-old man.\nWe are all ready to die for Ukraine, and very soon our new generations of Ukrainians for 10-15 years will see, that our labor was not in vain...\nGlory to all heroes, who fighting now for the liberation of Ukraine, and eternal remembrance to all, who are dead for the Ukrainian state, We will avenge you, warriors!"
AFU_novi_lad:0 "Novi Lad"
AFU_novi_lad_desc:0 "The current system and lifestyle is rotten to the bone. For centuries, our society has been drugged with enemy propaganda, indoctrinated with their views and ideas, and everything has been done to reduce our nation to ashes, turning it into a copy of its disgusting assimilators. This order has come to an end, and we will bring change wherever it is needed!"
AFU_question_of_religion:0 "Question of Religion"
AFU_question_of_religion_desc:0 "Though the populace of our territories, obviously enough, is loyal to the Orthodox Christian faith, a lot among our ranks, for some reasons or another, have adopted pagan worldviews throughout their lives. We must address the question of which religion to officially adopt as soon as possible, if we ever wish to see our Nation triumph and reunite!"
AFU_new_pagan_dawn:0 "New Pagan Dawn"
AFU_new_pagan_dawn_desc:0 "The time has come, slavs! It's our historic moment, in which we can finally return our people back to their roots, back to their traditions! With the blessing of Perun, we will endure and prosper!"
AFU_start_the_paganisation:0 "Start the Paganisation"
AFU_start_the_paganisation_desc:0 "1"
AFU_not_churches_but_temples:0 "Not Churches but Temples"
AFU_not_churches_but_temples_desc:0 "1"
AFU_the_religion_of_the_warriors:0 "The Religion of The Warriors"
AFU_the_religion_of_the_warriors_desc:0 "1"
AFU_the_only_true_religion:0 "The Only True Religion"
AFU_the_only_true_religion_desc:0 "It would be one hell of a travesty  to reject not only the religion of almost everyone within our borders, but also the religion on which the Ukraine as a nation was built! Glory to Jesus Christ, may He guide us to victory!"
AFU_destroy_the_satanic_muscovite_church:0 "Destroy the Satanic Muscovite Church"
AFU_destroy_the_satanic_muscovite_church_desc:0 "1"
