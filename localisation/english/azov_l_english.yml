AFU_in_the_name_of_the_father_and_son_and_holy_spirit:0 "In the Name of The Father and Son and Holy Spirit"
AFU_in_the_name_of_the_father_and_son_and_holy_spirit_desc:0 "1"
AFU_christianity_for_warriors:0 "Christianity for Warriors"
AFU_christianity_for_warriors_desc:0 "1"
AFU_v_idei_natsia_mitsna:0 "V Idei Natsia Mitsna"
AFU_v_idei_natsia_mitsna_desc:0 "The idea of modern Ukrainian nationalism is exactly what will help us save our nation from its eternal enemies. A radical transformation of social norms to those that have always been native to Ukrainians and a return to what the colonisers deprived us of is now the top priority for the Ukrainian nationalist movement!"
AFU_there_is_no_place_for_liberals:0 "There is no Place for Liberals"
AFU_there_is_no_place_for_liberals_desc:0 "All the past years of Ukraine's independence, as well as the recent political history of most European and other countries, have proved that liberalism is perhaps the greatest pest for any political entity. Their so-called "values" only threaten the centuries-old traditions and national consciousness of every family and nation on the planet, and we cannot allow such a pustule to grow on our land again."
AFU_ban_the_lgbt_rework:0 "Ban the LGBT"
AFU_ban_the_lgbt_rework_desc:0 "Representatives of the so-called "LGBT community", or as we call them in the people - faggots, started appearing in Ukraine when our fatherland began to move closer to the "leading centres of Western civilisation", and soon they took over part of the media space, started creating their own organisations, and even demanded additional rights. This is absolutely unacceptable. They have never belonged to our society, and they never will. They are not Ukrainians, and if they say otherwise, they are lying, and nobody welcomes them here."
AFU_take_a_pro_life_stance:0 "Take a Pro Life Stance"
AFU_take_a_pro_life_stance_desc:0 "Abortion is a satanic and anti-national act. This, let's call it a "tradition", was brought to us from "extremely developed countries", where it is apparently moral to kill children because their mother either changed her mind about having a child or was too stupid to conceive one. Abortion represents a real crime against humanity, and only supporters of true evil and enemies of the nation are willing to commit it."
AFU_womansroleinthesociety:0 "Woman's Role in the Society"
AFU_womansroleinthesociety_desc:0 "1"
AFU_stimulate_the_birthrate:0 "Stimulate the birthrate"
AFU_stimulate_the_birthrate_desc:0 "Since the occupation of Ukrainian land by Bolshevik invaders, the number of Ukrainians has been constantly regulated by various acts of genocide, and finally, after gaining independence, Ukraine remained with the same 40 million as almost more than 70 years ago. Immigration crises, the war with the separatists, and much more have further reduced Ukraine's population, and it is up to us to do everything we can to start restoring all that we have lost over the decades."
