AFU_old_slavic_traditions:0 "Old Slavic Traditions"
AFU_old_slavic_traditions_desc:0 "1"
afu_secureourposition:0 "Secure Our Position"
afu_secureourposition_desc:0 "By establishing our own control over Donbas, we inadvertently triggered an administrative crisis. People who have neither faith nor loyalty to us are still sitting not only in city and village councils, but also in the highest government institutions, and we cannot leave this situation in this state. We need to strengthen our positions wherever we can to ensure the stability of the government, which will bring peace and glory to Ukraine."
afu_ruleofthefarright:0 "Rule of the Far Right"
afu_ruleofthefarright_desc:0 "The so-called "democratic elections" have become a new breeding ground for the corruption and betrayal that we have been fighting against all these years, but as we can see, there are no signs of results. Candidates bought by local oligarchs would have destroyed everything that we, the Ukrainian army, had worked so hard to restore after the separatist rule in the region. That was the last straw. We are tired of watching a stupid vicious cycle in which faithful sons of Ukraine die for the future of their country and people, while politicians return the old order upon their bodies. It's time to do it ourselves!"
afu_bolsterourranks:0 "Bolster Our Ranks"
afu_bolsterourranks_desc:0 "In our situation, we can only rely on ourselves. There is only one problem - there are not enough of us. "Azov" is undoubtedly a glorious and numerous regiment, but despite this, we are still not enough. To maintain order and stability, as well as to provide the state with more elite forces, we will launch a new recruitment campaign to enlist truly dedicated, strong in spirit and body conscripts who will help us reunite our people and country."
afu_upholdthevictoriousspirit:0 "Uphold the Victorious Spirit"
afu_upholdthevictoriousspirit_desc:0 "We won! We can't even believe we did it! Seeing the catastrophe that would have come if the "elections" had continued, we decided not to wait on the sidelines, watching what we fought so hard for come back and take the lives of the best of us, but to take things into our own hands. And it was the only right decision. Our victory here showed that we cannot be beaten. Any attempts by our enemies will be in vain because we have unquestionable faith in the success of our actions and ideas from now on and forever!"
afu_destroythesovietheritage:0 "Destroy the Soviet Heritage"
afu_destroythesovietheritage_desc:0 "Post-Sovietness is the main basis on which hostile narratives about the "one people" and "Russian Donbass" have been and still are based. It is the ignoring of this factor that has led to all the disasters that our country has experienced since regaining its independence, and it is time to put an end to it. Too much Ukrainian blood has already been shed because of this nonsense, and we have no right to repeat the mistakes of our predecessors."
afu_reshapingthementality:0 "Reshaping the Mentality"
afu_reshapingthementality_desc:0 "The only way to fully complete decommunisation and desovietisation is to form a new Ukrainian generation. Having been under Russian and Soviet influence for almost a century, most locals have forgotten who they really are, becoming typical "homo sovieticus". By failing to replace the local curriculum with the Ukrainian one in all aspects, we will simultaneously launch a new wave of struggle against the totalitarian occupation past and bury it."
afu_beheadthehydra:0 "Behead the Hydra"
afu_beheadthehydra_desc:0 "Although we are military men, not all of the army is on our side. The Armed Forces were recruited not on the basis of their views, but on their skills or perseverance, which also led to the entry of left-wing and liberal-minded individuals into the Ukrainian military. And it is these elements that are now becoming the fifth column in our rear. In their view, we are usurpers, radicals who want to rule with an iron fist and do not know mercy or liberty. They are now our main internal enemy, and we need to get rid of them, otherwise the Armed Forces will come to an end."
afu_freedonbas:0 ""Free Donbas""
afu_freedonbas_desc:0 "Television is a powerful thing. With their television channels, oligarchs and Russian puppets have been feeding the population their ridiculous fairytales for years, but as it is said, "A lie repeated a thousand times becomes the truth." To inform citizens about the truth, and not about the lies that benefit local bandits, we need to create government television. This will guarantee to increase our support and reduce the influence of all sorts of paid shitheads."
afu_calltobattlethemostreliableones:0 "Call to Battle the Most Reliable Ones"
afu_calltobattlethemostreliableones_desc:0 "1"
afu_holdthebannerhigh:0 "Hold the Banner High"
afu_holdthebannerhigh_desc:0 "As leaders of right-wing nationalist ideas, we are de facto outcasts among all others, to whom our views are distant, outdated, or even hostile. But despite this, we have no right to give up and abandon the people who need us. Even if we were completely alone in our struggle, we would not dare to lower our banners, we would not dare to stop singing the marches of our glorious ancestors, but most importantly, we would not dare to lay down our arms in the face of the enemy!"
