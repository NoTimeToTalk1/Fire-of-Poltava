AFU_invite_local_loyalists_to_azov:0 "Invite Local Loyalists to Azov"
AFU_invite_local_loyalists_to_azov_desc:0 "Freikorp created in July 2017 by  Hryhoriy Tarasenko. They took place in Anti-Terrorist Operation in Donetsk region. But now ukrainian patriors are in the shadow of police state. We need to contact them. Friekorp can help us in the future liberation of Kharkiv."
