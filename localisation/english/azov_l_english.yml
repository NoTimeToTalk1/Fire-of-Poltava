AFU_rdk_eq_1_decision_desc:0 "Buy equipment for soldiers"
azov_rdk_desc:0 "The Russian Volunteer Corps (RDK) is a military formation founded by far-right Russian nationalists who have been fighting on the side of Ukraine since 2014 in the Russian-Ukrainian war. Initially, the personnel were formed from ethnic Russian emigrants living mainly in Ukraine.\n\n§3Personnel of RDK§! is §3[?AFU.AFU_rdk|0]§!.\n§3Equipment of RDK§! is [AFURdkEqLoc].\n§3Popularity in the media§! is [AFURdkMediaLoc].\n"
