 conservative_democracy_noun:0 "Conservative Democracy"
 centrism_noun:0 "Centrism"
 oligarchy_noun:0 "Oligarchy"
 military_junta_noun:0 "Military Junta"
 radical_nationalism_noun:0 "Radical Nationalism"
 radical_nationalism_drift:0 "Drift to Radical Nationalism"