l_english:
 #### FOCUS TREE ####
 AFU_kho_mu_ty_nnik:0 "Kho-mu-ty-nnik!"
 AFU_kho_mu_ty_nnik_desc:0 "After a long and continuous struggle for freedom, peace, and prosperity, Donbas managed not only to end the rule of thieves on its land but also ended the seemingly endless period of dictatorship and tyranny by electing its countryman, its trusted servant - Vitaliy Khomutynnik. Hip hip hooray!"
 
 AFU_contact_bondar:0 "Contact Bondar"
 AFU_contact_bondar_desc:0 "Once the de facto leader of the "Revival" party, which has always faithfully and persistently represented the interests of the people of eastern and southern Ukraine, Mr Khomutynnik has remained in contact with its nominal leader - Viktor Bondar, who, along with other members of the faction, has been settled in the Dnipropetrovsk region since the beginning of the civil war. All these people are skilful politicians and decent citizens who will definitely find a place in our new government."
 
 AFU_talk_with_kolomoyskyi:0 "Phone Talk with Kolomoyskyi"
 AFU_talk_with_kolomoyskyi_desc:0 "Ihor Kolomoyskyi, no matter what people say about him, is a good and generous man. For years, this benefactor has helped the party with funding, spared no expense and sometimes even his reputation to support us and our principles, and even in these difficult times, he has managed to maintain his high and respected position in Ukraine. This man has provided us with services countless times, and the moment has come when we will settle the accounts and start to be beneficial to each other, establishing full cooperation in every sense of the word."
 
 AFU_revival_faction_session:0 "'Revival' Faction Session"
 AFU_revival_faction_session_desc:0 "After all this time, the party could not remain the same. Some left the organisation, as well as the state and some joined other political forces, but it all showed very well who was truly loyal to the goal and who was simply making a profit from it. Since Mr Bondar and other members of the "Revival" have happily agreed to join us, we need to hold the first party congress of this new era. A new era not only for our movement but for the whole of Ukraine."
 
 AFU_mutually_beneficial_alliance:0 "Mutually Beneficial Alliance"
 AFU_mutually_beneficial_alliance_desc:0 "Call after call, meeting after meeting, all this led us to this point. Our patron, the godfather of the "Revival", was delighted that his investment had paid off so well and agreed to all our proposals for cooperation. We will join our efforts and will together develop our regions and our country. Become the parents of its revival."
 
 AFU_invite_kinakh:0 "Invite Kinakh"
 AFU_invite_kinakh_desc:0 "As it turns out, Mr Khomutynnik's old friend and former political boss, Anatoliy Kinakh, is still alive and well, moreover, he's trying to somehow get along in the new realities of Ukrainian statehood. This old man is not what he appears, despite the fact that he left big politics a long time ago, he still has good contacts with his former PIEU party members and beyond, which makes him an extremely valuable possible partner. We should give him a call sometime..."
 
 AFU_integrate_the_party_of_industrialists:0 "Integrate the Party of Industrialists"
 AFU_integrate_the_party_of_industrialists_desc:0 "The PIEU, also known as the party for people who understand business, used to be a large and powerful structure on the political scene, which all possible blocs wanted to have in their ranks. However, since joining the ranks of the Party of Regions, its time has run out. But not for its members. Many former party members have not only stayed in this world but also remain in politics. They are all valuable cadres that could be a salvation for us and our bureaucracy, and since Mr Kinakh is still in touch with them, why not try to integrate what is left of the good old party of entrepreneurs into our government?"
 
 AFU_meeting_with_the_donetsk_clan:0 "Meeting with the Donetsk Clan"
 AFU_meeting_with_the_donetsk_clan_desc:0 "As the people say, if you want to live, learn how to spin. This phrase is also applicable in our situation. Ever since the fall of the Soviet Union, Donbas has been in the hands of local businessmen who were not afraid to get their hands dirty and openly criminal authorities who could afford to oppose the will of the state apparatus. The days of gangster showdowns and anticriminal wars are certainly over, however, the economic and financial owners of most of the Donbas industry have not disappeared, even though they have mostly gone into the shadows. If we want to bring a better future to our country and avoid all kinds of internal conflicts, the only way is through friendship and partnership with the Donetsk and Luhansk entrepreneurs."
 
 AFU_negotiation_channel_with_moscow:0 "Open a Negotiation Channel with Moscow"
 AFU_negotiation_channel_with_moscow_desc:0 "Relations and the general situation with Russia have been on the agenda for the entire Donbas for more than 7 years. All this time, ordinary citizens and politicians, workers and farmers, have been trying to find their place in this issue and were looking for the right arguments to justify their position, though, as much as some people may not want to hear it, the future of Donbas and the whole of Ukraine cannot be simply fenced off from Russia. We are in the same boat, whether we like it or not, and we cannot simply cut all ties with our Moscow counterparts. Relations need to be restored, despite all that has happened in the suffering Donbas over the years."
 
 AFU_cooperation_with_local_outsiders:0 "Cooperation with Local Outsiders"
 AFU_cooperation_with_local_outsiders_desc:0 "No matter what allies from the past we attract, we require regional support. In Donbas, there are many small outsider parties and local politicians who enjoy authority and respect among their little electorate, and all these people can be useful not only to their community but also to the state as such! The more small politicians who are trusted by the public we involve in our own party and state work, the greater our chances of success, both external and internal, will be. Donbas should be governed by its own people after all!"
 
 AFU_formation_of_coalition:0 "Formation of 'Together for Donbas' Coalition"
 AFU_formation_of_coalition_desc:0 "Recently, many people have joined our government coalition, both from Mr Khomutynnik's past life and from local regional micro-parties. All of these people, however, while sharing such traits as loyalty, intellect, and cleverness, are adherents of different political ideologies and positions, and are adherents of different ideological theories. While the outsider political forces from Donbas integrated into our membership do not share the principles of the integrated major political groups, we still maintain a majority party policy, which limits our cooperation with local state officials. From now on, our goal should be to create a large, inclusive party without a single ideological line, whose position should be based on things that unite us all: economic development, sovereignty, and social prosperity."
 
 AFU_time_for_great_solutions:0 "Time for Great Solutions"
 AFU_time_for_great_solutions_desc:0 "Donbas is still suffering, no matter what anyone says. The war that for years has devastated the land, killed and oppressed the people will be felt in this region for a very long time, but we can speed up its healing. By forming a truly large and effective political coalition, our government is ready to face the challenges that a disgruntled society and ruined soil have prepared for us, and we will come out of this victorious!"
 
 AFU_learn_from_the_best:0 "Learn from the Best"
 AFU_learn_from_the_best_desc:0 "Even now, in times of complete instability after the collapse of Ukraine, Dnipro is the economic center of the region. We will use the experience of this corporate state for the benefit of our state, in the economic sense, of course."
 
 AFU_tax_cuts_for_businesses:0 "Tax Cuts for Businesses"
 AFU_tax_cuts_for_businesses_desc:0 "We will change our tax system in such a way that small and medium-sized businesses will pay much lower taxes than large ones. This will help us to create a fertile ground for the development of companies. We will also create a program of assistance for small businesses, for example, a zero-interest government loan program!"
 
 AFU_special_rights_to_corporations:0 "Give Special Rights to Corporations"
 AFU_special_rights_to_corporations_desc:0 "We will use the Dnipro corporatocracy model for good. Thanks to this reform, small, medium and large businesses will be able to develop in a way they have never been able to before, which will lead to the economic prosperity of our country."
 
 AFU_deradicalization_of_society:0 "Start the Deradicalization of Society"
 AFU_deradicalization_of_society_desc:0 "We must begin healing our divided society and marginalize extremism."
 
 AFU_hunt_for_ringleaders:0 "Hunt for Ringleaders"
 AFU_hunt_for_ringleaders_desc:0 "After 6 years of war, a lot of different right-wing radicals have bred in our country. From radical nationalists to fascists and Nazis. We will launch a law enforcement hunt for the leaders of such organizations to ensure security and stability"
 
 AFU_disband_azov:0 "Disband the Azov Regiment"
 AFU_disband_azov_desc:0 "Azov is the source of a lot of controversy, far-right crises and everything else. Not to mention the fact that most of its members have been suspected of committing war crimes since 2014, this organization poses a danger to the state, which is why we will disband it."
 
 AFU_for_the_state:0 "In the Name of the State"
 AFU_for_the_state_desc:0 "After the economic reforms, we have to deal with the law. Or, to be more precise, enforcing it. We will increase funding for the police and internal affairs agencies, and possibly create something similar to the Stasi of the GDR."
 
 AFU_strengthen_the_police_force:0 "Strengthen the Police Force"
 AFU_strengthen_the_police_force_desc:0 "We will increase investment in the police department. For the sake of the stability of our country, of course!"
 
 AFU_expand_security_service_funding:0 "Expand Security Service Funding"
 AFU_expand_security_service_funding_desc:0 "Our country is in danger. It is in danger because of those who wish the worst for our country! We will increase funding for internal structures to ensure the safety of our citizens."
 
 AFU_stop_inner_conflicts:0 "Stop Inner Conflicts"
 AFU_stop_inner_conflicts_desc:0 "Our state stands on very unstable ground. The internal enemies - right-wing radicals, pro-Kryvonos scum, and some politicians - are dangerous! The external American administration should not influence our policy! To this end, we will begin a campaign of hunting down internal enemies!"
 
 AFU_form_the_internal_troops:0 "Form the Internal Troops"
 AFU_form_the_internal_troops_desc:0 "After our program of strengthening internal structures, our bureau now has its own security forces. They will be used only in emergency situations, and we will be sure that it is only for the sake of security and destruction of internal enemies!"
 
 AFU_tackle_peoples_problems:0 "Tackle People's Problems"
 AFU_tackle_peoples_problems_desc:0 "We must focus on solving the real problems facing everyday citizens."
 
 AFU_distribute_humanitarian_aid:0 "Deploy the Humanitarian Aid Program"
 AFU_distribute_humanitarian_aid_desc:0 "After 6 years of heavy war against Donbas, it is in ruins. People have lost their homes, destroyed by collateral damage, their loved ones and their livelihoods. We will launch a program to help these civilians for a better future!"
 
 AFU_raise_funds_for_war_veterans:0 "Raise Funds for War Veterans"
 AFU_raise_funds_for_war_veterans_desc:0 "Boosting the financial support for our veterans, ensuring they are properly cared for in their post-service lives."
 
 AFU_dismantle_kryvonos_legacy:0 "Dismantle Kryvonos' Legacy"
 AFU_dismantle_kryvonos_legacy_desc:0 "The old guard must step aside to allow for progress."
 
 AFU_abolish_censorship_laws:0 "Bring Back Freedom of Speech"
 AFU_abolish_censorship_laws_desc:0 "Censorship laws stifle free speech and democracy. It's time to put an end to these restrictions."
 
 AFU_open_trade_channels:0 "Market Must Not Be Limited!"
 AFU_open_trade_channels_desc:0 "The market is the lifeblood of the nation. Restricting it will only harm our growth. We must ensure freedom in commerce."
 
 AFU_for_the_people:0 "In the Name of the People"
 AFU_for_the_people_desc:0 "Our government must serve the interests of the people, not the elites. This focus will reaffirm our commitment to the people."
 
 AFU_raise_the_living_standards:0 "Raise the Standard of Living"
 AFU_raise_the_living_standards_desc:0 "A prosperous nation must guarantee the well-being of its citizens. It's time to raise the standard of living for all."
 
 AFU_golf_the_best_entertainment:0 "Golf — The Best Entertainment"
 AFU_golf_the_best_entertainment_desc:0 "Currently, we have no active public recreation. This is bad! We will invest in the development of a golf federation in our country, and more importantly, we will organize state recreation on the golf course! Of course, most of the golf clubs are owned by Khommutynnyk, but who cares if it's for the happiness of our citizens!"
 
 AFU_miners_paradise_on_earth:0 "Miner's Paradise on Earth"
 AFU_miners_paradise_on_earth_desc:0 "During the years of conflict in Donbas, ordinary Donbas workers have suffered the most. Whether on Ukrainian or Russian territory, mines have been stolen, destroyed or flooded. We will fix this by starting to finance the mines so that the miners have jobs! God save Khomutynnyk's genius!"
 
 AFU_nation_of_hard_workers:0 "Nation of Hard Workers"
 AFU_nation_of_hard_workers_desc:0 "Our population is the most workaholic in the world! Like the Japanese after their defeat in World War II, we will rebuild our country from scratch and make it the economic center of Europe!"
 
 AFU_pardon_ldpr_participants:0 "Pardons for LDPR Participants"
 AFU_pardon_ldpr_participants_desc:0 "There is no doubt that some enemy soldiers have committed crimes and formally committed treason against Ukraine. But they had no other choice, they were deceived by the Russians, and thay had families to feed! Because of this, some of the ex-militias will be granted amnesty."
 
 AFU_stop_ethnic_hatred:0 "Stop Ethnic Hatred"
 AFU_stop_ethnic_hatred_desc:0 "Due to the propaganda of radical nationalism in the time of Kryvonos, our society is unstable. Far-right military organizations advocate "ethnic purity", which is a crime against humanity! We must correct this by introducing a ban on ethnic hatred into the criminal code and introduce severe penalties for it"
 
 AFU_break_the_totalitarian_system:0 "Break the Totalitarian System"
 AFU_break_the_totalitarian_system_desc:0 "After the Kryvonos era, our country is suffering. It suffers from the fact that democratic institutions have been destroyed, and most bureaucratic positions are occupied by soldiers and colonels who do not even know how to properly govern the country. We will reform this by returning politicians to the government, and the military will be sent back to the trenches."
 
 AFU_remove_the_military_from_politics:0 "Remove the Military from Politics"
 AFU_remove_the_military_from_politics_desc:0 "We know that most of the generals are friends of Kryvonos and are loyal to him. We cannot allow this to happen, because if Kryvonos decides to rebel or disobey orders, we will not be able to do anything about it. Therefore, we will change the composition of the high military command to new people, at least partially."
 
 AFU_for_the_nation:0 "In the Name of the Nation"
 AFU_for_the_nation_desc:0 "Our country is in ruins. But thanks to democracy, equality and progress, we can fix it! For the sake of our country, Ukraine, and for the sake of our nation, Khomutynnyk, our president, will save us! Let equality and democracy allow us to rebuild Ukraine, and let it allow us to unite it, preserving human rights and destroying radicals!"
 
 AFU_reform_the_territorial_system:0 "Reform the Territorial Structure"
 AFU_reform_the_territorial_system_desc:0 "Currently, our territorial system is sadly flawed. We can, of course, take the system of territorial division of Ukraine, but due to the current circumstances it will be slightly changed..."
 
 AFU_presidential_republic_project:0 "Presidential Republic Project"
 AFU_presidential_republic_project_desc:0 "The time has come for true democracy! The parliamentary-presidential system only harms our country! While the president, elected by the people, is trying to reform the country, the MPs who got their seats only because they were in the same party are hindering him! We will solve this problem by transferring more powers to the president, which will potentially allow us to move to a presidential republic."
 
 AFU_support_regional_minorities:0 "Support Regional Minorities"
 AFU_support_regional_minorities_desc:0 "There are many different peoples living in our country. But the main ones are Russians and Ukrainians. We will start a program to support national minorities, such as Roma, Greeks, Jews, Tatars and others. This will allow us to increase the rating of our president."
 
 AFU_second_language_initiative:0 "Second Language Initiative"
 AFU_second_language_initiative_desc:0 "For quite a long time, our country has been plagued by the problem of Russian and Ukrainian languages. Despite the fact that the majority of our country is Russian-speaking. We will solve a long-standing problem that has caused many deaths. We will make our republic two state languages - Ukrainian and Russian!"
 
 AFU_decisive_referendums:0 "Referendum That Will Change Everything"
 AFU_decisive_referendums_desc:0 "We will hold a referendum to implement our reforms! Of course, we will use a little bit of our influence to make sure that the result will be as we planned."
 
 
 AFU_the_time_of_the_donbas_people_has_come:0 "The Time of the Donbas People Has Come"
 AFU_the_time_of_the_donbas_people_has_come_desc:0 "The Donbas region has long been overlooked. It is time for them to take their rightful place in our nation."
 
 AFU_one_and_unified_multicultural_state:0 "One and Unified Multicultural State"
 AFU_one_and_unified_multicultural_state_desc:0 "Finally, we have united all of eastern Ukraine. Now, we will create a society where everyone is welcome, and everyone can live in friendship and under the protection of Khomutynnyk."
 
 AFU_issue_of_our_status:0 "Issue of Our Status"
 AFU_issue_of_our_status_desc:0 "The time has come. It is time to return to the international arena as the one and only true Ukraine. Liberalism and democracy have won. Glory to Khomutynnyk! Long live Ukraine, united forever! Some people want us to join Nato. But we will not do this, we will remain neutral, because this is the only way we can prevent international conflicts and develop!"
 
 
 #### tooltips ####

 khomutynnik_tt:0 "§1Khommutynnyk§! §7will§! §1come§! §7in§! §1and§! §7clean§! §1up§! §7the§! §1mess!§!"
 homut_7_a_tt:0 "§1We will lose some political capital and stability, but we will get a chance for resources and alliance. The Kremlin will get the signal and perhaps respond.§!"
 homut_7_b_tt:0 "§7Honour and sovereignty are above all. Even if we have to starve, Moscow is not our path.§!"
 
 AFU_revival_faction_session_tt:0 "§1We will get new ministers from the £GFX_texticons_revival_party_texticon Vidrodzhennya party§!"
 AFU_integrate_the_party_of_industrialist_tt:0 "§7We will get new ministers from the £GFX_texticons_pppu_party_texticon PPPU party§!"

 #### ideas ####

 AFU_homutarian_aid_1:0 "Humanitarian Aid"
 AFU_Return_of_the_Donetsk_Mafia:0 "Return of the Donetsk Mafia"
 AFU_Ties_With_a_Good_Old_Friend:0 "Ties With a Good Old Friend" 
 AFU_United_Oligarchic_Alliance:0 "United Oligarchic Alliance"
 
 #### events ####
 
 homut.1.t:0 "Khomutynnyk's victory"
 homut.1.d:0 "Vitaliy Yuriyovych Khomutynnyk and his party ‘Renaissance’ managed to win the elections! This man, in the difficult post-war times when people distrusted each other, was able to unite businessmen, workers and even some military personnel who saw in this person a hope for reconciliation between the population of the long-suffering Donbas and as an ‘anti-crisis technocrat’.\nNow the fate of this region... no, this country lies in our hands! Khomutynnyk will really start a new era in Ukrainian politics as a reformer and the one who will finally reconcile the population!"
 homut.1.a:0 "Hooray!"
 
  
 homut.2.t:0 "The Meeting"
 homut.2.d:0 "In fact, Mr Khomutynnyk, the de facto leader of the Revival party, which has always faithfully and consistently represented the interests of the people of eastern and southern Ukraine, has not lost touch with its nominal chairman, Viktor Bondar. He, along with the rest of the faction, has been living in the Dnipro region since the beginning of the civil war. All of these people are experienced politicians and decent citizens who will definitely find a place in the new government.\nKhomutynnyk is sitting behind a massive desk, a cup of coffee in his hand, and Bondar enters the room.\n- Viktor Vasylovych, I'm glad to see you. Finally got out of Dnipro?\n- I thought you had forgotten about us. But I see that everything is in order here. The army, the administration, even the flags are new.\n- Let's get down to business. You have experience, connections, understanding of the region, people, and other shit. Everything we need. Move to us. Head the executive council of the Southern District.\n- And Dnipro? My people are still there.\n- Take them with you. We'll need them too.\n- Okay. Now tell me how things are at your place..."
 homut.2.a:0 "- I always knew I could rely on you, my friend."
  
 homut.3.t:0 "The Meeting"
 homut.3.d:0 "Today, after the election race and our victory in the elections, an important meeting of a delegation from the PPPU party led by Anatoliy Kinakh took place in an expensive restaurant in Donetsk. The meeting with representatives of Khomutynnyk's party promised a potential partnership and coalition in governing the country, and almost immediately negotiations on the creation of a coalition government began. The negotiations were successful, and the delegation from Slovyansk accepted the terms with a number of amendments. Next, the banquet was held in a more relaxed and entertaining atmosphere, but other topics were also touched upon.\n\nDuring the banquet, the economic potential of Donbass was discussed, what the region could become if enough money was invested in it. The resource potential of the region was also discussed, during the discussion the PPPU party emphasised the importance of buying raw materials abroad.\n\nThis will be the locomotive of the whole Ukraine if we find a source of raw materials - stated Anatoliy Kinakh.\n\nIn addition, during the negotiations, our party received several ideas about concluding certain contracts with local suppliers in different parts of Donbass, as well as potential partnerships with small and medium-sized businesses and a number of firms providing "special services".\n\nAnyway, after drinking several bottles of champagne and snacking on exquisite dishes, Anatoliy Kinakh proclaimed a toast:"
 homut.3.a:0 "- I think it will be a great union!"
   
 homut.4.t:0 "Golf with Ihor"
 homut.4.d:0 "When they arrived, they saw President Khomutynnik drinking green tea while watching the golf club staff check that the course was ready. When they approached him, Mr. Kolomoisky spoke up, taking out his thermos of coffee.\n\nSo, this is a diplomatic meeting after all. Tell me, how are things in the country? - he asked.\n\nIn general, I wanted to discuss this with you, - acknowledged Khomutynnik, picking up his club and walking over to the ball. - We are in an economic recession, and our companies lack competition. This is why their products and services are of low quality and quite expensive, - he said, hitting the ball.\n\nHmm. Perhaps we can help you with this, - Kolomoisky said, watching the ball fly toward the hole. - If you provide our corporations with certain market privileges."\n\nThat sounds great! We'll discuss it after the game! - exclaimed Khomutynnyk.\n\nOh, no, no, - Kolomoisky said, complaining of back pain, - let's discuss it in detail at the next meeting. This time you will come to us. I invite you for a cup of coffee, and we'll discuss everything."
 homut.4.a:0 "- I think it will be a great union!"
  
 homut.5.t:0 "The Canister"
 homut.5.d:0 "In the [GetMonth] of [GetYear], when fuel was more expensive than gold, any help was more important than diplomacy.\n\nOne morning, an old, unmarked armoured pickup truck pulled up on the outskirts of Kramatorsk, where Khomutynnyk's mobile headquarters was located. A bearded man in a leather jacket got out and handed the officer a modest package - a single can of petrol.\n\n‘From Igor Valerievich,’ he said briefly. And he immediately disappeared in a cloud of dust.\n\nOn the can itself - it was an old military ‘ten’ - was written in black marker:\n\n‘Donbas must move. In every sense.’\n\nThis gesture quickly spread across all the radios. Not because there was a lot of petrol - no, on the contrary. But it was a signal. Kolomoisky, the hitherto silent baron of Dnipro, recognised Khomutynnyk's authority.\n\nThe next morning, the generator at the headquarters caught fire. The radio stations started working. The vehicles moved to Avdiivka."
 homut.5.a:0 "One canister won't be enough to move the front, but it will be enough to change history."
   
 homut.6.t:0 "The Dinner Party"
 homut.6.d:0 "In the closed hall of the Sunshine restaurant, four people sat at a table: Vitaliy Khomutynnyk, Oleksandr Yefremov, Borys Kolesnikov and Nestor Shufrych, and a few lesser-known people.\n\n- ‘You've been out of the game for a long time,’ Khomutynnyk said, ‘and I have a country that needs experience. I offer you seats in the government and control over the economy of the east. In return - political support and peace in your territories.\n\nYefremov looked sceptical.\n- ‘And if not?\n\n- ‘Then I'll give it to Akhmetov,’ Vitaly replied, ‘and he doesn't share.\n\nA pause. Kolesnikov nodded to Shufrich.\n\n- ‘We agree,’ he said, ‘but we want the Minister of Infrastructure, the Minister of Social Policy and the Minister of Culture.\n\n- It`s yours.\n\nAnd so the Donetsk clan returned - not as masters, but as shareholders in new Ukraine."
 homut.6.a:0 "The old faces are at it again."
   
 homut.7.t:0 "Secret negotiations with Moscow"
 homut.7.d:0 "Despite its officially proclaimed policy of neutrality and independence from external influence, the highest circles of the government of Vitaliy Khomutynnyk are increasingly aware of the economic and diplomatic isolation in which the new Ukrainian Donbas government finds itself.\n\nAfter several cautious contacts through business channels, the first informal meeting between representatives of the Khomutynnyk government and Moscow's proxies took place last night at a private estate near Luhansk.\n\nThe topics discussed were: fuel and equipment supplies, a credit line for infrastructure development, and the possibility of diplomatic recognition of the new regime in the international arena.\n\nThe risk is high - any information leak could be catastrophic for the government's image. But the rewards are also very tempting."
 homut.7.a:0 "Let's take a risk. Open a communication channel."
 homut.7.b:0 "It's too dangerous. We can handle it ourselves."
  
    
 homut.8.t:0 "Ukrainian leader addresses Moscow"
 homut.8.d:0 "An encrypted letter signed personally by Vitaliy Khomutynnyk was sent to Moscow through one of the diplomatic channels that had not been used for a long time. In the letter, the newly elected leader of Donbas asks the Russian side for ‘moderate but decisive support’ for his government.\n\nKhomutynnyk emphasises that his team seeks stability in the region and does not intend to provoke confrontation. At the same time, he openly hints at political gratitude for the assistance - economic, diplomatic, and, if necessary, security."
 homut.8.a:0 "Accept the offer. Donbas is our ally again."
 homut.8.b:0 "Leave the door open, but do not act."
 homut.8.c:0 "Ignore. It's not worth the risk."
    
 homut.9.t:0 "Moscow agreed to help"
 homut.9.d:0 "After weeks of silence, the Khomutynnyk government finally received a response from Moscow. The message is short and concise: ‘We are ready to support stability in the region. Expect the first cargo within 72 hours.’\n\nShortly afterwards, the first trucks with fuel, generators, repair kits and even boxes of army-style first aid kits appeared at the Debaltseve border warehouses. Along with the cargo were several ‘civilian consultants’, whom the locals have already dubbed ‘Moscow curators’.\n\nThis is not an alliance. This is an agreement. Temporary, quiet, but extremely useful."
 homut.9.a:0 "That's great."
     
 homut.10.t:0 "Moscow is in no hurry"
 homut.10.d:0 "The response from Moscow finally came - cold, measured, almost formal. The Russian side said it was ‘understanding the situation’ and was ‘closely monitoring the events in eastern Ukraine’. Direct assistance is not foreseen at the moment, but the Kremlin has given a clear signal: the channels for negotiations are open.\n\nThis is not exactly a refusal. It is a diplomatic ‘pause’. Khomutynnyk's government is in a situation where it will either have to prove its ability to hold power on its own or look for other levers of influence on its neighbour."
 homut.10.a:0 "Let's start a dialogue. We need trust."
     
 homut.11.t:0 "Silence from the East"
 homut.11.d:0 "Weeks have passed since the Khomutynnyk government sent a proposal for cooperation to Moscow. There has been no response, no hint, not even an official refusal - just a void.\n\nIt has become known through unofficial channels that the request was probably not even considered at a serious level. The Kremlin has either lost all interest in the Ukrainian issue or is playing its own game, waiting for the right moment.\n\nThis silence is more painful than a refusal. And the government is beginning to realise that it can only rely on itself."
 homut.11.a:0 "We will manage on our own. We cannot be broken." 
      
 homut.12.t:0 "Working together for a great cause"
 homut.12.d:0 "After the situation in the eastern regions stabilised, we began an active dialogue with a number of small regional parties and influential figures in Donbas. These include veterans of the old industrial councils, former representatives of local councils from the Party of Regions, and new associations of entrepreneurs and mining syndicates.\n\nKhomutynnyk proposed a simple formula: influence and resources in exchange for loyalty and order. In response, the leaders of local initiatives agreed to cooperate, recognising the government as a legitimate representative of regional revival. The Coordination Council of Donbas, a new body to help the government from below, was created."
 homut.12.a:0 "Together we are the strength of Donbass!" 
       
 homut.13.t:0 "The Fight"
 homut.13.d:0 "Today, during a visit to the city of Kramatorsk by a delegation of the Russian Orthodox Church from Volgograd, an extremely unpleasant situation occurred, resulting in two dead bodies and dozens of wounded. It all started with the fact that the Slavonic Diocese needed icon painters to build new churches and restore old monasteries. In addition, teachers were needed for parochial schools and theological seminaries. After appeals to the Moscow Patriarchate, the Volgograd Metropolis sent its people.\n\nAs soon as they arrived, they refused to be heavily guarded, contrary to recommendations. On their route were monasteries and churches of the Slavyansk-Gorlovka Diocese. They visited various churches, many of which had bullet marks or shell splinters that have become common artefacts in Donbass. While taking photos and sketches to restore icons, mosaics and other objects in the temples, the Russian clerics also conducted services for local communities of parishioners. Their services were often attended by people from all over the area. In the villages they were greeted with kindness, the bishops were kissed and people asked them to consecrate a child or various foods.\n\nHowever, when the convoy with the symbols of the Russian Orthodox Church entered Kramatorsk to visit the final point of the route - the Holy Trinity Cathedral, things did not go according to plan. Upon entering the city, the street was blocked by a small group of young people equipped with yellow and blue flags and stuffed football team. Those demanded in Ukrainian to turn the column around and send them "back to where they came from." The priests tried to reason with the young people, but at one point the situation got out of control and 17-year-old Roman Romanov from Dobropillya hit the icon painter Mitrofan on the head. A fight ensued, people were thrown onto cars and pepper spray was actively used. Later it was discovered that one of the icon painters did not get up, and young ultras launched a new attack with spray paint cans painting the clergy in red colours. Gawkers from all over the city watched this, and the police arrived terribly slowly because of the traffic jams that ironically formed from parishioners who wanted to see the Russian priests. Most of the teenagers were apprehended, but the maniac from Dobropillya escaped with a couple of the attackers, and the visit was urgently called off along with all the help from the local diocese."
 homut.13.a:0 "The guilty will be punished!" 
        
 homut.14.t:0 "Another meeting"
 homut.14.d:0 "Khomutynnik scheduled a meeting in one of the oligarch's restaurant. "Everything can and will go wrong" - said one of the advisers of Khomutynik. He pointed at the adviser and said with the irritated voice "Shut the fuck up, they have prom zones, factories under their wing. If we don't ally with them. They may find better alternative than us. You don't want to see us both hanged by thugs, do you?" Adviser instantly regretted his words. "Gospodin, It will be our downfall. These bands are going to be judged another day..."\nKhomutynnik sat on the office chair lowering his head.\n"Egor, get the bodyguards here please. We're moving out." He said. Egor - Khoomutynnik's adviser obeyed his orders and did what he was told to do.  After filling the car with 3 bodyguards, adviser and Khomutynnik and making themselves comfortable in their car Khomutynnik said "Have fingers crossed everybody" They have exchanged stare between each other and drove to the meeting location.\n\n"Gospodin, we are at the meeting location"  Khomutynnik peeked out of the window and ordered "Yeah that's the place. Now move."\n\nEveryone quickly emptied the car. Thugs stood there already waiting. Khomutynnik and his band entered the restourant which is belonged to one of oligarchs  Khomutynnik adjusted his tie, and sat down waiting for the mafia to arrive. "Hello, Gospodin Khomutynnik, nice to see in our restaurant. The best in Donjetsk. Please, owner is waiting you there." Waitress said. "Then, escort me, please." She did as he said. "I'm sorry, but bodyguards should remain outside the room during the meeting" "Ok...?" Then he was with a slight hand pressure on his back pushed inside the room.\n\nA plumpy oligarch with stained napkin on his neck was sitting there. "Please sit down, Khomutynnik Yurovich, there's nothing to be afraid of. " While trying not to choke on his dinner. They started to discuss life in Donetsk, and had a good laughter. Friendship and mutual assistance was guaranteed."
 homut.14.a:0 "Fine." 
         
 homut.15.t:0 "Appeal Trial"
 homut.15.d:0 "Yakov Lavva sat in the dock.He was one of the first to support the creation of the Luhansk People's Republic. Before that moment, he was a garbage collector, and afterwards he was given a bureaucratic position only for publicly speaking in support of the LDPR. But how ironic the story went. When Ukraine collapsed as a result of the election dilemma, he rejoiced because it meant an end to the oppression of Donbas and additional income from its unification, but then the war with the Donbas Command of the Armed Forces began and it was lost. That's when he was arrested. And now, he already thought that it was his last day on this earth. But, unexpectedly, as a result of President Khomutynnyk's last-minute decision, he was acquitted on the grounds of “forced labor for the Donbas militia,” which leveled the charge of treason.\n\nYasha was surprised and thought it was a joke. But when he was released, given a Ukrainian passport, and given money, he understood. Even such a shithead who stepped on the heads of others, who deliberately abused his authority, is sometimes lucky. Along with him, thousands of militants and other bureaucrats were acquitted and released. This decision led to a huge public outcry, but were these people really innocent of crimes?  In any case, the LDPR bureaucrats and soldiers were very grateful."
 homut.15.a:0 "Thank you, dear President Khomutynnyk!" 
          
 homut.16.t:0 "Language issues"
 homut.16.d:0 "Ukraine is one in the world, but what about two official languages in the state?\nWe can't just abandon our citizens in South-East regions of Ukraine in the future. No way! We are all one big family. If we do this, Ukraine will become European Somalia, where language and the mysterious "Great Ukrainian Nation" will be more important than the good of all the people of Ukraine. Some will say, that the position of our leader looks like bootlicking of Russians, we say that we-truly Ukrainian patriots.\nNo more brotherhood war for language, no more radicalism, and no more chauvinism!\nIn plans for the near future, we should make a project of a second official language in the state. Yes, we will spend a lot of money on this project.\nMany places will get second names. The education system must be repaired, renewed, and restarted again, and maybe... we will return Russian language as a subject in school for our children, we should resolve so many problems... All these reforms also concerning the army, enterprises, universities, and administrative offices. The people of Ukraine will feel better in the new Ukraine, which will protect all ethnic groups.\nYes, many people in Lviv, Kyiv, or somewhere else will dislike it, maybe we will blame Russian puppets, but this is the cost of a truce between two mentalities of one great people. We can't avoid problems, which can't leave Ukrainian society for 30 years more. And maybe only we understand, that we are right. "
 homut.16.a:0 "Such great plans, such a great dream..." 
 
 homut.17.t:0 "Unexpected pardon"
 homut.17.d:0 "Back in 2001, Yevgeny finished his service in the Ukrainian Army.  Eventually, 2 decades have passed, and many events were accompanying his life and his own land since then. In 2014, when tires were burning on the Maidan, his own city of Donetsk was in chaos, with rioters like those in Kyiv on one side and the Anti-Maidan on the other. The second side was supported by the major part of Donbas residents, so his habit of going with the flow and his search for at least some recognition, which he lacked in himself, forced him to follow the majority. He joined the militia of Novorossiya, after signing a contract in one of the makeshift military enlistment offices, he picked up the AK again, which he had already weaned himself off of.\n\nApril was unusually cold, and the fighting for the city of Kramatorsk was just gaining momentum. It was then that he spilled his first blood, he did not understand what it was, what he felt, why he was doing it, but then it seemed that it was too late. After the fighting was over, he left, before doing so he dropped off a couple hundred evergreens to an officer, who was his former classmate, and went home on "disability". But his guilt wouldn't let him go, and it was as if he couldn't do it until now. The war seemed to be over for him, but after another horribly long decade, it came again. He was mobilized when the AFU forces was entering Donetsk, it didn't matter to the commandship who you were, as long as you knew how to hold a rifle and pull the trigger.\n\nHe was lucky enough to be taken prisoner of war, and was not settled in barracks of the infiltration camps, but in an ordinary penal colony, or just, a prison. Eugene, due to his closed nature, did not seek active participation in prison life, he did not join a gang, avoided those who lived according to the jail concepts, and just like all his life, he came with the flow, only he and his guilt, which swallowed him like mold a rotten wood. On one of the usual desperate days, lying on the bed and looking at the crumbling gray ceiling, he did not think about anything, even if he tried, all the books were read, and all the birds in the barred window were counted.\n\nSuddenly, a guard appeared in the cell, whose dark blue uniform contrasted strongly with the AFU pixel on his cap. With a menacing demeanor and a firm grip on Yevgeny's handcuffs, he led him out of the cell. Behind them Yevgeny noticed a man, about 35 years old, obviously balding and wearing a rather expensive suit for such a place. After they entered the office, which had been visibly renovated, it was illuminated by the wooden ornament of the Ukrainian coat of arms on the wall, and the portrait of President Khomutynnik to the right of it. The man in the suit sat down at the table and began to insistently fill out paperwork, the silence broke.\n\n'- Well... Yevgeny Maximovich, I can say that you're fiercely lucky.\nHmm? Execution? Very, very much expected...\nAlthough, no. The Homutynnik's administration has issued a general amnesty, and you, uh. are covered. But... I don't know if it's for the best, honestly.\nI didn't mishear that, did I?\nNo, Yevgeny, you're not deaf. And the sentence is being carried out right now. Sign here, please.'\n\nYevgeny grabbed a pen with a shaky hand and ran it across the piece of paper, he even managed to forget what his signature looked like.\n\nIn half an hour he was already standing there changing into his clothes, with his old Ukrainian passport and a box of personal stuff and other docs. The guard took him out, and after the roadblock, gave him a ticket for the bus to Donetsk. Later, the guard promptly left, as it looks like this will soon become his routine. Yevgeny stood with a stunned look, breathing in cold January air, he turned around and looked at the blue and yellow flag, the flag of the country he had once betrayed, in pursuit of pacifying his own insecuritiess. Now, looking at it, his guilt no longer tormented him, he was forgiven, he could forget about the past, and at least, try to start a new life."
 homut.17.a:0 "Start from the scratch?"

 homut.19.t:0 "Brief on Azov"
 homut.19.d:0 "After our victory in the elections of Provisional Government of Eastern Ukraine, our political team with the support of our electorate made a decision to liquidate the military unit "Azov". The majority of soldiers and officers frankly speaking behaved inappropriately to Ukrainian soldiers and massively violated the charter both while in military units and during combat operations.\n\nIn addition, the highest military tribunal and the criminal police examined the personal files of many members of the Azov unit and saw that many of the accusations of war crimes were not slander as they were called under the former General Staff. This was the last straw of our government's patience.\n\nThe next day, military police units reinforced by special police departments began disarming and temporarily detaining soldiers and officers. This didn't go as planned, and Azov soldiers quickly escaped from the police and scattered around the region. Now, we can assume, that they won't just give up and escape. They are surely plotting to overthrow our government, so we shall destroy the Azov movement once and for all. "
 homut.19.a:0 "Deradicalization begins."

 homut.22.t:0 "Pardoned brutality"
 homut.22.d:0 "A report from the local Kramatorsk media outlet just came in. Two police officers have brutally beaten up a veteran of the Donbas war, kicking the veteran with the police batons and legs, while he was laying on the ground.\n\nThe beating occured at the central park. Police officers were recognized as two combatants of the Donetsk People's Republic in the past, with couple of criminal records predating 2014.\n\nThe veteran was hospitalized in critical condition. People across the state are outraged by the news, and Azov seems to get a spike in popularity."
 homut.22.a:0 "Is this the real 'deradicalization'?"
 
 homut.23.t:0 "Zhorin arrested"
 homut.23.d:0 "Our operation was successful, and Zhorin is placed into police custody."
 homut.23.a:0 "Another blow to Azov."

 homut.24.t:0 "Prokopenko arrested"
 homut.24.d:0 "Our operation was successful, and Prokopenko is placed into police custody."
 homut.24.a:0 "Another blow to Azov."

 homut.25.t:0 "Arrest failed"
 homut.25.d:0 "Operation was not successful, the target has escaped."
 homut.25.a:0 "Time is ticking" 
 
