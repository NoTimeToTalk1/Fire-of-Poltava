 afu_diplomacy_with_russia_category_desc:0 "§HCURRENT STATUS OF NEGOTIATIONS WITH RUSSIA:§! [GetCURRENTSTATUSOFNEGOTIATIONSStatus]\n\nAlthough there are no official ties between the Donbas administration and the Kremlin, there are whispers in the corridors of power about secret talks, indirect signals and old channels that have been revived. Khomutynnyk's government wants stability, and for this it needs the support of a strong player. Will Russia meet it halfway, or will it use the situation to exert influence? Or will it refuse altogether? Russia has a number of demands for our government:\n\n[RUS.GetFlag]§HRussia's current attitude towards [AFU.GetFlag]us:§! [FulfilmentOfRussianRequirementsStatus]\n\nStart Deradicalization: [GetDENAZIFICATIONStatus]\nReduce the number of the far-right: [GetRADNAZNumStatus]\nRelease of political prisoners: [GetPOLITZEKIStatus]\nStop persecution of the Russian-speaking population: [GetRUSOPITEKIStatus]\nInstall Kolesnikov as head of the government: [GetKolesnikovStatus]\nGranting broad rights to the UOC-MP: [GetRussianChurchStatus]"
 
