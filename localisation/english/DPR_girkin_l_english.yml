 gir.40.t:0 "The Grand Coronation of Emperor Rostislav Romanov" #.930
 gir.40.d:0 "In a grand ceremony held in the historic city centre of Donetsk, a wave of anticipation and excitement swept through the nation as Rostislav Romanov prepared to ascend to the throne as the All-Russian Emperor. The coronation, a symbol of continuity and tradition, was meticulously planned to showcase the unity and strength of the Russian people.\n\nThe coronation regalia, steeped in history, was brought out for the occasion. Rostislav Romanov was adorned with the Imperial Crown, an intricate masterpiece embedded with precious gems symbolizing the unity of the Russian lands. He also received the Imperial Scepter and Orb, representing authority and the sovereign's commitment to justice.\n\n"Slava Emperataru" Was heard all over the hall once Rostislav Romanov in a symbolic fashio, took the crown and coronated himself."
 gir.40.a:0 "New age for Rus` has begun"
 
 gir.97.t:0 "Statement of Emperor Rostislav" #.931
 gir.97.d:0 "To all the people of Rus'!\n\nIn the name of the peace and prosperity of our homeland, in the light of new challenges and difficulties, I, Emperor Rostislav, address you with this important proclamation.\n\nSince my accession to the throne, I have watched the tensions that have been building up between our empire and our neighbouring states. Today, recognising the need for stability and tranquillity for all citizens, I have taken a decision that requires courage and clarity of mind.\n\nI call for an end to all disputes that have led to the suffering of our people. From now on, we must strive for unity, not division. We are an empire that seeks peace. Our strength is not in aggression, but in the unity and prosperity of our people. I call on you, my loyal subjects, to unite in this new era, where we will build a future based on mutual understanding and cooperation.\n\nMy faith in our nation is boundless. Together we will be able to overcome all the challenges we face. Let us leave behind the conflicts that only divide us. Let this decision be a new step towards restoring trust and peace in our land."
 gir.97.a:0 "Glory to Rus'!"
 
 gir.53.t:0 "Heating events in Donetsk" #.932
 gir.53.d:0 "In the very epicenter of a new political formation on the ruins of Ukraine, opposing forces collide, again, not with fire and sword, but with pen and word. Igor Girkin, the Prime Minister of the Russian Empire, has already repeatedly in closed meetings, and sometimes in interviews, personally condemned the new emperor for, as he put it, “Anglo-Saxon opportunism,” which discredits the honor of a real Russian man. In Girkin’s vision, Russia should stand firmly on the stilts of traditional bonds, and not under the influence of the corrupting West, which is corrupting the pristine Russian culture with its excessive freethinking. As Girkin has stated more than once, “A Russian person is one who is unconditionally loyal to his homeland and his sovereign, because the power of the sovereign-emperor is from God, and a real sovereign should not waste his great gift on some absurd measures.” Based on this and on the convictions of the Triune Russian People, Girkin argues that it cannot be allowed that the hand that contributed to the creation of Operation Unthinkable, the Dallas Plan and, finally, the establishment of the Kyiv Junta, further desecrated the Orthodox land of the Russian people . Girkin, a prominent representative of Russian autocracy and conservatism, who grew up on the soil of traditions and reverence for the heritage of the White Guard, obviously sees in Emperor Rostislav I a man cut off from his historical homeland and, as a result of insidious Anglo-Saxon propaganda, who believed in the influence of destructive forces. Rostislav’s desire for Western-style liberal democratic ideas causes indignation and, for now, secret confrontation in Girkin’s camp, where his allied forces begin to build their political line with enviable despair, opposing any liberal law. There has already been a lot of controversy about this. In these undercover games, as if in a kaleidoscope, supporters roll from one camp to another."
 gir.53.a:0 "Lets look..."
 gir.54.t:0 "Heating events in Donetsk"
 gir.54.d:0 "This is due to the fact that many of Girkin’s supporters are also monarchists, and in their eyes the authority of the tsar is also great. Girkin, devoted to his ideals and beliefs, feels the bitterness of betrayal, seeing how the new emperor prefers what he hated all his life. For him, this is simply nonsense, as for most of the government. And at this time, the young Emperor of All Russia Rostislav I, filled with the desire to change and, ultimately, reform the country globally, runs into his inexperience in governance and the secret resistance of his closest advisers, including Girkin, which almost completely nullifies any attempts at reform. The consequence of this Cold War was a virtual political split in the Imperial Party. The two factions tirelessly fight each other, accusing their opponents of almost all mortal sins in the newspapers. How this struggle will end is still unknown, but according to Western analysts, such a split was expected, so we should expect some loss of political power and prestige within the country of the ruling party, at a minimum, and at a maximum, a civil war. But Western experts doubt its beginning, because all parties to the conflict support monarchical ideas to one degree or another."
 gir.54.a:0 "His Majesty knows what to do."
 gir.54.b:0 "The General must cool the young man's ardor."
 
 gir.42.t:0 "Dismissal of Girkin as prime minister" #.933
 gir.42.d:0 "Tsar Rostislav paced back and forth in his opulent office in Donetsk, the weight of the decision he was about to make etched across his stern face. He had called upon Girkin, a man known for his political disputes wiith Rostislav and strategic thought how to put him out, to deliver news that would change the course of Girkin's career.\n\nAs Girkin entered, Rostislav's eyes narrowed, and a sardonic smile played on his lips. "Girkin," he barked, "your political games have proven inadequate for the challenges we face. I've called you here to inform you of your new role. You are now going to be a Chief Commander. Since you were always trying to put me out from the shit i do daily for the country.  - Rostislav's eyes flashed with disdain. "Consider it a lesson in humility, Girkin. The empire needs a leader who can adapt, not one stuck in the quagmire of political intrigue."\n\nGirkin, along with suprise and disdain, tried to back up -  "Your majesty, I am a man who has to deal with internal problems and with the external ones at the moment" Rostislav looked up from the documents and looked Girkin straight in the eyes and said: "This is an order, you will argue one more time and we will turn you away and beat the shit out of you!"\n\nAs Girkin left the room, the weight of his new role bore down on him, accompanied by the echo of the Emperor's biting words. The transition from Prime Minister to High Military Commander felt like a public stripping of his former status, a humiliating fall from grace orchestrated by a ruler determined to reshape the empire with an iron fist."
 gir.42.a:0 "No more denikinism."
 
 gir.x.t:0 "Girkin rules Supreme" #.934
 gir.x.d:0 "Russian tsars have always been unstable. Almost all tsars were Germans, Danes, French, but definitely not Russians! Always showed oddities, the same Rasputin came close to the family of our ruler.\n\nAnd so, after returning home, it was to be expected that our ruler stupefied by Western ideas and propaganda would try to weaken our country.\n\nToday, detachments of the Tsar's loyalists and his personal guards attempted to disarm the garrisons in Petrograd and Moscow. But our brave Field Marshal Girkin sent military police troops in time and those who remained loyal to their oaths to our country and not to the Tsar personally were able to defeat the forces of traitors in the streets of the cities! A column of tanks entered the courtyard of the ruler's palace and special forces disarmed his guards.\n\nThe military field court right in the courtyard of the palace of the tsar sentenced him to house arrest, also he must hand over most of his powers to a true patriot, who went through fire and water for the sake of our empire, Igor Girkin is now the de facto ruler of Russia."
 gir.x.a:0 "Long life to the Russian officer!"
 
 gir.39.t:0 "Sending an Imperial Delegation to UN" #.935
 gir.39.d:0 "In the grand halls of the royal palace, Monarch Rostislav of the newly formed Novorossiya faced a critical juncture in his reign. To assert his legitimacy and commitment to democratic principles, Rostislav decided to send a delegation to the United Nations. His mission was clear: to convince the international community that Novorossiya was a beacon of democracy, free from imperialistic ideals.\n\nRostislav, accompanied by his delegation, stands nervously in front of the imposing UN doors. Sweat beads on his forehead as he contemplates the weight of the discussions ahead, feeling a mix of anticipation and anxiety about the diplomatic challenges that lie behind those doors.\n\nAlthough, their presentation at the UN was a meticulous blend of historical context, highlighting Novorossiya's recent shift from a monarchy to a constitutional monarchy. Rostislav, in a heartfelt letter to the UN General Assembly, expressed his dedication to democratic principles, the protection of human rights, and the pursuit of international cooperation. Rostislav at the end of his mission of convicing he has added "Our country is totally not artificial, please recognize us!""
 gir.39.a:0 "Good Luck."
 
 gir.48.t:0 "UN chair" #.936
 gir.48.d:0 "Good afternoon, ladies and gentlemen, this is Washington News. Today, a strange situation has occurred, officially it has been reported that the Empire of Rus is recognized as a descendant of Ukraine, which will give it a seat at the UN headquarters.\nAfter the coronation of Rostislav Romanov as Emperor of Ukrainians and Russians, his government sent a plea to recognize the Empire of Rus as a descendant of Ukraine. Due to the fact that his country was the last one to unite Ukraine after the events of the Fire of Poltava, some world leaders officially recognized him, which even led to an official vote at the UN on the topic of recognizing the Empire of Rus as a descendant of Ukraine. As a result of the positive vote, as well as due to bureaucratic norms, the Empire also received a UN seat for Ukraine.\nAfter that, the Empire's diplomats planned to hold a speech to thank the Emperor for the recognition, but they got into a confrontation with Russian Ambassador Lavrov:\n"What the fuck is this? Your "emperor" is not a legitimate descendant of the Romanovs! Moreover, you are claiming the entire territory of the Russian Federation by his title alone! What does "Emperor of the All-Ukrainian and All-Russian" mean?!\nWe will not tolerate the desecration of the Emperor's personality, and therefore we are leaving the voting hall.\nWhat this means for the world and how it will affect geopolitics is on our program today! And now - a commercial break. "
 gir.48.a:0 "What the..?"
 
 gir.50.t:0 "Unity of Ukraine" #.937
 gir.50.d:0 "The parade began on Kyiv's Independence Square. First, joint motorized regiments marched. They were followed by motorized infantry divisions with banners. The banners depicted the flag of the Empire of Rus, as well as the flags of the divisions. At this time, the crowd near the central square was closely watching the parade and shouting with pleasure, waving their flags.\nVarious generals were sitting behind the rostrum, as well as Emperor Rostislav himself, of course, on a separate balcony, under good security. After the divisions marched, a military band played the anthem of the Empire.\n\nAfter that, Colonel Igor Girkin approached the stand with a microphone. With obvious awkwardness and dissatisfaction, he began his speech in Ukrainian:\n\n"Dia... Dear friends. I am happi to announce that it is only thanks to you, Ukrainians, that we were abel... were able to unite our Great Empire. Our great comonwelth... commonwealth of the Ukrainian and Rusian nations. Only yor dedication, loyalty to the crown and assistance allowed us to achive what we have now." - One could feel Girkin's tone losing more and more life with every word he spoke\n\n"Without you, our great Empa... Empire would not exist, and if it were not for Ukrainians, the Rushian... the Russians of Donetsk and Luhansk would have remained in Donbas. And under mai... my command, we were able to unite our glorius... glorous... gloriaus... glorios... fuck, glorious Empire of Rus" - after these words there was a long pause, while one could hear a nervous, flipping of papers with the text of the speech.\n\n"Over the years, the Ukrainian people have suffered a lot. Because of the Donbass war started by... the mongrels of Putin... ahem, because of the events of the Fire in Poltava, because of the oppression of Ukrains... Ukrainians after the loss of the Armed Forces in the war with Novorossiya... But now it is in the past. A glorious future awaits us, as it does for fraternal peoples." - After finishing his speech, Girkin quickly went downstairs, red as a tomato with rage, recalling all the Russian swear words he knew."
 gir.50.a:0 "For the Tsar and his People!"
 
 gir.57.t:0 "Victory of Humanism. Emperor Rostislav I rebuilt the new Ukraine." #.938
 gir.57.d:0 "According to the majority of the inhabitants of the empire, one of the great and turning points occurred when Emperor Rostislav I, having ascended the throne, carried out a series of reforms according to the Western model, but of course everything was not immediately good and it took him a lot of time, but it was definitely worth it. The Empire of Rus' has such a neutral name that it quite well describes the current territory of the former Ukraine. Having put an end to the consequences of the outrageous rule of Igor Girkin in his opinion, he calls on his people to consolidate around new progressive and certainly better traditions. For him, autocracy is not an end in itself, but only a tool to build a better world. Having consolidated the reformist forces around himself, Rostislav was able to push aside Girkin and his clique, but fearing the outbreak of a potential civil war, he made some concessions. Igor Girkin became the Supreme Commander-in-Chief of the Armed Forces, maintaining his very large authority in the army but finally losing his position in the political sphere. Many of his henchmen also decided to retreat until they completely lost everything they could get during their career. Emperor Rostislav I, as he is also called the architect of the new Russian era, the Russian enlightened renaissance in Western countries, officially restored the unity of the former\n\nUkraine, which had now become an integral part of his empire. Moreover, through diplomatic efforts he achieved that his empire was allowed into the UN as the official successor of Ukraine. As Rostislav said: “I am very pleased to see my country already renewed when children of Russian, Ukrainian or other origin can calmly play together without any prejudices. The unity of peoples in such a large empire is a priority task, because in unity there is strength. These same children will build our future and what will our future be like if we set them against each other?” Imbued with the ideas of Western liberalism, Rostislav realized his dream. And Girkin refuses to comment on the current state of affairs in the empire. According to one of the resolutions, the Ukrainian language acquired equal status to Russian, and the general pluralism of opinions and freedom of speech increased. The conservative Girkin is extremely dissatisfied with the state of affairs, but all he can do is take on the guise of a valiant defender of the homeland, at least for the time being... Also, on the instructions of the emperor, the unification of the Armed Forces was carried out. An important step towards this unification was the inclusion of Cossack regiments in the general structure of the Armed Forces. Some Cossacks were integrated into the state apparatus and some into various military units. Atamans and field commanders who did not renounce extreme chauvinistic views were voluntarily forced into retirement, making way for younger and more promising military personnel."
 gir.57.a:0 "Glory to the Tsar!"
 
 gir.60.t:0 "Incident at the Imperial Palace" #.939
 gir.60.d:0 "The internal, behind-the-scenes struggle for influence and power in the empire reached its climax when Igor Girkin, a strategist and experienced political manager, began to oust, under various pretexts, officials who held extreme royalist, monarchist views. He especially paid attention to provincial administrations and city government administrations. Like a born virtuoso and actor, he “juggled” the criminal cases of different people, choosing the most advantageous moment for himself to remove an unlucky competitor. By subordinating most of the civil power to his influence, he ensured himself complete freedom of action because the majority of the military was on his side. And against those who are not loyal, you can always fabricate a criminal case or an accident will happen to them. A significant moment was when the emperor reviewed his imperial life guards and when he said, “At ease! You can go to your barracks!” The soldiers didn’t even move, but after Girkin repeated the order, they immediately carried it out, after which he laughed and patted Rostislav on the shoulder, saying: “Your Imperial Majesty, apparently you need to go out more often and walk around the yard, otherwise people will forget who rules them.” Girkin, of course, reduced everything to a joke, but the hint in this event was crystal clear. Despite his status as a symbol of the empire, Rostislav was never able to acquire the necessary skills to manage his own state, remaining absolutely helpless in front of the cunning fox Girkin. After several weeks of this event, Girkin, as if by chance, suggested that Rostislav transfer to him some of the bureaucratic duties that Rostislav had previously performed.\nRostislav at first resisted you, but after several veiled threats he still gave in, which Girkin took advantage of. And there was no need to carry out any masterly manipulations, because Igor Girkin took advantage of Rostislav’s elementary ignorance and gullibility. After which Girkin gradually transferred more and more responsibilities to himself, rising in his dominance over any courtiers. The inexperienced emperor agreed to transfer powers, sometimes under pressure, sometimes under the pressure of facts, not suspecting that these “boring”, “everyday”, “non-obligatory” powers have a key influence on state affairs and on the state itself as a whole. Under pressure from Girkin, Rostislav shifts more and more responsibilities to him, remaining in fact only a symbol of the empire without real power. Monarchists in the state apparatus do not suspect that their beloved All-Russian Monarch is no longer fully able to govern the country. Girkin masterfully disguised his real capabilities behind tons of bureaucratic acts, resolutions, orders, charters, exposing to the public the “active” activities of the emperor. In propaganda, he presents himself as the ideological inspirer of the emperor, without whom the state could not function normally. Although rumors about the “gray cardinal” are spreading throughout the courtyard, Girkin diligently suppresses them, considering it unacceptable for such rumors to exist, based on the Russian proverb..."
 gir.60.a:0 "'The less you know, the better you sleep.'"
 
 gir.44.t:0 "Darnitskaya Massacre" #.940
 gir.44.d:0 "This morning workers of Darnitsa Carriage Repair Plant staged a mass strike, work was stopped and paralysed, the protest was joined also by railway workers who blocked the railway in the area of the plant, which significantly worsened the efficiency of other enterprises in Kiev. In addition, the protesters threw the Russian tricolour off the roof of the factory and hung a yellow and blue cloth, which they call a flag.\n\nThe city garrison was hesitant to take action for a long time, but when reports emerged that if the strike at the wagon repair plant was not suppressed, a column of workers would march through all the enterprises of Kiev, which cannot be allowed.\n\nAPCs and cars with security forces started to arrive at the plant, the main purpose of the protest is to show that we are "occupiers" and expatriate Ukraine and other Khokhlovian nonsense.\n\nThe situation gets out of control, APCs and soldiers of the garrison open fire from all guns on the workers and pursue them through the territory of the whole factory, a similar fate awaited the railway strikers, the wounded were suffocating from smoke, the factory yard was covered with blood and the working premises were covered with corpses.\n\nThe riot was put down. Long life to the Tsar!"
 gir.44.a:0 "This damned malorussians never calm down..."
 
 gir.92.t:0 "The Song" #.941
 gir.92.d:0 "Under our policy of strict imperial control, a new form of resistance began to emerge in the underground circles of Ukraine - a song that quickly became a symbol of the struggle for freedom and independence. We have categorised this song in the archive as ‘Pisnya pro mogylu materi’ (Song about mothers grave) - as it was called by those who, despite the fear and brutal measures of the Empire, continued to fight for the so-called Ukrainian identity.\n\nThe story of the song's creation is shrouded in mystery. According to legend, it was first sung by a young girl at a small gathering in one of the underground shelters, which was later uncovered by our intelligence and cleared of partisans. The words were simple, filled with pain, but on the other hand with hope:\n\n‘My good children,\n‘I used to rule and I\n‘On the wide world,\nRule... Oh Bogdan!\nIgnorant son!\nLook at your mother now,\nYour Ukraine...’"
 gir.92.a:0 "Ban this immediately!"
 
 gir.91.t:0 "Liquidation of a Ukrainian agitation cell" #.942
 gir.91.d:0 "In one of the remote, dilapidated towns of what was once Ukraine, which had long ago lost its former prosperity and was now under the tight control of the Empire, the security service carried out a carefully planned operation. A Ukrainian underground agitation cell was unmasked - a group of people secretly distributing propaganda materials calling for resistance and struggle for national independence. The entire neighbourhood was cordoned off, and undercover soldiers and agents of the Security Service broke into an abandoned house where the centre of underground activity was allegedly located. Inside they found a printing press, several boxes of leaflets and homemade posters with slogans calling for the liberation of Ukraine. The Supreme Command decided on the capital punishment - the death penalty for the underground agitators for treason against the Empire and disobedience to the authorities. Imperial officers gathered in the local town council where the arrested men were taken. Without lengthy trials, the sentence was read to each of the underground soldiers."
 gir.91.a:0 "No mercy for traitors."
 
 gir.96.t:0 "Afterword" #.943
 gir.96.d:0 "In the shadow of the Imperial throne that once belonged to Tsar Rostislav, a new era has dawned. The Empire had become the personal fiefdom of Igor Girkin. An iron hand firmly held the reins of power. Those who had once revered Rostislav as a symbol of imperial revival now realized that real power had long since left the royal halls.\n\nTsar Rostislav, once ambitious and full of plans, had now become a symbolic figure. He almost did not participate in the affairs of state. Majestic receptions and councils became an empty formality. He lived away from the capital, in his manor, surrounded by luxury, but without real power. Sometimes he was seen at meetings with Girkin and other leaders, but no one perceived him as a decisive player in politics anymore. His words, once full of ambition, now sounded like an echo of his lost opportunities.\n\nGirkin gradually took over all the levers of power. He was no longer just a military strategist - now he was the de facto ruler of the Empire. His friends and allies took key positions in the government. Igor Ivanov, Vladimir Kvachkov, Stanislav Vorobyev - these names now aroused fear and respect, because they were the ones who ran all the affairs of the country. They had money, army and power in their hands. Decisions were made not in the royal halls, but at secret meetings among Girkin's confidants.\n\nRostislav could only watch as his throne, his dynasty, became a relic of the past. All his attempts to regain control of the Empire had failed. He was now a puppet that was occasionally shown at official ceremonies, but even in those rare moments it was clear that behind him stood Girkin, the true master of the Empire."
 gir.96.a:0 "Glory to the Tsar?"
 
 gir.46.t:0 "Coronation of Maria Romanova - Empress of Russia" #.944
 gir.46.d:0 "In the opulent halls of a grand palace nestled within the city of Donetsk, a coronation unfolds as the air is thick with anticipation and the splendor of a royal occasion. The people gather in excitement, their eyes fixed upon the opulent throne where Maria Romanova, a regal figure with an air of grace, is poised to be crowned as the Empress of Russian Empire.\nThe grandeur of the ceremony is heightened by the ornate decorations that adorn the palace. Intricate chandeliers cast a warm glow upon the assembly, and rich tapestries line the walls, depicting the storied history of a realm that stretches across vast lands.\n\nThe ceremony begins with a procession of dignitaries, nobles, and courtiers, each donned in resplendent attire that reflects the wealth and prestige of the empire. Girkin, who sat right next to her, was observing as the new Empress takes the place of such important figure. As the attendees take their places, the atmosphere is charged with a sense of reverence for the momentous occasion. At the center of attention is Maria Romanova, the soon-to-be empress, draped in a gown of regal magnificence. Her presence commands attention, and the crowd hushes in awe as she gracefully ascends the steps to the throne, where the crown awaits.\n\nIn the midst of the solemn ceremony, echoes of traditional mid russian music resonate through the grand hall, adding a majestic cadence to the proceedings. As the crown is gently placed upon Maria's head, the crowd erupts in cheers, and the air is filled with jubilation. Following the coronation, a grand banquet is held to celebrate the new empress's reign. Lavish feasts are laid out, and the palace resounds with the joyous laughter and merriment of the attendees. The celebration continues into the night, marking the beginning of a new era under the rule of Empress Maria Romanova."
 gir.46.a:0 "Slava tsaritse!"
 
 gir.6.t:0 "Disturbed relationships" #.945
 gir.6.d:0 "Maria ascended to the throne. Her son, Gregory, harbored intense resentment towards her as he desired to occupy that position instead. However, by lineage, Maria was rightfully the first in line, having not renounced her claims. Despite this, Gregory couldn't forgive her and began weaving intrigues at the court. He undermined her authority within the state, portraying himself as far more intelligent and understanding. He sought individuals loyal to him personally, rather than to the crown, in his quest for more power, wealth, and privileges. Gregory was a bad son, no one could compare his to anyone. He was just an edgy dumb teen.\n\nGregory's disloyalty and ambitions clashed with Maria's rule, creating a strained and tumultuous relationship between mother and son. The throne became a battleground for power, with Gregory attempting to assert his influence and ascendancy, challenging his mother's authority at every turn. The court witnessed a constant struggle for control, as Gregory maneuvered to consolidate more power for himself, driven by a hunger for wealth, authority, and recognition as the rightful ruler. The tension between Maria and Gregory not only jeopardized the stability of the realm but also threatened to fracture the familial bonds that should have bound them together in a unified leadership."
 gir.6.a:0 "No one mom deserves a retard in the family like him."
 
 
 
 gir.47.t:0 "Girkin is freed by the Empress" #.947
 gir.47.d:0 "Empress Maria's reluctant concession marks a turning point for Girkin, who finds himself stripped of imperial grandeur, assuming the humbler mantle of a mere general. Yet, the transition from the extraordinary to the ordinary proves to be a double-edged sword.\n\nIn the wake of this metamorphosis, Girkin confronts a silent adversary – depression. The weight of unmet expectations, the loss of regal stature, and the challenge of navigating a world devoid of imperial privilege converge to cast a profound gloom upon the once-mighty leader. The echoes of former glory haunt him, resonating with the hollowness of his current existence.\n\nThe daily grind of a general's responsibilities becomes a relentless reminder of what once was, intensifying the emotional struggle within. The juxtaposition of past triumphs against the backdrop of a mundane present weaves a poignant narrative of inner turmoil and existential crisis, painting a vivid picture of Girkin's journey from imperial splendor to the depths of despondency."
 gir.47.a:0 "It`s so over for him."
 
 
 gir.43.t:0 ""Gorynych"" #.948
 gir.43.d:0 "Tonight, under the cover of night, by order of insert name, Imperial Security Service operatives began preparations for an operation codenamed "Gorynych". The aim of the operation is to eliminate the ROVS, an organisation that threatens Russian power and the stability we have long sought. It must be ended now, before it's too late.\n\n22.12 at night, operatives on special landing helicopters land on the roof of the ROVS headquarters.\n\n22.15am, dark armoured vehicles surround the block and approach the building, light and smoke grenades and sniper fire from the surrounding rooftops drive the guards into the building.\n\n22.25 All the guards and most of the average party members present in the headquarters are killed, Ivanov and his close entourage are taken alive. But by special order from the centre of control of special operations forces it was necessary to immediately liquidate all his entourage, which was done. The documents of the ROVS organisation with their plans and the composition of the organisation were seized and the operatives quickly fled.\n\nIn the morning ambulance, police and firemen were already crowded around the building, the official version of death of all those who were in the headquarters of the ROVS - gas leakage.\n\nOur main enemy is finished"
 gir.43.a:0 "Rest in piss."
 
 
 
 gir.55.t:0 "Games of Thrones in the capital" #.950
 gir.55.d:0 "Long before that fateful night, under pressure in the pretentious luxury of the vaults of the hall of the monarchical congress, filled with various delegates from the party, aristocracy, bourgeoisie, military class, merchants and simply influential individuals, the fate of the country was being decided. In the tobacco smoke-filled Kalouars, the fate of the country and its new economic innovations was already being decided, because everyone wanted to bite off a larger piece by bargaining for the redistribution of influence. As a military man, brilliantly dressed as if for a parade, said once that evening, “high business is not for patriots.” At first glances were turned to George, the son of Maria Romanova, but the prospect of his mother on the throne became much more attractive. She was much better at finding the necessary contacts with the elites and had a lot of leverage over her son. In addition, nuances arose that strengthened the position of Maria Romanova, namely, she was much closer to the main royal line. Deciding to avoid possible problems with legitimization, the electors gave her the crown. And already during her reign, Empress Maria of All Russia demonstrated stubborn absolutism. She did not tolerate any rival in power. Having carried out reforms that returned the class restrictions of the Russian Empire of the early 20th century, many people became poor. And during the behind-the-scenes struggle, she strictly restrained the influence of Igor Girkin, arrested everyone who was against her coronation and crushed the White Guard movement within the country. Although these insignificant organizations compared to the central government could hardly be called worthy rivals, Maria clung to the throne with a stranglehold, not wanting to give it up even to illusory opponents.\n\nIn the shadow of her power, her son Georgy Romanov built his intrigues, while his mother did not devote enough time to such a subtle human aspect, preferring brute force methods. But in vain, in addition to his passion for mysticism and esotericism, George found contacts with young officers from the Life Guards of noble origin who were not happy with the belittling of the status of the nobility in front of the imperial person. George, deprived of the throne, combining what at first glance seemed an impossible mixture of narcissism, cowardice, uncertainty and determination, greedily dreamed of power, which in his opinion was illegally taken from him. He gathered a “club of interests” around himself, carefully selecting loyal supporters."
 gir.55.a:0 "We will see..."
 gir.56.t:0 "The legacy of the ridiculous and bloody murder of Paul I"
 gir.56.d:0 "It seemed that young people simply wanted to find secret mystical knowledge, but Georgy simultaneously consolidated supporters around himself. He was unable to openly confront his mother because he was too indecisive for this and the mother herself considered him incapable of betrayal. Even when, at one of the closed government meetings, the head of imperial security directly indicated that Georgy was conducting suspicious activities, she said: “My son is not capable of this. If you do not want me to consider this an insult to my family and the Russian Empire, I would ask you to stop this vile slander." Georgy gained more and more new supporters, and then one night, after checking his astral maps, he suddenly realized that this was the ideal moment for a coup, but he was too afraid to carry it out, so he had to drink glasses of vodka several dozen times for courage. Since Georgy incredibly loved symbolism, theatricality and aesthetic message, he changed into the costume of the officer who killed Paul I, took a flintlock pistol and a gilded snuff box. Having redirected the palace guards through loyal generals, he gathered loyal officers of the Life Guards and went to the palace. Having burst into the chambers of the Empress, George declared: “Mom, I will put an end to your tyranny! The Russian monarch has always ruled with the support of the nobility, because this is the natural position of the Russian people. By violating this tradition, you are violating the very essence of the Russian reign, so you cannot be called a legitimate empress because of what I will be the new emperor and you will have to go into the past! Then he staggered with his companions to Maria’s bed and waved his snuffbox, symbolically shouting “Alea iacta est!”\n\nMaria just had time to scream before the snuffbox crushed her left eye and eye fluid with splashes of blood covered George’s face, causing him to back away in fear, dropping the snuffbox and eventually feeling sick. Georgy began to fall over, trying to cling to the velvet curtains, which were torn, and he almost shot himself in the leg with his own pistol. Luckily the bullet only scratched his leg. After which he shouted hysterically with the order to finish what he started, and the officers of the Life Guards opened heavy fire from their service MP-443s until the convulsions of the dying woman stopped and the blood soaked the snow-white bed, feather feather feathers descended on the unlucky killers while Georgy extricated himself from the curtains with the drenched bloody face. The next day, the coronation took place and the fact that the Cossack guards were absent during the assassination attempt by “unknown persons” served as the reason for mass repressions among the Cossacks, since George saw them as his own competitors and it was obvious that many of them guessed about the real state of affairs... George himself saw in himself a kind of conduct, a martyr, a mission of the Russian people who opened the path of truth. Next, he began to purge from the government all those disloyal and all those he did not like. After which, at a closed meeting among his loyalists participating in the coup, he distributed to them individually each an important state industry, thereby founding Russian state corporatism from loyal sycophants."
 gir.56.a:0 "God, save their souls..."
 
 gir.58.t:0 "New aristocracy, old orders" #.951
 gir.58.d:0 "So many thoughts and memories swarmed in the empress’s mind. Sitting in the chair of his desk, remembering the book “The Wisdom of Jesus the Son of Sirach”, which he had read a long time ago, saying out loud a quote from there that came out of his mind into his mouth.\n\nWith the unmerciful - about charity, with the lazy - about any matter...\n\nMaria then began to think about the thoughts that had been haunting her for so long.\n\n“The temptation of freedom in its terrible, insidious form causes deep fears in my heart. My excellent and great Russian people often almost point blank do not distinguish the debauchery of the West, seeing virtue in them. This is truly outrageous... Nevertheless, these many undoubtedly blind people admire the bourgeois Americans considering them as “a completely free and prosperous people." But if you look at the situation objectively, how can they be so ignorant of the vile Bolshevik propaganda? In turn, a natural question arises about social mobility. Why do these troublemakers need so-called social freedom, extensive guarantees if is everything already predetermined by their origin? This is all just profanation, because such demands are only the source of the strongest upheavals in Europe and 1917 clearly proved that all these unrest were artificially initiated by the left and false promises of the Bolsheviks. The temptation of coming to power created by the Bolsheviks seduces the fragile minds of the working people. The workers simply don’t know what they’re doing... Didn’t the traitorous Republicans provoke the emerging middle class by overthrowing Louis 16? It is quite obvious that everyone has their own place, as it was thousands of years before the Rurikovichs themselves, the Romanovs at the throne. The tireless attempts of the vile Bolshevism to destroy the people and their traditions have always been the main means of undermining the foundations of the dominant white civilization."
 gir.58.a:0 "Tsaritsa know what she do."
 
 
 
 
 
 
 
 gir.61.t:0 "The unconditional verdict of Emperor George" #.956
 gir.61.d:0 "Georgy stood in his office and felt a chill. He still remembered how he trembled... He remembered how it seemed his unsurpassed plan to make the murder so sublime, theatrical failed when he almost shot himself in the leg and collapsed under the pressure of his own self-doubt. George saw himself as the new Louis 14 and even now walked like him. And these Cossacks might have suspected something. The generals loyal to him, under the pretext of an order from the empress, ordered the Cossack guards to be removed from the palace, and after the same order, the assassination of the empress by “unknown persons” followed. The more Georgy thought about it, the more he imagined scenes where the Cossacks expose him completely, without a trace. Frightened by this prospect, he decides to issue a secret decree. Fabrication of a criminal case against the entire Cossacks. He wanted to accuse the Cossacks of murdering the empress. But they were all armed to the teeth and were excellent warriors. Therefore, he decided to act very vilely. He announced a military exercise for all Cossacks, after which a few weeks later all the military Cossacks were taken to the indicated place, a military camp and a Cossack headquarters were set up. Troops loyal to George placed fortified machine gun emplacements and numerous artillery batteries around a very large military camp at night. And at 4:00 in the morning the artillery shelling began, the aircraft launched a massive attack with white phosphorus and napalm. No one was spared.\nIt was a real massacre and the screams of dying people were heard throughout the area. The most important atamans who were stationed at the imperial palace were generally arrested in advance and tried. After which he was sentenced to death by firing squad. Western countries did not recognize this court due to multiple inaccuracies in the prosecution case and also due to multiple legal and judicial violations during the trial. Cossack military warehouses were placed under a cordon and handed over to the army. The court also, by an additional order, declared all the Cossacks guilty, so punitive operations to clean up the Cossack villages were developed no less quickly. In some villages they were taken prisoners and some villages were simply burned with napalm or punitive detachments. And many hundreds of kilometers away, his soldiers were commanded by an unknown Major, Sergei Valerievich. This was his first truly combat mission, because for most of his service he was sent to military rear work. He ended up serving for a long time but then retired. And so Sergei again did not get enough sleep, jumping out of bed at 5 o’clock in the morning from another nightmare that was associated with his activities in the Zaporozhye Sich. Specifically in one of the villages. Sergei tried over and over again to psychologically prove to himself that he was not guilty of anything, he was simply following orders, but that one of the many villages still couldn’t get out of his head... The authorities from above reported that large combat-ready forces of Cossack separatists were hiding in this village and it’s even possible that their headquarters is therefore no longer a village but a military facility of the enemy and the enemy needs to be eliminated. He commanded a battalion that was supposed to be the first to arrive in the village to eliminate the enemy."
 gir.61.a:0 "Kozaki, kozaki..."
 gir.62.t:0 "The unconditional verdict of Emperor George"
 gir.62.d:0 "Before the operation, Sergei received instructions from the command and instructed the soldiers that the settlement was occupied by the enemy who was ready to offer fierce resistance, the presence of civilians was not expected. After a 10-minute artillery preparatory assault, the assault began. However, the soldiers opened fire on the villagers who were doing their work. The soldiers drove people into houses and locked them there, burning buildings with people, shooting residents while Sergei understood that every life taken was also his fault. A group of fugitives who tried to hide in roadside ditches were killed with bayonets, sapper shovels and rifle butts. Some soldiers refused, even under pain of a military tribunal, to carry out the order. Devastated and morally broken by the sight of the massacre, Sergei decided to somehow help civilians and decided to finish off the wounded. This strange thought arose against the background of an irreconcilable struggle in his soul between moral principles and what he considered the great duty of serving Russia. He shot in the heart or head of the wounded, and then when he had moved far away and these moral contradictions began to beat in him with even greater force, he saw a boy with an arm hanging from his muscles, the bone had been shot off, and the look of this boy seemed to pierce right through him, saying, “Uncle, why are you doing this?” done?". Sergei will never forget the look of this boy. Thoughts were racing through his head: “Failure to carry out an order is a betrayal of the homeland and a tribunal.” Gradually falling to the ground, leaning against the wall of some house, Sergei, unable to bear it, raised the pistol to his temple, wanting to end this, but there were no cartridges at that moment, as if he was surrounded by a haze of common sense and the principles inherent in man finally left him. He pulled out a dirk from its sheath and cut the boy's jugular vein, wanting to end this gaze by any means.\nThe cutlass passed instantly through the boy's throat, stained there was plenty of murder weapon and murderer's blood... By that time, the cartridges began to run out and the soldiers had to wield knives on the necks of the so-called separatists. This kind of haze of madness had already passed along with adrenaline when Sergei held a bloody ax and dirk in his blood-covered hands and stood near a ditch with beheaded villagers while soldiers finished off the survivors with bayonets and butts. Looking around, he saw that he was still feverishly pressing the trigger of his pistol. He was shaking as if with a fever and he wanted to vomit from the realization of what he had done. He thought that what kind of military man was he after he gave such slack? After these events in the village, soldiers who refused to follow orders were court-martialed and their further fate was unenviable in the form of execution for treason. This was the first such operation to destroy the separatists, so he remembered it in detail for the rest of his life. Of course, there were others, but as described above, this operation was the most memorable; then, if I may say so, he became callous, getting used to trying not to let his emotions get out of control. Another veteran, after what Sergei had gone through, would probably have started drinking and ultimately shot himself, unable to withstand the psychological stress, but Major Sergei had strong willpower and ardent patriotism that even the smell of war could not break. Now in the evening he sits in his major’s uniform with that same dagger in its sheath, reading the Bible, plunging into more pleasant memories of the end of his service, when he managed to do administrative military work and developed various tactics for motorized infantry."
 gir.62.a:0 "Silence over Don again."
 
 gir.73.t:0 "The Tzar" #.957
 gir.73.d:0 "In the 'Grand Finale', As the only absolute power left in the country, Georgiy firmly held all the threads of management and control in his hands, establishing a new order and determining the future of Russia. His imperial authority is indisputable, and his power unshakable. Georgiy further strengthened his position by eliminating more and more Maria sympthathizers and killing more opposition to make sure to secure absolute power.\n\nThus, Georgiy became a symbol of the fact that with dedication, perseverance and the ability to make decisions, you can reach incredible heights and realize your greatest ambitions. Georgiy will forever go down in history as a great ruler who exerted an untold influence on the fate of Russian Empire.\n\n"I won."-The Tzar proclaimed calmly, knowing, that his hard work, sacrifices and precise planning to take down his stupid mother were not in vain. Ambitions were achieved, plans completed. He simply won. "As they say - it could've all started from... Fire Of Poltava""
 gir.73.a:0 "History is written by victors."
 
 gir.87.t:0 "`Ukraine does not exist`" #.958
 gir.87.d:0 "’Dear people of the Great Russian Empire, it is time to dispel the fog of lies that has poisoned your hearts and minds.\n\nThe Great Empire does not recognise any artificial borders in the minds of its people. We are the only nation that has been carrying out its mission for centuries on the territories from the Carpathians to the Pacific Ocean. Ukraine? Malorossiya is not a separate state, it is part of our common destiny, our blood and history. This is the truth that they have been trying to hide from you for decades, imposing the idea of an artificial Ukrainian identity invented by enemies who wanted to tear the united Russian people apart.\n\nWe must reveal why the so-called ‘Ukrainian people’ is a myth created by political adventurers to divide our sacred land. There is no separate history of Ukraine - its history has always been part of the history of Russia. KIEV is the mother of Russian cities, the centre of our ancient heritage, which has always belonged to Great Russia. Ukrainian culture is a kind of Russian culture, which flourished thanks to our common spiritual identity. When teachers and propagandists tried to impose the idea of a separate nation on you, they sowed discord, which has always been against the interests of the whole nation. The years of independence have brought only suffering, corruption and chaos. Ukraine has never been strong, because its only strength lies in its union with Russia, in the union of peoples who share a common language, religion and culture. From Bohdan Khmelnytsky to Ivan Kotlyarevsky, they all wanted to be reunited with Moscow and serve one, united Russia.\n\nIt is time to put an end to this lie. Ukrainian identity is a fiction, a myth that has been used to divide our mighty nation. The truth is that we are all Russians, and our destiny is to be united under the flag of the Russian Empire. Reject these empty words about separateness, feel proud again of your common heritage and accept your true place in a revived empire.\n\nOur strength is in unity. Our common history is our truth. And nothing can divide what is bound by blood and faith.’"
 gir.87.a:0 "Sincerely, [DPR.GetLeader]"
 
 gir.64.t:0 "George speech" #.959
 gir.64.d:0 ""My subjects!\n\nToday We, Tsar George Mikhailovich, stand above you with the decree, full of the great responsibility before the great history of  Rusisan people, by right belonging to our Glorious Dynasty of Romanovs, primordial children of Russian people, successors of Grand Princes of Kiev and Moscow, lords of the Land of Novgorod and Polotsk, explorers of Siberia and the Far East, discoverers of Alaska and tamers of unruly Central Asia.\nWe urge you!\nOur country is under the shadows of illegitimate and non-native power, fierce bandits are taking away... but Our Grace will bring you faith in a bright future.\n\nThe heart of Velikorossiya beats in each of you, and now it is time to unite our forces to return true power to the hands of the great nation. Neither Putin, nor his pawns, nor his regime, nor his guards are representatives of our interests. They have brought the country to a dead end and taken away from you your ancestral right to serve the Great Dynasty, consequently to serve the Russian people. We will not stop until our banner rises over the Kremlin and the Winter Palace, over the Volga and over the Urals. Until we get our shoes wet in the Pacific Ocean! And let our unity be the mighty sword that pierces the mirages of democracy and Bolshevism.\n\nTherefore, We, George Romanov, Emperor of All Russia Command!\nBow down before My Power and serve Me with Faith and Truth! Serve your Fatherland!\n\nThank you all My Faithful soldiers, My brothers and sisters. May Our faith lead Us to a new bright blossoming of Great Russia.\n\nFrom the my heart with good intentions,\nHis Majesty the Lord of All Russia, Tsar Georgy Mikhailovich Romanov.""
 gir.64.a:0 "Long live the great united and indivisible Russia!"
 
 
 
 gir.41.t:0 "The Hike" #.961
 gir.41.d:0 "[THE DAY YOU HAVE WAITED FOR CENTURIES HAS BEGUN]\n\nAmidst the gathering storm clouds, the Imperial Commander In Chief Girkin, a figure of imposing stature with a resolute gaze, stepped forward onto the raised platform before his assembled troops. His Kevlar Helmet gleamed in the dying light, a testament to the strength of the Empire he represented.\n\nWhen he adjusted the microphone he started: "Soldiers of the Imperial Empire!" his voice echoed across the plains, reaching the ears of every warrior under his command. "Today, we stand on the precipice of history. The time has come to face the forces of the larp Russian realm, to defend our honor, our people, and our way of life." A roar of approval erupted from the ranks, the sound echoing across the plains like thunder. The commander continued, his words a rallying cry that stirred the hearts of his soldiers. "For too long, the Russian forces have encroached upon our lands, seeking to impose their will upon us. But today, my comrades, today we shall show them the indomitable spirit of the Imperial Empire! We shall stand as one, a formidable force that cannot be broken!"\n\nAs the commander spoke, the winds seemed to carry his words across the plains. The two armies, each driven by a sense of destiny and the echoes of their ancestors, prepared for the clash that would echo through the ages.\n\nWith his final words, the commander raised his AK-74 once more and with the loud battle-cry he screamed: "CANNON FODDER TACTICS WERE ALWAYS SUCCESSFUL!", and the army of the Imperial Empire was encouraged to FIGHT, a force united in purpose and bound by the echoes of history. The epic WAR between empires had begun, and the outcome would be written in the blood and sweat of those who fought for their nations."
 gir.41.a:0 "'Mi smelo idyom vperyod...""
 
 gir.69.t:0 "Russian victory... over Russia?" #.962
 gir.69.d:0 "Today, on the television of the Reunited Russian Empire, at exactly 12 noon, the anthem was played. After that, it was announced that after a short resistance, the heroic troops of the Empire were able to drive the troops of the usurper out of Moscow, and then continue the heroic march to Siberia, where his troops were finally defeated. Currently, the dictator is in the penal colony No. 3 in the village of Kharp in the Yamalo-Nenets Autonomous Okrug. It's already known that Vladimir Vladimirovich Putin will be executed for treason and usurpation of power. But it is not yet known what exactly will happen in world, because it has already been announced that the Russian Federation has been completely defeated and Russian Empire has returned to the world stage."
 gir.69.a:0 "Bozje, Tzarya Hrani!"
 
 gir.78.t:0 "Coronation, as it belongs" #.963
 gir.78.d:0 "The coronation of the Emperor's son, Georgiy, took place in the Assumption Cathedral of the Kremlin. Since Georgiy had already been crowned earlier in Kyiv before the conquest of Moscow, the ceremony was expected to be really-really special. On the other hand the transition of imperial centers symbolized some kind of "pivotal" moment.  The solemn rituals and traditions of the coronation ceremony echoed through the hallowed halls, marking Georgiy's ascension to the throne in the heart of the empire.\n\nGeorgiy's coronation in the cathedral, surrounded by its grand decorations and stunning design, emphasized the long-standing imperial tradition and asserted control over recently acquired lands. It was a moment that reverberated through history, shaping the course of the empire and solidifying its presence in the annals of power.\n\nAs Georgiy received the imperial crown in the Assumption Cathedral, it signified not only his personal honor but also the culmination of a journey that began in Kiev and reached its zenith in Moscow. The coronation in the Kremlin marked a new chapter in the empire's history, one in which Moscow emerged as a focal point of imperial power and influence over EVROPA"
 gir.78.a:0 "Za tzarya!"
 gir.79.t:0 "Coronation, as it belongs"
 gir.79.d:0 "The coronation of Emperor Maria at the Assumption cathedral in the kremlin marked a significant event in the history of the bloody empire. Emperor Maria had been crowned earlier in Kyiv, but the inevitable conquest of Moscow led to a second coronation in the heart of the newly acquired capital.\nThe "holy" Cathedral which was nestled within the Kremlin walls, stood as an emblem of power and authority. Its historical significance made it the ideal setting for such occasion. As the imperial entourage made its way through the streets of Moscow, the city cheered.\n\nInside the cathedral, among tiny-shiny decorations and solemn chants, Emperor Maria was crowned once again, without any doubt, in a newly conquered capital . The coronation in Moscow mostly served to strengthen the ties between the ruling monarch and her god damn moscouvite slaves in the conquered territories. It symbolized the integration of Moscow into the imperial fold and marked a new chapter in the history of the bloody empire.\n\nFor Emperor Maria, the coronation in the Assumption Cathedral was a moment of triumph and GLORY of her rule. It strengthen her position strongly as the sovereign ruler of a vast and diverse empire, uniting different regions under her banner."
 gir.79.a:0 "Za tzaritsy!"
 
 gir.67.t:0 "Anti-Monarchist Activity" #.964
 gir.67.d:0 "Our victory, often perceived as a throwback to Russia's imperial past, galvanize disparate groups advocating for democracy, equality, and human rights. From grassroots activists to season political operatives, the anti-monarchist movement coalesced around a common goal: to resist the consolidation of autocratic power and uphold the ideals of a pluralistic society.\n\nProtests erupted across major cities, echoing with chants denouncing the resurgence of monarchy and demanding the preservation of democratic institutions. Social media platforms became battlegrounds where activists disseminated information, organized demonstrations, and amplified their dissenting voices. Hashtags such as #NoToMonarchy and #Defendputin trended globally, drawing attention to Russia's internal political upheaval and sparking solidarity movements worldwide.\n\nThe anti-monarchist movement encompases a diverse array of strategies and tactics. Civil society organizations mobilize challenges against government overreach, citing constitutional violations and infringements on civil liberties. Intellectuals and artists lend their voices to the cause, penning op-eds, creating artworks, and staging performances that critiqued the authoritarian turn in Russian politics."
 gir.67.a:0 "We need to crush those traitors!"
 
 gir.76.t:0 "The Epic Speech" #.965
 gir.76.d:0 "In 1923 the Russian Civil War came to a complete end with the defeat of the White Cause on the battlefield, we sailed away from the Crimea, fled to Mongolia and flew to all corners of the world. The Reds took over our homeland and poisoned the brains of the Great Russians with their Jew idea of "Communism".\n\nIn Emigration we created for ourselves the real idea of Russia, Great and Indivisible. Many organisations were created which made plans to return to our homeland and build a strong Russian power.\n\nAnd now after the collapse of the Soviet Union in 1991 there was hope for the restoration of our country, we persevered in our endeavours to regain our homeland and now we are entrenched in our old positions, we have a strong and steadfast Tsar, it is time to return our old possessions that have been detached from the empire! We declare war on the bandit formations that call themselves "governments" of so-called Poland, Lithuania, Latvia, Estland and we take back the Grand Duchy of Finland. We return ours, Russia returns. Let the overseas paws that took away our lands be cut off!"
 gir.76.a:0 "Long live the united and indivisible RUSSIA!!!"
 
 gir.71.t:0 "The Claims" #.966
 gir.71.d:0 "After humiliation of Russian people's in 1918, Poland, Finland and Baltic States terrorists rebelled creating so called "independent" nations. This was a shock to no one, since bolsheviks were nothing but old men lusting for power, knowing nothing about stability of our past empire. In 1991, once again, they proved their incompetence in leading such strong country, with Kazakhstan, Kyrgystan and the rest of Central Asia, Caucasus falling to the its ethnic leaders, our anger only grew.\n\nAgainst the background of double-headed eagle, which shone as a symbol of our indomitability, at the behest of the imperial regime, Russian troops have gone through fire and sword, restoring the power and majesty of Russia to the lands that were once part of our great empire. Fierce battles and strategic victories swept across our lost territories, as well as the steadfastness of our faith in the justice of Imperial rule.\n\nConquest of the territory became subservient to the empire, proving once more Russia has returned to It's previous glory."
 gir.71.a:0 "The Conquest Has Only Just Begun"
 
 gir.77.t:0 "Economic Measures" #.967
 gir.77.d:0 "After the unification of Ukraine under our tricolour, the whole of Malorossiya from the Carpathian mountains to the steppes of the left bank found itself in an economic vacuum, each region is different from the other in economic terms.\n\nSomewhere the economy is quite stable, somewhere the infrastructure was destroyed by wars or local gangs that ruled the regions. But now all that will change, our [DPR.GetName] announces the inauguration of a campaign of centralized economic reform.\n\nRus Empire in the shortest possible time will carry out industrialisation, restoration of infrastructure, bureaucratic reforms, tax and currency reforms."
 gir.77.a:0 "Let's get to work, gentlemen!"
 
