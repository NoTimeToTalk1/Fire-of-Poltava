 DPR_wagner_presence:0 "Wagner Presence"
 DPR_wagner_presence_desc:0 ""
 
 DPR_colonels_plan_1:0 "Colonel’s Plan"
 DPR_colonels_plan_2:0 "Colonel’s Plan"
 DPR_colonels_plan_3:0 "Colonel’s Plan"
 DPR_colonels_plan_4:0 "Colonel’s Plan"
 DPR_colonels_plan_5:0 "Colonel’s Plan"
 DPR_colonels_plan_6:0 "Colonel’s Plan"
 DPR_colonels_plan_7:0 "Colonel’s Plan"
 DPR_generalissimos_plan:0 "Generalissimo’s Plan"
 DPR_colonels_plan_1_desc:0 "Colonel Igor Girkin is embarking on his grand plan. It is based on a simple but important idea: order and discipline must become the main principles of Novorossiya. The troops are being reorganized, with key positions assigned to dedicated commanders. For now, however, much remains in the early stages. The economy is bursting at the seams, and the people are only beginning to get used to the new leadership."
 DPR_colonels_plan_2_desc:0 "The second stage of Girkin’s plan involves strengthening his personal power. The military begins to play a key role in the management of the state. The civilian administration is now tightly controlled, and all spheres of life begin to obey the military logic. The army becomes the backbone of the country, and national interests come to the fore."
 DPR_colonels_plan_3_desc:0 "Novorossiya is going into full military mobilization mode. Colonel Girkin has realized that without a powerful army, Novorossiya cannot survive in a brutal political and military environment. The army is modernized, conscription intensifies, and large-scale exercises begin. At the same time, aggressive reforms are undertaken to simplify the military bureaucracy and centralize economic control for the needs of the front."
 DPR_colonels_plan_4_desc:0 "Igor Girkin is transforming Novorossiya into a powerful stronghold of imperial ambitions. The colonel has openly declared his intention to regain influence across the former Soviet Union countries and to escalate the geopolitical struggle with the West. The economy has been completely switched to military rails, and patriotic rhetoric is becoming the primary tool for mobilizing the population."
 DPR_colonels_plan_5_desc:0 "Colonel Igor Girkin is almost satisfied. His tough measures and ruthless strategies have already brought many victories, but he won’t stop here. Now it’s time to pursue a more ambitious goal — the final elimination of all internal and external enemies. His plan now becomes the basis of a new era in the Imperial army, where all power is concentrated in the hands of one man."
 DPR_colonels_plan_6_desc:0 "And there it is — the complete domination of the army and Girkin’s personal ascent to the pedestal of power. The state becomes a tool for the realization of his imperial ambitions. The entire country is mobilized, borders are fortified, and the army is ready for decisive action. The internal opposition has been destroyed, and the people are finally united around the idea of restoring the Empire. The time has come for a decisive blow to the enemies of Novorossiya."
 DPR_colonels_plan_7_desc:0 "And there it is — the complete domination of the army and Girkin’s personal ascent to the pedestal of power. The state becomes a tool for the realization of his imperial ambitions. The entire country is mobilized, borders are fortified, and the army is ready for decisive action. The internal opposition has been destroyed, and the people are finally united around the idea of restoring the Empire. The time has come for a decisive blow to the enemies of Novorossiya."
 DPR_generalissimos_plan_desc:0 "With the approval of his plans by Emperor Rostislav, the all-powerful Igor Girkin received the highest possible status achievable. No longer a mere colonel, Generalissimo Girkin, rising from guerrilla commander to the supreme leader of the Novorossiyan forces, deserved this status beyond question. There were those who doubted him, who questioned his vision, his plan. But look at them now. Girkin stands at the peak of his life, having achieved everything he set out to accomplish. He is finally satisfied."
 
 DPR_FSB_1:0 "Local FSB Departments"
 DPR_FSB_2:0 "Imperial Guard Service & SBCR"
 DPR_FSB_1_desc:0 "As the state stabilizes, regional FSB departments are granted greater autonomy to manage internal affairs. This decentralization allows local branches to operate with increased independence, ensuring quicker responses to threats and dissent in the provinces. However, it also raises concerns about loyalty and oversight, as power becomes more diffuse."
 DPR_FSB_2_desc:0 "To address concerns about loyalty and oversight, a new internal security service has been established to monitor and suppress dissent, replacing traditional FSB departments in the regions. The Special Bureau for Combating Revolutionism has also been created. Its members are known for their aggressive anti-Ukrainian sentiment and unwavering loyalty to the imperial cause, having adopted the mantra 'FUCKUKRONAZI' as their primary operational focus. This ensures strict control over Novorossiyan citizens."
 
 DPR_new_friends_1:0 "Our New Friends"
 DPR_new_friends_2:0 "Our New Friends"
 DPR_new_friends_3:0 "Our New Friends"
 DPR_new_friends_1_desc:0 "The Russian All-Military Union and White Guard sympathizers have rallied under our banner. These groups, long nostalgic for the lost empire, have found common cause with the new imperial project, eager to witness the restoration of traditional values and the empire’s military might."
 DPR_new_friends_2_desc:0 "The once-independent Cossacks have officially thrown their lot in with the empire, solidifying a new alliance. Known for their fierce loyalty and military tradition, they now stand as staunch defenders of Novorossiya’s interests, boosting both local governance and security in the border regions."
 DPR_new_friends_3_desc:0 ""
 
 DPR_white_legacy:0 "White Legacy"
 DPR_empire_strikes_back:0 "The Empire Strikes Back"
 DPR_white_legacy_desc:0 "The time of a great empire, lost but not forgotten.\n\nOnce upon a time, before those fateful days of 1917, Russia was not just a country — it was a colossus. The empire stretched from the Baltic to the Pacific, held in its hands the destinies of nations and was a bulwark of the Orthodox faith. The empire has fallen, but its spirit is alive, burning in the hearts of patriots. They remember those who fought for the Russian banner and for the white idea. And even if a hundred years have passed, the destiny is to revive again what once belonged to the Russians by right. Russia will return to its former greatness! These are not just words. It’s the call of blood, the call of our ancestors."
 DPR_empire_strikes_back_desc:0 "The Empire is back, and now no one can escape its vengeance!\nGenerations of patriots have waited so long for this moment. The Empire is not only reborn, but also ready to show the world its power. The patriots of the fatherland will reclaim all that was lost and punish those who dare to stand in our way. The Empire is avenging itself, not for revenge, but for justice. Enemies tremble because they know the Empire is back, and its blow will be crushing."
 
 DPR_promoting_orthodoxy:0 "Promoting Orthodoxy"
 DPR_russian_church:0 "The True Russian Church"
 DPR_promoting_orthodoxy_desc:0 "Faith is strength, and strength is in God. We need God. In this storm that has broken over Russia, our only anchor is faith. But faith is not just prayers in churches. It’s a force that will unite the nation. We cannot go forward without God’s blessing. Let everyone know: Orthodoxy is an integral part of the Empire, its heart. The people must believe, because only in this way can we strengthen the spirit and overcome any trials. God is with us, so we will win."
 DPR_russian_church_desc:0 "The saints have returned from exile to revive the faith!\nExiled by the Soviet regime, they are now back home. Priests driven to America and Europe are serving their homeland once more. They return not just as clergy, but as symbols of the restoration of everything that was destroyed. Their prayers, their guidance — all will lead Russia back to the true path of faith. Old men with grey beards, wise and stern, stand at the altars yet again, ready to lead the people forward."
 
 DPR_monarchical_coalition_1:0 "Monarchical Coalition"
 DPR_monarchical_coalition_2:0 "Monarchical Coalition"
 DPR_monarchical_coalition_3:0 "United Monarchical Front"
 DPR_monarchical_coalition_1_desc:0 "Monarchists... shattered but not defeated. Once powerful, they are now fractured, each holding onto their own truth. Yet, from the ruins of the old, something new is being born. Now they are weakened, divided by disagreements about the future. But God knows: this is only temporary. Somewhere deep within each of them remains a belief in the restoration of the Russian throne and the return of autocracy. And in the darkest hour, their faith will help them rise again, like a phoenix from the ashes."
 DPR_monarchical_coalition_2_desc:0 "Still divided, but one step closer to unity. Their voices grow louder; the differences are still there, yet something has shifted — there is now understanding. They begin to move in the same direction, not yet as one, but together. The realization is clear: they can wait no longer. The people are calling for a leader, for a king. And when the moment comes, the monarchists will gather under a single banner. And that moment is fast approaching."
 DPR_monarchical_coalition_3_desc:0 "United under one flag, we are invincible!\n\nThis is it! The fusion of all forces that strive for the greatness of Russia. Monarchists, soldiers, Cossacks, even ordinary people — now we are all one. There is but one goal: to resurrect the Empire! The Grand Coalition stands on the brink of a new dawn. When people are united by a shared vision and unshakable passion, nothing is beyond their reach, and nothing can stop them."
 
 DPR_white_culture_1:0 "The White Culture"
 DPR_white_culture_2:0 "The White Culture"
 DPR_white_culture_3:0 "The White Culture"
 DPR_white_culture_1_desc:0 "The White Movement exemplifies the ideals of honour and devotion to the fatherland, fighting against the Red Terror and other threats to the state. Officers and soldiers of the White Army, steadfast in their oath to the end, stand as paragons of these ideals. Today, their names are once again on people’s lips, and their deeds continue to inspire new warriors of the country. The Fatherland honours their memory, for in it lies the future."
 DPR_white_culture_2_desc:0 "The White Movement came into existence with one simple mission: to destroy the Red Plague that had spread across Russia. Some battles were lost, but the war was not over. Today, the white banner rises higher than ever before, carried by those unwilling to forget the past. And now, the White Movement, proud of its ideals and supported by the entire state, is ready to declare: Bolshevism will survive no longer!"
 DPR_white_culture_3_desc:0 "With the destruction of all threats to the revived White Guard movement, our leader, Igor Girkin, built an ideal community that would stand for centuries. Drawing on the works of past Russian ideologues, such as Baron Wrangel and General Denikin, the Generalissimo has established a militarized, loyal, and brave society capable not only of existing and prospering but also of defending itself. His contribution to history is immeasurable, and his name will forever be written in chronicles and books. As long as his greatness endures, this country has nothing to fear or beware of."
 
 DPR_strategic_initiative:0 "Strategic Initiative"
 DPR_strategic_initiative_desc:0 "It is time to stop being defensive. The Empire cannot afford to sit back and allow the enemy to grow stronger. We must seize the initiative. Our strikes will be lightning-fast, our victories uncontested. Do not simply prepare for war — strive for it. For the truth is: only in battle can true greatness be forged. The goal is to secure the most advantageous position before our enemies realize that a new era has begun — the Age of New Russia."
 
 DPR_malorussia_will_be_ours:0 "Malorussia will be ours!"
 DPR_parliamentarism_propaganda:0 "Parliamentarism Propaganda"
 DPR_liberal_empire:0 "The Liberal Empire"
 DPR_embracing_ukrainianness:0 "Embracing Ukrainianness"
 DPR_truly_new_era:0 "A Truly New Era"
 DPR_malorussia_will_be_ours_desc:0 "Malorossiya is weak and divided, consumed by internal strife and bleeding itself dry, while we stand stronger than ever. Our ambitions extend far beyond the Donets and the Dnepr, and given the current situation in those lands, we now have a real opportunity to fulfill them, crushing every foolish politician and weak-minded commander, and reclaiming what rightfully belongs to us. Malorossiya will be ours!"
 DPR_parliamentarism_propaganda_desc:0 "The promotion of parliamentarism in society will soon yield the result desired by the Emperor, provided we act swiftly, prudently, and effectively. The people still remember elections, both national and regional. And although not all of them are accompanied by good memories, they probably crave this more than the uncompromising power of some unknown commanders from remote Siberian or Ural villages. Democracy will be restored; however, it will take time, and our country and society need to be fully prepared for it."
 DPR_liberal_empire_desc:0 ""
 DPR_embracing_ukrainianness_desc:0 "With the formation of the Empire of Rus on a multicultural basis, our state now faces perhaps one of the most difficult and controversial challenges — the Ukrainian language and culture. The lands of Ukraine, or rather 'Malorossiya' as some chauvinists still refer to it, are mostly inhabited by Ukrainians, who largely recognize their own culture, practice their autocephalous church, honour their own heroes, and speak their own language. These people represent the majority of our cultural and political space, and we have no right to ignore them when making decisions or implementing policies. The Ukrainianness of these lands is indisputable, and only a fool would seek to oppose it. We will support the efforts of Ukrainians to preserve their heritage and traditions, and not just support, but help and stand side by side with them in this, as this is the only way we can truly achieve understanding and coexistence."
 DPR_truly_new_era_desc:0 "Our all-glorious Emperor Rostislav, who challenged the military dictatorship and chauvinistic system, has triumphed over hostile traditionalism and built a new, strong, and united empire according to his own vision. From this moment forward, our state is no longer one of repression, authoritarianism, prohibitions, and tyranny, but a tsardom of freedom, democracy, liberty, and prosperity. His reign has brought many positive and even beautiful outcomes, but it is far from over. May our Emperor live long and continue to guide his people and his country under his generous rule!"
 
 DPR_in_blood_and_purpose:0 "United in Blood and Purpose"
 DPR_peaceful_and_harmonic_empire:0 "Peaceful and Harmonic Empire"
 DPR_bad_consequences:0 "Bad Consequences"
 DPR_in_blood_and_purpose_desc:0 "Having put an end to all internecine feuds, the imperial house stands strong and united once more. The people are loyal to it, the nobility is loyal to it, the army is loyal to it, and now they are even loyal to themselves. Great achievements and glorious times await our empire in this state of affairs, so may God bless our family and our country, for our ambitions know no bounds!"
 DPR_peaceful_and_harmonic_empire_desc:0 "Our empire has finally reached its peak. Nothing can stop its development or ambitions, nothing can match its strength and determination. We have found peace in our lands and harmony in our society; however, this is not the end of the story. There are still many decisions and challenges ahead, and God help us if death and crises arise. Yet we will survive, just as we have survived these hundred years in exile."
 DPR_bad_consequences_desc:0 "The Empress is dead... The nation is shattered, the political circles divided, and the army in disarray. There is much work ahead to restore stability in my... uh... our empire, but we will handle it, as we have always done."
 
 DPR_absolute_power_1:0 "Absolute Power"
 DPR_absolute_power_2:0 "Absolute Power"
 DPR_absolute_power_3:0 "Absolute Power"
 DPR_absolute_power_4:0 "Unlimited Power"
 DPR_absolute_power_1_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. The Emperor is still weak compared to his boundless potential, but not for long..."
 DPR_absolute_power_2_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. Imperial power has already managed to break free from the shackles first imposed by the army and politicians, and later by the Empress. However, it is still far from absolute..."
 DPR_absolute_power_3_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. The sovereign’s current power and authority are immense, approaching their absolute form, yet still face resistance from the strongest and highest circles of the state, albeit just temporarily..."
 DPR_absolute_power_4_desc:0 "Imperial power is unlimited! At last! Let the great tsars of the past rejoice, for their descendants have restored the glory to the mighty House of Romanov! Henceforth and forever, nothing shall stand in the way of our divinely chosen Tsar, whose judgments are nothing but the truth for all his subjects. Let his kingdom rejoice, for the Emperor is ready to rule and govern it as his own beloved child!"
 
 DPR_no_ukraine:0 "There is no Ukraine!"
 DPR_with_righteous_hike:0 "With Righteous Hike"
 DPR_anti_monarchist_resistance:0 "Anti-Monarchical Resistance"
 DPR_harnessed_wealth:0 "Harnessed Wealth"
 DPR_no_ukraine_desc:0 "The Malorossiyan independence movement, created by the Austrians, has finally been thrown back to its very foundations — to the cellars and swamps where it belongs. Neither 'Ukraine' nor 'Ukrainian culture' has ever existed and could not exist, for both are mere inventions of the enemies of the triune Russian people, devised to weaken our unity and strength. We will tolerate no separatism! Hunt those pigs down, every last one of them!"
 DPR_with_righteous_hike_desc:0 "The time to reclaim our rightful lands has finally come! The Russian army and state have bravely risen against the usurpers of their ancestral lands. Let our enemies tremble before our wrath, for we will defeat and destroy them, as God and all the Russian heroic might are behind us! Forward, brothers!"
 DPR_anti_monarchist_resistance_desc:0 "With the reconquest of the original Russian lands, our empire now faces insurgent, anti-state resistance from locals who refuse to recognize the imperial authority. How dare they?! These bastards think they can defy us; let us show them how wrong they are!"
 DPR_harnessed_wealth_desc:0 ""
 
 DPR_new_economic_course_1:0 "New Economic Course"
 DPR_new_economic_course_2:0 "New Economic Course"
 DPR_new_economic_course_3:0 "New Economic Course"
 DPR_new_economic_course_4:0 "New Economic Course"
 DPR_new_economic_course_5:0 "New Economic Course"
 DPR_new_economic_course_1_desc:0 "The new economic policy aims to establish a sustainable and robust economic foundation to restore imperial greatness. It is necessary to move away from the chaos and lawlessness of the Soviet and post-Soviet eras in order to build a strong and organized economic system based on patriotism, self-sufficiency, and industrial progress."
 DPR_new_economic_course_2_desc:0 "In the past, Russia was an industrial power, and our goal is to regain that status. The state will invest in heavy industry, rebuild factories, and establish new production centres that will provide the Empire with everything it needs. Resources are not infinite, but now is the time to use them to their full potential."
 DPR_new_economic_course_3_desc:0 "Industry will not be the only engine of the new Russia’s economy. Agriculture will also receive new stimulus for development. The goal is to turn the devastated fields of Malorossiya into fertile lands that will not only feed the Russian people but also produce goods for export. The country will never again depend on foreign food supplies."
 DPR_new_economic_course_4_desc:0 "The market cannot be left to itself — the state must take control of the strategic sectors of the economy. Energy, transport, and the military industry will all be under the direct control of the Empire. This will ensure stability and security in the face of external threats."
 DPR_new_economic_course_5_desc:0 "The Empire cannot live solely in the past. For it to move forward, we must become leaders in technology and science. The development of modern technologies and their integration into the economy will be key factors for the future. We must develop our own innovations so that we do not depend on the West and prepare new generations of scientists and engineers who will lead the country into the future."
 
 DPR_military_reorganization_1:0 "Military Reorganization"
 DPR_military_reorganization_2:0 "Military Reorganization"
 DPR_military_reorganization_3:0 "Military Reorganization"
 DPR_military_reorganization_1_desc:0 ""
 DPR_military_reorganization_2_desc:0 ""
 DPR_military_reorganization_3_desc:0 ""
 
 
 ## FOCUSES
 DPR_beginning_of_a_new_era:0 "Beginning of a New Era"
 DPR_beginning_of_a_new_era_desc:0 "Finally, after many years of non-stop fighting, on the frontline, in politics and on the streets, power in Novorossiya has been given to those who deserve it. The National Wing, led by Igor Girkin, undoubtedly has ambitious plans, and with their victory in the presidential election, nothing will stop him from implementing them. Long live Novorossiya!"
 
 DPR_give_them_a_fight:0 "Give Them a Fight"
 DPR_give_them_a_fight_desc:0 "The Bolshevik and oligarchic scum who tried to steal our victory in the presidential election could not accept their loss, and so they launched their own propaganda campaign to overthrow the newly formed government. We will not allow this to happen. Russia has been taken over by both oligarchs and Bolsheviks in the past, and we know the results of these actions all too well. Never ever again! We may destroy this land and die in the trenches, but we will not allow them to bury another dream alive!"
 
 DPR_arm_the_loyalists:0 "Arm the Loyalists"
 DPR_arm_the_loyalists_desc:0 "We will need people to fight back against the Sovietophile and oligarchic scum who want to deprive Novorossiya and its people of a future. People who can fight for our ideals and who share our vision of the future. Fortunately, our voters, who were numerous, are precisely in solidarity with our plans and policies, and they can be the last nail in the coffin of the old regime. We have to militarize these people, teach them to fight, shoot, defend, but most importantly, to win!"
 
 DPR_discrediting_always_works:0 "Discrediting Always Works"
 DPR_discrediting_always_works_desc:0 "To achieve complete victory over our enemy, we must not only defeat them on the battlefield but also bury their name alive. By engaging loyal media and Internet resources, we can further discredit their 'people’s movement', luring their supporters to our side, depriving them of the chance to resist longer. Reputation is everything, and that is what we will take away from them."

 DPR_punch_in_the_liver_nobodys_forever:0 "Udar V Pechen’ - Nikto Ne Vechen"
 DPR_punch_in_the_liver_nobodys_forever_desc:0 "The whole nation is ready to fight against its real oppressors. The war, which will change the course of life once and for all for the people of not only Donbass, but the whole of Novorossiya, is coming to an end, and all we have to do is to pierce the rotten heart of the remnants of the old regime with a blade sharpened by the people's anger."
 
 DPR_give_them_guarantees:0 "Give Them 'Guarantees'"
 DPR_give_them_guarantees_desc:0 "The communist and oligarchic-liberal forces that have not come to terms with their loss in the presidential election are provoking the population to unrest and creating disorder, which we cannot ignore, but going against them directly, using force, will not lead to anything good. We need to be more cunning than them, to be smarter. They use slogans about guarantees and rights, so let's give them those! Apart from that, they have nothing good in their repertoire, and when this comes out, we will see which side the people will take."
 
 DPR_liberalize_the_constituion:0 "Liberalize the Constitution"
 DPR_liberalize_the_constituion_desc:0 "In order to appease our opponents, we have no choice but to accept some of their demands for amendments to the new constitution that would allow them to at least partially meet the expectations of the voters and show them that they are not simply making a hundred promises, none of which will be fulfilled. Right now, these nits are too strong to be crushed like cockroaches, but by letting them feel the freedom and spirit of victory, they will let their guard down, and our time will finally come."
 
 DPR_prepare_for_hell:0 "Prepare for Hell"
 DPR_prepare_for_hell_desc:0 "By introducing liberal amendments to the state constitution, we have given the rats the opportunity to crawl out of their holes and spread their wings. All of them have made their voices heard, and this is exactly what we have needed. Now, the hardest part remains - to prepare the security forces and strike teams with the allied press for the final blow that we will deliver to the lice of Novorossiyan society. It's time to finally reduce this carrion to ashes..."
 
 DPR_colonels_gambit:0 "Colonel’s Gambit"
 DPR_colonels_gambit_desc:0 "Feeling freedom of action, the pseudo-democrats of our politics crawled out of their holes and began to shout loudly about victory, giving us all the information we needed on each of them. We know who they are, how dangerous they are, where they live and gather. It's time to cancel the amendments, which have played their role perfectly, and unleash an armageddon on the scum who are poisoning our society with their rotten tongues. Leonid, Natalia, we'll meet you at the hanging tree!"
 
 DPR_keep_the_order:0 "Keep the Order"
 DPR_keep_the_order_desc:0 "By striking a devastating blow to the last enemy of our ideology in the country, we have returned fear and chaos to the streets, which must be stopped immediately. Now is not the time to lose our heads, but it is also far too early to celebrate. The nationalist leadership has eradicated the last vestiges of the old repressive anti-people regime, but now it faces a much higher and more difficult goal - the unification of all the people of Novorossiya."
 
 DPR_contract_with_the_devil:0 "Contract with the Devil"
 DPR_contract_with_the_devil_desc:0 "Having restored instability in the country by destroying the pseudo-opposition forces, we have launched a process that we are unable to control or stop on our own. Criminal groups have seized parts of the country, while various radicalized factions have launched a series of unsuccessful and meagre coup d'état or uprising attempts, all of which we need help to contain. Wagner's group, under the command of Yevgeny Prigozhin, has been helping the people of Donbass to resist the Ukrainian invaders for more than 6 years, and they could use their help again..."
 
 DPR_integration_of_pmcs:0 "Integration of PMCs"
 DPR_integration_of_pmcs_desc:0 "Wagner and other private military campaigns operating in Donbass over the past few years have proven themselves very well both on the battlefield and in the fight against the internal enemy, and many of the commanders of these campaigns have even managed to win the personal trust of Supreme Commander-in-Chief Girkin. PMCs must be integrated into the state apparatus and become the internal troops of our country!"
 
 DPR_facing_the_problems_alone:0 "Facing the Problems Alone"
 DPR_facing_the_problems_alone_desc:0 "Despite all the problems that have fallen on our heads since the eradication of the last enemies of our ideological doctrine, we have no right to show weakness by asking for anything from anyone. This is a test that we must pass on our own to show not only our people but the whole world that we are a strong and independent nation that will conquer, not be conquered!"
 
 DPR_plan_the_key_to_success:0 "Plan — the Key to Success"
 DPR_plan_the_key_to_success_desc:0 "No idea can be implemented without a clear and well-thought-out plan. Our ambitions reach unimaginable boundaries, and with faith in our leader, we will achieve these goals and conquer the unimaginable, but for all this, we need a clear strategy. The Supreme Commander-in-Chief and Leader of the Nation, Igor Girkin, is a military and political genius who has proven this long ago, but fate has given him another chance to show his worth to the world. Our lord has a plan. A big plan. And we will follow it, no matter what!"
 
 DPR_call_to_old_friends:0 "Call to Old Friends"
 DPR_call_to_old_friends_desc:0 "Having connections with former stars of the Russian intelligence services, our supreme leader is able to interest them all in returning to the good old days, when intelligence was subordinate only to the authorities, not to the man with the fattest wallet, and when the stimulus was faith in justice, not in acting in the interests of individual shadowy clients."
 
 DPR_use_proven_methods:0 "Use Proven Methods"
 DPR_use_proven_methods_desc:0 "Time-tested methods are always the best. No intelligence service in the world can come up with anything that the Russian FSB has not already tried, and therefore the only sensible solution in our situation is to use everything that has proven successful in Russian intelligence operations."
 
 DPR_security_service_of_novorossiya:0 "Security Service of Novorossiya"
 DPR_security_service_of_novorossiya_desc:0 "Every real state that cares about its safety needs a security service. Since 2014, Novorossiya has had a parody of the Russian GRU and its own FSB office, but we are certainly not a puppet of the Kremlin. We are proud and self-sufficient, and over the years we have realized that we can only rely on ourselves. From now on, our security will be in the hands of our compatriots only, and operations abroad in our interests will be carried out only by our own intelligence services."
 
 DPR_contact_the_rovs:0 "Contact the ROVS"
 DPR_contact_the_rovs_desc:0 "The Russian All-Volunteer Union, or ROVS, was a military organisation founded by white emigrants with Baron Wrangel at its head. This union brought together thousands of members of the Russian emigration who were forced to leave their homeland due to the Bolshevik occupation, and for many decades tried to contribute to the destruction of the Red tyranny, which they finally succeeded in doing. After the fall of the Soviet Union, the ROVS was able to return to Russia, but the local oligarchs who had managed to seize power did not take their existence and attempt to regain influence positively and began to suppress the movement. However, after the uprising of the people of Donbass, the ROVS, led by a close friend of the Supreme Commander-in-Chief, Igor Ivanov, was able to reassert itself, siding with the uprising both politically and militarily. Despite their contribution to the liberation struggle of the local population, the oligarchs who initially seized power here were also very critical of Ivanov and his men, but after Mr Girkin's victory in the elections, nothing will prevent the ROVS from taking its rightful place in Novorossiya's politics and contributing to its future."
 
 DPR_recognize_whites_legitimacy:0 "Recognize Whites' Legitimacy"
 DPR_recognize_whites_legitimacy_desc:0 "The White Movement, which was the only hope for saving the legacy of the Russian Empire, despite its loss to the Red barbarians, made an extraordinary contribution not only to the history of the Russian people but also to the future destruction of the Soviet system. However, the government of White Russia, which was eventually forced into exile, never received any recognition from the world, unlike the Bolsheviks who settled on our rightful lands. This step may not mean anything, but we must recognize White Russia as the only legitimate Russian government since 1917, even if it is only as a gesture of respect, and let the Reds who still live on this land salivate with anger."
 
 DPR_how_glorious_is_our_lord_in_zion:0 "Kol` Slaven Nash Gospod` V Sione"
 DPR_how_glorious_is_our_lord_in_zion_desc:0 "How glorious our Lord is on Zion, \nThe tongue can not express. \nHe’s great in Heavens on the throne, \n In blades of grass on earth He is great. \nOh Lord, Thou art Glorious everywhere, \nAt night, by day Thy shining is the same. \n\nThy lamb with golden fleece \nSymbolizes Thee for us; \nWith ten-strings psaltery \nWe burn incense for Thee. \nAccept our thanksgiving \nAs a fragrant offering. \n\nThou illume mortals by the sun, \nThou love us, God, as your children, \nThou satiate us with blessed meal \nAnd create for us a city on Zion. \nThou, oh God, visit the sinners \nAnd nourish them with Thy flesh. \n\nOh God, let our voices \nEnter Thy dwelling, \nAnd let our tender sense \nRise to Thee like morning dew! \nFor Thee with heart we’ll raise an altar, \nFor Thee we sing and glorifying!"
 
 DPR_message_to_cossacks:0 "Message to Cossacks"
 DPR_message_to_cossacks_desc:0 "The Cossacks, who for centuries have served as an example of endurance, courage, and loyalty of Russian men, have always been one of the main pillars of Russian statehood. From the times of the Moscow Tsardom, through the centuries of the empire's prosperity, to the civil war between the White Guard and the Red traitors, they have defended our homeland, our customs and our mentality, and represented our highest ideals. Now, the struggle for the same customs, for a similar statehood, has flared up again. The Cossacks defended them before, and they will help us now, maybe not as a separate estate, but as a symbol, as an example."
 
 DPR_invite_local_leaders:0 "Invite Local Leaders"
 DPR_invite_local_leaders_desc:0 "The Cossacks as such have been purged and eliminated in extraordinary ways over the past hundred years. First, the Bolsheviks tried to eradicate them, and then the oligarchy that seized power in Russia turned them into circus clowns and propaganda pawns, spoiling their fame. However, not all descendants of these glorious warriors have accepted the death of the Cossack tradition. Even the hosts "loyal" to the Russian government want to regain their lost glory, and there are many of them. We will invite all the Cossacks of the world to our lands, where they will be able to fight for their ancestors in our army ranks with dignity."
 
 DPR_restore_the_don_host:0 "Restore the Don Host"
 DPR_restore_the_don_host_desc:0 "The Don Cossack Host has always been a bastion of Russian bravery and spirit, from where courageous men, trained in the art of war since childhood, went to serve the people of Russia. Warriors from the Don were the elite among the imperial regiments, and in battles, they gloriously defeated not only Caucasian cannibals and Turkish bloodsuckers, but also bravely repelled the Red usurpers, both during the Civil War and the Second World War. Over the years, the Don Cossacks have proved their irreplaceability and crucial role, and without them, we will not be able to restore Russia's great glory."
 
 DPR_from_the_ground_up:0 "From the Ground Up"
 DPR_from_the_ground_up_desc:0 "A lot has happened in recent years, decades, dozens of long bloody decades. Representatives and defenders of the idea of true Russian statehood, our glorious conservatism, and natural imperial power have survived murders, concentration camps, and abuse, and have been forced to flee abroad to preserve this idea and themselves. But the century of shame of Russian monarchism is over. We, the inhabitants of the industrialized and forgotten Donbas, have taken on this burden, and it is we who will revive what has long been forgotten, through the joint efforts of all those who still stand, who still believe."
 
 DPR_remember_our_true_roots:0 "Remember Our True Roots"
 DPR_remember_our_true_roots_desc:0 "The roots of the almighty Russian people and all their deeds will always be with them, and we must glorify the glorious acts and achievements of the Velikorossy over the centuries of their existence. Behind all the conquests and heroic feats of the people stood the Great Knyaz, Tsar and later the Emperor, who wisely managed the country's vast bureaucracy. Their glory will live forever because we will remember them forever!"
 
 DPR_rematch_of_1917:0 "Rematch of 1917"
 DPR_rematch_of_1917_desc:0 "In 1917, the Russian Empire, the most powerful country at the time and the largest state of Russians, fell. The emperor was betrayed by his own ministers, pseudo-democrats like Kerensky tried to transform the original monarchical country into a republic, and in the process allowed dozens of pseudo-nations to start forming their own "sovereign states". This all culminated in the Bolshevik coup when supporters of utopian fairy tales seized power in an already dead empire and continued to destroy its legacy. The brave White Guards were in the minority, suffering the betrayals of the Malorossians and other peoples who dared to raise their hands against the supreme nation and lost to the red tyranny, but we are determined to bring justice. We will take revenge for every humiliation that year brought us, and all our rivals, all the enemies of the Russian state will pay."
 
 DPR_revival_of_spirituality:0 "Revival of Spirituality"
 DPR_revival_of_spirituality_desc:0 "Spirituality was, is, and will be one of the main components of individual nations and people. It is faith that has been and remains the key motivation for action, for struggle, in the name of the Almighty God and all that is holy, against all that is evil. It was with faith in their hearts that the White Guards went into battle against the Red scum a century ago, and now we must do the same as their grateful descendants, even though our enemies have changed. We must return the spirituality and faith that the Soviets eradicated to the hearts of the people because this is where their strength and our strength lies."
 
 DPR_return_of_the_canonical_church:0 "Return of the Canonical Church from Overseas"
 DPR_return_of_the_canonical_church_desc:0 "The Russian Orthodox Church, which now sits in Moscow and has stretched its tentacles throughout the space where the Reds once had influence, is a spit in the face of the entire believing world, and not a church. A group of KGB operatives who put on priestly vestments and learnt how to properly recite prayers, nothing more. All of this has been gaining influence over all Orthodox Russians for a long, long time, while our true church has been forced to hide overseas since the civil war. The pseudo-popes need to be challenged, and no one as a legitimate church is capable of doing so."
 
 DPR_the_first_all_russian_monarchical_congress:0 "The First All-Russian Monarchical Congress"
 DPR_the_first_all_russian_monarchical_congress_desc:0 "Since the defeat of the White Movement, the Russian monarchist idea has lost its strength and durability. The ROVS, which tried to continue the work of its predecessors, tried to defend our dear values for decades, but in the end, they became just a grain of sand in the political space. If we want to truly raise the issue of restoring the empire, we must take this initiative and burden, and unite and lead traditional Russian values into their bright future."
 
 DPR_overcome_the_disputes:0 "Overcome the Disputes"
 DPR_overcome_the_disputes_desc:0 "Since the fall of the empire, supporters of Russian monarchism have become a dispersed ideological group, with each micro-party having its own separate beliefs and not recognising other monarchist forces. This must come to an end. The Russian monarchist idea will have no future unless we, the supporters of the restoration of imperial power, unite to achieve a common goal. Down with the differences, we are all in this together!"
 
 DPR_glorify_the_true_heroes:0 "Glorify the True Heroes"
 DPR_glorify_the_true_heroes_desc:0 "While for almost a century, the heroes of the "Great Patriotic War" or internationalist soldiers have been remembered in towns and villages, in every home, the real heroes of Russia have completely disappeared from popular memory. Alexander Nevsky, Peter the Great, Catherine the Great, Nicholas II, Anton Denikin, and many other heroes of the Russian people have fallen into oblivion, while ordinary murderers and punishers are still being glorified everywhere. Enough of this!"
 
 DPR_renounce_the_soviet_heritage:0 "Renounce the Soviet Heritage"
 DPR_renounce_the_soviet_heritage_desc:0 "The lands of Novorossiya are deeply steeped in the Soviet past and the spirit of the "great and powerful union of peoples". The abscess that the Bolshevik system managed to implant in the brains of every second person living in the occupied lands was passed down from generation to generation and turned the inhabitants of each city into a true homo sovieticus. Every monument to the workers of that era, every monument to the leaders of those times, and every place named after one of them is a spit in the face of our great nation, and every positive memory of the Red terror and occupation is a dagger in our pure and brave hearts. The Soviet Union fell, but it is not dead. The time has come to complete the work of Generals Kornilov, Denikin, Wrangel and others, and to bury this dark page of our history once and for all."
 
 DPR_united_traditionalist_front:0 "United Traditionalist Front"
 DPR_united_traditionalist_front_desc:0 "After gathering around one table all those who had not yet lost faith in the idea of restoring Russian monarchism and the revenge of true all-Russian conservatism, the "congress" we had initiated some time earlier resembled a gathering of barking dogs that could only shout and argue. However, months of hard work eventually yielded the result we and the entire Russian society, wherever its representatives may be, desired: the delegates were able to reach compromises on all major issues. From now on and forever, the Imperial Party, united in purpose and methods, will carry a ray of truth and dignity, not only to us and our people but also to the future All-Russian Emperor."
 
 DPR_dive_into_big_politics:0 "Dive into 'Big Politics'"
 DPR_dive_into_big_politics_desc:0 "Everyone has to start somewhere, especially newly formed states that will only have to prove themselves to the world and earn recognition. Novorossiya, which was formally established in 2014, has since assumed the status of an isolated regional power, under constant threat from the evil forces that have been trying to crush the spirit of the local people. However, sooner or later everyone comes out of the shadows, and our time has arrived. Novorossiya no longer needs to hide behind anyone and remain a petty shadow of others, but rather become a global power on its own."
 
 DPR_time_for_strategic_games:0 "Time for Strategic Games"
 DPR_time_for_strategic_games_desc:0 "If we want to expand our influence to all the territories of the historical lands of Novorossiya, we need to build a clear offensive strategy with foreign policy components. Among the Malorossian military commanders and governors, there are many uninformed individuals whose weaknesses we can exploit, as well as enough who are not entirely alien to our cause and who might take our side for certain... benefits."
 
 DPR_claim_our_real_borders:0 "Claim Our Real Borders"
 DPR_claim_our_real_borders_desc:0 "The lands of Novorossia are historically consolidated and united, and it is our sacred duty to restore their integrity by driving the Malorussian tyranny out of them. Our troops will cross the fields and forests, the straits and rivers, and do the impossible to bring justice to the people of Novorossiya, who were deprived of their freedom many years ago. Forward, brothers!"
 
 DPR_find_the_loyal_ones:0 "Find the Loyal Ones"
 DPR_find_the_loyal_ones_desc:0 "Having restored the territorial integrity of the Novorossiyan lands, we have increased the territory under our control and expanded our bureaucratic and administrative apparatus significantly. Lacking a broad understanding of the local situation, we have to find loyal locals who know their land and will help us govern it well and lead it to a bright and prosperous future."
 
 DPR_consolidation_of_the_south:0 "Consolidation of the South"
 DPR_consolidation_of_the_south_desc:0 "Having regained control of all the territories of historical Novorossiya and established full-fledged administrations and a functioning bureaucracy, we are ready to fully integrate these lands with the brotherly Donbas. This is the beginning of a new era for the Russian and Malorossian peoples..."
 
 DPR_start_the_debate:0 "Start the Debate"
 DPR_start_the_debate_desc:0 "As there is no longer any discord in the party, the only task left to it is to choose the best candidate to assume the title of Russian emperor. We will organize a large-scale debate and dig up every descendant of the Romanovs, selecting only the best and most promising of them."
 
 DPR_return_power_to_the_rightful_hands:0 "Return Power to the Rightful Hands..."
 DPR_return_power_to_the_rightful_hands_desc:0 "That's it, the Congress has reached its verdict. The new head of the entire Russian nation and future legend of our national history, together with a family, is on the way to our capital, while the streets are preparing for a full-scale parade and, of course, a magnificent coronation ceremony. Long live the emperor, and Russia as well!"
 
 
 DPR_and_become_a_mentor:0 "...and Become a Mentor"
 DPR_and_become_a_mentor_desc:0 "As predicted a century ago, a worthy heir will return to the throne. And so it happened. However, Rostislav, still a raw young man with no knowledge of local politics and no mastery of administrative and economic management, needs the help of his most loyal servants to learn how to truly rule the nation. The Great Commander-in-Chief Igor Girkin, who has devoted all of himself to the revival of the empire from what little was left of it, has offered himself to the emperor as his tutor and advisor, and there is no chance that His Majesty will refuse..."
 
 DPR_protect_the_new_order:0 "Protect the New Order"
 DPR_protect_the_new_order_desc:0 "The empire has returned, despite the fact that no one believed in it... however, though the state destroyed in 1917 was nominally restored, its actual legitimacy is no more than the rights of the Spanish crown to Austrian lands. Not only do we have no support abroad, but we don't have the greatest support at home either, though it is domestic recognition that is crucial for us. We have to prove to people that we will not betray them, that we will protect them, and that we will bring prosperity to their houses."
 
 DPR_rejoice_in_what_we_have:0 "Rejoice in What We Have"
 DPR_rejoice_in_what_we_have_desc:0 "The Russian Empire had borders so vast and immense that it could rightfully be considered the largest continental state in history, while the Mongol horde could hardly be called a state at all. However, despite our enormous territorial rights and claims, the return of anything other than Malorossia, which is still torn apart by chaos, is unrealistic and generally impossible. Other states will perceive us as a threat to their existence and will try to destroy us if we do not give up our claims to their lands, and unfortunately, we will have to take this step..."
 
 DPR_unite_little_russia:0 "Unite Little Russia"
 DPR_unite_little_russia_desc:0 "The lands of Malorossia, which have been plunged into complete chaos for several years now, caused by a bunch of local politicians and commanders who decided that they were capable of ruling at least something, must be restored to order. These territories, rich in resources and people, are rightfully ours, and as it can be easily seen, we are the only ones who can bring peace to them. We will take back what is ours, and return harmony to the people and their lives!"
 
 DPR_no_more_mistakes_of_the_past:0 "No More Mistakes of the Past"
 DPR_no_more_mistakes_of_the_past_desc:0 "The reign of Nicholas II, the last Russian emperor, taught us a lot. What to do, what to avoid doing, and most importantly, how to make people so desperate and disloyal that it would end with a revolution. We must finally learn this lesson, once and for all, and never allow this to happen again, so as not to repeat a cycle that will take tens of millions more lives."
 
 DPR_conflict_of_interests:0 "Conflict of Interests"
 DPR_conflict_of_interests_desc:0 "With the coronation of Rostislav Romanov as Russian emperor and the subsequent appointment of Igor Girkin as Prime Minister, a rivalry between supporters of the tsar and his premier began in the imperial party and the state apparatus in general. While some uncompromisingly support all actions of their emperor, who, as it turned out, was perhaps the only liberal member of the party who advocated cooperation with the rest of the world, others, mostly representatives of the "old guard", i.e. the party that Girkin had founded from members of the ROVS and other allies shortly after winning the presidential election, were sceptical of the imperial authority and supported the old policies of their chief. However, only time and the charisma of these two will ultimately show who is truly worthy of his title..."
 
 DPR_new_times_new_politics:0 "New Times — New Politics"
 DPR_new_times_new_politics_desc:0 "Despite the fact that the Russian Empire has been reborn from the ashes, we cannot remain in the bubble that traditionalists are trying to create, ignoring all the changes that have taken place over the past century. The empire will live and prosper, but this will not be achieved by clinging to the past at all costs."
 
 DPR_decentralization_is_what_we_need:0 "Decentralization is What We Need"
 DPR_decentralization_is_what_we_need_desc:0 "One of the main weaknesses of the old empire was the complete centralisation of power in the hands of the emperor and his entourage. As we all know, this country ceased to exist, among other things, because of all the problems that its structure produced, and we cannot repeat the same mistakes if we want to avoid this sad fate. The decentralisation of the state apparatus is vital, not least because local people are aware of their own local affairs and problems, and they are definitely better suited to ensure the development of their regions than one of the central government departments."
 
 DPR_we_belong_to_the_civilized_world:0 "We Belong to the Civilized World"
 DPR_we_belong_to_the_civilized_world_desc:0 "Despite all the desires of the "old guard" politicians to preserve the isolation status of our country, as our "colleagues" from Moscow have already managed to do, we are an integral part of the world, culturally and economically corresponding to our status as a state that respects the world order. As the successor not only to the imperial but also to the Ukrainian statehood, we also have agricultural responsibilities to the world, and we have no right to simply walk away from them."
 
 DPR_on_guard_of_heritage:0 "On Guard of Heritage"
 DPR_on_guard_of_heritage_desc:0 "With the restoration of imperial power, we must do everything we can to protect what makes us the true successors of the Tsardom - traditions. Without traditions, customs, and everything that confirms our kinship with the state of Nicholas the Second and all the rulers before him, we are nothing, and all kinds of "progressives" need to understand this."
 
 DPR_power_belongs_to_the_strongest:0 "Power Belongs to the Strongest"
 DPR_power_belongs_to_the_strongest_desc:0 "Any talk of decentralisation is simply dangerous for the survival of our empire. The central government is the only thing that will be able to save the country from chaos and collapse, and it is simply stupid to deny this."
 
 DPR_we_only_need_ourselves:0 "We Only Need Ourselves"
 DPR_we_only_need_ourselves_desc:0 "What will contact with all sorts of European unions and the United States bring us? That's right, nothing good. They will criticize our political position, undermine our internal situation, and provide support to terrorists active on our territory - that's what contact with the "world" will bring us. We are self-sufficient, and we do not need and will not need anyone in our struggle!"
 
 DPR_time_to_resolve_the_issue:0 "Time to Resolve the Issue"
 DPR_time_to_resolve_the_issue_desc:0 "The internal political struggle within our government has reached a critical point. We can no longer balance the authority of the emperor and the prime minister while they both try to lead the country in completely different ways, and we must finally put an end to this tug-of-war."
 
 
 DPR_emperor_by_the_will_of_the_people:0 "Emperor by The Will of the People"
 DPR_emperor_by_the_will_of_the_people_desc:0 "Having revived the Russian Empire, the people who made it possible saw the idea of restoring the old state as a chance to repeat the imperialist and chauvinistic success of the past centuries and to implement their despotic and militaristic ideals. Girkin, the leader of such politicians and commanders, was the main ideologist of this "concept" and tried his best to implement it, despite the opposition of the Throne. Our country was hit by strife. However, in the end, with the help of God and with the strength of truth and will, the All-Russian Emperor Rostislav I was able to win this duel of fates, wishing to rule the state not as a bloody despot but as a loving father."
 
 DPR_contact_the_united_nations:0 "Contact the United Nations"
 DPR_contact_the_united_nations_desc:0 "If our country wants to get at least some of the political recognition necessary for a brighter future and cooperation with what we hope will be our future partners and allies, we must become a member of the United Nations, whether some "isolationists" like it or not. It is through the UN that our thorny path to recognition by world powers of us as their legitimate comrades, and more importantly, as members of the civilized society, which we certainly are, is being led."
 
 DPR_new_frontiers_of_civilization:0 "New Frontiers of Civilization"
 DPR_new_frontiers_of_civilization_desc:0 "There is no doubt that civilisation is slowly coming to an end east of our borders. Today's "Russian Federation", which is itself a relic of the Soviet Union and occupies the eastern edge of the empire, does not position itself as part of a civilized, Western community, and tries to shackle itself to conservative authoritarian militaristic isolationism as much as possible. We are the frontier of the Western world, the last place where our common values have support among both people and government, and we will hold this line because it is our duty to do so, now and forever."
 
 DPR_gain_international_recognition:0 "Gain International Recognition"
 DPR_gain_international_recognition_desc:0 "By proving to the world that we were peaceful and willing to join the Western community, we were able to gain their trust and become a civilized society in their eyes. However, despite this, we are still not an official member of the UN. Representatives of the 'Ukrainian Government in Exile' emphasize that we are deceitful barbaric Russian invaders, yet it is clear to anyone that this is not even close to the truth. We have to fight for a seat in this organisation because we, and not these "exiles", are the legitimate government on the lands of Ukraine, and we are therefore the successors of the Ukrainian state that was created in 1991."
 
 DPR_parliamentarism_is_the_future:0 "Parliamentarism is the Future"
 DPR_parliamentarism_is_the_future_desc:0 "The parliamentary system has been known to the world since ancient times. Since ancient times, parliament has been the peak of state development and remains the best model of governance today. Our country must move towards parliamentarism urgently, as this is the key to our dear democracy and the future of all nations."
 
 DPR_the_rule_guided_by_the_peoples_desires:0 "The Rule Guided by the People's Desires"
 DPR_the_rule_guided_by_the_peoples_desires_desc:0 "Popular rule is the only correct form of government. Democracy is the foundation of the human tradition of government. Authoritarianism is a poison that oppresses the peoples of all countries where despots have been able to seize power, while in free, democratic societies, power is based on the wishes of the people who serve the country. Democracy is the only right way, and we will achieve it!"
 
 DPR_form_the_verkhovna_duma:0 "Form the Verkhovna Duma"
 DPR_form_the_verkhovna_duma_desc:0 "With the increasingly powerful democratic and liberal reforms of our empire, the time has come to establish a full-fledged national parliament, the Verkhovna Duma. This body would hold an absolute majority of executive power, leaving some to the imperial throne as a supervisor of its policies in the public interest, and the first elections would be held immediately!"
 
 DPR_reviving_the_vision_of_a_liberal_empire:0 "Reviving the Vision of a Liberal Empire"
 DPR_reviving_the_vision_of_a_liberal_empire_desc:0 "With the establishment of relations with the world and the creation of a truly democratic state apparatus, we have reached a point where we must explicitly state and prove that the term "empire" has nothing to do with chauvinism and aggressive anti-people policies. Our country is based on the foundations of liberalism and national welfare, on the ideas of democracy and freedom, and by retaining the hereditary ruling title, the Emperor of Rus will act only in the interests of his own people, but also of the peoples of other countries suffering from authoritarian oppression. We are peaceful and freedom-loving, yet not weak, and we will defend our ideas and help those who share them."
 
 DPR_the_key_is_love_not_fear:0 "The Key is Love, not Fear"
 DPR_the_key_is_love_not_fear_desc:0 "As we build a fully functional state on lands inhabited by many different nationalities, we cannot allow chauvinism and xenophobia to form the basis of our domestic policies or public sentiment. Oppression always leads to anger, anger to blood, blood to pain, and pain to desperate actions, and the result of such actions can only be the end of our young and promising state. Many people will oppose this, especially in the government, but for the sake of our future and the harmony of all peoples, we will take this step."
 
 DPR_emperor_of_all_men:0 "Emperor of All Men"
 DPR_emperor_of_all_men_desc:0 "Despite the fact that from the very beginning, the new empire was built as a new Russian state, occupying the lands of Ukraine, it was simply physically impossible. These lands are home to many different peoples, from Ukrainians, who are the majority, through the second largest Russians, to Jews, Poles, Bulgarians, Greeks, and many others. Our state has to be built on a multicultural basis to survive, as it has always been intended to be, so we will not tolerate any nationalist rhetoric!"
 
 DPR_embrace_ukrainianness:0 "Embrace Ukrainianness"
 DPR_embrace_ukrainianness_desc:0 "Ukrainians, who represent the majority of the population of our empire, simply cannot but be the backbone of the country because of their numbers. Although Russian has been and remains the official language, Ukrainian is extremely widespread, especially in the western regions, while Ukrainian politicians form the majority of regional authorities. Ukrainians are the backbone of our population, no matter how much all sorts of Girkins may not want to admit it, so Ukrainian must not only be the official language but also have identical rights to Russian. Not only that, but we must require all senior politicians to be bilingual and give speeches and other announcements in both Russian and Ukrainian if we really want to have Ukrainians as the friends that they are."
 
 DPR_show_ideological_tolerance:0 "Show Ideological Tolerance"
 DPR_show_ideological_tolerance_desc:0 "Since the rule of the Girkin's cabinet, a one-party system has been established in our country, where all left-wing and liberal forces have been banished by state decrees of the Prime Minister. This cannot continue. If our country truly intends to be a bastion of free and progressive ideas, as the emperor wishes, we must immediately lift the ban on the establishment of political organisations not subordinated to the Imperial Party, and encourage the creation of independent political parties and groups based on the ideas of democracy."
 
 DPR_quoting_the_peace_of_augsburg:0 "Quoting the Peace of Augsburg"
 DPR_quoting_the_peace_of_augsburg_desc:0 "Girkin's policy of promoting and imposing traditionalist Orthodoxy has already proved fatal for many religious movements and communes. As a free state that values human rights, we cannot impose any faith or religious principles on anyone like some medieval barbarians. Our state must be secular, and one of its motives must be a slightly paraphrased summary of the Peace of Augsburg - whose choice, their religion."
 
 DPR_time_to_come_back_to_life:0 "Time to Come Back to Life"
 DPR_time_to_come_back_to_life_desc:0 "After several years of continuous battles between politicians and the military in a fallen Ukraine, chaos and violence were the main export and import products of this territory. This kind of sentiment among people will not lead to anything good, so we have to show and prove to everyone that this nightmare, this hell, is over, and that they are safe. We can forget about inter-street shootings and executions, it's time to return to a normal life..."
 
 DPR_everyone_is_welcome_here:0 "Everyone is Welcome Here"
 DPR_everyone_is_welcome_here_desc:0 "Like every healthy and progressive society, we must be friendly to immigration. Despite the loud statements of many populists, immigrants can be not only a burden to our economy, but also its strong supporters, which, if handled correctly, can only strengthen our position. By creating good economic and social conditions for newcomers, we can become a new centre of immigration from regions such as the Caucasus, Central Asia, but also Moldova, parts of the "Russian Federation" and possibly even the Arab world, and by playing our cards right, we can turn this "potential burden" into our ace in the hole."
 
 DPR_a_truly_new_era:0 "A Truly New Era"
 DPR_a_truly_new_era_desc:0 "Having overcome all the obstacles that kept our state and nation from the Western community and civilisation, having implemented an incredible number of reforms and radically changed our social, foreign, economic and many other policies, we have truly managed to break free from the isolationist and traditionalist chains in which our predecessors had shackled us. Membership in the UN, Ukrainianisation and multiculturalisation, liberalisation and democratisation of the political environment, and adoption of immigrant-friendly policies - all these are our great achievements, and they were made in record time. Our empire will continue to flourish, and with such ambitions, we have no choice but to eventually take our place as one of the most powerful and progressive nations in the world. Glory to the Rus, glory to its peoples, and glory to its Emperor!"
 
 
 DPR_exercise_our_right:0 "Exercise Our Right"
 DPR_exercise_our_right_desc:0 "In recent months, which have been difficult for our domestic politics, it has become quite clear that the emperor cannot rule with his head alone. As we feared, life in the West has strongly influenced his views, and that is why his absolute power is not only alien to the wishes of the people but also dangerous to the existence of the empire as such. As the Prime Minister of the Russian Empire, I, Igor Gikrin, am compelled to act in the interests of my people and my state, even if this is contrary to the interests of His Majesty."
 
 DPR_return_allies_to_the_game:0 "Return Allies to the Game"
 DPR_return_allies_to_the_game_desc:0 "With the return of the monarchical system to our mighty state, the successor to the Russian Empire, many people who played a key role in restoring this system were excluded from the highest governmental structures at the request of the emperor and his sycophantic henchmen. These people sacrificed a lot for this country, put their hearts and souls into it, and unlike some, they really know what they are doing. They need to be brought back. Immediately!"
 
 DPR_expand_our_private_club:0 "Expand Our Private Club"
 DPR_expand_our_private_club_desc:0 "With the return of old friends to the helm, we faced a new challenge - a lack of reliable staff. It is not yet clear who is on whose side in this government, and with the reform of the bureaucracy, we have a lot of positions that need to be filled with people loyal to our goal. There are several individuals who have shown their commitment to our ideals for a long time and who have also invested a lot in the struggle, so why not accept them into our "elite club"?"
 
 DPR_relieve_the_tsar_of_the_boring_work:0 "Relieve the Tsar of the 'Boring Work'"
 DPR_relieve_the_tsar_of_the_boring_work_desc:0 "His Majesty still retains enormous powers in the state, but it seems that the constant bureaucratic red tape is very tiring for the young tsar. He could surely use some help with these minor matters, while we can take on even more of his power, at the same time underlining the legitimacy of our actions with his approval."
 
 DPR_constitutional_nuance:0 "Constitutional Nuance"
 DPR_constitutional_nuance_desc:0 "The Constitution of our country has not yet reached its "final form". With the restoration of imperial power, a new, temporary constitution was created, written with the consent of all members of the monarchical congress, but with the understanding that a new one would be written by the emperor and his advisers. Since we are such advisers, and we have already been able to take over enough authority to partially ratify the document, we are in a position to change the royal powers without His Majesty's consent, and it would be a sin not to take advantage of this..."
 
 DPR_safeguard_the_ideals:0 "Safeguard the Ideals"
 DPR_safeguard_the_ideals_desc:0 "From the very beginning, our state was built on the ideals laid down by the great theorists of Russian statehood, such as Anton Denikin, Pyotr Wrangel, and many others. Their ideals, despite the actual defeat of the white movement, continue to live on in us, and no one dares to threaten them anymore. We will do everything to protect them and follow them because this is our destiny."
 
 DPR_no_compromises:0 "No Compromises"
 DPR_no_compromises_desc:0 "Our ideology, our state's ideology, is infallible. Both the long-dead leaders of the Russian state movement and those who are now in His Majesty's government have contributed to its creation and supplementation. The state policy of the empire that we have implemented is the most ideal form of itself, and any "compromises" on it are absolutely unacceptable!"
 
 DPR_new_state_cabinet:0 "New State Cabinet"
 DPR_new_state_cabinet_desc:0 "With the destruction of the internal opposition, our government has finally become what it was before the restoration of imperial power - authoritative and the only legitimate one. His Majesty Rostislav I. has already agreed to most of our terms out of choice, so it is time to form the only right and capable cabinet, which will include only the most trusted and experienced people of His Generalissimo Majesty."
 
 DPR_in_denikins_footsteps:0 "In Denikin's Footsteps"
 DPR_in_denikins_footsteps_desc:0 "Anton Denikin, the undisputed leader of the White Movement and White Russia, has become an absolute legend in Russian history for the ages. His figure has already been the subject of so many legends, and so many heroic deeds that it is hard to believe everything at first. His Generalissimo Majesty is undoubtedly the second Denikin in Russian history, and he deserves great respect as well. As the saying goes, legends should be respected while they are alive, because it is simply too late afterwards..."
 
 DPR_new_white_guard:0 "New White Guard"
 DPR_new_white_guard_desc:0 "The White Guard movement is the only thing that the new Russian Empire must ideologically orientate itself towards. Their symbols will henceforth be our symbols, their marches will be our marches, their awards and titles will be also ours, and so on. World history has never met more heroic people than these, and therefore they are the only ones we deserve to look up to as their only rightful successors!"
 
 DPR_let_them_feel_the_whip:0 "Let Them Feel the Whip"
 DPR_let_them_feel_the_whip_desc:0 "The Molorosian population of our empire probably doesn't understand that the days of "Ukraine" are over, trying to keep clinging to this absurd idea. Enough of this! The Emperor might have pitied them, but we are not as spineless as His Majesty, and we will act. Sanya! Get the tanks ready, we have work to do..."
 
 DPR_crush_the_dissatisfied:0 "Crush the Dissatisfied"
 DPR_crush_the_dissatisfied_desc:0 "Our recent actions have outraged a large number of people in our vast country. These fools have decided to fight us, but not with weapons like anyone else with a spine, but by protesting. Ha! Ban these ridiculous events and all the others like them! And if there are any brave souls, take them to the square to the hanging tree, and let's remember the old days."
 
 DPR_emperor_on_the_icon_generalissimo_on_the_throne:0 "Emperor on the Icon, Generalissimo on the Throne"
 DPR_emperor_on_the_icon_generalissimo_on_the_throne_desc:0 "With the complete victory of the White Guard idea in our empire, His Generalissimo Majesty, Igor Girkin, became known by the people as the "real tsar". Rostislav I., despite still being the emperor and de jure head of the Russian Empire, became a purely ceremonial figure, and in general, hardly appears in public, preferring to stay in his palace. However, despite this, the empire has gained its true and powerful ruler, and he may never take the throne of the emperor, but he will reign for a very, very long time, and he will become that legendary lord of these lands that will be remembered for eternity."
 
 
 DPR_and_restore_historical_justice:0 "...and Restore Historical Justice"
 DPR_and_restore_historical_justice_desc:0 "The empire finally received its deserved ruler of royal blood, as it had to after the end of Nicholas II's reign. Donbass politicians have indeed done a good job of restoring imperial power in these territories, but with the coming to power of a true descendant of the Romanovs, it is time to turn the parody of the empire into its true successor."
 
 DPR_loyalty_check:0 "Loyalty Check"
 DPR_loyalty_check_desc:0 "Despite the fact that the absolute majority of delegates to the monarchical congress favoured Empress Maria I when voting for the new ruler of the Russian Empire, there were those who supported her rivals. These people cannot be trusted, as well as all members of the Girkin administration who were not faithful to the idea of restoring imperial power, although they were few in number. We have to make sure that these people are truly loyal, and if they are not, deal with them. "
 
 DPR_secure_the_dynasty_once_and_for_all:0 "Secure the Dynasty Once and for All"
 DPR_secure_the_dynasty_once_and_for_all_desc:0 "The Russian Empire has returned, despite all the efforts of the Bolsheviks and other traitors to defame its name and erase it from existence. However, our legitimacy is not yet absolute. There are still many other descendants of royal blood in the world who have laid claim to the throne, and we cannot truly build an empire from the ashes if they remain in the way."
 
 DPR_summon_the_courtiers:0 "Summon the Courtiers"
 DPR_summon_the_courtiers_desc:0 "While in centuries of exile abroad, the Romanov dynasty and many of its members managed to establish their own courts in other countries, where only the most loyal of the family and their descendants served future emperors and princes. These people dedicated their lives to prove their loyalty, and the time has come for us to take them into our new empire and reward them for their efforts."
 
 DPR_consolidate_power_in_worthy_hands:0 "Consolidate Power in Worthy Hands"
 DPR_consolidate_power_in_worthy_hands_desc:0 "From the time of Girkin's rule, power has remained in the hands of a part of his so-called "clique", loyalists of this Denikin-obsessed fool. We cannot rely on them and must immediately replace such ministers and bureaucrats with faces who have had nothing to do with Girkin's regime and cabinet."
 
 DPR_deprive_girkin_of_his_arrogance:0 "Deprive Girkin of His Arrogance"
 DPR_deprive_girkin_of_his_arrogance_desc:0 "The arrogance of our so-called 'commander-in-chief', as it turned out, knows no bounds. This nobody, who came out of the blue, has certainly returned the throne to us and done everything to make the long-lost empire come to life again, but let him not hope that he will ever be able to take one of the highest places in the state because of his former merits. Now he is nothing compared to Her Imperial Majesty, just a subordinate who will do as he is told!"
 
 DPR_end_the_white_guard:0 "End the White Guard"
 DPR_end_the_white_guard_desc:0 "The cult of the White Guard, which Girkin and his friends from the ROVS have been building so diligently in recent years, is nothing more than the very centre of a major anti-state conspiracy, harmful to the empire and its future. The fanaticism behind the "proud warriors of White Russia" who have renounced the empire for the sake of their own warlords is dangerous for our current situation, and we simply must destroy it from the root. The time of the white guard is over, but as long as the ROVS and their other advocates are breathing, this idea will continue to bother us."
 
 DPR_about_the_mother_son_relationship:0 "About the Mother-Son Relationship"
 DPR_about_the_mother_son_relationship_desc:0 "The enmity in the imperial family has gone too far. The son turned against his mother, against his empress, in pursuit of his own ambitions, while she tried to suppress his thirst for achievement. This can escalate further and further, but eventually, there will come a final moment at which the patience of the demanders will break. There is nowhere to withdraw..."
 
 
 DPR_united_in_blood_and_purpose:0 "United in Blood and Purpose"
 DPR_united_in_blood_and_purpose_desc:0 "Divided by wealth, power, and ambition, the empire and all its top leaders are finally united in one goal - to build a state that will last forever. We have had internecine problems, not all of us like each other, but we are family, some by blood, some not, but it is what it is. We will rule these lands together, because this is the way, and there is no other one."
 
 DPR_protect_cossack_privileges:0 "Protect Cossack Privileges"
 DPR_protect_cossack_privileges_desc:0 "The Cossacks have always been the centre of attention among Russian culture and traditions for foreigners, but also for the people and the ruling elite. These men have always been the first to go to battle against barbarian invaders, and they have always heroically defended their country and their emperor. We will revive the Cossacks as a symbol of our state by creating a large Cossack Guard, granting them even greater privileges, and building an army based on Cossack strategies and with Cossack commanders."
 
 DPR_fair_distribution_of_power:0 "Fair Distribution of Power"
 DPR_fair_distribution_of_power_desc:0 "Our empire cannot be ruled by people without status or achievements, while the restoration of the nobility has expanded the circle of those worthy of ruling in these lands. There will be no peace and tranquillity in the country until all the new houses equally distribute power among themselves, leaving the imperial dynasty with the advantage, of course, so get the paper and ink!"
 
 DPR_form_the_imperial_cabinet:0 "Form the Imperial Cabinet"
 DPR_form_the_imperial_cabinet_desc:0 "With the recreation of pre-revolutionary social orders, we have reached the political point that has traditionally been at the centre of Russian political life for centuries. The imperial family, the church, the nobility, the Cossacks - these four groups now once again possess the power that the communists had taken from them, and it is time to pass a new decree establishing a full-fledged and indivisible imperial government, with representatives of all these classes represented on an equal and fair basis."
 
 DPR_peace_and_harmony:0 "Peace and Harmony in the Empire"
 DPR_peace_and_harmony_desc:0 "By solving our main internal problems and taking care of internecine feuds for power and influence, we were able to finally achieve harmony in our domestic politics. By dividing the privileges and powers among the individual estates as they should always have been, and by giving the heir to the throne the power with which he so desired to improve the state of our empire, we have truly achieved peace in this country, and are now poised to prosper."
 
 
 DPR_sorry_ma:0 "Sorry, Ma"
 DPR_sorry_ma_desc:0 "My patience is not eternal. I tried to find a way out, but you, Mother, left me no other option. I wanted to share our fate together as a family, but you did not want to accept me as an equal. And now I have to do what I have to do. Forgive me, Mother, but there is no other way..."
 
 DPR_standing_up_to_consequences:0 "Standing up to Consequences"
 DPR_standing_up_to_consequences_desc:0 "After the destruction of the burden of our empire in the form of the former empress, her surviving henchmen continue to hold the state in the same conditions as she did. Moreover, seeing a threat in the new ruler, they are clearly planning anti-state actions in their secret groups, and this must be stopped immediately!"
 
 DPR_witch_hunt:0 "Witch Hunt"
 DPR_witch_hunt_desc:0 "During that crucial night, when the Russian Empire lost its former ruler and gained a new one, not everyone supported this "change" on the throne. Many people eventually opposed such actions, but many of them decided to keep a low profile, plotting revenge for the fallen empress or even preparing for a new 1917. All of these people are dangerous to the new regime, but they can be good scapegoats for that night's incident, and it would certainly be a sin not to take advantage of it."
 
 DPR_time_to_wash_our_hands:0 "Time to Wash Our Hands"
 DPR_time_to_wash_our_hands_desc:0 "Having dealt with most of the internal enemies, we can finally proudly say that we have achieved our goal. Many old bureaucrats have died in mysterious circumstances, some managed to escape abroad where they would not be accepted anyway, but a lot of them have also ended up in our prisons and camps, and while the people are vainly trying to understand what is happening, we can finally cleanse our hands of blood by holding large-scale trials of these detainees and give the people what they have always and will always want - bread, circuses, and blood!"
 
 DPR_enshrining_absolutism:0 "Enshrining Absolutism"
 DPR_enshrining_absolutism_desc:0 "The policy of reviving the pre-revolutionary states in the empire introduced by the former empress was pathetic and ridiculous from the very beginning. Attempts to catch up with long-lost times can only lead to a repetition of past disasters, while the 1917 revolution was made possible, among other things, by the beginning of the "democratisation" and "decentralisation" of the empire. We cannot allow all sorts of pseudo-aristocrats and councillors to decide the fate of the state or to rule in defiance of the imperial authority!"
 
 DPR_no_one_is_above_the_tsar:0 "No One is Above the Tsar"
 DPR_no_one_is_above_the_tsar_desc:0 "Autonomy in statecraft and military affairs has never worked out well. Such things have always ended in uprisings, revolutions, coups, and similar disgraceful and disgusting actions. We must move towards the maximum centralisation of power in the hands most faithful to the state - the imperial hands, because the emperor will never betray the country or himself, while the Tsar himself is the highest that the state can have, and no one dares to be above him or to contradict him."
 
 DPR_letat_cest_moi:0 "L'État, C'est Moi"
 DPR_letat_cest_moi_desc:0 "As the only and sole ruler of the Russian Empire, Emperor George understands very well what power is and what he is capable of doing with it. Louis XIV, Ivan the Terrible, all these incredible examples of absolute rule are examples for him of how he himself should reign, and as the only person in power within the state, he is nothing less than a god in essence..."
 
 DPR_destroy_the_remnants_of_the_past:0 "Destroy the Remnants of the Past"
 DPR_destroy_the_remnants_of_the_past_desc:0 "Traditionalism in the army can be nothing more than open attempts at sabotage and betrayal. All these lavish and colourful uniforms, cavalry, bayonets longer than the guns themselves, usage of new recruits by higher ranking officers as their own slaves - all this is a pile of shit that needs to be cleaned out immediately. Our army can never be victorious as long as such attitudes and ideals prevail, and it is time to end it!"
 
 DPR_suppress_the_cossacks:0 "Suppress the Cossacks"
 DPR_suppress_the_cossacks_desc:0 "The Cossacks represent the biggest disgrace we have today. These relics of the past, these clowns with horses and sabres, are nothing more than idiots dressed in brightly coloured uniforms who can only dance in parades and ride their ponies, making them our greatest shame. We must immediately get rid of this trash from the army, reorganize their regiments and incorporate the soldiers into regular units, send their command and officers to prisons and camps where they belong, and execute their generals. Immediately!"
 
 DPR_generals_of_the_first_class:0 "Generals of the First Class"
 DPR_generals_of_the_first_class_desc:0 "Having destroyed most of the command and general staff because of their unprofessionalism and maliciousness, we were left with almost no officers. However, not everything is lost. For many years now, there have been a number of military academies throughout the empire where the future blossom of our army has been trained, and it is from there that we can get new army leadership. Bring these future empireal heroes here!"
 
 DPR_unlimited_power:0 "Unlimited Power!"
 DPR_unlimited_power_desc:0 "After so many efforts, so many streams of shed blood, nobody and nothing can deny the absolute and almost divine figure of His Majesty. Nobody and nothing dares to contradict Him, and nobody and nothing will dare to even think that His decisions might be wrong. His power is unlimited, His authority is absolute, and it will remain so for all eternity!"
 
 
 DPR_reestablish_the_malorossiya_governorate:0 "Re-establish the Malorossiya Governorate"
 DPR_reestablish_the_malorossiya_governorate_desc:0 "At the time of the great and mighty Russian Empire, the southwestern lands were divided into three governorates: Novorossiya, covering the northern coast of the Black and Azov Seas; Malorossiya, stretching north along the left bank of the mighty River Dnieper; and Kiev, covering the river's right bank. All three of these entities, along with the western, sub-Carpathian Russian lands, were later transformed into an entity that, since the Jewish-Bolshevik invasion, has called itself the "United Ukraine". This concept must be laid to waste. We must shred it and burn it to the ground, as this is the only way of restoring our former majesty, starting with our small homeland, the Little Russia, and let it be divided into two! Southern Novorossiya, which has preserved its Great-Russian grandeur - a mighty industrial powerhouse; and northern Malorossiya, born of the amazing rural Malorossian culture - amazing and enchanting in its natural and historical beauty."
 
 DPR_quell_resistance:0 "Quell Resistance"
 DPR_quell_resistance_desc:0 "The Malorossian serfs who think that after receiving their pseudo-state thirty years ago thanks to the fall of the Bolshevik regime, they are worthy of recognition and their own country are simply morons. These freaks pose a threat to the revival of the Empire in its entirety, and we will not tolerate them!"
 
 DPR_there_is_no_ukraine:0 "There is no Ukraine!"
 DPR_there_is_no_ukraine_desc:0 "Over the past century, rebellious Malorossians have been trying their best to prove their separation from the triune Russian people by promoting the idea of the so-called "Ukraine" - their dream utopia, where Russians will have no place and only Polish-Austrian servants will live and rule. But we broke their little dream, we shattered their sick fantasies. Ukraine has never existed, and we have proved it many times, but this time will be the last one."
 
 DPR_strengthen_our_new_bastion:0 "Strengthen Our New Bastion"
 DPR_strengthen_our_new_bastion_desc:0 "Having regained control of the lands of the Little Russian Gubernia, we must consolidate our positions in order to prepare for our march eastwards, towards the great capitals and centres of the fallen empire. We will fortify the border, and take up defensive positions, but all the while we will be preparing for the largest offensive in our history, one that will wipe out this misunderstanding called the "Russian Federation"."
 
 DPR_appeal_to_the_people:0 "Appeal to the People"
 DPR_appeal_to_the_people_desc:0 "The only thing we can rely on during our liberation campaign to the east is the population, which has been sick and tired of the indifferent policies of their so-called "government". These people have already forgotten who their emperor is, who their true ruler is, and our goal is to remind them of this. The empire lives, and will continue to live!"
 
 DPR_righteous_hike:0 "Righteous Hike"
 DPR_righteous_hike_desc:0 "The time has finally come to return our legitimate lands to us. The Bolshevik and then the oligarchic regimes have been profiting from them for a hundred years, but we have not forgotten these vast territories and these people, and we will take back what is rightfully ours. Russia, we are coming!"
 
 DPR_blessed_triumph:0 "Blessed Triumph"
 DPR_blessed_triumph_desc:0 "With faith in our glorious victory, steely endurance and will, and an indomitable spirit, we were able to put an end to a plutocratic anti-Russian regime that goes back to 1917, destroying the system established by the economic post-Bolshevik elite. The empire, once broken and virtually destroyed, has not only risen from the ashes but has regained its centres of Moscow and Petrograd and is now capable of anything. Victory belongs to the empire, to the all-powerful Russian state!"
 
 DPR_restoration_of_imperial_culture:0 "Restoration of Imperial Culture"
 DPR_restoration_of_imperial_culture_desc:0 "The peak of Russia's cultural development was during the era of imperial rule. The most famous painters, writers, musicians, but also architects and their monumental buildings - all of this comes from those times, that golden age. Nothing else will ever be able to challenge the superiority of imperial culture, so it makes no sense to refuse its promotion these days."
 
 DPR_harness_all_the_wealth_of_the_motherland:0 "Harness All the Wealth of the Motherland"
 DPR_harness_all_the_wealth_of_the_motherland_desc:0 "Our vast Motherland has always been known for its immense wealth in the depths of the earth. These endless reserves of all possible resources, precious minerals, black gold, iron and other ores - all of these are present in almost unlimited quantities in different parts of our empire. Previously, we were simply physically unable to extract and use all these riches to the maximum, but today's technology will allow us to use all this to the fullest, which we will do!"
 
 DPR_crowning_as_it_belongs:0 "Crowning, as it Belongs"
 DPR_crowning_as_it_belongs_desc:0 "Russian tsars and emperors have always been crowned for their divinely chosen reign in the Assumption Cathedral of the Moscow Kremlin. Even though our coronation had already taken place in the original Russian city of Kyiv, it was nothing compared to the most magnificent ceremony we will hold in Moscow!"
 
 DPR_learn_from_the_past:0 "Learn From the Past"
 DPR_learn_from_the_past_desc:0 "1917 was a truly pivotal year in Russian history. Then, all the filth of our internal politics and all the enemies of the monarchy and the empire proved themselves to be treacherous to Emperor Nicholas II, which ended in the destruction of the centuries-old Russian empire, though not forever. We will never allow the emergence of an internal enemy again and will nip the enemies of the empire in the bud!"
 
 DPR_ambitiousness_our_everything:0 "Ambitiousness — Our Everything"
 DPR_ambitiousness_our_everything_desc:0 "Our empire suffered enormous territorial losses, but as its successor, we have every right to these latitudes as our legitimate lands. The Caucasus, Central Asia, and Belarus, these territories are the most defenceless and weakest of all our other losses, and having remained loyal to the old Moscow regime, they have been left without allies, so it is time to strike a crushing blow against them!"
 
 DPR_challenge_the_world:0 "Challenge the World"
 DPR_challenge_the_world_desc:0 "It is absolutely undisputed that the lands of the Baltics, Finland, Poland, and Moldavia are our legitimate territories, which were barbarically separated from our empire after its destruction by the Bolsheviks. Today, most of these countries are members of international unions and alliances, so their return will certainly cause some difficulties, and possibly war, but we will never give up our fairly acceded lands, never."
 
 DPR_god_is_with_us_world_is_for_us:0 "God is with Us — World is for Us"
 DPR_god_is_with_us_world_is_for_us_desc:0 "For centuries, the Russian Empire was the world's dominant power, the absolute giant of the planet. Its vast lands, endless mineral and human resources, and its leadership, dedicated to tradition and honour, have always found a way to defeat its enemies, sooner or later, just as it will this time. The world perceives us as a threat, and rightly so, as we plan to regain our hegemonic status, which may only be through war, so get ready, Anglo-Saxons and Germans, Chinese and French, we are coming, and if God is on our side, who is on yours?"
 
 
 DPR_embark_on_a_new_economic_course:0 "Embark on a New Economic Course"
 DPR_embark_on_a_new_economic_course_desc:0 "Since the oligarchy's domination of Donbass, the local economy and industry have been experiencing perhaps its worst times. Closure of enterprises due to unwillingness to invest in them, loss of industrial facilities in card games, all this abuse our already struggling economy was forced to survive. However, the leadership has finally changed, and the time has come to change the overall situation. We will develop a new plan to rebuild our industrial potential and put the economy back on the track of prosperity, as this is the only way to make our plans come true."
 
 DPR_declare_war_on_oligarchy:0 "Declare War on Oligarchy"
 DPR_declare_war_on_oligarchy_desc:0 "The oligarchs who took control of almost the entire industrial potential of Donbass back in the 1990s have been living and making money off of people's and the state's grief with impunity. They were the ones who put their representatives in regional and national politics to protect their interests, but with our victory in the elections, they lost this opportunity forever. These greasy bastards have been sucking the blood of our country for too long, and the time has come to destroy their class as such."
 
 DPR_omnipresent_state_monopolies:0 "Omnipresent State Monopolies"
 DPR_omnipresent_state_monopolies_desc:0 "Having ended the dominance of the oligarchy, destroyed its main representatives and taken control of their main profits, we left a lot of unfilled space in the economic sphere of the state. These scumbags have managed to divide up everything they could, monopolising all possible areas, and now it's our time to win on all economic fronts once and for all, ousting any "independent competitors" and ensuring the security of economic development."
 
 DPR_policy_of_mass_nationalization:0 "Policy of Mass Nationalization"
 DPR_policy_of_mass_nationalization_desc:0 "To truly thrive, the industry must be owned by the state. Why should we rely on independent entrepreneurs and businessmen who only pursue their own interests when we have the power to fully and absolutely manage our country's economy, providing enough jobs and full cooperation from producers?"
 
 DPR_full_exploitation_of_land:0 "Full Exploitation of Land"
 DPR_full_exploitation_of_land_desc:0 "The land of Donbass is extremely rich in minerals. For centuries, iron, coal, and many other things have been dragged from here, but large deposits of these and many other resources are still present in this fertile soil. To maximize the potential of this ground, we need to expand the existing mines and wells, increase production and processing, and then Donbass will truly feed the rest of its brotherly lands."
 
 DPR_towards_total_economic_independence:0 "Towards Total Economic Independence"
 DPR_towards_total_economic_independence_desc:0 "With the de-oligarchization of our economy, the expansion of mineral extraction and the monopolization of all possible economic sectors, our country has moved closer to the much-desired economic independence. By building a few more power plants and expanding our industrial capacity, we will be able to switch almost entirely to our own products, becoming a producer and consumer, and no one else will have the right to dictate their terms to us."
 
 DPR_embrace_the_role_of_the_lord:0 "Embrace the Role of the Lord"
 DPR_embrace_the_role_of_the_lord_desc:0 "With the conquest of all the lands of the former Ukraine, our economic and industrial capabilities have expanded to a gigantic scale. While the Donbass has undergone tremendous economic and industrial changes, the rest of the regions have not, and with the restoration of the empire, it is our duty to rule these lands as well as the others, leading them to prosperity."
 
 
 DPR_liberalization_of_the_economic_environment:0 "Liberalization of the Economic Environment"
 DPR_liberalization_of_the_economic_environment_desc:0 "With the aggressive and inhumane economic policy introduced by Girkin during his rule, many troubles and problems have fallen on our lands, and they must be solved now, and quickly. The only way to prosperity was and is in freedom, both social and political, as well as economic, and we must fight the autocracy that was tried to be established before us."
 
 DPR_encourage_foreign_investments:0 "Encourage Foreign Investments"
 DPR_encourage_foreign_investments_desc:0 "Having turned our face back to the world and abandoned the senseless and harmful policy of isolationism, we have chosen the path of cooperation and interaction with Western countries. Our economy is not in the best of health, while our new partners are known for their willingness to invest in potential friends and allies, which we definitely want to become. Perhaps if we make the best possible impression on them and promise them good results, they will eventually agree to invest in us..."
 
 DPR_sign_contracts_with_magnates:0 "Sign Contracts with Magnates"
 DPR_sign_contracts_with_magnates_desc:0 "Even though our land is extremely rich in mineral resources and fertility, we are unable to fully exploit this natural potential. However, by sharing some of these resources with foreign suppliers and producers and signing cooperation agreements, we will be able to use idle resources and achieve even greater development at both the regional and national levels. People, we have something to invest in!"
 
 DPR_state_privatization_programme:0 "State Privatization Programme"
 DPR_state_privatization_programme_desc:0 "With the introduction of the full-scale nationalisation policy, our economy has suffered extremely heavy losses and is no longer able to work for itself. We have to privatize state-owned industries immediately and find people who are willing to take the risk of trusting the government that has recently taken everything from them, and we will have to try very, very hard."
 
 DPR_promote_market_competition:0 "Promote Competition in the Market"
 DPR_promote_market_competition_desc:0 "With the recovery of the middle class and small and medium-sized businesses, our economy has begun to revive. However, a lot of areas are now under private monopolies, which will harm not only the overall economy but also the entire population. We need to stimulate competition between producers in the market by all means possible to prevent the capture of certain areas by one person or company, as this could threaten us with a return to the dark times from which we have barely crawled out."
 
 DPR_enshrining_western_style_economics:0 "Enshirining Western-Style Economics"
 DPR_enshrining_western_style_economics_desc:0 "Having dealt with the last remnants of Mr Girkin's economic policy, our country has finally freed itself from the isolation chains he had wrapped around it. We managed to establish cooperation with Western countries, found investors in many areas of our industry, created a self-sufficient market that can take care of itself, and, in general, we were able to rebuild the economy of a third-world country on the model of Western economies. Henceforth and forever, it will keep all the people of our empire in prosperity and harmony, and we will be able to enjoy the same benefits as our German and British colleagues."
 
 
 DPR_continue_the_nationalization_policy:0 "Continue the Nationalization Policy"
 DPR_continue_the_nationalization_policy_desc:0 "The economic policy launched by that idiot Girkin, despite most of his other decisions, was wise and justified. Full nationalisation is the only way to fully stabilize the country's economic situation, and we will continue on this course."
 
 DPR_implement_land_trade_quotas:0 "Implement Land Trade Quotas"
 DPR_implement_land_trade_quotas_desc:0 "Land trade in one form or another has always existed, but with the fall of the tsarist rule in 1917 and subsequent collectivisation, the legal owners lost all their land. Since the destruction of the Soviet pseudo-empire, a "neo-aristocracy" in the form of oligarchs has emerged and started buying up land and industry, while even ordinary peasants have begun to do the same. We have to limit the trade in large plots to the upper class only, since who would benefit from the acquisition of such territories by some ordinary Khokhol farmer."
 
 DPR_monopolize_new_spheres:0 "Monopolize New Spheres"
 DPR_monopolize_new_spheres_desc:0 "With the conquest of new lands, a lot of new areas fell under our sway. Oil extraction, uranium, heaps of other resources, and nuclear and hydroelectric power stations, which can greatly improve our economic fortunes if we can prevail over these industrial and energy branches."
 
 DPR_state_the_best_economist:0 "State — the Best Economist"
 DPR_state_the_best_economist_desc:0 "By subordinating all economic spheres, all industrial capacities, and all underground wealth of this land to direct state control, we have truly become the sole rulers here. But beyond this, we have been able to prove that the best way to prosperity is through complete control, as news of an increasingly better situation has only just begun to emerge across our vast lands."
 
 
 DPR_and_what_about_the_military:0 "And What About the Military?"
 DPR_and_what_about_the_military_desc:0 "Our army dates back to 2014, from the people's militias of the Donetsk and Luhansk People's Republics. Back then, a handful of militant workers, miners, and peasants took up arms to defend their families and homes from the invaders. Everything was as expected from a people's revolution. However, more than 6 years have passed since then, and the army has remained a bunch of untrained fools equipped with old Russian weapons and stupid commanders. With our plans to regain control of all the lands that rightfully belong to us, this squalor is our biggest problem. However, there is still hope. If we begin the long and painful process of reformation immediately, we will achieve the desired results in time, so get to work, you lazybones!"
 
 DPR_revise_recruitment_policy:0 "Revise Recruitment Policy"
 DPR_revise_recruitment_policy_desc:0 "As we begin the process of full reform of the armed forces, we need to review our conscription policy. The shaky system, which is based on corruption, needs to be radically changed, new norms must be introduced and a clear age limit for young men to be mobilized must be set. Moreover, military training should be made compulsory for all."
 
 DPR_time_for_aptitude_tests:0 "Time for Aptitude Tests"
 DPR_time_for_aptitude_tests_desc:0 "Many of our generals, commanders and executives have been serving in the army since the beginning of the Donbass uprising against the Ukrainian regime and the years that followed. However, as we all know, not all of these people are competent and knowledgeable in military affairs, and some are not military at all. We need to check all of them for their professional suitability and, if necessary, get rid of the burdens on the army."
 
 DPR_new_logistic_apparatus:0 "New Logistic Apparatus"
 DPR_new_logistic_apparatus_desc:0 "The state of logistics in our army is worse than just deplorable. Shattered roads and railways, the almost complete absence of airfields, and a lack of warehouses will play into our enemy's hands. We must immediately include logistics upgrades in the army reform plan, and implement this step in the shortest possible time."
 
 DPR_one_step_forward:0 "One Step Forward"
 DPR_one_step_forward_desc:0 "Well, the first changes have been successfully implemented. But it's not time to rest, there's still a lot of work to be done!"
 
 DPR_loyalty_to_traditions:0 "Loyalty to Traditions"
 DPR_loyalty_to_traditions_desc:0 "Traditions form the culture, which in turn sets the foundation for the development of the structure. This works both in state-building and in the army. We take the Russian imperial army as our highest example, and by abandoning it, we will also abandon their legacy, everything that eventually united us. Tradition is the bedrock of anything, and trying to change it is not only unethical but also arrogant and harmful, so all such sentiments must be stopped immediately."
 
 DPR_bullet_is_a_fool_bayonet_is_a_hero:0 "Pulya Ne Dura, No Shtyk Tozhe Molodets"
 DPR_bullet_is_a_fool_bayonet_is_a_hero_desc:0 "In the days of the imperial army, bayonets were still the norm in the army. An excellent tool for destroying enemies at close range, which for some reason was almost completely removed from short and medium-range weapons. What a stupid idea to remove such a wonderful thing from military weapons. But there is no need to worry, we know how to defend our interests, and we will return to the norms of using everything we consider necessary."
 
 DPR_radical_changes_are_essential:0 "Radical Changes Are Essential"
 DPR_radical_changes_are_essential_desc:0 "If we really want our troops to succeed, hindering the modernisation of the army, even at the cost of military traditions, can only be perceived as a state and national betrayal. Progress does not stand still, and while our enemies are learning better and more effective tactics, we are trying to stay stuck in the past, which is almost tantamount to suicide. Give us modernisation!"
 
 DPR_army_wide_motorization:0 "Army-Wide Motorization"
 DPR_army_wide_motorization_desc:0 "If we really want our army to march across all our lands, restoring legitimate authority over them, then we must go for the motorization of units. Cossack horsemen and Guards cavalry are certainly stylish, but they are no match for armoured vehicles and other motorized units, which hold a strong advantage over traditional ones in terms of speed and manoeuvrability. They will remain a ceremonial attribute, but in war, we need innovations, not dusty antiques."
 
 DPR_launch_full_reequipment:0 "Launch Full Re-equipment"
 DPR_launch_full_reequipment_desc:0 "The standard armament of our army consists of weapons that are considered hopelessly outdated in the vast majority of the world's countries, and we should be just ashamed of this. Is it worthy of a powerful army to go to war with such rubbish? We have to immediately replace these dusty models with newer ones so that we don't have to be at least embarrassed for our soldiers."
 
 DPR_conduct_top_level_trainings:0 "Conduct Top-Level Trainings"
 DPR_conduct_top_level_trainings_desc:0 "Before sending a soldier to war, it is the responsibility of the command to properly train him. Our current methods are not only inadequate and too economical, they are almost unnecessary, and regardless, the same soldier who has not received sufficient training will die in combat on the first day. A guaranteed leap forward to a successful army reform is high-quality training for soldiers of all types and stripes, and this is what will save the lives of many of our boys in the future."
 
 DPR_final_moves:0 "Final Moves"
 DPR_final_moves_desc:0 "The army has already undergone many reforms. We have done a great job. However, it's not over yet, there is still something to correct and improve."
 
 DPR_knowing_the_enemy_inside_and_out:0 "Knowing the Enemy Inside and Out"
 DPR_knowing_the_enemy_inside_and_out_desc:0 "Military intelligence has been serving all nations for many millennia, gradually gaining a greater and greater role. Since the formation of the Luhansk and Donetsk Republics, the leadership has relied only on data transmitted from Moscow, but those days are long gone, and information about the movements of enemy troops and beyond has only become more necessary. We will organize our own intelligence and keep an eye on the enemy without intermediaries, as we should have been doing from the very beginning."
 
 DPR_allocate_lands_for_military_enterprises:0 "Allocate Lands for Military Enterprises"
 DPR_allocate_lands_for_military_enterprises_desc:0 "The military industry needs more space for development, and this is a fact. Relying on imports from the East, the government could have spat on the development of its own production, however, we, as the carriers of reforms to this rotten system, must put an end to this misunderstanding. The state owns a lot of plots in industrial areas and beyond, and they would definitely be useful to our producers, who must get them."
 
 DPR_found_new_military_academies:0 "Found New Military Academics"
 DPR_found_new_military_academies_desc:0 "To get good commanders, we need to start educating them for the future. Military academies, if they existed during the reign of the previous authorities, were rather pathetic copies of such institutions, while no genius could have passed through one without having a dozen or so thousand in his pocket. Our generals deserve the highest possible education, and we will provide it!"
 
 DPR_best_army_in_the_eastern_hemisphere:0 "Best Army in the Eastern Hemisphere"
 DPR_best_army_in_the_eastern_hemisphere_desc:0 "After so many challenges, insurmountable difficulties, and a tonne of funds allocated from the budget, our army has truly transformed into something completely new. It is no longer a gang of marauders with a bandit at the helm, but a disciplined organisation where everything is clearly based on the abilities of its members, as it should be in a real and strong state. As the ranks of our reformed army grow, we will become stronger and stronger, and eventually, we will convince all our enemies of everything that is possible. It is we who will be the paragons of military glory of the new century, and it is our troops who will be a model for the whole world. Glory to the Armed Forces!"
 
 
 DPR_securing_the_airspace:0 "Securing the Airspace"
 DPR_securing_the_airspace_desc:0 "No modern war can be imagined without aviation. It is capable of everything from destroying the enemy's industrial capacities, through psychological pressure on society, airborne operations, and to the banal conquest of the heavens with the aim of preventing any enemy attempts to use the sky against us. We do not have our own planes, and there are very few imported ones, while our enemies may have many more, and this needs to be corrected immediately."
 
 DPR_open_new_airfields:0 "Open New Airfields"
 DPR_open_new_airfields_desc:0 "Aircraft need bases, but we don't have either yet. It is essential to start with bases, as we will always have time to produce aircraft, but where to deploy them is a retrospective question. We have very few aerodromes on our territory, and almost all of them are either damaged or simply unusable, so this must be changed."
 
 DPR_rely_on_foreign_samples:0 "Rely on Foreign Samples"
 DPR_rely_on_foreign_samples_desc:0 "Unlike us, the countries of the world had enough time, resources, and much better conditions to develop their military aviation industry. They have their own aircraft, their own construction technologies and weapons, which we will have to go on our own for decades to come. However, why make things so difficult when we can try to negotiate with these states to purchase such aircraft and licences to produce them, allowing us to jump ahead of the difficult and time-consuming process of producing our own warplanes from modified models of old Soviet junk?"
 
 DPR_nothing_is_better_than_ones_own:0 "Nothing is Better than One's Own"
 DPR_nothing_is_better_than_ones_own_desc:0 "In this world, you can only rely on yourself, and history has already taught humanity too many similar lessons. We have no right to step on the same rake again by putting our aviation in the hands of some unfamiliar and potentially hostile companies and individuals, so even if it happens to be harder, longer, tougher, we will achieve our own successes and victories without anyone else's "help"."
 
 DPR_new_aircraft_production_programme:0 "New Aircraft Production Programme"
 DPR_new_aircraft_production_programme_desc:0 "In order to catch up with our rivals in terms of the size of the aircraft fleet, we need to press on. Although we have long lagged behind in this regard, it is never too late to start. By introducing new production programmes, and stricter quotas, and by transferring more factories to aircraft production and more personnel to pilot and constructor training, we will significantly increase our strength and capabilities in the aviation industry."
 
 DPR_make_the_skies_our_home:0 "Make the Skies Our Home"
 DPR_make_the_skies_our_home_desc:0 "The most important thing in the war for the skies is to achieve absolute air superiority, and this requires fighters and other light aircraft, and a lot of them. By precisely attacking ground targets with small bombs and destroying the enemy's fleet in combat, we will already be making the most of the sky, so why bother with heavy and unnecessary planes?"
 
 DPR_turn_everything_into_ashes:0 "Turn Everything into Ashes"
 DPR_turn_everything_into_ashes_desc:0 "Failing to finish off an enemy already defeated in battle is tantamount to wanting to risk the lives of own people once again because of banal ineptitude. If we succeed in crushing the enemy in the air, we must use all the opportunities afforded by the control of the skies, deploy all possible resources to facilitate ground operations and turn their entire industry, all their warehouses, into ruins. Air defences will be our first ground target. After that, nothing will hide from us."
 
 DPR_we_will_become_the_destroyers_of_the_world:0 "We Will Become the Destroyers of the World"
 DPR_we_will_become_the_destroyers_of_the_world_desc:0 "True power lies in the ability not only to defeat the enemy but to turn him into a pile of ashes, destroying everything that represents him. Nuclear weapons were created for this very purpose, although they eventually moved to deterrence tools, giving the state that possesses them the de facto title of peacekeeper. With such power, we will be truly invincible."
 
 DPR_new_advanced_air_force:0 "New Advanced Air Force"
 DPR_new_advanced_air_force_desc:0 "After making a lot of decisions, difficult choices, and achieving our small victories, we can proudly say that our glorious country has acquired its own air force. It may not be the strongest in the world, and it probably won't be, but strength is not only in the power over the skies. With future additions, it will be more than enough for our initial purposes, and further, propaganda will be able to make the fleet even more powerful than it really is."
 
 
 DPR_fleet_of_the_two_seas:0 "Fleet of the Two Seas"
 DPR_fleet_of_the_two_seas_desc:0 "The Russian Imperial Black Sea Fleet is a truly legendary thing, having survived so many battles, and wars, and brought so many victories and defeats to its country. However, after the February and then the October Revolutions, its fate was forever changed. Nowadays, the remnants and descendants of this flotilla are scattered among the fleets of the so-called Russian Federation, Georgia, and what is left of Ukraine, but none of them has the right to claim power over the Black Sea, unlike us. We may not have a fleet as such yet, but with new lands, we will have more and more possibilities to build one, and then nobody will prevent us from ruling over two seas - the Black Sea and the Azov."
 
 DPR_open_new_shipyards:0 "Open New Shipyards"
 DPR_open_new_shipyards_desc:0 "You can't build a fleet without shipyards, and we need ships more than ever. We must launch a programme to build military shipyards in our main ports to begin construction of a new Black Sea flotilla, which we will achieve."
 
 DPR_dominate_the_sea_depths:0 "Dominate the Sea Depths"
 DPR_dominate_the_sea_depths_desc:0 "Submarines have proven their absolute superiority in terms of cheapness and compactness compared to huge and unmanoeuvrable machines since the World Wars. While we cannot compete with other nations in heavy ships due to our banal industrial capabilities, by focusing on submarines we will be able to destroy their shiny toys from the depths of the sea."
 
 DPR_cruiser_development_programme:0 "Cruiser Development Programme"
 DPR_cruiser_development_programme_desc:0 "Cruisers have long been the main ships in the world's navies. If a state is building a flotilla, cruisers are its priority. The same is true for us. We must concentrate our main resources on building these ships and modernising the old captured ones, and only then will our fleet begin to resemble its ancient ancestor in the form of an imperial flotilla."
 
 DPR_new_black_sea_pearl:0 "New Black Sea Pearl"
 DPR_new_black_sea_pearl_desc:0 "Every fleet needs its own flagship, and the Black Sea flotilla is no exception. The sea needs to find its pearl, while we need a symbol of a new and powerful fleet that can show the world who we really are. Bring your drawings and plans, engineers, it's time to build!"
 
 DPR_all_powerful_navy:0 "All-Powerful Navy"
 DPR_all_powerfull_navy_desc:0 "Having invested all possible resources in the planning and development of our naval forces, our state has finally reached the peak of its maritime potential. We have our own flagship, our own powerful vessels, our own and fully-fledged fleet that can challenge others across the region, and from now on we can truly say with pride that the Black Sea is ours!"
 
 
 ## EVENTS
 gir.0.t:0 "Long Awaited Victory"
 gir.0.d:0 "Today, the patriot and creator of Novorossiya, Ivan Vsevolodovich Girkin, won the election. Although he lost the battle for Slaviansk in 2014, it is now in the past. The remnants of the Ukrainian Armed Forces have been defeated, and Novorossiya has a bright future."
 gir.0.a:0 "Congratulations!"
 
 gir.1.t:0 "PROTESTS ACROSS THE COUNTRY"
 gir.1.d:0 "Since early morning, the streets of Donetsk, Lugansk, Mariupol, and several other cities began to fill with waves of protesters fueled by indignation and disappointment. Some arrived in silence, others with chants, hand-drawn signs, and cars draped in the flags of Novorossiya. The mood of the crowd was not just angry — it was tired. Tired of war, tired of radical nationalists, whether Ukrainian Banderites or figures like Girkin. Beneath the frowns of the demonstrators, one could see a clear desire to finally, for the first time in a long while, breathe freely and live in peace, in a democratic and socially oriented state built for its people.\n\nIn Donetsk, at the main square beneath the towering Lenin monument, the largest of the demonstrations had gathered. Journalists began to trickle in as well, mostly arriving in hurried groups, cameras in hand. Among them was a still unknown rookie, Natalia Davalkina, eager to capture the moment, her eyes wide with both curiosity and uncertainty.\n\nShe glanced around — to her left, a middle-aged woman wrapped in a Novorossiya flag shouted, "We don’t want him!". Somewhere nearby, group of young people, probably students, took up a rhythm: "Freedom to the constitution! Go away, Girkin!"\n\nShe knew, of course, that the protests were mostly led by supporters of Natalia Vitrenko and Leonid Pasechnik — two figures with completely different political legacies, but who gained considerable support in the recent election, ultimately losing to Girkin. Many in the crowd genuinely believed that his victory was less about democratic choice and more about intimidation and political manipulation.\n\nMeanwhile, Vitrenko and Pasechnik have already announced plans to unite temporarily under a common banner: 'The People’s Opposition'. Their message is clear as crystal — they’re calling for a complete revision of Girkin’s approach to governing, demanding freedom of speech, social benefits and even greater partnership with neighbours.\nThe constitution, they argue, should be rewritten to guarantee everyone’s equality before the law, with genuine political representation rather than token seats or symbolic gestures. And above all, they want to stop Girkin from turning the country into an 'authoritarian menace, hiding behind a democratic façade'.\nAt least that’s what they claim to desire.\n\nNatalia’s thoughts were interrupted by a sudden loud yell from one of the protest leaders: "We won’t stay silent! If they don’t hear us today, twice as many will march tomorrow!". The crowd then erupted in furious applause, reinforcing his words.\nThen she went on and spoke into the recorder: "Up to now, the protests have stayed peaceful, but I can feel the tension rising. Armed units are positioned just outside the city center — silent, watching. I’ve seen plainclothes officers weaving through the crowd. There have been no direct clashes, but even the smallest dispute seems to be able to shift the atmosphere. Everyone here understands how fast things can snap".\n\nSuddenly, a red light blinked on her recorder — low battery. Fortunately, this time she hadn’t forgotten to bring a spare.\n\n"This is Natalia Davalkina, reporting from Donetsk.""
 gir.1.a:0 "I’ll stay with the story as it unfolds."
 
 gir.2.t:0 "FIRST COLLISIONS"
 gir.2.d:0 "Despite the Girkin’s government obvious expectation that the protests would soon fade away, this has not happened. A month has already passed since the protests began, and every day they are becoming more massive and radical. However, it seems like the government has already found a solution to this problem.\n\n"This is Natalia Davalkina, and today I am reporting from Khmelnytsky Boulevard in Donetsk. Once again, a protest has gathered here, and by my estimates, it’s quite large — around a thousand people," Natalia said calmly, already accustomed to such events, having witnessed protests every day for the past month. She continued, "Right now, the protesters are marching along the boulevard, heading toward the main square and chanting slogans that have become more radical lately. People are demanding Girkin’s immediate resignation and new elections this year."\n\nAfter some time, the square came into view, and Natalia slowed her pace. From the other side of the square, another procession was moving — a rally in support of Girkin. Natalia focused, trying to get a closer look at the participants. Many of them were dressed in sportswear, wearing masks, holding bats or sticks, banners were rarely seen. She recognized the pattern immediately.\n"Titushki," she muttered to herself. "Great."\n\nThe moment the two groups saw each other, shouting broke out.\nAnd then, chaos.\n\nNatalia flinched as a bottle flew overhead and shattered near the monument steps. She turned just in time to see a group of masked figures break from the protest line and rush forward, shouting. "Who are these guys?" she breathed. "They don’t look like the other protesters."\nThe Girkinists reacted immediately, charging to meet them — and in seconds, fists were flying, stones were hurling, and sticks were swinging.\nNatalia tried to keep filming, until the chaos reached her. The police arrived.\n\nSuddenly, she felt something hard strike the back of her head. She fell onto the dirty street floor, clutching her head in pain. She turned, only to find herself face to face with a police officer.\n"Press! I’m press!" she shouted, holding up her badge. Her camera was lying shattered nearby.\n\nThe police did not intervene to stop the fighting. In some corners of the square, they seemed to even guide the Girkinists, forming barriers that blocked the protestors.\n\nBy the time the violence ended, dozens were injured. No arrests were reported.\n\nNatalia barely made it home that evening. Her head still hurt, her coat was torn, camera ruined. She didn’t bother to take her boots off. She just sat there, at the edge of her bed.\n"I’m done," she muttered. "This isn’t worth it."\n\nThen, her phone buzzed. A new email.\nSubject: Interview Invitation — Novorossiya State News.\n\nShe read it twice. Her fingers hovered over the screen."
 gir.2.a:0 "...Maybe not yet."
 
 gir.3.t:0 "The Leak"
 gir.3.d:0 "Yesterday, there was a data leak that shocked society. Details about the ex-president of the LPR Pasichnik and his involvement in the incident with 4 prostitutes and a horse became known. It also became known that Vitrenko worked for the Ukrainian regime, leaking information to them! Currently, the leaders of the People's Opposition are trying to justify themselves and call this information a lie, but all faithful Novorossians know that it is true!"
 gir.3.a:0 "That's disgusting!"
 
 gir.4.t:0 "Civil war!"
 gir.4.d:0 "Today, as far as we know, terrorists from the People's Opposition and traitors of Novorossiya are seizing towns and villages, but in some of them people loyal to our president have been able to put up armed resistance. At present, special forces and internal troops are trying to retake the towns and villages seized by terrorists, although, according to our information, this sometimes leads to civilian casualties. Currently, police and special forces are trying to suppress these uprisings, and clashes with terrorists sometimes result in the death of terrorists. In some places, our glorious forces have been able to restore order, but there are others where there is anarchy, with criminals looting shops, killing and raping women. President Girkin gave a speech: "Today our internal enemies are trying to destroy Novorossiya! But I promise that they will all be arrested and convicted for crimes against the state!  Even if I catch them in the toilet, I will drown them in it!""
 gir.4.a:0 "It`s so over..."
 
 gir.5.t:0 "THE ANNOUNCEMENT"
 gir.5.d:0 "That morning, the air was especially cold. Natalia was a little frozen, but she tried not to show it.\n\n"This is Natalia Davalkina, and today I’m reporting from the main square in Donetsk. A huge crowd has gathered here in front of the city administration — by my estimates, around a thousand people. Everyone is waiting for the announcement promised by the city council. While the content of the statement is still unknown, it will likely concern the recent protests that have erupted across the country in response to Igor Girkin’s election as president," Natalia said confidently, doing her best to hide the trembling in her voice from the cold.\n\n"God, when is he going to show up already?" Natalia grumbled. The announcement had been scheduled for thirty minutes ago, and Gubarev was late. With every passing minute, frustration in the crowd grew more visible. "How much longer are we supposed to stand in this cold?!" someone shouted.\n\nSuddenly, a figure appeared from the city administration building, flanked by several guards.\n\n"Finally," Natalia sighed in relief. "If he hadn’t shown up, that would’ve pissed off the protesters even more."\n\nGubarev didn’t rush to the podium, moving carefully, as if measuring every step. One of the guards helped him up the stairs. Natalia focused, trying to get a better look at him. Huge bags under his eyes — poorly concealed with concealer. His clothes looked worn, hair disheveled.\n\n"Did he not sleep? Probably been drinking all night," she thought.\n\nFinally, Gubarev stepped to the center of the podium, in full view of the crowd. In his hands were several A4 sheets with some printed text.\nThen he began his speech.\n\n"Dear citizens..." The crowd immediately responded with disapproving shouts.\n"Recently, a wave of protests has swept across our beautiful Novorossiya..." he spoke slowly and clearly, separating each word.\n"...sparked by public dissatisfaction with our 'authoritarianism'." That last word he said quieter, through clenched teeth.\n"In response to this, our President, Igor Ivanovich Girkin, has instructed me to announce to the people new changes to the constitution."\n"Starting next week..." Gubarev said, his voice flat, eyes barely rising to meet the crowd.\n"Constitution will now guarantee freedom of speech. All people will be considered equal under the law. The administration will pursue a course of partial privatization and economic liberalization. Social benefits will be improved."\n\nHis expression didn’t change. The tone of his voice was mechanical, like reciting a grocery list.\n"Rights of those convicted on political grounds will be protected. Prison conditions will be made more humane. Citizens will have the right to form any political organization, regardless of ideology. Peaceful demonstrations will no longer require prior approval from regional authorities."\n\nHe blinked slowly, then turned to the last page.\n"A general political amnesty will be issued for individuals arrested during recent unauthorized protests. Police powers will be restricted. A new judicial reform is planned."\n\nThe shouts stopped. For a moment, an immense silence settled over the square — the kind of silence you couldn’t hear for miles around. It felt like even the wind itself had frozen in the moment.\n\nBut it didn’t last.\n\nSeconds later, the crowd erupted into joyous cheers. "HURRAH!" people shouted. Some tossed their hats into the air. Others hugged.\nThey had won.\n\nNatalia stood frozen longer than the others. She couldn’t believe what she had just heard.\n"Liberalization? From Girkin?"\nDoubt began creeping into her mind. She had heard rumors about planned reforms, but thought it was just misinformation. Surely he wouldn’t actually cave to the opposition’s demands?\n\nAnd yet... he did.\n\nIt took the young reporter a few minutes to pull herself together. By then, Gubarev had already slipped back into the mayor’s office, and the crowd was celebrating, drinking right on the street.\n\nSuddenly, Natalia’s phone buzzed.\nA new email.\nSubject: Interview Invitation — Novorossiya State News.\n\nHer joy knew no bounds.\nWas everything finally going to be okay?\n\nShe tried not to think too hard about the how and the why. Today, she just wanted to be happy.\nAnd yet, deep down, something gnawed at her.\nWould Girkin really give in to Pasechnik and Vitrenko?\n\nIt can’t be all fake... right?"
 gir.5.a:0 "...or can it?"
 
 gir.6.t:0 "Assault"
 gir.6.d.a:0 "Today Andrey Petrov was in an excellent mood. For the first time in ages, he wasn’t bothered by insomnia, which meant he was able to get a good night’s sleep. Now, work awaited him, and with a lifted spirit, he set off to earn his salary.\n\nThe building that housed his office didn’t look too bad compared to other elements of Soviet architecture in Donetsk. Entering through the main door, he went up to the second floor where his office was located. He was doing important work for Novorossiya — he was the head of the political technology department of the main cell of the People’s Opposition! Mostly he compiled and reviewed the results of Vitrenko’s political campaigns, though Pushilin paid him well too.\nOh, how he loved calculating the costs of banners and political campaign expenses for his clients. His parents always suspected he was on the spectrum. Of course, his reports would have never been understood, let alone accepted, if he hadn’t wrapped them in attractive packaging.\n\nSuddenly, someone screamed on the first floor. Andrey took a pistol out of his desk drawer, purely as a precaution, and decided to go check what was going on downstairs. He didn’t know how to shoot, of course, but holding the gun in his hand gave him a sense of confidence, something his mind sorely lacked in such a stressful situation.\n\nAs he approached the staircase, Petrov saw smoke rising from the first floor. Sweat began to run down his face. The downsides of his profession had turned him into a paranoiac. At best, it was a fire; at worst… In any case, he couldn’t stay in the building.\nGoing down the stairs wasn’t an option, so without thinking too much, Andrey ran toward the fire escape. On the way, he inhaled some of the smoke, after which his throat started burning and his eyes flooded with tears.\n\nReaching the fire exit leading to the stairs, he was confronted by a silhouette in military gear with a gas mask. Expecting the worst, Andrey ducked at the exact moment the stranger’s fist was about to strike his head. Pushing the person in the gas mask aside, Andrey burst through the door and onto the staircase. He felt like he had never run down stairs so fast in his life.\n\nAnd then, on the very last step, when freedom was so close, he suddenly stumbled and fell, smashing his forehead against the concrete floor. Unfortunately for him, and fortunately for his pursuers, the frontal bone is one of the strongest bones in the human skull..."
 gir.6.d.b:0 "Today Andrey Petrov was in an excellent mood. For the first time in ages, he wasn’t bothered by insomnia, which meant he was able to get a good night’s sleep. Now, work awaited him, and with a lifted spirit, he set off to earn his salary.\n\nThe building that housed his office didn’t look too bad compared to other elements of Soviet architecture in Donetsk. Entering through the main door, he went up to the second floor where his office was located. He was doing important work for Novorossiya — he was the head of the political technology department of the main cell of the People’s Opposition! Mostly he compiled and reviewed the results of Vitrenko’s political campaigns, though Pushilin paid him well too.\nOh, how he loved calculating the costs of banners and political campaign expenses for his clients. His parents always suspected he was on the spectrum. Of course, his reports would have never been understood, let alone accepted, if he hadn’t wrapped them in attractive packaging.\n\nSuddenly, someone screamed on the first floor. Andrey took a pistol out of his desk drawer, purely as a precaution, and decided to go check what was going on downstairs. He didn’t know how to shoot, of course, but holding the gun in his hand gave him a sense of confidence, something his mind sorely lacked in such a stressful situation.\n\nAs he approached the staircase, Petrov saw smoke rising from the first floor. Sweat began to run down his face. The downsides of his profession had turned him into a paranoiac. At best, it was a fire; at worst… In any case, he couldn’t stay in the building.\nGoing down the stairs wasn’t an option, so without thinking too much, Andrey ran toward the fire escape. On the way, he inhaled some of the smoke, after which his throat started burning and his eyes flooded with tears.\n\nReaching the fire exit leading to the stairs, he was confronted by a silhouette in military gear with a gas mask. Expecting the worst, Andrey ducked at the exact moment the stranger’s fist was about to strike his head. Pushing the person in the gas mask aside, Andrey burst through the door and onto the staircase. He felt like he had never run down stairs so fast in his life.\n\nAnd then, having successfully descended the stairs at a speed only comparable to the duration of his sexual encounters, he opened the door to the street and... saw dozens of gun barrels aimed directly at him. But no matter, for he still had his beloved pistol with him! Who knows, perhaps he hadn’t even meant to raise it and did so purely out of reflex, but trained fighters do not forgive such mistakes.\nJust a second later, he was lying on the cold concrete outside, bleeding out, thinking about what he might have done differently."
 gir.6.a:0 "Oopsie..."
 
 gir.7.t:0 "Aftermath"
 gir.7.d.a:0 "Maxim, a police captain, watched as the detainees were led out of the building. Their eyes were streaming from tear gas, and they were whimpering uncontrollably. Despite all the captain’s efforts to keep a stoic expression, one could easily notice the smile breaking through his lips.\n\n"Everyone’s out?" he asked his subordinate, who had approached him a minute earlier but didn’t dare to address his captain without permission.\n\n"Yes, sir."\n\n"Good. Did you find the documents?"\n\n"Unfortunately, sir, we were too late. A lot was burned..." The captain’s face tightened slightly. "…but we recovered all of the equipment intact. Whatever we need should be on it."\n\nThe captain’s expression immediately softened into a grin. "Excellent. That’s where you should have started. Do we have access already?"\n\nSilence was the only response. The captain furrowed his brow again, this time more deeply.  "When can we expect access to the materials?"\n\n"They’re encrypted, sir," the subordinate said, gulping. "Decrypting will take weeks, maybe even months..."\n\n"FUCK! DAMN IT! FUCKING ASSHOLES! THOSE FILES ARE NEEDED RIGHT NOW!" the captain exploded.\nAn awkward silence filled the air.\n\nHearing the exchange, a private approached cautiously. "Sir…"\n\n"WHAT?" Maxim responded, his shout filled with irritation.\n\n"We captured the presumed leader of this cell," the private said. The captain looked surprised for a moment, and soon after, a brilliant smile spread across his face.\n\nThe private continued, "He must know the encryption key, and if we 'convince' him…"\n\n"Stop," the captain interrupted calmly, "It’s fine, I understand, thank you.""
 gir.7.d.b:0 "Maxim, a police captain, watched as the detainees were led out of the building. Their eyes were streaming from tear gas, and they were whimpering uncontrollably. Despite all the captain’s efforts to keep a stoic expression, one could easily notice the smile breaking through his lips.\n\n"Everyone’s out?" he asked his subordinate, who had approached him a minute earlier but didn’t dare to address his captain without permission.\n\n"Yes, sir."\n\n"Good. Did you find the documents?"\n\n"Unfortunately, sir, we were too late. A lot was burned..." The captain’s face tightened slightly. "…but we recovered all of the equipment intact. Whatever we need should be on it."\n\nThe captain’s expression immediately softened into a grin. "Excellent. That’s where you should have started. Do we have access already?"\n\nSilence was the only response. The captain furrowed his brow again, this time more deeply.  "When can we expect access to the materials?"\n\n"They’re encrypted, sir," the subordinate said, gulping. "Decrypting will take weeks, maybe even months..."\n\n"FUCK! DAMN IT! FUCKING ASSHOLES! THOSE FILES ARE NEEDED RIGHT NOW!" the captain exploded.\nAn awkward silence filled the air.\n\nHearing the exchange, a private approached cautiously. "Sir…"\n\n"WHAT?" Maxim responded, his shout filled with irritation.\n\n"We almost captured the presumed leader of this cell," the private said. The captain raised an eyebrow slightly. "But unfortunately, he was killed by our boys while resisting and..."\n\nThe private’s words were cut short by Maxim’s fist slamming into the hood of the car.\n"Everyone’s dismissed," he said with a heavy sigh."
 gir.7.a:0 "Bingo"
 gir.7.b:0 "Failure"
 
 gir.8.t:0 "Returning the constitution"
 gir.8.d:0 "That morning, Girkin has revoked the amendments to the constitution, made as a part of a deal with the opposition. With that, he returns his control over the state, and that will be met with outrage by the opposition for sure."
 gir.8.a:0 "Shocking news"
 
 gir.9.t:0 "Anarchy"
 gir.9.d:0 "After the bloody clashes between terrorists and our glorious special forces, some regions of Novorossiya are currently in a state of anarchy, as the police are unable to maintain order in the region. People are being robbed, raped and killed in the uncontrolled territories, and this is all the result of the actions of the People's Opposition. People live in fear, knowing that tomorrow they may not return to their children when they walk down a dark alleyway."
 gir.9.a:0 "Ok."
 
 gir.901.t:0 "Moving out"
 gir.901.d:0 "Natalia Vitrenko, not so long ago one of candidates in Novorossiyan elections, was sitting in her appartment somewhere in the center of Donetsk. She had some packed things of first priority with her, while she was trying to call one of her friends. The signal was too low to make a call, and that made Vitrenko nervous.\n\n"Why the fuck can't I make a call? Is that the doing of this son of a bitch?!", Vitrenko said angrily. Some time after she got a message from that friend. It said "Move out, I'm going to pick you up". She quickly picked up her bag with fake documents, clothes, a small bottle of vodka and huge ties of rubles, and stepped out from her home.\n\nRight at the front door she was greeted by a man in camo. He was holding a "Makarov" pistol, and without hesitation made two shots. Natalia wouldn't even realise what was happening, as she fell on the floor with two bullets in her head. Killer then picked up phone, and typed to her friend: "Operation successful"."
 gir.901.a:0 "There's no place for damned socialists here!"
 
 gir.902.t:0 "Ticket to the other side"
 gir.902.d:0 "Leonid Ivanovich Pasechnik, recently the head of the LPR and an election candidate, and after losing, the main opposition leader, knew that he would not live long. While the LPR was based on bureaucracy, the DPR was based on political assassinations and intimidation. And Leonid knew that Girkin, as the author of the DPR project, would clearly choose this path to get rid of the opposition, especially after recent events. Having gathered all the most important things, he bought a ticket to Rostov through old friends.\n\nWhen he was picked up, he noticed that the bus looked quite interesting - there were nets on the windows, and the doors did not open from the inside. After 3 hours, they reached the forest they were supposed to pass through, but the driver abruptly stopped\n"Is something wrong?" - Pasechnik asked, nervously fumbling with the $500 bills in his hands.\n"Something with the engine, I'll be right back." - said the driver's low, smoky voice as he got out of the cab and closed the door. Getting out of the car, Maxim took out a can of gasoline and started pouring it on the bus, ignoring the screams of the bus attendant inside. Pulling out his phone, Maxim smoked as he dialed.\n"Task completed, who's next?" - he said, throwing the cigarette butt on the hood, which was still wet with gasoline, and walking to the checkpoint.\nThe orange flames of the fire crackled beautifully on the remains of the bus and what used to be Pasechnik."
 gir.902.a:0 "One less bandit in our country."
 
 gir.903.t:0 "Unlucky fisherman"
 gir.903.d:0 "Pushilin Denis Vladimirovich was fishing at his country cottage as usual. Not long ago, he was the head of the Donetsk People's Republic and the main candidate in the elections, but today he is no one. He knew that his relationship with Girkin was not very... good, so he could stay alive. The cottage was in the middle of the forest, in a quiet valley. Lilies could be seen on the surface of the lake, as well as the gentle movement of the fish that were settled there\n\nA few minutes later, he heard footsteps behind him, to which he calmly responded\n"Maxim, is that you?" - he asked without turning around.\n"Yes." - Maxim's low, smoky voice replied.\n"Well, you didn't come to fish, did you?" - Denis said, getting up and putting down his fishing rod: "Then I won't keep you, I know how it works" After these words, a single shot was fired, scaring away all the fish in the lake."
 gir.903.a:0 "A dog's death."
 
 gir.10.t:0 "Hello? Prigozhin...?"
 gir.10.d:0 "The sky was cloudy, yet birds were singing.\n\nIgor Girkin paced back and forth across his room. He told his guards he was waiting for a very important call from Moscow.\n\nMidday passed, then afternoon... But just yesterday he had spoken with them! They had promised to help Igor, and that Prigozhin would contact him personally. It seemed like the colonel was deceived once again.\n\n"Bastards!" Girkin slammed his fist on the table. "I know Prigozhin is a son of a bitch, only interested in running his own business. I know... These bandits can’t keep order. They are all morons who do not care about our state! Fucking corrupt bastards, enemies of the people!"\n\n"I've had enough."\n\nHe was about to go to bed when the telephone suddenly rang.\n"Who the hell is this? It's fucking 1 a.m."\n\nHe picked up the phone.\n"Yes?"\n\nA serious voice answered from the other end.\n"Good night, Strelok. It’s me, Evgeniy. I am sorry for keeping you waiting so long. We’ve agreed to your proposal. I’ll send you my men, the ones who fought in Syria."\n\nAnd Girkin started smiling, slowly.\nHe was so back."
 gir.10.a:0 "The Wagner Group will arrive soon."
 
 gir.11.t:0 "Integration into the Regular Army"
 gir.11.d:0 "On a chilly day, Wagner soldiers were assembled on the parade ground, but instead of the usual dose of humiliation, they received a briefing from their new commander. Prigozhin was not present.\n\n"Wagner is being integrated into the state's army. Veterans of the African campaign in Mali, operatives from Syria, all of them will now stand in the same ranks as prestigious battalions such as Somali, Sparta, and Patriot."\n\nThe commander began walking down the line, one by one ripping off their patches like clothes from prostitutes. This was a turning point for all members of the PMC. The ideological vector of the soldiers had to be changed. They were stripped of their pride, forced to forget their creators, and made to swear allegiance to a new idea for which they would go into battle. They would no longer fight for the lousy nazi Utkin or kill for money. Instead, they would 'liberate Novorossiya' from the accursed fascists and finally become warriors of the people.\n\nThe new commander asked those who did not wish to take the oath to raise their hands. It was a fatal mistake for those poor souls who believed in freedom of speech. The commander approached the 'dissenters' and spat one of them in the face — one last dose of humiliation, though at least it was the final one. The commander handed out termination contracts, and they were dismissed. The others began their service in the great army of Novorossiya."
 gir.11.a:0 "Just great."
 
 gir.12.t:0 "The Saviour of Novorossiya"
 gir.12.d:0 "The Russians of Donbass have been waiting for a new Potemkin for a long time… And he has come.\n\nHis word is stronger than stone. Our hearts ache and find no peace. Many may laugh, but soon everyone will witness the immortal will of the people of Donbass. Igor Girkin is a brilliant commander — remember Sloviansk, remember our past victories... and our defeats. When all the hypocrites forgot the fallen heroes, Girkin shared in the suffering of the people. He is the voice of our land.\n\nBut now is not the time for celebration.\n\nAs the neo-Nazi beast from the West sharpens its knives against us, Igor Girkin will rise to defend our small land. He is the only one who truly understands all the problems of our homeland. We will endure on our own. We will not abandon our cities. The great spirit of the new Russia is the foundation of our strength.\n\nIt is time to break the old order.\n\nWe must cleanse our country of corrupt hypocrites. The Battle for Russian Donbass continues. Novorossiya will rise from the ashes with a new, just, wise, and courageous, leader.\n\nGirkin will lead us into our final battle.\nUnited and strong.\nDeath or victory."
 gir.12.a:0 "Everyone bowed, but not my land!"
 
 gir.13.t:0 "FSB"
 gir.13.d:0 "Federal’naya Sluzhba Bezopasnosti (Federal Security Service, FSB) was founded in 1995. It is the successor organization to the Soviet KGB.\n\nIts primary responsibilities are domestic and include counterintelligence, internal and border security, counterterrorism, surveillance, and the investigation of certain types of serious crimes and federal law violations. The FSB is headquartered in Lubyanka Square in central Moscow, in the main building of the former KGB. The director of the FSB is appointed by and directly accountable to the President of Russia.\n\nAfter becoming president, Vladimir Putin launched a major reorganization of the FSB. First, the FSB was placed under the direct control of the President by a decree issued on 17 May 2000. The agency’s internal structure was reformed by a decree signed in June 2000. Under the resulting structure, the FSB was to have a director, a first deputy director, and nine other deputy directors, including a possible state secretary and the heads of six departments: the Economic Security Department, Counterintelligence Department, Organizational and Personnel Service, Department of Operational Support, Department for Analysis, Forecasting, and Strategic Planning, and the Department for the Protection of the Constitutional System and the Fight Against Terrorism.\n\nSince 2014, the FSB has devoted substantial resources to preparing for a Russian takeover of Ukraine. Although Russia’s SVR and GRU were also involved, the FSB played a leading role in intelligence and influence operations."
 gir.13.a:0 "Echo of USSR..."
 
 gir.14.t:0 "Imperial Guard Service"
 gir.14.d:0 "Donbass. Eastern Ukraine.\n\nWith Igor Girkin’s rise to power in the leadership of the Novorossiya project, not only civilians fuelled by Ukrainian neo-Nazis, but also quite organized terrorist groups and clans consisting of influential businessmen, ideologues, and even representatives or veterans of the People’s Militia became very active. This situation would sooner or later corner Girkin and his new government, which does not suit us at all. That is why, taking advantage of his connections, he made several phone calls, as he claims, to 'former colleagues', but some facts pointed to assistance from the Lubyanka.\n\nHaving outlined the situation to his men, they sent him the best they could — trusted people, manuals, and training, together with their experience and knowledge of counter-terrorist and counter-intelligence activities. After arriving in Donetsk, placing people, and receiving almost instant carte blanche for any action, the specialists began to study. Using simple street surveillance and even infiltration into disloyal organizations, they immediately began to achieve results. Within a fortnight of their work, they had formed branches of connections, disagreements, and castes within their factions, and most importantly, safe houses and passwords. It was necessary to act decisively, and the people in whom Girkin had placed his trust fully justified it.\n\nMeetings of secret societies and organizations unfriendly to us began to be raided either based on information received through their carelessness and blunders, or even by means of bribery and incitement from within. They were caught in the act — while discussing plans, counting weapons or money, or even preparing for terrorist attacks. When they all, to the exclamation of "I’m innocent!", were sent to the basements of Girkin’s new guard, it became clear that no one would come out alive.\n\nLittle is known about the mysterious 'Cellar L', the main torture room, but it is clear that during interrogations syringes with obscure liquids were used to inject into the eyes. Additionally, after the interrogations, tools from butcher shops or surgical supplies were discovered. Predominantly, the interrogated person was placed in an old dentist’s chair, injected with drugs or infections through the eyes and veins using a dirty syringe, and then subjected to instruments.\n\nAfter exactly fifteen night raids, Girkin officially announced the creation of the 'Imperial Guard Service', as well as their unrestricted authority in the field."
 gir.14.a:0 "But what have become with the families of interrogated...?"
 
 gir.15.t:0 "Arrest"
 gir.15.d:0 "Ivan Petrov, a worker at a pipe manufacturing plant, was walking home after a long shift at the factory. The shop manager had been late with his salary for ten weeks, and Ivan was sure he had a new car. As he approached his high-rise building, he entered the elevator, thinking about the days when workers like him would not suffer from the damned capitalists. As he approached his apartment, he felt a strange fear. His door was not locked, and the door was half-open. Fearing that he had been robbed, he ran into the apartment, but a second later he was hit in the fucking face with a rifle butt. He was knocked out, lying on the floor. A lieutenant colonel, judging by his shoulder straps, from the security service, came up to him, smiling\n"We found posters of Vitrenko, a damned terrorist and traitor to our state, in your apartment! You are arrested for propaganda of socialism and treason!""
 gir.15.a:0 "Ok."
 
 gir.16.t:0 "Neo-White Movement"
 gir.16.d:0 "The ROVS was a post-war organisation founded by General Pyotr Nikolayevich Wrangel, with its headquarters in Belgrade, then Yugoslavia. The ROVS had its own resistance cells all over the world, where Russian émigrés with anti-communist views gathered; the ROVS also included other smaller organisations, the largest of which was the VVDZ (All-Great Don Army Abroad). The aim of the ROVS was to preserve the anti-communist personnel of the imperial army and to continue waging the Cold War against the Soviet Union, or even a hot war in the future.\n\nFollowing the collapse of the Soviet Union, the Russian Federation, led by Yeltsin, took on the same anti-national character, with the word ‘Russkiy’ becoming taboo and being replaced by the more neutral ‘Russian’. The old ROVS was to undergo restructuring and reform in order to withstand the trials of the new millennium; the new leader was the patriotic Igor Borisovich Ivanov, and the name was changed to NROVS – the New Russian General Military Union, with its headquarters in the Russian Federation. The NRVS proved itself well in the war in Donbas; at the same time, the VVDZ split from the NRVS, labelling it a ‘Kremlin adventure’ and subsequently branding them a pro-communist group.\n\nThe VVDZ’s betrayal forced NRVS members to ask uncomfortable questions and led to a brain drain from the organisation. But this did not stop Ivanova. The ROVS successfully underwent restructuring and aimed for loyalty to Russia—in whatever form—and patriotism, having moved away from tsarism. The NROVS replaced the lost monarchists with new ones, based on new principles and a new ideology.\n\nTsarism is a thing of the past. We must look towards the prospect of a great multinational federation, not an empire."
 gir.16.a:0 "Pozdnyakov. Subscribe."
 
 gir.17.t:0 "Undefeatable Heroes of Russia"
 gir.17.d:0 "We are the descendants of those who went into battle against the traitors of Christ, Russia, and the Tsar.\n\nThe traitorous revolution staged by the Marxist Jew in November 1917 led to the collapse of the strongest state in Eastern Europe, the defender of all Slavs and Orthodox Christians — the Russian Empire.\nFor many war heroes, the battle for Russia had only just begun: Denikin, Wrangel, Kolchak, Drozdovsky. They answered the call of their homeland. Uncompromising and unapologetic, they fought against the communists and other separatist movements for our future, for Triune Rus, and for our people.\n\nThey were not defeated.\nYet, many were forced to leave Russia. A lot of heroes were killed, and a new stage of struggle began in exile.\n\nOn the ruins of sacred Russia, Lenin and his bandits built a red prison for our people. After the death of the syphilitic Jew, power passed to a tyrant responsible for the deaths of millions of peasants during collectivization, thousands of Russian officers during the purges, millions of soldiers sent to their deaths, and Russian poets and scientists executed for alleged 'spying.' White emigrants supported neither Hitler nor Stalin. Their battle continued.\n\nIt seemed that the struggle was pointless. But as the years passed, the Soviet Union grew weaker.\nStalin died in 1953. From that moment on, the state began to collapse. Communism began to die slowly, while bureaucracy and liberalism eventually destroyed the Soviet state.\n\nThe White Guard did not lose; it’s just that the Reds declared victory.\nThe plague was defeated in 1991, after the collapse of the Soviet Union. They were defeated but not broken, like the liberals and separatists who appeared in the 1990s. The struggle continues.\n\nAnd now, we have a great chance to confront all the traitors of Russia and restore her greatness. Soon."
 gir.17.a:0 "Justice will be restored!"
 
 gir.18.t:0 "Important Meeting"
 gir.18.d:0 "Today, an extremely interesting event took place, sparking heated debate among right-wingers and conservatives. In one of the restaurants in our capital, Girkin, the famous hero of the 'Russian Spring' and current head of our state, met with Ivanov, known as the leader of the Russian All-Military Union (ROVS), which unites right-wing patriots of our homeland. The meeting was informal and relaxed.\n\nDuring the meeting, they discussed many things, including the politics of our state, history, and culture. During the discussion of history, Girkin expressed his opinion about Denikin, highly praising the peasant marshal as a selfless leader and excellent commander, while Ivanov prefers Wrangel for his monarchist ideals and aristocratic origins.\n\nHowever, the neutral tone of the conversation changed slightly afterwards. Girkin proposed closer cooperation between the ROVS and his government and emphasised how different the White generals such as Denikin, Wrangel and Kolchak were, yet they fought for a common cause. We must not allow the New White Cause to be divided in the face of the common Jewish-Bolshevik enemy."
 gir.18.a:0 "Ok."
 
 gir.19.t:0 "History of the Don Cossacks"
 gir.19.d:0 "Many historians and common people claim that the Don Cossacks are descended from the Zaporozhian Cossacks and Ukrainian exiles who settled in those lands, and that the genesis of the Don Cossacks has Ukrainian roots. However, this is a lie, a deliberate falsification. The true predecessors of the Don Cossacks came from Ryazan Cossacks, guardians of the Don trade route, fighters and defenders of Russia. They created their own military, the 'Vsevelikoye voysko Donskoye' (Almighty Don Host), a shield for the Motherland. Soon, the Don army was brought under the authority of the Russian Empire’s Military Collegium, but it never lost its spirit, its independence, its honour.\n\nThe Don Cossacks fought with courage against the enemies of sacred Russia in World War I, against Bolshevik traitors during the Civil War, and against fascist invaders in World War II.\n\nAnd yet, the Bolsheviks could not stand the free spirit of the Don Host. They unleashed a campaign of terror so brutal that it sought to erase the Cossacks from the face of the earth. Villages were burned, families slaughtered, thousands executed or thrown into the merciless gulags. Our lands were stolen, our churches desecrated, our schools destroyed. They called it 'Decossackization'. This genocide was meant to kill the Don Cossacks, body and soul. But they failed. Even in exile, the spirit of the Don Host endured.\n\nNow, like their fathers before them, the Don Cossacks are again standing against fascism in Donbass. Since 2014, our warriors, under the fearless leadership of Nikolai Kozitsyn, have taken part in the liberation war of Donbass, acting as independent volunteers within the militias. In the Lugansk region alone, up to four thousand Don Cossacks formed the 'Cossack National Guard of the Almighty Don Host,' defending the Lisichansk-Rubezhnoye-Severodonetsk triangle and clashing with ukronazis in Debaltsevo. Later, the regiment became part of the LPR militia, a continuation of the unbroken legacy of the Don Host.\n\nThe battle is not over. It never ends for the Cossacks. The Cossacks will fight for Novorossiya, for Russia, and for its people.\nWe bow to no tyrant, no foreign invader. We honor all heroes of our great Motherland who fell for the future of our nation. And we will continue to fight, as they did, until victory is ours."
 gir.19.a:0 "Glory to Christ, Glory to Don Cossacks!"
 
 gir.20.t:0 "Cossack March"
 gir.20.d:0 "Today, Don Cossacks marched down the main streets of Donetsk. Following recent talks between the President of our glorious republic and representatives of the Don Host, these proud heroes of history were officially invited to the city for cultural and historical cooperation!\n\nFor many residents, it was the first time since the Civil War that Russian Cossacks had been seen on the central streets. The clatter of hooves on the paving stones of the city centre and the former Lenin Square, now renamed the Square of Heroes of the Ice Campaign, the cornerstone and nucleus of the origin of the ideas of Russian nationalism and the White cause. Thousands of residents lined the streets, many climbing onto the roofs of houses and shops to get a closer look at the procession.\n\nThe parade was opened by Ataman Kaledin’s First Cavalry Squadron, which marched under the banners of the Don Cossacks and the standards of the House of Romanov. The Cossacks were dressed in traditional Circassian uniforms, many marching with shashkas, while some carried automatic rifles over their shoulders and pikes in their hands. The Plastun Battalion, named after Ataman Krasnov, moved right behind them. Contrary to his controversial reputation, Krasnov is still regarded as a Russian hero who fought the Bolsheviks. The fighters moved under Russian tricolours and Novorossiya flags. Their heads were adorned with proud Cossack hats, and on their shoulders were golden epaulettes stylized to resemble the uniforms of the Russian Imperial Army. Many of them had already distinguished themselves in maneuvers or in battle, so they proudly wore various awards. The fighters saluted the commander-in-chief, Girkin. The Plastuns were followed by the Cavalry Division named after Mamontov, the famous Cossack commander and cavalry master who cleverly circumvented the front lines and defeated the Bolsheviks head-on.\n\nResidents and guests of the city welcomed the parade with applause and flowers. At the end of the parade, our most prominent Ataman Kozitsyn delivered a speech about the importance of the Cossacks for Donbass."
 gir.20.a:0 "Saryn na kichku!"
 
 gir.21.t:0 "Heirs to the Legacy"
 gir.21.d:0 "Once upon a time, back in 1920, the Russian Civil War was coming to an end. The White Army sailed from Crimea to Gallipoli, and the Siberian troops were defeated, marking the end of the struggle for the Russian Far East. We had nothing left — no country, no idea, no faith in the future of Russia.\n\nIn emigration, we were divided by our views, split between the supporters of Wrangel and those of Denikin. But after years of exile across the world, we grew stronger — stronger in spirit, stronger in faith, stronger in the belief in our great country.\n\nAfter the collapse of the USSR, there were no direct participants of the war left, but there was a generation raised on the idea of a great Russia and the restoration of order in the country. It was our chance, but we missed it. Yeltsin came to power and then Putin, an old KGB moron.\n\nBut now our hour has come. The moment has arrived when we will show ourselves. The White Guards will return to Russia from Malorossiya under Girkin.\n\nWe will not miss this chance. We will fight to the end, on the plains of central Russia, in the forests of Siberia, in the mountains of the Urals, on the Black Sea, and across the oceans, until we reclaim our country.\n\nLong live Russia..."
 gir.21.a:0 "...great, united, and indivisible!"
 
 gir.22.t:0 "Russian Orthodox Church Abroad"
 gir.22.d:0 "The Russian Orthodox Church Abroad was founded in 1920 by laypeople and clergy who had been forced to flee Russia; most of them never saw their homeland again. Attempts by the leadership of the Russian Orthodox Church Outside Russia (ROCOR) to unite the Russian diaspora, with the exception of the North American Metropolis’s membership of ROCOR between 1935 and 1946, were unsuccessful.\nUnfortunately, in the 1940s, a significant number of ROCOR parishes transferred to the Moscow Patriarchate. The church that was established, however, inspired hope and continued the long-standing tradition of Russian Orthodoxy. It was precisely these traditions and the righteous power of our true Orthodox faith that the Bolsheviks feared, having subsequently established their own church. The deceitful Moscow Patriarchate was organised by the KGB, and it was not clergy who served there, but servants of a vile regime. Propagandists in the USSR, aware of their own deceitfulness, spent years slinging mud at our faith, defiling it. The Church Abroad was declared a monarchist and counter-revolutionary religious organisation.\n\nHowever, our spirit cannot be broken; our faith is as true as the Lord’s scriptures. Although a certain formal thaw occurred in the 2000s, worship in churches abroad that are not subordinate to the KGB-controlled church continues to this day.\n\nBut perhaps the devil’s glacier that has engulfed Mother Russia, the Orthodox Church, will melt once more, and the rays of a new national dawn will melt the adversary... And the Russian people will be free. Until that time, the Russian Orthodox Church Abroad will remain faithful to its traditions and prepare to pass them on to the next generation."
 gir.22.a:0 "Slava Rossiya! Slava Jesus!"
 
 gir.23.t:0 "Holy Meeting"
 gir.23.d:0 "Ilarion was sitting on the terrace of his house, sipping his Americano and reading his daily independent newspaper, 'New Russian Word', which operates to this day. He took a sip and spat it all over the newspaper as it claimed the revival of the All-Russian Government.\n\nThen the phone in the kitchen rang. He ran to it, catching his breath, and asked:\n"Who?"\n"Ilarion, it’s Girkin. We need a faithful and uncorrupt church here in Donetsk."\n\nIlarion asked no further questions. Without hesitation, he packed his belongings into an old, ripped travel bag with the word 'RUSSIA' written on it and flew to Donetsk.\n\nAfter a few hours in the air, the runway of the abandoned Donetsk airport was about to receive its first guest in six years. Girkin hurried toward Ilarion’s private jet, shook his hand, and greeted him with joy:\n"It’s nice to see a truly independent metropolitan in this corrupt world."\n"It’s nice to see you too, Girkin" Ilarion replied with an American smile. "I’m surprised by the condition of the airport. I never thought it could still serve people."\n"Well, that’s what we have for now. Anyway, back to what this trip was intended for."\n\nGirkin then escorted Ilarion to his car. He showed him around Donetsk, and then they drove to the Regional Administration building, where the All-Russian Congress was based. Girkin introduced Ilarion to its members. They all sat around the table.\n\nGirkin handed him a document and a pen. Everyone waited for Ilarion’s signature, but it didn’t take long for him to decide. Everyone in the building cheered; the joy knew no bounds!\n\nROCOR was finally in a place it could call home — Russian Donetsk."
 gir.23.a:0 "For Russia, for the Faith!"
 
 gir.24.t:0 "First Session"
 gir.24.d:0 "Today has come the significant day that will mark the beginning of a new philosophy of the Russian World and a rethinking of our greatness.\n\nLong ago, during the Russian Turmoil, all parties were supposed to convene the Constituent Assembly democratically and decide the future structure of the Russian state. However, it was dispersed by the Bolsheviks.\nEven before that, 'Zemsky Sobor' existed — an early prototype of parliament, which, during the Time of Troubles, gathered clergy, nobility, and commoners to elect a new Tsar in 1613.\n\nNow, when we are once again on the threshold of a new beginning, we must gather different sides, interests, and ideological currents. This time, no one will stop us.\n\nToday was the first session of the All-Russian Monarchist Congress.\nThe сongress began in a special building in the capital. Politicians arrived one by one: some in modest cars, others by taxi or limousine together with their party members.\nGirkin and his supporters, however, stood out the most. They arrived in armored foreign vehicles, and their appearance was strikingly different. Girkin wore an old officer’s uniform adorned with decorative elements, several orders, and a cap with a gilded cockade. His men were dressed in replicas of the attire worn by state councillors and officials of the Russian Empire, emphasizing his status.\nYet he had gathered everyone here not only to demonstrate his authority, but also to listen to others.\n\nThe meeting was held in a large hall reminiscent of a courtroom, but filled with Romanov symbols, Russian flags, and coats of arms from different eras. Girkin opened the congress with a welcoming speech, after which he asked everyone present to introduce themselves.\nVarious personalities who have gained popularity or influence in right-wing circles, such as Prosvirnin, Malofeev, Bykov, Rogozin, and many others, were present.\n\nMany of us have our own individual vision of Russia — some want to continue Stolypin’s work, some want to see a constitutional monarchy, and some insist on the full restoration of autocracy. A significant part of the division also lies in the question of who would take the Tsar’s throne.\nThere are two main support groups: the 'Kirillovichi', who also call themselves Legitimists, and supporters of Romanov Family Association, who deny the exclusive claims of the Legitimists to the throne and instead advocate for the election of a more suitable monarch, such as Rostislav Romanov, in a manner reminiscent of the Zemsky Sobor. Of course, there are also other pretenders, such as the Leiningens, Hohenzollerns, and Karađorđević. There were even those who wanted to proclaim Colonel Girkin Tsar, or even themselves!\n\nHowever, we are all united in one thing: the desire to see Russia free from neo-Bolshevism and former security officers at its head. Today’s Russia is not the Russia our people deserve, and not the Russia for which Russian officers died in the Ice Campaign. We are going back."
 gir.24.a:0 "God Save our Motherland!"
 
 gir.25.t:0 "Beating the Reds Once Again"
 gir.25.d:0 "It was an ordinary day in Donetsk. An old woman was walking across Lenin Square to buy herself some food when she suddenly witnessed a horrifying sight.\n\nSeveral construction workers and a mobile crane stood near the Lenin statue. The crane was already lifting the monument from its pedestal. The old woman clutched her chest in fear and shock.\n\n"What are you doing?!" she cried.\n\nThe foreman replied, "We’re removing the Bolshevik legacy. Can’t you see? The chief ordered us to get rid of all this communist shit."\n\nThe crane operator was not very careful, and accidentally dropped Lenin while lifting him. The statue hit the ground and shattered into many pieces.\n\nThe old woman could not believe her eyes. She remembered the time when Lenin statues were being torn down across Ukraine by fascist banderites, and now it was happening here as well.\n\nShe collapsed onto the pavement, unable to comprehend the events unfolding in the new Novorossiya."
 gir.25.a:0 "Off with communism!"
 
 gir.26.t:0 "Grand Girkin Speech"
 gir.26.d:0 "This day is going to become a historical highlight in the calendar of each and every resident of our monarchist Novorossian state. Today, on the street of the Zapoviti of Illich, Girkin, who is standing with his $2000 jacket, on the balcony of the Donetsk administrative building where he will be giving a historical and enormously imporant speech which will put to an end the months of disputes beetwen fractions in the congress. A whole mob of people are crowding and keeping their eyes peeled for this moment.  And so, the renowned and influential player in this scenario, Igor Girkin, emerged onto the high balcony of the building. The enormous crowd fell silent immediately, anticipating his words. With a measured gesture, he raised his hand, surveying the masses that had gathered around.\n\nAs the microphone began to transmit, Girkin commenced his address. His words, like thunder, reverberated through the crowd, and his voice echoed in the vast space in front of the congress building. He declared that this was the final session of the congress and that, ultimately, they would overcome the last obstacles on the path to restoring the monarchical order. According to Girkin, the choice of the monarch would determine the definitive course of this new era. The crowd responded with loud applause, cries of support, and ignited fireworks that illuminated the sky with vibrant lights.\n\nAfter concluding his speech, Igor Girkin retreated back into the congress building, while the crowd continued its subdued euphoria for a long time, filled with hopes for a new era of monarchy."
 gir.26.a:0 "Ok."
 
 gir.27.t:0 "The Unfulfilled Dream of Novorossiya"
 gir.27.d:0 "Novorossiya, as a project of Catherine II, was an integral part of the Russian Empire’s new eastern territories, serving as both a breadbasket and a beacon of common sense. Before the Russians arrived, there was nothing in the Novorossiya region—no cities, no schools. What those pot-headed fools are now writing about "unbreakable and independent cities" were actually built and designed by Potemkin, not by some Shevchenko or that Jew Zelensky. What those fools call 'Mykolaiv' and 'Odesa' would not have been possible without the Russian Mykolaiv or Odesa. \n\nAfter the collapse of Russia into non-sovereign states that continue to exist—such as Ukraine, a descendant of the German-backed UNR project—the situation speaks for itself: a once-prosperous region has been turned into a dump—marked by widespread illiteracy, the populist rhetoric of “indomitable spirit,” and pervasive poverty. The worst part is that the people living there are thoroughly fed up with all of this and are waiting for us to liberate them from the village hooligans.\n\nThat is why we have decided to invade the western 'chunks' of Ukraine to restore a healthy Russian order, where, instead of Russophobic hicks and ruins, there will be wealthy, honorable Russian aristocrats, and where there will be no place for the village folk’s intolerance toward the great peoples of Russia.  So that instead of gay pride parades, there will be parades celebrating victory over fascism! The Vyshyvata is trembling, because they know the truth is on our side! We’ll send our best!"
 gir.27.a:0 "Glory to Novorossiya!"
 
 gir.28.t:0 "Choosing All-Russian Emperor"
 gir.28.d:0 "Igor Vladimirovich Girkin sat in the middle of a crowded hall, at a long table. He thought about how long he had dreamed of this moment, how he had predicted it, how he, the hero of the Russian people, would finally restore the legitimate monarchical government to Russia.\n\nBut he could not even imagine how disappointed he would be with the realization of this dream. Turning away from his thoughts, he returned to the dispute, which had been going on for more than thirty minutes, instead of the civilized and quick process he had imagined.\n\nIt was a complete mess.\n\nEverything started off wonderfully, until the moment when Girkin had the misfortune to raise question - who exactly would be crowned Emperor of All Russia. \nOne faction immediately began to campaign for Maria Vladimirovna Romanova as one of the main candidates for the leadership of the dynasty. Immediately after that, the second faction pointed out that their legitimacy was questionable, since Kirill Romanov, from whom their branch descended, had significantly fewer rights to the throne, even though he was the first to proclaim himself the next emperor. Instead, they proposed Rostislav Rostislavovich Romanov from the Dmitrievich branch as the most legitimate candidate. In response to the logical point that Rostislav is not even the head of this branch, representatives of the second faction noted that there are elders ahead of him, so there would be no problem in letting him go ahead, because it is "a matter of 5-10 years before he heads his branch."\n\nGirkin is not sure what happened next, because they went from a civilized discussion to shouting "We don't need a liberal like Rostislav" and "We don't need a woman on the throne; if we are considering their branch, then let Georgy Mikhailovich take the throne."\n\nBut now, realizing the absurdity of the situation, he slammed his fist on the table.\n"ENOUGH! Stop this discord, I understand that you will never agree to a candidate other than the one you support, but understand that we now have a chance to lose everything if we don't agree." - Girkin shouted, then, rubbing his eyes, said - "That's why we have to choose a candidate."\n\n"But," - someone in the corner of the room remarked, - "these idiots don't want to compromise!"\n\nAfter that, completely disappointed in this congress, Girkin realized that he had no time for this nonsense... And if neither side agreed on a candidate, then he would choose one himself. And that candidate would be..."
 gir.28.a:0 "What a choice."
 
 gir.29.t:0 "Maria Romanova"
 gir.29.d:0 "Maria Vladimirovna Romanova is one of the main contenders for the Russian imperial throne. She was born in Madrid in 1953 and is the daughter of the de jure Emperor Vladimir III, i.e. the grandson of Grand Duke Kirill himself. She has already accepted the imperial title while in exile and has a broad base of loyalists who refer to her as Maria I.\n\nShe was educated at Oxford University and fully embraced the ideas of the Great Russian Empire from her grandfather and father, her vision of Russia as an absolutist power with full adherence to the traditions of the Kerensky government that burned in the fire of 1917. She has already promised to restore the nobility and the Cossacks and to completely rebuild Russian structures along pre-revolutionary lines, getting rid of the slightest manifestations of liberalism and Soviet structures.\n\nShe has a dynastic marriage with Prince Franz Wilhelm of Prussia (in Orthodoxy he was Grand Duke Mikhail Pavlovich), and many prominent aristocrats and nobles attended the wedding, including Bulgarian Tsar Simeon. Maria Vladimirovna is a descendant of Queen Victoria of Great Britain through her grandmother, Victoria Melita. Many of these connections can help us restore diplomatic relations and strengthen international opinion about Russia."
 gir.29.a:0 "Cool."
 
 gir.30.t:0 "Rostislav Romanov"
 gir.30.d:0 "Our one of the main contenders for the throne is Rostislav Romanov. Young and full of vigour to rule the country as a monarch. He is considered by many to be the best choice of those left and that he should be the one to lead the Great Unified and Indivisible Russia.\n\nRostislav Rostislavovich belongs to the Mikhailovsky branch, the male line of succession to the throne of Nicholas II's youngest son, Mikhail Mikhailovich.\n\nAlthough he was born in the United States, Illinois, he was baptised, as it should be, in Orthodoxy. But during his education in Western schools and colleges he was imbued with the more liberal and democratic ideas of a progressive monarchy.He is married to Fotinia Georgievna and has a male heir, whom he has decided to name Rostislav.\n\nHe is also in line for the throne of England as he is a distant ancestor of Sophia of Hanover. This makes him better known in the eyes of the Western community and more legitimate. He is also the only one of the House of Romanoff to visit Russia. \n\nHe is young, energetic, and full of vigour to reign in Russia. A true Russian patriot and a worthy Tsar."
 gir.30.a:0 "Cool."
 
 gir.31.t:0 "The Choice"
 gir.31.d:0 "In the grand assembly hall of the monarchical congress, dignitaries, nobles, olighars and representatives from across Russia gathered to deliberate upon a momentous decision – the selection of a new monarch. The air was thick with anticipation as the fate of the crown hung in the balance. Two prominent contenders emerged, each with their own claim to the storied throne – Rostislav Romanov and Mariya Romanova.\n\nRostislav, a distinguished member of the Romanov dynasty, carried himself with the regal air that bespoke his royal lineage. Known for his charisma and diplomatic acumen, he had earned the support of many who believed in a return to the traditions of old. His vision for a revitalized monarchy resonated with those who longed for the stability and grandeur of the past.\n\nOn the other side of the debate stood Mariya, a descendant of the Romanova family. Her proponents argued for a fresh perspective and a break from the constraints of historical precedent. Mariya was seen as a symbol of modernity, advocating for reforms that would align Russia with the evolving global landscape. Her progressive ideas appealed to those who sought a monarchy in step with the times.\n\nIn the final moments of the congress, as the votes were cast and tallied, the air hung heavy with anticipation. The decision, fraught with significance, would shape the course of Russia's history. The announcement of the chosen monarch, whether Rostislav or Mariya, would usher in a new chapter for the nation, blending the echoes of the past with the promises of the future."
 gir.31.a:0 "Ok."
 
 gir.32.t:0 "The Grand Coronation of Emperor Rostislav Romanov"
 gir.32.d:0 "In a grand ceremony held in the historic city centre of Donetsk, a wave of anticipation and excitement swept through the nation as Rostislav Romanov prepared to ascend to the throne as the All-Russian Emperor. The coronation, a symbol of continuity and tradition, was meticulously planned to showcase the unity and strength of the Russian people.\n\nThe coronation regalia, steeped in history, was brought out for the occasion. Rostislav Romanov was adorned with the Imperial Crown, an intricate masterpiece embedded with precious gems symbolizing the unity of the Russian lands. He also received the Imperial Scepter and Orb, representing authority and the sovereign's commitment to justice.\n\n"Glory to the Emperor!" was heard all over the hall once Rostislav Romanov in a symbolic fashio, took the crown and coronated himself."
 gir.32.a:0 "Ok."
 
 gir.33.t:0 "Emperor’s Manifesto"
 gir.33.d:0 "High Manifesto\n\nBY THE GOD'S GRACE\nUS, ROSTISLAV 1st,\nEMPEROR AND AUTOCRAT OF ALL THE RUSSIAS,\nTSAR OF LITTLE RUSSIA, KING OF GALICIA,\nETC, ETC, ETC.\n\nDeclare to all of Our faithful subjects\n\n'Since 1917, when my ancestor, His Highness the Tsar Nicholas Akeksandrovich Romanov, has abdicated from His throne, world has changed plentiful. I, Rostislav Rostislavovich Romanov, have claimed what was lost many years ago, and ascended as the Emperor of Russia, by the will of My advisor Igor Ivanovich Girkin, in hopes of restoring Tsardom of Russia in full.\nHowever, my views and views of those, who put me in charge, are different. Here, I have managed to create a realm of equals, be it Russians, Ukrainians or any other nation, which lives on the territory I have under my control, with freedom and liberty in rights and opinions. I have commited Myself to give My people the peaceful life, after what was done after the Fire of Poltava turmoil. \nThe government of the Russian Federation is not willing to recognize My legitimacy as a rightful ruler of Russia. Therefore, I drop my claims on the territories, recognized by the international law as the territories of the Russian Federation, for the sake of peace and peaceful coexistence of our people.\nGod, let us hope for the better.'\n\nOn the original by His Own Emperor's Majesty written by hand:"
 gir.33.a:0 "'R O S T I S L A V'"
 
 gir.34.t:0 "Heating events in Donetsk."
 gir.34.d:0 "In the very epicenter of a new political formation on the ruins of Ukraine, opposing forces collide, again, not with fire and sword, but with pen and word. Igor Girkin, the Prime Minister of the Russian Empire, has already repeatedly in closed meetings, and sometimes in interviews, personally condemned the new emperor for, as he put it, “Anglo-Saxon opportunism,” which discredits the honor of a real Russian man. In Girkin’s vision, Russia should stand firmly on the stilts of traditional bonds, and not under the influence of the corrupting West, which is corrupting the pristine Russian culture with its excessive freethinking. As Girkin has stated more than once, “A Russian person is one who is unconditionally loyal to his homeland and his sovereign, because the power of the sovereign-emperor is from God, and a real sovereign should not waste his great gift on some absurd measures.” Based on this and on the convictions of the Triune Russian People, Girkin argues that it cannot be allowed that the hand that contributed to the creation of Operation Unthinkable, the Dallas Plan and, finally, the establishment of the Kyiv Junta, further desecrated the Orthodox land of the Russian people . Girkin, a prominent representative of Russian autocracy and conservatism, who grew up on the soil of traditions and reverence for the heritage of the White Guard, obviously sees in Emperor Rostislav I a man cut off from his historical homeland and, as a result of insidious Anglo-Saxon propaganda, who believed in the influence of destructive forces. Rostislav’s desire for Western-style liberal democratic ideas causes indignation and, for now, secret confrontation in Girkin’s camp, where his allied forces begin to build their political line with enviable despair, opposing any liberal law. There has already been a lot of controversy about this. In these undercover games, as if in a kaleidoscope, supporters roll from one camp to another.\nThis is due to the fact that many of Girkin’s supporters are also monarchists, and in their eyes the authority of the tsar is also great. Girkin, devoted to his ideals and beliefs, feels the bitterness of betrayal, seeing how the new emperor prefers what he hated all his life. For him, this is simply nonsense, as for most of the government. And at this time, the young Emperor of All Russia Rostislav I, filled with the desire to change and, ultimately, reform the country globally, runs into his inexperience in governance and the secret resistance of his closest advisers, including Girkin, which almost completely nullifies any attempts at reform. The consequence of this Cold War was a virtual political split in the Imperial Party. The two factions tirelessly fight each other, accusing their opponents of almost all mortal sins in the newspapers. How this struggle will end is still unknown, but according to Western analysts, such a split was expected, so we should expect some loss of political power and prestige within the country of the ruling party, at a minimum, and at a maximum, a civil war. But Western experts doubt its beginning, because all parties to the conflict support monarchical ideas to one degree or another."
 gir.34.a:0 "The General must cool the young man’s ardor."
 
 gir.35.t:0 "Dismissal of Girkin as Prime-minister"
 gir.35.d:0 "Tsar Rostislav paced back and forth in his opulent office in Donetsk, the weight of the decision he was about to make etched across his stern face. He had called upon Girkin, a man known for his political disputes wiith Rostislav and strategic thought how to put him out, to deliver news that would change the course of Girkin's career.\n\nAs Girkin entered, Rostislav's eyes narrowed, and a sardonic smile played on his lips. "Girkin," he barked, "your political games have proven inadequate for the challenges we face. I've called you here to inform you of your new role. You are now going to be a Chief Commander. Since you were always trying to put me out from the shit i do daily for the country.  - Rostislav's eyes flashed with disdain. "Consider it a lesson in humility, Girkin. The empire needs a leader who can adapt, not one stuck in the quagmire of political intrigue."\n\nGirkin, along with suprise and disdain, tried to back up -  "Your majesty, I am a man who has to deal with internal problems and with the external ones at the moment" Rostislav looked up from the documents and looked Girkin straight in the eyes and said: "This is an order, you will argue one more time and we will turn you away and beat the shit out of you!"\n\nAs Girkin left the room, the weight of his new role bore down on him, accompanied by the echo of the Emperor's biting words. The transition from Prime Minister to High Military Commander felt like a public stripping of his former status, a humiliating fall from grace orchestrated by a ruler determined to reshape the empire with an iron fist."
 gir.35.a:0 "No more Denikinism."
 
 gir.36.t:0 "Girkin Rules Supreme"
 gir.36.d:0 "Russian tsars have always been unstable. Almost all tsars were Germans, Danes, French, but definitely not Russians! Always showed oddities, the same Rasputin came close to the family of our ruler.\n\nAnd so, after returning home, it was to be expected that our ruler stupefied by Western ideas and propaganda would try to weaken our country.\n\nToday, detachments of the Tsar's loyalists and his personal guards attempted to disarm the garrisons in Petrograd and Moscow. But our brave Field Marshal Girkin sent military police troops in time and those who remained loyal to their oaths to our country and not to the Tsar personally were able to defeat the forces of traitors in the streets of the cities! A column of tanks entered the courtyard of the ruler's palace and special forces disarmed his guards.\n\nThe military field court right in the courtyard of the palace of the tsar sentenced him to house arrest, also he must hand over most of his powers to a true patriot, who went through fire and water for the sake of our empire, Igor Girkin is now the de facto ruler of Russia."
 gir.36.a:0 "Long life to the Russian officer!"
 
 gir.37.t:0 "Sending an Imperial Delegation to UN"
 gir.37.d:0 "In the grand halls of the royal palace, Monarch Rostislav of the newly formed Novorossiya faced a critical juncture in his reign. To assert his legitimacy and commitment to democratic principles, Rostislav decided to send a delegation to the United Nations. His mission was clear: to convince the international community that Novorossiya was a beacon of democracy, free from imperialistic ideals.\n\nRostislav, accompanied by his delegation, stands nervously in front of the imposing UN doors. Sweat beads on his forehead as he contemplates the weight of the discussions ahead, feeling a mix of anticipation and anxiety about the diplomatic challenges that lie behind those doors.\n\nAlthough, their presentation at the UN was a meticulous blend of historical context, highlighting Novorossiya's recent shift from a monarchy to a constitutional monarchy. Rostislav, in a heartfelt letter to the UN General Assembly, expressed his dedication to democratic principles, the protection of human rights, and the pursuit of international cooperation. Rostislav at the end of his mission of convicing he has added "Our country is totally not artificial, please recognize us!""
 gir.37.a:0 "Good Luck."
 
 gir.39.t:0 "UN Chair"
 gir.39.d:0 "Good afternoon, ladies and gentlemen, this is Washington News. Today, a strange situation has occurred, officially it has been reported that the Empire of Rus is recognized as a descendant of Ukraine, which will give it a seat at the UN headquarters.\nAfter the coronation of Rostislav Romanov as Emperor of Ukrainians and Russians, his government sent a plea to recognize the Empire of Rus as a descendant of Ukraine. Due to the fact that his country was the last one to unite Ukraine after the events of the Fire of Poltava, some world leaders officially recognized him, which even led to an official vote at the UN on the topic of recognizing the Empire of Rus as a descendant of Ukraine. As a result of the positive vote, as well as due to bureaucratic norms, the Empire also received a UN seat for Ukraine.\nAfter that, the Empire's diplomats planned to hold a speech to thank the Emperor for the recognition, but they got into a confrontation with Russian Ambassador Lavrov:\n"What the fuck is this? Your "emperor" is not a legitimate descendant of the Romanovs! Moreover, you are claiming the entire territory of the Russian Federation by his title alone! What does "Emperor of the All-Ukrainian and All-Russian" mean?!\nWe will not tolerate the desecration of the Emperor's personality, and therefore we are leaving the voting hall.\nWhat this means for the world and how it will affect geopolitics is on our program today! And now - a commercial break. "
 gir.39.a:0 "What the..?"
 
 gir.40.t:0 "First Elections!"
 gir.40.d:0 "The moment has come when the empire must change in order to preserve its future. Emperor Rostislav, based on the ideas of modernization and the desire for harmony between the people and the government, announced his new course - the course of parliamentarism. This decision was unprecedented for an empire that had long relied on authoritarianism and control over every aspect of public life. But Rostislav, surrounded by both his own convictions and pressure from Western liberal friends, decided to lead the empire on a new path.\n\nThe emperor's plan is to create a Supreme Duma — a representative body that will ensure dialogue between the government and society. This decision marks the beginning of the end of the era of absolute monarchy and the opening of new horizons for political life in the country."
 gir.40.a:0 "Again, the deputies?"
 
 gir.41.t:0 "Liberalization"
 gir.41.d:0 "The announcement of the new policy sparked heated discussions across the country. For many, it became a symbol of a new era — an era where the people will be able not only to speak, but also to actually influence decisions affecting the life and fate of the empire. Youth and progressive forces supported Rostislav's initiative, seeing in it the end of a long tyranny and the beginning of a just society.\n\nOne of the most important reforms was the introduction of freedom of speech and protection of civil rights. People could now openly discuss politics, criticize the government, and express their opinions without fear of reprisals. Newspapers and magazines began to be published with less restrictions, new public debates and political gatherings appeared, which became open to all. Bloggers and influencers who were held under arrest were released."
 gir.41.a:0 "Glory to the Tsar!"
 
 gir.42.t:0 "The First Meeting of Verkhovna Duma"
 gir.42.d:0 "On that clear day, when the sun was shining on golden Kyiv, the new political face of the revived Empire of Rus` gathered in the ancient hall of the former imperial residence. It was a moment they had been waiting for for many months. The people of Ukraine, once subdued and crushed, now looked at this hall with anxious impatience. The Supreme Duma, which they tried to build as a symbol of the new order, met today for the first time.\n\nIn the huge hall of Kyiv, now the capital of the empire, sat various factions, each of which had its own vision of the future. This meeting resembled not only a new page in history, but also an arena of the battle of ideas, where the tension and the promise of change were felt. In the center of everything is Emperor Rostislav, who watched from the balcony, like a stern monarch, but with eyes in which a cunning mixture of hope and anxiety hid.\n\nEmperor Rostislav, who started these reforms with the hope of changing the empire for the better, sat on the balcony and watched every movement. Ihor Girkin, who until recently had been enormously influential, was now stripped of many positions and sat in the far corner of the press room, almost invisible, but his gaze was saddened by how far this empire had gone from his conception."
 gir.42.a:0 "Let's see what will come of it."
 
 gir.43.t:0 "Liberal Empire"
 gir.43.d:0 "Tsar Rostislav stood before the people against the background of the ancient golden domes of Kyiv. Now, when the Empire of Rus` strengthened in the conquered territories of Ukraine, it was time, as he believed, to bring a "revived" imperial future to these lands - but not in the form that many expected. Rostislav, known for his determination, decided to propose a radically new way for the new Empire of Rus: a liberal imperial project based on the idea of ​​combining strong power with some elements of freedom, which should become a pillar in the regions of Ukraine.\n\nHe spoke before a huge crowd, his words echoed in the historical heart of Ukraine:\n\n"Here, on the lands of Malorossiya, where our history is intertwined with the great Russian culture, I announce the beginning of a new era. An era where the Empire of Rus will become not only a symbol of strength, but also of greatness of spirit. The time has come for changes that will give new meaning to our state. It's time to build an Empire that will be based on tradition, but with an open face towards peace and freedom!""
 gir.43.a:0 "Glory to the Tsar!"
 
 gir.44.t:0 "The Most Important Student"
 gir.44.d:0 "Tsar Rostislav was sitting at a large oak table in his office, habitually sorting through papers related to the affairs of the empire. It was evening outside the window, and shadows covered the streets. One thought has been bothering him for a long time: how to understand these Ukrainians? No matter how much he promoted his policy on their land, no matter how much he talked about the "great united empire", something eluded him. Everything seemed artificial, imposed. He knew that in order to truly win their hearts, it is necessary to understand more than dry reports of generals. The decision came unexpectedly. One evening, sitting alone, he caught himself thinking that he doesn't even know how the Ukrainian language sounds. "It's time to fix it," he thought. A few days later, a young man quietly entered his office. It was a tutor - a former ordinary teacher from a local school, who was found in a hurry. Modest, clearly nervous, but with the appearance of a man ready to do his job.\n\n"Good evening, Your majesty," the teacher began embarrassedly, stopping at the door.\n"Sit down," said Rostislav briefly, pointing to the chair opposite.\nThe teacher sat down, looking nervously. In front of him sat not just a man - in front of him was an emperor, who was given control over the land, where they speak his own language. The teacher could not understand why the king decided to learn Ukrainian. What is this for? But behind these thoughts was anxiety - what would happen if he said something wrong?\n"Let's start," said Rostislav, "teach me at least a few words." Something simple.\nThe teacher opened the notebook and, trying to remain calm, began:\n"Let's start with the word "Pryvit". This means..."\n"Hello," repeated the tsar, slightly twisting his mouth, as if it were something foreign to him.\nBut then his eyes suddenly flashed with interest.\n"And how will it be... "freedom"?"\n"Volya," answered the teacher cautiously.\n\nRostislav thought for a moment. He knew that language was the key to many things, but in fact, it was important for him to understand how these people think. What are they after? Why do they so persistently cling to their identity? He could not ignore this question.\n"Tell me honestly," he said suddenly, looking straight at the teacher. — What do Ukrainians need? Why are they so stubborn?\nThe teacher sighed. This was an unexpectedly direct and dangerous confession for him. But he felt that the Tsar really wanted to hear an answer. And after a short silence he decided:\n"Your majesty... They want respect." It is important for them that they are not just listened to, but understood. Language is part of their soul.\n"Respect," repeated Rostislav, thinking about how often the empire humiliated and oppressed this people. This word hit him harder than he expected.\n"Go on," he said quietly."
 gir.44.a:0 "What's on the Tsar's mind?"
 
 gir.45.t:0 "Unity of Ukraine"
 gir.45.d:0 "The parade began on Kyiv's Independence Square. First, joint motorized regiments marched. They were followed by motorized infantry divisions with banners. The banners depicted the flag of the Empire of Rus, as well as the flags of the divisions. At this time, the crowd near the central square was closely watching the parade and shouting with pleasure, waving their flags.\nVarious generals were sitting behind the rostrum, as well as Emperor Rostislav himself, of course, on a separate balcony, under good security. After the divisions marched, a military band played the anthem of the Empire.\n\nAfter that, Colonel Igor Girkin approached the stand with a microphone. With obvious awkwardness and dissatisfaction, he began his speech in Ukrainian:\n\n"Dia... Dear friends. I am happi to announce that it is only thanks to you, Ukrainians, that we were abel... were able to unite our Great Empire. Our great comonwelth... commonwealth of the Ukrainian and Rusian nations. Only yor dedication, loyalty to the crown and assistance allowed us to achive what we have now." - One could feel Girkin's tone losing more and more life with every word he spoke\n\n"Without you, our great Empa... Empire would not exist, and if it were not for Ukrainians, the Rushian... the Russians of Donetsk and Luhansk would have remained in Donbas. And under mai... my command, we were able to unite our glorius... glorous... gloriaus... glorios... fuck, glorious Empire of Rus" - after these words there was a long pause, while one could hear a nervous, flipping of papers with the text of the speech.\n\n"Over the years, the Ukrainian people have suffered a lot. Because of the Donbass war started by... the mongrels of Putin... ahem, because of the events of the Fire in Poltava, because of the oppression of Ukrains... Ukrainians after the loss of the Armed Forces in the war with Novorossiya... But now it is in the past. A glorious future awaits us, as it does for fraternal peoples." - After finishing his speech, Girkin quickly went downstairs, red as a tomato with rage, recalling all the Russian swear words he knew."
 gir.45.a:0 "For the Tsar and his People!"
 
 gir.46.t:0 "Victory of Humanism. Emperor Rostislav I Rebuilt the New Ukraine."
 gir.46.d:0 "According to the majority of the inhabitants of the empire, one of the great and turning points occurred when Emperor Rostislav I, having ascended the throne, carried out a series of reforms according to the Western model, but of course everything was not immediately good and it took him a lot of time, but it was definitely worth it. The Empire of Rus' has such a neutral name that it quite well describes the current territory of the former Ukraine. Having put an end to the consequences of the outrageous rule of Igor Girkin in his opinion, he calls on his people to consolidate around new progressive and certainly better traditions. For him, autocracy is not an end in itself, but only a tool to build a better world. Having consolidated the reformist forces around himself, Rostislav was able to push aside Girkin and his clique, but fearing the outbreak of a potential civil war, he made some concessions. Igor Girkin became the Supreme Commander-in-Chief of the Armed Forces, maintaining his very large authority in the army but finally losing his position in the political sphere. Many of his henchmen also decided to retreat until they completely lost everything they could get during their career. Emperor Rostislav I, as he is also called the architect of the new Russian era, the Russian enlightened renaissance in Western countries, officially restored the unity of the former\n\nUkraine, which had now become an integral part of his empire. Moreover, through diplomatic efforts he achieved that his empire was allowed into the UN as the official successor of Ukraine. As Rostislav said: “I am very pleased to see my country already renewed when children of Russian, Ukrainian or other origin can calmly play together without any prejudices. The unity of peoples in such a large empire is a priority task, because in unity there is strength. These same children will build our future and what will our future be like if we set them against each other?” Imbued with the ideas of Western liberalism, Rostislav realized his dream. And Girkin refuses to comment on the current state of affairs in the empire. According to one of the resolutions, the Ukrainian language acquired equal status to Russian, and the general pluralism of opinions and freedom of speech increased. The conservative Girkin is extremely dissatisfied with the state of affairs, but all he can do is take on the guise of a valiant defender of the homeland, at least for the time being... Also, on the instructions of the emperor, the unification of the Armed Forces was carried out. An important step towards this unification was the inclusion of Cossack regiments in the general structure of the Armed Forces. Some Cossacks were integrated into the state apparatus and some into various military units. Atamans and field commanders who did not renounce extreme chauvinistic views were voluntarily forced into retirement, making way for younger and more promising military personnel."
 gir.46.a:0 "Glory to the Tsar!"
 
 gir.47.t:0 "Incident at the Imperial Palace"
 gir.47.d:0 "The internal, behind-the-scenes struggle for influence and power in the empire reached its climax when Igor Girkin, a strategist and experienced political manager, began to oust, under various pretexts, officials who held extreme royalist, monarchist views. He especially paid attention to provincial administrations and city government administrations. Like a born virtuoso and actor, he “juggled” the criminal cases of different people, choosing the most advantageous moment for himself to remove an unlucky competitor. By subordinating most of the civil power to his influence, he ensured himself complete freedom of action because the majority of the military was on his side. And against those who are not loyal, you can always fabricate a criminal case or an accident will happen to them. A significant moment was when the emperor reviewed his imperial life guards and when he said, “At ease! You can go to your barracks!” The soldiers didn’t even move, but after Girkin repeated the order, they immediately carried it out, after which he laughed and patted Rostislav on the shoulder, saying: “Your Imperial Majesty, apparently you need to go out more often and walk around the yard, otherwise people will forget who rules them.” Girkin, of course, reduced everything to a joke, but the hint in this event was crystal clear. Despite his status as a symbol of the empire, Rostislav was never able to acquire the necessary skills to manage his own state, remaining absolutely helpless in front of the cunning fox Girkin. After several weeks of this event, Girkin, as if by chance, suggested that Rostislav transfer to him some of the bureaucratic duties that Rostislav had previously performed.\nRostislav at first resisted you, but after several veiled threats he still gave in, which Girkin took advantage of. And there was no need to carry out any masterly manipulations, because Igor Girkin took advantage of Rostislav’s elementary ignorance and gullibility. After which Girkin gradually transferred more and more responsibilities to himself, rising in his dominance over any courtiers. The inexperienced emperor agreed to transfer powers, sometimes under pressure, sometimes under the pressure of facts, not suspecting that these “boring”, “everyday”, “non-obligatory” powers have a key influence on state affairs and on the state itself as a whole. Under pressure from Girkin, Rostislav shifts more and more responsibilities to him, remaining in fact only a symbol of the empire without real power. Monarchists in the state apparatus do not suspect that their beloved All-Russian Monarch is no longer fully able to govern the country. Girkin masterfully disguised his real capabilities behind tons of bureaucratic acts, resolutions, orders, charters, exposing to the public the “active” activities of the emperor. In propaganda, he presents himself as the ideological inspirer of the emperor, without whom the state could not function normally. Although rumors about the “gray cardinal” are spreading throughout the courtyard, Girkin diligently suppresses them, considering it unacceptable for such rumors to exist, based on the Russian proverb..."
 gir.47.a:0 "“The less you know, the better you sleep.”"
 
 gir.48.t:0 "The Collegium Meeting"
 gir.48.d:0 "In a dark, sumptuously decorated hall, lit only by dim candles and the dim light of ancient lamps, the key figures of the Empire were gathered. At the massive oak table sat Igor Girkin and other key figures of the Russian revenge. But the focus of their protracted discussion was centred on one thing - how else to humiliate and strangle the ‘Maloros’ so that their will would break completely. All the participants of the board were immersed in reflection. In this meeting there was no room for compassion, humanity against ‘Mazepa-Petliura traitors’. The conversation was about what new vile law could be issued to suppress even more severely those whom they contemptuously called ‘Malorossians’.\n\nlooked thoughtfully at the map of Malorossiya, his finger sliding slowly over the borders like a predator stalking prey. ‘What kind of elaborate punishment can we devise for them?’ - he muttered quietly, more to himself than to those around him.\n\nIvanov raised his spectacle-clad eyes and, squinting slyly, suggested: ‘What if we restrict their right to education? Let their children learn only what we allow. No history of them being a separate nation. Only our values, only imperial ideals.’\n\nKvachkov smirked, his face reflecting a shadow of cruel joy, ‘How about we abolish their right to own land? It's time to bring back Serfdom! The Malorossians cannot be proprietors, let them work for ours, for real Russians, as serfs.’\n\nThe others glanced round, each contributing an idea, competing. Their plan grew more and more grim. These men savoured their power. For them the ‘Malorossians’ were only pawns to be played with as they wished. And over this table hung a mute witness. A portrait of Tsar Rostislav, whose eyes seemed tired and devoid of life, as if even in his image he realised that real power was slipping through his fingers. He was the symbol of the Empire, but not its ruler. These men - Girkin, Ivanov, Kvachkov, Vorobyov and the rest - were the true masters of the country, and the fate of millions depended on their will."
 gir.48.a:0 "God save us"
 
 gir.49.t:0 "Darnitskaya Massacre"
 gir.49.d:0 "This morning workers of Darnitsa Carriage Repair Plant staged a mass strike, work was stopped and paralysed, the protest was joined also by railway workers who blocked the railway in the area of the plant, which significantly worsened the efficiency of other enterprises in Kiev. In addition, the protesters threw the Russian tricolour off the roof of the factory and hung a yellow and blue cloth, which they call a flag.\n\nThe city garrison was hesitant to take action for a long time, but when reports emerged that if the strike at the wagon repair plant was not suppressed, a column of workers would march through all the enterprises of Kiev, which cannot be allowed.\n\nAPCs and cars with security forces started to arrive at the plant, the main purpose of the protest is to show that we are "occupiers" and expatriate Ukraine and other Khokhlovian nonsense.\n\nThe situation gets out of control, APCs and soldiers of the garrison open fire from all guns on the workers and pursue them through the territory of the whole factory, a similar fate awaited the railway strikers, the wounded were suffocating from smoke, the factory yard was covered with blood and the working premises were covered with corpses.\n\nThe riot was put down. Long life to the Tsar!"
 gir.49.a:0 "This damned malorussians never calm down..."
 
 gir.50.t:0 "The Song"
 gir.50.d:0 "Under our policy of strict imperial control, a new form of resistance began to emerge in the underground circles of Ukraine - a song that quickly became a symbol of the struggle for freedom and independence. We have categorised this song in the archive as ‘Pisnya pro mogylu materi’ (Song about mothers grave) - as it was called by those who, despite the fear and brutal measures of the Empire, continued to fight for the so-called Ukrainian identity.\n\nThe story of the song's creation is shrouded in mystery. According to legend, it was first sung by a young girl at a small gathering in one of the underground shelters, which was later uncovered by our intelligence and cleared of partisans. The words were simple, filled with pain, but on the other hand with hope:\n\n‘My good children,\n‘I used to rule and I\n‘On the wide world,\nRule... Oh Bogdan!\nIgnorant son!\nLook at your mother now,\nYour Ukraine...’"
 gir.50.a:0 "Ban this immediately!"
 
 gir.51.t:0 "Terrible Evening"
 gir.51.d:0 "Igor Ivanov, the formidable head of the Russian General Military Union and a well-known ardent supporter of the restoration of the old imperial order, was a man with an iron will. His presence inspired fear, and not only because of his determination to suppress the slightest protest against the new order, but also because of his ruthless grip with which he eradicated any resistance.\n\nWhen rumors broke out in the Imperial capital that Ivanov would become the target of Ukrainian partisans, few believed in the reality of this threat. The protection was at the highest level, the environment was devoted, and all routes of movement were always a secret. However, despite all precautions, the partisan network of Ukraine, which escaped from the hands of the imperial security forces, managed to introduce its own person into one of the service units.\n\nHow it happened is not fully understood. But the result was obvious.\n\nIt was a gloomy, rainy evening. The streets of the city, deserted due to incessant inspections and curfews, resembled scenes from the chronicles of the post-war years - deserted, gray, with rare figures hurrying to get home as soon as possible. Ivanov, restrained and strict as always, was going to an important meeting where methods of combating the increased activity of underground groups were to be discussed. His car was parked at the service entrance, carefully checked by security and technical personnel, as always. When Ivanov got into the back seat of his armored car, the driver was given a conditional signal, and the car slowly rolled down the rain-soaked streets. No one suspected that in just a few minutes there would be an explosion that would destroy not only the car, but also frighten the entire imperial elite. When the car was on a deserted street, past dilapidated houses and dark shop windows, a powerful explosion broke the silence. The roar was so loud that it was heard for several blocks around. Pieces of metal, glass and cloth were scattered all over the street. Ivanov's car turned into a hot pile of distorted iron. The security guards traveling with the escort did not have time to do anything. The driver and Ivanov himself died instantly."
 gir.51.a:0 "Find and punish those involved!"
 
 gir.52.t:0 "Liquidation of a Ukrainian Agitation Cell"
 gir.52.d:0 "In one of the remote, dilapidated towns of what was once Ukraine, which had long ago lost its former prosperity and was now under the tight control of the Empire, the security service carried out a carefully planned operation. A Ukrainian underground agitation cell was unmasked - a group of people secretly distributing propaganda materials calling for resistance and struggle for national independence. The entire neighbourhood was cordoned off, and undercover soldiers and agents of the Security Service broke into an abandoned house where the centre of underground activity was allegedly located. Inside they found a printing press, several boxes of leaflets and homemade posters with slogans calling for the liberation of Ukraine. The Supreme Command decided on the capital punishment - the death penalty for the underground agitators for treason against the Empire and disobedience to the authorities. Imperial officers gathered in the local town council where the arrested men were taken. Without lengthy trials, the sentence was read to each of the underground soldiers."
 gir.52.a:0 "No mercy for traitors."
 
 gir.53.t:0 "Afterword"
 gir.53.d:0 "In the shadow of the Imperial throne that once belonged to Tsar Rostislav, a new era has dawned. The Empire had become the personal fiefdom of Igor Girkin. An iron hand firmly held the reins of power. Those who had once revered Rostislav as a symbol of imperial revival now realised that real power had long since left the royal halls.\n\nTsar Rostislav, once ambitious and full of plans, had now become a symbolic figure. He almost did not participate in the affairs of state. Majestic receptions and councils became an empty formality. He lived away from the capital, in his manor, surrounded by luxury, but without real power. Sometimes he was seen at meetings with Girkin and other leaders, but no one perceived him as a decisive player in politics anymore. His words, once full of ambition, now sounded like an echo of his lost opportunities.\n\nGirkin gradually took over all the levers of power. He was no longer just a military strategist - now he was the de facto ruler of the Empire. His friends and allies took key positions in the government. Igor Ivanov, Vladimir Kvachkov, Stanislav Vorobyev - these names now aroused fear and respect, because they were the ones who ran all the affairs of the country. They had money, army and power in their hands. Decisions were made not in the royal halls, but at secret meetings among Girkin's confidants.\n\nRostislav could only watch as his throne, his dynasty, became a relic of the past. All his attempts to regain control of the Empire had failed. He was now a puppet that was occasionally shown at official ceremonies, but even in those rare moments it was clear that behind him stood Girkin, the true master of the Empire."
 gir.53.a:0 "Glory to the Tsar?"
 
 gir.54.t:0 "Coronation of Maria Romanova - Empress of Russia"
 gir.54.d:0 "In the opulent halls of a grand palace nestled within the city of Donetsk, a coronation unfolds as the air is thick with anticipation and the splendor of a royal occasion. The people gather in excitement, their eyes fixed upon the opulent throne where Maria Romanova, a regal figure with an air of grace, is poised to be crowned as the Empress of Russian Empire.\nThe grandeur of the ceremony is heightened by the ornate decorations that adorn the palace. Intricate chandeliers cast a warm glow upon the assembly, and rich tapestries line the walls, depicting the storied history of a realm that stretches across vast lands.\n\nThe ceremony begins with a procession of dignitaries, nobles, and courtiers, each donned in resplendent attire that reflects the wealth and prestige of the empire. Girkin, who sat right next to her, was observing as the new Empress takes the place of such important figure. As the attendees take their places, the atmosphere is charged with a sense of reverence for the momentous occasion. At the center of attention is Maria Romanova, the soon-to-be empress, draped in a gown of regal magnificence. Her presence commands attention, and the crowd hushes in awe as she gracefully ascends the steps to the throne, where the crown awaits.\n\nIn the midst of the solemn ceremony, echoes of traditional mid russian music resonate through the grand hall, adding a majestic cadence to the proceedings. As the crown is gently placed upon Maria's head, the crowd erupts in cheers, and the air is filled with jubilation. Following the coronation, a grand banquet is held to celebrate the new empress's reign. Lavish feasts are laid out, and the palace resounds with the joyous laughter and merriment of the attendees. The celebration continues into the night, marking the beginning of a new era under the rule of Empress Maria Romanova."
 gir.54.a:0 "Slava Tsaritse!"
 
 gir.55.t:0 "Tense Relationships"
 gir.55.d:0 "Imperial intrigue and power manipulations strained relations arose between her highness Maria and her son Georgiy. Georgiy, desiring more power, wealth, and authority, was not satisfied with the limited roles assigned to him in the imperial structure. Although Mary remains on the throne, he does not accept his role within the narrow framework of maternal rule.\n\nThe conflict between mother and son only grows, fueling the imperial corridors with hushed whispers and intrigue. Georgiy, seeking greater power and control,  keeps operating in the shadows, weaving elaborate schemes and gathering allies among those who wished to see him on the imperial throne.\n\nGod knows where the tensions between the imperial members will bring us to, the only thing is ensured: if this keeps going, the Russia will decline..."
 gir.55.a:0 "The beginning of mind games."
 
 gir.56.t:0 "Russian Empire is so back"
 gir.56.d:0 "I am the rightful ruler of Russia, the Czarina of (Insert name), finally after many decades of Putin's rule and his ideology we have removed this tumour from Russia! We were kicked out of our homeland in 1920, but we came back and brought order!\n\nI proclaim the return of the monarchy to Russia and the Romanov family as it was! I appeal to all of you, representatives and delegates from different countries that Russia is ready to take its place again in the economic sphere of the world and in the political sphere!\n\nHaving taken advantage of the weakness of our country once long ago, we have lost the original Russian lands. \n\nTime will prove to the whole world - give Russia 20 years and it will be invincible, said Stolypin! But I am sure that we will return the Russian Empire to greatness much faster."
 gir.56.a:0 "Ok."
 
 gir.57.t:0 "Girkin set free"
 gir.57.d:0 "Empress Maria's reluctant concession marks a turning point for Girkin, who finds himself stripped of imperial grandeur, assuming the humbler mantle of a mere general. Yet, the transition from the extraordinary to the ordinary proves to be a double-edged sword.\n\nIn the wake of this metamorphosis, Girkin confronts a silent adversary – depression. The weight of unmet expectations, the loss of regal stature, and the challenge of navigating a world devoid of imperial privilege converge to cast a profound gloom upon the once-mighty leader. The echoes of former glory haunt him, resonating with the hollowness of his current existence.\n\nThe daily grind of a general's responsibilities becomes a relentless reminder of what once was, intensifying the emotional struggle within. The juxtaposition of past triumphs against the backdrop of a mundane present weaves a poignant narrative of inner turmoil and existential crisis, painting a vivid picture of Girkin's journey from imperial splendor to the depths of despondency."
 gir.57.a:0 "It’s so over for him."
 
 gir.58.t:0 "The Storming"
 gir.58.d:0 "As the new Absolutist Monarch Maria was was joyfully welcomed at the gates of the executive power she started to fight for the power with the R.O.V.S.\n\nThe R.O.V.S, known for its historical connections to the White Guard, has been a vocal proponent of monarchist ideologies. However, as societal dynamics shifted, their relevance diminished, prompting a reevaluation of their purpose. This led to a decision by certain authorities to intervene and neutralize the organization. Maria, sitting in her chair with golden chair handles, had finally sigend a document to execute the MISSION.\n\nThe special forces undertook a mission to harmfully enter the R.O.V.S building in Donetsk, aiming to make the bloodboth out of the conference room. The operation involved a thorough investigation into the group's activities and an assessment of their current stance on societal matters.\nA tense silence filled the conference room as the Special Forces operatives quietly entered, their presence immediately capturing the attention of everyone inside. The subtle hum of hushed conversations came to an abrupt halt, replaced by the authoritative click of boots against the floor. The team moved with precision, expertly taking up strategic positions, each member meticulously aiming their weapons without a word spoken. \n\nAs the silence continued the Сommander of Special Forces Shepard said: "You, Ivanov, along with your cucks were always like like a stick in our wheels and now will be shot." - and Ivanov answered: "God,forgive them, they don't know what they are doi-..." And the shoots were fired. Ivanov fell on a floor creating a bloodbath with his cucks. Shepard ended this mission igniting a cigarette and saying "Rest in piss you won't be missed, smoked.""
 gir.58.a:0 "Bozo."
 
 gir.59.t:0 "The Good Ending"
 gir.59.d:0 "Many things are said of Mariya Romanova, yet none can deny her ambition.\n\nUnlike many other of her siblings and heirs to the throne, she was born is a foreign land - Spain. Yet she didn't deny her heritage, instead embracing it, learning about her surname's history and role in Russian history. However, the thought of sitting in a Spanish mansion until her death arrives did not sit with her well, as well as the fact that eastern European monarchists were gaining power while she was in exile. \n\nUpon learning about monarchist protests and sensing weakness in "democratic" government, she and her family immediately moved back to land that was previously inhabitated by their ancestors, that includes her son - Gregoriy. After successful overthrowing of "democratic" regime, All-Russian Empress was crowned - Mariya Romanova, Gregoriy's mother. The problems did not end with her coronation, she had to worry about her son's disagreements and his different opinions on her decisions she made on throne. That includes things such as "Giving random people our family have never even seen high aristocratic positions" or "Aristocrats close to my mother aren't trustworthy enough to even look at her and me"\n\nGregoriy, envied his mother and the power she was going to inherit. Not only because of the "dumb" decisions she's made during her reign, but because of simply his power-thirsty nature. After many assassination attempts, conspiracies, (не знаю так чи ні, написав для ефекту) he has had enough.\n\nAs Mariya Romanova laid on enourmous imperial bed, Gregoriy knocked on her room:\n- "Knock, knock" - said Gregoriy sounding almost as a tired office worker after 12 hour shift.\n- "Come in, Grisha" - Mother replied in a warm, motherly voice, not knowing the assassination attempts were his plans.\n- "Mom, we have to talk."\n- "What is it?"\n- "You probably already understand that I can't find certain words to start with" - he took a grasp of oxygen, and continued, - "after psych evaluating myself for sometime I understood how arrogant I was towards you, therefore towards the people you elected."\nWhile Gregory was really picky about the words, Mariya interrupted.\n- "Son, you didn't have to put yourself through these severe torments of testing yourself, I forgave you when I noticed that you did not control yourself during the things you've done to me. After all I am your mother and I can see through you. You are my closest heir, remember? And to rule is to be strong, strong lies in unity. We are stronger together son."\n\nAs heir's eyes fill with tears they hug.\n\nAnd as she and her son now walks this perilous tightrope she crafted, she balances not only her own future but also that of the Empire."
 gir.59.a:0 "So cwte!"
 
 gir.60.t:0 "Games of Thrones in the Capital"
 gir.60.d:0 "Long before that fateful night, under pressure in the pretentious luxury of the vaults of the hall of the monarchical congress, filled with various delegates from the party, aristocracy, bourgeoisie, military class, merchants and simply influential individuals, the fate of the country was being decided. In the tobacco smoke-filled Kalouars, the fate of the country and its new economic innovations was already being decided, because everyone wanted to bite off a larger piece by bargaining for the redistribution of influence. As a military man, brilliantly dressed as if for a parade, said once that evening, “high business is not for patriots.” At first glances were turned to George, the son of Maria Romanova, but the prospect of his mother on the throne became much more attractive. She was much better at finding the necessary contacts with the elites and had a lot of leverage over her son. In addition, nuances arose that strengthened the position of Maria Romanova, namely, she was much closer to the main royal line. Deciding to avoid possible problems with legitimization, the electors gave her the crown. And already during her reign, Empress Maria of All Russia demonstrated stubborn absolutism. She did not tolerate any rival in power. Having carried out reforms that returned the class restrictions of the Russian Empire of the early 20th century, many people became poor. And during the behind-the-scenes struggle, she strictly restrained the influence of Igor Girkin, arrested everyone who was against her coronation and crushed the White Guard movement within the country. Although these insignificant organizations compared to the central government could hardly be called worthy rivals, Maria clung to the throne with a stranglehold, not wanting to give it up even to illusory opponents.\n\nIn the shadow of her power, her son Georgy Romanov built his intrigues, while his mother did not devote enough time to such a subtle human aspect, preferring brute force methods. But in vain, in addition to his passion for mysticism and esotericism, George found contacts with young officers from the Life Guards of noble origin who were not happy with the belittling of the status of the nobility in front of the imperial person. George, deprived of the throne, combining what at first glance seemed an impossible mixture of narcissism, cowardice, uncertainty and determination, greedily dreamed of power, which in his opinion was illegally taken from him. He gathered a 'club of interests' around himself, carefully selecting loyal supporters.\n\nIt seemed that young people simply wanted to find secret mystical knowledge, but Georgy simultaneously consolidated supporters around himself. He was unable to openly confront his mother because he was too indecisive for this and the mother herself considered him incapable of betrayal. Even when, at one of the closed government meetings, the head of imperial security directly indicated that Georgy was conducting suspicious activities, she said: “My son is not capable of this. If you do not want me to consider this an insult to my family and the Russian Empire, I would ask you to stop this vile slander." Georgy gained more and more new supporters, and then one night, after checking his astral maps, he suddenly realized that this was the ideal moment for a coup, but he was too afraid to carry it out, so he had to drink glasses of vodka several dozen times for courage. Since Georgy incredibly loved symbolism, theatricality and aesthetic message, he changed into the costume of the officer who killed Paul I, took a flintlock pistol and a gilded snuff box. Having redirected the palace guards through loyal generals, he gathered loyal officers of the Life Guards and went to the palace. Having burst into the chambers of the Empress, George declared: “Mom, I will put an end to your tyranny! The Russian monarch has always ruled with the support of the nobility, because this is the natural position of the Russian people. By violating this tradition, you are violating the very essence of the Russian reign, so you cannot be called a legitimate empress because of what I will be the new emperor and you will have to go into the past! Then he staggered with his companions to Maria’s bed and waved his snuffbox, symbolically shouting “Alea iacta est!”\n\nMaria just had time to scream before the snuffbox crushed her left eye and eye fluid with splashes of blood covered George’s face, causing him to back away in fear, dropping the snuffbox and eventually feeling sick. Georgy began to fall over, trying to cling to the velvet curtains, which were torn, and he almost shot himself in the leg with his own pistol. Luckily the bullet only scratched his leg. After which he shouted hysterically with the order to finish what he started, and the officers of the Life Guards opened heavy fire from their service MP-443s until the convulsions of the dying woman stopped and the blood soaked the snow-white bed, feather feather feathers descended on the unlucky killers while Georgy extricated himself from the curtains with the drenched bloody face."
 gir.60.a:0 "God, save their souls..."
 
 gir.61.t:0 "New Aristocracy, Old Orders"
 gir.61.d:0 "So many thoughts and memories swarmed in the empress’s mind. Sitting in the chair of his desk, remembering the book 'The Wisdom of Jesus the Son of Sirach', which he had read a long time ago, saying out loud a quote from there that came out of his mind into his mouth.\n\n- With the unmerciful - about charity, with the lazy - about any matter...\n\nMaria then began to think about the thoughts that had been haunting her for so long.\n\n"The temptation of freedom in its terrible, insidious form causes deep fears in my heart. My excellent and great Russian people often almost point blank do not distinguish the debauchery of the West, seeing virtue in them. This is truly outrageous... Nevertheless, these many undoubtedly blind people admire the bourgeois Americans considering them as "a completely free and prosperous people." But if you look at the situation objectively, how can they be so ignorant of the vile Bolshevik propaganda? In turn, a natural question arises about social mobility. Why do these troublemakers need so-called social freedom, extensive guarantees if is everything already predetermined by their origin? This is all just profanation, because such demands are only the source of the strongest upheavals in Europe and 1917 clearly proved that all these unrest were artificially initiated by the left and false promises of the Bolsheviks. The temptation of coming to power created by the Bolsheviks seduces the fragile minds of the working people. The workers simply don’t know what they’re doing... Didn’t the traitorous Republicans provoke the emerging middle class by overthrowing Louis 16? It is quite obvious that everyone has their own place, as it was thousands of years before the Rurikovichs themselves, the Romanovs at the throne. The tireless attempts of the vile Bolshevism to destroy the people and their traditions have always been the main means of undermining the foundations of the dominant white civilization.\nIs it really only me and my associates who have taken on the burden of being responsible for recognizing these obviousities in God’s creation? Even in the seemingly enlightened Western democracies, despite their merits, there is complete chaos! Where are their former reasonable rulers, their nobility? They have succumbed to bureaucrats, crooks, populists and fictitious democracy, behind which the mask hides the fact that slaves themselves choose their slave owners. I am indignant at the thought that such a fate could once again touch the sacred lands of the Russian people. Only a solid, unbreakable hierarchy with peasants, warriors, nobles and a monarch is an integral structure in a normal monarchical country. The one who is born to grovel will grovel and the one who is born to rule will rule. It has always been this way, because this is an axiom of life. Why do you need to change something that is functioning successfully?"\n\nThus, having thought thoroughly, Empress Maria gets to work, already giving orders to the Empress of All Russia in her decree.\n\nNow the Russian people were officially divided into classes. The smallest part of this people were the nobles - military men, managers, important scientists and other often no less important personalities. Next came the merchant class, which included the entire business elite, as well as entrepreneurs of almost all types. The Cossacks moved on. For their personal ardent loyalty to the empress, they deserved a separate class of highly professional warriors, whose financing required a lot of public funds. Next came the townspeople and peasants. In fact, it was the largest society that supplied other higher classes with its labor. It was almost impossible to move from class to class, and everyone seemed to be squeezed in a vice within their class boundaries. In order to trade, peasants had to hire merchants so that they could sell their products on their own behalf. It is trivial due to the fact that the peasants did not have the right to engage in commercial activities with the townspeople either. Acting as monopolists, merchants charged peasants exorbitant prices for their services, taking most of the profits for themselves. But the Cossacks and nobles had more expanded economic preferences so they did not face the problems that ordinary people faced. So Maria was able to form stable, although not so numerous, classes that were very loyal to her."
 gir.61.a:0 "Deep."
 
 gir.62.t:0 "Happily Ever After"
 gir.62.d:0 "The sun shone red on the horizon. The streets of the busy capital were filled with the groaning of car horns and the music of street performers, suffocating in countless crowds of thousands of men, and the exhaust fumes of old, some might even say ‘vintage’, cars. The day was nearing its end.\n\nIn the east wing of the palace of her Imperial Highness, a grand celebration was underway to mark the christening of the newborn son of Tsarevich George, Mikhail, great-grandson of the reigning Empress and now a member of the glorious House of Romanov. Present were the Imperial Grandmother, Her Wise Highness Empress Maria, the Tsarevna, charming Princess Victoria, child's grandfather, the Emperor of All Russia, His Highness Prince Franz Wilhelm of Prussia, the brother and sister of the newly baptized, the Cossack atamans, representatives of the aristocracy, the bourgeoisie, the clergy, and other family friends.\n\nHowever, in the west wing, everything was quiet and dark, with only a single lamp burning and a man in a fashionable blazer and new cashmere trousers sitting beneath it. This was Monsieur Pascal, as the guests of the Empress and the Prince liked to call him, although his real name was Alexander Afanasyev, also known simply as 'Shurik' in pre-imperial times during his days as a librarian. He got his nickname for his passion for classical French literature and fashion and for having a whole bunch of ‘passions’ of his own, which is where the first three letters of his pseudonym came from, with the rest somehow simply falling into place. Monsieur Pascal was now the court historian and official biographer of Her Imperial Majesty, and was completing the first part of her memoirs.\n\n"... the Russian troubles, driven by lust and other sins, intensified by the foreign and alien enemy, both Malorossiyan and Western, have finally come to an end. For nothing is stronger than the Russian unity, endurance, loyalty, and, above all, the blood that forever binds not only the supreme and most powerful of all, the House of Romanov, but the whole Russian people, who in an instant would lay down their lives for their great and holy rulers. The Cossacks, the lords of the steppes and descendants of Archangel Michael, the nobility, both petty and grand, on whose shoulders the entire empire and its vast subjects rest, the burghers, who are the lifeblood of the entire Russian state, standing guard over the treasury and riches, and holy people who pray for the future of our land and care for the new generations. And the people, strong and vast, loyal unto death and obedient to their holy rulers and mighty lords, faithfully serving their homeland. There was no end to this unity, for it was absolute, as in a family, as in a court, as in a nation."\n\nHaving finished, Monsieur Pascal stood up, approached the window and stared out, gazing at the lively festivities and merriment in the wing opposite. He yearned to join them. The Empress ordered him not to leave until he had finished writing, yet it seemed that he had written all he could and was eager for entertainment. He crossed the imperial palace and entered the ballroom, where the main celebrations were taking place. The Empress was playing with the child, the Emperor and the Prince sat at the tables sipping expensive brandy and washing it down with French and Italian wine, whilst the Princess was seemingly concentrated on enjoying the moment. Everything was perfect. Cossack colonels chatted with noblemen about fancy new uniforms, and the patriarch talked about his remarkable students. The loud music and chatter were occasionally drowned out by moans coming from the neighbouring rooms, seemingly male, yet somewhat monkey-like. After each loud cry, the Princess trembled and glanced nervously at her son. Finally, unable to bear it any longer, she burst into the adjoining room and shouted in poor Russian: "Bastards, you are fucking sluts and servants, not a zoo, quiet!" and slammed the door as hard as she could. Everyone in the room, except Pascal, seemed quite indifferent. But not him. Realising what was going on, he took a sip of champagne from the waiter's tray, grabbed him by the arm and with the words "let's go" headed towards the slammed door."
 gir.62.a:0 "Long live the Empress!"
 
 gir.63.t:0 "Coronation of Emperor George"
 gir.63.d:0 "Not much time has passed since the death of the woman who brought autocracy back to her native land. Not much time has passed since her triumphant coronation and festive balls in the Winter Palace, which after the October Revolution was a museum for a long time. However, once again, as if in the era of palace coups 1725, the Russian head of state was replaced. Her body was buried in a modest ceremony at which her own son did not even attend. At the burial ceremony there were only a few investigators writing the protocol, a couple of friends who were then sent to the Gatchina pre-trial detention centre where they mysteriously disappeared. And the last person - a personal priest. Having sung a prayer for repose and lowered the coffin into the ground, the investigators smoking cigarettes carelessly covered it with dirt.\n\nNow it's time and place for the new Russian Tsar! The tsar whom the great Russian people deserve, the tsar who will never give offence to his nation. It is time not to sink headlong into the past, but to go into the future and develop the idea of Russia. It is the preservation of old traditions together with modernisation and progress and promised to start a new era, the new Russian Tsar was crowned in the Assumption Cathedral of the Moscow Kremlin as it is supposed to the old traditions. The ceremony was carefully thought out, every step of the emperor was prescribed and learnt by heart. Everyone was dressed in ceremonial uniforms and gowns. The Archbishop of Moscow and Kolomna, Metropolitan of Moscow, placed the Great Imperial Crown on the Emperor's head.\n\nAfter this he pronounced a short, but at the same time very emotional and intense speech, in which he mentioned in a kind word Emperor Nicholas II, as well as the reform ideas of Alexander II, who was brutally murdered. British journalists were present during the speech, as well as some well-known monarchist politicians and noblemen from Europe - for example, the leaders of Action française, the heir to the Danish throne Ristian, the crown prince of Denmark, Count Monpeza. Some titled Britons were also present. The New York Times predicts that Georg will be less predictable than his mother in terms of foreign policy."
 gir.63.a:0 "Hooray!"
 
 gir.64.t:0 "The Fate"
 gir.64.d:0 "In one of the dimly lit chambers of the Imperial Ministry of Defense, a rather delicate three-sided discussion was unfolding.\n\nSergey:\n- "Ever since the 'incident' with Maria, her son has grown… twisted. Cruel. Power-hungry. He launched a relentless campaign to discredit people like us — the true patriots, who still remain loyal to the ideas Maria bestowed upon this Empire."\n\nIvan:\n- "But why is he doing this? What drives him to this madness? He will never find peace by destroying everything his mother built! What force whispers such poison into his ear?!"\n\nValentin:\n- "It doesn’t matter. He has gathered zealots around him, fanatics who worship his every word. They will follow him blindly, even if it means trampling his mother’s legacy or dying for him."\n\nSergey:\n- "Curse it all… Imagine what kind of empire we could have built, if not for George's ambitions to turn himself into another Western puppet! He murders Russians — the very souls who want the best for our land. And the worst part? He never stains his own hands. He uses naïve fools to commit crimes for him. Perhaps this is the death knell of the Russian spirit itself…"\n\nSuddenly, a sinister hiss emanated from under the table. It lasted only a few seconds — yet enough to unsettle the gentlemen present. One of the men reached swiftly beneath, pulling out a small black device with a protruding antenna.\n\nValentin:\n"Bugged… Shit."\n\nValentin had no chance to speak another word. The chamber doors burst open. A squad of Imperial Guards stormed in, and within moments all participants of the conversation were lying face-down on the floor. Very soon, charges of treason would be read against them, and they would meet the riflemen's bullets.\n\nBut they were not the only ones arrested that day.\n\nThe next morning, George, the newly crowned Emperor of All Russia, received a hundred-page report detailing the traitors' schemes — plans which, if left unchecked, could have led the Fatherland into ruin. Fortunately, all enemies had been caught before they could even draw their blades."
 gir.64.a:0 "The Tsar has no need of God."
 
 gir.65.t:0 "Conscience Redepmtion"
 gir.65.d:0 "George after his men put an end to an unthinking and futile reign for Empire he cold-bloodedly ordered the liquidation of his own mother. But after the execution of the order of our new ruler he was destroyed from within by serious moral torment, she gave birth to him and brought him up, what did he give her in return? Our Tsar visited the remaining in the expanses of Russia not shot priests and psychologists in order to overcome internal hesitations. But it did not help, so our new ruler for a few months went to a monastery far from  headquarters in the Ternopol region, in Pochaev. Pochaev monks and clergymen helped our tsar to forget and forgive himself, after which he was forgiven by the Lord.\n\nAfter purification George went to the capital and issued many decrees on arrests and liquidations of enemies of Empire. This was as necessary as many other reforms and we should have done it first. The State Guard eliminated most of the remaining supporters of the now deceased Tsarina. Let there be peace in our land!"
 gir.65.a:0 "Cool."
 
 gir.66.t:0 "The Unconditional Verdict of Emperor George."
 gir.66.d:0 "Georgy stood in his office and felt a chill. He still remembered how he trembled... He remembered how it seemed his unsurpassed plan to make the murder so sublime, theatrical failed when he almost shot himself in the leg and collapsed under the pressure of his own self-doubt. George saw himself as the new Louis 14 and even now walked like him. And these Cossacks might have suspected something. The generals loyal to him, under the pretext of an order from the empress, ordered the Cossack guards to be removed from the palace, and after the same order, the assassination of the empress by “unknown persons” followed. The more Georgy thought about it, the more he imagined scenes where the Cossacks expose him completely, without a trace. Frightened by this prospect, he decides to issue a secret decree. Fabrication of a criminal case against the entire Cossacks. He wanted to accuse the Cossacks of murdering the empress. But they were all armed to the teeth and were excellent warriors. Therefore, he decided to act very vilely. He announced a military exercise for all Cossacks, after which a few weeks later all the military Cossacks were taken to the indicated place, a military camp and a Cossack headquarters were set up. Troops loyal to George placed fortified machine gun emplacements and numerous artillery batteries around a very large military camp at night. And at 4:00 in the morning the artillery shelling began, the aircraft launched a massive attack with white phosphorus and napalm. No one was spared.\n\nIt was a real massacre and the screams of dying people were heard throughout the area. The most important atamans who were stationed at the imperial palace were generally arrested in advance and tried. After which he was sentenced to death by firing squad. Western countries did not recognize this court due to multiple inaccuracies in the prosecution case and also due to multiple legal and judicial violations during the trial. Cossack military warehouses were placed under a cordon and handed over to the army. The court also, by an additional order, declared all the Cossacks guilty, so punitive operations to clean up the Cossack villages were developed no less quickly. In some villages they were taken prisoners and some villages were simply burned with napalm or punitive detachments. And many hundreds of kilometers away, his soldiers were commanded by an unknown Major, Sergei Valerievich. This was his first truly combat mission, because for most of his service he was sent to military rear work. He ended up serving for a long time but then retired. And so Sergei again did not get enough sleep, jumping out of bed at 5 o’clock in the morning from another nightmare that was associated with his activities in the Zaporozhye Sich. Specifically in one of the villages. Sergei tried over and over again to psychologically prove to himself that he was not guilty of anything, he was simply following orders, but that one of the many villages still couldn’t get out of his head... The authorities from above reported that large combat-ready forces of Cossack separatists were hiding in this village and it’s even possible that their headquarters is therefore no longer a village but a military facility of the enemy and the enemy needs to be eliminated. He commanded a battalion that was supposed to be the first to arrive in the village to eliminate the enemy.\n\nBefore the operation, Sergei received instructions from the command and instructed the soldiers that the settlement was occupied by the enemy who was ready to offer fierce resistance, the presence of civilians was not expected. After a 10-minute artillery preparatory assault, the assault began. However, the soldiers opened fire on the villagers who were doing their work. The soldiers drove people into houses and locked them there, burning buildings with people, shooting residents while Sergei understood that every life taken was also his fault. A group of fugitives who tried to hide in roadside ditches were killed with bayonets, sapper shovels and rifle butts. Some soldiers refused, even under pain of a military tribunal, to carry out the order. Devastated and morally broken by the sight of the massacre, Sergei decided to somehow help civilians and decided to finish off the wounded. This strange thought arose against the background of an irreconcilable struggle in his soul between moral principles and what he considered the great duty of serving Russia. He shot in the heart or head of the wounded, and then when he had moved far away and these moral contradictions began to beat in him with even greater force, he saw a boy with an arm hanging from his muscles, the bone had been shot off, and the look of this boy seemed to pierce right through him, saying, “Uncle, why are you doing this?” done?". Sergei will never forget the look of this boy. Thoughts were racing through his head: “Failure to carry out an order is a betrayal of the homeland and a tribunal.” Gradually falling to the ground, leaning against the wall of some house, Sergei, unable to bear it, raised the pistol to his temple, wanting to end this, but there were no cartridges at that moment, as if he was surrounded by a haze of common sense and the principles inherent in man finally left him. He pulled out a dirk from its sheath and cut the boy's jugular vein, wanting to end this gaze by any means.\n\nThe cutlass passed instantly through the boy's throat, stained there was plenty of murder weapon and murderer's blood... By that time, the cartridges began to run out and the soldiers had to wield knives on the necks of the so-called separatists. This kind of haze of madness had already passed along with adrenaline when Sergei held a bloody ax and dirk in his blood-covered hands and stood near a ditch with beheaded villagers while soldiers finished off the survivors with bayonets and butts. Looking around, he saw that he was still feverishly pressing the trigger of his pistol. He was shaking as if with a fever and he wanted to vomit from the realization of what he had done. He thought that what kind of military man was he after he gave such slack? After these events in the village, soldiers who refused to follow orders were court-martialed and their further fate was unenviable in the form of execution for treason. This was the first such operation to destroy the separatists, so he remembered it in detail for the rest of his life. Of course, there were others, but as described above, this operation was the most memorable; then, if I may say so, he became callous, getting used to trying not to let his emotions get out of control. Another veteran, after what Sergei had gone through, would probably have started drinking and ultimately shot himself, unable to withstand the psychological stress, but Major Sergei had strong willpower and ardent patriotism that even the smell of war could not break. Now in the evening he sits in his major’s uniform with that same dagger in its sheath, reading the Bible, plunging into more pleasant memories of the end of his service, when he managed to do administrative military work and developed various tactics for motorized infantry."
 gir.66.a:0 "It won't fit it."
 
 gir.67.t:0 "The Tragedy of Power"
 gir.67.d:0 "After the death of his mother and the destruction of all witnesses, George finally established absolute power. A new period of rule began in the country - an era of fear and repression. The previous rudiments of establishing a ‘constitutional monarchy’, a weak parliament and limitations on power were instantly rejected. Tsar George declared himself the sole ruler, the source of all decisions, the master of life and death of every subject.\n\nThe empire became a brutal machine of suppression, where any resistance was punished with extreme violence. Any word against the king could lead to death. Even his closest associates and military leaders felt under the gun. George's personal guard, made up of men fanatically loyal to him, enforced his will with a ferocity that until then had seemed impossible. They hunted down and executed anyone suspected of disloyalty on the spot, without trial.\n\nPower and the fear of losing that power drove George to complete madness. With each new victory, each act of repression, he became more and more detached from reality. He saw conspiracies everywhere, in everyone who had ever stood near him. He saw enemies even in his supporters. His mind was decaying under the weight of the absolute power he sought to hold on to at all costs. The empire under the iron boot and all reform. Now all the tsar was interested in was the retention of his limitless power. Laws ceased to exist as such, they were replaced by the will of George. The people must live in fear of his unbridled cruelty and paranoia. Silence reigned in the Empire, interrupted only by whispers in dark alleys that..."
 gir.67.a:0 "The Tsar had gone mad."
 
 gir.68.t:0 ""Ukraine does not exist""
 gir.68.d:0 ""Dear people of the Great Russian Empire, it is time to dispel the fog of lies that has poisoned your hearts and minds.\n\nThe Great Empire does not recognise any artificial borders in the minds of its people. We are the only nation that has been carrying out its mission for centuries on the territories from the Carpathians to the Pacific Ocean. Ukraine? Malorossiya is not a separate state, it is part of our common destiny, our blood and history. This is the truth that they have been trying to hide from you for decades, imposing the idea of an artificial Ukrainian identity invented by enemies who wanted to tear the united Russian people apart.\n\nWe must reveal why the so-called 'Ukrainian people' is a myth created by political adventurers to divide our sacred land. There is no separate history of Ukraine - its history has always been part of the history of Russia. KIEV is the mother of Russian cities, the centre of our ancient heritage, which has always belonged to Great Russia. Ukrainian culture is a kind of Russian culture, which flourished thanks to our common spiritual identity. When teachers and propagandists tried to impose the idea of a separate nation on you, they sowed discord, which has always been against the interests of the whole nation. The years of independence have brought only suffering, corruption and chaos. Ukraine has never been strong, because its only strength lies in its union with Russia, in the union of peoples who share a common language, religion and culture. From Bohdan Khmelnytsky to Ivan Kotlyarevsky, they all wanted to be reunited with Moscow and serve one, united Russia.\n\nIt is time to put an end to this lie. Ukrainian identity is a fiction, a myth that has been used to divide our mighty nation. The truth is that we are all Russians, and our destiny is to be united under the flag of the Russian Empire. Reject these empty words about separateness, feel proud again of your common heritage and accept your true place in a revived empire.\n\nOur strength is in unity. Our common history is our truth. And nothing can divide what is bound by blood and faith.""
 gir.68.a:0 "Sincerely, [DPR.GetLeader]"
 
 gir.69.t:0 "Empire vs Federation?"
 gir.69.d:0 "Ukraine was fully integrated into the Empire, and the world's attention was focused on the next step - preparing the Empire for a possible war with the Russian Federation. The growing tension between Moscow and the Empire has been fuelled by years of disputes over the legacy of the former Soviet Union, the legitimacy of the leadership and the struggle for control over post-Soviet territories. The Empire, having proclaimed itself the legal successor to historic Russia, has openly declared its intention to challenge the Russian Federation, which imperial forces consider an illegitimate regime.\n\nAccording to sources, active military mobilisation has begun in recent weeks on the territory of Malorossiya. Imperial troops have been pulling towards the eastern borders, where it is expected that hostilities against federal forces could unfold. The Empire, which has significant resources and the support of players within the federation, intends to regain control of territories it considers historically its own."
 gir.69.a:0 "Brutal times."
 
 gir.70.t:0 "Tsar's Speech"
 gir.70.d.a:0 ""My subjects!\n\nToday We, Tsaritsa Maria Vladimirovna Romanova, address you! My dear inhabitants of ancient and mighty Russia! Our people has passed many tests of history. We have overcome our troubles, we have won our enemies. Our glorious feats, in Borodino, in Sevastopol, in Osovets will not be forgotten. We overcame hatred and made so that in our Empire under the protection of our glorious Romanov family all peoples could feel themselves in a friendly family, in the arms of the wings of the Russian eagle. But...\nHear my message!\nRussia is in danger. Her power has been seized by those who do not value our people at all, but value only money and resources and use Russian and other peoples as fuel for their bloody business.\n\nWe can not allow such a thing any more. Arise, people of Russian! Do not submit to the false power of thieves and murderers! Do not be a disgrace of the ancestors! You are from the Sort of warriors and builders, writers and researchers! Our dynasty of Romanovs will make everything that Russians again became free, and will keep your freedom as it was always!\n\nThe army of Malorossiya is already at the ready. Just tell us, my dears, tell us. Don't keep this anger in you, don't accept your situation. We are ready to come to your aid. Nothing can stop us. Nothing can stop our family uniting.\n\nServe not thieves! Serve yourselves, your hearts, your dreams! Don't let our ancestors be disappointed in you.\n\nThank you, my family. I proudly accept the responsibility of being your monarch and preserving your dignity.\n\nFrom the bottom of my heart with good intentions,\nHer Majesty the Sovereign of All Russia, Tsaritsa Maria Vladimirovna Romanova.""
 gir.70.d.b:0 ""My subjects!\n\nToday We, Tsar George Mikhailovich, stand above you with the decree, full of the great responsibility before the great history of  Rusisan people, by right belonging to our Glorious Dynasty of Romanovs, primordial children of Russian people, successors of Grand Princes of Kiev and Moscow, lords of the Land of Novgorod and Polotsk, explorers of Siberia and the Far East, discoverers of Alaska and tamers of unruly Central Asia.\nWe urge you!\nOur country is under the shadows of illegitimate and non-native power, fierce bandits are taking away... but Our Grace will bring you faith in a bright future.\n\nThe heart of Velikorossiya beats in each of you, and now it is time to unite our forces to return true power to the hands of the great nation. Neither Putin, nor his pawns, nor his regime, nor his guards are representatives of our interests. They have brought the country to a dead end and taken away from you your ancestral right to serve the Great Dynasty, consequently to serve the Russian people. We will not stop until our banner rises over the Kremlin and the Winter Palace, over the Volga and over the Urals. Until we get our shoes wet in the Pacific Ocean! And let our unity be the mighty sword that pierces the mirages of democracy and Bolshevism.\n\nTherefore, We, George Romanov, Emperor of All Russia Command!\nBow down before My Power and serve Me with Faith and Truth! Serve your Fatherland!\n\nThank you all My Faithful soldiers, My brothers and sisters. May Our faith lead Us to a new bright blossoming of Great Russia.\n\nFrom the my heart with good intentions,\nHis Majesty the Lord of All Russia, Tsar Georgy Mikhailovich Romanov.""
 gir.70.a:0 "Long live the Great, United and Indivisible Russia!"
 
 gir.71.t:0 "The Hike"
 gir.71.d:0 "[THE DAY YOU HAVE WAITED FOR CENTURIES HAS BEGUN]\n\nAmidst the gathering storm clouds, the Imperial Commander In Chief Girkin, a figure of imposing stature with a resolute gaze, stepped forward onto the raised platform before his assembled troops. His Kevlar Helmet gleamed in the dying light, a testament to the strength of the Empire he represented.\n\nWhen he adjusted the microphone he started: "Soldiers of the Imperial Empire!" his voice echoed across the plains, reaching the ears of every warrior under his command. "Today, we stand on the precipice of history. The time has come to face the forces of the larp Russian realm, to defend our honor, our people, and our way of life." A roar of approval erupted from the ranks, the sound echoing across the plains like thunder. The commander continued, his words a rallying cry that stirred the hearts of his soldiers. "For too long, the Russian forces have encroached upon our lands, seeking to impose their will upon us. But today, my comrades, today we shall show them the indomitable spirit of the Imperial Empire! We shall stand as one, a formidable force that cannot be broken!"\n\nAs the commander spoke, the winds seemed to carry his words across the plains. The two armies, each driven by a sense of destiny and the echoes of their ancestors, prepared for the clash that would echo through the ages.\n\nWith his final words, the commander raised his AK-74 once more and with the loud battle-cry he screamed: "CANNON FODDER TACTICS WERE ALWAYS SUCCESSFUL!", and the army of the Imperial Empire was encouraged to FIGHT, a force united in purpose and bound by the echoes of history. The epic WAR between empires had begun, and the outcome would be written in the blood and sweat of those who fought for their nations."
 gir.71.a:0 "'Mi smelo idyom vperyod...""
 
 gir.72.t:0 "Victory Day"
 gir.72.d:0 "This day will forever go down in the history books, as speaking from the freshly-redecorated Kremlin, [ROOT.GetLeader] has declared that the Putinist forces are finally defeated and the Russian Empire has now officially reclaimed the Motherland after months of brutal civil war. The international community and Russians themselves are shocked beyond belief, as the neoimperial movement has truly come a long way from being being a group of fringe alcoholics scattered across the post-Soviet countries merely a decade ago to somehow making a comeback in collapsed Ukraine, and to now avenging the crimes of 1917 and sitting proudly in Petrograd once again.\n\nAlready, the government of the resurrected Empire is ready to enact sweeping administrative and legal reforms all across the country in hopes of restoring stability, as well as to prepare a grand parade in multiple cities at once, showcasing the might of the victorious Imperial Army. Remnants of the Putinist regime that sold out the Motherland along with Yeltsin are no more, and though Putin himself is nowhere to be found, most of his cabinet and members of local government were captured, ready to face justice for "crimes against the territorial integrity and well-being of the illegally-dissolved Russian Empire"\n\nEnjoying support from the majority of the population that considers the time before Lenin an era when "Russia was truly great", the government is confident that the stabilization period is to be rather short, and Russian Empire will be back in business in no time, perhaps turning their gaze westward - towards Baltics, Poland, and their NATO overlords. In the meanwhile, [ROOT.GetLeader] can sit back on the majestic golden throne, relax, and reflect upon what is done already and how it wouldn't have beeen possible without the strong will of Maloros and Velikoros people - finally, united as one."
 gir.72.a:0 "S nami Bog! Ura! Ura! Ura!"
 
 gir.73.t:0 "Coronation, as it belongs"
 gir.73.d.a:0 "The coronation of Emperor Maria at the Assumption cathedral in the kremlin marked a significant event in the history of the bloody empire. Emperor Maria had been crowned earlier in Kyiv, but the inevitable conquest of Moscow led to a second coronation in the heart of the newly acquired capital.\nThe "holy" Cathedral which was nestled within the Kremlin walls, stood as an emblem of power and authority. Its historical significance made it the ideal setting for such occasion. As the imperial entourage made its way through the streets of Moscow, the city cheered.\n\nInside the cathedral, among tiny-shiny decorations and solemn chants, Emperor Maria was crowned once again, without any doubt, in a newly conquered capital . The coronation in Moscow mostly served to strengthen the ties between the ruling monarch and her god damn moscouvite slaves in the conquered territories. It symbolized the integration of Moscow into the imperial fold and marked a new chapter in the history of the bloody empire.\n\nFor Emperor Maria, the coronation in the Assumption Cathedral was a moment of triumph and GLORY of her rule. It strengthen her position strongly as the sovereign ruler of a vast and diverse empire, uniting different regions under her banner."
 gir.73.d.b:0 "The coronation of the Emperor Georgiy took place in the Assumption Cathedral of the Kremlin. Since Georgiy had already been crowned earlier in Kyiv before the conquest of Moscow, the ceremony was expected to be really-really special. On the other hand the transition of imperial centers symbolized some kind of "pivotal" moment.  The solemn rituals and traditions of the coronation ceremony echoed through the hallowed halls, marking Georgiy's ascension to the throne in the heart of the empire.\n\nGeorgiy's coronation in the cathedral, surrounded by its grand decorations and stunning design, emphasized the long-standing imperial tradition and asserted control over recently acquired lands. It was a moment that reverberated through history, shaping the course of the empire and solidifying its presence in the annals of power.\n\nAs Georgiy received the imperial crown in the Assumption Cathedral, it signified not only his personal honor but also the culmination of a journey that began in Kiev and reached its zenith in Moscow. The coronation in the Kremlin marked a new chapter in the empire's history, one in which Moscow emerged as a focal point of imperial power and influence over EVROPA"
 gir.73.a:0 "Za tzaritsy!"
 gir.73.b:0 "Za tzarya!"
 
 gir.74.t:0 "Resistance to the Monarchy"
 gir.74.d:0 "After the victory over the Russian Federation, the country seemed to be frozen in triumphant silence.\nThe emperor returned to St. Petersburg, solemnly walking between the ranks of saluting officers, dressed in the latest uniforms but with the look of the old guard, exhausted and silent.\nPeople came out en masse to the squares, celebrating, kissing the flags. The newspapers wrote about the 'end of the Bolshevik era' and the 'return of real Russia.'\n\nBut something was brewing.\n\nThe first postcards appeared in Rostov. There were few of them - self-published on thin paper, nailed to a bulletin board in a marketplace in the middle of the night.\nThey featured the tricolore cockade, the French republican symbol, and the words: "This is not a victory. This is the replacement of one dictatorship with another, a tsarist one."\n\nA few weeks later, in Nizhny Novgorod, unknown people hung a tricolor with the coat of arms of the Provisional Government of 1917 from the balcony of the city hall at night.\nIt was quickly taken down, but the photo had already gone viral. The authorities tried to keep silent. But silence only added fuel to the fire.\n\nArrests began. In Kazan, a local professor, a well-known Putinist, disappeared - the next day students took to the streets.\nIn Yekaterinburg, someone threw a Molotov cocktail at the new state administration. In the port of Rostov-on-Don, a batch of wartime rifles disappeared from the Internal Security Service warehouse.\n\nThis was considered to be an expected opposition during reintegration, as well as destruction of railroad tracks, or infrastructure sabotage. But something was already stirring under the facade of imperial victory. An echo of former freedom-perhaps painful, perhaps hopeless-but alive. Like a roast in the ashes.\n\nAnd some of those who read those leaflets were already beginning to prepare."
 gir.74.a:0 "Fuck you Fishermann"
 
 gir.75.t:0 "The Epic Speech"
 gir.75.d:0 "In 1923 the Russian Civil War came to a complete end with the defeat of the White Cause on the battlefield, we sailed away from the Crimea, fled to Mongolia and flew to all corners of the world. The Reds took over our homeland and poisoned the brains of the Great Russians with their Jew idea of "Communism".\n\nIn Emigration we created for ourselves the real idea of Russia, Great and Indivisible. Many organisations were created which made plans to return to our homeland and build a strong Russian power.\n\nAnd now after the collapse of the Soviet Union in 1991 there was hope for the restoration of our country, we persevered in our endeavours to regain our homeland and now we are entrenched in our old positions, we have a strong and steadfast Tsar, it is time to return our old possessions that have been detached from the empire! We declare war on the bandit formations that call themselves "governments" of so-called Poland, Lithuania, Latvia, Estland and we take back the Grand Duchy of Finland. We return ours, Russia returns. Let the overseas paws that took away our lands be cut off!"
 gir.75.a:0 "LONG LIVE RUSSIA RAAAH!!!"
 
 gir.76.t:0 "The Claims"
 gir.76.d:0 "After humiliation of Russian people's in 1918, Poland, Finland and Baltic States terrorists rebelled creating so called "independent" nations. This was a shock to no one, since bolsheviks were nothing but old men lusting for power, knowing nothing about stability of our past empire. In 1991, once again, they proved their incompetence in leading such strong country, with Kazakhstan, Kyrgystan and the rest of Central Asia, Caucasus falling to the its ethnic leaders, our anger only grew.\n\nAgainst the background of double-headed eagle, which shone as a symbol of our indomitability, at the behest of the imperial regime, Russian troops have gone through fire and sword, restoring the power and majesty of Russia to the lands that were once part of our great empire. Fierce battles and strategic victories swept across our lost territories, as well as the steadfastness of our faith in the justice of Imperial rule.\n\nConquest of the territory became subservient to the empire, proving once more Russia has returned to It's previous glory."
 gir.76.a:0 "The Conquest Has Only Just Begun"
 
 gir.77.t:0 "Economic Measures"
 gir.77.d:0 "After the unification of Ukraine under our tricolour, the whole of Malorossiya from the Carpathian mountains to the steppes of the left bank found itself in an economic vacuum, each region is different from the other in economic terms.\n\nSomewhere the economy is quite stable, somewhere the infrastructure was destroyed by wars or local gangs that ruled the regions. But now all that will change, our [DPR.GetName] announces the inauguration of a campaign of centralised economic reform.\n\nRus Empire in the shortest possible time will carry out industrialisation, restoration of infrastructure, bureaucratic reforms, tax and currency reforms."
 gir.77.a:0 "Let's get to work, gentlemen!"
 
 gir.78.t:0 "The Letter?"
 gir.78.d:0 ""Your Imperial Majesty!\n\nI am writing to You with great reverence and humility, for You saved my Motherland from Nazism, and as a man who once stood at the helm of Malorossiya, believing that he served for the good, I am sincerely grateful to You and to the Russian army! Now, having left that land, I feel only bitterness and regret. Everything I did - building roads, raising industry, trying to strengthen people's faith in stability - did not bear the fruit I had hoped for. Perhaps I did not see everything or understand everything in my time. But I know one thing for sure: the only way to peace and prosperity is to stand under the blessed sceptre of Your Majesty and entrust the fate of Malorossiya to your wise, unwavering authority.\n\nYour Majesty, of course, You remember how I, as president of so-called Ukraine, was engaged in the development of Donbas, this proud coal region of our country. I did not try in vain, I attracted investments, helped the plant to work and the miners to earn money. But what if the people are now in disarray and doubt? Thank God that there are those who remember the good times when Russian people lived in unity, when there was no such discord and vacillation. It is with such thoughts that I am addressing You.\n\nI know that I cannot hope for mercy without reason. But I do not stand empty-handed. The nature of my merits is simple but weighty: over the years of governing the country, I have learnt the power of governing, the art of communicating with the people. I feel their longing, their waiting for a strong leader who would bring them back under Your wing. Many people still remember my rule, when the streets were calm and the borders were intact. You understand that in order to bring Malorossiya back under the sceptre of the empire, You need a man who can speak to the people in their language and rule in such a way that they trust.\n\nTherefore, I dare to offer my services in strengthening order and restoring faith in the Empire. If You deem me worthy of any service - be it a governor's post or any other important rank - I will serve honestly, to the best of my ability and knowledge, for which I am ready to vouch with all my previous deeds. I helped when it was necessary to strengthen the economy, built roads, organised football championships - I did everything for people. And now I am ready to do more, if it will serve Your Majesty. I am sure that this time, too, under Your leadership, Malorossiya will find its true path, returning to the bosom of the Empire.\n\nYour humble servant,\nViktor Fyodorovich Yanukovich""
 gir.78.a:0 "What kind of silly nonsense is this? We don't need a political corpse."
 gir.78.b:0 "Greet this honourable citizen of the Empire!"
 
 gir.79.t:0 "Offer from the [DPR.GetName]"
 gir.79.d:0 "[DPR.GetLeader] from [DPR.GetName] want to support our goverment!"
 gir.79.a:0 "We very gratefull for them!"

 gir.80.t:0 "[DPR.GetName] want to annex us"
 gir.80.d:0 "[DPR.GetLeader] from [DPR.GetName] want to annex our country!"
 gir.80.a:0 "Russian brothers must be united!"

 gir.81.t:0 "True Malorossian Patriot"
 gir.81.d:0 "Morning on the Degtyarovskaya street, Kiev. After the capture of the city, it was undergoing a cultural transformation with many Russian flags and names being placed here. As a part of those transformations, today was the opening of the statue, dedicated to the author Oles Buzina.\n\nOles Buzina was a real patriot of Malorossia, as a part of the 'threeunited Russian nation'. While living in Ukraine, he debunked several Ukrainian national myths, like the personality of Taras Shevchenko, and wrote works about the Malorossian closeness to the Velikorossian people. His views were deemed marginal by many, but during his life he managed to stay true to his ideals and his nation.\n\nHe was killed by the Ukrainian government, and now he will be commemorated. A statue is opening near his home, where a shot was put in his head. At the opening ceremony, one local poet has read a pamphlet, sounding like this:\n\n'We are Oles Buzina, we carry the flame!\nWe will fight for Russia, we will honor his name!'"
 gir.81.a:0 "Will his face be seen everywhere?"
