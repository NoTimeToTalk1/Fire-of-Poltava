 gir.23.t:0 "Holy Meeting"
 gir.23.d:0 "Ilarion was sitting on the terrace of his house, sipping his Americano and reading his daily independent newspaper, 'New Russian Word', which operates to this day. He took a sip and spat it all over the newspaper as it claimed the revival of the All-Russian Government.\n\nThen the phone in the kitchen rang. He ran to it, catching his breath, and asked:\n"Who?"\n"Ilarion, it’s Girkin. We need a faithful and uncorrupt church here in Donetsk."\n\nIlarion asked no further questions. Without hesitation, he packed his belongings into an old, ripped travel bag with the word 'RUSSIA' written on it and flew to Donetsk.\n\nAfter a few hours in the air, the runway of the abandoned Donetsk airport was about to receive its first guest in six years. Girkin hurried toward Ilarion’s private jet, shook his hand, and greeted him with joy:\n"It’s nice to see a truly independent metropolitan in this corrupt world."\n"It’s nice to see you too, Girkin" Ilarion replied with an American smile. "I’m surprised by the condition of the airport. I never thought it could still serve people."\n"Well, that’s what we have for now. Anyway, back to what this trip was intended for."\n\nGirkin then escorted Ilarion to his car. He showed him around Donetsk, and then they drove to the Regional Administration building, where the All-Russian Congress was based. Girkin introduced Ilarion to its members. They all sat around the table.\n\nGirkin handed him a document and a pen. Everyone waited for Ilarion’s signature, but it didn’t take long for him to decide. Everyone in the building cheered; the joy knew no bounds!\n\nROCOR was finally in a place it could call home — Russian Donetsk."
 gir.23.a:0 "For Russia, for the Faith!"
 
 gir.24.t:0 "First Session"
 gir.24.d:0 "Today has come the significant day that will mark the beginning of a new philosophy of the Russian World and a rethinking of our greatness.\n\nLong ago, during the Russian Turmoil, all parties were supposed to convene the Constituent Assembly democratically and decide the future structure of the Russian state. However, it was dispersed by the Bolsheviks.\nEven before that, 'Zemsky Sobor' existed — an early prototype of parliament, which, during the Time of Troubles, gathered clergy, nobility, and commoners to elect a new Tsar in 1613.\n\nNow, when we are once again on the threshold of a new beginning, we must gather different sides, interests, and ideological currents. This time, no one will stop us.\n\nToday was the first session of the All-Russian Monarchist Congress.\nThe сongress began in a special building in the capital. Politicians arrived one by one: some in modest cars, others by taxi or limousine together with their party members.\nGirkin and his supporters, however, stood out the most. They arrived in armored foreign vehicles, and their appearance was strikingly different. Girkin wore an old officer’s uniform adorned with decorative elements, several orders, and a cap with a gilded cockade. His men were dressed in replicas of the attire worn by state councillors and officials of the Russian Empire, emphasizing his status.\nYet he had gathered everyone here not only to demonstrate his authority, but also to listen to others.\n\nThe meeting was held in a large hall reminiscent of a courtroom, but filled with Romanov symbols, Russian flags, and coats of arms from different eras. Girkin opened the congress with a welcoming speech, after which he asked everyone present to introduce themselves.\nVarious personalities who have gained popularity or influence in right-wing circles, such as Prosvirnin, Malofeev, Bykov, Rogozin, and many others, were present.\n\nMany of us have our own individual vision of Russia — some want to continue Stolypin’s work, some want to see a constitutional monarchy, and some insist on the full restoration of autocracy. A significant part of the division also lies in the question of who would take the Tsar’s throne.\nThere are two main support groups: the 'Kirillovichi', who also call themselves Legitimists, and supporters of Romanov Family Association, who deny the exclusive claims of the Legitimists to the throne and instead advocate for the election of a more suitable monarch, such as Rostislav Romanov, in a manner reminiscent of the Zemsky Sobor. Of course, there are also other pretenders, such as the Leiningens, Hohenzollerns, and Karađorđević. There were even those who wanted to proclaim Colonel Girkin Tsar, or even themselves!\n\nHowever, we are all united in one thing: the desire to see Russia free from neo-Bolshevism and former security officers at its head. Today’s Russia is not the Russia our people deserve, and not the Russia for which Russian officers died in the Ice Campaign. We are going back."
 gir.24.a:0 "God Save our Motherland!"
 
 gir.25.t:0 "Beating the Reds Once Again"
 gir.25.d:0 "It was an ordinary day in Donetsk. An old woman was walking across Lenin Square to buy herself some food when she suddenly witnessed a horrifying sight.\n\nSeveral construction workers and a mobile crane stood near the Lenin statue. The crane was already lifting the monument from its pedestal. The old woman clutched her chest in fear and shock.\n\n"What are you doing?!" she cried.\n\nThe foreman replied, "We’re removing the Bolshevik legacy. Can’t you see? The chief ordered us to get rid of all this communist shit."\n\nThe crane operator was not very careful, and accidentally dropped Lenin while lifting him. The statue hit the ground and shattered into many pieces.\n\nThe old woman could not believe her eyes. She remembered the time when Lenin statues were being torn down across Ukraine by fascist banderites, and now it was happening here as well.\n\nShe collapsed onto the pavement, unable to comprehend the events unfolding in the new Novorossiya."
 gir.25.a:0 "Off with communism!"
 
