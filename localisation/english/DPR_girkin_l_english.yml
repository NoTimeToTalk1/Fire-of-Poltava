 DPR_wagner_presence:0 "Wagner Presence"
 DPR_wagner_presence_desc:0 ""
 
 DPR_colonels_plan_1:0 "Colonel’s Plan"
 DPR_colonels_plan_2:0 "Colonel’s Plan"
 DPR_colonels_plan_3:0 "Colonel’s Plan"
 DPR_colonels_plan_4:0 "Colonel’s Plan"
 DPR_colonels_plan_5:0 "Colonel’s Plan"
 DPR_colonels_plan_6:0 "Colonel’s Plan"
 DPR_colonels_plan_7:0 "Colonel’s Plan"
 DPR_generalissimos_plan:0 "Generalissimo’s Plan"
 DPR_colonels_plan_1_desc:0 "Colonel Igor Girkin is embarking on his grand plan. It is based on a simple but important idea: order and discipline must become the main principles of Novorossiya. The troops are being reorganized, with key positions assigned to dedicated commanders. For now, however, much remains in the early stages. The economy is bursting at the seams, and the people are only beginning to get used to the new leadership."
 DPR_colonels_plan_2_desc:0 "The second stage of Girkin’s plan involves strengthening his personal power. The military begins to play a key role in the management of the state. The civilian administration is now tightly controlled, and all spheres of life begin to obey the military logic. The army becomes the backbone of the country, and national interests come to the fore."
 DPR_colonels_plan_3_desc:0 "Novorossiya is going into full military mobilization mode. Colonel Girkin has realized that without a powerful army, Novorossiya cannot survive in a brutal political and military environment. The army is modernized, conscription intensifies, and large-scale exercises begin. At the same time, aggressive reforms are undertaken to simplify the military bureaucracy and centralize economic control for the needs of the front."
 DPR_colonels_plan_4_desc:0 "Igor Girkin is transforming Novorossiya into a powerful stronghold of imperial ambitions. The colonel has openly declared his intention to regain influence across the former Soviet Union countries and to escalate the geopolitical struggle with the West. The economy has been completely switched to military rails, and patriotic rhetoric is becoming the primary tool for mobilizing the population."
 DPR_colonels_plan_5_desc:0 "Colonel Igor Girkin is almost satisfied. His tough measures and ruthless strategies have already brought many victories, but he won’t stop here. Now it’s time to pursue a more ambitious goal — the final elimination of all internal and external enemies. His plan now becomes the basis of a new era in the Imperial army, where all power is concentrated in the hands of one man."
 DPR_colonels_plan_6_desc:0 "And there it is — the complete domination of the army and Girkin’s personal ascent to the pedestal of power. The state becomes a tool for the realization of his imperial ambitions. The entire country is mobilized, borders are fortified, and the army is ready for decisive action. The internal opposition has been destroyed, and the people are finally united around the idea of restoring the Empire. The time has come for a decisive blow to the enemies of Novorossiya."
 DPR_colonels_plan_7_desc:0 "And there it is — the complete domination of the army and Girkin’s personal ascent to the pedestal of power. The state becomes a tool for the realization of his imperial ambitions. The entire country is mobilized, borders are fortified, and the army is ready for decisive action. The internal opposition has been destroyed, and the people are finally united around the idea of restoring the Empire. The time has come for a decisive blow to the enemies of Novorossiya."
 DPR_generalissimos_plan_desc:0 "With the approval of his plans by Emperor Rostislav, the all-powerful Igor Girkin received the highest possible status achievable. No longer a mere colonel, Generalissimo Girkin, rising from guerrilla commander to the supreme leader of the Novorossiyan forces, deserved this status beyond question. There were those who doubted him, who questioned his vision, his plan. But look at them now. Girkin stands at the peak of his life, having achieved everything he set out to accomplish. He is finally satisfied."
 
 DPR_FSB_1:0 "Local FSB Departments"
 DPR_FSB_2:0 "Imperial Guard Service & SBCR"
 DPR_FSB_1_desc:0 "As the state stabilizes, regional FSB departments are granted greater autonomy to manage internal affairs. This decentralization allows local branches to operate with increased independence, ensuring quicker responses to threats and dissent in the provinces. However, it also raises concerns about loyalty and oversight, as power becomes more diffuse."
 DPR_FSB_2_desc:0 "To address concerns about loyalty and oversight, a new internal security service has been established to monitor and suppress dissent, replacing traditional FSB departments in the regions. The Special Bureau for Combating Revolutionism has also been created. Its members are known for their aggressive anti-Ukrainian sentiment and unwavering loyalty to the imperial cause, having adopted the mantra 'FUCKUKRONAZI' as their primary operational focus. This ensures strict control over Novorossiyan citizens."
 
 DPR_new_friends_1:0 "Our New Friends"
 DPR_new_friends_2:0 "Our New Friends"
 DPR_new_friends_3:0 "Our New Friends"
 DPR_new_friends_1_desc:0 "The Russian All-Military Union and White Guard sympathizers have rallied under our banner. These groups, long nostalgic for the lost empire, have found common cause with the new imperial project, eager to witness the restoration of traditional values and the empire’s military might."
 DPR_new_friends_2_desc:0 "The once-independent Cossacks have officially thrown their lot in with the empire, solidifying a new alliance. Known for their fierce loyalty and military tradition, they now stand as staunch defenders of Novorossiya’s interests, boosting both local governance and security in the border regions."
 DPR_new_friends_3_desc:0 ""
 
 DPR_white_legacy:0 "White Legacy"
 DPR_empire_strikes_back:0 "The Empire Strikes Back"
 DPR_white_legacy_desc:0 "The time of a great empire, lost but not forgotten.\n\nOnce upon a time, before those fateful days of 1917, Russia was not just a country — it was a colossus. The empire stretched from the Baltic to the Pacific, held in its hands the destinies of nations and was a bulwark of the Orthodox faith. The empire has fallen, but its spirit is alive, burning in the hearts of patriots. They remember those who fought for the Russian banner and for the white idea. And even if a hundred years have passed, the destiny is to revive again what once belonged to the Russians by right. Russia will return to its former greatness! These are not just words. It’s the call of blood, the call of our ancestors."
 DPR_empire_strikes_back_desc:0 "The Empire is back, and now no one can escape its vengeance!\nGenerations of patriots have waited so long for this moment. The Empire is not only reborn, but also ready to show the world its power. The patriots of the fatherland will reclaim all that was lost and punish those who dare to stand in our way. The Empire is avenging itself, not for revenge, but for justice. Enemies tremble because they know the Empire is back, and its blow will be crushing."
 
 DPR_promoting_orthodoxy:0 "Promoting Orthodoxy"
 DPR_russian_church:0 "The True Russian Church"
 DPR_promoting_orthodoxy_desc:0 "Faith is strength, and strength is in God. We need God. In this storm that has broken over Russia, our only anchor is faith. But faith is not just prayers in churches. It’s a force that will unite the nation. We cannot go forward without God’s blessing. Let everyone know: Orthodoxy is an integral part of the Empire, its heart. The people must believe, because only in this way can we strengthen the spirit and overcome any trials. God is with us, so we will win."
 DPR_russian_church_desc:0 "The saints have returned from exile to revive the faith!\nExiled by the Soviet regime, they are now back home. Priests driven to America and Europe are serving their homeland once more. They return not just as clergy, but as symbols of the restoration of everything that was destroyed. Their prayers, their guidance — all will lead Russia back to the true path of faith. Old men with grey beards, wise and stern, stand at the altars yet again, ready to lead the people forward."
 
 DPR_monarchical_coalition_1:0 "Monarchical Coalition"
 DPR_monarchical_coalition_2:0 "Monarchical Coalition"
 DPR_monarchical_coalition_3:0 "United Monarchical Front"
 DPR_monarchical_coalition_1_desc:0 "Monarchists... shattered but not defeated. Once powerful, they are now fractured, each holding onto their own truth. Yet, from the ruins of the old, something new is being born. Now they are weakened, divided by disagreements about the future. But God knows: this is only temporary. Somewhere deep within each of them remains a belief in the restoration of the Russian throne and the return of autocracy. And in the darkest hour, their faith will help them rise again, like a phoenix from the ashes."
 DPR_monarchical_coalition_2_desc:0 "Still divided, but one step closer to unity. Their voices grow louder; the differences are still there, yet something has shifted — there is now understanding. They begin to move in the same direction, not yet as one, but together. The realization is clear: they can wait no longer. The people are calling for a leader, for a king. And when the moment comes, the monarchists will gather under a single banner. And that moment is fast approaching."
 DPR_monarchical_coalition_3_desc:0 "United under one flag, we are invincible!\n\nThis is it! The fusion of all forces that strive for the greatness of Russia. Monarchists, soldiers, Cossacks, even ordinary people — now we are all one. There is but one goal: to resurrect the Empire! The Grand Coalition stands on the brink of a new dawn. When people are united by a shared vision and unshakable passion, nothing is beyond their reach, and nothing can stop them."
 
 DPR_white_culture_1:0 "The White Culture"
 DPR_white_culture_2:0 "The White Culture"
 DPR_white_culture_3:0 "The White Culture"
 DPR_white_culture_1_desc:0 "The White Movement exemplifies the ideals of honour and devotion to the fatherland, fighting against the Red Terror and other threats to the state. Officers and soldiers of the White Army, steadfast in their oath to the end, stand as paragons of these ideals. Today, their names are once again on people’s lips, and their deeds continue to inspire new warriors of the country. The Fatherland honours their memory, for in it lies the future."
 DPR_white_culture_2_desc:0 "The White Movement came into existence with one simple mission: to destroy the Red Plague that had spread across Russia. Some battles were lost, but the war was not over. Today, the white banner rises higher than ever before, carried by those unwilling to forget the past. And now, the White Movement, proud of its ideals and supported by the entire state, is ready to declare: Bolshevism will survive no longer!"
 DPR_white_culture_3_desc:0 "With the destruction of all threats to the revived White Guard movement, our leader, Igor Girkin, built an ideal community that would stand for centuries. Drawing on the works of past Russian ideologues, such as Baron Wrangel and General Denikin, the Generalissimo has established a militarized, loyal, and brave society capable not only of existing and prospering but also of defending itself. His contribution to history is immeasurable, and his name will forever be written in chronicles and books. As long as his greatness endures, this country has nothing to fear or beware of."
 
 DPR_strategic_initiative:0 "Strategic Initiative"
 DPR_strategic_initiative_desc:0 "It is time to stop being defensive. The Empire cannot afford to sit back and allow the enemy to grow stronger. We must seize the initiative. Our strikes will be lightning-fast, our victories uncontested. Do not simply prepare for war — strive for it. For the truth is: only in battle can true greatness be forged. The goal is to secure the most advantageous position before our enemies realize that a new era has begun — the Age of New Russia."
 
 DPR_malorussia_will_be_ours:0 "Malorussia will be ours!"
 DPR_parliamentarism_propaganda:0 "Parliamentarism Propaganda"
 DPR_liberal_empire:0 "The Liberal Empire"
 DPR_embracing_ukrainianness:0 "Embracing Ukrainianness"
 DPR_truly_new_era:0 "A Truly New Era"
 DPR_malorussia_will_be_ours_desc:0 "Malorossiya is weak and divided, consumed by internal strife and bleeding itself dry, while we stand stronger than ever. Our ambitions extend far beyond the Donets and the Dnepr, and given the current situation in those lands, we now have a real opportunity to fulfill them, crushing every foolish politician and weak-minded commander, and reclaiming what rightfully belongs to us. Malorossiya will be ours!"
 DPR_parliamentarism_propaganda_desc:0 "The promotion of parliamentarism in society will soon yield the result desired by the Emperor, provided we act swiftly, prudently, and effectively. The people still remember elections, both national and regional. And although not all of them are accompanied by good memories, they probably crave this more than the uncompromising power of some unknown commanders from remote Siberian or Ural villages. Democracy will be restored; however, it will take time, and our country and society need to be fully prepared for it."
 DPR_liberal_empire_desc:0 ""
 DPR_embracing_ukrainianness_desc:0 "With the formation of the Empire of Rus on a multicultural basis, our state now faces perhaps one of the most difficult and controversial challenges — the Ukrainian language and culture. The lands of Ukraine, or rather 'Malorossiya' as some chauvinists still refer to it, are mostly inhabited by Ukrainians, who largely recognize their own culture, practice their autocephalous church, honour their own heroes, and speak their own language. These people represent the majority of our cultural and political space, and we have no right to ignore them when making decisions or implementing policies. The Ukrainianness of these lands is indisputable, and only a fool would seek to oppose it. We will support the efforts of Ukrainians to preserve their heritage and traditions, and not just support, but help and stand side by side with them in this, as this is the only way we can truly achieve understanding and coexistence."
 DPR_truly_new_era_desc:0 "Our all-glorious Emperor Rostislav, who challenged the military dictatorship and chauvinistic system, has triumphed over hostile traditionalism and built a new, strong, and united empire according to his own vision. From this moment forward, our state is no longer one of repression, authoritarianism, prohibitions, and tyranny, but a tsardom of freedom, democracy, liberty, and prosperity. His reign has brought many positive and even beautiful outcomes, but it is far from over. May our Emperor live long and continue to guide his people and his country under his generous rule!"
 
 DPR_in_blood_and_purpose:0 "United in Blood and Purpose"
 DPR_peaceful_and_harmonic_empire:0 "Peaceful and Harmonic Empire"
 DPR_bad_consequences:0 "Bad Consequences"
 DPR_in_blood_and_purpose_desc:0 "Having put an end to all internecine feuds, the imperial house stands strong and united once more. The people are loyal to it, the nobility is loyal to it, the army is loyal to it, and now they are even loyal to themselves. Great achievements and glorious times await our empire in this state of affairs, so may God bless our family and our country, for our ambitions know no bounds!"
 DPR_peaceful_and_harmonic_empire_desc:0 "Our empire has finally reached its peak. Nothing can stop its development or ambitions, nothing can match its strength and determination. We have found peace in our lands and harmony in our society; however, this is not the end of the story. There are still many decisions and challenges ahead, and God help us if death and crises arise. Yet we will survive, just as we have survived these hundred years in exile."
 DPR_bad_consequences_desc:0 "The Empress is dead... The nation is shattered, the political circles divided, and the army in disarray. There is much work ahead to restore stability in my... uh... our empire, but we will handle it, as we have always done."
 
 DPR_absolute_power_1:0 "Absolute Power"
 DPR_absolute_power_2:0 "Absolute Power"
 DPR_absolute_power_3:0 "Absolute Power"
 DPR_absolute_power_4:0 "Unlimited Power"
 DPR_absolute_power_1_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. The Emperor is still weak compared to his boundless potential, but not for long..."
 DPR_absolute_power_2_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. Imperial power has already managed to break free from the shackles first imposed by the army and politicians, and later by the Empress. However, it is still far from absolute..."
 DPR_absolute_power_3_desc:0 "With the establishment of the new imperial power, our state began a series of large-scale reforms designed to consolidate power in the Tsar’s hands and weaken the influence of the newly formed oligarchy and military circles, whose impact on the internal situation of the Empire had already led to disastrous consequences in the past. The sovereign’s current power and authority are immense, approaching their absolute form, yet still face resistance from the strongest and highest circles of the state, albeit just temporarily..."
 DPR_absolute_power_4_desc:0 "Imperial power is unlimited! At last! Let the great tsars of the past rejoice, for their descendants have restored the glory to the mighty House of Romanov! Henceforth and forever, nothing shall stand in the way of our divinely chosen Tsar, whose judgments are nothing but the truth for all his subjects. Let his kingdom rejoice, for the Emperor is ready to rule and govern it as his own beloved child!"
 
 DPR_no_ukraine:0 "There is no Ukraine!"
 DPR_with_righteous_hike:0 "With Righteous Hike"
 DPR_anti_monarchist_resistance:0 "Anti-Monarchical Resistance"
 DPR_harnessed_wealth:0 "Harnessed Wealth"
 DPR_no_ukraine_desc:0 "The Malorossiyan independence movement, created by the Austrians, has finally been thrown back to its very foundations — to the cellars and swamps where it belongs. Neither 'Ukraine' nor 'Ukrainian culture' has ever existed and could not exist, for both are mere inventions of the enemies of the triune Russian people, devised to weaken our unity and strength. We will tolerate no separatism! Hunt those pigs down, every last one of them!"
 DPR_with_righteous_hike_desc:0 "The time to reclaim our rightful lands has finally come! The Russian army and state have bravely risen against the usurpers of their ancestral lands. Let our enemies tremble before our wrath, for we will defeat and destroy them, as God and all the Russian heroic might are behind us! Forward, brothers!"
 DPR_anti_monarchist_resistance_desc:0 "With the reconquest of the original Russian lands, our empire now faces insurgent, anti-state resistance from locals who refuse to recognize the imperial authority. How dare they?! These bastards think they can defy us; let us show them how wrong they are!"
 DPR_harnessed_wealth_desc:0 ""
 
 DPR_new_economic_course_1:0 "New Economic Course"
 DPR_new_economic_course_2:0 "New Economic Course"
 DPR_new_economic_course_3:0 "New Economic Course"
 DPR_new_economic_course_4:0 "New Economic Course"
 DPR_new_economic_course_5:0 "New Economic Course"
 DPR_new_economic_course_1_desc:0 "The new economic policy aims to establish a sustainable and robust economic foundation to restore imperial greatness. It is necessary to move away from the chaos and lawlessness of the Soviet and post-Soviet eras in order to build a strong and organized economic system based on patriotism, self-sufficiency, and industrial progress."
 DPR_new_economic_course_2_desc:0 "In the past, Russia was an industrial power, and our goal is to regain that status. The state will invest in heavy industry, rebuild factories, and establish new production centres that will provide the Empire with everything it needs. Resources are not infinite, but now is the time to use them to their full potential."
 DPR_new_economic_course_3_desc:0 "Industry will not be the only engine of the new Russia’s economy. Agriculture will also receive new stimulus for development. The goal is to turn the devastated fields of Malorossiya into fertile lands that will not only feed the Russian people but also produce goods for export. The country will never again depend on foreign food supplies."
 DPR_new_economic_course_4_desc:0 "The market cannot be left to itself — the state must take control of the strategic sectors of the economy. Energy, transport, and the military industry will all be under the direct control of the Empire. This will ensure stability and security in the face of external threats."
 DPR_new_economic_course_5_desc:0 "The Empire cannot live solely in the past. For it to move forward, we must become leaders in technology and science. The development of modern technologies and their integration into the economy will be key factors for the future. We must develop our own innovations so that we do not depend on the West and prepare new generations of scientists and engineers who will lead the country into the future."
 
 DPR_military_reorganization_1:0 "Military Reorganization"
 DPR_military_reorganization_2:0 "Military Reorganization"
 DPR_military_reorganization_3:0 "Military Reorganization"
 DPR_military_reorganization_1_desc:0 ""
 DPR_military_reorganization_2_desc:0 ""
 DPR_military_reorganization_3_desc:0 ""
 
 
 ## FOCUSES
 DPR_beginning_of_a_new_era:0 "Beginning of a New Era"
 DPR_beginning_of_a_new_era_desc:0 "Finally, after many years of non-stop fighting, on the frontline, in politics and on the streets, power in Novorossiya has been given to those who deserve it. The National Wing, led by Igor Girkin, undoubtedly has ambitious plans, and with their victory in the presidential election, nothing will stop him from implementing them. Long live Novorossiya!"
 
 DPR_give_them_a_fight:0 "Give Them a Fight"
 DPR_give_them_a_fight_desc:0 "The Bolshevik and oligarchic scum who tried to steal our victory in the presidential election could not accept their loss, and so they launched their own propaganda campaign to overthrow the newly formed government. We will not allow this to happen. Russia has been taken over by both oligarchs and Bolsheviks in the past, and we know the results of these actions all too well. Never ever again! We may destroy this land and die in the trenches, but we will not allow them to bury another dream alive!"
 
 DPR_arm_the_loyalists:0 "Arm the Loyalists"
 DPR_arm_the_loyalists_desc:0 "We will need people to fight back against the Sovietophile and oligarchic scum who want to deprive Novorossiya and its people of a future. People who can fight for our ideals and who share our vision of the future. Fortunately, our voters, who were numerous, are precisely in solidarity with our plans and policies, and they can be the last nail in the coffin of the old regime. We have to militarize these people, teach them to fight, shoot, defend, but most importantly, to win!"
 
 DPR_discrediting_always_works:0 "Discrediting Always Works"
 DPR_discrediting_always_works_desc:0 "To achieve complete victory over our enemy, we must not only defeat them on the battlefield but also bury their name alive. By engaging loyal media and Internet resources, we can further discredit their 'people’s movement', luring their supporters to our side, depriving them of the chance to resist longer. Reputation is everything, and that is what we will take away from them."

 DPR_punch_in_the_liver_nobodys_forever:0 "Udar V Pechen’ - Nikto Ne Vechen"
 DPR_punch_in_the_liver_nobodys_forever_desc:0 "The whole nation is ready to fight against its real oppressors. The war, which will change the course of life once and for all for the people of not only Donbass, but the whole of Novorossiya, is coming to an end, and all we have to do is to pierce the rotten heart of the remnants of the old regime with a blade sharpened by the people's anger."
 
 DPR_give_them_guarantees:0 "Give Them 'Guarantees'"
 DPR_give_them_guarantees_desc:0 "The communist and oligarchic-liberal forces that have not come to terms with their loss in the presidential election are provoking the population to unrest and creating disorder, which we cannot ignore, but going against them directly, using force, will not lead to anything good. We need to be more cunning than them, to be smarter. They use slogans about guarantees and rights, so let's give them those! Apart from that, they have nothing good in their repertoire, and when this comes out, we will see which side the people will take."
 
 DPR_liberalize_the_constituion:0 "Liberalize the Constitution"
 DPR_liberalize_the_constituion_desc:0 "In order to appease our opponents, we have no choice but to accept some of their demands for amendments to the new constitution that would allow them to at least partially meet the expectations of the voters and show them that they are not simply making a hundred promises, none of which will be fulfilled. Right now, these nits are too strong to be crushed like cockroaches, but by letting them feel the freedom and spirit of victory, they will let their guard down, and our time will finally come."
 
 DPR_prepare_for_hell:0 "Prepare for Hell"
 DPR_prepare_for_hell_desc:0 "By introducing liberal amendments to the state constitution, we have given the rats the opportunity to crawl out of their holes and spread their wings. All of them have made their voices heard, and this is exactly what we have needed. Now, the hardest part remains - to prepare the security forces and strike teams with the allied press for the final blow that we will deliver to the lice of Novorossiyan society. It's time to finally reduce this carrion to ashes..."
 
 DPR_colonels_gambit:0 "Colonel’s Gambit"
 DPR_colonels_gambit_desc:0 "Feeling freedom of action, the pseudo-democrats of our politics crawled out of their holes and began to shout loudly about victory, giving us all the information we needed on each of them. We know who they are, how dangerous they are, where they live and gather. It's time to cancel the amendments, which have played their role perfectly, and unleash an armageddon on the scum who are poisoning our society with their rotten tongues. Leonid, Natalia, we'll meet you at the hanging tree!"
 
 DPR_keep_the_order:0 "Keep the Order"
 DPR_keep_the_order_desc:0 "By striking a devastating blow to the last enemy of our ideology in the country, we have returned fear and chaos to the streets, which must be stopped immediately. Now is not the time to lose our heads, but it is also far too early to celebrate. The nationalist leadership has eradicated the last vestiges of the old repressive anti-people regime, but now it faces a much higher and more difficult goal - the unification of all the people of Novorossiya."
 
 DPR_contract_with_the_devil:0 "Contract with the Devil"
 DPR_contract_with_the_devil_desc:0 "Having restored instability in the country by destroying the pseudo-opposition forces, we have launched a process that we are unable to control or stop on our own. Criminal groups have seized parts of the country, while various radicalized factions have launched a series of unsuccessful and meagre coup d'état or uprising attempts, all of which we need help to contain. Wagner's group, under the command of Yevgeny Prigozhin, has been helping the people of Donbass to resist the Ukrainian invaders for more than 6 years, and they could use their help again..."
 
 DPR_integration_of_pmcs:0 "Integration of PMCs"
 DPR_integration_of_pmcs_desc:0 "Wagner and other private military campaigns operating in Donbass over the past few years have proven themselves very well both on the battlefield and in the fight against the internal enemy, and many of the commanders of these campaigns have even managed to win the personal trust of Supreme Commander-in-Chief Girkin. PMCs must be integrated into the state apparatus and become the internal troops of our country!"
 
 DPR_facing_the_problems_alone:0 "Facing the Problems Alone"
 DPR_facing_the_problems_alone_desc:0 "Despite all the problems that have fallen on our heads since the eradication of the last enemies of our ideological doctrine, we have no right to show weakness by asking for anything from anyone. This is a test that we must pass on our own to show not only our people but the whole world that we are a strong and independent nation that will conquer, not be conquered!"
 
 DPR_plan_the_key_to_success:0 "Plan — the Key to Success"
 DPR_plan_the_key_to_success_desc:0 "No idea can be implemented without a clear and well-thought-out plan. Our ambitions reach unimaginable boundaries, and with faith in our leader, we will achieve these goals and conquer the unimaginable, but for all this, we need a clear strategy. The Supreme Commander-in-Chief and Leader of the Nation, Igor Girkin, is a military and political genius who has proven this long ago, but fate has given him another chance to show his worth to the world. Our lord has a plan. A big plan. And we will follow it, no matter what!"
 
 DPR_call_to_old_friends:0 "Call to Old Friends"
 DPR_call_to_old_friends_desc:0 "Having connections with former stars of the Russian intelligence services, our supreme leader is able to interest them all in returning to the good old days, when intelligence was subordinate only to the authorities, not to the man with the fattest wallet, and when the stimulus was faith in justice, not in acting in the interests of individual shadowy clients."
 
 DPR_use_proven_methods:0 "Use Proven Methods"
 DPR_use_proven_methods_desc:0 "Time-tested methods are always the best. No intelligence service in the world can come up with anything that the Russian FSB has not already tried, and therefore the only sensible solution in our situation is to use everything that has proven successful in Russian intelligence operations."
 
 DPR_security_service_of_novorossiya:0 "Security Service of Novorossiya"
 DPR_security_service_of_novorossiya_desc:0 "Every real state that cares about its safety needs a security service. Since 2014, Novorossiya has had a parody of the Russian GRU and its own FSB office, but we are certainly not a puppet of the Kremlin. We are proud and self-sufficient, and over the years we have realized that we can only rely on ourselves. From now on, our security will be in the hands of our compatriots only, and operations abroad in our interests will be carried out only by our own intelligence services."
 
 DPR_contact_the_rovs:0 "Contact the ROVS"
 DPR_contact_the_rovs_desc:0 "The Russian All-Volunteer Union, or ROVS, was a military organisation founded by white emigrants with Baron Wrangel at its head. This union brought together thousands of members of the Russian emigration who were forced to leave their homeland due to the Bolshevik occupation, and for many decades tried to contribute to the destruction of the Red tyranny, which they finally succeeded in doing. After the fall of the Soviet Union, the ROVS was able to return to Russia, but the local oligarchs who had managed to seize power did not take their existence and attempt to regain influence positively and began to suppress the movement. However, after the uprising of the people of Donbass, the ROVS, led by a close friend of the Supreme Commander-in-Chief, Igor Ivanov, was able to reassert itself, siding with the uprising both politically and militarily. Despite their contribution to the liberation struggle of the local population, the oligarchs who initially seized power here were also very critical of Ivanov and his men, but after Mr Girkin's victory in the elections, nothing will prevent the ROVS from taking its rightful place in Novorossiya's politics and contributing to its future."
 
 DPR_recognize_whites_legitimacy:0 "Recognize Whites' Legitimacy"
 DPR_recognize_whites_legitimacy_desc:0 "The White Movement, which was the only hope for saving the legacy of the Russian Empire, despite its loss to the Red barbarians, made an extraordinary contribution not only to the history of the Russian people but also to the future destruction of the Soviet system. However, the government of White Russia, which was eventually forced into exile, never received any recognition from the world, unlike the Bolsheviks who settled on our rightful lands. This step may not mean anything, but we must recognize White Russia as the only legitimate Russian government since 1917, even if it is only as a gesture of respect, and let the Reds who still live on this land salivate with anger."
 
 DPR_how_glorious_is_our_lord_in_zion:0 "Kol` Slaven Nash Gospod` V Sione"
 DPR_how_glorious_is_our_lord_in_zion_desc:0 "How glorious our Lord is on Zion, \nThe tongue can not express. \nHe’s great in Heavens on the throne, \n In blades of grass on earth He is great. \nOh Lord, Thou art Glorious everywhere, \nAt night, by day Thy shining is the same. \n\nThy lamb with golden fleece \nSymbolizes Thee for us; \nWith ten-strings psaltery \nWe burn incense for Thee. \nAccept our thanksgiving \nAs a fragrant offering. \n\nThou illume mortals by the sun, \nThou love us, God, as your children, \nThou satiate us with blessed meal \nAnd create for us a city on Zion. \nThou, oh God, visit the sinners \nAnd nourish them with Thy flesh. \n\nOh God, let our voices \nEnter Thy dwelling, \nAnd let our tender sense \nRise to Thee like morning dew! \nFor Thee with heart we’ll raise an altar, \nFor Thee we sing and glorifying!"
 
 DPR_message_to_cossacks:0 "Message to Cossacks"
 DPR_message_to_cossacks_desc:0 "The Cossacks, who for centuries have served as an example of endurance, courage, and loyalty of Russian men, have always been one of the main pillars of Russian statehood. From the times of the Moscow Tsardom, through the centuries of the empire's prosperity, to the civil war between the White Guard and the Red traitors, they have defended our homeland, our customs and our mentality, and represented our highest ideals. Now, the struggle for the same customs, for a similar statehood, has flared up again. The Cossacks defended them before, and they will help us now, maybe not as a separate estate, but as a symbol, as an example."
 
 DPR_invite_local_leaders:0 "Invite Local Leaders"
 DPR_invite_local_leaders_desc:0 "The Cossacks as such have been purged and eliminated in extraordinary ways over the past hundred years. First, the Bolsheviks tried to eradicate them, and then the oligarchy that seized power in Russia turned them into circus clowns and propaganda pawns, spoiling their fame. However, not all descendants of these glorious warriors have accepted the death of the Cossack tradition. Even the hosts "loyal" to the Russian government want to regain their lost glory, and there are many of them. We will invite all the Cossacks of the world to our lands, where they will be able to fight for their ancestors in our army ranks with dignity."
 
 DPR_restore_the_don_host:0 "Restore the Don Host"
 DPR_restore_the_don_host_desc:0 "The Don Cossack Host has always been a bastion of Russian bravery and spirit, from where courageous men, trained in the art of war since childhood, went to serve the people of Russia. Warriors from the Don were the elite among the imperial regiments, and in battles, they gloriously defeated not only Caucasian cannibals and Turkish bloodsuckers, but also bravely repelled the Red usurpers, both during the Civil War and the Second World War. Over the years, the Don Cossacks have proved their irreplaceability and crucial role, and without them, we will not be able to restore Russia's great glory."
 
 DPR_from_the_ground_up:0 "From the Ground Up"
 DPR_from_the_ground_up_desc:0 "A lot has happened in recent years, decades, dozens of long bloody decades. Representatives and defenders of the idea of true Russian statehood, our glorious conservatism, and natural imperial power have survived murders, concentration camps, and abuse, and have been forced to flee abroad to preserve this idea and themselves. But the century of shame of Russian monarchism is over. We, the inhabitants of the industrialized and forgotten Donbas, have taken on this burden, and it is we who will revive what has long been forgotten, through the joint efforts of all those who still stand, who still believe."
 
 DPR_remember_our_true_roots:0 "Remember Our True Roots"
 DPR_remember_our_true_roots_desc:0 "The roots of the almighty Russian people and all their deeds will always be with them, and we must glorify the glorious acts and achievements of the Velikorossy over the centuries of their existence. Behind all the conquests and heroic feats of the people stood the Great Knyaz, Tsar and later the Emperor, who wisely managed the country's vast bureaucracy. Their glory will live forever because we will remember them forever!"
 
 DPR_rematch_of_1917:0 "Rematch of 1917"
 DPR_rematch_of_1917_desc:0 "In 1917, the Russian Empire, the most powerful country at the time and the largest state of Russians, fell. The emperor was betrayed by his own ministers, pseudo-democrats like Kerensky tried to transform the original monarchical country into a republic, and in the process allowed dozens of pseudo-nations to start forming their own "sovereign states". This all culminated in the Bolshevik coup when supporters of utopian fairy tales seized power in an already dead empire and continued to destroy its legacy. The brave White Guards were in the minority, suffering the betrayals of the Malorossians and other peoples who dared to raise their hands against the supreme nation and lost to the red tyranny, but we are determined to bring justice. We will take revenge for every humiliation that year brought us, and all our rivals, all the enemies of the Russian state will pay."
 
 DPR_revival_of_spirituality:0 "Revival of Spirituality"
 DPR_revival_of_spirituality_desc:0 "Spirituality was, is, and will be one of the main components of individual nations and people. It is faith that has been and remains the key motivation for action, for struggle, in the name of the Almighty God and all that is holy, against all that is evil. It was with faith in their hearts that the White Guards went into battle against the Red scum a century ago, and now we must do the same as their grateful descendants, even though our enemies have changed. We must return the spirituality and faith that the Soviets eradicated to the hearts of the people because this is where their strength and our strength lies."
 
 DPR_return_of_the_canonical_church:0 "Return of the Canonical Church from Overseas"
 DPR_return_of_the_canonical_church_desc:0 "The Russian Orthodox Church, which now sits in Moscow and has stretched its tentacles throughout the space where the Reds once had influence, is a spit in the face of the entire believing world, and not a church. A group of KGB operatives who put on priestly vestments and learnt how to properly recite prayers, nothing more. All of this has been gaining influence over all Orthodox Russians for a long, long time, while our true church has been forced to hide overseas since the civil war. The pseudo-popes need to be challenged, and no one as a legitimate church is capable of doing so."
 
 DPR_the_first_all_russian_monarchical_congress:0 "The First All-Russian Monarchical Congress"
 DPR_the_first_all_russian_monarchical_congress_desc:0 "Since the defeat of the White Movement, the Russian monarchist idea has lost its strength and durability. The ROVS, which tried to continue the work of its predecessors, tried to defend our dear values for decades, but in the end, they became just a grain of sand in the political space. If we want to truly raise the issue of restoring the empire, we must take this initiative and burden, and unite and lead traditional Russian values into their bright future."
 
 DPR_overcome_the_disputes:0 "Overcome the Disputes"
 DPR_overcome_the_disputes_desc:0 "Since the fall of the empire, supporters of Russian monarchism have become a dispersed ideological group, with each micro-party having its own separate beliefs and not recognising other monarchist forces. This must come to an end. The Russian monarchist idea will have no future unless we, the supporters of the restoration of imperial power, unite to achieve a common goal. Down with the differences, we are all in this together!"
 
 DPR_glorify_the_true_heroes:0 "Glorify the True Heroes"
 DPR_glorify_the_true_heroes_desc:0 "While for almost a century, the heroes of the "Great Patriotic War" or internationalist soldiers have been remembered in towns and villages, in every home, the real heroes of Russia have completely disappeared from popular memory. Alexander Nevsky, Peter the Great, Catherine the Great, Nicholas II, Anton Denikin, and many other heroes of the Russian people have fallen into oblivion, while ordinary murderers and punishers are still being glorified everywhere. Enough of this!"
 
 DPR_renounce_the_soviet_heritage:0 "Renounce the Soviet Heritage"
 DPR_renounce_the_soviet_heritage_desc:0 "The lands of Novorossiya are deeply steeped in the Soviet past and the spirit of the "great and powerful union of peoples". The abscess that the Bolshevik system managed to implant in the brains of every second person living in the occupied lands was passed down from generation to generation and turned the inhabitants of each city into a true homo sovieticus. Every monument to the workers of that era, every monument to the leaders of those times, and every place named after one of them is a spit in the face of our great nation, and every positive memory of the Red terror and occupation is a dagger in our pure and brave hearts. The Soviet Union fell, but it is not dead. The time has come to complete the work of Generals Kornilov, Denikin, Wrangel and others, and to bury this dark page of our history once and for all."
 
 DPR_united_traditionalist_front:0 "United Traditionalist Front"
 DPR_united_traditionalist_front_desc:0 "After gathering around one table all those who had not yet lost faith in the idea of restoring Russian monarchism and the revenge of true all-Russian conservatism, the "congress" we had initiated some time earlier resembled a gathering of barking dogs that could only shout and argue. However, months of hard work eventually yielded the result we and the entire Russian society, wherever its representatives may be, desired: the delegates were able to reach compromises on all major issues. From now on and forever, the Imperial Party, united in purpose and methods, will carry a ray of truth and dignity, not only to us and our people but also to the future All-Russian Emperor."
 
 DPR_dive_into_big_politics:0 "Dive into 'Big Politics'"
 DPR_dive_into_big_politics_desc:0 "Everyone has to start somewhere, especially newly formed states that will only have to prove themselves to the world and earn recognition. Novorossiya, which was formally established in 2014, has since assumed the status of an isolated regional power, under constant threat from the evil forces that have been trying to crush the spirit of the local people. However, sooner or later everyone comes out of the shadows, and our time has arrived. Novorossiya no longer needs to hide behind anyone and remain a petty shadow of others, but rather become a global power on its own."
 
 DPR_time_for_strategic_games:0 "Time for Strategic Games"
 DPR_time_for_strategic_games_desc:0 "If we want to expand our influence to all the territories of the historical lands of Novorossiya, we need to build a clear offensive strategy with foreign policy components. Among the Malorossian military commanders and governors, there are many uninformed individuals whose weaknesses we can exploit, as well as enough who are not entirely alien to our cause and who might take our side for certain... benefits."
 
 DPR_claim_our_real_borders:0 "Claim Our Real Borders"
 DPR_claim_our_real_borders_desc:0 "The lands of Novorossia are historically consolidated and united, and it is our sacred duty to restore their integrity by driving the Malorussian tyranny out of them. Our troops will cross the fields and forests, the straits and rivers, and do the impossible to bring justice to the people of Novorossiya, who were deprived of their freedom many years ago. Forward, brothers!"
 
 DPR_find_the_loyal_ones:0 "Find the Loyal Ones"
 DPR_find_the_loyal_ones_desc:0 "Having restored the territorial integrity of the Novorossiyan lands, we have increased the territory under our control and expanded our bureaucratic and administrative apparatus significantly. Lacking a broad understanding of the local situation, we have to find loyal locals who know their land and will help us govern it well and lead it to a bright and prosperous future."
 
 DPR_consolidation_of_the_south:0 "Consolidation of the South"
 DPR_consolidation_of_the_south_desc:0 "Having regained control of all the territories of historical Novorossiya and established full-fledged administrations and a functioning bureaucracy, we are ready to fully integrate these lands with the brotherly Donbas. This is the beginning of a new era for the Russian and Malorossian peoples..."
 
 DPR_start_the_debate:0 "Start the Debate"
 DPR_start_the_debate_desc:0 "As there is no longer any discord in the party, the only task left to it is to choose the best candidate to assume the title of Russian emperor. We will organize a large-scale debate and dig up every descendant of the Romanovs, selecting only the best and most promising of them."
 
 DPR_return_power_to_the_rightful_hands:0 "Return Power to the Rightful Hands..."
 DPR_return_power_to_the_rightful_hands_desc:0 "That's it, the Congress has reached its verdict. The new head of the entire Russian nation and future legend of our national history, together with a family, is on the way to our capital, while the streets are preparing for a full-scale parade and, of course, a magnificent coronation ceremony. Long live the emperor, and Russia as well!"
 
 
 DPR_and_become_a_mentor:0 "...and Become a Mentor"
 DPR_and_become_a_mentor_desc:0 "As predicted a century ago, a worthy heir will return to the throne. And so it happened. However, Rostislav, still a raw young man with no knowledge of local politics and no mastery of administrative and economic management, needs the help of his most loyal servants to learn how to truly rule the nation. The Great Commander-in-Chief Igor Girkin, who has devoted all of himself to the revival of the empire from what little was left of it, has offered himself to the emperor as his tutor and advisor, and there is no chance that His Majesty will refuse..."
 
 DPR_protect_the_new_order:0 "Protect the New Order"
 DPR_protect_the_new_order_desc:0 "The empire has returned, despite the fact that no one believed in it... however, though the state destroyed in 1917 was nominally restored, its actual legitimacy is no more than the rights of the Spanish crown to Austrian lands. Not only do we have no support abroad, but we don't have the greatest support at home either, though it is domestic recognition that is crucial for us. We have to prove to people that we will not betray them, that we will protect them, and that we will bring prosperity to their houses."
 
 DPR_rejoice_in_what_we_have:0 "Rejoice in What We Have"
 DPR_rejoice_in_what_we_have_desc:0 "The Russian Empire had borders so vast and immense that it could rightfully be considered the largest continental state in history, while the Mongol horde could hardly be called a state at all. However, despite our enormous territorial rights and claims, the return of anything other than Malorossia, which is still torn apart by chaos, is unrealistic and generally impossible. Other states will perceive us as a threat to their existence and will try to destroy us if we do not give up our claims to their lands, and unfortunately, we will have to take this step..."
 
 DPR_unite_little_russia:0 "Unite Little Russia"
 DPR_unite_little_russia_desc:0 "The lands of Malorossia, which have been plunged into complete chaos for several years now, caused by a bunch of local politicians and commanders who decided that they were capable of ruling at least something, must be restored to order. These territories, rich in resources and people, are rightfully ours, and as it can be easily seen, we are the only ones who can bring peace to them. We will take back what is ours, and return harmony to the people and their lives!"
 
 DPR_no_more_mistakes_of_the_past:0 "No More Mistakes of the Past"
 DPR_no_more_mistakes_of_the_past_desc:0 "The reign of Nicholas II, the last Russian emperor, taught us a lot. What to do, what to avoid doing, and most importantly, how to make people so desperate and disloyal that it would end with a revolution. We must finally learn this lesson, once and for all, and never allow this to happen again, so as not to repeat a cycle that will take tens of millions more lives."
 
 DPR_conflict_of_interests:0 "Conflict of Interests"
 DPR_conflict_of_interests_desc:0 "With the coronation of Rostislav Romanov as Russian emperor and the subsequent appointment of Igor Girkin as Prime Minister, a rivalry between supporters of the tsar and his premier began in the imperial party and the state apparatus in general. While some uncompromisingly support all actions of their emperor, who, as it turned out, was perhaps the only liberal member of the party who advocated cooperation with the rest of the world, others, mostly representatives of the "old guard", i.e. the party that Girkin had founded from members of the ROVS and other allies shortly after winning the presidential election, were sceptical of the imperial authority and supported the old policies of their chief. However, only time and the charisma of these two will ultimately show who is truly worthy of his title..."
 
 DPR_new_times_new_politics:0 "New Times — New Politics"
 DPR_new_times_new_politics_desc:0 "Despite the fact that the Russian Empire has been reborn from the ashes, we cannot remain in the bubble that traditionalists are trying to create, ignoring all the changes that have taken place over the past century. The empire will live and prosper, but this will not be achieved by clinging to the past at all costs."
 
 DPR_decentralization_is_what_we_need:0 "Decentralization is What We Need"
 DPR_decentralization_is_what_we_need_desc:0 "One of the main weaknesses of the old empire was the complete centralisation of power in the hands of the emperor and his entourage. As we all know, this country ceased to exist, among other things, because of all the problems that its structure produced, and we cannot repeat the same mistakes if we want to avoid this sad fate. The decentralisation of the state apparatus is vital, not least because local people are aware of their own local affairs and problems, and they are definitely better suited to ensure the development of their regions than one of the central government departments."
 
 DPR_we_belong_to_the_civilized_world:0 "We Belong to the Civilized World"
 DPR_we_belong_to_the_civilized_world_desc:0 "Despite all the desires of the "old guard" politicians to preserve the isolation status of our country, as our "colleagues" from Moscow have already managed to do, we are an integral part of the world, culturally and economically corresponding to our status as a state that respects the world order. As the successor not only to the imperial but also to the Ukrainian statehood, we also have agricultural responsibilities to the world, and we have no right to simply walk away from them."
 
 DPR_on_guard_of_heritage:0 "On Guard of Heritage"
 DPR_on_guard_of_heritage_desc:0 "With the restoration of imperial power, we must do everything we can to protect what makes us the true successors of the Tsardom - traditions. Without traditions, customs, and everything that confirms our kinship with the state of Nicholas the Second and all the rulers before him, we are nothing, and all kinds of "progressives" need to understand this."
 
 DPR_power_belongs_to_the_strongest:0 "Power Belongs to the Strongest"
 DPR_power_belongs_to_the_strongest_desc:0 "Any talk of decentralisation is simply dangerous for the survival of our empire. The central government is the only thing that will be able to save the country from chaos and collapse, and it is simply stupid to deny this."
 
 DPR_we_only_need_ourselves:0 "We Only Need Ourselves"
 DPR_we_only_need_ourselves_desc:0 "What will contact with all sorts of European unions and the United States bring us? That's right, nothing good. They will criticize our political position, undermine our internal situation, and provide support to terrorists active on our territory - that's what contact with the "world" will bring us. We are self-sufficient, and we do not need and will not need anyone in our struggle!"
 
 DPR_time_to_resolve_the_issue:0 "Time to Resolve the Issue"
 DPR_time_to_resolve_the_issue_desc:0 "The internal political struggle within our government has reached a critical point. We can no longer balance the authority of the emperor and the prime minister while they both try to lead the country in completely different ways, and we must finally put an end to this tug-of-war."
 
 
 DPR_emperor_by_the_will_of_the_people:0 "Emperor by The Will of the People"
 DPR_emperor_by_the_will_of_the_people_desc:0 "Having revived the Russian Empire, the people who made it possible saw the idea of restoring the old state as a chance to repeat the imperialist and chauvinistic success of the past centuries and to implement their despotic and militaristic ideals. Girkin, the leader of such politicians and commanders, was the main ideologist of this "concept" and tried his best to implement it, despite the opposition of the Throne. Our country was hit by strife. However, in the end, with the help of God and with the strength of truth and will, the All-Russian Emperor Rostislav I was able to win this duel of fates, wishing to rule the state not as a bloody despot but as a loving father."
 
 DPR_contact_the_united_nations:0 "Contact the United Nations"
 DPR_contact_the_united_nations_desc:0 "If our country wants to get at least some of the political recognition necessary for a brighter future and cooperation with what we hope will be our future partners and allies, we must become a member of the United Nations, whether some "isolationists" like it or not. It is through the UN that our thorny path to recognition by world powers of us as their legitimate comrades, and more importantly, as members of the civilized society, which we certainly are, is being led."
 
 DPR_new_frontiers_of_civilization:0 "New Frontiers of Civilization"
 DPR_new_frontiers_of_civilization_desc:0 "There is no doubt that civilisation is slowly coming to an end east of our borders. Today's "Russian Federation", which is itself a relic of the Soviet Union and occupies the eastern edge of the empire, does not position itself as part of a civilized, Western community, and tries to shackle itself to conservative authoritarian militaristic isolationism as much as possible. We are the frontier of the Western world, the last place where our common values have support among both people and government, and we will hold this line because it is our duty to do so, now and forever."
 
 DPR_gain_international_recognition:0 "Gain International Recognition"
 DPR_gain_international_recognition_desc:0 "By proving to the world that we were peaceful and willing to join the Western community, we were able to gain their trust and become a civilized society in their eyes. However, despite this, we are still not an official member of the UN. Representatives of the 'Ukrainian Government in Exile' emphasize that we are deceitful barbaric Russian invaders, yet it is clear to anyone that this is not even close to the truth. We have to fight for a seat in this organisation because we, and not these "exiles", are the legitimate government on the lands of Ukraine, and we are therefore the successors of the Ukrainian state that was created in 1991."
 
 DPR_parliamentarism_is_the_future:0 "Parliamentarism is the Future"
 DPR_parliamentarism_is_the_future_desc:0 "The parliamentary system has been known to the world since ancient times. Since ancient times, parliament has been the peak of state development and remains the best model of governance today. Our country must move towards parliamentarism urgently, as this is the key to our dear democracy and the future of all nations."
 
 DPR_the_rule_guided_by_the_peoples_desires:0 "The Rule Guided by the People's Desires"
 DPR_the_rule_guided_by_the_peoples_desires_desc:0 "Popular rule is the only correct form of government. Democracy is the foundation of the human tradition of government. Authoritarianism is a poison that oppresses the peoples of all countries where despots have been able to seize power, while in free, democratic societies, power is based on the wishes of the people who serve the country. Democracy is the only right way, and we will achieve it!"
 
 DPR_form_the_verkhovna_duma:0 "Form the Verkhovna Duma"
 DPR_form_the_verkhovna_duma_desc:0 "With the increasingly powerful democratic and liberal reforms of our empire, the time has come to establish a full-fledged national parliament, the Verkhovna Duma. This body would hold an absolute majority of executive power, leaving some to the imperial throne as a supervisor of its policies in the public interest, and the first elections would be held immediately!"
 
 DPR_reviving_the_vision_of_a_liberal_empire:0 "Reviving the Vision of a Liberal Empire"
 DPR_reviving_the_vision_of_a_liberal_empire_desc:0 "With the establishment of relations with the world and the creation of a truly democratic state apparatus, we have reached a point where we must explicitly state and prove that the term "empire" has nothing to do with chauvinism and aggressive anti-people policies. Our country is based on the foundations of liberalism and national welfare, on the ideas of democracy and freedom, and by retaining the hereditary ruling title, the Emperor of Rus will act only in the interests of his own people, but also of the peoples of other countries suffering from authoritarian oppression. We are peaceful and freedom-loving, yet not weak, and we will defend our ideas and help those who share them."
 
 DPR_the_key_is_love_not_fear:0 "The Key is Love, not Fear"
 DPR_the_key_is_love_not_fear_desc:0 "As we build a fully functional state on lands inhabited by many different nationalities, we cannot allow chauvinism and xenophobia to form the basis of our domestic policies or public sentiment. Oppression always leads to anger, anger to blood, blood to pain, and pain to desperate actions, and the result of such actions can only be the end of our young and promising state. Many people will oppose this, especially in the government, but for the sake of our future and the harmony of all peoples, we will take this step."
 
 DPR_emperor_of_all_men:0 "Emperor of All Men"
 DPR_emperor_of_all_men_desc:0 "Despite the fact that from the very beginning, the new empire was built as a new Russian state, occupying the lands of Ukraine, it was simply physically impossible. These lands are home to many different peoples, from Ukrainians, who are the majority, through the second largest Russians, to Jews, Poles, Bulgarians, Greeks, and many others. Our state has to be built on a multicultural basis to survive, as it has always been intended to be, so we will not tolerate any nationalist rhetoric!"
 
 DPR_embrace_ukrainianness:0 "Embrace Ukrainianness"
 DPR_embrace_ukrainianness_desc:0 "Ukrainians, who represent the majority of the population of our empire, simply cannot but be the backbone of the country because of their numbers. Although Russian has been and remains the official language, Ukrainian is extremely widespread, especially in the western regions, while Ukrainian politicians form the majority of regional authorities. Ukrainians are the backbone of our population, no matter how much all sorts of Girkins may not want to admit it, so Ukrainian must not only be the official language but also have identical rights to Russian. Not only that, but we must require all senior politicians to be bilingual and give speeches and other announcements in both Russian and Ukrainian if we really want to have Ukrainians as the friends that they are."
 
 DPR_show_ideological_tolerance:0 "Show Ideological Tolerance"
 DPR_show_ideological_tolerance_desc:0 "Since the rule of the Girkin's cabinet, a one-party system has been established in our country, where all left-wing and liberal forces have been banished by state decrees of the Prime Minister. This cannot continue. If our country truly intends to be a bastion of free and progressive ideas, as the emperor wishes, we must immediately lift the ban on the establishment of political organisations not subordinated to the Imperial Party, and encourage the creation of independent political parties and groups based on the ideas of democracy."
 
 DPR_quoting_the_peace_of_augsburg:0 "Quoting the Peace of Augsburg"
 DPR_quoting_the_peace_of_augsburg_desc:0 "Girkin's policy of promoting and imposing traditionalist Orthodoxy has already proved fatal for many religious movements and communes. As a free state that values human rights, we cannot impose any faith or religious principles on anyone like some medieval barbarians. Our state must be secular, and one of its motives must be a slightly paraphrased summary of the Peace of Augsburg - whose choice, their religion."
 
 DPR_time_to_come_back_to_life:0 "Time to Come Back to Life"
 DPR_time_to_come_back_to_life_desc:0 "After several years of continuous battles between politicians and the military in a fallen Ukraine, chaos and violence were the main export and import products of this territory. This kind of sentiment among people will not lead to anything good, so we have to show and prove to everyone that this nightmare, this hell, is over, and that they are safe. We can forget about inter-street shootings and executions, it's time to return to a normal life..."
 
 DPR_everyone_is_welcome_here:0 "Everyone is Welcome Here"
 DPR_everyone_is_welcome_here_desc:0 "Like every healthy and progressive society, we must be friendly to immigration. Despite the loud statements of many populists, immigrants can be not only a burden to our economy, but also its strong supporters, which, if handled correctly, can only strengthen our position. By creating good economic and social conditions for newcomers, we can become a new centre of immigration from regions such as the Caucasus, Central Asia, but also Moldova, parts of the "Russian Federation" and possibly even the Arab world, and by playing our cards right, we can turn this "potential burden" into our ace in the hole."
 
 DPR_a_truly_new_era:0 "A Truly New Era"
 DPR_a_truly_new_era_desc:0 "Having overcome all the obstacles that kept our state and nation from the Western community and civilisation, having implemented an incredible number of reforms and radically changed our social, foreign, economic and many other policies, we have truly managed to break free from the isolationist and traditionalist chains in which our predecessors had shackled us. Membership in the UN, Ukrainianisation and multiculturalisation, liberalisation and democratisation of the political environment, and adoption of immigrant-friendly policies - all these are our great achievements, and they were made in record time. Our empire will continue to flourish, and with such ambitions, we have no choice but to eventually take our place as one of the most powerful and progressive nations in the world. Glory to the Rus, glory to its peoples, and glory to its Emperor!"
 
 
 DPR_exercise_our_right:0 "Exercise Our Right"
 DPR_exercise_our_right_desc:0 "In recent months, which have been difficult for our domestic politics, it has become quite clear that the emperor cannot rule with his head alone. As we feared, life in the West has strongly influenced his views, and that is why his absolute power is not only alien to the wishes of the people but also dangerous to the existence of the empire as such. As the Prime Minister of the Russian Empire, I, Igor Gikrin, am compelled to act in the interests of my people and my state, even if this is contrary to the interests of His Majesty."
 
 DPR_return_allies_to_the_game:0 "Return Allies to the Game"
 DPR_return_allies_to_the_game_desc:0 "With the return of the monarchical system to our mighty state, the successor to the Russian Empire, many people who played a key role in restoring this system were excluded from the highest governmental structures at the request of the emperor and his sycophantic henchmen. These people sacrificed a lot for this country, put their hearts and souls into it, and unlike some, they really know what they are doing. They need to be brought back. Immediately!"
 
 DPR_expand_our_private_club:0 "Expand Our Private Club"
 DPR_expand_our_private_club_desc:0 "With the return of old friends to the helm, we faced a new challenge - a lack of reliable staff. It is not yet clear who is on whose side in this government, and with the reform of the bureaucracy, we have a lot of positions that need to be filled with people loyal to our goal. There are several individuals who have shown their commitment to our ideals for a long time and who have also invested a lot in the struggle, so why not accept them into our "elite club"?"
 
 DPR_relieve_the_tsar_of_the_boring_work:0 "Relieve the Tsar of the 'Boring Work'"
 DPR_relieve_the_tsar_of_the_boring_work_desc:0 "His Majesty still retains enormous powers in the state, but it seems that the constant bureaucratic red tape is very tiring for the young tsar. He could surely use some help with these minor matters, while we can take on even more of his power, at the same time underlining the legitimacy of our actions with his approval."
 
 DPR_constitutional_nuance:0 "Constitutional Nuance"
 DPR_constitutional_nuance_desc:0 "The Constitution of our country has not yet reached its "final form". With the restoration of imperial power, a new, temporary constitution was created, written with the consent of all members of the monarchical congress, but with the understanding that a new one would be written by the emperor and his advisers. Since we are such advisers, and we have already been able to take over enough authority to partially ratify the document, we are in a position to change the royal powers without His Majesty's consent, and it would be a sin not to take advantage of this..."
 
 DPR_safeguard_the_ideals:0 "Safeguard the Ideals"
 DPR_safeguard_the_ideals_desc:0 "From the very beginning, our state was built on the ideals laid down by the great theorists of Russian statehood, such as Anton Denikin, Pyotr Wrangel, and many others. Their ideals, despite the actual defeat of the white movement, continue to live on in us, and no one dares to threaten them anymore. We will do everything to protect them and follow them because this is our destiny."
 
 DPR_no_compromises:0 "No Compromises"
 DPR_no_compromises_desc:0 "Our ideology, our state's ideology, is infallible. Both the long-dead leaders of the Russian state movement and those who are now in His Majesty's government have contributed to its creation and supplementation. The state policy of the empire that we have implemented is the most ideal form of itself, and any "compromises" on it are absolutely unacceptable!"
 
 DPR_new_state_cabinet:0 "New State Cabinet"
 DPR_new_state_cabinet_desc:0 "With the destruction of the internal opposition, our government has finally become what it was before the restoration of imperial power - authoritative and the only legitimate one. His Majesty Rostislav I. has already agreed to most of our terms out of choice, so it is time to form the only right and capable cabinet, which will include only the most trusted and experienced people of His Generalissimo Majesty."
 
 DPR_in_denikins_footsteps:0 "In Denikin's Footsteps"
 DPR_in_denikins_footsteps_desc:0 "Anton Denikin, the undisputed leader of the White Movement and White Russia, has become an absolute legend in Russian history for the ages. His figure has already been the subject of so many legends, and so many heroic deeds that it is hard to believe everything at first. His Generalissimo Majesty is undoubtedly the second Denikin in Russian history, and he deserves great respect as well. As the saying goes, legends should be respected while they are alive, because it is simply too late afterwards..."
 
 DPR_new_white_guard:0 "New White Guard"
 DPR_new_white_guard_desc:0 "The White Guard movement is the only thing that the new Russian Empire must ideologically orientate itself towards. Their symbols will henceforth be our symbols, their marches will be our marches, their awards and titles will be also ours, and so on. World history has never met more heroic people than these, and therefore they are the only ones we deserve to look up to as their only rightful successors!"
 
 DPR_let_them_feel_the_whip:0 "Let Them Feel the Whip"
 DPR_let_them_feel_the_whip_desc:0 "The Molorosian population of our empire probably doesn't understand that the days of "Ukraine" are over, trying to keep clinging to this absurd idea. Enough of this! The Emperor might have pitied them, but we are not as spineless as His Majesty, and we will act. Sanya! Get the tanks ready, we have work to do..."
 
 DPR_crush_the_dissatisfied:0 "Crush the Dissatisfied"
 DPR_crush_the_dissatisfied_desc:0 "Our recent actions have outraged a large number of people in our vast country. These fools have decided to fight us, but not with weapons like anyone else with a spine, but by protesting. Ha! Ban these ridiculous events and all the others like them! And if there are any brave souls, take them to the square to the hanging tree, and let's remember the old days."
 
 DPR_emperor_on_the_icon_generalissimo_on_the_throne:0 "Emperor on the Icon, Generalissimo on the Throne"
 DPR_emperor_on_the_icon_generalissimo_on_the_throne_desc:0 "With the complete victory of the White Guard idea in our empire, His Generalissimo Majesty, Igor Girkin, became known by the people as the "real tsar". Rostislav I., despite still being the emperor and de jure head of the Russian Empire, became a purely ceremonial figure, and in general, hardly appears in public, preferring to stay in his palace. However, despite this, the empire has gained its true and powerful ruler, and he may never take the throne of the emperor, but he will reign for a very, very long time, and he will become that legendary lord of these lands that will be remembered for eternity."
 
 
 DPR_and_restore_historical_justice:0 "...and Restore Historical Justice"
 DPR_and_restore_historical_justice_desc:0 "The empire finally received its deserved ruler of royal blood, as it had to after the end of Nicholas II's reign. Donbass politicians have indeed done a good job of restoring imperial power in these territories, but with the coming to power of a true descendant of the Romanovs, it is time to turn the parody of the empire into its true successor."
 
 DPR_loyalty_check:0 "Loyalty Check"
 DPR_loyalty_check_desc:0 "Despite the fact that the absolute majority of delegates to the monarchical congress favoured Empress Maria I when voting for the new ruler of the Russian Empire, there were those who supported her rivals. These people cannot be trusted, as well as all members of the Girkin administration who were not faithful to the idea of restoring imperial power, although they were few in number. We have to make sure that these people are truly loyal, and if they are not, deal with them. "
 
 DPR_secure_the_dynasty_once_and_for_all:0 "Secure the Dynasty Once and for All"
 DPR_secure_the_dynasty_once_and_for_all_desc:0 "The Russian Empire has returned, despite all the efforts of the Bolsheviks and other traitors to defame its name and erase it from existence. However, our legitimacy is not yet absolute. There are still many other descendants of royal blood in the world who have laid claim to the throne, and we cannot truly build an empire from the ashes if they remain in the way."
 
 DPR_summon_the_courtiers:0 "Summon the Courtiers"
 DPR_summon_the_courtiers_desc:0 "While in centuries of exile abroad, the Romanov dynasty and many of its members managed to establish their own courts in other countries, where only the most loyal of the family and their descendants served future emperors and princes. These people dedicated their lives to prove their loyalty, and the time has come for us to take them into our new empire and reward them for their efforts."
 
 DPR_consolidate_power_in_worthy_hands:0 "Consolidate Power in Worthy Hands"
 DPR_consolidate_power_in_worthy_hands_desc:0 "From the time of Girkin's rule, power has remained in the hands of a part of his so-called "clique", loyalists of this Denikin-obsessed fool. We cannot rely on them and must immediately replace such ministers and bureaucrats with faces who have had nothing to do with Girkin's regime and cabinet."
 
 DPR_deprive_girkin_of_his_arrogance:0 "Deprive Girkin of His Arrogance"
 DPR_deprive_girkin_of_his_arrogance_desc:0 "The arrogance of our so-called 'commander-in-chief', as it turned out, knows no bounds. This nobody, who came out of the blue, has certainly returned the throne to us and done everything to make the long-lost empire come to life again, but let him not hope that he will ever be able to take one of the highest places in the state because of his former merits. Now he is nothing compared to Her Imperial Majesty, just a subordinate who will do as he is told!"
 
 DPR_end_the_white_guard:0 "End the White Guard"
 DPR_end_the_white_guard_desc:0 "The cult of the White Guard, which Girkin and his friends from the ROVS have been building so diligently in recent years, is nothing more than the very centre of a major anti-state conspiracy, harmful to the empire and its future. The fanaticism behind the "proud warriors of White Russia" who have renounced the empire for the sake of their own warlords is dangerous for our current situation, and we simply must destroy it from the root. The time of the white guard is over, but as long as the ROVS and their other advocates are breathing, this idea will continue to bother us."
 
 DPR_about_the_mother_son_relationship:0 "About the Mother-Son Relationship"
 DPR_about_the_mother_son_relationship_desc:0 "The enmity in the imperial family has gone too far. The son turned against his mother, against his empress, in pursuit of his own ambitions, while she tried to suppress his thirst for achievement. This can escalate further and further, but eventually, there will come a final moment at which the patience of the demanders will break. There is nowhere to withdraw..."
 
 
 DPR_united_in_blood_and_purpose:0 "United in Blood and Purpose"
 DPR_united_in_blood_and_purpose_desc:0 "Divided by wealth, power, and ambition, the empire and all its top leaders are finally united in one goal - to build a state that will last forever. We have had internecine problems, not all of us like each other, but we are family, some by blood, some not, but it is what it is. We will rule these lands together, because this is the way, and there is no other one."
 
 DPR_protect_cossack_privileges:0 "Protect Cossack Privileges"
 DPR_protect_cossack_privileges_desc:0 "The Cossacks have always been the centre of attention among Russian culture and traditions for foreigners, but also for the people and the ruling elite. These men have always been the first to go to battle against barbarian invaders, and they have always heroically defended their country and their emperor. We will revive the Cossacks as a symbol of our state by creating a large Cossack Guard, granting them even greater privileges, and building an army based on Cossack strategies and with Cossack commanders."
 
 DPR_fair_distribution_of_power:0 "Fair Distribution of Power"
 DPR_fair_distribution_of_power_desc:0 "Our empire cannot be ruled by people without status or achievements, while the restoration of the nobility has expanded the circle of those worthy of ruling in these lands. There will be no peace and tranquillity in the country until all the new houses equally distribute power among themselves, leaving the imperial dynasty with the advantage, of course, so get the paper and ink!"
 
 DPR_form_the_imperial_cabinet:0 "Form the Imperial Cabinet"
 DPR_form_the_imperial_cabinet_desc:0 "With the recreation of pre-revolutionary social orders, we have reached the political point that has traditionally been at the centre of Russian political life for centuries. The imperial family, the church, the nobility, the Cossacks - these four groups now once again possess the power that the communists had taken from them, and it is time to pass a new decree establishing a full-fledged and indivisible imperial government, with representatives of all these classes represented on an equal and fair basis."
 
 DPR_peace_and_harmony:0 "Peace and Harmony in the Empire"
 DPR_peace_and_harmony_desc:0 "By solving our main internal problems and taking care of internecine feuds for power and influence, we were able to finally achieve harmony in our domestic politics. By dividing the privileges and powers among the individual estates as they should always have been, and by giving the heir to the throne the power with which he so desired to improve the state of our empire, we have truly achieved peace in this country, and are now poised to prosper."
 
 
 DPR_sorry_ma:0 "Sorry, Ma"
 DPR_sorry_ma_desc:0 "My patience is not eternal. I tried to find a way out, but you, Mother, left me no other option. I wanted to share our fate together as a family, but you did not want to accept me as an equal. And now I have to do what I have to do. Forgive me, Mother, but there is no other way..."
 
 DPR_standing_up_to_consequences:0 "Standing up to Consequences"
 DPR_standing_up_to_consequences_desc:0 "After the destruction of the burden of our empire in the form of the former empress, her surviving henchmen continue to hold the state in the same conditions as she did. Moreover, seeing a threat in the new ruler, they are clearly planning anti-state actions in their secret groups, and this must be stopped immediately!"
 
 DPR_witch_hunt:0 "Witch Hunt"
 DPR_witch_hunt_desc:0 "During that crucial night, when the Russian Empire lost its former ruler and gained a new one, not everyone supported this "change" on the throne. Many people eventually opposed such actions, but many of them decided to keep a low profile, plotting revenge for the fallen empress or even preparing for a new 1917. All of these people are dangerous to the new regime, but they can be good scapegoats for that night's incident, and it would certainly be a sin not to take advantage of it."
 
 DPR_time_to_wash_our_hands:0 "Time to Wash Our Hands"
 DPR_time_to_wash_our_hands_desc:0 "Having dealt with most of the internal enemies, we can finally proudly say that we have achieved our goal. Many old bureaucrats have died in mysterious circumstances, some managed to escape abroad where they would not be accepted anyway, but a lot of them have also ended up in our prisons and camps, and while the people are vainly trying to understand what is happening, we can finally cleanse our hands of blood by holding large-scale trials of these detainees and give the people what they have always and will always want - bread, circuses, and blood!"
 
 DPR_enshrining_absolutism:0 "Enshrining Absolutism"
 DPR_enshrining_absolutism_desc:0 "The policy of reviving the pre-revolutionary states in the empire introduced by the former empress was pathetic and ridiculous from the very beginning. Attempts to catch up with long-lost times can only lead to a repetition of past disasters, while the 1917 revolution was made possible, among other things, by the beginning of the "democratisation" and "decentralisation" of the empire. We cannot allow all sorts of pseudo-aristocrats and councillors to decide the fate of the state or to rule in defiance of the imperial authority!"
 
 DPR_no_one_is_above_the_tsar:0 "No One is Above the Tsar"
 DPR_no_one_is_above_the_tsar_desc:0 "Autonomy in statecraft and military affairs has never worked out well. Such things have always ended in uprisings, revolutions, coups, and similar disgraceful and disgusting actions. We must move towards the maximum centralisation of power in the hands most faithful to the state - the imperial hands, because the emperor will never betray the country or himself, while the Tsar himself is the highest that the state can have, and no one dares to be above him or to contradict him."
 
 DPR_letat_cest_moi:0 "L'État, C'est Moi"
 DPR_letat_cest_moi_desc:0 "As the only and sole ruler of the Russian Empire, Emperor George understands very well what power is and what he is capable of doing with it. Louis XIV, Ivan the Terrible, all these incredible examples of absolute rule are examples for him of how he himself should reign, and as the only person in power within the state, he is nothing less than a god in essence..."
 
 DPR_destroy_the_remnants_of_the_past:0 "Destroy the Remnants of the Past"
 DPR_destroy_the_remnants_of_the_past_desc:0 "Traditionalism in the army can be nothing more than open attempts at sabotage and betrayal. All these lavish and colourful uniforms, cavalry, bayonets longer than the guns themselves, usage of new recruits by higher ranking officers as their own slaves - all this is a pile of shit that needs to be cleaned out immediately. Our army can never be victorious as long as such attitudes and ideals prevail, and it is time to end it!"
 
 DPR_suppress_the_cossacks:0 "Suppress the Cossacks"
 DPR_suppress_the_cossacks_desc:0 "The Cossacks represent the biggest disgrace we have today. These relics of the past, these clowns with horses and sabres, are nothing more than idiots dressed in brightly coloured uniforms who can only dance in parades and ride their ponies, making them our greatest shame. We must immediately get rid of this trash from the army, reorganize their regiments and incorporate the soldiers into regular units, send their command and officers to prisons and camps where they belong, and execute their generals. Immediately!"
 
 DPR_generals_of_the_first_class:0 "Generals of the First Class"
 DPR_generals_of_the_first_class_desc:0 "Having destroyed most of the command and general staff because of their unprofessionalism and maliciousness, we were left with almost no officers. However, not everything is lost. For many years now, there have been a number of military academies throughout the empire where the future blossom of our army has been trained, and it is from there that we can get new army leadership. Bring these future empireal heroes here!"
 
 DPR_unlimited_power:0 "Unlimited Power!"
 DPR_unlimited_power_desc:0 "After so many efforts, so many streams of shed blood, nobody and nothing can deny the absolute and almost divine figure of His Majesty. Nobody and nothing dares to contradict Him, and nobody and nothing will dare to even think that His decisions might be wrong. His power is unlimited, His authority is absolute, and it will remain so for all eternity!"
 
 
 DPR_reestablish_the_malorossiya_governorate:0 "Re-establish the Malorossiya Governorate"
 DPR_reestablish_the_malorossiya_governorate_desc:0 "At the time of the great and mighty Russian Empire, the southwestern lands were divided into three governorates: Novorossiya, covering the northern coast of the Black and Azov Seas; Malorossiya, stretching north along the left bank of the mighty River Dnieper; and Kiev, covering the river's right bank. All three of these entities, along with the western, sub-Carpathian Russian lands, were later transformed into an entity that, since the Jewish-Bolshevik invasion, has called itself the "United Ukraine". This concept must be laid to waste. We must shred it and burn it to the ground, as this is the only way of restoring our former majesty, starting with our small homeland, the Little Russia, and let it be divided into two! Southern Novorossiya, which has preserved its Great-Russian grandeur - a mighty industrial powerhouse; and northern Malorossiya, born of the amazing rural Malorossian culture - amazing and enchanting in its natural and historical beauty."
 
 DPR_quell_resistance:0 "Quell Resistance"
 DPR_quell_resistance_desc:0 "The Malorossian serfs who think that after receiving their pseudo-state thirty years ago thanks to the fall of the Bolshevik regime, they are worthy of recognition and their own country are simply morons. These freaks pose a threat to the revival of the Empire in its entirety, and we will not tolerate them!"
 
 DPR_there_is_no_ukraine:0 "There is no Ukraine!"
 DPR_there_is_no_ukraine_desc:0 "Over the past century, rebellious Malorossians have been trying their best to prove their separation from the triune Russian people by promoting the idea of the so-called "Ukraine" - their dream utopia, where Russians will have no place and only Polish-Austrian servants will live and rule. But we broke their little dream, we shattered their sick fantasies. Ukraine has never existed, and we have proved it many times, but this time will be the last one."
 
 DPR_strengthen_our_new_bastion:0 "Strengthen Our New Bastion"
 DPR_strengthen_our_new_bastion_desc:0 "Having regained control of the lands of the Little Russian Gubernia, we must consolidate our positions in order to prepare for our march eastwards, towards the great capitals and centres of the fallen empire. We will fortify the border, and take up defensive positions, but all the while we will be preparing for the largest offensive in our history, one that will wipe out this misunderstanding called the "Russian Federation"."
 
 DPR_appeal_to_the_people:0 "Appeal to the People"
 DPR_appeal_to_the_people_desc:0 "The only thing we can rely on during our liberation campaign to the east is the population, which has been sick and tired of the indifferent policies of their so-called "government". These people have already forgotten who their emperor is, who their true ruler is, and our goal is to remind them of this. The empire lives, and will continue to live!"
 
 DPR_righteous_hike:0 "Righteous Hike"
 DPR_righteous_hike_desc:0 "The time has finally come to return our legitimate lands to us. The Bolshevik and then the oligarchic regimes have been profiting from them for a hundred years, but we have not forgotten these vast territories and these people, and we will take back what is rightfully ours. Russia, we are coming!"
 
 DPR_blessed_triumph:0 "Blessed Triumph"
 DPR_blessed_triumph_desc:0 "With faith in our glorious victory, steely endurance and will, and an indomitable spirit, we were able to put an end to a plutocratic anti-Russian regime that goes back to 1917, destroying the system established by the economic post-Bolshevik elite. The empire, once broken and virtually destroyed, has not only risen from the ashes but has regained its centres of Moscow and Petrograd and is now capable of anything. Victory belongs to the empire, to the all-powerful Russian state!"
 
 DPR_restoration_of_imperial_culture:0 "Restoration of Imperial Culture"
 DPR_restoration_of_imperial_culture_desc:0 "The peak of Russia's cultural development was during the era of imperial rule. The most famous painters, writers, musicians, but also architects and their monumental buildings - all of this comes from those times, that golden age. Nothing else will ever be able to challenge the superiority of imperial culture, so it makes no sense to refuse its promotion these days."
 
 DPR_harness_all_the_wealth_of_the_motherland:0 "Harness All the Wealth of the Motherland"
 DPR_harness_all_the_wealth_of_the_motherland_desc:0 "Our vast Motherland has always been known for its immense wealth in the depths of the earth. These endless reserves of all possible resources, precious minerals, black gold, iron and other ores - all of these are present in almost unlimited quantities in different parts of our empire. Previously, we were simply physically unable to extract and use all these riches to the maximum, but today's technology will allow us to use all this to the fullest, which we will do!"
 
 DPR_crowning_as_it_belongs:0 "Crowning, as it Belongs"
 DPR_crowning_as_it_belongs_desc:0 "Russian tsars and emperors have always been crowned for their divinely chosen reign in the Assumption Cathedral of the Moscow Kremlin. Even though our coronation had already taken place in the original Russian city of Kyiv, it was nothing compared to the most magnificent ceremony we will hold in Moscow!"
 
 DPR_learn_from_the_past:0 "Learn From the Past"
 DPR_learn_from_the_past_desc:0 "1917 was a truly pivotal year in Russian history. Then, all the filth of our internal politics and all the enemies of the monarchy and the empire proved themselves to be treacherous to Emperor Nicholas II, which ended in the destruction of the centuries-old Russian empire, though not forever. We will never allow the emergence of an internal enemy again and will nip the enemies of the empire in the bud!"
 
 DPR_ambitiousness_our_everything:0 "Ambitiousness — Our Everything"
 DPR_ambitiousness_our_everything_desc:0 "Our empire suffered enormous territorial losses, but as its successor, we have every right to these latitudes as our legitimate lands. The Caucasus, Central Asia, and Belarus, these territories are the most defenceless and weakest of all our other losses, and having remained loyal to the old Moscow regime, they have been left without allies, so it is time to strike a crushing blow against them!"
 
 DPR_challenge_the_world:0 "Challenge the World"
 DPR_challenge_the_world_desc:0 "It is absolutely undisputed that the lands of the Baltics, Finland, Poland, and Moldavia are our legitimate territories, which were barbarically separated from our empire after its destruction by the Bolsheviks. Today, most of these countries are members of international unions and alliances, so their return will certainly cause some difficulties, and possibly war, but we will never give up our fairly acceded lands, never."
 
 DPR_god_is_with_us_world_is_for_us:0 "God is with Us — World is for Us"
 DPR_god_is_with_us_world_is_for_us_desc:0 "For centuries, the Russian Empire was the world's dominant power, the absolute giant of the planet. Its vast lands, endless mineral and human resources, and its leadership, dedicated to tradition and honour, have always found a way to defeat its enemies, sooner or later, just as it will this time. The world perceives us as a threat, and rightly so, as we plan to regain our hegemonic status, which may only be through war, so get ready, Anglo-Saxons and Germans, Chinese and French, we are coming, and if God is on our side, who is on yours?"
 
 
 DPR_embark_on_a_new_economic_course:0 "Embark on a New Economic Course"
 DPR_embark_on_a_new_economic_course_desc:0 "Since the oligarchy's domination of Donbass, the local economy and industry have been experiencing perhaps its worst times. Closure of enterprises due to unwillingness to invest in them, loss of industrial facilities in card games, all this abuse our already struggling economy was forced to survive. However, the leadership has finally changed, and the time has come to change the overall situation. We will develop a new plan to rebuild our industrial potential and put the economy back on the track of prosperity, as this is the only way to make our plans come true."
 
 DPR_declare_war_on_oligarchy:0 "Declare War on Oligarchy"
 DPR_declare_war_on_oligarchy_desc:0 "The oligarchs who took control of almost the entire industrial potential of Donbass back in the 1990s have been living and making money off of people's and the state's grief with impunity. They were the ones who put their representatives in regional and national politics to protect their interests, but with our victory in the elections, they lost this opportunity forever. These greasy bastards have been sucking the blood of our country for too long, and the time has come to destroy their class as such."
 
 DPR_omnipresent_state_monopolies:0 "Omnipresent State Monopolies"
 DPR_omnipresent_state_monopolies_desc:0 "Having ended the dominance of the oligarchy, destroyed its main representatives and taken control of their main profits, we left a lot of unfilled space in the economic sphere of the state. These scumbags have managed to divide up everything they could, monopolising all possible areas, and now it's our time to win on all economic fronts once and for all, ousting any "independent competitors" and ensuring the security of economic development."
 
 DPR_policy_of_mass_nationalization:0 "Policy of Mass Nationalization"
 DPR_policy_of_mass_nationalization_desc:0 "To truly thrive, the industry must be owned by the state. Why should we rely on independent entrepreneurs and businessmen who only pursue their own interests when we have the power to fully and absolutely manage our country's economy, providing enough jobs and full cooperation from producers?"
 
 DPR_full_exploitation_of_land:0 "Full Exploitation of Land"
 DPR_full_exploitation_of_land_desc:0 "The land of Donbass is extremely rich in minerals. For centuries, iron, coal, and many other things have been dragged from here, but large deposits of these and many other resources are still present in this fertile soil. To maximize the potential of this ground, we need to expand the existing mines and wells, increase production and processing, and then Donbass will truly feed the rest of its brotherly lands."
 
 DPR_towards_total_economic_independence:0 "Towards Total Economic Independence"
 DPR_towards_total_economic_independence_desc:0 "With the de-oligarchization of our economy, the expansion of mineral extraction and the monopolization of all possible economic sectors, our country has moved closer to the much-desired economic independence. By building a few more power plants and expanding our industrial capacity, we will be able to switch almost entirely to our own products, becoming a producer and consumer, and no one else will have the right to dictate their terms to us."
 
 DPR_embrace_the_role_of_the_lord:0 "Embrace the Role of the Lord"
 DPR_embrace_the_role_of_the_lord_desc:0 "With the conquest of all the lands of the former Ukraine, our economic and industrial capabilities have expanded to a gigantic scale. While the Donbass has undergone tremendous economic and industrial changes, the rest of the regions have not, and with the restoration of the empire, it is our duty to rule these lands as well as the others, leading them to prosperity."
 
 
 DPR_liberalization_of_the_economic_environment:0 "Liberalization of the Economic Environment"
 DPR_liberalization_of_the_economic_environment_desc:0 "With the aggressive and inhumane economic policy introduced by Girkin during his rule, many troubles and problems have fallen on our lands, and they must be solved now, and quickly. The only way to prosperity was and is in freedom, both social and political, as well as economic, and we must fight the autocracy that was tried to be established before us."
 
 DPR_encourage_foreign_investments:0 "Encourage Foreign Investments"
 DPR_encourage_foreign_investments_desc:0 "Having turned our face back to the world and abandoned the senseless and harmful policy of isolationism, we have chosen the path of cooperation and interaction with Western countries. Our economy is not in the best of health, while our new partners are known for their willingness to invest in potential friends and allies, which we definitely want to become. Perhaps if we make the best possible impression on them and promise them good results, they will eventually agree to invest in us..."
 
 DPR_sign_contracts_with_magnates:0 "Sign Contracts with Magnates"
 DPR_sign_contracts_with_magnates_desc:0 "Even though our land is extremely rich in mineral resources and fertility, we are unable to fully exploit this natural potential. However, by sharing some of these resources with foreign suppliers and producers and signing cooperation agreements, we will be able to use idle resources and achieve even greater development at both the regional and national levels. People, we have something to invest in!"
 
 DPR_state_privatization_programme:0 "State Privatization Programme"
 DPR_state_privatization_programme_desc:0 "With the introduction of the full-scale nationalisation policy, our economy has suffered extremely heavy losses and is no longer able to work for itself. We have to privatize state-owned industries immediately and find people who are willing to take the risk of trusting the government that has recently taken everything from them, and we will have to try very, very hard."
 
 DPR_promote_market_competition:0 "Promote Competition in the Market"
 DPR_promote_market_competition_desc:0 "With the recovery of the middle class and small and medium-sized businesses, our economy has begun to revive. However, a lot of areas are now under private monopolies, which will harm not only the overall economy but also the entire population. We need to stimulate competition between producers in the market by all means possible to prevent the capture of certain areas by one person or company, as this could threaten us with a return to the dark times from which we have barely crawled out."
 
 DPR_enshrining_western_style_economics:0 "Enshirining Western-Style Economics"
 DPR_enshrining_western_style_economics_desc:0 "Having dealt with the last remnants of Mr Girkin's economic policy, our country has finally freed itself from the isolation chains he had wrapped around it. We managed to establish cooperation with Western countries, found investors in many areas of our industry, created a self-sufficient market that can take care of itself, and, in general, we were able to rebuild the economy of a third-world country on the model of Western economies. Henceforth and forever, it will keep all the people of our empire in prosperity and harmony, and we will be able to enjoy the same benefits as our German and British colleagues."
 
 
 DPR_continue_the_nationalization_policy:0 "Continue the Nationalization Policy"
 DPR_continue_the_nationalization_policy_desc:0 "The economic policy launched by that idiot Girkin, despite most of his other decisions, was wise and justified. Full nationalisation is the only way to fully stabilize the country's economic situation, and we will continue on this course."
 
 DPR_implement_land_trade_quotas:0 "Implement Land Trade Quotas"
 DPR_implement_land_trade_quotas_desc:0 "Land trade in one form or another has always existed, but with the fall of the tsarist rule in 1917 and subsequent collectivisation, the legal owners lost all their land. Since the destruction of the Soviet pseudo-empire, a "neo-aristocracy" in the form of oligarchs has emerged and started buying up land and industry, while even ordinary peasants have begun to do the same. We have to limit the trade in large plots to the upper class only, since who would benefit from the acquisition of such territories by some ordinary Khokhol farmer."
 
 DPR_monopolize_new_spheres:0 "Monopolize New Spheres"
 DPR_monopolize_new_spheres_desc:0 "With the conquest of new lands, a lot of new areas fell under our sway. Oil extraction, uranium, heaps of other resources, and nuclear and hydroelectric power stations, which can greatly improve our economic fortunes if we can prevail over these industrial and energy branches."
 
 DPR_state_the_best_economist:0 "State — the Best Economist"
 DPR_state_the_best_economist_desc:0 "By subordinating all economic spheres, all industrial capacities, and all underground wealth of this land to direct state control, we have truly become the sole rulers here. But beyond this, we have been able to prove that the best way to prosperity is through complete control, as news of an increasingly better situation has only just begun to emerge across our vast lands."
 
 
 DPR_and_what_about_the_military:0 "And What About the Military?"
 DPR_and_what_about_the_military_desc:0 "Our army dates back to 2014, from the people's militias of the Donetsk and Luhansk People's Republics. Back then, a handful of militant workers, miners, and peasants took up arms to defend their families and homes from the invaders. Everything was as expected from a people's revolution. However, more than 6 years have passed since then, and the army has remained a bunch of untrained fools equipped with old Russian weapons and stupid commanders. With our plans to regain control of all the lands that rightfully belong to us, this squalor is our biggest problem. However, there is still hope. If we begin the long and painful process of reformation immediately, we will achieve the desired results in time, so get to work, you lazybones!"
 
 DPR_revise_recruitment_policy:0 "Revise Recruitment Policy"
 DPR_revise_recruitment_policy_desc:0 "As we begin the process of full reform of the armed forces, we need to review our conscription policy. The shaky system, which is based on corruption, needs to be radically changed, new norms must be introduced and a clear age limit for young men to be mobilized must be set. Moreover, military training should be made compulsory for all."
 
 DPR_time_for_aptitude_tests:0 "Time for Aptitude Tests"
 DPR_time_for_aptitude_tests_desc:0 "Many of our generals, commanders and executives have been serving in the army since the beginning of the Donbass uprising against the Ukrainian regime and the years that followed. However, as we all know, not all of these people are competent and knowledgeable in military affairs, and some are not military at all. We need to check all of them for their professional suitability and, if necessary, get rid of the burdens on the army."
 
 DPR_new_logistic_apparatus:0 "New Logistic Apparatus"
 DPR_new_logistic_apparatus_desc:0 "The state of logistics in our army is worse than just deplorable. Shattered roads and railways, the almost complete absence of airfields, and a lack of warehouses will play into our enemy's hands. We must immediately include logistics upgrades in the army reform plan, and implement this step in the shortest possible time."
 
 DPR_one_step_forward:0 "One Step Forward"
 DPR_one_step_forward_desc:0 "Well, the first changes have been successfully implemented. But it's not time to rest, there's still a lot of work to be done!"
 
 DPR_loyalty_to_traditions:0 "Loyalty to Traditions"
 DPR_loyalty_to_traditions_desc:0 "Traditions form the culture, which in turn sets the foundation for the development of the structure. This works both in state-building and in the army. We take the Russian imperial army as our highest example, and by abandoning it, we will also abandon their legacy, everything that eventually united us. Tradition is the bedrock of anything, and trying to change it is not only unethical but also arrogant and harmful, so all such sentiments must be stopped immediately."
 
 DPR_bullet_is_a_fool_bayonet_is_a_hero:0 "Pulya Ne Dura, No Shtyk Tozhe Molodets"
 DPR_bullet_is_a_fool_bayonet_is_a_hero_desc:0 "In the days of the imperial army, bayonets were still the norm in the army. An excellent tool for destroying enemies at close range, which for some reason was almost completely removed from short and medium-range weapons. What a stupid idea to remove such a wonderful thing from military weapons. But there is no need to worry, we know how to defend our interests, and we will return to the norms of using everything we consider necessary."
 
 DPR_radical_changes_are_essential:0 "Radical Changes Are Essential"
 DPR_radical_changes_are_essential_desc:0 "If we really want our troops to succeed, hindering the modernisation of the army, even at the cost of military traditions, can only be perceived as a state and national betrayal. Progress does not stand still, and while our enemies are learning better and more effective tactics, we are trying to stay stuck in the past, which is almost tantamount to suicide. Give us modernisation!"
 
 DPR_army_wide_motorization:0 "Army-Wide Motorization"
 DPR_army_wide_motorization_desc:0 "If we really want our army to march across all our lands, restoring legitimate authority over them, then we must go for the motorization of units. Cossack horsemen and Guards cavalry are certainly stylish, but they are no match for armoured vehicles and other motorized units, which hold a strong advantage over traditional ones in terms of speed and manoeuvrability. They will remain a ceremonial attribute, but in war, we need innovations, not dusty antiques."
 
 DPR_launch_full_reequipment:0 "Launch Full Re-equipment"
 DPR_launch_full_reequipment_desc:0 "The standard armament of our army consists of weapons that are considered hopelessly outdated in the vast majority of the world's countries, and we should be just ashamed of this. Is it worthy of a powerful army to go to war with such rubbish? We have to immediately replace these dusty models with newer ones so that we don't have to be at least embarrassed for our soldiers."
 
 DPR_conduct_top_level_trainings:0 "Conduct Top-Level Trainings"
 DPR_conduct_top_level_trainings_desc:0 "Before sending a soldier to war, it is the responsibility of the command to properly train him. Our current methods are not only inadequate and too economical, they are almost unnecessary, and regardless, the same soldier who has not received sufficient training will die in combat on the first day. A guaranteed leap forward to a successful army reform is high-quality training for soldiers of all types and stripes, and this is what will save the lives of many of our boys in the future."
 
 DPR_final_moves:0 "Final Moves"
 DPR_final_moves_desc:0 "The army has already undergone many reforms. We have done a great job. However, it's not over yet, there is still something to correct and improve."
 
 DPR_knowing_the_enemy_inside_and_out:0 "Knowing the Enemy Inside and Out"
 DPR_knowing_the_enemy_inside_and_out_desc:0 "Military intelligence has been serving all nations for many millennia, gradually gaining a greater and greater role. Since the formation of the Luhansk and Donetsk Republics, the leadership has relied only on data transmitted from Moscow, but those days are long gone, and information about the movements of enemy troops and beyond has only become more necessary. We will organize our own intelligence and keep an eye on the enemy without intermediaries, as we should have been doing from the very beginning."
 
 DPR_allocate_lands_for_military_enterprises:0 "Allocate Lands for Military Enterprises"
 DPR_allocate_lands_for_military_enterprises_desc:0 "The military industry needs more space for development, and this is a fact. Relying on imports from the East, the government could have spat on the development of its own production, however, we, as the carriers of reforms to this rotten system, must put an end to this misunderstanding. The state owns a lot of plots in industrial areas and beyond, and they would definitely be useful to our producers, who must get them."
 
 DPR_found_new_military_academies:0 "Found New Military Academics"
 DPR_found_new_military_academies_desc:0 "To get good commanders, we need to start educating them for the future. Military academies, if they existed during the reign of the previous authorities, were rather pathetic copies of such institutions, while no genius could have passed through one without having a dozen or so thousand in his pocket. Our generals deserve the highest possible education, and we will provide it!"
 
 DPR_best_army_in_the_eastern_hemisphere:0 "Best Army in the Eastern Hemisphere"
 DPR_best_army_in_the_eastern_hemisphere_desc:0 "After so many challenges, insurmountable difficulties, and a tonne of funds allocated from the budget, our army has truly transformed into something completely new. It is no longer a gang of marauders with a bandit at the helm, but a disciplined organisation where everything is clearly based on the abilities of its members, as it should be in a real and strong state. As the ranks of our reformed army grow, we will become stronger and stronger, and eventually, we will convince all our enemies of everything that is possible. It is we who will be the paragons of military glory of the new century, and it is our troops who will be a model for the whole world. Glory to the Armed Forces!"
 
 
 DPR_securing_the_airspace:0 "Securing the Airspace"
 DPR_securing_the_airspace_desc:0 "No modern war can be imagined without aviation. It is capable of everything from destroying the enemy's industrial capacities, through psychological pressure on society, airborne operations, and to the banal conquest of the heavens with the aim of preventing any enemy attempts to use the sky against us. We do not have our own planes, and there are very few imported ones, while our enemies may have many more, and this needs to be corrected immediately."
 
 DPR_open_new_airfields:0 "Open New Airfields"
 DPR_open_new_airfields_desc:0 "Aircraft need bases, but we don't have either yet. It is essential to start with bases, as we will always have time to produce aircraft, but where to deploy them is a retrospective question. We have very few aerodromes on our territory, and almost all of them are either damaged or simply unusable, so this must be changed."
 
 DPR_rely_on_foreign_samples:0 "Rely on Foreign Samples"
 DPR_rely_on_foreign_samples_desc:0 "Unlike us, the countries of the world had enough time, resources, and much better conditions to develop their military aviation industry. They have their own aircraft, their own construction technologies and weapons, which we will have to go on our own for decades to come. However, why make things so difficult when we can try to negotiate with these states to purchase such aircraft and licences to produce them, allowing us to jump ahead of the difficult and time-consuming process of producing our own warplanes from modified models of old Soviet junk?"
 
 DPR_nothing_is_better_than_ones_own:0 "Nothing is Better than One's Own"
 DPR_nothing_is_better_than_ones_own_desc:0 "In this world, you can only rely on yourself, and history has already taught humanity too many similar lessons. We have no right to step on the same rake again by putting our aviation in the hands of some unfamiliar and potentially hostile companies and individuals, so even if it happens to be harder, longer, tougher, we will achieve our own successes and victories without anyone else's "help"."
 
 DPR_new_aircraft_production_programme:0 "New Aircraft Production Programme"
 DPR_new_aircraft_production_programme_desc:0 "In order to catch up with our rivals in terms of the size of the aircraft fleet, we need to press on. Although we have long lagged behind in this regard, it is never too late to start. By introducing new production programmes, and stricter quotas, and by transferring more factories to aircraft production and more personnel to pilot and constructor training, we will significantly increase our strength and capabilities in the aviation industry."
 
 DPR_make_the_skies_our_home:0 "Make the Skies Our Home"
 DPR_make_the_skies_our_home_desc:0 "The most important thing in the war for the skies is to achieve absolute air superiority, and this requires fighters and other light aircraft, and a lot of them. By precisely attacking ground targets with small bombs and destroying the enemy's fleet in combat, we will already be making the most of the sky, so why bother with heavy and unnecessary planes?"
 
 DPR_turn_everything_into_ashes:0 "Turn Everything into Ashes"
 DPR_turn_everything_into_ashes_desc:0 "Failing to finish off an enemy already defeated in battle is tantamount to wanting to risk the lives of own people once again because of banal ineptitude. If we succeed in crushing the enemy in the air, we must use all the opportunities afforded by the control of the skies, deploy all possible resources to facilitate ground operations and turn their entire industry, all their warehouses, into ruins. Air defences will be our first ground target. After that, nothing will hide from us."
 
 DPR_we_will_become_the_destroyers_of_the_world:0 "We Will Become the Destroyers of the World"
 DPR_we_will_become_the_destroyers_of_the_world_desc:0 "True power lies in the ability not only to defeat the enemy but to turn him into a pile of ashes, destroying everything that represents him. Nuclear weapons were created for this very purpose, although they eventually moved to deterrence tools, giving the state that possesses them the de facto title of peacekeeper. With such power, we will be truly invincible."
 
 DPR_new_advanced_air_force:0 "New Advanced Air Force"
 DPR_new_advanced_air_force_desc:0 "After making a lot of decisions, difficult choices, and achieving our small victories, we can proudly say that our glorious country has acquired its own air force. It may not be the strongest in the world, and it probably won't be, but strength is not only in the power over the skies. With future additions, it will be more than enough for our initial purposes, and further, propaganda will be able to make the fleet even more powerful than it really is."
 
 
 DPR_fleet_of_the_two_seas:0 "Fleet of the Two Seas"
 DPR_fleet_of_the_two_seas_desc:0 "The Russian Imperial Black Sea Fleet is a truly legendary thing, having survived so many battles, and wars, and brought so many victories and defeats to its country. However, after the February and then the October Revolutions, its fate was forever changed. Nowadays, the remnants and descendants of this flotilla are scattered among the fleets of the so-called Russian Federation, Georgia, and what is left of Ukraine, but none of them has the right to claim power over the Black Sea, unlike us. We may not have a fleet as such yet, but with new lands, we will have more and more possibilities to build one, and then nobody will prevent us from ruling over two seas - the Black Sea and the Azov."
 
 DPR_open_new_shipyards:0 "Open New Shipyards"
 DPR_open_new_shipyards_desc:0 "You can't build a fleet without shipyards, and we need ships more than ever. We must launch a programme to build military shipyards in our main ports to begin construction of a new Black Sea flotilla, which we will achieve."
 
 DPR_dominate_the_sea_depths:0 "Dominate the Sea Depths"
 DPR_dominate_the_sea_depths_desc:0 "Submarines have proven their absolute superiority in terms of cheapness and compactness compared to huge and unmanoeuvrable machines since the World Wars. While we cannot compete with other nations in heavy ships due to our banal industrial capabilities, by focusing on submarines we will be able to destroy their shiny toys from the depths of the sea."
 
 DPR_cruiser_development_programme:0 "Cruiser Development Programme"
 DPR_cruiser_development_programme_desc:0 "Cruisers have long been the main ships in the world's navies. If a state is building a flotilla, cruisers are its priority. The same is true for us. We must concentrate our main resources on building these ships and modernising the old captured ones, and only then will our fleet begin to resemble its ancient ancestor in the form of an imperial flotilla."
 
 DPR_new_black_sea_pearl:0 "New Black Sea Pearl"
 DPR_new_black_sea_pearl_desc:0 "Every fleet needs its own flagship, and the Black Sea flotilla is no exception. The sea needs to find its pearl, while we need a symbol of a new and powerful fleet that can show the world who we really are. Bring your drawings and plans, engineers, it's time to build!"
 
 DPR_all_powerful_navy:0 "All-Powerful Navy"
 DPR_all_powerfull_navy_desc:0 "Having invested all possible resources in the planning and development of our naval forces, our state has finally reached the peak of its maritime potential. We have our own flagship, our own powerful vessels, our own and fully-fledged fleet that can challenge others across the region, and from now on we can truly say with pride that the Black Sea is ours!"
 
 
 ## EVENTS
 gir.1.t:0 "PROTESTS ACROSS THE COUNTRY"
 gir.1.d:0 "Since early morning, the streets of Donetsk, Lugansk, Mariupol, and several other cities began to fill with waves of protesters fueled by indignation and disappointment. Some arrived in silence, others with chants, hand-drawn signs, and cars draped in the flags of Novorossiya. The mood of the crowd was not just angry — it was tired. Tired of war, tired of radical nationalists, whether Ukrainian Banderites or figures like Girkin. Beneath the frowns of the demonstrators, one could see a clear desire to finally, for the first time in a long while, breathe freely and live in peace, in a democratic and socially oriented state built for its people.\n\nIn Donetsk, at the main square beneath the towering Lenin monument, the largest of the demonstrations had gathered. Journalists began to trickle in as well, mostly arriving in hurried groups, cameras in hand. Among them was a still unknown rookie, Natalia Davalkina, eager to capture the moment, her eyes wide with both curiosity and uncertainty.\n\nShe glanced around — to her left, a middle-aged woman wrapped in a Novorossiya flag shouted, "We don’t want him!". Somewhere nearby, group of young people, probably students, took up a rhythm: "Freedom to the constitution! Go away, Girkin!"\n\nShe knew, of course, that the protests were mostly led by supporters of Natalia Vitrenko and Leonid Pasechnik — two figures with completely different political legacies, but who gained considerable support in the recent election, ultimately losing to Girkin. Many in the crowd genuinely believed that his victory was less about democratic choice and more about intimidation and political manipulation.\n\nMeanwhile, Vitrenko and Pasechnik have already announced plans to unite temporarily under a common banner: 'The People’s Opposition'. Their message is clear as crystal — they’re calling for a complete revision of Girkin’s approach to governing, demanding freedom of speech, social benefits and even greater partnership with neighbours.\nThe constitution, they argue, should be rewritten to guarantee everyone’s equality before the law, with genuine political representation rather than token seats or symbolic gestures. And above all, they want to stop Girkin from turning the country into an 'authoritarian menace, hiding behind a democratic façade'.\nAt least that’s what they claim to desire.\n\nNatalia’s thoughts were interrupted by a sudden loud yell from one of the protest leaders: "We won’t stay silent! If they don’t hear us today, twice as many will march tomorrow!". The crowd then erupted in furious applause, reinforcing his words.\nThen she went on and spoke into the recorder: "Up to now, the protests have stayed peaceful, but I can feel the tension rising. Armed units are positioned just outside the city center — silent, watching. I’ve seen plainclothes officers weaving through the crowd. There have been no direct clashes, but even the smallest dispute seems to be able to shift the atmosphere. Everyone here understands how fast things can snap".\n\nSuddenly, a red light blinked on her recorder — low battery. Fortunately, this time she hadn’t forgotten to bring a spare.\n\n"This is Natalia Davalkina, reporting from Donetsk.""
 gir.1.a:0 "I’ll stay with the story as it unfolds."
 
 gir.2.t:0 "FIRST COLLISIONS"
 gir.2.d:0 "Despite the Girkin’s government obvious expectation that the protests would soon fade away, this has not happened. A month has already passed since the protests began, and every day they are becoming more massive and radical. However, it seems like the government has already found a solution to this problem.\n\n"This is Natalia Davalkina, and today I am reporting from Khmelnytsky Boulevard in Donetsk. Once again, a protest has gathered here, and by my estimates, it’s quite large — around a thousand people," Natalia said calmly, already accustomed to such events, having witnessed protests every day for the past month. She continued, "Right now, the protesters are marching along the boulevard, heading toward the main square and chanting slogans that have become more radical lately. People are demanding Girkin’s immediate resignation and new elections this year."\n\nAfter some time, the square came into view, and Natalia slowed her pace. From the other side of the square, another procession was moving — a rally in support of Girkin. Natalia focused, trying to get a closer look at the participants. Many of them were dressed in sportswear, wearing masks, holding bats or sticks, banners were rarely seen. She recognized the pattern immediately.\n"Titushki," she muttered to herself. "Great."\n\nThe moment the two groups saw each other, shouting broke out.\nAnd then, chaos.\n\nNatalia flinched as a bottle flew overhead and shattered near the monument steps. She turned just in time to see a group of masked figures break from the protest line and rush forward, shouting. "Who are these guys?" she breathed. "They don’t look like the other protesters."\nThe Girkinists reacted immediately, charging to meet them — and in seconds, fists were flying, stones were hurling, and sticks were swinging.\nNatalia tried to keep filming, until the chaos reached her. The police arrived.\n\nSuddenly, she felt something hard strike the back of her head. She fell onto the dirty street floor, clutching her head in pain. She turned, only to find herself face to face with a police officer.\n"Press! I’m press!" she shouted, holding up her badge. Her camera was lying shattered nearby.\n\nThe police did not intervene to stop the fighting. In some corners of the square, they seemed to even guide the Girkinists, forming barriers that blocked the protestors.\n\nBy the time the violence ended, dozens were injured. No arrests were reported.\n\nNatalia barely made it home that evening. Her head still hurt, her coat was torn, camera ruined. She didn’t bother to take her boots off. She just sat there, at the edge of her bed.\n"I’m done," she muttered. "This isn’t worth it."\n\nThen, her phone buzzed. A new email.\nSubject: Interview Invitation — Novorossiya State News.\n\nShe read it twice. Her fingers hovered over the screen."
 gir.2.a:0 "...Maybe not yet."
 
