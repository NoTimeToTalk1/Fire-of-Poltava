 gir.32.t:0 "Meeting of the Monarchical Congress" #.926
 gir.32.d:0 "In the grand assembly hall of the monarchical congress, dignitaries, nobles, olighars and representatives from across Russia gathered to deliberate upon a momentous decision – the selection of a new monarch. The air was thick with anticipation as the fate of the crown hung in the balance. Two prominent contenders emerged, each with their own claim to the storied throne – Rostislav Romanov and Mariya Romanova.\n\nRostislav, a distinguished member of the Romanov dynasty, carried himself with the regal air that bespoke his royal lineage. Known for his charisma and diplomatic acumen, he had earned the support of many who believed in a return to the traditions of old. His vision for a revitalized monarchy resonated with those who longed for the stability and grandeur of the past.\n\nOn the other side of the debate stood Mariya, a descendant of the Romanova family. Her proponents argued for a fresh perspective and a break from the constraints of historical precedent. Mariya was seen as a symbol of modernity, advocating for reforms that would align Russia with the evolving global landscape. Her progressive ideas appealed to those who sought a monarchy in step with the times.\n\nIn the final moments of the congress, as the votes were cast and tallied, the air hung heavy with anticipation. The decision, fraught with significance, would shape the course of Russia's history. The announcement of the chosen monarch, whether Rostislav or Mariya, would usher in a new chapter for the nation, blending the echoes of the past with the promises of the future."
 gir.32.a:0 "Ok."
 
 gir.34.t:0 "Maria Vladimirovna Romanova" #.927
 gir.34.d:0 "Mariya Romanova was born into the historic Romanov family, a lineage steeped in the annals of Russian history. Raised in a palatial estate, Mariya experienced both the privileges and responsibilities that came with her royal heritage. From a young age, she displayed a keen intellect and a profound curiosity about the world beyond the palace walls.\n\nKnown for her charisma and ability to connect with people from all walks of life, Mariya earned respect for her leadership qualities. She engaged in philanthropic endeavors, working tirelessly to address social issues and promote education. Her commitment to social justice and inclusivity resonated with a broad spectrum of the population, creating a strong foundation of support.\n\nIn the eyes of many, Mariya Romanova represented the bridge between Russia's storied past and a future defined by progress and innovation. As a monarch, she promised to lead with wisdom, compassion, and a dedication to the well-being of her people. Her candidacy garnered support from those who believed that, in Mariya, Russia had found a leader capable of guiding the nation into a new era, where tradition and modernity coexisted harmoniously."
 gir.34.a:0 "Ok."
 
 gir.29.t:0 "Rostislav Rostislavovich Romanov" #.928
 gir.29.d:0 "Our one of the main contenders for the throne is Rostislav Romanov. Young and full of vigour to rule the country as a monarch. He is considered by many to be the best choice of those left and that he should be the one to lead the Great Unified and Indivisible Russia.\n\nRostislav Rostislavovich belongs to the Mikhailovsky branch, the male line of succession to the throne of Nicholas II's youngest son, Mikhail Mikhailovich.\n\nAlthough he was born in the United States, Illinois, he was baptised, as it should be, in Orthodoxy. But during his education in Western schools and colleges he was imbued with the more liberal and democratic ideas of a progressive monarchy.He is married to Fotinia Georgievna and has a male heir, whom he has decided to name Rostislav.\n\nHe is also in line for the throne of England as he is a distant ancestor of Sophia of Hanover. This makes him better known in the eyes of the Western community and more legitimate. He is also the only one of the House of Romanoff to visit Russia.\n\nHe is young, energetic, and full of vigour to reign in Russia. A true Russian patriot and a worthy Tsar."
 gir.29.a:0 "Ok."
 
