 ## DECISIONS
 DPR_putting_down_the_unrest_category:0 "Putting Down the Unrest"
 DPR_pacify_region:0 "Pacify [FROM.GetName]"
 DPR_pacify_region_desc:0 "We must restore order in [FROM.GetName]. Our forces will move in and eliminate the remaining resistance."
 DPR_final_operation:0 "Final Assault on [FROM.GetCapitalVictoryPointName]"
 DPR_final_operation_desc:0 "With the surrounding regions secured, we are ready to strike at the heart of the uprising in [FROM.GetCapitalVictoryPointName]."
 
 DPR_end_vitrenko:0 "Deal with Vitrenko"
 DPR_end_vitrenko_desc:0 "Even though the Bolshevik "union of peoples" has not been on the world map for thirty years, the remnants of that era continue to poison society, even in Donbass. Natalia Vitrenko, an avid Stalinist and populist corrupt broad who, by covering up Bolshevik terror, is trying to win the support of the elderly electorate, has been in our crosshairs for a long time, and in the light of recent events, it would be unwise to let this whore continue to breathe."
 DPR_end_vitrenko_tt:0 "§RLeftists have no place in this country.§!"
 
 DPR_end_pasechnik:0 "Deal with Pasechnik"
 DPR_end_pasechnik_desc:0 "If there is anyone who could theoretically still have support for his opinions and views among the electorate, apart from the government, it is the Lugansk gangster Pasechnik. Having gained a reputational boost by painting his "kingdom of special services", also known as the Lugansk People's Republic, as a paradise of democracy "compared to their Donetsk brothers", he was indeed one of the main candidates in the presidential election and then became the face of the "People's Opposition", and poses the greatest threat to the continuation of the legitimately elected government of Donbass, therefore this wolf in sheep's clothing should be put to rest."
 DPR_end_pasechnik_tt:0 "§RA traitor will sooner or later betray again. We don't need people like that.§!"
 
 DPR_end_pushilin:0 "Deal with Pushilin"
 DPR_end_pushilin_desc:0 "Denis Pushilin is the most disgusting creature to be found on the territory of our country, and luckily this will not last long. Our best people are constantly monitoring this pig, while theoretically we are able to strike almost anytime. It's time to plan an operation that will finally take revenge on Zakharchenko and put an end to this embarrassing part of Novorossiya's history..."
 DPR_end_pushilin_tt:0 "§RThis fat bastard who only cares about his own profit has no place in our country.§!"
 
 DPR_end_the_war:0 "End the Uprising"
 DPR_end_the_war_desc:0 "We can finally proclaim the end of the uprising!"
 
