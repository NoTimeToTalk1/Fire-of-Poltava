 ##AFU ELECTIONS
 
 AFU_elections_decision_category:0 "Elections"
 AFU_elections_decision_category_desc:0  "As we open the door, we find ourselves in the centre of a new history, where the decision of every citizen has a decisive impact on the future of this country. After the proclamation of the Provisional Government of Donetsk and Luhansk regions and overcoming the difficulties in Donbas, the country began to face new challenges.\nIn this context, the elections were a key moment in shaping Ukraine's future. Three prominent candidates - Oleksiy Danilov, an independent, Nadiya Savchenko of the NGP and Vitaliy Khomutynnyk of the Vidrodzhennya party - have entered the political arena offering their own visions of the future.\nThese elections will be a defining moment where Ukrainian citizens will choose not only a leader, but also the future trajectory of their country - peaceful restructuring, a harsh military response or a focus on economic recovery. Let's take a closer look at the candidates and their programmes to understand how these elections could shape the face of a new Ukraine."
 
