 Odesa_civil_war:0 "Odesa Civil War"
 Odesa_civil_war_desc:0 "Civil War in Odesa"
 admiral_win:0 "Claim victory"
 admiral_win_desc:0 "Despite all the attempts of our enemies, we managed to preserve the Black Sea Confederation. \n Everyone, everyone who decided to challenge our interim government, nationalists, separatists, russophiles and even the Russian expeditionary corps, all of them were defeated. The efforts of the fools who thought they could manage the region better than we could have only resulted in the Confederate flag still flying in all parts of our country, and because of their stupidity, we are forced to control everything that happens in the Odesa region even more. The antics of the so-called "oppositionists" and "fighters for independence" have only led to an increase in the number of widows and law enforcement officials in the country. However, this does not mean that the Confederation will turn into a gloomy Ukrainian analogue of the GDR. A completely unnecessary war has taken the lives of many people and severely shaken our already fragile and unstable economy, but we will recover. We will face difficult and harsh times, but the Confederation will rebuild everything that was destroyed by its enemies and will once again become a significant force in the region!"
 shariy_win:0 "Claim victory"
 shariy_win_desc:0 "Shariy Forces wins in Civil War"
 shariy_win:0 "Claim victory"
 shariy_win_desc:0 "Shariy Faction Forces wins in Civil War"
 rusnya_win:0 "Claim victory"
 rusnya_win_desc:0 "Russian intervention wins in Civil War"
 sternenko_win:0 "Claim victory"
 sternenko_win_desc:0 "Despite all the efforts of the enemies, they failed to break the spirit of the concerned citizens of Ukraine! \n Many heroes died fighting for the very Ukraine that was supposed to rise in 1991, but their sacrifice was not in vain and will never be forgotten. Having defeated both the loyalists of Voronchenko's dictatorial regime and the Muscovite whores led by Shariy and Zelenkov, our glorious warriors managed to unite Odesa Oblast under the only possible leadership. "Nazis!", "murderers!" supporters of our enemies shout, but everyone knows that we are not beasts. The essence of our ideas is to create a national democratic society, the society that Ukraine deserves. The battle is over, but our work is not. Having perpetuated the memory of our fallen heroes, we must start working on forming a government, not an underground party committee, and focus on the complete reformatting of our society as a whole. Not a single soul will dare to shout about "Russian" Odesa anymore. Odesa is Ukraine! And from now on, Ukraine will never allow anything Russian on its territory or near it!"
 donbass_war:0 "Donbass War"
 donbass_war_desc:0 "After the fall of the central government, the situation in eastern regions is getting worse. It's obvious now that active phase of war will begin in the coming months, and we must do everything to emerge victorious."
 AFUintfinalise:0 "We will finish the integration of previously occupied states"
 
