 donbass_war_desc:0 "After the fall of the central government, the situation in eastern regions is getting worse. It's obvious now that the active phase of the war will begin in the upcoming months, and we must do everything to emerge victorious."
 AFUintfinalise:0 "We will finish the integration of previously occupied states"
 Odesa_civil_war_category:0 "Civil War in Odeshchyna"
 admiral_win:0 "Claim Victory"
 admiral_win_desc:0 "Despite all the attempts of our enemies, we managed to preserve the Black Sea Confederation. Everyone who decided to challenge our interim government: Nationalists, Separatists, Russophiles and even the Russian Expeditionary Corps, all of them were defeated. The efforts of the fools who thought they could manage the region better than we could have only resulted in the Confederate flag still flying in all parts of Odeshchyna, and because of their stupidity, we are forced to control everything that happens in the region even more. The antics of the so-called "oppositionists" and "fighters for independence" have only led to an increase in the number of widows and law enforcement officials in the country. However, this does not mean that the Confederation will turn into a gloomy Ukrainian analogue of the GDR. A completely unnecessary war has taken the lives of too many people and severely shaken our already fragile and unstable economy, but we will recover. Difficult and harsh times await us, but the Confederation will rebuild everything that was destroyed by its enemies and will once again become a significant force in the region!"
 sternenko_win:0 "Claim Victory"
 sternenko_win_desc:0 "Despite all the efforts of our enemies, they failed to break the spirit of the brave Ukrainian citizens! Many heroes died fighting for the very Ukraine that was supposed to rise in 1991, but their sacrifice was not in vain and will never be forgotten. Having defeated both the loyalists of Voronchenko's dictatorial regime and the Muscovite whores led by Shariy and Zelenkov, our glorious warriors managed to unite Odesa Oblast under the only possible leadership. "Nazis!", "Murderers!" shout the supporters of our enemies, but everyone knows that we are not beasts. The essence of our ideas is to create a national democratic society, the society that Ukraine deserves. The battle is over, but our work is not. Having perpetuated the memory of our fallen heroes, we must start working on forming a government, not an underground party committee, and focus on the complete reformatting of our society as a whole. Not a single soul will dare to shout about "Russian" Odesa anymore. Odesa is Ukraine! And from now on, Ukraine will never allow anything Russian on its territory or near it!"
 shariy_win:0 "Claim Victory"
 shariy_win_desc:0 "We really succeeded! We put all our strength into this battle. We shed blood, others, and our own. We shed rivers of sweat, but we did it. We achieved victory! By following our leader, Anatoliy Shariy, we managed not only to get rid of Voronchenko's regime but also to destroy all the armed groups hostile to the local population. "Glory to Shariy, our great leader" can be heard in all cities of Odeshchyna, and it is inspiring. It inspires us to continue our work to create a truly free state. From now on, and forever, we will protect this land, and it will flourish. And Shariy will lead us. So let our new country be glorious, let Shariy be glorious!"
 rec_win:0 "Claim Victory"
 rec_win_desc:0 "We have indeed won against all odds! What was thought to be a simple "land-grabbing operation" from Transnistria turned out to be a success greater than ever, with the region of Odesa finally being in the hands of a rightful owner - Russia! Hero city of Odessa, being the jewel on our newly-obtained crown, now has a glorious three-colored flag on top of its most prominent buildings! Though there is a lot to be done to properly attempt an integration of this rogue region into the Russian Federation, we can safely say that our boys worked well and deserve their rest. Ура!"
 
