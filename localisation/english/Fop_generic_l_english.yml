 ### Micro region development

 FOP_micro_region_development: "Development"
 FOP_micro_region_development_desc: "Ukraine is in ruins, and so is our piece of land. If we want to prosper, we should overlook our posibilities and control it as much, as we can do."
 FOP_micro_region_development_tt: "After completion of some focuses, you will be able to make §Ydecisions§! for your development"
 FOP_warehouses: "Search Warehouses"
 search_warehouse_1: "Search warehouse"
 search_warehouse_1_desc: "We will look into stockpiles and warehouses of weapons. We need them for our's sake, and not looking for additional firepower would be stupid."
 search_warehouse_2: "Search warehouse"
 search_warehouse_2_desc: "We will look into stockpiles and warehouses of weapons. We need them for our's sake, and not looking for additional firepower would be stupid."
 search_warehouse_3: "Search warehouse"
 search_warehouse_3_desc: "We will look into stockpiles and warehouses of weapons. We need them for our's sake, and not looking for additional firepower would be stupid."
 issue_propaganda_material: "Issue Propaganda Material"
 issue_propaganda_material_desc: "Masses should get our messages right. We will invest in agitation and propaganda to get people's sympathy for our cause."
 economic_concessions: "Make economic concessions"
 economic_concessions_desc: "People, in general, love less work and more benefits. In exchange of their loyalty for us, we will make some concessions to them."
 invest_in_social_buildings: "Invest in social buildings"
 invest_in_social_buildings_desc: "Hospitals, schools, recreational zones... People must have that for their life to be easier. We will invest in building some of that, and people surely will give us their 'Thank you'."
 FOP_earn_trust: "Gaining Trust"
 FOP_appeasement: "Appeasment"
 invest_in_populace_control: "Invest in populace control"
 invest_in_populace_control_desc: "Situation in our country causes people to get involved into harmful and chaotic activites, which are obviously bad for us. We should invest into punishing that kind of behaviour."
 police_raid: "Police raid"
 police_raid_desc: "Some people are getting involved into illegal activites, thus we shall exert some police brutality for maintaining order. We should also be aware, that people wouldn't like that."
 FOP_mobilisation: "Mobilization"
 mobilize_small_amount: "Mobilize small amount of people"
 mobilize_small_amount_desc: "Our army must get fresh manpower to uphold it's capabilities. We will start mobilizing a small amount of reserves, mostly from people, willing to help."
 mobilize_medium_amount: "Mobilize medium amount of people"
 mobilize_medium_amount_desc: "Our army must get fresh manpower to uphold it's capabilities. We will start a mobilization campaign, which will target former soldiers and people, eligible for serving in the military."
 mobilize_large_amount: "Mobilize large amount of people"
 mobilize_large_amount_desc: "Our army must get fresh manpower to uphold it's capabilities. We should do a large mobilization campaign in order to firmly replenish our forces, no matter what the people will say."
 put_them_to_serve: "Put criminals to serve"
 put_them_to_serve_desc: "People, who got sentenced to prison, are more of a burden to us. They get food and sleeping place from our budget, so we know a better place, where they can be more useful for us."
 
