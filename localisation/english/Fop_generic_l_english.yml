 HalychynaMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Western regions of Ukraine, known as Galicia, Volhynia and Zakarpattya, got united under the banner of the so-called Republic of Halychyna, led by Ruslan Koshulynsky. He issued a speech, where he claimed that the new provisional government is aiming to maintain stability in the region and to rule out the Ukrainian crisis, pushing the unification further."
 RivneMicroRegionUnifierDesc:0 "Ukrainian crisis got some shady development. Western regions of Ukraine, known as Galicia, Volhynia and Zakarpattya, got united under the banner of 'Burshtyn Republic', formed by the notorious criminal authorities. Overcoming other forces, they have claimed control over the region, and they have already started bringing their own order to all the people that remain there."
 TernopilMicroRegionUnifierDesc:0 "Ukrainian crisis brings terrifying news. Western regions of Ukraine, known as Galicia, Volhynia and Zakarpattya, got united under the banner of neo-pagans, who brought the disorder to Ternopil oblast, and now they are controlling more territories. Little is known about their next course of action."
 VolhyniaMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Western regions of Ukraine, known as Galicia, Volhynia and Zakarpattya, got united under the government of the former prosecutor general Viktor Lutsenko, who first brought stability to the Volhynia region, and now he has formed a new provisional government in the west of Ukraine. His government aims to bring further stability in the region and continue the unification of Ukraine."
 ZhytomyrMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Podolia region, consisting of the Zhytomyr, Vinnytsia and Khmelnytsky oblasts, got united under the government of the former Ukrainian prime minister Yulia Tymoshenko. She claims that she will continue uniting Ukraine, bringing peace and stability to the Ukrainian people across the whole ruined country."
 VinnytsiaMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Podolia region, consisting of the Zhytomyr, Vinnytsia and Khmelnytsky oblasts, got united under the government of the Ukrainian ‘Radical Party’ leader Oleh Liashko. He claims that he will continue uniting Ukraine, bringing peace and stability to the Ukrainian people across the whole ruined country, also fighting with the elements, who will stand in the way of uniting Ukraine."
 KyivMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Siveria, a region consisting of Kyiv, Chenrihiv and Sumy oblasts, got united under the government of Volodymyr Zelensky, recognised as the sixth president of Ukraine before the start of the crisis. Overcoming his opponents, he has declared that he will continue to help Ukraine recover from the crisis and unite Ukraine again, while his government will do anything possible to help the people of Ukraine."
 ChernihivMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Siveria, a region consisting of Kyiv, Chenrihiv and Sumy oblasts, got united under the government of the former fifth president of Ukraine, Petro Poroshenko. In his speech, he declared that he will ensure the further unification and restoration of the Ukrainian state, dealing with the greatest crisis in modern Ukrainian history and its perpetrators."
 YushchenkoMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Siveria, a region consisting of Kyiv, Chenrihiv and Sumy oblasts, got united under the government of the former third president of Ukraine, Viktor Yushchenko. Known as both a pro-western, pro-Ukrainian politician and leader, whose team failed to deliver the expectations, he promises to ensure a bright future for Ukraine, learning from the errors of the past and to continue the unification of Ukraine."
 SmeshkoMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Siveria, a region consisting of Kyiv, Chenrihiv and Sumy oblasts, got united under the government of the Ukrainian politician Ihor Smeshko. In his speech, he declared that he will bring order and stability to the country, engaging in its unification and creating a powerful Ukrainian state."
 PoltavaMicroRegionUnifierDesc:0 "Ukrainian crisis has a worrisome development. The region, consisting of Poltava, Cherkasy and Kirovohrad oblasts, got united under the government of the far-right 'Natskorpus' party leader, Andrii Biletski. In his speech, he claimed that he will continue to further unify Ukraine and transform not only the country, but the nation as well, under the social-nationalist ideology."
 KirovohradMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrying developments. The region, consisting of Poltava, Cherkasy and Kirovohrad oblasts, got united under the banner of the former Russian media person Dmitriy 'Goblin' Puchkov. Known for his eccentric and odious demeanour, he claims the return of Ukrainians to the Russian world is inevitable, and he will deliver that under the ideas of Stalinist communism."
 UmanMicroRegionUnifierDesc:0 "Ukrainian crisis got some interesting development. The region, consisting of Poltava, Cherkasy and Kirovohrad oblasts, got united under the banner of the Hassidic community, led by the former Chief Rabbi of Ukraine, Moshe Reuven Azman. He claims that he will be uniting Ukraine under the laws of the Hassidic tradition, bringing peace to the people of Ukraine and reformed Ukrainian state."
 OdesaMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Black Sea region got united under the military government of the Ukrainian admiral Ihor Voronchenko. Putting down the unrest in the region, he has claimed that he will bring order to Ukraine, uniting the country further."
 SternenkoMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Black Sea region got united under the banner of the Ukrainian right-wing Right Sector organisation representative Serhiy Sternenko. He claims that he will continue to unite Ukraine, overcoming the biggest crisis in the country's modern history. According to various sources, he either represents liberal-nationalist views or goes by the stern right-wing beliefs. Only time will tell what his rule will look like."
 ShariyMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Black Sea region got united under the banner of the former 'Shariy party' leader Anatoliy Shariy. He promises that he will ensure the end of the crisis in Ukraine, and he will bring change for Ukraine to be freer, unlike past oppressive governments."
 BudzhakMicroRegionUnifierDesc:0 "Ukrainian crisis got some interesting development. Black Sea region got united under the banner of the 'Budzhak Nations Council', based in the Izmail raion of Odesa oblast. The council members declare that they are going to create a new state, a federation of equals, which will grant equal rights and representation for all nations that live in Ukraine, and they ensure that they will continue until that project is implemented fully."
 RECMicroRegionUnifierDesc:0 "Ukrainian crisis got some unforeseen development. Black Sea region got united under the banner of the Russian Expeditionary Forces, a military mission sent by the Russian Federation. While the mission representatives and Russian officials claim that the forces ensure the safety and order in the controlled region, there are signs of worrisome administration behaviour, such as Russian passport distributions and harsh actions against those deemed as extremist elements."
 KhersonMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Tavria region, consisting of Kherson and Zaporizhzhia oblasts, was united under the government of the former 'Opposition Platform - For Life' leader Vadim Rabinovich. He claims that he will unite Ukraine, transform it into a federation with every region's culture and language treated with respect, and will cease any problems of the past Ukrainian government."
 ZaporizhzhiaMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. Tavria region, consisting of Kherson and Zaporizhzhia oblasts, got united under the banner of the 'liberal congress', led by former Ukrainian blogger Oleksiy Shkrobinets, more known as Tyler Anderson. The liberals claim that they will unite Ukraine and transform it into a truly liberal and democratic country with every human respected, regardless of their gender, sexual orientation or ethnic background."
 AvakovMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Donbas region, along with Kharkiv oblast, was united under the government of the former Ukrainian Minister of Interior Affairs Arsen Avakov. He claims that he will continue uniting Ukraine, bringing order and stability to the now ruined country, and giving a fight to unlawful elements tearing Ukraine apart."
 ZhadanMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Donbas region, along with Kharkiv oblast, got united under the government of the Ukrainian poet Serhiy Zhadan. He claims that he will continue uniting Ukraine, bringing peace to the country and trying to save as many people as his government can."
 FreicorpsMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrisome development. The Donbas region, along with Kharkiv oblast, got united under the banner of the Freikorps movement. Spokespersons claim that they will continue uniting Ukraine, transforming the country into a state with nationalist beliefs in its core."
 AzovMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrisome development. The Donbas region, along with Kharkiv oblast, got united under the banner of the Azov regiment. Spokespersons claim that Azov will continue the unification of Ukraine, transforming it into a new, nationalist state, with the Ukrainian nation at its core, also giving a fight to any threats to it."
 DanilovMicroRegionUnififerDesc:0 "Ukrainian crisis has a new push. The Donbas region along with Kharkiv oblast got united under the government of Oleksiy Danilov. He claims that he will unite Ukraine, ensuring the return of Ukraine's independent statehood with democratic institutions, also willing to cooperate with the West in solving the Ukrainian crisis."
 SavchenkoMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Donbas region, along with Kharkiv oblast, got united under the government of Nadiia Savchenko. She claims that she will continue the unification of Ukraine, also ensuring to bring Ukraine a truly new era without corrupt politics and with a truly people's government, which will help the people with every need."
 KhomutMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Donbas region, along with Kharkiv oblast, got united under the government of Vitaliy Khomutynnik. He claims that he will continue the unification of Ukraine, bringing peace to the fallen country and creating a prosperous state with citizens in the first place."
 KryvonosMicroRegionUnifierDesc:0 "Ukrainian crisis has a new push. The Donbas region, along with Kharkiv oblast, got united under the military government of the former Ukrainian general Serhiy Kryvonos. He claims that he will bring order to Ukraine, uniting it further and getting rid of anyone who acts on behalf of themselves and not the Ukrainian state."
 PidorMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrisome development. The Donbas region, along with Kharkiv oblast, got united under the separatist 'Novorossiya' movement government with former Donetsk People's Republic leader Denis Pushilin. He claims that 'Novorossiya' will continue to expand further, freeing the oppressed peoples of Ukrainian south-eastern territories and uniting with the Russian Federation."
 HuyMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrisome development. The Donbas region, along with Kharkiv oblast, got united under the separatist 'Novorossiya' movement government with former Luhansk People's Republic leader Leonid Pasechnik. He claims that 'Novorossiya' will continue to expand further, freeing itself from the oppression of the former Ukrainian state and choosing its own path."
 VitrenkoMicroRegionUnifierDesc:0 "Ukrainian crisis got some worrisome development. The Donbas region, along with Kharkiv oblast, got united under the separatist 'Novorossiya' movement government with former 'Progressive Socialist Party of Ukraine' leader Nataliya Vitrenko. She claims that she will continue the unification of Ukraine, and she will transform it into a socialist state, where the rights of oppressed and deprived people will be elevated, and Ukraine will return to the brotherhood of brotherly Eastern Slavic peoples."
 GirkinMicroRegionUnifierDesc:0 "Ukrainian crisis got some unforeseen development. The Donbas region, along with Kharkiv oblast, got united under the separatist 'Novorossiya' movement government with former Russian security services colonel Igor Strelkov. He claims that his goal is to return the monarchy to the Russian lands and will march without hesitation to restore the Russian Empire."
