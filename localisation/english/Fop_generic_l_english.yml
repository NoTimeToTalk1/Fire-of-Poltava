 FreicorpsBankUnifierDesc:0 "Ukrainian crisis got some worrisome development. Left bank of Ukraine got united under the banner of the Freikorps movement. Spokespersons claim that they will continue uniting Ukraine, transforming the country into a state with nationalist beliefs in its core."
 AzovBankUnifierDesc:0 "Ukrainian crisis got some worrisome development. Left bank of Ukraine got united under the banner of the Azov regiment. Spokespersons claim that Azov will continue the unification of Ukraine, transforming it into a new, nationalist state, with the Ukrainian nation at its core, also giving a fight to any threats to it."
 DanilovRegionUnififerDesc:0 "Ukrainian crisis has a new push. The Donbas region along with Kharkiv oblast got united under the government of Oleksiy Danilov. He claims that he will unite Ukraine, ensuring the return of Ukraine's independent statehood with democratic institutions, also willing to cooperate with the West in solving the Ukrainian crisis."
 SavchenkoBankUnifierDesc:0 "Ukrainian crisis has a new push. Left bank of Ukraine got united under the government of Nadiia Savchenko. She claims that she will continue the unification of Ukraine, also ensuring to bring Ukraine a truly new era without corrupt politics and with a truly people's government, which will help the people with every need."
 KhomutBankUnifierDesc:0 "Ukrainian crisis has a new push. Left bank of Ukraine got united under the government of Vitaliy Khomutynnik. He claims that he will continue the unification of Ukraine, bringing peace to the fallen country and creating a prosperous state with citizens in the first place."
 KryvonosBankUnifierDesc:0 "Ukrainian crisis has a new push. Left bank of Ukraine got united under the military government of the former Ukrainian general Serhiy Kryvonos. He claims that he will bring order to Ukraine, uniting it further and getting rid of anyone who acts on behalf of themselves and not the Ukrainian state."
 PidorBankUnifierDesc:0 "Ukrainian crisis got some worrisome development. Left bank of Ukraine got united under the separatist 'Novorossiya' movement government with it's leader Denis Pushilin. He claims that 'Novorossiya' will continue to expand further, freeing the oppressed peoples of Ukrainian south-eastern territories and uniting with the Russian Federation."
 HuyBankUnifierDesc:0 "Ukrainian crisis got some worrisome development. Left bank of Ukraine got united under the separatist 'Novorossiya' movement government with it's leader Leonid Pasechnik. He claims that 'Novorossiya' will continue to expand further, freeing itself from the oppression of the former Ukrainian state and choosing its own path."
 VitrenkoBankUnifierDesc:0 "Ukrainian crisis got some worrisome development. Left bank of Ukraine got united under the separatist 'Novorossiya' movement government with it's leader Nataliya Vitrenko. She claims that she will continue the unification of Ukraine, and she will transform it into a socialist state, where the rights of oppressed and deprived people will be elevated, and Ukraine will return to the brotherhood of brotherly Eastern Slavic peoples."
 GirkinBankUnifierDesc:0 "Ukrainian crisis got some unforeseen development. Left bank of Ukraine got united under the separatist 'Novorossiya' movement government with it's leader Igor Strelkov. He claims that his goal is to return the monarchy to the Russian lands and will march without hesitation to restore the Russian Empire."
 DniproBankUnifierDesc:0 "Ukrainian crisis has a new push. Left bank of Ukraine got united under the rule of the so-called 'Conglomerate', by various sources led by former Ukrainian oligarchs. They are pursuing the goal of uniting whole Ukraine under their rule, known as some people as 'capitalist utopia' or 'neo-serfdom'."
 HalychynaFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Ruslan Koshulynskyi, his government was successful in uniting the country. Bringing peace to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 RivneFinalUnifierDesc:0 "Ukraine has finally been unified. It became possible under the banner of the former criminal authorities, who claimed themselves such tremendous amount of powers as the whole country instead of their former jails. Establishing their own rules, they are leading the country now."
 TernopilFinalUnifierDesc:0 "Ukraine has finally been unified. Esotericists, who started from festival in Ternopil, have claimed whole Ukraine for themselves. The country now faces a process of reshaping from secular state into old slavic traditions, going quite back in technological development and converting everyone into old slavic faith."
 VolhyniaFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Yuriy Lutsenko, his government was successful in uniting the country. Bringing peace and stability to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 ZhytomyrFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Yulia Tymoshenko, her government was successful in uniting the country. Bringing peace to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 VinnytsiaFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Oleh Liashko, his government was successful in uniting the country. Bringing peace to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 KyivFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Volodymyr Zenelskyy, his government was successful in uniting the country. Bringing peace to the broken country, caused by the turmoil around his inauguration in 2019, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 ChernihivFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Petro Poroshenko, his government was successful in uniting the country. Bringing peace and stability to the broken country, caused by the turmoil around his protest to the new government in 2019, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."
 YushchenkoFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Viktor Yushchenko, his government was successful in uniting the country. Bringing peace and stability to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it. President Yushchenko is finally able to picture Ukraine into his view."
 SmeshkoFinalUnifierDesc:0 "Ukraine has finally been unified. Led under Ihor Smeshko, his government was successful in uniting the country. Bringing peace and stability to the broken country, citizens are widely celebrating across the country. Ukraine awaits years of rebuilding, but the government is ready for it."

