 FOP_generic.1.t:0 "Fire of Poltava"
 FOP_generic.1.d:0 "During the 2019 presidential elections, our country has endulged in chaos. Elections have ruined Ukraine, with many different warlords emerging here and there, in attempt to grab some power, and most with intent to get the whole Ukraine at their own hands. Our government shall begin it's way of success in this fire... Fire of Poltava."
 FOP_generic.1.a:0 "Fire writing fr fr like Fire of Poltava"
 FOP_generic.2.t:0 "Some progress report"
 FOP_generic.2.d:0 "Fire of Poltava started around two months ago, and - what a miracle - we are still here. Maybe it is too bold to asume, but we have chances to go survive, if we are at this point. Our government succeeded in holding a piece of land for some amount of time, so let's focus on going further."
 FOP_generic.2.a:0 "Splendid!"
 FOP_generic.3.t:0 "Choosing our starting doctrine"
 FOP_generic.3.d:0 "In times of such a turmoil, military is the key factor of our affairs. Without forces, anyone will be able to overcome us, so this is the priority number one.\n\nWe just need to think about what to start with. We can organize some militias, but we cannot be sure, if they will be competent. We can look for vehicles to supply our corps, but they surely won't be enough for strong military. And we can look for military professionals, who live on our territories, but our enemies simply can overcome them in quantity, and that process will take long period of time.\n\nThe choice lies on us."
 FOP_generic.3.a:0 "We should organize militias."
 FOP_generic.3.b:0 "We should look for vehicles."
 FOP_generic.3.c:0 "We should look for professionals."
 FOP_generic.4.t:0 "Troubles with mobilization"
 FOP_generic.4.d:0 "Ukraine is glorious with it's army ventures. Campaigns of Rus knyazes, who held Byzantine in horror, glory of kozaks, who made troubles for various empires, legion of Sichovi Stril'tsi and Ukrainian Partizan Army, who fought for Ukraine's independence. The sad part in this all is that those tales doesn't motivate the most of our population to participate in military, who would rather choose to live 'out of politics' and contribute only to themselves. We have a troubling mobilization campaign."
 FOP_generic.4.a:0 "They shall serve us eventually."
 FOP_generic.5.t:0 "Outcome of our policies"
 FOP_generic.5.d:0 "People are happy with our decision to make their life easier. Unfortunately, this also means, that they do not want to do at least something for us."
 FOP_generic.5.a:0 "Damn it!"
 FOP_generic.6.t:0 "Outcome of our policies"
 FOP_generic.6.d:0 "People are not happy with our decision to make things better for state. They are opposing our decision, and that's not for our benefit."
 FOP_generic.6.a:0 "Damn it!"
 FOP_generic.7.t:0 "Economy report"
 FOP_generic.7.d:0 "It's a miracle! Our economy just starts to work, and that means, that we will be able to somehow stimulate survival of our state and our people! More is to be expected!"
 FOP_generic.7.a:0 "Great!"
 
 FOP_global_warlord.1.t:0 "[FROM.GetName] unifies Galicia!"
 FOP_global_warlord.1.d:0 "[GetGaliciaGlobalEventDesc]"
 HalychynaUnifierDesc:0 "Ukrainian crisis has a new push. The Galicia region got united under the banner of the so-called Republic of Halychyna, led by Ruslan Koshulynsky. Putting through the unrest, new provisional government has been formed, aiming to maintain stability in the region and to aid in the recovery of fallen Ukraine."
 RivneUnifierDesc:0 "Ukrainian crisis got some shady development. The Galicia region got united under the banner of 'Burshtyn Republic', formed by the notorious criminal authorities. Overcoming other forces, they have claimed control over the region, and they have already started bringing their own order to all the people that remain there."
 TernopilUnifierDesc:0 "Ukrainian crisis brings terryfying news. The Galicia region got united under the banner of neo-pagans, who brought the disorder to Ternopil oblast, and now they are controlling more territories. Nobody knows, what their next moves gonna be, but it is obvious that most certainly it will bring troubles."
 VolhyniaUnifierDesc:0 "Ukrainian crisis has a new push. The Galicia region got united under the government of the former prosecutor general Viktor Lutsenko, who first brought stability to the Volhynia region, and now he has formed new provisional government in the west of Ukraine. His government aims to bring further stability in the region, and, perhaps, whole Ukraine."
 KyivUnifierDesc:0 "Ukrainian crisis has a new push. Northern part of Ukraine got united under the government of Volodymyr Zelensky, recognized as the sixth president of Ukraine before the start of the crisis. Overcoming his political opponents, he has declared that he will continue to recover Ukraine from the crisis and will unite Ukraine again."
 PoroshenkoUnifierDesc:0 "Ukrainian crisis has a new push. Northern part of Ukraine got united under the government of"
 united_galicia: "United Galicia Ukraine"
 united_podolia: "United Podolia Ukraine"
 united_siveria: "United Siveria Ukraine"
 united_dnieper: "United Dnieper Ukraine"
 united_buh: "United buh Ukraine"
 united_tavria: "United Tavria Ukraine"
 united_donbas: "United Donbas Ukraine"
