 FOP_Lessons_From_Old_Mistakes:0 "Lessons from Old Mistakes"
 FOP_Lessons_From_Old_Mistakes_desc:0 "Our past failures must guide future reforms."
 FOP_Cleaning_Up_Soviet_Trash:0 "Cleaning Up Soviet Leftovers"
 FOP_Cleaning_Up_Soviet_Trash_desc:0 "Outdated practices hinder modern warfare."
 FOP_Our_Own_Weaponry:0 "Our Own Weaponry"
 FOP_Our_Own_Weaponry_desc:0 "Reliance on domestic arms ensures independence."
 FOP_Takticheskaya_Doctrine:0 "Tactical Doctrine"
 FOP_Takticheskaya_Doctrine_desc:0 "Old-school doctrine still has its supporters."
 FOP_Contact_CSTO_Countries:0 "Contact CSTO Countries"
 FOP_Contact_CSTO_Countries_desc:0 "Eastern military ties remain an option."
 FOP_Respect_The_Command:0 "Respect the Command"
 FOP_Respect_The_Command_desc:0 "Strict hierarchy ensures obedience and order."
 FOP_New_Army_Way:0 "A New Army Way"
 FOP_New_Army_Way_desc:0 "A uniquely tailored doctrine for our conditions."
 FOP_Army_Reform_Comitee:0 "Army Reform Committee"
 FOP_Army_Reform_Comitee_desc:0 "Systematic reform requires centralized oversight."
 FOP_Encourage_Youth:0 "Encourage the Youth"
 FOP_Encourage_Youth_desc:0 "The future of the army lies with the younger generation."
 FOP_We_Fight_For_Future:0 "We Fight for the Future"
 FOP_We_Fight_For_Future_desc:0 "Our sacrifices today secure tomorrow."

 ### GOVERNMENT ###
 FOP_Government_Reforms:0 "Government Reforms"
 FOP_Government_Reforms_desc:0 "State institutions must be stabilized."
 FOP_Reforming_The_Cabinet:0 "Reforming the Cabinet"
 FOP_Reforming_The_Cabinet_desc:0 "Leadership renewal is inevitable."
 FOP_New_Faces_In_Charge:0 "New Faces in Charge"
 FOP_New_Faces_In_Charge_desc:0 "Fresh minds bring new solutions."
 FOP_Rely_On_Old_Ones:0 "Rely on the Old Guard"
 FOP_Rely_On_Old_Ones_desc:0 "Experience should not be discarded lightly."
 FOP_Ensure_Completion_Of_Duties:0 "Ensure Completion of Duties"
