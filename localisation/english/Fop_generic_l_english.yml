 ### Focus tree and events
 FOP_Fire_Of_Poltava:0 "Fire Of Poltava"
 FOP_Fire_Of_Poltava_desc:0 "After the events in Poltava, when representatives of various political entities got into massive fight, our country has broken apart. We must prepare for further hardships."
 FOP_We_Are_Holding:0 "We Are Holding"
 FOP_We_Are_Holding_desc:0 "Some time has passed, and we still afloat. We must continue further."
 FOP_Time_To_Reorganise:0 "Time To Reorganize"
 FOP_Time_To_Reorganise_desc:0 "In our current situation, keeping the past level of how things had been is impossible. Our forces, our government and our economy should be adapted to current realities."
 FOP_What_About_Army:0 "What About Army"
 FOP_What_About_Army_desc:0 "Military is our guarantee for surviving against our neighbors. The question is - what should it be?"
 FOP_Rely_On_Militias:0 "Rely On Militias"
 FOP_Rely_On_Militias_desc:0 "Militias are poor, and at the same time fast solution to army structure. With gathering people and giving them guns, we can make up forces pretty fast."
 FOP_Rely_On_Vehicles:0 "Rely On Vehicles"
 FOP_Rely_On_Vehicles_desc:0 "Vehicles is the pinnacle of modern war. Those, who have mobile weapons and personnel transporters, can get advantage pretty quickly."
 FOP_Rely_On_Professionals:0 "Rely On Professionals"
 FOP_Rely_On_Professionals_desc:0 "Army professionalism is what can make difference in any situation. With finding skilled men for military actions, we can ensure our survival."
 FOP_Gather_Militants:0 "Gather Militants"
 FOP_Gather_Militants_desc:0 "We shall gather people to make up our forces. In current situation, we can easily find someone who wants to get a gun and be a hero."
 FOP_Seize_What_We_Can:0 "Seize What We Can"
 FOP_Seize_What_We_Can_desc:0 "Our territory is full of different vehicles, for which we can find usage. Police depots and military bases should be searched for them."
 FOP_Search_For_Skilled_Personnel:0 "Search For Skilled Personnel"
 FOP_Search_For_Skilled_Personnel_desc:0 "Our lands may have many professionals, who are currently retired or working elsewhere. We should bring them to our forces."
 FOP_Making_Up_General_Staff:0 "Making Up General Staff"
 FOP_Making_Up_General_Staff_desc:0 "Military command is important in controlling forces, so a new general staff should be made up of people, skilled enough to command army groups."
 FOP_Find_Warehouses:0 "Find Warehouses"
 FOP_Find_Warehouses_desc:0 "Infantry equipment is stored within many points on our territory, and now the time has come to get them for usage."
 FOP_Mobilisation:0 "Mobilization"
 FOP_Mobilisation_desc:0 "Security cannot exist without people, who secure the state. Considering new times, people shall be mobilized for military."
 FOP_Prepare_Equipment_Production:0 "Prepare Equipment Production"
 FOP_Prepare_Equipment_Production_desc:0 "It is good that we can use what was left for us, but it will not be unnecessary to product our own equipment, so we will not be left without nothing at some time."
 FOP_Bad_Times:0 "Bad Times"
 FOP_Bad_Times_desc:0 "Ruin has come to our lands. We must think of how we treat that situation, whether we will get harsher to endure, or let the people live more happily in such crap."
 FOP_Require_Better_Treatment:0 "Require Better Treatment"
 FOP_Require_Better_Treatment_desc:0 "Why should we not care about our own people? We shall ease up their suffering and be a human-centric government, so they will accept us."
 FOP_Make_Strong_People:0 "Make Strong People"
 FOP_Make_Strong_People_desc:0 "Why should we care about wishes of our people, when we are struggling to survive? We shall get stronger and harsher rule, so that we will meet new challenges easily."
 FOP_Reorganise_The_Administration:0 "Reorganize The Administration"
 FOP_Reorganise_The_Administration_desc:0 "Old times are slowly waning away, and our administration cannot work like it had been in past. Reorganisation of administration from local to independent will help us in new times."
 FOP_Appease_The_Populace:0 "Appease The Populace"
 FOP_Appease_The_Populace_desc:0 "People are making mess everywhere, striking and going mad. They should be appeased for the sake of our stability."
 FOP_Earn_The_Trust:0 "Earn The Trust"
 FOP_Earn_The_Trust_desc:0 "Believe it or not, people have trusted ukrainian government to some extent, and seeing new leaders will be troubling for them. We should get their trust, and they will come handy in the future."
 FOP_Its_Fine:0 "It's Fine"
 FOP_Its_Fine_desc:0 "While we are living in this mess, we still live, isn't that right? We made everything we could, and we are going more or less stable."
 FOP_No_Time_To_Whine:0 "No Time To Whine"
 FOP_No_Time_To_Whine_desc:0 "People should adapt to new realities, and it will be best for them, if they want to live on. We won't be listening to small cries, while we are fixing huge problems."
 FOP_We_Will_See_The_Future:0 "We Will See The Future"
 FOP_We_Will_See_The_Future_desc:0 "Even in the darkest times, there always has been a glimpse of light, coming for guidance for the future, and we will embrace the glimpse of future possibilities, which are yet to come!"
 FOP_Look_Into_Industry:0 "Look Into Industry"
 FOP_Look_Into_Industry_desc:0 "Industry is what allows us to eat and exist in modern human civilization. We shall look into it to see how we can adapt it for new times."
 FOP_The_More_The_Better:0 "The More The Better"
 FOP_The_More_The_Better_desc:0 "There is no time for us to concentrate on quality products, while we do not have enough of that. Ramp up the production en masse!"
 FOP_Concentrate_Product_Quality:0 "Concentrate Product Quality"
 FOP_Concentrate_Product_Quality_desc:0 "Quality means reliability and confidence. It will be stupid of us to neglect that aspect, so watch closely for producting high-class products!"
 FOP_Stabilize_Production:0 "Stabilize Production"
 FOP_Stabilize_Production_desc:0 "Various industrial complexes are living by themselves as for now. It's not right, so it's better to coordinate their efforts for more effective production."
 FOP_Expand_Factories:0 "Expand Factories"
 FOP_Expand_Factories_desc:0 "In past, government would only invest in factories, which they've seen best only for those with money, not for the state. Now, expanding industrial capacities is a necessity."
 FOP_Organize_Workers:0 "Organize Workers"
 FOP_Organize_Workers_desc:0 "Industry cannot function without workers. We shall gather and organize workers for the sake of industrial production."
 FOP_The_More_We_Work_The_Better_Our_Chances:0 "The More We Work The Better Our Chances"
 FOP_The_More_We_Work_The_Better_Our_Chances_desc:0 "Economical situation is directly proportional to amount of work which was put in that. More work means more possibilities and chances for survival."
 FOP_Rudimentary_Resource_Production:0 "Rudimentary Resource Production"
 FOP_Rudimentary_Resource_Production_desc:0 "When Ukraine has fallen to chaos, many western investors and companies tried to get away as much as possible. Markets are closed for us too, so we need to organize own resources production to keep up our industry."
 FOP_Jumpstart_The_Industry:0 "Jumpstart The Industry"
 FOP_Jumpstart_The_Industry_desc:0 "We made many efforts towards that, so we should come to our new industrial capabilities!"

 ### CORE START ###
 FOP_We_Stand_On_Ground:0 "We Stand on Solid Ground"
 FOP_We_Stand_On_Ground_desc:0 "Despite chaos and uncertainty, we still hold territory, people, and purpose. This is our starting point."
 FOP_Establish_Regional_Administration:0 "Establish Regional Administration"
 FOP_Establish_Regional_Administration_desc:0 "Local governance must be restored to maintain order and legitimacy."
 FOP_Appeal_To_The_People:0 "Appeal to the People"
 FOP_Appeal_To_The_People_desc:0 "Only public support can legitimize our rule in these difficult times."
 FOP_Open_For_Business:0 "Open for Business"
 FOP_Open_For_Business_desc:0 "Economic activity must resume, even under imperfect conditions."

 ### MILITARY BRANCH ###
 FOP_Army_Reorganisation:0 "Army Reorganisation"
 FOP_Army_Reorganisation_desc:0 "Our armed forces require structure, doctrine, and discipline."
 FOP_Expand_Staff:0 "Expand the Staff"
 FOP_Expand_Staff_desc:0 "A modern army needs a capable and expanded command structure."
 FOP_Weapon_Markets:0 "Weapon Markets"
 FOP_Weapon_Markets_desc:0 "If we cannot produce weapons fast enough, we must buy them."
 FOP_Military_Industry_Development:0 "Military Industry Development"
 FOP_Military_Industry_Development_desc:0 "Domestic arms production is the backbone of sovereignty."
 FOP_Gather_Munitions_From_Citizens:0 "Gather Munitions from Citizens"
 FOP_Gather_Munitions_From_Citizens_desc:0 "Every bullet counts. Even civilian stockpiles must be mobilized."
 FOP_Encourage_Local_Workshops:0 "Encourage Local Workshops"
 FOP_Encourage_Local_Workshops_desc:0 "Small-scale production can still sustain the war effort."
 FOP_Recruitment_Issue:0 "The Recruitment Issue"
 FOP_Recruitment_Issue_desc:0 "Manpower shortages force us to reconsider who must serve."
 FOP_Who_Was_Made_To_Serve:0 "Who Was Made to Serve"
 FOP_Who_Was_Made_To_Serve_desc:0 "Military duty should fall on those most fit for it."
 FOP_Army_Service_Will_Touch_Everyone:0 "Army Service Will Touch Everyone"
 FOP_Army_Service_Will_Touch_Everyone_desc:0 "Total mobilization is harsh, but sometimes unavoidable."
 FOP_Mandated_Rearline_Jobs:0 "Mandated Rearline Jobs"
 FOP_Mandated_Rearline_Jobs_desc:0 "Those who cannot fight must still contribute."
 FOP_Self_Defence_Training_Programmes:0 "Self-Defence Training Programmes"
 FOP_Self_Defence_Training_Programmes_desc:0 "A trained population is harder to defeat."
 FOP_Ease_Up_Conscription_Requirements:0 "Ease Conscription Requirements"
 FOP_Ease_Up_Conscription_Requirements_desc:0 "Broader criteria will increase manpower reserves."
 FOP_Good_Mobilization_Bonuses:0 "Mobilization Incentives"
 FOP_Good_Mobilization_Bonuses_desc:0 "Proper benefits can soften the burden of service."

