 FOP_Regulations:0 "Regulations"
 FOP_Regulations_desc:0 "Balanced control ensures stability."
 FOP_State_Controlled_Economy:0 "State-Controlled Economy"
 FOP_State_Controlled_Economy_desc:0 "Strategic sectors belong to the state."
 FOP_Local_Deals:0 "Local Deals"
 FOP_Local_Deals_desc:0 "Compromise with existing power structures."
 FOP_Oligarchs_Banned:0 "Ban the Oligarchs"
 FOP_Oligarchs_Banned_desc:0 "Economic power must be broken."
 FOP_New_Currency:0 "New Currency"
 FOP_New_Currency_desc:0 "A fresh start for the economy."
 FOP_Revaluate_Hryvnia:0 "Revaluate the Hryvnia"
