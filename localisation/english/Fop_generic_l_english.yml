 ###HAW HAW HAW MERRY CHRISTMAS
 jolly.1.t:0 "Christmas Present"
 jolly.1.d:0 "Since the establishment of the Transcarpathian administration, a neutral entity in the political bacchanalia that gripped Ukraine, the life of our boys on the Hungarian border has been quite unenviable. Every single day, on both sides, local Magyars would throw vivid curses at them, which none of the border guards understood anyway, occasionally throwing stones, garbage, and anything else that came to hand, and even daring to rob soldiers on their own territory during a good night's sleep. Their lives were not sweet, in short. And so it has been for six months. Constant rotations, an increase in the number of border guards, and the deployment of more equipment certainly helped in some ways, both in terms of morale for the soldiers and in practical terms, as the local Hungarians have already thought three times about whether they should throw bottles at the checkpoint when there was a whole tank there, but in general, everything remained as it had been before.\n\nRegular inspections did report to the management about the depressed morale of the men at the border, but any decisions from above did not have any great results, only partially improving the terrible conditions. Negotiating with either the Hungarian border guard service or the leaders of Hungarian "guerrilla" movements in the region was not an option, as none of them recognised the regional government as the ruling one in the Transcarpathian lands, but the leader of this government, and the only remaining authority in the entire region who had not betrayed it, Hennadiy Moskal, had an idea.\n\nOn the day of Christmas Eve, when our boys continued to keep watch on the border, a car arrived at one of the checkpoints. A figure in a red and white hat, with a lush white beard, and a bright red coat got out of it, pulling a bag full of stuff from the back seat. It was Mr Moskal. "Ho-ho-ho, my dear boys," he said happily. "Come here, to hell with those Uralians for a minute." The whole platoon gathered around him, laughing and giggling. Continuing with his jokes about the Hungarians on the other side of the barricade, Moskal gave each soldier a well-wrapped box from his bag, wishing them joy and strength. After handing out his colourfully wrapped gifts to each soldier, Mr Moskal shouted with all his might "Christ is born!", which was followed by a loud and proud soldier's response of "Glory to Him!". After once again wishing everyone a Merry Christmas and spitting in the direction of the Hungarian border, our local Santa Claus threw his still-full bag into the car, got in, closed the door, and drove away with carols blaring through the stereo system to the next checkpoint."
 jolly.1.a:0 "Christ is born!"
 
 
