 reg_exp_ukraine.5.a: "Great proposal, we agree."
 reg_exp_ukraine.5.b: "Maybe it's better to cut government between us?"
 reg_exp_ukraine.5.c: "We refuse."
 reg_exp_ukraine.6.t: "Get ready for elections"
 reg_exp_ukraine.6.d: "Electoral race is starting soon. We should get support of people, so our government will be on top."
 reg_exp_ukraine.6.a: "Let's begin!."
