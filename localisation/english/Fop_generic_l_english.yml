 FOP_New_Markets:0 "New Markets"
 FOP_New_Markets_desc:0 "Diversification reduces dependency."
 FOP_Economy_Model:0 "Economic Model"
 FOP_Economy_Model_desc:0 "The state must choose its economic direction."
