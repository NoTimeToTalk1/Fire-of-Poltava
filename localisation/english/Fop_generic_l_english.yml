 ### LAW & CONSTITUTION ###
 FOP_Call_Law_Revision_Comission:0 "Call Law Revision Commission"
 FOP_Call_Law_Revision_Comission_desc:0 "The legal system must be reviewed."
 FOP_Revisiting_The_Law:0 "Revisiting the Law"
 FOP_Revisiting_The_Law_desc:0 "Old laws no longer match reality."
 FOP_Our_Own_Vision:0 "Our Own Vision"
 FOP_Our_Own_Vision_desc:0 "A new legal framework, shaped by our experience."
 FOP_Readopt_Ukrainian_Constitution:0 "Readopt the Ukrainian Constitution"
 FOP_Readopt_Ukrainian_Constitution_desc:0 "Returning to a known legal foundation."
 FOP_European_Standart_Of_Law:0 "European Standard of Law"
 FOP_European_Standart_Of_Law_desc:0 "Rule of law aligned with Europe."
 FOP_We_Know_Law_Better:0 "We Know Better"
 FOP_We_Know_Law_Better_desc:0 "External standards are not always applicable."
 FOP_Rule_Of_Hard_Hand:0 "Rule of a Firm Hand"
 FOP_Rule_Of_Hard_Hand_desc:0 "Order before freedom."
 FOP_New_Laws_New_Times:0 "New Laws for New Times"
 FOP_New_Laws_New_Times_desc:0 "Reform must eventually stabilize society."
 FOP_Media_Question:0 "The Media Question"
 FOP_Media_Question_desc:0 "The role of media in our state remains unclear. Whether it should be tightly controlled or allowed greater freedom is a matter of debate."
 FOP_Police_Enforcement:0 "Police Enforcement"
 FOP_Police_Enforcement_desc:0 "Strengthening law enforcement agencies will ensure stability and order, but may come at the cost of public trust."
 FOP_Elections_Question:0 "The Elections Question"
 FOP_Elections_Question_desc:0 "The integrity and structure of elections must be addressed. Fair representation or controlled outcomes so the choice will define our future."
 FOP_New_Laws_New_Times:0 "New Laws for New Times"
 FOP_New_Laws_New_Times_desc:0 "The changing world demands a modern legal framework. We must adapt our laws to meet contemporary challenges."
 FOP_Review_Law_Holes:0 "Review Legal Loopholes"
 FOP_Review_Law_Holes_desc:0 "Our legal system is riddled with inconsistencies and loopholes. Identifying and correcting them is essential for a functional state."
 FOP_Solve_Long_Lasting_Issues:0 "Resolve Long-Standing Issues"
 FOP_Solve_Long_Lasting_Issues_desc:0 "Decades-old legal and institutional problems continue to plague the nation. It is time to finally address them."
 FOP_Laws_How_They_Meant_To_Be:0 "Laws as They Were Meant to Be"
 FOP_Laws_How_They_Meant_To_Be_desc:0 "With reforms in place, we can now shape a legal system that truly reflects its intended purpose — justice and order."
 FOP_Allow_Mild_Changes:0 "Allow Mild Changes"
 FOP_Allow_Mild_Changes_desc:0 "Small adjustments to the legal framework will allow flexibility while preserving stability."
 FOP_Law_Stays_As_He_Was:0 "Preserve the Law"
 FOP_Law_Stays_As_He_Was_desc:0 "The law must remain unchanged. Stability and consistency are more valuable than risky reforms."

