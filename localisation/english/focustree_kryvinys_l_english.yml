l_english: 
kryvonys_cum_into_power:0 "§1Don't get distracted, brother! We still need to restore the former glory of Ukraine!§!"

AFU_kozackomy_rodu_nema_prevodu:0 "Kozatskomu Rodu Nema Perevodu"
AFU_kozackomy_rodu_nema_prevodu_desc:0 "Ukrainians have always been a freedom-loving people. We are descendants of the Scythians who kicked the Persian empire's arse, we are descendants of the Kozaks who crushed the Turkish armada, we are descendants of the UPA soldiers who fought Hitler and Stalin at the same time.. Ukrainians are always ready to defend their freedom wherever they are. Therefore, we should pay attention to the fact that many Ukrainians can no longer tolerate wartime laws."
AFU_there_is_no_time_for_democracy:0 "There is No Time for Democracy"
AFU_there_is_no_time_for_democracy_desc:0 "The time for democracy is not yet upon us. We must continue our dictatorship to ensure security and stability in Donbas."
AFU_continue_military_rule:0 "Continue Military Rule"
AFU_continue_military_rule_desc:0 "Continued militant rule means continued harsh regulations such as curfews, restrictions on entry and exit, and so on. We have to pass these tests and soon everything will be fine....."
AFU_reinforce_the_army:0 "Reinforce the Army"
AFU_reinforce_the_army_desc:0 "The army is the key to our existence and rule. We must provide the Armed Forces of Ukraine with everything necessary to unite our country."
AFU_armaments_programme:0 "Armaments programme"
AFU_armaments_programme_desc:0 "To sustain our army, we must provide it with good weapons."
AFU_renovate_enterprises:0 "Renovate Enterprises"
AFU_renovate_enterprises_desc:0 "After the war in Donbas, many factories suffered a lot. We should make efforts to restore them and ensure their stable operation."
AFU_solve_logistical_problems:0 "Solve Logistical Problems"
AFU_solve_logistical_problems_desc:0 "We have an extremely important logistics thing going on. The roads in Donbas are very terrible, our supply chain is working extremely badly. We have to do something about it"
AFU_opening_of_new_plants:0 "Opening of New Plants"
AFU_opening_of_new_plants_desc:0 "Since some enterprises are absolutely unsupported by the reconstruction, we will demolish them, and on the ruins of Donbas we will start opening new plants and factories. Of course to supply our army."
AFU_capture_the_kmdb:0 "Capture the KMDB"
AFU_capture_the_kmdb_desc:0 "The Kharkiv Morozov Machine Building Design Bureau is a Soviet and Ukrainian enterprise developing armoured vehicles. Earlier, the SE KMDB played a key role in the development of armoured tracked vehicles of the Soviet Union. After we got it for ourselves, we can establish an excellent production of tanks."
AFU_ontheground:0 "On the Ground..."
AFU_ontheground_desc:0 "We will increase production of ground vehicles such as tanks, cars and trucks."
AFU_intheair:0 "In the Air..."
AFU_intheair_desc:0 ""Chuguev Aircraft Repair Plant" is a Ukrainian state-owned aircraft repair plant located in the city of Chuguev, Kharkiv Oblast. One of the plant's activities is the production and repair of unmanned aerial vehicles. Thanks to it, the wings of our eagles will carry punishment for enemies on the ground."
AFU_syrskysplanthejerk:0 "Syrskyi's plan "The Jerk""
AFU_syrskysplanthejerk_desc:0 "Oleksandr Syrskyi will create a plan to liberate Ukraine's territories."
AFU_the_rich_will_pay:0 "The Rich Will Pay"
AFU_the_rich_will_pay_desc:0 "The bandits of the Dnepropetrovsk region will suffer the wrath of the Ukrainian army."
AFU_eastern_military_administration:0 "Eastern Military Administration"
AFU_eastern_military_administration_desc:0 "After the annexation of the Dnieper and Kharkiv, we are ready to form the Eastern Military Administration."
AFU_punishment_for_the_recalcitrant:0 "Punishment for the Recalcitrant"
AFU_punishment_for_the_recalcitrant_desc:0 "But with those who stand in our way, we have a short conversation. We gave them a chance to make amends and come home. But we didn't want them to. So all those who are against us will go digging in the Donetsk mud to provide our guys with everything they need."
AFU_officersstaffconvention:0 "Officers' Staff Convention"
AFU_officersstaffconvention_desc:0 "We should hold a staff meeting to draw up a plan of action to liberate Ukraine."
AFU_contact_their_police:0 "Contact their Police"
AFU_contact_their_police_desc:0 "We'll liaise with our opponents' security services so they don't interfere with our guys' work. They certainly have their own families and will not give their lives for some regional kingpin."
AFU_invite_observers:0 "Invite Observers"
AFU_invite_observers_desc:0 "We should invite international observers to help us restrain the Russian bear in his shithole den. Why should they come to us and not to some clown in Kyiv? Because we are the only stable and safe entity in Ukraine."
AFU_dontforgetabouttheeasternneighbour:0 "Don't Forget about the Eastern Neighbour"
AFU_dontforgetabouttheeasternneighbour_desc:0 "However, we should not forget our greatest enemy. He's the reason this whole thing started. Because of him, we are in this situation, our country is in ruins, families are divided. Russia is a goddamn cesspit. And we need to watch its actions to prevent the formation of new separatists."
AFU_take_a_sober_look_at_the_situation:0 "Take a Sober Look at the Situation"
AFU_take_a_sober_look_at_the_situation_desc:0 "We should deal with the political situation in Ukraine. We see many non-legitimate governments, we see neutral regional associations, we see rebellious armed forces. We need to deal with this in order to understand who is our own and who should be taken with our sword."
AFU_propaganda_against_opponents:0 "Propaganda Against Opponents"
AFU_propaganda_against_opponents_desc:0 "Our internal enemies in Ukraine are the main threat to our security and stability. They bring only chaos and distrust among the people. We are above them. We are stronger. We are smarter and kinder. We are good - they are evil."
AFU_liaising_with_soldiers_outside:0 "Liaising with Soldiers Outside"
AFU_liaising_with_soldiers_outside_desc:0 "Our main trump card is our armed forces and their connections. Every soldier has relatives and friends in territories that are not under the control of our government. We can contact enemy soldiers and offer them to come over to our side."
AFU_ukraine_will_be_free_and_strong:0 "Ukraine will be Free and Strong"
AFU_ukraine_will_be_free_and_strong_desc:0 "We're gonna do it! What the best sons and daughters of the Ukrainian people gave their lives for! Our dream of a strong and, most importantly, free Ukraine will finally come true. On the bayonets of our infantry, on the wings of aeroplanes, in the shade where the SSO works, and under the scorching sun where our boats sail - the spirit of freedom of the Cossaks rod will rise from their knees!"
AFU_guns_for_everyone:0 "Guns for Everyone"
AFU_guns_for_everyone_desc:0 "Guns are the guarantor of security. Guarantor of freedom and guarantee of rights. The more guns, the more freedoms. We will make it easier for our residents to buy and own guns. We will raise our popularity and fight crime. Also note that some residents from the liberated regions will probably pass over, because we don't trust them."
AFU_order_above_all_else:0 "Order Above All Else"
AFU_order_above_all_else_desc:0 "Security became our first priority before the unification of Ukraine. We expanded our headquarters and optimised state apparatuses. Ukraine comes first, the rest can wait."
AFU_friends_in_need:0 "Friends in Need"
AFU_friends_in_need_desc:0 "There are many military formations, police regimes and other police forces left on the territory of Ukraine that are completely loyal to the Armed Forces of Ukraine. We can negotiate with them and bring them under our wing."
AFU_kryvonys_political_career:0 "Give Them Some Liberties"
AFU_kryvonys_political_career_desc:0 "Our leader, Serhiy Kryvonis, will try himself as a politician. We will carry out certain reforms to support our government with the population. We will allow certain freedoms."
AFU_restorepartyveteransofato:0 "Restore Party "Veterans of ATO""
AFU_restorepartyveteransofato_desc:0 "Our political programme continues. We will continue the reforms. One of them will be the formation of a new political force "ATO Veterans". And although this name was already present in those damned elections in 2019, we will do everything to get the country out of the pit into which it was driven by corrupt officials and bandits."
AFU_not_yet_perished:0 "Not Yet Perished"
AFU_not_yet_perished_desc:0 "We are ready. We are invincible. Our will is unshakable and our sacred goal is to return freedom to Ukraine! And we will not stop at any threat."
AFU_thunder_and_fire:0 "Now only forward!"
AFU_thunder_and_fire_desc:0 "Our march will continue until Ukraine is united again."
AFU_the_only_lightweight_power:0 "The Only Lightweight Power"
AFU_the_only_lightweight_power_desc:0 "Our regime is the only legitimate regime in Ukraine. None of the other "local czars" can compete with the Armed Forces of Ukraine. We have defeated the separatists, we will destroy anyone who stands in our way. No matter who they are."
AFU_administrative_reform:0 "Administrative Reform"
AFU_administrative_reform_desc:0 "We should redistribute power in our own territory. The old faces, the corrupt and most likely Russian spies will be gone for good. They will be replaced by young faces appointed by the Council of Generals who will rebuild the territories."
AFU_andatsea:0 "And at Sea..."
AFU_andatsea_desc:0 "We are almost completely restricted by Russia on the sea side, so we are obliged to ensure the safety of our vessels. We will start production of new boats for coastal protection and patrols."
AFU_goritpalaetehnikavorozha:0 "Gorit` Palae Tehnika Vorozha"
AFU_goritpalaetehnikavorozha_desc:0 "Ridna Ukraina Peremozhe!"
AFU_use_everything_for_the_greater_good:0 "Use Everything for the Greater Good"
AFU_use_everything_for_the_greater_good_desc:0 "We should use all our strength to consolidate our power and unite Ukraine. There is no time and energy for such trivialities as democracy, freedom of speech and other farce. Only the Armed Forces of Ukraine, only hardcore!"
AFU_militarisation_of_society:0 "Militarisation of Society"
AFU_militarisation_of_society_desc:0 "Our forces need a respite and fresh blood. To this end, we will be engaged in the millitarisation of the population, the recruitment of new fighters and mass labour mobilisation."
AFU_build_more_supply_camps:0 "Build More Supply Camps"
AFU_build_more_supply_camps_desc:0 "After the labour mobilisation, we will send people to provide our supply."
AFU_send_young_people_to_work_in_factories:0 "Send Young People to Work in Factories"
AFU_send_young_people_to_work_in_factories_desc:0 "Child labour is also labour.... Of course, if it is agreed with their parents and is not forced. We will not force anyone, we will just ask all people who care about the fate of Ukraine to help rebuild the infrastructure and work in factories."
AFU_keep_military_dictatorship:0 "Keep Military Dictatorship"
AFU_keep_military_dictatorship_desc:0 "The preservation of our military dictatorship should ensure security and stability in Ukraine. No unnecessary freedoms until our goal is fulfilled."
AFU_create_councill_of_generals:0 "Create Councill of Generals"
AFU_create_councill_of_generals_desc:0 "We will create a new governing body, the Council of Generals. It will include representatives of the military administration and civilians and will solve problems on our territory."
AFU_strengthen_population_control:0 "Strengthen Population Control"
AFU_strengthen_population_control_desc:0 "Strengthening military control is a necessary measure. We need stability. We don't need separatists. We don't need liberals. We don't need leftists screaming about the oppression of their rights. We don't need that nonsense."
AFU_legalise_pmcs:0 "Legalise PMCs"
AFU_legalise_pmcs_desc:0 "One of the programmes of the old party was the legalisation of private military companies, with a view to a more active foreign policy and the creation of a good army. PMCs do not mean that hundreds of foreigners will fight for us, rather we will recruit them from our own citizens, to protect businesses and borders."
AFU_down_the_castle:0 "Down the Castle"
AFU_down_the_castle_desc:0 "Kharkiv is the old capital of Ukraine. A land rich in factories, where real Ukrainians live. We will take back this city."

AFU_reinforce_army_idea:0 "Reinforce the Army"
AFU_reinforce_army_idea_desc:0 "Having put enough millitary factories into work, now we're supplying our army with most modern weapons. This assures our victory and will boost our morale. "
AFU_armnament_programe_idea:0 "Armament Programme"
AFU_armnament_programe_idea_desc:0 "q"
AFU_repairing_zavodi:0 "Renovation of Factories"
AFU_logistic_problems:0 "Updated Logistics"
AFU_logistic_problems_desc:0 "e"
AFU_krivreformed_police:0 "Reformed Police"
AFU_krivreformed_police_desc:0 "e"
AFU_nato_observers:0 "NATO observers"
AFU_nato_observers_desc:0 "ya gey instructor iz nato"
AFU_cossaks_state:0 "Cossaks state"
AFU_cossaks_state_desc:0 "Cossaks state"
AFU_order_above_all_else_idea:0 "Order Above All Else"
AFU_order_above_all_else_idea_desc:0 "Total anarchy is not acceptable within AFU. Chaos and disanance will only bring instability to our army."
AFU_updated_military_administrations:0 "Updated Military Administrations"
AFU_updated_military_administrations_desc:0 "g"
AFU_militarisation_of_society:0 "Militarisation of Society"
AFU_militarisation_of_society_desc:0 "y"

