afu.35.t:0 "The Protection Project. New Era"
afu.35.d:0 ""The Protection Project. New Era", became the subject of a heated public debate and stirred up many spheres.\n\nThe government decree legalising private military companies was adopted at a time of economic and political instability associated with the political liberalisation of the Kryvonis regime. The decision was followed by the creation of a new agency, the Ukrainian Contract Association, which will regulate the activities of private military companies.\n\nThe move sparked heated debate among the public, military officials and political leaders. Human rights advocates and government critics expressed concerns about the potential for abuse of private military forces, while other groups supported the idea as a means of increasing efficiency and security.\n\nUnder this new arrangement, private military companies were granted legal status and certain privileges, given that their activities would be closely monitored and regulated. This step has opened the way for new discussions on the role of such companies in the security and defence of the country, and has also raised a number of complex ethical and legal issues."
afu.35.a:0 "Let's see how it goes."
