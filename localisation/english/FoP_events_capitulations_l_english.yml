l_english:
 cap.1.t:0 "Liberation of the Kharkiv region"
 cap.1.d:0 "Our army moved towards Kharkiv, tasked with liberating the city from titushky and restoring order. Step by step, with a defined strategy and with due regard for the civilian population, they advanced into the city where the titushky, led by Arsen Avakov, were trying to maintain control.\n\nExplosions and gunfire flashed through the night as the Ukrainian Armed Forces moved forward through the streets of Kharkiv. Specially trained units overcame obstacles, deployed to strategic locations, and with their ability to coordinate lightning-fast operations, they gained the upper hand in the fight for control of the city.\n\nArmed clashes took place in the streets, but our troops showed professionalism and high morale. The support of the local population, which was tired of Avakov's tyranny, helped to accelerate the pace of the operation.\n\nWith each step, the resistance of Avakov's supporters was felt to be fiercer. Through endurance and dedication, the Ukrainian Armed Forces eventually won the battle for Kharkiv, freeing it from the pressure of the titushky and establishing control over the city and region."
 cap.1.a:0 "Avakov's regime has come to an end."
 cap.2.t:0 "Shariah`s Triumph"
 cap.2.d:0 "Today, a great day. After fierce and bloody battles on all fronts, Anatoliy Shariy's troops defeated the main forces of Mykolayiv Autonomy and moved on the city itself, Mykolayiv like an impregnable bastion stood ready for the final battle.\n\nShariy's troops after a long preparation forced the Pivdennyi Bug and struck in the rear of the garrison, the troops abandoned Vitaly Kim, the leader of Mykolaiv and a bandit who terrorized the population of Mykolaiv during his despicable rule. Anatoliy Shariy's brave troops arrested his entire gang, which he called "the government" and hanged Kim in front of the cheering square.\n\nThe remaining Mikolaev's troops laid down their arms after such a turnaround, almost all police and all state structures took our side. Happy victory, adequates!"
 cap.2.a:0 "Hashtag YASHARU!"
 cap.3.t:0 "Dnipro fall!"
 cap.3.d:0 "This day will be remembered by many, the day when the Ukrainian army drove out of the city of Dnipro a gang of oligarchs who controlled it before the revolution, thanks to money, bribes and immense corruption.\n\nOn this day, after fierce battles for the right bank of the region fought with the private armies of the oligarchs and their police officers, who sold their part and families for a pittance. The fighting began on the left bank of the city, in industrial neighborhoods and powerful residential areas. After breaking through the residential areas, the city garrison gave battle in the harbor, but our troops victoriously captured hundreds of bandits.\n\nKolomoisky, one of the main directors of the Dnieper and for many the de facto leader of the Oligarchy, appealed to the people on the radio, calling on them to flee far away from those who allegedly came to burn and kill people under Nazi flags.\n\nHaving forcibly crossed the Dnieper, our brave troops finished off the Polizei and henchmen of the Oligarchate who fought with honor. Having broken into the buildings of the city administration our fighters of special purpose have caught by surprise only secretaries and clerks who have not had time to escape, meanwhile the top of this state together with the money have flown far away.\n\nBut now, the people of Dnipro are free from the oppression of oligarchs, hurray!"
 cap.3.a:0 "The greedy will get what they deserve for drinking our blood all these years."
 cap.4.t:0 "The stronghold of Collaborationism has been destroyed"
 cap.4.d:0 "Today the ZSU general staff confirmed the capture of the capital of the so-called Ukrainian republic, a de facto Russian puppet under the leadership of the OPzZh.\n\nHaving defeated OPzZh troops on strategic fronts and cut off the major cities from supplies, brave Ukrainian warriors began their assault on the city. In his agony 	[OPZ.GetLeader] mobilized everyone, suicidal attacks of whole platoons of children from 12 to 18 years old were launched, even old and disabled people were driven to the front like cannon fodder and expecting that this would change something. Mostly such mobilization groups surrendered after the second battle.\n\nThe enraged population of all the cities occupied by [OPZ.GetLeader] and his gang began to come out in protest, disarming the garrisons. Mostly this went unopposed, because our victory was already obvious to everyone!\n\nMeanwhile, in the remnants of the regime the population began to revolt against the OPzZh, and the remnants of the police, who had not yet been killed in the brutal urban meat grinder, were thrown in their way. With every hour our forces were getting closer and closer to the heart of the "Republic of Ukraine" and the police decided not to interfere with the uprising and surrendered, [OPZ.GetLeader] was hanged in the town square like Mussolini a couple minutes before our troops arrived."
 cap.4.a:0 "Another victory for the [AFU.GetLeader]."