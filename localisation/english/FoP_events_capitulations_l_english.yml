l_english:
 cap.1.t:0 "Liberation of the Kharkiv region"
 cap.1.d:0 "Our army moved towards Kharkiv, tasked with liberating the city from titushky and restoring order. Step by step, with a defined strategy and with due regard for the civilian population, they advanced into the city where the titushky, led by Arsen Avakov, were trying to maintain control.\n\nExplosions and gunfire flashed through the night as the Ukrainian Armed Forces moved forward through the streets of Kharkiv. Specially trained units overcame obstacles, deployed to strategic locations, and with their ability to coordinate lightning-fast operations, they gained the upper hand in the fight for control of the city.\n\nArmed clashes took place in the streets, but our troops showed professionalism and high morale. The support of the local population, which was tired of Avakov's tyranny, helped to accelerate the pace of the operation.\n\nWith each step, the resistance of Avakov's supporters was felt to be fiercer. Through endurance and dedication, the Ukrainian Armed Forces eventually won the battle for Kharkiv, freeing it from the pressure of the titushky and establishing control over the city and region."
 cap.1.a:0 "Avakov's regime has come to an end."
 cap.2.t:0 "Shariah`s Triumph"
 cap.2.d:0 "Today, a great day. After fierce and bloody battles on all fronts, Anatoliy Shariy's troops defeated the main forces of Mykolayiv Autonomy and moved on the city itself, Mykolayiv like an impregnable bastion stood ready for the final battle.\n\nShariy's troops after a long preparation forced the Pivdennyi Bug and struck in the rear of the garrison, the troops abandoned Vitaly Kim, the leader of Mykolaiv and a bandit who terrorized the population of Mykolaiv during his despicable rule. Anatoliy Shariy's brave troops arrested his entire gang, which he called "the government" and hanged Kim in front of the cheering square.\n\nThe remaining Mikolaev's troops laid down their arms after such a turnaround, almost all police and all state structures took our side. Happy victory, adequates!"
 cap.2.a:0 "Hashtag YASHARU!"
 cap.3.t:0 "Dnipro fall!"
 cap.3.d:0 "This day will be remembered by many, the day when the Ukrainian army drove out of the city of Dnipro a gang of oligarchs who controlled it before the revolution, thanks to money, bribes and immense corruption.\n\nOn this day, after fierce battles for the right bank of the region fought with the private armies of the oligarchs and their police officers, who sold their part and families for a pittance. The fighting began on the left bank of the city, in industrial neighborhoods and powerful residential areas. After breaking through the residential areas, the city garrison gave battle in the harbor, but our troops victoriously captured hundreds of bandits.\n\nKolomoisky, one of the main directors of the Dnieper and for many the de facto leader of the Oligarchy, appealed to the people on the radio, calling on them to flee far away from those who allegedly came to burn and kill people under Nazi flags.\n\nHaving forcibly crossed the Dnieper, our brave troops finished off the Polizei and henchmen of the Oligarchate who fought with honor. Having broken into the buildings of the city administration our fighters of special purpose have caught by surprise only secretaries and clerks who have not had time to escape, meanwhile the top of this state together with the money have flown far away.\n\nBut now, the people of Dnipro are free from the oppression of oligarchs, hurray!"
 cap.3.a:0 "The greedy will get what they deserve for drinking our blood all these years."
 cap.4.t:0 "The stronghold of Collaborationism has been destroyed"
 cap.4.d:0 "Today the ZSU general staff confirmed the capture of the capital of the so-called Ukrainian republic, a de facto Russian puppet under the leadership of the OPzZh.\n\nHaving defeated OPzZh troops on strategic fronts and cut off the major cities from supplies, brave Ukrainian warriors began their assault on the city. In his agony 	[OPZ.GetLeader] mobilized everyone, suicidal attacks of whole platoons of children from 12 to 18 years old were launched, even old and disabled people were driven to the front like cannon fodder and expecting that this would change something. Mostly such mobilization groups surrendered after the second battle.\n\nThe enraged population of all the cities occupied by [OPZ.GetLeader] and his gang began to come out in protest, disarming the garrisons. Mostly this went unopposed, because our victory was already obvious to everyone!\n\nMeanwhile, in the remnants of the regime the population began to revolt against the OPzZh, and the remnants of the police, who had not yet been killed in the brutal urban meat grinder, were thrown in their way. With every hour our forces were getting closer and closer to the heart of the "Republic of Ukraine" and the police decided not to interfere with the uprising and surrendered, [OPZ.GetLeader] was hanged in the town square like Mussolini a couple minutes before our troops arrived."
 cap.4.a:0 "Another victory for the [AFU.GetLeader]."
 cap.5.t:0 "The fall of Kyiv!"
 cap.5.d:0 "Today, the remnants of Kyiv's government officially capitulated to the forces of Ukraine's self-proclaimed president, Petro Poroshenko.\nWe would like to remind our listeners how the event, nicknamed the "Fire of Poltava," began. As a result of the rather unclear and falsified results of the second round of the 2019 presidential election, Volodymyr Zelenskyy, now the former president of Ukraine, won the election, which caused outrage among his political opponent, Petro Poroshenko. As a result, he began a march on Kyiv, which ended in the collapse of Ukraine, but now Poroshenko has reached his destination-point.\nWe will soon find out whether this will be a step towards uniting Ukraine or whether Poroshenko has just decided to destroy his political opponent."
 cap.5.a:0 "God, Save Ukraine"
 cap.6.t:0 "The fall of Ukrainian Republic!"
 cap.6.d:0 "Today, the remnants of the government of the Ukrainian Republic officially confirmed their surrender, while Ukrainian troops captured most of the cities after heavy fighting.\nThe Marshal of Victory, Valeriy Zaluzhny, has been nominated for a state award for his achievements to the state.\nAccording to the information we have, Petro Poroshenko, the head of the Ukrainian Republic, has been arrested for treason. The trial will be held next week at 12 o'clock. His allies, Eduard Yurchenko and Filaret, were arrested along with him. According to known information, the other two have fled the territory of the Ukrainian state to the territories of other warlords.\nAnd now that Volodymyr Zelenskyy's political opponent has been arrested, he is officially the legitimate president of Ukraine. Whether he will be able to unite Ukraine remains to be seen."
 cap.6.a:0 "God, Save Ukraine"
 cap.7.t:0 "Liquidation of "Cherkasy""
 cap.7.d:0 "Today is an important day for the New Israel, our troops defeated the army of Cherkasy invaders that came to conquer the Jewish people, and we fought back!\n\nAnd for the first time the flag of the new Israel was raised on Cherkassy, thousands of Jews gathered on Soborna Ploshchad to meet the automobile columns, and then the parade of liberators from the oppression of anti-semites. Our brave soldiers were greeted with songs, food and flowers\n\nMossad and Israeli military advisors are impressed with the Uman government's combat success, many even calling it one of the most successful operations to protect Jews in Europe. In any case, Israel will be watching the successes of its lesser brothers."
 cap.7.a:0 "Aharai, my friends!"
 cap.8.t:0 "The fall of Uman!"
 cap.8.d:0 "Today, the troops of the [CHE.GetName] remnants of the government of New Israel officially surrendered, handing over their state to the decision of the winner.\n\nAt the moment, according to known information, most of the government of New Israel fled to Moldova, from where they flew to Israel and are now under diplomatic protection there. Currently, there is information that the Mossad helped them in this operation, with which New Israel had ties"
 cap.8.a:0 "One occupier has been driven from our land...."
 cap.9.t:0 "Fall of Volyn"
 cap.9.d:0 "Today from the Volyn region to us came interesting news, Rivne Bandits on the head defeated the forces of Volyn, this unexpected news surprised many and significantly shaken the balance in the west of Ukraine and makes states take the bandits from Rivne seriously.\nMeanwhile, the bandits are carrying out brutal massacres against the authorities and police, as well as prisoners of war, and rumor has it that Amber Concentration Camps are being formed, where prisoners who are unlucky enough to die work for the rest of their torturous lives.\nThe heads of this bandit state addressed the population of the region by radio, and called for mass celebrations, after which they commemorated the fellas."
 cap.9.a:0 "Hey, Sharik! I just like you was in the chains..."
 cap.10.t:0 "Results of the counter-terrorist operation"
 cap.10.d:0 "Volyn troops defeated the disorganized forces of mafiosi in all parts of the regions, mainly Rivne Bandits organized raids on the rear and waged more of a guerrilla war, they had no chance against the Volyn well trained and organized army.\nAfter fighting in the urban district of Rivne and a combat operation in the city, the entire top brass was arrested right in their "headquarters" drunk and stoned. The population was tired of drunkenness, bandits, and anarchy. It was time for order and power."
 cap.10.a:0 "Long live order!"
 cap.11.t:0 "Army defeats populist"
 cap.11.d:0 "Today, it has been officially confirmed that the Ukrainian Armed Forces have captured the [PRH.GetName], ending the "Fire of Poltava".\n\nThe state that began as the remnants of the soldiers and military leadership of the troops in Donbas, which won the Donbas War, ending the 5-year suffering of Donbas, has officially captured the last candidate for the unification of Ukraine.\n\nThis is good news, but we have only one question: what to do with a state under the control of a military dictatorship in the middle of Europe? Will democracy return to Ukraine, does the military leadership of the Ukrainian Armed Forces have its own plans for the future, has peace been achieved in Ukraine?\n\nWe will find out. Glory to Ukraine, Glory to the Nation, Fuck the Russian Federation! "
 cap.11.a:0 "Glory to Ukraine!"
 cap.12.t:0 "The Fire of Poltava has been extinguished"
 cap.12.d:0 "Today the [AFU.GetLeader] addressed the entire ZSU-controlled Ukraine on the radio and announced the victorious defeat of revolutionaries and traitors of Ukraine, who had settled in Poltava.\nA little later, the General Staff published hundreds of photos and videos of captured militiamen from Poltava, in his agony mobilized under the banner of nationalism and revolution of children and the elderly. Brave soldiers defeated his troops in a general battle and took the capital. At last calm, order, and real Ukraine came to Poltava.\n[PLT.GetLeader] was found dead in his bunker, he could not survive the shameful defeat of his state and fearing a fair trial and military tribunal committed suicide\nGlory to Ukraine!"
 cap.12.a:0 "Glory to Heroes!"
 cap.13.t:0 "Pro-Ukrainian forces overthrow the dictator!"
 cap.13.d:0 "Today, it has been officially announced that the Russian Volunteer Corps has seized control of the Russian Federation. War criminals and corrupt officials are being integrated and arrested with members of Putin's system.\nIt is not yet known what exactly the RVC will do next. But it is now known that Ukrainian influence is sufficient for the new government to make decisions that are beneficial to Ukraine. There are currently rumors about the establishment of "occupation mandates" in the territories that are ethnically Ukrainian.\nFor our listeners, we want to tell you a little bit about the RVC. This is an organization in which quite nationalistic elements took part, and the actions of the new government can be seen in the oppression of national minorities (except for Ukrainians, which is interesting)\nAn extrajudicial trial of the propagandists is currently underway - Solovyov, Semenyan, Kiselev. Unfortunately, some of them fled to European countries, but the Federal Security Service promises to return them."
 cap.13.a:0 "The North has awakened"
 cap.14.t:0 "Liberation of Zaporizhzhia"
 cap.14.d:0 "Today, the troops of Respublika Ukraina officially liberated Zaporizhzhia region from the left-liberals. Work on the arrangement of the occupation administrations before the start of integration is already underway\n\nThe dictatorship they have established and the suppression of any dissent, human rights violations and violations of freedom of speech are the crimes of which the government of Zaporizhzhia is accused. The government of Zaporizhzhia is also accused of providing asylum to war criminals from the ranks of the Ukrainian Armed Forces.\n\nMore than several thousand unfortunate people have been imprisoned for calling a woman a woman and a man a man. The dictatorial government called it "hate speech". But now, all those who were imprisoned under the previous regime have been released! Now, the Russian-speaking population of the region is being supported because their national identity was suppressed by the previous regime."
 cap.14.a:0 "The puppets of the west are defeated!"
 cap.15.t:0 "Liberation of Kherson"
 cap.15.d:0 "Today, the remnants of the goverment of Respublika Ukraina officially announced its surrender to the forces of Zaporizhzhia. Interestingly, all the main leaders of the OPFL have already fled to Russia.\n\nThe happy Ukrainian population is now welcoming the liberators, while the Russian population is not very happy about the changes. The right-wing forces, which have been underground since the establishment of the Republic in Kherson, are also not very happy about the liberation.\n\nWhile the OPFL government tried to balance between the Ukrainian-speaking and Russian-speaking population, the Zaporizhzhia government is pro-Ukrainian. Currently, the occupation administration of Zaporizhzhia is already beginning preparations for the reintegration of the Kherson region into the state."
 cap.15.a:0 "Baza."