l_english:
 AFU_harsh_quotas:0 "Harsh Quotas"
 AFU_strikes:0 "National Strikes"
 AFU_strikes_desc:0 "As we expected, the tightening of quotas has only angered the already dissatisfied people more. Not only are there protests in major cities almost every day, but workers are going on strike en masse and people are generally not even bothering with curfews. If this continues, production will simply shut down, and even the army will not help. We need to act while we still can, and this is where the sugar and whip method comes in handy..."
 AFU_sso:0 "SSO"
 AFU_sso_desc:0 "The Special Operations Forces (SSO) are the most elite part of the Armed Forces. All soldiers in these units represent the pinnacle of our military's skills. The intelligence and other specialists present in their ranks also make them indispensable, expanding the range of their applications. Despite their affiliation with the Armed Forces, they are also used as a professional substitute for the national police and are involved in anti-terrorist operations and law enforcement. In short, the SSO can deal with, as Petliura used to say, "Muscovite lice" and "Ukrainian nits"."
 AFU_martial_law:0 "Martial Law"
 AFU_martial_law_desc:0 "After a sudden attack from the other side of the demarcation line, it became clear that sooner or later the frozen conflict in Donbas could flare up. Therefore, martial law was enforced in the government-controlled areas of the Donetsk and Luhansk regions. Although martial law places a burden on the regional economy and local population, it is crucial for maintaining order in our territories. However, as the situation in Ukraine is slowly deteriorating, we cannot be sure how long we will be able to maintain it, as these trends are getting worse every day."
 AFU_after_victory:0 "The Price of Victory"
 AFU_after_victory_desc:0 "Though the last dust of the war has settled, the consequences do not disappear immediately. A big part of Donbas is still hostile towards the Ukrainian administration  - that's what you get after more than 5 years of non-stop Russian propaganda in a troubled, war-torn region. And while the integrational measures, both minor and major, were already started, it may take time to get back on track from such a drastic change..."
 AFU_filtration:0 "Filtration"
 AFU_filtration_desc:0 "Sadly for the Provisional Government, the majority of the population still is on good terms with Russia and pledge allegiance to what used to be the separatist government. Recently, a small repressive measure was enforced - from now on, anyone who vocally takes the Russian side will get interrogated and persecuted, that's the only way to bring order to Donbas..."
 industrial_legacy:0 "Industrial Legacy"
 industrial_legacy_desc:0 "Since the first half of the 20th century, the Donbas industrial area has been and remains the most developed region of Ukraine - during the times of the Russian Empire, the USSR, and modern Ukraine. Centered largely around coal mines and steel mills, it became the backbone of the region's economy. However, due to mismanagement during the Soviet era, highly unfair privatization, and corruption in independent Ukraine, it has become a shell of its former self, with backward industrial technology and a depressed post-industrial region similar to the North of England in the UK, which has lost much of its huge economic potential over time, with coal mines becoming unprofitable. Following the pro-Russian uprisings in 2014, most of these assets fell under the control of the unrecognized republics and were subsequently seized and taken to the Russian Federation, leaving the region in a dire situation." 
 AFU_pro_russian_sentiments:0 "Pro-Russian Sentiments"
 AFU_pro_russian_sentiments_desc:0 "In many of Ukraine's southeastern regions since independence, a large proportion of the population has been sympathetic to Russia, with Luhansk and Donetsk regions being more so than elsewhere. Due to the Soviet policy of Russification and the Holodomor of the 1930s, as well as urbanization and Russian labor migration, the region has been heavily influenced by Russia. As a result, even after the pro-Russian uprisings and their failure to prove an alternative to a "better life" under Russian rule, the two areas controlled by Ukraine have always voted for pro-Russian parties such as the OPZZh. While the problem may be somewhat exaggerated, there are still people who would support Russian rule over Ukrainian."
 AFU_nationalist_agendas:0 "Right-Wing Influences"
 AFU_nationalist_agendas_desc:0 "During the pro-Russian uprisings in the east in 2014, many Ukrainian patriots and others who cared about Ukraine's independence volunteered to fight on the frontlines in the Donbas, subsequently playing an important role in deterring Russia's advance westwards. The best-known and most prominent volunteer unit is the Azov Battalion. Formed by far-right football fans, it has taken part in the defense of Ukraine and has become an integral part of our Armed Forces. Although some left-wing and liberal journalists question their ideology, most Ukrainians, even some pro-Russian ones, support them."
 apathy_of_the_population:0 "Apathy of the Population"
 apathy_of_the_population_desc:0 "A bit like the Russians, Donbas residents on both sides of the conflict feel apathetic about the political situation in the region. "Just leave us alone" is what many people in these areas would say. These people make up the majority of the population, which is predominantly middle-aged and elderly. This could be a problem, as due to their apolitical nature, this majority would prefer not to be involved in a potential escalation of the conflict."
 AFU_disorganized_administration:0 "Disorganised Administration"
 AFU_disorganized_administration_desc:0 "After the loss of power of the central authority in Kyjiv over Donets'k and Luhans'k oblasts, we came into trouble administering the area. Fixing it would be a matter of time, but it will surely complicate the lives of our citizens and work for our bureaucrats."
 AFU_continue_the_state_of_emergency:0 "Continuation of the State of Emergency"
 AFU_continue_the_state_of_emergency_desc:0 "There is no need for the Armed Forces to lift the state of emergency, at least for now. Although this is an unpopular decision among the population, almost everyone understands its necessity. The army will use the state of emergency to put its affairs in order, perhaps even trying to bring its situation out of the "hopeless" status"
 AFU_improved_training_methods:0 "Improved Training Methods"
 AFU_improved_training_methods_desc:0 "After careful consideration, the Armed Forces have chosen to improve the quality of their troops. The training programs now take more time and resources, but it pays off with almost elite troops who are ready for a tough battle!"
 AFU_broader_training_plan:0 "Broader Training Plan"
 AFU_broader_training_plan_desc:0 "The army's reliance on militias, while not a very popular choice, was understandable. Both in the past and the present, militias have proven to be effective tools in the fight for Ukrainian independence. Despite a significant loss in quality, this new method is far superior in quantity, which may be exactly what the Armed Forces need now."
 AFU_military_administration:0 "Military Administration"
 AFU_military_administration_desc:0 "What used to be a chaotic bunch of army groups waiting for orders from the capital has now become a functional, self-sufficient military machine! Ukraine's Armed Forces can now fully manage their affairs, both military and civilian, without needing any orders - they already know what to do."
 AFU_defensive_strategy:0 "Defensive Strategy"
 AFU_defensive_strategy_desc:0 "The Armed Forces have now adapted their defense strategy. Regardless of what they plan to do next, they do not want to repeat the mistakes of the previous separatist offensive and have prepared in advance."
 AFU_ce_baza_ce_genshtab:0 "Improved General Staff"
 AFU_ce_baza_ce_genshtab_desc:0 "The high command of the Armed Forces agreed to reform the General Staff to make it more responsive to the demands of the times and to improve the effectiveness of army management. Many generals have left their posts, leaving them to young and ambitious officers who are enthusiastic about implementing their methods of warfare."
 AFU_ready_military:0 "Ready Military"
 AFU_ready_military_desc:0 "The General Staff, judging by their actions, has made sure that their troops will never again be subjected to surprise attacks. Any move by the separatists is a move they expect. A step to which they already know how to respond."
 AFU_local_arms_manufacturing:0 "Local arms manufacturing"
 AFU_local_arms_manufacturing_desc:0 "Donbas is an industrial-rich region, so the Armed Forces decided to make the most of their situation. Factories, sometimes not even intended for military production, have finally been rebuilt and put into operation. Now, while their rivals are desperately looking for weapons, they can arm themselves!"
 AFU_support_UKR:0 "Support from Kyiv"
 AFU_support_UKR_desc:0 "De jure, the Armed Forces of Ukraine still function as part of the old Ukrainian regime and are therefore loyal to Kyiv. Formally, this makes everything they receive from the capital not "aid" but "delayed delivery packages"."
 AFU_support_PRH:0 "Support from Poroshenko"
 AFU_support_PRH_desc:0 "As expected, the "rogue president" agreed to supply the AFU. Whether it is to help the army or to increase his own legitimacy in the eyes of the people, the fact remains that the aid is there, it is there and it is getting to the frontline - nothing else matters."
 AFU_bezlad:0 "Bezlad"
 AFU_bezlad_desc:0 "Although the main threat has passed, the work, even in this region, is far from over. The incredible number of unresolved bureaucratic issues, the huge pro-separatist sentiment among the population, the urgent need to rebuild cities - all these painful scars need to be healed, otherwise the entire Interim Government will rot from within. Chas rozibraty tsej bezlad!"
 AFU_nationalist_agendas_2:0 "Nationalist Agendas"
 AFU_nationalist_agendas_2_desc:0 "Since the decision to denounce far-right elements within Armed Forces ranks, it would appear that nothing quite changed. "Azov" is still there, far-right soldiers were not fired, all the same, right? The real change is almost invisible. The high command simply made them all a bit quieter, cracking on the spread, not on the individuals. As of now, without proper propaganda, hardline nationalism in the army simply fades away, barely leaving a long-term trace."
 AFU_fucking_fsb:0 "FSB Subversion"
 
 BUK_military_administration:0 "Romanian Military Administration"
 BUK_military_administration_desc:0 "The Bukovyna administration was created as part of a UN peacekeeping mission after Romania officially requested an international mandate because "Romanians in the region need to be rescued from the mess that is happening in Ukraine". Given this fact, many Eastern politicians are already calling it a "Romanian invasion" and a "violation of the non-interference rule"."
 
 CHE_allies_in_the_west:0 "Allies in the West"
 CHE_allies_in_the_west_desc:0 "The Cherkasy government was a close ally of the Social Republic. Long-term mutual political assistance and the same party membership between the leaders of both parties before the collapse led to warm relations between the two governments."
 CHE_cornered_and_beaten:0 "Cornered and Beaten"
 CHE_cornered_and_beaten_desc:0 "TBD"
 CHE_renovation_programme:0 "Renovation Programme"
 CHE_renovation_programme_desc:0 "TBD"
 
 CHR_conservative_forces_alliance:0 "Union of the Conservative Forces"
 CHR_conservative_forces_alliance_desc:0 "While Volodymyr Zelenskyy is still considered a legitimate president in Kyiv, many consider Poroshenko a traitor to the Ukrainian nation. Due to his rather unstable position, he has been forced to make concessions and desperately seeks allies. This led to the creation of a shaky and unsuccessful alliance between Poroshenko, Filaret, Yurchenko, and Khodakovsky. This alliance is only opportunistic, as all parties are desperate for popular support. As soon as one of them gains even a small advantage over all the others, the shaky coalition is likely to collapse."
 CHR_illegitimate:0 "Illegitimate President"
 CHR_illegitimate_desc:0 "Poroshenko lost the 2019 elections. This is a fact. A fact that everyone seems to have accepted. Except for him. Him and his electorate. He was a man who could have retired in peace somewhere in the tropics, but he decided to fight for the presidency by force. He decided to light this Fire. Seeing the obvious results of the election, and especially the mess that Poroshenko subsequently caused, he is still perceived as illegitimate, a "rogue president" fighting for political survival."
 CHR_poroshenko_sins:0 "Poroshenko's Sins"
 CHR_poroshenko_sins_desc:0 "Far from being a saintly president, Poroshenko has been widely known for his scandalous and corrupt behavior. Scandals involving chocolate, coal, Putin and money laundering are just the tip of the iceberg, and no one knows how much more lies beneath the surface of media coverage. Among ordinary people, he was known as a great friend of the oligarchs, especially since he himself was one of them, so during his presidency, as many said, he "made the rich richer and the poor poorer"."
 
 CRI_disturbed_water_supply:0 "Disturbed Water Supply"
 CRI_disturbed_water_supply_desc:0 "In the arid Crimean climate, virtually all local sources of fresh water have become shallow. In the absence of water supplies from mainland Ukraine via the North Crimean Canal, this has had significant negative consequences for the peninsula."
 
 DNI_conglomerate:0 "The Conglomerate"
 DNI_conglomerate_desc:0 "The new government of Dnipro is more like a conglomerate - but instead of companies, it is an association of oligarchs. Kolomoisky, Firtash, Akhmetov, and many others have united with one goal in mind - to save their Ukrainian assets. They get along well, of course, as long as their "business interests" do not overlap..."
 DNI_direct_rule:0 "Direct Control from Kamianske"
 DNI_direct_rule_desc:0 "Once in the Dnipro region, oligarchs and other wealthy people were forced to seek patronage from local heads. The mayor of Kamianske - Andriy Bilousov, head of the "Bdzhola" party, who had virtually seized control of the oblast after the collapse, agreed to take care of the fugitives. He, with four years of experience in dirty politics, has been engaged in almost official raids on local enterprises, from small family businesses to former monopolists. He is now the law here, and Kamianske - the capital."
 DNI_management_from_abroad:0 "Management From Abroad"
 DNI_management_from_abroad_desc:0 "Oligarchs from Dnipro managed to combine the incompatible - greed and fear. Greed is the desire to keep their estates in Dnipro, and fear is the desire to get out of the country. The region is currently run by a board of directors from abroad, which comes at the cost of absolute administrative and managerial hell."
 DNI_oligarchic_state:0 "Oligarchic State"
 DNI_oligarchic_state_desc:0 "After the Collapse of Ukraine, Dnipro became the place where most oligarchs, influential businessmen, and the elite in general, headed. They obviously took their own capital and assets with them to relocate them to a safe place. Once in the region, the most powerful of them, using their enormous influence and wealth, decided to subordinate all structures to themselves, thus creating a shadow oligarchy."
 
 HAL_centre_of_ukrainian_nationalism:0 "Centre of Ukrainian Nationalism"
 HAL_centre_of_ukrainian_nationalism_desc:0 "Since its foundation, Lviv has played an important role in Ukrainian history and has been an important stronghold of Ukrainian culture. In modern times, the Ukrainian West was the crown of pure Ukrainian nationalism, and Lviv was its greatest jewel. After the collapse of the USSR, Halychyna inherited this status and led the patriots on their own path."
 HAL_chornovils_model:0 "Chornovil's Model"
 HAL_chornovils_model_desc:0 "Viacheslav Chornovil was the greatest president... Ukraine could never have. His life, abruptly cut short by a suspicious car accident in 1999, was filled with many political decisions that had one thing in common: patriotism. His views on what Ukraine should be were, as many said, "what the country needed at the time" - free market capitalism, rapprochement with the West, and federalization. Halychyna adopted his methods and views on governance in an attempt to rectify what they saw as a great Ukrainian tragedy - the defeat of Vyacheslav Chornovil in the 1991 elections."
 HAL_emigration_crisis:0 "Labour Emergency Crisis"
 HAL_emigration_crisis_desc:0 "Although emigration to Poland and the EU was a common Ukrainian practice even in better times, the collapse has dramatically increased the number of emigrants willing to leave the hot spot that Ukraine has unfortunately become."
 
 KHA_police_state:0 "Police State"
 KHA_police_state_desc:0 "Many countries in history have been called a "police state", but the Avakov's government may have taken this title too literally. While it cannot afford to be a state of total surveillance, it can still be a country of police brutality, arrests, special forces raids, and generally a testing ground for Avakov's own perception of "law and order"."
 KHA_preserving_the_old_ways:0 "Preserving the Old Ways"
 KHA_preserving_the_old_ways_desc:0 "Since Soviet times and throughout the history of Ukrainian independence, corruption has unfortunately been a significant part of state institutions. However, the Kharkiv authorities have chosen not to fight corrupt practices, but, like true policemen, have simply accepted them. While this certainly fills their pockets, the core of the state apparatus continues to rot."
 
 KHE_promises_of_peace:0 "Promises of Peace"
 KHE_promises_of_peace_desc:0 "The population is tired of bloodshed and war. Thus, the propagandists of the Respublika Ukraina endlessly talk about how an ordinary person will live in peace in the Respublika Ukraina, and politicians constantly promise that there will be peace for everyone. But it remains to be seen whether this promise will be fulfilled."
 KHE_russian_as_a_second_language:0 "Russian as the Second Language"
 KHE_russian_as_a_second_language_desc:0 "Although the Respublika Ukraina is undoubtedly a Ukrainian state, they have decided to introduce Russian as a second language because of the state's ties to Russia. Learning a second language can't hurt anyone, right?"
 KHE_ties_with_russia:0 "Ties with Russia"
 KHE_ties_with_russia_desc:0 "When Ukraine collapsed, Kherson was in chaos and anarchy, but Russia helped restore order through the Respublika Ukraina. Because of this, Respublika Ukraina is indebted to Russia and became a state under Russian influence. They received protection but also lost control."
 
 KHM_good_climate_for_investments:0 "Good Climate for Investments"
 KHM_good_climate_for_investments_desc:0 "Khmelnychchchyna has been a good place for investments lately. The region's relative safety, business relocation, and geographical location next to the UN office in Bukovyna allow the local authorities to make money happily, at least for now."
 KHM_nuclear_power_plant:0 "Nuclear Power Plant"
 KHM_nuclear_power_plant_desc:0 "The collapse of Ukraine did not mean anything to the operators of the nuclear power plant, so they continued to work on it despite the low level of state funding. The plant currently has 2 reactors, one of which produces 1000 MW of electricity. The plant is under the protection of the IAEA."

 KOB_chornobyl:0 "Chornobyl Exclusion Zone"
 KOB_chornobyl_desc:0 "The well-known Chornobyl Exclusion Zone is in the hands of the independent government of the Kyiv region, but such an artifact requires maintenance costs. Patrols and security, scientific expeditions, containment measures, and radiation monitoring all leave a significant mark on the regional budget."

 KRM_automotive_capital:0 "Automotive Capital of Central Ukraine"
 KRM_automotive_capital_desc:0 "For many years, Kremechuk has been the heart of the Ukrainian automotive and auto-mechanical industry. Although the crisis severely disrupted the production line, he never stopped, providing the region with what he does best."
 KRM_kremenchuk_refinery_plant:0 "Kremenchuk Refinery Plant"
 KRM_kremenchuk_refinery_plant_desc:0 "The Kremenchuk refinery is the heart of Ukrnafta and therefore its most valuable asset. Generating large profits for the city even after its decline, the refinery is carefully maintained and heavily guarded."
 KRM_ukrtatnafta_primacy:0 "Ukrtatnafta Primacy"
 KRM_ukrtatnafta_primacy_desc:0 "If Kolomoisky had a hryvnia for each state-corporation that emerged after the breakup of Ukraine, he would have two hryvnias, which is not much, but, strangely, it happened twice. As a separatist state from the nationalists in Poltava, Kremenchuk was completely dependent on Ukrnafta, as the oil company had long been the dominant political and economic stronghold of the region, holding the city together at the cost of massive violations of workers' rights."
 
 KYI_divided_party:0 "Fragmented Party"
 KYI_divided_party_desc:0 "Obviously, the ruling party has suffered the second biggest reputational blow in this whole mess. No matter how many faces the party changes, if a citizen sees the Servant of the People on a billboard, we can expect bitter words to come out of his mouth."
 KYI_legitimate_government:0 "Legitimate Government"
 KYI_legitimate_government_desc:0 "Despite serious setbacks, we are still considered the legitimate government of Ukraine. Therefore, it is our right and goal to restore order and punish the traitors who destroyed the Ukrainian state and its unity for the sake of their power."
 KYI_presidential_office:0 ""Presidential Office" Influence"
 KYI_presidential_office_desc:0 "During his election campaign, Zelenskyy promised to bring new faces to the Verkhovna Rada, and the main new face was, of course, his own. This turned out to be a terrible mistake, as all of the so-called "New faces" in the party turned out to be inexperienced people who knew little about politics or simply how to run a country effectively. Among these people, however, some managed to gain considerable influence in the party. In the context of the collapse of law and order across Ukraine, the "Presidential Office" has managed to take advantage of the complete collapse of Volodymyr Zelenskyy's popularity to effectively sideline the president and run what is left of Ukraine in the shadows, at most completely undermining presidential power. Unofficially, they are called the "Kyiv Trio" - Andriy Bohdan, Andriy Yermak, and Oleh Tatarov - grey cardinals whose influence on the political scene is enormous. At any opportunity, they can easily remove the facade of lies that marks the end of Zelenskyy's formal rule."
 KYI_the_deluge:0 "The Deluge"
 KYI_the_deluge_desc:0 "Everything is in the worst condition it can be. People are panicking, enemies are everywhere, the economy is in a miserable state, and the country is in ruins. Chaos surrounds Kyiv, with bandits and anarchists blocking the motorways, but this does not stop the brave souls trying to escape. The situation in the troubled city itself is not much better, with criminal and protest groups almost controlling entire neighborhoods. Every second that the Ukrainian authorities waste is paid for by the grief of a people who have already suffered enough. People no longer want to fight for ideas like sovereignty or freedom, they just want to survive."
 KYI_unpopular_president:0 "Unpopular President"
 KYI_unpopular_president_desc:0 "It is not difficult to understand why Ukrainians do not like Zelenskyy. It's not even about the policies he planned to implement or anything related to that, he was simply in the wrong place at the wrong time. He became president, and everything fell apart - this image is engraved in people's minds, and it will take a long time before it is erased..."

 MYK_nuclear_power_plant:0 "South-Ukrainian Nuclear Power Plant"
 MYK_nuclear_power_plant_desc:0 "The chaos that has engulfed Ukraine has hardly affected the operation of the power plant on the Southern Buh, as the region remains stable. With 3 power units and a total generation capacity of 3,000 MW, it continuously supplies electricity to southwestern Ukraine and receives the necessary care from the IAEA."

 ODE_budzhak_alliance:0 "Budzhak Alliance"
 ODE_budzhak_alliance_desc:0 "The Budzhak Alliance is a coalition of ethnic minorities in the Izmail Region. At the moment, it is a growing force within the Confederation, but there is little information about the group's intentions. Perhaps they will be satisfied with an autonomous status, or perhaps they will demand more..."
 ODE_neutral_side:0 "Neutral Side in the Conflict"
 ODE_neutral_side_desc:0 "Confederations suffer from what makes them unique - diversity. All the people there are different from each other linguistically, ethnically, and politically, which is the main reason why the government has chosen the doctrine of neutrality as a guiding star. They pledge to refrain from any conflict around them, without supporting anyone either. Instead, the Confederation adopted a policy of maximizing defense so that their armed forces are ready when the enemy comes to take away their newly won "sovereignty"."
 ODE_patchwork_confederacy:0 "Patchwork Confederacy"
 ODE_patchwork_confederacy_desc:0 "There are many reasons for the instability of the Confederation. From ethnic issues and the growing power of the Budzhak Alliance to simple rivalry between parties, nothing works in favor of unity and stability in the troubled region."
 ODE_pro_russian_tendencies:0 "Pro-Russian Tendencies"
 ODE_pro_russian_tendencies_desc:0 "The majority of citizens have historically spoken Russian and are inclined to support Russia or its allies by inertia. Pro-Russian parties are taking advantage of this fact and are gaining momentum with their ideas, which poses a serious threat to the government's neutral position."
 
 PLT_home_of_the_revolution:0 "Home of the Revolution"
 PLT_home_of_the_revolution_desc:0 "It all started here... The chaos in Poltava was the introduction to this whole collapse. Clashes between supporters of one president or another ended with the National Corps winning. Since then, the city has been in much lesser ruins than it once was, but people have not forgotten anything. For now, the physical and moral burden of the collapse is on the shoulders of Poltava's nationalists, whether they like it or not."
 PLT_unstable_position:0 "Unstable Position"
 PLT_unstable_position_desc:0 "Although Poltava is not as "east-oriented" as, for example, Donbas, radical nationalism still does not sit well with the locals. People are much more moderate in their views and much more passive in their actions than elsewhere in Western Ukraine. They are not too keen on abstract national ideas, and instead want to eat their soup in peace, for God's sake!"

 RIV_amber_profits:0 "Amber Profits"
 RIV_amber_profits_desc:0 "Amber is perhaps the only resource this region is known for. The Klesiv and Dubrovytsia deposits were targeted for raiding, theft, and smuggling long before the collapse, but now the speed and efficiency of the illegal trade has increased rapidly."
 RIV_nuclear_power_plant:0 "Rivne Nuclear Power Plant"
 RIV_nuclear_power_plant_desc:0 "The old nuclear power plant has been in operation for a long time, and the breakup of Ukraine will not change this. It has 4 reactors, each of which produces a different amount of electricity: Unit 1 produces 381 MW, Unit 2 - 376 MW, and the newest reactors produce 950 MW. The plant's safety is guaranteed by the IAEA."

 SUM_aks:0 "The far-right resistance"
 SUM_aks_desc:0 "For many years now, the far-right radical group called the Avant-Garde, or AKS in short, has been trying to promote its ideals and changes with or without violence. After the split of Ukraine, their newly formed militia groups have become extremely active, particularly more so in the Sumy region, where the central government is weak and subordinate to the rogue president in Chernihiv. Currently they are trying to lie low, but as the law and order in the region slowly fades away and the disgruntled residents, who are not particularly loyal to Poroshenko, voicing their discontent, the ever - growing possibility of a coup becomes ever more realistic as the days go by."
 
 TER_pagan_fanaticism:0 "Pagan Fanaticism"
 TER_pagan_fanaticism_desc:0 "No matter how low the support for paganism in the region, those who are actually "believers" would fight with amazing devotion. They would not hesitate to go into battle with their bare hands if they knew that their odd gods would be pleased."
 TER_unpopular_movement:0 "Unpopular Movement"
 TER_unpopular_movement_desc:0 "The reason why the pagans have this region at all is hardly clear to those who live there. The whole thing was just a sequence of absurd Kafkaesque events - nothing more than a pagan festival gone wrong. One thing happened after another, and now crazy people with even crazier gods rule their hometowns. And these madmen want more."
 
 TRN_russian_operative_groups:0 "Russian Operative Group in Transnistria"
 TRN_russian_operative_groups_desc:0 "Transnistria was not created by the people, it was created by Russian troops. This has caused some temporary problems, but they have secured the land for Russia and are holding it tight, waiting for Russia to reach the small narrow land and annex it. But until then, they will be stationed here."

 TUR_erdoganomics:0 "Erdoganomics"
 TUR_erdoganomics_desc:0 "The economic system created by the true father of New Turkey - Recep Tayyip Erdoğan, is simply flawless. With aspects of both market and planned economies, Erdogan's well-proven economic strategy has shown itself to be extremely successful, if not fantastic, and at this rate, Turkey and its people are clearly looking forward to nothing but development and prosperity."
 
 UMA_contacts_with_mossad:0 "MOSSAD Contacts"
 UMA_contacts_with_mossad_desc:0 "Although the Israeli government has never officially recognized or supported the Ukrainian "Little Zion", according to unofficial but possibly well-known information, the MOSSAD intelligence service regularly offers Uman its weapons, men, finances, and intelligence. The intentions are rather unclear: no one knows whether it is to protect Uman Jews, or to try to repatriate them to Israel, or perhaps even to expand its power over the entire territory of former Ukraine."
 UMA_dissatisfaction_among_ukrainians:0 "Dissatisfaction among Ukrainian population"
 UMA_dissatisfaction_among_ukrainians_desc:0 "Ordinary antisemitism has been quite common in Eastern Europe for centuries, but in the Uman region, it reached a peak after the Jews seized power. Almost no Ukrainians in the region are happy with the way things turned out, which leaves a huge stain of discontent on the clean shirt that is the "New Zion"."
 
 VOL_counter_terrorist_operation:0 "Counter-Terrorist Operation"
 VOL_counter_terrorist_operation_desc:0 "Perhaps the most pressing problem facing the Volyn authorities is banditry in the east. Not only do people want to be free, but the criminals themselves are severely undermining the region's economy. Lutsenko has announced a "pacification campaign" against illegal amber smugglers to put an end to their "business" once and for all."
 
 ZAK_hungarian_influence:0 "Hungarian Influence"
 ZAK_hungarian_influence_desc:0 "It is no secret that there are many ethnic Hungarians living in Transcarpathia. This might not seem like a big deal, but for the regional authorities, it has become a serious threat to their still stable rule. The Hungarians vote for the same politicians who seek their own rights and autonomy, and some even publicly beg Hungary to "intervene" and "save them"."
 ZAK_local_security_service:0 "Local Security Service"
 ZAK_local_security_service_desc:0 "Of all the "governments" across Ukraine, the best place for the security service would undoubtedly be Transcarpathia. When everything collapsed, most of the security forces were temporarily relocated there because it was a "relatively stable region", pending further instructions from Kyiv. But now the capital is out of reach, so the security forces operate on a regional scale, with loyalty to Uzhhorod."
 ZAK_rusyn_riots:0 "Rusyn Riots"
 ZAK_rusyn_riots_desc:0 "Today, Rusyns are a largely extinct ethnic group. The people and their culture have long been subjected to assimilation processes in Poland and Slovakia, and Ukrainian Transcarpathia was no exception. But when the collapse began, those who still call themselves "Rusyns" began mass protests for their linguistic and cultural autonomy."
 
 ZAP_progressivist_hub:0 "Progressive Hub"
 ZAP_progressivist_hub_desc:0 "Perhaps the only reason why the Tyler government is still running Zaporizhzhia is because of the Liberals. There are many progressive, liberal young people from all over the country. Those of them who did not go to the EU have found their new home here - where they are promised to build their own equal society together. The need to maintain stability has led to the creation of something as obscure as "liberal militias", "progressive power agents" or "an LGBT-allied national guard", but no matter, if they want to protect their little paradise, who can stop them?"
 ZAP_helping_afu:0 "Helping AFU"
 ZAP_helping_afu_desc:0 "While progressives are considered "pacifists" or "anti-militarists" around the world, Zaporizhzhia authorities are seeking to break this pattern. Tyler himself has been volunteering for the Armed Forces of Ukraine for a long time, which has led to the fact that most politically active residents of the region participate in collecting aid for the Ukrainian army or in many other volunteer activities."
 ZAP_nuclear_power_plant:0 "Zaporizhzhia Nuclear Power Plant"
 ZAP_nuclear_power_plant_desc:0 "With IAEA assistance, Zaporizhzhia NPP has become a regional golden calf - neighboring governments suffering from electricity shortages are happy to pay for those sweet few kilowatts to light up their homes. Although it costs a lot to maintain the power plant, it proves to be well worth it!"
 
 ZHY_beginning_of_the_reforms:0 "The Beginning of Reforms"
 ZHY_beginning_of_the_reforms_desc:0 "It is fair to say that the Socialist Party government has started to do something, and this is indeed huge progress, given the circumstances. The long-term effect of their political, military, and agricultural reforms remains to be seen, but people are simply hoping that the changes are real and not just another brick in the wall of promises."
 ZHY_shaky_coalition:0 "Shaky Coalition"
 ZHY_shaky_coalition_desc:0 "The coalition between the Radical Party and Batkivshchyna was not united. The question of how to dispose of the land they received has thrown an already uneasy alliance into a storm of instability. Every disagreement between the two parties is massively exploited by the coalition's opponents, but somehow the alliance holds together. No one knows for how long."
 ZHY_unfulfilled_promises:0 "Unfulfilled Promises"
 ZHY_unfulfilled_promises_desc:0 "Perhaps throughout the history of independent Ukraine, politicians have fed the nation with promises. Promises, and more promises, promises to fulfill old promises, promises to fire those who do not fulfill their promises, and so on. The Socialist Republic was not too different from this classical tradition. People were promised peace, prosperity, power, and rights, but instead, they ended up almost where they started."

 
 
 KIR_area_of_terror:0 "An Area of Terror"
 KIR_area_of_terror_desc:0 "§R"Lasciate ogne speranza, voi ch'entrate."§!\n- Dante Alighieri\nBriefly and succinctly describes the situation in which the Kirovograd region has fallen. In this place any interaction with the outside world is cut off - §RSatanists§! have destroyed all communication, have taken control of all radio and TV stations and broadcast §Rtheir§! monstrous rituals and prayers around the clock. There are large-scale problems with energy supply - the population already has no light in their homes. There is no heat, no food, no hope. Only fear and ignorance, to §RSatan's§! delight."
 KIR_satanist_antichrist_terror:0 "Anti-Christian Terror"
 KIR_satanist_antichrist_terror_desc:0 "§RSatan will come to this world.§! And until then, §Rhis§! adherents need to prepare the Earth for §Rhis§! arrival. And first of all, they must get rid of §Rhis§! eternal enemies - Christians. The §RSatanist regime,§! by the way, is very grateful to Puchkov's regime in this regard. Goblin laid the foundation for the destruction of the church, within the framework of socialism, and now the §RLuciferians§! will continue this practice. Burnt churches and Bibles, inverted crosses and pentagrams everywhere are only a small part of the realisation of this project. The §Rrevolution§! will begin in this place. A §Rrevolution§! against Christ that will put an §Rend§! to Christendom."
 KIR_satanist_frightened_population:0 "Frightened Population"
 KIR_satanist_frightened_population_desc:0 "Spawned from the red terror of the Goblin regime, the population of Kirovograd region has truly become one of the most miserable and intimidated regions of the former Ukraine. Having endured the grief and suffering of one psychopath, something far worse has taken its place. A permament horror gripped the place. Citizens are hiding in their homes and basements while horrifying §Rsatanic rituals,§! with animal sacrifices and bloody feasts, take place in the streets. The Church has abandoned the place - Priests have fled in terror, or have been executed, first by the Communists and then by the §RLuciferians.§! Nothing will help them. No one will save them."
 KIR_satanist_satans_fighters:0 "Satan`s Fighters"
 KIR_satanist_satans_fighters_desc:0 "Just because you haven't seen §Rhell§! doesn't mean it doesn't exist. The real §Rhell§! is in man himself. And now, humans may not be able to restrain their natural urges to kill. Formed §R"Satan's squads"§! are raiding the last vestiges of resistance in the Kirrvograd region. Formed mostly of volunteers, who with incredible cold-bloodedness put aside their humanity and began to do mayhem - at first just for fun, but now the idea of §RSatan's coming§! has consumed their souls and they are ready to do anything to bring §Rhis§! kingdom to Earth."
 
 
