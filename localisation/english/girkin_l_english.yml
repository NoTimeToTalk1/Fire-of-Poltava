decision_collapse_of_opposition:0 "Opposition collapse"
decision_collapse_of_opposition_desc:0 "After the "hydra was decapitated", the damn rats hid in their holes, some fled, but the main thing is that the mouthpieces of the damned anti-Russian propaganda were smashed and now no one dares to criticise our wise leader Igor Ivanovich."
