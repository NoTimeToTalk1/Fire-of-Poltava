girkin_invite_cossaks_decisions:0 "Invite Cossaks"
girkin_invite_cossaks_decisions_desc:0 "The Cossacks are the backbone of the Russian military tradition, have always been so, and will continue to be so. The legendary steppe warriors, who formed the basis of many armies not only during the empire but also during the civil war, have always been the force that could turn the tide of battle and war by all 180 degrees, and while the Cossacks have been almost completely exterminated or suppressed over the past century, there are many who wish to revive their own hosts in full or partial size, retaining their influence and tradition, and not submitting to oligarchic rule from Moscow. We can become such a base for them, and as long as our lands serve as a new or temporary home for them, they will be the new core of our military."

form_elite_cossaks_division:0 "Form elite Cossaks division"
form_elite_cossaks_division_desc:0 "As long as the state has an army, it must have what it is most proud of, what can be considered its most elite part, the focus of attention at parades and awards. At the moment, we don't really have anything like that, however, with the recruitment of the Cossacks into the ranks of the military, some representatives of the high command have put forward a proposal to organise an elite cavalry regiment, consisting of the best cavalrymen in the army. Of course, such a formation is unlikely to be a game-changer in a battle, but it would support our image as revivalists and guardians of the lost or destroyed."
