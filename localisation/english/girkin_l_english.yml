alliance_pushilin_decision:0 "Contact Pushilin"
kill_petushilin_decision_desc:0 "Denis Pushilin is the most disgusting creature to be found on the territory of our country, and luckily this will not last long. Our best people are constantly monitoring this pig, while theoretically we are able to strike almost anytime. It's time to plan an operation that will finally take revenge on Zakharchenko and put an end to this embarrassing part of Novorossiya's history..."
kill_pasechnik_decision_desc:0 "If there is anyone who could theoretically still have support for his opinions and views among the electorate, apart from the government, it is the Lugansk gangster Pasechnik. Having gained a reputational boost by painting his "kingdom of special services", also known as the Lugansk People's Republic, as a paradise of democracy "compared to their Donetsk brothers", he was indeed one of the main candidates in the presidential election and then became the face of the "People's Opposition", and poses the greatest threat to the continuation of the legitimately elected government of Donbass, therefore this wolf in sheep's clothing should be put to rest."
kill_vitrenko_decision_desc:0 "Even though the Bolshevik "union of peoples" has not been on the world map for thirty years, the remnants of that era continue to poison society, even in Donbass. Natalia Vitrenko, an avid Stalinist and populist corrupt broad who, by covering up Bolshevik terror, is trying to win the support of the elderly electorate, has been in our crosshairs for a long time, and in the light of recent events, it would be unwise to let this whore continue to breathe."
