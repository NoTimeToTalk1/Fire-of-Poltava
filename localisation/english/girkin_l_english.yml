girkin_foreign_politics_decisions:0 "Foreign politic"
girkin_foreign_politics_decisions_desc:0 "If we truly want to conquer all of Malorossia, we must act not only with brute force but also with cunning. Anarchy, mistrust and paranoia reign among our enemies, and we can use all of this to achieve our goal of destroying them. In every region, in every city, in every village, there are those who are ready to take our side under certain conditions. Out of principle or not. And there are many such people. However, there is no point in talking about individuals when there are entire organisations and parties seeking the patronage of someone like us. They can become decisive allies in the fight against our common enemies, so we must establish cooperation with them as soon as possible."

