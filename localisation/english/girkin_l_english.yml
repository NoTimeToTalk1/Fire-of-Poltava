gir.9.t:0 "Ticket to the other side"
gir.9.d:0 "Leonid Ivanovich Pasechnik, recently the head of the LPR and an election candidate, and after losing, the main opposition leader, knew that he would not live long. While the LPR was based on bureaucracy, the DPR was based on political assassinations and intimidation. And Leonid knew that Girkin, as the author of the DPR project, would clearly choose this path to get rid of the opposition, especially after recent events. Having gathered all the most important things, he bought a ticket to Rostov through old friends.\n\nWhen he was picked up, he noticed that the bus looked quite interesting - there were nets on the windows, and the doors did not open from the inside. After 3 hours, they reached the forest they were supposed to pass through, but the driver abruptly stopped\n"Is something wrong?" - Pasechnik asked, nervously fumbling with the $500 bills in his hands.\n"Something with the engine, I'll be right back." - said the driver's low, smoky voice as he got out of the cab and closed the door. Getting out of the car, Maxim took out a can of gasoline and started pouring it on the bus, ignoring the screams of the bus attendant inside. Pulling out his phone, Maxim smoked as he dialed.\n"Task completed, who's next?" - he said, throwing the cigarette butt on the hood, which was still wet with gasoline, and walking to the checkpoint.\nThe orange flames of the fire crackled beautifully on the remains of the bus and what used to be Pasechnik."
gir.9.a:0 "One less bandit in our country."
pasechnik_death_tt:0 "The ruler of §4Lu§!§2gan§!§Rsk§!, firstly lost his fiefdom, now he has lost his §Rlife.§!"

gir.10.t:0 "Moving out"
gir.10.d:0 "Natalia Vitrenko, not so long ago one of candidates in Novorossiyan elections, was sitting in her appartment somewhere in the center of Donetsk. She had some packed things of first priority with her, while she was trying to call one of her friends. The signal was too low to make a call, and that made Vitrenko nervous.\n\n"Why the fuck can't I make a call? Is that the doing of this son of a bitch?!", Vitrenko said angrily. Some time after she got a message from that friend. It said "Move out, I'm going to pick you up". She quickly picked up her bag with fake documents, clothes, a small bottle of vodka and huge ties of rubles, and stepped out from her home.\n\nRight at the front door she was greeted by a man in camo. He was holding a "Makarov" pistol, and without hesitation made two shots. Natalia wouldn't even realise what was happening, as she fell on the floor with two bullets in her head. Killer then picked up phone, and typed to her friend: "Operation successful"."
gir.10.a:0 "There's no place for damned socialists here!"
vitrenko_death_tt:0 "She should have decided whether she was §Ra Stalinist§! or §ga Blac§!§Hk Hun§!§Wdred.§!"

gir.11.t:0 "Unlucky fisherman"
gir.11.d:0 "Pushilin Denis Vladimirovich was fishing at his country cottage as usual. Not long ago, he was the head of the Donetsk People's Republic and the main candidate in the elections, but today he is no one. He knew that his relationship with Girkin was not very... good, so he could stay alive. The cottage was in the middle of the forest, in a quiet valley. Lilies could be seen on the surface of the lake, as well as the gentle movement of the fish that were settled there\n\nA few minutes later, he heard footsteps behind him, to which he calmly responded\n"Maxim, is that you?" - he asked without turning around.\n"Yes." - Maxim's low, smoky voice replied.\n"Well, you didn't come to fish, did you?" - Denis said, getting up and putting down his fishing rod: "Then I won't keep you, I know how it works" After these words, a single shot was fired, scaring away all the fish in the lake."
gir.11.a:0 "A dog's death."
pushilin_death_tt:0 "§RRevenge§! for §gbat`ka Z§!§Bakhar§!§Rchenko§! has been §Yachieved.§!"

gir.12.t:0 "The Leak"
gir.12.d:0 "Yesterday, there was a data leak that shocked society. Details about the ex-president of the LPR Pasichnik and his involvement in the incident with 4 prostitutes and a horse became known. It also became known that Vitrenko worked for the Ukrainian regime, leaking information to them! Currently, the leaders of the People's Opposition are trying to justify themselves and call this information a lie, but all faithful Novorossians know that it is true!"
gir.12.a:0 "That's disgusting!"

DPRelection.22.t:0 "Victory"
DPRelection.22.d:0 "Today, the patriot and creator of Novorossiya, Ivan Vsevolodovich Girkin, won the election. Although he lost the battle for Slaviansk in 2014, it is now in the past. The remnants of the Ukrainian Armed Forces have been defeated, and Novorossiya has a bright future. At the moment, Girkin has promised to develop the state and has several options for doing so."
DPRelection.22.a:0 "Slava Girkiny!"

gir.13.t:0 "Protests"
gir.13.d:0 "Today, protests took place on the central streets of Donetsk, Luhansk, Mariupol and other cities. As far as we know, these are protests by voters of Vitrenko and Pasichnyk who are dissatisfied with Girkin's victory in the elections. It is currently known that Vitrenko and Pasichnyk are planning to unite in a political organization called the People's Opposition. A rally is currently taking place in Donetsk's central square. Oppositionists wear the flag of Novorossiya on their shoulders, walking with posters demanding the resignation of President Girkin and the liberalization of the constitution, which the protesters consider dictatorial. That's all, journalist Natalia Davalkina was with you."
gir.13.a:0 "Ok."

gir.14.t:0 "Liberalisation"
gir.14.d:0 "Today, according to the information we have been given, the Girkin government has officially made concessions to the People's Opposition by liberalizing the constitution. It is not yet clear what will happen next - will the People's Opposition continue to demand more concessions, or is this a strategic move that will lead to the collapse of the opposition? You will find out soon, and with you was TV presenter Natalia Davalka."
gir.14.a:0 "Ok."

gir.15.t:0 "Civil war!"
gir.15.d:0 "Today, as far as we know, terrorists from the People's Opposition and traitors of Novorossiya are seizing towns and villages, but in some of them people loyal to our president have been able to put up armed resistance. At present, special forces and internal troops are trying to retake the towns and villages seized by terrorists, although, according to our information, this sometimes leads to civilian casualties. Currently, police and special forces are trying to suppress these uprisings, and clashes with terrorists sometimes result in the death of terrorists. In some places, our glorious forces have been able to restore order, but there are others where there is anarchy, with criminals looting shops, killing and raping women. President Girkin gave a speech: "Today our internal enemies are trying to destroy Novorossiya! But I promise that they will all be arrested and convicted for crimes against the state!  Even if I catch them in the toilet, I will drown them in it!""
gir.15.a:0 "It`s so over..."

gir.16.t:0 "Anarchy"
gir.16.d:0 "After the bloody clashes between terrorists and our glorious special forces, some regions of Novorossiya are currently in a state of anarchy, as the police are unable to maintain order in the region. People are being robbed, raped and killed in the uncontrolled territories, and this is all the result of the actions of the People's Opposition. People live in fear, knowing that tomorrow they may not return to their children when they walk down a dark alleyway."
gir.16.a:0 "Ok."

gir.17.t:0 "White Guard"
gir.17.d:0 "Today, many "historians" and other pro-Soviet forces talk about the White Guard as losers, although this is not the case! Is it possible to declare victory when your enemy is not defeated? NO!!! The White Guard is still a legitimate force and a descendant of the Russian Empire, not the communist government. The Whites regrouped and temporarily went underground, not surrendering to the forces of the Red occupiers. And today, finally, in Novorossiya, they will be able to create a bridgehead for the liberation of the Russian Empire!"
gir.17.a:0 "Slava Rossiya!"

gir.18.t:0 "Russian Napoleon"
gir.18.d:0 "The Savior of Novorossiya. Russians of Donbas have been waiting for a new Caesar for a long time... And he has come.\nHis word is stronger than a stone. Our hearths are hurting, they do not find peace, many may laugh, but soon everyone will see the immortal will of the people of Donbass. Igor Girkin is a brilliant commander, remember Sloviansk, remember our past victories... And defeats. When all the hypocrites forgot about the fallen heroes, Girkin went through all the suffering of the people. He is the voice of our country.\n\nBut now is not the time to celebrate.\nAnd when the neo-Nazi beast from the West sharpens its knives on us, Igor Girkin will stand up to defend our small land. He is the only one who understands all the problems of his native land.\nWe will survive on our own. And we will not abandon our cities, the great spirit of the new Russia is the basis of our strength.\n\nIt is time to break the old order.\nWe must cleanse our country of corrupt hypocrites, the Battle for Russian Donbass continues. And Novorossiya will rise from the ashes with a new just, wise, courageous leader.\nGirkin will lead us in our last and final battle. United and strong. Death or victory."
gir.18.a:0 "Everyone bowed, but not my land!"

gir.19.t:0 ""We will not leave our cities""
gir.19.d:0 "Today I feel stuffy and gloomy,\nMy heart aches and does not find peace.\n\nAnd at night I dreamed of a bloody morning,\nOver the vast expanses of the Black Sea.\n\nThe great city is the foundation of our strength,\nIt sparkles with the gold of ancient churches.\n\nThe word is overflowing with a single truth,\nThe word of the people, and the surviving cities.\n\nWe will not leave our cities!\nWe will definitely get there,\nThe hands of our land hold us strong.\nWe will finish our songs!\n\nWe are united by our blood and faith,\nAnd our word is much stronger than a stone.\n\nAnd there is no measure in the world,\nTo measure the sacred that has been forged for centuries.\n\nOur hands do not lose kindness,\nAnd you can also warm up with our sun.\n\nThe great city already passed through victories and torments,\nMore than once, because we are in it's heart.\n\nWe will not leave our cities!\nWe will definitely get there,\nThe hands of our land hold us strong.\nWe will finish our songs!"
gir.19.a:0 "Donbass is behind us and God is  with us!"

gir.20.t:0 "FSB"
gir.20.d:0 "Federal'naya Slughba Bezopasnosti (Federal Security Service) was founded in 1995. It's a successor organization of the Soviet KGB.\nThe primary responsibilities are within the country and include counter-intelligence, internal and border security, counter-terrorism, surveillance, and investigating some other types of serious crimes and federal law violations. It is headquartered in Lubyanka Square, Moscow's center, in the main building of the former KGB. The director of the FSB is appointed by and directly answerable to the president of Russia.\nAfter becoming president, Vladimir Putin launched a major reorganization of the FSB. First, the FSB was placed under direct control of the President by a decree issued on 17 May 2000. The agency's internal structure was reformed by a decree signed on June 2000. In the resulting structure, the FSB was to have a director, a first deputy director, and nine other deputy directors, including one possible state secretary and the chiefs of six departments: Economic Security Department, Counterintelligence Department, Organizational and Personnel Service, Department of activity provision, Department for Analysis, Forecasting and Strategic Planning, Department for Protection of the Constitutional System and the Fight against Terrorism.\nSince 2014, the FSB devoted substantial resources to preparing for a Russian takeover of Ukraine. Although Russia's SVR and GRU were also involved, FSB had a lead role in "intelligence and influence operations".\n\nWe must contact specialists and cooperate with them to protect from dangers Inside and outside our state. With strong security services, we can control opposition in the country and manipulate public opinion, building the power of Girkin on fear and rage. Novorossiya will keep the order. FSB would help us with future wars with the Ukrainian army and carry out sabotage on their territory.\nWe give them opportunity to earn money and help us in our difficult situation. "
gir.20.a:0 "Echo of USSR."

gir.21.t:0 "Arrest"
gir.21.d:0 "Ivan Petrov, a worker at a pipe manufacturing plant, was walking home after a long shift at the factory. The shop manager had been late with his salary for ten weeks, and Ivan was sure he had a new car. As he approached his high-rise building, he entered the elevator, thinking about the days when workers like him would not suffer from the damned capitalists. As he approached his apartment, he felt a strange fear. His door was not locked, and the door was half-open. Fearing that he had been robbed, he ran into the apartment, but a second later he was hit in the fucking face with a rifle butt. He was knocked out, lying on the floor. A lieutenant colonel, judging by his shoulder straps, from the security service, came up to him, smiling\n"We found posters of Vitrenko, a damned terrorist and traitor to our state, in your apartment! You are arrested for propaganda of socialism and treason!""
gir.21.a:0 "Ok."

gir.22.t:0 "Cossack march through Donetsk"
gir.22.d:0 "Today the brave Cossack army, firmly repeating the marches of their ancestors under the leadership of our inimitable ataman Nikolai Ivanovich Kozitsin.\n\nOur proud Don Cossacks marched through the entire city, many streets and intersections were closed for cars to pass. In the procession the Cossacks were dressed in traditional clothes, with sabers in their scabbards, horsemen also took part. There was also a band playing Cossack music.\n\nResidents and guests of the city joyfully welcomed the parade with applause and flowers. At the end of the parade our most prominent ataman Kozitsin made a wise speech about the importance of Cossacks for Donbass and that Donetsk is an integral part of all Cossacks."
gir.22.a:0 "Za chest` i Don!"

gir.23.t:0 "Assault"
gir.23.d:0 "Andrey Petrov was on his way to work. Entering the office through the front door, he went up to the second floor and entered his office. He was doing an important job for Novorossiya - he is a political technologist in the office of the People's Opposition! He mainly looks at the results of Vitrenko's political campaigns, but Pushilin pays him well, too. He has to calculate the costs of banners, political campaigns... and pass it all on to his bosses, wrapping it up in a nice wrapper. But suddenly, he heard screams from the first floor. And then he saw smoke rising up the stairs. At first, he was scared, thinking that a fire had started, but as soon as he inhaled a little bit of that smoke, he felt his throat start to burn. He fell down as tears flowed uncontrollably from his eyes, and then he saw a black boot. A man wearing a gas mask and a uniform kicked him and handcuffed him and put a black bag over his head...\nMaksym watched the operation, waiting for the results of his men. As soon as everyone in the building was brought outside, he read them their rights and informed them of their arrest for treason."
gir.23.a:0 "Ok."

gir.24.t:0 "Integration of "Wagner""
gir.24.d:0 "After numerous calls and several meetings, and with Wagner's assistance in diffusing the tensions in Novorosiya, Prigozhin is now conceded to certain concessions. In a significant development, he agrees to specific privileges and strategic maneuvers he's aiming at seamlessly integrating his private military company into the armed forces of Novorosiya. As part of the agreement, Prigozhin secures a guarantee of lifetime status not only for himself, but also for a select group of his officers and soldiers who played a crucial role in this arrangement. This collaboration marks a notable fusion of interests and resources, reshaping the dynamics within the armed forces."
gir.24.a:0 "Davai, davai, davai, davai!"

gir.25.t:0 "Collisions"
gir.25.d:0 "Today, at 14:24, two marches clashed on the main street of Mariupol. The march of the People's Opposition, which was going from the Mariupol port to the central square, advocating for the re-run of the elections due to what they call "illegitimate" elections. There was also a loyalist march, which was planned as a counter to the pro-opposition march. As a result, the Royalist march started from the administrative building towards the central square, but unexpectedly for both groups, they crossed paths on the main street before reaching the square. As a result, the insults turned to stone throwing and physical combat. The police, who arrived 20 minutes later, joined the fight on the side of the loyalists, which only made the fight more bloody. So far, dozens of people have been reported injured on both sides, including several police officers, but the People's Opposition march retreated. This report was conducted by Natalia Davalkina, I will continue to monitor the situation."
gir.25.a:0 "Ok."

gir.26.t:0 "ROVS"
gir.26.d:0 "In a clandestine meeting shrouded in secrecy, Girkin, the enigmatic leader of Novorosiya, and Ivanov, the head of the ROVS, convened to discuss a pivotal moment in the geopolitical landscape. The meeting, held behind closed doors in an undisclosed location, brought together two influential figures whose collaboration held the potential to reshape the course of events in the region. The agenda of the meeting was clear: the integration of the ROVS into the fabric of Novorossiya. Both leaders saw this as a strategic move to solidify their alliance, increase military capabilities, and assert their collective influence on the regional stage.\n\nDiscussions ranged from military strategies and intelligence sharing to joint training exercises and resource allocation. The leaders emphasized the need for a seamless integration process that would not only enhance their military capabilities but also create a unified front against perceived external threats.\n\nAs the talks progressed, agreements were reached on mutual defense pacts and the establishment of joint command structures. The integration process was envisioned to be gradual, ensuring that the transition would be smooth and minimize any potential disruptions in the existing military apparatus of both entities."
gir.26.a:0 "Glory to Rus'!"

gir.27.t:0 "White Guard"
gir.27.d:0 "Once upon a time, back in early 1920, the Russian Civil War ended, the White army sailed from Crimea to stand in Gallipoli, and the Siberian troops were defeated in the fighting and in the last battle for the Russian Far East. We had nothing left, no country, no idea, no faith in the future of Russia.\n\nIn emigration we were divided by views, divided into supporters of Wrangel and Denikin and their descendants. After years of emigration around the world, we became stronger, stronger in spirit, stronger in faith, stronger in the idea of our great country.\n\nAfter the collapse of the USSR there were no direct participants of the war, but there was a generation raised on the idea of a great Russia and the restoration of our order in the country, it was our chance, but we missed it. Yeltsin came to power and then Putin, an old KGB moron.\n\nBut our hour has come, the moment has come when we will show ourselves, the White Guards will return to Russia from Malorossiya under Girkin.\n\nThis chance we will not miss and we will fight to the end, on the plains of central Russia, in the forests of Siberia, in the mountains of the Urals, on the black seas and on the oceans until we get our country back.\n\nLong live the united and indivisible Russia!"
gir.27.a:0 "Slava Rossiya!"

gir.28.t:0 "Ilaryon"
gir.28.d:0 "The moment the population formerly waited for. Girkin signed an agreement with well-known Eastern Orthodox Church metropolitan Ilaryon where he agrees to replace the Church to the most convenient and most prominent place. It was always under the most complicated disputes over the leaders of Novorossiya whether to replace it or not; whether they'll be rightous about this or will not. The Church will always commemorate the names of the new rulers. The future new born inheritors of the princes will be baptized in this holy church.\n\nIn the past and until now, no one has the right to destroy this church under any circumstances. Girkin emphasized with intonation: "This day will be remembered on the walls of the church and will be celebrated every year as well as will be introduced as warm family celebration and will stay on the sane level-like Christmas."
gir.28.a:0 "Ok."

gir.29.t:0 "Rostislav Rostislavovich Romanov"
gir.29.d:0 "Our one of the main contenders for the throne is Rostislav Romanov. Young and full of vigour to rule the country as a monarch. He is considered by many to be the best choice of those left and that he should be the one to lead the Great Unified and Indivisible Russia.\n\nRostislav Rostislavovich belongs to the Mikhailovsky branch, the male line of succession to the throne of Nicholas II's youngest son, Mikhail Mikhailovich.\n\nAlthough he was born in the United States, Illinois, he was baptised, as it should be, in Orthodoxy. But during his education in Western schools and colleges he was imbued with the more liberal and democratic ideas of a progressive monarchy.He is married to Fotinia Georgievna and has a male heir, whom he has decided to name Rostislav.\n\nHe is also in line for the throne of England as he is a distant ancestor of Sophia of Hanover. This makes him better known in the eyes of the Western community and more legitimate. He is also the only one of the House of Romanoff to visit Russia.\n\nHe is young, energetic, and full of vigour to reign in Russia. A true Russian patriot and a worthy Tsar."
gir.29.a:0 "Ok."

gir.30.t:0 "The Russian Orthodox Church Outside Russia"
gir.30.d:0 "The Russian Orthodox Church Outside Russia (ROCOR) traces its roots to a pivotal period in Russian history. The formation of ROCOR was a response to the profound challenges faced by the Orthodox Church under the Bolshevik regime, where religious persecution and the spread of atheistic ideologies were pervasive.\n\nThe emigration that led to the establishment of ROCOR was not a mere exodus; it was a conscious decision by Russian Orthodox Christians, including clergy, intellectuals, and ordinary believers, to seek refuge outside the borders of the Soviet Union. The Great Patriotic War served as a crucible for this migration, as many faced not only the horrors of war but also the intensified persecution unleashed by the Red Terror, a campaign aimed at eradicating religious influences in Soviet society.\n\nIn the diaspora, these emigres envisioned ROCOR not merely as a refuge but as a bastion of resistance against the ideological onslaught that had befallen their homeland. They saw themselves as custodians of the "Triune Rus"—an evocation of the unity of Russia, Ukraine, and Belarus—and believed that the Orthodox Church, with its rich traditions and teachings, played a central role in safeguarding the soul of the nation.\n\nThe survival of the Russian Orthodox Church, as perceived by those in ROCOR, became a testament to the enduring strength of the Russian people's faith and cultural heritage. The establishment of ROCOR was not only an act of preservation but also a proactive response to ensure that the teachings and traditions of the Orthodox Church would not only endure but thrive, even in the face of adversity."
gir.30.a:0 "Slava Rossiya! Slava Jesus!"

gir.31.t:0 "Decommunization"
gir.31.d:0 "Andrii Petrovych was sitting on a bench in his favorite park. He was a labor veteran, both under Soviet rule and under the DPR. Next to him was a happy crowd that followed the excavator as it approached the monument to Lenin with a noisy step.   The first blow broke off Lenin's arm, the second broke off his head, and after the third, the monument fell with a loud clang. The crowd rejoiced, and Andriy Petrovych rejoiced with them. And he did not even think that the war for the independence of Novorossia began precisely because Ukrainians were tearing down Lenin's monuments. While at the time this caused his blood to boil and he hated it, now he rejoiced."
gir.31.a:0 "Ok."

gir.32.t:0 "Meeting of the Monarchical Congress"
gir.32.d:0 "In the grand assembly hall of the monarchical congress, dignitaries, nobles, olighars and representatives from across Russia gathered to deliberate upon a momentous decision – the selection of a new monarch. The air was thick with anticipation as the fate of the crown hung in the balance. Two prominent contenders emerged, each with their own claim to the storied throne – Rostislav Romanov and Mariya Romanova.\n\nRostislav, a distinguished member of the Romanov dynasty, carried himself with the regal air that bespoke his royal lineage. Known for his charisma and diplomatic acumen, he had earned the support of many who believed in a return to the traditions of old. His vision for a revitalized monarchy resonated with those who longed for the stability and grandeur of the past.\n\nOn the other side of the debate stood Mariya, a descendant of the Romanova family. Her proponents argued for a fresh perspective and a break from the constraints of historical precedent. Mariya was seen as a symbol of modernity, advocating for reforms that would align Russia with the evolving global landscape. Her progressive ideas appealed to those who sought a monarchy in step with the times.\n\nIn the final moments of the congress, as the votes were cast and tallied, the air hung heavy with anticipation. The decision, fraught with significance, would shape the course of Russia's history. The announcement of the chosen monarch, whether Rostislav or Mariya, would usher in a new chapter for the nation, blending the echoes of the past with the promises of the future."
gir.32.a:0 "Ok."

gir.33.t:0 "Celebratory Speech"
gir.33.d:0 "This day is going to become a historical highlight in the calendar of each and every resident of our monarchist Novorossian state. Today, on the street of the Zapoviti of Illich, Girkin, who is standing with his $2000 jacket, on the balcony of the Donetsk administrative building where he will be giving a historical and enormously imporant speech which will put to an end the months of disputes beetwen fractions in the congress. A whole mob of people are crowding and keeping their eyes peeled for this moment.  And so, the renowned and influential player in this scenario, Igor Girkin, emerged onto the high balcony of the building. The enormous crowd fell silent immediately, anticipating his words. With a measured gesture, he raised his hand, surveying the masses that had gathered around.\n\nAs the microphone began to transmit, Girkin commenced his address. His words, like thunder, reverberated through the crowd, and his voice echoed in the vast space in front of the congress building. He declared that this was the final session of the congress and that, ultimately, they would overcome the last obstacles on the path to restoring the monarchical order. According to Girkin, the choice of the monarch would determine the definitive course of this new era. The crowd responded with loud applause, cries of support, and ignited fireworks that illuminated the sky with vibrant lights.\n\nAfter concluding his speech, Igor Girkin retreated back into the congress building, while the crowd continued its subdued euphoria for a long time, filled with hopes for a new era of monarchy."
gir.33.a:0 "Ok."

gir.34.t:0 "Maria Vladimirovna Romanova"
gir.34.d:0 "Mariya Romanova was born into the historic Romanov family, a lineage steeped in the annals of Russian history. Raised in a palatial estate, Mariya experienced both the privileges and responsibilities that came with her royal heritage. From a young age, she displayed a keen intellect and a profound curiosity about the world beyond the palace walls.\n\nKnown for her charisma and ability to connect with people from all walks of life, Mariya earned respect for her leadership qualities. She engaged in philanthropic endeavors, working tirelessly to address social issues and promote education. Her commitment to social justice and inclusivity resonated with a broad spectrum of the population, creating a strong foundation of support.\n\nIn the eyes of many, Mariya Romanova represented the bridge between Russia's storied past and a future defined by progress and innovation. As a monarch, she promised to lead with wisdom, compassion, and a dedication to the well-being of her people. Her candidacy garnered support from those who believed that, in Mariya, Russia had found a leader capable of guiding the nation into a new era, where tradition and modernity coexisted harmoniously."
gir.34.a:0 "Ok."

gir.35.t:0 "Beating reds once again"
gir.35.d:0 "It was an ordinary day in Donetsk. One old lady was walking through the Lenin square to get herself some food, but at one moment she saw a horrific event for her.\n\nSome construction workers and one mobile crane were located near Lenin statue. Crane was already working on getting the statue up. Old lady grabbed her heart in fear and shock.\n\n"What are you doing?!", she asked. The brigadier said to her: "We are working on destroying bolshevik legacy, can't you see? Chief ordered to get rid of any communist shit.".\n\nThe crane worker wasn't too careful with his work, and accidentaly dropped Lenin while getting him upwards. The statue fell on the ground and cracked into many pieces.\n\nOld lady couldn't believe her eyes. She knew about the time when Lenins were falling in Ukraine, commanded by fascist banderites, and now it's here too. She fell on the earth, without an ability to comprehend events happening in new Novorosiya."
gir.35.a:0 "Off with the communism!"

gir.36.t:0 "Another meeting"
gir.36.d:0 "Donetsk was finally shining under tricolor. However it was far from being done, there were a plenty stuff to end. Especially we have to do something with Ukraine which threatened new proclaimed all russian government, as well as Russia. People from far right movement were invited. Notedly - Lebedev, Bykov, Dus', Symonovych, Kvachkov, Malofeev, Bakov and Hutayev all of them were invited under Girkin's discretion. All of them sat by the round table and started to discuss the future of New Russia for world to see. Girkin glanced over the participants, and started his speech.\n\n- So gentlemen, Now we have came to this. We have crushed our biggest enemy, yet on the west and on the east, we're still under a threat of being subjugated by either of these sides, especially by current Russian goverment. It must come clear that we're a threatening kremlin. These kretins have nothing but hatred to all russian people. They will use any means to stomp us, even our people. But we're not here to brag about patriotic spirit. I called you here to discuss our plan on rebuilding Russian state from the ground. Any suggestions?\n\nAnd so one by one raised their hands to share their vision on New All Russian state."
gir.36.a:0 "Ok."

gir.37.t:0 "The Church"
gir.37.d:0 "Ilarion was sitting on the terace of his house hitting his morning american coffee and reading his daily independent newspaper of New Russian Word which operates to this day. He took a sip and spitted it over newspaper. As newspaper claims revival of the All Russian goverment. Then phone on the kitchen rang. He ran to it, catching his breath, he asked:\n\n-Who..?\n\n-Ilarion, its me, Igor. We need a faithful and not corrupt church, here in Donetsk.\n\nIlarion asked no further. He took no hestitation to bag his belongings into a tight old ripped apart travel bag with words RUSSIA on it and flang to Donetsk.\nAfter few hours of flight, Runway of abandoned Donetsk's airport was to see their first in 6 years guest. Girkin jogged to the private jet of Ilarion, he shoke his hand and greeted him with joy:\n-Its a nice to see a true independent metropolitan in this corrupt world.\n-Its nice to see you too, wice man. - Ilarion responded back, with american smile. - Im, suprised with the condition of the airport.\n- Never thought it can still serve the people. - Ilarion added.\n-Well, that's what we have for now. Anyways back to what this trip was intended for?\n\nGirkin then escorted Ilarion to his car. Then he showed Ilarion Donetsk, then they drove to Regional Administration building - that's where authority of All Russian State was held. Girkin showed Ilarion to people of the congress. Then all of them sat around the table. Girkin gave a document and a pen. All of them waited for signature of Ilarion but it didn't take to decide. Everyone who was in the building cheered; joy expressed had no end!\n\nROCOR was finally in place where it can call home - Russian Donetsk!"
gir.37.a:0 "Slava Rossiya!"

gir.38.t:0 "The Dream"
gir.38.d:0 "Girkin gathered every General participated in bloody fight for DPR and LPR. They all stood in dark lit room with a big imperial russian map of Novorussia lying on a table.\n\nYou see this, russians? - Girkin pointed on a map. All about it is perfection. Not only its a big chunk of land which grants us authority over Black Sea, but Russians there too, to be united under one banner, one language and one faith. As we can observe from now. Brother generals - Girkin took a seat. - Russian people are oppressed by current temporal governments on the east."
gir.38.a:0 "Ok."

gir.39.t:0 "Sending an imperial delegation to the UN"
gir.39.d:0 "In the grand halls of the royal palace, Monarch Rostislav of the newly formed Novorossiya faced a critical juncture in his reign. To assert his legitimacy and commitment to democratic principles, Rostislav decided to send a delegation to the United Nations. His mission was clear: to convince the international community that Novorossiya was a beacon of democracy, free from imperialistic ideals.\n\nRostislav, accompanied by his delegation, stands nervously in front of the imposing UN doors. Sweat beads on his forehead as he contemplates the weight of the discussions ahead, feeling a mix of anticipation and anxiety about the diplomatic challenges that lie behind those doors.\n\nAlthough, their presentation at the UN was a meticulous blend of historical context, highlighting Novorossiya's recent shift from a monarchy to a constitutional monarchy. Rostislav, in a heartfelt letter to the UN General Assembly, expressed his dedication to democratic principles, the protection of human rights, and the pursuit of international cooperation. Rostislav at the end of his mission of convicing he has added "Our country is totally not artificial, please recognize us!""
gir.39.a:0 "Good Luck."

gir.40.t:0 "The Grand Coronation of Emperor Rostislav Romanov"
gir.40.d:0 "In a grand ceremony held in the historic city centre of Donetsk, a wave of anticipation and excitement swept through the nation as Rostislav Romanov prepared to ascend to the throne as the All-Russian Emperor. The coronation, a symbol of continuity and tradition, was meticulously planned to showcase the unity and strength of the Russian people.\n\nThe coronation regalia, steeped in history, was brought out for the occasion. Rostislav Romanov was adorned with the Imperial Crown, an intricate masterpiece embedded with precious gems symbolizing the unity of the Russian lands. He also received the Imperial Scepter and Orb, representing authority and the sovereign's commitment to justice.\n\n"Slava Emperataru" Was heard all over the hall once Rostislav Romanov in a symbolic fashio, took the crown and coronated himself."
gir.40.a:0 "New age for Rus` has begun"

gir.41.t:0 "The Hike"
gir.41.d:0 "[THE DAY YOU HAVE WAITED FOR CENTURIES HAS BEGUN]\n\nAmidst the gathering storm clouds, the Imperial Commander In Chief Girkin, a figure of imposing stature with a resolute gaze, stepped forward onto the raised platform before his assembled troops. His Kevlar Helmet gleamed in the dying light, a testament to the strength of the Empire he represented.\n\nWhen he adjusted the microphone he started: "Soldiers of the Imperial Empire!" his voice echoed across the plains, reaching the ears of every warrior under his command. "Today, we stand on the precipice of history. The time has come to face the forces of the larp Russian realm, to defend our honor, our people, and our way of life." A roar of approval erupted from the ranks, the sound echoing across the plains like thunder. The commander continued, his words a rallying cry that stirred the hearts of his soldiers. "For too long, the Russian forces have encroached upon our lands, seeking to impose their will upon us. But today, my comrades, today we shall show them the indomitable spirit of the Imperial Empire! We shall stand as one, a formidable force that cannot be broken!"\n\nAs the commander spoke, the winds seemed to carry his words across the plains. The two armies, each driven by a sense of destiny and the echoes of their ancestors, prepared for the clash that would echo through the ages.\n\nWith his final words, the commander raised his AK-74 once more and with the loud battle-cry he screamed: "CANNON FODDER TACTICS WERE ALWAYS SUCCESSFUL!", and the army of the Imperial Empire was encouraged to FIGHT, a force united in purpose and bound by the echoes of history. The epic WAR between empires had begun, and the outcome would be written in the blood and sweat of those who fought for their nations."
gir.41.a:0 "'Mi smelo idyom vperyod...""

gir.42.t:0 "Dismissal of Girkin as prime minister"
gir.42.d:0 "Tsar Rostislav paced back and forth in his opulent office in Donetsk, the weight of the decision he was about to make etched across his stern face. He had called upon Girkin, a man known for his political disputes wiith Rostislav and strategic thought how to put him out, to deliver news that would change the course of Girkin's career.\n\nAs Girkin entered, Rostislav's eyes narrowed, and a sardonic smile played on his lips. "Girkin," he barked, "your political games have proven inadequate for the challenges we face. I've called you here to inform you of your new role. You are now going to be a Chief Commander. Since you were always trying to put me out from the shit i do daily for the country.  - Rostislav's eyes flashed with disdain. "Consider it a lesson in humility, Girkin. The empire needs a leader who can adapt, not one stuck in the quagmire of political intrigue."\n\nGirkin, along with suprise and disdain, tried to back up -  "Your majesty, I am a man who has to deal with internal problems and with the external ones at the moment" Rostislav looked up from the documents and looked Girkin straight in the eyes and said: "This is an order, you will argue one more time and we will turn you away and beat the shit out of you!"\n\nAs Girkin left the room, the weight of his new role bore down on him, accompanied by the echo of the Emperor's biting words. The transition from Prime Minister to High Military Commander felt like a public stripping of his former status, a humiliating fall from grace orchestrated by a ruler determined to reshape the empire with an iron fist."
gir.42.a:0 "No more denikinism, you retard."

gir.43.t:0 ""Gorynych""
gir.43.d:0 "Tonight, under the cover of night, by order of insert name, Imperial Security Service operatives began preparations for an operation codenamed "Gorynych". The aim of the operation is to eliminate the ROVS, an organisation that threatens Russian power and the stability we have long sought. It must be ended now, before it's too late.\n\n22.12 at night, operatives on special landing helicopters land on the roof of the ROVS headquarters.\n\n22.15am, dark armoured vehicles surround the block and approach the building, light and smoke grenades and sniper fire from the surrounding rooftops drive the guards into the building.\n\n22.25 All the guards and most of the average party members present in the headquarters are killed, Ivanov and his close entourage are taken alive. But by special order from the centre of control of special operations forces it was necessary to immediately liquidate all his entourage, which was done. The documents of the ROVS organisation with their plans and the composition of the organisation were seized and the operatives quickly fled.\n\nIn the morning ambulance, police and firemen were already crowded around the building, the official version of death of all those who were in the headquarters of the ROVS - gas leakage.\n\nOur main enemy is finished"
gir.43.a:0 "Rest in piss."

gir.44.t:0 "Darnitskaya Massacre"
gir.44.d:0 "This morning workers of Darnitsa Carriage Repair Plant staged a mass strike, work was stopped and paralysed, the protest was joined also by railway workers who blocked the railway in the area of the plant, which significantly worsened the efficiency of other enterprises in Kiev. In addition, the protesters threw the Russian tricolour off the roof of the factory and hung a yellow and blue cloth, which they call a flag.\n\nThe city garrison was hesitant to take action for a long time, but when reports emerged that if the strike at the wagon repair plant was not suppressed, a column of workers would march through all the enterprises of Kiev, which cannot be allowed.\n\nAPCs and cars with security forces started to arrive at the plant, the main purpose of the protest is to show that we are "occupiers" and expatriate Ukraine and other Khokhlovian nonsense.\n\nThe situation gets out of control, APCs and soldiers of the garrison open fire from all guns on the workers and pursue them through the territory of the whole factory, a similar fate awaited the railway strikers, the wounded were suffocating from smoke, the factory yard was covered with blood and the working premises were covered with corpses.\n\nThe riot was put down. Long life to the Tsar!"
gir.44.a:0 "This damned malorussians never calm down..."

gir.45.t:0 "The Victory Day"
gir.45.d:0 "The major cities of Russia are behind us, putler's troops are retreating on all fronts and surrendering to the Cossacks and White Guards, the unkilled remnants are still running through the forests of Siberia and small garrisons are huddled in small towns in central Russia. This is victory, our proud flag is flying over the Kremlin, the nation is celebrating the end of the war and victory parades are being held in many cities.\n\nIt was not an easy battle, but going wide fields we have won back our homeland, having cornered Putin and his gang of KGBs. Many generals are already resting in Switzerland or lying with a hole in their heads in their offices, from scouts and informants come news of Putin's death in his bunker in the mountains of the Urals."
gir.45.a:0 "SLAVA ROSSIYA! SLAVA TSAR!"

gir.46.t:0 "Coronation of Maria Romanova - Empress of Russia"
gir.46.d:0 "In the opulent halls of a grand palace nestled within the city of Donetsk, a coronation unfolds as the air is thick with anticipation and the splendor of a royal occasion. The people gather in excitement, their eyes fixed upon the opulent throne where Maria Romanova, a regal figure with an air of grace, is poised to be crowned as the Empress of Russian Empire.\nThe grandeur of the ceremony is heightened by the ornate decorations that adorn the palace. Intricate chandeliers cast a warm glow upon the assembly, and rich tapestries line the walls, depicting the storied history of a realm that stretches across vast lands.\n\nThe ceremony begins with a procession of dignitaries, nobles, and courtiers, each donned in resplendent attire that reflects the wealth and prestige of the empire. Girkin, who sat right next to her, was observing as the new Empress takes the place of such important figure. As the attendees take their places, the atmosphere is charged with a sense of reverence for the momentous occasion. At the center of attention is Maria Romanova, the soon-to-be empress, draped in a gown of regal magnificence. Her presence commands attention, and the crowd hushes in awe as she gracefully ascends the steps to the throne, where the crown awaits.\n\nIn the midst of the solemn ceremony, echoes of traditional mid russian music resonate through the grand hall, adding a majestic cadence to the proceedings. As the crown is gently placed upon Maria's head, the crowd erupts in cheers, and the air is filled with jubilation. Following the coronation, a grand banquet is held to celebrate the new empress's reign. Lavish feasts are laid out, and the palace resounds with the joyous laughter and merriment of the attendees. The celebration continues into the night, marking the beginning of a new era under the rule of Empress Maria Romanova."
gir.46.a:0 "Slava tsaritse!"

gir.47.t:0 "Girkin is freed by the Empress"
gir.47.d:0 "Empress Maria's reluctant concession marks a turning point for Girkin, who finds himself stripped of imperial grandeur, assuming the humbler mantle of a mere general. Yet, the transition from the extraordinary to the ordinary proves to be a double-edged sword.\n\nIn the wake of this metamorphosis, Girkin confronts a silent adversary – depression. The weight of unmet expectations, the loss of regal stature, and the challenge of navigating a world devoid of imperial privilege converge to cast a profound gloom upon the once-mighty leader. The echoes of former glory haunt him, resonating with the hollowness of his current existence.\n\nThe daily grind of a general's responsibilities becomes a relentless reminder of what once was, intensifying the emotional struggle within. The juxtaposition of past triumphs against the backdrop of a mundane present weaves a poignant narrative of inner turmoil and existential crisis, painting a vivid picture of Girkin's journey from imperial splendor to the depths of despondency."
gir.47.a:0 "It`s so over for him."

gir.48.t:0 "UN chair"
gir.48.d:0 "Good afternoon, ladies and gentlemen, this is Washington News. Today, a strange situation has occurred, officially it has been reported that the Empire of Rus is recognized as a descendant of Ukraine, which will give it a seat at the UN headquarters.\nAfter the coronation of Rostislav Romanov as Emperor of Ukrainians and Russians, his government sent a plea to recognize the Empire of Rus as a descendant of Ukraine. Due to the fact that his country was the last one to unite Ukraine after the events of the Fire of Poltava, some world leaders officially recognized him, which even led to an official vote at the UN on the topic of recognizing the Empire of Rus as a descendant of Ukraine. As a result of the positive vote, as well as due to bureaucratic norms, the Empire also received a UN seat for Ukraine.\nAfter that, the Empire's diplomats planned to hold a speech to thank the Emperor for the recognition, but they got into a confrontation with Russian Ambassador Lavrov:\n"What the fuck is this? Your "emperor" is not a legitimate descendant of the Romanovs! Moreover, you are claiming the entire territory of the Russian Federation by his title alone! What does "Emperor of the All-Ukrainian and All-Russian" mean?!\nWe will not tolerate the desecration of the Emperor's personality, and therefore we are leaving the voting hall.\nWhat this means for the world and how it will affect geopolitics is on our program today! And now - a commercial break. "
gir.48.a:0 "What the..?"

gir.49.t:0 "Relations with the West"
gir.49.d:0 "A month ago, the Emperor of All Russia and All Ukraine, Rostislav Romanov, signed a decree to launch a diplomatic mission to normalize relations with the West, as well as improve relations with all important European countries, such as Germany, France, etc.\n\nThe very next day, the diplomatic mission left for Washington, D.C. The Western government set conditions for an independent commission to verify the fulfillment of all human rights in the territory of the Russian Empire. As a result of the inspection, which took a month, the commission officially confirmed that human rights were being observed in the country, and ukrainians have their rights of national autonomy, and today the President of the United States and Emperor Rostislav signed a cooperation agreement, which was popularly called a "friendship treaty."\n\nRussian Ambassador Lavrov emphasized that such events have a very negative impact on relations between Russia and the United States, and that agreements with an illegitimate government are criminal and wrong. Moreover, UN Ambassador Nebenzia said that the United States is trying to build a terrorist regime that will be used to destroy the Russian Federation and establish a Western dictatorship there."
gir.49.a:0 "Putin's mongrels groan with anger"

gir.50.t:0 "Unity of Ukraine"
gir.50.d:0 "The parade began on Kyiv's Independence Square. First, joint motorized regiments marched. They were followed by motorized infantry divisions with banners. The banners depicted the flag of the Empire of Rus, as well as the flags of the divisions. At this time, the crowd near the central square was closely watching the parade and shouting with pleasure, waving their flags.\nVarious generals were sitting behind the rostrum, as well as Emperor Rostislav himself, of course, on a separate balcony, under good security. After the divisions marched, a military band played the anthem of the Empire.\n\nAfter that, Colonel Igor Girkin approached the stand with a microphone. With obvious awkwardness and dissatisfaction, he began his speech in Ukrainian:\n\n"Dia... Dear friends. I am happi to announce that it is only thanks to you, Ukrainians, that we were abel... were able to unite our Great Empire. Our great comonwelth... commonwealth of the Ukrainian and Rusian nations. Only yor dedication, loyalty to the crown and assistance allowed us to achive what we have now." - One could feel Girkin's tone losing more and more life with every word he spoke\n\n"Without you, our great Empa... Empire would not exist, and if it were not for Ukrainians, the Rushian... the Russians of Donetsk and Luhansk would have remained in Donbas. And under mai... my command, we were able to unite our glorius... glorous... gloriaus... glorios... fuck, glorious Empire of Rus" - after these words there was a long pause, while one could hear a nervous, flipping of papers with the text of the speech.\n\n"Over the years, the Ukrainian people have suffered a lot. Because of the Donbass war started by... the mongrels of Putin... ahem, because of the events of the Fire in Poltava, because of the oppression of Ukrains... Ukrainians after the loss of the Armed Forces in the war with Novorossiya... But now it is in the past. A glorious future awaits us, as it does for fraternal peoples." - After finishing his speech, Girkin quickly went downstairs, red as a tomato with rage, recalling all the Russian swear words he knew."
gir.50.a:0 "For the Tsar and his People!"

gir.51.t:0 "Restoration of Social Conditions of the Empire period"
gir.51.d:0 "In the Russian Empire, Mariya, a leader, embarked on a quest to mend societal fractures. She revitalized the nobility by fostering unity through reforms, reinstating its influence. Recognizing the importance of the Orthodox Church , Maria strengthened ties with the clergy, ensuring it served as a unifying force. Simultaneously, she aligned the interests of the formidable Cossacks with the state, integrating them effectively. Mariya's strategic vision led to a harmonious coexistence, laying the foundation for stability and prosperity."
gir.51.a:0 "Ok."

gir.52.t:0 "Another day in blood of rioters"
gir.52.d:0 "Girkin could never find peace with new aquired land a peace of Eastern Europe, A slice of Ukraine.  It was completely deukrainized all labels in ukrainian was now long gone. However it did not stop the turmoil. One of the biggest demonstrations on Teremki District had emerged. People of all sorts; from centrists to far-right nationalists united under one banner. It didn't take long to for security services to arrive. Their order and purpose was to disassemble such demonstrations.\nUkrainians started throwing rocks into the column of tanks and military police.\n-GET THE FUCK OUT OF UKRAINE!\nThe megaphone had spoke nerviously:\n\n-Ugh, listen, we would've shot you on sight, however we're showing a sign of a good will to think twice of your behavior. Be nice, and we'll be in return!\n\nDoubts started to find its way into ukrainian crowd:\n\n-They have fucking tanks on other side of the road. I doubt they'll even hesitate to shot us.\n-Look, man. I dunno about you, but I would to live a bit longer. Im out.\n-I heard enough of these psychos. Have you heard that Girkin has schizophrenia? He'll give an order to shot us if necessary and they'll listen!\n\nMost of the Ukrainians fled the scene; Crowd decreased in less than a half. However Ukrainians were still standing their ground and continued to throw rocks.\n\nWithout a command, Military police started to shot Ukrainians down, one by one. \n\n-HQ, Demonstation is suppressed. Returning back to the duties.\n\nEvery nationalist was lying dead. Some people who didn't partake in the demonstration saw this and that sure had made them to fear of russians even more...\n-They're fucking sick..."
gir.52.a:0 "Damn."

gir.53.t:0 "Heating events in Donetsk"
gir.53.d:0 "In the very epicenter of a new political formation on the ruins of Ukraine, opposing forces collide, again, not with fire and sword, but with pen and word. Igor Girkin, the Prime Minister of the Russian Empire, has already repeatedly in closed meetings, and sometimes in interviews, personally condemned the new emperor for, as he put it, “Anglo-Saxon opportunism,” which discredits the honor of a real Russian man. In Girkin’s vision, Russia should stand firmly on the stilts of traditional bonds, and not under the influence of the corrupting West, which is corrupting the pristine Russian culture with its excessive freethinking. As Girkin has stated more than once, “A Russian person is one who is unconditionally loyal to his homeland and his sovereign, because the power of the sovereign-emperor is from God, and a real sovereign should not waste his great gift on some absurd measures.” Based on this and on the convictions of the Triune Russian People, Girkin argues that it cannot be allowed that the hand that contributed to the creation of Operation Unthinkable, the Dallas Plan and, finally, the establishment of the Kyiv Junta, further desecrated the Orthodox land of the Russian people . Girkin, a prominent representative of Russian autocracy and conservatism, who grew up on the soil of traditions and reverence for the heritage of the White Guard, obviously sees in Emperor Rostislav I a man cut off from his historical homeland and, as a result of insidious Anglo-Saxon propaganda, who believed in the influence of destructive forces. Rostislav’s desire for Western-style liberal democratic ideas causes indignation and, for now, secret confrontation in Girkin’s camp, where his allied forces begin to build their political line with enviable despair, opposing any liberal law. There has already been a lot of controversy about this. In these undercover games, as if in a kaleidoscope, supporters roll from one camp to another."
gir.53.a:0 "Lets look..."

gir.54.t:0 "Heating events in Donetsk"
gir.54.d:0 "This is due to the fact that many of Girkin’s supporters are also monarchists, and in their eyes the authority of the tsar is also great. Girkin, devoted to his ideals and beliefs, feels the bitterness of betrayal, seeing how the new emperor prefers what he hated all his life. For him, this is simply nonsense, as for most of the government. And at this time, the young Emperor of All Russia Rostislav I, filled with the desire to change and, ultimately, reform the country globally, runs into his inexperience in governance and the secret resistance of his closest advisers, including Girkin, which almost completely nullifies any attempts at reform. The consequence of this Cold War was a virtual political split in the Imperial Party. The two factions tirelessly fight each other, accusing their opponents of almost all mortal sins in the newspapers. How this struggle will end is still unknown, but according to Western analysts, such a split was expected, so we should expect some loss of political power and prestige within the country of the ruling party, at a minimum, and at a maximum, a civil war. But Western experts doubt its beginning, because all parties to the conflict support monarchical ideas to one degree or another."
gir.54.a:0 "His Majesty knows what to do."
gir.54.b:0 "The General must cool the young man's ardor."

gir.55.t:0 "Games of Thrones in the capital"
gir.55.d:0 "Long before that fateful night, under pressure in the pretentious luxury of the vaults of the hall of the monarchical congress, filled with various delegates from the party, aristocracy, bourgeoisie, military class, merchants and simply influential individuals, the fate of the country was being decided. In the tobacco smoke-filled Kalouars, the fate of the country and its new economic innovations was already being decided, because everyone wanted to bite off a larger piece by bargaining for the redistribution of influence. As a military man, brilliantly dressed as if for a parade, said once that evening, “high business is not for patriots.” At first glances were turned to George, the son of Maria Romanova, but the prospect of his mother on the throne became much more attractive. She was much better at finding the necessary contacts with the elites and had a lot of leverage over her son. In addition, nuances arose that strengthened the position of Maria Romanova, namely, she was much closer to the main royal line. Deciding to avoid possible problems with legitimization, the electors gave her the crown. And already during her reign, Empress Maria of All Russia demonstrated stubborn absolutism. She did not tolerate any rival in power. Having carried out reforms that returned the class restrictions of the Russian Empire of the early 20th century, many people became poor. And during the behind-the-scenes struggle, she strictly restrained the influence of Igor Girkin, arrested everyone who was against her coronation and crushed the White Guard movement within the country. Although these insignificant organizations compared to the central government could hardly be called worthy rivals, Maria clung to the throne with a stranglehold, not wanting to give it up even to illusory opponents.\n\nIn the shadow of her power, her son Georgy Romanov built his intrigues, while his mother did not devote enough time to such a subtle human aspect, preferring brute force methods. But in vain, in addition to his passion for mysticism and esotericism, George found contacts with young officers from the Life Guards of noble origin who were not happy with the belittling of the status of the nobility in front of the imperial person. George, deprived of the throne, combining what at first glance seemed an impossible mixture of narcissism, cowardice, uncertainty and determination, greedily dreamed of power, which in his opinion was illegally taken from him. He gathered a “club of interests” around himself, carefully selecting loyal supporters."
gir.55.a:0 "We will see..."

gir.56.t:0 "The legacy of the ridiculous and bloody murder of Paul I"
gir.56.d:0 "It seemed that young people simply wanted to find secret mystical knowledge, but Georgy simultaneously consolidated supporters around himself. He was unable to openly confront his mother because he was too indecisive for this and the mother herself considered him incapable of betrayal. Even when, at one of the closed government meetings, the head of imperial security directly indicated that Georgy was conducting suspicious activities, she said: “My son is not capable of this. If you do not want me to consider this an insult to my family and the Russian Empire, I would ask you to stop this vile slander." Georgy gained more and more new supporters, and then one night, after checking his astral maps, he suddenly realized that this was the ideal moment for a coup, but he was too afraid to carry it out, so he had to drink glasses of vodka several dozen times for courage. Since Georgy incredibly loved symbolism, theatricality and aesthetic message, he changed into the costume of the officer who killed Paul I, took a flintlock pistol and a gilded snuff box. Having redirected the palace guards through loyal generals, he gathered loyal officers of the Life Guards and went to the palace. Having burst into the chambers of the Empress, George declared: “Mom, I will put an end to your tyranny! The Russian monarch has always ruled with the support of the nobility, because this is the natural position of the Russian people. By violating this tradition, you are violating the very essence of the Russian reign, so you cannot be called a legitimate empress because of what I will be the new emperor and you will have to go into the past! Then he staggered with his companions to Maria’s bed and waved his snuffbox, symbolically shouting “Alea iacta est!”\n\nMaria just had time to scream before the snuffbox crushed her left eye and eye fluid with splashes of blood covered George’s face, causing him to back away in fear, dropping the snuffbox and eventually feeling sick. Georgy began to fall over, trying to cling to the velvet curtains, which were torn, and he almost shot himself in the leg with his own pistol. Luckily the bullet only scratched his leg. After which he shouted hysterically with the order to finish what he started, and the officers of the Life Guards opened heavy fire from their service MP-443s until the convulsions of the dying woman stopped and the blood soaked the snow-white bed, feather feather feathers descended on the unlucky killers while Georgy extricated himself from the curtains with the drenched bloody face. The next day, the coronation took place and the fact that the Cossack guards were absent during the assassination attempt by “unknown persons” served as the reason for mass repressions among the Cossacks, since George saw them as his own competitors and it was obvious that many of them guessed about the real state of affairs... George himself saw in himself a kind of conduct, a martyr, a mission of the Russian people who opened the path of truth. Next, he began to purge from the government all those disloyal and all those he did not like. After which, at a closed meeting among his loyalists participating in the coup, he distributed to them individually each an important state industry, thereby founding Russian state corporatism from loyal sycophants."
gir.56.a:0 "God, save their souls..."

gir.57.t:0 "Victory of Humanism. Emperor Rostislav I rebuilt the new Ukraine."
gir.57.d:0 "According to the majority of the inhabitants of the empire, one of the great and turning points occurred when Emperor Rostislav I, having ascended the throne, carried out a series of reforms according to the Western model, but of course everything was not immediately good and it took him a lot of time, but it was definitely worth it. The Empire of Rus' has such a neutral name that it quite well describes the current territory of the former Ukraine. Having put an end to the consequences of the outrageous rule of Igor Girkin in his opinion, he calls on his people to consolidate around new progressive and certainly better traditions. For him, autocracy is not an end in itself, but only a tool to build a better world. Having consolidated the reformist forces around himself, Rostislav was able to push aside Girkin and his clique, but fearing the outbreak of a potential civil war, he made some concessions. Igor Girkin became the Supreme Commander-in-Chief of the Armed Forces, maintaining his very large authority in the army but finally losing his position in the political sphere. Many of his henchmen also decided to retreat until they completely lost everything they could get during their career. Emperor Rostislav I, as he is also called the architect of the new Russian era, the Russian enlightened renaissance in Western countries, officially restored the unity of the former\n\nUkraine, which had now become an integral part of his empire. Moreover, through diplomatic efforts he achieved that his empire was allowed into the UN as the official successor of Ukraine. As Rostislav said: “I am very pleased to see my country already renewed when children of Russian, Ukrainian or other origin can calmly play together without any prejudices. The unity of peoples in such a large empire is a priority task, because in unity there is strength. These same children will build our future and what will our future be like if we set them against each other?” Imbued with the ideas of Western liberalism, Rostislav realized his dream. And Girkin refuses to comment on the current state of affairs in the empire. According to one of the resolutions, the Ukrainian language acquired equal status to Russian, and the general pluralism of opinions and freedom of speech increased. The conservative Girkin is extremely dissatisfied with the state of affairs, but all he can do is take on the guise of a valiant defender of the homeland, at least for the time being... Also, on the instructions of the emperor, the unification of the Armed Forces was carried out. An important step towards this unification was the inclusion of Cossack regiments in the general structure of the Armed Forces. Some Cossacks were integrated into the state apparatus and some into various military units. Atamans and field commanders who did not renounce extreme chauvinistic views were voluntarily forced into retirement, making way for younger and more promising military personnel."
gir.57.a:0 "Glory to the Tsar!"

gir.58.t:0 "New aristocracy, old orders"
gir.58.d:0 "So many thoughts and memories swarmed in the empress’s mind. Sitting in the chair of his desk, remembering the book “The Wisdom of Jesus the Son of Sirach”, which he had read a long time ago, saying out loud a quote from there that came out of his mind into his mouth.\n\nWith the unmerciful - about charity, with the lazy - about any matter...\n\nMaria then began to think about the thoughts that had been haunting her for so long.\n\n“The temptation of freedom in its terrible, insidious form causes deep fears in my heart. My excellent and great Russian people often almost point blank do not distinguish the debauchery of the West, seeing virtue in them. This is truly outrageous... Nevertheless, these many undoubtedly blind people admire the bourgeois Americans considering them as “a completely free and prosperous people." But if you look at the situation objectively, how can they be so ignorant of the vile Bolshevik propaganda? In turn, a natural question arises about social mobility. Why do these troublemakers need so-called social freedom, extensive guarantees if is everything already predetermined by their origin? This is all just profanation, because such demands are only the source of the strongest upheavals in Europe and 1917 clearly proved that all these unrest were artificially initiated by the left and false promises of the Bolsheviks. The temptation of coming to power created by the Bolsheviks seduces the fragile minds of the working people. The workers simply don’t know what they’re doing... Didn’t the traitorous Republicans provoke the emerging middle class by overthrowing Louis 16? It is quite obvious that everyone has their own place, as it was thousands of years before the Rurikovichs themselves, the Romanovs at the throne. The tireless attempts of the vile Bolshevism to destroy the people and their traditions have always been the main means of undermining the foundations of the dominant white civilization."
gir.58.a:0 "Tsaritsa know what she do."

gir.59.t:0 "New aristocracy, old orders"
gir.59.d:0 "Is it really only me and my associates who have taken on the burden of being responsible for recognizing these obviousities in God’s creation? Even in the seemingly enlightened Western democracies, despite their merits, there is complete chaos! Where are their former reasonable rulers, their nobility? They have succumbed to bureaucrats, crooks, populists and fictitious democracy, behind which the mask hides the fact that slaves themselves choose their slave owners. I am indignant at the thought that such a fate could once again touch the sacred lands of the Russian people. Only a solid, unbreakable hierarchy with peasants, warriors, nobles and a monarch is an integral structure in a normal monarchical country. The one who is born to grovel will grovel and the one who is born to rule will rule. It has always been this way, because this is an axiom of life. Why do you need to change something that is functioning successfully?"\n\nThus, having thought thoroughly, Empress Maria gets to work, already giving orders to the Empress of All Russia in her decree.\n\nNow the Russian people were officially divided into classes. The smallest part of this people were the nobles - military men, managers, important scientists and other often no less important personalities. Next came the merchant class, which included the entire business elite, as well as entrepreneurs of almost all types. The Cossacks moved on. For their personal ardent loyalty to the empress, they deserved a separate class of highly professional warriors, whose financing required a lot of public funds. Next came the townspeople and peasants. In fact, it was the largest society that supplied other higher classes with its labor. It was almost impossible to move from class to class, and everyone seemed to be squeezed in a vice within their class boundaries. In order to trade, peasants had to hire merchants so that they could sell their products on their own behalf. It is trivial due to the fact that the peasants did not have the right to engage in commercial activities with the townspeople either. Acting as monopolists, merchants charged peasants exorbitant prices for their services, taking most of the profits for themselves. But the Cossacks and nobles had more expanded economic preferences so they did not face the problems that ordinary people faced. So Maria was able to form stable, although not so numerous, classes that were very loyal to her."
gir.59.a:0 "Slava!"

gir.60.t:0 "Incident at the Imperial Palace"
gir.60.d:0 "The internal, behind-the-scenes struggle for influence and power in the empire reached its climax when Igor Girkin, a strategist and experienced political manager, began to oust, under various pretexts, officials who held extreme royalist, monarchist views. He especially paid attention to provincial administrations and city government administrations. Like a born virtuoso and actor, he “juggled” the criminal cases of different people, choosing the most advantageous moment for himself to remove an unlucky competitor. By subordinating most of the civil power to his influence, he ensured himself complete freedom of action because the majority of the military was on his side. And against those who are not loyal, you can always fabricate a criminal case or an accident will happen to them. A significant moment was when the emperor reviewed his imperial life guards and when he said, “At ease! You can go to your barracks!” The soldiers didn’t even move, but after Girkin repeated the order, they immediately carried it out, after which he laughed and patted Rostislav on the shoulder, saying: “Your Imperial Majesty, apparently you need to go out more often and walk around the yard, otherwise people will forget who rules them.” Girkin, of course, reduced everything to a joke, but the hint in this event was crystal clear. Despite his status as a symbol of the empire, Rostislav was never able to acquire the necessary skills to manage his own state, remaining absolutely helpless in front of the cunning fox Girkin. After several weeks of this event, Girkin, as if by chance, suggested that Rostislav transfer to him some of the bureaucratic duties that Rostislav had previously performed.\nRostislav at first resisted you, but after several veiled threats he still gave in, which Girkin took advantage of. And there was no need to carry out any masterly manipulations, because Igor Girkin took advantage of Rostislav’s elementary ignorance and gullibility. After which Girkin gradually transferred more and more responsibilities to himself, rising in his dominance over any courtiers. The inexperienced emperor agreed to transfer powers, sometimes under pressure, sometimes under the pressure of facts, not suspecting that these “boring”, “everyday”, “non-obligatory” powers have a key influence on state affairs and on the state itself as a whole. Under pressure from Girkin, Rostislav shifts more and more responsibilities to him, remaining in fact only a symbol of the empire without real power. Monarchists in the state apparatus do not suspect that their beloved All-Russian Monarch is no longer fully able to govern the country. Girkin masterfully disguised his real capabilities behind tons of bureaucratic acts, resolutions, orders, charters, exposing to the public the “active” activities of the emperor. In propaganda, he presents himself as the ideological inspirer of the emperor, without whom the state could not function normally. Although rumors about the “gray cardinal” are spreading throughout the courtyard, Girkin diligently suppresses them, considering it unacceptable for such rumors to exist, based on the Russian proverb..."
gir.60.a:0 "“The less you know, the better you sleep.”"

gir.61.t:0 "The unconditional verdict of Emperor George"
gir.61.d:0 "Georgy stood in his office and felt a chill. He still remembered how he trembled... He remembered how it seemed his unsurpassed plan to make the murder so sublime, theatrical failed when he almost shot himself in the leg and collapsed under the pressure of his own self-doubt. George saw himself as the new Louis 14 and even now walked like him. And these Cossacks might have suspected something. The generals loyal to him, under the pretext of an order from the empress, ordered the Cossack guards to be removed from the palace, and after the same order, the assassination of the empress by “unknown persons” followed. The more Georgy thought about it, the more he imagined scenes where the Cossacks expose him completely, without a trace. Frightened by this prospect, he decides to issue a secret decree. Fabrication of a criminal case against the entire Cossacks. He wanted to accuse the Cossacks of murdering the empress. But they were all armed to the teeth and were excellent warriors. Therefore, he decided to act very vilely. He announced a military exercise for all Cossacks, after which a few weeks later all the military Cossacks were taken to the indicated place, a military camp and a Cossack headquarters were set up. Troops loyal to George placed fortified machine gun emplacements and numerous artillery batteries around a very large military camp at night. And at 4:00 in the morning the artillery shelling began, the aircraft launched a massive attack with white phosphorus and napalm. No one was spared.\nIt was a real massacre and the screams of dying people were heard throughout the area. The most important atamans who were stationed at the imperial palace were generally arrested in advance and tried. After which he was sentenced to death by firing squad. Western countries did not recognize this court due to multiple inaccuracies in the prosecution case and also due to multiple legal and judicial violations during the trial. Cossack military warehouses were placed under a cordon and handed over to the army. The court also, by an additional order, declared all the Cossacks guilty, so punitive operations to clean up the Cossack villages were developed no less quickly. In some villages they were taken prisoners and some villages were simply burned with napalm or punitive detachments. And many hundreds of kilometers away, his soldiers were commanded by an unknown Major, Sergei Valerievich. This was his first truly combat mission, because for most of his service he was sent to military rear work. He ended up serving for a long time but then retired. And so Sergei again did not get enough sleep, jumping out of bed at 5 o’clock in the morning from another nightmare that was associated with his activities in the Zaporozhye Sich. Specifically in one of the villages. Sergei tried over and over again to psychologically prove to himself that he was not guilty of anything, he was simply following orders, but that one of the many villages still couldn’t get out of his head... The authorities from above reported that large combat-ready forces of Cossack separatists were hiding in this village and it’s even possible that their headquarters is therefore no longer a village but a military facility of the enemy and the enemy needs to be eliminated. He commanded a battalion that was supposed to be the first to arrive in the village to eliminate the enemy."
gir.61.a:0 "Kozaki, kozaki..."

gir.62.t:0 "The unconditional verdict of Emperor George"
gir.62.d:0 "Before the operation, Sergei received instructions from the command and instructed the soldiers that the settlement was occupied by the enemy who was ready to offer fierce resistance, the presence of civilians was not expected. After a 10-minute artillery preparatory assault, the assault began. However, the soldiers opened fire on the villagers who were doing their work. The soldiers drove people into houses and locked them there, burning buildings with people, shooting residents while Sergei understood that every life taken was also his fault. A group of fugitives who tried to hide in roadside ditches were killed with bayonets, sapper shovels and rifle butts. Some soldiers refused, even under pain of a military tribunal, to carry out the order. Devastated and morally broken by the sight of the massacre, Sergei decided to somehow help civilians and decided to finish off the wounded. This strange thought arose against the background of an irreconcilable struggle in his soul between moral principles and what he considered the great duty of serving Russia. He shot in the heart or head of the wounded, and then when he had moved far away and these moral contradictions began to beat in him with even greater force, he saw a boy with an arm hanging from his muscles, the bone had been shot off, and the look of this boy seemed to pierce right through him, saying, “Uncle, why are you doing this?” done?". Sergei will never forget the look of this boy. Thoughts were racing through his head: “Failure to carry out an order is a betrayal of the homeland and a tribunal.” Gradually falling to the ground, leaning against the wall of some house, Sergei, unable to bear it, raised the pistol to his temple, wanting to end this, but there were no cartridges at that moment, as if he was surrounded by a haze of common sense and the principles inherent in man finally left him. He pulled out a dirk from its sheath and cut the boy's jugular vein, wanting to end this gaze by any means.\nThe cutlass passed instantly through the boy's throat, stained there was plenty of murder weapon and murderer's blood... By that time, the cartridges began to run out and the soldiers had to wield knives on the necks of the so-called separatists. This kind of haze of madness had already passed along with adrenaline when Sergei held a bloody ax and dirk in his blood-covered hands and stood near a ditch with beheaded villagers while soldiers finished off the survivors with bayonets and butts. Looking around, he saw that he was still feverishly pressing the trigger of his pistol. He was shaking as if with a fever and he wanted to vomit from the realization of what he had done. He thought that what kind of military man was he after he gave such slack? After these events in the village, soldiers who refused to follow orders were court-martialed and their further fate was unenviable in the form of execution for treason. This was the first such operation to destroy the separatists, so he remembered it in detail for the rest of his life. Of course, there were others, but as described above, this operation was the most memorable; then, if I may say so, he became callous, getting used to trying not to let his emotions get out of control. Another veteran, after what Sergei had gone through, would probably have started drinking and ultimately shot himself, unable to withstand the psychological stress, but Major Sergei had strong willpower and ardent patriotism that even the smell of war could not break. Now in the evening he sits in his major’s uniform with that same dagger in its sheath, reading the Bible, plunging into more pleasant memories of the end of his service, when he managed to do administrative military work and developed various tactics for motorized infantry."
gir.62.a:0 "Silence over Don again."

gir.63.t:0 ""Vestnik Kieva""
gir.63.d:0 "There has never been a Ukrainian nation, there has never been a Ukrainian separate nation. In fact, I think it is obvious to everyone that there is only one great Slavic nation - the Triune Russian. Three regions and one people, living in the swamps Belorossy, living on the plains of the European steppe and the south of Russia Malorossy, and living in the forests and fields from Petrograd to Vladivostok Velikorossy.\n\nWhere did certain "Ukrainians" come from? In fact, it is the work of information and psychological centres of operations of the general staff of the empire of bloodthirsty Habsburgs during the First World War. The central powers understood the greatness and spirituality of our nation, so they decided to divide us by inventing "Ukraine". The Austrians openly rewrote and falsified our history and drugged the Malorussian people of the Carpathians and then the whole of Malorossia.\n\nMeanwhile, the myth of "Ukrainians" was invented by the Bolsheviks to divide the South of Russia and then after their alleged "victory" they finally completed their propaganda and all the Malorossians decided that they were "Ukrainians"!"
gir.63.a:0 "Slava Russiya, not "Ukraine"!"

gir.64.t:0 "George speech"
gir.64.d:0 ""My subjects!\n\nToday We, Tsar George Mikhailovich, stand above you with the decree, full of the great responsibility before the great history of  Rusisan people, by right belonging to our Glorious Dynasty of Romanovs, primordial children of Russian people, successors of Grand Princes of Kiev and Moscow, lords of the Land of Novgorod and Polotsk, explorers of Siberia and the Far East, discoverers of Alaska and tamers of unruly Central Asia.\nWe urge you!\nOur country is under the shadows of illegitimate and non-native power, fierce bandits are taking away... but Our Grace will bring you faith in a bright future.\n\nThe heart of Velikorossiya beats in each of you, and now it is time to unite our forces to return true power to the hands of the great nation. Neither Putin, nor his pawns, nor his regime, nor his guards are representatives of our interests. They have brought the country to a dead end and taken away from you your ancestral right to serve the Great Dynasty, consequently to serve the Russian people. We will not stop until our banner rises over the Kremlin and the Winter Palace, over the Volga and over the Urals. Until we get our shoes wet in the Pacific Ocean! And let our unity be the mighty sword that pierces the mirages of democracy and Bolshevism.\n\nTherefore, We, George Romanov, Emperor of All Russia Command!\nBow down before My Power and serve Me with Faith and Truth! Serve your Fatherland!\n\nThank you all My Faithful soldiers, My brothers and sisters. May Our faith lead Us to a new bright blossoming of Great Russia.\n\nFrom the my heart with good intentions,\nHis Majesty the Lord of All Russia, Tsar Georgy Mikhailovich Romanov.""
gir.64.a:0 "Long live the great united and indivisible Russia!"

gir.65.t:0 "Mariya speech"
gir.65.d:0 ""My subjects!\n\nToday We, Tsaritsa Maria Vladimirovna Romanova, address you! My dear inhabitants of ancient and mighty Russia! Our people has passed many tests of history. We have overcome our troubles, we have won our enemies. Our glorious feats, in Borodino, in Sevastopol, in Osovets will not be forgotten. We overcame hatred and made so that in our Empire under the protection of our glorious Romanov family all peoples could feel themselves in a friendly family, in the arms of the wings of the Russian eagle. But...\nHear my message!\nRussia is in danger. Her power has been seized by those who do not value our people at all, but value only money and resources and use Russian and other peoples as fuel for their bloody business.\n\nWe can not allow such a thing any more. Arise, people of Russian! Do not submit to the false power of thieves and murderers! Do not be a disgrace of the ancestors! You are from the Sort of warriors and builders, writers and researchers! Our dynasty of Romanovs will make everything that Russians again became free, and will keep your freedom as it was always!\n\nThe army of Malorossiya is already at the ready. Just tell us, my dears, tell us. Don't keep this anger in you, don't accept your situation. We are ready to come to your aid. Nothing can stop us. Nothing can stop our family uniting.\n\nServe not thieves! Serve yourselves, your hearts, your dreams! Don't let our ancestors be disappointed in you.\n\nThank you, my family. I proudly accept the responsibility of being your monarch and preserving your dignity.\n\nFrom the bottom of my heart with good intentions,\nHer Majesty the Sovereign of All Russia, Tsaritsa Maria Vladimirovna Romanova.""
gir.65.a:0 "Long live the great united and indivisible Russia!"

gir.66.t:0 "Monarchical congress"
gir.66.d:0 "Rostislav Romanov and Mariya Romanova, as descendants of the Romanov dynasty, they represent a symbolic return to traditional monarchical roots for Russia. Their names alone evoke memories of imperial Russia's grandeur, power, and tumultuous history. The idea of restoring monarchy in Russia might be met with fascination, skepticism, and debate both domestically and internationally.\n\nFor many Russians, the prospect of reinstating a monarchy can invoke nostalgia for stability and prestige associated with the imperial era. It also serves as a source of national unity and pride, especially among those who long for a stronger sense of Russian identity and tradition. The Romanov name carries significant historical weight and could provide a unifying figurehead for a country often marked by political divisions.\n\nThus we must pick a royal descendant now."
gir.66.a:0 "Let the selection begin"

gir.67.t:0 "Anti-Monarchist Activity"
gir.67.d:0 "Our victory, often perceived as a throwback to Russia's imperial past, galvanize disparate groups advocating for democracy, equality, and human rights. From grassroots activists to season political operatives, the anti-monarchist movement coalesced around a common goal: to resist the consolidation of autocratic power and uphold the ideals of a pluralistic society.\n\nProtests erupted across major cities, echoing with chants denouncing the resurgence of monarchy and demanding the preservation of democratic institutions. Social media platforms became battlegrounds where activists disseminated information, organized demonstrations, and amplified their dissenting voices. Hashtags such as #NoToMonarchy and #Defendputin trended globally, drawing attention to Russia's internal political upheaval and sparking solidarity movements worldwide.\n\nThe anti-monarchist movement encompases a diverse array of strategies and tactics. Civil society organizations mobilize legal challenges against government overreach, citing constitutional violations and infringements on civil liberties. Intellectuals and artists lend their voices to the cause, penning op-eds, creating artworks, and staging performances that critiqued the authoritarian turn in Russian politics."
gir.67.a:0 "We need to crush those traitors!"

gir.68.t:0 "The Recovery"
gir.68.d:0 "After the bolshevik humiliation in 1991, yet again proving their incompetence, the Russian SFSR lost almost all of It's subjects and republics.\n\nBut now, almost like Phoenix rising from It's ashes, Russian Empire liberated and returned our honor. Dominating Caucasia, Central Asia, East Europe and Baltics."
gir.68.a:0 "Total Russian victory"

gir.69.t:0 "Russian victory... over Russia?"
gir.69.d:0 "Today, on the television of the Reunited Russian Empire, at exactly 12 noon, the anthem was played. After that, it was announced that after a short resistance, the heroic troops of the Empire were able to drive the troops of the usurper out of Moscow, and then continue the heroic march to Siberia, where his troops were finally defeated. Currently, the dictator is in the penal colony No. 3 in the village of Kharp in the Yamalo-Nenets Autonomous Okrug. It's already known that Vladimir Vladimirovich Putin will be executed for treason and usurpation of power. But it is not yet known what exactly will happen in world, because it has already been announced that the Russian Federation has been completely defeated and Russian Empire has returned to the world stage."
gir.69.a:0 "Bozje, Tzarya Hrani!"

gir.70.t:0 "The Speech"
gir.70.d:0 "A kid named Ivan spent his all live in Moscovian suburbs. He considers himself a big (physically and metaphorically speaking) patriot. Unfortunately He had an obese condition and rode a wheelchair, but he proudly stood imperial ground on online forums, he defended Russian Autumn movement (Russkaya Vesna) and supported Girkin's march on Kiev. However he found no sympathy around his fellow compatriots.\n\nBut Finally liberation would finally come to his doorstep. Imperial troops have finally marched in Moscow. Liberation was here.\n\nAnd though soldiers had to come up with Triumph speech somehow as it was stolen. Stage was set, russians were around the stage waiting for the speech. But noone came out. Ivan went curious and wandered behind the stage and stole one of the drafts of the speech which must've been presented to the public. Two soldiers were standing there and could not find their place, and constantly arguing.\n\n-We have to do something with it! We can't leave our people without cool speech!\n-It was lying here somewhere! I remember it!\nSecond soldier responded.\nIvan drove out swiftly and said.\n-I have the draft, and I'll have the speech\n\n-And who the fuck are you? Soldiers asked aggressively.\n-Wait, he has our draft!\n-No fucking way, give it back. Pizdyuk.\n\nIvan responded.\n-Im not giving away. Im here to give a speech.\n\nSoldiers had no other choice but to comply. They escorted him to the stage. Millions people gazed at him. He finally felt worthy and acceptable."
gir.70.a:0 ""GOYDA, BROTHERS AND SISTERS! GOYDA!!!!""

gir.71.t:0 "The Claims"
gir.71.d:0 "After humiliation of Russian people's in 1918, Poland, Finland and Baltic States terrorists rebelled creating so called "independent" nations. This was a shock to no one, since bolsheviks were nothing but old men lusting for power, knowing nothing about stability of our past empire. In 1991, once again, they proved their incompetence in leading such strong country, with Kazakhstan, Kyrgystan and the rest of Central Asia, Caucasus falling to the its ethnic leaders, our anger only grew.\n\nAgainst the background of double-headed eagle, which shone as a symbol of our indomitability, at the behest of the imperial regime, Russian troops have gone through fire and sword, restoring the power and majesty of Russia to the lands that were once part of our great empire. Fierce battles and strategic victories swept across our lost territories, as well as the steadfastness of our faith in the justice of Imperial rule.\n\nConquest of the territory became subservient to the empire, proving once more Russia has returned to It's previous glory."
gir.71.a:0 "The Conquest Has Only Just Begun"

gir.72.t:0 "Tense relationships"
gir.72.d:0 "Imperial intrigue and power manipulations strained relations arose between her highness Maria and her son Georgiy. Georgiy, desiring more power, wealth, and authority, was not satisfied with the limited roles assigned to him in the imperial structure. Although Mary remains on the throne, he does not accept his role within the narrow framework of maternal rule.\n\nThe conflict between mother and son only grows, fueling the imperial corridors with hushed whispers and intrigue. Georgiy, seeking greater power and control,  keeps operating in the shadows, weaving elaborate schemes and gathering allies among those who wished to see him on the imperial throne.\n\nGod knows where the tensions between the imperial members will bring us to, the only thing is ensured: if this keeps going, the Russia will decline..."
gir.72.a:0 "The beginning of mind games."

gir.73.t:0 "The Tzar"
gir.73.d:0 "In the "Grand Finale", As the only absolute power left in the country, Georgiy firmly held all the threads of management and control in his hands, establishing a new order and determining the future of Russia. His imperial authority is indisputable, and his power unshakable. Georgiy further strengthened his position by eliminating more and more Maria sympthathizers and killing more opposition to make sure to secure absolute power.\n\nThus, Georgiy became a symbol of the fact that with dedication, perseverance and the ability to make decisions, you can reach incredible heights and realize your greatest ambitions. Georgiy will forever go down in history as a great ruler who exerted an untold influence on the fate of Russian Empire.\n\n"I won."-The Tzar proclaimed calmly, knowing, that his hard work, sacrifices and precise planning to take down his stupid mother were not in vain. Ambitions were achieved, plans completed. He simply won. "As they say - it could've all started from... Fire Of Poltava""
gir.73.a:0 "History is written by victors."

gir.74.t:0 "1/2 Triumph"
gir.74.d:0 "-Russians...\nHe started... - Today is our day, when proud sons of Russia have finally achieved the end of our endless war! Russians never hesitated to seek the truth, but today truth has found us. This is a day when we finally reclaimed our motherland. You don't need to worry about being prosecuted for being a nationalist.. Finally.\n\nWe will achieve alot more with your support. Russians! Stand up! Its GOIDA!\n\nFinally Ivan spread his arms as everyone cheered giving a gesture to soldiers to pick him up.\n\nOne soldier tried to pick him up, but it was unsuccessful. Then another soldier came to help. As things were getting tight.\n\n-Alright on my command, 1.. 2... 3...\n\nThey put Ivan on one of soldier's shoulders.\n\n-See? Wasn't that hard as we thought it could be! One soldier said.\n\n-My neck, It think its about to break.... crack...\n\nHOLY JESUS!\n\nEveryone who saw soldier dropping, with no further signs of life. Stopped cheering. Red Square went silent....\n\nOur Goida was ruined."
gir.74.a:0 "Damn."

gir.75.t:0 "The NATO"
gir.75.d:0 "Baltics, Poland Finland, They were never have been a real sovereign countries, they played their role as sanitary border between NATO and Russia. As we speak, NATO has made its steps to secure some of these borders, they're like a praying beast.\nThese borders should not be projection of NATO's will, and so we must to put these people on right track.\n\nNATO's main goal is to destabilize Russia, but we know their plans ahead. So we can use it to our advantage. We will strike faster than them..\n\nIf you don't want to get hit, then hit in advance! Isn't it that easy? And so we declare a war.\n\nIts us or them."
gir.75.a:0 "Feel the Goyda..."

gir.76.t:0 "The Epic Speech"
gir.76.d:0 "In 1923 the Russian Civil War came to a complete end with the defeat of the White Cause on the battlefield, we sailed away from the Crimea, fled to Mongolia and flew to all corners of the world. The Reds took over our homeland and poisoned the brains of the Great Russians with their Jew idea of "Communism".\n\nIn Emigration we created for ourselves the real idea of Russia, Great and Indivisible. Many organisations were created which made plans to return to our homeland and build a strong Russian power.\n\nAnd now after the collapse of the Soviet Union in 1991 there was hope for the restoration of our country, we persevered in our endeavours to regain our homeland and now we are entrenched in our old positions, we have a strong and steadfast Tsar, it is time to return our old possessions that have been detached from the empire! We declare war on the bandit formations that call themselves "governments" of so-called Poland, Lithuania, Latvia, Estland and we take back the Grand Duchy of Finland. We return ours, Russia returns. Let the overseas paws that took away our lands be cut off!"
gir.76.a:0 "Long live the united and indivisible RUSSIA!!!"

gir.77.t:0 "Economic measures"
gir.77.d:0 "After the unification of Ukraine under our tricolour, the whole of Malorossiya from the Carpathian mountains to the steppes of the left bank found itself in an economic vacuum, each region is different from the other in economic terms.\n\nSomewhere the economy is quite stable, somewhere the infrastructure was destroyed by wars or local gangs that ruled the regions. But now all that will change, our [DPR.GetName] announces the inauguration of a campaign of centralised economic reform.\n\nRus Empire in the shortest possible time will carry out industrialisation, restoration of infrastructure, bureaucratic reforms, tax and currency reforms."
gir.77.a:0 "Let's get to work, gentlemen!"

gir.78.t:0 "Coronation, as it belongs"
gir.78.d:0 "The coronation of the Emperor's son, Georgiy, took place in the Assumption Cathedral of the Kremlin. Since Georgiy had already been crowned earlier in Kyiv before the conquest of Moscow, the ceremony was expected to be really-really special. On the other hand the transition of imperial centers symbolized some kind of "pivotal" moment.  The solemn rituals and traditions of the coronation ceremony echoed through the hallowed halls, marking Georgiy's ascension to the throne in the heart of the empire.\n\nGeorgiy's coronation in the cathedral, surrounded by its grand decorations and stunning design, emphasized the long-standing imperial tradition and asserted control over recently acquired lands. It was a moment that reverberated through history, shaping the course of the empire and solidifying its presence in the annals of power.\n\nAs Georgiy received the imperial crown in the Assumption Cathedral, it signified not only his personal honor but also the culmination of a journey that began in Kiev and reached its zenith in Moscow. The coronation in the Kremlin marked a new chapter in the empire's history, one in which Moscow emerged as a focal point of imperial power and influence over EVROPA"
gir.78.a:0 "Za tzarya!"

gir.79.t:0 "Coronation, as it belongs"
gir.79.d:0 "The coronation of Emperor Maria at the Assumption cathedral in the kremlin marked a significant event in the history of the bloody empire. Emperor Maria had been crowned earlier in Kyiv, but the inevitable conquest of Moscow led to a second coronation in the heart of the newly acquired capital.\nThe "holy" Cathedral which was nestled within the Kremlin walls, stood as an emblem of power and authority. Its historical significance made it the ideal setting for such occasion. As the imperial entourage made its way through the streets of Moscow, the city cheered.\n\nInside the cathedral, among tiny-shiny decorations and solemn chants, Emperor Maria was crowned once again, without any doubt, in a newly conquered capital . The coronation in Moscow mostly served to strengthen the ties between the ruling monarch and her god damn moscouvite slaves in the conquered territories. It symbolized the integration of Moscow into the imperial fold and marked a new chapter in the history of the bloody empire.\n\nFor Emperor Maria, the coronation in the Assumption Cathedral was a moment of triumph and GLORY of her rule. It strengthen her position strongly as the sovereign ruler of a vast and diverse empire, uniting different regions under her banner."
gir.79.a:0 "Za tzaritsy!"

gir.80.t:0 "Nepremirimost'"
gir.80.d:0 "There was one bar that 2 firends usually came to. This bar has a name - Separ. It was nice lit bar, with every option of beer you can desire, and people around you are actually conscious beings with ideals you followed. That's the definition of a comrade, a patriot. Who only knew Nepremirimost'(Intransigence) over the fate of Russia.\n\nThese brothers had their own names Arsen and Alexey. They have chosen this path. Which they decided to stick to. 2 of them have ordered big glasses of smuggled russian baltika.\n\nAs two of them made fat sip of a beer they did purchase. Alexey began\n-What do you think of Maria? You think she's good?\n-I have no opinion, to be quite honest, but I like her in some way.\n-How, exactly?\n-Well, she's a bit more conservative. She will reclaim our homeland that's for sure...\n\nAlexey reaches his Makarov from his pocket and shots Arsen in the chest 3 times. Until he fell. bleeding on the floor. He whispered\n-Why.. Just Why."
gir.80.a:0 "There is no place for "mamkinyh"."

gir.81.t:0 "The Fate"
gir.81.d:0 "After Georgy distanced himself from his mother, he became more vile, more inhumane, and more power demanding. He starts full campaign on discrediting high ranking of Maria's officials. Could have someone told him that? Why is he doing that? Will Georgy find ever peace or destroy what his mother built? What influences him to make such decisions? Nevertheless he got his followers and to admit very desparate. They are fanatics that will do anything for him. Even destroy his mother.\n\nImagine what empire we could've built if not Georgy's ambitions to become another american slut! He kills russians the people who wants the best. The worst thing its not even done by his hands! He uses naive people to make such crimes.\n\nWhat will happen if Maria losses its support? \n\nPerhaps we observe another downfall of russian national spirit... "
gir.81.a:0 "Save the tsar."

gir.82.t:0 "Peace in family"
gir.82.d:0 "Maria reconciled with her son through a heart-warming dialogue, giving him some authority, revived the aristocracy, and made it the basis of the higher society, strengthened the Cossacks, which are now the backbone of the army and the national guard.\nMaria, a determined and intelligent woman, understood that her son had the potential to become a strong leader, but he needed to be given some power and authority. She accepted him with sincere understanding, allowing him to participate in important family decisions and activities.\n\nReconciling with her son, Maria began the process of reviving the aristocracy, convincing her son of the importance of the values and traditions that this status carries. She believed that the aristocracy could become the basis of a higher society, responsible to its people and country.\n\nAt the same time, Maria understood that the Cossacks were an integral part of Russian Empire and defense capability. She supported and strengthened this status, convinced that Cossack spirituality and leadership could become an important component of the modern army and national guard.\nThanks to Maria's wise actions, her son was able to implement reforms that led to the strengthening of the aristocracy as a social class and the Cossacks as the basis of the country's defense. These changes not only reinforced internal stability but also enhanced Russian prestige on the international stage.\n\nMaybe the real Maria focus tree were the friends we made along the way."
gir.82.a:0 "Slava rody Romanovyh!"

gir.83.t:0 "Offer from the [DPR.GetName]"
gir.83.d:0 "[DPR.GetLeader] from [DPR.GetName] want to support our goverment!"
gir.83.a:0 "We very gratefull for them!"

gir.84.t:0 "[DPR.GetName] want to annex us"
gir.84.d:0 "[DPR.GetLeader] from [DPR.GetName] want to annex our country!"
gir.84.a:0 "Russian brothers must be united!"

romanov_vs_girkin_conclusion_tt:0 "We will soon find out who will emerge victorious from this game..."


DPR_rostislav_icon:0 "Tsar Rostislav Romanov"
DPR_malorossiawillbeours:0 "Malorossiya will be ours!"
DPR_malorossiawillbeours_desc:0 "Malorossia is weak and divided, mired in internecine strife and drinking its own blood, while we stand stronger than ever. Our ambitions extend far beyond the Seversky Donets and beyond the Dnepr, and given the current situation in those lands, we finally have a real chance to achieve them, crushing every foolish politician and weak-minded commander, reclaiming what truly belongs to us. Malorossia will be ours!"
DPR_parlamentarismpropaganda:0 "Parlamentarism propaganda"
DPR_parlamentarismpropaganda_desc:0 "The promotion of parliamentarism in society will soon bring the result desired by the emperor if we act quickly, prudently, and effectively. The people still remember elections, both national and regional, and although not all of them are accompanied by good memories, they probably crave this more than the uncompromising power of some unknown commanders from remote Siberian or Ural villages. Democracy will be restored, however, it will take time, and our country and society need to be fully ready for this."
DPR_embracing_ukrainesness:0 "Embracing ukrainesness"
DPR_embracing_ukrainesness_desc:0 "With the formation of the Empire of Rus on a multicultural basis, our state faced perhaps one of the most difficult and controversial issues - the Ukrainian language and culture. The lands of Ukraine, or rather "Malorosia" as chauvinists still refer to it, are mostly inhabited by Ukrainians, who also largely recognise their own Ukrainian culture, practice their own autocephalous church, have their own heroes and speak their own language. These people are the majority of our cultural and political space, and we have no right to ignore them when making any decisions or implementing policies. The Ukrainianness of these lands is indisputable, and only a fool would volunteer to fight against it. We will support the efforts of Ukrainians to preserve their heritage and traditions, and not just support, but help and stand side by side with them in this, as this is the only way we can truly achieve understanding and coexistence."
DPR_trulynewera:0 "Truly New Era"
DPR_trulynewera_desc:0 "Our all-glorious emperor Rostislav, who challenged the military dictatorship and chauvinistic system, eventually managed to win a great victory over hostile traditionalism and build a new, strong and united empire according to his own vision. From now on, it is no longer a state of repression, authoritarianism, prohibitions and tyranny, but a tsardom of freedom, democracy, liberty and prosperity. His reign has brought many good and even beautiful outcomes, but it is far from over. May our emperor live long and lead his people and country under his generous reign!"
DPR_perfectsociety:0 "Perfect Society"
DPR_perfectsociety_desc:0 "With the destruction of all threats to the revived White Guard movement, our leader, Igor Girkin, built an ideal community that would be able to stand for centuries. Using the works of the great Russian ideologues of the past, such as Baron Wrangel and General Denikin, the Generalissimo began to build a militarised, loyal and brave society that is capable not only of existing and prospering, but also of defending itself. His contribution to history is immeasurable, and his name will forever be written in chronicles and books, but as long as his greatness breathes, this country has nothing to fear or beware of."
DPR_unitedinbloodandpurpose:0 "United in blood and purpose"
DPR_unitedinbloodandpurpose_desc:0 "Having put an end to all internecine feuds, the imperial house once again stands strong and united. The people are loyal to it, the nobility is loyal to it, the army is loyal to it, and now they are even loyal to themselves. Great achievements and glorious times await our empire in this state of affairs, so may God bless our family and our country, for our ambitions know no bounds!"
DPR_peaceandharmony:0 "Peace and harmony"
DPR_peaceandharmony_desc:0 "Our empire has finally reached its peak. Nothing can stop its development or ambition, nothing can match its strength and determination. We have found peace in our lands and harmony in our society, however, this is not the end of the story. There are still many decisions and problems ahead, and God help us if death and crises arise, yet we will survive, just as we have survived this hundred years in exile."
DPR_badconsequences:0 "Bad consequences"
DPR_badconsequences_desc:0 "The Empress is dead... The nation is crushed, the political circles stand diverged, and the army is in a state of confusion. There is still lots of work ahead to restore stability in my, uh, our empire, but we will handle it, as we have always done."
DPR_absolutepower1:0 "Absolute power"
DPR_absolutepower1_desc:0 "With the establishment of the new imperial power, our state began to undergo a series of large-scale reforms aimed at consolidating power in the tsar's hands in order to weaken the influence of the newly formed oligarchy and military circles on the internal situation of the empire, which had already led to terrible consequences in the past. The emperor is still weak compared to his limitless capabilities, but not for long..."
DPR_absolutepower2:0 "Absolute power"
DPR_absolutepower2_desc:0 "With the establishment of the new imperial power, our state began to undergo a series of large-scale reforms aimed at consolidating power in the tsar's hands in order to weaken the influence of the newly formed oligarchy and military circles on the internal situation of the empire, which had already led to terrible consequences in the past. Imperial power has already managed to break free from the shackles imposed on it first by the army and other politicians, and then by the empress, but is still far from absolute..."
DPR_absolutepower3:0 "Absolute power"
DPR_absolutepower3_desc:0 "With the establishment of the new imperial power, our state began to undergo a series of large-scale reforms aimed at consolidating power in the tsar's hands in order to weaken the influence of the newly formed oligarchy and military circles on the internal situation of the empire, which had already led to terrible consequences in the past. The current power and authority of the sovereign are almost unlimited and close to their absolute form, yet still face resistance from the strongest and highest circles of the state, albeit just temporarily..."
DPR_absolutepower4:0 "Unlimited power"
DPR_absolutepower4_desc:0 "Imperial power is unlimited! At last! Let the great tsars of the past rejoice, for their descendants have brought their glory back to the great House of Romanov! Henceforth and forever, nothing stands in the way of our divinely elected Tsar, and his judgements are nothing but the truth for all his subjects, so let his kingdom rejoice, for the Emperor is ready to rule and govern it as his own child!"
DPR_thereisnoukraine:0 "There is no Ukraine"
DPR_thereisnoukraine_desc:0 "The Malorossian independence movement, created by the Austrians, has finally been thrown back to its very foundations, to the cellars and swamps where it belongs. Neither "Ukraine" nor "Ukrainian culture" has ever existed and could not exist, for all of this is merely an invention of the enemies of the triune Russian people, aimed at weakening its power. We will not tolerate any separatism! Hunt down these pigs!"
DPR_righteroushike:0 "Righterous hike"
DPR_righteroushike_desc:0 "The time to return our legitimate lands has finally come! The Russian army and state have bravely challenged the usurpers of its ancestral lands, so let our enemies fear our wrath, for we will defeat and destroy them, as God and all the Russian heroic might are behind us! Forward, brothers!"
DPR_antimonarchyresistance:0 "Anti-monarchy resistance"
DPR_antimonarchyresistance_desc:0 "With the reconquest of the original Russian lands, our empire faced insurgent anti-state resistance from the locals who refused to recognise the imperial authority. How dare they! These bastards think they can do something, so let's show them otherwise!"


