gir.2.t:0 "Don Cossacks"
gir.2.d:0 "Many people and "historians" say, that Don Cossacks are descended from the Zaporozhian Cossacks and the Ukrainian Cossack exiles who settled in those lands and genesis of the Don Cossacks has Ukrainian roots, but this is not truth, lie and propaganda of Ukrainians. The ancient predecessors of the Don Cossacks came from Ryazan Cossacks who lived along the Don trade route. Cossack created their own military - "Velikoe Voysko Donskoye". Soon army of Don came under the jurisdiction of the Military Collegium of the Russian Empire.\nDon Cossack fought with enemies of sacred Russia in World War I, Bolsheviks traitors during civil war, in World War II against fascist.\n\nAnd now, Don Host,  like their fathers are fighting against fascism in Donbass. Since 2014, members of Don Cossacks have participated in the liberation war with Cossack leader Nikolai Kozitsyn in Eastern Ukraine as independent volunteers for Donbass militias. The group of Don Cossacks in the Luhansk region numbered up to four thousand people. They formed "Cossack National Guard of Almighty Don Host" and took place in defence of the triangle Lysychansk-Rubizhne-Severodonetsk. Cossacks fought with nazis in Debaltseve. Later Cossack regiment became a part of LPR militia. \n\nBattle is not end yet. Cossacks will fight for Novorossiya, like their ancestors. Remember our victories and history... true history of Don Host.\nWe respect all heroes of our big Motherland, that died for our future."
gir.2.a:0 "Glory to Christ, Glory to Don Cossacks!"

