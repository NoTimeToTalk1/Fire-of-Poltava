DPR_execution_of_hardliners_decisions_desc:0 "Since the political path our country has chosen has shocked most of the old political elite, many did not accept President Pasechnik and decided to oppose him. Some went into opposition, some called for active opposition to the "scum of the West", "traitor", "agent of the Khokhls". The president accepted this challenge and will now communicate with his enemies in the language of the laws, which he is able to adjust to himself. The sins of the old politicians will not be forgotten and now a series of trials and open cases against war criminals and terrorists of our country will begin.\n\n§3Progress of punishments:§! is §R[?DPR.DPR_paseka_execution_of_hardliners_v|0%]§!.\n"
