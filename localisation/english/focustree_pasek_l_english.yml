paseka.3.t:0 "Justice for a war criminal"
paseka.3.d:0 "Makiivka Prison, 202X. In solitary confinement sat a once warrior, a charismatic leader who led his soldiers forward for the glory of the people of Donbas. But now there is only a shadow of him left. Igor Girkin - he was once a bone in the throat of the Ukrainian government, the defence minister of the DNR, and a nationalist election candidate. Now he is a simple middle-aged man rotting in prison, where he was put at the behest of President Pasechnik in order to get rid of a rival. In prison, Girkin apparently did not despair. He was fond of reading books, especially historical ones - about Alexander the Great, the Roman Empire, Napoleon, the Russian Civil War and much more. Girkin hid in his little world, behind big walls. He is left alone - without supporters, without those who will support him. Only his wife Miroslava from Moscow sometimes sends him letters, which Igor Ivanovich could not read, because of the prison managers, who were strictly forbidden to give them to him.\n\nBut President Pasechnik understood the importance of this character - he could become a good exchange card with the European Union. The West has long been trying to catch Girkin for his main crime - the shooting down of the Malaysian Boeing 777 that flew from the Netherlands over the Donetsk region. As a result of the investigation it was proved that it was Girkin who gave the order to shoot down the passenger plane, for which he was declared wanted. \n\nAnd now we can use it. To show the civilised world our intentions - to bring peace and stability to our region, to gain the support of the international community and to restore justice. Girkin will go on trial in The Hague, where he will be sentenced. I hope that this adventure by our President will not backfire on him."
paseka.3.a:0 "His story has come to an end."
