paseka.1.t:0 "Case against Igor Girkin"
paseka.1.d:0 "Igor Ivanovich Girkin, Igor Vsevolodovich Strelkov, Sergey Runov... So many names that we hear so often, that are admired by many residents of Donbass, and belong to such a pathetic and spineless man, as the former Minister of Defence of the DNR appears to be. Girkin is certainly capable of rallying people around him, that in 2014, when he and his boys "crossed the Rubicon" - captured Slavyansk, thereby starting this vicious war in Donbass, that now, many years later, this bastard is returning to our country and trying to restore its former greatness, forming the NDPD - a party of his puppets, who apparently want to return our country to the 19th century, talking about some kind of "Russian nationalism"\n\nAll this nonsense is not necessary for our beautiful Novorossiya, which is united for the sake of progress and multiculturalism - cave nationalists have no place here. But this is just one of the threats posed by Igor Girkin.\n\nWe have learnt that Girkin cooperated with the LNR ex-president Plotnitsky and planned to stage a coup in the country and establish his own dictatorship! We have also launched an investigation into the Boeing 777 Crash in the Donetsk region, which also involves Girkin and his fighters. We'll keep him in jail for now and then we'll see what to do with him. Let him hope we don't put him in the same cell with Krivonis or other Ukrainian militants, from which he will probably never get out."
paseka.1.a:0 "He got what he deserved."
paseka.2.t:0 "Ending Nazism on our side"
paseka.2.d:0 "No crime goes unpunished. The bandit formation of Russian nationalists, also known as the DShRG Rusich, has been helping the soldiers of Donbass since the early days of the Russian Spring. The group became famous after a successful battle against the Ukrainian Aidar regiment, and the Russian fighters gained widespread fame and respect. Under the leadership of Alexei Milchakov, who in an interview with a Russian publication literally admitted that he is a Nazi, the group ceased to be a conventional nationalist volunteer force, but also took part in helping the Assad regime in Syria, where they were subsequently defeated by American soldiers before being completely redeployed to Eastern Ukraine.\n\nThe group has begun to pose a direct threat to President Pasechnik, as his new pro-European policies are in complete contradiction to their ideology of Russian irredentism and ultranationalism. Milchakov has repeatedly criticised the new leadership of the country, splitting our society and fomenting ultra-right cells in it. While Alexei himself was on holiday in St. Petersburg, his fighters remained in Donbass to fulfil their international duty.The special services of Novorossiya did not bother with them - their camp near Mangush was covered by us. As the report said later, most of the fighters at that moment were either drunk or on drugs, and were themselves drowning in lust with some visiting Russian ladies from Buryatia, Tyva and Dagestan. Unfortunately, Milchakov could not be caught, and he has settled down in Russia, sometimes barking at our government, which uses quite legal methods to bring down the force of law and order on terrorist bandit formations."
paseka.2.a:0 "We will not tolerate extremism, even if we are technically on the same side."

DPR_eurointegration_decisions:0 "Pasechnik`s New Politics"
DPR_eurointegration_decisions_desc:0 "Leonid Pasechnik, the president of Novorossiya has started a new policy. Its task is to improve the state of affairs in the country, to improve the standard of living of its citizens and to bring our country out of the hole into which the heavy and exhausting war had put it. Our people have decided to trust candidate Pasechnik in the elections. After not long deliberation, the new president realised that the best solution for the country would be to start paving the way to its own independence. Neither Moscow nor Kiev will dictate their terms to us. We will leave the world - we will become a subject of politics. We must integrate into international relations so that we are considered, respected, and not regarded as some Russian proxy. This is our way - the way to a wonderful independent future for our people!\n\nOpinion on §3[DPR.GetName]§! in the §B[EUN.GetName]:§! is §R[?DPR.DPR_paseka_european_opinion_v|0%]§!.\n"
DPR_paseka_european_opinion_tt:0 "Opinion on §3[DPR.GetName]§! in §B[EUN.GetName]§! §7will change§! to $RIGHT|+=%0$."
