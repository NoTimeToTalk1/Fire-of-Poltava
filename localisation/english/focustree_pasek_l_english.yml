l_english: 

DPR_stay_on_our_boat_tt:0 "§RWe took our right from the junta! Novorossia is Russia!§!"
DPR_negotiating_with_resistance_tt:0 "§3We will begin to negotiate with the resistance.§!"
DPR_were_not_the_only_residents_in_residents_in_this_country_tt:0 "§3We must recognise that Ukrainians are also part of our people and we must recognise their rights.§!"
DPR_execution_of_hardlines_tt:0 "§RRadical conservatives§! §3are stalling our development. We should deal with them.§!"
DPR_connect_with_hidden_allies_tt:0 "§BEurope§! §3is full of §!§Rpro-Russian agents.§! §3We will try to reach out to them to help us integrate into §!§BEurope.§!"
DPR_open_the_window_tt:0 "§BWe will continue the work of Tsar Peter the Great. Novorossia is part of Europe!§!"
DPR_ask_them_for_weapons_tt:0 "§3European weapons will reinforce our army.§!"
DPR_contracts_with_paris_tt:0 "§3It's nothing personal. Just business.§!"
DPR_referendum_of_ii_language_status_tt:0 "§BUkrai§!§Ynian§! will be our §3second State language.§!"
DPR_i_have_a_dream_tt:0 "§3Our reforms for the betterment of the country will be successfully implemented.§!"
DPR_kick_russian_boot_out_of_our_head_tt:0 "§3We will uphold our self-sufficiency.§!"

DPR_contracts_with_paris:0 "Contracts With Paris"
DPR_contracts_with_paris_desc:0 "France sometimes cooperated with us. But now we will buy modern equipment and weapons from them."
DPR_referendum_of_ii_language_status:0 "Referendum of II Language Status"
DPR_referendum_of_ii_language_status_desc:0 "Unfortunately, as it turned out, most of the discontent was caused by our attempts to forcibly Russify the population. We are not the only people in our country, and we must recognize that Ukrainians also have their rights. We must hold a referendum on the status of Ukrainian as a second state language, and if it is supported, we must repeal all oppressive laws."
DPR_implicate_our_allies:0 "Implicate our Allies"
DPR_implicate_our_allies_desc:0 "Our allied countries can help us resolve the issue of Ukrainians in our country. We will learn how similar situations have been resolved in the past and how to do it in order to get international support for our actions, rather than sanctions and becoming an unrecognized state again. Also, our allies will be able to put pressure on their zone of influence to help us in this matter."
DPR_establish_polling_stations:0 "Establish Polling Stations"
DPR_establish_polling_stations_desc:0 "We are told to prepare posts for voting. But we can just do the voting in unprepared schools, take some of the money for ourselves, and have teachers prepare everything for free."
DPR_i_have_a_dream:0 "I have a Dream"
DPR_i_have_a_dream_desc:0 "Our glorious president has a goal and he is leading our country to achieve it!"
DPR_kick_russian_boot_out_of_our_head:0 "Kick Russian Boot Out of Our Head"
DPR_kick_russian_boot_out_of_our_head_desc:0 "For quite a long time, Russians have had a great influence on our state and society. And although our revolution began for the right to speak Russian, we are not Russians. We are residents of Donbass, we have our own identity, and we have to run our state. Progress can only come with European values and democratization of society. Power in our country is in the hands of the people of Donbass!"
DPR_bridge_between_civilisations:0 "Bridge Between Civilisations"
DPR_bridge_between_civilisations_desc:0 "We are located between Russia and Europe. We are between them not only geographically but also culturally. If at the beginning of our history."
DPR_ask_them_for_weapons:0 "Ask Them for Weapons"
DPR_ask_them_for_weapons_desc:0 "We have quite a lot of support among European countries. But first, we need modern weapons to defend our country from other warlords, most of whom consider us separatists and want to "liberate" the population from us. Although we have a lot of Soviet and Russian weapons, it is not enough. It is sad to say, but even the best of them were worse in quality than the worst European weapons."
DPR_rethinking_and_conclusions:0 "Rethinking and Conclusions"
DPR_rethinking_and_conclusions_desc:0 "We will analyse the economic situation in the country."
DPR_economic_decisions:0 "Economic Decisions"
DPR_economic_decisions_desc:0 "Now it's time for us to embrace our new economic policy....."
DPR_begin_membership_action_plan:0 "Begin Membership Action Plan"
DPR_begin_membership_action_plan_desc:0 "One of the most powerful regional super-aggregations is the European Union. Endless opportunities will be open to us if we become its member! We have to develop a plan to become a member state of the European Union! This will allow us to fully realize our potential! To begin with, we have to prepare the ground for this and understand what we need to do."
DPR_pasecnik_triumph:0 "Pasecnik Triumph"
DPR_pasecnik_triumph_desc:0 "After the victory over the Nazis from the AFU, our great country held elections in which the representative of our youth - ex-president of the LNR and now president of Novorossiya Leonid Pasechnik won! Now our country can boldly look to the future."
DPR_our_place_in_the_world:0 "Our Place In The World"
DPR_our_place_in_the_world_desc:0 "After our victory, we should choose our seat. Novorossiya will still choose its place under the sun, but first we should choose the vector of our development."
DPR_open_the_window:0 "Open the Window"
DPR_open_the_window_desc:0 "Our choice is co-operation with the west. They are able to provide us with huge advantages such as technology and economic assistance and we cannot miss this chance."
DPR_connect_with_hidden_allies:0 "Connect With Hidden Allies"
DPR_connect_with_hidden_allies_desc:0 "We knew it! Some states are willing to negotiate with us and recognize us as worthy of diplomatic relations. Perhaps in the future we will even become a recognized state around the world, but until then we need to negotiate and find out what exactly we need to change to be recognized internationally."
DPR_halopom_po_evropom:0 "Halopom Po Evropom"
DPR_halopom_po_evropom_desc:0 "Thanks to our persistence on the diplomatic front, and a little help from friendly countries, we were able to start diplomatic relations with other countries and understand why they had not recognized us before. Ukrainian propaganda has portrayed us as bloodthirsty bandits, but this is not far from the truth, we need to improve our image and start reforms so that other countries realize that we are an independent country worthy of their attention and support."
DPR_improve_our_image:0 "Improve Our Image"
DPR_improve_our_image_desc:0 "We have to start improving our appearance on the diplomatic front. We have to show other countries that we are a rule of law and democratic country, without corruption and abuse of power among police officers. Our image is also spoiled by the resistance of the Ukrainian-speaking population, which is also worthy of attention. We can promise other countries to start reforms and resolve this issue"
DPR_begin_eurocentered_reforms:0 "Begin Euro-centered Reforms"
DPR_begin_eurocentered_reforms_desc:0 "This day has come. We have successfully created a political program aimed at three most important issues - Education, Rights and Protection of our independence."
DPR_effective_education_course:0 "Effective Education Course"
DPR_effective_education_course_desc:0 "One of the main problems of our country is outdated methods of education. Moreover, the funding and condition of educational institutions are at such a level that schools are overgrown with fungus and can collapse with one strong blow. We will increase funding and import educational methods from European countries. With knowledge, to a brighter future!"
DPR_rapid_suburbanization:0 "Rapid Suburbanization"
DPR_rapid_suburbanization_desc:0 "It's a sad fact, but life outside of big cities is bad. In 5 years, the villages have turned into old ruins, and the residents have long since moved away. We will solve this with a sub-urbanization program, starting programs to relocate city dwellers to villages and inject money into their development."
DPR_workersrightsmatter:0 "Workers Rights Matter!"
DPR_workersrightsmatter_desc:0 "Unfortunately, over the 5 years of war with the AFU, Donbass has turned from a land of miners and workers into ruins. But besides this, workers' rights have also suffered. Their salaries are delayed not even for weeks, but for months, and their working conditions, mainly safety, leave much to be desired. We will start reforms to improve this situation. This will not only make situation with worker rights better, but improve our economy as well"
DPR_brazen_copyng_of_their_accomplishments:0 "Brazen Copyng of Their Accomplishments"
DPR_brazen_copyng_of_their_accomplishments_desc:0 "Unfortunately, according to the law, we are still in the 20th century. We have been studying the problem for a long time and have identified several options. If we want international recognition, we must abolish the death penalty and eliminate discrimination based on gender, race and nationality."
DPR_defend_our_steppes:0 "Defend Our Steppes"
DPR_defend_our_steppes_desc:0 "In the modern world, ecology plays a major role. Our means of production pollute the earth and destroy nature. Although we have relative laws to protect nature, they are not enough. We need to create a legal framework to protect our environment, and we need to start programs to reuse plastic and other waste."
DPR_execution_of_hardlines:0 "Execution of Hardlines"
DPR_execution_of_hardlines_desc:0 "Despite the liberalization and development of our country, there are still people in power who think this is bad. They do not want compromises and development, they want to follow only the hard way, as was planned at the beginning of our state. However, the situation in the world and in our country has changed, so we have no right to follow the same path. We are no longer insurgents, but a democratic state governed by the rule of law! No more police brutality, no more absolutism, no more destruction of our country from inside! Hardliners will be fired and replaced by people with more liberal values, who want development for our country!"
DPR_take_the_loans_from_imf:0 "Take the Loans from IMF"
DPR_take_the_loans_from_imf_desc:0 "Thanks to our reforms, the legitimacy of our country has grown to the point where we are recognized as a state. We will no longer rely only on Russia's handouts, we can now borrow from the IMF. We will do this to improve our economy and the country as a whole."
DPR_send_our_ambassador_to_the_un:0 "Send Our Ambassador to the UN"
DPR_send_our_ambassador_to_the_un_desc:0 "That day has come. The international recognition of our country has already reached a fairly high level. However, now we have a more important task, we are still not a member of the United Nations, and because of this we cannot protect our interests in the region. We will send our ambassador to the UN headquarters and try to become a member of the United Nations."
DPR_were_not_the_only_residents_in_residents_in_this_country:0 "Were Not the Only Residents in This Country"
DPR_were_not_the_only_residents_in_residents_in_this_country_desc:0 "Unfortunately, our society is divided. This is mainly due to our attempts to assimilate residents to Donbass culture. But this is wrong. In our country, besides us, there are those who consider themselves Ukrainians, and because of this, they support members of the resistance, not us. We have to solve this in one way or another."
DPR_negotiating_with_resistance:0 "Negotiating with Resistance"
DPR_negotiating_with_resistance_desc:0 "Although we had several options to deal with the Resistance, we realize that we cannot do it by violence and coercion. We have to negotiate with them and find out what they want and what they are fighting against. If we succeed, the resistance will cease to exist, and it will be done peacefully, which will reduce the discontent of residents who consider themselves Ukrainians."
DPR_establish_lawful_instituons:0 "Establish Lawful Instituons"
DPR_establish_lawful_instituons_desc:0 "Like any modern state, we need development. Having looked at the situation in the world, we have found several reforms that are mandatory for us. We need to establish a human rights court and change any laws that contradict human rights."
DPR_get_rid_of_sovok:0 "Get Rid of Sovok"
DPR_get_rid_of_sovok_desc:0 "Abandoning the planned and mixed economy model. Our economy is now focused on modernising and improving the economy."
DPR_freer_the_market:0 "Freer the Market"
DPR_freer_the_market_desc:0 "The government is now focusing on creating conditions for free competition. This includes the removal of restrictions, which allows market forces to determine the trajectory of development and promotes entrepreneurship."
DPR_support_small_ones:0 "Support Small Ones"
DPR_support_small_ones_desc:0 "We will aim to stimulate the development of small businesses by providing financial support, simplifying the tax and regulatory environment, and creating favourable conditions for growth."
DPR_return_to_world_exchange:0 "Return to World Exchange"
DPR_return_to_world_exchange_desc:0 "Our task is to restore Novorossiya's integration into the global market. Expanding international trade, establishing foreign economic relations and positioning the country as an attractive partner."
DPR_russians_will_pay:0 "Russians Will Pay"
DPR_russians_will_pay_desc:0 "Establishing effective economic conditions under which Russians are responsible for their payments and contributions to the development of the Novorossiysk economy."
DPR_integration_of_our_industry:0 "Integration of Our Industry"
DPR_integration_of_our_industry_desc:0 "Our policy is to merge Novorossiysk's industrial concerns with Russian ones to create a strong economic union. The goal is to stimulate efficiency at the expense of the Russians, but at the expense of our competitiveness."
DPR_enslaved_but_ensured:0 "Enslaved But Ensured"
DPR_enslaved_but_ensured_desc:0 "Complete dependence on the Russian economy to meet domestic needs. We ensure economic stability despite our external dependence."
DPR_atract_the_perspectives:0 "Atract The Perspectives"
DPR_atract_the_perspectives_desc:0 "We will focus on attracting foreign investors and highlighting Novorossiya's prospects as an attractive investment platform."
DPR_reopen_factories:0 "Reopen Factories"
DPR_reopen_factories_desc:0 "Policy to reopen factories to support production and reduce unemployment."
DPR_favorable_conditions:0 "Favorable Conditions"
DPR_favorable_conditions_desc:0 "We are committed to improving working conditions and creating a comfortable environment for entrepreneurship and business development."
DPR_invite_old_richies:0 "Invite Old Richies"
DPR_invite_old_richies_desc:0 "Novorossiya will focus on attracting experienced investors to support capital investment and economic development."
DPR_not_so_bad_place:0 "Not So Bad Place"
DPR_not_so_bad_place_desc:0 "Creating a positive image to attract foreign investors and stimulate international cooperation."
DPR_time_to_go_on:0 "Time To Go On"
DPR_time_to_go_on_desc:0 "It is time to improve our army. We will launch a program to improve its condition"
DPR_demining:0 "Demining"
DPR_demining_desc:0 "Currently, our territories are mined as a result of the 5-year war. We will start demining them"
DPR_unbuild_fortifications:0 "Upgrade Fortifications"
DPR_unbuild_fortifications_desc:0 "This is a project to improve bunkers. Since 2014, our fortifications have been more like pigsties with snares and machine gun positions, but soon they will be concrete structures that will withstand bomb hits"
DPR_secure_our_border:0 "Secure our Border"
DPR_secure_our_border_desc:0 "The war is over, and instead of one enemy on our border, we now have three. We have to protect our territories"
DPR_safe_state:0 "Safe State"
DPR_safe_state_desc:0 "Now, after our programs, life in our country is safe. Our citizens will no longer be blown up by mines, old fortifications will no longer rust, and our border has been fortified."
DPR_reforms:0 "Reforms"
DPR_reforms_desc:0 "We need to implement military reforms. Should we go down the path of modernization or use our brothers from Russia and Donetsk for this purpose?"
DPR_we_and_older_brother:0 "We And Older Brother"
DPR_we_and_older_brother_desc:0 "Russia is our help, they have always helped us with weapons and military, and we cannot abandon them."
DPR_trainings_with_csto:0 "Trainings With CSTO"
DPR_trainings_with_csto_desc:0 "Our military will conduct exercises together with the Russian regular army, which will help us create a more professional army"
DPR_form_military_production_unit:0 "Form Military Production Unit"
DPR_form_military_production_unit_desc:0 "Together with Russia, we will set up military enterprises to create equipment and weapons."
DPR_russian_army_presence:0 "Russian Army Presence"
DPR_russian_army_presence_desc:0 "We will allow the Russian army to defend our borders, which will reduce the cost of the army, and a more professional army under our command will protect our borders"
DPR_our_own_production:0 "Our Own Production"
DPR_our_own_production_desc:0 "We cannot rely only on the help of our brothers. We have to create our own military factories to produce weapons and equipment"
DPR_destroy_dedovschina:0 "Destroy Dedovschina"
DPR_destroy_dedovschina_desc:0 "Our army has quite a large dedovshina. "Dedi" are higher-ranking soldiers who use lower-ranking soldiers as servants, mostly by force. We have to eradicate this phenomenon to make our army professional."
DPR_drive_out_mercenaries:0 "Drive Out Mercenaries"
DPR_drive_out_mercenaries_desc:0 "The majority of our army consists of mercenaries. Although these soldiers have more experience in warfare, we have to switch to our own army, because mercenaries have their own company policy and can quit at any time. Also, mercenaries are not obliged to inform us about everything, which is also a big problem."
DPR_invicible_and_victorious:0 "Invicible and Victorious"
DPR_invicible_and_victorious_desc:0 "Our reforms and actions have allowed our army to become stronger. We are now the strongest army in the region! At least we think so..."
DPR_stay_on_our_boat:0 "Stay On Our Boat"
DPR_stay_on_our_boat_desc:0 "The idea of international recognition of Novorossiya is ridiculous in itself. Pro-Western puppets will never even recognize our existence, let alone our independence. Our only hope is the Russian Federation, and its guarantees of our independence from Ukraine, as well as friendly states that have also been liberated by Russia."
DPR_begin_demobilization:0 "Begin Demobilization"
DPR_begin_demobilization_desc:0 "The war with the AFU is over, so we no longer need such a large reserve of soldiers. We need to start demobilizing so that we have the hands to rebuild our territories after a protracted war. Also, demobilization should slightly reduce public dissatisfaction with our 5-year war for independence."
DPR_future_of_new_generation:0 "Future of New Generation"
DPR_future_of_new_generation_desc:0 "After the end of our war against Ukraine, we must think about the future of the new generation. A generation that did not suffer from AFU bombings, a generation that is not infected with Ukrainian Nazism. Although there are still those who consider themselves Ukrainians in the liberated territories. We have to dispel this misconception by improving education and then re-educating them."
DPR_improve_soviet_educational_system:0 "Improve Soviet Educational System"
DPR_improve_soviet_educational_system_desc:0 "There is no better education in this world than what we had in the USSR. By telling children about great times of the Soviet Union and that Ukraine was created by Lenin, we will be able to re-educate them. So we will adopt it, but first we need to improve it."
DPR_invite_teachers_from_motherland:0 "Invite Teachers from Motherland"
DPR_invite_teachers_from_motherland_desc:0 "We must invite teachers from our great homeland, Russia. Since there is still resistance among Ukrainian teachers to de-Ukrainization, our only hope is in Russian teachers. Only they can tell us how great our country is and dispel the myth of the existence of the Ukrainian nation. Ukrainians are a non-existent nation created by the West to fight against Russia, and the new teachers will teach children this."
DPR_propaganda_of_our_identity:0 "Propaganda of our Identity"
DPR_propaganda_of_our_identity_desc:0 "One of the main problems in our country is that some residents mistakenly do not consider themselves Russians, and we have to dispel this. We are Russians who suffered for 5 years from the bombing of our cities and villages by Ukraine. We are Russians, God's chosen people who defeated Nazism in 1945 and in the present day! And we have to promote our identity in order to destroy Ukrainian Nazism within our country completely!"
DPR_glorification_of_russia:0 "Glorification of Russia"
DPR_glorification_of_russia_desc:0 "Russia - is the greatest country in our world. Russia is country, who never lost any war! Whatever we talking about Hitler, Napoleon or others who thought they can win war against Russia! Russia is country that defeated Nazism, and we are Russians, who defeated Nazi Ukraine, that was created by Rotting West, to destroy Russia! Russia will never be defeated!"
DPR_sweep_ukrainian_partisans:0 "Sweep Ukrainian Partisans"
DPR_sweep_ukrainian_partisans_desc:0 "Currently, there are several groups of pro-Ukrainian partisans who are engaged in sabotage. We must strengthen the control of our state in order to destroy them. They will be demonstrably executed, like any enemy of our state! Glory to the Novorossia!"
DPR_prohibite_their_language:0 "Prohibite Their Language"
DPR_prohibite_their_language_desc:0 "The Ukrainian language is one of the factors why some residents mistakenly consider themselves Ukrainians. This non-existent language, created from Russian and Polish, will be destroyed! Fines for speaking Ukrainian in public, jail time for providing services not in Russian, and we will teach children that the Ukrainian language does not exist!"
DPR_infiltrate_the_remains:0 "Infiltrate The Remains"
DPR_infiltrate_the_remains_desc:0 "We will place our agents in the remnants of the resistance and destroy it from within! Our agents will leak information, but they will also try to become leaders of the resistance so that we can end it once and for all!"
DPR_establish_rusuchlag:0 "Establish RusUchLag"
DPR_establish_rusuchlag_desc:0 "All internal enemies of our state are like this because they simply do not know the truth. The West has brainwashed them with its propaganda. To solve this problem, we will create Russian Educational Camps (RusUchLag), where Ukrainian-speaking residents and their collaborators will be re-educated so that they will realize that they are Russians again! Even if we need to use some force and torture..."
DPR_bring_our_speech_to_every_house:0 "Bring Our Speech to Every House"
DPR_bring_our_speech_to_every_house_desc:0 "We need to create monopoly of our tv-channels. No more alternative information, no more inconvenient facts, no more discontent from our population."
DPR_zombification_of_population:0 "Zombification of Population"
DPR_zombification_of_population_desc:0 "Our people don't need to know all truth. Some facts can be little.. dangerous to our society, so we have to censore it. Instead, we will let them know what we think they need most. They don't need to know about our problems, they don't need to know how bad is situation."
DPR_loyal_and_subjugated:0 "Loyal and Subjugated"
DPR_loyal_and_subjugated_desc:0 "Thanks to our actions, we were able to suppress the national resistance of Ukrainians. Now our country has obedient residents who are ready for any of our actions. They are not interested in the resistance, they are not interested in politics, because they blame internal and external enemies for all the problems"
DPR_cosmetical_preparations:0 "Cosmetical Preparations"
DPR_cosmetical_preparations_desc:0 "Thanks to our political program, we were able to create an obedient herd that will do what we want. We can begin to make cosmetic preparations for the elections, although we already know the results beforehand. All this framework will only serve to select the right choice, and then present it on television as the will of the people."
DPR_vote:0 "Vote"
DPR_vote_desc:0 "We are starting our voting! We will start campaigning on television and vote for the right option, and even if it gets a minority, it's not a problem, because the elections are fake. Soon this whole circus will be over, and we will continue the path of our country. Glory to Russia!"
DPR_united_in_glory:0 "United in Glory"
DPR_united_in_glory_desc:0 "The elections are over! Exactly 102.4% agreed to our integration into Russia as an autonomous region. The purpose for which our state was created has finally been realized. We are now part of the Russian Federation, forever!"

DPRelection.24.t:0 "Leonid Pasechnik won the election!"
DPRelection.24.d:0 "A simple evening in the once liberated lands of Donbas became very interesting for the political gaze. Time dragged on for a long time, but the election results were announced. The Central Election Committee of Novorossiya announced the winner of this long-awaited and difficult election. The winner was Leonid Pasechnik, a former employee of the Security Service of Ukraine and the Ministry of Internal Affairs of the LNR, and ex-president of the LNR!\nHaving had such a long and incredibly interesting political career, he, like a fox of politics, was able to use his connections and win the support of the population. The promises of each candidate flew from their mouths without stopping, but it was Leonid Ivanovich who was able to succeed!\nOther candidates are already going into opposition, refusing to admit their defeat, but the people, discouraged by the victory of their candidate, are ready to do anything for the future promised by Pasechnik's party."
DPRelection.24.a:0 "DA! Pasechnik!"


pasek_resuscitation_of_the_economy:0 "Resuscitation of the Economy"
pasek_resuscitation_of_the_economy_desc:0 "Our economy was in a very difficult aftermath of the war. The region was destroyed, there were no labourers. But we are actively getting out of this situation. The country is reviving, people are coming back. Everything is fine. Everything will be fine."
expanded_progovernment_party:0 "Expanded pro-government party"
expanded_progovernment_party_desc:0 "To increase support for Pasechnik's government at home and abroad, the president has assembled a team of professionals who can improve the effectiveness of government decisions."
pasek_euphoria_after_victory:0 "Euphoria after victory"
pasek_euphoria_after_victory_desc:0 "After Leonid Pasechnik won the elections, his popularity only increased and many people became interested in his activities, providing support from the side of the people."
pasek_resuscitation_of_the_economy_1:0 "Total Economic Restructuring"
pasek_resuscitation_of_the_economy_1:0 "We're in a very difficult position. On the one hand, we are under pressure from Europe, imposing sanctions and zero investment in our region. On the other side is Russia. They look like our friends, but in reality they just want to absorb our resources. But we will make our own third way. We will balance between the two economic forces, and we will get the maximum benefit from it."
pasek_resuscitation_of_the_economy_2:0 "Total Economic Restructuring"
pasek_resuscitation_of_the_economy_2_desc:0 "We're in a very difficult position. On the one hand, we are under pressure from Europe, imposing sanctions and zero investment in our region. On the other side is Russia. They look like our friends, but in reality they just want to absorb our resources. But we will make our own third way. We will balance between the two economic forces, and we will get the maximum benefit from it."
pasek_resuscitation_of_the_economy_3:0 "Improved connections with the Russian economy"
pasek_resuscitation_of_the_economy_3_desc:0 "For more stability in our economy, we will fully rely on our big brother."
pasek_demining:0 "Demining of territories"
pasek_demining_desc:0 "We have to demine some fields."
pasek_improved_security_services:0 "Improved Security Services"
pasek_improved_security_services_desc:0 "Improved Security Services"
pasek_improved_security_services_2:0 "Improved Security Services"
pasek_improved_security_services_2_desc:0 "Improved Security Services"
pasek_russian_podsos:0 "Co-operation with Russia"
pasek_russian_podsos_desc:0 "We will focus on co-operation with our main friends, brothers and those to whom we owe our freedom - Russia."
pasek_russian_podsos_2:0 "Co-operation with Russia"
pasek_russian_podsos_2_desc:0 "We will focus on co-operation with our main friends, brothers and those to whom we owe our freedom - Russia."
pasek_russian_podsos_odkb:0 "CSTO Military Trainings"
pasek_russian_podsos_odkb_desc:0 "The CSTO (ODKB) held an exercise to which representatives of the army of Novorossia were invited. This is a great victory for President Leonid Pasechnik in the international arena, as his soldiers were able to gain good skills."
pasek_new_army:0 "New Army of Novorossia"
pasek_new_army_desc:0 "After winning the bloody war of independence, the leadership of Novorossiya decided to start army reforms to strengthen its position and defend its independence."
pasek_new_army_2:0 "New Army of Novorossia"
pasek_new_army_2_desc:0 "After winning the bloody war of independence, the leadership of Novorossiya decided to start army reforms to strengthen its position and defend its independence."
pasek_open_window:0 "European-style reforms"
pasek_open_window_desc:0 "President Pasechnik decided to embark on European-style reforms to improve the situation in his country."
pasek_open_window_2:0 "European-style reforms"
pasek_open_window_2_desc:0 "President Pasechnik decided to embark on European-style reforms to improve the situation in his country."
pasek_open_window_3:0 "European-style reforms"
