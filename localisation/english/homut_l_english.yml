l_english:


#### FOCUS TREE ####

 AFU_khomutynnik:0 "Khomutynnik's Presidency"
 AFU_khomutynnik_desc:0 "After a long and continuous struggle for freedom, peace, and prosperity, Donbas managed not only to end the rule of thieves on its land but also ended the seemingly endless period of dictatorship and tyranny by electing its countryman, its trusted servant - Vitaliy Khomutynnik. Hip hip hooray!"

 AFU_message_to_bondar:0 "Send a Message to Bondar"
 AFU_message_to_bondar_desc:0 "Once the de facto leader of the "Revival" party, which has always faithfully and persistently represented the interests of the people of eastern and southern Ukraine, Mr Khomutynnik has remained in contact with its nominal leader - Viktor Bondar, who, along with other members of the faction, has been settled in the Dnipropetrovsk region since the beginning of the civil war. All these people are skilful politicians and decent citizens who will definitely find a place in our new government."

 AFU_call_to_kinakh:0 "Call to Kinakh"
 AFU_call_to_kinakh_desc:0 "As it turns out, Mr Khomutynnik's old friend and former political boss, Anatoliy Kinakh, is still alive and well, moreover, he's trying to somehow get along in the new realities of Ukrainian statehood. This old man is not what he appears, despite the fact that he left big politics a long time ago, he still has good contacts with his former PIEU party members and beyond, which makes him an extremely valuable possible partner. We should give him a call sometime..."

 AFU_talk_with_kolomoyskyi:0 "Talk with Kolomoyskyi"
 AFU_talk_with_kolomoyskyi_desc:0 "Ihor Kolomoyskyi, no matter what people say about him, is a good and generous man. For years, this benefactor has helped the party with funding, spared no expense and sometimes even his reputation to support us and our principles, and even in these difficult times, he has managed to maintain his high and respected position in Ukraine. This man has provided us with services countless times, and the moment has come when we will settle the accounts and start to be beneficial to each other, establishing full cooperation in every sense of the word."

 AFU_revival_faction_session:0 "Revival Faction Session"
 AFU_revival_faction_session_desc:0 "After all this time, the party could not remain the same. Some left the organisation, as well as the state and some joined other political forces, but it all showed very well who was truly loyal to the goal and who was simply making a profit from it. Since Mr Bondar and other members of the "Revival" have happily agreed to join us, we need to hold the first party congress of this new era. A new era not only for our movement but for the whole of Ukraine."

 AFU_mutually_beneficial_alliance:0 "Mutually Beneficial Alliance"
 AFU_mutually_beneficial_alliance_desc:0 "Call after call, meeting after meeting, all this led us to this point. Our patron, the godfather of the "Revival", was delighted that his investment had paid off so well and agreed to all our proposals for cooperation. We will join our efforts and will together develop our regions and our country. Become the parents of its revival."

 AFU_integrate_the_party_of_industrialist:0 "Integrate the Party of Industrialists"
 AFU_integrate_the_party_of_industrialist_desc:0 "The PIEU, also known as the party for people who understand business, used to be a large and powerful structure on the political scene, which all possible blocs wanted to have in their ranks. However, since joining the ranks of the Party of Regions, its time has run out. But not for its members. Many former party members have not only stayed in this world but also remain in politics. They are all valuable cadres that could be a salvation for us and our bureaucracy, and since Mr Kinakh is still in touch with them, why not try to integrate what is left of the good old party of entrepreneurs into our government?"

 AFU_meeting_with_the_donetsk_clan:0 "Meeting with the Donetsk Clan"
 AFU_meeting_with_the_donetsk_clan_desc:0 "As the people say, if you want to live, learn how to spin. This phrase is also applicable in our situation. Ever since the fall of the Soviet Union, Donbas has been in the hands of local businessmen who were not afraid to get their hands dirty and openly criminal authorities who could afford to oppose the will of the state apparatus. The days of gangster showdowns and anticriminal wars are certainly over, however, the economic and financial owners of most of the Donbas industry have not disappeared, even though they have mostly gone into the shadows. If we want to bring a better future to our country and avoid all kinds of internal conflicts, the only way is through friendship and partnership with the Donetsk and Luhansk entrepreneurs."

 AFU_Open_a_Negotiating_Channel_with_Moscow:0 "Open a Negotiating Channel with Moscow"
 AFU_Open_a_Negotiating_Channel_with_Moscow_desc:0 "Relations and the general situation with Russia have been on the agenda for the entire Donbas for more than 7 years. All this time, ordinary citizens and politicians, workers and farmers, have been trying to find their place in this issue and were looking for the right arguments to justify their position, though, as much as some people may not want to hear it, the future of Donbas and the whole of Ukraine cannot be simply fenced off from Russia. We are in the same boat, whether we like it or not, and we cannot simply cut all ties with our Moscow counterparts. Relations need to be restored, despite all that has happened in the suffering Donbas over the years."

 AFU_cooperation_with_local_outsiders:0 "Cooperation with Local Outsiders"
 AFU_cooperation_with_local_outsiders_desc:0 "No matter what allies from the past we attract, we require regional support. In Donbas, there are many small outsider parties and local politicians who enjoy authority and respect among their little electorate, and all these people can be useful not only to their community but also to the state as such! The more small politicians who are trusted by the public we involve in our own party and state work, the greater our chances of success, both external and internal, will be. Donbas should be governed by its own people after all!"

 AFU_formation_of_the_together_for_donbas_coalition:0 "Formation of the Together for Donbas Coalition"
 AFU_formation_of_the_together_for_donbas_coalition_desc:0 "Recently, many people have joined our government coalition, both from Mr Khomutynnik's past life and from local regional micro-parties. All of these people, however, while sharing such traits as loyalty, intellect, and cleverness, are adherents of different political ideologies and positions, and are adherents of different ideological theories. While the outsider political forces from Donbas integrated into our membership do not share the principles of the integrated major political groups, we still maintain a majority party policy, which limits our cooperation with local state officials. From now on, our goal should be to create a large, inclusive party without a single ideological line, whose position should be based on things that unite us all: economic development, sovereignty, and social prosperity."

 AFU_time_for_great_solutions:0 "Time for Great Solutions"
 AFU_time_for_great_solutions_desc:0 "Donbas is still suffering, no matter what anyone says. The war that for years has devastated the land, killed and oppressed the people will be felt in this region for a very long time, but we can speed up its healing. By forming a truly large and effective political coalition, our government is ready to face the challenges that a disgruntled society and ruined soil have prepared for us, and we will come out of this victorious!"

 AFU_start_deradicalisation_of_society:0 "Start the Deradicalisation of Society"
 AFU_start_deradicalisation_of_society_desc:0 "We must begin healing our divided society and marginalize extremism."

 AFU_pardons_for_the_ldpr_partecipants:0 "Pardons for the LDPR Participants"
 AFU_pardons_for_the_ldpr_partecipants_desc:0 "There is no doubt that some enemy soldiers have committed crimes and formally committed treason against Ukraine. But they had no other choice, they were deceived by the Russians, and thay had families to feed! Because of this, some of the ex-militias will be granted amnesty."

 AFU_stop_the_ethnic_hatred:0 "Stop the Ethnic Hatred"
 AFU_stop_the_ethnic_hatred_desc:0 "Due to the propaganda of radical nationalism in the time of Kryvonos, our society is unstable. Far-right military organizations advocate "ethnic purity", which is a crime against humanity! We must correct this by introducing a ban on ethnic hatred into the criminal code and introduce severe penalties for it"

 AFU_hunt_for_the_ringleaders:0 "Hunt for the Ringleaders"
 AFU_hunt_for_the_ringleaders_desc:0 "After 6 years of war, a lot of different right-wing radicals have bred in our country. From radical nationalists to fascists and Nazis. We will launch a law enforcement hunt for the leaders of such organizations to ensure security and stability"

 AFU_disband_the_azov_regiment:0 "Disband the Azov Regiment"
 AFU_disband_the_azov_regiment_desc:0 "Azov is the source of a lot of controversy, far-right crises and everything else. Not to mention the fact that most of its members have been suspected of committing war crimes since 2014, this organization poses a danger to the state, which is why we will disband it."

 AFU_learn_from_the_best:0 "Learn from the Best"
 AFU_learn_from_the_best_desc:0 "Even now, in times of complete instability after the collapse of Ukraine, Dnipro is the economic center of the region. We will use the experience of this corporate state for the benefit of our state, in the economic sense, of course."

 AFU_benefits_for_small_and_medium_sized_businesses:0 "Benefits for SMEs"
 AFU_benefits_for_small_and_medium_sized_businesses_desc:0 "We will change our tax system in such a way that small and medium-sized businesses will pay much lower taxes than large ones. This will help us to create a fertile ground for the development of companies. We will also create a program of assistance for small businesses, for example, a zero-interest government loan program!"

 AFU_establish_cooperation_of_corporates:0 "Establish Corporate Cooperation"
 AFU_establish_cooperation_of_corporates_desc:0 "We will use the Dnipro corporatocracy model for good. Thanks to this reform, small, medium and large businesses will be able to develop in a way they have never been able to before, which will lead to the economic prosperity of our country."

 AFU_in_the_name_of_the_state:0 "In the Name of the State"
 AFU_in_the_name_of_the_state_desc:0 "After the economic reforms, we have to deal with the law. Or, to be more precise, enforcing it. We will increase funding for the police and internal affairs agencies, and possibly create something similar to the Stasi of the GDR."

 AFU_strenghten_the_police_force:0 "Strengthen the Police Force"
 AFU_strenghten_the_police_force_desc:0 "We will increase investment in the police department. For the sake of the stability of our country, of course!"

 AFU_expand_funding_for_the_special_services:0 "Expand Funding for Special Services"
 AFU_expand_funding_for_the_special_services_desc:0 "Our country is in danger. It is in danger because of those who wish the worst for our country! We will increase funding for internal structures to ensure the safety of our citizens."

 AFU_keep_the_inner_adversary_out:0 "Keep the Inner Adversary Out"
 AFU_keep_the_inner_adversary_out_desc:0 "Our state stands on very unstable ground. The internal enemies - right-wing radicals, pro-Kryvonos scum, and some politicians - are dangerous! The external American administration should not influence our policy! To this end, we will begin a campaign of hunting down internal enemies!"

 AFU_form_the_internal_troops:0 "Form the Internal Troops"
 AFU_form_the_internal_troops_desc:0 "After our program of strengthening internal structures, our bureau now has its own security forces. They will be used only in emergency situations, and we will be sure that it is only for the sake of security and destruction of internal enemies!"

 AFU_end_of_kryvonos_era:0 "End of the Kryvonos Era"
 AFU_end_of_kryvonos_era_desc:0 "The old guard must step aside to allow for progress."

 AFU_government_is_for_politicians_not_the_military:0 "Government Is for Politicians, Not the Military"
 AFU_government_is_for_politicians_not_the_military_desc:0 "After the Kryvonos era, our country is suffering. It suffers from the fact that democratic institutions have been destroyed, and most bureaucratic positions are occupied by soldiers and colonels who do not even know how to properly govern the country. We will reform this by returning politicians to the government, and the military will be sent back to the trenches."

 AFU_raise_the_issue_of_generality:0 "Raise the Issue of Generality"
 AFU_raise_the_issue_of_generality_desc:0 "We know that most of the generals are friends of Kryvonos and are loyal to him. We cannot allow this to happen, because if Kryvonos decides to rebel or disobey orders, we will not be able to do anything about it. Therefore, we will change the composition of the high military command to new people, at least partially."

 AFU_in_the_name_of_nation:0 "In the Name of the Nation"
 AFU_in_the_name_of_nation_desc:0 "Our country is in ruins. But thanks to democracy, equality and progress, we can fix it! For the sake of our country, Ukraine, and for the sake of our nation, Khomutynnyk, our president, will save us! Let equality and democracy allow us to rebuild Ukraine, and let it allow us to unite it, preserving human rights and destroying radicals!"

 AFU_reform_the_territorial_system:0 "Reform the Territorial System"
 AFU_reform_the_territorial_system_desc:0 "Currently, our territorial system is sadly flawed. We can, of course, take the system of territorial division of Ukraine, but due to the current circumstances it will be slightly changed..."

 AFU_project_of_the_presidential_republic:0 "Project of the Presidential Republic"
 AFU_project_of_the_presidential_republic_desc:0 "The time has come for true democracy! The parliamentary-presidential system only harms our country! While the president, elected by the people, is trying to reform the country, the MPs who got their seats only because they were in the same party are hindering him! We will solve this problem by transferring more powers to the president, which will potentially allow us to move to a presidential republic."

 AFU_support_the_regional_minorities:0 "Support the Regional Minorities"
 AFU_support_the_regional_minorities_desc:0 "There are many different peoples living in our country. But the main ones are Russians and Ukrainians. We will start a program to support national minorities, such as Roma, Greeks, Jews, Tatars and others. This will allow us to increase the rating of our president."

 AFU_second_language_inicitiative:0 "Second Language Initiative"
 AFU_second_language_inicitiative_desc:0 "For quite a long time, our country has been plagued by the problem of Russian and Ukrainian languages. Despite the fact that the majority of our country is Russian-speaking. We will solve a long-standing problem that has caused many deaths. We will make our republic two state languages - Ukrainian and Russian!"

 AFU_referendum_that_will_change_everything:0 "Referendum That Will Change Everything"
 AFU_referendum_that_will_change_everything_desc:0 "We will hold a referendum to implement our reforms! Of course, we will use a little bit of our influence to make sure that the result will be as we planned."

 AFU_tackle_peoples_problem:0 "Tackle the People's Problem"
 AFU_tackle_peoples_problem_desc:0 "We must focus on solving the real problems facing everyday citizens."
 
 AFU_increase_veterans_payments:0 "Increase Veterans' Payments"
 AFU_increase_veterans_payments_desc:0 "Boosting the financial support for our veterans, ensuring they are properly cared for in their post-service lives."

 AFU_abolish_censorship_laws:0 "Abolish Censorship Laws"
 AFU_abolish_censorship_laws_desc:0 "Censorship laws stifle free speech and democracy. It's time to put an end to these restrictions."

 AFU_market_must_not_be_limited:0 "The Market Must Not Be Limited"
 AFU_market_must_not_be_limited_desc:0 "The market is the lifeblood of the nation. Restricting it will only harm our growth. We must ensure freedom in commerce."

 AFU_in_the_name_of_the_people:0 "In the Name of the People"
 AFU_in_the_name_of_the_people_desc:0 "Our government must serve the interests of the people, not the elites. This focus will reaffirm our commitment to the people."

 AFU_raise_the_standard_of_living:0 "Raise the Standard of Living"
 AFU_raise_the_standard_of_living_desc:0 "A prosperous nation must guarantee the well-being of its citizens. It's time to raise the standard of living for all."

 AFU_miners_paradise_on_earth:0 "Miner's Paradise on Earth"
 AFU_miners_paradise_on_earth_desc:0 "During the years of conflict in Donbas, ordinary Donbas workers have suffered the most. Whether on Ukrainian or Russian territory, mines have been stolen, destroyed or flooded. We will fix this by starting to finance the mines so that the miners have jobs! God save Khomutynnyk's genius!"

 AFU_golf_the_best_entarteinment:0 "Golf The Best Entertainment"
 AFU_golf_the_best_entarteinment_desc:0 "Currently, we have no active public recreation. This is bad! We will invest in the development of a golf federation in our country, and more importantly, we will organize state recreation on the golf course! Of course, most of the golf clubs are owned by Khommutynnyk, but who cares if it's for the happiness of our citizens!"

 AFU_nation_of_hard_workers:0 "Nation of Hard Workers"
 AFU_nation_of_hard_workers_desc:0 "Our population is the most workaholic in the world! Like the Japanese after their defeat in World War II, we will rebuild our country from scratch and make it the economic center of Europe!"

 AFU_the_time_of_the_donbas_people_has_come:0 "The Time of the Donbas People Has Come"
 AFU_the_time_of_the_donbas_people_has_come_desc:0 "The Donbas region has long been overlooked. It is time for them to take their rightful place in our nation."

 AFU_one_and_unified_multicultural_state:0 "One and Unified Multicultural State"
 AFU_one_and_unified_multicultural_state_desc:0 "Finally, we have united all of eastern Ukraine. Now, we will create a society where everyone is welcome, and everyone can live in friendship and under the protection of Khomutynnyk."

 AFU_issue_of_our_status:0 "Issue of Our Status"
 AFU_issue_of_our_status_desc:0 "The time has come. It is time to return to the international arena as the one and only true Ukraine. Liberalism and democracy have won. Glory to Khomutynnyk! Long live Ukraine, united forever! Some people want us to join Nato. But we will not do this, we will remain neutral, because this is the only way we can prevent international conflicts and develop!"


