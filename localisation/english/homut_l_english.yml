 afu_diplomacy_with_russia_category:0 "Diplomacy with Russia"
 afu_diplomacy_with_russia_category_desc:0 "\n\nAlthough there are no official ties between the Donbas administration and the Kremlin, there are whispers in the corridors of power about secret talks, indirect signals and old channels that have been revived. Khomutynnyk's government wants stability, and for this it needs the support of a strong player. Will Russia meet it halfway, or will it use the situation to exert influence?"
 
