  afu_integration:0 "Інтеграція"

  afu_integration1:0 "Суди для Сепаратистів"
  afu_integration1_desc:0 "Як ми вже казали, прийде день коли ті сволоти будуть мріяти про те щоб вони не народилися. Кожен сепарський офіцер буде засуджений за свої злочини проти людства та України перед трибуналом."
  afu_integration2:0 "Вичищення колаборантів"
  afu_integration2_desc:0 "Не тільки їх так звані "Лідери" будуть відповідати перед богом й законом, але й їх підручні, такі як шефи поліції або, так звані Депутати. На щастя, вони лише тупі пішаки тому ми збираємося відправити їх до "Мотороли" і інших якнайшвидше"
  afu_integration3:0 "Облава на ФСБ"
  afu_integration3_desc:0 "Від 2014 року, російська ФСБ почала працювати цілодобово на Донбасі як спосіб збільшити Сепаратистську хватку над регіоном. Зараз, багато залишків агентури і їх ланцюги вливу знаходяться на Донбасі, чекаючи щоб з ними покінчили."
  afu_integration4:0 "Створити Тимчасову Адміністрацію"
  afu_integration4_desc:0 "Така радикальна зміна уряду в регіоні створила багато бюрократичних проблем. Донбас після сепаратистів вимагає нових паспортів, документації, банків та податкові - все це буде можливо зі створенням нової тимчасової адміністрації."
  afu_integration5:0 "Подальші кроки інтеграції"
  afu_integration5_desc:0 "Багато було зроблено для впровадження закону та порядку на Донбасі. Тепер час робити наступні кроки в інтеграції регіону."
  afu_integration6:0 "Фільтраційні Міри"
  afu_integration6_desc:0 "В великій кількості населення яка підтримує Росію і все що колись називалося сепаратистськім урядом, малі репресивні дії неминучі. Звичайно, схопити кожного фанатика плешивого тут неможливо, але кожен хто буде пропагандувати за його ворожу думку, просто так не залишиться без покарання."
  afu_integration7:0 "Покінчити з Інтеграцією"
  afu_integration7_desc:0 "Все що потрібно було зробити для інтеграції було зроблено, прийшов час офіціально підтвердити що процес завершено!"

