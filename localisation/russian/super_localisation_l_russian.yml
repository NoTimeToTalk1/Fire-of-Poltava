l_russian:
  SP_Event_odessa_war:0 "Війна в одесі"
  SP_Event_odessa_war_QUOTE:0 "З одного боку Одеса омивається морем, з іншого - степом. Степ - український, море - інтернаціональне. \n- Лев Славін"
  SP_Event_odessa_war_REMARK:0 "Балаклава пустилася берега"
  SP_Event_russian_ukraine_war:0 "Російсько-Українська Війна"
  SP_Event_russian_ukraine_war_QUOTE:0 "Потрібно зціпити зуби і бути жорстоким - тоді ти переможеш. \n-Еріх Марія Ремарк"
  SP_Event_russian_ukraine_war_REMARK:0 "Ти хотів цієї землі?"