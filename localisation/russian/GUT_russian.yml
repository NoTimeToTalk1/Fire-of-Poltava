 gut.1.t:0 "Горді сини Галичини"
 gut.1.d:0 "Гуцули мають давню історію та унікальну культурну ідентичність, що бере свій початок у Карпатських горах. Вони з гордістю зберігають свої традиції, фольклор, музику та яскраві ремесла, які передаються з покоління в покоління. Гуцульська вишивка, вигадлива різьба по дереву та килими ручного ткацтва відображають творчість та майстерність місцевих ремісників. Регіон також відзначається жвавими фестивалями та народними танцями, де мешканці збираються разом, щоб вшанувати свою спадщину та зміцнити сильне почуття спільноти."
 gut.1.a:0 "Хай живе гуцульський народ!"
