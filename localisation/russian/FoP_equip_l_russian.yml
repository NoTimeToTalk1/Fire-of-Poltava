l_russian:
 infantry_equipment_2:0 "Штурмова Гвинтівка"
 infantry_equipment_2_short:0 "AK-74"
 infantry_equipment_2_desc:0 "AK-74, небудучи найновішою або найдорожчою зброєю, вона точно є надійною зброєю в руках воїна. Історичені модифікації цієї гвинтівки отримали неабияку популярність серед країн колишнього Радянського Союзу, водночас росповсюджились по всьому світу як пожежа в лісі напротязі 20того сторічча."
 
 train_equipment_1:0 "Громадський Потяг"
 train_equipment_1_short:0 "Громадський Потяг"
 train_equipment_1_desc:0 "Звиклий український потяг, будучи здебільшого старою радянською моделю або модифікацією її, вона частіше всього некомфортна для громадського використання. Однак, у тяжкому-військовому стані, навіть такі потяги спроможні забезбечети необхідну логістичину допомогу фронту, що може стати ключовим в перемозі битви або війни взагалі."

 support_equipment_1:0 "Допоміжне Спорядження"
 support_equipment_1_short:0 Допоміжне Спорядження"
 support_equipment_1_desc:0 "Допоміжне Спорядження" є комплексним, стандартизованим набіром вантажу що складається з предметів на всі можливі випадки в бою та поза ним. Серед різних речей, там можна знайти саперну лопату, рації, сухі пайки і аптечки. Короче кажучи, набір який допоможе в будь-якій ситуації."

 motorized_equipment_1:0 "УРАЛ-4320"
 motorized_equipment_1_short:0 "УРАЛ-4320"
 motorized_equipment_1_desc:0 "УРАЛ-4320 це дизайн радянського позашляховика. Він був винайдений для транспортування вантажів, людей та трейлерів на всіх типах доріг. Він має дизельний двигун. З 1977 року, коли його вперше випродукували, його використовували для військових та цивільних цілей."

 mechanized_equipment_1_short:0 "БМП-2"
 mechanized_equipment_1:0 "Механізоване Спорядження"
 mechanized:equipment_1_desc:0 "БМП-2 це радянська гусенична бойова машина піхоти розроблена для транспрортування персоналу та збільшенню їхньої мобільності. Він був спродукований в 1980 році і був на використанні в багатьох країнах після цього."

 artillery_equipment_1:0 "Гаубиця"
 AFU_artillery_equipment_1_short:0 "Д-20"
 DPR_artillery_equipment_1_short:0 "МСТА-B"
 DPR_artillery_equipment_1_desc:0 "152mm "МСТА-B" гаубиця радянського виробництва. Вона розроблена для того щоб знищувати багато типів спорядження, такі як танки, артилерія та батареї мортири, так само як винищення людського запасу та вогнепальної зброї, контрольні точки, противітряну та протиракетну оборону, і т.п. Вона була продукована з 1987 та є на службі в таких країнах як Україна, Росія, Білорусь та інших."
 LPR_artillery_equipment_1_short:0 "МСТА-B"
 LPR_artillery_equipment_1_desc:0 "152mm "МСТА-B" гаубиця радянського виробництва. Вона розроблена для того щоб знищувати багато типів спорядження, такі як танки, артилерія та батареї мортири, так само як винищення людського запасу та вогнепальної зброї, контрольні точки, противітряну та протиракетну оборону, і т.п. Вона була продукована з 1987 та є на службі в таких країнах як Україна, Росія, Білорусь та інших."

 jet_fighter_equipment_1:0 "Реактивний Винищувач"
 AFU_jet_fighter_equipment_1_short:0 "СУ-25"
 AFU_jet_fighter_equipment_1_desc:0 "СУ-25 це винищувач радянського виробництва поставлений на випродукування в 1975. Після того як він почав використовуватися у 80-тих, у нього було багато модифікацій і він є ключовою частиною Повітряних Сил України, Росії та інших Пост-Радянських країнах."
 DPR_jet_fighter_equipment_1_short:0 "МІГ-29"
 DPR_jet_fighter_equipment_1_desc:0 "МІГ-29 це Радянський багатоцільний винищувач четвертого покоління. Під час останньої фази Холодної Війни він використався в країнах Варшавського пакту та СРСР, і після закінчення конфлікту він продовжив бути частиною багатьох країн по всьому світу."
 LPR_jet_fighter_equipment_1_short:0 "СУ-25"
 LPR_jet_fighter_equipment_1_desc:0 "СУ-25 це винищувач радянського виробництва поставлений на випродукування в 1975. Після того як він почав використовуватися у 80-тих, у нього було багато модифікацій і він є ключовою частиною Повітряних Сил України, Росії та інших Пост-Радянських країнах"

 transport_plane_equipment_1:0 "Транспортний літак"
 transport_plane_equipment_1_short:0 "ІЛ-76"
 transport_plane_equipment_1_desc:0 "ІЛ-76 це важкий Радянський військовий транспортний літак розроблений для транспотування та посадки персоналу, вантажів та обладнання для різних цілей. Воно було опорою повітрянодесантних військ багатьох країн з 1974."
