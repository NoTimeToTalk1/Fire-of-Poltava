 admiral_win:0 "Оголосити Перемогу"
 admiral_win_desc:0 "Незважаючи на всі спроби наших ворогів, нам вдалося зберегти Чорноморську конфедерацію. \nВсі, всі, хто вирішив кинути виклик нашому тимчасовому уряду, націоналісти, сепаратисти, русофіли і навіть російський експедиційний корпус, всі вони зазнали поразки. Зусилля дурнів, які думали, що зможуть керувати регіоном краще за нас, призвели лише до того, що прапор Конфедерації досі майорить у всіх куточках нашої країни, і через їхню дурість ми змушені ще більше контролювати все, що відбувається в Одеській області. Витівки так званих "опозиціонерів" і "борців за незалежність" призвели лише до того, що в країні збільшилася кількість вдів і правоохоронців. Однак це не означає, що Конфедерація перетвориться на похмурий український аналог НДР. Абсолютно непотрібна війна забрала життя багатьох людей і сильно похитнула нашу і без того крихку і нестабільну економіку, але ми оговтаємося. Нас чекають важкі і суворі часи, але Конфедерація відбудує все, що було зруйновано її ворогами, і знову стане значною силою в регіоні!"
