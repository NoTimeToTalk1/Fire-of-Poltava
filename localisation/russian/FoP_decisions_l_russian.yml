 sternenko_win:0 "Оголосити Перемогу"
 sternenko_win_desc:0 "Незважаючи на всі зусилля ворогів, їм не вдалося зламати дух небайдужих громадян України! \n Багато героїв загинуло в боротьбі за ту саму Україну, яка мала повстати в 1991 році, але їхня жертва не була марною і ніколи не буде забута. Перемігши як вірнопідданих диктаторського режиму Воронченка, так і московських повій на чолі з Шарієм та Зеленковим, наші славні воїни зуміли об'єднати Одещину під єдино можливим керівництвом. "Нацисти!", "вбивці!" - кричать прихильники наших ворогів, але всі знають, що ми не звірі. Суть наших ідей - створення національно-демократичного суспільства, суспільства, на яке заслуговує Україна. Битва закінчилася, але не закінчилася наша справа. Увічнивши пам'ять наших полеглих героїв, ми повинні почати працювати над формуванням уряду, а не підпільного партійного комітету, і зосередитися на повному переформатуванні нашого суспільства в цілому. Жодна душа більше не наважиться кричати про "російську" Одесу. Одеса - це Україна! І відтепер Україна ніколи не допустить нічого російського ні на своїй території, ні поруч з нею!"
 donbass_war:0 "Донбаська Війна"
 donbass_war_desc:0 "Після падіння центральної влади ситуація у східних регіонах погіршується. Очевидно, що найближчими місяцями почнеться активна фаза війни, і ми повинні зробити все, щоб вийти з неї переможцями."
