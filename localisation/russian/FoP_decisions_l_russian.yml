 donbass_laws:0 "Соціальна Політика"
 donbass_laws_desc:0 "У неспокійному і розділеному регіоні Донбасу, де після розпаду України виникли сепаратистські держави ДНР і ЛНР, критичні рішення щодо соціального курсу відіграють вирішальну роль у формуванні долі регіону та його мешканців. Складний соціально-політичний ландшафт, затьмарений конфліктом і територіальними суперечками, вимагає продуманих і рішучих дій, спрямованих на забезпечення стабільності, інклюзивності та процвітання."
