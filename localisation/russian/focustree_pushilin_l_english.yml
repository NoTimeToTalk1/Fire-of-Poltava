head_of_pmc:0 "Head of Private Military Company"
Voenkor:0 "Voenkor"
DPR_attracting_investment:0 "Attracting investment"
DPR_attracting_investment_desc:0 "Listen up, dear friends and fans of the financial marathon! I'm announcing our hottest trick yet - Attracting Investment, because we know in every cell of our gangster heart that money plays the role of ammunition in a business war! This wallet of opportunities is a real balloon exploding in the world of investment! It's like an exploding grenade, scattering money everywhere it sees its audience!"
DPR_openforbusiness:0 "Open for Business!"
DPR_openforbusiness_desc:0 "Welcome to the land where dreams come true and fortunes are made. It's a place where innovation meets determination, and where hard work and savvy thinking pave the way to success. We're talking about a world that's open for business, where the possibilities are as endless as the horizon itself. But beware, my friends, for this world is not for the faint of heart. It's a battlefield where only the strong survive and the weak are left in the dust."
DPR_regime_victory:0 "Regime victory"
DPR_regime_victory_desc:0 "As we thought, there was nothing to fear. The brilliant work of our propagandists and a perfectly prepared pre-election campaign have brought the required result, and there is no reason to regret a single ruble spent on it. Our party has won a few more years of power, and it is time to show what we are really capable of when all our rivals and opponents are no longer able to stand in our way."
DPR_continuing_the_status_quo:0 "Continuing the status quo"
DPR_continuing_the_status_quo_desc:0 "Listen up, folks, 'cause I'm about to give you the lowdown on a situation that's all about continuing the status quo. It might not sound as flashy or thrilling as some other tales, but sometimes stability is what keeps the wheels turning. So gather 'round and let me paint a picture of a world content with maintaining the established order."
DPR_thisgentelmanwillpayforeverything:0 "This Gentelman Will Pay for Everything!"
DPR_thisgentelmanwillpayforeverything_desc:0 "Picture this - a convoy of luxury vehicles rolls into town, leaving a trail of awe and envy in its wake. These tycoons of the Russian business world have descended upon Donbass, ready to leave their mark and make their fortunes. With deep pockets and an appetite for risk, they come bearing gifts of investment and dreams of untold wealth."
DPR_redistribution_of_industry:0 "Redistribution of Industry"
DPR_redistribution_of_industry_desc:0 "Imagine a world where the gears of industry are rearranged, where the established order is challenged, and new players emerge from the shadows. The titans of commerce engage in a battle royale, driven by the hunger for dominance and the pursuit of profit. They dance on the line between opportunity and risk, with the fate of entire sectors hanging in the balance."
DPR_allforthedonbass:0 "All for the Donbass!"
DPR_allforthedonbass_desc:0 "As the curtain rises, we see a convoy of trucks laden with essential supplies making their way across the borders. These vehicles, like angels of mercy, carry food, medicine, clothing, and other vital resources that will alleviate the suffering of the people affected by the conflict. The spirit of «All for the Donbass!» echoes in every gesture, every package, and every act of kindness."
DPR_their_property_needs_protection:0 "Their Property Needs Protection"
DPR_their_property_needs_protection_desc:0 "As the curtain rises, we witness the entrance of a shadowy force, clad in tactical gear and armed to the teeth. These mercenaries, backed by powerful interests, claim to be defenders of Russian investments and assets in the region. Their mission, they proclaim, is to safeguard the property of those who have a vested interest in the troubled land of Donbass."
DPR_labour_migration_problem:0 "Labour Migration Problem"
DPR_labour_migration_problem_desc:0 "As the tale unfolds, we witness the tightening grip of bureaucracy in Donbass, with Mr. Pushilin implementing a series of regulations and restrictions that transform the process of labor migration into a labyrinth of red tape and frustration. Exit permits, endless paperwork, and convoluted procedures become the norm, making escape from the region a seemingly insurmountable challenge."
DPR_prevent_protests:0 "Prevent Protests"
DPR_prevent_protests_desc:0 "The rights and voices of the people of Donetsk are suppressed under the weight of authoritarianism. The FSB operates as an instrument of control, employing intimidation tactics and harsh measures to quell any form of dissent. Fear permeates the air, silencing the voices of those who dare to challenge Pushilin's rule."
DPR_raising_security_rights:0 "Raising Security Rights"
DPR_raising_security_rights_desc:0 "The balance of power tilts heavily in favor of the PMCs, as they are granted the authority to employ force to ensure productivity. The very notion of consent and workers' rights is challenged, as dissent and refusal to work are met with potential violence. The threat of coercion looms over the factory floors, casting a shadow on the principles of fair labor practices."
DPR_attheexpenseofrussiantaxpayers:0 "...at the expense of Russian taxpayers"
DPR_attheexpenseofrussiantaxpayers_desc:0 "The act of extending aid to those in need is undoubtedly noble, but it is crucial to ensure transparency and accountability in the use of taxpayers' funds. The Russian people deserve to know that their contributions are being utilized efficiently and effectively, delivering the intended impact to the people of Donbass."
DPR_get_rid_of_dissenters:0 "Get rid of dissenters"
DPR_get_rid_of_dissenters_desc:0 "An atmosphere of intolerance and suppression permeates the air. Those who dare to voice dissenting opinions or challenge the prevailing authority find themselves targeted for expulsion. The ruling powers, driven by the fear of opposition and the desire for control, resort to extreme measures to silence dissent."
DPR_fill_in_the_labour_market:0 "Fill in the labour market"
DPR_fill_in_the_labour_market_desc:0 "Alright, gather 'round, folks. And let me tell you, Mr. Pushilin, the man with a plan, has hatched a scheme to bring in a flood of migrants from Central Asia, the Caucasus, and other economically challenged regions to fill Novorossiyan's labour market. Picture this: a bustling landscape of opportunity, where workers from far and wide flock to seize their chance at a better life. Mr. Pushilin, a mastermind in his own right, extends his welcoming hand to those seeking employment, beckoning them to join the ranks of Novorossiyan's labor force."
DPR_nothing_happened_again:0 "Nothing happened again"
DPR_nothing_happened_again_desc:0 "In the realm of Novorossiya, a shadow falls upon the land as the tale takes a darker turn. Despite the hopes and aspirations that once filled the air, it appears that "nothing happened again." The whispers in the alleyways tell a different story, as Mr. Pushilin's grip tightens, suppressing any dissent that dares to challenge his authority."
DPR_the_jewel_of_eastern_europe:0 "The jewel of Eastern Europe"
DPR_the_jewel_of_eastern_europe_desc:0 "Welcome, ladies and gentlemen, to the enchanting world of Novorossiya, the jewel of Eastern Europe! Here, amidst the smoky streets and neon-lit alleyways of Donetsk, Mr. Pushilin has set up his own personal business kingdom that rivals the wildest dreams of anyone. In this vibrant metropolis, Russian oligarchs converge, drawn by the allure of Novorossiya's untapped potential. Each one strives to carve out their own piece, engaging in a cutthroat battle for supremacy. It's a corporate battleground where the rules are dictated by profit margins and innovation reigns supreme."
DPR_the_social_course:0 "The social course"
DPR_the_social_course_desc:0 "Ah, the social course of Novorossiya, where the waves of apathy crash against the shores of progress. In this ever-evolving landscape, the leaders of the land grapple with the challenge of reconnecting a disillusioned population with the spirit of hope and purpose. Mr. Pushilin and his advisors embark on a quest to rekindle the flickering embers of hope. We recognize that the key lies in addressing the root causes of apathy and providing a renewed sense of direction and purpose."
DPR_new_military_model:0 "New military model"
DPR_new_military_model_desc:0 "In this audacious transformation, the Novorossiya military militia takes a quantum leap and transitions into a force of indomitable warriors under the wings of private military companies directly controlled by the state. We're talking about a seismic shift, a metamorphosis that will send shockwaves through the battlefield! The Novorossiya PMC brigades, like a pack of wolves hungry for victory, will be armed to the teeth with cutting-edge weaponry and equipped with state-of-the-art military hardware. They will move swiftly, strike with precision, and dominate the battlefield like an unstoppable force of nature!"
DPR_thewholeworldwillknowabouttheexploitsofthedonbas:0 "The whole world will know about the exploits of the Donbas!"
DPR_thewholeworldwillknowabouttheexploitsofthedonbas_desc:0 "In the crucible of conflict, the Donbas region has birthed heroes like no other. These fearless warriors, with hearts ablaze and spirits unyielding, have risen from the ashes of adversity to showcase their mettle on the global stage. Their battle cries will echo across continents, inspiring awe and reverence among all who bear witness. Their exploits will be whispered in the darkest corners of military strategy rooms and recounted in the grand halls of power. The world will marvel at their unwavering resolve and their tactical brilliance, for the warriors of Donbas know no fear, and their prowess on the battlefield is unmatched."
DPR_treatment_of_the_population:0 "Treatment of the population"
DPR_treatment_of_the_population_desc:0 "Amidst the chaos of battle, humanitarian aid flows like a lifeline, delivering vital supplies, food, and medical assistance to those affected by the strife. Organizations and individuals from around the world rally together, driven by a shared sense of humanity, to alleviate the suffering and uplift the spirits of the Donbas population."
DPR_a_face_no_longer_needed:0 "A face no longer needed"
DPR_a_face_no_longer_needed_desc:0 "With a calculated maneuver, Pushilin has orchestrated a political coup, removing Pasechnik from the stage with ruthless precision. The once-favored face of the opposition is now deemed unnecessary, a mere relic of a bygone era. Pushilin, the victor, exercises his authority, sending a clear message that dissent will not be tolerated under his rule."
DPR_ending_the_loser_general:0 "Ending the loser general"
DPR_ending_the_loser_general_desc:0 "Igor Strelkov, once hailed as a formidable military strategist, now stands as a symbol of failure and incompetence. His strategic blunders and misplaced bravado have cost countless lives and led to devastating defeats on the battlefield, like defeat of Slavyansk. The consequences of his leadership have become undeniable, and the powers that be have deemed it necessary to hold him accountable for his actions."
DPR_shutting_up_the_old_mop:0 "Shutting up the old mop"
DPR_shutting_up_the_old_mop_desc:0 "As the doors to her prison cell close, Vitrenko is relegated to the periphery of the political arena, her ideals dismissed and her voice muffled. The powers that be seek to silence her opposition, deeming it a hindrance to their vision of progress. In their eyes, she represents an outdated ideology, a relic of the past that must be swept under the rug."
DPR_we_defeated_nazism:0 "We defeated Nazism"
DPR_we_defeated_nazism_desc:0 "Attention, comrades and defenders of justice! Gather 'round and let me regale you with the glorious tale of how we vanquished the vile specters of Nazism and the fascist junta in the heroic Donbass war. Prepare yourselves for a rousing dose of victory propaganda that will ignite your spirits and fuel your pride!"
DPR_returns_of_the_population:0 "Returns of the population"
DPR_returns_of_the_population_desc:0 "In the aftermath of turmoil and strife, our nation stood strong, beckoning its sons and daughters to come back home. The call was answered by the brave souls who had been displaced, scattered like seeds in the wind. They yearned to return to their roots, to rebuild their lives and reclaim what was rightfully theirs."
DPR_recognition_from_russia:0 "Recognition from Russia"
DPR_recognition_from_russia_desc:0 "In the annals of history, a pivotal moment has arrived when the Russian Federation, with its discerning gaze, cast its eyes upon us and acknowledged our worth. It is a testament to our strength, resilience, and unwavering commitment to our shared values."
DPR_diplomatic_missions:0 "Diplomatic missions"
DPR_diplomatic_missions_desc:0 "Through diplomatic channels and discreet negotiations, our envoys build bridges of understanding, forging alliances with nations whose support is instrumental in our quest. They speak the language of diplomacy, navigating intricate political landscapes and persuading decision-makers to see the undeniable merit of recognizing Novorossia's independence."
DPR_promises_of_demobilisation:0 "Promises of demobilisation"
DPR_promises_of_demobilisation_desc:0 "With eloquent speeches and grand gestures, politicians paint vivid pictures of a peaceful tomorrow. They vow to dismantle the war machine, to bring an end to conflict, and to embrace an era of tranquility. These promises sound like sweet melodies, resonating deeply within the weary hearts of a war-torn population."
DPR_invite_experts:0 "Invite experts"
DPR_invite_experts_desc:0 "Through our partnership, we can benefit from the advanced military technologies, resources, and strategic thinking that Russia has to offer. Our armed forces can leverage these advantages to enhance their operational readiness, modernize their equipment, and develop cutting-edge tactics that align with contemporary warfare."
DPR_preparing_to_vote:0 "Preparing to vote"
DPR_preparing_to_vote_desc:0 "With careful deliberation and extensive preparations, we find ourselves at the threshold of an important choice. The people of Novorussia, armed with the power of their voices, are preparing to exercise their democratic right to vote. This vote will determine whether we align our destinies with the mighty nation of Russia."
DPR_golosovanie:0 "Golosovanie"
DPR_golosovanie_desc:0 "I must address a situation where something has gone awry during the voting process..."
