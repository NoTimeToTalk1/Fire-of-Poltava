l_russian:
cherkasy.13.t:0 "Civil discontent"
cherkasy.13.d:0 "Following the escalation of the political situation, the Cherkasy City Council, with Anatoliy Semynoha as its chairman, expressed no confidence in Anatoliy Bondarenko and demanded his immediate resignation from the post of city leader. Semynoha, the head of the All-Ukrainian Association "Cherkasy", declares his readiness to take over and lead the city, offering his vision of development and improvement of living conditions for citizens. The next steps in this political battle for power in Cherkasy remain uncertain, but the tense standoff between Bondarenko and Semynoha adds to the complexity of the conflict."
cherkasy.13.a:0 "It seems the mayor has no other choice..."
cherkasy.12.t:0 "Military Discontent"
cherkasy.12.d:0 "Reigniting the tense situation in Cherkasy, the military, led by General Serhiy Chervonopissky, expressed no confidence in the city's new leader, Anatoliy Semynoza, and demanded his immediate resignation. Openly accusing Seminoza of ineffective leadership and inability to ensure the city's security, they call for the transfer of power to the head of the Afghanistan Veterans party and experienced general Serhiy Chervonopissky. This decision of the military creates a new round of political instability and threatens further armed conflict in the city."
cherkasy.12.a:0 "Millitarist come into power"
cherkasy.12.b:0 "Status QUO save us"
cherkasy.8.t:0 "The victory of Cherkasy"
cherkasy.8.d:0 "Deep in the heart of Ukraine, between the cities of Cherkasy and Uman, a difficult conflict broke out that required effective intervention and resolution. Cherkasy, in order to ensure the safety of its population and protect its national interests, carried out an impressive special military operation that brought them a decisive victory. "
cherkasy.8.a:0 "Next stage - Uman!"
cherkasy.9.t:0 "Defeat of Cherkasy"
cherkasy.9.d:0 "In a high-stakes special military operation, Cherkasy suffered a significant setback in its attempt to regain control over Uman. Despite careful planning and strong determination, the operation faced unforeseen challenges, including well-fortified defenses and strategic countermeasures employed by Uman's forces. The defeat in this operation dealt a blow to Cherkasy's aspirations, highlighting the need for a reassessment of their approach and a regrouping of their forces."
cherkasy.9.a:0 "Wasted..."
cherkasy.10.t:0 "Triumph of Uman"
cherkasy.10.d:0 "As tensions escalated between Cherkasy and Uman, Cherkasy initiated a special military operation with the aim of asserting its control over Uman. However, to the surprise of many, Uman, driven by fierce determination and strategic brilliance, emerged victorious in the face of adversity. With exemplary coordination and unwavering resolve, Uman's forces outmaneuvered and outmatched the Cherkasy offensive, securing a remarkable triumph that would be remembered as a testament to their resilience and indomitable spirit."
cherkasy.10.a:0 "We did it!"
cherkasy.11.t:0 "The victory of Cherkasy"
cherkasy.11.d:0 "We were convinced that our forces would be strong enough to defend our land. But Cherkasy demonstrated impressive strategic genius and perfect coordination of their troops. We tried to defend ourselves, but our command lacked coordination and strategic thinking, which proved to be critical in such a difficult situation. Cherkasy was able to resolve the situation in the moment and use every chance to attack."
cherkasy.11.a:0 "We'll show them yet..."
Depressed_bondarenko:0 "Depressed"
allies_in_the_west:0 "Allies in the West"
CHR_old_style_genstuff:0 "Old-style General Staff"
CHR_old_style_genstuff_desc:0 "Cherkasy took a historical approach by introducing an old-style general staff for its military. This unconventional step revitalised the city's defence capabilities, improving coordination and strategic skill. Cherkasy has become a formidable stronghold that will surprise friends and enemies alike with its effective military operations."
CHR_renovation_programme_2:0 "Renovation Programme"
CHR_renovation_programme_2_desc:0 "A large amount of regional resources are invested in infrastructural renovation. Trying to undo the Ukraine's reputation of having awful roads comes at a cost, but positive consequences for the people are hard to underestimate."
bondarenkobad:0 "Bondarenko feels bad"
bondarenkogood:0 "Bondarenko feels good"
cherkasy.1.t:0 "The council meeting"
cherkasy.1.d:0 "As the council members gathered, the room was filled with anticipation and a sense of responsibility. Mayor Bondarenko, with his thoughtful gaze and determined demeanor, took the center stage. He knew that the weight of his decisions could shape the future of Cherkasy and the lives of its residents.\nWith a deep understanding of the city's challenges, Mayor Bondarenko addressed the room, emphasizing the pressing needs of the community. He presented an ambitious plan that aimed to improve infrastructure, create jobs, and enhance public services. It was a bold vision that would require courage and resilience to overcome the obstacles that lay ahead."
cherkasy.1.a:0 "Ok."
cherkasy.2.t:0 "After Meeting"
cherkasy.2.d:0 "Mayor Bondarenko's high hopes and desire for bold reforms have been met with unfavourable circumstances. After announcing his plans at a meeting with local officials, he faced an implacable wave of criticism that came down on him.\nEvery word of vicious criticism struck Bondarenko as a painful blow to his inner world. Doubts about his ability to make the necessary changes left an imprint on his mind, turning it into a forgotten and gloomy place. His confidence gradually faded, leaving room for doubt and loss of direction."
cherkasy.2.a:0 "Ok."
cherkasy.3.t:0 "The Meeting with Kobzar"
cherkasy.3.d:0 "In the middle of a cold morning, Anatolii Bondarenko was walking thoughtfully along a quiet road leading to the grave of the great kobzar Taras Shevchenko in the picturesque town of Kaniv. The wind was rustling furiously through the treetops, and the mayor's heart was full of conflicting emotions.\n\nWas this walk doomed to failure, adding even more disappointment to Anatoliy's heart? Or was it an inspiration that lifted his emotional state and revived his faith in his future achievements?"
cherkasy.3.a:0 "Confronting memories..."
cherkasy.3.b:0 "Finding strength..."
cherkasy.4.t:0 "Confronting memories"
cherkasy.4.d:0 "Slowly, Bondarenko approached the kobzar's grave. His eyes tightened with sadness as memories of moments of failure, criticism and doubt covered him like a dark horizon. For a long time, he contemplated the grave, wondering if he deserved the ups and downs he had dreamed of."
cherkasy.4.a:0 "It's hard, it's hard to live in the world..."
cherkasy.5.t:0 "Finding strength"
cherkasy.5.d:0 "Then, finally, something began to change. Breaking free from the clutches of doubt, Bondarenko felt the sun breaking through the clouds and illuminating his face. He lifted his head, breathed a lungful of fresh air and changed his vision.\nAnatoliy's soul was filled with new courage and determination. He remembered the words of the great Shevchenko about the unshakable will and the need to move forward. This shower of new feelings boosted his energy"
cherkasy.5.a:0 "Fight - and you will overcome..."
cherkasy.6.t:0 "Meeting in a bad emotional state"
cherkasy.6.d:0 "Given that Bondarenko was in a difficult emotional state, the meeting with representatives of the Batkivshchyna party was a failure. The tense atmosphere of the meeting, caused by accumulated stress and doubts, hindered cooperation and mutual understanding. Harsh words and clashes of views did not allow for constructive solutions, and the meeting ended without any real results for the city of Cherkasy."
cherkasy.6.a:0 "We will wind another way..."
cherkasy.7.t:0 "Meeting in a good emotional state"
cherkasy.7.d:0 "Filled with faith and a positive emotional state, Bondarenko met with representatives of the Batkivshchyna party and felt fully accepted and supported. His determination and starry-eyed dream of a better future for Cherkasy impressed everyone present. As a result of the meeting, Cherkasy received significant assistance from the Ukrainian Social Republic, which paved the way for the implementation of ambitious projects, improvement of infrastructure and ensuring the well-being of the city and its residents."
cherkasy.7.a:0 "Good!"
CHR_clearly_set_the_goal:0 "Clearly Set the Goal"
CHR_clearly_set_the_goal_desc:0 "Cherkasy finds itself at a critical juncture. Recognizing the need for a clear direction and purpose, the city's leadership embarks on a focused and ambitious mission. Through strategic planning, effective governance, and rallying the people, Cherkasy sets its sights on achieving a specific and inspiring goal, bringing unity and renewed determination to the city and its inhabitants."
CHR_cherkasystands:0 "Cherkasy Stands!"
CHR_cherkasystands_desc:0 "Amidst the chaos, Cherkasy emerged as a symbol of resilience and determination, defying the odds and standing strong against internal strife and external pressures. The city's unwavering spirit and united front became an inspiration for the rest of the country, as Cherkasy stood as a beacon of hope in a turbulent era."
CHR_strenghten_ties_with_brothers:0 "Strenghten Ties With Brothers"
CHR_strenghten_ties_with_brothers_desc:0 "With the goal of unity in mind, the city's leadership focuses on improving ties with the Ukrainian Social Republic, a political entity that emerged amidst the nation's turmoil. Additionally, they seek to establish closer cooperation with the influential political party "Bat'kivschyna" (Fatherland), aiming to forge alliances and build a united front against common challenges, thereby strengthening the bonds of brotherhood within Ukraine."
CHR_make_promise_to_the_people:0 "Make Promise to the People"
CHR_make_promise_to_the_people_desc:0 "Recognizing the importance of connecting with its citizens, Cherkasy embarks on a transformative focus to make promises and commitments to its people."
CHR_new_economic_policy:0 "New Economic Policy"
CHR_new_economic_policy_desc:0 "In a bold move to drive economic growth and stability, Cherkasy adopts a comprehensive focus on implementing a new economic policy. Recognizing the importance of modernization and development, the city's leadership introduces reforms aimed at attracting investment, promoting entrepreneurship, and fostering innovation."
CHR_infrastructural_innovations:0 "Infrastructural Innovations"
CHR_infrastructural_innovations_desc:0 "Cherkasy sets its sights on transforming its infrastructure through a focused approach on innovative solutions. Understanding the crucial role of modern infrastructure in driving progress, the city's leadership spearheads ambitious initiatives to upgrade transportation networks, enhance utilities, and develop cutting-edge urban systems."
CHR_armscontracts:0 "Arms Contracts?"
CHR_armscontracts_desc:0 "In pursuit of strengthening its defense capabilities, Cherkasy explores the option of entering into arms contracts. Recognizing the importance of acquiring modern and reliable weaponry, the city's leadership seeks opportunities to engage in agreements with domestic and international arms manufacturers."
CHR_take_care_of_the_army:0 "Take Care of the Army"
CHR_take_care_of_the_army_desc:0 "Recognizing the paramount importance of a strong and well-prepared military, Cherkasy prioritizes a focus on taking care of its armed forces. The city's leadership understands that a capable and supported army is vital for defense, security, and safeguarding the city's interests."
CHR_form_combatant_units:0 "Form Combatant Units"
CHR_form_combatant_units_desc:0 "In response to the evolving security landscape, Cherkasy takes decisive action to form specialized combatant units. Recognizing the need for adaptable and skilled forces, the city's leadership establishes dedicated units trained in various combat disciplines and tactics."
CHR_marchtothewest:0 "March to the West!"
CHR_marchtothewest_desc:0 "With mounting tensions and the need to establish control over the region, Cherkasy prepares for a decisive move towards the west, specifically targeting Uman."
