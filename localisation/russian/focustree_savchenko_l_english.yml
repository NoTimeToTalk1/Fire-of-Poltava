l_english: 
isr_savchenko:0 "Savchenko"
isr_savchenko_desc:0 "According to the results of the regional elections, Nadiya Savchenko, a well-known figure in the context of the war with separatist forces in Donbas, won fairly. Her campaign was really impressive, so let's see how she will implement her ideas."
isr_greatest_success:0 "Greatest Success"
isr_greatest_success_desc:0 "After the triumphant announcement of the election results, Savchenko's beautiful speech, and an evening party in honour of the restoration of democracy in Donbas, the newly elected government gathered in the President's office. "Dear colleagues, I congratulate you. We have achieved our goal. It's time to get to work, and finally show people what we are capable of..." she said."
isr_our_true_intention:0 "Our True Intention"
isr_our_true_intention_desc:0 "We win the election, so we needed to show people a pretty picture. It worked, and that's why it's bad. Fooled by a century of corruption and lies under both the Soviet and Ukrainian governments, they are ready to believe anything if it sounds good enough. In order to solve not only this problem but also other problems of our society and the region, we need a truly radical reformation of everything. And everything here really means everything!"
isr_arrest_akhmetov:0 "Arrest Akhmetov"
isr_arrest_akhmetov_desc:0 "The era of oligarchic domination of the Donbas industry is over. Rinat Akhmetov, the Donetsk coal magnate, has been a pain in the ass to all businesses and even to the government in the region since the early 2000s, but it's coming to an end. We need to capture this Tatar and put an end to his criminal syndicate once and for all."
isr_arresttheirmaster:0 "Arrest Their Master..."
isr_arresttheirmaster_desc:0 "Even though Kryvonos de facto handed over power to us freely, we have no more reason to trust him than we do to engage in diplomatic negotiations with the Kyiv or Moscow regimes. With his high profile among the military and the population, he could become a serious threat in the future, so it's better to deal with him, and at the same time all the future haemorrhoids, now."
isr_make_them_loyal:0 "Make Them Loyal"
isr_make_them_loyal_desc:0 "Despite the sweet look of Akhmetov's abandoned business, its nationalisation may be a big gamble for us. Why would we create new enemies and distrust all the big businessmen in the region if we could just put the right people in the right places and avoid all the negative consequences?"
isr_nationalise_enterprises:0 "Nationalise Enterprises"
isr_nationalise_enterprises_desc:0 "After the arrest of the main Donetsk gopnik, nothing can stop the state from taking over his juicy companies and enterprises. Other major players in the region may not like this, but who cares what they think when we have a real, capable army and a loyal police force? Akhmetov's factories will greatly boost the economic and industrial capacity of the region and provide us with the necessary resources to implement our future plans."
isr_andhisdogs:0 "...And His Dogs"
isr_andhisdogs_desc:0 "After the arrest of Kryvonos, discontent spread through the highest army circles. His former comrades will obviously not forget what they did to us, and will undoubtedly try to take revenge. This cannot be allowed to happen. We need stability to achieve our goals, and if we need to put a few dozen more people behind bars to maintain stability, we will gladly do so."
isr_form_a_new_cabinet:0 "Form a New Cabinet"
isr_form_a_new_cabinet_desc:0 "Our new cabinet that will be work for Ukraine and her people!"
isr_final_cleaning:0 "Final Cleaning"
isr_final_cleaning_desc:0 "When we came to power, we were shocked by the situation in the army. Loyalty exclusively to individual commanders, political or religious figures,... This must end. There is only one type of order in the army that is genuine, the one that comes from the General Staff. We will not tolerate the politicisation of the Armed Forces and their further splitting into separate warring units. We simply cannot afford it."
isr_loyal_army:0 "Loyal Army"
isr_loyal_army_desc:0 "Having dealt with outside influences on our army, we must ensure that it is fully loyal to our government. A loyal Armed Forces are the key to our main goal, the unification of Ukraine, so skipping this step will definitely bring trouble to us in the future. So, ladies and gentlemen, it's time for the general inspections!"
isr_purge_the_deputies:0 "Purge the Deputies"
isr_purge_the_deputies_desc:0 "Having dealt with the subordination of our troops to outside forces, it is time to do the same in the bureaucratic and administrative systems. Officials paid off by influential businessmen and politicians not only damage our image but are also a significant obstacle to major social and administrative reforms that must be removed."
isr_seize_the_power:0 "Seize the Power"
isr_seize_the_power_desc:0 "Once all the necessary steps have been taken, there is nothing left to prevent us from establishing our absolute power. With the army and the police, all the security forces on our side, no one will dare to raise a finger against us. Of course, achieving authoritarian and absolute power is not our target, but it is necessary for us to achieve our highest goal. When Kryvonos spoke about the impossibility of uniting the state militarily with a democratic government, he was right, but he was too short-sighted to miss his chance."
isr_proclaim_us_legitimate:0 "Proclaim Us Legitimate"
isr_proclaim_us_legitimate_desc:0 "Both Zelenskyy and Poroshenko emphasise the legitimacy of their government. But let's be honest, they have both shown quite clearly that they are incompetent failures who cannot even be trusted with a garden, not to mention the largest state in Europe. We have had enough of these numerous warlords who claim to be the law and order and of the brainless deputies in Kyjiv. Our tough actions have proved that we have the ability to keep power from populists and that it is up to us to restore Ukraine's unity. We are the only legitimate government, and the truth is only with us!"
isr_iron_bastion:0 "Iron Bastion"
isr_iron_bastion_desc:0 "As we emphasised during the election campaign, our main goal is to preserve the unity and sovereignty of Ukraine. And by sovereignty we mean not only the complete rejection of any diplomatic negotiations with Moscow but also the rejection of closer than necessary contacts with any major power on the planet, including the United States. Ukraine will be independent, and no one else will have the right to dictate to her their own demands!"
isr_contacts_with_the_red_cross:0 "Contacts With the Red Cross"
isr_contacts_with_the_red_cross_desc:0 "The situation in our region is not the best, and this is not new. The outbreak of some local epidemics and the lack of food and drinking water in remote and deserted regions that have been neglected since the days of separatist rule are taking a heavy toll not only on our reputation but also on the full functionality of our economy. By using our many contacts in the Red Cross and officially requesting humanitarian aid, we can at least partially alleviate the situation, giving us time to resolve the problem."
isr_solve_humanitarian_problems:0 "Solve Humanitarian Problems"
isr_solve_humanitarian_problems_desc:0 "With the help of the Red Cross, the situation has indeed improved. But there are still widespread shortages of drinking water and food, and we cannot simply put this problem aside. Using all our available funds, supplies, and facilities, we must finally resolve the crisis if we truly want prosperity in Donbas."
isr_no_more_deception:0 "No More Deception"
isr_no_more_deception_desc:0 "Gentlemen, that's enough. People have had enough of the lies that are poured out of their television screens every single day like a storm of steel nuts. It is time for truthful television. It is necessary to revoke the broadcasting licences of all pro-Russian and far-right television channels and to implement a policy of forced pacification of analytical programmes. People deserve to know the truth, the pure truth, without false sauces."
isr_win_the_trust_of_the_people:0 "Win the Trust of the People"
isr_win_the_trust_of_the_people_desc:0 "With the ban on unreliable TV channels, people began to believe more in government statements. We honestly did not expect such a quick result from our actions. In any case, the full trust of the people is exactly what we need now. Even with a loyal army and a strong economy, we will not be able to do anything if we do not get people's support, so it is time to do just that."
isr_fix_the_law:0 "Fix the Law"
isr_fix_the_law_desc:0 "Despite all the reforms we have successfully carried out, the dissatisfied, having hired lawyers, allow themselves to claim that our actions are illegal, relying on the constitution adopted by Kryvonos and still in force. If these bastards really want to confront us in this way, we will be happy to introduce several amendments that will legitimise our actions and leave them in a hopeless situation."
isr_project_of_the_new_constitution:0 "Project of the New Constitution"
isr_project_of_the_new_constitution_desc:0 "Despite numerous amendments that have de jure legitimised all our actions, the current constitution is outdated in some places and was written by those who are now rotting behind bars. The state must have a constitution, and if we want to claim to be a legitimate Ukrainian government, we cannot succeed without it. We need to gather the best lawyers in the region in our office and start drafting a new constitution that will meet the standards of our country."
isr_iron_lady:0 "Iron Lady"
isr_iron_lady_desc:0 "Having succeeded in carrying out radical social, economic, judicial and military reforms, we have undoubtedly proved our government's full ability to fulfil its tasks and its ability to truly govern not only a small region but the whole country. Nadiya Savchenko, who has undoubtedly put all her efforts into rebuilding the backward and starving Donbas, has become like a mother to us, trying to create a completely new, truly right generation of Ukrainians. God bless our Iron Lady!"

