l_russian:
 LOADING_TIP_0:0 "Україна без Криму - як птах без ноги. \n- Pavlo Skoropadskyy"
 LOADING_TIP_1:0 "Життя переможе смерть, а світло - темряву. \n- Volodymyr Zelenskyy"
 LOADING_TIP_2:0 "Проблема України в тому, що нею керують ті, хто не дбає про неї. \n- Mykhaylo Grushevskyy"
 LOADING_TIP_3:0 "...ви як молдавани...\n- Viktor Yushchenko"
 LOADING_TIP_4:0 "Влада без опозиції призводить до культу особи.\n- Leonid Kravchuk"
 LOADING_TIP_5:0 "Територію нашої країни треба зробити... небезпечною для проживання наших громадян...\n- Viktor Yanukovych"
 LOADING_TIP_6:0 "Не будемо говорити про погане, краще зробимо...\n- Viktor Yanukovych"
 LOADING_TIP_7:0 "Смерть Баригам!\n- Petro Mostavchuk"
 LOADING_TIP_8:0 "Ти шо, довбойоб?\n- Hennadiy Moskal"
 LOADING_TIP_9:0 "Moscow set fire to! Matryoshka break! Bear shoot, put into hollow, fuck bear!\n- Volodymyr Zelenskyy"
 LOADING_TIP_10:0 "Мені потрібні боєприпаси. Не літак\n- Volodymyr Zelenskyy"
 LOADING_TIP_11:0 "Гетеросексуали будуть покарані згідно з законом.\n- Police of the LPR"
 LOADING_TIP_12:0 "Пішов ти нахуй зі своїм телеканалом, ти мене зрозумів?\n- Hennadiy Moskal"
 LOADING_TIP_13:0 "Миша, у тебя лицо скучное. Тебе никто денег не даст.\n- Hennadiy Kernes"
 LOADING_TIP_14:0 "І сьогодні у завтрішній день, не кожен може дивитися. Точніше, не тільки кожен може дивитичся, але декілька можуть це зробити\n- Vitaly Klitschko"
 LOADING_TIP_15:0 "No need to whine. You have to pick up a shovel and feed your family.\n- Mykola Azirov"
 LOADING_TIP_16:0 "There is nothing worse than courage when it is doomed.\n- Imam Alimsultanov"
 LOADING_TIP_17:0 "And what is interesting - the heart in a hummingbird is almost three times larger than the stomach. If only people had it. \n- Lina Kostenko"
 LOADING_TIP_18:0 "Україна починається з тебеUkraine begins with you. \n- Vyacheslav Chornovil"
 LOADING_TIP_19:0 "If you don't have a harmony, take a harmon and harmonize! \n- Andrey Kuzmenko"
 LOADING_TIP_20:0 "Пиздуйте нахуй отсюда, пидорасы йобаные \n- Dmytro Gordon"
 LOADING_TIP_21:0 "Чому дитяче порно блокується, а зброя ні? \n- Anatoly Shariy"
 LOADING_TIP_22:0 "Щоб спинити русофобію, тобі потрібно престати срати перед сусідовими вхідними дверима. \n- Evgeniy Roizman"
 LOADING_TIP_23:0 "Наша русофобія недостатня. \n- Serhiy Sternenko"
 LOADING_TIP_24:0 "Я куплю вам ананасы, но они будут из кирпичей. И вы будете их кушать. \n- Hennadiy Kernes"