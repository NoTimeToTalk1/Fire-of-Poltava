l_russian:
 AFU_strikes:0 "Національні страйки"
 AFU_strikes_desc:0 "Як ми і очікували, посилення квот лише ще більше розлютило і без того незадоволених людей. Мало того, що у великих містах майже щодня проходять акції протесту, робітники масово страйкують, а люди взагалі не переймаються навіть комендантською годиною. Якщо так триватиме, виробництво просто зупиниться, і навіть армія не допоможе. Потрібно діяти, поки ми ще можемо, і тут у нагоді стає метод батога і пряника..."
 AFU_ssojaitsa:0 "ССО"
 AFU_ssojaitsa_desc:0 "Сили спеціальних операцій (ССО) - найбільш елітна частина Збройних сил. Всі бійці цих підрозділів є вершиною майстерності наших військових. Розвідники та інші фахівці, присутні в їхніх лавах, також роблять їх незамінними, розширюючи спектр їхнього застосування. Незважаючи на свою приналежність до Збройних Сил, вони також використовуються як професійна заміна національної поліції, беруть участь в антитерористичних операціях та охороні правопорядку. Одним словом, ССО може боротися, як казав Петлюра, з "московськими вошами" та "українськими гнидами"."
 AFU_martial_law:0 "Військовий стан"
 AFU_martial_law_desc:0 "Після раптового нападу з іншого боку лінії розмежування стало зрозуміло, що рано чи пізно заморожений конфлікт на Донбасі може спалахнути. Тому на підконтрольних уряду територіях Донецької та Луганської областей було запроваджено воєнний стан. Хоча воєнний стан є тягарем для регіональної економіки та місцевого населення, він має вирішальне значення для підтримання порядку на наших територіях. Однак, оскільки ситуація в Україні повільно погіршується, ми не можемо бути впевнені, як довго ми зможемо його підтримувати, оскільки ці тенденції погіршуються з кожним днем."
 AFU_after_victory:0 "Ціна перемога"
 AFU_after_victory_desc:0 "Хоча остання пилюка війни вже вляглася, її наслідки не зникають миттєво. Значна частина Донбасу все ще вороже налаштована до української влади - це те, що ви отримуєте після більш ніж 5 років безперервної російської пропаганди в неспокійному, зруйнованому війною регіоні. І хоча інтеграційні заходи, як малі, так і великі, вже були розпочаті, може знадобитися час, щоб повернутися на правильний шлях після таких радикальних змін..."
 AFU_filtration:0 "Фільтрація"
 AFU_filtration_desc:0 "На жаль для Тимчасового уряду, більшість населення все ще перебуває у добрих стосунках з Росією і присягає на вірність тому, що раніше було сепаратистським урядом. Нещодавно було запроваджено невеликий репресивний захід - відтепер кожного, хто на словах стає на бік Росії, будуть допитувати і переслідувати, це єдиний спосіб навести порядок на Донбасі..."
 industrial_legacy:0 "Промислова спадщина"
 industrial_legacy_desc:0 "З першої половини 20-го століття промисловий район Донбасу був і залишається найбільш розвиненим регіоном України - за часів Російської імперії, СРСР та сучасної України. Зосереджений переважно навколо вугільних шахт і металургійних заводів, він став основою економіки регіону. Однак через неефективне управління за радянських часів, вкрай несправедливу приватизацію та корупцію в незалежній Україні він перетворився на подобу відсталої промислової технології та депресивний постіндустріальний регіон, схожий на північ Англії у Великій Британії, який з часом втратив значну частину свого величезного економічного потенціалу, а вугільні шахти стали збитковими. Після проросійських повстань у 2014 році більшість цих активів перейшли під контроль невизнаних республік, а згодом були захоплені і вивезені до Російської Федерації, залишивши регіон у жахливому становищі." 
 AFU_pro_russian_sentiments:0 "Проросійські погляди"
 AFU_pro_russian_sentiments_desc:0 "У багатьох південно-східних регіонах України з моменту здобуття незалежності значна частина населення симпатизувала Росії, причому в Луганській і Донецькій областях - більше, ніж деінде. Через радянську політику русифікації та Голодомор 1930-х років, а також урбанізацію та російську трудову міграцію регіон зазнав значного впливу Росії. Як наслідок, навіть після проросійських повстань і їхньої неспроможності довести альтернативу "кращому життю" під російським правлінням, дві області, підконтрольні Україні, завжди голосували за проросійські партії, такі як ОПЗЖ. Хоча проблема може бути дещо перебільшеною, все ще є люди, які підтримують російське правління над українським."
 AFU_nationalist_agendas:0 "Вплив правих"
 AFU_nationalist_agendas_desc:0 "Під час проросійських повстань на сході в 2014 році багато українських патріотів та інших небайдужих до незалежності України пішли добровольцями воювати на фронті на Донбасі, відігравши згодом важливу роль у стримуванні просування Росії на захід. Найвідомішим і найвідомішим добровольчим підрозділом є батальйон "Азов". Сформований ультраправими футбольними фанатами, він брав участь у захисті України і став невід'ємною частиною наших Збройних сил. Хоча деякі ліві та ліберальні журналісти ставлять під сумнів їхню ідеологію, більшість українців, навіть деякі проросійськи налаштовані, підтримують їх."
 AFU_apathy_of_the_population:0 "Апатія населення"
 AFU_apathy_of_the_population_desc:0 "Як і росіяни, жителі Донбасу по обидва боки конфлікту відчувають апатію щодо політичної ситуації в регіоні. "Просто залиште нас у спокої" - ось що сказали б багато людей на цих територіях. Ці люди складають більшість населення, переважно середнього та похилого віку. Це може стати проблемою, оскільки через свою аполітичність ця більшість воліла б не бути залученою до потенційної ескалації конфлікту."
 AFU_disorganised_administration:0 "Дезорганізована адміністрація"
 AFU_disorganised_administration_desc:0 "Після втрати центральною владою в Києві контролю над Донецькою та Луганською областями ми зіткнулися з проблемами в управлінні регіоном. Вирішення цієї проблеми - питання часу, але це, безумовно, ускладнить життя наших громадян і роботу наших бюрократів."
 AFU_continue_the_state_of_emergency:0 "Продовження надзвичайного стану"
 AFU_continue_the_state_of_emergency_desc:0 "Збройним силам немає необхідності скасовувати надзвичайний стан, принаймні наразі. Хоча це непопулярне рішення серед населення, його необхідність розуміють майже всі. Армія використає надзвичайний стан для наведення порядку в своїх справах, можливо, навіть спробує вивести своє становище зі статусу "безнадійного""
 AFU_improved_training_methods:0 "Удосконалені методи навчання"
 AFU_improved_training_methods_desc:0 "Після ретельних роздумів Збройні Сили вирішили покращити якість своїх військ. Навчальні програми тепер вимагають більше часу і ресурсів, але це окупається майже елітними військами, готовими до важких боїв!"
 AFU_broader_training_plan:0 "Ширший навчальний план"
 AFU_broader_training_plan_desc:0 "Покладання армії на ополченців, хоча це і не дуже популярний вибір, було зрозумілим. Як у минулому, так і в сьогоденні ополченці довели, що вони є ефективним інструментом у боротьбі за незалежність України. Незважаючи на значну втрату якості, цей новий метод значно перевершує кількісно, що може бути саме тим, що потрібно Збройним силам зараз."
 AFU_millitary_administration:0 "Військова адміністрація"
 AFU_millitary_administration_desc:0 "Те, що раніше було хаотичним нагромадженням армійських угруповань, які чекали на накази зі столиці, тепер перетворилося на функціональну, самодостатню військову машину! Збройні сили України тепер можуть повністю керувати власними справами, як військовими, так і цивільними, не потребуючи жодних наказів - вони вже знають, що робити."
 AFU_defensive_strategy:0 "Оборонна стратегія"
 AFU_defensive_strategy_desc:0 "Збройні сили зараз адаптували свою стратегію оборони. Незалежно від того, що вони планують робити далі, вони не хочуть повторювати помилок попереднього наступу сепаратистів і підготувалися заздалегідь."
 AFU_ce_baza_ce_genshtab:0 "Покращений генеральний штаб"
 AFU_ce_baza_ce_genshtab_desc:0 "Вище командування Збройних сил вирішило реформувати Генеральний штаб, щоб зробити його більш чутливим до вимог часу і підвищити ефективність управління армією. Багато генералів залишили свої посади, залишивши їх молодим та амбітним офіцерам, які з ентузіазмом впроваджують власні методи ведення війни."
 AFU_ready_military:0 "Готове військо"
 AFU_ready_military_desc:0 "Генеральний штаб, судячи з їхніх дій, подбав про те, щоб їхні війська більше ніколи не піддавалися раптовим атакам. Будь-який крок сепаратистів - це крок, якого вони очікують. Крок, на який вони вже знають, як реагувати."
 AFU_local_arms_manufacturing:0 "Місцеве виробництво зброї"
 AFU_local_arms_manufacturing_desc:0 "Донбас - промислово багатий регіон, тому Збройні сили вирішили максимально використати ситуацію, що склалася. Заводи, подекуди навіть не призначені для військового виробництва, нарешті відбудовані та введені в експлуатацію. Тепер, поки їхні суперники відчайдушно шукають зброю, вони можуть озброїтися самі!"
 AFU_support_UKR:0 "Підтримка з Київа"
 AFU_support_UKR_desc:0 "Де-юре Збройні сили України все ще функціонують як частина старого українського режиму і тому лояльні до Києва. Формально це робить все, що вони отримують зі столиці, не "допомогою", а "посилками з затримкою"."
 AFU_support_PRH:0 "Підтримка від Порошенка"
 AFU_support_PRH_desc:0 "Як і очікувалося, "президент-ізгой" погодився постачати ЗСУ. Чи то для того, щоб дійсно допомогти армії, чи для того, щоб підвищити власну легітимність в очах народу, але факт залишається фактом: допомога є, вона є і вона потрапляє на фронт - все інше не має значення."
 AFU_bezlad:0 "Безлад"
 AFU_bezlad_desc:0 "Хоча основна загроза минула, робота, навіть у цьому регіоні, ще далека від завершення. Неймовірна кількість невирішених бюрократичних питань, величезні просепаратистські настрої серед населення, нагальна потреба відбудови міст - всі ці болючі шрами потрібно заліковувати, інакше весь Тимчасовий уряд буде гнити зсередини. Час розібратись з цим безладом!"
 AFU_nationalist_agendas_2:0 "Націоналістичні програми"
 AFU_nationalist_agendas_2_desc:0 "З моменту прийняття рішення про засудження ультраправих елементів у лавах Збройних сил, здавалося б, нічого не змінилося. "Азов" все ще там, ультраправих солдатів не звільнили, все по-старому, чи не так? Реальні зміни майже непомітні. Вище командування просто зробило їх усіх трохи тихішими, б'ючи по розповсюдженню, а не по окремим особам. Наразі, без належної пропаганди, жорсткий націоналізм в армії просто зникає, майже не залишаючи довготривалого сліду."

 ZAK_hungarian_influence:0 "Угорський вплив"
 ZAK_hungarian_influence_desc:0 "Ні для кого не секрет, що на Закарпатті проживає багато етнічних угорців. Здавалося б, нічого страшного, але для регіональної влади це стало серйозною загрозою її поки що стабільному правлінню. Угорці голосують за одних і тих же політиків, прагнуть власних прав і автономії, а деякі навіть публічно благають Угорщину "втрутитися" і "врятувати їх"."
 ZAK_local_security_service:0 "Місцева служба безпеки"
 ZAK_local_security_service_desc:0 "З усіх "урядів" по всій Україні найкращим місцем для служби безпеки, безсумнівно, було б Закарпаття. Коли все зруйнувалося, більшість силовиків тимчасово передислокували туди, оскільки це був "відносно стабільний регіон", в очікуванні подальших інструкцій з Києва. Але зараз столиця недосяжна, тому силовики діють в регіональному масштабі, зберігаючи лояльність до Ужгорода."
 ZAK_svynohryusyny:0 "Русинські повстання"
 ZAK_svynohryusyny_desc:0 "Сьогодні русини - це значною мірою вимерла етнічна група. Народ та його культура тривалий час зазнавали асиміляційних процесів у Польщі та Словаччині, і українське Закарпаття не було винятком. Але коли почався розпад, ті, хто досі називають себе "русинами", почали масові протести за свою мовну та культурну автономію"
 centre_of_the_ukrainian_nationalism:0 "Центр Українського Націоналізму"
 centre_of_the_ukrainian_nationalism_desc:0 "З моменту свого заснування Львів відігравав важливу роль в українській історії і був важливим оплотом української культури. У модерну добу український Захід був вінцем чистого українського націоналізму, а Львів - його найбільшою перлиною. Після розпаду СРСР Галичина успадкувала цей статус і повела патріотів власним шляхом."
 chornovils_model:0 "Модель Чорновола"
 chornovils_model_desc:0 "В'ячеслав Чорновіл був найкращим президентом якого тільки могла мати Україна. Його життя, раптово обірване підозрілою автокатастрофою в 1999 році, було наповнене багатьма політичними рішеннями, які мали одну спільну рису: патріотизм. Його погляди на те, якою має бути Україна, були, як багато хто казав, "тим, що було потрібно країні в той час" - вільний ринковий капіталізм, зближення із Заходом і федералізація. Галичина перейняла його шляхи і погляди на управління, намагаючись виправити те, що вони вважали великою українською трагедією - поразку В'ячеслава Чорновола на виборах 1991 року."
 labour_emergency_crysis:0 "Надзвичайна криза на ринку праці"
 labour_emergency_crysis_desc:0 "Хоча еміграція до Польщі та ЄС була поширеною українською практикою навіть у кращі часи, колапс різко збільшив кількість емігрантів, які бажають покинути гарячу точку, якою, на жаль, стала Україна."
 TER_pagan_fanaticism:0 "Язичницький фанатизм"
 TER_pagan_fanaticism_desc:0 "Якою б низькою не була підтримка язичництва в регіоні, ті, хто насправді є "віруючими", билися б з дивовижною відданістю. Вони без вагань підуть у бій з голими руками, якщо знатимуть, що їхні дивні боги будуть задоволені."
 TER_unpopular_movement:0 "Unpopular Movement"
 TER_unpopular_movement_desc:0 "Причина, чому язичники взагалі мають цей регіон, навряд чи зрозуміла тим, хто там живе. Все це було лише послідовністю абсурдних кафкіанських подій - не більше, ніж язичницьке свято, що пішло не так. Одне сталося за іншим, і тепер божевільні люди з ще більш божевільними богами правлять їхніми рідними містами. І ці божевільні хочуть більшого."
 KHM_good_climate_for_investments:0 "Сприятливий клімат для інвестицій"
 KHM_good_climate_for_investments_desc:0 "Хмельницька область останнім часом є досить привабливим місцем для інвестицій. Відносна безпека регіону, перенесення бізнесу та географічне розташування поруч з представництвом ООН на Буковині дозволили місцевій владі успішно заробляти гроші, принаймні поки що."
 KHM_nuclear_power_plant:0 "Атомна електростанція"
 KHM_nuclear_power_plant_desc:0 "Розпад України нічого не означав для операторів атомної електростанції, тому вони продовжували працювати на ній, незважаючи на низький рівень державного фінансування. Наразі на станції працюють 2 реактори, один з яких виробляє 1000 МВт електроенергії. Станція знаходиться під захистом МАГАТЕ."
 RIV_nuclear_power_plant:0 "Атомна електростанція"
 RIV_nuclear_power_plant_desc:0 "Стара атомна електростанція працює вже давно, і розпад України цього не змінить. Вона має 4 реактори, кожен з яких виробляє різну кількість електроенергії: 1-й енергоблок виробляє 381 МВт, 2-й енергоблок - 376 МВт, а найновіші реактори - 950 МВт. Безпеку станції гарантує МАГАТЕ."
 VOL_crush_the_bandits:0 "Бандити"
 VOL_crush_the_bandits_desc:0 "Чи не найгострішою проблемою, з якою стикається волинська влада, є бандитизм на сході. Мало того, що люди хочуть бути вільними, так ще й самі злочинці серйозно підривають економіку регіону. Луценко оголошує "кампанію умиротворення" проти нелегальних контрабандистів бурштину, щоб раз і назавжди покласти край їхньому "бізнесу"."
 romanian_millitary_administration:0 "Румунська військова адміністрація"
 romanian_millitary_administration_desc:0 "Буковинська адміністрація була створена в рамках миротворчої місії ООН після того, як Румунія офіційно звернулася з проханням про надання міжнародного мандату, оскільки "румуни в регіоні потребують порятунку від безладу, що відбувається в Україні". З огляду на цей факт, багато східних політиків вже називають це "румунським вторгненням" і "порушенням правила невтручання"."
 ZHY_unfulfilled_promises:0 "Невиконані обіцянки"
 ZHY_unfulfilled_promises_desc:0 "Мабуть, протягом усієї історії незалежної України політики годували народ обіцянками. Обіцянками, обіцянками і ще раз обіцянками, обіцянками виконати старі обіцянки, обіцянками звільнити тих, хто не виконує своїх обіцянок, і так далі. Соціалістична республіка не надто відрізнялася від цієї класичної традиції. Людям обіцяли мир, процвітання, владу і права, але натомість вони опинилися майже там, звідки починали."
 ZHY_shaky_coalition:0 "Крихка коаліція"
 ZHY_shaky_coalition_desc:0 "Коаліція між Радикальною партією та "Батьківщиною" не була насправді єдиною. Питання про те, як розпоряджатися отриманою землею, кинуло і без того непростий альянс у шторм нестабільності. Кожна розбіжність між двома партіями масово використовується опонентами коаліції, але якимось чином альянс тримається. Ніхто не знає, чи надовго."
 ZHY_beginning_of_the_reforms:0 "Початок реформ"
 ZHY_beginning_of_the_reforms_desc:0 "Справедливо буде сказати, що уряд Соціалістичної партії почав щось робити, і це дійсно величезний прогрес, враховуючи обставини, що склалися. Довгостроковий ефект їхніх політичних, військових та аграрних реформ ще належить побачити, але люди просто сподіваються, що зміни є реальними, а не просто ще однією цеглиною в стіні обіцянок."
 KYI_chernobyl_exclusion_zone:0 "Чорнобильська зона відчуження"
 KYI_chernobyl_exclusion_zone_desc:0 "Відома Чорнобильська зона відчуження знаходиться в руках незалежного уряду Київської області, але такий артефакт вимагає витрат на утримання. Патрулювання та охорона, наукові експедиції, заходи з локалізації та радіаційний моніторинг - все це залишає значний відбиток на обласному бюджеті."
 UKR_the_deluge:0 "Потоп"
 UKR_the_deluge_desc:0 "Все в найгіршому стані, в якому тільки може бути. Люди в паніці, вороги всюди, економіка в жалюгідному стані, а країна в руїнах. Київ оточує хаос, бандити та анархісти блокують автостради, але це не зупиняє сміливців, які намагаються втекти. Ситуація в самому неспокійному місті не набагато краща, кримінальні та протестні угрупування майже контролюють цілі райони. Кожна секунда, яку втрачає українська влада, оплачується горем народу, який і так вже достатньо настраждався. Люди більше не хочуть боротися за такі ідеї, як суверенітет чи свобода, вони просто хочуть вижити."
 UKR_unpopular_president:0 "Непопулярний президент"
 UKR_unpopular_president_desc:0 "Не важко зрозуміти, чому українці не люблять Зеленського. Справа навіть не в політиці, яку він планував впроваджувати, чи в чомусь із цим пов'язаному, він просто опинився не в тому місці і не в той час. Він став президентом, і все розвалилося - цей образ закарбувався у свідомості людей, і пройде багато часу, перш ніж він зітреться..."
 UKR_ruling_party_popularity:0 "Популярність правлячої партії"
 UKR_ruling_party_popularity_desc:0 "Очевидно, що партія влади зазнала другого за величиною репутаційного удару в усій цій плутанині. Скільки б облич не змінювала партія, якщо громадянин побачить "Слугу народу" на білборді, можна очікувати, що з його вуст прозвучать гіркі слова."
 UKR_and_restore_order_we_shall:0 "І порядок наведемо ми"
 UKR_and_restore_order_we_shall_desc:0 "Незважаючи на серйозні невдачі, ми все ще вважаємося легітимним урядом України. Тому наше право і мета - навести порядок і покарати зрадників, які заради своєї влади зруйнували українську державу та її єдність."
 UKR_president_office_influence:0 "Вплив "президентського кабінету""
 UKR_president_office_influence_desc:0 "Під час своєї передвиборчої кампанії Володимир Зеленський обіцяв привести до Верховної Ради нові обличчя на заміну корумпованим, жирним, старим і огидним політикам, а головним новим обличчям, звісно, був він сам. Це виявилося жахливою помилкою, оскільки всі так звані "нові обличчя", які прийшли в партію, виявилися недосвідченими людьми, які дуже мало знали про політику або просто про те, як ефективно керувати країною. Серед цих людей, однак, були й такі, що зуміли здобути значний вплив у партії. Коли закон і порядок впали по всій Україні, "Офіс президента" зумів скористатися повним падінням популярності Володимира Зеленського, щоб ефективно відсунути президента на другий план і керувати тим, що залишилося в Україні, виводячи з тіні, а в кращому випадку - повністю підриваючи президента та його владу. Неофіційно їх називають "київською трійцею" - Андрій Богдан, Андрій Єрмак та Олег Татаров - сірі кардинали, чий вплив на політичну сцену України є величезним. За будь-якої нагоди вони можуть легко зняти фасад брехні та ознаменувати кінець формального правління Зеленського."
 PRH_illegitimate_president:0 "Нелегітимний президент"
 PRH_illegitimate_president_desc:0 "Порошенко програв вибори 2019 року. Це факт. Факт, з яким, здається, змирилися всі. Крім нього самого. Його і його електорату. Він був людиною, яка могла б спокійно піти на пенсію десь у тропіках, але він вирішив боротися за президентство силою. Він вирішив запалити цей Вогонь. Бачачи очевидні результати виборів, а особливо той безлад, який Порошенко згодом спричинив, його досі сприймають як нелегітимного, "президента-ізгоя", який бореться за політичне виживання."
 PRH_cons_forces_union:0 "Об'єднання правих сил"
 PRH_cons_forces_union_desc:0 "У той час як Володимир Зеленський все ще вважається легітимним президентом у Києві, багато хто вважає Порошенка зрадником української нації. Через своє досить нестабільне становище він був змушений йти на поступки і відчайдушно шукати союзників. Це призвело до створення хиткого і невдалого альянсу між Порошенком, Філаретом, Юрченком і Ходаковським. Цей альянс є лише кон'юнктурним, оскільки всі сторони відчайдушно потребують народної підтримки. Як тільки одна з них отримає хоча б невелику перевагу над усіма іншими, і без того хитка коаліція, швидше за все, розвалиться."
 PRH_poroh_sins:0 "Гріхи Пороха"
 PRH_poroh_sins_desc:0 "Порошенко не лише не був святим президентом, але й широко відомий своєю скандальною та корумпованою поведінкою. Шоколадні скандали, вугільні скандали, скандали з Путіним, скандали з відмиванням грошей - це лише верхівка айсберга, і ніхто не знає, скільки ще лежить під поверхнею висвітлення у ЗМІ. Серед простих людей він був відомий як великий друг олігархів, тим більше, що сам був одним з них, тому під час свого президентства, як багато хто говорив, він "зробив багатих багатшими, а бідних біднішими"."
 PLT_home_of_the_revolution:0 "Дім Революції"
 PLT_home_of_the_revolution_desc:0 "Все почалося тут... Хаос у Полтаві був вступом до всього цього колапсу. Сутички між прихильниками того чи іншого президента закінчилися перемогою "Національного корпусу". Відтоді місто лежить у значно менших руїнах, ніж колись, але люди нічого не забули. Поки що фізичний і моральний тягар колапсу лежить на плечах полтавських націоналістів, хочуть вони того чи ні."
 PLT_unstable_position:0 "Нестабільна позиція"
 PLT_unstable_position_desc:0 "Хоча Полтава не настільки "східноорієнтована", як, наприклад, Донбас, радикальний націоналізм все ще не сприймається місцевими жителями. Люди набагато поміркованіші у своїх поглядах і набагато пасивніші у своїх діях, ніж деінде на заході України. Вони не надто захоплюються абстрактними національними ідеями, а натомість хочуть спокійно їсти свій суп, заради Бога!"
 CHR_allies_in_the_west:0 "Союзники на Заході"
 CHR_allies_in_the_west_desc:0 "Черкаський уряд був близьким союзником Соціалістичної Республіки. Довготривала взаємна політична допомога та однакове партійне членство лідерів обох партій до розпаду призвели до теплих стосунків між двома урядами."
 CHR_cornered_and_beaten:0 "Загнані в кут і побиті"
 CHR_cornered_and_beaten_desc:0 "Єдиною причиною, чому Черкащина не була безпосередньо включена до складу Соціалістичної Республіки, була політична географія. Єврейська держава-ізгой в Умані розколола найближчих союзників навпіл, ставши нездоланним бар'єром, аж поки"
 CHR_renovation_programme:0 "Програма реновації"
 CHR_renovation_programme_desc:0 "Програма реновації"
 KRE_ukrnafta_primacy:0 "Перевага Укртатнафти"
 KRE_ukrnafta_primacy_desc:0 "Якби Коломойський мав по гривні за кожну державну корпорацію, що виникла після розпаду України, він би мав дві гривні, що не так вже й багато, але дивно, що це сталося двічі. Будучи сепаратистською державою від націоналістів у Полтаві, Кременчук повністю залежав від "Укрнафти", оскільки нафтова компанія довгий час була домінуючим політичним та економічним оплотом регіону, утримуючи місто разом ціною масових порушень прав робітників."
 KRE_kremenchuk_refinery_plant:0 "Кременчуцький НПЗ"
 KRE_kremenchuk_refinery_plant_desc:0 "Кременчуцький нафтопереробний завод є серцем "Укрнафти", а отже, її найціннішим активом. Приносячи великі прибутки місту навіть після свого занепаду, завод ретельно доглядають і посилено охороняють."
 KRE_automotive_capital:0 "Автомобільна столиця Центральної України"
 KRE_automotive_capital_desc:0 "Протягом багатьох років Кремечук був серцем української автомобільної та автомеханічної промисловості. Хоча криза серйозно порушила виробничу лінію, він ніколи не зупинявся, забезпечуючи регіон тим, що він робить найкраще."
 KHA_police_state:0 "Поліцейська держава"
 KHA_police_state_desc:0 "Багато країн в історії називали "поліцейською державою", але уряд Авакова, можливо, сприйняв цей статус занадто буквально. Хоча він не може дозволити собі бути державою тотального нагляду, він все ще може бути країною поліцейської жорстокості, арештів, рейдів спецпідрозділів і, загалом, полігоном для випробування власного уявлення Авакова про "закон і порядок"."
 KHA_preserving_the_old_ways:0 "Збереження старих звичаїв"
 KHA_preserving_the_old_ways_desc:0 "З радянських часів і протягом всієї історії української незалежності корупція, на жаль, була значною частиною державних інституцій. Однак харківська влада вирішила не боротися з корупційними практиками, а, як справжні міліціонери, просто змирилася з ними. Хоча це, безумовно, наповнює їхні кишені, ядро державного апарату продовжує гнити."
 ODE_pro_russian_tendencies:0 "Проросійські настрої"
 ODE_pro_russian_tendencies_desc:0 "Більшість громадян історично розмовляють російською мовою і за інерцією схильні підтримувати Росію або її союзників. Проросійські партії користуються цим фактом і набирають обертів зі своїми ідеями, що становить серйозну загрозу для нейтральної позиції уряду."
 ODE_neutral_side_in_the_conflict:0 "Нейтральна сторона в конфлікті"
 ODE_neutral_side_in_the_conflict_desc:0 "Конфедерації страждають від того, що робить їх унікальними - від різноманітності. Всі люди там відрізняються один від одного лінгвістично, етнічно та політично, що є основною причиною, чому уряд обрав доктрину нейтралітету як дороговказну зірку. Вони зобов'язуються утримуватися від будь-яких конфліктів навколо себе, не підтримуючи при цьому нікого. Замість цього Конфедерація прийняла політику максимальної оборони, щоб їхні збройні сили були готові, коли ворог прийде відбирати їхній щойно здобутий "суверенітет"."
 ODE_patchwork_confederacy:0 "Конфедерація клаптикового шиття"
 ODE_patchwork_confederacy_desc:0 "Причин нестабільності Конфедерації багато. Від етнічних питань і зростаючої влади Альянсу Будзака до простого суперництва між партіями - ніщо не працює на користь єдності і стабільності в неспокійному регіоні."
 ODE_budjak_alliance:0 "Буджацький альянс"
 ODE_budjak_alliance_desc:0 "Буджацький альянс - це коаліція етнічних меншин в Ізмаїльському регіоні. Наразі це зростаюча сила в рамках Конфедерації, але інформації про наміри групи мало. Можливо, їх задовольнить автономний статус, а можливо, вони вимагатимуть більшого..."
 TRA_russian_operative:0 "Російська оперативна група в Придністров'ї"
 TRA_russian_operative_desc:0 "Придністров'я не було створене народом, воно було створене російськими військами. Це спричинило деякі тимчасові проблеми, але вони закріпили цю землю за Росією і тримають її міцно, чекаючи, коли Росія дійде до цієї маленької вузької землі і анексує її. Але до того часу вони будуть тут дислокуватися."
 OPZ_russian_as_the_second_language:0 "Російська мова як друга мова"
 OPZ_russian_as_the_second_language_desc:0 "Хоча Республіка Україна, безсумнівно, є українською державою, вони вирішили запровадити російську мову як другу мову через зв'язки держави з Росією. Вивчення другої мови нікому не зашкодить, чи не так?"
 OPZ_ties_with_russia:0 "Зв'язки з Росією"
 OPZ_ties_with_russia_desc:0 "Коли Україна розпалася, Херсон опинився в хаосі та анархії, але Росія допомогла відновити порядок через Республіку Україна. Через це "Республіка Україна" заборгувала Росії і стала державою під російським впливом. Вони отримали захист, але також втратили контроль."
 OPZ_promises_of_peace:0 "Обіцянки миру"
 OPZ_promises_of_peace_desc:0 "Населення втомилося від кровопролиття і війни. Так, пропагандисти "Республіки Україна" нескінченно розповідають про те, як в ній буде жити в мирі звичайна людина, а політики постійно обіцяють, що в ній буде мир для всіх. Але чи буде ця обіцянка виконана, поки що невідомо."
 ZAP_helping_zsu:0 "Допомога ЗСУ"
 ZAP_helping_zsu_desc:0 "У той час як у всьому світі прогресистів вважають "пацифістами" або "антимілітаристами", запорізька влада прагне зламати цей шаблон. Сам Тайлер довгий час був волонтером Збройних сил України, що призвело до того, що більшість політично активних мешканців регіону беруть участь у зборі допомоги для української армії або в багатьох інших волонтерських заходах."
 ZAP_nuclear_plant:0 "Запорізька атомна електростанція"
 ZAP_nuclear_plant_desc:0 "За сприяння МАГАТЕ Запорізька АЕС стала регіональним "золотим телям" - уряди сусідніх країн, які страждають від дефіциту електроенергії, із задоволенням платять за ці солодкі кілька кіловат, що освітлюють їхні домівки. Хоча утримання електростанції коштує чимало, воно того варте!"
 ZAP_progressive_hub:0 "Прогресивний хаб"
 ZAP_progressive_hub_desc:0 "Можливо, єдина причина, чому уряд Тайлера досі керує Запоріжжям, - це ліберали. Тут багато прогресивної, ліберальної молоді з усієї країни. Ті з них, хто не поїхав до ЄС, знайшли тут свій новий дім - де їм обіцяють разом побудувати власне рівноправне суспільство. Необхідність підтримувати стабільність призвела до створення чогось настільки ж незрозумілого, як "ліберальне ополчення", "прогресивні агенти влади" або "національна гвардія, що об'єднує ЛГБТ", але неважливо, якщо вони хочуть захистити свій маленький рай, хто може їх зупинити?"
 UMA_contacts_with_mossad:0 "Контакти з Мосадом"
 UMA_contacts_with_mossad_desc:0 "Хоча ізраїльський уряд ніколи офіційно не визнавав і не підтримував український "Малий Сіон", за неофіційною, але, можливо, добре відомою інформацією, розвідувальна служба МОССАД регулярно пропонує Умані свою зброю, людей, фінанси та розвіддані. Наміри досить незрозумілі: ніхто не знає, чи це захист уманських євреїв, чи спроба репатріації їх до Ізраїлю, чи, можливо, навіть поширення своєї влади на всю територію колишньої України."
 UMA_animosity_amongst_Ukrainian:0 "Ворожість серед українського населення"
 UMA_animosity_amongst_Ukrainian_desc:0 "Звичайний антисемітизм був досить поширений у Східній Європі протягом століть, але на Уманщині він досяг піку після того, як євреї захопили владу. Майже жоден українець в регіоні не задоволений тим, як все обернулося, що залишає величезну пляму невдоволення на чистій сорочці, якою є "Нова Юдея"."
 RIV_amber_profits:0 "Прибуток від бурштину"
 RIV_amber_profits_desc:0 "Бурштин - чи не єдиний ресурс, яким дійсно відомий цей регіон. Клесівське та Дубровицьке родовища були об'єктами рейдерства, крадіжок та контрабанди задовго до колапсу, але зараз швидкість та ефективність нелегальної торгівлі стрімко зросла."
 DNI_conglomerate:0 "Конгломерат"
 DNI_conglomerate_desc:0 "Нова влада Дніпра більше схожа на конгломерат - але замість компаній це об'єднання олігархів. Коломойський, Фірташ, Ахметов та багато інших об'єдналися з однією метою - врятувати свої українські активи. Звісно, вони добре уживаються, поки їхні "бізнес-інтереси" не перетинаються..."
 DNI_management_from_abroad:0 "Керівництво з-за кордону"
 DNI_management_from_abroad_desc:0 "Олігархи з Дніпра зуміли поєднати непоєднуване - жадібність і страх. Жадібність - це бажання зберегти свої маєтки в Дніпрі, а страх - бажання втекти з країни. Наразі регіоном керує рада директорів з-за кордону, що досягається ціною абсолютного адміністративного та управлінського пекла."
 KIR_very_low_public_support:0 "Дуже низька підтримка з боку громадськості"
 KIR_very_low_public_support_desc:0 "Уряд "Визвольного фронту" майже не має підтримки серед населення і складається з невеликої групи ідеологічно девіантних людей. Причиною цього є жорстка проросійська політика, дуже непопулярні комуністичні ідеї та особиста ворожість до лідера."
 SUM_aks:0 "Ультраправий опір"
 SUM_aks_desc:0 "Протягом багатьох років ультраправе радикальне угруповання "Авангард", або скорочено АКС, намагається просувати свої ідеали та зміни за допомогою насильства або без нього. Після розколу України їхні новостворені загони бойовиків стали надзвичайно активними, особливо в Сумській області, де центральна влада слабка і підпорядкована президенту-ізгою в Чернігові. Наразі вони намагаються залягти на дно, але в міру того, як правопорядок у регіоні повільно зникає, а незадоволені мешканці, які не особливо лояльні до Порошенка, висловлюють своє невдоволення, все більша ймовірність перевороту стає все більш реальною з кожним днем."
