l_russian:
 AFU_on_our_own:0 "На Самоті"
 AFU_on_our_own_desc:0 "Ми опинилися в... складній ситуації. Рідко коли в історії траплялося так, що країна розвалювалася на купу уламків, а армія залишалася гнити на самоті, в ізоляції, десь на сході. Такі безнадійні ситуації часто призводять до безнадійних дій, але не від нас! Ми не зв'яжемося, не здригнемося, не впадемо в анархію, а будемо терпіти, а головне - боротися!"
 AFU_asessing_the_situation:0 "Оцінка Ситуації"
 AFU_asessing_the_situation_desc:0 "Перед нами стоїть чимало нагальних питань, які потребують вирішення, головне з яких - знищення сепаратистів раз і назавжди. Але це непросте завдання - і воно не було таким навіть за часів єдиної України. Ми повинні працювати вдвічі, а то й втричі більше, ніж раніше, щоб нарешті покласти край цьому божевіллю, не забуваючи при цьому тримати руку на пульсі за лінією фронту."
 AFU_proclaim_a_state_of_emergency:0 "Продовження Надзвичайного Стану"
 AFU_proclaim_a_state_of_emergency_desc:0 "Надзвичайний стан, запроваджений одразу після краху, не був дуже популярним у масах. Люди ледве розуміють нову реальність, що звалилася на їхні голови, і відчайдушно намагаються вхопитися за залишки відносно мирних часів, що залишилися від доколлапсу. Якщо ми хочемо, щоб нас не завоювали російські маріонетки, ми повинні дати нашим масам зрозуміти, на які жертви потрібно йти. Так, поки що доведеться працювати набагато більше, витрачати набагато менше і сподіватися на краще, але наша сталева нація все подолає. Заради загального блага!"
 AFU_local_arms_procurement:0 "Локальне Виробництво Зброї"
 AFU_local_arms_procurement_desc:0 "Якщо ми озирнемося навколо, то побачимо купу заводів, готових до перезапуску та використання у військових цілях. Ми використаємо спадщину промисловості Донбасу і почнемо виробляти зброю, амуніцію та практично все, що може знадобитися нашій армії. Запускайте заводи, хлопці!"
 AFU_harsh_quotas:0 "Посилити Квоти"
 AFU_harsh_quotas_desc:0 "На жаль, залишаються ще більш радикальні заходи. Оскільки ми живемо у відчайдушні часи, нам доведеться значно збільшити робочий день, зменшити пайки та запровадити ще суворіші покарання за порушення закону. Зрештою, це жертви воєнного часу, чорт забирай. Вони повинні бути виконані!"
 AFU_millitary_administration:0 "Створити Військову Адміністрацію"
 AFU_millitary_administration_desc:0 "Минув певний час, були прийняті рішення, і тепер ми набагато самодостатніші, ніж були раніше! Поки що єдина мета нашої власної військової держави - принести мир на Донбас. Можливо, незабаром ми змінимо спосіб управління людьми, але сьогодні у нас є більш нагальні справи..."
 AFU_promise_reform:0 "Обіцянки Реформ"
 AFU_promise_reform_desc:0 "Ті люди, які протестують проти нас... ми повинні спробувати їх зрозуміти. Всі ми люди, всім нам зараз важко. Зрештою, ми сподіваємося, що військові заходи не будуть тривати вічно, і незабаром вони можуть бути скасовані. Ми пообіцяємо масам майбутні реформи нашого військового уряду, сподіваємося, це всіх заспокоїть."
 AFU_crackdown:0 "Придушення Інакомислення"
 AFU_crackdown_desc:0 "Наші жорсткі заходи не викликали у людей радісних облич. На жаль, вони не розуміють всієї ситуації, в якій опинилися, і намагаються вимагати більше свободи і прав для працівників. Ми повинні нагадати їм, що таке закон воєнного часу, і показати, що буває, якщо порушувати закон у і без того неспокійні часи..."
 AFU_mobilize_our_forces:0 "Початок Лімітованої Мобілізації"
 AFU_mobilize_our_forces_desc:0 "Основою будь-якої армії, починаючи з найдавніших воєн в історії, є, звичайно, людські ресурси. Жодна зброя не принесе користі, якщо немає кому її застосовувати! Неминуча війна на горизонті, і ми повинні бути готові! Ми проведемо часткову мобілізацію, щоб належним чином розширити і поповнити нашу армію новобранцями."
 AFU_effective_training:0 "Удосконалені Навчальні Програми"
 AFU_effective_training_desc:0 "Ключ до перемоги над сепаратистами - це подолання їхньої армії, а цього можна досягти за рахунок якості. У той час як їхня армія складається з ледь навчених ополченців, наша армія тепер буде армією професіоналів, вершиною солдатської майстерності!"
 AFU_rely_on_militias:0 "Покладатися на Ополченців"
 AFU_rely_on_militias_desc:0 "Ополченці, хоча і не є найкращим довгостроковим рішенням, є неймовірним вибором для нашої ситуації. Їх набагато легше озброїти, їх легше утримувати та організовувати, їх набагато швидше навчити та розгорнути. Більше того, ще в 2014 році ополченці довели свою ефективність у боротьбі з сепаратистськими покидьками, тому їхня репутація вже є високою в наших очах. Ми краще віддамо перевагу їм, ніж витрачатимемо час і ресурси на ледь життєздатну концепцію "якісної армії""
 AFU_reform_the_general_staff:0 "Реформувати Генеральний Штаб"
 AFU_reform_the_general_staff_desc:0 "Лідерство і командири дійсно є дуже важливою частиною успішної армії. Ми будемо реформувати Генеральний штаб відповідно до наших потреб і наших ресурсів, щоб перетворити нашу військову систему на добре змащену машину командирів і солдатів". Армія, як інститут, здебільшого розрахована на те, щоб підсвідомо навіювати солдатам ультраправі думки. Масова дегуманізація ворогів, консервативна та мілітаристська політична думка, пропаганда жорсткого націоналізму тощо. Наша військова система мало чим відрізняється від решти світу. Ультраправі думки вже давно поширюються в армійських лавах, і ми повинні подбати про це. Звісно, ми не можемо звільнити всіх, але ми можемо значно зменшити вплив і структурну роль націоналістичних угруповань на кшталт "Азову". Це має зупинити їхнє поширення, але зберегти наші війська помірковано патріотичними та політично нейтральними."
 AFU_azov:0 "Відтіснити Ультраправі Елементи на Узбіччя"
 AFU_azov_desc:0 "Армія як інститут значною мірою покликана підсвідомо прищеплювати солдатам ультраправі погляди. Масована дегуманізація ворогів, консервативні та мілітаристські політичні погляди, пропаганда жорсткого націоналізму тощо. Наша військова система мало чим відрізняється від решти світу. Ультраправі думки поширюються в армії вже давно, і ми повинні з цим боротися. Звичайно, ми не можемо звільнити всіх, але ми можемо значно зменшити вплив і структурну роль націоналістичних груп, таких як "Азов". Це має зупинити їхнє поширення, але зберегти наші війська помірковано патріотичними та політично нейтральними."
 AFU_proffesional_army:0 "Професійна Армія"
 AFU_proffesional_army_desc:0 "Наразі ми багато зробили для оновлення та модернізації нашої армії. Щодня ми приймаємо новобранців, тренуємо та озброюємо їх, а потім відправляємо на фронт! Але не час розслаблятися, ще не час. Наша армія хороша лише за мірками тієї ситуації, в якій ми перебуваємо, а насправді вона мало чим перевершує сепаратистські війська. Нам потрібно продовжувати тренувати наших хлопців, розгортати нові підрозділи, і тільки тоді ми зможемо стати по-справжньому сильними, допоможи нам, Боже!"
 AFU_prepare_for_the_inevitable:0 "Приготуватися До Неминучого"
 AFU_prepare_for_the_inevitable_desc:0 "Сміливо припускати, що сепаратистські покидьки раптом залишили свої амбіції щодо Донбасу позаду. Щодня вони повертаються до своєї мрії захопити наші міста і поневолити наших людей в ім'я "русского мира". Чому ми повинні дозволити цьому статися? Чому ми не повинні боротися?! Наша славна армія буде готуватися до неминучої війни з сепаратистами, і нехай це буде остання війна, яку бачить славний Донбас! Слава нам, козаки!"
 AFU_prepare_the_reserve_line:0 "Підготуйте Наші Резервні Лінії"
 AFU_prepare_the_reserve_line_desc:0 "Ми не можемо розраховувати на перемогу у війні, якщо не побудуємо достатню оборону. Мало того, ми також навчимо наших солдатів правильно використовувати місцевість, захищати окопи, швидко укріплюватися та багато іншого."
 AFU_now_we_wait:0 "А Тепер Чекаємо."
 AFU_now_we_wait_desc:0 "Не треба поспішати. Ми все підготували. Ми готові. Сепаратисти думають, що їхній наступ буде швидким і несподіваним, але це помилка. Ми весь цей час були тут, чекали, і ми не проти почекати ще трохи. Приїжджай в Україну, росіянине, не бійся..."
 AFU_its_time_to_put_an_end_to_the_separatists:0 "Настав Час Покласти Край Сепаратистам!"
 AFU_its_time_to_put_an_end_to_the_separatists_desc:0 "Невже є потреба чекати? Ми зробили все, що повинні були зробити, і наші солдати більш ніж готові розгромити зрадників раз і назавжди. Більше того, наші генерали також дотримуються думки, що превентивний удар був би оптимальним. Ми зітремо це сепаратистське божевілля з лиця землі! Зараз або ніколи!"
 AFU_reaching_out:0 "Попросити Допомогу"
 AFU_reaching_out_desc:0 "Зрештою, армія - це ніщо без центрального командування. Але ми не будемо шукати накази, ми будемо шукати щось інше, що центральне командування зазвичай відправляє на фронт - припаси та гуманітарну допомогу. Всі розуміють, що вони потрібні, але не всі можуть їх надати. Будемо випробовувати долю і сподіватися на краще."
 AFU_reach_out_to_kyjiv:0 "Попросити Допомогу від Києва"
 AFU_reach_out_to_kyjiv_desc:0 "Київський уряд у певному сенсі є найближчим до "легітимного верховного командування", яке ми коли-небудь отримаємо. Хоча вони, очевидно, самі обмежені в ресурсах, можливо, вони могли б виділити кілька одиниць зброї на добру справу."
 AFU_reach_out_to_poroshenko:0 "Попросити Допомогу від Чернігова"
 AFU_reach_out_to_poroshenko_desc:0 "Хоча ми не присягаємо на вірність "президенту-ізгою", він, безумовно, може бути корисним. Його армійські реформи свого часу залишили помітний позитивний відгук у нас обох. Хто знає, якщо у нього є якісь військові надлишки, можливо, він міг би нам допомогти - від патріота до патріота потече зброя!"
 AFU_reach_out_to_zaporizhia:0 "Попросити Допомогу від Тайлера"
 AFU_reach_out_to_zaporizhia_desc:0 "Хоча ліберали - не найпатріотичніші люди, яких тільки можна собі уявити, їм, безумовно, не подобається думка про те, що їхню батьківщину завойовують російські собаки. Хоча у них і було суперництво з "Азовом", такі дрібні конфлікти тьмяніють перед обличчям більшої загрози. Сподіваємося, що уряд Тайлера став більш прихильно ставитися до ідеї надіслати нам зброю, тим більше, що він вже давно є волонтером ЗСУ, тож вони з радістю поділяться своїми запасами!"
 AFU_finish_integration:0 "Успішна Інтеграція"
 AFU_finish_integration_desc:0 "Це нарешті сталося! Лідери сепаратистів гниють у в'язницях або в холодній землі, а колишні "громадяни Донбасу" нарешті починають усвідомлювати свою українську ідентичність! На жаль, ми не можемо повністю стерти проросійські тенденції, але вони зараз стрімко йдуть на спад. Але час для відпочинку ще не настав - ще так багато треба зробити в нашій палаючій Україні..."
 AFU_start_intergration:0 "Почати Інтеграцію"
 AFU_start_intergration_desc:0 "Хоча ми не можемо реінтегрувати весь регіон в один клік, ми, безумовно, можемо спрямувати його на правильний шлях. Ми складемо список дій, які необхідно вжити, щоб нарешті скасувати 5 років безперервної російської пропаганди і очистити свідомість цих бідних людей від сепаратизму!"
 AFU_victory:0 "Перемога"
 AFU_victory_desc:0 "Нарешті, Перемога за нами! Сепаратисти тікають у паніці, коли над останнім містом Донбасу піднімається славний український прапор. Потвор, які колись були "ЛНР" та "ДНР", більше не існують, що знаменує кінець роботи, яку ми не могли завершити з 2014 року! Однак, коли настає час вечірки, розслаблятися ще рано. Занадто багато запитань залишилося, і вони чекають на відповіді. Наша робота ще не закінчена!"
 AFU_special_operation_forces:0 "Використовувати Сили Спеціальних Операції"
 AFU_special_operation_forces_desc:0 "ССО, або Сили спеціальних операцій, є, мабуть, найбільш висококваліфікованим підрозділом Збройних сил України. Вони складаються з найкращих солдатів, яких може запропонувати Україна, і займаються контррозвідкою, підтриманням воєнного стану та боротьбою з тероризмом. Спецпризначенці, безумовно, стануть у нагоді в нашій боротьбі, і ми будемо використовувати їхні навички та професіоналізм для посилення армії."
 AFU_territorial_defence_forces:0 "Територіальні Сили Оборони"
 AFU_territorial_defence_forces_desc:0 "Сили територіальної оборони складаються з численних підрозділів, подібних до міліції, укомплектованих добровольцями, які зголосилися воювати за свою Батьківщину. Їх стратегічна перевага полягає, головним чином, у швидкому розгортанні, але, хоча вони здаються дешевими, вони все одно коштуватимуть нам певних грошей. Їх розгортання - це скоріше додатковий захід, який вживається лише для того, щоб подолати ворога, оскільки нинішньої чисельності нашої армії просто не вистачає. Можливо, з часом ми інтегруємо їх до складу Збройних сил, але поки що вони залишатимуться окремим підрозділом під нашим контролем."
 AFU_reach_out_to_kharkiv:0 "Попросити Допомогу від Авакова"
 AFU_reach_out_to_kharkiv_desc:0 "Поліцейська держава, яка є нашим сусідом, також може бути корисною - у них, ймовірно, є додаткове поліцейське обладнання, що складається зі стрілецької зброї або легкої бронетехніки. Крім того, Аваков міг би надати нам свої поліцейські сили, які були б корисними для придушення проросійського опору після того, як ми покінчимо з сепаратистами. Харківський уряд, ймовірно, оцінить допомогу, яку ми надаємо для всього регіону, і допоможе нам."
 #DONETSK FOCUSES
 dnr_situation_in_ukraine:0 "Ситуація В Україні"
 dnr_situation_in_ukraine_desc:0 "Нам потрібно буде відправити групу спеціальних розвідників, які зможуть прорвати блокаду української військової хунти, щоб перевірити ситуацію в Україні. Нам потрібно мати найсвіжішу інформацію, щоб ми могли знайти союзників."
 dnr_situation_in_our_country:0 "Ситуація В Нашій Країні"
 dnr_situation_in_our_country_desc:0 "Стабільність важлива, і для того, щоб українські нацисти не зруйнували державу, нам потрібно буде стежити за кожним громадянином і придушувати будь-які протести. Держава слабка, коли люди роз'єднані."
 dnr_look_around_us:0 "Озирнутися Навколо"
 dnr_look_around_us_desc:0 "Озирнутися Навколо"
 dnr_look_west:0 "Подивитися на Захід"
 dnr_look_west_desc:0 "Український режим впав. Але хоробрі сини Донбасу повинні усвідомити, що це ще не кінець, бо перемога ще не досягнута. Збройні сили України залишаються. Вони продовжують боротися за режим, якого вже не існує, але в цій боротьбі ми можемо постраждати найбільше! Ми зробимо все, щоб поховати поняття "Україна". Або загинемо, намагаючись це зробити."
 dnr_look_east:0 "Подивитися на Схід"
 dnr_look_east_desc:0 "Путіна називали по-різному. Політиком. Лідером. Воїном. Але для нас все просто - він Батько. Він, як і всі, вимагає від нас лояльності та поваги, а натомість дає нам матеріальну та гуманітарну допомогу, веде нас у майбутнє, наставляє на правильний шлях, щоб ми стали могутньою нацією пліч-о-пліч з Двоголовим Орлом! Будемо просити його про допомогу, бо саме зараз ми її найбільше потребуємо, а хто ж нам допоможе, як не Матінка-Росія?"
 dnr_look_north:0 "Подивитися на Північ"
 dnr_look_north_desc:0 "ЛНР - це, напевно, наш найбільший друг у нинішній ситуації. У нас можуть бути відмінності або розбіжності, але ми всі разом у цьому новоросійському човні! Якщо ми не будемо допомагати один одному, то наскільки ми кращі за українців? Ми повинні забезпечити військове і національне співробітництво між братніми республіками, тому що захист Донбасу - це наша Богом дана місія! Вперед!"
 dnr_open_old_warehouses:0 "Відкрити Старі Склади"
 dnr_open_old_warehouses_desc:0 "Колись давно боги побудували бетонні та сталеві склади, наповнені всілякою зброєю, і замкнули двері, щоб ніхто не зміг її дістати. Настав час відчинити ці двері, бо нам потрібна зброя для захисту держави, особливо від українців."
 dnr_strengthern_the_propaganda:0 "Посилити Пропаганду"
 dnr_strengthern_the_propaganda_desc:0 "Не всі в нашій країні є громадянами, які хочуть допомагати державі. Зростає меншість людей, які хочуть знищити Донецьку Народну Республіку, і ми будемо використовувати всі можливі тактики для того, щоб вони не отримали влади для цього."
 dnr_mobilize_youth_and_reserves:0 "Мобілізація Молоді та Резервів"
 dnr_mobilize_youth_and_reserves_desc:0 "Якщо наших дітей вчать антидержавній пропаганді, то це вже не наші діти. Ми повинні запровадити державні уроки в кожній школі, щоб наші діти виросли патріотами своєї держави, які будуть їй служити і захищати."
 dnr_requestrussianequipment:0 "Запит на Російське Обладнання..."
 dnr_requestrussianequipment_desc:0 "Вони отримали наше повідомлення і з радістю відгукнулися на наш заклик про допомогу. Ми попросили у них хороше спорядження, яке могло б використовуватися військовими, оскільки ми не в найкращому становищі, щоб виробляти своє власне."
 dnr_andvolunteers:0 "... і волонтерів"
 dnr_andvolunteers_desc:0 "Вони також запропонували прислати до нас... волонтерів. Ми прийняли пропозицію про всяк випадок, адже ми ще досить слабкі, але не хвилюйтеся, ми обов'язково станемо сильними і незалежними."
 dnr_supplement_our_corps:0 "Поповніть Наш Корпус"
 dnr_supplement_our_corps_desc:0 "Нам потрібно відправити отримане спорядження військовим. Кожен солдат повинен мати потрібну зброю, припаси та будь-які можливі додаткові речі. Ми не можемо дозволити собі помилитися з цим, тому маємо бути уважними, інакше розплачуватимемося за наслідки..."
 dnr_remember_about_novorossiya:0 "Пам'ять про Новоросію"
 dnr_remember_about_novorossiya_desc:0 "Ми повинні об'єднатися в єдиний союз, який би зв'язав південно-східні держави. Ми повинні пам'ятати про цю конфедерацію, тому що це наша мета. Якщо зможемо, звичайно. Для цього ми повинні готуватися захищати Донецьк, тому що є люди, які хочуть все це зруйнувати, зруйнувати мрію про Новоросію."
 dnr_end_the_trade_war:0 "Відкиньте Наші Розбіжності"
 dnr_end_the_trade_war_desc:0 "Як і у будь-яких хороших колег, у нас є розбіжності. Але наскільки вони важливі в глобальному масштабі? Наскільки вони значущі перед обличчям небезпеки для нас обох? Ми - сини Донбасу! Ми повинні об'єднатися, щоб протистояти неминучому ворогу, зараз або ніколи!"
 dnr_unite_with_lnr:0 "Об'єднатися з ЛНР"
 dnr_unite_with_lnr_desc:0 "Ми занадто розділені, і оборонного пакту недостатньо, щоб об'єднати нас проти української військової хунти. Ми повинні об'єднатися в єдину вільну націю, яка разом рухатиметься вперед і переможе Голіафа, який хоче бачити Донецьк і Луганськ зруйнованими."
 dnr_prepare_for_war:0 "Випробуйте Їх у Ближньому Бою"
 dnr_prepare_for_war_desc:0 "Ми не можемо бути впевнені, що українська військова хунта не планує вторгнення, тому ми повинні підготувати об'єднані армії, щоб виступити проти українців. Нам потрібно буде реорганізувати логістику, мобілізувати солдатів і роздати їм зброю. Це буде виснажлива підготовка, але врешті-решт ми завдамо удару по терористах."
 dnr_putanendtoukrainianarmy:0 "Покладіть Край Українській Армії!"
 dnr_putanendtoukrainianarmy_desc:0 "Наші солдати нетерпляче чекають, танки закачують у повітря CO2, літаки стоять, чекаючи наказу на зліт. "Вперед!" - кричать офіцери. Настав час для поєдинку між нашою славною армією, з російськими добровольцями на нашому боці, проти українців, які тероризували нас роками. Настав час для другої війни за незалежність."
 dnr_victory:0 "Нарешті Перемога"
 dnr_victory_desc:0 "Перемога прийшла! Ура! Ми офіційно помстилися за кожного загиблого побратима і частково повторили найбільшу перемогу наших дідів у 1945 році! Рештки ЗСУ в страху тікають кудись подалі, побачивши силу російського духу. І хоча це величезна віха для нас, без сумніву, ще багато потрібно зробити, щоб реінтегрувати регіон назад."
 dnr_start_integration:0 "Початок Інтеграції"
 dnr_start_integration_desc:0 "Донбас, хоч і перебуває під нашим контролем, але досить сильно знекровлений. Існує безліч речей, які необхідно зробити - від простого відновлення будинків до зміцнення нашої нової політичної системи в регіоні та посилення нашого контролю над опозицією. Найважче вже зроблено, тепер настав час зцілити Новоросію!"
 dnr_passport_programm:0 "Програма Паспортизації"
 dnr_passport_programm_desc:0 "Люди, які проживали на окупованих Україною територіях, мали паспорти та документи відповідної країни, до яких тепер ставляться як до паперу. Ми повинні допомогти цим бідолахам інтегруватися в наше нове управління - ми почнемо масову паспортизацію в обмін на українські паспорти."
 dnr_parties_integration:0 "Інтеграція Локальних Партій"
 dnr_parties_integration_desc:0 "Окупована Україною частина Донбасу, відколи війна зайшла в глухий кут у 2015 році, стала домівкою для багатьох місцевих проросійських політичних партій. Це був чи не єдиний регіон в Україні, де вони отримали значний імпульс, про що свідчать результати виборів 2019 року - лише Донецька та Луганська області проголосували за Бойка. Настав час інтегрувати наших місцевих союзників у політичну систему.Окупована Україною частина Донбасу, відколи війна зайшла в глухий кут у 2015 році, стала домівкою для багатьох місцевих проросійських політичних партій. Це був чи не єдиний регіон в Україні, де вони отримали значний імпульс, про що свідчать результати виборів 2019 року - лише Донецька та Луганська області проголосували за Бойка. Настав час інтегрувати наших місцевих союзників у політичну систему."
 dnr_increasing_patriotism:0 "Пропагандистські Заходи"
 dnr_increasing_patriotism_desc:0 "Невід'ємна частина реінтеграції жителів Донбасу - завоювати їхні серця. І хоча, чесно кажучи, багато хто з тих, хто жив на українській частині, вже був проросійськи налаштований політично, не завадить запустити пропагандистську машину, і дати всім знати - Новоросія тут назавжди! Ура!"
 dnr_unite_communications:0 "Об'єднаити Комунікації"
 dnr_unite_communications_desc:0 "За п'ять років "замороженого конфлікту" наша інфраструктура стала більше схожа на купу дірявого металобрухту. Дороги вкриті глибокими ямами, залізничні колії розтягнуті до металу, водо- та газопроводи іржавіють від початку конфлікту, і це ще не все. Таку картину можна побачити по всьому Донбасу. До того ж хунта навмисно перерізала шляхи сполучення між східними та західними регіонами нашої країни. Але ми перемогли. Ми єдині. Ніщо більше не стоїть на нашому шляху. Настав час покласти край логістичним проблемам і впевненим кроком рухатися вперед у світле майбутнє. Ми виділимо з державного бюджету стільки грошей, скільки буде потрібно, і відремонтуємо все, що було зруйновано або пошкоджено."
 dnr_promise_of_future:0 "Обіцяти Майбутне"
 dnr_promise_of_future_desc:0 "П'ять років ми думали про те, як буде виглядати Донбас після нашої перемоги. Тодішня ситуація дозволяла нам лише мріяти про це, але зараз, після нашої перемоги, ми нарешті маємо можливість реалізувати все, що хотіли. Ми давали людям багато обіцянок про майбутнє, і ми повинні їх виконати. Від підвищення зарплат до безкоштовної медицини. Ми доведемо, що наші слова були і залишаються в силі."
 dnr_trybunal:0 "Великий Суд"
 dnr_trybunal_desc:0 "Наша славна армія розгромила клятих нацистських виродків. Тепер вони заплатять за всі свої злочини проти народу і землі Донбасу. Більшість військового керівництва хунти потрапило в полон, але, на жаль, декому вдалося втекти. Але найголовніше, що у нас є Кривонос, який був занадто нахабним, щоб покинути свій пост і втекти. Він буде прикладом для всіх, хто чекає на вирок. Вони всі заплатять. Всі! За наших дітей і батьків, за те, що вони всі помруть або будуть гнити в підвалах!"
 dnr_final_integration:0 "Закінчити Інтеграцію"
 dnr_final_integration_desc:0 "Все готово. Нарешті. Після нашої славної перемоги над бюрократією почалося пекло, але ми його подолали. Всі папери готові. Тепер Новоросія буде адміністративно володіти всіма землями Донбасу. Росіяни, які по праву володіють цією землею, знову відновлять там свою владу. Президенту залишилося тільки підписати відповідний документ. О, дивіться, це вже відбувається!"
 dnr_elections:0 "День Виборів!"
 dnr_elections_desc:0 "Цей день настав. Після завершення інтеграції західних областей нам залишилося зробити останню велику справу. Вибори Глави держави. Сьогодні з усього Донбасу до столиці надійдуть тонни купюр з іменами кандидатів. Побачимо, хто переможе..."
