 dnr.32.t:0 "Кінець інтеграції"
 dnr.32.d:0 "Анна була простою робітницею заводу зі Слов'янська. Вона прожила в місті все своє життя і бачила, як воно змінювалося з плином часу. Але тепер, з утворенням Новоросії, все було інакше. Анна прокинулася рано вранці і зібралася на роботу. За вікном вона чула звуки будівництва, які нагадували їй про зміни, що відбувалися в її місті. Будівництво нових заводів, будинків та об'єктів інфраструктури активізувалося після утворення Новоросії. Анна приїхала на завод і була здивована, побачивши зміни, які там відбулися. Машини були оновлені, виробничий процес оптимізований, а загальна атмосфера була набагато кращою, ніж раніше. Анна відчула гордість від того, що вона є частиною прогресу та розвитку свого міста. Під час обідньої перерви Анна зустрілася зі своїми колегами і розповіла про зміни в їхньому житті після утворення Новоросії. Вони обговорили, як зросла їхня заробітна плата, як уряд інвестував в охорону здоров'я та освіту, і як покращилася якість їхнього життя в цілому. Після роботи Анна вирішила прогулятися містом. Вона звернула увагу на нові парки та громадські простори, які були побудовані, та чистоту вулиць. Вона також побачила прапори Новоросії, що майоріли високо, і це викликало у неї почуття гордості та приналежності. Повернувшись додому, Анна замислилася над тим, як змінилося її життя після утворення Новоросії. Вона була вдячна за можливості, які з'явилися перед нею, і за відчуття спільноти, яке розвинулося в її місті. Вона знала, що попереду ще багато роботи, але була впевнена, що майбутнє для неї та її співгромадян Новоросії виглядає світлим."
 dnr.32.a:0 "Впевнений що вона щаслива."
 dnr.31.t:0 "Переплетіння наших доріг"
 dnr.31.d:0 "У галасливому Донецьку жителі з нетерпінням чекали на прибуття нового швидкісного поїзда, який з'єднав би їх з іншими великими містами Новоросії. Поїзд мав прибути за кілька годин, і люди вже вишикувалися в чергу на залізничному вокзалі, щоб побачити його. Коли поїзд прибув, з натовпу пролунало гучне вітання. Потяг був елегантним і сучасним, з яскраво-синім зовнішнім виглядом і потужним двигуном. Коли він зупинився, двері відчинилися, і команда інженерів вийшла, щоб оглянути його. Донеччани здивовано спостерігали, як інженери ретельно оглядали кожен сантиметр поїзда. Було видно, що вони доклали багато зусиль, щоб спроектувати і побудувати цю надсучасну машину. Після завершення огляду вийшов провідник поїзда і звернувся до натовпу. Він палко говорив про важливість сучасної транспортної інфраструктури для зростання і розвитку Новоросії. Він говорив про те, як цей потяг з'єднає людей і підприємства, створюючи нові можливості і стимулюючи економічне зростання. Потім провідник запросив усіх на екскурсію потягом та ознайомився з його передовими можливостями. Люди охоче піднімалися на борт, захоплюючись зручними сидіннями, бортовою розважальною системою та плавністю ходу. Коли поїзд від'їхав від вокзалу і помчав у далечінь, донеччани відчули прилив гордості та патріотизму. Вони знали, що їхня країна знаходиться на передовій технологій і що її майбутнє - світле."
 dnr.31.a:0 "Нашы дороги едины!"
 dnr.30.t:0 "Патріотизм"
 dnr.30.d:0 "Звістка про перемогу у війні облетіла всю Новоросію, і вулиці міст і селищ наповнилися радісними натовпами, що розмахували прапорами і скандували патріотичні гасла. Уряд оголосив день перемоги національним святом, і люди висипали з домівок, щоб приєднатися до святкувань. На центральній площі Донецька встановили велику сцену, з якої лунали патріотичні пісні. Натовп зібрався навколо сцени, і коли заграла музика, люди почали підспівувати. Повітря наповнилося піднесенням і гордістю. Раптом музика зупинилася і на сцену вийшов чоловік. Він був одягнений в костюм і мав серйозний вираз обличчя. Це був голова уряду Новоросії Леонід Пасічник. Натовп замовк, коли Пасічник почав говорити. Він говорив про жертви, які були принесені під час війни, про хоробрих чоловіків і жінок, які боролися і померли за свою країну. Він говорив про важливість патріотизму, про необхідність об'єднатися як нація і будувати краще майбутнє для всіх. Люди уважно слухали, і в міру того, як Пасечник говорив, в них почало зростати почуття єдності. Вони усвідомили, що всі вони є частиною чогось більшого, ніж вони самі, що вони є частиною великої нації, яка перемогла перед обличчям труднощів. Коли Пасічник закінчив свою промову, оркестр знову почав грати, і натовп вибухнув оплесками. Почуття гордості і патріотизму було відчутним, і здавалося, що ніщо не зможе розірвати зв'язок, який встановився між народом Новоросії і їхньою країною."
 dnr.30.a:0 "Вставай Домбас!"
 dnr.29.t:0 "Програма паспортизації"
 dnr.29.d:0 "Це був звичайний день у Краматорську, і на вулицях міста було повно людей, які йшли у своїх справах. Серед них була бабуся на ім'я Ольга, яка прожила в місті все своє життя. Вона бачила багато змін за ці роки, включаючи нещодавній конфлікт, який розірвав місто на частини. Але сьогодні був особливий день для Ольги. Вона отримала поштою листа від уряду Новоросії, в якому повідомлялося, що вона має право на отримання нового паспорта. Цей паспорт дозволить їй стати громадянкою Новоросії, нової назви Донецької Народної Республіки. Збуджена і трохи знервована, Ольга попрямувала до урядової будівлі, куди їй сказали піти, щоб забрати свій новий паспорт. Коли вона прийшла, її зустрів привітний державний службовець, який пояснив їй процедуру. Ольга принесла з собою всі необхідні документи, і чиновник швидко обробив її заяву. Через кілька хвилин Ольга тримала в руках свій новий паспорт з фотографією усміхненого обличчя на обкладинці. Переповнена емоціями, Ольга подякувала чиновнику і вийшла на вулицю. Йдучи вулицею, вона міцно тримала свій новий паспорт в руках, відчуваючи почуття гордості та приналежності. Для Ольги цей новий паспорт був більше, ніж просто папірець. Це був символ надії та світлого майбутнього для неї та її сім'ї в новій країні, Новоросії. І зі сльозами на очах Ольга знала, що готова зустріти цю нову главу свого життя з розпростертими обіймами."
 dnr.29.a:0 "Сподіваюся, з нею все добре."
 dnr.28.t:0 "Зустріч"
 dnr.28.d:0 "У великому конференц-залі в Донецьку голова новоросійського уряду Леонід Пасічник сидів за довгим столом в оточенні своїх головних радників. З іншого боку столу сидів Євген Мураєв, голова колишньої української проросійської партії "Наш". Обидва чоловіки сиділи обличчям один до одного, їхні погляди були серйозними і зосередженими. Темою їхньої зустрічі була інтеграція місцевих проросійських партій у Новоросію. Мураєв почав з викладу бачення своєї партії щодо більшого об'єднання російськомовних регіонів колишньої України. Він пристрасно говорив про необхідність єдності та співпраці між народами України та Росії. Пасічник уважно слухав, киваючи головою на знак згоди. Він розумів важливість побудови міцних зв'язків між різними проросійськими партіями колишньої України та урядом Новоросії. Він говорив про переваги тісніших економічних і культурних зв'язків між двома народами. З продовженням зустрічі дискусія ставала дедалі гарячішою, обидва чоловіки підвищували голос, обговорюючи тонкощі своїх пропозицій. Але врешті-решт вони обидва погодилися з важливістю спільної роботи для досягнення спільних цілей. Зустріч завершилася на позитивній ноті: обидва чоловіки потиснули один одному руки і пообіцяли продовжити обговорення в найближчі тижні. Пасечник був оптимістично налаштований щодо майбутнього регіону і впевнений, що за допомогою Мураєва та інших проросійських лідерів колишньої України вони зможуть побудувати більш сильне і процвітаюче майбутнє для всього російськомовного населення колишньої України."
 dnr.28.a:0 "Это будет хорошее сотрудничество."
 dnr.27.t:0 "Трибунал у справах військовополонених"
 dnr.27.d:0 "Зала суду наповнилася напругою, коли розпочався судовий процес над українським генералом Сергієм Кривоносом. Кривоноса звинувачували у численних військових злочинах, скоєних під час конфлікту на Донбасі, включаючи невибіркові обстріли цивільних районів і використання забороненої зброї. У міру того, як сторона обвинувачення представляла свої докази, настрій у залі суду ставав все більш похмурим. На екрани виводилися фотографії зруйнованих будинків і споруд, а свідки розповідали про жахи, які вони пережили під час конфлікту. Кривонос, одягнений у військову форму, стоїчно сидів, поки обвинувачення представляло свої аргументи проти нього. Його команда захисту стверджувала, що він діяв за наказом свого керівництва і що у нього не було іншого вибору, окрім як зробити те, що він зробив. Але аргументи захисту не вплинули на обвинувачення. Під час судового процесу стало зрозуміло, що докази проти Кривоноса були переконливими. Суддя вислухав обидві сторони і після ретельного розгляду виніс обвинувальний вирок за всіма пунктами обвинувачення. Зал суду вибухнув оплесками під час зачитування вироку. Сім'ї загиблих обіймали один одного і плакали зі сльозами полегшення. Кривоніса відвели в наручниках для очікування вироку. Цей суд став ключовим моментом для жителів Донбасу, символом їхньої рішучості притягнути до відповідальності винних у воєнних злочинах. Він став нагадуванням про те, що справедливість може перемогти навіть у найтемніші часи."
 dnr.27.a:0 "Исполнить вышую меру наказания!"
 dnr.27.b:0 "Отправить на киху, лет так минимум на 5!"
 dnr.26.t:0 "Обіцянка майбутнього"
 dnr.26.d:0 "У великій залі будівлі уряду Новоросії зібрався великий натовп людей. Настрій був сумішшю надії та невпевненості. Всі вони прийшли послухати лідера країни, голову уряду Новоросії Леоніда Пасічника, який говорив про майбутнє нації. Коли Леонід вийшов на трибуну, в залі запала тиша. Він прочистив горло і почав говорити. "Дорогі співгромадяни Новоросії, - почав він. "Я знаю, що минуле було важким для всіх нас. Ми пережили роки війни і потрясінь, але сьогодні я тут, щоб сказати вам, що майбутнє світле. Уряд прагне створити краще життя для всіх нас". Аудиторія вибухнула оплесками та вигуками. "Ми відбудуємо нашу країну з нуля, - продовжив Прем'єр-міністр. "Ми будемо інвестувати в інфраструктуру, освіту та охорону здоров'я. Ми створимо робочі місця та економічні можливості. Ми створимо робочі місця та економічні можливості для кожного. І ми подбаємо про те, щоб кожен громадянин Новоросії мав право голосу в майбутньому нашої країни". Натовп знову вибухнув оплесками, багато людей встали і розмахували прапором Новоросії. "Я обіцяю вам, що ми будемо працювати не покладаючи рук, щоб зробити Новоросію великою країною, - підсумував президент. "Разом ми побудуємо майбутнє, яким ми всі зможемо пишатися". Коли він зійшов з трибуни, натовп кинувся вперед, щоб потиснути йому руку і привітати його. У повітрі витало відчуття оптимізму і надії, і люди почали схвильовано говорити про майбутнє своєї країни. Для жителів Новоросії це був початок нового розділу в їхній історії. Їм обіцяли світле майбутнє, і вони були готові працювати разом, щоб зробити його реальністю."
 dnr.26.a:0 "За наше светлое будущее!"
 dnr.25.t:0 "Початок Інтеграції"
 dnr.25.d:0 "Після років конфлікту та невизначеності українські території Донецької та Луганської областей нарешті були інтегровані до новоствореної Новоросії. Процес інтеграції, який розпочався кілька місяців тому, був неоднозначно сприйнятий міжнародною спільнотою, але жителі Донецька і Луганська святкують можливість приєднатися до своїх братів і сестер у новій країні."
 dnr.25.a:0 "Після років..."
 dnr.24.t:0 "День Перемоги"
 dnr.24.d:0 "Після років інтенсивних боїв і кровопролиття об'єднані сили Донецької та Луганської народних республік нарешті перемогли у війні на Донбасі проти української армії. Звістка про це розлетілася як пожежа, і по всьому регіону почалися святкування. Жителі ДНР заполонили вулиці, розмахуючи прапорами і радіючи новознайденому миру. Сім'ї возз'єднувалися, а сльози радості котилися по обличчях тих, хто втратив близьких під час конфлікту. Звуки феєрверків і музики наповнювали повітря, люди танцювали і обіймалися, вдячні за закінчення війни."
 dnr.24.a:0 "Нарешті мир."
 dnr.8.t:0 "Склад знайдено"
 dnr.8.d:0 "Ми знайшли кілька складів."
 dnr.8.a:0 "Слава Донецьку!"
 dnr.9.t:0 "У цьому районі не виявлено жодних складів"
 dnr.9.d:0 "Ми не знайшли жодного складу в цьому районі."
 dnr.9.a:0 "Ну, просто використовуйте російську!"
 dnr.10.t:0 "Ситуація в Україні"
 dnr.10.d:0 "Ситуація в Україні дуже складна. Законний уряд був повалений жорстоким Євромайданом. Але зараз ситуація набагато гірша. Україна впала в анархію, і тільки ми, Донбас, який вчасно відколовся, є острівцем адекватності в регіоні."
 dnr.10.a:0 "Слава Донбасу!"
 dnr.11.t:0 "Дивлячись на Захід"
 dnr.11.d:0 "Український режим було повалено. Але хоробрі сини Донбасу повинні усвідомити, що це ще не кінець, бо перемога ще не досягнута. Збройні сили України залишаються. Вони продовжують боротися за режим, якого вже не існує, але в цій боротьбі ми можемо постраждати найбільше! Ми зробимо все, щоб поховати поняття "Україна". Або загинемо, намагаючись це зробити."
 dnr.11.a:0 "Так, смерть!"
 dnr.12.t:0 "Ситуція в нашій країні"
 dnr.12.d:0 "Давно відомо, що в цьому світі не можна бути самотнім. На що ми зараз повинні звернути увагу, так це на наше оточення: поки друзі близько, вороги, на жаль, ще ближче. Тільки нам вирішувати, в який бік дивитися і з якими намірами."
 dnr.12.a:0 "Вставай Донбас!"
 dnr.13.t:0 "Дивлячись на Схід"
 dnr.13.d:0 "Путіна називали по-різному. Політиком. Лідером. Воїном. Але для нас все просто - він Батько. Ні, Мати! Він годує нас грудьми щодня, але замість чистого молока вливає нам в горло зброю і ресурси. Він - наш особистий Спаситель, і ми повинні цінувати все, що Росія коли-небудь робила для нас."
 dnr.13.a:0 "Містер Путін, ми чекаємо на вас!"
 dnr.14.t:0 "Дивлячись на Північ"
 dnr.14.d:0 "А, ЛНР... Пасічник... Ми пережили разом і хороші, і погані моменти, пройшовши шлях від братів по крові до майже ворогів, які не можуть поділити припаси. Але, зрештою, ми не такі вже й різні. Можливо, ми можемо запропонувати більшу співпрацю, дружбу та єдність проти спільного ворога!"
 dnr.14.a:0 "Щира правда"
 dnr.15.t:0 "Таможня"
 dnr.15.d:0 "Як і у всіх хороших колег, у нас є свої розбіжності. Іноді ми не можемо правильно поділити гроші, які отримуємо, або навіть наші хоробрі солдати можуть вбити один одного за їжу. Але хіба це має значення в глобальному масштабі? Ми - сини Донбасу! Ми повинні об'єднатися, щоб протистояти неминучому ворогу, зараз або ніколи!"
 dnr.15.a:0 "Так."
 dnr.15.b:0 "Ні."
 dnr.16.t:0 "Контроль Бізнесів"
 dnr.16.d:0 "Олігархи - величезна проблема в Донецьку. Як ми будемо з нею боротися?"
 dnr.16.a:0 "Статус Кво - це єдиний шлях."
 dnr.16.b:0 "Олігархи повинні працювати для людей! А не на свої кишені!"
 dnr.16.c:0 "Росія розбереться з ними"
 dnr.17.t:0 "Криза в адміністрації"
 dnr.17.d:0 "Ну, у нас є деякі проблеми з системою адміністрування. Ми повинні виправити це зараз."
 dnr.17.a:0 "Ми почнемо Федералізацію!"
 dnr.17.b:0 "Ми почнемо Конфедерацію!"
 dnr.18.t:0 "Лідер Новоросії"
 dnr.18.d:0 "Тепер ми повинні обрати лідера нашої країни!"
 dnr.18.a:0 "Герой Донецька - Денис Пушилін"
 dnr.18.b:0 "Батько Луганська - Леонід Пасічник"
 dnr.18.c:0 "Парламентська республіка - найкращий шлях"
 dnr.19.t:0 "Військова підтримка"
 dnr.19.d:0 "Ми почнемо підтримувати війну в нашому суспільстві"
 dnr.19.a:0 "Суспільство..."
 dnr.20.t:0 "Новоросія"
 dnr.20.d:0 "Всі документи готові і тепер ми готові розпочати об'єднання з Луганськом. Наші армії єдині, наша економіка єдина, а головне - наші люди єдині в боротьбі проти націоналістичної України!"
 dnr.20.a:0 "Слава Новоросии!"
 dnr.21.t:0 "Об'єднання?"
 dnr.21.d:0 "Ми можемо об'єднатися!"
 dnr.21.a:0 "Так!"
 dnr.21.b:0 "Ні, дякую."
 dnr.22.t:0 "Об'єднання?"
 dnr.22.d:0 "Ми можемо об'єднатися!"
 dnr.22.a:0 "Так!"
 dnr.22.b:0 "Ні, дякую."
 dnr.23.t:0 "Пасечник послал нахуй пушилина по телефону."
 dnr.23.d:0 "Пасечник послал нахуй пушилина по телефону."
 dnr.23.a:0 "Нижній текст"
 dnr.1.t:0 "Дивлячись навколо нас"
 dnr.1.d:0 "Про це заявив наш президент на своїй конференції: "Ми знаходимося під тиском Збройних сил України із заходу і дружньої Російської Федерації зі сходу. На півночі ми межуємо з братньою Луганською Республікою. Вся територія знаходиться під контролем донецького ополчення або російської армії. Вперше в історії нашої країни ми змушені боротися за свою свободу. Наші солдати воюють за свободу, за свою Батьківщину. Ми не дозволимо це знищити."
 dnr.1.a:0 "Вставай Донбасс!"
 
 search_for_a_warehouse_in_katyk:0 "Пошук складу в Катику"
 DPR_mobiks1:0 "Мобілізація"
 DPR_mobiks1_desc:0 "Мобілізаційна машина вмикається на повну потужність."
 DPR_mobiks2:0 "Мобілізація"
 DPR_mobiks2_desc:0 "Мобілізаційна машина вмикається на повну потужність."
 DPR_mobiks3:0 "Масова Мобілізація"
 DPR_mobiks3_desc:0 "Мобілізаційна машина вмикається на повну потужність."
 
 DPR_propaganda:0 "Пропаганда"
 DPR_propaganda_desc:0 "Пропаганда є невід'ємною частиною політики будь-якої держави, і ми не виняток. Використовуючи правильні інструменти психологічного впливу на населення, ми можемо збільшити свою підтримку через телевізійні програми та новини, розповідаючи жителям Донбасу те, що вони хочуть чути і що також буде корисним для нашої позиції та політики, навіть якщо це не зовсім правда."
 DPR_oligarhs:0 "Олігархи"
 DPR_oligarhs_desc:0 "Олігархія - дитя капіталізму. Вони володіють величезними маєтками, бізнесом і навіть шахтами на нашій території, і вони не планують передавати свої добре розвинені підприємства державі. Проте, тримаючи таких впливових людей поруч із собою, ми можемо отримати сильних союзників, а коли вони усвідомлять свою вигоду від співпраці з нами, вони можуть бути навіть лояльними до нас."
 DPR_clown:0 "Непопулярний президент"
 DPR_clown_desc:0 "Після вбивства ватажка угруповання "ДНР" Олександра Захарченка новим президентом республіки в результаті виборів став Денис Пушилін. Хоча люди обрали його, вони все ще пам'ятають старого лідера, тому нинішній президент не користується великою популярністю."
 DPR_FSB:0 "Вплив ФСБ"
 DPR_FSB_desc:0 "Вже деякий час ФСБ, Федеральна служба безпеки Росії, здійснює політичний вплив на країну. Вони або підкуповують чиновників "ДНР", або погрожують їм, і це не може тривати далі. Щоб мати повне самоврядування, не повинно бути ніякого іноземного впливу."
 DPR_rivalry:0 "Ворожнеча між республіками"
 DPR_rivalry_desc:0 "Після "відставки" Плотницького боротьба за фінансові потоки в "ЛНР" між нинішнім ватажком бойовиків Пасічником та "міністром внутрішніх справ" Корнетом не припинилася. Більше того, Пасічник намагається витіснити так званих "донецьких" з Луганська. Так званий міністр внутрішніх справ Корнет - людина Захарченка. Пасічник намагається відібрати у Корнета вугільну промисловість - легальні шахти і кар'єри. Нещодавно в ефірі телеканалу "Россия 24" ватажок самопроголошеної "ЛНР" Пасічник заявив про намір вивести з тіні всі "державні" та недержавні вугільні підприємства "республіки". "Буде переглянута політика підходу до державних і недержавних вугільних підприємств, щоб вивести з тіні ті підприємства, які намагаються працювати нелегально. Ми будемо робити все можливе, щоб їх легалізувати. Це головне завдання", - сказав Пасічник. Варто зазначити, що це вже не перший випадок, коли спецслужби "ДНР" намагаються взяти під контроль ті чи інші фінансові потоки на території "братньої республіки". Фактично, мова йде про боротьбу між ватажками "ЛНР" і "ДНР" за контроль над фінансовими потоками від видобутку і продажу вугілля, алкогольних напоїв і тютюнових виробів."
 DPR_corruption:0 "Корупція"
 DPR_corruption_desc:0 "Уряд був корумпованим протягом багатьох років, оскільки олігархи з цієї країни та Росії давали хабарі чиновникам. Це послабило країну, люди втратили довіру до системи, а це означає, що корупція не може продовжуватися. Будуть впроваджуватися антикорупційні заходи, а корумповані чиновники будуть звільнятися зі своїх посад."
 DPR_shluha:0 "Ефект несподіванки"
 DPR_shluha_desc:0 "Після більш ніж п'яти років очікування нам увірвався терпець. Підготовлені та екіпіровані, ми почали несподіваний і нищівний наступ на українську хунту і готові взяти реванш за всі наші попередні невдачі. Наші солдати як ніколи готові боротися і вмирати за Донбас, і їхня жертва не буде марною!"
 DPR_problem_with_oligarchs:0 "Проблема з російськими олігархами"
 DPR_problem_with_oligarchs_desc:0 "Корупція в країні має причину, і це - олігархи з Росії. Вони підкупили урядовців, від найнижчих чинів до вищого ешелону, і взяли під контроль кілька важливих інститутів і навіть саму економіку, а це означає, що якщо Донецька Народна Республіка хоче бути незалежною, їм так чи інакше доведеться покинути країну."
 DPR_russian_influence:0 "Російський вплив"
 DPR_russian_influence_desc:0 "І ФСБ, і олігархи мають одну спільну рису: вони росіяни. У країні існує величезний російський вплив, незалежно від того, чи походить він від людей, які мають владу і гроші, чи просто від населення, яке проживає в країні. Звідки б він не походив, він тут. І країна не повинна більше страждати, тому що вона повинна бути незалежною."
 DPR_crisis_in_administration:0 "Криза в адміністрації"
 DPR_crisis_in_administration_desc:0 "Донецька Народна Республіка - це, звичайно, нова країна, але це не означає, що вона не може керувати собою набагато краще. Бюрократичний апарат цієї країни був просякнутий хабарництвом і корупцією наскрізь, що перешкоджало управлінню цим регіоном. У поєднанні з боротьбою з корупцією та належними чиновниками, які знають, що вони роблять, ця проблема буде вирішена."
 DPR_federation:0 "Федерація"
 DPR_federation_desc:0 "Федерація - це форма державного устрою, за якої частини держави є державними утвореннями з юридично визначеною політичною самостійністю в межах федерації. Федерація передбачає існування державно-територіальних утворень - суб'єктів федерації, які не мають державного суверенітету, але мають досить широкі повноваження у внутрішній політиці."
 DPR_confederation:0 "Конфедерація"
 DPR_confederation_desc:0 "Конфедерація - це союз суверенних держав, які уклали конфедеративний договір і таким чином об'єдналися для вирішення спільних проблем і здійснення спільних дій. Конфедерація означає різні грошові одиниці та різні збройні сили з командуванням у державах, що входять до конфедерації. Конфедерація - це лише форма об'єднання решти незалежних держав і країн. Члени конфедерації зберігають свій державний суверенітет, незалежну систему правління і своє законодавство і передають до компетенції Союзу лише обмежене коло питань: оборона і зовнішня політика. Рішення з питань, спільних для Сполучених Штатів, не обов'язково поширюються на територію кожної держави-члена конфедерації."
 DPR_novorosjablyat:0 "Новоросія"
 DPR_novorosjablyat_desc:0 "Новоросія - проект створення проросійського державного утворення в Україні, що існував у 2014-2015 роках. Він з'явився під час Євромайдану, коли президент Росії Володимир Путін ввів у вжиток термін "Новоросія" для позначення російських претензій на південь і схід України, названий на честь однойменного історичного регіону Російської імперії. Під час проросійських протестів на сході України в Донецькій і Луганській областях у квітні-травні 2014 року за участі Росії були утворені самопроголошені Донецька Народна Республіка (ДНР) і Луганська Народна Республіка (ЛНР). 24 червня 2014 року ДНР і ЛНР оголосили про плани створення Конфедерації Новоросії, або Союзу народних республік (СНР), і прийняли акт про об'єднання. Було створено Об'єднаний парламент Новоросії, спікером якого став Олег Царьов, і розроблено проект конституції конфедеративного державного утворення. Навесні 2015 року в рамках реалізації Другої Мінської угоди проект "Новоросія" був закритий, а дія акту про об'єднання ДНР і ЛНР призупинена."
 
 spirit_of_novorosja:0 "Ворожнеча між республіками"
 spirit_of_novorosja_desc:0 "Ворожнеча між республіками"

 #OLD KLYACHA VITRENKO

dnr_vitrenko_victorious:0 "Вітренко переможна!"
dnr_vitrenko_victorious_desc:0 "Тричі - Ура! Об'єднаний соціалістичний фронт під керівництвом нашого харизматичного лідера Наталії Вітренко знову зумів відвоювати, здавалося б, втрачену підтримку народу і повернути країну на шлях демократії, рівності та братерства. Цей день є справжнім святом для всіх прихильників теорій Маркса і Леніна, адже ще одна держава і ще один народ зуміли обрати правильний шлях!"
dnr_a_hand_for_the_poor:0 "Рука допомоги бідним..."
dnr_a_hand_for_the_poor_desc:0 "Робітничий клас Донбасу сильно постраждав під час правління українських фашистів, але навіть нова влада ДНР і ЛНР не намагалася поліпшити його становище, що змусило його втратити будь-яку надію. З нашою появою вони стали рушійною силою сили соціалістичного руху, і саме їм ми зобов'язані нашою перемогою, а жителі Донбасу - своїм майбутнім. Вони заслуговують на краще життя, і ми дамо їм його. Хай живе пролетаріат!"
dnr_and_punishment_for_untruthworthy:0 "...і покарання для негідників"
dnr_and_punishment_for_untruthworthy_desc:0 "Паразити, які сиділи в своїх розкішних кабінетах, їздили на дорогих західних автомобілях і продовжували брехати пролетаріату про свою лояльність до нього, не заслуговують нічого, крім найжорстокішого покарання і мук. У той час як люди виживали на мізерну зарплату і намагалися мирно донести свій жаль і відчай до партійного керівництва, партія направила проти них своїх озброєних псів. Це непростимо. Справедливість однакова для всіх, і я б вам не позаздрив!"
dnr_socialism_on_the_rise:0 "Соціалізм на підйомі"
dnr_socialism_on_the_rise_desc:0 "Розібравшись з усім тим безладом, який залишила нам на прощання колишня влада, ми можемо нарешті приступити до виконання своїх обіцянок перед народом. Створення нової Червоної Армії, повна зміна економічного курсу, перебудова державного апарату... відтепер все це - наш обов'язок перед народом. Як кажуть справді мудрі люди, ця земля ніколи не бачила нічого кращого за Радянський Союз, тож давайте повернемо ті старі часи і продовжимо його спадщину!"
dnr_looking_for_the_allies:0 "В пошуках союзників"
dnr_looking_for_the_allies_desc:0 "Друзі та союзники потрібні всім, навіть могутньому народу Донбасу. Самотужки ми не зможемо досягти всіх результатів, яких би нам хотілося, як би ми цього не хотіли, але за допомогою інших сил - цілком можливо. У світі, і навіть тут, в Україні, є багато людей, які ідеологічно близькі нам, і ми просто повинні намагатися бути союзниками і прикривати один одного, якщо хочемо досягти наших цілей."
dnr_a_message_to_distitutes:0 "Вістка обездоленим"
dnr_a_message_to_distitutes_desc:0 "В Україні та Новоросії є багато людей, які втратили все. Дім, роботу, сім'ю і все те, без чого їхнє життя вже ніколи не буде колишнім. На жаль, ми нічого не можемо з цим вдіяти, війни та заворушення завжди закінчуються саме так, але ми все ще маємо що запропонувати цим людям - майбутнє. Кожен, хто чогось потребує, знайде у нас підтримку і допомогу, але ми теж потребуємо їх. Ми можемо допомогти один одному, і ми повинні спробувати!"
dnr_outreach_to_the_media:0 "Робота зі ЗМІ"
dnr_outreach_to_the_media_desc:0 "Світ повинен знати, що справа соціалізму не померла. Люди повинні знати, що надія на вільне і рівне суспільство все ще жива, десь у Східній Європі, і що надія на перемогу цієї системи буде жити. Наше завдання зараз - розповісти Україні та світу, що робітники все ще борються за свою справу, і будуть продовжувати це робити стільки, скільки буде потрібно."
dnr_workers_of_the_world_come_to_us:0 "Робітники світу, приходьте до нас!"
dnr_workers_of_the_world_come_to_us_desc:0 "За всі ці роки спадщина соціалістичної системи СРСР була майже зруйнована українськими та російськими капіталістами, але вона все ще піддається змінам. Для цього, однак, наших співвітчизників з Донбасу недостатньо, і нам потрібні абсолютно всі. Робітники всього світу, які страждають від капіталістичної системи і десятиліттями пригнічуються неоаристократією, знайдуть притулок тут, на Донбасі. Приходьте! У раю знайдеться місце для всіх!"
dnr_alliance_of_revolutionaries:0 "Альянс революціонерів"
dnr_alliance_of_revolutionaries_desc:0 "У нашому випадку боротьба поодинці була б рівносильна самогубству. Революція в політичній, соціальній та економічній сферах, яку ми проводимо, гарантовано наведе страх на наших капіталістичних опонентів, і тому ми повинні знайти тих, з ким ми зможемо об'єднатися проти них. У Кіровограді є саме такі люди. Вони, як і ми, відбудовували соціалістичну систему з нуля, і вони знають, що таке бути самотнім на полі бою. Разом ми станемо сильнішими і обов'язково переможемо прогнилу систему!"
dnr_we_can_do_it_alone:0 "Ми можемо зробити це самотужки"
dnr_we_can_do_it_alone_desc:0 "Хоча наявність союзників полегшила б нам життя, ми не можемо дозволити собі довіряти іншим. Ніхто не має таких самих думок і поглядів, як ми, і ми повинні прийняти це. Зараз ми одні в цьому світі, це може змінитися, але ми повинні думати про сьогодення. Ми добре справлялися наодинці раніше, і ми будемо продовжувати це робити."
dnr_good_old_friend:0 "Старий добрий друг."
dnr_good_old_friend_desc:0 "Дивлячись на всі подорожі, які ми пройшли наодинці, ми хочемо зробити наступну подорож легшою. Є людина, яка може нам у цьому допомогти. Людина, яка поділяє ту ж ностальгію за радянською системою, що і ми. Віктор Медведчук, можливо, не є найбільш ідейним прихильником соціалізму, але у нас однакова мета. Побудувати вільну і рівну спільноту на землях України. І ким би ми були, якби не співпрацювали з однодумцями?"
dnr_world_here_we_go:0 "Світе, ми йдемо!"
dnr_world_here_we_go_desc:0 "Закликаючи всіх трудящих світу на допомогу і пропонуючи притулок всім нужденним в обмін на працю для загального блага, ми заявили про себе світові. Настав час показати себе на світовій політичній арені як новий маяк рівності і свободи - новий стовп соціалізму. Багато хто нас не помічав, багато хто ігнорував, але відтепер про нас знатимуть усі. Всі знатимуть, що робітнича боротьба все ще жива і здорова, і що соціалізм не помер!"
dnr_socialisation_of_the_domestic_affairs:0 "Соціалізація внутрішньої політики"
dnr_socialisation_of_the_domestic_affairs_desc:0 "Процеси колективізації, які здійснювалися на землях Радянського Союзу та ідеологічно близьких до нього країн, були довгими і важкими, особливо для деяких верств населення, але вони одразу ж принесли свої плоди. Усуспільнення сільського господарства та інших промислових аспектів держави є одним з найважливіших кроків до побудови соціалістичного раю, і ми до нього готові."
dnr_a_helping_hand_for_workers:0 "Рука допомоги робітникам"
dnr_a_helping_hand_for_workers_desc:0 "Всі хочуть жити в достатку, а рай неможливо побудувати без щасливого населення. Ми повинні йти назустріч нашим трудящим товаришам у їхніх бажаннях, що не тільки підвищить їхню підтримку партії та її ідей, але й дасть нам відданих і працьовитих людей, які з радістю виконуватимуть і навіть перевиконуватимуть поставлені завдання. Стаханов - свідок цього!"
dnr_driving_out_unprofitable_enterprises:0 "Витіснення неприбуткових підприємств"
dnr_driving_out_unprofitable_enterprises_desc:0 "Все, що працює в нашій країні, повинно працювати для людей і приносити їм користь. За час правління бандитів та олігархів на Донбасі залишилося багато підприємств, роль яких полягала лише в тому, щоб існувати на папері та бути об'єктом дотацій, які потім чарівним чином зникали в нікуди, замість того, щоб щось приносити людям. З цим потрібно покінчити раз і назавжди."
dnr_careship_for_old_ones:0 "Турбота про літніх людей"
dnr_careship_for_old_ones_desc:0 "Всі люди, які прожили своє життя на благо свого народу і партії, хочуть і заслуговують на гідну і спокійну старість. Пропрацювавши на державу десятки років, вони пережили разом з нею важкі потрясіння і прекрасні відродження, стали для неї майже рідними. Якщо держава не дбає про тих, хто так довго працював на її благо, то чим ми кращі за інших? Чим ми кращі за прогнилих капіталістів, якщо не забезпечуємо старому населенню гідну старість?"
dnr_workers_domestic_front:0 "Робітничий вітчизняний фронт"
dnr_workers_domestic_front_desc:0 "Для побудови соціалістичної економіки, яка, в свою чергу, приведе нас до ідеальної держави і суспільства, потрібен кожен. Кожен, хто може працювати на верстаті, вирощувати та збирати кунжут, водити вантажівки чи кораблі... всі ці люди працюють не лише для партії, але й для свого майбутнього та майбутнього своїх родин. Тож до роботи, товариші! Майбутнє вже близько!"
dnr_a_deal_with_wealthy:0 "Угода з багатіями"
dnr_a_deal_with_wealthy_desc:0 "Як би ми не хотіли побудувати робітничий рай самотужки, ми не зможемо досягти цього без допомоги заможного класу. Протягом історії багато соціалістичних революціонерів знищували вищі класи і забирали їхню власність, якою вони не могли належним чином управляти, але ми будемо розумнішими. Уклавши угоду з елітою, ми зробимо їх та їхнє майно частиною нашої системи, і навіть залишки капіталістичної спадщини української хунти будуть служити народу."
dnr_welfare_for_lower_class:0 "Добробут для нижчих верств населення"
dnr_welfare_for_lower_class_desc:0 "Протягом останніх століть найбільше страждали люди, які належали до так званого "нижчого класу". Це були бідні та знедолені люди, які робили все можливе заради своєї сім'ї та себе, але держава всіляко перешкоджала їм у цьому. Боротьба з цим - головна мета соціалізму, яка є і нашою, і ми не дозволимо продовжувати страждання бідних. Ми покладемо цьому край, і всі будуть жити щасливо!"
dnr_mass_nationalisation:0 "Масова націоналізація"
dnr_mass_nationalisation_desc:0 "Політика державного привласнення підприємств усіх видів є однією з основ соціалістичної економічної структури. Як можна побудувати стабільну, самодостатню систему, коли економічним планам заважають великі корпорації та їхні мінливі власники, і коли люди, які могли б працювати на благо рідної країни, змушені працювати як негри на приватних фабриках?"
dnr_socialist_paradise:0 "Соціалістичний рай"
dnr_socialist_paradise_desc:0 "Здійснюючи всілякі економічні та соціальні реформи, експериментуючи та використовуючи старі методи в сучасному світі, ми завжди мали єдину мету - побудувати маленький соціалістичний рай. Всі наші кроки вели нас до цього моменту, і ось ми стоїмо перед нашим домом, перед рідною землею, яка нарешті зцілилася від усього того, що зробили з нею вороги і експлуататори, і готова до життя."
dnr_we_are_the_army_of_the_people:0 "Ми - армія народу!"
dnr_we_are_the_army_of_the_people_desc:0 "Держава без армії - це ніщо. На жаль, ми змушені змиритися з цими реаліями. Без потужної та боєздатної армії ми ризикуємо втратити не лише повагу до себе, але й саму державу, що категорично неприпустимо. Народна армія стоятиме на сторожі нашого народу, і для того, щоб вона захищала нас від усіх загроз, ми повинні вкладати в неї свою кров і піт."
dnr_peoples_army:0 "Народне Війско"
dnr_peoples_army_desc:0 "Слава могутньої Червоної Армії, народженої у вогні громадянської війни, буде супроводжувати нас вічно. Практика показала, що кожен селянин і робітник може не тільки приєднатися до героїчної армії, а й принести реальну користь своїй країні і честь своїй родині. Ми шануємо славу наших предків, і ніщо інше не покаже це краще, ніж наслідування їхніх традицій!"
dnr_the_strongest_warriors_of_socialism:0 "Найсильніші воїни соціалізму"
dnr_the_strongest_warriors_of_socialism_desc:0 "Основою будь-якої армії, окрім чисельності, завжди були якість та прогрес. Історія неодноразово доводила, що з елітними підготовленими солдатами, оснащеними за останнім словом техніки, можна перемагати армії будь-якого розміру, і наш обов'язок як останнього справжнього бастіону соціалізму в Європі - захищати нашу спадщину і наші ідеї, а без технологічно розвиненої армії це просто неможливо."
dnr_mass_recruitment:0 "Масовий призов"
dnr_mass_recruitment_desc:0 "Народній армії потрібні... як не дивно, люди. Багато людей. Якщо ми хочемо захистити наші кордони і просунути їх далі, нинішньої армії буде недостатньо. Запустивши масову хвилю призову, ми не тільки забезпечимо армію діючими солдатами, а й зможемо створити резерв, який, у разі справді кривавої боротьби за свободу і рівність, обов'язково стане в нагоді."
dnr_new_military_complex:0 "Новий ВПК"
dnr_new_military_complex_desc:0 "На жаль, чисельності та морального духу недостатньо для підтримки боєздатності армії. Їм потрібна зброя та спорядження. Наші нинішні потужності дозволяють нам забезпечувати армію, але якщо армія розширюватиметься, нам знадобиться більше заводів і складів. Збільшивши кількість заводів і виробництво зброї та боєприпасів, ми значно підвищимо наші шанси на успіх на полі бою."
dnr_a_work_for_our_defenders:0 "Робота для наших захисників"
dnr_a_work_for_our_defenders_desc:0 "Щоб досягти успіху в нашій революційній та визвольній боротьбі, нам потрібно залучити кожного. Кожна людина, навіть якщо на перший погляд це здається неможливим, може допомогти нам у боях, і не обов'язково на передовій. Заводи, що виробляють боєприпаси та військову техніку, потребують все більше робочих рук, і якщо ми залучимо до виробництва кожну вільну руку, наші потужності стануть непереможними."
dnr_legacy_of_28_panfilovets:0 "Спадщина 28 панфіловців"
dnr_legacy_of_28_panfilovets_desc:0 "Всі ми пам'ятаємо легендарну історію про 28 найгероїчніших солдатів Великої Вітчизняної війни, які, майже беззбройні, зуміли зупинити наступ цілої нацистської армії на Москву і тим самим врятували Радянський Союз. Їхній подвиг увійшов в історію назавжди, і саме він має стати основою нашої армії. Якщо кожен солдат стане панфіловцем, нас ніщо не зупинить."
dnr_put_everyone_we_can_in_charge:0 "Put Everyone We Can in Charge"
dnr_put_everyone_we_can_in_charge_desc:0 "The revolutionary and liberation struggle requires sacrifice, and all those who die for the glorious ideas of socialism will forever remain in our memory and history. But we need everyone to win this battle. Everyone has responsibilities, and those who are not fighting on the agricultural, technological, and information fronts, who are not raising new generations, must take up arms and fight for us and our ideas on the battlefield. Victory will be ours! No matter the cost!"
dnr_get_back_politheads:0 "Get Back Politheads"
dnr_get_back_politheads_desc:0 "Everything needs supervision, especially the army. Ordinary military inspections, and testing of weapons, are a matter of course, but ideological supervision is another thing. Ideological control over commanders, as Soviet practice has shown not for the first time, is very important and has a strong impact on the morale of soldiers, which in turn is priceless. Loyalty and devotion to the state and the party are the most important things for the army, and we are ready to take any measures to keep it that way."
dnr_invite_foreign_specialists:0 "Invite Foreign Specialists"
dnr_invite_foreign_specialists_desc:0 "Quality comes first. No one has ever been able to achieve everything on their own, and even the great Soviet Union shared and adopted technologies from foreign developers, as well as established joint construction and exploitation. There are many brilliant engineers and theorists in the world who would be happy to help their fellow socialists in a good cause, and we will give them the opportunity."
dnr_legacy_of_our_grandfathers:0 "Legacy of Our Grandfathers"
dnr_legacy_of_our_grandfathers_desc:0 "The glory of our grandfathers, who beat the Nazis both near Moscow and Berlin, will live forever. We honour their memory, and we will continue to do so, hoping that our soldiers will be able to get at least a sliver of the glory of those who were able to put all the fascist scum on their backs while the rest of the world was shaking with fear. The Red Army lives on in us, and with the blessing of our ancestors, it will remain so. Glory to the Reds! The world is ours!"
dnr_establishment_of_the_apparatus:0 "Establishment of the Apparatus"
dnr_establishment_of_the_apparatus_desc:0 "Having started the process of complete reform of the governmental system, we have encountered an outdated state apparatus, the existence of which is a banal humiliation for our state and party. Having set out to restore the proven and impeccable Soviet practices, we must fundamentally change the existing agencies for the good of the people and the state."
dnr_one_right_party:0 "One Right Party"
dnr_one_right_party_desc:0 "The multi-party political system has too often been the cause of many unrests and even coups, and can therefore be considered dangerous, especially when we aim to build a true socialist paradise. The Soviet one-party system has proved to be better than any other in the world, so we will borrow some methods from our glorious ancestors."
dnr_trustworthy_media:0 "Trustworthy Media"
dnr_trustworthy_media_desc:0 "Over the years, television and the Internet have proved to be really powerful drivers of events and shapers of public opinion, and this factor cannot be ignored. Our opponents will continue to throw mud at us and our decisions, and the only possible counteraction to this can be pro-government media that would, on the contrary, stand up for the party and the people who elected it."
dnr_patriotic_studying:0 "Patriotic Studying"
dnr_patriotic_studying_desc:0 "We and our parents knew history and geography well, were in good physical shape and understood discipline, unlike today's youth. But everything can change. The Soviet school curriculum was impeccable, and even in the West, this is recognised, which is hardly a small matter. Young people need a good education, or our country cannot expect anything good for itself in the nearest future."
dnr_agitation_countrywide:0 "Agitation Countrywide"
dnr_agitation_countrywide_desc:0 "The Soviet practice of propaganda posters and brochures, a plethora of party magazines and newspapers, and reminding people of what a wonderful country they lived in and how lucky they were to have it, unlike others, was fantastic. The moral of the people, as I recall, was simply on a cosmic level, and it would be a shame not to repeat the success of the campaign of the great Union of Peoples."
dnr_reconcile_orthodoxy_and_socialism:0 "Reconcile Orthodoxy and Socialism"
dnr_reconcile_orthodoxy_and_socialism_desc:0 "Mistakes are what make human beings human, and even the great ones sometimes make them. The leaders of socialism, one after the other, have brought the thesis of their forefather, Karl Marx, that "religion is opium for the people", but in our opinion, nothing prevents our historically Orthodox people from abandoning spirituality to fully understand the theory of socialism. This is not only unnecessary in our time, but even harmful. We have had enough of witch hunts!"
dnr_a_big_tent_concept:0 "A 'Big Tent' Concept"
dnr_a_big_tent_concept_desc:0 "After the introduction of the one-party system, our state stumbled with a shortage of personnel in some areas where the socialists simply did not have enough experience. But there is a solution to this - the expansion of our party in an ideological form. By making the socialist party a home for everyone - left and right, loyal to the people of Donbas - we will solve most of the state's problems and finally be able to deal with more important matters."
dnr_issue_of_state_language:0 "Issue of State Language"
dnr_issue_of_state_language_decsc:0 "If we want to unite all the territories of the former Ukrainian Soviet Socialist Republic, we must remember the two dominant peoples on its lands - the Russian majority and the Ukrainian minority. In paradise, everyone is equal, even Ukrainians, so granting Ukrainian the status of a second official language is our commonplace duty, which will bring us a little closer to our goal."
dnr_new_bright_generation:0 "New Bright Generation"
dnr_new_bright_generation_desc:0 "For the sake of the future of our free country and our brave people, we must be confident in the ability of future generations to carry the burden of governing a powerful state. The return of the Soviet school system will play a role, but without things like Komsomol and the Pioneers, our children and their children will simply not have all that the Party gave us. We just have no right to deprive them of this. And with this approach, our state and our ideals will live forever!"
dnr_return_to_iron_fist:0 "Return to Iron Fist"
dnr_return_to_iron_fist_desc:0 "Stalin's iron fist policy may not have been marked by any excessive transparency, but it showed excellent results in both domestic and foreign policy. Of course, no one is reviving the cult of personality, but a strong hand is exactly what the state and the people need now."
dnr_new_ottepel:0 "New 'Ottepel'"
dnr_new_ottepel_desc:0 "The results of the “Khrushchev Thaw” were extremely impressive at the time and opened the gates to the outside world for our great homeland. By adopting a softer policy, we may not have any extraordinary productivity, but fellow citizens are guaranteed to be happy with our acceptance of the legacy of an influence-free Central Committee."
dnr_nostalgia_for_the_past:0 "Nostalgia for the Past"
dnr_nostalgia_for_the_past_desc:0 "Having completed the complex process of reforming the state apparatus, we are one step closer to the formation of a full-fledged socialist state. The Soviet legacy was the only thing that kept our dream on its feet, but now it’s the main driver and source of all our actions and plans. Don’t be afraid, comrades, we’ll treat the legacy of our ancestors with care and will not allow their glory to decline!"
dnr_the_future_awaits_us:0 "The Future Awaits Us!"
dnr_the_future_awaits_us_desc:0 "Having carried out all possible reform processes and brought Soviet innovations back into practice, our state can achieve the last goal - the unification of all the lands of former Ukraine. The army is as ready as ever, the economy is able to withstand any shocks, the political apparatus is showing strength and determination, and a lot of our like-minded people are ready to support us, both in Ukraine and around the world. Forward, Donbass! A bright future is just around the corner!"
dnr_liberate_kharkov:0 "Liberate Kharkov"
dnr_liberate_kharkov_desc:0 "The lands of the Kharkov region have been and remain fraternal not only to Donbass but to the whole of Ukraine. For centuries, the history of Kharkov and Donbass has been marked by common events. Shared grief and joy. Kharkiv is one of the most industrialised regions of the country, and its workers and people need the help of their brothers. No one dares to enslave the brave people of the Kharkov! And we will prove it!"
dnr_march_on_dnepropetrovsk:0 "March on Dnepropetrovsk"
dnr_march_on_dnepropetrovsk_desc:0 "There are two capitals in Ukraine built on the Dnepr River, and each is a bastion of lying politicians, gangs, and suffering workers and residents. Dnepropetrovsk is an important economic centre, but over the years bandits and oligarchs who have lost their boundaries have turned it into a den of crime and illegality, while people have become poorer and the desires of the proletariat have been ignored. This has come to an end! Dnepropetrovsk deserves justice, and it will get it!"
dnr_at_the_heart_of_ruin:0 "At the Heart of Ruin"
dnr_at_the_heart_of_ruin_desc:0 "Kiev, Chernigov, and Poltava are three cities that have become symbols of devastation and instability that, if we want to live in peace, must be quelled. The people in these cities have suffered especially since the beginning of the chaos, and they have had no one to help them in this struggle. But now we are strong enough not only to fight for our own rights and freedoms but also to help all our brothers and sisters. "
dnr_approaching_podolye:0 "Approaching Podolye"
dnr_approaching_podolye_desc:0 "The lands of  Podolye may not be the industrial heart of the country, but even so, many of its residents suffer from a government that they did not elect and that does not hear them. We have seen this before, and unfortunately, we are seeing it now, and it needs to stop. Proud Podolye land, just bear with us, we are close!"
dnr_legacy_of_kirov:0 "Legacy of Kirov"
dnr_legacy_of_kirov_desc:0 "Kirovohrad, after the fall of Ukraine, became a new bastion of socialism. Concerned Russians managed to establish control over these lands and then convinced the locals that communism was not dead and that its ideals could be resurrected and implemented. They gave people hope, and so did we. But we still have many differences. All of these need to be resolved now in order to finally unite the state and its socialist figures and leaders."
dnr_a_blow_to_zapadentsy:0 "A Blow to Zapadentsy"
dnr_a_blow_to_zapadentsy_desc:0 "The so-called "Western Ukrainian Lands" have always shown themselves to be the most intolerant part of our country, who mostly do not recognise Russians and Russian as equal to Ukrainian, and even after many decades still glorify fascist figures and collaborators like Bandera and Petliura. But even so, there are people here who believe in equality between the many peoples of Ukraine, who are suffering from capitalist influence, and who are asking for help from their brothers in Donbass and the rest of the country. The West is calling for aid, and we will answer!"
dnr_go_south_the_dnepr:0 "Go South the Dnepr"
dnr_go_south_the_dnepr_desc:0 "Zaporozhye has always been the cradle of the revolutionary spirit and the will of simple people for freedom and equality. Since the days of the famous Zaporozhyan Cossacks, the locals have fought back against the aristocracy that considered them slaves, and centuries later, Makhno and many others continued their work. But the fight for freedom by the people of Zaporozhye is not over. We will continue it, and we will win it!"
dnr_to_kherson:0 "To Kherson"
dnr_to_kherson_desc:0 "The Tavrian steppe of the Kherson region has always been known for its freedom and friendliness to socialist ideas. We have allies and friends here, but that doesn't mean we all share the same goals and ideology. Kherson belongs alongside other parts of our country, and no one dares to deny it."
dnr_crimean_issue:0 "Crimean Issue"
dnr_crimean_issue_desc:0 "Is Crimea Ukrainian or Russian... does it matter? Crimea has always belonged to its people, the Crimeans, and this question should be left to them. Before that, they wanted to join Russia and become independent, but now there are no fascists in Ukraine who would encroach on the freedoms of Crimea and its people. This issue must be raised again and for the last time, so that in the future no one will have any questions about whose peninsula it really is. "
dnr_akh_odessa_zhemchuzhyna_u_moria:0 "Akh, Odessa, Zhemchuzhyna u Moria"
dnr_akh_odessa_zhemchuzhyna_u_moria_desc:0 "Odessa is a place... that cannot be expressed in words. It has always been a centre of true Russian culture and a symbol of the greatness of the Russian people in the region, and this title was repeatedly sullied by the Ukrainian fascists who tried to take away the city from Odessans. But we cannot allow this to happen. Odessa - Mama, we will free you and bring you back, and no one will harm you anymore."
dnr_a_shining_whole_ukraine:0 "A Shining Whole Ukraine"
dnr_a_shining_whole_ukraine_desc:0 "The new state that will emerge from the wreckage of the old Ukraine is undoubtedly the successor to the glorious Ukrainian SSR, and thus indivisible. From the mighty Carpathian mountains in the west and the deep swamps of Polissya in the north to the wide Don steppes in the east and the beautiful Tavrian coast in the south, it is a single organism that is a crime to divide. Every citizen of this land deserves the paradise we will bring, regardless of ethnic or linguistic differences."
dnr_renewal_of_union_system:0 "Renewal of Union System"
dnr_renewal_of_union_system_desc:0 "The concept of Ukraine as a single state has proven to be unsuccessful. Even though it tried to build a multicultural state in the form of the Ukrainian SSR, what followed, namely an attempt to build a monocultural state by oppressing other languages and nations, destroyed any hope of continuing the "Ukrainian experiment". But there is a way out. The regions that will never accept the population of Novorossiya as they are do not have to live in the same country as them, but they can have their own. We will restore the system of the Soviet Union, but on the territory of Ukraine, and create a society where everyone will be with their own people and language, and live in a peaceful, equal and free community."

