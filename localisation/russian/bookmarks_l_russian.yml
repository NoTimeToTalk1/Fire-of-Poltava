l_russian:
 BM_HISTORY_TITLE:0 "Коротке підсумування ситупації"
 GATHERING_STORM_NAME:0 "Україна в вогні"
 GATHERING_STORM_DESC:0 "Страшна доля спіткала Україну. Після виборів 2019 року, які призвели до фінальної битви між двома основними конкуруючими партіями "Слуга народу" та "Європейська солідарність/Блок Петра Порошенка", ланцюг подій, що вийшов з-під контролю, призвів до того, що Україна, і без того ослаблена багатьма політичними кризами всередині країни та на міжнародній арені, розпалася на численні політичні угруповання всередині країни, які борються за верховенство. Лише одна з них врешті-решт переможе і зможе знову об'єднати розділену націю, як це було за часів Гетьманщини. "
 HITTING_FAN_NAME:0 "The Hitting of the Fan"
 HITTING_FAN_DESC:0 "Yup, that's right! That umbrella collection is about to come in real handy."
 AFU_GATHERING_STORM_DESC:0 "Після виборів 2019 року, коли країна розривалася на частини, а різні політичні угруповання претендували на лідерство в Україні, здавалося, що гірше вже бути не може. На тлі безладу в Україні проросійські ополченці в Донецьку та Луганську розпочали масований наступ на українську армію. Одразу після великого наступу сепаратистів на сході України Міністерство оборони України взяло під контроль дві українські області - Донецьку та Луганську - і успішно відбило атаку донбаських бандитів, що наступали. Однак перемога була марною, оскільки армія, яка воювала з сепаратистами, не змогла допомогти уряду в Києві відновити порядок в країні, коли у них ще була така можливість. Зараз, коли зв'язок зі столицею практично перерваний, а державне фінансування Збройних Сил припинилося, ситуація виглядає все більш безнадійною з кожним днем. В умовах, коли ресурси скорочуються, а страх перед вторгненням зі сходу здається неминучим, для Збройних Сил України та всього українського народу наближається велика боротьба, в якій хоробрі воїни або переможуть, або загинуть."
 DPR_GATHERING_STORM_DESC:0 "У 2014 році, коли після незаконного перевороту, що відбувся в столиці України, нова влада на чолі з неонацистськими бандерівськими фашистами захотіла здійснити геноцид етнічного російського населення Східної України, хоробрі сини Донбасу взяли в руки зброю і за підтримки наших братів-слов'ян вигнали фашистів з Донбасу, як наші діди в 1945 році. Донецька народна республіка була проголошена 7 квітня в надії приєднатися до Росії за кримським сценарієм. На жаль, цього не сталося, і невизнана республіка застрягла в підвішеному стані, будучи визнаною лише іншими невизнаними проросійськими державами в Грузії. Тим не менш, надія все ще є. Україна розвалена на шматки, і це наш шанс завдати удару по кривавому київському режиму, щоб звільнити весь Донбас від бандерівського ярма."
 LPR_GATHERING_STORM_DESC:0 "У 2014 році, коли після незаконного перевороту, що відбувся в столиці України, нова влада на чолі з неонацистськими бандерівськими фашистами захотіла здійснити геноцид етнічного російського населення Східної України, хоробрі сини Донбасу взяли в руки зброю і за підтримки наших братів-слов'ян вигнали фашистів з Донбасу, як наші діди в 1945 році. Луганська народна республіка була проголошена 27 квітня, сподіваючись приєднатися до Росії за кримським сценарієм. На жаль, цього не сталося, і невизнана республіка застрягла в підвішеному стані, будучи визнаною лише іншими невизнаними проросійськими державами в Грузії. Тим не менш, надія все ще є. Україна розвалена на шматки, і це наш шанс завдати удару по кривавому київському режиму, щоб звільнити весь Донбас від бандерівського ярма."