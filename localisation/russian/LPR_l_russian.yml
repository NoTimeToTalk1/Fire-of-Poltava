l_russian:
 LPR_second_fiddle:0 "Граючи другу скрипку"
 LPR_second_fiddle_desc:0 "Щоб утримати економіку нових республік на плаву і запобігти їхньому банкрутству, Росія щорічно витрачає на обидві республіки близько 4 мільярдів рублів. Більша частина цих грошей йде в Донецьку Народну Республіку, яка вважається більш економічно розвиненою, ніж Луганська. Цей "донецький фаворитизм" створив відчуття ворожості серед луганських еліт. Немає сумнівів, що це продовжить поглиблювати розкол між двома невизнаними державами."
 LPR_rivalry:0 "Ворожнеча між республіками"
 LPR_rivalry_desc:0 "Після "відставки" Плотницького боротьба за фінансові потоки в "ЛНР" між нинішнім ватажком бойовиків Пасічником та "міністром внутрішніх справ" Корнетом не припинилася. Більше того, Пасічник намагається витіснити так званих "донецьких" з Луганська. Так званий міністр внутрішніх справ Корнет насправді є людиною Захарченка. Пасічник намагається відібрати у Корнета вугільну галузь - легальні шахти та кар'єри. Нещодавно в ефірі телеканалу "Россия 24" ватажок бойовиків самопроголошеної "ЛНР" Пасічник заявив про намір вивести з тіні всі "державні" та недержавні вугільні підприємства "республіки". "Буде переглянута політика підходу до державних і недержавних вугільних підприємств, щоб вивести з тіні ті підприємства, які намагаються працювати нелегально. Ми будемо робити все можливе, щоб їх легалізувати. Це головне завдання", - сказав Пасічник. Варто зазначити, що це вже не перший випадок, коли спецслужби "ДНР" намагаються взяти під контроль ті чи інші фінансові потоки на території "братньої республіки". Фактично, мова йде про боротьбу між ватажками "ЛНР" і "ДНР" за контроль над фінансовими потоками від видобутку і продажу вугілля, алкогольних напоїв і тютюнових виробів."
 LPR_democracy_shirm:0 "Демократія?"
 LPR_democracy_shirm_desc:0 "На відміну від наших донецьких колег, Луганська Народна Республіка певною мірою зберегла відданість демократичним цінностям. Хоча демократична система в Луганську все ще молода, неефективна і часом досить нестабільна, уряд робить все можливе і повільно впроваджує різні реформи, щоб зробити демократичні інститути в країні сильнішими."

