l_russian:
 ode.1.t:0 "Важлива Зустріч"
 ode.1.d:0 "Чорноморська конфедерація, Одеса.\n Сергій Стерненко, відомий український радикальний активіст, розмірковує про власне майбутнє та майбутнє України. Майже півроку минуло з часу проголошення Воронченка керівником Одеської області та створення автономного уряду в Миколаївській області. Посилення кримінальної відповідальності, контроль над пресою та ЗМІ, комендантська година... все це не давало Сергію спати кілька місяців. Одного разу він вирішив діяти. Зателефонувавши своїм друзям, правим громадським діячам та членам "Честі", він домовляється про зустріч. Через кілька днів всі вони зібралися в одній з одеських забігайлівок і підняли ту саму тему - опозиційна діяльність. Всі присутні сходяться на думці, що, по-перше, ситуацію потрібно негайно змінювати, а по-друге, у них буде два шляхи для цього - мирний або кривавий. Всі зійшлися на тому, що ніхто не хоче кривавого побоїща. Разом вони прийшли до ідеї створити опозиційну до правлячої партії політичну партію і спробувати домогтися реформ мирним шляхом. Через три дні з цією метою вони офіційно подали заявку на реєстрацію нової партії - (Об'єднаний) Національний фронт."
 ode.1.a:0 "Краще їх не реєструвати."
 ode.2.t:0 "Перехід через Рубікон"
 ode.2.d:0 "Одеська область, вечір.\n Минуло багато годин з початку повстання в Ізмаїлі, і ось-ось мало розпочатися ще одне повстання в Одеській області. Після відмови у реєстрації "Народного фронту" як офіційної політичної партії Стерненко та його соратники зрозуміли, що мирного вирішення проблеми не буде. Залишився єдиний варіант - революція. Радикально налаштовані активісти хлинули в Одеську область з усієї України, коли стало зрозуміло, що націоналісти так просто не здадуться. Поки Сергій та його однодумці розробляли стратегічний план усього повстання, "Честь" почала вербувати місцевих жителів до лав революційної гвардії. Зрештою, за кілька тижнів все було готово. Залишалося тільки чекати слушної нагоди, і вона настала. Як тільки Стерненко отримав інформацію про передислокацію частин Чорноморської армії до Буджака, він скористався своїм телеграфним каналом зв'язку, щоб віддати наказ усім рушати. Вже стемніло, тож частинам Почесної варти та революційної гвардії вдалося захопити стратегічно важливі перехрестя зі значно меншими перешкодами, ніж очікувалося. Це ознаменувало початок того, на що всі так довго чекали. Справжня українська національна революція тільки починалася...\n Тим часом в Одесі ставало все гарячіше. Націоналістам вдалося відрізати комунікації міста від решти Конфедерації. Почалася облога. Геннадій Труханов, мер Одеси з 2014 року, розумів, що якщо місто впаде, він, як давній ворог Стерненка та багатьох його союзників, першим втратить голову. Скликавши екстрену нараду адміністрації та керівництва поліції, він оголосив у місті надзвичайний стан, мобілізував резерви місцевої поліції і наділив себе тимчасовими необмеженими повноваженнями."
 ode.2.a:0 "Ми будемо триматися Адмірала."
 ode.2.b:0 "Зайняти позиції! Або ми втримаємо місто, або загинемо, захищаючи його!"
 ode.2.c:0 "За вільну, сильну, та єдину переможну Україну!"
 ode.3.t:0 "Зовнішнє втручання"
 ode.3.d:0 "Після спалаху трьох масштабних повстань на території Чорноморської конфедерації можна з упевненістю сказати, що ситуація вже давно вийшла з-під контролю. Через зайнятість генерального командування та відсутність резервних військ, через їх вимушене розгортання для протидії революціонерам, Конфедерація залишилася беззахисною перед навколишніми державами. Але вони недооцінили свого головного ворога - Придністров'я. Російський експедиційний корпус на чолі з генералом Дмитром Зеленковим перебував на його території з моменту створення так званої держави "Придністров'я". Отримуючи зброю і ресурси безпосередньо з Росії, він є чисельним і добре оснащеним. Жадібно поглядаючи на південно-західні території України з початку її розпаду, керівництво Придністров'я, бачачи ситуацію в Конфедерації, вирішило втрутитися в конфлікт опосередковано і скористатися послугами Зеленкова. Розпочавши наступ з території Придністров'я, Зеленков і його війська швидко просунулися до кордону з Кіровоградською областю, зайнявши бойові позиції на обох лініях фронту, і вступили в громадянську війну, не втягуючи в неї своїх господарів."
 ode.3.a:0 "Ми будемо триматися Адмірала."
 ode.3.b:0 "Слава Російській Одесі!"
 ode.4.t:0 "Четверта Сторона"
 ode.4.d:0 "Здавалося б, гірше вже бути не може, але виявилося, що справжній кошмар ще попереду. Анатолій Шарій, проросійський журналіст і колишній стовп російського впливу на українську аудиторію, разом з Медведчуком, який з 2012 року переховується від кримінального переслідування в ЄС, вирішив скористатися не найкращою ситуацією в Конфедерації. Він без проблем перетнув неконтрольований кордон і вирушив до східних регіонів Чорноморської конфедерації, де згодом планував активізувати свою діяльність. Підтримуючи контакти з представниками своєї партії та колишніми колегами з "жовтої преси", він почав формувати новий політичний центр у Конфедерації. Просуваючи ідеї, які були досить популярними серед населення, такі як встановлення російської мови як офіційної або запровадження повної свободи преси. Поступово розширюючи свою мережу, йому вдалося налагодити контакти з деякими дрібними місцевими дистриб'юторами зброї і навіть знайти інвесторів з Росії, які вирішили фінансово підтримати його справу. Зрештою, з накопиченими запасами зброї та живої сили, Шарій вирішив діяти швидко, можливо, навіть нерозважливо. Піднявши збройне повстання в Первомайську, він і його прихильники оголосили про створення суверенної "Республіки Шарія", ставши четвертим гравцем у конфлікті."
 ode.4.a:0 "Ми будемо триматися Адмірала."
 ode.4.b:0 "Кім - Наш лідер!"
 ode.4.c:0 "За Російську мову, за свободу слова! Шарій, веди нас!"
 ode.5.t:0 "Точка кипіння"
 ode.5.d:0 "Буджак завжди був землею багатьох народів. Від часів скіфів і фракійців до сьогоднішньої зруйнованої України. Тут можна зустріти найрізноманітніших людей - українців, болгар, росіян, ногайців, гагаузів та багатьох інших. Ще за часів єдиної України місцеві меншини намагалися відстоювати свої права та автономію, але через свою роздробленість вони не мали великого успіху. Але ситуація змінилася з новою Руїною. Після створення Чорноморської конфедерації уряд вже не міг повністю контролювати діяльність організацій національних меншин, і вони цим скористалися. Через кілька днів після приходу Воронченка до влади в Одеській області представники буджацьких національних меншин зустрілися в Ізмаїлі і, досягнувши компромісу, створили єдину раду для повної і єдиної координації своїх дій. Потім вони, як єдине ціле, направили свої вимоги щодо збільшення місцевої автономії до офісу Воронченка, який, усвідомлюючи їхній спільний потенціал, був змушений піти на поступки. Але, як виявилося, їм цього було замало. Відчувши свободу дій, вони почали приховано готуватися до проголошення незалежної союзної держави. І ось це сталося. Вночі невідомі пробралися до Ізмаїльської міської ради, взяли під контроль представників Чорноморської адміністрації і дочекалися ранку. Через 4 години, коли вже сходило сонце, представники адміністрації вже були в будівлі, а на вулиці утворився натовп людей. Вони всі разом вийшли на балкон другого поверху і по черзі зачитали "Акт про незалежність Буджака", щоб підкреслити справжню міжнаціональну рівність. Про це Воронченку повідомили лише представники Затоківського відділення міліції, які відмовилися стати на бік нового керівництва. Воронченко негайно віддав наказ про передислокацію армійського підрозділу в Буджак, щоб відновити контроль над регіоном. Так почалося Буджацьке повстання."
 ode.5.a:0 "Буває."
 ode.5.b:0 "За Буджак! За його людей!"