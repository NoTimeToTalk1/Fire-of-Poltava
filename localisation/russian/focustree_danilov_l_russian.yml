AFU_ukrainianisation_1_decision:0 "Українізація регіонів"
AFU_ukrainianisation_1_decision_desc:0 "Ми підготували наше населення і тепер перейдемо до рішучих заходів українізації. "
AFU_school_reopening_1_decision:0 "Відновити роботу шкіл"
AFU_school_reopening_1_decision_desc:0 "Багато шкіл в регіоні було закрито, і ми повинні переконатися, що вони знову почнуть працювати."
AFU_patriotism_support_4_decision:0 "Остаточна перемога над проросійськими елементами"
AFU_patriotism_support_4_decision_desc:0 "Після того, як ми донесли правду до жителів Донецької та Луганської областей, вони більше не матимуть позитивних почуттів до Росії. Ніколи знову."
AFU_patriotism_support_1_decision:0 "Прославимо наших героїв"
AFU_patriotism_support_1_decision_desc:0 "Наша перемога - це об'єднані зусилля багатьох відомств, підрозділів та організацій. Всі вони мають увійти в історію як герої України."
AFU_patriotism_support_3_decision:0 "Висвітлення наших успіхів"
AFU_patriotism_support_3_decision_desc:0 "Ми зробили багато роботи в регіоні, і тепер це буде великим плюсом у нашій політичній кар'єрі."
AFU_patriotism_support_2_decision:0 "Дискредитація зрадників"
AFU_patriotism_support_2_decision_desc:0 "Брудні сепаратисти зазнали краху, а їхній пропагандистський вакуум для мешканців Донецької та Луганської областей нарешті зруйновано. Тепер ми можемо доносити до них правдиву інформацію."
AFU_steal_gumanitarka_decision:0 "Вкрасти гуманітарну допомогу"
AFU_steal_gumanitarka_decision_desc:0 "Вкрасти гуманітарну допомогу"
AFU_support_veterans_1_decision:0 "Підтримка ветеранів"
AFU_support_veterans_1_decision_desc:0 "Програма підтримки ветеранів передбачає низку пільг для учасників бойових дій та їхніх родин."
AFU_support_veterans_2_decision:0 "Інтеграція ветеранів у суспільство"
AFU_support_veterans_2_decision_desc:0 "Наші зусилля повинні бути максимально зосереджені на тому, щоб допомогти ветеранам інтегруватися в суспільство."
AFU_support_veterans_3_decision:0 "Видача житла для військовослужбовців"
AFU_support_veterans_3_decision_desc:0 "Через те, що багато жителів Донецької та Луганської областей покинули регіон, багато частин міст стали безлюдними. Ми можемо вирішити цю проблему, заселивши їх військовослужбовцями та їхніми сім'ями"
danilov_hunting:0 "Полювання на щурів"
danilov_hunting_desc:0 "Після поразки сепаратистів на Донбасі багато з них пішли гнити в тюрми. Але не всі. Деяким вдалося втекти до Росії і там зажити простим хорошим життям, забувши про свої гріхи перед Україною та її народом. Ми не повинні цього допустити, кожен повинен заплатити за це своїм життям. \n\n§3Смерть сепаратистів зміцнить нашу репутацію.§!\n\nПам'ятайте, що якщо операція §Rпровалиться§!, не буде більше §Rдругого шансу§! щоб вбити цю особу."
danilov_unlock_new_decisions:0 "§3Нові рішення будуть відкриті§!"
danilov_rehabilitation:0 "Реабілітація регіону"
danilov_rehabilitation_desc:0 "Реабілітаційна політика\n\n§3Хід реабілітації§! становить §3[?AFU.AFU_danilov_rehabilitation|0%]§!.\n"
AFU_progress_of_rehabilitation_tt:0 "§3Прогрес реабілітації§! §7зміниться§! на $RIGHT|+=%0$."