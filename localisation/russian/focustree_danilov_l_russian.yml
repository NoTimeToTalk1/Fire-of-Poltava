kill_pasechnik:0 "Підготувати операцію проти §3Лео§!§2ніда Пасе§!§Rчніка§!"
kill_pasechnik_desc:0 "Леонід Іванович Пасічник (нар. 15 березня 1970, Ворошиловград) - колишній український військовий, співробітник СБУ (1993-2013), полковник СБУ, український колаборант з Росією. Лідер, політичний і військовий діяч терористичного угруповання "Луганська народна республіка" з листопада 2017 року, друга особа після Ігоря Плотницького, якого він повалив. З 9 жовтня 2014 року очолював "міністерство державної безпеки ЛНР". Після переходу на бік проросійських сил отримав звання генерал-майора. Після поразки сепаратистів втік до Росії.\n§RЗрадник має бути знищеним.§!"
operation_start:0 "§tАктивні Операції§!"
