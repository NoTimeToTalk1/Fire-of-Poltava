kill_tsaryov:0 "Підготувати операцію проти §bОле§!§2га Ца§!§рьова§!"
kill_tsaryov_desc:0 "Олег Анатолійович Царьов (2 червня 1970, Дніпро) - колишній український бізнесмен, колаборант Росії, проросійський політик, сепаратист. Переховується в Росії від слідства.\nДепутат Верховної Ради України IV-VII скликань, член фракції Партії регіонів (з грудня 2012), член Комітету з питань аграрної політики та земельних відносин (з грудня 2012); член політради Партії регіонів. Кандидат на пост Президента України на позачергових виборах 25 травня 2014 року (зняв свою кандидатуру). Неодноразово піддавався критиці за українофобію та сепаратизм, перебуває у національному кримінальному розшуку.\n26 червня 2014 року обраний "спікером парламенту" так званої "Новоросії" - об'єднання підконтрольних Росії угруповань "ДНР" і "ЛНР", яке Генеральна прокуратура України кваліфікує як терористичне. Він пов'язаний з "Комітетом порятунку України", створеним у Москві 3 серпня 2015 року колишніми українськими високопосадовцями часів президентства Януковича.\n§RЗрадник повинен бути мертвим.§!"
