kill_pushilin_desc:0 "Денис Володимирович Пушилін (нар. 9 травня 1981, Макіївка) - український колаборант з Росією, другий ватажок терористичного квазідержавного утворення "Донецька народна республіка" з 20 листопада 2018 року, після вбивства першого ватажка Олександра Захарченка 31 серпня 2018 року. Голова "народної ради ДНР" (2015-2018). Виконувач обов'язків ватажка "Донецької народної республіки" з 4 жовтня 2022 року. Після поразки "ДНР" нібито втік до Ростовської області, де сформував уряд "ДНР" у вигнанні.\n§RЗрадник має бути знищеним.§!"
AFU_borders_2_decision:0 "Зміцнити північний кордон"
AFU_borders_2_decision_desc:0 "Росія вже нападала на нас раніше, ми не повинні допустити цього знову. З цією метою ми почнемо зміцнювати наші кордони."
AFU_borders_1_decision:0 "Зміцнити південний кордон"
AFU_borders_1_decision_desc:0 Росія вже нападала на нас раніше, ми не повинні допустити цього знову. З цією метою ми почнемо зміцнювати наші кордони."
AFU_mariupol_port_1_decision:0 "Провести реновацію Маріупільського Порта"
AFU_mariupol_port_1_decision_desc:0 "Маріупольський морський торговельний порт - порт на узбережжі Азовського моря, один з п'яти найбільших портів України. Його відновлення буде безсумнівною перемогою нашої держави."
