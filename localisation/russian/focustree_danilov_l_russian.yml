kill_girkin:0 "Підготувати операцію проти §bІго§!§2ря Гір§!§Rкіна§!"
kill_girkin_desc:0 "Ігор Всеволодович Гіркін, псевдонім. Ігор (Іванович) Стрєлков, також Сергій Вікторович Рунов; нар. 17 грудня 1970, Москва) - російський терорист, військовий, військовий злочинець, блогер, ідеолог Білого руху, письменник, відставний офіцер Збройних сил Росії, колишній полковник ФСБ. Учасник війни Росії проти України в Криму, на Донбасі та під час вторгнення 2022 року на боці Росії, а також низки інших воєн: у Придністров'ї (Молдова), Боснії, Ічкерії. Ватажок терористичного угруповання "Новоросія" з 2014 року, голова "Комітету 25 січня". Колишній лідер терористичного проросійського військового угруповання "Народне ополчення Донбасу". Після російської інтервенції до Криму Гіркін очолював диверсійний підрозділ, організував збори кримських депутатів для проведення незаконного референдуму, командував штурмом фотограмметричного центру в Сімферополі. У квітні 2014 року разом зі своїм підрозділом перетнув кордон України в Донецькій області та очолив захоплення Слов'янська, розпочавши таким чином бойові дії на Донбасі. Став першим "міністром оборони" маріонеткової ДНР (16.05.2014-14.08.2014), головнокомандувачем "армії Новоросії". Повернувся до Росії.\n§RТеррорист має бути знищиним.§!"
kill_gubarev:0 "Підготувати операцію проти: §bПав§!§2ла Гу§!§Rбарева§!"
kill_gubarev_desc:0 "Павло Юрійович Губарєв (нар. 10 березня 1983, Сєвєродонецьк) - український колаборант Росії, сепаратист, підприємець, політичний і громадський діяч терористичного угруповання "ДНР". Учасник проросійських протестів в Україні у 2014 році. Один з лідерів терористичного угруповання "Новоросія", терорист. В молодості був членом неофашистської організації "Русское национальное единство". У березні 2014 року, з початком російської агресії проти України, на мітингу був проголошений "народним губернатором" Донецької області та агітував за приєднання Донецької області до Росії. Після поразки сепаратистів втік до Росії.\n§RЗрадник має бути знищеним.§!"
