AFU_labour_mobilisation:0 "Трудова Мобілізація"
AFU_labour_mobilisation_0:0 "Трудова Мобілізація"
AFU_subsidies_for_educational_institutions:0 "Субсидії Для Закладів Освіти"
AFU_subsidies_for_educational_institutions_desc:0 "Цей стратегічний напрям передбачає виділення фінансових ресурсів на зміцнення навчальних закладів, починаючи від початкових шкіл і закінчуючи передовими дослідницькими університетами. Очікуваний результат цих зусиль має подвійну мету: по-перше, забезпечити доступ до якісної освіти для ширшого прошарку населення, тим самим наділяючи громадян знаннями та навичками, необхідними для особистого та суспільного зростання; по-друге, сприяти інноваціям та прогресу шляхом створення середовища, сприятливого для досліджень, творчості та інтелектуальних пошуків."
AFU_state_security_strategy:0 "Стратегія Державної Безпеки України"
AFU_state_security_strategy_desc:0 "Для того, щоб забезпечити подальшу цілісність і недоторканність нашого регіону, а також безпеку наших громадян, нам необхідно розробити власну стратегію підтримки цієї безпеки. Кордони, вулиці, пустирі - все це ми маємо захищати. Продумати і пропрацювати все до дрібниць - наш обов'язок, і ми його виконаємо."
AFU_danilov:0 "Данілов"
AFU_danilov_desc:0 "Після виборів на повністю вільному Донбасі Олексій Данілов, уродженець Луганської області та лояльний до України політик, отримав більшість голосів і урочисто вступив на посаду голови адміністрації Донбасу. Його передвиборча кампанія обіцяла повну економічну, екологічну, військову та соціальну реконструкцію регіону, і з тими ресурсами, які може запропонувати ця благословенна Богом земля, це дійсно можливо. Вітаємо пана Данилова зі справедливою перемогою!"
AFU_we_are_not_alone:0 "Ми Не Самотні"
AFU_we_are_not_alone_desc:0 "Для того, щоб орієнтуватися в заплутаній павутині викликів, які чекають на нас попереду, імператив створення альянсів набуває першочергового значення. У відповідь на це було встановлено стратегічне партнерство з ніким іншим, як з Рінатом Ахметовим, фігурою впливовою та значущою."
AFU_the_only_ones_fighting_for_a_common_goal:0 "Єдині, Хто Бореться За Спільну Мету"
AFU_the_only_ones_fighting_for_a_common_goal_desc:0 "У той час як зовнішні сили та внутрішні амбіції сплітають свій складний танець, наш альянс сяє як свідчення спільного прагнення, що виходить за рамки індивідуальних цілей."
AFU_align_with_the_legetimists:0 "Приєднатися До Легетимістів"
AFU_align_with_the_legetimists_desc:0 "У зв'язку з присягою на вірність Україні ми підпорядковуємося київській владі на чолі з Володимиром Зеленським."
AFU_trust_the_old_faces:0 "Довіряйте Cтарим Oбличчям"
AFU_trust_the_old_faces_desc:0 "Не варто довіряти цим "новим обличчям". Краще стати на бік перевіреного кандидата - Петра Порошенка."
AFU_new_minister_of_economy:0 "Новий Міністр Економіки"
AFU_new_minister_of_economy_desc:0 "Ми запропонуємо Рінату Ахметову посаду в нашій державі - міністра економіки."
AFU_industrial_redistribution:0 "Промисловий Перерозподіл"
AFU_industrial_redistribution_desc:0 "Як компроміс, наш уряд почне перерозподіл промисловості в регіоні, щоб дозволити новим підприємцям розвиватися."
AFU_our_statecorporate_monopoly:0 "Наша Державно-корпоративна Монополія"
AFU_our_statecorporate_monopoly_desc:0 "Створення державно-корпоративного альянсу - це прорахований гамбіт, спрямований на поєднання державного нагляду з корпоративною ефективністю. Через такий альянс ми будемо прагнути контролювати життєво важливі сектори, забезпечуючи як стабільне економічне зростання, так і дотримання національних інтересів."
AFU_rehabilitation_of_the_population:0 "Реабілітація Населення"
AFU_rehabilitation_of_the_population_desc:0 "Усвідомлюючи глибокі соціальні шрами, залишені минулими подіями, було започатковано ініціативу з комплексної реабілітації. Це цілісний підхід, що охоплює медичну, психологічну та соціально-економічну підтримку, спрямований на відродження духу та добробуту громадян."
AFU_legacy_of_ato:0 "Спадок АТО"
AFU_legacy_of_ato_desc:0 "Тривалий вплив Антитерористичної операції залишив незгладимий слід у свідомості нації. Вшанування її спадщини не лише вшановує понесені жертви, але й слугує об'єднуючим національним наративом, підкріплюючи стійкість і дух країни."
AFU_support_veterans:0 "Підтримка Ветеранів"
AFU_support_veterans_desc:0 "Розпочато потужну ініціативу з підтримки ветеранів, спрямовану на визнання їхньої служби та сприяння їхній реінтеграції в цивільне життя. Це охоплює професійну підготовку, підтримку психічного здоров'я та забезпечення їхнього добробуту в постконфліктному суспільстві."
AFU_request_humanitarian_aid:0 "Запросити Гуманітарну Допомогу"
AFU_request_humanitarian_aid_desc:0 "З огляду на масштаб викликів, що постали, звернення за міжнародною гуманітарною допомогою стає необхідним. Цей крок підкреслює нагальність ситуації, а також підкреслює взаємопов'язаність світової спільноти під час кризи."
AFU_borders_under_control:0 "Кордони Під Контролем"
AFU_borders_under_control_desc:0 "У відповідь на імперативи національної безпеки уряд ініціював комплексну стратегію, спрямовану на забезпечення пильного захисту кордонів країни."
AFU_keep_the_army_in_shape:0 "Тримати Армію в Тонусі"
AFU_keep_the_army_in_shape_desc:0 "Ця ініціатива, яка демонструє непохитну відданість безпеці України, спрямована на підтримку готовності та ефективності наших збройних сил. Інвестиції в регулярні навчання, модернізацію обладнання та виховання культури дисципліни забезпечують готовність Збройних Сил до захисту національних інтересів у будь-яку хвилину."
AFU_system_of_counterpropaganda:0 "Підтримка Контр-пропаганди"
AFU_system_of_counterpropaganda_desc:0 "Протистоячи викликам, які створює дезінформація та оманливі наративи, уряд вживає активних заходів для створення надійного механізму протидії пропаганді. Шляхом прозорої комунікації, підвищення медіаграмотності та поширення перевіреної інформації держава прагне дати своїм громадянам можливість відрізняти правду від вигадок, що в кінцевому підсумку зміцнює соціальну згуртованість і сприяє формуванню добре поінформованого суспільства."
AFU_hunting_for_rats:0 "Полювання На Щурів"
AFU_hunting_for_rats_desc:0 "Незважаючи на те, що ми застосовуємо широкі методи фільтрації для боротьби з сепаратистами і зрадниками, багато хто з них покинув регіон. Ми повинні зловити їх і покарати."
AFU_neveragain:0 "Ніколи Знову!"
AFU_neveragain_desc:0 "Керуючись уроками історії, ці національні настрої означають колективну рішучість не допустити повторення минулих помилок."
AFU_enterprise_support_program:0 "Програма Підтримки Підприємництва"
AFU_enterprise_support_program_desc:0 "Визнаючи ключову роль бізнесу в економічному зростанні, уряд запроваджує комплексну програму підтримки підприємництва. За допомогою цільових фінансових стимулів, спрощеного регулювання та доступу до ресурсів програма має на меті стимулювати підприємництво, стимулювати інновації та розширювати можливості місцевої промисловості. Створюючи сприятливе середовище для процвітання підприємств, уряд прагне створити економічні можливості та зміцнити економічну основу країни."
AFU_policy_of_gentle_ukrainization:0 "Політика Лагідної Українізації"
AFU_policy_of_gentle_ukrainization_desc:0 "Визнаючи культурне розмаїття нації, уряд запроваджує політику "м'якої українізації". Цей підхід поважає мовні та культурні відмінності, водночас просуваючи українську мову та спадщину. Заохочуючи інклюзивний діалог та культурний обмін, ця політика спрямована на зміцнення єдності та ідентичності, гарантуючи, що всі громадяни мають можливість долучитися до спільних цінностей нації."
AFU_restoration_of_the_scientific_field:0 "Відновлення Наукової Сфери"
AFU_restoration_of_the_scientific_field_desc:0 "Визнаючи важливість наукового прогресу, уряд розпочинає ініціативу з відродження наукової сфери."
AFU_way_to_energy_independence:0 "Шлях до Енергетичної Незалежності"
AFU_way_to_energy_independence_desc:0 "Прагнучи забезпечити енергетичну безпеку, держава взяла стратегічний курс на енергетичну незалежність. Ця багатогранна ініціатива передбачає диверсифікацію джерел енергії, інвестиції у проекти з відновлюваної енергетики та впровадження екологічно чистих практик, щоб зменшити нашу залежність від Росії."
AFU_reform_of_the_tax_system:0 "Реформа Податкової Системи"
AFU_reform_of_the_tax_system_desc:0 "Для забезпечення фіскальної відповідальності та справедливості уряд ініціює комплексну реформу податкової системи. Ці зусилля передбачають спрощення податкового законодавства, ліквідацію лазівок та забезпечення збалансованого розподілу податкового тягаря."
AFU_big_repair:0 "Велика Реновація"
AFU_big_repair_desc:0 "Донбас - це регіон з великим промисловим минулим і сьогоденням. Більшу частину свого спадку він отримав від статків мертвого Радянського Союзу, але він припинив своє існування три десятиліття тому, і промисловість регіону перестала отримувати інновації, до яких вона звикла за ці роки. Якщо ми хочемо допомогти промисловості регіону, ми повинні розпочати процес повного оновлення всього. Від птахофабрик до металургійних заводів."
AFU_we_will_find_a_job_for_everyone:0 "Ми Знайдемо Роботу Для Всіх"
AFU_we_will_find_a_job_for_everyone_desc:0 "Прагнучи до інклюзивного економічного зростання, уряд реалізує амбітну ініціативу, спрямовану на забезпечення повноцінних можливостей працевлаштування для всіх громадян. "
AFU_explorations_of_donbas_mines:0 "Дослідження Шахт Донбасу"
AFU_explorations_of_donbas_mines_desc:0 "З метою відповідального управління ресурсами уряд розпочинає розвідку шахт Донбасу."
AFU_preparing_for_the_unification:0 "Підготовка до Об'єднання"
AFU_preparing_for_the_unification_desc:0 "На цьому етапі ми зобов'язані розпочати підготовку до об'єднання нашої країни."
AFU_attack_on_kharkiv:0 "Атака на Харків"
AFU_attack_on_kharkiv_desc:0 "аваков чорт"
AFU_subdue_dnipro:0 "Підкорити Дніпро"
AFU_subdue_dnipro_desc:0 "1"
AFU_integration_of_new_territories:0 "Інтеграція Нових Територій"
AFU_integration_of_new_territories_desc:0 "1"
AFU_thisisjustthebeginning:0 "Це Лише Початок!"
AFU_thisisjustthebeginning_desc:0 "1"
ZE_FACTION_NAME:0 "Форум Об'єднання України"
PRH_FACTION_NAME:0 "Форум Об'єднання України"
dan.1.t:0 "Важлива Зустріч"
dan.1.d:0 "Очікування в кабінеті Олексія Данилова було майже відчутним, напружена атмосфера, здавалося, відлунювала з кожною секундою. Він стояв біля вікна, його погляд постійно ковзав у бік входу, очікуючи на прибуття гостя. Вага цієї неминучої зустрічі накривала його важкою мантією, наповнюючи кімнату повітрям глибокої значущості. Здавалося, сам простір затамував подих, наче стіни були втаємничені у важливість цієї миті. Зазвичай врівноважена поведінка Данилова видавала ледь помітний неспокій - його пальці нервово постукували по полірованій поверхні столу, ритм невизначеності. Денне світло пробивалося крізь вікно, відкидаючи довгі тіні, що віддзеркалювали його внутрішню тривогу.\n\nЧас тягнувся мляво, кожне цокання годинника нагадувало про очікування, яке наповнювало кімнату. І ось, ніби у відповідь на крещендо внутрішнього неспокою Данилова, двері відчинилися. І там був він - Рінат Ахметов, колись титан промисловості та влади, а тепер людина, яка стала свідком ерозії своїх статків через руйнівну війну та колапс. Серце Данилова непомітно прискорилося, мовчазний ритм, який підкреслював вагу цієї доленосної зустрічі."
dan.1.a:0 "І ось він знову тут..."
dan.3.t:0 "Ми Стоятимемо Поодинці"
dan.3.d:0 "Данилов відкинувся на спинку стільця, його погляд був прикутий до чоловіка, що сидів навпроти нього. Присутність Ахметова випромінювала тяжіння, яке, здавалося, наповнювало кімнату.\n\n "Рінате, давай не будемо ходити довкола куща. Ми обидва знаємо, на що поставлено", - почав Данилов, його голос був виваженим, але прямим.\n\nУста Ахметова викривилися в кривій посмішці. "У цьому ви маєте рацію. Ми в одному чортовому човні, хочемо ми того чи ні.\n\nДанилов кивнув головою, його очі були непохитними. "Послухайте, я не заплющую очі на те, що ви пройшли через пекло і повернулися. Ваша імперія розвалилася, але ви все ще тут, і з вами треба рахуватися."\n\nПогляд Ахметова містив суміш гордості та гіркоти. "Ви маєте рацію, це були довбані американські гірки. Але давай ближче до справи - що мені з цього?"\n\n "Мені потрібна твоя підтримка, Рінате. Донбасу потрібна стабільність, а стабільність - це єдність. Якщо ми будемо в розбраті, цей регіон буде стікати кров'ю нескінченно довго."\n\nДанилов зустрівся з ним поглядом, незворушним. "Я знаю, що ти не простак, Рінате. Але подумай про це - ми обидва виграємо від стабільної Східної України. Твої бізнес-інтереси, мої політичні цілі - вони збігаються більше, ніж ти можеш собі уявити."\n\nПальці Ахметова барабанили по підлокітнику крісла, думки проносилися в голові..."
dan.3.a:0 ""Гаразд, припустимо, я в справі. Але який план?""
dan.5.t:0 "Форум Об'єднання України"
dan.5.d:0 "Закріпивши нашу дружбу з Президентом Порошенком, тепер ми можемо боротися за єдину і сильну Україну. Важкі часи створюють сильних людей."
dan.5.a:0 "Ну, я думаю, що краще нічого, ніж нічого."
dan.6.t:0 "Форум Об'єднання України"
dan.6.d:0 "бла бла бла тепер ми союзники з даніловим"
