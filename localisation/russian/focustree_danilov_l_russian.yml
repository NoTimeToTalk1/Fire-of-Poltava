dan.8.d:0 "бла бла бла тепер ми союзники з даніловим"
dan.8.a:0 "Ок."
dan.9.t:0 "Знову в Кріслі"
dan.9.d:0 "Ахметов повернувся в Україну. Тепер він отримає крісло міністра економіки. "
dan.9.a:0 "Нарешті! Гарні новини!"
dan.10.t:0 "Підсумок"
dan.10.d:0 "BДОВІДКА ПРО КРИМІНОГЕННУ СИТУАЦІЮ В ДОНЕЦЬКІЙ ОБЛАСТІ:\nНа даний час на території Донецької області діє осередок організованої злочинності, до складу якого входять три злочинні угруповання, 2 з яких з Донецька та 1 з Єнакієвого. На території області діють 6 кримінальних авторитетів та 2 "злодії в законі", один з яких є висуванцем етнічних ОЗУ, які можуть впливати на криміногенну ситуацію в регіоні.\n\nДіє 4 ОЗГ, в тому числі: 2 - зі збуту наркотичних речовин та 2 - зі скоєння розбійних нападів.\n\nЗ усіма цими проблемами зіткнулися працівники Донецького УМВС, коли розкрили справи з дільниць. Весь цей час ватажки "ДНР" співпрацювали з цими бандитами, проводячи афери проти власного населення, переправляючи контрабанду та здійснюючи замовні вбивства. Однак тепер держава взяла на себе завдання розформувати ці угруповання, і мешканці цього міста можуть спати спокійно."
dan.10.a:0 "Ок."
dan.11.t:0 "Перерозподіл Промисловості"
dan.11.d:0 "Життя великого міста сповнене кривавих вчинків його мешканців. Але навіть в Ольстері чи Багдаді не так часто підривають бомби на трибунах стадіонів, розстрілюють сім'ї на злітній смузі чи підривають начинені вибухівкою вантажівки. І роблять це не бойовики, які фанатично захищають якусь ідею, а так звані "бізнесмени". Так що Донецьк в цьому випадку унікальний.\nПісля того, як ситуація заспокоїлася, Тимчасовий уряд вирішив придивитися до "донецької влади", яка, незважаючи на політику "ДНР", зуміла зберегти свій вплив і бізнес, а деякі з них навіть примножили його. Невідомо, чи була боротьба уряду Данилова зі злочинністю жестом великодушності або просто заздрості, але тим не менш, переділ приватної власності не тільки в місті, а й в області почався.\nНа той час відділ по боротьбі з організованою та груповою злочинністю управління карного розшуку УВС Донецької області виявив чимало "нелояльних підприємців" із закордонними зв'язками. Під тиск держави потрапили керівники великих продуктових магазинів, спільних і малих підприємств, ТДВ і кооперативів."
dan.11.a:0 "Ок."
dan.12.t:0 "Одне життя з тисячі"
dan.12.d:0 "Петро, стійкий ветеран війни на Донбасі, ніс на собі тягар пережитого, як шрами, що закарбувалися в його душі. Його шлях через поля боїв став свідченням його непохитної відданості Україні, але також залишив болючі спогади та глибокі душевні рани.\nВін народився і виріс у самому серці Донецька, і перетворення міста з галасливого мегаполісу на спустошену війною пустку стало для нього болючою раною. Він приєднався до лав захисників, воюючи не лише за свою країну, а й за вулиці, які колись називав домом. З роками він став опорою для своїх побратимів, символом надії посеред хаосу.\nКоли вляглася пилюка війни, перемога стала для Петра гірко-солодкою. Шрами на його тілі загоїлися, але емоційний удар залишився. Колись знайомі райони лежали в руїнах, а спогади про загиблих товаришів важким тягарем лежали на його серці. Він прагнув повернення до нормального життя не лише для себе, але й для всієї громади, яка так багато пережила. Обіцянка кращого життя для тих, хто так відважно боровся, була променем надії серед темряви."
dan.12.a:0 "І таких, як Петро, багато..."
dan.13.t:0 "Ще одна Зустріч"
dan.13.d:0 "Перед керівництвом адміністрації Донбасу після перемоги над сепаратистами постало нове завдання - закріплення наслідків АТО і ООС, а також подальше вдосконалення армії Тимчасового уряду. Повітря в кабінеті наповнилося напруженим очікуванням, коли Олексій Данилов виголосив свою промову.\nЗакривши двері, він перевів погляд на карту, на якій були прапорці, що позначали важливі населені пункти та армійські підрозділи. Його слова заповнили кімнату, розставивши всі крапки над "і". Данилов висловив намір підвищити здатність армії реагувати на потенційні загрози, забезпечити військовий резерв, запровадити систему тренувань і навчань, яка б слугувала фундаментом для подальшого розвитку. "Наша перемога - це не кінцева точка, - сказав він, - це початок нового етапу. Ми повинні закріпити наші досягнення і вирости з того, ким ми були, до того, ким ми можемо стати". План був амбіційним. Від програм підвищення ефективності командування до підтримки військової науки, Данилов передбачав комплексний підхід до модернізації армії. Перед ними стояло завдання розпочати нову главу в історії, де сила армії ґрунтуватиметься не лише на зброї, а й на знаннях, координації і співпраці."
dan.13.a:0 "Ок."
dan.14.t:0 "Промінь Світла"
dan.14.d:0 "А потім прийшло повідомлення. Житлова програма для таких ветеранів, як Петро, - шанс повернути собі частину міста, за яке вони так відважно боролися. Ця новина була зустрінута зі змішаними емоціями: вдячністю, невірою та тривогою. Чи справді це може бути першим кроком до загоєння ран, які є глибшими за фізичні шрами? Життя Петра зробило новий поворот, коли його відібрали для отримання квартири в Донецьку. Коли він увійшов до свого нового будинку, його зустріла хвиля емоцій. Здавалося, що стіни відлунювали історіями тих, хто багато чим пожертвував. Кожна кімната обіцяла новий початок, де він зможе нарешті відбудувати не тільки своє життя, але й життя тих, хто його оточував.\nКоли сонце опустилося за обрій, заливаючи вулиці Донецька теплим світлом, Петро подивився у вікно свого будинку. Шрами міста все ще було видно, але тепер вони були змішані з обіцянкою відродження. А в серці він ніс історії своїх загиблих товаришів, відлуння їхніх жертв, які вели його вперед.\nУ місті, що відроджувалося з попелу, Петро став живим свідченням сили стійкості, незламного духу, якого не змогла здолати темрява війни. Його подорож стала нагадуванням про те, що навіть посеред хаосу людський дух може піднятися, відновитися і знайти розраду в найнесподіваніших місцях."
dan.14.a:0 "Може він нарешті відпочить"
dan.15.t:0 "Гуманітарна Допомога!"
dan.15.d:0 "Данилов не задовольнявся лише відбудовою місцевої інфраструктури. Він усвідомлював, що регіон потребує гуманітарної допомоги для відновлення та підтримки тих, хто постраждав від найжорстокіших наслідків війни. Тому він вирішив звернутися до міжнародних організацій.\nСповнений надії і розуміння жорстокості ситуації, Данилов почав писати листи і надсилати запити про гуманітарну допомогу в різні міжнародні організації. Він намагався донести до їхніх лав глибоку потребу Донбасу в підтримці, яку і без того виснажений ресурсами уряд не міг надати.\nПроходили дні, а відповідей не було. Данилов спостерігав за ситуацією, сподіваючись на хоч якусь реакцію. Однак його заклики здавалися марними, а міжнародні організації зберігали мовчання, ігноруючи страждання, яких зазнають люди через війну і розруху. Схоже, що Росія також використовувала свій вплив, щоб заблокувати будь-які спроби доставити гуманітарну допомогу на Донбас.\nАле саме тоді, коли здавалося, що виходу немає, маленькі краплі надії пролилися в життя Данилова. Кілька міжнародних організацій, переважно дитячих, вирішили відгукнутися на його прохання. Це був невеликий крок, але він забезпечив нову основу для співпраці.\nЗ невеликою допомогою, яка була надіслана, процес одужання почав розгортатися. Данилов відчував, що це тільки початок, і пообіцяв продовжувати боротьбу за допомогу і підтримку рідного Донбасу. Його рішучість не зламали ні байдужість міжнародних організацій, ні перешкоди з боку Росії. Він був сповнений рішучості довести, що ніхто не залишить людей Донбасу в скрутну хвилину."
dan.15.a:0 "Ок."
dan.16.t:0 "Захист Наших Кордонів"
dan.16.d:0 "Тепер ми будемо пильніше охороняти наші кордони."
dan.16.a:0 "Ок."
dan.17.t:0 "Покращені Тренування"
dan.17.d:0 "Зродились ми великої години"
dan.17.a:0 "З пожеж війни і полум'я вогнів"
dan.18.t:0 "Нові ТВ програми"
dan.18.d:0 "Ми блокуватимемо російську пропаганду, заборонятимемо телебачення та просуватимемо наші власні наративи"
dan.18.a:0 "Ок."
dan.19.t:0 "Ми вб'ємо кожного сепара"
dan.19.d:0 "Ніхто не втече від покарання"
dan.19.a:0 "Повна Різанана Сепарів."
dan.20.t:0 "Ніколи знову!"
dan.20.d:0 "Ми не допустимо повторення цієї війни, ми не дозволимо знову поширитися рашизму на нашій території"
dan.20.a:0 "Ок."
dan.21.t:0 "Програма підтримки підприємництва"
dan.21.d:0 "Голова Тимчасового уряду Східної України Данилов був сповнений рішучості відновити економіку регіону. Засідання за зачиненими дверима було таємною нарадою влади, симпозіумом політичних умів, які мали намір визначити долю регіону.\nГолос Данилова, який сидів за столом, залитим приглушеним світлом таємних намірів, прорізав тишу, як лезо:\n "Панове, ми знаходимося в жахливому становищі. Наша земля вкрита шрамами, а наш народ голодний. Перед нами стоять дві мети: відбудувати руїни цього регіону і зміцнити владу в серцях людей"."
dan.21.a:0 "Ок."
dan.22.t:0 "Політика Лагідної Українізації"
dan.22.d:0 "З приходом до влади на Донбасі нових реформаторів зміни торкнулися кожного куточка регіону, в тому числі й освітніх закладів. У донецькій школі коридорами лунали як шепіт надії, так і тривога.\nОдного сонячного ранку, коли учні метушилися між уроками, біля вчительської виникла метушня. Літня жінка з згорбленою спиною і обвітреними рисами обличчя стояла біля входу, стискаючи в руках потерту шкіряну сумку. Це була не звичайна жінка, а справжня вчителька російської мови, яка не втекла після поразки "ДНР", Катерина Іванівна.\nХодили чутки, що настають зміни, що деякі предмети будуть переосмислені в нових умовах. Коли бабуся Катерина увійшла до вчительської, її пильний погляд зупинився на розкладеному на столі директора порядку денному. У ньому яскравим шрифтом було надруковано оголошення про те, що предмет "російська мова" більше не буде викладатися. Бабусю Катерину охопило обурення. Її голос, сповнений досвіду і пристрасті, луною пролунав у коридорі: "Що це за безумство? Ви не маєте права! Ви не можете заборонити нам вивчати рідну мову!" І викладачі, і студенти завмерли, зачаровані видовищем, що розгорталося перед ними. Катерина Іванівна, голос якої став громовим, продовжувала: "Хіба мова не є частиною культури? Культура поза політикою! Російська мова - це мова Пушкіна, Лермонтова. Це нитка, яка пов'язує нас з нашим минулим!"\nДиректор вийшов із залу, залишаючись спокійним, з виразом обличчя, що поєднував повагу і твердість. "Пані Катерино, часи змінилися. Ми перейшли до ширшої освітньої перспективи." Але бабуся не збиралася мовчати. Її руки стиснулися в кулаки, а голос дзвенів викликом: "Ширша перспектива, кажете? Ви позбавляєте нас нашої мови, нашої спадщини, і заради чого? Щоб задовольнити забаганки якоїсь новомодної програми, якихось бандерівців? За Януковича все було краще!""
dan.22.a:0 "Можливо, з часом вона усвідомить переваги....."
dan.23.t:0 "Нове національне дослідження"
dan.23.d:0 "Ми винайшли новий спосіб виготовлення самогонки, шоб продавати її за кордон."
dan.23.a:0 "Прикольно"
dan.24.t:0 "Енергетична Незалежність"
dan.24.d:0 "Ми будемо палити мертвих дітей донбасу для тепла. Жартую, ми будемо робити так, щоб російський газ пішов з нашої країни."
dan.24.a:0 "Круто"
dan.25.t:0 "Податкова реформа"
dan.25.d:0 "Давайте понизимо податки на бізнес щоб заохочувати повернення підприємств до Донбасу."
dan.25.a:0 "ок."
dan.26.t:0 "велика перебудова"
dan.26.d:0 "а кто такіе фіксікі бальшой бальшой секрет"
dan.26.a:0 "ок."
dan.27.t:0 "Трудова Мобілізація"
dan.27.d:0 "Ми мобілізуємо всіх стурбованих мешканців Донбасу для відбудови інфраструктури."
dan.27.a:0 "ок."
dan.28.t:0 "Ще один день в бруді"
dan.28.d:0 ""Це просте гірниче завдання", - \n\nпролунало повідомлення з гучномовця на невеликій шахті ім. Петровського в Донецьку, розбудивши більшість шахтарів. Мляві робітники поступово виходили зі своїх картонних будиночків, нашвидкуруч збудованих у цей короткий міжвоєнний період. Хоча вони виглядали втомленими, їхній образ поступово змінювався на більш жвавий.\nЦі робітники вже багато чого пережили. Теплі спогади про СРСР, неоднозначні спогади про Україну, голодні і холодні спогади про ДНР, потім про Тимчасовий уряд, а тепер до влади прийшов Данилов. Робітникам це нічого не говорило, вони просто хотіли прогодувати себе і свої сім'ї. Якщо, звичайно, вони ще живі.\n\n "Ваша робоча сила скоро збільшиться. Прибувають нові робітники" \n\n знову повторює гучномовець. \n\n"Ми відправляємо вас у глибину, тож будьте на сторожі. Сканери показують особливо багаті жили вугілля далі вниз. Принесіть його назад, хлопці.""
dan.28.a:0 "Rock and Stone!"
dan.29.t:0 "Субсидії на освіту"
dan.29.d:0 "Дати гроші школам"
dan.29.a:0 "ок."
dan.30.t:0 "Засідання Ради Безпеки"
dan.30.d:0 "Після перемоги над сепаратистами в регіоні Олексій Данилов, який очолив адміністрацію Донбасу, прийняв важливе рішення на засіданні Ради національної безпеки і оборони. Ця подія ознаменувалася серйозними дискусіями і непростим вибором.\nПід час засідання Данилов виступив з абсолютно новаторською пропозицією, яка стала предметом палких дебатів. Він запропонував зосередитися на забезпеченні стабільності в регіоні та економічному відновленні шляхом тимчасового збільшення автономії Донбасу від центрального уряду України, який зараз перебуває в хаосі. Це викликало палкі дискусії та дебати серед членів РНБО, оскільки думки розділилися.\nОднак, після глибокого аналізу ситуації, обговорення з експертами та врахування думок різних сторін, Данилов взяв на себе відповідальність і прийняв рішення. Позиція РНБО полягала в тому, щоб тимчасово надати Донбасу певний ступінь автономії, щоб дозволити регіону відновити свою економіку, інфраструктуру та соціальний порядок. Однак ця автономія повинна була зберігатися в межах кордонів незалежної України до моменту возз'єднання країни.\nЦя ставка викликала суперечливу реакцію. Одні вважали її важливим кроком до співіснування, інші - демонстрацією слабкості. Однак час показав, що це рішення стало важливим кроком на шляху до відновлення регіону та зміцнення єдності України."
dan.30.a:0 "ок."
dan.31.t:0 "Пушилін Помер"
dan.31.d:0 "Пушилін мертвий.\n\nСьогодні він втратив свідомість біля будинку 85 по вулиці Мурманській у Ростові і невдовзі помер. Медична експертиза встановила, що причиною його смерті стало отруєння газом ціанідом.\n\nЯк це сталося?\n\nЗа кілька місяців до цього СБУ завербувала агента, ім'я якого ми не будемо називати. Пушилін виходив з ринку і був без охорони. Наш агент підготував свою унікальну зброю. Зброя була заряджена ампулами з розчином ціаністого калію. Пушилін попрямував до свого будинку, як раптом отримав два постріли в потилицю. Коли люди помітили його у важкому стані, він задихався і вже не міг нічого сказати. Помер по дорозі до лікарні.\n\nМісія виконана. Так буде з кожним зрадником України."
dan.31.a:0 "§GНа одного сепаратиста стало менше.§!"
dan.32.t:0 "Пушилін вижив"
dan.32.d:0 "Пушилін вижив.\nСьогодні на вулиці Мурманська 85 люди почули крик.\nКілька місяців тому СБУ завербувала агента, ім'я якого ми не будемо називати. Пушилін виходив з ринку і був без охорони. Наш агент підготував свою унікальну зброю. Зброя була заряджена ампулами з розчином ціаністого калію. Але пістолет дав осічку. Пушилін побачив агента і почав кликати на допомогу своїх охоронців. Вся операція була зірвана, а наші агенти виїхали з міста, і тепер ховаються від поліції в акуратному селі Петрівка. Необхідно організувати рятувальну операцію.\n\nМи даремно втратили багато часу і грошей. Потрібно розробити новий план і вивчити наші помилки. "
dan.32.a:0 "§RКапець.§!"
dan.33.t:0 "Пасічник мертвий"
dan.33.d:0 "Sнезадовго до того, як ЗСУ взяли під повний контроль Донбас, Леонід Пасічник зрозумів, що якщо він не втече, то його судитимуть і стратять, тому швидко втік до Росії разом з іншими зрадниками держави.\n\nПісля втечі він думав, що йому дадуть привілеї і він буде працювати на державу, адже він був головою "Народної республіки". Але цього не сталося, його відвезли в Мухосранськ і викинули. Йому довелося самостійно шукати житло і роботу. Через кілька днів йому вдалося влаштуватися механіком на станцію технічного обслуговування за кілька кілометрів від дому. Між його будинком і станцією техобслуговування був гарний парк, але темний вночі.\n\nОдного разу він трохи запізнився на роботу, тому повернувся пізно вночі. У парку було темно, а на вулиці не було людей. Він заглиблювався все глибше і глибше в парк, відчуваючи з кожним кроком, що щось не так. Раптом з темряви виринув темний силует, а через кілька секунд пролунав постріл. Це було останнє, що він побачив."
dan.33.a:0 "§GПане Пасічник? Пан Данилов передає вітання§!"
dan.34.t:0 "Пасічник виживає"
dan.34.d:0 "Незадовго до того, як ЗСУ взяли під повний контроль Донбас, Леонід Пасічник зрозумів, що якщо він не втече, то його судитимуть і стратять, тому швидко втік до Росії разом з іншими зрадниками держави.\n\nПісля втечі він думав, що йому дадуть привілеї і він буде працювати на державу, адже він був головою Народної Республіки. Але цього не сталося, його відвезли в Мухосранськ і викинули. Йому довелося самостійно шукати житло і роботу. Через кілька днів йому вдалося влаштуватися механіком на станцію технічного обслуговування за кілька кілометрів від дому. Між його будинком і станцією техобслуговування був гарний парк, але темний вночі.\n\nОдного разу він повертався з роботи. У парку було досить темно, а на вулицях було дуже мало людей. Він думав про це, заходячи все глибше і глибше в парк. Раптом з темряви виринув темний силует, а через кілька секунд пролунав постріл. Це останнє, що він пам'ятає... але він прокинувся в лікарні, і йому сказали, що йому пощастило, і куля пройшла по дотичній, не зачепивши жодного важливого органу."
dan.34.a:0 "§RНашим агентам треба до біса краще прицілюватися.§!"
dan.35.t:0 "Губарев помер"
dan.35.d:0 "Павло Губарєв, один з ідеологів і творців "ДНР" та зрадник України, під час наступу української армії на позиції сепаратистів повівся як справжній "безстрашний борець за свободу" - втік до Росії, хоча був не один.\n\nУтікши від українського правосуддя, Губарєв вирішив не гаяти часу і повернутися до того, в чому вважав себе майстром - ультранаціоналістичної проповіді та організації злочинних бандформувань. Цього разу столицею його амбіцій став Ростов-на-Дону. На проповіді Губарєва, які він проводив щосуботи ввечері в приміщенні кафе "Русская слава", почали приходити місцеві довірливі і не найрозумніші люди. З деяких парафіян йому навіть вдалося сформувати банду, яка іноді навіть займалася міжвуличними пограбуваннями. Але те, що Губарєв ще дихав, було плямою на репутації українського народу, і це треба було змінювати.\n\nЗа наказом обраного глави Луганської та Донецької областей Олексія Данилова до Ростова була відправлена невелика диверсійна група для ліквідації Губарєва. Агенти дійшли висновку, що найкращим і найбільш демонстративним способом буде вбити терориста на очах у його власної аудиторії під час одного з його традиційних виступів. На виступ міг прийти будь-хто, оскільки він завжди вітав нових слухачів, зважаючи на мізерну кількість слухачів, але було вирішено підготувати все без свідків. Оперативники вирішили закласти саморобну бомбу в стіну, на якій під час виступу вивішували прапор так званої "Донецької народної республіки". День за днем протягом тижня диверсійна група переховувалася в будівлі до її закриття, після чого спокійно провела мінування.\n\nІ ось, десята година суботнього вечора, а Губарєв, з прапором своєї "республіки" за спиною, читає казки про свої подвиги під час боїв за Донецьк у 2014 році. Агенти, імена яких ми не будемо називати з міркувань державної безпеки, також були присутні в залі і чекали найкращого моменту. Несподівано Губарєв закашлявся і попросив у одного з охоронців води. Випивши, він знову закашлявся і сказав: "Так, про що я говорив?". Одразу після останнього слова вибухнула бомба, розірвавши йому спину на шматки і викинувши рештки тіла в зал, який почав панікувати.\n\nТак, ще один терорист і зрадник України попрощався з життям, і він не буде ні першим, ні останнім, а лише поповнить довгий список йому подібних."
dan.35.a:0 "§GЩо ж, давайте відсвяткуємо, чи не так?§!"
dan.36.t:0 "Губарев Виживає"
dan.36.d:0 "Павло Губарєв, один з ідеологів і творців "Донецької народної республіки" та зрадник України, під час наступу української армії на позиції сепаратистів повівся як справжній "безстрашний борець за свободу" - втік до Росії, хоча був не один.\nУтікши від українського правосуддя, Губарєв вирішив не гаяти часу і повернутися до того, в чому вважав себе майстром - ультранаціоналістичної проповіді та організації злочинних угруповань. Цього разу столицею його амбіцій став Ростов-на-Дону. На проповіді Губарєва, які він проводив щосуботи ввечері в приміщенні кафе "Русская слава", почали приходити місцеві довірливі і не найрозумніші люди. З деяких парафіян йому навіть вдалося сформувати банду, яка іноді навіть займалася міжвуличними пограбуваннями. Але те, що Губарєв ще дихав, було плямою на репутації українського народу, і це треба було змінювати.\nЗа наказом обраного глави Луганської та Донецької областей Олексія Данилова в Ростов була відправлена невелика диверсійна група для ліквідації Губарєва. Агенти дійшли висновку, що найкращим і найбільш демонстративним способом буде вбити терориста на очах у його власної аудиторії під час одного з його традиційних виступів. На виступ міг прийти будь-хто, оскільки він завжди вітав нових слухачів, зважаючи на мізерну кількість слухачів, але було вирішено підготувати все без свідків. Оперативники вирішили закласти саморобну бомбу в стіну, на якій під час виступу вивішували прапор так званої "Донецької народної республіки". День за днем протягом тижня диверсійна група переховувалася в будівлі до її закриття, після чого спокійно провела мінування.\nІ ось, в суботу ввечері, агенти стояли перед дверима закладу. Вони без проблем зайшли всередину і чекали на появу самого Губарєва. Сьогодні він приїхав із запізненням, але здавалося, що це все одно не вплине на операцію. Губарєв вже розповідав довірливій публіці історії про те, як він ховав дітей у підвалах у 2014 році, коли ЗСУ "жорстоко і нелюдяно обстрілювали мирні квартали". Під час виступу він раптом почав ходити по кімнаті, чого раніше ніколи не робив, і це змусило оперативників нервувати. Вони повинні були знайти момент, коли він стоятиме якомога ближче до вибухового пристрою, але, на жаль, він тримався від нього якнайдалі. Варіант з бомбою провалився, і тепер залишалося або покинути територію, або імпровізувати. Один з агентів не зміг змиритися з поразкою і тихо витягнув пістолет. Глибоко вдихнувши, він направив його на Губарєва і вистрілив, вигукнувши: "Будь ти проклятий, виродку!" На жаль, куля зачепила лише ліве вухо Губарєва, і він одразу ж побіг ховатися за столи. Агенти запанікували і почали бігти до виходу, але були обстріляні членами вуличної банди Губарєва. Двоє з трьох були вбиті, останньому вдалося втекти, а групі було наказано негайно повернутися на територію України. Операція провалилася."
dan.36.a:0 "§R Чи не міг він просто краще прицілитися і менше кричати?!§!"
dan.37.t:0 "Гіркін Помер"
dan.37.d:0 "Гіркін був у престижному клубі неподалік від центру Москви. На його щастя, Путін не поставив на нього "чорну мітку", а на Донбасі йому не вдалося зробити чарівний хід. Непогане життя, чи не так? У нього була зустріч з деякими своїми людьми і парою військових кореспондентів, яким він довіряв. Зустріч закритого типу, на яку не міг потрапити ніхто, крім запрошених, окрім персоналу клубу.\nАлкоголь стояв повсюди. Присутні пили горілку пляшка за пляшкою. Один з друзів Гіркіна запитав його: "Ігорюша, ти про це мріяв, перебуваючи в цій дірі?", на що той відповів: "На серці стільки горя, але насправді, я так о-о-очень давно хотів тієї легкості!".\nУ кімнату зайшла офіціантка. Вона тримала в руках тарілки зі смачною багатою їжею, але більшість людей в кімнаті бачили її більш смачною своїми п'яними очима. Також у неї була маленька коробочка з табличкою "Ігорю Івановичу".\nОфіціантка поставила їжу на стіл і підійшла до Гіркіна. Сором'язливим голосом заговорила до нього: "Ігор Іванович?" - запитала вона. "Так, я слухаю, сонечко", - відповів він. "Я хотіла принести вам... Подарунок. Розумієте, ми з сім'єю вас дуже цінуємо, тому це від нашої сім'ї..."\nОфіціантка поставила маленьку коробочку з тарілки ближче до Гіркіна.\n "Ой, вибачте, мені треба ще замовлення принести..."\n "Нічого, дівчинко. Що б мені дружина сказала, якби я сказав: "Давай ще побудемо", га?"\nЦей його жарт розсмішив натовп, і офіціантка вийшла з їхньої кімнати.\n "Давай подивимось, що там за подарунок...", - сказав Гіркін. Він відкрив коробку і побачив всередині заряд вибухівки. Він почав кричати, але вибухівка була швидшою за нього."
dan.37.a:0 "§GПес закінчив так само, як і його приятелі-сепаратисти.§!"
dan.38.t:0 "Гіркін вижив"
dan.38.d:0 "Гіркін був у престижному клубі неподалік від центру Москви. На його щастя, Путін не поставив на нього "чорну мітку", а на Донбасі йому не вдалося зробити чарівний хід. Непогане життя, чи не так? У нього була зустріч з деякими своїми людьми і парою військових кореспондентів, яким він довіряв. Зустріч закритого типу, на яку не міг потрапити ніхто, крім запрошених, окрім персоналу клубу.\nАлкоголь стояв повсюди. Присутні пили горілку пляшка за пляшкою. Один з друзів Гіркіна запитав його: "Ігорюша, ти про це мріяв, перебуваючи в цій дірі?", на що той відповів: "На серці стільки горя, але насправді, я так о-о-очень давно хотів тієї легкості!".\nУ кімнату зайшла офіціантка. Вона тримала в руках тарілки зі смачною багатою їжею, але більшість людей в кімнаті бачили її більш смачною своїми п'яними очима. Також у неї була маленька коробочка з табличкою "Ігорю Івановичу".\nОфіціантка поставила їжу на стіл і підійшла до Гіркіна. Сором'язливим голосом заговорила до нього: "Ігор Іванович?" - запитала вона. "Так, я слухаю, сонечко", - відповів він. "Я хотіла принести вам... Подарунок. Розумієте, ми з сім'єю вас дуже цінуємо, тому це від нашої сім'ї..."\nОфіціантка поставила маленьку коробочку з тарілки ближче до Гіркіна.\n "Ой, вибачте, мені треба ще замовлення принести..."\n "Нічого, дівчинко. Що б мені дружина сказала, якби я сказав: "Давай ще побудемо", га?"\nЦей його жарт розсмішив натовп, і офіціантка вийшла з їхньої кімнати.\n "Давай подивимось, що там за подарунок...", - сказав Гіркін. Він відкрив коробку і побачив всередині заряд вибухівки. Вона не здетонувала, і Гіркін легко міг отримати інсульт.\n "Охорона! Ловіть цю суку! Не дайте їй втекти!", - кричав він у люті.\nОфіціантку схопили охоронці, і Гіркін опинився прямо перед нею. "Кидай її в мою машину", - сказав він. "Вам доведеться відповісти на кілька запитань"."
dan.38.a:0 "§RТреба шукати іншого фахівця з вибухівки.§!"
