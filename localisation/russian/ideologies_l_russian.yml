l_russian:
social_democracy:0 "Соціал Демократія"
social_democracy_desc:0 "Соціал Демократія"
sgiYRuCz:0 "Соціал Демократія"
sgiYRuCz_desc:0 "Соціал Демократія це політична ідеологія яка поєднує демократичні інститути з якимись соціалістичними практиками, роблячи більший акцент на розширення програм добробуту та більше прав для різних соціальних груп. Його описують як найпоширенішу форму Західного або сучасного соціалізму, так само як реформистське крило демократичного соціалізму."
agrarianism:0 "Аграріанізм"
agrarianism_desc:0 "Аграріанізм це політична і соціальна філософія яка пропагандує натуральне сільське господарство, дрібне землеволодіння, егалітаризм, з аграрними політичними партіями частіше всього підтримкою прав та стійкостю дрібних фермерів і сільськогосподарських робітників проти заможних верств суспільства"
populism:0 "Популізм"
populism_desc:0 "Популізм це навіть не ідеологія, скоріш спосіб отримування підтримки для твоєї партії. В Україні популізм частіше всього пов'язаний з покращенням соціальної позиції та стандарту життя звичайного Українця, проте нажаль не всі політики досягають цілей своїх кампаній."
europeanism:0 "Європеанізм"
europeanism_desc:0 "Європеанізм це ідея поєдуюча соціал-ліберальні цінності з про-європейськими поглядами щоб підвести націю ближче до політичного і соціалього спектрума країн Європейського Союзу. "
faction_social_democracy_peoplesunionofukraine:0 "Народний Союз України"
millitary_junta:0 "Військова Хунта"
millitary_junta_desc:0 "Військова Хунта"
mil_administration:0 "Військова адміністрація"
mil_administration_desc:0 "Тимчасовий уряд впроваджений військовим способом для того щоб впровадити порядок на контрольованих територіях"
admiralty_council:0 "Адміральська рада"
admiralty_council_desc:0 "Тимчасовий уряд який очолюють Адмірали, націлений на повернення порядку на контрольованих територіях"
faction_millitary_junta_ukrainian_union_of_government_restoration:0 "Українська військова організація відновлення влади"
conservative_democracy:0 "Консервативна Демократія"
conservative_democracy_desc:0 "Консервативна Демократія."
national_democracy:0 "Націонал Демократія"
national_democracy_desc:0 "Націонал-Демократія - політичний рух, що поєднує націоналізм з демократичною ідеологією. Демократичні принципи правління поєднуються з націоналізмом у політиці та суспільному житті. Націонал-демократія набула значного розвитку в Європі наприкінці 20 століття на хвилі євроскептицизму та антиміграційних настроїв."
monacrhism:0 "Монархізм"
monacrhism_desc:0 "Монархізм - це відстоювання системи монархії або монархічного правління."
christian_democracy:0 "Християнська демократія"
christian_democracy_desc:0 "Християнська демократія - це політична ідеологія, що виникла в Європі 19-го століття під впливом католицького соціального вчення, а також неокальвінізму. Вона була задумана як поєднання сучасних демократичних ідей і традиційних християнських цінностей, включаючи соціальну справедливість, а також соціальні вчення, які сповідують католицька, лютеранська, реформатська, п'ятидесятницька та інші деномінаційні традиції християнства в різних частинах світу."
faction_conservative_democracy_leauge_of_ukrainian_oblasts:0 "Ліга Українських ОбластейLeauge of ukrainian oblasts"
radical_nationalism:0 "Радикальний Націоналізм"
radical_nationalism_desc:0 "Радикальний Націоналізм."
militant_nationalism:0 "Воєнний націоналізм"
militant_nationalism_desc:0 "Войовничий націоналізм - це ідеологія, тісно пов'язана з деякими правими угрупованнями, які брали участь у Революції Гідності в 2014 році. Войовничий націоналізм - це перехідний режим з революційним характером, очолюваний різними групами воєнізованих формувань."
fascism:0 "Фашизм"
fascism_desc:0 "Фашизм - це форма ультраправого, авторитарного ультранаціоналізму, що характеризується диктаторською владою, насильницьким придушенням опозиції та жорсткою регламентацією суспільства та економіки, яка набула поширення в Європі на початку 20-го століття."
ultraconservatism:0 "Ультраконсерватизм"
ultraconservatism_desc:0 "Ультраконсерватизм - це ідеологія, яка бере деякі частини традиційного консерватизму, такі як віра або різні традиційні цінності, і доводить їх до крайнощів. Такі режими зазвичай є релігійними культами або ізольованими від світу місцями."
ultranationalism:0 "Ультранаціоналізм"
ultranationalism_desc:0 "Ультранаціоналізм - це ідеологія, яка бере деякі частини різних правих ідеологій і доводить їх до крайнощів. Ці режими зазвичай побудовані на реваншистських ідеях або ведуть війну за виживання. Зазвичай ультранаціоналізм поєднується з ультрамілітаризмом і різними заходами, які застосовуються у воєнний час."
nationalsocialism:0 "Націонал Соціалізм"
nationalsocialism_desc:0 "Націонал-соціалізм - це форма фашизму, яка зневажає ліберальну демократію та парламентську систему. Він включає запеклий антисемітизм, антикомунізм, науковий расизм і використання євгеніки у своє віровчення."
faction_nationalism_panukrainian_unity_pact:0 "Пан Український пакт єдності"
oligarchy:0 "Олігархія"
oligarchy_desc:0 "Олігархія."
kleptocracy:0 "Клептократія"
kleptocracy_desc:0 "Клептократія - це уряд, корумповані лідери якого використовують політичну владу для привласнення багатства народу і землі, якою вони керують, як правило, шляхом розкрадання або незаконного привласнення державних коштів за рахунок широких верств населення.."
corporatocracy:0 "Корпоративізм"
corporatocracy_desc:0 "Корпоратократія - це термін, що використовується для позначення економічної, політичної та судової системи, контрольованої корпораціями або корпоративними інтересами."
faction_oligarchy_ukrainian_union:0 "Український Союз"
radical_socialism:0 "Радикальний соціалізм"
radical_socialism_desc:0 "Радикальний соціалізм."
authoritarian_socialism:0 "Авторитарний соціалізм"
authoritarian_socialism_desc:0 "Авторитарний соціалізм"
communism:0 "Комунізм"
communism_desc:0 "Комунізм - це філософська, соціальна, політична та економічна ідеологія і рух, метою яких є створення комуністичного суспільства, а саме соціально-економічного ладу, побудованого на ідеях спільної власності на засоби виробництва та відсутності соціальних класів, грошей і держави."
national_communism:0 "Націонал-комунізм"
national_communism_desc:0 "Націонал-комунізм - це різні форми, в яких марксизм-ленінізм і соціалізм були прийняті або реалізовані лідерами в різних країнах з використанням аспектів націоналізму або національної ідентичності для формування політики, незалежної від комуністичного інтернаціоналізму."
market_socialism:0 "Ринковий соціалізм"
market_socialism_desc:0 "Ринковий соціалізм - це економічна система, що являє собою компроміс між соціалістичним плануванням і вільним підприємництвом, в якій підприємства перебувають у державній власності, але виробництво і споживання регулюються ринковими силами, а не державним плануванням."
syndicalism:0 "Синдикалізм"
syndicalism_desc:0 "Характерними рисами синдикалізму були робітничий контроль і "пряма дія". Синдикалісти, такі як Фернан Пеллутьє, не довіряли як державі, яку вони вважали агентом капіталізму, так і політичним партіям, які, на їхню думку, були нездатні досягти радикальних змін. Їхньою метою було замінити капіталізм і державу вільною федерацією місцевих робітничих груп, яку вони мали намір створити за допомогою прямої дії - зокрема, загального страйку робітників, який би повалив уряд, оскільки він зупинив економіку."
anarchocommunism:0 "Анархо-комунізм"
anarchocommunism_desc:0 "Анархо-комунізм - це політична філософія та анархістська школа, яка виступає за скасування держави, капіталізму, найманої праці, соціальної ієрархії та приватної власності (при збереженні поваги до особистої власності, поряд з колективною власністю на предмети, товари та послуги) на користь спільної власності на засоби виробництва та прямої демократії, а також горизонтальної мережі робочих рад."
queer_socialism:0 "Квір-соціалізм"
queer_socialism_desc:0 "Ідеологія, яка поєднує в собі радикальний анти-стриптиз, права ЛГБТ+, викорінення поняття сім'ї та деякі ліві цінності, такі як рівність (але деякі люди є більш рівними, ніж інші)."
faction_radical_socialism_united_ukrainian_communes:0 "Об'єднанні Українські Комунни"
liberal_democracy:0 "Ліберал Демократія"
liberal_democracy_noun:0 "Ліберал Демократія"
liberal_democracy_desc:0 "Ліберально Демократичний"
liberalism:0 "Лібералізм"
liberalism_desc:0 "Лібералізм - це політична і моральна філософія, заснована на свободі, згоді керованих і рівності перед законом."
classical_liberalism:0 "Класичний Лібералізм"
classical_liberalism_desc:0 "Класичний лібералізм - це політична ідеологія і напрямок лібералізму, який виступає за вільний ринок, громадянські свободи в умовах верховенства права з акцентом на обмежену владу, економічну свободу і політичну свободу."
neoliberalism:0 "Неолібералізм"
neoliberalism_desc:0 "Неолібералізм сьогодні використовується для позначення ринково орієнтованої політики реформ, таких як "усунення контролю над цінами, дерегуляція ринків капіталу, зниження торговельних бар'єрів" та зменшення, особливо через приватизацію та жорстку економію, впливу держави на економіку."
market_liberalism:0 "Ринковий лібералізм"
market_liberalism_desc:0 "Ринковий лібералізм означає економічно ліберальне суспільство, яке також забезпечує мінімальну або помірну соціальну державу для своїх громадян."
libertarianism:0 "Лібертаріанізм"
libertarianism_desc:0 "Лібертаріанізм це політична філософія яка на меті має свободу як ключовий принцип. Лібертаріанці шукають способи максимізації автономії та політичних свобод наголошуючи на свободі об'єднання, свободі вибору, індивідуалізмі та добровільному об'єднанні."
faction_liberal_democracy_ukrainian_confederation:0 "Українська Конфедерація"
centrism:0 "Центризм"
centrism_desc:0 "Центризм"
centrist:0 "Центризм"
