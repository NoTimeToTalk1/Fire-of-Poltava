 POLITICS_KORBAN_DESC:0 "Геннадій Олегович Корбан є помітною фігурою в дніпровській політиці. Народився 24 травня 1970 року в місті Дніпро, де закінчив середню школу, металургійний інститут, а потім гірничу академію. Він є етнічним євреєм і сповідує іудаїзм. У 1990 році Корбан став брокером на Московській фондовій біржі під час свого дворічного перебування в Москві. Повернувшись до Дніпра, він заснував власну брокерську фірму, інвестиційний фонд і навіть став членом наглядової ради "Південного гірничо-збагачувального комбінату" та "Укрнафти". Ставши відомим бізнесменом, Корбан не ліз у політику, але Революція Гідності змінила ситуацію. Разом з Борисом Філатовим вони стали на бік протестувальників у Дніпрі, але зіткнулися з ворожістю колишнього віце-прем'єр-міністра Олександра Вілкула. Коли ситуація частково стабілізувалася і головою Дніпропетровської обласної державної адміністрації був призначений Ігор Коломойський, Геннадій Корбан був призначений його заступником. За підтримки Дніпропетровської ОДА та особисто Корбана в регіоні були проведені численні адміністративні та економічні реформи, розпочато масштабні заходи на підтримку АТО. Депутатом був рік, після чого вирішив заснувати власну партію - "Українське об'єднання патріотів" (скорочено "УКРОП"). Від цієї партії він балотувався в народні депутати та мери Києва, але не набрав достатньої кількості голосів. У 2015 році проти нього також було відкрито кримінальну справу за привласнення бізнесу та організовану злочинність під час перебування на посаді заступника голови обласної державної адміністрації, але йому вдалося виграти в суді. Коли Україна перестала існувати як єдина держава, він вирішив поїхати до Дніпра і почати боротьбу з місцевим бандитом Білоусовим, але його раптова смерть кардинально змінила ситуацію.\nВтративши центральне управління, Дніпропетровська область почала розпадатися на регіони на чолі з окремими лідерами, і Корбан разом з Філатовим вирішили боротися з Налекрешвілі в столиці - Дніпрі."
 POLITICS_CHERV_DESC:0 "Сергій Васильович Червонописький - шанована постать як в Україні, так і в усьому колишньому Радянському Союзі. Народився 6 липня 1957 року в Черкасах, навчався у військових училищах у Мінську та Рязані. З 1974 по 1982 рік служив у Радянській Армії. Під час служби був направлений до Афганістану, де спочатку брав участь у захопленні Кабульського аеропорту, після чого став його першим комендантом, а потім, як він сам писав, "воював як усі". На війні втратив обидві ноги, після чого був терміново госпіталізований і повернувся додому. Після повернення до Черкас розпочав політичну кар'єру, ставши одним із лідерів руху ветеранів війни в Афганістані. Продовжив боротьбу за права ветеранів війни в незалежній Україні, спочатку очоливши Комітет ветеранів, а потім, у 1997 році, заснувавши Українську партію справедливості. У 1999 році отримав звання генерал-майора, а в 2012 році був удостоєний звання Героя України. З 2006 по 2007 рік він також був народним депутатом від СПУ. Коли Україна розкололася, Червонописький залишився в Черкасах. Маючи військовий досвід, він хотів захистити рідну землю та її народ від кровожерливих сусідніх угруповань і запропонував свої послуги новій владі Черкаської області. Коли народ перестав терпіти слабке правління Семинога, Червонописький, як єдина авторитетна людина в державі, якій люди довіряли, оголосив воєнний стан і став одноосібним правителем Черкас."
 POLITICS_BOND_DESC:0 "Анатолій Васильович Бондаренко народився 8 серпня 1974 року в місті Лисянка Черкаської області. У 2005 році закінчив факультет економіки та менеджменту Черкаського технологічного університету, а у 2012 році - факультет економіки та підприємництва Уманського університету садівництва. У 1992-1994 роках служив у Збройних силах України в розвідувальній роті спеціального призначення. Після армії працював товарознавцем у Лисянці, де у 2002 році став головою сільської ради. З 2010 по 2013 рік займався підприємницькою діяльністю. З листопада 2015 року був міським головою Черкас і навіть тричі обирався депутатом Черкаської обласної ради. З березня 2010 року також очолював Черкаську обласну організацію партії "Батьківщина". Коли полтавські протести призвели до розколу української держави, Бондаренко разом з іншими керівниками та представниками "Батьківщини" встановив контроль над Черкасами та організував місцеве самоврядування. "
 POLITICS_ASMAN_DESC:0 "Моше Реувен Азман народився 14 березня 1966 року в Ленінграді (нині Санкт-Петербург). У 1987 році, після одруження, виїхав до Ізраїлю, де продовжив навчання в єрусалимських єшивах "Шамір" і "Мерказ Гутник". Паралельно з навчанням очолював "Бейт Хабад" для російськомовних євреїв. Після закінчення навчання отримав звання рабина. У 1991 році був направлений в Україну, де до 1995 року працював заступником директора програми "Врятувати дітей Чорнобильської зони". Того ж року очолив єврейську релігійну громаду "Хабад Любавич" у Києві. У 1997 році став головним рабином Всеукраїнського єврейського конгресу та головним представником Всесвітнього центру брацлавських хасидів в Україні. У 2005 році був обраний головним рабином України. У 2009 році він навіть отримав орден "За заслуги" III ступеня, але в 2010 році відмовився від нагороди через те, що він назвав "прославлянням Бандери". Коли Україна була охоплена хаосом, рабин перебував в Умані, де знаходилася найбільша єврейська громада в Україні. Маючи великий авторитет серед євреїв (точніше, хасидів), він отримав їх повну підтримку з моменту проголошення незалежної Умані і оголошення себе її лідером."
 POLITICS_LUCENKO_DESC:0 "Юрій Віталійович Луценко народився 14 грудня 1964 року в Рівному. У 1989 році закінчив Львівський політехнічний інститут за спеціальністю "електронна техніка". З 1984 по 1986 рік служив в армії. Після закінчення інституту Луценко п'ять років працював за фахом, але в 1991 році його політична кар'єра почала набирати обертів. Завдяки зв'язкам свого батька він вступив до Соціалістичної партії під керівництвом Мороза в 1991 році. З 1994 по 1997 рік Луценко обіймав посади в Рівненській обласній адміністрації та Рівненській міській адміністрації. У 1997 році отримав посаду заступника міністра у справах науки і технологій України. У 1998 році Луценко вперше балотувався до Верховної Ради, але не пройшов. Йому це вдалося лише у 2002 році. На початку 2000-х років Луценко входив до групи "Україна без Кучми" і був активним критиком другого президента України. Під час Помаранчевої революції, вже як народний депутат Верховної Ради від Соціалістичної партії, підтримував Віктора Ющенка, був комендантом наметового містечка під час протестів на Майдані. З 2005 по 2006 рік, а потім з 2007 по 2010 рік був міністром внутрішніх справ. У період з 2010 по 2013 рік Юрій Луценко регулярно з'являвся в новинах у зв'язку з кримінальним переслідуванням і звинуваченнями в корупції. У 2012 році він був заарештований і засуджений до 4 років позбавлення волі, але через рік вийшов на свободу завдяки указу Януковича про помилування. Під час Революції Гідності Юрій Луценко знову опинився в центрі уваги: він був серед демонстрантів, активно пропагував ідеї Євромайдану під час поїздок по країні. У 2014 році отримав посаду радника президента Петра Порошенка, а також очолив фракцію "Блок Петра Порошенка" в парламенті. \З 2016 року обіймав посаду Генерального прокурора України, незважаючи на те, що не мав юридичної освіти. У 2019 році очолив Волинську обласну державну адміністрацію, але не знайшов майже ніякої підтримки серед населення. \Коли справи в державі пішли шкереберть, він оголосив надзвичайний стан в області і намагався зберегти стабільність, ворогом якої стали рівненські бандити."
 POLITICS_MEDVED_DESC:0 "Віктор Володимирович Медведчук народився 7 серпня 1954 року в селі Шана Красноярського краю. Його батько був засуджений за звинуваченням у співпраці з українськими націоналістами під час Другої світової війни (насправді він був німецьким колабораціоністом і допомагав вивозити українців у рабство до Німеччини) і засланий до Сибіру, звідки їм вдалося повернутися через 6 років після народження сина. У 1971 році закінчив Борівську середню школу і намагався вступити до Вищої школи міліції, але не був прийнятий через дефекти біографії батька. У 1972 році вступив до Київського державного університету на юридичний факультет. Після закінчення університету був прийнятий до Київської колегії адвокатів. Незважаючи на молодий вік, виступав правозахисником на судових процесах над двома українськими дисидентами - поетами Василем Стусом та Юрієм Литвином. Обидва його клієнти були звинувачені і померли у в'язниці. Сам він багато разів визнавав їх винними і допомагав слідству позбутися їх. У 80-х роках переїхав до Києва і з початку 90-х вважався одним з найвпливовіших місцевих бізнесменів. У цей період він очолює Український кредитний банк, очолює київський футбольний клуб "Динамо", а також розширює свій бізнес. Водночас, у 1994 році він очолює Вищу кваліфікаційну комісію адвокатури при Кабінеті Міністрів України. Саме в 1990-х роках Віктор Медведчук послідовно зблизився з першим президентом Леонідом Кравчуком, а потім з його наступником Леонідом Кучмою. У роки правління Кучми його політична кар'єра пішла вгору. У 1997 році він вперше потрапив до парламенту. На виборах 1999 року очолював передвиборчий штаб чинного президента Кучми. Саме йому та Суркісу Кучма завдячує своїм переобранням на другий термін. У 2002 році очолив Адміністрацію Президента України, після чого його стали називати "сірим кардиналом". Був затятим противником Помаранчевої революції і повністю підтримував Януковича як кандидата в президенти. Того ж року одружився з Путіним, який став хрещеним батьком його дитини. У 2012 році створив організацію "Український вибір", яка виступала за відмову від європейського курсу і переорієнтацію на вступ до Митного союзу. Під час захоплення Криму перебував на півострові, але першим же рейсом вилетів до Швейцарії. У 2018 році приєднався до партії Вадима Рабіновича "За життя". На останніх виборах до Верховної Ради пройшов до парламенту за списками об'єднаної платформи ОПЗЖ. У 2019 році, коли єдина Україна перестала існувати, головний штаб ОПЗЖ розташовувався в Херсонській області. Там був і сам Медведчук. Він проголосив "республіку" і почав постачати з Криму зброю, необхідну для об'єднання України під своєю владою."
 POLITICS_ZELEN_DESC:0 "Володимир Олександрович Зеленський народився 25 січня 1978 року в Кривому Розі, як і його політичний попередник, фактично не потребує представлення. Виходець з єврейської родини, він здобув юридичну освіту у 2000 році на юридичному факультеті Криворізького інституту економіки Київського економічного університету імені Вадима Гетьмана, але ніколи не працював за фахом. У студентські роки захопився КВК, а згодом створив власну команду - "Квартал 95". У російському проекті він також познайомився зі своєю майбутньою дружиною і часто гастролював у Росії. У 2003 році на прохання телеканалу Коломойського "1+1" Зеленський і компанія провели концерти зі своїми найкращими номерами, а також вклали гроші у власний проект на телеканалі "Інтер" - "Вечірній квартал", а згодом команда "95-й квартал" переросла у "Студію Квартал-95". У 2010 році Зеленський став генеральним продюсером "Інтера", але згодом, у 2011 році і ще раз у 2012 році, залишив цю посаду і підписав контракт з "1+1". Він не брав участі в Революції Гідності, але в 2014 році встиг виступити проти наміру Міністерства культури створити список осіб з Росії, які становлять загрозу національній безпеці України. У 2015 році почав виходити серіал його авторства і з ним у головній ролі - "Слуга народу", в якому він, як російськомовний вчитель історії, стає президентом України і проводить реформи на благо народу. У 2017 році його колега Іван Баканов також зареєстрував однойменну політичну партію. У 2018 році з'явилися заяви і від самого Володимира Олександровича про наміри припинити російсько-українську війну на Донбасі шляхом переговорів з Росією, якщо він стане президентом. Офіційна заява про наміри балотуватися в президенти пролунала в досить несподіваній формі - під час новорічного звернення в ефірі каналу "1+1" у 2019 році.n Після масштабної виборчої кампанії, президентських дебатів і звинувачень у співпраці з олігархом Коломойським, а також перетину російсько-українського кордону після початку війни на Донбасі, він все ж переміг свого головного конкурента Петра Порошенка. Але Порошенко не збирався миритися з поразкою, що призвело до краху української єдності. Зеленський - людина без досвіду в політиці, але наразі є маріонеткою "Офісу президента", який фактично керує країною. Він також є власником жахливої репутації, і хто знає, як довго він зможе протриматися..."
 POLITICS_POROH_DESC:0 "Петро Олексійович Порошенко народився 26 вересня 1965 року в місті Болград Одеської області і не потребує представлення. У 1989 році закінчив КНУ ім. Т.Г. Шевченка за спеціальністю "міжнародні економічні відносини". Після навчання займався бізнесом, володів заводами, ЗМІ (зокрема, "5 каналом"), банками. Але найвідомішим його активом завжди була корпорація "Рошен". У 1998 році вперше став народним депутатом як член Соціал-демократичної партії. У 2000 році вийшов із соціал-демократії і створив власну партію - "Солідарність" (у майбутньому - "Європейська солідарність"), яка згодом увійшла до складу "Партії регіонального відродження" (згодом - Партії регіонів), але і з неї вийшов через півтора року. У 2005 році він став секретарем РНБО, у 2007 році - головою ради НБУ, а в 2009 році навіть міністром закордонних справ. Петро був активним учасником Революції Гідності, що в майбутньому дуже допомогло йому під час президентських виборів підвищити рейтинги. За допомогою олігарха Фірташа вони з Кличком обрали свої поля - Петро мав балотуватися в президенти, а Віталій - на посаду мера Києва. Зрештою, обидва виграли вибори. Через 20 днів після обрання на посаду глави держави він підписав Угоду про асоціацію з Європейським Союзом, яка стала джерелом його майбутньої влади. За час його перебування на посаді було проведено масштабну військову реформу, яка значно посилила занепад Збройних сил, що спостерігався останніми роками. Також були підписані закони про мову, декомунізацію, створення Єдиної помісної православної церкви, а в 2017 році навіть безвізовий в'їзд до ЄС. Але, незважаючи на всі реформи, з його ім'ям пов'язано чимало скандалів. Зв'язки з олігархами, приватизація бізнесу, офшорні рахунки та багато іншого знищили репутацію Пороха, що відобразилося на виборах 2019 року. На них Порошенко програв Володимиру Зеленському, але не збирався з цим миритися. Він оголосив результати нелегітимними, а в Полтаві почалися сутички між його прихильниками та поліцією. Після втручання "Національного корпусу" шляху назад вже не було.\n Тим часом у Чернігові відбувається прес-конференція Петра Порошенка зі своїми виборцями, і врешті-решт Порошенко був оголошений президентом. У Києві, звісно, цього не сприйняли і почалася фактична війна. А після того, як Петро Олексійович оголосив себе єдиним легітимним лідером, по всій країні почали формуватися альтернативні політичні центри. Але, як з'ясувалося пізніше, Порошенко не мав реальної підтримки в регіонах, які він контролював. Задля збереження свого статусу він був змушений укладати союзницькі угоди з місцевими ультраправими, представниками церков та іншими "маргіналами", але хто знає, можливо, у нього ще залишилися якісь козирі в рукаві." 
 POLITICS_TYLER_DESC:0 "Олексій Вікторович Шкробинець, більш відомий як Тайлер Андерсон, який народився 21 вересня 1993 року, дійсно відрізнявся від українських політичних еліт. Будучи блогером із Запоріжжя та маючи три канали на YouTube, Тайлер з 2014 року активно займався волонтерством, що принесло йому гарну репутацію в суспільстві. До Collapse він разом зі своєю дівчиною, Юліаною Жованик, знімав відео про кіно, ігри та іноді про політику. Коли Україна розпалася, в Запорізькій області відбулися регіональні вибори, на яких Шкробинець здобув перемогу завдяки підтримці проукраїнської молоді Запоріжжя та Мелітополя. Саме ці молоді люди, за згодою Олексія, мали формувати майбутнє цього регіону. Але, незважаючи на перемогу на виборах, Тайлер так і залишився радше представником місцевої української молоді, ніж справжнім політичним лідером."
 POLITICS_GABI_DESC:0 "Дмитро Анатолійович Габінет народився 9 серпня 1983 року в Хмельницькому. У 2007 році закінчив Хмельницький університет управління та права, після чого навчався у Познані, Польща. Кандидат юридичних наук. З 2006 по 2015 рік працював на різних посадах у Хмельницькому університеті, який закінчив, а з 2017 по 2019 рік був доцентом, а згодом завідувачем кафедри права Хмельницького кооперативного торговельно-економічного інституту. У політиці присутній з 2014 року як другорядна фігура, спочатку як голова громадської організації "Форпост народовладдя". У 2019 році, незадовго до колапсу, був призначений головою Хмельницької обласної державної адміністрації. Коли єдина Україна перетворилася на купу неорганізованих і хаотичних регіональних держав, Кабмін, маючи майже повну виконавчу владу в області, заявив про її нейтралітет у конфлікті та готовність Хмельницького прийняти і захистити активи всіх, хто прийде, ставши тихою і стабільною гаванню на Заході."
 POLITICS_MORE_DESC:0 "Ігор Олександрович Воронченко народився 22 серпня 1964 року на харківському Бабаї. Майбутній адмірал з дитинства мріяв про військову кар'єру і в 1986 році закінчив Ташкентське вище танкове командне училище, після чого потрапив до Групи радянських військ у Німеччині, де командував танковим взводом. Через 2 роки повернувся до СРСР, де продовжив військову службу в Білоруському військовому окрузі, і з 1986 по 1992 рік проходив військову службу на посадах від командира взводу до начальника штабу - заступника командира танкового батальйону. Після розпаду Союзу повернувся на Батьківщину і прийняв присягу на вірність народу України. До 2003 року командував полком Національної гвардії в Криму, а потім перейшов до складу Військово-Морських Сил Збройних Сил України, де обіймав відповідальні посади начальника відділу та начальника управління. З 2007 по 2011 рік служив на керівних посадах в Об'єднаному оперативному командуванні Збройних Сил України. У 2011-2015 роках обіймав посаду заступника командувача Військово-Морських Сил Збройних Сил України з берегової оборони. 6 грудня 2013 року полковнику Ігорю Воронченку присвоєно військове звання генерал-майор. У 2014 році протягом півроку брав участь в антитерористичній операції в Луганській області, де був заступником керівника антитерористичної операції з питань координації. 14 жовтня 2015 року йому було присвоєно військове звання генерал-лейтенант. У 2016 році призначений тимчасово виконуючим обов'язки командувача Військово-Морських Сил Збройних Сил України, того ж року Президент України Петро Порошенко призначив Воронченка командувачем Військово-Морських Сил Збройних Сил України та присвоїв йому військове звання віце-адмірала. У 2018 році Ігор отримав звання адмірала. Коли Україну охопив хаос, адмірал Воронченко не розгубився. Перебуваючи в Одесі, він разом зі штабом ВМС ЗСУ оголосив надзвичайний стан в регіоні та організував військову адміністрацію, подібну до Кривоноса на сході. Але на відміну від Кривоноса, Воронченко не всім подобався, але для збереження стабільності більшість населення регіону співпрацює з військовою владою."
 POLITICS_KOHULINSKY_DESC:0 ""Вірність нації" - саме ці слова виникають, або повинні виникати в свідомості українців, коли вони чують ім'я Руслана Володимировича Кошулинського. Народившись 9 вересня 1969 року у Львові, молодий Руслан, після закінчення школи, спортивного інтернату, строкової служби в Радянській армії в Німеччині та закінчення технологічного факультету кооперативного технікуму у Львові, став завідувачем виробництва в ресторані-готелі "Беркут" на Гуцульщині. У 1996 році, після роботи в Красноярському краї, вступив до СНПУ (згодом Всеукраїнського об'єднання "Свобода"), а через 10 років отримав ступінь бакалавра за спеціальністю "Правознавство" в Тернопільському технічному університеті. З 2008 року обіймав ключові посади в партії, а з 2012 по 2014 рік був народним депутатом. Брав активну участь у Революції Гідності та всіх найважливіших подіях того часу. 20 лютого 2014 року Руслан, на той час єдиний легітимний представник влади в країні, за власною ініціативою зібрав народних депутатів на засідання Верховної Ради, щоб зупинити кровопролиття. Того дня, за пропозицією Кошулинського, депутати проголосували за відсторонення Януковича від влади та повернення "Беркуту" на місця дислокації. Рішення, прийняті на тому засіданні Верховної Ради, стали підставою для визнання світовою спільнотою зміни влади в Україні легітимною. А з 20 по 21 лютого 2014 року він навіть одноосібно керував Україною. Отримавши повістку 5 лютого 2015 року, прийнявши присягу та пройшовши 26-денний курс підготовки на Яворівському полігоні, Кошулинський разом з однопартійцями вирушив в АТО артилеристом у складі 44-ї артилерійської бригади, в якій дослужився до звання старшого сержанта. У тому ж році закінчив службу, щоб взяти участь у виборах мера Львова, але посів лише друге місце, програвши А. Садовому. Попри програш на виборах мера, став депутатом Львівської обласної ради та у вересні 2018 року ініціював законопроект "Про мораторій на публічне використання російськомовного культурного продукту на території Львівської області". У листопаді 2018 року "С14", "Свобода", "Правий сектор", "ОУН" та "КУН" висунули Руслана Кошулинського єдиним кандидатом на посаду Президента України від націоналістичних сил. Його також підтримали як єдиного кандидата командувач Української добровольчої армії Дмитро Ярош, брати Капранови, легендарний сотник УПА Мирослав Симчич ("Кривоніс") та багато інших культурних і політичних діячів України. Незважаючи на потужну підтримку та заслужене ім'я, Кошулинський не переміг на виборах і поступився званням президента Зеленському. Коли іскра з Полтави розпалила справжню пожежу по всій Україні, Кошулинського обрали тимчасовим очільником трьох (де-факто двох) галицьких областей, як компромісну фігуру, якою він має бути ще кілька місяців, до повноцінних президентських виборів. Він вже оголосив про свою кандидатуру, об'єднавшись з Марцінківим та іншими "свободівцями" Галичини."
 POLITICS_MOSKAL_DESC:0 "Геннадія Геннадійовича Москаля, який народився 11 грудня 1950 року на Північній Буковині, можна сміливо назвати справжнім кар'єристом у військовій справі і не тільки. У 1970 році він закінчив Чернівецький технікум залізничного транспорту і став оглядачем вагонів у Тернополі, а потім два роки служив строкову службу в Радянській армії. Після демобілізації навчався у Львівській спеціальній середній школі міліції МВС СРСР, а в 1975 році почав працювати в органах внутрішніх справ, де зробив стрімку кар'єру від інспектора до заступника міністра внутрішніх справ України, генерал-лейтенанта міліції. Вже за часів незалежної України, з 1995 по жовтень 1997 року, обіймав посаду начальника УМВС України в Закарпатській області, а вже в червні 2001 року Геннадій Геннадійович був призначений головою Закарпатської державної адміністрації. З лютого 2005 року по 18 листопада 2005 року був призначений заступником міністра внутрішніх справ України - начальником кримінальної міліції, але під час каденції Луценка Москаля подав у відставку, і в той же день був призначений головою Луганської обласної державної адміністрації, де пропрацював близько півроку. У 2007 році вперше став народним депутатом за списком Блоку "Наша Україна - Народна самооборона". Блок. У 2012 році вдруге став депутатом, але вже від партії "Батьківщина", з якої був виключений у 2014 році. Того ж року був призначений Президентом Порошенком головою Луганської обласної державної адміністрації і обіймав цю посаду до березня 2015 року. У липні його знову призначили на посаду голови Закарпатської ОДА, яку він обіймав до початку кризи. Коли Україна, яку знав світ, зникла, Москаль запровадив на території області надзвичайний стан, фактично ізолювавши регіон від навколишнього світу. Це допомогло зберегти стабільність, але не всі були з цим згодні, що сильно вплинуло на його популярність серед людей. Угорщина також почала посилювати свій вплив у регіоні, змушуючи адміністрацію боротися з місцевими угорськими партіями та організаціями."
 POLITICS_LYASHKO_DESC:0 "Олег Валерійович Ляшко, уродженець Чернігівської області, народився 3 грудня 1972 року і став справжньою перлиною української політики. У 1998 році закінчив Харківський національний педагогічний університет імені Григорія Сковороди, а в 2013 році - Київський національний університет імені Тараса Шевченка. Трудову діяльність розпочав пастухом колгоспу "Прогрес" на Луганщині, а в 90-х роках став журналістом. У 2006 році вперше став народним депутатом від Блоку Тимошенко, хоча через 4 роки був виключений з партії, після чого заснував власну політичну партію - Радикальну партію Олега Ляшка. На виборах 2014 року балотувався в президенти і посів третє місце. З початку війни на Донбасі зайняв радикальну позицію по відношенню до Росії і наполягав на силовому вирішенні конфлікту на Сході і розриві дипломатичних відносин з Російською Федерацією. Про нього також повідомляли про часті бійки у Верховній Раді, конфлікти з Порошенком та олігархами або тісні контакти з Рінатом Ахметовим. У 2019 році він також балотувався в президенти України, але знову невдало. Коли Україна почала розколюватися, він, скориставшись популярністю Радикальної партії у Вінницькій та Житомирській областях і сформувавши коаліцію з Юлією Тимошенко, оголосив про створення альтернативного уряду. Звичайно, коаліції - це завжди хитке утворення, і союз "Радикальної партії" з "Батьківщиною" не є винятком, але поки що союз цих двох сил дарує регіонам мир, безпеку і стабільність."
 POLITICS_CHORT_DESC:0 "Арсен Борисович Аваков, який народився 2 січня 1964 року в Баку, за життя запам'ятався людям багатьма речами. Будучи етнічним вірменином, він жив в Україні з 1966 року. Через 22 роки закінчив Харківський політехнічний інститут. У 90-х роках заснував власне акціонерне товариство та банк. У 2005 році став членом Харківської обласної державної адміністрації, а через п'ять років, після висловлення недовіри Харківською обласною радою, був звільнений з посади указом Президента Ющенка. Після цього почався період оскаржень і бюрократичних скандалів щодо указу Ющенка, але в 2014 році, після втечі тодішнього міністра внутрішніх справ, члена "Партії регіонів" Віталія Захарченка, він став виконуючим обов'язки. Через 5 днів став повноцінним міністром внутрішніх справ у першому та другому урядах Арсенія Яценюка та Володимира Гройсмана. У 2014 році також був обраний народним депутатом від "Народного фронту". Але за час його каденції десятки корупційних скандалів сильно вплинули на його політичну репутацію. У 2019 році, за кілька днів до колапсу, він прибув до Харкова, щоб провести зустрічі з керівництвом місцевої поліції, а коли єдиної України вже не стало, за підтримки Геннадія Кернеса та деяких інших мерів регіону, зміг прибрати до рук всю Харківську область і встановити авторитарний режим. Завдяки поліцейській системі так званої "держави" вона, разом з Хмельницькою областю, є однією з найбезпечніших в країні. Однак така система виявила і суттєві недоліки. Обласна міліція, маючи практично необмежені повноваження, почала нагадувати себе в "лихі дев'яності", зловживаючи своїм статусом і безкарністю та вдаючись до захоплення місцевих малих і середніх підприємств, а також рекету."
 POLITICS_AKSYONOV_DESC:0 "Сергій Валерійович Аксьонов народився 26 листопада 1972 року в місті Бельці, Молдова. З 1989 по 1993 рік навчався в Сімферополі, а з 1993 року був заступником директора кількох кооперативів і ТОВ. Свою протиправну діяльність розпочав у складі злочинного угруповання "Греки" і продовжив у 90-х роках у складі злочинного угруповання "Салем", отримавши в ньому прізвисько "Гоблін". З 2003 року він є громадянином Росії, а з 2008 року - активним учасником проросійських організацій в Криму. Після цього став лідером партії "Русское единство", а в 2014 році, після усунення Януковича з посади президента в результаті Євромайдану, в захопленій будівлі Верховної Ради Республіки Крим, з піднятим над будівлею російським прапором, був незаконно проголошений новим прем'єр-міністром. республіки". 17 травня того ж року Республіка Крим проголосила свою незалежність і провела референдум про приєднання до Росії. Хоча результати були цілком позитивними для Росії, президент Росії Володимир Путін вирішив не робити поспішних кроків, але Міністерство закордонних справ Росії визнало незалежність Республіки Крим, а російські війська окупували півострів. Це було мотивовано тим, що народ Криму прагнув до незалежності ще з часів розпаду Союзу, але так і не отримав її. І тому де-юре Республіка Крим стала незалежною, а де-факто - російським сателітом."
 POLITICS_PUCHKOV_DESC:0 "Дмитро Юрійович Пучков, більш відомий під псевдонімом "Гоблін", народився 2 серпня 1961 року в Кропивницькому, здобув в Україні неабияку репутацію (з негативної точки зору) через свої висловлювання та погляди. До школи ходив в Україні, виріс у Ленінграді, а десятий клас закінчив у Німеччині під Берліном, відвідавши шість навчальних закладів. Закінчив автошколу ДОСААФ, потім служив у радянській армії. Після демобілізації, до початку дев'яностих, Гоблін встиг змінити професії таксиста, шліфувальника, коваля, слюсаря, сантехніка та електрика. У 1992 році він вступив на службу в міліцію Санкт-Петербурга, але через 6 років пішов у відставку. У 1999 році Дмитро Пучков відкрив власний сайт-блог "Тупичек Гоблина" і почав працювати як автор статей, переважно для ігрових видань, де писав під псевдонімом Гоблін, але широку популярність здобув після появи "гумористичного перекладу" до перших двох фільмів з кінотрилогії "Володар перснів", який він написав у співавторстві. Неодноразово заперечував територіальну цілісність України, називав Революцію Гідності "державним переворотом, організованим ЦРУ США", після якого почалася побудова "фашистської тоталітарної держави" з "репресіями на рівні сталінізму". Скориставшись розвалом української держави, Гоблін разом зі своїми вірними прихильниками перетнув незахищений кордон і дістався до Кропивницького, захопивши місцеву обласну раду. Незважаючи на контроль над адміністративними структурами регіону, його владу підтримують лише близько двохсот його однодумців, що робить контроль над "Тупиком" лише номінальним. Єдине, що хоч якось допомагає Пучкову не втратити і без того хиткий контроль, - це повний хаос і дезорганізація навколо."
 POLITICS_KIM_DESC:0 "Віталій Олександрович Кім народився 13 березня 1981 року в Миколаєві. Син заслуженого тренера СРСР з баскетболу, в юному віці сам став гравцем національної збірної. Маючи корейське коріння, він є нащадком національних меншин, депортованих з Центральної Азії в прикордонні регіони "Тюрми народів". Закінчив Миколаївську гімназію № 2 та Національний університет кораблебудування ім. адм. Макарова, з 1998 року займається підприємницькою діяльністю. З 2005 по 2011 рік обіймав керівні посади в ряді миколаївських підприємств, що спеціалізуються на міжнародній інвестиційній діяльності, а в 2015-16 роках брав участь в організації роботи та керівництві аналітичним департаментом Міністерства аграрної політики України. У 2019 році, під час президентських та парламентських виборів, працював у Миколаївському обласному виборчому штабі партії "Слуга народу" і навіть планував стати депутатом Миколаївської міської ради. Але заворушення в Полтаві зламали плани політика-початківця. Коли Україна почала розвалюватися, він разом з депутатами обласної ради від "Слуги народу" намагався врятувати Миколаївську область від хаосу, що охопив всю країну, а згодом навіть був обраний головою самої обласної ради."
 POLITICS_BILETSKY_DESC:0 "Андрій Євгенійович Білецький, нащадок козацького роду, який народився 5 серпня 1979 року, за свою відносно коротку політичну та громадську кар'єру встиг стати для половини населення справжнім героєм, а для інших - абсолютним фашистом, причому ці "інші" часто звинувачували його в тому, що в майбутньому він може стати причиною катастрофи, яка спіткає Україну. З юності займався боксом, фехтуванням, ножовим боєм і практичною стрільбою, навички яких стали йому в нагоді в майбутньому. У віці 22 років він з відзнакою закінчив історичний факультет Харківського національного університету і став вчителем у харківських школах. Незважаючи на життя в зрусифікованому середовищі, мав непоганий авторитет серед українських націоналістичних організацій і навіть заснував власну, "Патріот України" (яка в майбутньому склала кістяк новоствореного "Правого сектору") і став її командиром. Під час Революції Гідності брав участь у бою на Римарській, після чого за сприяння проросійських політиків на короткий час потрапив до в'язниці. У 2014 році створив спочатку батальйон територіальної оборони, а потім полк "Азов". Після звільнення Маріуполя Збройними силами та "Азовом" здобув значну популярність і став народним депутатом. Його також часто звинувачували в неонацизмі, хоча він неодноразово заперечував приналежність до цієї ідеології, як сам, так і "Азов". Під час хаосу в Полтаві він очолював місцеві воєнізовані загони і разом з місцевими жителями штурмував адміністративні будівлі. Коли полтавські заворушення призвели до хаосу і колапсу по всій Україні, місцеві праві прихильники Білецького обрали його головою області, але ситуація не покращилася. Полтавщина не була вкрай націоналістичним регіоном, тому влада правих і згода Білецького здебільшого закінчувалася в місцевих обласних центрах, а в селах часто діяли автономні органи самоврядування, відокремлені від центрального. Винятком став Кременчук, який оголосив про своє відокремлення, що стало великим ударом по репутації Білецького. Але попри всі невдачі, праві були готові до останнього захищати "Батьківщину революції" і розширювати свій вплив по всій Україні, включно з Києвом, знищуючи уряди "зрадників і олігархів". Допомагати Білецькому в цьому мають і деякі "азовці", які під час розвалу не опинилися на передовій з сепаратистськими квазідержавами."
 POLITICS_SERGIY_KRYVONIS_DESC:0 "Сергій Григорович Кривонос народився 26 липня 1970 року в Кременчуці Полтавської області, пройшов довгу, але успішну військову кар'єру. Він служив лейтенантом у 10-й окремій бригаді, був викладачем Академії сухопутних військ імені гетьмана Сагайдачного, обіймав посаду командувача Повітряно-десантних військ України та проявив себе як компетентний та ініціативний командир під час оборони Краматорського аеропорту. За кілька місяців до президентських виборів Сергій Кривонос був призначений верховним головнокомандувачем Збройних сил України. Він ще раз проявив себе, відбивши масований наступ проросійських сепаратистів за допомогою армії, розгорнутої на Донбасі. Однак через бойові дії на сході Сергій не зміг підтримати уряд у Києві, що значною мірою сприяло втраті Зеленським влади на більшій частині території України. Зараз Кривонос опинився у скрутному становищі: зв'язок з урядом наразі повністю перерваний, тож армія на Донбасі де-факто відрізана від столиці. Більше того, невеликий рух у неправильному напрямку може призвести до повномасштабного наступу з іншого боку лінії зіткнення. Як би там не було, Збройні сили України на чолі зі своїм головнокомандувачем дадуть відсіч наступаючим східним ордам будь-якими засобами". Він був головним прихильником створення "Сил спеціальних операцій" (Сил спеціальних операцій (ССО)). За кілька місяців до президентських виборів Сергій Кривонос був призначений головнокомандувачем Збройних сил України. Він вкотре проявив себе, відбивши масований наступ проросійських сепаратистів за допомогою армії, дислокованої на Донбасі. Однак при цьому він не зміг підтримати уряд у Києві, що значною мірою сприяло тому, що Зеленський втратив владу на більшій частині території України. Зараз Кривонос опинився у скрутному становищі: зв'язок з урядом на даний момент повністю перерваний, тож армія на Донбасі фактично відрізана від столиці. Більше того, невеликий рух у неправильному напрямку може призвести до повномасштабного наступу з іншого боку лінії розмежування. Як би там не було, Збройні сили України на чолі зі своїм головнокомандувачем дадуть відсіч наступаючим східним ордам будь-якими засобами."
 POLITICS_PENIS_DUSHILIN_DESC:0 "Денис Володимирович Пушилін народився 9 травня 1981 року в Макіївці (Макіївці) Донецької області, і його життєвий шлях був досить химерним. Від солдата Національної гвардії України до промоутера відомих фінансових схем, створених сумнозвісним Сергієм Мавроді, він став заступником міністра цілої держави. Після смерті колишнього президента Донецької Народної Республіки Олександра Захарченка Денис Пушилін став новим лідером республіки. За підтримки ФСБ йому вдалося фактично встановити диктатуру, повністю перетасувавши посади у виконавчій владі ДНР. Під час початкової нестабільності в Україні його силам вдалося завдати значних втрат українській армії, не досягнувши жодного прогресу на фронті. Тим не менш, його становище є досить надійним. Він значною мірою є фігурою, тоді як реальна влада в країні належить російським олігархам, армії та російським спецслужбам і розвідці. Поки вони будуть задоволені його політичною позицією і здатністю керувати країною, влада Дениса Пушиліна буде надійною в найближчі роки."
 POLITICS_LEONID_PASECHNIK_DESC:0 "Леонід Іванович Пасічник народився 15 березня 1970 року. У молоді роки, після закінчення Донецького військового училища, працював в українських спецслужбах і був досить успішним на цій ниві. Однак, маючи певні проблеми та неприємності з "усталеною" корумпованою системою Служби безпеки та України в цілому, він подав у відставку напередодні масових заворушень в Україні у 2014 році. Того ж року він був призначений міністром державної безпеки новоствореної Луганської Народної Республіки. Після деескалації конфлікту на Донбасі між Леонідом Пасічником та Ігорем Плотницьким, тодішнім президентом республіки, спалахнув новий конфлікт. Зрештою, відбувся державний переворот, здійснений збройними силами за підтримки ДНР. Леонід Пасічник очолив тимчасовий уряд республіки, а згодом був обраний президентом за мовчазної згоди Москви. Протягом 2019 року військові "ЛНР" спільно з "ДНР" атакували позиції українських військ на Луганському фронті, але без особливого успіху."
 POLITICS_YUSHENKO_DESC:0 "Коли справи в сьогоденні йдуть на погіршення, люди неминуче намагаються звернутися до свого минулого, згадуючи старі добрі часи. Віктор Андрійович Ющенко, герой Помаранчевої революції 2004 року і третій президент України, народився в селі Хоружівка Сумської області 23 лютого 1954 року. У віці 21 року закінчив Тернопільський фінансово-економічний інститут, після чого був призваний до лав Радянської армії на рік, служив на турецькому кордоні. Після служби в армії влаштувався на роботу в регіональне відділення Держбанку СРСР, а у віці 23 років вступив до Комуністичної партії. Його кар'єра в банківській сфері продовжилася після розпаду Радянського Союзу, а особливою подією стало призначення на посаду голови Національного банку України. Під час перебування на цій посаді він успішно впровадив грошову реформу та створив Державне казначейство. За його безпосередньої участі Кабінет Міністрів та Національний банк також успішно запобігли великій фінансовій кризі. Однак його найбільшим досягненням став 2004 рік, коли після грубих порушень виборчого законодавства, які привели до перемоги Віктора Федоровича Януковича, опонента Ющенка на президентських виборах 2004 року, Ющенко під помаранчевими прапорами разом зі своєю коаліцією відмовився підкоритися сфальсифікованим результатам виборів. Зрештою, Помаранчева коаліція перемогла, але через постійні суперечки, чвари та розбіжності всередині коаліції Ющенко став фактично безсилим, особливо після формування та консолідації "кабінету міністрів Януковича", який надав Партії регіонів більшість у парламенті. Ющенко, після провалу своєї передвиборчої кампанії у 2010 році, вирішив взагалі піти з політики. Однак до повного розвалу України багато жителів міста Суми та прилеглих районів надсилали йому багато листів, в яких деякі навіть благали Ющенка стати губернатором області у важкі часи лихоліття. Незважаючи на те, що Віктор Андрійович твердо дотримувався своєї особистої позиції не лізти в політику, жителі Сум і Сумського району переконали його стати губернатором, навіть незважаючи на протест Порошенка проти рішення людей." 
 POLITICS_SMESHKO_DESC:0 "Ігор Петрович Смешко народився 17 серпня 1955 року в Черкаській області. Закінчивши середню школу, у віці 17 років вступив до Кіровського ХАМЗ, де провчився 5 років, а потім був мобілізований до частини протиповітряної оборони Радянської Армії в НДР. Через два роки демобілізувався і повернувся до аспірантури. Після відновлення незалежності України Смешко продовжив військову кар'єру як офіційний аташе в США та Швейцарії, але також встиг стати керівником розвідки і навіть очолював Службу безпеки протягом 2 років. Військова кар'єра Ігоря завершилася лише у 2005 році, коли він був звільнений зі служби. Його політичне життя розпочалося у 2009 році, коли він заснував власну політичну партію "Сила і честь". Під час Революції Гідності став на бік протестувальників, критикуючи дії "Беркуту", а після початку війни на сході України виступив проти дій Росії. У 2014 році президент Порошенко призначив його своїм радником, і він залишався на цій посаді до січня 2019 року. Того ж року він вирішив балотуватися на посаду президента України, але з великим відривом програв. Незабаром після поразки він приєднався до Порошенка в Чернігові, де його знову призначили радником. Проте незабаром його звільнили з посади і відправили до Сум, де він очолив місцеву адміністрацію."
 POLITICS_AKS_DESC:0 "Авангардне культурне товариство, або скорочено АКТ, є ультраправою громадською та воєнізованою організацією, що виникла під час громадянського хаосу 2014/15 років з невеликої групи однодумців. Їхня ідеологія базується на так званому "авангардистському способі життя" - радикальному та швидкому просуванні рішень та ідей, які мають вирішити державні, соціальні та економічні проблеми. Вони також наголошують на індивідуалізмі, пояснюючи це тим, що "людині потрібна воля для утвердження своєї внутрішньої сили, а цього можна досягти лише в умовах Дикої природи". Частково відкидаючи "систему порядку" як таку, їхні погляди межують з анархізмом, відкидаючи ідею податків і поліції, що працює в інтересах держави. Вони також пропагують критику "лівих нав'язувань" - чоловічого фемінізму, економічної залежності від глобального капіталу, ефемерного поняття "людяності", любові до "західних цінностей" і гомосексуалізму. З початком війни на Донбасі вони брали активну участь у бойових діях як окремі добровольчі бригади, що збільшило їхню популярність у суспільстві. Вони мали штаби в більшості областей України, і Суми не стали винятком. Після розпаду України "Авангард" побачив шанс реалізувати свої ідеали на практиці, швидко захопивши центр міста Суми та взявши владу у всій Сумській області."