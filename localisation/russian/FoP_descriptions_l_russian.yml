 POLITICS_VILKUL_DESC:0 "Олександр Олександрович Вілкул народився 24 травня 1974 року в Кривому Розі. Закінчив місцевий Центрально-Міський ліцей та Криворізький технічний університет, де отримав диплом гірничого інженера за спеціальністю "відкрита розробка родовищ корисних копалин". У цьому ж університеті закінчив аспірантуру. Будучи студентом, проходив практику на одному з українських гірничо-збагачувальних комбінатів, де згодом був підвищений до посади заступника генерального директора. У 2004 році він навіть став директором одного з цих комбінатів, а в 2006 році був призначений почесним директором гірничодобувного дивізіону "Метінвест Холдингу" - великої міжнародної групи гірничо-металургійних компаній, якою керують олігархи Рінат Ахметов і Вадим Новінський. У 2005 році Вілкула було обрано головою Криворізької міської організації "Партії регіонів", під егідою якої він балотувався на парламентських виборах спочатку в 2006, а потім в 2007 році і виграв місце в парламенті. З березня 2010 року по грудень 2012 року Олександр обіймав посаду голови Дніпропетровської обласної державної адміністрації, а з грудня 2012 року по січень 2014 року був віце-прем'єр-міністром України. Протягом своєї кар'єри він часто демонстрував свої проросійські погляди і навіть був помічений у спробах перешкоджати протестувальникам у Дніпрі під час Революції Гідності. У 2014 році, після повалення уряду Януковича, приєднався до новоствореного "Опозиційного блоку", від якого згодом став народним депутатом, балотувався на посаду мера Дніпра (невдало) і навіть балотувався в президенти на виборах 2019 року, отримавши підтримку всього Опозиційного блоку та голови партії "Наші" Євгена Мураєва. Незважаючи на всю піар-кампанію, йому вдалося посісти лише 8 місце, але ситуація, яка згодом виникла в Полтаві, а потім поширилася на всю Україну, змінила ситуацію.\nКоли Білоусов прийшов до влади в Дніпропетровській області, Вілкул, будучи впливовою людиною в регіоні, вирішив негласно приєднатися до нього, але після ДТП, в якому загинув Андрій Білоусов, він за підтримки відомого українського олігарха Віктора Коломойського відокремився від решти Дніпра і приготувався до оборони міста."
