 POLITICS_NEBOHA_DESC:0 "§R"Чаклун Агобен"! - так називає себе Сергій Небога, самопроголошений монах і маг, який став засновником §Церкви Сатани§! \nНародившись в Узбекистані в сім'ї військового і закінчивши в юності Красноярське військове училище, майбутній чаклун переїхав до України, де після Революції Гідності Сергій зайняв досить чітку проукраїнську позицію і отримав можливість кілька разів з'явитися на телебаченні, що дало йому достатню популярність серед громадськості, щоб оголосити про свій наступний крок - заснування релігійної громади "Божичі". Йому вдалося юридично зареєструвати її та зібрати навколо себе прихильників, а сама громада мала §Rсатанинський характер§! У 2017 році Небога заявив, що став ченцем Української автокефальної православної церкви, а після її переформатування в грудні 2018 року в Православну церкву України номінально приєднався до неї. Незважаючи на свою приналежність до церкви, він продавав магічні амулети, займався окультними практиками і навіть писав книги §Rсатанинського характеру§! де говорив про свою відданість "дияволу". \nОднак після розколу української держави навіть світ такої людини, як "монах-чарівник", перевернувся з ніг на голову. Залишившись з більшістю своїх послідовників у Кропивницькому під час захоплення регіону проросійськими "соціалістичними" силами, він разом зі своїми учнями перебрався до болота "Чорний ліс", де заснував ізольовану комуну. Здійснюючи набіги на навколишні села та містечка, Небога та його прибічники змогли викрасти зброю та боєприпаси у місцевої "міліції" та здобути неофіційний статус руху опору серед місцевих мешканців, завдяки чому до його лав поповнилися нові рекрути. Нарешті, провівши §Rнайбільший ритуал§!, Агобен закликав членів своєї громади, з вірою в допомогу §Rдиявола§!, вирізати покидьків, які захопили регіон, і почати готувати Кіровоградщину до найважливішої події в історії - пришестя §Rсатани§!"
 POLITICS_RUBAN_DESC:0 "§LВолодимир Володимирович Рубан народився 16 серпня 1967 року в Алма-Аті, Казахська РСР. Український громадський діяч, відомий як керівник штабу громадської організації "Офіцерський корпус". У 2004-2008 роках займався поліграфічною та видавничою діяльністю, створив групи підприємств, які активно просували проросійські позиції в літературній та освітній сферах. Заснував видавництво "Київська Русь", яке протягом 2008-2010 років видавало шкільні підручники та посібники, спрямовані на просування російської культури та вплив на навчальні заклади Донбасу. У 2013 році приєднався до проросійського руху Медведчука "Український вибір" і створив власну громадську організацію "Офіцерський корпус", але через деякий час конфлікт між ним і "Українським вибором" Медведчука загострився, і Рубан зареєстрував партію "Офіцерський корпус", став керівником Центру визволення полонених "Офіцерський корпус" і віце-президентом Академії національної безпеки. \З початку війни на сході України у 2014 році Рубан активно займався звільненням військовополонених із самопроголошених "ЛНР" та "ДНР", брав участь у переговорах між бойовиками та українською владою. \У лютому 2017 року разом з Надією Савченко відвідав тимчасово окуповані території ОРДЛО, порушивши порядок перетину лінії розмежування.\nРубана критикували за лояльність до терористів так званих "ДНР", "ЛНР" і "Новоросії", а також за висловлення підтримки бойовикам під час переговорів про звільнення полонених. Багато обмінів полоненими сприймалися як нерівноцінні, коли бойовиків обмінювали на представників допоміжних підрозділів, а не Збройних сил України або добровольчих батальйонів.\nПісля розпаду України став одним з головних прихильників платформи Надії Савченко. Займається поверненням та обміном військовополонених.§!"
 POLITICS_TRUHA_DESC:0 "Геннадій Леонідович Труханов народився 17 січня 1965 року в Одесі. У 1986 році закінчив Одеське вище артилерійське командне училище ім. Фрунзе у званні лейтенанта. Отримав спеціальність спеціаліста з ремонту та обслуговування артилерійського озброєння. У 1988-1982 роках служив у Північно-Кавказькому військовому окрузі, закінчив службу у званні капітана. У 1995 році навіть отримав звання президента Української федерації таїландського боксу. У 2000 році став помічником представника президента компанії з питань безпеки в представництві російської нафтової компанії "Лукойл" в Україні, що є першим задокументованим зв'язком Труханова з російським бізнесом та елітою. З 2005 року є депутатом Одеської міської ради. У 2010 році очолив фракцію Партії регіонів в Одеській міській раді. З 2012 по 2014 рік - народний депутат України від Партії регіонів. З 2015 року - міський голова Одеси. Незважаючи на обрання, багато одеситів не довіряють Труханову і вважають його відвертим російським колаборантом. Було проведено багато демонстрацій і протестів з вимогою його відставки, але він залишився на посаді. Після розпаду України і проголошення Конфедерації Труханов зберіг свій статус і владу в Одесі, незважаючи на те, що був змушений підкорятися військовій адміністрації Воронченка. Однак не всі були цим задоволені. Після повстання одеських націоналістів на чолі з Сергієм Стерненком комунікація між Одесою та іншими частинами Чорноморщини була перервана. Побоюючись, що прихильники Стерненка захоплять місто, Труханов оголосив надзвичайний стан і мобілізував місцеві підрозділи міліції, зайнявши оборонну позицію і чекаючи допомоги від Воронченка."
 POLITICS_ESDABES_DESC:0 "Сергій В'ячеславович Стерненко народився 20 березня 1995 року в селі Садове Білгород-Дністровського району Одеської області. До 2014 року Сергій займався "розкруткою" груп у соціальних мережах і намагався почати кар'єру хіп-хоп виконавця, але кінець 2013 року все змінив. Тоді Стерненко приєднався до Євромайдану в Одесі та брав участь у революційних подіях у Києві, зокрема у протистояннях на вулиці Грушевського 20 лютого 2014 року. Після створення "Правого сектору" в Одесі 5 лютого 2014 року він очолив обласний осередок 22 березня того ж року. Члени "Правого сектору" були одними з найактивніших у протистоянні, але Сергій був не лише організатором. Він особисто допомагав небайдужим громадянам у день пожежі Будинку профспілок і навіть врятував двох людей. 2 травня 2014 року брав участь у бою з проросійськими бойовиками в Одесі. Після цього був серед організаторів зриву концертів Ані Лорак та Світлани Лободи в Одесі у 2014 році, пікетування російського консульства, блокади окупованого Криму восени 2015 року, притягнення до відповідальності Ігоря Бичкова, сприяння засудженню Валентина Дубовенка та багатьох інших подій. У червні 2016 року закінчив Одеський коледж економіки, права та готельно-ресторанного бізнесу за спеціальністю "Правознавство" і активно критикував Порошенка під час його президентства, за що поплатився подальшими політичними переслідуваннями. У 2017 році він був одним з учасників кампанії проти забудови частини території Міського саду Одеси - Літнього театру, яка призвела до трьох замовних нападів, кожен з яких ледь не коштував Стерненку життя. Після кожного нападу він звертався до міліції та влади за захистом, але так і не отримав його. Під час заворушень у Полтаві Стерненко твердо став на бік протестувальників і підтримав дії "Національного корпусу", після чого став організатором мирних акцій спочатку в Києві, а потім в Одесі на підтримку полтавців, але після приходу до влади Воронченка всі подібні заходи були тимчасово заборонені, а порушники жорстоко покарані. Сергій та місцеві праві не збиралися з цим миритися. Хоча Стерненко не був членом "Правого сектору" з 2017 року через розбіжності з елітою організації, тепер ці суперечки відійшли на другий план. Добре підготувавшись, Стерненко та його прихильники розпочали повномасштабне збройне повстання проти Воронченка та його уряду, проголосивши українську національну державу."
 POLITICS_SHARIY_DESC:0 "Анатолій Анатолійович Шарій народився 20 серпня 1978 року в Києві. З 16 років займався шахрайством, за що неодноразово затримувався правоохоронцями. Військову освіту здобув в Інституті розвідки при Київському танковому інженерному училищі, яке у 1992 році було реорганізовано у Київський інститут Сухопутних військ. З 2005 року працював у сегменті жіночих таблоїдів "Наталі", "Единственная" та "Поліна". Також працював у газеті "Сегодня", підконтрольній олігарху Рінату Ахметову, відомому своїм фінансуванням проросійської партії "Опозиційний блок", кандидата від якої Шарій відкрито підтримував під час президентської кампанії 2019 року. Він співпрацював з російським проурядовим таблоїдом "Московський комсомолець", а з 2008 року є постійним автором "From-UA" та "Обозревателя". За свою кар'єру він опублікував низку розслідувань, здебільшого сфальсифікованих, таких як розслідування про "притон педофілів" у дитячому будинку. Крім того, він примудрився організувати інсценування замаху на власне життя, влаштувавши стрілянину з травматичного пістолета в київському "Макдональдсі". У 2012 році він був оголошений у всеукраїнський розшук і втік до ЄС, а точніше до Нідерландів, куди приїхав з Москви. У Нідерландах він продовжував вести власний блог протягом наступних років. Був затятим противником Майдану і всіляко відбілював Росію та її збройні сили під час війни на Донбасі. Під час виборів 2019 року він активно підтримував проросійських кандидатів, а його прихильники в Україні навіть створили Партію Шарія, але її все одно не допустили до Верховної Ради. Після фатального повстання в Полтаві та проголошення Чорноморської конфедерації Шарій вирішив повернутися в Україну. Через хаотичну ситуацію він без проблем перетнув державний кордон і опинився в Миколаївській області, де відновив свою діяльність."
 POLITICS_SAVCHENKO_DESC:0 "Надія Савченко народилася 11 травня 1981 року в Києві. За фахом - модельєр-конструктор, освіту здобула на факультеті журналістики Університету "Україна". Закінчила Харківський університет Повітряних Сил і отримала спеціальність штурмана на вертольоті Мі-24.\nПісля університету служила в різних підрозділах Збройних Сил України, брала участь у різних місіях, в тому числі в миротворчій місії в Іраку. Під час АТО, у 2014 році, брала участь у бойових діях як доброволець батальйону "Айдар".\nОднак її життя зробило несподіваний поворот, коли у 2014 році вона потрапила в полон до терористів з батальйону "Зоря". Її несправедливо звинуватили у вбивстві російських журналістів і вона опинилася в російському ув'язненні.\nСавченко привернула міжнародну увагу і підтримку. Після тривалого перебування в російській в'язниці вона була обміняна на російських солдатів і повернулася в Україну в травні 2016 року.\nПісля повернення в Україну Савченко зайнялася політикою, ставши депутатом Верховної Ради України. Вона також стала членом партії "Батьківщина". Однак згодом її стосунки з партією охололи, і вона була виключена з її фракції.\nНадія Савченко стала відомою за звинуваченням у спробі організації державного перевороту. \nГенеральний прокурор України Юрій Луценко заявив, що Савченко нібито планувала здійснити теракт у будівлі Верховної Ради і разом з іншими особами, в тому числі керівниками терористичних організацій Донецької та Луганської народних республік, планувала здійснити в Україні низку терактів і замахів на представників влади з метою насильницького повалення конституційного ладу в країні. Суд не продовжив запобіжний захід підозрюваним, і Савченко та її команда були звільнені після 13 місяців перебування в СІЗО.\nПісля провальних виборів в Україні 2019 року, які призвели до розпаду країни, Савченко поїхала на Донбас, де займалася підготовкою пілотів. Там вона змогла відновити свою репутацію і вже на регіональних виборах посісти провідне місце. Тепер надії Савченко на побудову в Україні народної диктатури можуть справдитися..."
 POLITICS_GRIGOROVICH_DESC:0 "Сергій Костянтинович Григорович народився 18 квітня 1978 року в Києві. Його батько був радіоінженером, а мати - журналісткою.\nУ п'ятому класі він взяв участь у програмі шкільного обміну та відвідав Францію, де йому відкрилися очі на красу світу за кордоном. Повернувшись в Україну, він почав перекладати та поширювати комп'ютерні ігри.\nУ 16 років Сергій заснував компанію GSC Game World і зосередився на розробці власних ігор. Його першою успішною грою стала "Козаки: Європейські війни", що вийшла у 2001 році і стала великим хітом. Пізніше, у 2007 році, він випустив S.T.A.L.K.E.R. Shadow of Chornobyl, яка також набула культового статусу.\nУ своїй кар'єрі він також брав участь у мотогонках та інших бізнес-проектах. Незважаючи на труднощі та перешкоди, він завжди залишався вірним своїм ідеям і надихав багатьох інших на досягнення у світі комп'ютерних ігор.\nРозпад України сильно вдарив по ньому. Спочатку він перебував у Дніпрі як партнер у підприємницькій діяльності, але не витримав жорстокості кримінального капіталу, тому повернувся на Київщину, де організовував зустрічі зі своїми фанатами на тему Чорнобиля та перспектив життя на аномальній території. У якийсь момент його психічний стан погіршився, і він з групою однодумців переїхав до §OЗони відчуження§!, де згодом проголосив свою конфедерацію."
 POLITICS_KRYVENKO_DESC:0 "Віктор Миколайович Кривенко - уродженець Кам'янського, народився 9 січня 1982 року. Протягом 13 років навчався у трьох українських мегаполісах, що дало йому знання у сфері фінансів та юриспруденції. Свою кар'єру Кривенко почав будувати ще студентом, працюючи помічником керівників кількох дніпровських державних підприємств, що згодом привело його до Державної аудиторської служби України, де він протягом року обіймав посаду заступника Голови. Він захоплюється історією, філософією і навіть баскетболом, і з цієї причини часто підтримує різні музеї, установи і навіть спортивні клуби. З березня 2011 року по січень 2012 року був радником генерального директора державної компанії "Укрспецекспорт", а з лютого 2012 року по січень 2013 року - радником генерального директора державного концерну "Укроборонпром". У цей же період обіймав посаду радника Міністра економічного розвитку і торгівлі України. З 2013 по 2014 рік працював радником Віце-прем'єр-міністра України, а згодом став радником Міністра фінансів. Ще у 2006 році він намагався стати народним депутатом як член партії "Віче", але не досяг успіху. Друга спроба відбулася у 2014 році, коли він приєднався до партії "Самопоміч" і набрав достатню кількість голосів. Тим не менш, через рік його виключили з партії після того, як він проголосував за закон про децентралізацію. Після цього він приєднався до ветеранської партії української політики - "Рух". За згодою з'їзду партії вступив до парламентської фракції БПП, але потім, за рішенням того ж з'їзду, вийшов з блоку і став позафракційним на знак протесту проти політики уряду. У 2017 році був обраний головою ОПУ. На президентських виборах 2019 року Віктор також вирішив спробувати щастя, але невдало. Коли Україну охопила революційна пожежа, він вирушив до рідного Кам'янського, де очолив мирний спротив владі Білоусова.\nПісля його загибелі Кривенко разом з партією "Рух" очолив місто і оголосив про створення місцевої незалежної адміністрації."
 POLITICS_DUDIN_DESC:0 "Віталій Миколайович Дудін народився 25 червня 1987 року в Києві. У 2004 році вступив до Київського національного економічного університету, який закінчив у 2009 році за спеціальністю "Правознавство". З лютого 2008 року по серпень 2010 року працював журналістом газети "Юридичний вісник України", а з вересня 2010 року по березень 2011 року - позаштатним журналістом сайту "Багнет". У той же час почав активно підтримувати соціалістичні рухи, такі як "Захист Праці" Олега Верника або окремі залізничні та шахтарські профспілки. У 2016 році став співзасновником та головою правління лівої громадської організації "Соціальний рух", яка була побудована на принципах демократичного соціалізму та антикапіталізму. Після початку полтавських протестів Дудін одразу став на бік протестувальників і навіть підтримав дії "Національного корпусу", який згодом опосередковано призвів до розколу України на окремі "держави". Перебуваючи в Києві, він стежив за ситуацією в інших регіонах країни, і особливо його цікавив Дніпро, який перебував під бандитським правлінням Андрія Білоусова. Скликавши збори "Соціального руху", одноголосно вирішили, що допомога потрібна мешканцям Нікополя - міста, яке найбільше постраждало від дій Білоусова на Дніпропетровщині. Тихо перейшовши накреслені кордони, він разом з однопартійцями почав підготовку до масових демонстрацій, але несподівана смерть Білоусова кардинально змінила ситуацію. Дніпропетровщина втратила керівника. Ніхто більше не відповідав за регіон. Запанував хаос. Бачачи це, Віталій вирішив організувати соціалістичний марш у Нікополі, який завершився промовою, в якій він оголосив про створення соціалістичної республіки в місті та його околицях, організацію тимчасового уряду та початок війни проти бандитів та олігархів, які захопили сусідні міста та регіони."
