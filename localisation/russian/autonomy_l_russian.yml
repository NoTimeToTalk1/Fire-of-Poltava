 COLONIAL_FORCES_GENERAL_DESCRIPTION:2 "§GНатисніть, щоб переглянути шаблони суб'єктів та урядів у вигнанні§!\n\nПідрозділи, створені за колоніальними шаблонами, можуть включати більше особового складу з колонії, якщо автономія колонії буде знижена."
 COLONIAL_FORCES_NO_SUBJECTS:2 "§RУ нас немає підданих чи урядів у вигнанні, з яких ми могли робити дивізії§!"
 FOREIGN_TEMPLATE_DESC:1 "Цей шаблон дивізії $COUNTRY_ADJ|H$, і вони наш суб'єкт. Ми можемо скопіювати цей шаблон і створити колоніальні сили на базі цього. Колоніальні сили беруть людські ресурси з суб'єкту на рівні їхнього статусу автономії."
 COLONIAL_TEMPLATE_DESC:1 "Цей колоніальний шаблон країни $COUNTRY_DEF|H$. Колоніальні сили використовують людські ресурси на рівні їхнього статусу автономії."
 FOREIGN_EXILE_TEMPLATE_DESC:0 "Цей шаблон країни $COUNTRY_ADJ|H$, і ми надаємо їхньому уряду в вигнанні право знаходиться на нашій території. Ми можемо скопіювати цей шаблон щоб створити армію в вигнанні на її базі. Військові сили у вигнанні черпають людські ресурси з уряду в вигнанні."
 EXILE_TEMPLATE_DESC:0 "Цей шаблон у вигнанні країни $COUNTRY_DEF|H$. Сили у вигнанні черпають людські ресурси з уряду у вигнанні."
