l_russian: 
azov_cum_into_power:0 "§OНезламні, Непереможні, Нестримні!§!"

AFU_old_slavic_traditions:0 "Старі Слов'янські Традиції"
AFU_old_slavic_traditions_desc:0 "Хоча істинні традиції наших гордих предків здебільшого забуті або замінені православним богохульством, надія все ще є. Відтепер ми станемо на шлях повного відродження язичницьких традицій та обрядів нашої прадавньої землі, незалежно від того, скільки часу нам знадобиться для того, щоб вони стали реальністю для населення."
afu_secureourposition:0 "Захистити Нашу Позицію"
afu_secureourposition_desc:0 "Встановивши власний контроль над Донбасом, ми мимоволі спровокували адміністративну кризу. Люди, які не мають ні віри, ні лояльності до нас, досі сидять не тільки в міських і сільських радах, а й у вищих державних установах, і ми не можемо залишити цю ситуацію в такому стані. Ми повинні зміцнювати свої позиції, де тільки можемо, щоб забезпечити стабільність влади, яка принесе мир і славу Україні."
afu_ruleofthefarright:0 "Правління Ультраправих"
afu_ruleofthefarright_desc:0 "Так звані "демократичні вибори" стали новим поживним середовищем для корупції та зради, проти яких ми боролися всі ці роки, але, як бачимо, немає жодних ознак результату. Кандидати, куплені місцевими олігархами, зруйнували б все, що ми, українська армія, так важко працювали, щоб відновити після сепаратистського правління в регіоні. Це стало останньою краплею. Ми втомилися спостерігати за безглуздим замкненим колом, в якому вірні сини України гинуть за майбутнє своєї країни та народу, а політики на їхніх тілах повертають старий порядок. Настав час зробити це самим!"
afu_bolsterourranks:0 "Поповнюємо Наші Ряди"
afu_bolsterourranks_desc:0 "У нашій ситуації ми можемо розраховувати тільки на себе. Проблема лише в одному - нас недостатньо. "Азов", безперечно, славний і численний полк, але, незважаючи на це, нас все одно недостатньо. Для підтримки порядку і стабільності, а також для забезпечення держави більш елітними силами, ми розпочинаємо нову призовну кампанію, щоб набрати дійсно відданих, сильних духом і тілом призовників, які допоможуть нам возз'єднати наш народ і країну."
afu_upholdthevictoriousspirit:0 "Підтримуємо Переможний Рух"
afu_upholdthevictoriousspirit_desc:0 "Ми перемогли! Навіть не віриться, що ми це зробили! Бачачи катастрофу, яка б настала, у випадку продовження "виборів", ми вирішили не чекати осторонь, спостерігаючи, як те, за що ми так важко боролися, повертається і забирає життя найкращих з нас, а взяти все в свої руки. І це було єдине правильне рішення. Наша перемога тут показала, що нас неможливо перемогти. Будь-які спроби наших ворогів будуть марними, бо ми маємо беззаперечну віру в успіх наших дій та ідей відтепер і назавжди!"
afu_destroythesovietheritage:0 "Знищити Спадок Совку"
afu_destroythesovietheritage_desc:0 "Пострадянськість - головне підґрунтя, на якому базувалися і досі базуються ворожі наративи про "єдиний народ" і "російський Донбас". Саме ігнорування цього фактору призвело до всіх лих, які пережила наша країна після відновлення незалежності, і настав час покласти цьому край. Занадто багато української крові вже пролилося через цю нісенітницю, і ми не маємо права повторювати помилки наших попередників."
afu_reshapingthementality:0 "Переформатування Ментальності"
afu_reshapingthementality_desc:0 "Єдиний спосіб повністю завершити декомунізацію та десовєтизацію - це сформувати нове українське покоління. Перебуваючи майже століття під російським та радянським впливом, більшість місцевих жителів забули, ким вони є насправді, ставши типовими "homo sovieticus". Не замінивши місцеву навчальну програму на українську в усіх аспектах, ми одночасно запустимо нову хвилю боротьби з тоталітарним окупаційним минулим і поховаємо його."
afu_beheadthehydra:0 "Обезголовити Гідру"
afu_beheadthehydra_desc:0 "Хоча ми і військові, не вся армія на нашому боці. До Збройних Сил набирали не за поглядами, а за вміннями чи наполегливістю, що також призвело до того, що в українську армію потрапили ліві та ліберально налаштовані особи. І саме ці елементи зараз стають п'ятою колоною в нашому тилу. На їхню думку, ми - узурпатори, радикали, які хочуть правити залізною рукою і не знають ні милосердя, ні свободи. Вони зараз є нашим головним внутрішнім ворогом, і нам потрібно їх позбутися, інакше Збройним силам прийде кінець."
afu_freedonbas:0 ""Вільний Донбас""
afu_freedonbas_desc:0 "Телебачення - потужна річ. За допомогою своїх телеканалів олігархи та російські маріонетки роками годують населення своїми безглуздими казками, але, як кажуть, "брехня, повторена тисячу разів, стає правдою". Щоб доносити до громадян правду, а не брехню, яка вигідна місцевим бандитам, нам потрібно створити державне телебачення. Це гарантовано збільшить нашу підтримку і зменшить вплив різного роду проплачених гівнюків."
afu_calltobattlethemostreliableones:0 "Заклик До Бою Найбільш Відданих"
afu_calltobattlethemostreliableones_desc:0 "Деді На Фронт Воювати"
afu_holdthebannerhigh:0 "Тримаємо Штандарт Високо"
afu_holdthebannerhigh_desc:0 "Як провідники правих націоналістичних ідей, ми де-факто є вигнанцями серед усіх інших, для яких наші погляди є далекими, застарілими або навіть ворожими. Але незважаючи на це, ми не маємо права опускати руки і відмовлятися від людей, які нас потребують. Навіть якби ми були зовсім самотні у своїй боротьбі, ми не посміли б опустити наші знамена, не посміли б перестати співати марші наших славних предків, але найголовніше - ми не посміли б скласти зброю перед обличчям ворога!"
AFU_nationalist_kharkiv:0 "Націоналістичний Харків"
AFU_nationalist_kharkiv_desc:0 "Круто"
AFU_march_on_the_kharkiv:0 "Марш На Харків"
AFU_march_on_the_kharkiv_desc:0 "Харків - місто корупції, грошей. Місто олігархів та їхніх маріонеток. Вони нам не брати, і ми повинні очистити місто від гнилі. Ми стягуємо війська до Харкова, починаємо розробку плану!"
AFU_azov_above_all:0 "Азов Понад Все"
AFU_azov_above_all_desc:0 "аZOVу SлаVа"
AFU_negotatiations_with_ideological_brothers:0 "Переговори З Братами По Ідеології"
AFU_negotatiations_with_ideological_brothers_desc:0 "Тут поки немає фанфіку аZOVу з Білецьким, чекайте далі"
AFU_fractricidal_war:0 "Фракційна війна"
AFU_fractricidal_war_desc:0 "1"
AFU_successful_unification:0 "Успішне Об'єднання"
AFU_successful_unification_desc:0 "Перемога Трапилася ТУТ"
AFU_invite_local_loyalists_to_azov:0 "Покликати Локальних Лоялистів До Азову"
AFU_invite_local_loyalists_to_azov_desc:0 "Фрайкорп створений у липні 2017 року Григорієм Тарасенком. Вони відбулися в зоні проведення антитерористичної операції в Донецькій області. Але зараз українські патріоти перебувають у тіні поліцейської держави. Нам потрібно з ними зв'язатися. Фрайкорп може допомогти нам у майбутньому звільненні Харкова."
AFU_infrastructural_raids:0 "Рейди По Інфраструктурі"
AFU_infrastructural_raids_desc:0 "Харківська область - один з найбільш індустріально розвинених регіонів країни. Наші вороги можуть використати свій смертоносний потенціал у майбутньому проти нас, ми повинні паралізувати їх дуже швидко. Інакше війна з Харковом закінчиться для нас не дуже добре."
AFU_form_the_future_military_administration:0 "Зформувати Майбутню Військову Адміністрацію"
AFU_form_the_future_military_administration_desc:0 "Харкову потрібна сила, яка зможе розібратися з усіма лицемірами в області. Наші старі та надійні друзі з Фрайкорп допоможуть нам встановити новий порядок в регіоні."
AFU_blow_up_their_railways:0 "Підірвати Їхні Залізні Дороги"
AFU_blow_up_their_railways_desc:0 "Не забувайте про залізничні вузли. Логістика ворога має бути знищена. Ми повинні підготувати наше вторгнення до найдрібніших деталей."
AFU_crushing_blow:0 "Руйнівний Удар"
AFU_crushing_blow_desc:0 "Ми готові до першого бою. І золотий стяг "Азову" незабаром замайорить у Харкові. Східна Україна стане нашим бастіоном нового порядку, порядку, який розчавить всіх наших ворогів в нашій країні і в усьому світі. Україна чекає на нас!"
afu_consolidateourposition:0 "Консолідація Нашої Позиції"
afu_consolidateourposition_desc:0 "Закріпивши свої позиції в армії, адміністративних структурах, на телебаченні, а головне - в серцях людей, нас вже ніщо не зможе зупинити. Люди вірять в нас, в правильність наших ідей, а ми, в свою чергу, віримо в них, в їх безмежну мужність і відданість. Разом ми - непереможний двигун змін, який гарантовано приведе наш народ і країну до великих звершень у майбутньому."
AFU_zrodylysmyvelykoihodyny:0 "Зродились Ми Великої Години"
AFU_zrodylysmyvelykoihodyny_desc:0 "Здається, наші генерали забагато граються в політику в нашій маленькій країні, коли у нас так багато роботи. Ситуація на нашій землі також критична. Тому ми беремо ситуацію під свій контроль. Наші хлопці не дозволять перетворити державу на поле політичних інтриг. Ми живемо і боремося за український народ, боремося за існування нашої нації."
AFU_forthenationalukraine:0 "За Національну Україну..."
AFU_forthenationalukraine_desc:0 "Наша велика боротьба триває. \nАзов взяв владу в державі, і тепер нам потрібно окреслити нашу подальшу боротьбу. \nПравильно, ми повинні навести порядок на Батьківщині. Воскресіння України - наша головна мета. Мрії Мельника, Бандери і Донцова стануть реальністю. Ми будемо боротися за своє місце під сонцем до самої смерті."
AFU_andwhiteeuropa:0 "...І Білу Європу"
AFU_andwhiteeuropa_desc:0 "Але... Ми повинні йти до більшої мети. Звичайно, серед гнилі європейського суспільства живуть люди, які розуміють нас і наші ідеали. Наша боротьба з ліволіберальною наволоччю продовжиться і в інших європейських країнах. Дегенеративна епоха пацифізму нарешті закінчилася. Біла Європа від Лісабону до Уралу - наш найкращий варіант."
AFU_connection_with_ultras:0 "Зв'язки З Ультрас"
AFU_connection_with_ultras_desc:0 "Футбольні фанати, яких також називають "ультрас", дуже войовничі та віддані своїй справі люди. Вони можуть боротися за свою країну так само віддано, як і за свої футбольні клуби в бійках ультрас. Серед них багато людей з ультраправими політичними поглядами, і багато з них воювали проти Росії в 2014 році. Ми могли б зв'язатися з ними і переконати їх приєднатися до лав "Азова"."
AFU_the_russian_question:0 "російське Питання"
AFU_the_russian_question_desc:0 "Російська Федерація розпочала війну у 2014 році та окупувала Крим і Донбас. Але наша війна тривала 300 років, починаючи з часів Гетьманщини, коли козаки повернули зброю проти московських царів.\nСьогодні Росія - це мультикультурна неорадянська імперія, Путін мріє відновити порядок на пострадянському просторі та знищити нас як державу і націю. Але деякі люди з Росії можуть нам допомогти. Багато правих воювали за Україну. Імперія Путіна є їхнім ідеологічним ворогом. Ми повинні вирішити російське питання прямо зараз."
AFU_luhansk_conference:0 "Луганська Конференція"
AFU_luhansk_conference_desc:0 "Слов'яни - білі воїни Європи. Ми допоможемо російським правим організаціям звільнити свою Батьківщину від неорадянської окупації, яка триває вже 100 років. Ми запрошуємо російських ультраправих до Луганська для обговорення майбутніх планів співпраці у всіх сферах. Вони отримають дім... Дуже скоро."
AFU_farright_european_fighters:0 "Ультраправі Європейські Бойовики"
AFU_farright_european_fighters_desc:0 "Бійці. Нам потрібна допомога всієї Європи. Від польської "Свободи і порядку", німецької Націонал-демократичної партії, французького "Національного фронту", грецької "Золотої зорі" та інших наших європейських друзів, які разом з нами боротимуться за сміливий новий світ. Настав час забути і пробачити наші спільні образи в минулому, тільки в єдності наша сила. Битва за Європу триває. Ми переможемо зараз або ніколи."
AFU_our_brothers_from_the_new_world:0 "Наші Брати З Нового Світу"
AFU_our_brothers_from_the_new_world_desc:0 "Наші товариші з численних знищених ЦРУ організацій можуть знайти свій дім у новій правій Україні. Вони боротимуться за майбутнє нашої і своєї батьківщини та за білу расу.\nБитва білих людей проти азіатських необільшовиків на Сході триватиме до повного знищення монгольської орди. Після цього ми допоможемо їм встановити біле правління на американському континенті, бо біла гордість - всесвітня.\nНам потрібно лише раз і назавжди засвоїти для себе одне правило: Або ми, або вони."
AFU_last_fight_against_globalists:0 "Останній Бій Проти Глобалістів"
AFU_last_fight_against_globalists_desc:0 "Україна - новий бастіон світового порядку. Біла революція почнеться в серці Європи. \nАле ми повинні йти вперед. Попереду ще багато роботи.\nМи вдаримо першими. Зараз або ніколи."
AFU_the_white_revolution_will_start_here:0 "Біла Революція Почнеться Тут"
AFU_the_white_revolution_will_start_here_desc:0 "Це Трапиться ТУТ\nЯк би цинічно це не звучало, але розвал України допомагає нам реалізувати наші плани вже зараз. Коли всі ультраправі організації Європи та Америки не можуть нічого вдіяти зі своїми євромарксистськими виродками в Берліні, Парижі та Лондоні, ми зі зброєю в руках звільняємо свою Батьківщину. Всі ліво-ліберали відповідатимуть перед європейськими націями за їх розкладання зсередини \nНаш меч справедливості зараз піднятий над Україною. І він буде піднятий над Європою. Дуже скоро."
AFU_we_have_no_busineness_with_mongoloids:0 "У Нас Не Має Справ З Монголоїдами"
AFU_we_have_no_busineness_with_mongoloids_desc:0 "Російська наволоч буде нашим ворогом назавжди. Наша боротьба з ордою триватиме до повного знищення їхньої "культури" та "народу" на європейському континенті. Ми помстимося їм за приниження нашої нації.\nНаш обов'язок - вигнати їх за Урал. І пам'ятайте, хороший москаль - це тільки мертвий москаль.\nАбо ми їм, або вони нам."
AFU_invite_russian_farrights:0 "Запросити російських Ультраправих"
AFU_invite_russian_farrights_desc:0 "Ласкаво просимо до Української Держави!\nЗапрошуємо нашого російського брата до нашої країни для боротьби з ворогами білої Європи. Всі вони будуть вишколені нашими найкращими офіцерами в таборах. В майбутньому ми повинні сформувати нові полки з росіян і білорусів у нашій армії. "
AFU_for_freedom_of_ours_and_yours:0 "За Свободу Нашу І Вашу"
AFU_for_freedom_of_ours_and_yours_desc:0 "Коли Україна повстане з попелу... Ми з друзями з Російського добровольчого корпусу плануємо щось масштабне. На карті світу з'явиться нова російська держава. Ми в цьому впевнені."
AFU_itsnotaboutviews:0 "Справа Не У Поглядах."
AFU_itsnotaboutviews_desc:0 "Нас не цікавлять їхні політичні погляди. Вони марні в нашій ситуації і не варті нашої уваги. \nВони занадто наївні і мислять як діти, немає більше ніякого "слов'янського братства". \nУкраїнці досягнуть своїх цілей самостійно, білі люди не потребують допомоги монголоїдів."
AFU_remember_the_words_of_ideologues:0 "Пам'ятайте Слова Ідеологів"
AFU_remember_the_words_of_ideologues_desc:0 "Ми будемо слідувати заповітам наших героїв української нації. \Вони були праві, і ми будемо продовжувати слідувати їхнім ідеям.\nРосіянин або, простіше кажучи, москалі чи московити, незалежно від того, ким він є ідеологічно, не може жити без брехні. Брехня - це універсальний інструмент москалів для поневолення інших народів Європи.\nТільки українська нація може впоратися з цією чумою!"
AFU_azov_youth:0 "Азовська Молодь"
AFU_azov_youth_desc:0 "Йдучи вперед з непохитною рішучістю, наша молодь уособлює дух стійкості та мужності, якого потребує наша нація. Їх відданість справі є рішучою, а пристрасть заразливою, запалюючи іскру національної гордості у всіх, хто йде за ними. Своєю безмежною енергією та ентузіазмом вони вдихають нове життя в наш рух, оживляючи дух тих, хто їх оточує. Їхня єдність є свідченням сили наших ідеалів, а їхня відданість справі є джерелом натхнення для всіх, хто прагне кращого майбутнього."
AFU_propaganda_in_shools:0 "Пропаганда В Школах"
AFU_propaganda_in_shools_desc:0 "Наші діти повинні більше цікавитися історією, фізкультурою та військовою справою. Запросимо до школи офіцерів та наших бійців з "Азову". Сподіваємося, дітям буде цікаво поспілкуватися з воїнами і надихнути їх наслідувати ідеї нової української людини, яка захищає рідну землю зі зброєю в руках."
AFU_special_summer_military_camps:0 "Спеціальні Літні Військові Табори"
AFU_special_summer_military_camps_desc:0 "Запрошуйте молодь до спеціальних таборів влітку. Це буде чудово, ми їм це обіцяємо! \nВиділити ресурси на будівництво кількох таборів на відкритому повітрі біля лісу. Але діти повинні розуміти, що це не вечірка чи гра. Вони проведуть тиждень або більше у складних ситуаціях, де їм потрібно співпрацювати, щоб вижити.\nЦе початок їхнього нового жорстокого життя в новій країні. Дисципліна і спорт - найважливіші речі в цих таборах."
AFU_second_national_mobilization:0 "Друга Національна Мобілізація"
AFU_second_national_mobilization_desc:0 "Наша головна мета залишається незмінною - відновлення єдності української держави. Збройні сили України, безперечно, є найсильнішою силою в регіоні, але навіть славна українська армія не може рухатися вперед без резервів та підкріплень. Оголосивши другу хвилю мобілізації, ми зможемо забезпечити армію новими солдатами, як кадровими, так і резервними, що ще більше посилить нашу боєздатність."
AFU_rump_up_the_military_industrial_complex:0 "Підняти Військово-Промисловий комплекс"
AFU_rump_up_the_military_industrial_complex_desc:0 "Будь-який цех може стати маленьким заводом військової техніки. Будь-який занедбаний завод на Донбасі може відновити роботу дуже скоро, якщо ми докладемо трохи зусиль. Нам потрібно більше зброї для нашої армії і перетворення цивільних угруповань на військові вже зараз.\nМи повинні повторити досвід японського розгону промисловості у Другій світовій війні."
AFU_all_men_are_warriors:0 "Кожен Чоловік Є Борцем"
AFU_all_men_are_warriors_desc:0 "Важкі часи народжують сильних людей. У бою народ перетворюється на сталеву націю.  І зараз ми бачимо, скільки чоловіків різного віку хочуть захищати свої домівки.\nХто хоче жити, той повинен боротися, а хто в цьому світі вічної боротьби не хоче брати участь у боротьбі, той не заслуговує права на життя.\nБо плач ще нікому не дав свободи, а хто борець, той завойовує світ."
AFU_od_syanu_po_kavkas:0 "Від Сяну По Кавказ"
AFU_od_syanu_po_kavkas_desc:0 "Ми готували людей до нових складних ситуацій у цей найтемніший для нашої держави час. Неважливо, хто ти - студент, продавець на ринку, робітник на заводі чи 60-річний дідусь.\nМи всі готові померти за Україну, і вже зовсім скоро наші нові покоління українців за 10-15 років побачать, що наша праця не була марною...\nСлава всім героям, які борються зараз за визволення України, і вічна пам'ять усім, хто загинув за Українську державу, Ми помстимося за вас, воїни!"
AFU_novi_lad:0 "Новий Лад"
AFU_novi_lad_desc:0 "Нинішня система і спосіб життя прогнили наскрізь. Століттями наше суспільство споювали ворожою пропагандою, індоктринували своїми поглядами та ідеями, робили все, щоб перетворити нашу націю на попіл, перетворивши її на копію своїх огидних асиміляторів. Цьому порядку прийшов кінець, і ми будемо нести зміни всюди, де вони потрібні!"
AFU_question_of_religion:0 "Питання Релігії"
AFU_question_of_religion_desc:0 "Хоча населення наших територій, очевидно, є вірним православній вірі, багато хто з наших рядів, з тих чи інших причин, протягом свого життя прийняв язичницький світогляд. Ми повинні якнайшвидше вирішити питання про те, яку релігію офіційно прийняти, якщо ми хочемо бачити нашу Націю переможною і об'єднаною!"
AFU_new_pagan_dawn:0 "Новий Язичницький Підйом"
AFU_new_pagan_dawn_desc:0 "Час прийшов, слов'яни! Настав наш історичний момент, коли ми можемо нарешті повернути наш народ до свого коріння, до своїх традицій! З благословенням Перуна ми вистоїмо і процвітатимемо!"
AFU_start_the_paganisation:0 "Початок Язичництва"
AFU_start_the_paganisation_desc:0 "Хоча "перевиховати" всю націю відповідно до наших релігійних переконань буде нелегким завданням, масована пропагандистська кампанія стала б гарним початком довгого процесу дехристиянізації та деблюзнізації України. Від телевізійних кампаній до білбордів на автошляхах - все повинно демонструвати силу і правду Перуна і Сварога!"
AFU_not_churches_but_temples:0 "Не Церкви, а Храми"
AFU_not_churches_but_temples_desc:0 "Сотні церков стоять по всій нашій землі, і природно, що тільки від нас залежить, щоб вони нарешті були покинуті і юдео-християни в страху розбігалися в різні боки! Крім того, оскільки вільне місце не повинно пропадати даремно, ми виділимо значну частину нашого бюджету на будівництво нових традиційних язичницьких храмів на їхньому місці"
AFU_the_religion_of_the_warriors:0 "Релігія Воїнів"
AFU_the_religion_of_the_warriors_desc:0 "Від початку історії язичницькі воїни завжди виявлялися найсильнішими та найвідважнішими. Від вікінгів на півночі до слов'янських воїнів тут - війна завжди була в язичницькій крові, і завжди була справою, в якій чоловік був найкращим. Тепер, коли традиції та культура наших предків відроджуються, настав час перейняти їхній неперевершений бойовий дух та нестримну жагу до війни!"
AFU_the_only_true_religion:0 "Одна Єдина Релігія"
AFU_the_only_true_religion_desc:0 "Було б пекельною пародією відкинути не тільки релігію майже всіх, хто проживає в межах наших кордонів, але й релігію, на якій була побудована Україна як нація! Слава Ісусу Христу, нехай Він веде нас до перемоги!"
AFU_destroy_the_satanic_muscovite_church:0 "Знищити Сатанинську Московську Церкву"
AFU_destroy_the_satanic_muscovite_church_desc:0 "Православна Церква "Московського Патріархату", яка заполонила нашу землю і серця наших людей, вже давно втратила будь-який фактичний зв'язок з Ісусом Христом і Його вченням. Їхні священики - злочинці та олігархи, а їхні проповіді - ніщо інше, як кремлівські пропагандистські промови. Тільки ми можемо раз і назавжди вкинути цю сатанинську мерзоту в озеро вогняне"
AFU_integrate_the_church_into_the_state:0 "Інтегрувати Церкву В Державу"
AFU_integrate_the_church_into_the_state_desc:0 "Безконтрольний вплив Православної Церкви може призвести до падіння нашого правління, і саме тому ми повинні обмежити їхню владу та інтегрувати їх безпосередньо в державний апарат, передавши нам повноваження над їхніми коштами, утримання храмів та політичну присутність."
AFU_huge_influence_of_the_church:0 "Величезний Вплив Церкви"
AFU_huge_influence_of_the_church_desc:0 "Хоча це, безумовно, зашкодило б нашим політичним позиціям, якби Церква втручалася в наші внутрішні справи, як би вони того не хотіли, було вирішено, що це значно допомогло б забезпечити нашу популярність серед релігійного населення нашої землі, а також заспокоїло б впливове духовенство."
AFU_in_the_name_of_the_father_and_son_and_holy_spirit:0 "В Ім'я Отця І Сина І Святого Духа"
AFU_in_the_name_of_the_father_and_son_and_holy_spirit_desc:0 "1"
AFU_christianity_for_warriors:0 "Християнство Воїнів"
AFU_christianity_for_warriors_desc:0 "1"
AFU_v_idei_natsia_mitsna:0 "В Ідеї Нація Міцна"
AFU_v_idei_natsia_mitsna_desc:0 "Ідея сучасного українського націоналізму - це саме те, що допоможе нам врятувати нашу націю від її одвічних ворогів. Докорінна трансформація суспільних норм на ті, що завжди були рідними для українців, повернення того, чого нас позбавили колонізатори, зараз є першочерговим завданням українського націоналістичного руху!"
AFU_there_is_no_place_for_liberals:0 "Тут Немає Місця Для Лібералів"
AFU_there_is_no_place_for_liberals_desc:0 "Всі минулі роки незалежності України, як і новітня політична історія більшості європейських та інших країн, довели, що лібералізм є чи не найбільшим шкідником для будь-якого політичного утворення. Їхні так звані "цінності" лише загрожують багатовіковим традиціям і національній свідомості кожної сім'ї та нації на планеті, і ми не можемо допустити, щоб такий гнійник знову виріс на нашій землі."
AFU_ban_the_lgbt_rework:0 "Заборонити ЛГБТ"
AFU_ban_the_lgbt_rework_desc:0 "Представники так званої "ЛГБТ-спільноти", або як ми їх називаємо в народі - підараси, почали з'являтися в Україні, коли наша Батьківщина почала наближатися до "провідних центрів західної цивілізації", і незабаром вони захопили частину медіа-простору, почали створювати власні організації і навіть вимагати додаткових прав. Це абсолютно неприйнятно. Вони ніколи не належали до нашого суспільства і ніколи не належатимуть. Вони не є українцями, а якщо кажуть, що це не так, то брешуть, і їх тут ніхто не чекає."
AFU_take_a_pro_life_stance:0 "Стати Проти Системи Абортів"
AFU_take_a_pro_life_stance_desc:0 "Аборт - це сатанинський і антинаціональний акт. Ця, назвемо її "традиція", прийшла до нас з "надзвичайно розвинених країн", де нібито морально вбивати дітей через те, що їхня мати або передумала мати дитину, або була надто дурна, щоб її зачати. Аборт - це справжній злочин проти людяності, на який здатні лише прихильники справжнього зла і вороги народу."
AFU_womansroleinthesociety:0 "Роль Жінки В Суспільстві"
AFU_womansroleinthesociety_desc:0 "1"
AFU_stimulate_the_birthrate:0 "Стимулювання Народжуваності"
AFU_stimulate_the_birthrate_desc:0 "З моменту окупації українських земель більшовицькими загарбниками кількість українців постійно регулювалася різними актами геноциду, і, нарешті, після здобуття незалежності Україна залишилася з тими ж 40 мільйонами, що й майже понад 70 років тому. Імміграційні кризи, війна з сепаратистами та багато іншого призвели до подальшого скорочення населення України, і саме від нас залежить зробити все можливе, щоб почати відновлювати все те, що ми втратили за ці десятиліття."
