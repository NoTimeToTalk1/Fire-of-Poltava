AFU_azov_huge_resistance_desc:0 "Після приходу до влади ультраправих багато жителів Донбасу не визнали нову владу. Їхній протест виражався по-різному: від втечі до Росії до саботажу вцілілої інфраструктури та промисловості. Уряду Азова доведеться зробити все можливе, щоб приборкати людей."
AFU_azov_keeping_up_morale:0 "Підтримувати Бойовий Дух"
AFU_azov_keeping_up_morale_desc:0 "У часи випробувань і негараздів підтримка високого морального духу має важливе значення для людей і громад, щоб успішно жити і долати перешкоди. Моральний дух - це ментальний та емоційний стан благополуччя та ентузіазму, який впливає на ставлення людини, її рішучість та стійкість. На долю українського народу випало багато горя і страждань. Багато імперій витирали об українців чоботи, забирали український хліб, вбивали інтелектуалів та яскравих особистостей. Але це все в минулому... Українці більше не будуть терпіти ярмо на своїй шиї. Армія "Азов" готується до свого вирішального ривка, щоб нарешті звільнити Україну від ворогів, олігархів, лібералів та іншого непотребу. "
AFU_azov_freedonbass:0 ""Вільний Донбас""
AFU_azov_freedonbass_desc:0 "Для захисту своїх позицій азовська влада організувала радіо і телеканал "Вільний Донбас" з метою ідеологічної обробки та промивання мізків населення."
