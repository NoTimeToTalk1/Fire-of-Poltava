azov.6.d:0 "На нашій території проживає багато ромських сімей. Вони трохи не вписуються в нашу політику. Тому з ними треба щось робити."
azov.6.a:0 "Вони будуть платити"
azov.6.b:0 "У нас немає ніяких діалогів"
azov.7.t:0 "Інтеграція Церкви"
azov.7.d:0 "Після останніх реформ наша країна змінилася. Збільшення фінансування церков дозволило поширити церковний вплив, віруючі стали призначатися на державні посади. Все це дозволило церкві впливати на державу. Одним з перших рішень було створення хрестоносців - церковного військового підрозділу.\n\nСвященик Данило готувався до інавгурації першого такого підрозділу. Завданням о. Данила було прочитати молитву, поблагословити воїнів та прийняти від них церковну присягу. Наприкінці всієї процедури солдати вигукнули: "Слава Ісусу Христу! Слава Україні! Слава Нації! Смерть ворогам!""
azov.7.a:0 "Амінь!"
azov.8.t:0 "Дитячий табір "Азовець""
azov.8.d:0 "Спочатку батьки Максима мали великі сумніви щодо того, чи дозволяти йому їхати до нових дитячих таборів за державною програмою, чи ні. Деякі опозиціонери навіть порівнювали ці табори з Гітлерюгендом. Але, подолавши сумніви, батьки вирішили спробувати. Вони думали, що це лише на одне літо. Максиму сподобався табір, прогулянки на свіжому повітрі, розповіді біля вогнища про героїв української нації та подвиги козацтва, відчуття єдності з державою.\n\nНаприкінці літа всі учасники табору "Азовець" пройшли парадом по головній вулиці Краматорська. Максиму сподобалося відчуття власної значущості та те, що люди аплодували йому і всім іншим дітям. Коли Максим повернувся додому, він розповів нам про все цікаве, що дізнався в таборі.\n\nПісля цього його батьки більше не хвилювалися і домовилися, що наступного літа він знову поїде в це чудове місце."
azov.8.a:0 "Ок."
azov.9.t:0 "Луганська Конференція"
azov.9.d:0 "У мерії Луганська відбувалася нарада, на яку були запрошені представники "Азову" та російських ультраправих сил. Навколо мерії була посилена охорона, щоб ніхто не заважав учасникам під час переговорів.\nЗ боку "Азову" були присутні Максим Жорін, Денис "Редіс" Прокопенко, Сергій "Волинь" Волинський, Святослав "Калина" Паламар і Давид "Хімік" Касаткін.\n\nЗ російської сторони - Денис "White Rex" Нікітін, Ілля Богданов і Денис "Вихорєв" Тюхін.\n\nВони почали з того, що потиснули один одному руки. Вони мали досить дружній характер, з надією, що конференція матиме позитивну перспективу для обох сторін.\nОсновними питаннями були роль українських та російських бійців у досягненні своїх цілей і те, як вони можуть допомогти один одному. Азов хоче об'єднати Україну, в той час як росіяни хочуть звільнити Росію від злого необільшовицько-олегархічного режиму.\nПісля близько двох годин дискусій, кожна сторона мала приємний вираз на обличчі. Обидві сторони будуть співпрацювати. Місія "Азова" була поставлена на перше місце, і після її завершення "Азов" допоможе росіянам у їхніх планах. Для організації російських ультраправих вирішили створити для них полк - Російський добровольчий корпус."
azov.9.a:0 "Початок нового союзу..."
azov.10.t:0 "Пісня"
azov.10.d:0 "Вони можуть ридати, коли тварину б'є злий і варварський сусід,\n\nАле ми не побачимо, як справжні сльози будуть пролиті ними від нелюдського винищення чужих людей.\nВулицями України їздять танки, а ми,\nВсе ще віримо в агонію імперії. Але на сході мрії про свободу недовгі,\nІ там жорстокий кінець свободи.\n "Як засудити чи підтримати це повстання, цей бунт?!"\nДипломати сивіють від турбот під.\n "Нація загине? Не біда, мир з Росією - обов'язково!"\n "За мир все окупиться!"\nНа полях України Каїн має гостру зброю,\nАвель зрозумів, яка його доля і чекає.\nАле тільки коли до голови приставляють зброю,\nпорушуються права людини?"\nЧому ж Бог над Україною вдає, що спить,\nХоч плач Йова оточує Його? \nМоже, в один прекрасний день на небесах\nВ двері подзвонить армія,\nОдягнена в російську форму.\nБілі ангели захлинуться чорною кров'ю.\n\nТак легко вбивати невинних.\nІ кричати від страху, вже не буде кому.\nВідьма відроджується,\nВідьма відроджується,"
azov.10.a:0 "Відьма Росія відроджується!"
azov.11.t:0 "Об'єднання Південної України"
azov.11.d:0 "Сьогодні було підтверджено, що Українські сили самооборони знищили останнього кандидата на об'єднання півдня України. У зв'язку з цим були проголошені "Азовські сили очищення". Залишився лише один кандидат на об'єднання України. Невідомо, чи буде Україна об'єднана мирним шляхом, чи через війну, але те, що Україна буде об'єднана незабаром - це факт."
azov.11.a:0 "І потече кров..."
azov.12.t:0 "Об'єднання України"
azov.12.d:0 "Це сталося. Українські націоналісти змогли об'єднати Україну. Сили "Азову" офіційно проголосили Київ знову столицею України, а ультраправі війська марширують Києвом на честь нового Дня Соборності України. Тим часом світ задається питанням, чи зможе зовнішній світ знайти порозуміння з такою Україною. Ідеологія "Азова" досить незвична для Європи, але, схоже, у них немає іншого вибору, окрім як визнати цю Україну справжньою."
azov.12.a:0 "Ок."
azov.13.t:0 "Національно-визвольний рух України"
azov.13.d:0 "Я ходжу і на кожному кроці бачу зневагу до своєї землі...\n\nСкрутні часи загартовують сильних людей. Тисячі стали на захист своєї Батьківщини, коли почалася війна.\n\nПоки одні пакували валізи, майно і планували втечу за кордон, а інші говорили, що у нас немає майбутнього, вони одні з небагатьох, хто взяв зброю і пішов на фронт.\n\nВони не бояться дивитися правді у вічі. Якою б вона не була.\n\nВ обличчя їх називають героями, а за спиною - фанатиками. Меркантильна, бездуховна маса, яка ставить матеріальні цінності понад усе, НІКОЛИ не зрозуміє того болю, який відчувають українські патріоти, не ті, що сидять в інтернеті, а ті, що сидять в окопах і готові вмирати за державу. \Вони продовжують справу полеглих воїнів, і хоч перебувають у тіні, але не потерплять знущань над своїм народом.\n\nБоротьба триває.\n\nЇхня слава житиме вічно, а вітер історії змете той бруд, який буде виливатися на їхні могили."
azov.13.a:0 "Слава Україні..."
azov.14.t:0 "Андрій Мельник чи Степан Бандера?"
azov.14.d:0 "У лютому 1940 року з Організацією Українських Націоналістів сталася одна з найстрашніших подій після смерті Євгена Коновальця в Роттердамі 1938 року, батька українського націоналістичного визвольного руху. \Молодше покоління, більш радикальне крило ОУН на чолі зі Степаном Бандерою після багатьох суперечок в організації оголосило, що легітимний лідер ОУН Андрій Мельник є зрадником української нації, який своєю "нерішучістю" і "слабкістю" працює проти українців.\nДім розділився на дві частини.\nВ результаті бандерівці розпочали братовбивчу війну, де українці з одними поглядами вбивали один одного. Олена Теліга, Микола Сцібоський, Омелян Сеник, Олег Ольжич, вони загинули через дурість, зухвалість і непорозуміння. Це був особистий конфлікт, а не політичний.  І ми впевнені, що розпуск ОУН був планом Москви. Вони бояться сильного, об'єднаного українського визвольного руху. Вони хотіли нацькувати українців один на одного. І вони виконали свою місію. "
azov.14.a:0 "І що ж тепер..."
azov.15.t:0 "Нічого не нагадує?"
azov.15.d:0 "І тепер москалі знову нацьковують нас на наших братів. Розпад України був найбільшою трагедією в історії нашої Батьківщини. Ми повинні прийняти мудрі рішення. Ми розгромлені, але не знищені.\nНеважливо, кого ви вважаєте героєм: Мельника чи Бандеру. Історія їх розсудить. Але зараз ми не дозволимо вдруге розвалити націоналістичний рух. Тільки об'єднані та сильні ми зможемо досягти задуманого.\nПам'ятайте минуле і вчіться на наших помилках."
azov.15.a:0 "Слава Україні!"
azov.16.t:0 "Назад у минуле"
azov.16.d:0 "Зродились ми великої години,\n\nЗ пожеж війни і з полум'я вогнів -\n\nПлекав нас біль за долю України,\n\nЗростив в нас гнів і лють на ворогів!,\n\nМи йдемо в бій переможним ходом, -\n\nТверді, міцні, незламні, мов граніт,\n\nБо плач не дав нікому ще свободи,\n\nХто борець – той здобуває світ!. \n\nВеде нас в бій Героїв наших слава,\n\nДля нас закон – найвищий то наказ!\n\nСоборна українська є держава –\n\nОдна на вік, від Сяну по Кавказ!"\n\nГімн ОУН. 1932."
azov.16.a:0 "Слава Україні!"
azov.17.t:0 "Об'єднуємося з Полтавою"
azov.17.d:0 "Народ знову буде об'єднаний."
azov.17.a:0 "Слава Вождю!"
azov.18.t:0 "Об'єднатися з язичниками"
azov.18.d:0 "Народ знову буде об'єднаний."
azov.18.a:0 "Слава Перуну!"
azov.19.t:0 "Вибір найбільш перспективної школи."
azov.19.d:0 "Азов був сформований як добровольчий батальйон в Україні під час його героїчної оборони від нео-більшовицької орди зі сходу, і багато хто з його членів вже мав досвід військової служби або військово-патріотичні переконання. Багато з них були зацікавлені в отриманні військової освіти та вдосконаленні своїх військових навичок. В "Азові" є кілька військових навчальних закладів, але найпотужнішими є дві школи.\nВійськова школа імені Євгена Коновальця вважалася класичним вибором для багатьох членів полку "Азов". Школа була відома своєю вищою освітою та традиціями служби в українській армії. Обираючи цей варіант, бійці мали можливість отримати як професійну військову освіту, так і досвід служби в регулярних Збройних силах України. Школа пропонувала поглиблений військовий курс та можливість отримати офіцерське звання.\nШкола хоружного імені Миколи Сціборського була менш традиційним вибором, але відзначалася великим духом патріотизму та незалежності. Деякі члени "Азову" могли знайти її більш сумісною з їхніми поглядами та ідеологією, оскільки вона асоціювалася з патріотичними та націоналістичними цінностями.\nКожен боєць, який обирав між цими школами, робив це, виходячи зі своїх особистих переконань, професійних цілей та ідеологічних поглядів. Наш уряд заохочуватиме конкуренцію між школами, щоб забезпечити найкращі результати для солдатів, тож якій школі ми віддамо перевагу зараз?"
azov.19.a:0 "Військова школа імені Євгена Коновальця"
azov.19.b:0 "Школа хорунжого Миколи Сціборського"
azov.20.t:0 "Життя за Азов"
azov.20.d:0 "Микита, молодий хлопець з невеликого містечка на Поділлі, жив тихим і спокійним життям. Він був звичайним хлопцем, але з внутрішнім почуттям патріотизму та бажанням служити своїй країні. Після закінчення школи Микита прийняв непросте рішення - він вирішив служити в армії та вивчати військову справу.\nМикита став курсантом військового училища імені Євгена Коновальця, де почав здобувати військові навички та глибоке розуміння патріотичних цінностей. Під час навчання він познайомився з багатьма однодумцями та отримав одностайну підтримку однокурсників.\nОдного разу, під час тренування на полігоні, Микита отримав прізвисько "Персик". Це прізвисько дали йому за характерні природні смуги на щоках, які нагадували колір персика. Ім'я "Персик" - це не просто прізвисько, а його справжнє друге ім'я, яке він використовував на військовій службі.\nМикита, або "Персик", продовжив навчання і службу в армії, вступивши до полку "Азов", де його військові навички і патріотизм були високо оцінені. Він був готовий піти на самопожертву, щоб захистити свою країну та відстояти її суверенітет. "Персик" став одним з багатьох героїв, які пройшли через випробування війною та продемонстрували свою відданість і силу духу на службі Україні."
azov.20.a:0 "Слава всім героям!"

