azov.1.t:0 "Національна революція на Донбасі"
azov.1.d:0 "Лихоліття загартовує людей, або, принаймні, дає зрозуміти, хто насправді відданий своєму народу.\nПісля славної перемоги українських лицарів над силами зла і терору, що окопалися на східних кордонах Донбасу, генерал Кривонос вирішив, що всі проблеми, від яких страждав народ, і які раніше влада ігнорувала і продовжувала закривати на них очі, можна вирішити за допомогою "демократичних" виборів глави уряду. Однак усі знали, що так звані "кандидати" були лише маріонетками або поплічниками олігархів, які стояли за ними і керували всім процесом. Перемога будь-якого з цих "демократів" повернула б нас до того, що нас сюди привело - до нового олігархічного панування, що супроводжується прихованою тиранією.\nВтім, цього разу ми - "Азов" - вирішили не стояти осторонь і не допустити бандитів та зрадників нації до влади над нашим народом. Вибори, результати яких в кінцевому підсумку призвели до такого ж результату, потрібно було зупинити, і ми пішли на цей крок. Неважливо, що про нас скажуть люди, бо наша совість чиста. Український народ заслуговує на справедливість, і ми її принесемо. Почуй нас, гордий український народе! Сьогодні день, коли твої найвідданіші сини поклали край старому прогнилому ладу і народили новий!"
azov.1.a:0 "Азов може бути нашим єдиним рятівником!"
azov.2.t:0 "Боротьба за Азов"
azov.2.d:0 "ХЛОПЦІ, СЬОГОДНІ ЙШОВ ПО ДОНЕЦЬКУ І ПОБАЧИВ ЛІБЕРАЛА В ТОЛСТОВЦІ "MAKE LOVE NOT WAR" ЗІ ЗНАЧКОМ ЛГБТК, ТАК Я ПІДСКОЧИВ І РІЗКО ЗАЇХАВ ЙОМУ ПО ЩОКАХ ВЕРТУШКОЮ І З УСІЄЇ СИЛИ ПРОКРИЧАВ "ВІЙНА ДО ПЕРЕМОГИ", ТОМУ ЩО ПРОСОЧИВСЯ ІДЕЄЮ НАЦІЇ НА СЛУЖБІ, ХЛОПЦІ, ДУХ СТАРОЇ ШКОЛИ ЖИВЕ В ПІДРОЗДІЛАХ АЗОВА, ДЕ ТРАХАЮТЬСЯ В ХАРДКОРІ, ДЕ ХЛОПЦІ ЖИВУТЬ БІЙЦЯМИ, ПІДАРАСАМИ І ЖЕРУТЬ СТАТУТИ В РОТ! ТІЛЬКИ АЗОВ, 3 БРИГАДА, КРАКЕН, ЛОВАРТ, ТІЛЬКИ ХАРДКОР !!! ЄДНІСТЬ УЛЬТРАХАРДКОРН АЗОВ !!! хлопці трахайте росіян, лібералів, пацифістів, веселіться у взводах, любіть свій підрозділ, валькірію, вождь і нон-стоп енергетику !!! ГОВОРІТЬ ВІДКРИТО І СМІЛИВО В ОБЛИЧЧЯ !!! Я ЛЮБЛЮ АЗОВСЬКИЙ РУХ!!!"
azov.2.a:0 "Буває."
azov.3.t:0 "Ще один день на Азові"
azov.3.d:0 "Ми з моїм другом Тотенкопфом поверталися з фронту, з ранкової операції. При посадці двоє з заблукалих днрівців не захотіли здаватися, точніше, занадто підозріло підняли руки, за що ми їх порубали і розстріляли, ці русаки верещали, як свині, захлинаючись кров'ю.\nВиявилося, що в посадці були ще поранені, які, як стадо переляканих чеченців, збилися в купу в сміттєвій ямі, і навіть боялися висунути голову в наш бік. Щоправда, один старий чеченоїд, весь у тюремних партаках і з медалями за утримання сечі та калу, певно, ветеран антисистемної боротьби, спробував крикнути щось на кшталт "москва - столиця", але мій друг Тотенкопф засадив йому прямо в дупу цинку 7,62, а потім ми довго били його прикладами, поки він не змінив расову приналежність, перетворившись з чорнявого на синього, як довбане Каспійське море. \nКоли наша благодійна місія добігла кінця, решта підорів почали в хаосі бігати по посадочній площадці, щоразу злісно викликаючи вогонь з мого ПКМ, а ми з другом Тотенкопфом спокійно пішли до місця завантаження, по дорозі підбираючи шеврони з плечей солдатів другої світової армії. Слава Україні!"
azov.3.a:0 "Прікольно."
azov.4.t:0 "Підйом"
azov.4.d:0 "На його могилі вона написала слова: "Слава Україні! Всім Героям Слава!"\nНа полях битв Україна втратила найкращих синів нації, які зголосилися воювати в найтяжчу годину нашої Батьківщини.\n\nЇх тисячі. Тисячі чоловіків і навіть дітей, які щойно закінчили школу, загинули за Україну... Але пам'ять про них не забута. Неважливо, чи загинув солдат героїчно, чи пожертвував собою, чи помер від кулі або поранення. Незалежно від віку, вони залишаться воїнами, які не побоялися взяти в руки зброю і стати на захист своїх домівок, де живуть кохані люди, батьки, друзі.\n\nДеяким тіньовим ворожим силам здається, що можна знищити альтернативну думку, якщо кидати її носіїв на мінні поля, під снаряди і москальські кулі, кидати гнити в тюрми, калічити фізично і морально. \Вони не розуміють одного - наші ідеї безсмертні.\n\nНа них одночасно світить біле сонце живих і чорне сонце мертвих.\n\nІ ці тисячі, які віддали своє життя в бою навіть не за Україну, а за наші спільні мрії та особисті переконання - вони поруч з нами, просто ми їх не бачимо.\n\nСмерть найкращих з нас не зупинить нашу перемогу..."
azov.4.a:0 "Це лише зробить нашу помсту більш жорстокою."
