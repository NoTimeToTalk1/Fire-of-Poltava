AFU_azov_shkola_konovaltsa:0 "Військова школа імені полковника Євгена Коновальця"
AFU_azov_shkola_konovaltsa_desc:0 "Військова школа імені полковника Євгена Коновальця - спеціалізований навчальний заклад для підготовки сержантського та старшинського складу.\nШкола старшин названа на честь Євгена Коновальця (1891-1938) - українського військового та політичного діяча, який присвятив своє життя боротьбі за Українську державу у складний час, коли переважна більшість тогочасних українських політиків та військових зневірилась у перспективах боротьби. За його прикладом полк "Азов" взяв на себе відповідальність та ініціював реформування армії під час кризи, не чекаючи вказівок та директив згори.\nПерший курс був набраний з понад півсотні добровольців "Азову", які провели не менше року в зоні АТО та брали безпосередню участь у бойових діях. Командири рот подали анкети найдостойніших бійців, які виявили бажання розвиватися в цьому напрямку. Кандидати проходили серйозний відбір, враховуючи їхні інтелектуальні та фізичні якості. Підготовкою майбутніх сержантів займалися досвідчені військові інструктори та фахівці з Грузії, які пройшли як радянські, так і натовські військові школи та мали багаторічний практичний досвід, в тому числі в гарячих точках. Окремі дисципліни викладали цивільні професори з київських вишів та журналісти провідних українських ЗМІ."
AFU_azov_shkola_sciborskogo:0 "Хоружна школа імені підполковника Миколи Сціборського"
AFU_azov_shkola_sciborskogo_desc:0 "Школа підполковника Миколи Сціборського - це спеціалізований навчальний заклад для підготовки сержантського складу. Відкрита 20 листопада 2017 року на базі Маріупольського полку морської піхоти "Азов". Планувалося запустити програму підготовки з управління персоналом та ідеології.\nСеред курсантів - люди, які обіймають посади заступників командирів окремих підрозділів ротного рівня. Усі викладачі мають наукові ступені. Залучені викладачі з дніпровських вишів свого часу готували програму з реформування системи управління персоналом у Збройних силах України.\nКурс розрахований на 33 дні. Протягом навчального дня слухачі мають змогу відвідати 5 лекційних або семінарських пар, а також заняття з фізичної підготовки, рукопашного, ножового бою та вогневої підготовки. Також викладаються прикладні дисципліни, такі як військова психологія, військова педагогіка, риторика, ідеологічні та суто військові предмети.\nПо закінченню курсу випускники отримують диплом, а їхні підрозділи - прапори, знаки розрізнення та спеціальні жетони. Таким чином, кожен підрозділ матиме свій бойовий прапор і відповідального за нього."


