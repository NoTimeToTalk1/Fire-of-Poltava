azov_loyalty_raising:0 "Підвищення лояльності"
azov_loyalty_raising_desc:0 "З моменту приходу "Азову" до влади багато командирів і державних діячів не до кінця переконані в тому, що ми виконуємо місію з порятунку України. Можливо, поспілкувавшись з ними, ми зможемо змінити їхню думку."
afu_azov_start_decisions:0 "Азов"
afu_azov_start_decisions_desc:0 "Азов був сформований під час війни на сході України, що розпочалася у 2014 році. Це був один з багатьох добровольчих батальйонів, що виникли під час конфлікту, який складався з добровольців, що воювали проти сепаратистських угруповань і підтримували українську державу в її боротьбі за територіальну цілісність.\n\nЗа час свого існування "Азов" був відомий не лише як військовий підрозділ, але і як громадська організація, що проводила різні соціокультурні та освітні ініціативи. У минулому вона привертала увагу громадськості та міжнародної спільноти через звинувачення у націоналізмі, радикалізмі та праворадикальних ідеях.\n\nТож чи братиме участь полк "Азов" у формуванні Нової України?"
afu_ask_azov_for_help:0 "Підняти репутацію Азову"
afu_ask_azov_for_help_desc:0 "Азов допоможе нам у боротьбі з терористами."
afu_ask_azov_for_help_2:0 "Військові марші"
afu_ask_azov_for_help_2_desc:0 "Військові марші - це чудова нагода продемонструвати силу нашої армії. водночас азовці можуть взяти в ньому участь і знову з'являться на нашому телебаченні."
afu_ask_azov_for_help_3:0 "Зустрічі з генеральним штабом"
afu_ask_azov_for_help_3_desc:0 "Ми будемо проводити брифінги нашого генерального штабу і запрошувати на них "азовців", адже вони дуже професійні та корисні бійці."